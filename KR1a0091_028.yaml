body:
  text: 周易傳義大全卷二十二明胡廣等撰繫辭上傳程子曰聖人用意深處全在繫辭詩書乃格言繫辭本欲明易若不先求卦義則看繫辭不得如繫辭之文後人決學不得譬之化工生物且如生出一枝花或有剪裁為之者或有繪畫為之者看時雖有相類然終不若化工所生自有一般生意本義繫辭本謂文王周公所作之辭繫于卦爻之下者即今經文此篇乃孔子所述繫辭之傳也以其通論一經之大體凡例故無經可附而自分上下云朱子曰熟讀六十四卦則覺得繫辭之語其為精密是易之括例繫辭或言造化以及易或言易以及造化不出此理六十四卦只是上經説得齊整下經便亂董董地繫辭也如此只是上繫好看下繫便沒理會雙湖胡氏曰繫辭傳中言聖人繫辭者六曰聖人設卦觀象繫辭焉而明吉凶曰聖人有以見天下之動繫辭焉以斷其吉凶者凡兩出曰繫辭焉所以告也曰繫辭焉以盡其言曰繫辭焉而命之皆指文王周公卦爻辭言也若繫辭上下傳則是孔子統論一經之卦爻大體凡例如論先聖作易之由則見於包羲氏仰觀俯察及易有太極及河圖洛書數章如論用易之法則見於大衍之數五十章與夫卦爻之剛柔象數之變化三極之道幽明之故鬼神之情狀皆搜抉無隱若徒有上下經而無繫辭傳則象數之學不明理義之微莫顯易亦竟無以致用於萬世而適乎仁義中正之歸矣其有稱大傳者因太史公引天下同歸而殊塗一致而百慮為易大傳蓋太史公受易楊何何之屬自著易傳行世故稱孔子者曰大傳以别之耳雲峯胡氏曰上下繫各十二章始皆言易簡終皆言易在德行不在言辭示人學易之要深切矣天尊地卑乾坤定矣卑高以陳貴賤位矣動靜有常剛柔斷矣方以類聚物以羣分吉凶生矣在天成象在地成形變化見矣斷丁亂反見賢變反程子曰天尊地卑止天下之理得而成位乎其中矣天尊地卑尊卑之位定而乾坤之義明矣尊卑既判貴賤之位分矣陽動陰靜各有其常則剛柔判矣事有理一作萬事理也物有形也事則有類形則有羣善惡分而吉凶生矣象見於天形成於地變化之迹見矣陰陽之交相摩軋八方之氣相推蕩雷霆以動之風雨以潤之日月運行寒暑相推而成造化之功得乾者成男得坤者成女乾當始物坤當成物乾坤之道易簡而已乾始物之道易坤成物之能簡平易故人易知簡直故人易從易知則可親就而奉順易從則可取法而成功親合則可以常久成事則可以廣大聖賢德業久大得易簡之道也天下之理易簡而已有理而後有象成位在乎中也本義天地者陰陽形氣之實體乾坤者易中純陰純陽之卦名也卑高者天地萬物上下之位貴賤者易中卦爻上下之位也動者陽之常靜者陰之常剛柔者易中卦爻陰陽之稱也方謂事情所向言事物善惡各以類分而吉凶者易中卦爻占決之辭也象者日月星辰之屬形者山川動植之屬變化者易中蓍䇿卦爻陰變為陽陽化為陰者也此言聖人作易因陰陽之實體為卦爻之法象莊周所謂易以道陰陽此之謂也朱子曰天尊地卑上一截皆説面前道理下一截是説易書聖人做個易與天地準處如此如今看面前天地便是他那乾坤卑高便是貴賤聖人只是見成説這個見得易是凖這個若把下面一句説做未畫之易也不妨然聖人是從那有易後説來又曰天尊地卑乾坤定矣觀天地則見易也問此第一章第一節蓋言聖人因造化之自然以作易曰論其初則聖人是因天理之自然而著之於書此是後來人説話又是見天地之實體而知易之書如此如見天之尊地之卑却知得易之所謂乾坤者如此如見天之高地之卑却知得易所分貴賤者如此又曰此是因至著之象以見至微之理又曰上句是言造化之實體以明下句易中之事方以類聚物以羣分伊川説是亦是言天下事物各以類分故存乎易者吉有吉類凶有凶類方以類聚物以羣分方只是事訓術訓道善有善之類惡有惡之類各以其類而聚也又曰方向也所向善則善底人皆來聚所向惡則惡底人皆來聚物又通天下之物而言是個好物事則所聚者皆好物事也若是個不好底物事則所聚者皆不好底物事也在天成象在地成形變化見矣變化是易中陰陽二爻之變化故又曰變化者進退之象也又曰貴賤是易之位剛柔是易之變化類皆是易不必専主乾坤二卦而言又曰上是天地之變化下是易之變化融堂錢氏曰無畫之易在太極先有畫之易自兩儀始蓋下文所謂貴賤剛柔吉凶變化自乾坤而始著非自乾坤而始有也雙湖胡氏曰天尊地卑陰陽固有自然尊卑之象然於易上欲見其尊卑處何者為最親切曰自太極生兩儀象卦最可見太極動而生陽靜而生隂則陽已居先矣至於陽儀之上生一陽一陰先陽固宜也陰儀上當以陰為主矣其生一陽一陰亦以陽居先焉以至於六畫莫不先陽而後陰於是首乾終坤乾不期尊而自尊坤不期卑而自卑於此見尊陽卑陰非聖人之私意卦畫自然之象而亦造化自然之位也張子曰不言高卑而曰卑高者亦有義高以下為基亦是人先見卑處然後見高也鶴山魏氏曰卦畫自下始也位六位也貴賤觀於屯言以貴下賤訟言以下訟上之類可見矣天圓而動地方而靜故有常剛爻一三五柔爻二四六也斷因九六之得位失位而斷之也觀於位正當也位不當也之類可見矣臨川吳氏曰動靜有常以天地之用言天運轉不已陽常動也地填嶷不移陰常靜也剛柔以卦之竒耦二畫言剛謂竒畫柔謂耦畫斷猶判也剛畫猶陽動之實而一柔畫猶隂靜之虛而二也誠齋楊氏曰聚散異向好惡相攻由是吉凶生焉東坡蘇氏曰方本異也而以類而聚此同之生於異也物羣則其勢不得不分此異之生於同也天地一物也陰陽一氣也或為象或為形所在之不同故云在者明其一也象者形之精華發於上者也形者象之體質留於下者也盤澗董氏曰在天成象在地成形變化見矣變化非因形象而後有也變化流行非形象則無以見故因形象而變化之迹可見也日月星辰象也山川動植形也象陽氣所為形陰氣所為然陽中有隂則日星陽也月辰陰也陰中有陽則山陰而川陽然陰陽又未嘗不相錯而各自為陰陽也涑水司馬氏曰乾坤定於天地貴賤陳於尊卑剛柔斷於動靜吉凶生於萬物變化見於形象皆非聖人為之也天地之判陰陽之交本自有之而聖人準之以為教爾勉齋黃氏曰此言有天地則乾坤貴賤剛柔吉凶變化之理昭然可見然必有乾坤而後貴賤剛柔吉凶之體始具有貴賤剛柔吉凶而後變化之用始行始於乾坤終於變化此生生所以不窮天地所以常久而不已也雲峯胡氏曰朱子曰此非是因有天地而始定乾坤乃是觀天地即見易也蓋乾坤之卦未畫觀之天尊地卑乾坤之位已定矣貴賤之位未齊觀天地萬物之卑高卦爻之貴賤已位矣易未有卦爻則未有剛柔之稱也天地間陽者常動可見其為剛陰者常靜可見其為柔矣易未有爻位則未有吉凶之辭也天地間事事物物善惡各以其類而分善者可知其為吉惡者可知其為凶矣未有蓍卦固未見所謂陽化陰陰變陽也天成象地成形蓍卦之變化已於此乎見矣此一節言畫前之易固如是也是故剛柔相摩八卦相蕩本義此言易卦之變化也六十四卦之初剛柔兩畫而已兩相摩而為四四相摩而為八八相蕩而為六十四朱子曰繫辭中説是故字都是喚那下文起也有相連處也有不相連處問剛柔相摩八卦相蕩竊謂六十四卦之初剛柔兩畫而已兩而四四而八八而十六十六而三十二三十二而六十四皆是自然生生而不已而謂之摩蕩何也曰摩如一物在一物上靣摩旋底意思亦是相交意思如今人磨子相似下靣一片不動上靣一片只管摩旋推蕩不曽住自兩儀生四象則老陽老陰不動而少陰少陽則交自四象生八卦則乾坤震巽不動而兌離坎艮則交自八卦而生六十四卦皆是從上加去下體不動每一卦生八卦故謂之摩蕩又曰摩是兩個物事相摩戞蕩是圎轉推蕩出來摩是八卦以前事蕩是有那八卦了團旋推蕩那六十四卦出來漢書所謂蕩軍是圓轉去殺他磨轉他底意思臨川吳氏曰畫卦之初以一剛一柔與第二畫之剛柔相磨而為四象又以二剛二柔與第三畫之剛柔相磨而為八卦八卦既成則又各以八悔卦蕩於一貞卦之上而一卦為八卦八卦為六十四卦也鼓之以雷霆潤之以風雨日月運行一寒一暑本義此變化之成象者朱子曰鼓之以雷霆以下四句是説易中所有建安丘氏曰前以乾坤貴賤剛柔吉凶變化言是對待之陰陽交易之體也此以摩蕩鼓潤運行言是流行之陰陽變易之用也至下文則言乾坤之德行而繼以人體乾坤者終之乾道成男坤道成女本義此變化之成形者此兩節又明易之見於實體者與上文相發明也朱子曰剛柔相摩八卦相蕩方是説做這卦做這卦了那鼓之以雷霆與風雨日月寒暑之變化皆在這卦中那成男成女之變化也在這卦中見造化關捩子才動那許多物事都出來易只是模寫他這個又曰鼓之以雷霆潤之以風雨此已上是將造化之實體對易中之理此下便是説易中却有許多物事天地父母分明是一理乾道成男坤道成女則凡天下之男皆乾之氣天下之女皆坤之氣從這裏便徹上徹下即是一個氣都透了乾道成男坤道成女通人物言之在動物如牝馬之類在植物亦有男女如麻有牡麻及竹有雌雄之類皆離陰陽剛柔不得又曰豈得男便都無陰女便都無陽這般須要錯看正蒙云遊氣紛擾合而成質者生人物之萬殊陰陽兩端循環不窮者立天地之大義陰陽循環如磨遊氣紛擾如磨中出者剛柔相摩八卦相蕩鼓之以雷霆潤之以風雨日月運行一寒一暑此陰陽循環立天地之大義也乾道成男坤道成女此遊氣紛擾生人物之萬殊也雲峯胡氏曰剛柔二爻相摩而為八卦八卦相蕩而為六十四摩與蕩即上文所謂變化也六十四卦之中自有雷霆風雨日月寒暑變化而成象者也卦之中自有男女變化而成形者也此一節畫後之易又如此也大抵易之未畫卦爻之變化在天地實體中及其既畫天地萬物之變化又在卦爻實體中本義兩以實體言見在天地者即未畫之易在易者即是已畫之天地其體皆實而非虛也乾知大始坤作成物本義知猶主也乾主始物而坤作成之承上文男女而言乾坤之理蓋凡物之屬乎陰陽者莫不如此大抵陽先陰後陽施陰受陽之輕清未形而陰之重濁有迹也朱子曰乾知大始坤作成物知者管也乾管却大始大始即生物之始乾始物而坤成之也乾知大始知主之意也如知州知縣乾為其初為其萌芽坤作成物坤管下靣一截有所作為知訓管字不當解作知見之知大始木有形知之而已成物乃流形之時故有為乾只是氣之統體無所不包但自其氣之動而言則為陽自其氣之靜而言則為陰所以陽常兼陰陰不得兼陽陽大陰小陽全陰半陽饒陰乏而陰必附陽皆此意也邵子曰陽不能獨立必得陰而後立故陽以陰為基陰不能自見必待陽而後見故陰以陽為倡陽知其始而享其成陰效其法而終其勞也柴氏中行曰一氣之動則自有知覺而生意所始乾實為之一氣既感則妙合而凝其形乃著有作成之意坤實為之乾以易知坤以簡能易以䜴反本義乾健而動即其所知便能始物而無所難故為以易而知大始坤順而靜凡其所能皆從乎陽而不自作故為以簡而能成物朱子曰乾之易只管上一截事到下一截却屬坤故易坤只是承乾下著做上一截事只做下面一截故簡如乾以易知坤以簡能知便是做起頭能便是做了觀隤然確然亦可見易簡之理乾以易知乾陽物也陽剛健故作為易成坤以簡能坤因乾先發得有頭腦特囚而為之故簡乾惟行健其所施為自是容易觀造化生長可見只是這氣一過時萬物皆生了可見其易要生便生更無凝滯要做便做更無等待非健不能也又曰乾德剛健他做時便通透徹達欄截障蔽他不住人剛健者亦如此易知只是説他恁地做時不費力坤最省事更無勞攘只承受那乾底生將物出來便見得是能陰只是一個順若不順如何配陽而生物簡只順從而已乾以易知坤以簡能以上是言乾坤之德易則易知以下是就人而言言人兼體乾坤之德也乾以易知者乾健不息惟主於生物都無許多艱深險阻故能以易而知大始坤順承天惟以成物都無許多繁擾作為故能以簡而作成物大抵陽施陰受乾之生物如瓶盛水其道至易坤惟承天以成物别無作為故其理至簡其在人則無艱阻而自直故人易知順理而不繁擾故人易從易知則人皆同心親之易從則人皆協力而有功矣誠齋楊氏曰自乾知大始至坤以簡能何謂也曰此贊乾坤之功雖至溥而無際而乾坤之德實至要而不繁也潘氏曰乾主宰大始坤作成萬物此乾坤之職也使為乾者用力之難為坤者用功之繁則乾坤亦勞矣惟乾以易知故主宰大始不以為難惟坤以簡能故作成萬物不以為繁也雲峯胡氏曰本義曰此承上文男女而言乾坤之理蓋物凡陽皆屬乾之男凡陰皆屬坤之女一陰一陽可相有不可相無然其理則陽主於始物陰不過作成之爾陽主始物自然而然胡為是之易也健故也陰但從陽自能成物胡為是之簡也順故也上兩節論陰陽之形體兼氣與形而言也此論陰陽之性情因氣與形而以理言也易則易知簡則易從易知則有親易從則有功有親則可久有功則可大可久則賢人之德可大則賢人之業本義人之所為如乾之易則其心明白而人易知如坤之簡則其事要約而人易從易知則與之同心者多故有親易從則與之協力者衆故有功有親則一於內故可久有功則兼於外故可大德謂得於己者業謂成於事者上言乾坤之德不同此言人法乾坤之道至此則可以為賢矣朱子曰乾以易知坤以簡能此易簡在乾坤易則易知簡則易從却是以人事言兩個易字又自不同一個是簡易之易一個是難易之易要之只是一個字但微有毫釐之間夫易知底人人自然去親他若其中險深不可測則誰親之做事不煩碎人所易從有人從之功便可成若是頭項多做得事來艱難底必無人從之如何得有功易知而人親附自然可以長久易從而有功則所為之事自然廣大易知易從不必皆指聖人但易時人自然易知簡時人自然易從有親可久則為賢人之德是就存主處言有功可大則為賢人之業是就做事處言蓋自乾以易知便是指存主處坤以簡能便是指做事處故易簡而天下之理得則與天地參矣德者得也得之於心謂之德如得這個孝則為孝之德業是做得成頭緒有次第了不然泛泛做只是俗事更無可守問本義曰知則同心從則協力一於內故可久兼於外故可大如何曰既易知則人皆可以同心既易從則人皆可以協力一於內故可久者謂可久是賢人之德德則得於已者兼於外故可大者謂可大是賢人之業事業則見於外者故爾可久者日新而不已可大者富有而無疆有幾多事今工夫易得間斷便是不能久見道理偏滯不開展便是不能大須是兩頭齊著力乃得也問可久可大只説是賢人之德業楊氏曰可而已非其至也如何曰其説亦是此雖不説是聖人至成位乎中則是聖人也平菴項氏曰稱賢人者明乾坤之德業人皆可充而至也若但言聖人則嫌於必生知安行而後可而進修之路絶矣雲峯胡氏曰前三節見得天地間物物有乾坤此一節見得人心自具一乾坤人之心如乾之易則明白易知同心者衆故可一於內而為賢人之德人之行事如坤之簡則要約易從協力者衆故可兼於外而為賢人之業蓋人之心本自明白正大本自與乾坤同體世之人往往傾險使人不可近勞擾使人不可行持不可持久不可充拓卒自為小人之歸殊可惜也本義曰此言人能法乾坤之道至此則可以為賢人矣蓋為衆人言也夫子不敢遽言聖人姑曰可久可大姑曰賢人之德業欲衆人皆可至也易簡而天下之理得矣天下之理得而成位乎其中矣本義成位謂成人之位其中謂天地之中至此則體道之極功聖人之能事可以與天地參矣朱子曰易簡理得只是淨淨潔潔無許多勞擾委曲張子所謂盡人道並立乎天地以成三才則盡人道非聖人不能也柴氏中行曰人心一造乎易簡而天下之理舉不外此是理也三才之道也人得之與天地並立矣雲峯胡氏曰此章首言天地間有自然之易繼言易中有自然之天地末言天地與易不外乎自然之理所謂自然之理者何也易也簡也易簡而天下之理得者聖人理與心會自然得之者也成位乎其中者成人之位於天地之中也夫位乎天地之中者皆人也必聖人方能成人之位而無愧於為人焉然則必如此後謂之成人則前所謂賢於人者猶未也本義前曰至此則可以為賢人謂衆人皆可至也此曰至此則體道之極功聖人之能事蓋謂賢者所可至也朱子教人之意深矣右第一章本義此章以造化之實明作經之理又言乾坤之理分見於天地而人兼體之也朱子曰自天尊地卑至變化見矣是舉天地事理以明易自是故以下却舉易以明天地間事雙湖胡氏曰此章專論伏羲體造化以作易之事重在乾坤二卦生八卦以至六十四卦蓋先天易首乾終坤包六十四卦於其中凡陽皆乾凡陰皆坤也末歸結乾坤易簡之德賢人體之造其極聖人之能事畢矣聖人設卦觀象繫辭焉而明吉凶程子曰聖人設卦觀象止吉無不利聖人既設卦觀卦之象而繫之以辭明其吉凶之理以剛柔相推而知變化之道吉凶之生由失得也悔吝者可憂虞也進退消長所以成變化也剛柔相易而成晝夜觀晝夜則知剛柔之道矣三極上中下也極中也皆其時中也三才以物言也三極以位言也六爻之動以位為義乃其序也得其序則安矣辭所以明義玩其辭義則知其可樂也觀象玩辭而能通其意觀變玩占而能順其時動不違於天矣本義象者物之似也此言聖人作易觀卦爻之象而繫以辭也朱子曰易當來只是為卜筮而作文言彖象却是推説做義理上去觀乾坤二卦便可見孔子曰聖人設卦觀象繫辭焉而明吉凶不是占筮知何明吉凶龜山楊氏曰此總言易之為書也漢上朱氏曰聖人設卦本以觀象不言而見吉凶自伏羲至於堯舜文王觀象而自得也聖人懼觀之者其智有不足以知此於是繫之卦辭又繫之爻辭以明告之非得已也為觀象而未知者設也剛柔相推而生變化本義言卦爻陰陽迭相推蕩而陰或變陽陽或化陰聖人所以觀象而繫辭衆人所以因蓍而求卦者也朱子曰易中説卦爻多只説剛柔不全就陰陽上説卦爻是有形質了陰陽全是氣又曰健順剛柔之精者剛柔健順之粗者龜山楊氏曰此總言爻之變動也柴氏中行曰剛柔之爻推移不常以發易道變化之理雲峯胡氏曰易之道不外乎辭變象占吉凶占也占以辭而明故曰繫辭焉而明吉凶剛柔相推象也變由象而出故曰剛柔相推而生變化是故吉凶者失得之象也悔吝者憂虞之象也本義吉凶悔吝者易之辭也得失憂虞者事之變也得則吉失則凶憂虞雖未至凶然已足以致悔而取羞矣蓋吉凶相對而悔吝居其中間悔自凶而趨吉吝自吉而向凶也故聖人觀卦爻之中或有此象則繫之以此辭也朱子曰悔者將趨於吉而未至於吉吝者將趨於凶而未至於凶悔吝便是吉凶底交互處悔是吉之漸吝是凶之端吉凶悔吝四者循環周而復始悔了便吉吉了便吝吝了便凶凶了便悔正是生於憂患死於安樂相似蓋憂苦患難中必悔悔便是吉之漸及至吉了少間便安意肆志必至做出不好可羞吝底事出來吝便是凶之漸矣及至凶矣又却悔只管循環不已正如剛柔變化剛了化化便是柔柔了變變便是剛亦循環不已又曰吉凶悔吝聖人説得極密吉過則悔既悔必吝吝又復吉如動而生陽動極復靜靜而生陰靜極復動悔屬陽吝屬陰悔是逞快做出事來了有錯失處這便生悔所以屬陽吝則是那隈隈衰衰不分明底所以屬陰亦猶驕是氣盈吝是氣歉節齋蔡氏曰象者有其倣佛而未盈之謂其辭之吉者則得之象可由之而見其辭之凶者則失之象可由之而見其辭悔吝者則憂虞之象可由之而見憂慮也虞度也能慮能度則可免失而致得矣此言上文觀象繫辭明吉凶之義括蒼龔氏曰憂在心虞在物在心則方有端而無患成悔而已矣悔者心每有之而不忘故積之以成吉在物則已有形而可虞非悔之可及也故成吝吝者口以為是文過而不改也故積之以成凶變化者進退之象也剛柔者晝夜之象也六爻之動三極之道也本義柔變而趨於剛者退極而進也剛化而趨於柔者進極而退也既變而剛則晝而陽矣既化而柔則夜而陰矣六爻初二為地三四為人五上為天動即變化也極至也三極天地人之至理三才各一太極也此明剛柔相推以生變化而變化之極復為剛柔流行於一卦六爻之間而占者得因所值以斷吉凶也朱子曰此章首三句是題目下面是解説這個吉凶悔吝自大説去小處變化剛柔自小説去大處吉凶悔吝説人事變化剛柔説卦畫從剛柔而為變化又自變化而為剛柔所以下個變化之極者未到極處時未成這個物事變似那一物變時從萌芽變來成枝成葉化時是那消化了底意思變化者進退之象是剛柔之未定者剛柔者晝夜之象是剛柔之已成者蓋柔變而趨於剛是退極而進剛化而趨於柔是進極而退既變而剛則晝而陽既化而柔則夜而陰猶言子午卯酉卯酉是陰陽之未定子午是陰陽之已定又如四象之有老少故此兩句惟以子午卯酉言之則明矣然陽化為柔只恁地消縮去無痕迹故曰化陰變為剛是其勢浸長有頭面故曰變此亦見陰半陽全陽先陰後陽之輕清無形而陰之重濁有迹也問本義解吉凶者失得之象也一段下云剛柔相推而生變化變化之極復為剛柔流行一卦六爻之中而占者得因其所值以為吉凶之決竊意在天地之中陰陽變化無窮而萬物得因之以生生在卦爻之中九六變化無窮而人始得因其變以占吉凶曰易自是占其變若都變了只一爻不變則反以不變者為主或都全不變則不變者又反是變也吉凶悔吝變化剛柔四句皆互換往來乍讀似不貫穿細看來不勝其密吉凶與悔吝相貫悔自凶而趨吉進退與晝夜相貫進自陰而趨乎陽退自陽而趨乎陰也節齋蔡氏曰進者息也退者消也變化者爻之動也剛變化而為柔則柔進剛退之象可見柔變此而為剛則剛進柔退之象可見此剛柔之質也剛晝陽也柔夜陰也故剛用事則晝之象可見柔用事則夜之象可見動變易也極者太極也以其變易無常乃太極之道也三極謂三才各具一太極也變至六爻則一卦之體具而三才之道備矣此言上文剛柔相推而生變化之義雲峯胡氏曰變者自柔而剛剛則復化化者自剛而柔柔則復變便如悔者自凶而吉吉則復吝吝者自吉而凶凶則復悔變化者剛柔之未定剛柔者變化之已成悔吝者吉凶之未定吉凶者悔吝之已成也一卦六爻之間莫不有三才太極之理此曰三極是卦爻已動之後各具一太極後曰易有太極者則卦爻未生之先統體一太極也是故君子所居而安者易之序也所樂而玩者爻之辭也樂音洛本義易之序謂卦爻所著事理當然之次第玩者觀之詳或問所居而安者易之序也與居則觀其象之居不同上居字是總就身之所處而言下居字是靜對動而言朱子曰然問所居而安者易之序也曰序是次序謂卦爻之初終如潛見飛躍循其序則安又問所樂而玩者爻之辭曰橫渠謂每讀每有益所以可樂蓋有契於心則自然樂節齋蔡氏曰序次序也自卦言否泰剝復之類自爻言潛見飛躍之類皆序也知其序之有常故居其位而安樂樂其理也玩習厭也辭者聖人所繫所以明理知其理之無窮故樂而玩雲峯胡氏曰所居而安是安分所樂而玩是窮理君子安分則窮理愈精窮理則安分愈固是故君子居則觀其象而玩其辭動則觀其變而玩其占是以自天祐之吉無不利本義象辭變已見上凡單言變者化在其中占謂其所值吉凶之決也朱子曰居則玩其辭如潛龍勿用其理當此時只是潛晦不當用若占得此爻凡事便未可做所謂君子動則觀其變而玩其占亦當知其理如此易有象八卦六爻然後有辭卦爻之辭筮有變老陰老陽然後有占變爻之辭象之變也在理而未形於事者也辭則各因象而指其吉凶占則又因吾之所值之辭而決焉其示人也益以詳矣故君子居而學易則既觀象矣又玩辭以考其所處之當否動而諏筮則既觀變矣又玩占以考其所值之吉凶善而吉者則行否而凶者則止是以動靜之間舉無違理而自天祐之無不利也蓋觀者一見而決玩者反覆而不舍之辭也柴氏中行曰居者靜而未涉於事也動者涉於事也居則觀卦之象而玩其辭以探其隱賾動則觀其剛柔之變而玩其辭之所占以求不悖其道一動一靜不違天理則俯仰無愧心逸日休德進業長用無不利蓋言道之所寓人當體之也節齋蔡氏曰觀象玩辭學易也觀變玩占用易也學易則無所不盡其理用易則唯盡乎一爻之時居既盡乎天之理動必合乎天之道故曰自天祐之吉無不利也平菴項氏曰吉凶者失得之已定者也其憂虞之初謂之悔吝變化者易之用也其所以變化則剛柔二物而已故觀吉凶者必自悔吝始觀變化者必自剛柔始文王觀此四者而繫之以辭讀易者亦當觀此四者而玩文王之辭則靜居動作無不利矣雲峯胡氏曰象與變有剛柔變化之殊辭與占有吉凶悔吝之異君子居而學易已窮乎象與辭之理動而用易又適乎變與占之宜動靜無非易即無非天故自天祐之吉無不利天地間剛柔變化無一時間人在大化中吉凶悔吝無一息停吉一而已凶悔吝三焉故上文示人以吉凶悔吝者聖人作易之事此獨吉而無凶悔吝者君子學易之功也右第二章本義此章言聖人作易君子學易之事雙湖胡氏曰此章専論文王周公繫辭以明伏羲卦象剛柔變化吉凶悔吝凡三極之道皆見辭中而君子學易必當合伏羲卦象文王周公卦爻辭兼得之末歸結在卜筮上以獲自天之祐也彖者言乎象者也爻者言乎變者也程子曰彖者言乎象者也止辭也者各指其所之彖言卦之象爻隨時之變因得失而有吉凶能如是則無咎位有貴賤之分卦兼小大之義吉凶之道於辭可見以悔吝為防則存意於微小震懼而得無咎者以能悔也卦有小大於時之中有小大也有小大則辭之險易殊矣辭各隨其事也本義彖謂卦辭文王所作者爻謂爻辭周公所作者象指全體而言變指一節而言朱子曰彖辭最好玩味説得卦中情狀出彖辭極精分明是聖人所作問彖是總一卦之義曰也有别説底爻是兩個交義看來只是交變之義變謂剛柔相推而生者卦分明似將一片木畫挂於壁上所以為卦耳吉凶者言乎其失得也悔吝者言乎其小疵也無咎者善補過也本義此卦爻辭之通例或問悔吝者言乎其小疵也只是以其未便至於吉凶否朱子曰悔是漸好知道是錯了便有進善之理悔便到無咎吝者喑嗚説不出心下不足沒分曉然未至有大過故曰小疵然小疵畢竟是小過龜山楊氏曰吉凶者失得之報有失則有得無失則無得矣悔吝者無大咎也言乎小疵而已無咎者本有咎也以其善補過故無咎雲峯胡氏曰前章言卦爻中吉凶悔吝之辭未嘗及無咎之辭此章方及之大抵不貴無過而貴改過無咎者善補過也聖人許人自新之意切矣臨川吳氏曰此承上章正釋二聖人繫辭之旨彖者文王所繫一卦之辭因名卦之象而言即上章所謂設卦觀象也爻者周公所繫六爻之辭因揲蓍之變而言即上章所謂剛柔相推而生變化也卦畫之變化而以蓍䇿之變言者蓋蓍三變得九則剛變而化柔蓍三變得六則柔變而化剛也彖辭爻辭或曰吉或曰凶者以言其事之有得有失也辭曰悔曰吝者以言其事雖未大失而已有小疵也辭曰無咎者以善其能補過也有過當有咎能補之則不過矣故得無咎也是故列貴賤者存乎位齊小大者存乎卦辨吉凶者存乎辭本義位謂六爻之位齊猶定也小謂陰大謂陽或問上下貴賤之位何也朱子曰二四則四貴而二賤五三則五貴而三賤上初則上貴而初賤上雖無位然本是貴重所謂貴而無位高而無民在人君則為天子父為天子師在他人則清高而在物外不與事者此所以為貴也問齊小大者存乎卦龜山曰陽大陰小如何曰齊如分辨之義泰卦為大否卦為小又曰齊又不是整齊如協字如分辨字龜山楊氏曰天道貴陽而賤陰陰陽有貴賤之理而列貴賤者必托六位而後明陽大而陰小陰陽有小大之理而齊小大者必假卦象而後顯貴賤者如以貴下賤大得民之辭皆爻位之所列也小大者如小往大來大往小來之辭皆卦彖之所齊也憂悔吝者存乎介震無咎者存乎悔本義介謂辨别之端蓋善惡已動而未形之時也於此憂之則不至於悔吝矣震動也知悔則有以動其補過之心而可以無咎矣或問憂悔吝者存乎介悔吝未至於吉凶是乃初萌動可以向吉凶之微處介又是悔吝之微處介字如界至界限之界是善惡初分界處於此憂之則不至悔吝矣朱子曰然無咎者本是有咎善補過則為無咎震動也欲動而無咎當存乎悔爾南軒張氏曰易三百八十四爻憂悔吝而存乎介者多矣唯豫之六二介于石不終日貞吉在豫之時能介而自守者乎震無咎而存乎悔者多矣唯復之初九不逺復無祗悔元吉在復之初能悔而改過者乎丹陽都氏曰憂其悔吝者必思患豫防而防禍于其始震而無咎者必恐懼修省而省過於其終雲峯胡氏曰前曰悔吝者言乎其小疵此曰憂悔吝者存乎介蓋謂當謹於其微不可以小疵而自恕也前言無咎者善補過此曰震無咎者存乎悔蓋謂欲動其補過之心者必自悔中來也悔者天理萌動之機不悔則人欲沉痼而不自知也是故卦有小大辭有險易辭也者各指其所之易以䜴反本義小險大易各隨所向朱子曰卦有小大看來只是好底卦便是大不好底卦便是小如復如泰如大有如夬之類盡是好底卦如暌如困如小過之類盡是不好底譬如人光明磊落底便是好人昏昧迷暗底便是不好人所以謂卦有小大辭有險易大卦辭易小卦辭險即此可見問卦有小大辭有險易陽為大陰為小觀其爻之所向而為之辭如休復吉底辭自是平易如困于葛藟底辭自是險曰這般處依約看也是恁地自是不曽見得他底透只是依衆説如所謂吉凶者失得之象一假却是徹底見得聖人當初作易時意似這處更移易一字不得只是其他處不能盡見得如此所以不能盡見得聖人之心張子曰辭各指其所之聖人之情也指之使趨時順利順性命之理臻三極之道也能從則不陷于凶悔矣誠齋楊氏曰讀謙復之辭者如行夷塗如逢春陽如對堯舜周孔何其氣象之和樂也其辭夷易而指人以所之之得且吉也讀遁剝之辭者如涉風濤如履雪霜如對桀紂盜跖何其氣象之凛栗也其辭艱險而指人以所之之失且凶也潘氏曰卦有小有大隨其消長而分辭有險有易因其安危而别辭者各指其所向凶則指其可避之方吉則指其可趨之所以示乎人也雲峯胡氏曰本凶而悔所之則吉本吉而吝所之則凶無咎者本有過而能悔過者也其所之之於善而不之於惡之於吉而不之於凶矣右第三章本義此章釋卦爻辭之通例雙湖胡氏曰第一章夫子論伏羲畫卦而有望於賢人之體易第二章論文王周公繫辭而有望於君子之體易至此三章専論彖爻之辭泛示夫衆人之用易也意若曰彖辭言象使人知卦之統體爻辭言變使人知爻之推遷吉凶之辭以明人事之得失悔吝之辭以明人事之小疵無咎之辭以明人事之補過此自是一節教人知得失小疵補過之道也自是故以下又論夫位者使人知有貴賤也卦者使人知有小大也人知即辭以辨吉凶則失得亦可免矣人知介然之頃憂悔吝則小疵亦可免矣人知萌動悔心自可無咎則亦自無過之可補矣此又自是一莭教人辨吉凶憂悔吝震無咎之道至此則失得小疵補過又不足言矣然後總結之以是故以下之辭謂卦所以有小大辭所以有險易無非各指夫人之所之也三章之意庶在此乎易與天地準故能彌綸天地之道程子曰易與天地準止故君子之道鮮矣聖人作易以準則天地之道易之義天地之道也故能彌綸天地之道彌遍也綸理也在事為倫治絲為綸彌綸遍理也遍理天地之道而復仰觀天文俯察地理驗之著見之迹故能知幽明之故在理為幽成象為明知幽明之故知理與物之所以然也原究其始要考其終則可以見死生之理聚為精氣散為遊魂聚則為物散則為變觀聚散則見鬼神之情狀萬物始終聚散而已鬼神造化之功也以幽明之故死生之理鬼神之情狀觀之則可以見天地之道易之義與天地之道相似故無差違相似謂同也知周乎萬物而道濟天下故不過義之所包知也其義周盡萬物之理其道足以濟天下故無過差旁行而不流旁通逺及而不流失正理順乎理樂天也安其分知命也順理安分故無所憂安土安所止也敦乎仁存乎同也是以能愛範圍俗語謂之模量模量天地之運化而不過差委曲成就萬物之理而無遺失通晝便闔闢屈伸之道而知其所以然如此則得天地之妙用知道德之本源所以見至神之妙無有方所而易之準道無有形體道者一隂一陽也動靜無端陰陽無始非知道者孰能識之動靜相因而成變化順繼此道則為善也成之在人則謂之性也在衆人則不能識隨其所知故仁者謂之仁知者謂之知百姓則由之而不知故君子之道人鮮克知也本義易書卦爻具有天地之道與之齊凖彌如彌縫之彌有終竟聯合之意綸有選擇條理之意朱子曰易道本與天地齊準所以能彌綸之蓋天地有許多道理易上都有故易能彌綸天地之道而聖人用之也彌如封彌之彌糊合使無縫罅綸如絡絲之綸自有條理言雖是彌得外面無縫罅而中則事事物物各有條理彌如大德敦化綸如小德川流彌而非綸則空疏無物綸而非彌則判然不相干此二字見得聖人下字甚密也又曰天地有未至處易却能彌綸得他又曰惟其封彌得無縫罅所以能遍滿也雲峯胡氏曰此易字指易書而言書之中具有天地之道本自與天地相等故於天地之道彌之則是合萬為一渾然無欠綸之則一實萬分粲然有倫此下三莭皆聖人用易之書與此二句相應仰以觀於天文俯以察於地理是故知幽明之故原始反終故知死生之説精氣為物遊魂為變是故知鬼神之情狀程子曰原始反終故知死生之説但窮得則自知死生之説不須將死生便做一個道理求人能原始知得生理便能要終知得死理若不明得便雖千萬般安排著亦不濟事原始則足以知其終反終則足以知其始死生之説如是而已矣故以春為始而原之其必有冬以冬為終而反之其必有春死生者其與是類也魂謂精魂其死也歸乎天消散之意鬼是往而不反之義問易言知鬼神情狀果有情狀否曰有之又問既有情狀必有鬼神矣曰易説鬼神便是造化也問鬼神之事如何可以曉悟其理曰理會得精氣為物遊魂為變與原始反終之説便能知也須是於原字上用工夫或曰遊魂為變是變化之變否曰既是變則存者亡堅者腐更無物也鬼神之道只恁説與賢雖會得亦信不過須是自得也本義此窮理之事以者聖人以易之書也易者陰陽而已幽明死生鬼神皆陰陽之變天地之道也天文則有晝夜上下地理則有南北高深原者推之於前反者要之於後陰精陽氣聚而成物神之伸也魂遊魄降散而為變鬼之歸也朱子曰觀文察變以至知鬼神之情狀皆是言窮理之事直是要知得許多然後謂之窮理仰觀天俯察地只是一個陰陽聖人看許多般物事都不出陰陽兩字便做河圖洛書也只是陰陽問仰以觀於天文俯以察於地理是故知幽明之故本義云天文則有晝夜上下地理則有南北高深如何曰故是幽明之所以然者晝明夜幽上明下幽觀晝夜之運日月星辰之上下日出地上便明日入地下便是幽天文有半邊在上面須有半邊在下面可見天文幽明之所以然也南明北幽髙明深幽觀南北髙深可見地理幽明之所以然也又曰天是陽地是陰然天地又自各有陰陽天之晝是陽夜是隂日是陽月是陰地如髙屬陽下屬陰平坦屬陽險阻屬陰東南屬陽西北屬陰幽明便是陰陽問原始反終曰反只如折轉來謂推原其始摺轉來看其終如回頭之義是反回來觀其終也精魄也耳目之精為魄氣魂也口鼻之噓吸為魂二者合而成物精虛魄降則氣散魂遊而無不之矣魄為鬼魂為神禮記有孔子答宰我問正説此理甚詳禮記宰我曰吾聞鬼神之名不知其所謂子曰氣也者神之盛也魄也者鬼之盛也合鬼與神教之至也注氣謂噓吸出入者也耳目之聰明為魄雜書云魂人陽神也魄人隂神也亦可取問精氣為物遊魂為變曰此是兩個合一個離精氣合則魂魄合而凝結為物離則陽已散而陰無所歸故為變又曰變是魂魄相離雖獨説遊魂而不言魄而離魄之意自可見矣又曰此只是聚散聚而為物神也散而為變鬼也神屬陽鬼屬陰又錯綜而橫看之則精為陰氣為陽就人身而言雖是屬陽然體魄已屬陰蓋生之中已帶了個死底道理變雖屬陽然魂氣上遊體魄下降亦自具陰陽如言殂落升也便是魂之遊落即魄之降古之祭祀求諸陽所以求其魂求諸陰所以求其魄橫渠説精氣自無而有遊魂自有而無其説亦分曉又曰精氣為物遊魂為變此却知鬼神之情狀魂氣升於天體魄歸於土神氣上升鬼魄下降不特人也凡物之枯敗其香氣騰上物則腐於下推此可見死則謂之魂魄生則謂之精氣天地公共底謂之鬼神始終死生是以循環言精氣鬼神是以聚散言其實不過陰陽兩端而已問天地之化雖生生不窮然而有聚必有散有生必有死能原始而知其聚而生則必知其後必散而死能知其生也得於氣化之日初無精神寄寓於太虛之中則知其死也與氣而俱散無復更有肜象尚留於冥漠之內曰死便是都散無了問遊魂為變間有為妖孽者是如何得未散曰遊字是漸漸散若是為妖孽者多是不得其死其氣未散故鬱結而成妖孽若尫羸病死底人這氣消耗盡了方死豈得更鬱結成妖孽然不得其死者久之亦散又如其取精多其用物𢎞如伯有者亦是卒未散也問精氣為物陰精陽氣聚而成物此總言神遊魂為變魂遊魄降散而成變此總言鬼疑錯綜而言曰然此所謂人者鬼神之會也張子曰精氣者自無而有遊魂者自有而無自無而有神之情也自有而無鬼之情也自無而有故顯而為物神之狀也自有而無故隱而為變鬼之狀也漢上朱氏曰陰陽之精五行之氣氣聚為精精聚為物及其散也五行陰陽各還其本故魂陽反於天魄陰歸於地誠齋楊氏曰鬼神無聲無臭何為而有狀狀且無也何為而有情曰物者具是形者也魂者使是形者也魂止則物存魂遊則物亡遊者止之變也亡者存之變也觀其聚散則鬼神之情狀可知矣記曰鬼神之德其盛矣乎視之不見聽之不聞體物而不可遺洋洋乎如在其上如在其左右此其狀也易曰與鬼神合其吉凶又曰鬼神害盈而福謙此其情也建安丘氏曰天文謂氣之所成日月星辰之類以其在上仰觀則見地理謂形之所成高下流峙之類以其在下俯察則知察者觀之詳此曰觀而彼曰察者天文屬陽陽明也明者易見故可觀地理屬陰陰幽也幽者難知故當察故所以然也人於仰觀俯察之中而求天地所以然之故則幽明之理可識矣夫有死必有生有生必有死晝夜之常耳人能推原其始於未生之前而反觀其終於已死之後則始何為而生終何為而死而死生之理可得而見矣説謂原其理也雲峯胡氏曰上文言易具陰陽之理此言聖人用易以窮陰陽之理易不曰陽隂而曰陰陽此所謂幽明死生鬼神即陰陽之謂也即天地而知幽明之故即始終而知死生之説即散聚而知鬼神之情狀皆聖人窮理之事與天地相似故不違知周乎萬物而道濟天下故不過旁行而不流樂天知命故不憂安土敦乎仁故能愛知音智知命之知如字樂音洛程子曰樂天知命通上下之言也聖人樂天則不須言知命知命者知有命而信之者爾不知命無以為君子是已命者所以輔義一循於義則何庸斷之以命哉若夫聖人之知天命則異如此仁者不憂樂天者也仁者在己何憂之有凡不在已逐物在外皆憂也樂天知命故不憂此之謂也若顔子簞瓢在他人則憂而顔子獨樂者仁而已本義此聖人盡性之事也天地之道知仁而已知周萬物者天也道濟天下者地也知且仁則知而不過矣旁行者行權之知也不流者守正之仁也既樂天理而又知天命故能無憂而其知益深隨處皆安而無一息之不仁故能不忘其濟物之心而仁益篤蓋仁者愛之理愛者仁之用故其相為表裏如此朱子曰上文言易之道與天地準此言聖人之道與天地相似也與天地相似故不違下數句是説與天地相似之事上文易與天地準下數句是説易與天地凖之事與天地相似是説聖人第一句泛説知周乎萬物至道濟天下是細密底工夫知便直要周乎萬物無一物之遺道直要盡濟天下知周乎萬物便只是知幽明死生鬼神之理問程子知周乎萬物而道濟天下故不過釋之曰義之所包知也文意如何曰程子説易字皆謂易之書而言故其説如此似覺未安蓋易與天地準故能彌綸天地之道此固指書而言自仰觀俯察以下須是有人始得蓋聖人因易之書而窮理盡性之事也問本義云知周萬物者天也道濟天下者地也是如何曰此與後假仁者見謂之仁知者見謂之知又自不同此以清濁言彼以動靜言知是先知得較虗故屬之天道濟天下則普濟萬物實惠及民故屬之地又言旁行而不流樂天知命故不憂此兩句本皆是知之事蓋不流便是貞也不流是本旁行是應變處無本則不能應變能應變而無其本則流而入變詐矣細分之則旁行是知不流屬仁其實皆是知之事對下文安土敦乎仁故能愛一句專説仁也知周萬物是體旁行是可與權乃推行處樂天知命是自處三莭各説一理旁行而不流此小變而不失其大常然前後却有故字又相對此一句突然易中自時有恁地處煩難曉問安土敦乎仁故能愛曰此是與上文樂天知命對説樂天知命是知崇安土敦仁是禮卑安是隨所居而安在在處處皆安若自家不安何以能愛敦只是篤厚去盡已私純是天理更無夾雜充足盈滿方有個敦厚之意只是仁而又仁敦厚於仁故能愛惟安土敦仁則其要自廣又曰樂天知命主知言是崇德事安土敦仁主禮言是廣業事又曰敦是仁體能愛是及物處安土者隨寓而安也敦乎仁者不失其天地生物之心也安土而敦乎仁則無適而非仁矣所以能愛也仁者樂山之意於此可見又曰安土者隨所寓而安若自擇安處便只知有已不知有物也此厚於仁者之事故能愛也又曰安土敦乎仁故能愛聖人説仁是恁地説此語説仁最密龜山楊氏曰天地之功大矣凖之者易也似之者聖人也易本無體其準恁天地則如平準之準均一而無間聖涉有為其似於天地則如形似之似惟順適乎自然天地與聖人無二道也列而為三則相似而已惟相似故先後天而不違也雙湖胡氏曰與天地相似故不違此統論聖人之體假知周萬物道濟天下故不過此指知仁與天地相似之實處不過對不違而言惟其相似則配合無間所以不違惟其周萬物濟天下則廣大無外所以不過旁行而不流樂天知命故不憂即周萬物之知而似乎天也安土敦乎仁故能愛即道濟天下之仁而似乎地也不憂對能愛而言惟知與天相似則極其高明矣隨其所行泛應曲當此動而樂天之事也何憂之有惟仁與地相似則極其博厚矣隨其所處厚重不遷此靜而安土之事也何所不愛之有此聖人仁知盡性之學而上下與天地同流者蓋如此雲峯胡氏曰上文言易與天地準此言聖人與天地相似似即準也聖人知似天仁似地有周物之知而實諸濟物之仁則其知不過有行權之知而本諸守正之仁則其知不流至於樂天知命而知之迹已泯安土敦仁而仁之心益著此其知仁所以與天地相似而不違盡性之事也範圍天地之化而不過曲成萬物而不遺通乎晝夜之道而知故神無方而易無體程子曰範圍天地之化而不過者模範出一天地爾非在外也如此曲成萬物豈有遺哉範圍天地之化天本廓然無窮但人以目力所及見其寒暑之序日月之行立此規模以窺測他天地之化不是天地之化其體有如城郭之類都盛其氣假使言日升降於三萬里不可道三萬里外更無物又如言天地升降於八萬里中不可道八萬里外天地盡學者要體天地之化如此言之甚與天地不相似其卒必有窒礙通乎晝夜之道而知晝夜死生之道也晝夜死生之道知生之道則知死之道盡事人之道則盡事鬼之道死生人鬼一而二二而一者也冬寒夏暑陰陽也所以運動變化者神也神無方故易無體本義此聖人至命之事也範如鑄金之有模範圍匡郭也天地之化無窮而聖人為之範圍不使過於中道所謂裁成者也通猶兼也晝夜即幽明生死鬼神之謂如此然後可見至神之妙無有方所易之變化無有形體也朱子曰天地之化滔滔無窮如一爐金汁鎔化不息聖人則為之鑄㵼成器使入模範匡郭不使過於中道也曲成萬物而不遺此又就事物之分量形質隨其大小闊狹長短方圓無不各成就此物之理無有遺闕範圍天地是極其大而言曲成萬物是極其小而言範圍如大德敦化曲成如小德川流又曰範圍天地之化範是鑄金作範圍是圍裹如天地之化都沒個遮欄聖人便將天地之道一如用範來範成個物包裹了試舉一端如一嵗分四時莭候之類以此做個塗轍更無過差此特其一耳問範圍天地之化而不過如天之生物至秋而成聖人則為之斂藏人之生也欲動情勝聖人則為之教化防範此皆是範圍而使之不過之事否曰範圍之事闊大此亦其一事也今且就身上看如何或曰如視聽言動皆當存養使不過差此便是否曰事事物物無非天地之化皆當有以範圍之就喜怒哀樂而言喜其所當喜怒其所當怒哀其所當哀樂其所當樂皆範圍也又曰能範圍之而不過曲成之而不遺方始見得這神無方易無體若範圍有不盡曲成有所遺神便有方易便有體矣通乎晝夜之道而知既曰通又曰知似不可曉通是兼通乎晝夜之道若通晝不通夜通生不通死便是不知便是神有方易有體了又曰兼通乎晝夜之道是知其所以然神無方而易無體神便是在陰底又忽然在陽在陽底又匆然在陰易便是或為陽或為陰如為春又為夏為秋又為冬交錯代換而不可以形體拘也又曰無體與那其體則謂之易不同各自是一個道理其體則謂之易這只説個隂陽動靜闔闢剛柔消長不著這七八個字説不了若喚做易只是一字便了又曰此體是個骨子窮理是知字上説盡性是仁字上説言能造其極也至於範圍天地是至命言與造化一般南軒張氏曰天地之化陰陽之氣也萬物陰陽之形也晝夜陰陽之理也此三者不外乎陰陽唯易則能陰能陽故無體神則陰陽不測故無方聖人盡神易之道故於天地之化能範圍之萬物能曲成之晝夜之道能通之莭齋蔡氏曰天地之化雨暘寒燠之類常雨常暘化之過也聖人則能範圍之而使之不過一動一植不得其遂則為有遺矣聖人則能委曲成就而使之不遺誠齋楊氏曰大哉天地之運日往月來而為夜月往日來而為晝孰測其所以然哉聖人乃能通而知之者蓋往者屈也來者信也晝夜者一日之屈信也寒暑者一嵗之屈信也死生者一世之屈信也古今者萬世之屈信也聖人何以通而知之用易而已龜山楊氏曰神者妙萬物而為言易者生生之謂天高地下必有方矣神則無方天圎地方必有體矣易則無體無在而無乎不在無為而無所不為也雲峯胡氏曰上文言彌綸天地之道此曰範圍曲成範圍如大德敦化即所謂彌也曲成如小德川流即所謂綸也上文言聖人之知不過此則聖人能使天地之化皆不過上文知幽明知死生知鬼神知命此則通晝夜之道而知是豈聞見之知云乎哉前所謂知者知有其故知有其説知有其情狀也此所知者則神無方所易無形體矣嗚呼深哉右第四章本義此章言易道之大聖人用之如此一陰一陽之謂道程子曰一陰一陽之謂道此理固深説則無可説所以陰陽者道既曰氣則便有二言開闔便是感既二則便有感所以開闔者道開闔便是陰陽老氏言虛而生氣非也陰陽開闔本無先後不可道今日有陰明日有陽如人言形影蓋形影一時不可言今日有形明日有影有便齊有離了陰陽便無道所以陰陽者是道也陰陽氣也氣是形而下者道是形而上者形而上者則是密也一陰一陽之謂道道非陰陽也所以一陰一陽者道也如一闔一闢謂之變本義陰陽迭運者氣也其理則所謂道朱子曰一陰一陽之謂道陰陽何以謂之道當離合看一陰一陽之謂道則陰陽是氣不是道所以為陰陽者乃道也若只言陰陽之謂道則陰陽是道今曰一陰一陽則是所以循環者乃道也一闔一闢謂之變亦然又曰理則一而其形者則謂之器其不形者則謂之道然而道非器不形器非道不立蓋隂陽亦器也而所以陰陽者道也是以一陰一陽往來不息而聖人指是以明道之全體也此一隂一陽之謂道之説也問一陰一陽之謂道便是太極否曰陰陽只是陰陽道便是太極程子説所以一陰一陽者道也問一陰一陽之謂道曰以一日言之則畫陽而夜陰以一月言之則望前為陽望後為陰以一嵗言之則春夏為陽秋冬為陰從古至今恁地袞將去只是這個陰陽是孰使之然哉乃道也從此句下文分兩腳此氣之動為人為物渾是一個道理故人未生以前此理本善所以謂繼之者善此則屬陽氣質既定為人為物所以謂成之者性此則屬陰又曰一陰一陽此是天地之理如大哉乾元萬物資始乃繼之者善也乾道變化各正性命此成之者性也這一假是説天地生成萬物之意不是説人性上事繼之者善也成之者性也程子曰止於至善不明乎善此言善者義理之精微無可得名且以至善目之繼之者善此言善却言得輕但謂繼斯道者莫非善也不可謂之惡生生之謂易是天之所以為道也天只是以生為道繼此生理者即是善也善便有一個元底意思元者善之長萬物皆有春意便是繼之者善也成之者性也成却待萬物自成其性須得本義道具於陰而行乎陽繼言其發也善謂化育之功陽之事也成言其具也性謂物之所受言物生則有性而各具是道也陰之事也周子程子之書言之備矣或問繼之者善繼則是此理之流行未賦與在萬物朱子曰如兩個輪只管轉流動不已萬化皆從此出來某嘗喻之如兩片磨中間一個磨心只管推轉不已榖米四散撒出來所以為繼之者善程子言動靜無端陰陽無始蓋此亦且從那動處説起若論那動以前又有靜靜以前又有動如云一陰一陽之謂道繼之者善也這繼字便是動之頭若只一闔一闢而無繼便是合殺了問繼是動靜之間否曰是靜之終動之始也化有流行未有定質者為陽此繼之者善附著成形不可變易者為陰此成之者性大凡已成形後即漸衰息以至於盡所以屬陰又曰繼是椄續不息之意成是凝成有主之意繼之者善也元亨是氣之方行而未著於物也是上一截事成之者性也利貞是氣之結成一物也是下一截事又曰繼之者氣之方出而未有所成之謂也善則理之方行而未有所立之名也陽之屬也成則物之已成性則理之已立者也陰之屬也問妙合之始便是繼乾道成男坤道成女便是成曰動而生陽之時便有繼底意至靜而成陰方是成又曰繼之者善便是公共底成之者性便是自家得底又曰繼之者善如水之流行成之者性如水之止而成潭問繼之成之是道是器曰繼之成之是器善與性是道又問孟子只言性善易却云一陰一陽之謂道繼之者善也成之者性也如此則性與善却是二事曰一陰一陽是總名道繼之者善是二氣五行之事成之者性是氣化以後事問性固是理然性之得名是就人生稟得言之否曰繼之者善也成之者性也這個理在天地間時只是善無有不善者生物得來方始名曰性只是這個理在天則曰命在人則曰性問孔子已説繼善成性如何人尚未知性到得孟子方説出曰孔子説得細膩孟子説得疏略蓋不曽推原源頭不曽説上靣一截只是説成之者性也節初齊氏曰道太極也隂陽所乘之機也動而生陽靜而生陰今不先言陽而先言陰將就所繼而言也朱子曰繼者靜之後而動之端也若靜極之後不繼之以動造化便從此合殺了豈道也哉一陰一陽此生生之機所謂道也龜山楊氏曰繼之者善無間也成之者性無虧也節齋蔡氏曰繼善陽也成性陰也此以天命之序而言陰陽也仁者陰也知者陽也此以物受之性而言陰陽也然陽之所以為陽者皆動而無體也陰之所以為陰者皆靜而有體也建安丘氏曰一陰一陽之謂道是就造化流行上説成之者性是就人心稟受上説繼之者善是就天所賦人所受中間過接上説如書帝降之衷中庸天命之性所謂降所謂命即繼之之義也仁者見之謂之仁知者見之謂之知百姓日用而不知故君子之道鮮矣知音智不知之知如字鮮息淺反程子曰一陰一陽之謂道自然之道也繼之者善也出道則有用元者善之長也成之者却只是性各正性命者也故曰仁者見之謂之仁知者見之謂之知百姓日用而不知故君子之道鮮矣如此則亦無始亦無終亦無因甚有亦無因甚無亦無有處有亦無無處無這個義理仁者又看做仁了也知者又看做知了也百姓日用而不知此所以君子之道鮮矣此個義理亦不少亦不剩只是人看他不見也本義仁陽知陰各得是道之一隅故隨其所見而目為全體也日用不知則莫不飲食鮮能知味者又其每下者也然亦莫不有是道焉或曰上章以知屬乎天仁屬乎地與此不同何也曰彼以清濁言此以動靜言朱子曰此章自易與天地凖以下只是言個陰陽至仁者見之謂之仁知者見之謂之知謂各隨人氣稟偏處見仁亦屬陽知亦屬陰此又分著陰陽如繼之者善成之者性便是於造化流行處分陰陽此是指人氣稟有偏處分屬隂陽耳萬物各具是性但氣稟不同各以其性之所近者窺之故仁者只見得他發生流動處便以為仁知者只見得他貞靜處便以為知下此一等百姓日用之間習矣而不察所以君子之道鮮矣節初齊氏曰仁者見之於已動之後而識其動而及物之機故曰仁知者見之於未動之先而識其復而幹事之體故曰知百姓則又行不著習不察而全未有見者也百姓固未見道仁者知者亦未見道之全故曰君子之道鮮矣君子何道也一陰一陽之道也上文所謂天地之道也故必有知幽明之故知死生之説知鬼神之情狀與天地相似之聖人而後可以成位乎其中矣不然仁者知者之知其視百姓之日用而不知亦何以大相遠哉建安丘氏曰此言性成之後人稟陽之動者為仁稟陰之靜者為知唯其所稟之各異是以所見之各偏仁者見仁而不見知故謂其道止於仁知者見知而不見仁故謂其道止於知至於百姓日用飲食囿於斯道之中而不知有斯道焉此君子之道所以鮮也雲峯胡氏曰首三句正是夫子言性與天道處陰陽非道也一陰又一陽所以循環而不已者道也繼者靜之終動之始最可見一陰又一陽之妙本義曰繼言其發成言其具蓋在造化者方發而賦於物其理無有不善在人物者各具是理以有生則謂之性其發者是天命之性其具者天命已不能不麗於氣質矣仁者知者百姓指氣質而言也上章説聖人之知仁知與仁合而為一此説仁者知者仁與知者分而為二道無陰陽本自無滯仁者之見滯於陽知者之見滯於陰百姓則又日由乎陰陽之道而不知故君子之道鮮道無二道君子之道即能深會乎陰陽之道者也顯諸仁藏諸用鼓萬物而不與聖人同憂盛德大業至矣哉程子曰顯諸仁止陰陽不測之謂神運行之迹生育之功顯諸仁也神妙無方變化無迹藏諸用也天地不與聖人同憂天地不宰聖人有心也天地無心而成化聖人有心而無為天地聖人之盛德大業可謂至矣富有溥博也日新無窮也生生相續變易而不窮也乾始物而有象坤成物而體備法象著矣推數可以知來物通變不窮事之理也天下之有不離乎陰陽唯神也莫知其鄉不測其為剛柔動靜也天地之大德曰生其生可見也所以生之者用也故曰顯諸仁藏諸用鼓萬物而不與聖人同憂聖人人也故不得無憂天則不為堯存不為桀亡者也天地鼓萬物如此聖人循天理而欲萬物同之所以有憂患天地以無心故不憂聖人致有為之事故憂聖人有為之功天地不宰之功此天地與人異處聖人有不能為天之所為處鼓動萬物聖人之神知則不可名本義顯自內而外也仁謂造化之功德之發也藏自外而內也用謂機緘之妙業之本也程子曰天地無心而成化聖人有心而無為朱子曰顯諸仁是元亨誠之通藏諸用是利貞誠之復又曰顯諸仁是用底迹藏諸用是仁底心顯諸仁是流行發見處藏諸用是流行發見底物顯諸仁千頭萬緒藏諸用只是一個物事作顯諸仁底骨子顯諸仁是繼之者善也藏諸用是成之者性也天下萬物萬事其粲然發見處皆是顯然者然一事自是一事一物自成一物便是用藏在這裏如元亨利貞元亨是流行處利貞是流行底骨子流行個甚麼只是流行這貞而已此顯諸仁藏諸用之謂也又曰顯諸仁似恕藏諸用似忠顯諸仁似貫藏諸用似一顯諸仁如惻隱藏諸用似仁也惻隱羞惡辭遜是非顯諸仁也仁義禮智藏諸用也只是這一個惻隱隨事發見及至成那事時一事各成一仁此便是藏諸用其發用時在這道理中發去及至成這事時又只是這個道理此便是業業是事之已成處鼓萬物而不與聖人同憂此正是顯諸仁藏諸用底時節盛德大業便是顯諸仁藏諸用成就處又曰顯諸仁似隱而費藏諸用似費而隱又曰顯諸仁易説藏諸用極微難説這用字如橫渠説一故神神字用字一樣顯諸仁如春生夏長發生彰露可見者藏諸用是所以生長者藏在裏靣而不可見又這個有作先後説處如元亨利貞之類有作表裏説處便是這裏顯諸仁德之所以盛藏諸用業之所以成譬如一樹一根生許多枝葉花實此是顯諸仁處及至結實一枝成一個種子此是藏諸用處生生不已所謂日新也萬物無不具此理所謂冨有也又曰如此一穗禾其始只用一個母子少間成榖一個各自成得一個將去種植一個又自成一穗又開枝開葉去所以下文謂冨有之謂大業天地造化是自然聖人雖生知安行然畢竟是有心去做所以説不與聖人同憂明道二語最好天地無心而成化聖人有心而無為無心便是不憂成化便是鼓萬物天地鼓萬物亦何嘗有心來盛德大業至矣哉是贊歎上靣顯諸仁藏諸用又曰盛德大業至矣哉只是説易之理非指聖人而言誠齋楊氏曰聖人之與天地可同者顯仁藏用之德業也不可同者天地無心聖人有心也聖人仁萬物而獨任其憂天地鼓萬物而不與聖人同其憂蓋聖人有心則有憂天地無心則無憂也或問勉齋黃氏曰本義云顯自內而外藏自外而內竊疑造化之功固有自內而外機緘之妙何以見其自外而內曰仁本是在內以其發出在外故謂之自內而外用本是在外以其收藏歸內故謂之自外而內如春夏之生長萬物便是顯諸仁至秋冬則收斂成實便是藏諸用春夏是顯秋冬所藏之仁秋冬是藏春夏所顯之用也雲峯胡氏曰顯藏二字與中庸費隱相似隱在費中費之外他無所謂隱藏在顯中顯之外他無所謂藏蓋顯諸仁是用之迹而盛德之所以行藏諸用即仁之心而大業之所以立顯諸仁是發生可見者藏諸用是所以發生者即藏於中而不可見本義上文曰善謂化育之功此則曰仁謂造化之功見得繼之者善即是造化顯諸仁處善者天地賦豫萬物之理仁者天地生生萬物之心人得天地之心以為心即謂之仁而善之本也上章言在聖人者則曰仁與智此言在造化者則曰仁與用發於造化者為仁而所以發者為用發於聖人者為仁而所以發者為智用者造化機緘之妙鼓萬物而無心知者聖人密用之妙不能不運天下以心此造化之所以不與聖人同憂而為盛德大業之至也富有之謂大業日新之謂盛德本義張子曰富有者大而無外日新者久而無窮朱子曰先説個富有方始説日新此與説宇宙相似先是有這物事了方始相連相續去富有之謂大業言萬物萬事無非得此理所謂富有也日新是只管運用流行生生不已富有之謂大業以人言之須是天下事無不理會方得若才工夫不到業無由大少間措置事業便有欠闕此便有病節齋蔡氏曰富有廣大不禦日新悠久無疆天高地下萬物散殊其富有之謂歟隂陽升降變化無窮其日新之謂歟西山真氏曰此雖言易之理然易也天地也聖人也一而已矣生物無窮天地之大業也運行不息天地之盛德也功及萬世聖人之大業也終始日新聖人之盛德也學者有志於進德修業者亦必以天地聖人為法蓋非富有不可以言大業非日新不可以言盛德也生生之謂易程子曰所以謂萬物一體者皆有此理只為從那裏來生生之謂易生則一時生皆完此理人則能推物則氣昏推不得不可謂他物不與有也生生之謂易生生之用則神也天地陰陽其勢高下甚相背然必相須而為用也有陰便有陽有一便有二才有一二便有三一二之間便是三已往便無窮老子亦言三生萬物此是生生之謂易理自然如此維天之命於穆不已自是理自相續不已非是人為之如便可為雖使百萬般安排也須是有息時只為無為故不息中庸言不見而章不動而變無為而成天地之道可一言而盡也本義陰生陽陽生陰其變無窮理與書皆然也程氏巨夫曰生生之謂易剝初盡而復已生生生不息靡有間絶象辭變占雖其别有四生生之理則一而已外此二字不足以知易雲峯胡氏曰富有者無物不有而無一毫之虧欠日新者無時不然而無一息之間斷藏而愈有則顯而愈新此即所以為生生之易成象之謂乾效法之謂坤本義效呈也法謂造化之詳密而可見者朱子曰既説盛德大業又説他只管恁地生去所以接之以生生之謂易是漸説入易上去乾只略成一個形象坤便都呈見出許多法來到坤處都細了萬法一齊出見成象之謂乾此造化方有些顯露處效法之謂坤以法言之則大假詳密矣效字難看如效順效忠效力之效有陳獻底意思乾坤只是理理本無心自人而觀猶必待乾之成象而後坤能效法然理自如此本無相待且如四時亦只是自然迭運春夏生物初不道要秋冬成之秋冬成物又不道成就春夏之所生皆是理之所必然者爾又曰凡屬陽底便是只有個象而已象是方做未成形之意已成形便屬陰成象謂如日月星辰在天亦無個實形只是個懸象如此乾便略坤便詳法是有一成已定之物可以形狀見者如條法亦是實有已成之法節齋蔡氏曰易者變易而不窮故曰生生象者法之未定法者象之已形乾主氣故曰成象坤主形故曰效法乾坤成而易則肇乎先者也極數知來之謂占通變之謂事本義占筮也事之未定者屬乎陽也事行事也占之已決者屬乎陰也極數知來所以通事之變張忠定公言公事有陰陽意蓋如此朱子曰占出這事人便依他這侗做便是通變之謂事看來聖人説到至處便説在占上去則此書分明是要做占用矣張乖崖説公事未判時屬陽已判後屬陰便是此意公事未判生殺輕重都未定今已判了更不可易自富有至效法是説其理如此用處却在那極數知來與通變謂事上靣蓋説上面許多道理要做這般用漢上朱氏曰天數二十有五地數三十極天地之數而吉凶可以前知此之謂占建安丘氏曰數蓍數也變卦變也物莫選乎數故極占數可以知來物事行事也即所占卦變而通之也陰陽不測之謂神程子曰日新之謂盛德生生之謂易陰陽不測之謂神要思而得之問明道提此三句是如何朱子曰此三句也是緊要須是看本文方得本義張子曰兩在故不測朱子曰陰陽不測之謂神是總結這一段不測者是在這裏又在那裏便是這一個物事走來走去無處不在六十四卦都説了這又説三百八十四爻許多變化都只是這一個物事周流其間問德是得於已底業是發出來底德便是木生生之謂易便是體成象謂乾效法謂坤便只是裏面交錯底曰乾坤其易之緼易是一塊乾坤是裏面往來底聖人作易便是如此又問隂陽不測之謂神便是妙用處曰便是包括許多道理橫渠説得極好一故神橫渠親注云兩在故不測只是這一物却周行事物之間如所謂隂陽屈信往來上下以至行乎什百千萬之中無非這一個物事所謂兩在故不測建安丘氏曰上章言易無體此言生生之謂易唯其生生所以無體上章言神無方此言隂陽不測之謂神唯其不測所以無方言易而以乾坤繼之乾坤毁則無以見易也言神而以占事先之占事則神所託而顯者也神易用而變化無窮其實則不越乎隂陽兩端而已右第五章本義此章言道之體用不外乎陰陽而其所以然者則未嘗倚於陰陽也雙湖胡氏曰此章専論陰陽之道在造化與易書其在造化者生而為人則自繼善成性之後而有仁知百姓之分生而為物則自顯仁藏用之後而有鼓萬物之妙君子之道鮮聖人所憂也造化不預焉而自極其德業富有日新之至其在易書者自生儀象以至生卦成象而為乾陽之為也效法而為坤隂之為也此隂陽之在卦者極七八九六之數而占以知來通隂陽老少之變而因以作事此隂陽之在蓍者故首之以一隂一陽之謂道終之以隂陽不測之謂神其體則謂之道其用則謂之神在造化以體言也在易書以用言也聖人其殆假易書陰陽以洗其憂世之心望天下為君子之歸而成造化所不及之能者歟雲峯胡氏曰此章當分作三截看第一莭繼善屬陽成性屬隂仁屬陽知屬隂第三莭成象微而略可見屬陽效法詳密而皆可見屬隂占者事之未定屬陽事者占之已決屬陰皆分説陰陽故始之以一隂一陽之謂道結之以隂陽不測之謂神本義引張子之言曰兩在故不測一陰而又一陽即所謂兩在也第二節顯諸仁藏諸用總説一陰一陽不測之妙蓋天以一陰一陽化生萬物故謂之顯諸仁所以一陰一陽化生萬物者即藏於其中故謂之藏諸用道之用不可窮用之神不可測聖人拈出一用字見得造化有造化之用人事有人事之用百姓用而不知學易者當知之以有用也夫易廣矣大矣以言乎逺則不禦以言乎邇則靜而正以言乎天地之間則備矣夫音扶下同程子曰夫易廣矣大矣止易簡之善配至德易道廣大推逺則無窮近言則安靜而正天地之間萬物之理無有不同乾靜也専動也直専專一也直直易也唯其専直故其生物之功大坤靜翕動闢坤體動則開應乾開闔而廣生萬物廣大天地之功也變通四時之運也一隂一陽日月之行也乾坤易簡之功乃至善之德也本義不禦言無盡靜而正言即物而理存備言無所不有朱子曰以言乎逺則不禦以言乎邇則靜而正是無大無小無物不包然當體便各具此道理所謂靜而正者須著工夫看未動時便都有此道理都是真實所以下個正字靜而正謂觸處皆見有此道不待安排措置雖至小至近至鄙至陋之事無不見有隨處皆見足無所欠闕只觀之人身便見節齋蔡氏曰正不偏備遍也言乎逺其理不以逺而窮言乎邇其理不以邇而偏言乎天地之間不以事物之多而不備雲峯胡氏曰前章易與天地凖讚易之書也此章廣矣大矣讚易之理也以言乎逺則不禦語大天下莫能載也以言乎邇則靜而正語小天下莫能破也本義以為即物而理存者蓋言此理非特動時可見即眼前事物觀之未動時亦無非此真實之理也以言乎天地之間備矣盈天地之間唯萬物此理無物不有也夫乾其靜也專其動也直是以大生焉夫坤其靜也翕其動也闢是以廣生焉翕虗級反闢婢亦反程子曰乾陽也不動則不剛其靜也專其動也直不專一則不能直遂坤隂也不靜則不柔其靜也翕其動也闢不翕聚則不能發散本義乾坤各有動靜於其四德見之靜體而動用靜别而動交也乾一而實故以質言而曰大坤二而虗故以量言而曰廣蓋天之形雖包於地之外而其氣常行乎地之中也易之所以廣大者以此朱子曰乾靜專動直而大生坤靜翕動闢而廣生這説隂陽體性如此卦畫也髣佛似恁地又曰以乾坤二卦觀之亦可見乾畫竒便見得其靜也専其動也直坤畫耦便見得其靜也翕其動也闢健者乾之性情如剛強底人便靜時亦有個立作做事底意思故曰其靜也專順者坤之性情如柔順底人靜時只有個收斂而已故曰其靜也翕問本義云乾一而實故以質言而曰大坤二而虗故以量言而曰廣曰此兩句解得極分曉蓋曰以形言之則天包地外地在天之中所以説天之質大以理與氣言之則天之氣却盡在地之中地盡承受得那天之氣所以説其量廣天只是一個物事一故實從裏面便實出來流行發生只是一個物事所以説乾一而實地形雖是堅實然却虗天之氣流行乎地之中皆從地裏面發出來所以説坤二而虗天以其包得地所以説其質之大地以其容得天之氣所以説其量之廣非是説地之形有盡故以量言也只是説地盡容得天之氣所以就其量之廣耳問乾一畫坤兩畫如何曰觀乾一而實坤二而虗之説可見乾只是一個物事充實遍滿坤便有開闔乾氣上來時坤便開從兩邊去如兩扇門相似正如扇之運風甑之蒸飯扇甑是坤風與蒸乾之氣也問陽竒隂偶就天地之實形上看如何見得曰大生是渾淪無所不包廣生是廣闊能容受得那天之氣專直則只是一物直去翕闢則是兩個翕則合闢則開此竒偶之形也又曰地到冬間都翕聚不開至春則天氣入地地氣開以迎之又曰大抵陰是兩件如陰爻兩畫闢是兩開去翕是兩合如地皮上生出物來地皮須開今天固包著地然天之氣却貫在地中地却虗有以受天之氣下文大生廣生云者大是一個大底物事廣便容受得許多物事大字實廣字虗又曰地却是有空闕處天却四方上下都周匝無空闕逼塞滿皆是天地之四向底下却靠著那天天包地其氣無不通恁地看來渾只是天了氣却從地中迸出又見地廣處橫渠云地對天不過潛室陳氏曰專直翕闢此當以卦畫論卦畫始生唯乾之一竒未有他物此其體也其專也已而才動則直遂而生生不已卦畫既生乾之諸卦以次呈露獨坤居後包在乾諸卦之裏而猶未露此其體也其翕也至其動也則坤之諸卦始從乾諸卦裏開闢出來遂分了乾之一半雲峯胡氏曰本義云乾坤各有動靜於其四德見之蓋元亨者動而乾坤之用以行利貞者靜而乾坤之體以立靜而别乾以剛健為貞坤以柔順為貞也動而交乾元為氣之始而坤元則承之以為形之始也乾唯健故一以施坤唯順故兩而承靜專一者之存動直一者之達靜翕兩者之合動闢兩者之分一之逹所以行乎坤之兩故以質言而曰大兩之分所以承乎乾之一故以量言而曰廣廣大配天地變通配四時陰陽之義配日月易簡之善配至德本義易之廣大變通與其所言陰陽之説易簡之德配之天道人事則如此朱子曰大槩上靣幾句是虗説底這個配天地四時日月至德是説他實處廣大配天地變通配四時陰陽之義配日月以易配天易簡之善配至德以易配人之至德此是以易中之理取外靣一事來對謂易之廣大故可配天地易之變通如老陽變陰老陰變陽往來變化故可配四時陰陽之義便是日月相似易簡之善便如在人之至德問這配字莫是配合否曰配只是相似之意且如變通配四時四時如何配合四時自是流行不息所謂變通者如此易簡之善配至德至德亦如何配合易簡易當行之理至德是自家所得者又曰也是易上有這道理如人心之至德也又曰欲見其廣大則於天地乎觀之欲見其變通則於四時乎觀之欲知其陰陽之義則觀於日月可見欲知簡易則觀於聖人之至德可見南軒張氏曰乾之大生以資其始坤之廣生以流其形此廣大配天地也闔闢往來終則有始此變通配四時也復言七日以陽生為義臨言八月以陰長為戒此陰陽之義配日月也中庸之德中人以上可俯而就此易知也中人以下可跂而及此易從也故曰易簡之善配至德右第六章誠齋楊氏曰此章聖人所以贊易之道其極至於廣大之二言其原生於乾坤之二卦也平菴項氏曰夫易廣矣大矣此章之總目也逺而不禦即直與闢也邇而靜正即專與翕也天地之間備矣即大生廣生也易之為道一與兩而已乾即一也靜而守一則其事專而無不閉動而用一則其行直而無不開此乾所以為萬物之父坤即兩也兩閉者為翕言與乾俱閉也兩開者為闢言與乾俱開也此坤所以為萬物之母大者無不統也廣者無不承也自廣大而至易簡其言之序自博而趨約也天地之間至大者天地至變者四時至精者日月至善者至德易之書具此四者豈不謂之備乎雲峯胡氏曰首章論乾坤之尊卑結之以易簡而理得此章論乾坤之廣大結之以易簡配至德然則易固不徒在乾坤而自在於吾之心中矣子曰易其至矣乎夫易聖人所以崇德而廣業也知崇禮卑崇效天卑法地知音智程子曰子曰易其至矣乎止道義之門易之道其至矣乎聖人以易之道崇大其德業也知則崇髙禮則卑下高卑順理合天地之道也高卑之位設則易在其中矣斯理也成之在人則為性成之者性也人心存乎此理之所存乃道義之門也本義十翼皆夫子所作不應自著子曰字疑皆後人所加也窮理則知崇如天而德崇循理則禮卑如地而業廣此其取類又以清濁言也朱子曰知崇禮卑這是兩截知崇是知識要超邁禮卑是須就切實處行若知不高則識見淺陋若履不切則所行不實知識高便是象天所行實便是法地識見高於上所行實於下中間便生生而不窮故説易行乎其中成性存存道義之門大學所説格物致知是知崇之事所説誠意正心修身是禮卑之事又曰知識貴乎高明踐履貴乎著實知既高明須是放底著實去做又曰學只是知與禮他這意思却好禮便細密中庸致廣大盡精微等語皆只是説知禮又曰知是知處禮是行處知儘要髙行却自近起又曰知崇天也是致知事要得高明禮卑地也是事事都要踐履過卑便業廣又曰知崇者德之所以崇禮卑者業之所以廣禮才有些子不到處這業便有欠闕便不廣了地雖極卑無所欠闕故廣又曰知識日多則知益高又曰這事也合禮那事也合禮積纍多業便廣又曰所謂德言盛禮言恭禮便是要極卑故無物事無個禮雖於至微至細底事皆當畏謹戒懼唯恐失之這便是禮之卑處禮儀三百威儀三千無非卑底事然又不是強安排皆是天理合如此又曰禮卑是卑順之意卑便廣地卑便廣高則狹了人若只揀取高底做便狹如何會廣地卑便會廣世上更無物卑似地底又曰禮卑是從貼底謹細微做去所以能廣建安丘氏曰聖人之知如天之崇故所知口進於高明而德以崇禮如地之卑故所行日就於平實而業以廣潛室陳氏曰易言知崇即中庸尊德性致廣大極高明底事易言禮卑即中庸道問學盡精微道中庸底事知欲高明故崇如天禮欲執守故卑如地若一向務髙明而不事著實則窮賾索幽流於清虗而無執守依憑之實地須是約之以禮知以虗明為用屬陽屬天皆言其輕清也禮以形氣為質屬陰屬地皆言其重濁也天地設位而易行乎其中矣成性存存道義之門程子曰天地設位而易行其中何不言人行其中蓋人亦物也若言神行乎其中則人只於鬼神上求矣若言理言誠亦可也而特言易者欲使人默識而自得之也天地只是設位易行乎其中者神也天地設位而易行乎其中矣乾坤毁則無以見易易不可見則乾坤或幾乎息矣易是個甚易又不只是這一部書是易之道也不要將易又是一個事只是盡天理便是易也成性存存便是道義之門成性存存道義之門亦是萬物各有成性存存亦是生生不已之意天只是以生為道成性存存道義之門道無體義有方也本義天地設位而變化行猶知禮存性而道義出也成性本成之性也存存謂存而又存不已之意也朱子曰天地設位而易行乎其中陰陽升降便是易易者隂陽是也問天地設位而易行乎其中矣成性存存道義之門曰上文言知崇禮卑崇效天卑法地人崇其智須是如天之髙卑其禮須如地之下天地設位一句只是引起要説知崇禮卑人之知禮能如天地便能成性存存道義便自此出所謂道義便是易也成性存存不必專主聖人而言成性猶言見成底性這性元自好了但知崇禮卑則成性便存存又曰成性是不曽作壞底存謂常在這裏存之又存又曰成性成之者性字義同而用異成性是已成之性如言成德成説之類成之者性是成就之意如言成已成物之類問成性存存是不忘其所存曰衆人多是説到聖人處方是性之成看來不如此成性只是一個渾淪之性存而不失便是道義之門便是生生不已處又曰存存是生生不已之意當以伊川説為是又曰堯舜性之是其性本渾成學者學之須是以知禮做也到得他成性處道義出謂這裏流出道體也義用也又曰性是自家所以得於天底道義是衆人公共底節齋蔡氏曰道義之在造化則謂之易易之在人則謂之道義位謂有位可居門謂有門可出存存謂存之又存使之有體如天地也故有天地之位而後易行有知禮之門而後道義出右第七章雙湖故氏曰此章贊易道之至聖人所以崇廣其德業而參天地也切意聖人之稱非泛蓋指作易聖人也崇德乾之事廣業坤之事知崇效天而乾畫成矣禮卑法地而坤畫成矣天地設位而易行乎其中即天尊地卑乾坤定矣之義成性存存道義之門聖人畫易亦無非所以教民卜筮決嫌疑定猶豫俾得以存存其已成之性而由乎道義之門耳夫子之意或者在此乎雲峯胡氏曰上文言至德此章因而讚之曰易其至矣乎蓋可久可大賢人之德業未足為至至矣哉富有日新造化之德業也至矣乎知崇禮卑聖人之德業也崇德在於知崇廣業在於禮卑窮理而其崇如天乃為崇之至循理而其卑如地乃為卑之至天地之位設而變化行猶知禮之性存而道義出知禮之中自有天地道義之外他無所謂易也聖人有以見天下之賾而擬諸其形容象其物宜是故謂之象程子曰聖人有以見天下之賾止擬議以成其變化賾深逺也聖人見天下深逺之事而比擬其形容體象其事類故謂之象天下之動無窮也故觀其會通會通綱要也乃以行其典禮典禮法度也物之則也繫之辭以斷其吉凶者爻也言天下之深逺難知也而理之所有不可厭也言天下之動無窮也而物有其方不可紊也擬度而設其辭商議以察其動擬議以成其變化也變化爻之時義擬議議而言之也舉鳴鶴在隂以下七爻擬議而言者也餘爻皆然也本義賾雜亂也象卦之象如説卦所列者朱子曰聖人有以見天下之賾止是故謂之爻象言卦也下截言爻也賾説文曰賾雜亂也古無此事只是嘖字今從臣亦是口之義與左傳嘖有煩言之嘖同是口裏説話多雜亂底意思所以下文説不可惡先儒多以賾字為至妙之意若如此説何以謂之不可惡賾只是一個雜亂冗閙底意思言之而不可惡者精粗本末無不盡也又曰三百八十四爻是多少雜亂又曰言天下之至賾而不可惡者言雖是雜亂聖人却於雜亂中見其不雜亂之理便與下句言天下之至動而不可亂之義一般聖人有以見天下之賾正是説畫卦之初聖人見陰陽變化便畫出一畫一畫便有一個象只管生去自不同六十四卦各自一樣問擬諸形容者比度陰陽之形容蓋聖人見陰陽變化雜亂於是比度其形容而象其物宜是故謂之象曰也是如此嘗得郭子和書云其先人云不獨是天地風雷水火山澤謂之象只是畫卦便是象也説得好擬諸其形容未便是説那水火雷風之形容方擬這卦看是甚形容始去象那物之宜而名之一陽在二陰之下則象以雷一陰在二陽之下則象以風擬是比度之意龜山楊氏曰形容者乾為圜坤為大輿之類是也物宜者乾稱龍坤稱牝馬之類是也非聖人有以見天下之賾其孰能擬象之乎雲峯胡氏曰賾字諸家多以為隱奧之義本義獨依説文曰賾雜亂也蓋傳有曰探賾索隱則賾自賾隱自隱蓋於陰陽雜亂之中而求其隱奧之理耳聖人見天地之間陰陽相雜於是擬之而為六十四卦其象亦如此之雜也擬者象之未成象者擬之已定姑以乾坤二卦言之未畫則擬隂陽之形容而象乾坤之宜於是為竒偶之畫畫則象也已畫又擬乾坤之形容而取象天地首腹牛馬以至於為金為玉為釜為布之類皆象也聖人有以見天下之動而觀其會通以行其典禮繫辭焉以斷其吉凶是故謂之爻斷丁亂反本義會謂理之所聚而不可遺處通謂理之可行而無所礙處如庖丁解牛會則其族而通則其虗也朱子曰觀會通是就事上看理之所聚與其所當行處又曰通便是空處行得去便是通會便是四邊合湊來處又曰會以物之所聚而言通以事之所宜而言會是衆理聚處雖覺得有許多難易窒礙必於其中却得個通底道理乃可行爾謂如庖丁解牛於族處批大郤導大窽此是於其筋骨叢聚之所得其可通之理故十九年而刃發於硎且如事理間若不於會處理會却只見得一偏便如何行得通須是於會處都理會其間却自有個通處便如脈理相似到得多處自然貫通得所以可行其典禮蓋會而不通便窒塞而不可行通而不會便不知許多曲直錯雜處又曰會是觀衆理之會通是擇其通者而行且如有一事關著許多道理也有父子之倫也有君臣之倫也有夫婦之倫若父子之思重則便得身體髮膚受之父母不敢毁傷之義而委致其身之説不可行若君臣之義重則當委致其身而不敢毁傷之説不暇顧此之謂觀會通又曰一卦之中自有會通六爻又自各有會通且如屯卦初九在卦之下未可以進為此屯之義乾坤始交而遇險陷亦屯之義似草穿地而未伸亦屯之義凡此數義皆屯之會聚處若磐桓利居貞便是亦個合行處却是他通處也典禮猶常禮常法又曰禮便是莭文也升降揖遜是禮之莭文這禮字又説得闊凡事物之常理皆是問觀會通以行典禮曰如堯舜揖遜湯武征伐皆是典禮處典禮只是常事辭謂卦爻之辭龜山楊氏曰爻者陰陽之交也柴氏中行曰聖人默識天下之動觀其事理之會合通行處欲常行法度不廢於天下則繫辭以明其爻而斷之曰如此則為吉如此則為凶人知避凶趨吉則常法不廢之矣此易所以有爻也雲峯胡氏曰天下之動非特陰陽之運動凡人之動而行事與夫一念之動皆是也觀會通以行典禮不會則於理有遺缺如之何可通不通則於理有窒礙如之何可行通是時中典常是庸如此而行則吉背此而行則凶繫辭以明之故謂之爻言天下之至賾而不可惡也言天下之至動而不可亂也惡烏路反本義惡猶厭也朱子曰言天下之至賾而不可惡也蓋雜亂處人易得厭惡然這都是道理中合有底事自合理會故不可惡言天下之至動而不可亂也蓋動亦是合有底然上靣各自有道理故自不可亂天下之至動事若未動時不見得他那道理如何人平不語水平不流須是動方見得會通是會聚處典禮是借這般字來説只是説道觀他會通處後却求個道理來區處他所謂卦爻之動便是法象這個故曰爻也者效天下之動者也動亦未便説事之動只是事到靣前自家一念之動要求處置他便是動也厚齋馮氏曰象之所言如牝馬牝牛匪人女壯棟橈瓶羸之類若可惡矣然天下之至賾所在而不可惡也爻之所言如戶庭無咎而門庭則凶弗過遇之而弗遇過之先號後笑而先笑後號若甚亂矣然天下之至動所關而不可亂也擬之而後言議之而後動擬議以成其變化程子曰至誠則動動則變變則化故曰擬之而後言議之而後動擬議以成其變化也本義觀象玩辭觀變玩占而法行之此下七爻則其例也或問擬之而後言議之而後動凡一言一動皆即易而擬議之否朱子曰然擬議以成其變化此變化只就人事説擬議只是裁度自家言動使合此理變易以從道之意如擬議得是便吉擬議未善則為凶矣又曰這變化是就人動作處説如下所舉七爻皆變化也平菴項氏曰學易者擬其所立之象以出言則言之淺深詳略必各當其理議其所合之爻以制動則動之久速仕止必各當於時而易之變化成於吾身矣故曰以言者尚其辭以動者尚其變此之謂也雲峯胡氏曰聖人之於象擬之而後成學易者如之何不擬之而後言聖人之於爻必觀會通以行典禮學易者如之何不議之而後動前言變化易爻之變化也此言成其變化學易者之變化也鳴鶴在陰其子和之我有好爵吾與爾靡之子曰君子居其室出其言善則千里之外應之況其邇者乎居其室出其言不善則千里之外違之況其邇者乎言出乎身加乎民行發乎邇見乎逺言行君子之樞機樞機之發榮辱之主也言行君子之所以動天地也可不慎乎和胡卧反靡音縻行下孟反見賢遍反本義釋中孚九二爻義朱子曰鳴鶴在陰其子和之我有好爵吾與爾靡之此本是説誠信感通之理夫子却專以言行論之蓋誠信感通莫大於言行問言行君子之樞機是言所發者至近而所應者甚逺否曰樞機便是鳴鶴在陰下面大槩只説這意都不解著我有好爵二句鳴鶴好爵皆卦中有此象諸爻立象聖人必有所據非是白撰但今不可考耳到孔子方不説象柴氏中行曰鳴鶴在陰而其子必和情之所同無隱顯之間也我有好爵而爾亦靡於此心之所欲無物我之間也言之善人皆以為善故應言之不善天下亦皆以為不善故違人心之於善惡豈異其所趨哉極言行之至可以動天地則三才一理又可見也節齋蔡氏曰萬化不窮感應二端而已故夫子取中孚九二之辭而推廣其理也居其室即在隂之義出其言即鳴鶴之義千里之外應之即其子和之之義特主乎人而為言耳感應者心也言者心之聲行者心之迹言行乃感應之樞機也善者至善之理也不善則悖理矣人以善而感應則感應同乎天矣故曰動天地也同人先號咷而後笑子曰君子之道或出或處或默或語二人同心其利斷金同心之言其臭如蘭斷丁管反本義釋同人九五爻義言君子之道初若不同而後實無間斷金如蘭言物莫能間而其言有味也朱子曰同心之利雖金石之堅亦被他斷決將去斷是斷做兩假又曰同人先號咷而後笑聖人却恁地解誠齋楊氏曰君子之道于其心不于其迹心同迹異君子不以迹間心心異迹同君子不以心混迹故同人之先悲後喜與君子之甲出乙處此默彼語皆所不計也出處同道則禹顯顔晦同一情語默同道則史直蘧卷同一意心同故也金石至堅也然不堅於人心故二人一心則石可裂金可折薰蕕同器一童子能辨之臭味不同故也取南山之蘭雜北山之蘭十黃帝不能分臭味同故也龜山楊氏曰迹異而心同不害其為同心異而迹同相望為愈逺金至堅也而同心者斷之蘭至馨也而同心之言如之息齋余氏曰以出處語默發明號笑之義聖人讀易不滯於故而知其新有如此者雙湖胡氏曰二人九五六二也先號後笑先隔後遇也不取君臣義者特借爻辭論同心之利耳初六藉用白茅無咎子曰苟錯諸地而可矣藉之用茅何咎之有慎之至也夫茅之為物薄而用可重也慎斯術也以往其無所失矣藉在夜反夫音扶本義釋大過初六爻義節齋蔡氏曰物之置於地也亦可安矣而又藉之茅過於慎也凡天下之事過則有失唯過於慎則無所失故無咎勞謙君子有終吉子曰勞而不伐有功而不德厚之至也語以其功下人者也德言盛禮言恭謙也者致恭以存其位者也本義釋謙九三爻義德言盛禮言恭言德欲其盛禮欲其恭也南軒張氏曰大抵風之不厚不能負大翼水之不厚不能負大舟君子處心不厚則恃勢而傲物耀功而忽人矣安能以其功而下人乎切觀地中有山之象夫德之盛而充實如山焉禮之恭而接下如地焉夫內之德盛而外之禮恭所以處上而人不忌處前而人不怨此謙所以長保其位也誠齋楊氏曰人之謙與傲係其德之厚與薄德厚者無盈色德薄者無卑辭如鐘磬焉愈厚者聲愈緩薄者反是故有勞有功而不伐不德唯至厚者能之其德愈盛則其禮愈恭矣亢龍有悔子曰貴而無位高而無民賢人在下位而無輔是以動而有悔也本義釋乾上九爻義當屬文言此蓋重出不出戶庭無咎子曰亂之所生也則言語以為階君不密則失臣臣不密則失身幾事不密則害成是以君子慎密而不出也幾音機本義釋節初九爻義節齋蔡氏曰不言則是非不形人之招禍唯言為甚故言所當節也密於言語即不出户庭之義兌有言象故於莭之初爻重明之建安丘氏曰爻義主出處之莭而言此兼反於言語之莭者莭下卦兌兌為口舌亦其象也蓋口舌乃人一身之門戶一語不謹則失人失身殃禍立至此尤君子之所重也故夫子因明謹行而又推之謹言也誠齋楊氏曰唐高宗告武后以上官儀教我廢汝此君不密而失臣也陳蕃乞宣臣章以示宦者此臣不密而失身也子曰作易者其知盜乎易曰負且乘致寇至負也者小人之事也乘也者君子之器也小人而乘君子之器盜思奪之矣上慢下暴盜思伐之矣慢藏誨盜冶容誨淫易曰負且乘致寇至盜之招也本義釋解六三爻義朱子曰六居三大率少有好底負且乘聖人這裏又見得有這個小人乘君子之器底象故又於此發出這個道理來柴氏中行曰六三以不正小人據非其位故有此象人據非其義之所當有則啓謀利者攘奪之心作易者明義利之分故於六三之小人居有德之位知其必有盜乘其後而奪之天下之大盜未有不乘隙而動也涑水司馬氏曰上慢下暴慢其上而暴其下也誠齋楊氏曰司馬氏安能盜魏曹操教之也蕭衍安能盜齊蕭道成教之也蓋盜非能盜小人之有也小人實教盜以盜已之有也所謂知盜非知奪伐之盜也知教奪伐者之盜也故又終之曰誨盜曰盜之招者以此右第八章本義此章言卦爻之用節齋蔡氏曰自中孚初爻至此乃夫子擬議之辭而為三百八十四爻之凡例也爻之有義非辭不明而天下之事變化無窮又豈辭之所能備哉苟玩之者拘而不通則一爻不過一事而已擬議以成其變化其所以示人者詳矣然夫子之辭特發其端耳學易者當玩而有得也平庵項氏曰七爻皆欲人畏謹也鳴鶴言處隱之誠同人言同心之一白茅貴慎有終尚謙亢龍惡亢戶庭以教密負乘以戒慢皆所以養人之敬心也雲峯胡氏曰夫子於乾坤皆有文言以申彖傳象傳之意其餘彖傳蓋亦有之如履與豫釋卦辭已畢復曰剛中正履帝位而不疚光明也天地以順動故日月不過而四時不忒聖人以順動則刑罰清而民服豫之時義大矣哉此類皆是也然則繫辭此數卦即象傳之文言也善學易者可以觸類而通其餘矣天一地二天三地四天五地六天七地八天九地十程子曰自天一至地十合在天數五地數五上簡編失其次也天一生數地六成數才有上五者便有下五者二五合而成陰陽之功萬物變化鬼神之用也本義此簡本在第十章之首程子曰宜在此今從之此言天地之數陽竒隂偶即所謂河圖者也其位一六居下二七居上三八居左四九居右五十居中就此章而言之則中五為衍母次十為衍子次一二三四為四象之位次六七八九為四象之數二老位於西北二少位於東南其數則各以其類交錯於外也朱子曰自大衍之數五十至再扐而後挂便接乾之策二百一十有六至可以佑神矣為一節是論大衍之數自天一至地十却連天數五至而行鬼神也為一節是論河圖五十五之數今其文間斷差錯不相連接舛誤甚明卦雖八而數須十者八是陰陽數十是五行數一陰一陽便是二以二乘二便是四以四乘四便是八五行本只是五而有是十者蓋一個便包兩個如木便包甲乙火便包丙丁土便包戊巳金便包庚辛水便包壬癸所以為十南軒張氏曰陽數竒一三五七九是也陰數偶二四六八十是也故生於天者成於地生於地者成於天而天地五十五之數所以成變化行鬼神東坡蘇氏曰水至陰也必待天一加之而後生者陰不得陽則終不得而成也火至陽也必待地二加之而後生者陽不得陰則無所得而見也五行皆然莫不生於陰陽之相加陽加陰則為水為木為土陰加陽則為火為金苟不相加則雖有陰陽之資而無五行之用節齋蔡氏曰天地者陰陽對待之定體也一至十者陰陽流行之次序也然對待非流行則不能變化流行非對待則不能自行而五十五者則流行之細分也平庵項氏曰姚大老云天一至地十班固律歷志及衛元嵩元包運蓍篇皆在天數五之上程朱皆用此説今從之為是天數五地數五五位相得而各有合天數二十有五地數三十凡天地之數五十有五此所以成變化而行鬼神也程子曰有理則有氣有氣則有數行鬼神者數也數氣之用也大衍之數五十數始於一備於五小衍之而成十大衍之則為五十五十數之成也成則不動故損一以為用天地之數五十有五成變化而行鬼神者也變化言功鬼神言用南軒張氏曰天地自然之數盈虗消息往來不停變化雖妙而數有以成之若月令所謂鳩化為鷹雀化為鴿草木乃茂草木黃落可以歷數推而迎之此天地之數有以成其變化也鬼神雖幽而數有以行之若其神勾芒其神祝融其神蓐收其神玄冥各司其時各治其職者此天地之數有以行乎鬼神也本義此簡本在大衍之後今按宜在此天數五者一三五七九皆竒也地數五者二四六八十皆偶也相得謂一與二三與四五與六七與八九與十各以竒偶為類而自相得有合謂一與六二與七三與八四與九五與十皆兩相合二十有五者五竒之積也三十者五偶之積也變化謂一變生水而六化成之二化生火而七變成之三變生木而八化成之四化生金而九變成之五變生土而十化成之鬼神謂凡竒偶生成之屈伸往來者朱子曰五位相得而各有合是兩個意一與二三與四五與六七與八九與十是竒偶以類相得一與六合二與七合三與八合四與九合五與十合是各有合在十干甲乙木丙丁火戊己土庚辛金壬癸水便是相得甲與巳合乙與庚合丙與辛合丁與壬合戊與癸合是各有合所以成變化而行鬼神也程子曰變化言功鬼神言用張子曰成行鬼神之氣而已數只是氣變化鬼神亦只是氣天地之數五十有五變化鬼神皆不越於其間潘氏曰洛書之數天地自然之數也以天之一三五七九總之則為二十五此天數二十有五也以地之二四六八十總之則為三十此地數三十也又以天之二十五地之三十總之則為五十有五成變化而行鬼神不逃乎此數也天數二十有五五其五也地數三十六其五也莫不自五數之雲峯胡氏曰河圖有自然之數所以成大易之象天地有自然之象又所以成河圖之數奇圓圍三偶方圍四三用其全四用其半此天地間自然之象也本義以論乾坤之䇿愚謂即此以論河圖之數可也一圎而三水生木也二方而四火克金也陽之一進而用三隂之四退而用二合二與三則為五此河圖之生數也一生水而六成之三生木而八成之生數一進而用三成數則八退而用六二生火七成之四生金九成之生數四退而用二成數則七進而用九十八九六各為十五陰陽進退互藏其宅進即為變退則為化鬼神屈伸往來皆進退之妙用也大衍之數五十其用四十有九分而為二以象兩挂一以象三揲之以四以象四時歸竒於扐以象閏五歲再閏故再扐而後挂揲時設反奇紀宜反扐郎得反本義大衍之數五十蓋以河圖中宫天五乘地十而得之至用以筮則又止用四十有九蓋皆出於理勢之自然而非人之知力所能損益也兩謂天地也挂懸其一於左手小指之間也三三才也揲間而數之也奇所揲四數之餘也扐勒於左手中三指之兩間也閏積月之餘日而成月者也五歲之間再積日而再成月故五歲之中凡有再閏然後别起積分如一挂之後左右各一揲而一扐故五者之中凡有再扐然後别起一挂也朱子曰河圖洛書之中數皆五衍之而各極其數以至於十則合為五十矣河圓積數五十五其五十者皆因五而後得獨五為五十所因而自無所因故虗之則但為五十又五十五之中其四十者分為陰陽老少之數而其五與十者無所為則又以五乘十十乘五而亦皆為五十矣洛書積數四十五其四十者散布於外而分陰陽老少之數唯五居中而無所為則亦自含五數而并為五十矣中數五衍之而各極其數以至於十者一個衍成十個五個便是五十聖人説這個不只是説得一路他説出這個物事自然有許多樣通透去如五奇五偶成五十五又一説六七八九十因五得數也河圖五十五是天地自然之數大衍五十是聖人去這河圖裏靣取那天五地十衍出這個數大槩河圖是自然底大衍是用以揲蓍求卦底問大衍之義曰天地之數五十有五虗其中金木水火土五數便是五十又虗天一故用四十有九此一説也三天兩地便是虗去天一之數只用天三對地二耳又五為生數之極十為成數之極以五乘十以十乘五亦為五十此一説也又數始於一成於五小衍之成十大衍之成五十此又一説也數家之説雖多不同某謂此説却分曉問竊謂大衍之數不過五而已五者數之祖也河圖洛書皆五居中而為數祖宗大衍之數五十者即此五數衍而乘之各極其數而合為五十也是五也於五行為土於五常為信水火木金不得土不能各成一器仁義禮智不實有之亦不能各成一德此五所以為數之宗也不知是否曰此説是奇者左右四揲之餘也扐指間也謂四揲左手之䇿而歸其餘於無名指間四揲右手之䇿而歸其餘於中指之間也聖人下字皆有義挂者挂也扐者扐於二指之中也挂一一歲揲右二歲扐右三歲一閏揲左四歲扐左五嵗再閏也一挂之間凡再扐即五歲之間凡再閏之象也大衍之數五十其用四十有九者五十之內去其一但用四十九䇿合同未分是象太一也分而為二者以四十九䇿分置左右兩手象兩者左手象天右手象地是象兩儀也挂一者挂猶懸也於右手之中取一䇿懸於左手小指之間象三者所挂之䇿所以象人而配天地是象三才揲之以四者揲數之也謂先置右手之䇿於一處而以右手四四而數左手之䇿又置左手之䇿於一處而左手四四而數右手之䇿也象四時者皆以四數是象四時也歸奇於扐者奇零也扐勒也謂既四數兩手之策則其四四之後必有零數或一或二或三或四左手者歸之於第四第三指之間右手者歸之於第三第二指之間而扐之也象閏者積分而成閏月也五歲再閏故再扐而後挂者凡前後閏相去大略三十二月在五歲之中此挂一揲四歸奇之法亦一變之間凡一挂兩揲兩扐為五嵗之象其間凡兩扐以象閏是五歲之中凡有再閏然後置前挂扐之䇿復以見存之䇿分二挂一而為第二變也大衍之數五十蓍之籌乃其䇿也䇿中乘除則直謂之數耳蓍卦當初聖人用之亦須有個見成圖算後自失其傳所僅存者只有這幾句其間已自是添入字去説他了想得古人無許多解須别有個全文説繫辭言蓍法大抵只是解其大略想别有文字今不可見但如天數五地數五此是舊文五位相得而各有合是孔子解文天數二十有五地數三十凡天地之數五十有五此是舊文此所以成變化而行鬼神此是孔子解文分而為二是本文以象兩是解挂一揲之以四歸竒於扐皆是本文以象三以象四時以象閏之類皆是解文也乾之䇿二百一十有六坤之䇿百四十有四孔子則斷之以當期之日二篇之䇿萬有一千五百二十孔子則斷之以當萬物之數於此可見看繫辭須先看自大衍之數以下皆是説卜筮若不是説卜筮却是説一個無頭底物今人誠不知易節齋蔡氏曰天參地兩合而為五位每位各衍之為十故曰大衍丹陽都氏曰天地之數五十有五而大衍之數五十者蓋數備於五而五十所宗者五也大衍之數五十而其用四十有九者蓋數始於一而四十有九數之所宗者一也建安丘氏曰大衍之數五十者取河圖中五參天兩地之數以為衍母也大衍之用止四十九者又就河圖五十數之在外者虗其天一之數而不用也蓋一者數之始天下之數無窮而一無為故無為之一以象太極西山蔡氏曰五歲再閏者一變之中自有五莭挂為一節揲左為二節歸左竒於扐為三節揲右為四節歸右竒於扐為五莭一節象一歲三節一歸奇象三歲一閏五節再歸奇象五嵗再閏天地之數三百六十每歲氣盈六日朔虛六日一歲餘十二日三歲餘三十六日以三十日為一月更餘六日又二歲餘二十四日合前所餘六日為三十日為再閏再扐而後挂者再扐之後復以所餘之蓍合而為一為第二變再分再挂再揲也不言分二不言揲四獨言挂一者明第二變不可不挂也或曰揲蓍之法虛一分二挂一揲四歸竒其第一揲不五則九第二揲不四則八計其竒數以定陰陽老少去其初挂之一何也曰虛一分二挂一揲四歸奇乃天地四時之生萬物也其竒數䇿數以定陰陽老少乃萬物正性命於天地也生蓍以分二挂一為體揲四歸竒為用立卦以竒數為體䇿數為用在天地則虛其一而用四十九在萬物則挂其一而用四十八此聖人所以知變化之道也又曰第一揲挂一以四十九其竒一也第二揲非四十四則四十第三揲非四十則三十六不復有竒矣其挂何也曰人與天地並立為三天地非人則無以財成輔相故分二必挂一也初挂者人極所以立天地因乎人也再揲三揲之挂者人因天地以為用也雲峯胡氏曰歷法再閏之後又從積分而起則筮法再扐之後又必從挂一而起也乾之䇿二百一十有六坤之䇿百四十有四凡三百有六十當期之日期音基本義凡此䇿數生於四象蓋河圖四面太陽居一而連九少陰居二而連八少陽居三而連七太陰居四而連六揲蓍之法則通計三變之餘去其初挂之一凡四為奇凡八為偶竒圓圍三偶方圍四三用其全四用其半積而數之則為六七八九而第三變揲數䇿數亦皆符會蓋餘三竒則九而其揲亦九䇿亦四九三十六是為居一之太陽餘二竒一偶則八而其揲亦八䇿亦四八三十二是為居二之少陰二偶一竒則七而其揲亦七䇿亦四七二十八是為居三之少陽三偶則六而其揲亦六䇿亦四六二十四是為居四之老陰是其變化往來進退離合之妙皆出自然非人之所能為也少陰退而未極乎虛少陽進而未極乎盈故此獨以老陽老陰計乾坤六爻之䇿數餘可推而知也期周一歲也凡三百六十五日四分日之一此特舉成數而槩言之耳朱子曰䇿者蓍之莖數曲禮所謂䇿為蓍者是也大傳所謂乾坤二篇之䇿者正以其挂扐之外見存蓍數為言耳蓋揲蓍之法凡三揲挂扐通十三䇿而見存三十六䇿則為老陽之爻三揲挂扐通十七䇿而見存三十二䇿則為少陰之爻三揲挂扐通二十一䇿而見存二十八䇿則為少陽之爻三揲挂扐通二十五䇿而見存二十四䇿則為老陰之爻大傳專以六爻乘二老而言故曰乾之䇿二百一十有六坤之䇿百四十有四凡三百有六十其實六爻之為陰陽者老少錯雜其積而為乾者未必皆老陽其積而為坤者未必皆老隂其為六子諸卦者或陽或陰亦互有老少焉蓋老少之别本所以生爻而非所以名卦今但以乾有老陽之象坤有老陰之象六子有少陰陽之象且均其䇿數又偶合焉而因假此而明彼則可若便以乾六爻皆為老陽坤六爻皆為老陰六子皆為少陽少陰則恐其未安也但三百六十者陰陽之合其數必齊若乾坤之爻而皆得於少陰陽也則乾之䇿六其二十八而為百六十八坤之䇿六其三十二而為百九十二其合亦為三百六十此則不可易也大凡易數皆六十三十六對二十四三十二對二十八皆六十也以十甲十二辰亦湊到六十也鐘律以五聲十二律亦積為六十也以此知天地之數皆至六十為節兼山郭氏曰或曰乾坤稱九六而六子不稱七八何也曰九六有象七八無象也以卦則六子之卦七八隱於其中而無象也以畫則雖六子亦皆乾坤之畫而六子無畫也唯乾坤有用九用六之道諸卦得竒者皆用乾之九得偶者皆用坤之六終無用七用八之道故曰九六有象七八無象也莭齋蔡氏曰天地之運大小皆極于三百六十大衍乾坤之䇿當期之日真所謂與天地相似也白雲郭氏曰天地謂之數乾坤謂之䇿則數者䇿之所宗而䇿為已定之數也二篇之䇿萬有一千五百二十當萬物之數也本義二篇謂上下經凡陽爻百九十二得六千九百一十二䇿陰爻百九十二得四千六百八䇿合之得此數朱子曰二篇之䇿當萬物之數亦是取象之辭不是萬物恰有此數二篇之䇿當萬物之數不是萬物盡於此數只是取象自一而萬數萬數來當萬物之數耳正義曰乾之䇿二百一十有六者以乾老陽一爻有三十六䇿六爻凡有二百一十有六䇿也乾之少陽一爻有二十八䇿六爻則有一百六十八䇿此經據乾之老陽之䇿也坤之䇿百四十有四者坤之老陰一爻有二十四䇿六爻故一百四十有四䇿也若坤少陰一爻有三十二䇿六爻則有一百九十二此經據坤之老陰之䇿也凡三百有六十當期之日者舉合乾坤兩策有三百六十當期之數三百六十舉其大略不數五日四分日之一也二篇之䇿萬有一千五百二十當萬物之數者二篇之爻總有三百八十四爻陰陽各半陽爻一百九十二爻爻别三十六總有六千九百一十二也陰爻亦一百九十二爻爻别二十四總有四千六百八也陰陽總合萬有一千五百二十當萬物之數也今考凡言䇿者即謂蓍也禮曰龜為卜䇿為筮又曰到策側龜皆以䇿對龜而言則可知矣儀禮亦言筮人執策尤為明驗故此凡言䇿數雖指挂扐之外過揲見存之蓍數而言然不以挂扐之內所餘之著不為䇿也疏義及其解説皆已得之且其并以乾坤二少之爻為言則固不專以乾坤為老六子為少矣但乾坤皆少而其合亦為三百六十兩篇皆少而其合亦為萬一千五百二十則數有未及而學者不可不知耳雲峯胡氏曰前則挂扐之數象月之閏此則過揲之數象歲之周蓋揲之以四已合四時之象故總過揲之數又合四時成歲之象也獨曰乾坤之䇿者猶用九用六三百八十四爻之通例而獨於乾坤言之也白雲胡氏曰聖人畫卦初未有以陰陽老少為異然卜史之象欲取動爻之後卦故分别老少之象與聖人畫卦之意已不同矣是故四營而成易十有八變而成卦本義四營謂分二挂一揲四歸竒也易變易也謂一變也三變成爻十八變則成六爻也朱子曰四營而成易易字只是個變字四度經營方成一變若説易之一變却不可這處未下得卦字亦未下得爻字只下得易字四營而成易者營謂經營易即變也謂分二挂一揲四歸竒凡四度經營蓍䇿乃成一變也十有八變而成卦者謂既三變而成一爻復合四十九䇿如前經營以為一變積十八變則成六爻而為一卦也其法初一變兩揲之餘為挂扐者不五則九第二變兩揲之餘為挂扐者不四則八第三變兩揲之餘為挂扐者亦不四則八五四為少九八為多若三變之間一五兩四則謂之三少一九兩八則謂之三多或一九一八而一四或一五而一八則謂之兩多一少或一九而二四或一五一四而一八則謂之兩少一多蓋四十九䇿去其初挂之一而存者四十八以四揲之為十二揲之數四五為少者一揲之數也八九為多者兩揲之數也一揲為竒兩揲為偶竒者屬陽而象圓偶者屬陰而象方圓者一圍三而用全故一奇而含三方者一圍四而用半故一偶而含二也若四象之次則一曰太陽二曰少陰三曰少陽四曰太陰以十分之則居一者含九居二者含八居三者含七居四者含六其相為對待而具於洛書者亦可見也故三少為老陽者三變各得其一揲之數而三三為九也其存者三十六而以四數之復得九揲之數也左數右䇿則左右皆九左右皆䇿則一而圍三也三多為老陰者三變各得兩揲之數而三二為六也其存者二十四而以四數之復得六揲之數也左數右䇿則左右皆六左右皆䇿則圍四用半也兩多一少為少陽者三變之中再得兩揲之數一得一揲之數而兩二一三為七也其存者二十八而以四數之復得七揲之數也左數右䇿則左右皆七左右皆䇿則方二圓一也方二謂兩八圓一謂一十二兩少一多為少陰者三變之中再得一揲之數一得兩揲之數而二三一二為八也其存者三十二而以四數之復得八揲之數也左數右䇿則左右皆八左右皆䇿則圎二方一也圎二謂兩十二方一謂一八多少之説雖不經見然其實以一約四以竒為少以偶為多而已九八者兩其四也陰之偶也故謂之多五四者一其四也陽之竒也故謂之少竒陽體圎其法徑一圍三而用其全故少之數三偶陰體方其法徑一圍四而用其半故多之數二歸竒積三三而為九則其過揲者四之而為三十六矣歸竒積三二而為六則其過揲者四之而為二十四矣歸竒積二三一二而為八則其過揲者四之而為三十二矣歸竒積二二一三而為七則其過揲者四之而為二十八矣過揲之數雖先得之然其數衆而繁歸竒之數雖後得之然其數寡而約紀數之法以約御繁不以衆制寡故先儒舊説專以多少決陰陽之老少而過揲之數亦冥會焉初非有異説也平菴項氏曰此一節以是故發辭蓋接上文二篇之䇿而論揲蓍求卦之法于以總括夫一章之事也自下文八卦小成以下乃言得卦之後占象推演之法而一章之事備矣八卦而小成本義謂九變而成三畫得內卦也引而伸之觸類而長之天下之能事畢矣長丁丈反本義謂已成六爻而視其爻之變與不變以為動靜則一卦可變而為六十四卦以定吉凶凡四千九十六卦也朱子曰引而伸之觸類而長之是占得這一卦則就上面推看如乾則推其為圜為君為父之類是也雙湖胡氏曰按四千九十六卦乃焦延夀變卦之法詳見啓蒙原卦畫篇顯道神德行是故可與酬酢可與祐神矣行下孟反程子曰顯明於道而見其功用之神故可與應對萬變可贊祐於神道矣謂合德也人唯順理以成功乃贊天地之化育也本義道因辭顯行以數神酬酢謂應對祐神謂助神化之功或問顯道神德行朱子曰道較微妙無形影因卦辭説出來道這是吉這是凶這可為這不可為德行是人做底事因數推出來方知得這不是人硬恁地做都是神之所為也又曰須知得是天理合如此此是説蓍卦之用道理因此顯著德行是人事却由取決於蓍既知吉凶便可以酬酢事變神又豈能自説吉凶歟人因有易後方著見便是易來佑助神也又曰易唯其顯道神德行故能與人酬酢而佑助夫神化之功也神德行是説人事那粗做底只是人為若決之於鬼神德行便神酬酢者言幽明之相應如賔主之相交也平庵項氏曰天道雖幽可闡之以示乎人人事雖顯可推之以合乎天明可以酬酢事物之宜幽可以贊出鬼神之命雲峯胡氏曰道在天德行在人在天者幽顯道闡幽也在人者顯神德行微顯也蓍與卦可與酬酢其在人者可與贊助其在天者子曰知變化之道者其知神之所為乎程子曰知變化之道則知神之所為也合與上文相連不合在下本義變化之道即上文數法是也皆非人之所能為故夫子歎之而門人加子曰以别上文也磐澗董氏曰陽化為隂陰變為陽者變化也所以變化者道也道者本然之妙變化者所乘之機故陰變陽化而道無不在兩在故不測故曰知變化之道者其知神之所為乎南軒張氏曰變者不能自變有神以變之化者不能自化有神以化之故知變化之道者疑若窺測其妙也雲峯胡氏曰本義曰變化之道即上文數法是也皆非人之所能為蓋為河圖大衍之數揲蓍求卦之法有變有化非人之所為也皆神之所為也右第九章本義此章言天地大衍之數揲蓍求卦之法然亦略矣意其詳具於太卜筮人之官而今不可考耳其可推者啓蒙備言之雙湖胡氏曰此章首論天地之數次論蓍䇿之數末論卦畫之數天地數之原也蓍䇿數之衍也卦畫數之鍾聚也蓋至於卦畫足以濟生人之用矣故始之以成變化而行鬼神明數之體段原於天地者將必有如是之功用終之以變化之道神之所為明數之功用逹於蓍卦者原其初已有如是之體段也變化之道即成變化之事揲蓍中老陽變為少陰老陰變為少陽是也神之所為即行鬼神之事卦畫既立吉凶禍福皆可得而前知所謂定天下之吉凶成天下之亹亹是也簡編釐正之功大矣易有聖人之道四焉以言者尚其辭以動者尚其變以制器者尚其象以卜筮者尚其占程子曰易有聖人之道四焉止非天下之至精其孰能與於此言所以述理以言者尚其辭謂其言求理者則存意於辭也以動者尚其變動則變也順變而動乃合道也制器作事當體乎象卜筮吉凶當考乎占受命如響遂知來物非神乎曰感而通求而得精之至也本義四者皆變化之道神之所為者也朱子曰易有君子之道四至精至變則合做兩個是他裏面各有那個問以言以動以制器以卜筮這以字是指以易而言否曰然又問辭占是一類變象是一類所以下文至精合辭占説至變合變象説曰然占與辭是一類者曉得辭方能知得占若與人説話曉得他言語方見他胸中底藴變是事之始象是事之已形者故亦是一類也問以言者尚其辭以言是取其言以明理斷事如論語上舉不恆其德或承之羞否曰是問以制器者尚其象曰這都難説蓋取諸離取諸益不是先有見乎離而後為網罟先有見乎益而為耒耜之屬聖人亦只是見魚鱉之屬欲有以取之遂做一個物事去攔截他欲得耕種見地土硬遂做一個物事去剔起他却合於離之象合於益之意有取其象者有取其意者問以卜筮者尚其占卜用龜亦使易占否曰不用只是文勢如此南軒張氏曰易有聖人之道四焉故指其所之者易之辭也以言者尚之則言無不當矣化而裁之者易之變也以動者尚之則動無不時矣象其物宜者易之象也制器者尚之則可以盡創物之智極數知來者易之占也卜筮者尚之則可以窮先知之神廬陵龍氏曰四者皆是用易然有言動時取用者有制器卜筮時取用者四句唯尚變難通變雖在辭象占之外實不出辭象占之間凡舉動必合易之變唯心與理會者能之雲峯胡氏曰辭占是一類變象是一類辭以明變象之理占以斷變象之應故四者之目以辭與占始終焉是以君子將有為也將有行也問焉而以言其受命也如嚮無有逺近幽深遂知來物非天下之至精其孰能與於此嚮許兩反古文響字與音預下同程子曰卜筮之能應祭祀之能享亦只是一理蓍龜雖無情然所以為卦而卦有吉凶莫非有此理以其有是理也故以是問焉其應也如響若以私心及錯卦象而問之便不應蓋沒此理今日之理與前日已定之理只是一個理故應也不容祭祀之享亦同鬼神之理在彼我以此理向之故享也不容有二三只是一理也本義此尚辭尚占之事言人以蓍問易求其卦爻之辭而以之發言處事則易受人之命而有以告之如嚮之應聲以決其未來之吉凶也以言與以言者尚其辭之以言義同命則將筮而告蓍之語冠禮筮日宰自右贊命是也或問君子將有為也將有行也問焉而以言其受命也如響朱子曰此是説君子作事問於蓍龜言是命龜受命如嚮龜受命也抱龜南面是也張子曰易無思無為受命乃如響又曰此言易之為書也至精者謂聖人窮理極盡精微處也開封耿氏曰物之來者逺自八荒之上深在六極之下吾能知之此則天地之鑑也萬物之照也所謂至精者也雲峯胡氏曰君子言動必擬於易但言在行先故將有為有行必先問焉而以之發言然後以之行事也易受人之命其應如響未來之事無幽深逺近皆知之此尚辭尚占之事而曰天下之至精者言辭占至精之道其精無以加也參伍以變錯綜其數通其變遂成天地之文極其數遂定天下之象非天下之至變其孰能與於此參七南反錯七各反本義此尚象之事變則象之未定者也參者三數之也伍者五數之也既參以變又伍以變一先一後更相考核以審其多寡之實也錯者交而互之一左一右之謂也綜者總而挈之一低一昂之謂也此亦皆謂揲蓍求卦之事蓋通三揲兩手之䇿以成陰陽老少之畫究七八九六之數以定卦爻動靜之象也參伍錯綜皆古語而參伍尤難曉按荀子云窺敵制變欲伍以參韓非曰省同異之言以知朋黨之分偶參伍之驗以責陳言之實又曰參之以此物伍之以合參史記曰必參而伍之又曰參伍不朱漢書曰參伍其賈以類相準此足以相發明矣朱子曰參以三數之也伍以五數之也如云什伍其民如云或相什伯非直為三與五而已也蓋紀數之法以三數之則遇五而齊以五數之則遇三而會故荀子韓非漢書所云皆其義也所謂參伍以變者蓋言或以三數而變之或以五數而變之前後多寡更相反覆以不齊而要其齊如河圖洛書大衍之數伏羲文王之卦歷象之日月五星章蔀紀元是皆各為一法不相依附而不害其相通也揲蓍本無三數五數之法只言交互參考皆有自然之數如三三為九五六三十之類雖不用以揲蓍而推算變通未嘗不用荀子説參伍楊倞解之為詳漢書所謂欲問馬先問牛參伍之以得其實大抵陰陽竒偶變化無窮天下之事不出諸此成天地之文者若卦爻之陳例變態者是也定天下之象者物象皆有定理足以經綸天下之事也問參伍者是既三以數之又五以數之譬之三十錢以三數之看得幾個三了又五以數之看得幾個五兩數參合方看得幾個成數曰正是如此又問不獨是以數算大槩只是參合底意思如趙廣漢欲問馬先問牛便只是以彼數來參此數否曰是又曰若是他數猶可湊三與五兩數自是參差不齊所以舉以為言如這個是三個將五來比又多兩個這是五個將三來比又少兩個兵家謂窺敵制變欲伍以參今欲覘敵人之事教一人探來恁地説又差一人去探來若説得不同便將這兩説相參看如何以求其實所以謂之欲伍以參問錯綜之義曰錯是往來底綜是上下底古人下這字極子細又曰錯是彺來交錯之義綜是織底綜一個上去一個下來陽上去做陰陰下來做陽又曰錯綜其數便只是七九八六六對九七對八便是東西相錯六上生七為陽九下生八為陰便是上下為綜錯綜是兩樣錯者雜而互之也綜者條而理之也參伍錯綜又各自是一事參伍所以通之其治之也簡而疏錯綜所以極之其治之也繁而密漢上朱氏曰參伍以變者縱橫十五天地五十有五之數也錯之為六七八九綜之為三百六十通六七八九之變則剛柔相易遂成天地之文極五十有五之數則剛柔有體遂定天下之象非成文不足以成物非定象不足以制器變之又變謂之至變南軒張氏曰三五天也參而伍之人也平庵項氏曰凡占之法有數有變每爻三揲為三變有揲有象兩象三象四時象閏再閏為五小變此參伍以變也三揲之竒分而計之則得三少三多一少兩多一多兩少之數去三揲之竒以左右手之正䇿合而計之則得四九四六四七四八之數此錯綜其數也錯謂分而間之綜謂合而綜之此兩句止論一爻之法通六爻之變得十有八遂成初二三四五上以為剛柔相雜之文極六爻之數得七八九六遂定重單交拆以為內外兩卦之象此兩句成卦之法雲峯胡氏曰上文曰尚辭尚占之事此獨曰尚象而不曰尚變參伍以變此變字象之未定者也參伍以一變而言錯綜合十八變而言本義以參伍為一先一後更相考核以究其多寡之實筮法四五為寡九八為多五九為先四八為後五九四八之中又各自有先後焉除挂一外餘九者先後皆四餘八者或先三而後四或先四而後三是三以變也餘五者或先後皆二或先三而後一或先一而後三餘四者或先二而後一或先一而後二是伍以變也參伍以變蓋三揲兩手之䇿也通三揲兩手乏䇿而陰陽老少之畫遂成矣三變方成陰陽老少之畫雜十有八變乃見陰陽老少之數故謂之錯綜三變之數成一爻總十有八變成一卦故謂之綜錯綜七八九六之數而卦爻動靜之象遂定矣天下至變言易之有象其至變之道天下無以加之也雙湖胡氏曰按楊倞荀子注伍參猶雜也使間諜或參之或伍之於敵間而盡知其事史記引周書曰必參而伍之注三卿五大夫欲更議也易無思也無為也寂然不動感而遂通天下之故非天下之至神其孰能與於此程子曰老子曰無為又曰無為而無不為當有為而以無為為之是乃有為為也聖人作易未嘗言無為惟曰無思也無為也此戒夫作為也然下即曰寂然不動感而遂通天下之故是動靜之理未嘗為一偏之説矣寂然不動感而遂通者天理具備元無少欠不為堯存不為桀亡父子君臣常理不易何曾動來因不動故言寂然雖不動感便通感非自外也寂然不動萬物森然已具在感而遂通感則只是自內感不是外面將一件物來感於此也寂然不動感而遂通此只言人分上事若論道則萬理皆具更不説感與未感答與叔書曰心一也有指體而言者寂然不動是也有指用而言者感而遂通天下之故是也感而遂通天下之故以其寂然不動小則事物之至大則無時而不感龜山楊氏曰惟無思為足以感通天下之故而謂無思土木可乎此非窮神知化未足與議也藍田吕氏曰寂然之中天機常動感應之際木原常靜洪鐘在簴叩與不叩鳴未常已寶鑑在手照與不照明未嘗息張子曰一故神譬之人身四體皆一物故觸之而無不覺此所謂感而遂通不疾而速不行而至也本義此四者易之體所以立而用所以行者也易指蓍卦無思無為言其無心也寂然者感之體感通者寂之用人心之妙其動靜亦如此朱子曰易無思也無為也易是個無情底物事故寂然不動占之吉凶善惡隨事著見乃感而遂通又曰感而遂通感著他卦卦便應也如人來問底善便與説善來問底惡便與説惡所以先儒説道潔靜精微這般句説得有些意思又曰凡言易者多只指蓍卦而言蓍卦何嘗有思有為但只是叩著便應無不通所以為神耳非是别有至神在蓍卦之外也寂然不動感而遂通天下之故與窮理盡性以至於命本是説易不是説人諸家皆是借來就人上説亦通寂然是體感是用當其寂然時理固在此必感而後發如仁感為惻隱未感時只是仁義感為羞惡未感時只是義易無思也無為也寂然不動忠也敬也立大本也感而遂通天下之故恕也義也行達道也問無思也無為也寂然不動感而遂通天下之故者何也曰無思慮也無作為也其寂然者無時而不感其感通者無時而不寂也是乃天命之全體人心之至正所謂體用之一源流行而不息者疑若不可以時處分矣然於其未發也見其感通之體於已發也見其寂然之用亦各有當而實未嘗分焉故程子曰中者言寂然不動者也和者言感而遂通者也然中和以性情言者也寂感以心言者也中和蓋所以為寂感也平庵項氏曰蓍之變䇿之數爻之文卦之象皆寂然不動之物物不能如人之有思亦不能如人之有為皆純乎天者也及問焉而以言則其受命也如響無有逺近幽深遂知來物則感而遂通天下之故皆同乎人者也潘氏曰易無思慮無作為寂然不動若無與於物然一有所感則天下之故無不通者感於離則通乎綱罟之故感於夬則通乎書契之故大而天地微而鳥獸近而一身遠而萬物苟有感焉無不通者然非極天下之至神者不能也雲峯胡氏曰象在畫辭在䇿蓍未變占在櫝皆無思無為寂然不動人心之寂也如是揲蓍以求卦則天下之故無有不通者矣人心之感也如是非至精至變之外他有所謂至神神即精與變之至妙至妙者也夫易聖人之所以極深而研幾也幾音機下同本義研猶審也幾微也所以極深者至精也所以研幾者至變也或問如何是極深朱子曰聖人都曉得至深難見底道理都就易中見得問如所謂幽明之故死生之説鬼神之情狀之類否曰然問何如是研幾曰便是研磨出那幾微處且如一個卦在這裏便有吉凶有悔吝幾微毫釐處都研出來又問如此説正與本義所謂所以極深者至精也所以研幾者至變也正相發明曰然易便有那深有那幾聖人便用極出那深研出那幾研是研磨到底之意詩書禮樂皆是説那已有底事惟是易説那未有底事研幾是不待他顯著只在那芒昧時都處置了知至如極深能慮便是研幾又曰知至能慮與極深研幾句略相似平庵項氏曰至精至變至神者易之體也惟深惟幾惟神者易之用也故曰夫易聖人所以極深而研幾也立此一句以承上體起下用也惟深也故能通天下之志唯幾也故能成天下之務唯神也故不疾而速不行而至程子曰神無速亦無至須如此言者不如是不足以形容故也本義所以通志而成務者神之所為也朱子曰深是幽深通是開通人所以閉塞只為他淺若是深後便能開通人志道理若淺如何開通得人所謂通天下之志亦只是開物相似所以下一句也説個成務易是説那未有底六十四卦皆是如此深就心上説幾就事上説幾便是有那事了雖是微畢竟是有深在心甚玄奧幾在事半徼半顯通天下之志猶言開物開通其閉塞也故其下對成務極出那深故能通天下之志研出那幾故能成天下之務問唯深也唯幾也唯神也此是説聖人能如此否曰此是説聖人亦是易如此若不深如何通得天下之志又曰他恁黑窣地深疑若不可測然其中却事事有又曰事事都有一個端緒可尋又曰各有個絡脈線索在裏面所以曰唯幾也故能成天下之務研者便是研窮他問如何是幾曰這便是周子所謂動而未形有無之間者也通天下之志通是開通之意蓋當時之民遇事多閉塞不知所為故聖人作易示以此理教他恁地做便會吉如此做便會凶必恁地則吉而可為如此則凶而不可為所謂通天下之志開物亦只是如此臨川吳氏曰本義云極深者至精也研幾者至變也唯辭之能極深也故以辭為占則可以前知而開通天下人之心志唯變之能研幾也故以變得象則可以制作而完成天下人之事務然辭占變象所以能如此者皆妙不可測之神為之唯其妙不可測故不待疾之而自速不待行之而自至謂自然而然非人所能為也誠齋楊氏曰天下之理唯疾故速唯行故至未有不疾而速不行而至者也蓋不如是不足以為神也然則聖人之神果何物也心之精也豈惟心之能神哉物理亦有之銅山東傾而洛鍾西應豈唯物理哉人氣亦有之其母齧指而其子心動此一物之理一人之氣相應相同有不疾而速不行而至者也况聖心之神乎是故範圍天地而一念不踰時經緯萬方而半武不出戶豈假疾而後速行而後至何為其然也心之神也子曰易有聖人之道四焉者此之謂也朱子曰變化之道莫非神之所為也故知變化之道則知神之所為矣易有聖人之道四焉所謂變化之道也觀變玩占可以見其精之至矣玩辭觀象可以見其變之至矣然非有寂然感通之神則何以為精為變而成變化之道哉此變化之道所以為神之所為也所以極深者以其精也所以研幾者以其變也極深研幾所以不疾而速不行而至者以其神也此又覆明上文之意復以易有聖人之道四焉者結之也或曰至精至變皆以書言之矣至神之妙亦以書言之可乎曰至神之妙固無不在詳考之文意則實以書言之也所謂無思無為寂然不動云者言在册䇿在畫蓍在櫝而變未形也至於玩辭觀象而揲蓍以變則感而遂通天下之故矣推而極於天地之大反而驗諸心術之微其一動一靜循環終始之妙亦如此而已矣嗚呼此其所以不疾而速不行而至也歟平庵項氏曰四者雖云辭變象占而自君子將有為也以下則皆論占也至此又以易有聖人之道四焉終之者蓋占則有辭變則有象舉其一則四事在其中矣右第十章本義此章承上章之意言易之用有此四者子曰夫易何為者也夫易開物成務冒天下之道如斯而已者也是故聖人以通天下之志以定天下之業以斷天下之疑冒莫報反斷丁亂反本義開物成務謂使人卜筮以知吉凶而成事業冒天下之道謂卦爻既設而天下之道皆在其中朱子曰此言易之書其用如此又曰易本為卜筮而言古人淳質初無文義故畫卦爻以開物成務故曰夫易何為而作也夫易開物成務冒天下之道如斯而已也是故以通天下之志以定天下之業以斷天下之疑是故蓍之德圓而神卦之德方以知六爻之義易以貢聖人以此洗心退藏於密此易之大意在此又曰易本欲定天下之志斷天下之疑而已不是要説道理也古之時民淳俗朴風氣未開於天下事全未知識故聖人立龜與之卜作易與之筮使之趨吉避害以成天下之事故曰開物成務物只是人物務只是事務冒只是罩得天下許多道理在裏出不得他個問易開物成務冒天下之道是易之理能恁地而人以之卜筮又能開物成務否曰然讀繫辭者須見得如何是開物如何是成務如何是冒天下之道須要就卦中一一見得許多道理然後可讀繫辭也蓋易之為書大抵皆是因卜筮以設教逐爻開示吉凶包括無遺如將天下許多道理包藏在其中故曰冒天下之道繫辭自大衍數以下皆是説卜筮事若不曉他盡是説爻變中道理則如所謂變動不居周流六虛之類有何憑著今人説易所以不將卜筮為主者只是怕小却這個道理故憑虛失實茫昧臆度而已殊不知由卜筮而推而上通鬼神下通事物精及於無形粗及於有象如包罩在此隨取隨得居則觀象玩辭者又不待卜而後見只是體察便自見吉凶之理臨川吳氏曰開物謂人所未知者開發之成務謂人所欲為者成全之冒猶韜尸之冒謂天下之道悉包裹於其中也通志開物也定業成務也斷疑謂易於天下之道包裹無遺故於天下之疑事皆能決之也雲峯胡氏曰學者以為易專言卜筮易至於小吾易殊不知未有卜筮以前人無以知吉凶而成事業有卜筮則可開示吉凶而天下事事物物之理無不包括在此故曰冒天下之道開示天下以吉凶所以通天下之志成務所以定天下之業冒天下之道所以斷天下之疑下文凡六節各有是故二字皆以言卜筮之妙也是故蓍之德圓而神卦之德方以知六爻之義易以貢聖人以此洗心退藏於密吉凶與民同患神以知來知以藏往其孰能與於此哉古之聰明睿知神武而不殺者夫方以知之知音智下知以睿知並同易音亦與音預夫音符程子曰生生之謂易天地設位而易行乎其中乾坤毁則無以見易易不可見乾坤或幾乎息矣易畢竟是甚又指而言曰聖人以此洗心退藏於密聖人示人之意至此深且明矣終無人理會易者此也密也是甚物人能至此深思當自得之又曰安有識得易後不知退藏於密密是用之原聖人之妙處知不專為藏往易言知來藏往主蓍卦而言張子曰圓神故能通天下之志方知故能定天下之業易貢故能斷天下之疑易書成三者備憂患明聖人得以洗濯其心退藏於密矣本義圓神謂變化無方方知謂事有定理易以貢謂變易以告人聖人體具三者之德而無一塵之纍無事則其心寂然人莫能窺有事則神知之用隨感而應所謂無卜筮而知吉凶也神武不殺得其理而不假其物之謂朱子曰此言聖人所以作易之本也蓍動卦靜而爻之變易無窮未畫之前此理已具於聖人之心矣然物之未感則寂然不動而無兆朕之可名及其出而應物則憂以天下而圎神方知者各見於功用之實聰明睿知神武而不殺者言其體用之妙也又曰蓍之德三句蓍與卦以德言爻以義言但只是具這個道理在此而已所謂以此洗心者心中渾然此理别無他物退藏於密只是未見於用所謂寂然不動也下文説神以知來便是以蓍之德知來知以藏往便是以卦之德藏往洗心退藏言體知來藏往言用然亦只言體用具矣而未及使出來處到下文是興神物以前民用方發揮許多道理以盡見於用也然前段必結之以聰明睿知神武而不殺者只是譬喻蓍龜雖未用而神靈之理具在猶武雖是殺人底事聖人却存此神武而不殺也又曰聖人以此洗心退藏於密是以那易之理來洗濯自家心了更沒些私意小知在裏許聖人便似易了不假卜筮而知吉凶所以説神武而不殺這是有那神以知來知以藏往又説個齋戒以神明其德皆是得其理不假其物又曰退藏於密時固不用這物事吉凶與民同患也不用這物事用神而不用蓍用知而不用卦全不犯手退藏於密是不用事時到他用事也不犯手事未到時先安排在這裏了事到時恁地來恁地應蓍以七為數故七七四十九而屬陽是未成卦時所用未有定體故其德圎而神所以知來卦以八為數故八八六十四而屬陰是因蓍之變而成已有定體故其德方以知所以藏往一卦之中凡爻辭所載皆具已見底道理此藏往也占得此爻却因已見底道理以推未來之事便是知來易以貢是變易以告人貢字只作告字説但上面神字知字下得重不知此字又却下得輕却曉不得建安丘氏曰四十九蓍分挂揲扐陰陽老少變化無方故其德圎而神六十四卦象辭森列吉凶得失一定不易故其德方以知貢猶告也三百八十四爻剛柔迭用九六相推其理又變易以告人故其義易以貢孔氏曰吉凶與民同患者凶雖民之所患吉亦民之所患也既得其吉又患其凶老子曰寵辱若驚也雲峯胡氏曰此以蓍卦爻之理而言也理無一定之用故曰圓而神事有一定之理故曰方以知易以六爻之理教人有定體而無定用故曰易以貢聖人一心蓍卦爻之理具焉具此三者之理而無一塵之纍故無事則退藏於密莫窺其際即蓍卦爻之無思無為寂然不動者也有事則吉凶與民同患其神自足以知來其知自足以藏往即蓍卦爻之感而遂通天下之故者也易開物成務是使人以卜筮而知吉凶與民同患而知來藏往是聖人無卜筮而知吉凶也本義謂神武不殺得其理而不假其物之謂蓋謂理必有資乎蓍卦爻之為物而聖人得其理而不假其物便如武必有資乎殺而聖人則存此神武而不假乎殺也平庵項氏曰自子曰夫易何為者也至定之以吉凶所以斷也朱子合為一大章專言卜筮之事而其間節目有四第一莭自夫易何為者也至神武而不殺者夫統言易中有蓍卦爻三德章首先設問答次以是故發辭開物者知其未然也陽之始物也成務者定其當然也陰之終物也天下之始終皆備於此書之內矣是故聖人用之以通人之志所謂開物也以定人之事所謂成務也以決人之疑即志與事之決也此三者皆蓍卦爻之所能也是故蓍用七故其德圎卦用八故其德方爻用九六故其義易貢蓍開於無卦之先所以為神卦定於有象之後所以為知爻決之先者也所以為貢聖人以此三者洗心以存其神退藏以定其體同患以贊其決故其知幾即神之開物也其畜德則知之成務也此所謂聰明睿知也其斷吉凶即神武之決也其與民同患即不殺之仁也古之人有能備是德者即伏義聖人是也故自此以下始言建立卜筮之人焉是以明於天之道而察於民之故是興神物以前民用聖人以此齋戒以神明其德夫程子曰聖人以此退藏於密以此齋戒以神明其德夫要須玩索張子曰言天之變遷禍福之道由民逆順取舍之故故聖人作易以先之本義神物謂蓍龜湛然純一之謂齋肅然警惕之謂戒明天道故知神物之可興察民故故知其用之不可不有以開其先是以作為卜筮以教人而於此焉齋戒以考其占使其心神明不測如鬼神之能知來也朱子曰是以明於天之道而察於民之故是興神物以前民用此言作易之事也聖人以此齋戒以神明其德夫此言用易之事也齋戒敬也聖人無一時一事不敬此特因卜筮而言尤見其精誠之至如孔子所慎齋戰疾之意湛然純一之謂齋肅然警惕之謂戒玩此則知所以神明其德之意也又曰齋較詳於戒到湛然純一時肅然警惕也無了是以明於天道以下言教民卜筮之事而聖人亦未嘗不敬而信之以神明其德也明於天之道而察於民之故是興神物以前民用蓋聖人見得天道人事都是這道理蓍龜之靈都包得盡於是作為卜筮使人因卜筮知得道理都在裏面是興神物以前民用此言有以開民使民皆知前時民皆昏塞吉凶利害是非都不知因這個開了便能如神明然此便是神明其德又云民用之則神明民德聖人用之則自神明其德問聖人齋戒以神明其德曰顯道神德行便是這神字猶言吉凶若有神明陰相之相似這都不是自家做得都若神之所為問明於天之道而察於民之故天之道便是民之故否曰論極處固只是一個道理看來須做兩處看方看得周匝無虧欠處問天之道只是福善禍淫之類否曰如陰陽變化春何為而生秋何為而殺夏何為而暑冬何為而寒皆要理會得問民之故如君臣父子之類是否曰凡民生日用皆是若只理會得民之故却理會不得天之道便即民之故亦未是在到得極時固只是一理要之須是都看得周匝始得洗心聖人觀象玩辭理與心會也齋戒聖人觀變玩占臨事而敬也聖人以通天下之志以定天下之業以斷天下之疑此只是説蓍龜若不指蓍龜如何通之定之斷之到蓍之德圎而神以下却是從源頭説却未是説卜筮蓋聖人之心自有易之三德故渾然是此道理不煩用一毫之私便是洗心即是退藏於密所謂密者只是他人自無可捉摸處便是寂然不動處吉凶與民同患神以知來知以藏往皆已具此理但却未用於蓍龜故曰古之聰明睿知神武而不殺者夫神武不殺之言只是譬喻謂聖人已具此理却不犯手耳明於天之道以下方説蓍龜乃是發用處是興神物以前民用蓋聖人既具此理又將此理就蓍龜上發明出來使民亦得前知而用之也聖人以此齋戒以神明其德德即聖人之德又即卜筮以神明之聖人自有此理亦用蓍龜之理以神明之南軒張氏曰丈蓍植物也足以揲天地之數龜動物也足以見天下之象故天能生之而不能興之惟聖人用其四十九而幽贊鬼神者所以興其蓍也鑽之七十二而置之前列者所以興其龜也天下之民其終不倦而樂於有為亹亹不忘而勇於有行者以其有蓍以前之也然後聖人深居簡出利用安身齊以去其不一之思戒以防其不測之患神明自得有莫知其所以然者矣李氏曰以為神耶則既物於物以為物矣則神所寄焉夫是之謂神物均是物也而蓍龜為神者以知象數是也雲峯胡氏曰上文謂蓍卦爻之理不假於物而皆具於聖人之心此則謂蓍卦爻之用不能不假於物而亦不能外乎聖人之心故彼曰聖人以此洗心者此心至靜而理之體具也此曰聖人以此齋戒者此心至敬而理之用行也蓋聖人明天道而知神物之可興察民故而知其用之不可以不開其先然聖人非齋戒無以神明聖人之德教人卜筮人不齋戒亦無以神明人之德也平庵項氏曰此第二節言始立蓍筮之人以是以發辭惟其聰明睿知也是以明於天道之逺而察於民事之近惟其神武不殺也是以建立蓍䇿以開斯民占決之用聖人又以卜筮之法所以齋心而戒事問之於神而貢之以明者以自齋戒以自神明其齋則洗心也其戒則藏密也其神明其德則與民同患也自此以下遂言畫爻布卦之法以見神明其德之事也是故闔戶謂之坤闢戶謂之乾一闔一闢謂之變往來不窮謂之通見乃謂之象形乃謂之器制而用之謂之法利用出入民咸用之謂之神見賢遍反本義闔闢動靜之機也先言坤者由靜而動也乾坤變通者化育之功也見象形器者生物之序也法者聖人修道之所為而神者百姓自然之日用也朱子曰闔闢乾坤理與事皆如此書亦如此這個則説理底意思多問易中多言變通之意如何曰處得恰好處便是通問往來不窮謂之通如何曰處得好便不窮不通便窮見乃謂象只是説動而未形有無之間者幾底意思幾雖是未形然畢竟是有個物了問闔戶謂之坤一段只是這一個物以其闔謂之坤以其闢謂之乾以其闔闢謂之變以其不窮謂之通以其發見而未成形謂之象以其成形則謂之器聖人修明以立教則謂之法百姓日用則謂之神曰是如此又曰利用出入者便是人生日用都離他不得又曰民之於易隨取而各足易之於民周遍而不窮所以謂之神所以謂之活潑潑地便是這處漢上朱氏曰坤自夏至以一陰右行萬物由之而入故曰闔戶乾自冬至以一陽左行萬物從之而出故曰闢戶又曰無闔則無闢無靜則無動此歸藏所以先坤歟進齋徐氏曰天道流行有動有靜猶戶之闔闢也陽之噓也戶之闢也羣蟄由是而作也是謂之乾陰之翕也戶之闔也羣動由是而息也是謂之坤先坤後乾陰陽之義也息齋余氏曰戶一而已闔斯為坤闢斯為乾且闔且闢為變可往可來為通見此戶之象也戶則器也制之於棟宇之初者法也千萬世由之而不能離者神也皆言戶也知戶之説則知乾坤之説聖人偶有觸於一物而發明乾坤之妙如此知此者謂之知易觀天地則圖書與得諸此戶無異也先儒觀及斷公事之説亦然雲峯胡氏曰此章本義以為專言卜筮此假若從卜筮説闔戶謂之坤者四十九䇿之合也闢戶謂之乾者四十九䇿之分也一合一分是謂蓍之變分合進退之中有往來不窮之妙是謂蓍之通見而為七八九六之數謂之象形而為剛柔動靜之爻謂之器此乃聖人制為卜筮以教人是為揲蓍之法民一出一入咸用之以為利則為用蓍之神平庵項氏曰第三節言畫卦布爻之法以是故發辭闔戶謂之坤言畫偶爻也凡偶皆屬隂闢戶謂之乾言畫竒爻也凡竒皆屬乾一闔一闢謂之變六爻既成剛柔相雜言成卦也往來不窮謂之通九六之動交相往來言之卦也皆自神而明之也按其迹而言見於蓍䇿謂象形於卦爻謂器制用之謂卜筮之法可謂明矣究其用言之枯莖敗葉而內外靜作之務皆資於利用王公皂𨽻之人皆用以決疑極深研幾其妙如此豈非天下至神乎此自明而神也此下復推明制作之本是故易有大極是生兩儀兩儀生四象四象生八卦大音泰本義一每生二自然之理也易者隂陽之變大極者其理也兩儀者始為一畫以分隂陽四象者次為二畫以分太少八卦者次為三畫而三才之象始備此數言者實聖人作易自然之次第有不假絲毫智力而成者畫卦揲蓍其序皆然詳見序例啓蒙朱子曰天地之間只有動靜兩端循環不已更無餘事此之謂易而其動其靜必有所以動靜之理焉是則所謂太極也易有太極便是下面兩儀四象八卦自三百八十四爻總為六十四自六十四總為八卦自八卦總為四象自四象總為兩儀自兩儀總為太極以物論之易之有太極如木之有根浮圖之有頂但木之根浮圖之頂是有形之極太極却不是一物無方所頓放是無形之極故周子曰無極而太極是他説得有功處然太極之所以為太極却不離乎兩儀四象八卦如一隂一陽之謂道指一隂一陽為道則不可然道不離乎隂陽也易有太極是生兩儀即所謂易也但先倒説此一句故曰易有太極太極十全是具一個善若三百八十四爻中有善有惡皆隂陽變化後方有邵子康節説太極是和隂陽袞説易中便擡起説周子言太極動而生陽靜而生隂動時便是陽之太極靜時便是隂之太極蓋太極只在陰陽裏如易有太極是生兩儀則先從實理處説若説其生則俱生太極依舊在陰陽裏但言其次序須有這實理方始有陰陽也其理則一雖然自見在事物而觀之則陰陽函太極推其本則太極生陰陽問一陰一陽上又各生一陰一陽之象以圖言之兩儀生四象四象生八卦節節推去固容易見就天地間著實處如何驗得曰一物上自各有陰陽如人之男女陰陽也逐人身上又各有這血氣血陰而氣陽也如晝夜之間晝陽也夜陰也而晝陽自午後屬陰夜陰自子後又是陽此便是陰陽各生陰陽之象南軒張氏曰易者生生之妙而太極者所以生生者也八卦定吉凶吉凶生大業本義有吉有凶是生大業朱子曰卦畫既立便有吉凶在裏蓋是陰陽往來交錯於其間時則有消長之不同長者便為主消者便為客事則有當否之或異當者便為善否者便為惡即其主客善惡之辨而吉凶見矣故曰八卦定吉凶吉凶既決定而不差則以之立事而大業自此生矣雲峯胡氏曰易有交易之義上文所謂闔闢往來者易也故承上文而言其所以闔闢往來而不窮者以其有是太極之理也此章所謂兩儀四象八卦即易也又原其始而言者惟其有太極之理所以生儀生象生卦而謂之易也以畫卦則始為一畫以分陰陽而謂之兩儀次為二畫以分老少謂之四象又次為三畫而謂之八卦以揲蓍則一揲而有兩儀之象次二揲而有四象之象又三揲而有八卦之象自一生兩皆有太極之理存焉吉凶生大業有理必有用也臨川吳氏曰易謂陽竒陰偶互相更換而為四象八卦也大者大之至也極者屋棟之名天地間之有此理猶屋之有極也易有太極謂一陰一陽之相易有理而為之主宰也儀匹也一隂一陽相匹配而為兩卦之第一畫也是謂兩儀兩儀之上各加一陰一陽則倍二而為四卦之第二畫也是謂四象四象之上又各加一陽一陰則倍四而為八卦之第三畫也是謂八卦有此八卦則其别有六十四而可用之占筮以定吉凶俾民無所疑而勇於趨事赴功故曰生大業此蓋申言方以知之卦因及卜筮者所尚之占二四而八卦之方也定吉凶生大業者其知也平庵項氏曰自太極以至末章為第四節極言聖人制作之本然制作之本有三易有太極以下六句言爻象之所由生法象莫大乎天地以下六句言成器之所由立天生神物以下四者為易書之所由作是故法象莫大乎天地變通莫大乎四時縣象著明莫大乎日月崇高莫大乎富貴備物致用立成器以為天下利莫大乎聖人探賾索隱鈎深致遠以定天下之吉凶成天下之亹亹者莫大乎蓍龜縣音玄探吐南反索色白反本義富貴謂有天下履帝位立下疑有闕文亹亹猶勉勉也疑則怠決故勉朱子曰探賾索隱若與人説話時也須聽他雜亂説將出來底方可索他那隱底問以定天下之吉凶成大下之亹亹曰人到疑而不能決處便放倒了不肯向前動有疑阻既得卜筮知其吉凶自然勉勉住不得則其所以亹亹者是卜筮成之也易占不用龜而每言蓍龜皆具此理也進齋徐氏曰法謂效法象謂成象萬物之生有顯有微皆法象也而莫大乎天地萬化之運終則有始皆變通也而莫大乎四時天文煥爛皆懸象著明也而莫大乎日月崇髙以位言而貴為天子富有四海者為尤大智者創物巧者述之皆足以為利而物無不備用無不致立成器以為天下利者惟聖人為大賾隱以物象言深逺以事理言探之索之則賾者陳而隱者顯矣鈎謂曲而取之致謂推而極之則深者出而逺者至矣卦爻示人者明若觀火則有以決其吉凶而勉其有成也故曰成天下之亹亹者莫大乎蓍龜上三言以易之在造化者言也下三言以易之在人事者言也天地有自然之法象非崇髙富貴位與天地並何以修道而立教四時有自然之變通非聖人作易變通盡利何以神化而宜民日月之明旁燭幽遐非易之示人本隱之顯何以開物成務是三言者各有所合也雲峯胡氏曰此六者之功用皆大也聖人欲借彼之大以形容蓍龜功用之大故以是終焉節齋蔡氏曰經文立字下當有象字是故天生神物聖人則之天地變化聖人效之天垂象見吉凶聖人象之河出圖洛出書聖人則之見賢遍反本義此四者聖人作易之所由也河圖洛書詳見啓蒙雙湖胡氏曰神物謂蓍則之而四十九之用以行變化謂陰陽效之而卦爻之動靜以備象謂日月星辰循度失度而吉凶見象之而卦爻有以斷吉凶圖書則金木水火土生成克制之數則之而卦畫方位以定皆作易之本也南軒張氏曰通於天者河也有龍馬負圖而出此聖人之德上配於天而天降其祥也中於地者洛也有神龜戴書而出聖人之德下及於地而地呈其瑞也聖人則之故易興於世然後象數推之以前民用卦爻推之以前民行而示天下後世也雲峯胡氏曰四者言聖人作易之由而易之所以作由於卜筮故又以天生神物始焉易有四象所以示也繫辭焉所以告也定之以吉凶所以斷也斷丁亂反本義四象謂陰陽老少示謂示人以所值之卦爻錢氏藻曰有其象無其辭則示人以其意而已聖人懼後世不能與知也於是係之辭以告之定其辭以斷之曰示則使人有所見曰告則使人有所知曰斷則使人無所疑漢上朱氏曰聖人所以示人吉凶也易於吉凶有以利言者有以情遷者有義命當吉當凶當亨當否者一以貞勝而不顧非聖人不能定之也定之者所以斷之雲峯胡氏曰示四象所以開物繫辭斷吉凶則可以成務而天下之道無不在其中此蓋總一章專言卜筮之意也右第十一章本義此章專言卜筮雙湖胡氏曰此章凡八稱聖人皆指伏羲只繫辭以告是文王周公事首揭夫易何為者也一句為問辭喚起一章大意而以夫易開物以下為答辭盡説歸卜筮其下六個是故一個是以皆發明卜筮之事第一個是故説聖人以通以定以斷總言卜筮之綱也第二個是故言聖人以此洗心第三個是以言聖人以此齋戒此即卜筮以用卜筮也第四個是故分言闔戶為坤闢戶為乾以明畫卦布爻之法第五個是故提起易有太極以論生儀象卦之法亦揲蓍求卦之象第六個是故雖論天地四時日月實歸重聖人有富貴之位能致用立器以利天下而必以蓍龜亹亹者結之亦聖人之事也至第七個是故四致意於聖人則之效之象之則之而未及文王周公之辭焉故本義謂此章專言卜筮而伏羲畫卦之法其綱領已備見於是而圖書為作易之原亦因是而發焉此皆不可不知也易曰自天祐之吉無不利子曰祐者助也天之所助者順也人之所助者信也履信思乎順又以尚賢也是以自天祐之吉無不利也本義釋大有上九爻義然在此無所屬或恐是錯簡宜在第八章之末漢上朱氏曰天之所助者順也人之所助者信也六五履信而思乎順又自下以尚賢是以自天祐之吉無不利言此明獲天人之理然後吉無不利聖人明於天之道而察於民之故合天人者也柴氏中行曰聖人興易以示天下欲居則觀其象而玩其辭動則觀其變而玩其占捨逆取順避凶趨吉而已六十四卦中如大有上九爻辭之順道而獲吉者多矣夫子於此再三舉之者以自天祐之吉無不利之辭深見人順道而行自與吉會之意子曰書不盡言言不盡意然則聖人之意其不可見乎子曰聖人立象以盡意設卦以盡情偽繫辭焉以盡其言變而通之以盡利鼓之舞之以盡神本義言之所傳者淺象之所示者深觀竒偶二畫包含變化無有窮盡則可見矣變通鼓舞以事而言兩子曰字疑衍其一蓋子曰字皆後人所加故有此誤如近世通書乃周子所自作亦為後人每章加以周子曰字其設問答處正如此也或問書不盡言言不盡意一章朱子曰立象盡意是觀竒偶兩畫包含變化無有窮盡設卦以盡情偽謂有一竒一偶設之於卦自是盡得天下情偽繫辭焉便斷其吉凶變而通之以盡利此言占得此卦陰陽老少交變因其變便有通之之理鼓之舞之以盡神未占得則有所疑既占則無所疑自然使得人腳輕手快行得順便如大衍之後言顯道神德行是故可與酬酢可與祐神定天下之吉凶成天下之亹亹皆是鼓之舞之之意問書不盡言言不盡意是聖人設問之辭曰也是如此亦是言不足以盡意故立象以盡意書不足以盡言故因繫辭以盡言又言書不盡言言不盡意是元舊有此語立象以盡意不獨見聖人有這意思寫出來自是他象上有這意設卦以盡情偽不成聖人有情又有偽自是卦上有這情偽但今曉不得他那處是偽如下云中心疑者其辭支誣善之人其辭遊也不知如何是支是遊看來情偽只是個好不好如剝五陰只是要害一個陽這是不好底情便是偽如復如臨便是好底卦便是真情歐公謂書不盡言言不盡意者非蓋他不曾看立象以盡意一句惟其言不盡意故立象以盡之學者於言上會得者淺於象上會得者深問立象設卦繫辭是聖人發其精意見於書變通鼓舞是聖人推而見於事否曰是變而通之以盡利鼓之舞之以盡神立象設卦繫辭皆謂卜筮之用而天下之人方知所以避凶趨吉奮然有所興作不知手之舞之足之蹈之之意故曰定天下之吉凶成天下之亹亹者莫大乎蓍龜猶催迫天下之人勉之為善相似問變而通之如禮樂刑政皆天理之自然聖人但因而為之品節防範以為教於天下鼓之舞之蓋有以作興振起之使之遷善而不自知否曰鼓之舞之便無所用力自是聖人教化如此政教皆有鼓舞但樂占得分數較多自是樂會如此而不自知問鼓之舞之以盡神又言鼓天下之動者存乎辭鼓舞恐只是振揚發明底意思否曰然蓋提撕警覺使人各為其所當為也如初九當潛則鼓之以勿用九二當見則鼓之以利見大人若無辭則都發不出了臨川吳氏曰立象謂羲皇之卦畫所以示者也盡意謂無言而與民同患之意悉具於其中設卦謂文王設立重卦之名也盡情偽謂六十四各足以盡天下事物之情其情之本乎性而善者曰情情之拂乎性而不善者曰偽辭謂文王周公之彖爻所以告者也羲皇之卦畫足以盡意矣文王又因卦之象設卦之名以盡情偽然卦雖有名而未有辭也又繫彖辭爻辭則足以盡其言矣此三句答上文不盡言不盡意二語設卦一句在立象之後繫辭之前蓋竟盡意之緒啓盡言之端也盡意盡情偽盡言者皆所以為天下利又恐其利有所未盡於是作揲蓍十有八變之法使其所用之策往來多少相通不窮而其所得之卦一可為六十四亦相通不窮其象其辭皆可通用而不局於一則其用愈廣而足以盡利矣因變得占以定吉凶則民皆無疑而行事不倦如以鼓聲作舞容鼓聲愈疾而舞容亦愈疾鼓聲不已而舞容亦不已自然而然不知其孰使之者所謂盡神也項氏云立象設卦繫辭三盡者作易之事變通鼓舞二盡者用易之事愚謂立象設卦象也繫辭辭也變通變也鼓舞占也乾坤其易之緼耶乾坤成列而易立乎其中矣乾坤毁則無以見易易不可見則乾坤或幾乎息矣幾音機程子曰乾健坤順人亦不曾果是體認得乾坤毁則無以見易本義緼所包蓄者猶衣之著也易之所有陰陽而已凡陽皆乾凡陰皆坤畫卦定位則二者成列而易之體立矣乾坤毁謂卦畫不立乾坤息謂變化不行朱子曰乾坤其易之緼耶乾坤成列而易立乎其中這又只是言立象以盡意設卦以盡情偽易不過只是一個陰陽竒偶千變萬變則易之體立若竒偶不交變竒純是竒偶純是偶去那裏見易易不可見則陰陽竒偶之用亦何自而辨問在天地上如何曰關天地什麼事此是説易不外竒偶兩物而已自易道統體而言則乾陽坤陰一動一靜乃其緼也自乾坤成列而觀之則易之為道又不在乾坤之外唯不在外故曰乾坤毁則無以見易然易不可見則乾自乾坤自坤故又曰易不可見則乾坤或幾乎息矣乾坤其易之緼緼如緼袍之緼是個胎骨子又曰易是包著此理乾坤即是易之體骨易之言乾坤者多以卦言易立乎其中只是言乾坤之卦既成而易立矣又曰乾坤成列易立乎其中乾坤只是説二卦此易只是説易之書與天地設位而易行乎其中之易不同行乎其中者却是説易之道理又曰天地設位而易行乎其中以造化言之也乾坤成列而易立乎其中以卦位言之也乾坤成列便是乾一兌二離三震四卦都成列了其變易方立乎其中若只是一隂一陽則未有變易在又曰易有太極則以易為主此一段文意則以乾坤為主問乾坤成列是説兩畫之列是説八卦之列曰兩畫也是列八卦也是列乾坤毁則無以見易易只是陰陽卦畫沒這幾個卦畫憑個甚寫出那隂陽造化何處更得易來這只是反覆説易不可見則乾坤或幾乎息只是説揲蓍求卦别更推不去説做造化之理息也得不若前説較平潛室陳氏曰本義云乾坤毁謂卦畫不立乾坤息謂變化不行此據先天圖言謂落筆之初陽畫在右陰畫在左只此二畫分左右成行列而一部易書已在其中設若當時分此兩畫不成則易書無自而見便是乾坤毁無以見易設若當時作此易書不成則二畫幾於歇滅無用便是易不可見則乾坤息此意雖主説易書然天地大化亦只如是誠齋楊氏曰六十四卦其陽爻皆乾之自出其陰爻皆坤之自出乾坤二卦乃六十四卦之奧府三百八十四爻之寶藏乾坤立則易立乾坤隱則易隱非乾坤有毁息之理也言易與乾坤不可以相無也建安丘氏曰易未嘗無乾坤亦未當息特以卦畫不立無以見其變易之理而併於乾坤之功用不可得而見爾雲峯胡氏曰乾坤即是竒偶二畫易以道言畫以兩而相並故曰列道以一而隱乎其中故曰立乎其中畫不立則道無由而自見道不著則畫不能以自行是故形而上者謂之道形而下者謂之器化而裁之謂之變推而行之謂之通舉而措之天下之民謂之事業程子曰有形皆器也無形為道形而上為道形而下為器須著如此説器亦道道亦器也繫辭曰形而上者謂之道形而下者謂之器又曰立天之道曰陰與陽立地之道曰柔與剛立人之道曰仁與義又曰一陰一陽之謂道陰陽亦形而下者也而曰道者唯此語截得上下最分明元來只此是道要在人默而識之也如形而上者謂之道不可移謂字在之字下此孔子文章形而上者謂之道形而下者謂之器若如或者以清虛一大為天道則乃以器言而非道也佛氏不識陰陽晝夜死生古今安得謂形而上者與聖人同乎張子曰形而上者是無形體故謂之道形而下者是有形體故謂之器無形迹者即道也如大德敦化是也有形迹者即器也見於事實是也又曰聖人因天地之化裁節而立法使民知寒暑之變故為之春夏秋冬亦化裁之一端爾朱子曰形而上者謂之道形而下者謂之器形而上者指理而言形而下者指事物而言事事物物皆有其理事物可見而其理難知即事即物便見得此理只是如此看又曰形而上底虛渾是道理形而下底實便是器這個分説得極精切故明道云唯此語截得上下最分明又曰道是道理事事物物皆有個道理器是形迹事事亦皆有個形迹有道即有器有器須有道物必有則又曰可見底是器不可見底是道理是道物是器問形而上下如何以形言曰此言最的當設若以有形無形言之便是物與理相間斷了所以謂攔截得分明者只是上下之間分别得一個界至分明器亦道道亦器有分别而不相離也問伊川云形而上謂道形而下謂器須著如此説曰這是伊川見得分明故云須著如此説形而上者是理形而下者是物如此開説方見得分明如此了方説得道不離乎器器不違乎道處如為君須止於仁為臣須止於敬為子須止於孝這皆是道理合如此若不恁地索性兩邊説怎生説得通又曰器亦道道亦器也道未嘗離乎器道只是器之理這人身是器語言動作便是人之理理只在器上理與器未嘗相離問明道云陰陽亦形而下者而曰道只此兩句截得上下分明截字莫是斷字誤曰正是截字形而上形而下即就形處離合分别此正界至處若只説作在上在下便是兩截矣南軒張氏曰道不離形特形而上者而已器具於道以形而下者也易之論道器特以一形上下而言之也然道雖非器而道必託於器禮樂刑賞是治天下之道也禮雖非玉帛而禮不可以虛拘樂雖非鐘鼓而樂不可以徒作刑本遏惡也必託於甲兵必寓於鞭朴賞本揚善也必表之以旗常銘之以鍾鼎故形而上者之道託於器而後行形而下者之器得其道而無弊故聖人悟易於心覺易於性在道不溺於無在器不隨於有也潛室陳氏曰一物必有一理道即器中之理器既有形道即因而顯此是分開不得底事先聖欲悟後學不余何指開示人所以具言形者見得本是一物若除了此字止言上者謂之道下者謂之器却成二片矣本義卦爻陰陽皆形而下者其理則道也因其自然之化而裁制之變之義也變通二字上章以天言此章以人言或問形而上者謂之道形而下者謂之器如何分形器朱子曰形而上者是理才有作用便是形而下者問陰陽如何是形而下者曰一物便有陰陽寒暖生殺皆見得是形而下者事物雖大皆形而下者理雖小皆形而上者問形而上者謂之道一段只是這一個道理但即形器之本體而不離乎形器則謂之道就形器而言則謂之器聖人因其自然化而裁之則謂之變推而行之則謂之通舉而措之則謂之事業裁也行也措也都只是裁行措這道曰是化而裁之謂之變推而行之謂之通這是兩截不相干化而裁之屬前項事漸漸化去裁制成變則謂之變推而行之屬後項事謂推而為别一卦了則通行無礙故舉而措之天下謂之事業便只是定天下之吉凶成天下之亹亹者化而裁之方是分下頭項推而行之便是見於事如堯典分命羲和許多事便是化而裁之到敬授人時便是推而行之化而裁之謂之變推而行之謂之通裁是裁截之義謂如一歲裁為四時一時裁為三月一月裁為三十日一日裁為十二時此是變也又如陰陽兩爻自此之彼自彼之此若不截斷則豈有定體通是通其變將已裁定者推行之即是通謂如占得乾之履便是九三變如乾乾不息則是我所當行者以此措之於民則謂之事業也又曰化而裁之化是因其自然而化裁是人為變是變了他且如一年三百六十日須待一日日漸次進去到那滿時這便是化自春而夏夏而秋秋而冬聖人去這裏截做四時這便是變又曰只在那化中裁截取便是變如子丑寅卯十二時皆以漸而化不見其化之之迹及亥子時便截取子屬明日所謂變也問易中多言變通通字之意如何曰處得恰好處便是通問往來不窮謂之通如何曰處得好便不窮通便不窮不通便窮問推而行之謂之通如何曰推而行之便就這上行將去且如亢龍有悔是不通了處得來無悔便是通變是就時就事上説通是就上面處得行處説故曰通其變只要常教流通不窮問如貧賤富貴夷狄患難這是變行乎富貴行乎貧賤行乎夷狄行乎患難至於無入而不自得是通否曰然誠齋楊氏曰此一節所以别言易道之體極言易道之用也何謂體曰道曰器是也何謂用曰變曰通曰事業是也雲峯胡氏曰形者謂動而可見之時自此而上則無體故謂之道即上文所謂易也自此而下則有體故謂之器即上文所謂乾坤竒偶之畫也理一而神氣兩而化聖人因其自然之化而裁制之故謂之變理無窮畫之生也亦無窮聖人則裁制之為六畫裁為上下為內外裁有定體行無定用如乾之變當潛而行潛之事則潛為通當見而行見之事則見為通事者業之未成業者事之已著是故夫象聖人有以見天下之賾而擬諸其形容象其物宜是故謂之象聖人有以見天下之動而觀其會通以行其典禮繫辭焉以斷其吉凶是故謂之爻本義重出以起下文臨川吳氏曰象其物宜謂文王之象申設卦以盡情偽一句繫辭以定吉凶謂周公之爻申繫辭焉以盡其言一句極天下之賾者存乎卦鼓天下之動者存乎辭本義卦即象也辭即爻也朱子曰極天下之賾者存乎卦謂卦體之中備陰陽變易之形容鼓天下之動者存乎辭是説出這天下之動如鼓之舞之相似卦即象也辭即爻也大抵易只是一個陰陽竒偶而已此外更有何物雲峯胡氏曰窮天地萬物之象而歸諸卦故曰極發天地萬物之理而見乎辭故曰鼓化而裁之存乎變推而行之存乎通神而明之存乎其人默而成之不言而信存乎德行行下孟反程子曰易因爻象論變化因變化論神因神論人因人論德行大體通論易道而終於默而成之不言而信存乎德行問繫辭自天道言中庸自人事言似不同曰同繫辭雖始從天地陰陽鬼神言之然卒曰默而成之不言而信存乎德行中庸亦曰鬼神之為德其盛已乎視之而不見聽之而不聞體物而不可遺使天下之人齊明盛服以承祭祀洋洋乎如在其上如在其左右詩曰神之格思不可度思矧可射思夫微之顯誠之不可掩如此夫是豈不同本義卦爻所以變通者在人人之所以能神而明之者在德或問化而裁之謂之變化而裁之存乎變如何分朱子曰上文化而裁之喚做變下是就這變處見得化而裁之變化字多相對説化裁之變又説得來重如云幽則有鬼神鬼神本皆屬幽然以鬼神二字相對説則鬼屬幽神又自屬明變化相對説則變是長化是消神而明之一段却與形而上謂之道相對説自形而上謂之道説至於變通事業是自至約處説入至粗處自極天下之賾者存乎卦至神而明之又自至粗上説入至約處默而成之不言而信則説得又微矣建安丘氏曰上文五謂者皆聖人作易之用此六存者則聖人之用夫易也前言變通而歸之事業推易道於民也此言變通而歸之德行存易道於己也雲峯胡氏曰自形而上之道至事業由至微推出至著自極天下之賾至德行由至者收歸至微上繫凡十二章末乃曰書不盡言言不盡意蓋欲學者自得於書言之外也自立象盡意至鼓天下之動者存乎辭反覆見之書言可謂盡矣末乃曰默而成之不言而信存乎德行然則易果書言之所能盡哉得於心為德履於身為行易之存乎人者蓋有存乎心身而不徒存乎書言者矣右第十二章誠齋楊氏曰此章言聖人作易之意其散在六十四卦之爻象其聚在乾坤之二卦聖人用易之道其散在天下之事業其聚在一身之德行也又曰易有三一曰天易二曰竹易三曰人易天尊地卑乾坤定矣天易也書不盡言言不盡意竹易也存乎其人存乎德行人易也有聖人焉能行易之道神而明之默而成之則易不在天不在竹而在人矣周易傳義大全卷二十二
