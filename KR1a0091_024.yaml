body:
  text: 周易傳義大全卷十八明胡廣等撰巽下離上傳鼎序卦革物者莫若鼎故受之以鼎鼎之為用所以革物也變腥而為熟易堅而為柔水火不可同處也能使相合為用而不相害是能革物也鼎所以次革也為卦上離下巽所以為鼎則取其象焉取其義焉取其象者有二以全體言之則下植為足中實為腹受物在中之象對峙於上者耳也橫亘乎上者鉉也鼎之象也以上下二體言之則中虛在上下有足以承之亦一無亦字鼎之象也取其義則木從火也巽入也順從之義以木從火為然之象火之用唯燔與烹燔不假器故取烹象而為鼎以木㢲火烹飪之象也制器取其一作諸象也乃象器以為卦乎曰制器取於象也象存乎卦而卦不必先器聖人制器不待見卦而後知象以衆人之不能知象也故設卦一無卦字以示之卦器之先後不害於義也或疑鼎非自然之象乃人為也曰固人為也然烹飪可以成物形制如是則可用此非人為自然也在井亦然器雖在卦先而所取者乃卦之象卦復用器以為義也朱子曰鄭少梅說易象亦有是者如鼎卦分明是鼎之象兼山郭氏曰聖人名卦必以道獨井鼎以器者道器一也由道可見器由器可推道也雙湖胡氏曰易六十四卦取象凡三頤井鼎是也頤則象在卦先井鼎則制器必在卦後卦伏羲所作凡天下之器寧有先於卦者乎鼎以形言則足腹耳鉉已具以質言則乾兌皆金㢲亦兌金反體又有㢲木離火兌水以致烹飪之用而㢲雞乾亥豕犬坤牛兌羊離雉黿鼉之屬亦皆足充鼎之實而成其致養之功矣雲峯胡氏曰人所需者飲食飲食所需者鼎與井革茹毛而為火食包羲有取於鼎也尚矣後世制器尚易之象而伏羲畫井鼎之象則已取諸井鼎之器矣鼎元吉亨傳以卦才言也如卦之才可以致元亨也止當云元亨文羡吉字卦才可以致元亨未便有元吉也彖復止云元亨其羡明矣本義鼎烹飪之器為卦下隂為足二三四陽為腹五隂為耳上陽為鉉有鼎之象又以㢲木入離火而致烹飪鼎之用也故其卦為鼎下㢲㢲也上離為目而五為耳有內㢲順而外聰明之象卦自㢲來隂進居五而下應九二之陽故其占曰元亨吉衍文也雙湖胡氏曰卦辭元亨之占凡四大有蠱升鼎是也自元亨外無餘辭唯大有與鼎大有以一隂有五陽而為大亨鼎有天下之重器其占固宜與大有同矣又非蠱升所可同日語也若常人占得二卦隨其高下亦有元亨之義雲峯胡氏曰大有與鼎卦名下直言元亨孔子以卦才言之文王之初意謂大有六五虛中在上而能有衆陽之大所以大亨鼎變生而熟化剛而柔水火不同處而能使相為用可以養人亨亦大矣彖曰鼎象也傳卦之為鼎取鼎之象也鼎之為器法卦之象也一作法象之器也有象而後有器卦復用器而為義也鼎大器也重寶也故其制作形模法象無嚴鼎之名正也古人訓方方實正也以形言則耳對植於上足分峙於下周圓內外高卑厚薄莫不有法而至正至正然後成安重之象故鼎者法象之器卦之為鼎以其象也縉雲馮氏曰六十四卦皆象而鼎獨言象孔穎逹曰鑄金為之而有法象也鄱陽董氏曰子夏傳云初分趾也次實腹也中虛耳也上剛鉉也故曰鼎象也以木㢲火亨飪也聖人亨以享上帝而大亨以養聖賢亨普庚反飪入甚反傳以二體言鼎之用也以木㢲火以木從火所以亨飪也鼎之為器生人所賴至切者也極其用之大則聖人亨以享上帝大亨以養聖賢聖人古之聖王大言其廣本義以卦體二象釋卦名義因極其大而言之享帝貴誠用犢而已養賢則饔飱牢禮當極其盛故曰大亨開封耿氏曰㢲乎水而上水者非井也井汲引之用也以木㢲火者非鼎也鼎烹飪之用也中溪張氏曰鼎者所以制器而取象也以木㢲火㢲入也木入火然則可以成烹飪之用聖人制器豈自為口體之奉而已享上帝尚質故止曰亨養聖賢貴豐盛故曰大亨節齊蔡氏曰亨飪不過祭祀賓客二事而祭之大者無出於上帝賓客之重者無過於聖賢雲峯胡氏曰剝曰觀象也即畫是象此曰鼎象也又於畫中取器之象享帝養聖賢鼎之用莫大於此矣故極言之㢲而耳目聰明柔進而上行得中而應乎剛是以元亨上時掌反傳上既言鼎之用矣復以卦才言人能如卦之才可以致元亨也下體㢲為㢲順於理離明而中虛於上為耳目聰明之象凡離在上者皆云柔進而上行柔在下之物乃居尊位進而上行也以明居尊而得中道應乎剛能用剛陽之道也五居中而又以柔而應剛為得中道其才如是所以能元亨也本義以卦象卦體卦變釋卦辭西溪李氏曰下㢲上離離為目五為鼎耳故曰㢲而耳目聰明中溪張氏曰上體離也離為目而兼耳言之者蓋以六五為鼎耳而取也五以柔進而上行得上卦之中而下應九二之剛是以能大善而亨通也雲峯胡氏曰柔進而上行得中而應乎剛雖與睽同然在鼎則㢲㢲也上離為目而五為耳有內㢲順而外聰明之象在睽則說而麗乎明與㢲而耳目聰明者不同故彼特曰小事吉此則元亨雖其時之不同亦其德之異也象曰木上有火鼎君子以正位凝命傳木上有火以木㢲火也亨飪之象故為鼎君子觀鼎之象以正位凝命鼎者法象之器其形端正其體安重取其端正之象則以正其位謂正其所居之位君子所處必正其小至於席不正不坐毋跛毋倚取其安重之象則以凝其命令安重其命令也凝聚止之義謂安重也今世俗有凝然之語以命令而言耳凡動為皆當安重也朱子曰正位凝命恐伊川說得未然此言人君臨朝也須端莊安重一似那鼎相似安在這裏不動然後可以凝住那天之命如所謂協于上下以承天休童溪王氏曰夫鼎之為器也其形端正其體鎮重其用日新故鼎之奠於此也而木上之火亦凝然於此而後烹飪之功見焉君子之觀此象也則亦正其位而已矣其位既正其命令遂於此而凝焉如木火之凝然於鼎也則造化之功亦於此見矣蓋木火相資以成造化有凝命之象凝聚也中庸曰苟不至德至道不凝焉豫亦曰苟不木火鼎之用不凝焉然則鼎之用不凝則鼎也者無用之器也君子之命不凝則位也者亦豈非無用之器乎本義鼎重器也故有正位凝命之意凝猶至道不凝之凝傳所謂協于上下以承天休者也平庵項氏曰鼎之木上有火猶井之木上有水非井鼎本形特象之耳草木皆具水火之氣其生也水氣升於上水至木杪則為滋液象井泉之上出也其成也火氣見於上火至木杪則為華實象鼎氣之上蒸也君子觀井象則當務民於下以豐其液觀鼎象則當恭己於上以凝其氣存神以息氣人所以凝壽命中心無為以守至正君所以凝天命火之光雖在木上而其命必藏於木木盡則火亡矣正位象離離為聽政之位凝命象㢲㢲為命東谷鄭氏曰革以改命鼎以凝命知革而不知鼎則天下之亂滋矣建安丘氏曰革者變也聖人於革凡四言改命而受革以鼎鼎象又以凝命言之蓋凝其已改之命也以鼎繼革所以示變革之後當端重以守之其旨微矣雲峯胡氏曰釋者皆以命為命令本義獨以為天命鼎之器正然後可凝其所受之實君之位正然後可凝其所受之命正者端莊安重之謂也初六鼎顛趾利出否得妾以其子無咎出尺逐反又如字否音鄙傳六在鼎下趾之象也上應於四趾而向上顛之象也鼎覆則趾顛趾顛則覆其實矣非順道也然有當顛之時謂傾出敗惡以致潔取新則可也故顛趾利在於出否否惡也四近君大臣之位初在下之人而相應乃上求於下下從其上也上能用下之善下能輔上之為可以成事功乃善道如鼎之顛趾有當顛之時未為悖理也得妾以其子無咎六隂而卑故為妾得妾謂得其人也若得良妾則能輔助其主使無過咎也子主也以其子致其主於無咎也六隂居下而卑㢲從陽妾之象也以六上應四為顛趾而發此義初六本無才德可取故云得妾言得其人則如是也本義居鼎之下鼎趾之象也上應九四則顛矣然當卦初鼎未有實而舊有否惡之積焉因其顛而出之則為利矣得妾而因得其子亦由是也此爻之象如此而其占無咎蓋因敗以為功因賤以致貴也或問鼎顛趾利出否無咎據此爻是凡事須用與他翻轉了却能致利朱子曰不然只是偶然如此此本是不好底爻却因禍致福所謂不幸中之幸蓋鼎顛趾本是不好却因顛仆而傾出鼎中惡穢之物所以反得利而無咎非是故意欲翻轉鼎趾而求利也得妾以其子得妾是無緊要其重却在以其子處顛趾利出否伊川說是得妾以其子無咎彼謂子為王公在喪之稱者恐不然臨川吳氏曰否不善之物謂鼎中之穢惡也當鼎之初未實牲體正當洗濯之時顛其趾以傾出其穢惡故趾雖顛而於出否則為利也雙湖胡氏曰初位之剛六爻之柔以初得六得妾之象也爻不正故稱妾下㢲伏震長子之象也主器有人無咎之道也雲峯胡氏曰此爻象中取象顛趾非利出否則為利得妾未為重有子則可重矣隂柔在下於鼎為趾象於人則又為妾象鼎偶顛趾而有出否之利是因敗以為功也又因得妾而遂有得子之慶是因賤以致貴也天下事固自有偶如此者非可有心以致之也西溪李氏曰全體一鼎分上下體為二鼎上體之鼎有兩耳而無足故九四之鼎折足下體之鼎有足而無耳故九三之鼎耳革六爻皆取鼎象故曰鼎象也象曰鼎顛趾未悖也傳鼎覆而趾顛悖道也然非必為悖者蓋有傾出否惡之時也利出否以從貴也傳去過而納新瀉惡而受美從貴之義也應於四上從於貴者也本義鼎而顛趾悖道也而因可出否以從貴則未為悖也從貴謂應四亦為取新之意建安丘氏曰鼎而顛倒其趾似悖理矣然物忌顛覆惟鼎則以顛覆而除惡故亦未為悖也白雲郭氏曰從貴者否為賤而潔新為貴也九二鼎有實我仇有疾不我能即吉傳二以剛實居中鼎中有實之象鼎之有實上出則為用二陽剛有濟用之才與五相應上從六五之君則得正而其道可亨然與初密比隂從陽者也九二居中而應中不至失正己雖自守彼必相求故戒能逺之使不來即我則吉也仇對也隂陽相對之物謂初也相從則非正而害義是有疾也二當以正自守使之不能來就己人能自守以正則不正不能一有以字就之矣所以吉也本義以剛居中鼎有實之象也我仇謂初隂陽相求而非正則相陷於惡而為仇矣二能以剛中自守則初雖近不能以就之矣是以其象如此而其占為如是則吉也進齊徐氏曰怨耦曰仇不善之匹也謂二五為正應而密比初柔隂陽相匹而非正是初為我仇也即就也初自顛趾有疾也不能就二是我仇有疾不我能即也故吉雲峯胡氏曰鼎諸爻與井相似井以陽剛為泉鼎以陽剛為實井九二有泉象下比初六則有射鮒之象鼎九二有實象下比初六則有我仇之象井初為泥二視之為鮒鼎初為否二視之為疾皆隂惡之象也井二無應故其功終不上行鼎二有應而能以剛中自守故初雖近不能就之而吉象曰鼎有實慎所之也傳鼎之有實乃人之有才業也當慎所趍向不慎所往則亦陷於非義二能不䁥於初而上從六五之正應乃是慎所之也雷氏曰慎所之者物各有量可中不可過不自知止猶往求之則至傾覆而喪所有矣我仇有疾終無尤也傳我仇有疾舉上文也我仇對己者謂初也初比己而非正是有疾也既自守以正則彼不能即我所以終無過尤也本義有實而不慎一作謹其所往則為仇所即而陷於惡矣九三鼎耳革其行塞雉膏不食方雨虧悔終吉行下孟反塞悉則反傳鼎耳六五也為鼎之主三以陽居㢲之上剛而能㢲其才足以濟務然與五非應而不同五中而非正三正而非中不同也未得於君者也不得於君則其道何由而行革變革為一作謂異也三與五異而不合也其行塞不能亨也不合於君則不得其任無以施其用膏甘美之物象祿位雉指五也有文明之德故謂之雉三有才用而不得六五之祿位是不得雉膏食之也君子藴其德久而必彰守其道其終必亨五有聰明之象而三終上進之物隂陽交暢則雨方雨且將雨也言五與三方將和合虧悔終吉一無此二字謂不足之悔一再有不足之悔字終當獲吉也三懷才而不偶故有不足之悔然其有陽剛之德上聰明而下㢲正終必相得故吉也三雖不中以㢲體故無過剛之失若過剛則豈能終吉林氏栗曰上無正應而承乘皆剛故有行塞之象兼山郭氏曰凡物之行以足獨鼎待鉉故以耳耳革則行塞矣進齊徐氏曰雉離象膏爻柔象謂六五亦以鼎實取象三以陽剛之才而居㢲之上其才足以有濟而於六五無相遇之道有革異之情故其行則不通於雉膏則不食猶人有才德而不為時用不得君之祿而食之也方雨虧悔終吉雨隂陽和合而成方雨且將雨也虧失也三懷才不遇有不足之悔然五有聰明之德三終上進之物方將和合而相得始雖有不足之悔而終獲相遇之吉也本義以陽居鼎腹之中本有美實者也然以過剛失中越五應上又居下之極為變革之時故為鼎耳方革而不可舉移雖承上卦文明之腴有雉膏之美而不得以為人之食然以陽居陽為得其正苟能自守則隂陽將和而失其悔矣占者如是則初雖不利而終得吉也或問鼎耳革是如何朱子曰他與五不相應五是鼎耳鼎無耳則移動不得革是換變之義他在上下之閒與五不相當是鼎耳變革了不可舉移雖有雉膏而不食此是陽爻隂陽終必和故有方雨之吉息齊余氏曰鼎九三越五應上故為耳革而行塞然三五同功亦有相合之理故曰方雨虧悔雲峯胡氏曰井鼎九三皆居下而未為時用井三如清潔之泉而不見食鼎三如鼎中有雉膏而不得以為人食然君子能為可食不能使人必食六五鼎耳三與五不相遇如鼎耳方變革而不可舉移故其行不通然五文明之主三上承文明之腴必以剛正自守五終當求之方且如隂陽和而為雨始雖有不遇之悔終當有相遇之吉井三所謂王明竝受其福者亦猶是也象曰鼎耳革失其義也傳始與鼎耳革異者失其相求之義也與五非應失求合之道也不中非同志之象也是以其行塞而不通然上明而下才終必和合故方雨而吉也進齊徐氏曰君臣以義合志也鼎耳革其行塞雉膏不食則於義乖矣故曰失其義也九四鼎折足覆公餗其形渥凶折之舌反餗送鹿反形一作刑渥一作剭音屋傳四大臣之位任天下之事者也天下之事豈一人所能獨任必當求天下之賢智與之叶力得其人則天下之治可不勞而致也用非其人則敗國家之事貽天下之患四下應於初初隂柔小人不可用者也而四用之其不勝任而敗事猶鼎之折足也鼎折足則傾覆公上之餗餗鼎實也居大臣之位當天下之任而所用非人至於覆敗乃不勝其任可羞愧之甚也其形渥謂赧汗也其凶可知繫辭曰德薄而位尊知小而謀大力小而任重鮮不及矣言不勝其任也蔽於所私德薄知小也節齊蔡氏曰足初也餗鼎實也下應乎初初趾方顛故有折足之象足折則鼎覆而失其實矣融堂錢氏曰四近君不中不正下亦以不中不正應之民心乖離我所賴以立者撥矣是鼎折足覆公餗也公餗不可只作飲食看傾敗天祿顛危宗社此正欺君罔上不實之明驗矣建安丘氏曰鼎本以烹飪而致用今乃至於折足而覆餗則享上帝養聖賢之具皆廢矣宜其凶也四處大臣之位以剛居柔下復應柔力小不能任重且所用非人無以自輔卒至敗人天下國家之事而負君上之所託亦何異乎鼎之折足而覆餗也本義朝氏曰形渥諸本作刑剭謂重刑也今從之九四居上任重者也而下應初六之隂則不勝其任矣故其象如此而其占凶也朱子曰刑剭班固使來若作形渥却只是澆濕渾身雲峯胡氏曰初顛趾四應初故有折足之象初未有鼎實故因顛趾而出否四已有鼎實故折足則餗皆覆矣否舊穢餗取新者也其形渥諸家或以為其形赭汗或以為霑濡之象皆未足以見四之凶如本義則大臣居上任重而信用隂柔之小人必有重刑之凶聞者懼矣雙湖胡氏曰按邵氏聞見後録云王弼注鼎其形渥凶以為霑濡之形也蓋弼不知古易形作刑渥作剭音屋故新唐史元載贊用刑剭亦周禮剭誅云按元載以罪誅贊云易稱鼎折足其刑剭諒哉周禮秋官司烜氏軍旅修火禁邦若剭誅鄭司農云屋誅謂夷三族屋讀如其形剭之剭謂所殺不於市而以適甸師氏者也中溪張氏曰初之顛趾即四之折足也初利而四凶何也曰初在鼎下未有實之鼎也鼎未有實則趾可顛顛之所以有出否之利四在鼎中已有實矣鼎既有實則足不可折折之則有覆餗之凶其時位不同故其吉凶亦異也又顛與折異顛則舍舊而圖新折則鼎毁而用廢矣折故凶也象曰覆公餗信如何也傳大臣當天下之任必能成天下之治安則不誤君上之所倚下民之所望與己致身任道之志不失所期乃所謂信也不然則失其職誤上之委任得為信乎故曰信如何也本義言失信也中溪張氏曰言其所信任之人果如何也六五鼎黃耳金鉉利貞鉉𤣥典反傳五在鼎上耳之象也鼎之舉措在耳為鼎之主也五有中德故曰黃耳鉉加耳者也二應於五來從於耳一作五者鉉也二有剛中之德陽體剛中色黃故為金鉉五文明得中而應剛二剛中㢲體而上應才無不足也相應至善矣所利在貞固而已六五居中應中不至於失正而質本隂柔故戒以貞固於中也本義五於象為耳而有中德故云黃耳金堅剛之物鉉貫耳以舉鼎者也五虛中以應九二之堅剛故其象如此而其占則利在貞固而已或曰金鉉以上九而言更詳之朱子曰六五金鉉只為上已當玉鉉了却下取九二之應來當金鉉蓋推卦到這裏無去處了童溪王氏曰在鼎之上受鉉以舉鼎者耳也六五之象也在鼎之外貫耳以舉鼎者鉉也上九之象也厚齊馮氏曰黃坤土之中色離之五再索於坤而在上卦之中故其色黃又曰自六五之柔言之則上為金之剛自上九之不變言之則上為玉之粹各象其物宜而已雙湖胡氏曰程傳及諸家多以六五下應九二為金鉉本義從之然猶舉或曰之說謂金鉉以上九言切謂鉉所以舉鼎者也必在耳上方可貫耳九二在下其勢不可用或說恐反為優然上九又自謂玉鉉者豈六五視上九則為金鉉以上九自視則為玉鉉乎金象以九爻取玉象以爻位剛柔相濟取皆未為不可也王氏馮氏之說亦足以發六五不正而云利貞者戒以貞則利也雲峯胡氏曰金鉉本義存兩說切謂鉉在上可以舉鼎二剛在下可謂之金不可謂之鉉不若上之剛可謂之金鉉利貞五質隂柔故因占而為之戒象曰鼎黃耳中以為實也傳六五以得中為善是以中為實德也五之所以聰明應剛為鼎之主得鼎之道皆由得中也上九鼎玉鉉大吉無不利傳井與鼎以上出為用處終鼎功之成也在上鉉之象剛而溫者玉也九雖剛陽而居隂履柔不極剛而能溫者也居成功之道唯善處而已剛柔適宜動靜不過則為大吉無所不利矣在上為鉉雖居無位之地實當用也與他卦異矣井亦然本義上於象為鉉而以陽居隂剛而能溫故有玉鉉之象而其占為大吉無不利蓋有是德則如其占也縉雲馮氏曰陽剛在上及物之功全繫此爻如舉鼎實以養人者全在於鉉陽剛無應無所回撓如玉不變於火故為玉誠齊楊氏曰鼎法象之器也初鼎之足二三四鼎之腹五鼎之耳上鼎之鉉承鼎在足實鼎有腹行鼎在耳舉鼎在鉉鼎至於鉉之舉厥功成矣西溪李氏曰玉和物也鼎道貴和得玉鉉則隂陽和而鼎之功成矣鉉一也五取金上取玉金剛而玉和五體柔故貴剛上體剛故貴和離為火而鉉居之金畏火而玉不畏火故成鼎之功以玉為貴也雲峯胡氏曰上九一陽橫亘乎鼎耳之上有鉉象金剛物自六五之柔而視上九之剛則以為金鉉玉具剛之體上九以剛居柔而又下得六五之柔則以為玉鉉鼎上爻與井皆以上出為功故彼之占元吉此之占則大吉無不利雙湖胡氏曰易三象之卦上爻皆吉井有孚元吉鼎大吉無不利頤必利而後吉者豈在于人必致其戒如是夫象曰玉鉉在上剛柔節也傳剛而溫乃有節也上居成功致用之地而剛柔中節所以大吉無不利也井鼎皆以上出為成功而鼎不云元吉何也曰井之功用皆在上出又有博施有常之德是以元吉鼎以烹飪為功居上為成德與井異以剛柔節故得大吉也建安丘氏曰五與上之鉉一也而有金玉之别何歟蓋金一於剛玉則剛而能溫也蓋五以柔中而受上之剛故取金鉉而言上九爻剛而位柔剛柔有節故取玉鉉而言而象亦以剛柔節釋之也又曰鼎卦六爻合而觀之一鼎也初畫耦而虛在鼎之下為足二三四畫竒而實居鼎之中為腹五畫耦而虛在腹之上為耳上畫奇而實貫耳之上為鉉初為足故曰顛趾二三四為腹故曰有實曰雉膏曰公餗五為耳故曰黃耳上為鉉故曰玉鉉此豈非全鼎之象乎然初曰趾四亦曰足者以四應乎初而四之足即初之趾也上曰鉉而五亦曰鉉者以五附乎上五之鉉即上之鉉也五曰耳而三亦曰耳者則以三無應乎五而有鼎耳革異之象蓋易道變通不窮義各有當也雲峯胡氏曰鼎與井皆以上出為功初之顛趾悖道也因可出否以從貴未悖幸之之辭也二有實而不慎所之則為仇所即而陷於惡戒之之辭也三不知有六五之君則為失義四下應初六之小人則為失信皆責之之辭唯五之中以為實上之剛柔節與之之辭也震下震上傳震序卦主器者莫若長子故受之以震鼎者器也震為長男故取主器之義而繼鼎之後長子傳國家繼位號者也故為主器之主序卦取其一義之大者為相繼之義震之為卦一陽生於二隂之下動而上者也故為震震動也不曰動者震有動而奮發震驚之義乾坤之交一索而成震生物之長也故為長男其象則為雷其義則為動雷有震奮之象動為驚懼之義震亨傳陽生於下而上進有亨之義又震為動為恐懼為有主震而奮發動而進懼而修有主而保大皆可以致亨故震而有亨隆山李氏曰震本坤體乾以一陽交於下上二爻隂氣凝聚陽氣在內藴結而不得出於是乎奮擊而為雷震之初動物咸懼之而不知其震動之威乃所以震隂逹陽而開其生育之門故曰震亨臨川吳氏曰雷動而萬物發生者亨也人聞雷而恐懼修省亦能致亨震來虩虩笑言啞啞虩許逆反啞烏客反傳當震動之來則恐懼不敢自寧旋顧周慮一作周旋顧慮虩虩然也虩虩顧慮不安之貌蠅虎謂之虩者以其周環顧慮不自寧也處震如是則能保其安裕故笑言啞啞啞啞言笑和適之貌震驚百里不喪匕鬯喪息浪反卦內竝同傳言震動之大而處之之道動之大者莫若雷震為雷故以雷言雷之震動驚及百里之逺人無不懼而自失雷聲所及百里也唯宗廟祭祀執匕鬯者則不致於喪失人之致其誠敬莫如祭祀匕以載鼎實升之於俎鬯以灌地而一無而字降神方其酌祼以求神薦牲而祈享盡其誠敬之心則雖雷震一作霆之之威不能使之懼而失守故臨大震懼能安而不自失者唯誠敬而已此處震之道也卦才無取故但言處震之道本義震動也一陽始生於二隂之下震而動也其象為雷其屬為長子震有亨道震來當震之來時也虩虩恐懼驚顧之貌震驚百里以雷言匕所以舉鼎實鬯以秬黍酒和鬱金所以灌地降神者也不喪匕鬯以長子言也此卦之占為能恐懼則致福而不失其所主之重朱子曰言人常似那震來時虩虩地便能笑言啞啞到得震驚百里時也不喪匕鬯這箇相連做一串說下來震未便說到誠敬處只是說臨大震懼而不失其常主器之事未必彖辭便有此意看來只是傳中方說問伊川言臨大震懼能安而不自失唯誠敬而已處震之道固當如此若出於不測驚動莫不害事否曰若誠敬至自是不驚驚則自是有閒斷平庵項氏曰傳曰千里不同風百里不共雷震驚百里極雷鳴所及之逺也庸齊趙氏曰棘木為匕取赤心之義長三尺刋柄與末祭祀之先烹牢於鑊實諸鼎而加羃焉將薦乃舉羃以匕出之升於俎上縉雲馮氏曰震驚百里不喪匕鬯猶不失匕箸之意臨祭祀而匕鬯之薦無失節也中溪張氏曰一陽反於二隂之下故曰震來虩虩者恐懼顧慮之貌蓋震來則恐懼顧慮而恐懼之後則笑言啞啞而和適自若也雷聲之發可以震驚百里言祭祀之時誠心純一雖當震懼之來而不喪匕鬯此主敬而不失其所守者也雲峯胡氏曰虩虩一陽方動而上為二隂所蔽之象啞啞隂破而上逹之象震驚百里以震為雷取象不喪匕鬯以長子主器取象彖有一句言一事者萃是也有數句言一事者震艮是也此首言震亨謂震有亨之道又自以震來虩虩釋震字以笑言啞啞以下釋亨字蓋人心常如震來之時虩虩然恐懼憂於先必樂於後便自有致福之理雖震驚百里時亦不失其所主之重也彖曰震亨本義震有亨道不待言也震來虩虩恐致福也笑言啞啞後有則也傳震自有亨之一無之字義非由卦才震來而能恐懼自修自慎則可反致福吉也笑言啞啞言自若也一作啞啞笑言自若也由能恐懼而後自處有法則也有則則安而不懼矣處震之道也本義恐致福恐懼以致福也則法也董氏曰致福云者見君子常以危為安也有則云者見君子不以忽忘敬也西溪李氏曰有則謂君子所履出處語默皆有常則不以恐懼而變也震驚百里驚逺而懼邇也傳雷之震及於百里逺者驚邇者懼言其威逺大也建安丘氏曰驚者卒然遇之而動乎外懼者惕然畏之而變于中也驚逺懼邇甚言雷威之可畏也出可以守宗廟社稷以為祭主也傳彖文脫不喪匕鬯一句卦辭云不喪匕鬯本謂誠敬之至威懼不能使之自失彖以長子宜如是因一有以字承上文用長子之義通解之謂其誠敬能不喪匕鬯則君出而可以守宗廟社稷為祭主也長子如是而後可以守世祀承國家也本義程子以為邇也下脫不喪匕鬯四字今從之出謂繼世而主祭也或云出即鬯字之誤朱子曰震亨止不喪匕鬯作一項看傳云出可以為宗廟社稷又做一項看震便自是亨震來虩虩是恐懼顧慮而後便笑言啞啞震驚百里便也不喪匕鬯文王語已是解震亨了孔子又自說長子事文王之語簡重精切孔子之言方始條暢須折開看方得誠齊楊氏曰震雷能驚百里而不能失匕鬯於主祭之手者蓋執匕鬯以祭則一敬之外無餘念一鬯之外無餘物當是之時白刃前臨猛虎後迫皆莫之覺故震雷驚百里亦莫之聞敬有所甚而懼有所忘也中溪張氏曰出者猶詩云明天子出矣即說卦帝出乎震之謂也曰主者猶詩云百神爾主矣即序卦主器莫若長子之謂也若舜之烈風雷雨弗迷可以出而嗣位肆類于上帝矣而劉備聞迅雷失匕箸者其可出為祭主乎隆山李氏曰序卦曰主器莫若長子以太子而主器是必以戒懼存心以威重為質而其德望素著足以畏服斯人之心則以之守宗廟社稷而為祭祀之主豈不固宜作易者以乾為人君之象震為太子之象庶幾其可見云雲峯胡氏曰彖本義能恐懼則致福而不失其所主之重盡之矣堯舜巍巍蕩蕩事業自兢兢業業致之人須臾不可不知戒懼出而主宗廟社稷者其可懼尤甚焉象曰洊雷震君子以恐懼修省洊在薦反傳洊重襲也上下皆震故為洊雷雷重仍則威益盛君子觀洊雷威震之象以恐懼自修飭循省也君子畏天之威則修正其身思省其過咎而改之不唯雷震凡遇驚懼之事皆當如是建安丘氏曰兩震相重故曰洊雷雷天威也方其仍洊而至聞之者莫不恐懼而君子於恐懼之後必以修省繼之者所以盡畏天之實也徒恐懼而不修省則變至而憂變已而休猶無懼爾恐懼者憂其變之來初震象修省者思其變之弭洊震象誠齊楊氏曰恐懼以先之修省以繼之修省者恐懼之功用也修其身省其過則恐無恐懼無懼矣瀘川毛氏曰恐懼者作於其心修省者見於行事西山真氏曰洊雷震君子以恐懼修省詩云敬天之怒無敢戲豫敬天之渝無敢馳驅鄉黨所載孔子迅雷風烈必變皆此意也中溪張氏曰宣王周盛世之君也遇災而懼側身修行景公宋小國之君也反身修德熒惑亦為之退舍此皆恐懼而能修省者也初九震來虩虩後笑言啞啞吉傳初九成震之主致震者也在卦之下處震之初也知震之來當震之始若能以為恐愳而周旋顧慮虩虩然不敢寧止則終必保其安吉故一作然後笑言啞啞也本義成震之主處震之初故其占如此朱子曰震來虩虩是震之初震得來如此中溪張氏曰初恐懼虩虩而後笑言啞啞蓋先震而後定先恐而後安宜其吉也爻辭與卦彖辭同者以初九為成卦之主也以二體而觀初九九四俱為震動之主爻其餘四隂爻皆聞震雷而恐懼者也平菴項氏曰震有二義有震動之震有震懼之震初九九四二爻乃震之所以為震者震動之震也二三五上四隂爻乃為陽所震者震懼之震也雲峯胡氏曰二隂一陽則一陽為主初九在內卦之內震之主也故辭與卦同乾坤之後為屯便以震之初爻為主故彖辭曰利貞利建侯周公之爻辭曰利居貞利建侯只加一居字至本卦彖辭言震來虩虩笑言啞啞而爻辭亦只加一後字蓋震之用在下而重震之初又最下者所以為震之主者也彖之占曰亨爻之占曰吉一也象曰震來虩虩恐致福也笑言啞啞後有則也傳震來而能恐懼周顧則無患矣是能因恐懼而反致福也因恐懼而自修省不敢違于法度是由震而後有法則故能保其安吉而笑言啞啞也臨川吳氏曰恐謂虩虩致福謂致笑言啞啞之福有則謂不以恐懼而失其常度也六二震來厲億喪貝躋于九陵勿逐七日得傳六二居中得正善處震者也而乘初九之剛九震之主震剛動而上奮孰能禦之厲猛也危也彼來既猛則己處危矣億度也貝所有之資也躋升也九陵陵之高也逐往追也以震來之厲度不能當而必喪其所有則升至高以避之也九言其重岡陵之重高之至也九重之多也如九天九地也勿逐七日得二之所貴者中正也遇震懼之來雖量勢㢲避當守其中正無自失也億之必喪也故逺避以自守過則復其常矣是勿逐而自得也逐即物也以已即物失其守矣故戒勿逐避逺自守處震之大方也如二者當危懼而善處者也卦位有六七乃更始事既終時既易也不失其守雖一時不能禦其來然時過事已則復其常故云七日得本義六二乘初九之剛故當震之來而危厲也億字未詳又當喪其貨貝而升於九陵之上然柔順中正足以自守故不求而自獲也此爻占具象中但九陵七日之象則未詳耳朱子曰六二不甚可曉大槩是喪了貨貝又被人趕上高處去只當固守便好中溪張氏曰初九震之主也以九之剛威動而上奮孰禦之者而六二乃以至柔當其鋒岌岌乎殆哉臨川吳氏曰六二因怖畏而有喪失又且辟易逺避可謂怯懦無所守矣然居中得正苟有墮甑弗顧之逹則當有去珠復還之喜故曰勿用追尋至七日而所喪之貝可得也雲峯胡氏曰常人之情震驚則多喪失故喪匕鬯喪貝每每言之二當初九動而方來其勢甚危大喪其貝事之危也躋于九陵地之危也其危如此二中正自守不以己即物始也有喪而不追其喪末也有得亦其數窮而自得之也或曰互艮有陵象九即初九躋于九陵二進在初之上也七日得既濟六二占同皆於六二言之者自二至上又自上而二七數二中正故始雖失而終復得之象曰震來厲乘剛也傳當震而乘剛是以彼厲而己危震剛之來其可禦乎臨川吳氏曰柔乘初剛迫近雷威故危雲峯胡氏曰屯六二豫六五噬嗑六二困六三震六二皆言乘剛也惟困六三乘坎之中爻其餘皆乘震之初也皆不以吉稱六三震蘇蘇震行無眚傳蘇蘇神氣緩散自失之狀三以隂居陽不正處不正於平時且不能安况處震乎故其震懼而蘇蘇然若因震懼而能行去不正而就正則可以無過眚過也三行則至四正也動以就正為善故二勿逐則自得三能行則無眚以不一有中字正而處震懼有眚可知本義蘇蘇緩散自失之狀以隂居陽當震時而居不正是以如此占者若因懼而能行以去其不正則可以無眚矣雲峯胡氏曰二當震初之來雖有所喪戒以勿逐三去初逺而勉之以行何也六二中正自守三不中正故也故戒之曰與其懼而蘇蘇自失不若因其懼而能行以去不正庶乎可以無眚耳隆山李氏曰陽爻震物隂爻被震隂被震而不敢輕犯其鋒必須逃避而後獲免故二則欲其躋于九陵三則欲其行無眚象曰震蘇蘇位不當也傳其恐懼自失蘇蘇然由其所處不當故也不中不正其能安乎臨川吳氏曰所居之位不當故宜行而去之九四震遂泥泥乃計反傳九四居震動之時不中不正處柔失剛健之道居四無中正之德陷溺於重隂之閒不能自震奮者也故云遂泥泥滯溺也以不正之陽而上下重隂安能免於泥乎遂無反之意處震懼則莫能守也欲震動則莫能奮也震道亡矣豈復能光亨也本義以剛處柔不中不正陷於二隂之閒不能自震也遂者無反之意泥滯溺也雲峯胡氏曰初與四皆震之所以為震者然震之用在下四溺於陰柔之中故震之亨在初而不在四亨者初之剛當上逹泥者四之剛不能逹也象曰震遂泥未光也傳陽者剛物震者動義以剛處動本有光亨之道乃失其剛正而陷於重陰以致遂泥豈能光也云未光見陽剛本能震也以失德故泥耳中溪張氏曰九四亦震上之主爻以一陽陷於四陰之間不能自奮震遂泥矣雖則陽明亦未能光大也六五震往來厲億無喪有事傳六五雖以陰居陽不當位為不正然以柔居剛又得中乃有中德者也不失中則不違於正矣所以中為貴也諸卦二五雖不當位多以中為美三四雖當位或以不中為過中常重於正也蓋中則不違於正正不必中也天下之理莫善於中於六二六五可見五之動上往則柔不可居動之極下來則犯剛是往來皆危也當君位為動之主隨宜應變在中而已故當億度無喪失其所有之事而已所有之事謂中德苟不失中雖有危一有終字不至於凶也億度謂圖慮求不失中也五所以危由非剛陽而無助若以剛陽有助為動之主則能亨矣往來皆危時則甚難一作艱但期於不失中則可自守以柔主動固不能致亨濟也本義以六居五而處震時無時而不危也以其得中故無所喪而能有事也占者不失其中則雖危無喪矣朱子曰六五是生於憂患死於安樂也雲峯胡氏曰或曰二在初陽之上陽之來甚急必至於喪其所有五在四陽之上四方溺於二陰之中或往或來而未定其來也猶緩故不特無喪而又且有事功五得中所以如此雙湖胡氏曰證以六二爻則五乘乎四往來正指四言蓋此爻實與二爻相似而相反二曰震來厲五曰震往來厲二曰億喪貝五曰億無喪有事所以相似者以重卦言之上卦之五實即下卦之二所以相反者二乘乎初初之來也有可畏之勢故其爻厲而有喪五乘乎四四既下牽於柔來而復往以至遂泥則其震緩矣故其爻雖厲而無喪所以不同中溪張氏曰四之震往來厲不如初震來厲之可畏而五之億無喪又異乎二之億喪貝也象曰震往來厲危行也其事在中大無喪也傳往來皆厲行則有危也動皆有危唯在無喪其事而已其事謂中也能不失其中則可自守也大無喪以無喪為大也臨川吳氏曰上行下行皆危故曰危行有事者在固守其中柔中居剛為大中故能有守而億無所喪也與六二之柔中居柔小而非大者不同矣上六震索索視矍矍征凶震不于其躬于其鄰無咎婚媾有言索桑落反矍俱縳反傳索索消索不存之狀謂其志氣如是六以陰柔居震動之極其驚懼之甚志氣殫索也矍矍不安定貌志氣索索則視瞻徊徨以陰柔不中正之質而處震動之極故征則凶也震之及身乃于其躬也不于其躬謂未及身也鄰者近於身者也能震懼於未及身之前則不至於極矣故得無咎苟未至於極尚有可改之道震終當變柔不固守故有畏一作見鄰戒而能變之義聖人於震終示人知懼能改之義為勸深矣婚媾所親也謂同動者有言有怨咎之言也六居震之上始為衆一作震動之首乃今畏鄰戒而不敢進與諸處震者異矣故婚媾有言也本義以陰柔處震極故為索索矍矍之象以是而行其凶必矣然能及其震未及其身之時恐懼修省則可以無咎而亦不能免於婚媾之有言戒占者當如是也朱子曰上六不全好但能恐懼於未及身之時可得無咎然亦不免他人言語進齊徐氏曰索索志氣不存之貌當震而懼氣索然也矍矍不定之貌氣索而目亦為之動也三行則無眚而上征則凶言不當行也躬謂上鄰謂五四震來勢緩不能及上故曰不于其躬僅能及五故曰于其鄰與三無應故婚媾有言雲峯胡氏曰三蘇蘇神氣散緩上索索矍矍神氣無復存矣蓋以陰柔處震懼之極故其行也必凶猶幸四震之來也緩上之懼不于其身之時而已懼於及五之際則庶乎可以無咎然亦終不免於婚媾之有言者近於五而無應於二也爻言虩虩啞啞蘇蘇索索矍矍與二五言億諸卦皆無其義雖多恐懼之貌亦於爻義各有辨也六爻惟初言吉唐房喬曰震之初九謹始恐懼所以致福豫之初六倡始逸豫所以貽凶也除上六征凶外皆無凶者皆有恐懼之福而無逸豫之凶也縉雲馮氏曰六爻皆無凶者恐懼則為福泰侈則為禍也象曰震索索中未得也雖凶無咎畏鄰戒也傳所以恐懼自失如此以未得於中道也謂過中也使之得中則不至於索索矣極而復征則凶也若能見鄰戒而知懼變於未極之前則無咎也上六動之極震極則一作之終有變義也本義中謂中心雲峯胡氏曰程傳曰中道本義謂中心蓋六隂柔處震懼之極中心有所未安故見於外者如此建安丘氏曰震動也以一陽動于二陰之下也故震六爻以初四為主而四之震下牽二柔有互艮之體失其所以為震矣而全震之時用者獨在乎初故初震來虩虩而四震遂泥也其上四陰爻則皆為陽所震者二乘初剛不可犯也故震來厲億喪貝而三逺之則震蘇蘇而聲漸緩矣五乘四剛已無足畏故但震往來厲億無喪而上逺之則震索索然而無聲矣合二體觀之而重震之義明矣艮下艮上傳艮序卦震者動也物不可以終動止之故受之以艮艮者止也動靜相因動則有靜靜則有動物無常動之理艮所以次震也艮者止也不曰止者艮山之象有安重堅實之意非止義可盡也乾坤之交三索而成艮一陽居二陰之上陽動而上進之物既至於上則止矣陰者靜也上止而下靜故為艮也然則與畜止之義何異曰畜止者制畜之義力止之也艮止者安止之義止其所也艮其背不獲其身行其庭不見其人無咎傳人之所以不能安其止者動於欲也欲牽於前而求其止不可得也故艮之道當艮其背所見者在前而背乃背之是所不見也止於所不見則無欲以亂其心而止乃安不獲其身不見其身也謂忘我也無我則止矣不能無我無可止之道行其庭不見其人庭除之間至近也在背則雖至近不見謂不交於物也外物不接內欲不萌如是而止乃得止之道於止為無咎也一無也字或問伊川解艮其背云止於所不見又云不交於物則是無所見無所交方得其所止而安若有所見有所交時是全無所止之處矣朱子曰這處無所見底意思濂溪也恁地說是他偶看這一處錯了相傳如此又問伊川云內欲不萌外物不接如是而止乃得其止似只說得靜中之止否曰然明道云與其非外而是內不若內外之兩忘也說得最好便是不獲其身行其庭不見其人不見有物不見有我只見所當止也如為人君止於仁不知下面道如何只是我當止於仁為人臣止於敬不知上面道如何只是我當止於敬只認我所當止也以至父子兄弟夫婦朋友大事小事莫不皆然從伊川之說到不獲其身處便說不來至行其庭不見其人越難說只做止其所止更不費力問恐外物無有絶而不接之理若拘拘然務絶乎物而求以不亂其心是在我却無所守而為外物所動則奈何曰此一假亦有可疑外物豈能不接但當於非禮勿視聽言動四者用力伊川謂艮其背為止於所不見竊恐未然據彖辭自解得分曉曰艮其止止其所也上句止字便是背字故下文便繼之云是以不獲其身更不再言艮其背也止是當止之處下句止字是解艮字所字是解背字蓋云止於所當止也所即至善之地如君之仁臣之忠之類大槩看易須謹守彖象之言聖人自解得精密平易又曰伊川說艮其背是止於所不見其意如說間邪如所謂制之於外以安其內如所謂姦聲亂色不留於聰明淫樂慝禮不接於心術此意亦自好但易之本意未必是如此蘭氏廷瑞曰艮六爻皆止艮其背不獲其身我不應人也行其庭不見其人人不應我也人我不交悔吝何從而生是以無咎雙峯胡氏曰人以面前為身面後為背卦體似人背面而立是為艮其背不獲其身矣艮其背既不獲其身則行其庭亦不見其人矣若分二體言則艮其背不獲其身忘我也亦為人不見我之象以內體言行其庭不見其人忘人也是我不見人之象以外體言人我兩不相應何咎之有鄭氏曰象言輔不言口言身不言腹言夤限不言臍有背面而立之象兼山郭氏曰人之耳目鼻口皆有欲也至於背則無欲矣本義艮止也一陽止於二陰之上陽自下升極上而止也其象為山取坤地而隆其上之狀亦止於極而不進之意也其占則必能止于背而不有其身行其庭而不見其人乃無咎也蓋身動物也唯背為止艮其背則止於所當止也止於所當止則不隨身而動矣是不有其身也如是則雖行於庭除有人之地而亦不見其人矣蓋艮其背而不獲其身者止而止也行其庭而不見其人者行而止也動靜各止其所而皆主夫靜焉所以得無咎也朱子曰艮其背背只是言止也人之四體皆能動惟背不動故取止之義各止其所則廓然而大公艮其背便不獲其身便不見其人行其庭對艮其背只是對得輕身是動物不道動都是妄然而動斯妄矣不動自無妄艮其背一句是腦故彖中言是以不獲其身行其庭不見其人也四句只略對艮其背渾只見得道理合當如此人自家一分不得著一些私意不得不獲其身不干自家事這四句須是說艮其背了方靜時不獲其身動時不見其人所以彖傳中說是以不獲其身至無咎也不獲其身不得其身也猶言討自家身已不得又曰欲出於身人才要一件物事便須以身已去對副他若無所欲則只恁地平平過便似無此身一般不獲其身如君止於仁臣止於忠但見得事之當止不見此身之為利為害才將此身預其間則道理便壞了古人所以殺身成仁舍生取義者只為不見此身方能如此此假分作兩截却是艮其背不獲其身為靜之止行其庭不見其人為動之止總說則艮其背為止之時當其所止了所以止時自不獲其身行時自不見其人此三句乃艮其背之效驗所以彖傳先說止其所也上下敵應不相與也却云是以不獲其身行其庭不見其人也艮其背不獲其身是只見箇道理不見自家行其庭不見其人是只見箇道理不見箇人也又曰此假工夫全在艮其背上人多將行其庭對此句說便不是了行其庭即是輕說過緣艮其背既盡得了則不獲其身行其庭不見其人矣艮其背是止於所當止之地不獲其身行其庭不見其人萬物各止其所便都統一是理也不見有已也不見有人都只見此理雲峯胡氏曰人身唯背不動此艮止象不獲其身內艮象不見其人外艮象四五兩爻在門闕之中行其庭象人之所當止者義理而已止其所當止則唯知有義理不知有人我不獲其身理所當止止而止也行其庭不見其人理所當行行而止也如是則其止其行可以無過矣文王彖震艮又自是一例震來虩虩以下三句只是發明虩虩之效驗艮其背以下三句亦只發明艮背之效驗唯本義為能發之彖曰艮止也時止則止時行則行動靜不失其時其道光明傳艮為止止之道唯其時行止動靜不以時則妄也不失其時則順理而合義在物為理處物為義動靜合理義不失其時也乃其道之光明也君子所貴乎時仲尼行止久速是也艮體篤實有光明之義本義此釋卦名艮之義則止也然行止各有其時故時止而止止也時行而行亦止也艮體篤實故又有光明之義大畜於艮亦以輝光言之朱子曰時止則止時行則行行固非止然行而不失其理乃所以為止也問艮之象何以為光明曰定則明凡人胸次煩擾則愈見昏昧中有定止則自然光明莊子所謂泰宇定而天光發是也問止有兩義得所止之止是義理之極行止之止則就人所為而言曰然時止之止止字小得其所止之止止字大雙湖胡氏曰艮一陽見於二陰之上陽明著見陰莫得而掩蔽之故艮獨稱光明艮其止止其所也傳艮其止謂止之而止也止之而能止者由止得其所也止而不得其所則無可止之理夫子曰於止知其所止謂當止之所也夫有物必有則父止於慈子止於孝君止於仁臣止於敬萬物庶事莫不各有其所得其所則安失其所則悖聖人所以能使天下順治非能為物作則也唯止之各於其所而已程子曰動靜不失其時皆止其所也艮其背乃止也背無欲無思也故可止艮其止止其所也各止其所父子止於恩君臣止於義之謂艮其背止於所不見也艮其止止其所也八元有善而舉之四凶有罪而誅之各止其所也易之艮言止之義曰艮其止止其所也言隨其所止而止之人多不能止蓋人萬物皆備遇事時各因其心之所重者更互而出才見得這事重便有這事出若能物各付物便自不出來也艮卦只明使萬物各有其止萬物各止其所分無不定矣艮其背止欲於無見若欲見於彼而止之所施各異若艮其止止其所也止各當其所也聖人所以應萬變而不勞者事各止當所也若鑒在此而物之妍媸自見於彼聖人不與焉時止則止時行則行時行對時止而言亦止其所也朱子曰程傳云聖人能使天下順治非能為物作則也惟止之各於其所而已此意却最解得分明艮其背恐只當如此說艮其止便是艮其背經文或背字誤作止字或止字誤作背字或以止字解背字不可知艮背之用固在止其所然能止其所乃知至物格以後事上下敵應不相與也傳以卦才言也上下二體以敵相應無相與之義陰陽相應則情通而相與乃以其敵故不相與也不相與則相背為一作與艮其背止之義一有同字也朱子曰上下敵應不相與猶言各不相管只是各止其所八純卦都不相與只是艮卦是止尤不相與內不見己是內卦外不見人是外卦兩卦各自去李氏曰艮之象兩人相背而行兩不相見故其爻為上下敵應不相與也平菴項氏曰卦象雖相敵情自相與唯艮則上下卦陰陽各正其性而無外求之情故有不相與之義陽上而陰下一陽而統二陰皆天下之定理不可復加損也是以不獲其身行其庭不見其人無咎也傳相背故不獲其身不見其人是以能止能止則無咎也本義此釋卦辭易背為止以明背即止也背者止之所也以卦體言內外之卦陰陽敵應而不相與也不相與則內不見已外不見人而無咎矣朝氏云艮其止當依卦辭作背進齊徐氏曰彖言艮其止即釋卦辭艮其背之義君子之止其所者猶北辰之居其所也君止於仁臣止於敬父止於慈子止於孝事事物物莫不各止其所此於止而知其所止也上下重艮皆以陰陽敵應而無相與之義彖辭先言艮其止然後曰是以不獲其身行其庭不見其人無咎也以此見止則不獲自見其身行則不見其人者是皆艮其背之效驗也建安丘氏曰艮其背止也行其庭行也止而不獲其身不知有己也行而不見其人不知有人也無人無己唯見義理之當止所謂止其所也所者止之地也得其所而不止固為不知止不得其所而止又豈止其所之義哉又曰有止之時有止之所止之時如夫子之仕止久速各當其可是也止之所如大學之仁敬孝慈各得其分是也釋彖自艮止也而下言止之時自艮其止而下言止之所雲峯胡氏曰不獲其身以下三句皆從背說背則自視不獲其身行於庭則不見其人本義所謂止而止行而止即程子所謂靜亦定動亦定也內不見已外不見人所謂內外之兩忘也象曰兼山艮君子以思不出其位傳上下皆山故為兼山此而并彼為兼謂重復一作復也重艮之象也君子觀艮止之象而思安所止不出其位也位者所處之分也萬事各有其所得其所則止而安若當行而止當速而久或過或不及皆出其位也况踰分非據乎董氏曰兩雷兩風兩火兩水兩澤皆有相往來之理惟兩山竝立不相往來此止之象也中溪張氏曰君子觀艮止之象如山之寂然不動而罔敢越思故曰思不出其位建安丘氏曰位者止之所也思不出其位則於止知其所止有兩山對峙不相侵越之意大學言君仁臣敬父慈子孝與中庸言素富貴行富貴素貧賤行貧賤之類皆其義也凡人所為所以易至於出位者以其不能思也思則心有所悟知其所當止而得所止矣雲峯胡氏曰不出位身止也思不出位心止也亦兼山之象初六艮其趾無咎利永貞傳六在最下趾之象趾動之先也艮其趾止於動之初也事止於初未至失正故無咎也以柔處下當趾之時也行則失其正矣故止乃無咎陰柔患其不能常也不能固也故方止之初戒以利在常永貞固則不失止一作正之道也本義以陰柔居艮初為艮趾之象占者如之則無咎而又以其陰柔故又戒其利永貞也臨川吳氏曰初當下體之下象趾趾能行者也六陰畫能靜止於下而不行故曰艮其趾又曰位不當有咎也止而不行故無咎涑水司馬氏曰君子於其所止不可不謹擇也止於永貞利莫大焉雲峯胡氏曰事當止者當於其始而止之乃可無咎止於始猶不能止於終而況不能止於始者乎初六陰柔懼其始之不能終也故戒以利永貞欲常久而貞固也其即上九之敦艮乎象曰艮其趾未失正也傳當止而行非正也止之於初故未至失正事止於始則易而未至於失也臨川吳氏曰能止於下則位雖不當猶未至於失其正也不止而行則失正矣六二艮其腓不拯其隨其心不快傳六二居中得正得止之道者也上無應援不獲其君矣三居下之上成止之主主乎止者也乃剛而失中不得止之宜剛止於上非能降而下求二雖有中正之德不能從也二之行止係乎所主非得自由故為腓之象股動則腓隨動止在股而不在腓也二既不得以中正之道拯救三之不中則必勉而隨之不能拯而唯隨也雖咎不在己然豈其所欲哉言不聽道不行也故其心不快不得行其志也士之處高位則有拯而無隨在下位則有當拯有當隨有拯之不得而後隨中溪張氏曰股動則腓動股止則腓止是動止之權不在腓也九三居下體之上為艮之主二既不得以柔中之道而拯救九三過剛之失而亹亹隨之又豈其心之所欲哉故其心不快也誠齊楊氏曰六二有艮其腓之象九三居艮體之上則猶背也九三陽也六二陰也陽唱則陰和今以六二之柔而欲止九三之剛以六二之腓而欲止九三之背吾知六二不拯其隨也王曰好色而軻亦曰太王好色王曰好貨而軻亦曰公劉好貨軻豈不拯其隨者哉軻之心則不快也況以九三而躐居六二之上六二力不能拯不得已而隨之又豈其心之所快然亦未肯退而聽其上之輕動也君子於艮之六二可以察其跡而哀其心矣本義六二居中得正既止其腓矣三為限則腓所隨也而過剛不中以止乎上二雖中正而體柔弱不能往而拯之是以其心不快也此爻占在象中下爻放此或問艮六二不拯其隨程子謂二不得以拯三之不中則勉而隨之不拯而唯隨也恐唯字未的當若不拯而唯隨則如樂正子之於子敖冉求之於季氏也當只言不拯其所隨故其心不快如孔孟之於時君諫不行言不聽則去而已勉而隨之恐非時止之義朱子曰得之艮其腓咸其腓二卦皆就人身上取義而皆主靜如艮其趾能止其動便無咎艮其腓腓亦是動物故止之不拯其隨是不能拯止其隨限而動也所以其心不快限即腰所在艮其限是截做兩假去進齊徐氏曰二有中正之德宜止不動然艮主在剛故其隨在三三剛列夤不得止之宜二不能拯救其失故曰不拯其隨以二之中正而柔弱不能拯其所隨豈其所欲哉故其心不快雲峯胡氏曰咸六二與艮六二皆象腓咸下體即艮也艮以三為主咸於二言腓三言隨隨二而動者也三為下卦之主不能自守而下隨於二故往吝艮於二言腓又言隨隨三而止者也三列夤不得止之宜而二陰柔不能救其所隨故其心不快雖然視咸之執其隨者有間矣象曰不拯其隨未退聽也傳所以不拯之而唯隨者在上者未能下從也退聽下從也本義三止乎上亦不肯退而聽乎二也雲峯胡氏曰二與三占皆在象中皆有一心字二不能拯乎三故心不快三不肯下聽乎二故厲薰心九三艮其限列其夤厲薰心夤引真反傳限分隔也謂上下之際三以剛居剛而不中為成艮之主決止之極也已在下體之上而隔上下之限皆為止義故為艮其限是確乎止而不復能進退者也在人身如列其夤夤膂也上下之際也列絶其夤則上下不相從屬言止於下之堅也止道貴乎得宜行止不能以時而定於一其堅强如此則處世乖戾與物睽絶其危甚矣人之固止一隅而舉世莫與宜者則艱蹇忿畏焚撓其中豈有安裕之理厲薰心謂不安之一作其勢薰爍其中一有心字也本義限身上下之際即腰胯也夤膂也止於腓則不進而已九三以過剛不中當限之處而艮其限則不得屈伸而上下判隔如列其夤矣危厲薰心不安之甚也瀘川毛氏曰三處上下之間故為限人身榮衛流通則泰而無疾上痞下結則危矣鄭氏剛中曰限上下體之際虞翻謂束帶之處夤馬融謂夾脊肉肉附脊則身有主而可立分列其夤則百體無以相屬心處中背處陰夤在背與心密相向列其夤則憂危之厲安得不薰灼及其心也沙隨程氏曰限分上下夤列左右各止其所無相資相待之意故危薰心雲峯胡氏曰震所主在下初九下之最下者也九四雖亦震所主而溺於四柔之中有泥之象故不如初之吉艮所主在上上九上之最上者也九三雖亦艮所主然界乎四柔之中有限之象有列其夤之象故不如上之吉二曰其心不快三曰厲薰心蓋寂然不動者心之體如之何可以狥物感而遂通者心之用如之何可以絶物二陰柔隨三而不能拯之是狥物者也二本中正故其心猶以為不快三過剛確乎止而不能進退以至上下隔絶是絶物者也三不中唯見其危厲薰心而已進齊徐氏曰艮二柔爻也而曰我心不快艮三剛爻也而曰厲薰心何也蓋六二之柔為剛者所制故我心不快也九三之剛為柔者所限故厲薰心也象曰艮其限危薰心也傳謂其固止不能進退危懼之慮常薰爍其中心也雲峯胡氏曰震上六中未得動之極而心未安艮九三危薰心止之極而心亦未安六四艮其身無咎傳四大臣之位止天下之當止者也以陰柔而不遇剛陽之君故不能止物唯自止其身則可無咎所以能無咎者以止於正也言止其身無咎則見其不能止物施於政則有咎矣在上位而僅能善其身無取之甚也魯齊許氏曰六四以柔止之才承柔止之君雖己身得正而於君事則有不能自濟者必藉陽剛之才而後可以成功故離九應之則終得婚媾震九應之則顛頤獲吉至於止乾之健納兌之說皆可成功而有喜不爾處剝見凶處䝉蠱見吝矣艮以能止為義能止其身則無咎可也本義以陰居陰時止而止故為艮其身之象而占得無咎也胡氏曰自止其身使不妄動不為物遷故無咎中溪張氏曰諸卦唯咸與艮以身取象此近取諸身者也艮四正當心位不言心而言身者蓋心不可見而身者心之區宇也觀其身之止則知其心之止又安有妄動之咎哉雲峯胡氏曰咸九四憧憧往來以心之動言此不言心而言身兼動靜言也身止則知心得其所止矣楊氏曰六四居上體能自止其身而無咎者也然爻既曰身而象又曰躬者蓋身者伸也躬者屈也伸屈在我而不在物以六居四屈而不伸止而不行此君子知出處之大義也象曰艮其身止諸躬也傳不能為天下之止能止於其身而已豈足稱大臣之位也白雲郭氏曰止諸躬者謂成己而已未能成物也六五艮其輔言有序悔亡傳五君位艮之主也主天下之止者也而陰柔之才不足以當此義故止以在上取輔一有之字義言之一無之字人之所當慎而止者唯言行也五在上故以輔言輔言之所由出也艮於一作其輔則不妄出而有序也言輕發而無序則有悔止之於輔則一作故悔亡也有序中節有次序也輔與頰舌皆言所由出而輔在中艮其輔謂止於中也本義六五當輔之處故其象如此而其占悔亡也悔謂以陰居陽中溪張氏曰輔者頰輔也言之所由出也五以柔居尊而得中發則為絲綸之言故與其言未中倫孰若止其輔而不言非不言也不輕言也言不妄出則秩秩德音自然有序而其悔乃亡故咸上六曰咸其輔頰舌而夫子亦以滕口說為戒也雲峯胡氏曰輔頰之兩傍骨背後可得而見者咸言其面故并見頰舌艮其背故止言輔初艮趾止其行也五艮輔止其言也能止其言者必能止其所行故悔亡隆山李氏曰人所見於外者不過言行二者在下有腓趾以象其行在上有輔頰以象其言所以明艮之義則一也象曰艮其輔以中正也傳五之所善者中也艮其輔謂止於中也言以得中為正止之於輔使不失中乃得正也本義正字羡文叶韵可見誠齊楊氏曰高宗三年不言一言而四海咸仰威王三年不鳴一鳴而齊國震驚六五所以能艮其輔而言有序者以其德之中正而已所謂有德者必有言也上九敦艮吉傳九以剛實居上而又成艮之主在艮之終止之至堅篤者也敦篤實也居止之極故不過而為敦人之止難於久終故節或移於晚守或失於終事或廢於久人之所同患也上一無上字九能敦厚於終止道之至善所以吉也六爻之德唯此為吉本義以陽剛居止之極敦厚於止者也中溪張氏曰上九在艮山之極剛健篤實可謂敦厚於艮終者也故六爻之中唯此獨吉建安丘氏曰艮以人身取象艮止體身動物也六爻自初之趾至五之輔皆囿於一體而未能盡止道之善僅止於無咎悔亡而已獨上九為成艮之主於當止之地而能止焉所謂止於至善者聖人以為非形之可拘故曰敦艮吉其與悔亡無咎之辭異矣又曰艮者震之反也艮之三即震之四震之用在下故震陽最下者獨吉若震四之陽則下連二陰為互艮之體失所以為震矣艮之用在上故艮陽最上者獨吉若艮三之陽則連上二陰為互震之體失其所以為艮矣雲峯胡氏曰咸艮皆以身取象咸言人前艮言人背艮其腓咸亦言腓腓雖在後而前亦可見也咸其輔艮亦言輔輔雖在前而後亦可見也故咸得兼艮之腓而不得兼艮之限夤艮得兼咸之輔而不得兼咸之頰舌其取象可謂精矣上獨不言象何哉敦臨敦復皆取坤土象艮山乃坤土而隆其上者也其厚也彌固故其象為敦其占曰吉凡上爻除井鼎外鮮有吉者惟艮之在上體者凡八而皆吉人可不自厚哉厚於始可不厚於終哉象曰敦艮之吉以厚終也傳天下之事唯終守之為難能敦於止有終者也上之吉以其能厚於終也雲峯胡氏曰震以下一爻為主故九四在上卦之下而未光不如在下卦之下者之致福艮以上一爻為主九三在下卦之上而薰心不如在上卦之上者之厚終也非特艮上九為然賁上九上得志大畜上九道大行蠱上九志可則頤上九大有慶損上九大得志䝉上九上下順皆艮之以厚終者也朱子曰艮卦是箇最好底卦動靜不失其時其道光明又剛健篤實輝光日新其德皆艮之象也艮居外卦者八而皆吉唯䝉卦半吉半凶如賁之上九白賁無咎上得志也剝之上九君子得輿民所載也大畜上九何天之衢道大行也蠱上九不事王侯志可則也頤上九由頤厲吉大有慶也損上九弗損益之大得志也艮卦敦艮之吉以厚終也䝉卦上九擊䝉不利為寇利禦寇雖小不利卦爻亦自好又曰䝉學者之事始之之事也艮成德之事終之之事也復卦靜中有動艮卦又是動中要靜復卦便是一箇大翻轉底艮卦艮卦便是兩箇翻轉底復卦復是五陰下一陽艮是二陰上一陽陽是動底物事隂是靜底物事凡陽在下便是震動意思在中便是陷在二陰之中如人陷在窟裏相似在上則沒去處了只得止故曰艮其止陰是柔順底物事在下則巽順陰柔不能自立須附於陽在中則是附麗之象在上則說蓋柔媚之物在上則歡悅艮就人身取象上一畫有頭之象中二陰有口之象所以艮其輔於五爻見內卦之下亦有足之象又曰咸艮皆以人身為象但艮卦又差二位建安丘氏曰艮六爻以三上為主而九三連上二陰有互震之體失其所以為艮止之義矣而全艮之時用者獨在乎上故上敦艮吉而三艮其限厲薰心也其下四陰爻則皆隨陽而止者五近上艮故艮其輔言有序四逺之則亦艮其身而無咎也二近下艮故艮其腓不拯其隨初逺之則但艮其趾未失正而已合二體觀之而重艮之義可識矣周易傳義大全卷十八
