body:
  text: 周易傳義大全卷三明胡廣等撰坎下艮上𫝊蒙序卦屯者盈也屯者物之始生也物生必蒙故受之以䝉䝉者䝉也物之稺也屯者物之始生物始生稺小䝉昧未𤼵䝉所以次屯也為卦艮上坎下艮為山為止坎為水為險山下有險遇險而止莫知所之䝉之象也水必行之物始岀未有所之故為䝉及其進則為亨義白雲郭氏曰屯者物之始生生而後稺卦之序也誠齋楊氏曰䝉猶屯也屯者物之初非物之厄䝉者人之初非性之昧勾而未舒曰屯稺而未達曰䝉雙湖胡氏曰乾坤之後屯主在震初九一爻䝉主在坎九二一爻此長子代父長弟次兄之象艮為少男方有待於開𤼵此屯䝉次乾坤之義屯建侯有君道焉䝉求我有師道焉天地既位君師立矣䝉亨匪我求童䝉童䝉求我初筮告再三瀆瀆則不告利貞告古毒反傳䝉有開𤼵之理亨之義也卦才時中乃致亨之道六五為䝉之主而九二𤼵䝉者也我謂二也二非䝉主五既順㢲於二二乃𤼵䝉者也故主二而言匪我求童䝉童䝉求我五居尊位有柔順之德而方在童䝉與二為正應而中徳又同能用二之道以𤼵其䝉也二以剛中之徳在下為君所信嚮當以道自守待君至誠求已而後應之則能用其道匪我求於童䝉乃童䝉來求於我也筮占決也初筮告謂至誠一意以求己則告之再三則瀆慢矣故不告也𤼵䝉之道利以貞正又二雖剛中然居隂故宜有戒朱子曰伊川説䝉亨髣髴是指九二一爻説所以云剛中也白雲郭氏曰物稺者有必亨之理聖人𤼵䝉有致亨之道所以亨也毅齋沈氏曰䝉昧而能亨者由九二以剛中之徳時而𤼵之所以亨也本義艮亦三畫卦之名一陽止於二隂之上故其徳為止其象為山䝉昧也物生之初䝉昧未明也其卦以坎遇艮山下有險䝉之地也内險外止䝉之意也故其名為䝉亨以下占辭也九二内卦之主以剛居中能𤼵人之䝉者而與六五隂陽相應故遇此卦者有亨道也我二也童䝉㓜稺而䝉昧謂五也筮者明則人當求我而其亨在人筮者暗則我當求人而亨在我人求我者當視其可否而應之我求人者當致其精一而扣之而明者之養䝉與䝉者之自養又皆利於以正也朱子曰山下有險䝉之地也山下已是險峻處又遇險前後去不得故於此䝉昧也䝉之意只是心下鶻突人來求我我則當視其可否而告之葢視其來求我之𤼵䝉者有初筮之誠則告之再三煩瀆則不告之也我求人則當致其精一以叩之盖我而求人以𤼵䝉則當盡初筮之誠而不可有再三之瀆也盤澗董氏曰本義𤼵此一例即所謂稽實待虚者也雲峰胡氏曰諸家訓亨與利貞以亨屬䝉利貞屬養䝉者惟本義以為䝉與養䝉者皆有亨道而利於貞易必如是看方為不滯也彖曰䝉山下有險險而止䝉本義以卦象卦徳釋卦名有兩義朱子曰山下有險是卦象險而止是卦徳䝉有二義險而止險在内止在外自家這裏先自不安稳了外面更去不得便是䝉昧之象若見險而能止則為蹇却是險在外自家這裏見得去不得所以不去故曰知矣哉雲峰胡氏曰卦象分上下艮山下有坎水之險是一義卦徳分内外内險已不能安外止又不能進是一義䝉亨以亨行時中也匪我求童䝉童䝉求我志應也傳山下有險内險不可處外止莫能進未知所為故為昏䝉之義䝉亨以亨行時中也䝉之能亨以亨道行也所謂亨道時中也時謂得君之應中謂處得其中得中則一有得字時也匪我求童䝉童䝉求我志應也二以一无以字剛明之賢處於下五以童䝉居上非是二求於五盖五之志應于二也賢者在下豈可自進以求於君茍自求之必无能信用之理古之人所以必待人君致敬盡禮而後徃者非欲自為尊大盖其尊徳樂道不如是不足與有為也張子曰䝉卦主者全在九二彖之所論皆二之義教者但只看䝉者時之所及則導之是以亨行時中也厚齋馮氏曰學記云當其可之謂時九二陽明其於五隂之暗時而𤼵之無過不及所以亨也東萊吕氏曰匪我求童䝉童䝉求我志應也説者多謂𤼵䝉者不可自屈必待童䝉先來求我志與我相應然後可教茍急於教人不待學者有志而強告之必不能入也此固是正理然人或錯㑹此説亢然不復與學者相接學者亦望風不敢進少徒寡與道卒不明要須詳玩志應二字此无以感之彼安得而應之應生於感也古之教人雖不區區先求學者然就不求之中自有感𤼵之理不然學者之志何自而應乎初筮告以剛中也再三瀆瀆則不告瀆䝉也傳初筮謂誠一而來求決其䝉則當以剛中之道告而開𤼵之再三煩數也來筮之意煩數不能誠一則瀆慢矣不當告也告之必不能信受徒為煩瀆故曰瀆䝉也求者告者皆煩瀆矣東萊吕氏曰初筮告以剛中也九二𤼵䝉者也九剛也二中也剛中九二之全體也當學者初來請問之時其心誠一故徑以全體告之再三瀆瀆則不告瀆䝉也再三瀆是䝉者瀆𤼵䝉者今不曰瀆𤼵䝉者而反曰瀆䝉何也盖聖人教令不倦豈嘗厭䝉者之瀆我哉所以再三瀆而不告者盖至理不容擬議一言之下便當領觧茍未領觧吾置之而不告彼雖未達其胸中天理固完然不動也若再三瀆告之則彼将入于擬議卜度反瀆亂其天理矣此所謂瀆䝉也蒙以養正聖功也傳卦辭曰利貞彖復伸其義以明不止為戒於二實養䝉之道也未𤼵之謂䝉以純一未𤼵之䝉而養其正乃作聖之功也𤼵而後禁則扞格而難勝養正於䝉學之至善也䝉之六爻二陽為治䝉者四隂皆處䝉者也本義以卦體釋卦辭也九二以可亨之道𤼵人之䝉而又得其時之中謂如下文所指之事皆以亨行而當其可也志應者二剛明五柔暗故二不求五而五求二其志自相應也以剛中者以剛而中故能告而有節也瀆筮者二三則問者固瀆而告者亦瀆矣䝉以養正乃作聖之功所以釋利貞之義也或問本義云九二以可亨之道𤼵人之䝉而又得其時之中如下文所指之事皆以亨行而當其可何以見其當其可朱子曰下文所謂二五以志相應而初筮則告之再三瀆則不告皆時中也初筮告以剛中者亦指九二有剛中之徳故能告而有節夫能告而有節即所謂以剛而中也䝉以養正聖功也葢言䝉昧之時先自養教正當了到那開𤼵時便有作聖之功若䝉昧之中巳自不正他日何由得㑹有聖功南軒張氏曰孟子曰大人者不失其赤子之心者也盖童稺之時純一不雜人欲未起天理實存謂之大人者守此而已謂之小人者失此而已人於是時保䕶養育則虚静純白渾然天成施為動作酧酢進退皆天理也非作聖之功起於此乎雲峰胡氏曰程傳云亨道即時中也本義謂九二以可亨之道𤼵人之䝉而又得其時之中盖䝉豈无可亨之道但恐亨之不得乎時之中爾本義謂如下文所指之事盖謂五之志未與初應而遽欲亨之非時中也再三瀆而亦告之非時中也䝉宜養正過此而後養之非時中也象曰山下出泉䝉君子以果行育徳行下孟反六三象同傳山下出泉出而遇險未有所之䝉之象也若人䝉稺未知所適也君子觀䝉之象以果行育徳觀其出而未能通行則以果決其所行觀其始出而未有所向則以養育其明徳也南軒張氏曰泉始出而遇險未有所之如人䝉稺未有所適貴於果行育徳充而達之也育徳之義尤當深體廣平游氏曰山下出泉其一未散其勢未達觀其勢之未達則果行觀其一之未散則育徳西山真氏曰泉之始出也㳙㳙之㣲壅於沙石豈能遽達哉唯其果決必行雖險不避故終能流而成川然使其源之不深則其行雖果而易以竭艮之象山也其徳止也山唯其静止故泉源之出者无窮有止而後有行也君子觀䝉之象果其行如水之必行育其徳如水之有本則其體盛大而其用周流矣夫徳者行之自出行者徳之所形體用之謂也有體而後有用所養者厚則其應不竆中庸曰溥博淵泉而時出之又曰小徳川流大徳敦化皆此義也本義泉水之始出者必行而有漸也朱子曰山下出泉却是箇流行底物事暫時被他礙住在這裏觀這意思却是説自家當恁地做工夫卦中如此者多以象言之果者泉之必通育者靜之時也季通云育徳是艮止也又曰果行有水之象育徳有山之象進齋徐氏曰䝉而未知所適也必體坎之剛中以決果其行而達之䝉而未有所害也必體艮之靜止以養育其徳而成之初六𤼵蒙利用刑人用説桎梏以徃吝説吐活反桎音質梏古毒反𫝊初以隂暗居下下民之䝉一作象也爻言𤼵之之道𤼵下民之䝉當明刑禁以示之使之知畏然後從而教導之自古聖王為治設刑罰以齊其衆明教化以善其俗刑罰立而後教化行雖聖人尚徳而不尚刑未嘗偏廢也故為政之始立法居先治䝉之初威之以刑者所以説去其昏䝉之桎梏桎梏謂拘束也不去其昏䝉之桎梏則善教无由而入既以刑禁率之雖使心未能喻亦當畏威以從不敢肆其昏䝉之欲然後漸能知善道而革其一无其字非心則可以移風易俗矣茍専用刑以為治則䝉雖畏而終不能𤼵茍免而无恥治化不可得而成矣故以徃則可吝龜山楊氏曰䝉无知也告之而弗喻引之而屢違非威之以刑莫能從也故𤼵䝉之初利用刑人記曰榎椘二物以收其威書曰朴作教刑是也童溪王氏曰禁於未𤼵之謂豫書制官刑儆于有位用訓于䝉士初隂暗正䝉士也建安丘氏曰治䝉之道示之以刑則人知警畏自可撤其昏䝉之蔽而无拘攣之患開𤼵之機由此而始初六以隂暗之䝉切近九二陽明之賢足以開𤼵之故曰𤼵䝉本義以隂居下䝉之甚也占者遇此當𤼵其䝉然𤼵之之道當痛懲而暫舎之以觀其後若遂徃而不舎則致羞吝矣戒占者當如是也朱子曰𤼵䝉之義或自家是䝉得他人𤼵或他人是䝉得自家𤼵利用刑人用説桎梏粗説時如今人打人棒也須與脱了那枷方可一向枷他不得若一向枷他便是以徃吝這只是説治䝉者當寛慢盖法當如此雲峰胡氏曰利用刑人痛懲之也用説桎梏暫舎之以觀其後也痛懲而不暫舎一於嚴以徃是不知有敬敷五教在寛之道也故吝象曰利用刑人以正法也𫝊治䝉之始立其防限明其罪討正其法也使之由之漸至於化也或疑𤼵䝉之初遽用刑人无乃不教而誅乎不知立法制刑乃所以教也葢後之論刑者不復知教化在其中矣本義𤼵䝉之初法不可不正懲戒所以正法也雲峰胡氏曰君師之道正而已屯初志行正䝉初以正法初之正猶懼失之於終况不正於初乎九二包䝉吉納婦吉子克家𫝊包含容也二居䝉之世有剛明之才而與六五之君相應中徳又同當時之任者也必廣其含容哀矜昏愚則能𤼵天下之䝉成治䝉之功其道廣其施博如是則吉也卦唯二陽爻上九剛而過唯九二有剛中之徳而應於五用於時而獨明者也茍恃其明専於自任則其徳不𢎞故雖婦人之柔闇尚當納其所善則其明廣矣又以諸爻皆隂故云婦堯舜之聖天下所莫及也尚曰清問下民取人為善也二能包納則克濟其君之事猶子能治其家也五既隂柔故𤼵䝉之功皆在於二以家言之五父也二子也二能主䝉之功乃人子克治其家也誠齋楊氏曰五求二二匪求五乃曰子克家何也臣事君如子事父正使致君如伊周亦臣子分内事如子之克家耳非功也隆山李氏曰震以建侯而有經綸之功此長子事也坎以剛中而有克家之能此次子事也艮以柔巽而得童䝉之告此少子事也乾坤三子至是各得其宜矣本義九二以陽剛為内卦之主統治羣隂當𤼵䝉之任也然所治既廣物性不齊不可一槩取必而爻之徳剛而不過為能有所包容之象又以陽受隂為納婦之象又居下位而能任上事為子克家之象故占者有其徳而當其事則如是而吉也朱子曰卦中説剛中處最好看剛故能包䝉不剛則方且為物所䝉安能包䝉剛而不中亦不能包䝉如上九過剛而不中所以為擊䝉大抵䝉卦除了初爻統説治䝉底道理其餘三四五皆是䝉者所以唯九二一爻為治䝉之主雲峰胡氏曰此爻具三象義各不同兩吉字是兩占辭包䝉納婦是兩象諸家觧此比而同之本義三象字兩又字見得三句取象自具三義觀此最可見易凡例包䝉包上下四隂也納婦納六五一隂也包與納二虛能受之象克九剛能任之象一六五也性隂有䝉象隂應陽有婦象位尊有父象以五之一爻而取象不同如此又於應爻見之易之不可為典要如此象曰子克家剛柔接也𫝊子而克治其家者父之信任専也二能主䝉之功者五之信任専也二與五剛柔之情相接故得行其剛中之道成𤼵䝉之功茍非上下之情相接則二雖剛中安能尸其事乎本義指二五之應進齋徐氏曰使䝉者與𤼵䝉者之情一不相按雖有善教無從入也雲峰胡氏曰剛柔有上下之分故屯二之於初惡其乘剛柔有徃來之情故䝉二之於五喜其接六三勿用取女見金夫不有躬无攸利取七具反𫝊三以隂柔處䝉闇不中不正女之妄動者也正應在上不能逺從近見九二為羣䝉所歸得時之盛故捨其正應而從之是女之見金夫也女之從人當由正禮乃見人之多金説而從之不能保有其身者也无所徃而利矣本義六三隂柔不中不正女之見金夫而不能有其身之象也占者遇之則其取女必得如是之人无所利矣金夫葢以金賂已而挑之若魯秋胡之為者朱子曰六三説勿用取女者大率隂爻又不中不正合是一般无主宰底女人金夫不必觧做剛夫雲峰胡氏曰諸爻皆説䝉此爻别𤼵一義昧其所適見利忘身䝉不足以盡之女一失身且如此士而失身於所從用之何利焉隆山李氏曰屯之六二近初九之陽而正應在五然震之性動而趨上舍初而歸五故曰女子貞不字十年乃字此女子之屯者也䝉之六三近九二之陽而正應在上然坎之性䧟而趨下舍上而從二故曰勿用取女見金夫不有躬此女子之䝉者也象曰勿用取女行不順也𫝊女之如此其行邪僻不順不可取也本義順當作慎葢順慎古字通用荀子順墨作慎墨且行不慎於經意尤親切今當從之六四困䝉吝𫝊四以隂柔而䝉闇无剛明之親援无由自𤼵其䝉困於昏䝉者也其可吝甚矣吝不足也謂可少也本義既逺於陽又无正應為困於䝉之象占者如是可羞吝也能求剛明之徳而親近之則可免矣節齋蔡氏曰困讀如困而不學之困隆山李氏曰六四以隂居隂而上下又皆隂䝉暗之甚者也欲從九二則下隔六三欲從上九則上隔六五獨逺於陽无以𤼵䝉而乆困中溪張氏曰天下之䝉皆可教也茍能隆師親友則困而知者與生知學知一也若終於困則吝矣象曰困䝉之吝獨逺實也逺于萬反𫝊䝉之時陽剛為𤼵䝉者四隂柔而最逺於剛乃愚䝉之人而不比近賢者无由得明矣故困於䝉可羞吝者以其獨逺於賢明之人也不能親賢以致困可吝之甚也實謂陽剛也本義實叶韻去聲龜山楊氏曰隂資陽以為明者六四之困逺於陽故也陽實隂虛實謂陽也平菴項氏曰初三近九二五近上九三五皆與陽應惟六四所比所應皆隂故曰獨逺實也沙随程氏曰小象叶聲韻故太𤣥測亦有韻孔氏正義於離爻亦嘗論之鄱陽董氏曰今易自坤以後六十三卦小象𫝊散入爻辭之下遂不可以韻讀之本義一用古易故多論叶韻而尤詳備於小過既濟二卦則通一部易皆可類推矣六五童䝉吉𫝊五以柔順居君位下應於二以柔中之徳任剛眀之才足以治天下之䝉故吉也童取未𤼵而資於人也為人君者茍能至誠任賢以成其功何異乎出於已也本義柔中居尊下應九二純一未𤼵以聽於人故其象為童䝉而其占為如是則吉也龜山楊氏曰五居尊位而下求九二之臣不挾貴也以童䝉自居不挾長不挾賢也茍有求焉而有所挾皆在所不告自天子至於庶人一也故惟童䝉乃吉夫湯之於伊尹髙宗之於傅説皆學焉而後臣之由斯道也雲峰胡氏曰屯所主在初卦曰利建侯而爻於初言之䝉所主在二卦曰童䝉求我而爻於五言之五應二者也知童䝉之為五則知我之為二矣童䝉純一未𤼵以聽於人五居尊位而能以童䝉自處一聼於二其吉可知象曰童䝉之吉順以巽也𫝊舎己從人順從也降志下求卑巽也能如是優於天下矣雙湖胡氏曰順以爻柔言巽以志應言上九擊䝉不利為㓂利禦㓂𫝊九居䝉之終是當䝉極之時人之愚䝉既極如苗民之不率為㓂為亂者當擊伐之然九居上剛極而不中故戒不利為㓂治人之䝉乃禦㓂也肆為剛暴乃為㓂也若舜之征有苗周公之誅三監禦㓂也秦皇漢武窮兵誅伐為㓂也朱子曰占得此爻凡事不可過當如伊川作用兵説亦是但只做得一事用不如且就淺處説去却事事上有用若便説深了則一事用得别事用不得莆陽張氏曰諸爻皆䝉其不䝉者惟二剛二以剛居中包䝉以開其善上以剛過中擊䝉以懲其惡本義以剛居上治䝉過剛故為擊䝉之象然取必太過攻治太深則必反為之害惟捍其外誘以全其真純則雖過於嚴密乃為得宜故戒占者如此凡事皆然不止為誨人也或問本義只就自身克治上説如何朱子曰事之大小都然治身也恁地若治人做得太甚亦反成為㓂進齋徐氏曰上過剛不中又居過髙之位在下者既昏䝉在上者又髙亢情意不接彼此扞格乃以為瀆而至於擊䝉也雲峰胡氏曰本義釋此爻與九二爻相應盖所治既廣而又攻治太深物性不齊不可一槩取必而又取必太過是欲去其害而反為害者也故曰不利為㓂人性純一未𤼵之䝉不能不為外誘之物所化惟為之捍其外誘以全其真純雖過於嚴乃為得宜故曰利禦㓂且曰凡事皆然不止為誨人也朱子之教人可謂精且備矣象曰利用禦㓂上下順也傳利用禦㓂上下皆得其順也上不為過暴下得擊去其䝉禦㓂之義也本義禦㓂以剛上下皆得其道白雲郭氏曰上九過剛之才𤼵䝉則為暴包䝉則不能容以之禦㓂則利矣能禦㓂亦去衆䝉之害也雲峰胡氏曰上之剛不為㓂而止㓂上之順也下之人随其所止而止之下之順也建安丘氏曰䝉卦六爻二陽四隂故以二陽為四隂之主然九二得中得時上九過中失時故二又為䝉之主其曰包䝉吉納婦吉則爻之所指可見矣至上九則但擊䝉禦㓂而已其上下四隂爻皆因二以起義五應二則為童䝉之吉初承二則為𤼵䝉之利四逺二不明者也則為用䝉之吝三乘二不順者也聖人不以䝉待之故此爻不言䝉乾下坎上𫝊需序卦䝉者䝉也物之稺也物稺不可不養也故受之以需需者飲食之道也夫物之㓜稺必待養而成養物之所需者飲食也故曰需者飲食之道也雲上於天有蒸潤之象飲食所以潤益於物故需為飲食之道所以次䝉也卦之大意須待之義序卦取所須之大者耳乾健之性必進者也乃處坎險之下險為之阻故須待而後進也徂徠石氏曰凡乾在下者必當上復今欲上復前遇坎險未可直進宜須待之誠齋楊氏曰𫝊曰需事之賊言猶豫不决之害事也易之需非不决之需見險而未可動能動而能不動者也需有孚光亨貞吉利渉大川𫝊需者須待也以二體言之乾之剛健上進而遇險未能進也故為需待之義以卦才言之五居君位為需之主有剛健中正之徳而誠信充實於中中實有孚也有孚則光明而能亨通得貞正一无正字而吉也以此而需何所不濟雖險无難矣故利渉大川也凡貞吉有既正且吉者有得正則吉者當辨也莆陽張氏曰利渉大川者乾濟乎坎也以剛中之徳臨事而懼何所徃而不利哉西山真氏曰按諸卦凡言利渉大川皆利濟險渉難之義本義需待也以乾遇坎乾健坎險以剛遇險而不遽進以䧟於險待之義也孚信之在中者也其卦九五以坎體中實陽剛中正而居尊位為有孚得正之象坎水在前乾健臨之将渉水而不輕進之象故占者為有所待而能有信則光亨矣若又得正則吉而利渉大川正固无所不利而渉川尤貴於能待則不欲速而犯難也朱子曰需主事孚主心需其事而心能信實則光亨以位乎尊位而中正故所為如此利渉大川而能需則徃必有功利渉大川亦䝉上文有孚光亨貞吉又曰需者寕耐之意以剛遇險時節如此只常寕耐以待之且如渉川者多以不能寕耐致覆溺之禍故需卦首言利涉大川雲峰胡氏曰需待也乾陽在下皆有所需九五坎陽在上又為衆所需需而无實无光且亨之時需而非正无吉且利之理世有心雖誠實而處事或有未正者故曰孚又曰貞彖曰需須也險在前也剛健而不䧟其義不困竆矣𫝊需之義須也以險在於前未可遽進故需待而行也以乾之剛健而能需待不輕動故不䧟於險其義不至於困竆也剛健之人其動必躁乃能需待而動處之至善者也故夫子贊之云其義不困竆矣本義此以卦徳釋卦名義涑水司馬氏曰坎䧟也而云不䧟者何也需然後進所以不䧟也隆山李氏曰乾之三陽在下而上卦遇坤離兌則為泰為大有為夬進无齟齬何也柔順在上而无逆也若夫坎險在上安得冒進而不少需哉中溪張氏曰需合乾坎成卦乾三陽進迫乎坎遇險而能須者也坎一陽居中守正處險而能需者也遇險而能需則不至犯險處險而能需則又将出險矣需有孚光亨貞吉位乎天位以正中也𫝊五以剛實居中為孚之象而得其所需亦為有孚之義以乾剛而至誠故其徳光明而能亨通得貞正而吉也所以能然者以居天位而得正中也居天位指五以正中兼二言故云正中楊氏曰需之義有二有需於人者有為人所需者需於人者初二三四上是也為人所需者五是也惟為人所需者既中正而居天位則雖險在前而終必克濟非若蹇之見險而止也雖坎居上而剛健不䧟非若困之剛揜也利渉大川徃有功也𫝊既有孚而貞正雖涉險阻徃則有功也需道之至善也以乾剛而能需何所不利建安丘氏曰乾在坎下為需剛健而不䧟故云利渉大川乾在坎上為訟健无所施故云不利涉大川本義以卦體及兩象釋卦辭朱子曰以正中以中正也即一般這只是要協韻利涉大川利涉是乾也大川是坎也徃有功是乾有功也或云以乾去涉大川雲峰胡氏曰凡五皆天位也屯不足言特於需𤼵其義象曰雲上於天需君子以飲食宴樂上時掌反樂音洛𫝊雲氣蒸而上升於天必待隂陽和洽然後成雨雲方上於天未成雨也故為須待之義隂陽之氣交感而未成雨澤猶君子畜其才徳而未施於用也君子觀雲上於天需而為雨之象懐其道徳安以待時飲食以養其氣體宴樂以和一作養其心志所謂居易以俟命也本義雲上於天无所復為待其隂陽之和而自雨爾事之當需者亦不容更有所為但飲食宴樂俟其自至而已一有所為則非需也朱子曰需待也以飲食宴樂謂更无所為待之而已待之須有至時學道者亦猶是也東萊吕氏曰雲上於天而未成雨猶君子未施於用而需待之時也飲食宴樂涵養此理而已與後世不得志而麹蘖之託昏㝠之逃者異矣勉齋黄氏曰雲上於天需待之象今而曰雲上於天无所復為則是兼取於飲食宴樂之義雲上於天自為需待之義飲食宴樂則君子處需而得其道也其義九五一爻盡之矣初九需于郊利用恆无咎𫝊需者以遇險故需而後進初最逺於險故為需于郊郊曠逺之地也處於曠逺利在安守其常則无咎也不能安常則躁動犯難豈能需於逺而无過也本義郊曠逺之地未近於險之象也而初九陽剛又有能恒於其所之象故戒占者能如是則无咎也隆山李氏曰安常守静待時之義以乾之健而必進乃能需以待焉以此涉世何咎之有雲峰胡氏曰國外曰郊同人以象上九此以象初皆取其逺也同人于門于宗而後于郊近而逺也需于郊而後于沙于泥逺而近也初能需于曠逺之地而又戒之以利用恒者身不輕進必志不妄動斯无咎也象曰需于郊不犯難行也利用恒无咎未失常也難乃旦反𫝊處曠逺者不犯冒險難而行也陽之為物剛健上進者也初能需待於曠逺之地不犯險難而進復宜安處不失其常則可以无咎矣雖不進而志動者不能安其常也君子之需時也安靜自守志雖有須而恬然若將終身焉乃能用常也龜山楊氏曰乾道上行為常方需之時坎險在前宜需而後進雖久於其所未為失常也九二需于沙小有言終吉沙鄭本作沚𫝊坎為水水近則有沙二去險漸近故為需于沙漸近於險難雖未至於患害已小有言矣凡患難之辭大小有殊小者至於有言言語之傷至小者也二以剛陽之才而居柔守中寛裕自處需之善也雖去險漸近而未至於險故小有言語之傷而无大害終得其吉也本義沙則近於險矣言語之傷亦災害之小者漸進近坎故有此象剛中能需故得終吉戒占者當如是也臨川吳氏曰九二剛而在地上位與坎水中爻相應猶沙地雖瀕水而逺水已漸漬于其中故曰需于沙有言如鄭息有違言謂以口語相傷也雲峰胡氏曰初最逺坎利用恒乃无咎九二漸近坎小有言矣而曰終吉者初九以剛居剛恐其躁急故雖逺險猶有戒辭九二以剛居柔性寛而得中故雖近險而不害其為吉象曰需于沙衍在中也雖小有言以吉終也衍以善反𫝊衍寛綽也二雖近險而以寛裕居中故雖小有言語及之終得其吉善處者也本義衍寛意以寛居中不急進也雲峰胡氏曰下體乾九二衍在中即乾九二寛以居之也初不失常故不犯難二以寛居中故不急進九三需于泥致㓂至𫝊泥逼於水也既進逼於險當致㓂難之至也三剛而不中又居健體之上有進動之象故致㓂也茍非敬慎則致喪敗矣本義泥將䧟於險矣㓂則害之大者九三去險愈近而過剛不中故其象如此朱子曰以其廹近坎險故有致㓂至之象瀘川毛氏曰近則有言廹則致㓂其勢然也誠齋楊氏曰初需于郊止而不敢進二需于沙進而不敢逼三需于泥則進而逼於水矣然坎猶在外也災在外而我逼之是水不溺人而人自狎水也狎水死者勿咎水致㓂敗者勿咎㓂自我致之故也雲峰胡氏曰需與漸皆取有所待而進之義需内卦于郊于沙于泥由平原而水際水際非人所安也漸内卦于干于磐于陸由水際而平原平原非鴻所安也皆以三危地故也需之三遇坎而曰致㓂至漸之三互坎而曰禦㓂禦㓂者艮剛而能止致㓂者乾剛而不中也致之一字罪在三矣險何嘗逼三三急於求進自逼於險云象曰需于泥災在外也自我致㓂敬慎不敗也𫝊三切逼上體之險難故云災在外也災患難之通稱對𤯝而言則分也三之致㓂由已進而廹之故云自我㓂自己致若能敬慎量宜而進則无喪敗也需之時須而後進也其義在相時而動非戒其不得進也直使敬慎毋失其宜耳本義外謂外卦敬慎不敗𤼵明占外之占聖人示人之意切矣或問敬慎不敗本義以為𤼵明占外之意何也朱子曰言象中本无此意占者不可无此意所謂占外意也問敬慎二字曰敬字大慎字小如人行路一直恁地去便是敬前面險處防有喫跌便是慎慎是唯恐有失之意又曰孔子雖説推明義理這般所在又變例推明占筮之意需于泥災在外占得此象雖若不吉然能敬慎則不敗又能堅忍以需待處之得其道所以不凶或失其剛健之徳又无堅忍之志則不能不敗矣建安丘氏曰坎險在外未嘗廹人由人急於求進自逼於險以致禍敗象以自我釋之明致災之由不在他人也六四需于血出自穴𫝊四以隂柔之質處于險而下當三陽之進傷於險難者也故云需于血既傷于險難則不能安處必失其居故云出自宂宂物之所安也順以從時不競於險難所以不至於凶也以柔居隂非能競者也若陽居之則必凶矣葢无中正之徳徒以剛競於險適足以致凶耳或問程𫝊釋穴物之所安朱子曰穴是䧟處喚做所安處不得分明有箇坎䧟也一句柔得正了需而不進故能出於坎䧟四又是坎體之初有出底道理到那上六則索性䧟了本義血者殺傷之地宂者險䧟之所四交坎體入乎險矣故為需于血之象然柔得其正需而不進故又為出自宂之象占者如是則雖在傷地而終得出也雙湖胡氏曰坎為水為血今不曰需于水而曰需于血故本義以為殺傷之地四下卦之上又有出自穴之象雲峰胡氏曰出自穴諸家以為三陽方來四出而不安於穴本義以為四隂柔得正可出而不䧟於穴夫以小畜之時下三陽竝進而六四當之其終也猶血去惕出需之時三陽非急於進者四需于血而終得出自穴者宜也以為不安於其穴者過矣象曰需于血順以聽也𫝊四以隂柔居於險難之中不能固處故退出自穴葢隂柔一作柔弱不能與時競不能處則退是順從以聽於時所以不至於凶也雲峰胡氏曰三能敬則雖廹坎之險而不敗四能順則雖䧟坎之險而可出敬與順固處險之道也九五需于酒食貞吉𫝊五以陽剛居中得正位乎天位克盡其道矣以此而需何需不獲故宴安酒食以俟之所須必得也既得貞正而所需必遂可謂吉矣本義酒食宴樂之具言安以待之九五陽剛中正需于尊位故有此象占者如是而貞固則得吉也或問需于酒食貞吉朱子曰需只是待當此之時别无作為只有箇待底道理然又須是正方吉坎體中多説酒食想須有此象但今不可考進齋徐氏曰九五為需之主以一陽處二隂之中以待下三陽同徳之援者也陽彚而進隂引而退自此坎可平險可夷矣人君於此復何為哉唯出而位乎中正之位需于酒食優㳺宴樂與天下相安於太平醉飽之域可也雲上於天物需雨澤以為養也需于酒食人需飲食以為養也雲峰胡氏曰酒食坎象開闢以來生民有欲莫大於飲食男女屯蒙卦爻既於婚娶之正三致意焉此復以飲食之正言之五有剛中之徳時乎當需且宜需于酒食安以待之况在下者乎五需于酒食惟正乃吉况在下而可宴酣无度乎本義云占者如是而貞固則吉其教人之意切矣象曰酒食貞吉以中正也𫝊需于酒食而貞且吉者以五得中正而盡其道也上六入于宂有不速之客三人來敬之終吉𫝊需以險在前需時而後進上六居險之終終則變矣在需之極久而得矣隂止於六乃安其處故為入于宂宂所安也安而既止後者必至不速之客三人謂下之三陽乾之三陽非在下之物需時而進者也需既極矣故皆上進不速不促之而自來也上六既需得其安處羣剛之來茍不起忌疾忿競之心至誠盡敬以待之雖甚剛暴豈有侵陵之理故終吉也或疑以隂居三陽之上得為安乎曰三陽乾體志在上進六隂位非所止之正故无爭奪之意敬之則吉也新安胡氏曰四外卦之初出尚有可之之所上外卦之終出無可之矣故入而藏出逃其巢穴所以避陽而去入伏於巢宂所以避陽之來隆山李氏曰三陽君子也其進也四以抗而傷上以敬而吉小人不敢于君子君子亦不薄小人也乾知險而需所以為君子之謀隂知敬而避所以為小人之戒臨川吳氏曰上獨不言需者時既終矣无復有所需也本義隂居險極无復有需有䧟而入宂之象下應九三九三與下二陽需極竝進為不速客三人之象柔不能禦而能順之有敬之之象占者當䧟險中然於非意之來敬以待之則得終吉也朱子曰乾陽上進之物前遇坎險不可遽進以䧟於險故為需遇此時節當随遠随近寧耐以待之直至需于泥已甚狼當矣然能敬慎亦不至敗至於九五需得好只是又難得這般時莭當此時只要定以待之耳至上六居險之極又有三陽竝進六不當位又處隂柔亦只得敬以待之則吉雲峰胡氏曰外卦險體二隂皆有宂象四出自宂而上則入于宂何哉六四柔正能需猶可出於險故曰出者許其将然也上六柔而當險之終惟入于險而已故曰入者言其已然也然雖已入于險非意之來敬之終吉君子未嘗无處險之道也象曰不速之客來敬之終吉雖不當位未大失也當都浪反後凡言當位不當位者倣此𫝊不當位謂以隂而在上也爻以六居隂為所安象復盡其義明隂宜在下而居上為不當位也然能敬慎以自處則陽不能陵終得其吉雖不當位而未至於大失也本義以隂居上是為當位言不當位未詳或問不當位如何朱子曰凡初上二爻皆无位二士三卿大夫四大臣五君位上六之不當位如父老不任家事而退閑僧家之有西堂之類王弼説初上无隂陽定位伊川云隂陽竒耦豈容无也乾上九貴而无位需上六不當位乃爵位之位非隂陽之位此説極好東萊吕氏曰需初九九五二爻之吉固不待言至於餘四爻雖時有悔吝然終歸於吉如二則小有言終吉如三之象則曰敬慎不敗四之象則曰順以聽也上則曰有不速之客三人來敬之終吉大抵天下之事若能𣢾曲停待終是少錯坎下乾上𫝊訟序卦飲食必有訟故受之以訟人之所需者飲食既有所須爭訟所由起也訟所以次需也為卦乾上坎下以二象言之天陽上行水性就下其行相違所以成訟也以二體言之上剛下險剛險相接能无訟乎又人内險阻而外剛強所以訟也建安丘氏曰訟字從言從公言出於公則為訟不公則為誣為詐非訟也雲峰胡氏曰屯䝉之後繼以需訟需由於屯世不屯无需訟由於䝉人不䝉无訟訟有孚窒惕中吉終凶窒張栗反𫝊訟之道必有其孚實中无其實乃是誣妄凶之道也卦之中實為有孚之象訟者與人爭辯而待決於人雖有孚亦須窒塞未通不窒則已明无訟矣事既未辯吉凶未可必也故有畏惕中吉得中則吉也終凶終極其事則凶也厚齋馮氏曰有孚而窒焉故訟訟而未明則惕潜齋胡氏曰曲直未明故窒勝負未明故惕中吉虞芮之相遜是也終凶雍子納賂而蔽罪邢侯是也利見大人不利渉大川𫝊訟者求辯其曲直也故利見於大人大人則能以其剛明中正決所訟也訟非和平之事當擇安地而處不可䧟於危險故不利渉大川也本義訟争辯也上乾下坎乾剛坎險上剛以制其下下險以伺其上又為内險而外健又為已險而彼健皆訟之道也九二中實上无應與又為加憂且於卦變自遯而來為剛來居二而當下卦之中有有孚而見窒能懼而得中之象上九過剛居訟之極有終極其訟之象九五剛健中正以居尊位有大人之象以剛乘險以實履䧟有不利渉大川之象故戒占者必有爭辯之事而随其所處為吉凶也朱子曰訟攻責也如今訟人攻責其短而訟之自訟則反之於身亦如此盤澗董氏曰九二中實為有孚坎險為窒坎為加憂為惕九二居下卦之中故曰有信而見窒能懼而得中也終凶盖取上九終極於訟之象利見大人盖取九五剛健中正居尊之象不利涉大川又取以剛乘險以實履䧟之象此取義不一也然亦有不必如此取者此特其一例也先生嘗曰卦辭如此辭極齊整葢所取諸爻義皆與爻中本辭協亦有雖取爻義而與爻本辭不同者此為不齊整處是也雲峰胡氏曰需訟二卦皆以坎之中實為主特需之坎在上為光為亨訟之坎在下為窒為惕窒惕者光亨之反也本義謂涉川尤貴於能待就需待之義説利涉以剛乘險以實履䧟就爭訟之危説不利涉其義精矣大扺能安其分則為需以相待不能安其分則為訟以相持故需卦辭有吉无凶有利无不利於訟則曰如是而吉如是而凶如是而利如是而不利别白言之所謂随其所處為吉凶者也彖曰訟上剛下險險而健公言𫝊訟之為卦上剛下險險而又健也又為險健相接内險外健皆所以為訟也若健而不險不生訟也險而不健不能訟也險而又健是以訟也本義以卦徳釋卦名義嵩山晁氏曰上以剛陵下下不險則未必訟下以險䧟上上不剛則未必訟外健而内不險未必生訟内險而外不健未必能訟雲峰胡氏曰上下以分言本不當訟上剛以勢陵下也下險其情始不可測矣以一人言内險而外健以二人言已險而彼健也訟有孚窒惕中吉剛來而得中也𫝊訟之道固如是又據卦才而言九二以剛自外來而成訟則二乃訟之主也以剛處中中實之象故為有孚處訟之時雖有孚信亦必艱阻窒塞而有惕懼不窒則不成訟矣又居險䧟之中亦為窒塞惕懼之義二以陽剛自外來而得中為以剛來訟而不過之義是以吉也卦有更取成卦之由為義者此是也卦義不取成卦之由則更不言所變之爻也據卦辭二乃善也而爻中不見其善葢卦辭取其有乎得中而言乃善也爻則以自下訟上為義所取不同也終凶訟不可成也𫝊訟非善事不得已也安可終極其事極意於其事則凶矣故曰不可成也成謂竆盡其事也利見大人尚中正也𫝊訟者求辯其是非也辯之當乃中正也故利見大人以所尚者中正也聽者一有或字非其人則或不得其中正也中正大人九五是也楊氏曰虞芮爭田之訟必欲見文王故其訟之理決䑕牙雀角之誠偽必欲見召伯故其訟之理明為聽訟之大人者不尚中正可乎不利涉大川入于淵也𫝊與人訟者必處其身於安平之地若蹈危險則䧟其身矣乃入于深淵也卦中有中正險䧟之象本義以卦變卦體卦象釋卦辭朱子曰訟卦變自遯而來為剛來居二此是卦變中二爻變者葢四陽二隂自遯來者十四卦訟即初變之卦剛來居二柔進居三故曰剛來而得中進齋徐氏曰天下唯剛者訟柔者不訟以險而遇健所以訟也二以剛中則為有孚但二五剛敵而不相應上下猶有窒塞之情必因其窒塞而懐吾怵惕憂懼之心不過於訟則為吉以其剛來而得中也訟卦下體本艮今九自三來居於下卦之中而成訟故得訟之中吉終極而成則凶故又以不可成戒之建安丘氏曰剛來而得中此卦變也易中言卦變始於此剛自上而反下為來柔自下而升上為徃為進凡卦中言剛柔上下之徃來者多三隂三陽之卦謂内外兩體之變也如噬嗑賁之類是也有四陽二隂四隂二陽之卦亦言剛來柔進者謂上下一爻之變也如訟晉之類是也聖人之言卦變於此見其兩端焉象曰天與水違行訟君子以作事謀始𫝊天上水下相違而行二體違戾訟之由也若上下相順訟何由興君子觀象知人情有爭訟之道故凡所作事必謀其始絶訟端於事之始則訟无由生矣謀始之義廣矣若慎交結明契券之類是也本義天上水下其行相違作事謀始訟端絶也龜山楊氏曰天左旋而水東注違行也作事至於違行而後謀之則无及矣雲峯胡氏曰凡事有始有中有終訟中吉終凶然能謀於其始則訟端既絶中與終不必言矣平菴項氏曰乾陽生於坎水坎水生於天一乾坎本同氣而生者也一動之後相背而行遂有天淵之隔由是觀之天下之事不可以細㣲而不謹也不可以親暱而不敬也禍難之端夫豈在大曹劉共飯地分於匕筯之間蘇史滅宗忿起於笑談之頃謀始之誨豈不深切著明乎丹陽都氏曰天為三才之始水為五行之始君子法之作事謀始初六不永所事小有言終吉𫝊六以柔弱居下不能終極其訟者也故於訟之初因六之才為之戒曰若不長永其事則雖小有言終得吉也葢訟非可長之事以隂柔之才而訟於下難以吉矣以上有應援而能不永其事故雖小有言終得吉也有言災之小者也不永其事而不至於凶乃訟之吉也蘭氏廷瑞曰六爻唯初與三隂柔而不爭故不言訟臨川吳氏曰柔弱居下不能終訟故曰不永所事雖有言語之傷而終則吉也與終凶之終不同本義隂柔居下不能終訟故其象占如此朱子曰此爻是隂柔之人也不㑹十分與人訟那人也無十分傷犯底事但只略去訟才辯得明便止所以曰終吉臨川吳氏曰不永所事此邵子所謂意象也雲峰胡氏曰不曰不永訟而曰不永所事事之初猶兾其不成訟也小有言與需不同需有言近坎也人不能不小有言也此之小有言坎也我不得已而小有言也又曰終凶者上九在訟為終在人為不終終吉者初六在訟為不終在人為有終誠齋楊氏曰六以才弱而位下才弱者有慙忿而无遂心故雖訟而不永位下者敢於微愬而不敢於大訟故雖有言而小不永則易收小言則易釋所以終吉象曰不永所事訟不可長也𫝊六以柔弱而訟於下其義固不可長永也永其訟則不勝而禍難及矣又於訟之初即戒訟非可長之事也雖小有言其辯明也𫝊柔弱居下才不能訟雖不永所事既訟矣必有小災故小有言也既不永其事又上有剛陽之正應辯理之明故終得其吉也不然其能免乎在訟之義同位而相應相與者也故初於四為獲其辯明同位而不相得相訟者也故二與五為對敵也九二不克訟歸而逋其邑人三百戸无眚逋補吴反眚生領反𫝊二五相應之地而兩剛不相與相訟者也九二自外來以剛處險為訟之主乃與五為敵五以中正處君位其可敵乎是為訟而義不克也若能知其義之不可退歸而逋避以寡約自處則得无過眚也必逋者避為敵之地也三百户邑之至小者若處強大是猶競也能无眚乎眚過也處不當也與知惡而為有分也本義九二陽剛為險之主本欲訟者也然以剛居柔得下之中而上應九五陽剛居尊勢不可敵故其象占如此邑人三百户邑之小者言自處卑約以免災患占者如是則无眚矣朱子曰九二正應在五五亦陽故為窒塞之象不克訟歸而逋其邑人三百户无眚何故不言二百户以其有定數也今觧者却要牽強故只得説小邑某嘗以為易有象數者以此聖人之象便依樣子今不可考王弼説得意㤀象是要㤀了這象伊川又説假象是只要假借此象今看得不觧恁地全無那象只是不可知只得且從理上説節齋蔡氏曰克能也位柔故不克逋逃也隐兩柔之中有逋象邑内地退處卑小故无眚雲峰胡氏曰九二九四皆以剛居柔故皆不克訟但九四居健體之初非能用其健者九二為險體之主則本欲用其險者本義謂其本欲訟葢誅其心而言之也但以九五勢不可敵故從而退避省約然則二之不克訟非不能也勢不可也故僅可以无眚焉耳進齋徐氏曰退處卑小示屈服之意也茍猶據大邑雖曰退聽跡尚可疑如都城百雉足以偶國臧武仲據防請後豈理也哉雙湖胡氏曰六爻自五君位外上不足言初三四吉二僅无眚者以犯分於先不克而後逋竄非本无訟上之心也易於君臣之分其嚴矣哉象曰不克訟歸逋竄也𫝊義既不敵故不能訟歸而逋竄避去其所也自下訟上患至掇也掇都活反𫝊自下而訟其上義乖勢屈禍患之至猶拾掇而取之言易得也本義掇自取也平庵項氏曰上兩句皆是爻辭下兩句方是象𫝊如需之上六象𫝊句法六三食舊徳貞厲終吉𫝊三雖居剛而應上然質本隂柔處險而介二剛之間危懼非為訟者也祿者稱徳而受食舊徳謂處其素分貞謂堅固自守厲終吉謂雖處危地能知危懼則終必獲吉也守素分而无求則不訟矣處危謂在險而承乘皆剛與居訟之時也進齋徐氏曰聖人於初三兩柔爻皆係之以終吉之辭所以勉人之旡訟也茍知柔而不喜訟者終吉則知剛而好訟者終凶矣或從王事无成𫝊柔從剛者也下從上者也三不為訟而從上九所為故曰或從王事无成謂從上而成不在已也訟者剛健之事故初則不永三則從上皆非能訟者也二爻皆以隂一作處柔不終而得吉四亦以不克而渝得吉訟以能止為善也平庵項氏曰坤六三雖无成而有終但不敢為倡而已訟六三止云无成則始終皆无矣進齋徐氏曰王事即訟事无成即彖之訟不可成也本義食猶食邑之食言所享也六三隂柔非能訟者故守舊居正則雖危而終吉然或出而從上之事則亦必无成功占者守常而不出則善也雲峰胡氏曰食舊徳與位乎天徳語同位必稱徳而居故寕徳過其位毋位過其徳食必稱徳而食故寕徳浮于食毋食浮于徳食猶食邑之食九二邑人三百户食之最約者也二剛險本欲訟者能退處於分之小僅可无眚三隂柔本不能訟者能安守其分之常雖厲猶吉謂之貞者守常則為貞不守常非貞也曰貞曰或從王事无成與坤六三爻辭同此獨不曰有終者三下卦之終也在坤之三而或出始雖无成而後猶可以有終在訟之三而或出但見其无成而已訟固非可終者本義曰占者守常而不出則善矣葢守常而或出則非貞能守者矣深戒之也象曰食舊徳從上吉也𫝊守其素分雖一无雖字從上之一无之字所為非由已也故无成而終得其吉也本義從上吉謂隨人則吉明自主事則无成功也九四不克訟復即命渝安貞吉渝以朱反𫝊四以陽剛而居健體不得中正本為訟者也承五履三而應一有於字初五君也義不克訟三居下而柔不與之訟初正應而順從非與訟者也四雖剛健欲訟无與對敵其訟无由而興故不克訟也又居柔以應柔亦為能止之義既義不克訟若能克其剛忿欲訟之心復即就於命革其心平其氣變而為安貞則吉矣命謂正理失正理為方命故以即命為復也方不順也書云方命圯族孟子曰方命虐民夫剛健而不中正則躁動故不安處非中正故不貞不安貞所以好訟也若義不克訟而不訟反就正理變其不安貞為安貞則吉矣東萊吕氏曰以九居四是剛強之人處不中正之地本好訟者也然所承者五五至尊而不敢與之訟所履者三三至柔而不至於生訟所應者初初既相應亦非與之為訟者也左右前後皆无可者雖有好訟之心略不得騁則其心必自還而歸善故曰復即命命正理也好訟之心既无所施則必復就於正理渝變而為善也譬如水之泛溢欲擊東岸而其岸堅而不可動欲擊西岸而其岸又堅而不可動則必循循歸于故道矣心之所之只有善惡兩件於惡既不得騁不之於善将何之乎本義即就也命正理也渝變也九四剛而不中故有訟象以其居柔故又為不克而復就正理渝變其心安處於正之象占者如是則吉也括蒼龔氏曰二與五訟四與初訟其與為敵者強弱不同而皆曰不克者盖二以下訟上其不克者勢也四以上訟下其不克者理也二見勢之不可敵故歸而逋竄四知理之不可渝故復而即命二四皆剛居柔故能如此雲峰胡氏曰命有指理言者有指氣言者否九四曰有命指氣言也此曰即命指理言也皆上乾故皆曰命四之不克訟與二不同九二坎體其心本險九四乾體其心能安乎天理之正然曰歸曰渝皆知反者九二識時勢能反而安其分之小九四明義理能變而安於命之正聖人不貴无過而貴改過又如此象曰復即命渝安貞不失也𫝊能如是則為无失矣所以吉也建安丘氏曰二沮於勢四屈於理此二之美所以止於无眚而四之貞吉所以為不失也九五訟元吉𫝊以中正居尊位治訟者也治訟得其中正所以元吉也元吉大吉而盡善也吉大而不盡善者有矣本義陽剛中正以居尊位聼訟而得其平者也占者遇之訟而有理必獲伸矣瀘川毛氏曰使小民无爭安用有司使諸侯无爭委裘可也然則天下不能无爭者勢也所以利見大人者利其主之也又曰九五乃聽訟之主刑獄之官皆足以當之不必専謂人君然人君於訟之大者如刑獄亦豈得不聽攷之王制周官盖可見矣所謂㒺攸兼于庶獄獄事之小不必聼者也又曰朱子謂筮者遇之訟而有理必復伸矣如此乃无滯礙盖訟者遇此爻則為利見大人之中正曲直必定乃所謂元吉也雙湖胡氏曰九五聽訟之主訟元吉亦為占者人有正直之事遇此聽訟之人自有元吉之道雲峰胡氏曰九五剛健中正聼訟必得其平然古人不貴聽訟而貴无訟初不永訟三不訟四二不克訟在下皆无訟此九五所以於訟為元吉也象曰訟元吉以中正也𫝊中正之道何施而不元吉本義中則聽不偏正則斷合理東萊吕氏曰訟元吉以中正也九五聽訟者也訴訟之繁多至千百聼訟者欲其盡善而咸吉茍件件尋一道理以應之則亦不勝其勞矣殊不知聽訟所以能盡善而咸吉者本无多術只是一箇中正待之而巳中溪張氏曰九五出而聼天下之訟惟中則無偏聽之病惟正則無私繋之失舉天下之事是非曲直一以中正之道裁之訟其決矣此所以大吉彖曰尚中正象曰以中正則知人君之聽訟當以中正為主也獄訟之歸舜虞芮之質文九五有之上九或錫之鞶帶終朝三褫之禠敕紙反𫝊九以陽居上剛健之極又處訟之終極其訟者也人之肆其剛強竆極於訟取禍喪身固其理也設或使之善訟能勝竆極不已至於受服命之賞是亦與人仇爭所獲其能安保之乎故終一朝而三見褫奪也本義鞶帶命服之飾褫奪也以剛居訟極終訟而能勝之故有錫命受服之象然以訟得之豈能安久故又有終朝三褫之象其占為終訟无理而或取勝然其所得終必失之聖人為戒之意深矣南軒張氏曰以六三對上九剛柔不敵矣故六三但食舊徳而上九錫之鞶帶焉兼山郭氏曰鞶帶大帶也男子鞶帶婦人帶絞盖爵命之服非以賞訟雲峯胡氏曰或設若也非必之辭上九過於剛設若訟勝而得鞶帶終朝且三禠之况鞶帶命服以錫有徳非以賞訟也豈有必得之理甚言訟之不可終也平庵項氏曰上九以剛居柔可以不克訟矣而在訟之終居髙用剛不勝不已此終訟之凶人也厚齋馮氏曰初六上九不能无訟明矣而初不言訟杜其始也上不言訟惡其終也象曰以訟受服亦不足敬也𫝊竆極訟事設使受服命之寵亦且不足敬而可賤惡况又禍患隨至乎盤澗董氏曰觀訟一卦之體只是訟不可成初只不永所事九二不克訟六三守舊居正非能訟者九四不克訟而能復就正理渝變心志安處於正九五聼訟元吉上九雖有鞶帶之錫而不免終朝之三褫首尾皆是不可訟之意故彖曰終凶訟不可成此即本義所指卦體者是也建安丘氏曰以六爻言之則上乾三爻與下坎三爻訟也九五居尊為聼訟之主故訟元吉餘五爻則皆訟者也然天下之人惟剛者訟柔者不訟初與三柔也故初不永所事而終吉三食舊徳而終吉二四上剛也二與五對揆勢不敵而不訟四與初對顧理不可而不訟亦以其居柔故二无眚而四安貞也獨上九處卦之竆下與三對柔不能抗故有錫鞶帶之辭焉然一日三褫辱亦甚矣訟之勝者何足敬乎周易𫝊義大全卷三
