body:
  text: 周易傳義大全卷一明胡廣等撰周易上經本義周代名也易書名也其卦本伏羲所畫有交易變易之義故謂之易其辭則文王周公所繫故繫之周以其簡袠重大故分為上下兩篇經則伏羲之畫文王周公之辭也并孔子所作之傳十篇凡十二篇中間頗為諸儒所亂近世朝氏始正其失而未能盡合古文呂氏又更定著為經二卷傳十卷乃復孔氏之舊云或問伏羲始畫八卦其六十四者文王重之邪抑伏羲已自畫了邪看先天圖則有八卦便有六十四卦是伏羲之時已有六畫矣如何朱子曰周禮三易經卦皆八其别皆六十有四便見不是文王重又曰伏羲已上但有此畫而無文字可傳到得文王周公乃繫之以辭問交易變易如何曰隂陽有箇流行砥有箇定位砥一動一靜互為其根便是流行砥寒往暑來是也分隂分陽兩儀立焉便是定位砥天地上下四方是也變易便是流行砥交易便是對待砥又曰交易是陽交於隂隂交於陽是卦圖上砥如天地定位山澤通氣雷風相薄水火不相射八卦相錯者是也變易是陽變隂隂變陽老陽變為少隂老隂變為少陽此是占筮之法如晝夜寒暑屈伸往來者是也連沙隨程氏曰周者著代也言文王之書以别山歸藏也虞氏翻曰易字從日下月耦莆田鄭氏曰易從日從月天下之理一竒一盡矣天文地理人事物類以至性命之微變化之妙否泰損益剛柔得失出處語默皆有對敵故易設一長畫二短畫以總括之所謂一隂一陽之謂道者此也循西山真氏曰日往月來寒往暑來晝夜昏明環不息此天道之常也聖人擬之以作易不過推明隂陽消長之理而已陽長則隂消隂長則陽消一消一長天之道也人而學易則知吉凶消長之理進退存亡之徑也臨川吳氏曰伏羲始畫八卦因而重之以其有交易變易之義名之曰易其時未有易字也有圖而無書也後之造字者始合日月二文而為易字夏商之時因其卦畫用以占筮其序各與先天之圖不同故連山首艮歸藏首坤按朱子謂有占無文則以為二易無繇辭也或云左傳所載繇辭與周易不同者蓋夏商之易則以為有繇辭矣至文王演八卦之名為六十四且作彖辭周公又作爻辭故名曰周易孔子又為之傳自是二易遂廢而周易獨傳焉五東萊呂氏曰按繫辭云二篇之策萬有一千百二十所謂二篇則上下二篇也然則孔子時易固分上下經矣以此考之易經之分上下必始於文王定周易之時近世朝氏編古周易乃合而為一且謂後人妄有上下經之辨何其考之不詳哉以雙湖胡氏曰按朝氏以道謂古者竹簡重大經為二篇本義從之然經分上下誠有至理上下經雖有三卜卦三十四卦之不同以反對計之各十八卦一也上經反對五十二陽爻五十六隂爻下經反對五十六陽爻五十二隂爻二也上經以四正卦為主首乾坤而終坎離與先天圖南北東西四方卦合下經以二變卦為主震變為艮巽變為兌首咸恆而終既未濟與先天圖四維之卦合而坎離之交不交亦可見伏羲先天一圖大㫖備見於文王序卦首尾中三也若是者豈以竹簡重大之故耶雲峯胡氏曰上經首乾坤氣化之始也隂陽各三十畫然後為泰否下經首咸恆形化之始也隂陽亦各三十畫然後為損益見天地與長少男女之交不交上下經終坎離既未濟又見乾坤中爻之交而中男女之交不交程朱子變易交易之義深矣乾下乾上乾元亨利貞傳上古聖人始畫八卦三才之道備矣因而重之以盡天下之變故六畫而成卦重乾為乾乾天也天者天之形體乾者天之性情乾健也健而無息之謂乾夫天専言之則道也天且弗違是也分而言之則以形體謂之天以主宰謂之帝以功用謂之鬼神以妙用一無用字謂之神以性情謂之乾乾者萬物之始故為天為陽為父為君元亨利貞謂之四德元者萬物之始亨者萬物之長利者萬物之遂貞者萬物之成唯乾坤有此四德在他卦則隨事而變焉故元専為善大利主於正固亨貞之體各稱其事四德之義廣矣大矣程子曰乾坤古無此二字作易者特立此以明難明之道乾坤毁則無以見易須以意明之讀易須先識卦體如乾有元亨利貞四德缺却一箇便不是乾須要認得張子曰乾之四德終始萬物迎之不見其首隨之不見其後然推本而言當父母萬物朱子曰元亨利貞理也有這四假氣也有這四假理便在氣中兩箇便不相離若是說時則有那未涉於氣砥四德要就氣上看也得有是氣則理便具所以伊川只恁地說便可見得物裏面便有這理乾之利貞是陽中之隂坤之元亨是隂中之陽乾後三畫是隂坤後三畫是陽又曰人只見夫子於乾坤文言解作四德他卦只云大亨以正便須要於乾坤四德說教大於他卦畢竟本皆占辭也問據程子傳說却是聖人始畫八卦每卦便是三畫聖人因而重之為六畫似與邵子一生兩兩生四四生八八生十六十六生三十二三十二生六十四為六畫不同曰程子之意只云三畫上叠成六畫八卦上叠成六十四耳與邵子說誠異蓋康節此意不曽說與程子程子亦不及問之故一向只隨他所見去但他說聖人始畫八卦不知聖人畫八卦時先畫甚卦此處更曉他不得問乾者天之性情曰乾健也健之體為性健之用是情又曰性情二者常相參在此情便是性之發非性何以有情健而無息非性何以能如此又曰火之性情元是箇熱水之性情則是箇寒天之性情則是箇健乾者天之性情指理而言也謂之性情該體用動靜而言也乾者天之性情此只是論其性體之健靜專是性動直是情大扺乾健雖靜時亦專到動時便行之直到坤主順只是翕闢謂如一箇剛健砥人雖在此靜坐亦専一而有箇作用砥意思只待去作用到得動時其直可知若一柔順人坐時便只恁地靜坐收斂全無箇營為砥意思其動也只是闢而已又問如此則乾雖靜時亦有動意否曰然乾坤是性情天地是皮殼其實是一箇道理問天專言則道也曰如云天命之謂性便是說道如云天之蒼蒼便是說形體惟皇上帝降𠂻于下民是說帝便似以物給付與人便有主宰之意又曰天道虧盈而益謙地道變盈而流謙此是說形體問天専言之則道也天且弗違是也此語何謂曰程子此語某亦未敢以為然天且弗違此只是上天曰知性則知天此天便是専言之則道者否曰是問以主宰謂之帝孰為主宰曰自有主宰蓋天是箇至剛至陽之物自然如此運轉不息所以如此必有為之主宰者這樣處要人自見得非言語所能到也問以功用謂之鬼神以妙用謂之神曰鬼神只是往來屈伸功用只是論發見者所謂神也者妙萬物而為言妙處即是神其發見而見於功用者謂之鬼神至於不測者則謂之神又曰功用言其氣也妙用言其理也又曰功用是有迹砥妙用是無迹砥又曰功用兼精粗而言妙用言精者伊川好意思固不盡在解經上然就解經上亦自有極好意思如說乾字便云乾健也健而無息之謂乾夫天專言之則道也天且弗違是也分而言之則以形體謂之天以主宰謂之帝以功用謂之鬼神以妙用謂之神以性情謂之乾東萊呂氏曰乾元亨利貞如堯欽明文思舜濬哲文明西溪李氏曰四德見性六爻見情蛟峰方氏曰元亨利貞在乾為四德者蓋六畫純陽惟天惟聖人足以當之本大本通本貞本無所不利不用戒辭非他卦之比也故孔子變例以四德釋之本義六畫者伏羲所畫之卦也一者竒也陽之數也乾者健也陽之性也本注乾字三畫卦之名也下者內卦也上者外卦也經文乾字六畫卦之名也伏羲仰觀俯察見隂陽有奇耦之數故畫一竒以象陽畫一耦以象隂見一隂一陽有各生一隂一陽之象故自下而上再倍而三以成八卦見陽之性健而其成形之大者為天故三竒之卦名之曰乾而擬之於天也三畫已具八卦已成則又三倍其畫以成六畫而於八卦之上各加八卦以成六十四卦也此卦六畫皆竒上下皆乾則陽之純而健之至也故乾之名天之象皆不易焉元亨利貞文王所繫之辭以斷一卦之吉凶所謂彖辭者也元大也亨通也利宜也貞正而固也文王以為乾道大通而至正故於筮得此卦而六爻皆不變者言其占當得大通而必利在正固然後可以保其終也此聖人所以作易教人卜筮而可以開物成務之精意餘卦放此朱子曰數者祗是氣之分限節度處得陽必竒得隂必耦凡物皆然故聖人以之畫卦天便是一地便是二天之形雖包乎地之外而其氣實透乎地之中故乾一而實地雖一塊物事在天之中然其中實虗容得天許多氣故坤二而虗乾只是箇健坤只是箇順純是陽所以健純是隂所以順至健者惟天至順者惟地所以後來取象乾便為天坤便為地問以乾字為伏羲之文元亨利貞為文王之文固是不知履虎尾同人於野亨之類又如何曰此恐是少了字或是就上字立辭古人淳質遇一事理㑹不下便須去占如占得乾時元亨便是大亨利貞便是利在於正知其大亨却守其正以俟之只此便是開物成務砥道理即此是易之用蓋元亨是示其所以為卦之意利貞是因以為戒又曰元亨利貞四字文王本意在乾坤者只與諸卦一般至孔子作彖傳文言始以乾坤為四德而諸卦自如其舊二聖人之意非有不同蓋各是發明一理耳今學者且當虗心玩味各隨本文之意而體㑹之其不同處自不相妨不可遽以巳意橫作主張也問本義云見陽之性健而成形之大者為天故三竒之卦名之曰乾而擬之於天也竊謂卦辭未見取象之意其成形之大者為天及擬之於天二句恐當於大象言之下文天之象皆不易一句亦然曰才設此卦時便有此象了故于此豫言之又後面卦辭亦有兼象說者故不得不豫言也孔氏曰卦者掛也懸掛物象以示人也希夷陳氏曰羲皇始畫八卦重為六十有四不立文字使天下之人觀其象而已能如象焉則吉凶應違其象則吉凶反後世卦畫不明易道不傳聖人於是不得已而有辭學者謂易止於是而不復知有畫矣節齊蔡氏曰卦者事物之質也原事物之始要事物之終以為質也爻者效也效事物之時而動也隆山李氏曰方一隂之生於時為午於節為夏至隂氣之所激宜其為寒也而反熱一陽之生於時為子於節為冬至陽氣之所激宜其為熱也而反寒蓋一隂之氣萌於地下推出陽氣而發見於外故熱一陽之氣萌於地下推出隂氣而發見於外故寒此隂陽之氣自下而上各分為六層而卦之六畫象之非聖人之私意也中溪張氏曰陽畫竒隂畫耦方其一畫之時一竒一耦只可謂之隂陽未可謂之乾坤自竒竒而竒耦耦而耦然後有乾坤之名重三而六六畫皆竒是為純乾乾下者洪範曰貞是也乾上者洪範曰悔是也雲峰胡氏曰夏連山首艮商歸藏首坤文王之易首乾易為明大分而作也觀先天橫圖乾居一圓圖乾居前羲易固已如此矣本義云一竒也陽之數也從象上說乾健也陽之性也從理上說程子云至微者理至著者象朱子人即數與性發明之當伏羲時有乾卦畫未有元亨利貞卦辭想占得乾卦者即六畫之象已自知有元亨利貞之理矣又曰元亨利貞諸家便作四德解惟本義以為占辭故筮得此卦而六爻皆不變者以此為占按啓䝉則非特六爻不變者占此乾三爻變或他卦三爻變之乾者亦兼以此占大通而至正此天地之本然大通而必在正固人事之當然也乾為易第一卦占得之者其事雖大通而非正固尚不能保其終况他卦乎其易六十四卦彖辭三十四卦言貞然則不貞者固不可以占也雙湖胡氏曰六十四卦首乾次坤者蓋本天地之位著君臣上下之分以紀綱人極今觀乾坤二卦彖辭利貞安貞吉之訓可以見文王之心矣要之彖辭只是卜筮占決之辭亦多取象及卦變大抵皆因占以寓教如言利貞不言利不貞言貞吉不言不貞吉之類貞便是一箇正固砥道理又曰聖人之道雖四聖人之教本一一者何占是也故占筮之頃辭變象因可觀玩而言動制器固在其中矣此聖人之精意所寓學者所當潛心焉初九潛龍勿用潛捷鹽反傳下爻為初九陽數之盛故以名陽爻理無形也故假象以顯義乾以龍為象龍之為物靈變不測故以𧰼乾道變化陽氣消息聖人進退初九在一卦之下為始物之端陽氣方萌聖人側微若龍之潛隱未可自用當晦飬以俟時程子曰乾六爻如欲見聖人曾履處當以舜可見在側陋時便是潛陶漁時便是見升聞時便是乾乾納于大麓時便是躍或問程易以初二三四四爻作舜說何以見得如此朱子曰此是推說爻象之意非本指也讀易若通得本指後便儘有道理可說問何謂本指曰易本因卜筮而有象因象而有占占辭中便有道理如筮得乾之初九初陽在下未可施用其象為潛龍其占曰勿用凡遇乾而得此爻者當觀此象而玩其占隱晦而勿用可也他皆倣此此易之本指也蓋潛龍則勿用此便是道理故聖人為彖辭象辭文言節節推去無限道理此程易所以推說得無窮然非易本義也先通得易本指後道理儘無窮推說不妨若便以所推說者去解易則失易之本指矣又曰伊川說得都犯手勢引舜來做乾卦乾又那裏有箇舜來當初聖人作易又何嘗說乾是舜他只是懸空說在這裏多被人說得來事多失了他潔靜精微之意易只是說箇象是如此何嘗有實事如春秋便句句是實事易不過是因畫以明象因象以推數因這象數便推箇吉凶以示人而已都無後來許多勞攘說話縉雲馮氏曰居下而欲為上禍斯及矣時方潛藏而欲發泄所謂反時為烖也毅齊沈氏曰易為君子謀不為小人謀乾言潛龍勿用則欲君子之難進坤言履霜堅氷則防小人之易長本義初九者卦下陽爻之名凡畫卦者自下而上故以下爻為初陽數九為老七為少老變而少不變故謂陽爻為九潛龍勿用周公所繫之辭以斷一爻之吉凶所謂爻辭者也潛藏也龍陽物也初陽在下未可施用故其象為潛龍其占曰勿用凡遇乾而此爻變者當觀此象而玩其占也餘爻放此朱子曰看爻者須識理象數辭四者未嘗相離蓋有如是之理便有如是之象有如是之象便有如是之數有理與象數便不能無辭六十四卦三百八十四爻有自然之象不是安排出來且如潛龍勿用初便是潛陽爻便是龍不當事便是勿用見龍在田離潛便是見陽便是龍出地上便是田又曰潛龍勿用只是戒占者之辭解者遂去上而生義理以初九當潛龍勿用九二當見龍在田利見大人初九是箇甚麼如何㑹潛如何㑹勿用九二爻又是甚麼人他又如何㑹見龍在田利見大人易如一箇鏡相似看甚物來都能照得如所謂潛龍只是有箇象自天子至於庶人看甚人來都使得孔子說作龍德而隱不易乎世不成乎名便是就事上指殺說來然㑹看砥雖孔子說也活也無不通不㑹看砥雖文王周公說砥也死了須知得他是假託說是包含說假託謂不惹著那事包含是說箇影象在這裏無所不包乾初九只是陽氣潛藏之象未可發用之占耳若便著箇不易乎世不成乎名𨼆而未見行而未成之人坐在裏靣便死殺了若㑹得卦爻本意却不妨當此時居此位作此人也節齊蔡氏曰初位也九爻也初二三四五上為位之隂陽九六為爻之隂陽氣消息自下而上故畫卦自下而始潛象初龍象九丹陽都氏曰以時言之有初則有終以位言之有上則有下以數言之有二三四五則有一六三者互文以見也沙隨程氏曰水經龍以秋日為夜埤雅龍秋分而降則蟄寢于淵聖人擬諸其形容象其物宜如此李氏仁父曰龍鱗八十一為九九之數亦以象乾也臨川王氏曰龍行天之物也故以象乾馬行地之物也故以象坤雲峰胡氏曰易之為道辭變象占而已就此爻觀之九為變潛龍為象勿用為占初九潛龍勿用為占之辭餘倣此又曰乾初象潛龍護微陽也坤初象履霜防微隂也於陽之微則恐其或用勿也者禁之之辭也於隂之微則慮其必盛至也者危之之辭也雙湖胡氏曰六爻取六龍象固以純陽之物而象純陽之爻然亦實取其變也龍之為物靈變不測能大能小能隱能見潛則入于淵飛則升於天亦猶乾為純陽卦若其動而變則六爻可變三百八十四爻貞活動不拘爾隆山李氏曰六爻之象皆取于龍者陽體之健其潛見惕躍飛亢者初終之序而變化之跡也孔氏曰卦辭多文王後事升卦六五王用享于岐山明夷六五箕子之明夷皆文王後事也故馬融陸績等皆以為爻辭出于周公是也九二見龍在田利見大人見龍之見賢遍反卦內見龍竝同傳田地上也出見於地上其德已著以聖人言之舜之田漁時也利見大德之君以行其道君亦利見大德之臣以共成其功天下利見大德之人以被其澤大德之君九五也乾坤純體不分剛柔而以同德相應程子曰九二利見大人九五利見大人聖人固有在上者在下者朱子曰六爻不必限定說且如潛龍勿用若是庶人得之自當不用人君得之也當退避見龍在田若是衆人得之亦可用事利見大人如今人所謂宜見貴人之類易不是限定砥物伊川亦自說一爻當一事則三百八十四爻只當得三百八十四事說得自好不知如何到他解却恁地說李氏開曰二為地上故曰田隆山李氏曰田者象聖人應世之跡爾而龍豈真在是哉本義二謂自下而上第二爻也後放此九二剛健中正出潛離隱澤及於物物所利見故其象為見龍在田其占為利見大人九二雖未得位而大人之德已著常人不足以當之故值此爻之變者但為利見此人而已蓋亦謂在下之大人也此以爻與占者相為主賓自為一例若有見龍之德則為利見九五在上之大人矣朱子曰乾卦他爻皆可作自家身上說惟九二九五要作自家說不得兩箇利見大人向來人都說不通九二有甚麼形影如何教見大人看來只占得此二爻便可見大人大人不必說人君也占者當不得見龍飛龍則占者為客利見那大人大人即九二九五之德見龍飛龍是也若潛龍君子則占者自當之矣臨川吳氏曰凡卦畫陽為大隂為小以三畫卦言二為人位九居二故為大人兼山郭氏曰乾德以大為主大人者其道大之人也雲峰胡氏曰龍九象見而在田二象以六畫言則初二地位二地上故象田以三畫言則二與五本人位故九二九五象大人九二方出潛而猶未大顯是有大人之德未有大人之位者也本義謂常人不足以當之蓋如初九潛龍之象凡占者皆可當之象占之正例也如九二見龍是象利見大人是占則以象為主占為客變例也九三君子終日乾乾夕惕若厲無咎傳三雖人位已在下體之上未離於下而尊顯者也舜之𤣥德升聞時也日夕不懈而兢惕則雖處危地而無咎在下之人而君德已著天下將歸之其危懼可知雖言聖人事茍不設戒則何以為教作易之義也或問陳瑩中嘗愛文中子或問學易子曰終日乾乾可也此語最盡文王所以聖亦只是箇不已程子曰凡說經義如只管節節推上可知是盡夫終日乾乾未盡得易據此一句只做九三使若謂乾乾是不已不已又是道漸漸推去則自然是盡理不如此曾祖道因論易傳問九三終日乾乾是君子進德不懈不敢須􅿼寧否朱子曰程子云在下之人君德已著此語亦是拘了昔嘗有人問程子胡安定以九四一爻為太子者程子笑之曰如此三百八十四爻只做得三百八十四件事了此說極是及到程子解易却又拘了要知此事通上下而言在君有君之用臣有臣之用父有父之用子有子之用以至事物莫不皆然若如程子之說則千百年間只有箇舜禹用得也大抵九三此爻才剛而位危故須著乾乾惕厲方可無咎若九二則以剛居中位易處了問伊川云雖言聖人事茍不設戒何以為教竊意因時而惕雖聖人亦有此心曰易之為書廣大悉備常人皆可得而用初無聖凡之别但當著此爻便用兢兢戒易厚齊馮氏曰乾坤君臣之分聖賢之德也然乾不専言聖人者作經立教使夫婦之愚皆可與知與行若專以聖人言之則天下之望絶矣故自二五大人之外止言君子使天下之為父為夫為子者皆可勉而至也又曰易為天下作故必設為警懼戒謹之辭所以立教也東萊呂氏曰讀程傳者多謂聖人無待於戒只為戒衆人故設教若如此看只是聖人處已教人分作兩假大失傳意蓋傳言若謂聖人不須設教則無以為教設如設官之設非假設之設也教如儒教之教非教人之教也本義九陽爻三陽位重剛不中居下之上乃危地也然性體剛健有能乾乾愓厲之象故其占如此君子指占者而言言能憂懼如是則雖處危地而無咎也朱子曰九三以過剛不中而處危地當終日乾乾夕惕若則雖危無咎矣聖人正意只是如此問九三不言象何也曰九三陽剛不中居下之上有強力勞苦之象不可言龍故特指言乾乾惕若而已言有乾乾惕厲之象也厲無咎是一句他後靣有此例如頻復厲無咎是也又曰厲多是陽爻說聖人因卦爻以垂戒多是利於正未有不正而利者如云夕惕若厲無咎若占得這爻必是朝兢夕惕戒謹恐懼可以無咎若自家不省如此便有咎括蒼龔氏曰君子九象終日三象三下卦之終故諸爻多于三言終夕亦三象日之終也三居下體之上當危懼之時惟自強不息戒謹恐懼可以免咎故曰乾乾夕惕若厲無咎然此非龍之所可為故以君子言之王氏曰凡言無咎者本皆有咎也處得其道故得無咎也雲峰胡氏曰初二地位故二曰在田五上天位故五曰在天三四人位故三不稱龍而稱君子下乾終而上乾繼之故曰乾乾本義釋乾曰乾健也陽之性也此釋乾乾亦曰性體剛健蓋健者乾之性龍不過乾之象九三不言象而言性蓋性體剛健自有能乾乾夕惕之象也六爻惟三四言無咎以人位故也雙湖胡氏曰初二為地地者龍之下位五上為天天者龍之上位三四人位非龍之所據乾九三一爻實居六十四卦人道之首聖人尤致意焉此六爻所以不言乾而三獨言乾乾也九四或躍在淵無咎躍半灼反傳淵龍之所安也或疑辭謂非必也躍不躍唯及時以就安耳聖人之動無不時也舜之歷試時也或問胡先生解九四作太子恐不是卦義程子曰亦不妨只看如何用當儲貳便做儲二使九四近君便作儲貳亦不害但不要拘一若執一事則三百八十四爻只作得三百八十四件事便休也沙隨程氏曰初與二既皆稱龍此爻雖不稱龍即上文知其為龍也亦猶大壯九三羝羊觸藩羸其角而九四不言羊知藩決不羸即羊也瀘川毛氏曰躍者飛之漸或者未必然之辭西溪李氏曰或躍陽使之也在淵隂係之也中溪張氏曰躍淵即龍之象也在四不言龍蓋疑于五也潛室陳氏曰無咎者善補過之辭乾聖人之事而九三九四皆以無咎言之何也曰易之爻義有不足處有當垂戒處故各係以無咎之辭固不問聖人與凡人也易之為易為變易不拘也在聖人即作聖人用之凡人即作凡人用之若乾卦只斷作聖人之事則六十四卦之用有窮矣豈所謂易者乎本義或者疑而未定之辭躍者無所緣而絶於地特未飛爾淵者上空下洞深昧不測之所龍之在是若下於田或躍而起則向乎天矣九陽四隂居上之下改革之際進退未定之時也故其象如此其占能隨時進退則無咎也朱子曰淵與天不爭多淵是那空虗無實砥之物躍是那不著地了兩腳跳上去砥意思淵雖下於田田卻是箇平地淵則通上下一躍即飛在天山齊易氏曰九四已離下體故謂之躍猶在上體之下故謂之在淵淵卑於田二言在田今反謂之在淵者淵乃龍之所宅非在田之比在田不能變而在淵有可變之道也建安丘氏曰九為陽陽動故言躍四為隂隂虗故象淵或者疑之也進則躍退則在淵出處如此可無咎矣雲峰胡氏曰其位上下之交其時進退未定之際躍以或言審于進也淵以在言安于退也九五飛龍在天利見大人傳進位乎天位也聖人既得天位則利見在下大德之人與共成天下之事天下固利見夫大德之君也龜山楊氏曰此舜之謳歌朝覲時也朱子曰飛龍在天利見大人文言分明言同聲相應同氣相求水流溼火就燥雲從龍風從虎聖人作而萬物覩他分明是以聖人為龍以作言飛以萬物覩解利見大人只是言天下利見夫大德之君也今人却别做一說恐非聖人本意隆山李氏曰乾之六龍獨取君象潛見飛躍其跡不同同此一龍耳向以大人之德為一世之所利見今以大人之德為天下之所利見所謂聖人作而萬物覩也西溪李氏曰人心所利見已在二矣况正九五之位乎楊氏雄曰龍之潛亢不獲中矣過中則惕不及中則躍二五其中乎故有利見之吉本義剛健中正以居尊位如以聖人之德居聖人之位故其象如此而占法與九二同特所利見者在上之大人爾若有其位則為利見九二在下之大人也朱子曰九二九五兩爻此當以所占之人之德觀之若已是有九二之德占得此九二爻則為利見九五大德之君若常人無九二之德者占得之則只為利見此九二之大人耳已為九五之君而有九五之德占得此九五爻則為利見九二大德之人若九二之人占得之則為利見此九五大德之人各隨所占之人以爻與占者相為賓主也太祖一日問王昭素曰九五飛龍在天利見大人常人何可占得此卦昭素曰何害若臣等占得則陛下是飛龍在天臣等利見大人是利見陛下也此說得最好如此所以三百八十四爻而天下萬事無不可該無不周遍此易之用所以不窮也誠齊楊氏曰九天德也龍象也五天位也飛而在天之象也雲峰胡氏曰本義於二五皆曰剛健中正九五以天德居天位剛健而純中正而粹者也文言曰剛健中正純粹精也其九五之謂歟雲行雨施天下平也則飛龍在天之事矣在田乃雲行在天乃雨施上九亢龍有悔亢苦浪反傳九五者位之極中正者得時之極過此則亢矣上九至於亢極故有悔也有過則有悔唯聖人知進退存亡而無過則不至於悔也南陽張氏曰天地之道以六陽遞相往來生成萬物而無窮也陽氣至此而盛極隂氣將生而推之茍不能窮上返下以知變是之謂亢非久而不窮之道也白雲郭氏曰三過而惕故無咎上過而亢故有悔龍德莫善於惕莫不善於亢亢則貪位慕祿不知進退存亡其悔宜矣堯老舜攝舜亦以命禹伊尹復政厥辟周公復子明辟君臣之間皆有是道進齊徐氏曰堯老而舜攝極則變變則通此無悔之道也本義上者最上一爻之名亢者過於上而不能下之意也陽極於上動必有悔故其象占如此朱子曰上九亢龍有悔若占得此爻必須以亢滿為戒當極盛之時便須慮其亢如這般處最是易之大義大抵於盛滿時致戒蓋陽氣正長必有消退之漸自是理勢如此又曰當極盛之時便須慮其亢如當堯之時須交付與舜若不尋得舜便交付與他則堯之後天下之事未可知雲峰胡氏曰凡卦爻有占無象象在占中有象無占占在象中如乾初二五上分象與占九三終日乾乾夕惕若疑皆占辭也而曰終日曰夕象在其中九四或躍在淵似若専言象也而曰或曰在占在其內若其辭則有不同者勿用禁止之辭利見幸之之辭無咎謂如此而後無咎勉之之辭有悔憂之之辭觀乾一卦大槩可見矣且卦以內為貞外為悔乾上九外卦之終曰有悔坤六三內卦之終曰可貞貞悔二字豈非發諸卦之凡例乎李氏曰乾陽物也消息盈虗有時龍陽類也潛見飛躍亦有時聖人龍德也升降進退亦有時爻序可知矣沙隨程氏曰易以道義配禍福故為聖人之書隂陽家獨言禍福而不配以道義故為伎術如此而詭遇獲禽則曰吉得正而斃則曰凶故王仲淹曰京房郭璞古之亂常人也雙湖胡氏曰文王於乾無所取象蓋以乾卦畫即象而元亨利貞直占辭耳周公始象六爻以六龍至孔子大象方有天之名說卦方有馬之名而為首為君為父為玉為金之類始大備後之象學者各據三聖而論庶無惑于紛紜之多端也大抵易莫難明於象象明則占煥而辭變亦有不難通者矣又曰沙隨謂易以道義配禍福最有補於世教云用九見羣龍無首吉傳用九者處乾剛之道以陽居乾體純乎剛者也剛柔相濟為中而乃以純剛是過乎剛也見羣龍謂觀諸陽之義無為首則吉也以剛為天下先凶之道也朱子曰荆公言用九只在上九一爻非也六爻皆用九故曰見羣龍無首吉用九便是行健處天德不可為首言乾已至剛健又安可更為物先為物先則有禍所謂不敢為天下先乾順時而動不過處便是不為首六爻皆同或問伊川之意似云用陽剛以為天下先則凶無首則吉朱子曰凡說文字須有情理方是用九當如歐公說方有情理某解易所以不敢同伊川便是有這般處看來當以見羣龍無首為句蓋六陽已盛如群龍然龍之剛猛在首故見其無首則吉大意只是要剛而能柔自人君以至士庶皆須如此若說為天下先便只是人主方用得以下更使不得恐不如此又曰如歐說蓋為卜筮言所以須著有用九用六若如伊川說便無此也得廣平游氏曰乾以純陽陽極而亢坤以純隂隂極而戰如其不變則亢而災戰而傷不能免也乾用九則陽知其險而變故無首吉坤用六則坤知其阻而變故利永貞本義用九言凡筮得陽爻者皆用九而不用七蓋諸卦百九十二陽爻之通例也以此卦純陽而居首故於此發之而聖人因繫之辭使遇此卦而六爻皆變者即此占之蓋六陽皆變剛而能柔吉之道也故為羣龍無首之象而其占為如是則吉也春秋傳曰乾之坤曰見羣龍無首吉蓋即純坤卦辭牝馬之貞先迷後得東北喪朋之意或問乾坤獨言用九用六何也朱子曰此二卦純陽純隂而居諸卦之首故於此發此一例凡占法皆用變爻占故凡占得陽爻者皆用九而不用七占得隂爻者皆用六而不用八蓋七為少陽九為老陽六為老隂八為少隂老變而少不變凡占用九用六者用其變爻占也遇乾而六爻皆變則為隂遇坤而六爻皆變則為陽用九用六此歐公舊說也而愚又嘗因其說而推之竊以為凡得乾而六爻純九得坤而六爻純六者皆當直就此例占其所繫之辭不必更看所變之卦左傳蔡墨所謂乾之坤曰見羣龍無首即坤之牝馬先迷也利永貞即乾之不言所利也用九不用七且如得純乾卦皆七數這却是不變砥他未常得九未在這爻裏面所以只占上靣彖辭用九蓋是正砥羣龍無首這便是利牝馬者為不利牡而却利牝如西南得朋東北喪朋皆是無頭砥又曰卦之本體元是六龍今變為隂頭面雖變渾身却只是龍體一似無頭砥龍相似廬陵歐陽氏曰乾坤之用九用六何謂也曰乾爻七九坤爻八六九六變而七變無為易道占其變故以其所占者名爻不謂六爻皆九六也及其筮也七八常多而九六常少有無九六者馬此不可以不釋也六十四卦皆然特於乾坤言之則餘可知耳雲峰胡氏曰卦主乎用故先乾而不先坤艮動者為主也爻主乎用故用九六而不用七八變者為主也乾見羣龍以知言坤利永貞以行言乾主知而坤主行也要之占固不用七八然有六爻俱不變者有六爻中一爻二爻不變者亦未嘗不用七八但遇七八常多九六常少多則以少為主故嘗用九六易變易也以變為主故三百八十四爻皆用九六彖曰大哉乾元萬物資始乃統天本義彖即文王所繫之辭傳者孔子所以釋經之辭也後凡言傳者放此此專以天道明乾義又析元亨利貞為四德以發明之而此一節首釋元義也大哉嘆辭元大也始也乾元天德之大始故萬物之生皆資之以為始也又為四德之首而貫乎天德之始終故曰統天或問贊易之贊朱子曰稱述其事如大哉乾元之類是贊又曰凡彖辭象辭皆押韻乾者萬物之始對坤而言天地之道也元者萬物之始對亨利貞而言四時之序也錯綜求之其義乃盡乾元只是天之性不是兩箇物事如人之精神豈可謂人自是人精神自是精神萬物資始與資之深資於事父以事君之資皆訓取字乾元統天蓋天只是以形體而言乾元即天之所以為天者也猶言性統形耳元者用之端而亨利貞之理具焉至於為亨為利為貞則亦元之為耳此元之所以包四德也若分而言之則元亨誠之通利貞誠之復其體用固有在矣以用言則元為主以體言則貞為主大哉乾元萬物資始至哉坤元萬物資生那元字便是生物之仁資始是得其氣資生是成其形到得亨便是他彰著利便是結聚貞便是收斂收斂既無形迹又須復生至如夜半子時此物雖存猶未動在到寅卯便生己午便著申酉便結亥子丑便實及至寅又生他這箇只管運轉一嵗有一嵗之運一月有一月之運一日有一日之運一時有一時之運雖一息之微亦有四箇假子恁地運轉又曰元亨利貞無斷處貞了又元今日子時前便是昨日亥時物有夏利冬生砥是到這裏方感得生氣他自有箇小小元亨利貞節齊蔡氏曰彖者斷也卦之辭卦之斷也凡言彖曰者又釋彖之義也雙湖胡氏曰彖傳乃孔子贊文王卦辭然多自發明已意以解伏羲卦不盡同於文王如乾卦辭文王只作占辭孔子自作四德又其間多說卦變此卦自某卦來皆孔子所自發文王間亦有之而不如孔子之多毅齊沈氏曰資始者氣之始資生者形之始故皆謂之元而有施受唱和之分故以乾坤相配建安丘氏曰以四德言雖有元亨利貞之分而其所以無間斷者亦惟一元之運行有所統攝也蘭氏廷瑞曰乾元者天陽一元之氣亦如人之有元氣也人知萬物之生於地而不知天以乾元之氣為之始亦如人之生於母而不知資始于父母之元氣也始之於未生之前生之于有始之後雲行雨施品物流形施始䜴反卦內皆同本義此釋乾之亨也程子曰雲行雨施是乾之亨處誠齊楊氏曰彖言元利貞而獨不言亨者蓋雲行雨施即氣之亨也品物流形即形之亨也大明終始六位時成時乘六龍以御天本義始即元也終謂貞也不終則無始不貞則無以為元也此言聖人大明乾道之終始則見卦之六位各以時成而乘此六陽以行天道是乃聖人之元亨也朱子曰乾四德元最重其次貞亦重以明終始之義非元則無以生非貞則無以終非終則無以為始不始則不能成終如此循環無窮此所謂大明終始也又曰終始即四德也始則元終則貞蓋不終則無以為始不貞則無以為元六爻之位由此而立耳以時成者言各以其時而成如潛見飛躍皆以時耳然皆四德之流行也初九九二之半即所謂元九二之半與九三即所謂亨九四與九五之半即所謂利九五之半與上九即所謂貞蓋聖人大明乾道之終始故見六位各以時成乘此六爻之時以當天運而四德之所以終而復始應變而不窮也又曰天人一理人之動乃天之運也然以私意而動則人而不天矣惟其潛見飛躍各得其時則是以人當天也不曰當天而曰御天以見遲速進退之在我耳又曰時乘六龍以御天六龍只是六爻龍只是譬喻明此六爻之義潛見飛躍以時而動便是乘六龍便是御天聖人便是天天便是聖人清江張氏曰以上下之定位言之謂之六位以陽氣之變化言之謂之六龍開封耿氏曰統天言乾之體御天言乾之用統如身之統四體御如心之御五官建安丘氏曰聖人體乾之元亨而以終始言之何也蓋以重卦言之乾下三爻元亨也而九三為下乾之終乾上三爻利貞也而九四為上乾之始故九四曰乾道乃革此以先言終後言始也終始之間功用密庸陽變而隂春夏變而秋冬此正是造化過接處故聖人必大明之以成贊化之功也雲峰胡氏曰天有十二時隂陽各司其半以成四時故爻位亦以六而成一爻有一爻之位則各有一爻之時六位時成泛指易六虛言時乘六龍専指乾六畫言三百八十四爻只是一時字故夫子首於乾彖發之坤止說行乾兼說知行大明是知御天是行乾道變化各正性命保合大和乃利貞本義變者化之漸化者變之成物所受為性天所賦為命大和隂陽㑹合沖和之氣也各正者得於有生之初保合者全於已生之後此言乾道變化無所不利而萬物各得其性命以自全以釋利貞之義也朱子曰乾道變化似是再說元亨變化字且只大概恁地說不比繫辭所說砥子細各正性命他那元亨時雖正了然未成形質到這裏方成如那百縠堅實了方喚做正性命乾道是統說砥四德是說他做出來砥大率天地是那有形了重濁砥乾坤是他性情其實乾道天德互換一般乾道又言深得些子又曰乾道變化各正性命是䢷一草一木各得其理變化是箇混全砥問變者化之漸化者變之成如昨日是夏今日立秋為變到那全然天凉沒一些熱時是化否曰然又曰如此等字自是難說變者化之漸化者變之成固是如此然又曰化而裁之謂之變則化又是漸蓋化如正月一日漸漸化至三十日至二月一日則是正月變為二月矣然既變則又化是化長而變短此等字須當通看乃好大哉乾元是說天道流行各正性命是說人得這道理做䢷性命處卻不是正說性如天命之謂性孟子道性善便是就人身上說性易之所言却是說天人相接處乾道變化各正性命總只是一箇理此理處處相渾淪如一粒粟生為苗苗便生花花便結實又成粟還復本形一德有百粒每粒箇箇完全又將這百粒去種又各成百粒生生只管不已初間只是這一粒分去物物各有理總只是一箇理各正性命保合太和聖人於乾卦發此兩句最好人之所以為人物之所以為物都是正箇性命保合得箇和氣性命便是當初合下分付砥保合便是有箇皮殼包裹在裏保合大和即是保合此生理也天地氤氲乃天地保合以生物之理造化不息及其萬物化生之後則萬物各自保合其生理不保合則無物矣問保合大和乃利貞曰天之生物莫不各有軀殼如人之有體果實之有皮核有箇軀殼保合以全之能保合則真性常存生生不窮如一粒之粟外靣有箇殼以裹之方其發一萌芽之始是物之元也及其抽枝長葉則是物之亨到得生實欲熟未熟之際此便是利及其既實而堅便是貞矣仁為四德之首而智則能成始而成終猶元為四德之長然元不生于無而生於貞蓋天地之化不翕聚則不能發散也仁智交際之間乃萬化之機軸此理循環不窮吻合無間不貞則無以為元也開封耿氏曰乾道所以變化者隂陽而已各正性命者隂陽之定分保合大和者隂陽之沖氣雲峰胡氏曰以二氣之分言則變者萬物之出機元亨是也化者萬物之入機利貞是也以一氣之運言則變者其漸化者其成先言品物流形後言各正性命物有此形即有此性皆天所命也謂之各正則命之禀也乃性之所以一定而不易謂之保合則性之存也又命之所以流行而不已蓋大和者隂陽㑹合沖和之氣而乾元資始之理固在其中矣以漸而變是之謂和瀘川毛氏曰變化之餘各正性命收斂於冬也斂之不固則泄不以時凡雨雪不應水泉不收愆陽伏隂冬華春實皆天地之沴氣也故斂之於冬者萬物之所以止也首出庶物萬國咸寧傳卦下之一無之字辭為彖夫子從而釋之通謂之彖彖者言一卦之義故知者觀其彖辭則思過半矣大哉乾元贊乾元始萬物之道大也四德之元猶五常之仁偏言則一事専言則包四者萬物資始乃統天言元也乾元統言天之道也天道始萬物一更有萬字物資始於天也雲行雨施品物流形言亨也天道運行生育萬物也大明天道之終始則見卦之六位各以時成卦之初終乃天道終始乘此六爻之時乃天運也以御天謂以當天運乾道變化生育萬物洪纎髙下各以其類各正性命也天所賦為命物所受為性保合大和乃利貞保謂常存合謂常和保合大和是以利且貞也天地之道常久而不已者保合大和也天為萬物之祖王為萬邦之宗乾道首出庶物而萬彚亨君道尊臨天位而四海從王者體天之道則萬國咸寧也程子曰大明終始人能大明乾之終始便知六位時成却時乘六龍以當天事朱子曰伊川語録中說仁者以天地萬物為一體說得太深無捉摸處易傳其手筆只云四德之元猶五常之仁偏言則一事専言則包四者人曰仁者天下之公善之本也易傳只此兩處說仁說得極平實學者當精看此等處問四德之元猶五常之仁偏言則一事専言則包四者曰元是𥘉發生出來生後方㑹通通後方始向成利者物之遂方是六七分到貞處方是十分成此偏言也然發生中已其後許多道理此専言也惻隱是仁之端羞惡是義之端辭讓是禮之端是非是智之端若無惻隱便多沒下許多到羞惡也是仁發在羞惡上到辭讓也是仁發在辭讓上到是非也是仁發在是非上又曰大哉乾元萬物資始元者天地生物之端倪也元者生意在亨則生意之長在利則生意之遂在貞則生意之成若言仁便是這意思仁本生意生意則惻隱之心也茍傷著這生意則惻隱之心便發若羞惡也是仁去那義上發若辭讓也是仁去那禮上發若是非也是仁去那智上發若不仁之人安得更有禮義智又曰元只是初砥便是如木之萌如草之芽其在人如惻然有隱初來砥意思便是所以程子謂看雞雛可以觀仁為是那嫩小砥便有仁砥意思在若能知得所謂元之元元之亨元之利元之貞上靣一箇元字便是包那四箇下靣元字則是偏言則一事者須要知得所謂元之元亨之元利之元貞之元者蓋見得此則知得所謂只是一固也若以一嵗之體言之則春便是元然所謂首夏清和便是亨之元孟秋之月便是利之元到那初冬十月便是貞之元也只是初砥意思便是四德之元猶五帝之仁偏言則一事専言則包四者此假只於易元者善之長與論語言仁處看若天下之動貞夫一者也則貞又包四者周易一書只說一箇利則利又大也専言仁則包三者言仁義則又管攝禮智二者如知之實知斯二者禮之實節文斯二者是也問程易說大明天道之終始則見卦之六位各以時成不知是說聖人明之耶抑說乾道明之耶曰此處說得鶻􅊳但遺書有一假明說云人能明天道終始則見卦爻六位皆以時成以此語證之可見大明者指人能明之也問首出庶物萬國咸寧恐盡是聖人事伊川分作乾道君道如何曰乾道變化至乃利貞是天首出庶物萬國咸寧是聖人東萊呂氏曰乾之六位自古自今隨在隨足何嘗不成但人不能明乾之終始故自見其不成其實六位元不曽損壞也茍大明乾之終始則事事物物中六位歷然森列應時俱成更無漸次本義聖人在上髙出於物猶乾道之變化也萬國各得其所而咸寧猶萬物之各正性命而保合太和也此言聖人之利貞也蓋嘗統而論之元者物之始生亨者物之暢茂利則向於實也貞則實之成也實之既成則其根蒂脫落可復種而生矣此四德之所以循環而無端也然而四者之間生氣流行初無間斷此元之所以包四德而統天也其以聖人而言則孔子之意蓋以此卦為聖人得天位行天道而致太平之占也雖其文義有非文王之舊者然讀者各以其意求之則並行而不悖也坤卦放此朱子曰首出庶物須是聰明睿智髙出庶物之上以君天下方得萬國咸寧禮記云聰明睿智足以有臨也須聰明睿智皆過於天下之人方可臨得他又曰這卦大槩是說䢷聖人得位砥若使聖人在下亦自有箇元亨利貞如首出庶物不必在上方如此如孔子出類拔萃便是首出庶物著書立言澤及後世便是萬國咸寧元亨繼之者善也陽也利貞成之者性也隂也元是未通砥亨利是收未成砥貞是已成砥譬如春夏秋冬冬夏便是隂陽極處其間春秋便是過接處乾之四德元譬之則人之首也首足之運動則有亨砥意思利則配之胸臟貞則元氣之所藏也又曰以五臟配之尤明白肝屬木木便是元心屬火火便是亨肺屬金金便是利腎屬水水便是貞元亨利貞只就物上看亦分明所以有此物便有此氣所以有此氣便有此理故易傳只說元者萬物之始亨者萬物之長利者萬物之遂貞者萬物之成不說氣只說物者言物則氣與理皆在其中伊川所說四句自動不得只為遂字成字說不盡故某略添字說盡元亨利貞譬諸穀可見榖之生萌芽是元苖是亨穟是利成實是貞榖之實又復能生循環無窮又曰梅蘂初生為元開花為亨結子為利成熟為貞物生為元長為亨成而未全為利成熟為貞仁義禮智似一箇包子裏面合下都具了一理渾然非有先後元亨利貞便是如此不是說道有元之時有亨之時元亨利貞其發見有次序仁義禮智在裏靣自有次序到發見時隨感而動却無次序又曰發時無次第生時有次第問孟子言仁義禮智義在第二易以義為利却成在第三曰禮是陽故曰亨謂之仁義禮智猶東西南北所謂元亨利貞猶東南西北一箇是對說一箇是從一邉說四德取貞配冬者以其固也孟子以知斯二者弗去為智之實弗去之說乃貞固之意彼知亦配冬也又曰貞於五常為智孟子曰知斯二者勿去是也既知又曰弗去有兩義又文言訓正固又於四時為冬冬有始終之義王氏亦云腎有兩龜蛇亦兩所以朔易亦猶貞也元亨利貞性也生長收藏情也以元生以亨長以利收以貞藏者心也仁義禮智性也惻隱羞惡辭讓是非情也以仁愛以義惡以禮讓以智知者心也性者心之理也情者心之用也心者性情之主也建安丘氏曰此聖人體乾之利貞也元首者君之象也聖人出乎其類足以有臨於天下然後萬國咸砥輯寧也雲峰胡氏曰文王本從卜筮上說夫子則從義理上說故曰大曰始以贊乾之元曰終曰始以見乾貞下起元其釋元亨而曰終始者終貞也不貞無以為元此四德之所以循環而無窮也其釋利貞又曰首出首元也非元無以為貞此又元之所以包四德而統天也其在聖人則得天位行天道而致太平之占蓋乘六龍是得天位御天是行天道萬國咸寧是致太平也彖傳主義理亦曷嘗不可推之卜筮哉象曰天行健君子以自彊不息傳卦下象解一卦之象爻下象解一爻之象諸卦皆取象以為法乾道覆育之象至大非聖人莫能體欲人皆可取法也故取其行健而已至健固足以見天道也君子以自彊不息法天行之健也本義象者卦之上下兩象及兩象之六爻周公所繫之辭也天乾卦之象也凡重卦皆取重義此獨不然者天一而已但言天行則見其一日一周而明日又一周若重復之象非至健不能也君子法之不以人欲害其天德之剛則自強而不息矣朱子曰乾卦有兩乾是兩天也昨日行一天也今日行又一天也其實一天而行健不已此所以為天行健也天惟健故不息不可把不息做健問健足以形容乾否曰可伊川曰健而無息之謂乾蓋自人而言固有一時之健有一日之健惟無息乃天之德乾乾不息者體日往月來寒往暑來者用有體則有用有用則有體不可分先後說問天運不息君子以自強不息曰非是說天運不息自家去趕遂也要學他如此不息只是常存得此心則天理常行而周流不息矣安定胡氏曰天者乾之形乾者天之用天形蒼然南極入地下三十六度北極出地上三十六度狀如倚杵其用則一晝一夜行九十餘萬里人一呼一吸為一息一息之間天已行八十餘里人一晝一夜有萬三千六百餘息故天行九十餘萬里天之行健可知故君子法之以自強不息云廣平游氏曰至誠無息天行健也若文王之德之純是也未能無息而不息者君子之自强也若顔子三月不違仁是也建安丘氏曰自強者體下乾之象不息者體重乾之象雲峰胡氏曰上經四卦乾曰天行坤曰地勢坎曰水洊至離曰明兩作先體而後用也下經四卦震曰洊雷艮曰兼山巽曰隨風兑曰麗澤先用而後體也乾坤不言重異於六子也稱健不稱乾異於坤也然乾雖不言重而言天行則一日一周明日又一周而重之義已見於行之一字自強所以為天德之剛或以人欲害之則息矣雙湖胡氏曰夫子六十四卦大象自釋伏羲一卦兩體之象象皆夫子所自取文王周公所未嘗有故與卦爻之辭絶不相關六十四卦皆著一以字以者所以體易而用之也即一以字示萬世學者用易之方不可不察也濳龍勿用陽在下也傳陽氣在下君子處微未可用也本義陽謂九下謂濳朱子曰濳龍兩字是初九之象勿用兩字是告占者之辭孔子作小象又釋其所以為濳龍者以其在下也諸爻皆如此推測自分明進齊徐氏曰陽釋龍字下釋濳字在下故濳濳故勿用雙湖胡氏曰小象於乾曰陽在下也於坤曰隂始凝也隂陽之稱始此蓋以六十四卦隂陽之初爻即太極所生兩儀之一以為諸卦通例隂陽之名一立而動靜健順剛柔竒偶小大尊卑變化進退往來之稱亦由是而著矣雲峰胡氏曰夫子於乾坤初爻揭隂陽二字以明易之大義乾初曰陽在下坤初曰隂始凝扶陽抑隂之意己見於言辭之表見龍在田德施普也傳見于地上德化及物其施已普也朱子曰九二君德已著至九五然後得其位耳厚齊馮氏曰龍在田則雨澤膏潤之象故曰德施普也盤澗董氏曰九二在下而云德施普者如日方升雖未中天而其光已無所不被矣雲峰胡氏曰小象提出一德字見九二之所謂大人者以德言非以位言也山齊易氏曰初之陽在下者陽氣濳伏而未出於地二之德施普者陽氣著見於地而普及於物此二爻地道也終日乾乾反復道也復芳服反本亦作覆𫝊進退動息必以道也本義反復重復踐行之意程子曰反復道也言終日乾乾往來皆由於道也二位在二體之中可進而上可退而下故言反復進齊徐氏曰反復往來必由乎道動循天理雖危而安也廣平游氏曰釋終日乾乾行事之時而曰反復道何也蓋君子之行事雖汲汲皇皇而易簡之理未嘗離也亦行其所無事而已九三在下體之上將離人而天矣故有反復道之象若夫聖人作而萬物覩則天德之所為確乎其能事而己矣雖有為而未嘗為反復不容言矣或躍在淵進無咎也𫝊量可而進一有也字適其時則無咎也一無也字本義可以進而不必進也徂來石氏曰爻辭但云或躍無咎夫子加進字以斷其疑也飛龍在天大人造也造徂早反𫝊大人之為聖人一無人字之事也雲峰胡氏曰二之施以德言五之造兼德與位言有其德無其位不敢作禮樂即所謂造也本義造猶作也進齊徐氏曰大人造者聖人作也龍以飛而在天猶大人以作而居位大人釋龍字造釋飛字亢龍有悔盈不可久也𫝊盈則變有悔也進齊徐氏曰盈謂陽極不可久謂隂生以盈釋亢字不可久釋有悔字人知其不可久而防于未亢之先則有悔者無悔矣雲峰胡氏曰乾上九陽之盈盈則必消故不可久坤上六隂之虗虗則必息故稱龍焉用九天德不可為首也𫝊用九天德也天德陽剛復用剛而好先則過矣東萊呂氏曰乾者萬物之首非有心於首萬物也雖為首而實未嘗為首也老子竊窺無首之義而曰後其身而身先居其後乃所以致其先跡雖不為首心實為首也觀此可知老易公私之辨本義言陽剛不可為物先故六陽皆變而吉天行以下先儒謂之大象濳龍以下先儒謂之小象後放此朱子曰乾為萬物之始故天下之物無不資之以始但其六爻有時而皆變故有羣龍無首之象而君子體之則當謙恭卑順不敢為天下先耳非謂天德不可為首也又非謂乾不為首也乾不為首則萬物何所資始而誰為首乎進齊徐氏曰六爻皆用九則乾變之坤九者剛健之極天之德也天德不可為首指卦變言即坤無首之義非謂乾剛有所不足也善用九者物極必變剛而能柔不為物先用坤道也雲峰胡氏曰經言無首𫝊言不可為首為人之用九者言也易存乎用用易存乎人文言曰元者善之長也亨者嘉之㑹也利者義之和也貞者事之幹也長丁丈反下長人同𫝊它卦彖象而已獨乾坤更設文言以發明其一作文義推乾之道施於人事元亨利貞乾之四德在人則元者衆善之首也亨者嘉美之㑹也利者和合於義也貞者幹事之用也縉雲馮氏曰以長釋元義以㑹釋亨義以和釋利義以幹釋貞義平菴項氏曰在事之初為元善之衆盛為嘉衆得其宜為義義所成立為事一理而四名也臨川吳氏曰夫子於此釋元亨利貞四字而分為四德後人因之以配春夏秋冬仁義禮智皆推廣而言之也本義此篇申彖𫝊象𫝊之意以盡乾坤二卦之藴而餘卦之說因可以例推云元者生物之始天地之德莫先於此故於時為春於人則為仁而衆善之長也亨者生物之通物至於此莫不嘉美故於時為夏于人則為禮而衆美之㑹也利者生物之遂物各得宜不相妨害故於時為秋於人則為義而得其分之和貞者生物之成實理具備隨在各足故於時為冬於人則為智而為衆事之幹幹木之身而枝葉所依以立者也或問元者善之長朱子曰元亨利貞皆善也而元乃為四者之長是善端初發處也又曰萬物之生天命流行自始至終無非此理但初生之際純粹未散尤易見耳只如元亨利貞皆是善而元則為善之長亨利貞皆是那裏來仁義禮智亦皆善也而仁則為萬善之首義禮智皆從這裏出耳又曰仁是惻隱之母惻隱是仁之子又仁包義禮智三者仁是長兄管屬得義禮智故曰元者善之長春秋傳記穆姜所誦之語謂元者體之長覺得體字較好是一體之長也亨者嘉之㑹萬物到此皆盛大長茂無不好者故曰嘉之㑹嘉是美㑹是聚無不盡美處是亨蓋自春至夏便是萬物暢茂物皆豐盈咸遂其美然若只一物如此他物不如此又不可以為㑹須是合聚來皆如此方謂之㑹義有箇分至如親其親長其長則是義之和如不親其親而親他人之親便是不和如君臣父子各得其宜此便是和處安得謂之不利如君不君臣不臣父不父子不子此便是不和安得謂之利又曰義之分别似乎無情却是要順乃和處蓋嚴肅之氣義也而萬物不得此不生乃是和利是那義裏面生出來砥凡事處置得合宜利便隨之所以云利者義之和蓋是義便兼得利若只理㑹利却是從中間半截做下去遺了上面一截砥孔子只說義之和為利不去利上求利只義和處便是利又曰義者得宜之謂處得其宜不逆了物即所謂利貞者事之幹伊川說貞字只以為正恐未足以盡貞之義須是說正而固然亦未推得到知上看得來合是如此知是那默運事變砥一件物事所以為事之幹又曰正字也有固字意思但不分明終是缺闕正是孟子所謂知斯二者弗去是也知斯是正意弗去是固意貞固是固得恰好如尾生之信是不貞之固須固得好方是貞問又有所謂不可貞者是如何曰也是這意思只是不可以為正而固守之君子體仁足以長人𫝊體法於乾之仁乃為君長之道足以長人也體仁體元也比而效之謂之體朱子曰體仁如體物相似人在那仁裏做骨子仁是箇道理須是有這箇人方體得他做箇骨子比而效之之說卻覺不是問伊川解體仁長人作體乾之仁看來在乾為元在人為仁只應就人上說曰然君子行此四德則體仁是君子之仁也東萊呂氏曰仁者人也合而言之道也只為人不能合故必比而效之執柯伐柯其則不逺比而效之之謂也進齊徐氏曰體者以身法之也仁乃天地生物之心君子能體之以身則念念皆仁而有博施濟衆之功故足以長人如克長克君之類是也廣平游氏曰仁為衆善之首故足以長人猶萬物發育乎春而震為長子也嘉㑹足以合禮𫝊得㑹通之嘉乃合於禮也不合禮則非理豈得為嘉非理安有亨乎雷氏曰嘉美合于中而其德充實然後動與理合利物足以和義𫝊和於義乃能利物豈有不得其宜而能利物者乎程子曰隂為小人利為不善不可一槩論夫隂助陽以成物者君子也其害陽者小人也夫利和義者善也其害義者不善也又曰義安處便為利朱子曰利物足以和義覺見他說得糊塗如何喚做和合於義此句都說不切問程子曰義安處便是利只是當然而然便安否曰是也只萬物各得其分便是利便是義之和處程子當初此處解得未親切不似這語却親切正好去解利者義之和處毅齊沈氏曰義與利自人心言之則義為天理利為人欲自天理言之則利者義之宜義者利之理公天下之利則舉天下萬物各正其性命矣貞固足以幹事𫝊貞一作正固所以能幹事也東萊呂氏曰世人多謂疏通者能幹事貞固者不能幹事此蓋錯認朴拙為貞固耳殊不知世所謂疏通者雖能取辨目前然不貞不固終必敗事故惟貞固者為能幹事也本義以仁為體則無一物不在所愛之中故足以長人嘉其所㑹則無不合禮使物各得其所利則義無不和貞固者知正之所在而固守之所謂知而弗去者也故足以為事之幹朱子曰體仁不是將仁來為我之體我之體便都是仁也又曰本義云以仁為體者猶言自家一箇身體元來都是仁又曰本義說以仁為體似不甚分明然也只得恁地說嘉㑹足以合禮嘉美也㑹是集齊砥意思許多嘉美一時鬬湊到此故謂之嘉㑹嘉其所㑹便動容周旋無不中禮人之修為便處處皆要好不特是只要一處好而己須是動容周旋皆中乎禮可也故曰嘉㑹就亨者嘉之㑹觀之嘉字是實㑹字是虛嘉㑹足以合禮則嘉字卻輕㑹字卻重又曰嘉㑹雖是冇禮後砥事然這意思却在禮之先嘉其所㑹時未說到那禮在然能如此則便能合禮利物時未說到和義在然能使物各得其利則便能和義義自然和不是義外别討箇和使物各得其宜何利如之如此便是以和義這利字是好砥如孟子所謂戰國時利是不好砥這箇利如那未冇仁而遺其親未有義而後其君之利又曰利物足以和義此句最難看老蘇論此謂慘殺為義必以利和之如武王伐紂義也若徒義則不得天下之心必散財發粟而後可以和其義若如此說則義在利之外分截成兩假了看來義之為義只是一箇宜其𥘉則甚嚴如男正位乎外女正位乎內直是有內外之辨君尊於上臣恭於下尊卑大小截然不可犯似若不和之甚然能使之各得其宜則其和也孰大于是至于天地萬物無不得其所亦只是利之和爾此只是就義中便有一箇和既曰和者義之和卻說利物足以和義蓋不如此不足以和其義也貞固足以幹事幹如木之幹事如木之枝葉貞固者正而固守之貞固在事是與立箇骨子所以為事之幹欲為事而非此之貞固便植立不起自然倒了問貞固二字與體仁嘉㑹利物似不同曰屬北方者便著用兩字方能盡之問文言四德一假曰元者善之長以下四句說天德之自然君子體仁足以長人以下四句說人事之當然元只是善之長萬物生理皆始于此衆善百行皆統于此故於時為春於人為仁亨是嘉之㑹此句自來說者多不明嘉美也㑹猶齊也嘉㑹衆美之㑹猶言齊好也春天發生萬物未大故齊到夏時洪纎髙下各各暢茂蓋春方生育至此乃無一物不暢茂其在人則禮儀三百威儀三千事事物物大大小小一齊到恰好處所謂動容周旋皆中禮故於時為夏於人為禮周子遂喚作中利者為義之和萬物至此各遂其性事理至此無不得宜故於時為秋於人為義貞者乃事之幹萬物至此收斂成實事理至此無不的正故於時為冬于人為智此天德之自然其在君子所當從事於此者則必體仁乃足以長人嘉㑹足以合禮利物足以和義貞固足以幹事此四句倒用上面四箇字極有力體者以仁為體蓋仁為我之骨我以之為體仁皆從我發出故無物不在所愛所以能長人嘉㑹足以合理者須是美其所㑹也欲其所㑹之美當美其所㑹蓋其厚薄親疏尊卑大小相接之體各有節文無不中節則所㑹皆美所以能合於禮也利物足以和義者使物物各得其利則義無不和蓋義是斷制裁割之物若似不和然惟義能使事物各得其宜不相妨害自無乖戾而各得其分之和所以為義之和也貞固足以幹事者貞正也知其正之所在固守而不去故足以為事之幹幹事言事之所依以立蓋正而能固萬事依此而立在人則是智至靈至明是是非非確然不可移易不可欺瞞所以能立事也幹如板築之有楨幹今人築墻必立一木於中為骨俗謂之夜義木無此則不可築橫曰楨直曰幹無是非之心非知也知得是是非非之正堅固確守不可移易故曰智周子則謂之正也雲峯胡氏曰元亨利貞釋彖分而二之一隂一陽之謂也文言分而四之四時五行之謂也前四句程𫝊從人事上說本義兼天人說蓋前四句天德之自然而未嘗不在於人後四句人事之當然乃人之所以全其天又曰體仁有以存諸中嘉㑹則美見乎外利物有以方乎外而貞固冇以守于中前四句善以理言而嘉㑹則言用義以理言而幹事則為用禮者仁之著智者義之藏也後四句體仁長人貞固幹事由理以及用嘉㑹合禮利物和義則由用以及理也雙湖胡氏曰在乾為元亨利貞在君子為仁義禮智雖不言智而貞固者智之事也非智及安能貞固此仁智交接即貞下起元之義也君子行此四德者故曰乾元亨利貞𫝊行此四德乃合於乾也本義非君子之至健無以行此故曰乾元亨利貞此第一節申彖𫝊之意與春秋𫝊所載穆姜之言不異疑古者已有此語穆姜稱之而夫子亦有取焉故下文别以子曰表孔子之辭蓋𫝊者欲以明此章之為古語也或問乾元亨利貞猶言性仁義禮智朱子曰此語甚穩當又曰乾元亨利貞他把乾字當君子隆山李氏曰曰乾道變化又曰君子行此四德者謂之道者統而言之謂之德者分而言之然要其極則一也雲峰胡氏曰天行健天之乾也君子行此四德君子之乾也建安丘氏曰六卜四卦彖辭曰元亨利貞者乾坤屯隨臨無妄革也如坤元亨利牝馬之貞屯隨之大亨貞臨無妄革之大亨以正皆只是大亨而利與正獨乾謂之四德者非夫子所自取也按左氏𫝊襄公九年穆姜往東宫筮之遇艮之隨至十二年而孔子始生上距穆姜十四年穆姜之時已誦隨繇之辭曰元體之長也亨嘉之㑹也利義之和也貞事之幹也體仁足以長人嘉㑹足以合禮利物足以和義貞固足以幹事其言比今文言才易數字則知四德之論蓋古有是言非出于孔子明矣特夫子繫易之時見此四字所該甚大隨卦不足以盡之故削其辭而附于乾然元亨利貞在乾可以四德言他卦只當本文王之意而釋之也節齊蔡氏曰文飾也言辭也文釋彖象之辭以盡彖象之意乾坤居衆卦之首故特詳之而餘卦可以類推也雙湖胡氏曰朱子謂孔子十翼専用義理發揮經言竊意彖象繫辭說卦雜卦専言象數乃用易之括例唯乾坤文言純以義理發之其次則序卦只用卦名發其次序之義而不及象數也陸氏明德曰周易經文王周公所作也𫝊孔子所作也司馬談論六經要指引天下殊塗而同歸一致而百慮謂之易大𫝊班固謂孔子晚而好易讀之韋編三絶而為之𫝊𫝊即十翼也前漢六經與𫝊皆别行至後漢諸儒作注始合經𫝊為一爾今王弼注本首卷題曰周易上經乾𫝊餘卷亦有泰𫝊噬嗑𫝊咸𫝊夬𫝊豐𫝊之名蓋弼所用者鄭氏本鄭氏既合彖𫝊象𫝊于經故合題之耳漢上朱氏曰魏髙貴鄉公問博士淳于俊曰今彖象不連經文而注連之何也俊對曰鄭康成合彖象于經者欲使學者尋省易了孔子恐其與文王相亂是以不合則鄭未注易經之前彖象不連經文矣東萊呂氏曰漢上謂王弼以文言附于乾坤二卦按淳于俊為鄭康成合彖象於經不言合彖象文言於經則朱氏之說是也初九曰濳龍勿用何謂也子曰龍德而𨼆者也不易乎世不成乎名遁世無悶不見是而無悶樂則行之憂則違之確乎其不可拔濳龍也樂音洛𫝊自此以下言乾之用用九之道也初九陽之微龍德之濳隱乃聖賢之在側陋也守其道不隨世而變晦其行不求知於時自信自樂見可而動知難而避其守堅不可奪濳龍之德也程子曰樂則行之憂則違之樂與憂皆道也非已之私也朱子曰伊川說乾之用乾之時乾之義難分别到了時似用用似義問時與義曰夏日冬日時也飲湯飲水義也許多名目須是逐一理㑹過少間見得一箇却有一箇著落不爾都只恁地鶻突過了本義龍德聖人之德也在下故𨼆易謂變其所守大抵乾卦六爻文言皆以聖人明之有𨼆顯而無淺深也朱子曰濳龍勿用何謂也以下大槩各就他要說處便說不必言専說人事天道確乎其不可拔非専為退遁不改其操也憂樂行違時焉而已其守無自而可奪如富貴不淫貧賤不移之意問文言六爻皆以聖人明之有𨼆顯而無淺深如所謂忠信進德修辭立誠在聖人分上如何曰在學者則勉強而行之在聖人則不然安而行之也又問本義釋庸言庸行以為盛德之至釋間邪存誠以為無斁亦保是此意否曰謹信存誠是裏面工夫無迹忠信進德修辭居業外面事微有迹在聖人分位皆做得自别又曰乾一卦皆聖人之德非是自初九以至上九漸漸做來蓋聖人自有見成之德所居之位有不同爾德無淺深而位有髙下也廣平游氏曰龍德而𨼆故不易乎世不易乎世者用捨在我故遁世無悶不成乎名者非譽不在物故不見是而無悶雲峯胡氏曰樂行憂違即所謂用舍無與於已行藏安于所遇聖人之事也進齊徐氏曰遁世無悶者安土樂天也樂行憂違最說出濳龍意思初九備聖人之德從容無礙日用之間無非此道之流行意茍順適與物無忤則不私其有庶同于人陽之舒也此樂則行之之意也少則拂逆我心不快則超然順避不失於已隂之翕也此憂則違之之意也樂行憂違雖不疑滯於物而所以立已者蓋確乎其不可拔非守道之固者能之乎此其所以為濳龍也九二曰見龍在田利見大人何謂也子曰龍德而正中者也庸言之信庸行之謹間邪存其誠善世而不伐德博而化易曰見龍在田利見大人君德也行下孟反𫝊以龍德而處正中者也在卦之正中為得正中之義庸信庸謹造次必於是也既處無過之地則唯在間邪邪既間則誠存矣善世而不伐不有其善也德博而化正已而物正也皆大人之事雖非君位君之德也程子曰間邪則誠自存如人有室垣墻不修不能防冦冦從東來逐之則復有自西入逐得一人一人復至不如修其垣墻則冦自不至故欲間邪也敬是間邪之道間邪存其誠雖是兩事然亦只是一事間邪則誠自存矣天下有一箇善一箇惡去善即是惡去惡即是善間邪則誠自存而間其邪者乃在於言語飲食進退與人交接之際而已矣間邪則誠自存不是外靣捉一箇誠將來存著今人外靣役役於不善中尋箇善來存著如此則豈有入善之理只是間邪則誠自存間邪更著甚工夫但惟是動容貌整思慮則自然生敬敬只是主一也間邪則固一矣然主一則不消言間邪或問間邪則固一矣主一則更不消言間邪朱子曰只是覺見邪在這裏要去間他則心便一了所以說道間邪則固一矣既一則邪便自不能入便更不消說又去間邪本義正中不潛而未躍之時也常言亦信常行亦謹盛德之至也間邪存其誠無斁亦保之意言君德也者釋大人之為九二也朱子曰庸言庸行盛德之至到這裏不消恁地猶自間邪存誠便是無斁亦保雖無厭斁亦當保也保者持守之意乾之九二處得其中都不著費力常言既信常行既謹但用間邪怕它入來若九三剛而不中過髙而危故有乾乾之戒兩處說箇君德却是要發明大人即是九二孔子怕人道别箇大人故互相發龍德正中以下皆君德言雖不當君位却有君德所以也做大人伊川却說得這箇大人做兩樣蘭氏廷瑞曰邪自外入故間之誠自我有故存之西溪李氏曰天理人欲不兩存具間得一分人欲便存得一分天理又曰聖人之學正心誠意便是治國平天下砥事信謹之始便要善世不伐德博而化蓋君德權輿於此矣西溪李氏曰易以二五為中故九二曰龍德正中九五曰飛龍在天皆以得中故也初則勿用三則危四則或上則悔夫乾天德聖人之事也必以中為貴以不中為戒則天下之至善豈有過於中者乎厚齊馮氏曰易者理學之宗而乾坤二卦又易學之宗也子思孟子言誠者天之道先儒謂誠敬者聖學之源皆出于此隆山李氏曰乾畫一實則誠坤畫一虗則生敬故乾九二言誠坤六二言敬誠敬二字始于包犧心畫而實天地自然之理也九三曰君子終日乾乾夕惕若厲無咎何謂也子曰君子進德修業忠信所以進德也修辭立其誠所以居業也知至至之可與幾也知終終之可與存義也是故居上位而不驕在下位而不憂故乾乾因其時而惕雖危無咎矣幾堅溪反𫝊三居下之上而君德已著將何為哉唯進德修業而已內積忠信所以進德也擇言篤志所以居業也知至至之致知也求知所至而後一無後字至之知之在先故可與幾所謂始條理者知之事也知終終之力行也既知所終則力進而終之守之在後故可與存義所謂終條理者聖之事也此學之始終也君子之學如是故知處上下之道而無驕憂不懈而知懼雖在危地而無咎也程子曰忠信為基本所以進德也辭修誠意立所以居業也此乃乾道由此二句可至聖人也修辭立其誠不可不子細理㑹言能修省言辭便是要立誠若只是修飾言辭為心只是為僞也若修其言辭正為立已之誠意乃是體當自家敬以直內義以方外之實事道之浩浩何處下手惟立誠才有可居之處有可居之處則可修業終日乾乾大事小事只是忠信所以進德為實下手處修辭立其誠為實修業處知至則當至之知終則遂終之須以知為本知之深則行之必至無有知之而不能行者只是知得淺飢而不食烏喙人不蹈水火只是知人為不善只為不知知至而至之知幾之事故可與幾知終而終之故可與存義知至是致知博學明辨審問慎思皆致知知至之事篤行便是終之如始條理終條理固其始條理故能終條理猶知至即能終之知至至之主知知終終之主終知至至之如今學者且先知有至處便從此至之是可與幾也非知幾先能安識至處知終終之知學之終處而終之然後可以守義朱子曰程𫝊云內積忠信是實心擇言篤志是實事擇言是修辭篤志是立誠明道論修辭立其誠所以居業說得來洞洞流轉若伊川以篤志解立其誠便緩了又曰伊川說內積忠信積字說得好知至至之主知知終終之主終蓋上句則以知至為重而至之二字為輕下句則以知終為輕而終之二字為重本義忠信主於心者無一念之不誠也修辭見於事者無一言之不實也雖有忠信之心然非修辭立誠則無以居之知至至之進德之事知終終之居業之事所以終日乾乾而夕猶惕若者以此故也可上可下不驕不憂所謂無咎也朱子曰進德修業四箇字煞包括道理最可玩味忠信所以進德忠信只是實其心之發然從知上來吾心知得是非端的是如此此心便實實便忠信吾心以為實然從此做去即是進德處修辭立誠又是進德事問立誠不就制行上說而特指修辭何也曰人不誠處多在言語上又曰人多將言語做沒緊要容易說出來若一一要實這工夫自是大忠信進德便是見得修辭立誠砥許多道理修辭立誠便要立得這忠信若口不擇言逢事便說只這忠信亦被汨沒動蕩立不住了忠信是知得到真實極至處修辭立誠是做到真實極至處若不是真實知得進箇甚麼前頭黑窣窣地如何進得去既知得若不真實去做那箇道理也只懸空在這裏無箇安泊處所謂忠信也只是虗砥道理而已忠信進德修辭立誠居業工夫之條件也知至至之可與幾知終終之可與存義工夫之功程也忠信與修辭立誠便是材料下面知至知終惟有實了方㑹如此大抵以忠信為本忠信只是實若無實如何㑹進如播種相似須是實有種子下在泥中方㑹日日見發生若把箇空殼下在裏靣如何㑹發生即是空道理須是實見得若徒將耳聼過將口說過濟甚事忠信所以為實者且如孝須實是孝方始那孝之德一日進一日如弟須實是弟方始那弟之德一日進一日若不實卻自無根了如何㑹進今日覺見恁地去明日便漸能熟明日方見有一二分後日便見有三四分意思自然覺得不同立其誠誠依舊便是上面忠信修辭是言語照管得到那裏靣亦須照管得到居業是常常如此不少間斷德是得之于心業是見之于事進德是自覺得意思日強似一日日振作似一日不是外靣事只是自見得意思不同又曰忠信二字與别處說不同且如破釡甑燒廬舍持三日糧示士卒必死無還心如此方㑹厮殺忠信便是有這心如此方㑹進德又曰忠信便是意誠處如惡惡臭如好好色直是事事物物皆見得如此純是天理則德日進不成只如此了却修辭立誠就事上理㑹修辭便是立誠如今人持擇言語丁一確二一字是一字一句是一句便是立誠若還脫空亂語誠如何立又曰修辭立誠只于平日語默之際以氣上驗之思與不思而發意味自别明道所謂體當自家敬以直內義以方外之實事者只觀發言之平易躁妄便見其德之厚薄所飬之淺深矣問修辭立誠與間邪存誠相似否曰他地位自别間邪存誠不大假用力修辭立誠大假著氣力問進德只一般說至修業卻又言居業何也曰修業居業二者只是一意如逐日修作是修常常為此是守業如屋宇未修則當修之既修則居之進德是要日新又新業却須著居修業便是要居他進如日知其所亡只管進前去居如月無忘其所能只管日日恁地做忠信是始修辭立誠是終知至至之是忠信進德之事知終終之是居業之事人之所以一腳前進一腳退後只是不曾真實做如何得進忠信進德與知至至之可與幾也這幾句都是去砥字修辭立誠與知終終之可與存義都是住砥字進德是日日新居業是日日如此進德是營度方架這屋相似居業是據見成砥屋居之知至是知得到至處至之謂意思也隨他到那處這便可與理㑹幾微處知終是知得到終處終之謂意思也隨他到那裏這裏便可與存義可與幾是見得前靣這箇道理便能日進向前去存義是守這箇義只是這箇道理常常在這裏可是心肯意肯之義譬如昨日是無奈何勉強去為善今日是心肯意肯要去為善可與幾可與存義是旁人說與可與立可與權之可與同又曰知至至之主在至上知終終之主在終上至是要到那處而未到之辭如去長安未到長安却先知道長安在那裏從後行去這便是進德之事進德只管要進去便是要至之未做到那裏先知得如此所以說可與幾進字貼著那幾字至字又貼著那進字終則只是要守業今日如此明日又如此所以下箇居字終者只這裏終居字貼著那存字終字又貼著那居字德是就心上說義是那業上砥道理問終字至字其義相近如何曰這處人都作兩假袞將去所以難得分曉須分作四截說知至是知得到處知終是終其到處至之是須著行去到那處終之是定要守到那處上兩箇知字却一般遺書所謂知至至之主知也知終終之主終也均一知也上却主知下却主終要得守故如此忠信修辭自大綱說所以進德修業之道知至知終則又詳其始終工夫之序如此忠信心也修業事也然藴于心者所以見于事修于事者所以飬其心此聖人之學所以為內外兩進而非判然二事也知至則知其道之所止至之乃行矣而驗其所知也知終則見其道之極致終之乃力行而期至于所歸宿之地也知而行行而知二者交相警發而其道日益光明終日乾乾又安有一息之間哉體無剛柔位有貴賤因他這貴賤之位隨緊慢說有那難處有那易處九三處一卦之盡所以說得如此九二位正中便不恁地乾卦分明是先見得這個透徹便一直做將去如忠信所以進德至可與存義也都是徑前做去有勇猛嚴厲斬截剛果之意須是見得方能恁地更著力不得坤卦則未到這地位敬以直內義以方外未免緊貼把捉有持守砥意又曰忠信所以進德是乾健工夫蓋是剛健粹精兢兢業業日進而不自已如活龍然精彩氣焰自有不可及者直內外方是坤順工夫蓋是固執持守依文按本砥做將去所以為學者事也忠信進德修辭立誠與敬以直內義以方外分屬乾坤蓋取健順二體修辭立誠自有剛健主立之體敬義便有靜順之體進修便是箇篤實敬義便是個虗靜故曰陽實隂虗又曰乾卦連格物致知誠意正心都說了坤卦只有後靣一節只是一個持守柔順貞固循規蹈矩依而行之又曰乾是聖人道理自然而然坤是賢人道理便有用力處厚齊馮氏曰此言進德修業忠信辭誠知至知終以明終日乾乾夕惕若之實也君德著于二君位尊於五自三以往無非飬其德業之日而在上下之間處之尤難進修惕厲求無過以合於道可也接上卦故可以進終下卦故可以居雲峯胡氏曰忠信主於心修辭見於事主於心是德見於事是業進者日新而不已居者一定而不易曰至曰幾皆進字意曰終曰存皆居字意臨川吳氏曰居上在下釋厲字以下體言則三居上畫故曰上位以二體言則三在下卦故曰下位不驕不憂釋無咎之義也九四曰或躍在淵無咎何謂也子曰上下無常非為邪也進退無恆非離羣也君子進德修業欲及時也故無咎離力智反𫝊或躍或處上下無常或進或退去就從冝非為邪枉非離羣類進德修業欲及時耳時行時止不可恆也故云或深淵者龍之所安也在淵謂躍就所安淵在深而言躍但取進就所安之義或疑辭隨時而未可必也君子之順時猶影之隨形可離非道也本義內卦以德學言外卦以時位言進德修業九三備矣此則欲其及時而進也或問九四進德修業欲及時如何朱子曰君子進德修業非但為一身亦欲有為于天下及時是及時而進蓋進德修業九三已備此則欲及時以進耳又曰上下無常進退無恆非為邪枉非離羣類隨時而變動靜不失其宜乃進德修業之實也九四中不在人則進而至乎九五之位亦無嫌矣但君子本非有此心故云或躍而此又以非為邪也等語釋之問內卦以德學言外卦以時位言曰雖言德學而時位亦在其中非德學何以處時位雲峯胡氏曰三四皆以進德修業言者重剛不中皆危疑之時也自昔聖賢處此惟有進德修業而已况二爻在上下進退之間乾道變化之際於進退而識其幾知時者也於變化而見其妙知道者也所謂窮理盡性以至於命也進修之要孰大乎此九五曰飛龍在天利見大人何謂也子曰同聲相應同氣相求水流溼火就燥雲從龍風從虎聖人作而萬物覩本乎天者親上本乎地者親下則各從其類也𫝊人之與聖人類也五以龍德升尊位人之類莫不歸仰況同德乎上應於下下從於上同聲相應同氣相求也流溼就燥從龍從虎皆以氣類故聖人作而萬物皆覩上既見下下亦見上物人也古語云人物物論謂人也易中利見大人其言則同義則有異如訟之利見大人謂冝見大德中正之人則其辨明言在見前乾之二五則聖人既出上下相見共成其事所利者見大人也言在見後本乎天者如日月星辰本乎地者如蟲獸草木隂陽各從其類人物莫不然也程子曰雲從龍風從虎龍隂物也出來則濕氣蒸然自出如濕物在日中氣亦自出雖木石之微感隂氣尚亦有氣則龍之興雲不足怪虎行處則風自生動植之物有得天氣多者有得地氣多者本乎天者親上本乎地者親下然要之雖木植亦兼有五行之性在其中只是偏得土之氣故重濁也本義作起也物猶人也覩釋利見之意也本乎天者謂動物本乎地者謂植物物各從其類聖人人類之首也故興起於上則人皆見之朱子曰夫子于此數句只是解飛龍在天利見大人覩字分明是解見字聖人作便是飛龍在天萬物覩便是人見之天下所患無君不患無臣有如是君必有如是臣雖使而今無少間也必有出來雲從龍風從虎只怕不是真箇龍虎若是真箇龍虎必生風致雲也本乎天者親上凡動物首向上是親乎上人類是也本乎地者親下凡植物本向下是親乎下草木是也禽獸首多橫生所以無智此本康節說臨川吳氏曰鶴鳴而子和雄鳴而雌應一雞鳴而衆雞皆鳴同聲相應也日火之精而取火于日月水之精而取水於月磁石鑯之母而可以引針同氣相求也濕者下地故水之流趨之燥者乾物故火之然就之龍興則致雲雲從龍也虎嘯則風生風從虎也凡此六者皆同類相感召聖人與人亦同類故作于上而萬物咸覩之又曰先以聲氣水火雲風六句為比而後言聖人作則人利見之又以動植之親上親下喻利見者之親聖人亦然諄諄言之而又以各從其類一句總結上文九句也雲峯胡氏曰九五只是釋利見二字蓋大人之所以為大者已釋於九二九二間邪存誠德博而化五之飛龍在天則至誠之變化者也雙湖胡氏曰夫子之贊乾九五如此後乎有若之贊夫子曰麒麟之於走獸鳯凰之於飛鳥泰山之於丘垤河海之於行潦類也聖人之於民亦類也正相似只是譬喻作義理說而或者以乾統八卦取象釋之穿鑿甚矣上九曰亢龍有悔何謂也子曰貴而無位高而無民賢人在下位而無輔是以動而有悔也𫝊九居上而不當尊位是以無民無輔動則有悔也本義賢人在下位謂九五以下無輔以上九過髙志滿不來輔助之也此第二節中象𫝊之意誠齊楊氏曰六龍之首故曰貴髙自四以下皆從九五故曰無輔進齊徐氏曰爻辭但言有悔而夫子以動釋之蓋吉凶悔吝生乎動也臨川吳氏曰貴釋九之為龍髙釋上之為亢無位者陽不得陽位也無民者純陽無隂也九三之賢在下而敵體不應是無輔也此所以動而有悔也然亢者天時有悔者人事識時善處者雖亢而能不動則亦不至于有悔矣潛龍勿用下也𫝊此以下言乾之時勿用以在下未可用也雲峰胡氏曰陽在下也以氣言此曰下也以人言見龍在田時舍也舍去聲𫝊隨時而止也本義言未為時用也厚齊馮氏曰舍與出舍于郊之舍同適止於位非久安也臨川吳氏曰龍之在田猶在下位未為時用也終日乾乾行事也𫝊進德修業也雲峯胡氏曰行所當行也或躍在淵自試也𫝊隨時自用也本義未遽有為姑試其可厚齊馮氏曰試如書試可乃已之試四位近五未遽有為也飛龍在天上治也治𫝊直吏反本義讀作平聲𫝊得位而行上之治也本義居上以治下臨川吳氏曰上謂在天居上而治下也亢龍有悔窮之災也𫝊窮極而灾至也臨川吳氏曰窮謂亢災謂有悔乾元用久天下治也治直吏反𫝊用久之道天與聖人同得其用則天下治也隆山李氏曰四德獨舉一元何也元亨利貞同出于元如循環然乾道之終則一元復用矣本義言乾元用九見與他卦不同君道剛而能柔天下無不治矣此第三節再申前意或問乾元用九天下治也朱子曰九是天德健中便自有順用之則天下治如下文乃見天則則便是天德與上文見羣龍無首又别作一樣看雲峯胡氏曰乾元用九與他卦不同者蓋一百九十二爻皆用九各有所指乾之用九則獨以剛而能柔人君治天下之道當如是也所以與他卦不同潛龍勿用陽氣潛藏𫝊此以下言乾之義方陽微潛藏之時君子亦當晦𨼆未可用也或問程易乾之用乾之時乾之義看來恐可移易說朱子曰凡說經若移易得便不是本意看此三假只是聖人反復贊詠乾之德耳如上文潛龍勿用下也便即是此假陽氣潛藏便是首假龍德而隱者也聖人反覆發明以示人耳問聖人於文言只把做道理說曰有此氣便有此理厚齊馮氏曰孔子釋潛曰𨼆曰下曰藏隨事制義無不可也見龍在田天下文明傳龍德見於地上則天下見其文明之化也一作而化之本義雖不在上位然天下已被其化厚齊馮氏曰文謂物之鮮榮明謂化之光顯龜山楊氏曰樂則行之憂則違之孔顔之所同天下文明則孔子而已終日乾乾與時偕行𫝊隨時而進也本義時當然也臨川吳氏曰行即行事之行時當如此故曰與時偕行或躍在淵乾道乃革𫝊離下位而升上位上下革矣本義離下而上變革之時林氏栗曰初潛龍勿用而四乃革者言革潛為躍也飛龍在天乃位乎天德𫝊正位乎上位當天德一作德矣本義天德即天位也蓋唯有是德乃宜居是位故以名之單氏曰乾六爻皆天德也而五為天位此天德之有位者也亢龍有悔與時偕極𫝊時既極則處時者亦極矣隆山李氏曰時行則偕行可也時極則偕極是為不知變進齊徐氏曰乾以德明爻初曰德之𨼆二曰德之中三四皆曰進德五曰位乎天德獨上不言德者過中非德亢則有悔故不言德乾元用九乃見天則𫝊用九之道天之則也天之法則謂天道也或問乾之六爻皆聖人之事乎曰盡其道者聖人也得失則吉凶存焉豈特乾哉諸卦皆然也本義剛而能柔天之法也此第四節又申前意臨川吳氏曰剛柔適中天之則也則者理之有限節而無過無不及者也又曰夫子于文言𫝊釋一彖六爻已竟又申繹象𫝊至再以見彖爻之辭義理無窮藴奧難盡然獨于乾卦如此者蓋以六十四卦之首卦故特致詳此下重釋彖爻七節則與坤卦相似云雙湖胡氏曰文言釋六爻凡三節第一節似以德言惟上爻又似說位第二節初似說位二似說時位三以上又似說用第三節却全似說時亦各有分别要之朱子所謂聖人學易只管體出許多意思說者尤得之乾元者始而亨者也𫝊又反覆詳說以盡其義既始則必亨不亨則息矣本義始則必亨理勢然也利貞者性情也𫝊乾之性情也既始而亨非利貞其能不息乎程子曰元亨者只是始而亨者也謂始初發生大槩一例亨通也及到利貞便是各正性命性情猶言資質體假亭毒化育皆利也不有其功常久而不已者貞也詩曰維天之命於穆不已貞也利貞者性情也言利貞便是乾之性情朱子曰明道云不有其功常久而不已者貞也此語說得好不有其功言化育之無跡處為貞本義收斂歸藏乃見性情之實朱子曰利貞者性情也是乾之性情始而亨時是乾之發作處共是一箇性情到那利貞處一箇有一箇性情百穀草木皆有箇性情了元亨方是他開花結子時到這利貞時方見他砥性情就這上看乾之性情便見得這是利貞誠之復處問利貞者性情也曰此性情如言本體元亨是發用處利貞是收斂歸本體處如春時發生到夏長茂條逹至秋結子有箇收斂撮聚底意思但未堅實至冬方成在秋雖是已實漸欲脫去其本之時然受氣未足便種不生故須到冬方成人只到秋冬疑若不見生意不知都已收斂在內如一株𣗳有千子結實各其生理却將其子種之便可成千株𣗳剝卦碩果不食正是此義於此見得生生不窮之意天地大德曰生天地别無句當只是生而已這箇道理直是自然無安排聖人亦只是見得此機緘而發明出來耳建安丘氏曰乾以一元之氣運轉于六虗之中始而終終而始其生出者元也其歸宿者貞也而亨利乃其間之功用耳析而四之則為四時合而兩之則為隂陽貫而一之則渾然一元之氣也雲峯胡氏曰夫子於文言既分元亨利貞而四之至此又如釋彖分而二之者也元亨萬物之出機其出也生意發見於外利貞萬物之入機其入也生意斂藏于內故乾之性情乃可於此而見之乾性情只是一健字健者乾之性而情其著見者也且性情並言昉于此釋彖曰性命此則曰性情言性而不言命非知性之本言性而不言情非知性之用也乾始能以美利利天下不言所利大矣哉𫝊乾始之道能使庶類生成天下䝉其美利而不言所利者蓋無所不利非可指名也故贊其利之大曰大矣哉本義始者元而亨也利天下者利也不言所利者貞也或曰坤利牝馬則言所利矣朱子曰不言所利是說得不似坤時利牝馬之貞但說利貞而巳問程易謂無所不利故不言利如何曰是也乾則無所不利坤只利牝馬之貞則有利不利矣節齊蔡氏曰不言所利此所以為大也如言利建侯利涉大川則言所利矣雲峯胡氏曰言乾始能以美利利天下利字已在元字中不言所利大矣哉貞字又在元字中前猶即四德而二之此則又合而一之曰乾元者始而亨始者元亨者亦元也以見元與亨一也利貞者性情也夫子于乾利貞必合而言之以見利與貞一也至此則又渾乎乾始之元又可見元亨利貞之一矣大哉乾乎剛健中正純粹精也本義剛以體言健兼用言中者其行無過不及正者其立不偏四者乾之德也純者不雜於隂柔粹者不雜於邪惡蓋剛健中正之至極而精者又純粹之至極也或疑乾剛無柔不得言中正者不然也天地之間本一氣之流行而有動靜爾以其流行之統體而言則但謂之乾而無所不包矣以其動靜分之然後有隂陽剛柔之别也或問所謂流行之統體指乾道而言耶朱子曰大哉乾元萬物資始乾道變化各正性命只乾便是氣之統體物之所資始物之所正性命豈非無所不包但自其氣之動而言則為陽自其氣之靜而言則為隂所以陽常兼隂隂不得兼陽陽大隂小隂必附陽皆此意也剛健中正為其嫌于不中正所以說箇中正陽剛自是全體豈得不中正近趙善譽說乾只是剛砥一邉坤只是柔砥一邉某說與他道聖人做一部易如何却將兩箇偏砥物事放在劈頭如何不討箇混淪砥放在那裏今注中便是破他說雲峯胡氏曰剛柔以質言健順以性言本義云剛以體言健兼用言何也曰本義之意蓋謂剛健皆體也健則兼以用言耳以質言則有一定之體以性言則有無窮之用中者其行無過不及用也正者其立不偏體也純者不雜于隂柔指剛健言粹者不雜于邪惡指中正言不雜於隂柔似専指剛而言不雜于邪惡似専指正而言本義之意皆以體也程子曰精者剛健中正純粹之極本義曰純粹者剛健中正之至極精者又純粹之至極其論益精矣六爻發揮旁通情也本義旁通猶言曲盡節齊蔡氏曰剛健中正而純粹精者惟九五足以當之兼用六爻以發揮其義者欲旁通以盡乎事物之情耳雲峯胡氏曰曲盡其義者在六爻而偏全其德者在九五一爻時乘六龍以下則為九五而言也時乘六龍以御天也雲行雨施天下平也𫝊大哉贊乾道之大也以剛健中正純粹六者形容乾道精謂六者之精極以六爻發揮旁通盡其情義乘六爻之時以當天運則天之功用著矣故見一作曰雲行雨施隂陽溥暢天下和平之道也朱子曰陽氣方流行固已包了全體隂便在裏了所以說剛健中正然不可道這裏却夾雜些隂柔所以却說純粹精觀其文勢只是言此四者又純粹而精耳程易作六德解未安本義言聖人時乘六龍以御天則如天之雲行雨施而天下平也此第五節復申首章之意中溪張氏曰彖言雲行雨施而以品物流形繼之則雲雨為乾之雲雨此言雲行雨施而以天下平繼之則聖人之功即乾而雲雨乃聖人之德澤也雲峯胡氏曰彖言元亨利貞屬之乾而文言以屬之君子乾之德固在君子躬行中也彖𫝊言雲行雨施屬之乾而文言以屬之聖人乾之功固在聖人發用內也君子以成德為行日可見之行也潛之為言也𨼆而未見行而未成是以君子弗用也行並下孟反未見之見賢遍反𫝊德之成其事可見者行也德成而後可施於用初方潛𨼆未見其行未成未成未著也是以君子弗用也本義成德已成之德也初九固成德但其行未可見爾朱子曰德者行之本君子以成德為行言德則行在其中矣德者得之于心行出來方見這便是行問行而未成如何曰只是事業未就問乾六爻皆聖人事安得有未成伊川云未成是未著莫是如此否曰雖是聖人畢竟初九行而未成問此只論事業不論德否曰不消如此費力且如伊尹居有莘之時便是行而未成雙湖胡氏曰德行以在身者而言見之行以在事者而言初九德成行立固自可以見之行事矣但其時位方當潛𨼆故其德行雖可見之行而時位未能成其所以行也是以爻辭以勿用言之君子學以聚之問以辨之寬以居之仁以行之易曰見龍在田利見大人君德也𫝊聖人在下雖已顯而未得位則進德修業而已學聚問辨進德也寬居仁行修業也君德已著利見大人而進以行之耳進居其位者舜禹也進行其道者伊傅也本義蓋由四者以成大人之德再言君德以深明九二之為大人也朱子曰學以聚之問以辨之既探討得當且放頓寬大田地特觸類自然有㑹合處故曰寬以居之廣平游氏曰乾之道不盡於九二故有學問之功坤之道盛於六二故不習無不利進齊徐氏曰德者人所得於天之理雖我之所固有然亦未嘗不散在事事物物之間苟不務學則無以㑹聚衆理而有諸已也學而弗問亦無以辨别衆理使之條件不紊而精粗本末或不知所擇也學聚矣問辨矣必有涵飬寬裕之意自莫匪從容中道之妙故橫渠張子云心大則百物皆通心小則百物皆病必寬以居之則吾之所以學聚問辨者常見其與心為一矣然仁者心之全德生生而不窮也德至于仁與天同運無一息間斷則吾之所居者固非徒大而無實亦非固守而不化者也此仁以行之乃學問之極功君子之成德也臨川吳氏曰學聚之以知其理仁行之以行其事問辨之以審别所當行于學聚之後寬居之以存貯所以知於仁行之先寬之所居即學之所聚者仁之所行即問之所辨者九三重剛而不中上不在天下不在田故乾乾因其時而惕雖危無咎矣重直龍反下同𫝊三重剛剛之盛也過中而居下之上上未至於天而下已離於田危愳之地也因時順處乾乾兢惕以防危故雖危而不至於咎君子順時兢惕所以能泰也本義重剛謂陽爻陽位節齊蔡氏曰下卦以二為中上卦以五為中三居二上過乎中也四居五下不及乎中也在天五也在田二也三上未至于五下已離乎二而中處人位唯乾乾不息則雖處危地而無咎矣九四重剛而不中上不在天下不在田中不在人故或之或之者疑之也故無咎𫝊四不在天不在田而出人之上矣危地也疑者未決之辭處非可必也或進或退唯所安耳所以無咎也本義九四非重剛重字疑衍在人謂三或者隨時而未定也雲峯胡氏曰九三九四當合看復之六四曰中行四居五隂之中也益之三四皆曰中行三與四居六爻之中也乾之二四亦居六爻之中而文言以不中稱之非但謂其不中也謂其重剛而不中爾蓋下乾之剛以二為中三則重剛而過乎中上乾之剛以五為中四則重剛而不及乎中過則憂不及則疑然憂所當憂卒於無憂疑所當疑卒於無疑此二爻所以皆無咎也夫大人者與天地合其德與日月合其明與四時合其序與鬼神合其吉凶先天而天弗違後天而奉天時天且弗違而况於人乎况於鬼神乎夫音扶先悉薦反後胡豆反𫝊大人與天地日月四時鬼神合者合乎道也天地者道也鬼神者造化之迹也聖人先於天而天同之後於天而能順天者合於道而已合於道則人與鬼神豈能違也程子曰大人者與天地合其德日月合其明非在外也人曰若不一本安得先天而天弗違後天而奉天時鬼神言其功用天言其主宰易言天亦不同如天道虧盈而益謙此通上下理亦如此天道之運亦如此如言天且弗違況於人乎况于鬼神乎此直謂形而上者言以鬼神為天地矣臨川吳氏曰夫天専言之則道也此雖兼地言之蓋以其主宰之理而言非指輕清之氣為天重濁之氣為地也日月四時鬼神皆天地之氣所為氣之有象而照臨者為日月氣之循序而運行者為四時氣之往來屈伸而生成萬物者為鬼神命名雖殊其實一也其所以明所以序所以能吉能凶皆天地之理主宰之天地以理言故曰德日月四時鬼神以氣言故曰明曰序曰吉凶也雙湖胡氏曰天地日月四時鬼神之所以為德為明為序為吉凶者同一道也大人之與合亦合其道而已本義大人即釋爻辭所利見之大人也有是德而當其位乃可以當之人與天地鬼神本無二理特蔽於有我之私是以梏於形體而不能相通大人無私以道為體曾何彼此先後之可言哉先天不違謂意之所為默與道契後天奉天謂知理如是奉而行之回紇謂郭子儀曰卜者言此行當見一大人而還其占蓋與此合若子儀者雖未及乎夫子之所論然其至公無我亦可謂當時之大人矣或問先天而天弗違後天而奉天時聖人與天為一安有先後之殊朱子曰只是聖人意要如此天便順從先後相應不差毫釐也又曰天地只以形言先天而天弗違如禮雖先王未之有而可以義起之類蓋雖天之所未為而吾意之所為自與道契天亦不能違也後天而奉天時如天叙有典天秩有禮之類雖天之所已為而理之所在吾亦奉而行之耳蓋大人無私以道為體此一節只是釋大人之德其曰與天地合其德與日月合其明與四時合其序與鬼神合其吉凶將天地對日月四時鬼神說便只是指形而下者言童溪王氏曰先天而天弗違時之未至我則先乎天而為之而天自不能違乎我後天而奉天時時之既至我則後乎天而奉之而我亦不能違乎天蓋大人即天也天即大人也雲峯胡氏曰九二九五亦當合看九五利見之大人即九二之大人然大人之所以為大人其工夫正在九二上至與天地合其德以下是釋大人之德乃學聚問辨之極功也九二大人於道不容不用力至此則以道為體無所容力矣亢之為言也知進而不知退知存而不知亡知得而不知喪喪息浪反本義所以動而有悔也厚齊馮氏曰進退者身也存亡者位也得喪者物也此爻窮上反下則退矣九變為六則亡矣無民無輔則喪矣雲峯胡氏曰𥘉九曰潛之為言也𨼆而未見行而未成二句釋一潛字而言君子者再蓋必君子而後能安於潛也上九曰亢之為言也知進而不知退知存而不知亡知得而不知喪三句釋一亢字而言聖人者再蓋必聖人然後不至於亢也其唯聖人乎知進退存亡而不失其正者其唯聖人乎𫝊極之甚為亢至於亢者不知進退存亡得喪之理也聖人則知而處之皆不失其正故不至於亢也本義知其理勢如是而處之以道則不至於有悔矣固非計私以避害者也再言其唯聖人乎始若設問而卒自應之也此第六節復申第二第三第四節之意厚齊馮氏曰聖人知進退存亡而不言得喪者知進退存亡則無得喪矣山齊易氏曰進退存亡在我者也得喪則效之見於彼者也雲峯胡氏曰天數中於五陽極則剝乾上則亢中不可過也知其時將過乎中而處之不失其正其唯聖人乎貞者正也乾元之用所歸宿也乾之四德始于元至此又論聖人之體乾而歸於正其意深矣朱子曰文言六爻皆是言聖人之德只所處之位不同初爻言不易乎世不成乎名遁世無悶不見是而無悶樂則行之憂則違之潛龍也已是說聖人之德了只是潛而未用耳到九二却恰好其化已能及人矣蓋正是臣位所以處之而安到九三居下卦之上位已髙了那時節無可做只得恐懼進德修業乾乾不息此便是伊周地位九四位便乖或躍在淵伊川謂淵者龍之所安恐未然田是平所在縱有水亦淺淵是深不可測躍離乎行而未至乎飛行尚以足躍則不以足一跳而起足不踏地跳得便上天去不得依舊在淵裏皆不可測下離乎行上近乎飛上不在天下不在田中不在人故或之或之者疑之也不似九二安穩此時進退不得皆不由我只聼天時了以聖人言之便是舜歷試文王三分天下有二湯武鳴條牧野時到上九又亢了看來人處大運中無一時閒吉凶悔吝一息不曽停如大輪一般一恁袞將去聖人只隨他恁地去看道理如何這裏則將這道理處之那裏則將那道理處之又曰大抵易卦爻辭本只是各著本卦本爻之象明吉凶之占當如此耳非是就聖賢地位說道理也故乾六爻自天子以至于庶人自聖人以至於愚不肖筮或得之義皆有取但純陽之德剛健之至若以義類推之則為聖人之象而其六位之髙下又有似聖人之進退故文言因潛見躍飛自然之文而以聖人之迹各明其義位有髙下而德無淺深也程子曰卦爻有相應看來不相應者多且如乾卦如其說時除了二與五之外初何嘗應四三何嘗應上坤卦更都不見相應此似不通雙湖胡氏曰六爻取應與不應夫子彖𫝊例也如恆彖曰剛柔皆應恆此六爻以應言也如艮彖曰上下敵應不相與也此六爻雖居相應之位剛柔皆相敵而不相與則是雖應亦不應矣又如未濟六爻皆應故曰雖不當位剛柔應也以此例之則六爻皆應者八卦泰否咸恆損益既濟未濟是也皆不應者亦八卦乾坤坎離震㢲艮兑是也二體所以相應者初應四四亦應初二應五五亦應二三應上上亦應三然上下體雖相應其實陽爻與隂爻應隂爻與陽爻應若皆陽皆陰雖居相應之位則亦不應矣江都李衡曰相應者同志之象志同則合是以相應然事固多變動在因時故有以有應而得者有以有應而失者亦有以無應而吉者有以無應而凶者夬九三以援小人而凶剝六三以應君子而無咎咸貴虗心而受人故六爻以有應而失所䝉六四以無應而因吝斯皆時事之使然故不可執一而定論也又觀彖辭重在二五剛中而應者凡五卦師臨升二以剛中應五無妄萃五以剛中應二至若比五以剛中上下五隂應之大有五以柔中上下五剛應之小畜四以柔得位上下五剛亦應之又不以六爻之應例論也周易傳義大全卷一
