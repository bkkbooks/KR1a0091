body:
  text: 周易傳義大全卷十一明胡廣等撰巽下兌上傳大過序卦曰頤者養也不養則不可動故受之以大過凡物養而後能成成則能動動則有過大過所以次頤也爲卦上兌下巽澤在木上滅木也澤者潤養於木乃至滅没於木爲大過之義大過者陽過也故爲大者過過之大與大事過也聖賢道德功業大過於人凡事之大過於常者皆是也夫聖人盡人道非過於理也其制事以天下之正理矯失之用小過於中者則有之如行過乎恭䘮過乎哀用過乎儉是也蓋矯之小過而後能及於中乃求中之用也所謂大過者常事之大者耳非有過於理也唯其大故不常見以其比常所見者大故謂之大過如堯舜之禪讓湯武之放伐皆由一有此字道也道无不中无不常以世人所不常一作嘗見故謂之大過於常也或問程易說大過以爲大過者常事之大者耳非有過於理也聖人盡人道非過於理是此意否朱子曰正是如此易傳云道无不中无不常聖人有小過无大過㸔來亦不消如此說聖人既說有大過直是有此事雖云大過亦是常理始得問大過小過先生與伊川之說不同曰然伊川此論正是如以反經合道爲非相似殊不知大過自有大過時節小過自有小過時節處大過之時則當爲大過之事處小過之時則當爲小過之事大過是事之大過小過是事之小過大過便如堯舜之揖遜湯武之征伐獨立不懼遯世无悶這都是常人做不得厎事唯聖人大賢以上便做得故謂之大過是大過人厎事小過便如行過乎恭䘮過乎哀用過乎儉事之小過得些子厎常人皆能之若當大過時做大過厎事當小過時做小過厎事當過而過理也如此則豈可謂事之過不是事之過只是事之平常也大過之事聖人極是不得已處且如堯舜之有朱均豈不欲多擇賢輔以立其子然理到這裏做不得只得如此湯武之於桀紂豈不欲多方恐懼之使之悔過自省然理到這裏做不得只得放伐而後已皆是事之不得已處只著如此做故雖過乎事而不過乎理也大過棟橈利有攸徃亨橈乃敎反傳小過隂過於上下大過陽過於中陽過於中而上下弱矣故爲棟橈之象棟取其勝重四陽聚於中可謂重矣九三九四皆取棟象謂任重也橈取其本末弱中强而本末弱是以橈也一作橈取其中强而本末弱本末弱是以橈也隂弱而陽强君子盛而小人衰故利有攸徃而亨也棟今人謂之檩本義大陽也四陽居中過盛故爲大過上下二隂不勝其重故有棟橈之象又以四陽雖過而二五得中内巽外說有可行之道故利有所徃而得亨也隆山李氏曰四陽横而居中有棟之象而上下二隂柔而无力是上无所附而下无所寄也安得不橈大壯凡四陽而在下者亦壯故上棟下字取諸其象者得所載也今大者過乎剛而无所附小者過乎柔而不能載是棟將壓而危之甚也雜卦曰大過顛也大厦之顛非一木所能支是必過而求濟然後可故曰利有攸徃亨雲峯胡氏曰既曰棟橈又曰利有攸徃亨何也曰棟橈以卦象言也利徃而後亨是不可无大有爲之才而天下亦无不可爲之事以占言也臨川呉氏曰大過陽之盛也有棟橈之象何也中有四陽之强而上下猶有二隂之弱也聖人崇陽之意多以其未能如純乾之六陽故取大者雖過而棟猶橈蓋有所不足於此也彖曰大過大者過也傳大者過謂陽過也在事爲事之大者過與其過之大本義以卦體釋卦名義棟橈本末弱也傳謂上下二隂衰弱陽盛則隂衰故爲大者過在小過則曰小者過隂過也本義復以卦體釋卦辭本謂初末謂上弱謂隂弱史氏詠曰古文篆體本末字皆无勾脚兩字皆當從木以一陽畫藏於木之下則根株回暖故爲本以一陽畫散於木之上則枝葉向榮故爲末而大過卦體巽下兌上四陽畫積於中二隂畫處於初上猶之木焉上缺下短所以爲本末弱也剛過而中巽而說行利有攸徃乃亨說音悦傳言卦才之善也剛雖過而二五皆得中是處不失不失一作得中道也下巽上兌是以巽順和說之道而行也在大過之時以中道巽說而行故利有攸徃乃所以能亨也本義又以卦體卦德釋卦辭進齋徐氏曰卦以初爲本上爲末初上皆柔故曰本末弱剛過而中以二五言巽而說以二德言處大過之世四陽過盛必用剛而得中内巽而外說則可以抑中强之弊而扶本末之弱雖過不過矣以是而徃宜其亨也建安丘氏曰棟橈本末弱此以成卦之義言大過也剛過而中巽而說行此以卦才言所以救過之道葢剛而得中則不過巽而說行則能徃所以亨也大過之時大矣哉傳大過之時其事甚大故贊之曰大矣哉如立非常之大事興不世之大功成絶俗之大德皆大過之事也本義大過之時非有大過人之材不能濟也故歎其大進齋徐氏曰時字當玩自是時節當如此適其時當其事雖曰大過而不悖於道所謂剛過而中巽而說行者如堯舜之禪授而謳歌獄訟之皆歸湯武之放伐而徯后迎師之恐後所以成大功而濟於時焉苟非其時則堯舜亦且傳子而不傳賢矣湯武亦只是守臣節而不敢革夏革殷矣時不可失此聖賢所以當大運立大事成大業也否則大亂之道而謂之利且亨可乎雲峯胡氏曰他卦多是釋卦辭後復引天地聖人而言之是極言以贊其時之大大過方釋卦辭遽曰大過之時大矣哉故本義以大過人之才言之所謂才者指上文卦才而言也葢大過之事甚大无其時不可過有其時无其才愈不可過本義之意深矣象曰澤滅木大過君子以獨立不懼遯世无悶傳澤潤養於木者也乃至滅没於木則過甚矣故爲大過君子觀大過之象以立其大過人之行君子所以大過人者以其能獨立不懼遯世无悶也天下非之而不顧獨立不懼也舉世不見知而不悔遯世无悶也如此然後能自守所以爲大過人也一无人字本義澤滅於木大過之象也不懼无悶大過之行也朱子曰澤滅木澤在下而木在上今澤水高漲乃至浸没了木是爲大過木雖爲水浸而未嘗動故君子觀之而獨立不懼遯世无悶建安丘氏曰澤本潤木今在木上而至於滅木大過之象也然木在澤下澤過乎木而木不仆君子觀象以之立大過人之行故用之則獨立不懼舍之則遯世无悶人之常情獨立而莫我輔者必懼遯世而莫我知者必悶惟聖賢之卓行絶識大過乎人故能不懼无悶獨立不懼巽木象周公當之遯世无悶兌說象顔子當之童溪王氏曰當大過之時獨立不懼遯世无悶非所養之大過人者不足以語此孔子曰勇者不懼仁者不憂是已初六藉用白茅无咎藉在夜反傳初以隂柔巽體而處下過於畏慎者也以柔在下用茅藉物之象不錯諸地而藉以茅過於慎也是以无咎茅之爲物雖薄而用可重者以用之能成敬慎之道也慎守斯術而行豈有失乎大過之用也繫辭云苟錯諸地而可矣藉之用茅何咎之有慎之至也夫茅之爲物薄而用可重也慎斯術也以徃其无所失矣言敬慎之至也茅雖至薄之物然用之可甚重以之藉薦則爲重慎之道是用之重也人之過於敬慎爲之非難而可以保其安而无過苟能慎一有思字斯道推而行之於事其无所失矣本義當大過之時以隂柔居巽下過於畏慎而无咎者也故其象占如此白茅物之潔者朱子曰藉用白茅亦有過慎之意此是大過之初所以其過尚小節齋蔡氏曰錯諸地而又藉以茅過於厚也藉以初言柔以六言中溪張氏曰茅柔物也巽爲白雲峯胡氏曰成卦以棟橈爲象三四爻亦取棟象使六爻不出乎棟橈之一說則付天下之事於不可爲然後已故又因爻象而别𤼵其義初六以柔承上剛剛易缺折而柔以藉之則可无傷如物措諸地可矣而必有以藉之藉之用茅可矣而必用白茅此戒慎恐懼之過者也故其占无咎象曰藉用白茅柔在下也傳以隂柔處卑下之道唯當過於敬慎而已以柔在下爲以茅藉物之象敬慎之道也隆山陳氏曰柔在下上承四剛故有白茅藉物之象也九二枯楊生稊老夫得其女妻无不利稊徒稽反傳陽之大過比隂則合故二與五皆有生象九二當大過之初得中而居柔與初密比而相與初既切比於二二復无應於上其相與可知是剛過之人而能以中自處用柔相濟者也過剛則不能有所爲九三是也得中用柔則能成大過之功九二是也楊者陽氣易感之物陽過則枯矣楊枯槁而復生稊陽過而未至於極也九二陽過而與初老夫得女妻之象老夫而得女妻則能成生育之功二得中居柔而與初故能復生稊而无過極之失无所不利也在大過陽爻居隂則善二與四是也二不言吉方言无所不利未遽至吉也稊根也劉琨勸進表云生繁華於枯荑謂枯根也鄭𤣥易亦作荑字與稊同本義陽過之始而比初隂故其象占如此稊根也榮於下者也榮於下則生於上矣夫雖老而得女妻猶能成生育之功也雲峯胡氏曰巽爲木兌爲澤楊近澤之木故以取象枯楊大過象稊初在下象老夫九象女妻初柔在下象九二陽雖過而下比於隂如枯楊雖過於老稊榮於下則復生於上矣老夫而得女妻雖過以相與終能成生育之功无他以陽從隂過而不過生道也涑水司馬氏曰大過剛已過矣止可濟之以柔不可濟之以剛也故大過之陽皆以居隂爲吉不以得位爲美龜山楊氏曰聞之蜀僧云四爻之剛雖同爲木然或爲楊或爲棟棟負衆榱則木之强者也楊爲早凋則木之弱者也此卦本末皆弱二近於本五近於末故均爲木之弱也象曰老夫女妻過以相與也傳老夫之說少女少女之順老夫其相與過於常分謂九二初六隂陽相與之和過於常也九三棟橈凶傳夫居大過之時興大過之功立大過之事非剛柔得中取於人以自輔則不能也既過於剛强則不能與人同常常之功尚不能獨立况大過之事乎以聖人之才雖小事必取於人當天下之大任則可知矣九三以大過之陽復以剛自居而不得中剛過之甚者也以過甚之剛動則違於中和而拂於衆心安能當大過之任乎故不勝其任如棟之橈傾敗其室是以凶也取棟爲象者以其无輔而不能勝重任也或曰三巽體而應於上豈无用柔之象乎曰言易者貴乎識勢之重輕時之變易三居過而用剛巽既終而且變豈復有用柔之義應者謂志相從也三方過剛上能繫其志乎本義三四二爻居卦之中棟之象也九三以剛居剛不勝其重故象橈而占凶雲峯胡氏曰屋以棟爲中三視四則在下棟橈於下之象四在上棟隆於上之象然三之橈有二以剛居剛過剛則折一也應上之柔柔不能輔二也雙湖胡氏曰九三以剛居剛本无橈象而本義云不勝其重故橈者非謂九三自不勝其重指初六柔弱故不勝其重耳又以全體觀之三四爲棟三在四下亦有傾橈之象彖稱棟橈獨九三當之其致橈之由者歟西溪李氏曰下卦上實而下弱下弱則上傾故三居下卦之上而曰棟橈凶言下弱而无助也上卦上弱而下實下實則可載故四居上卦之下而曰棟隆吉言下實而不橈也此二爻當分上下體㸔象曰棟橈之凶不可以有輔也傳剛强之過則不能取於人人亦不能一作肯親輔之如棟橈折不可支輔也棟當室之中不可加助是不可以有輔也或問大過棟橈是初上二隂不能勝四陽之重故有此象九三是其重剛不中自不能勝其任亦有此象兩義自不同否朱子曰是如此九三又是與上六正應亦皆不好不可以有輔自是過於剛强輔他不得九四棟隆只是隆便不橈乎下中溪張氏曰雜卦云大過顛也大厦之顛非一木所能支三以剛居剛剛之過者過剛則折故棟橈之凶九三獨當之况三與上應上復以柔居柔不勝其重故曰不可以有輔也九四棟隆吉有它吝傳四居近君之位當大過之任者也居柔爲能用柔相濟既不過剛則能勝其任如棟之隆起是以吉也隆起一有兼字取不下橈之義大過之時非陽剛不能濟以剛處柔爲得宜矣若又與初六之隂相應則過也既剛柔得宜而志復應隂是有它也有它則有累於剛雖未至於大害亦可吝也葢大過之時動則過也有它謂更有它志吝爲不足之義謂可少也或曰二比初則无不利四若應初則爲吝何也曰二得中而比於初爲以柔相濟之義四與初爲正應志相繋者也九既居四剛柔得宜矣復牽繫於隂以害其剛則可吝也潘氏夢旂曰九四爲大臣之位亦棟象也以剛居柔乃適其平是以隆而吉也然下與初六之小人爲應非惟不足以信用而又益以隂則反過乎柔矣故有它則吝也徂徠石氏曰四雖與初爲應然上附九五之君不爲初所橈故得棟隆之吉本義以陽居隂過而不過故其象隆而占吉然下應初六以柔濟之則過於柔矣故又戒以有它則吝也節齋蔡氏曰它謂初也四位高初柔在下不能致橈故曰棟隆吉然與初應或牽於柔亦吝道也故曰有它吝雲峯胡氏曰九四棟隆亦有二義剛而能柔一也三應上是救其末四應初是救其本上六以柔居柔爲隂之極初六以柔居剛猶可以不橈乎下二也葢惟其柔而居剛故二比之則如稊之復生於下四應之則如棟之不橈乎下也象曰棟隆之吉不橈乎下也傳棟隆起則吉不橈曲以就下也謂不下繋於初也臨川呉氏曰下謂初也不橈乎下謂不因下之弱而至於橈也合沙鄭氏曰大過棟橈由本末弱然實以本爲重四居大臣之位而應乎初救其本也救其本於未過之初故棟隆而不橈乎下其下不橈其棟烏得而不隆哉三所居不得位而應乎上救其末也救其末於己過之後故棟橈而不可以有輔則知救過於其末不若救過於其本也九五枯楊生華老婦得其士夫无咎无譽傳九五當大過之時本以中正居尊位然下无應助固不能成大過之功而上比過極之隂其所相濟者如枯楊之生華枯楊下生根稊則能復生如大過之陽興成事功也上生華秀雖有所𤼵无益於枯也上六過極之隂老婦也五雖非少比老婦則爲壯矣一作壯夫一作士夫於五无所賴也故反稱婦得過極之隂得陽之相濟不爲无益也以士夫而得老婦雖无罪咎殊非美也故云无咎无譽象復言其可醜也本義九五陽過之極又比過極之隂故其象占皆與二反藍田呂氏曰九二在初六之上老於初六故曰女妻女未嫁者也九五在上六之下少於上六故曰士夫士未娶者也雲峯胡氏曰枯楊而稊可以復生枯楊而華速其死也老夫得其女妻猶可生育士夫而有老婦无復生道矣故反稱老婦得其士夫謂上六也隂柔過極得陽不爲无益云无咎者隂欲陽非陽之咎也然亦非美矣厚齋馮氏曰合二五两爻象觀之九二枯楊老夫之象也初六生稊女妻之象也則九五當爲楊而今以上六爲枯楊老婦九五反爲生華士夫何也易之意葢以枯象老在陽爻則爲夫在隂爻則爲婦而楊者不拘於隂陽之爻也又曰聖人立象以盡意天下事物之變无不備者老夫之得女妻再娶女之夫也老婦之得士夫婦再嫁而夫未娶也凡人倫之變備見於象矣兼山郭氏曰老夫女妻剛爲主而柔輔之大過之得也故无不利老婦士夫則柔爲主而剛輔之大過之失也故无譽象曰枯楊生華何可久也老婦士夫亦可醜也傳枯楊不生根而生華旋復枯矣安能久乎老婦而得士夫豈能成生育之功亦爲可醜也古爲徐氏曰二以剛居柔初以柔居剛此不過者也又在卦初故其過以相與可以成生育之功五以剛居剛上以柔居柔皆過者也又在卦終故其隂陽相比秪以爲醜上六過渉滅頂凶无咎傳上六以隂柔處過極是小人過常之極者也小人之所謂大過非能爲大過人之事也直過常越理不恤危亡履險蹈禍而已如過渉於水至滅没其頂其凶可知小人狂躁以自禍葢其宜也復將何尤故曰无咎言自爲之无所怨咎也因澤之象而取渉義誠齋楊氏曰水溢而過於渉者不足以濟川而徒没其頂任重而過其才者不足以濟難而徒滅其身其凶大矣中溪張氏曰上以隂柔而躐居四陽之上乃過之首者首即頂也若過渉於水本欲有濟苟不量深淺而至於滅没其頂凶則宜矣非无咎也不可歸咎於人當自咎爾本義處過極之地才弱不足以濟然於義爲无咎矣葢殺身成仁之事故其象占如此朱子曰過渉滅頂凶无咎恐是他做得是了不可以咎他不似伊川說雲峯胡氏曰初六藉用白茅過於畏懼者也故无咎上六過渉滅頂過於决裂者也其事雖凶於義亦无咎然亦惟其時而已初者事之端能慎其端徃可无失上者事之極極則不可有爲矣故本義以殺身成仁之事當之象曰過渉之凶不可咎也傳過渉至溺乃自爲之不可以有咎也言无所怨咎朱子曰過渉滅頂凶无咎象曰不可咎也如東漢諸人不量深淺至於殺身亡家此雖是凶然而其心何罪故不可咎也又曰大過陽剛過盛不相對值之義故六爻中无全吉者除了初六是過於畏慎无咎外九二雖无不利然老夫得女妻畢竟是不相當所以象言過以相與也九四雖吉而又有它則吝九五所謂老婦者乃是指客爻而言老婦而得士夫但能无咎无譽亦不爲全吉至於上六過渉滅頂凶无咎則是事雖凶而義則无咎也厚齋馮氏曰易大抵上下畫停者從中分反對爲象非他卦相應之例也頤中孚小過皆然而此卦尤明三與四對皆爲棟象上隆下橈也二與五對皆爲枯楊之象上華下稊也初與上對初爲藉用白茅之慎上爲過渉滅頂之凶也建安丘氏曰大過四陽二隂陽過乎隂論全卦則三四两爻重剛不中過者也重剛而不中則是過在三四而不在二五論爻位則二四以剛居柔不過者也故一吉而一利三五以剛居剛過者也故一凶一可醜是過在三五而不在二四觀爻所指之辭可見矣至初上二柔亦以不過者爲美然初隂伏於四陽之下承剛也故藉用白茅无咎上隂躐乎四陽之上乘剛也故過渉滅頂凶是知處大過之世不惟不欲剛之過而柔亦不容過於剛也雙湖胡氏曰或疑頤與大過對者也何不名爲小過中孚與小過對者也何不名爲大過葢大過以四陽在中言小過以四隂在外言此是聖人内陽外隂之㣲意以陽自内而過者爲主隂自外而過者爲客大過四陽過盛於内而主勝於客若頤之四隂在内不可以隂爲主矣故不名之曰小過而自取象於頤小過四隂過盛於外而客勝於主若中孚之四陽在外不可以陽爲客矣故不名之曰大過而自取象於中孚况當大過之時陽之在内者四而隂之在外惟二陽盛而隂衰也今至小過陽之在内者僅存其二隂之在外者浸消陽而有四是隂爻盛而陽反衰矣此大過小過之辨也坎下坎上傳習坎序卦物不可以終過故受之以坎坎者䧟也理无過而不已過極則必䧟坎所以次大過也習謂重習他卦雖重不加其名獨坎加習者見其重險險中復有險其義大也卦中一陽上下二隂陽實隂虗隂中則爲䧟隂居陽中則爲麗凡陽在上者止之象在中䧟之象在下動之象隂在上說之象在中麗之象在下巽之象䧟則爲險習重也如學習温習皆重複之義也坎䧟一作險也卦之所言處險難之道坎水也一始於中有生之最先者也故爲水䧟水之體也或問程傳云一始於中有生之最先者也故爲水夫陽氣之生必始於下復卦之象是也今曰始於中其義如何朱子曰氣自下而上爲始程說别是一義各有所主不相妨然亦不可相雜隆山李氏曰乾坤三畫以初相易而成震巽以中相易而成坎離以三相易而成艮兌故乾坤者隂陽之祖而坎離則天地之中也坎居正北於時爲子爲夜之中離居正南於時爲午爲日之中夜之中而一陽生焉故坎之三畫一陽居中日之中而一隂生焉故離之三畫一隂居中天地隂陽之中此乃造化張本之地故易上經始乾坤而終坎離貴其得天地隂陽之中而為易之用也且天一下降坎中在物為水而在人為精以畫觀之坎之一陽居中而中實即精蔵於中而水積於淵之象也地二上兆離中在物為火而在人為神以畫觀之離之一隂在中而中虚即神寓於心而火明於空之象也坎之中實是為誠離之中虗是為明中實者坎之用中虚者離之用也作易者因坎離之中而寓誠明之用誠明起於中者易之妙用古聖人之心學也習坎有孚維心亨行有尚傳陽實在中爲中有孚信維心亨維其心誠一故能亨通至誠可以通金石蹈水火何險難之不可亨也行有尚謂以誠一而行則能出險有可嘉尚謂有功也不行則常在險中矣本義習重習也坎險䧟也其象爲水陽䧟隂中外虗而中實也此卦上下皆坎是爲重險中實爲有孚心亨之象以是而行必有功矣故其占如此平庵項氏曰重卦坎字在六十四卦之先故加習字以起後例示離震艮兌巽皆當以重習起義也乾坤不加習字者六爻只一爻故也建安丘氏曰人之處坎身可䧟而心不可䧟故曰維心亨心亨則非坎矣心不亨則失處險之道又曰坎一陽處二隂之中隂虚則流故亨通誠齋楊氏曰水内陽而外隂故其明内景維心亨也中溪張氏曰九二九五䧟於坎中而剛德自若此維心亨之象也雲峯胡氏曰六子卦皆重此獨加一習字或以爲序卦適居六子之先坎言重他可知矣或以爲象曰龜蛇方曰北曰朔而太𤣥配罔與㝠人之腎兩皆有重義他卦亨字本義例以爲占維此則曰中實爲有孚心亨之象葢他卦言占事之亨也此言象心之亨也陽實有孚之象陽明在内心亨之象心有主則實此心見得事理實是如此心既透徹由是斷然行之无疑不然此心㣲有不通即是險阻即不可行矣故本義以亨爲象有尚爲占也彖曰習坎重險也重直龍反本義釋卦名義水流而不盈行險而不失其信傳習坎者謂重險也上下皆坎兩險相重也初六云坎窞是坎中之坎重險也水流而不盈陽動於險中而未出於險乃水性之流行而未盈於坎既盈則出乎坎矣行險而不失其信陽剛中實居險之中行險而不失其信者也坎中實水就下皆爲信義有孚也本義以卦象釋有孚之義言内實而行有常也朱子曰水流不盈是說一坎滿便流出去一坎又滿又流出去行險而不失其信則是說决定如此坎水只是平不觧滿盈是滿出來雲峯胡氏曰水字當讀流而不盈行險而不失其信兩句皆指水言以水之内實行有常者釋卦辭有孚之義也臨鹿呉氏曰流者一陽之動於中不盈者陷於二隂而未能出險謂中能陷人隔絶内外不失其信謂逝者如斯不舍晝夜建安丘氏曰坎爲水流水也兌爲澤止水也兌隂卦隂静故止坎陽卦陽動故流惟流故不盈惟不盈故可出險若待盈而後流則澤水也維心亨乃以剛中也傳維其心可以亨通者乃以其剛中也中實爲有孚之象至誠之道何所不通一作亨以剛中之道而行則可以濟險難而亨通也行有尚徃有功也傳以其剛中之才而徃則有功故可嘉尚若止而不行則常在險中矣一作也坎以能行爲功本義以剛在中心亨之象如是而徃必有功也節齋蔡氏曰剛中二五也徃有功動則出坎也息齋余氏曰行有尚即節九五之徃有尚所謂通也天險不可升也地險山川丘陵也王公設險以守其國險之時用大矣哉傳高不可升者天之險也山川丘陵地之險也王公君人者觀坎之象知險之不可陵也故設爲城郭溝池之險以守其國保其民人是有用險之時其用甚大故贊其大矣哉山河城池設險之大端也若夫尊卑之辨貴賤之分明等威異物采凡所以杜絶陵僭限隔上下者皆體險之用也本義極言之而贊其大也臨川呉氏曰不可升者无形之險山川丘陵者有形之險王公因有形之險爲无形之險設此以固守其國是謂人險厚齋馮氏曰險有時有用因時而設險則國可守而與天地相爲長久其用豈不大矣哉建安丘氏曰坎六爻四隂䧟二陽四隂坎也二陽坎中之水也君子觀二陽中實之象故體水之德爲有孚維心亨所以處險也觀四隂險䧟之象故因坎之形設險守國所以用險也彖易聖人於徃有功以上專以水言而明處險之道自天險不可升以下專以險言而明用險之方也象曰水洊至習坎君子以常德行習教事洊在薦反行下孟反傳坎爲水水流仍洊而至兩坎相習水流仍洊之象也水自涓滴至於尋丈至於江海洊習而不驟一作讓者也其因勢就下信而有常故君子觀坎水之象取其有常則常久其德行人之德行不常則僞也故當如水之有常取其洊習相受則以習熟其敎令之事夫𤼵政行敎必使民熟於聞聼然後能從故三令五申之若驟告未喻遽責其從雖嚴刑以驅之一无之字不能也故當如水之洊習本義治己治人皆必重習然後熟而安之建安丘氏曰洊再也水再至則爲重習之坎初六乃内水之方至者六四乃外水之洊至者君子體之重習不已常德行者以此進德也習教事者以此敎民也涑水司馬氏曰水之流也習而不已以成大川人之學也習而不止以成大賢故君子以常德行習敎事潘氏夢旂曰六子皆重卦也坎曰水洊至離曰明兩作震曰洊雷艮曰兼山巽曰隨風兌曰麗澤皆取重複之義乾坤純體也故直曰天行地勢云初六習坎入于坎窞凶窞徒坎陵感二反傳初以隂柔一无柔字居坎險之下柔弱无援而處不得當非能出乎險也唯益䧟於深險耳窞坎中之䧟處已在習坎中更入坎窞其凶可知本義以隂柔居重險之下其䧟益深故其象占如此臨川呉氏曰坑坎中小穴旁入者曰窞坎之柔畫象水旁兩岸其缺象岸側小穴故曰入于坎窞王氏曰最處坎厎无應援是以凶也雲峯胡氏曰初六六三皆以隂居坎下水性本下而又居下坎體本䧟而又闕中之䧟故皆入於坎窞初又下卦之下也其占之凶固宜象曰習坎入坎失道凶也傳由習坎而更入坎窞失道也是以凶能出於險乃不失道也中溪張氏曰初深入於險失其出險之道其凶可知是以君子惡居下流者以此九二坎有險求小得傳二當坎險之時䧟上下二隂之中乃至險之地是有險也然其剛中之才雖未能出乎險中亦可小自濟不至如初益䧟入于深險是所求小得也君子處險難而能自保者剛中而已剛則才足自衛中則動不失宜本義處重險之中未能自出故爲有險之象然剛而得中故其占可以求小得也丹陽都氏曰隂爲險者也隂趨下者出乎一隂之上而掩乎一隂之下故爲有險潘氏夢旂曰陽剛之才而在險中可以小得而未能出險也雲峯胡氏曰初在重險之下其占曰凶三在重險之間其占曰勿用二之占乃曰求小得何也剛得中故也豫九四互坎而曰大有得坎九二剛中而僅小得何也豫之剛動乎坤順之上故不求而所得者大坎之剛䧟於坎險之中故雖求之而所得者小象曰求小得未出中也傳方爲二隂所䧟在險之地以剛中之才不至䧟於深險是所求小得然未能出坎中之險也六三來之坎坎險且枕入於坎窞勿用枕針甚反傳六三在坎䧟一作險之時以隂柔而居不中正其處不善進退與居皆不可者也來下則入于險之中之上則重險也退來與進之皆險故云來之坎坎既進退皆險而居亦險枕謂支倚居險而支倚以處不安之甚也所處如此唯益入於深險耳故云入於坎窞如三所處之道一无之道字不可用也故戒勿用本義以隂柔不中正而履重險之間來徃皆險前險而後枕其䧟益深不可用也故其象占如此枕倚著未安之意朱子曰險且枕只是前後皆是險枕便如枕頭之枕問來之坎坎曰經文中疊字如兢兢業業之類是重字來之自是兩字各有所指謂下來亦坎上徃亦坎之徃也進退皆險也童溪王氏曰乾之三處二乾之間故曰終日乾乾坎之三處二坎之間故曰來之坎坎雙湖胡氏曰險下險也且枕又將枕上險矣入於坎窞指六四象雲峯胡氏曰前險而後枕枕有兩意謂下卦爲前險而六三枕之可也謂六三處前險而四又枕之亦可也初與三皆曰入于坎窞彼凶此但勿用彼之入未能出此之入將可出也象曰來之坎坎終无功也傳進退皆險處又不安若用此道當益入於險終豈能有功乎以隂柔處不中正雖平易之地尚致悔咎况處險乎險者人之所欲出也必得其道乃能去之求去而失其道益困窮耳故聖人戒如三所處不可用也六四樽酒簋貳用缶納約自牖終无咎簋音軌缶方有反傳六四隂柔而下无助非能濟天下之險者以其在高位故言爲臣處險之道大臣當險難之時唯至誠見信於君其交固而不可間又能開明君心則可保无咎矣一作也夫欲上之篤信唯當盡其質實而已多儀而尚餙莫如燕享之禮故以燕享喻之言當不尚浮餙唯以質實所用一樽之酒二簋之食復以瓦缶爲器質之至也其質實如此又湏納約自牖納約謂進結於君之道牖一有有字開通之義室之暗也故設牖所以通明自牖言自通明之處以况君心所明處詩云天之牖民如壎如篪毛公訓牖爲道亦開通之謂一作義人臣以忠信善道結於君心必自其所明處乃能入也人心有所蔽有所通所蔽者暗處也所通者明處也當就其明處而告之求信則易也故云納約自牖能如是則雖艱險之時終得无咎也且如君心蔽於荒樂惟其蔽也故爾雖力詆其荒樂之非如其不省何必於所不蔽之事推而及之則能悟其心矣自古能諌其君者未有不因其所明者也故訐直强勁者率多取忤而温厚明辯者其說多行且如漢祖愛戚姬將易太子是其所蔽也羣臣爭之者衆矣嫡庻之義長㓜一作少長之序非不明也如其蔽而不察何四老者高祖素知其賢而重之此其不蔽之明心也故因其所明而及其事則悟之如反手且四老人之力孰與張良羣公卿及天下之士其言之切孰與周昌叔孫通然而不從彼而從此者由攻其蔽與就其明之異耳又如趙王太后愛其少子長安君不肯使質於齊此其蔽於私愛也大臣諌之雖强既曰蔽矣其能聼乎愛其子而欲使之長久富貴者其心之所明也故左師觸讋因其一有所字明而𨗳之以長久之計故其聼也如響非惟告於君者如此爲教者亦然夫敎必就人之所長所長者心之所明也從其心之所明而入然後推及其餘孟子所謂成德達才是也本義晁氏云先儒讀樽酒簋爲一句貳用缶爲一句今從之貳益之也周禮大祭三貳弟子職左執虗豆右執挾匕周旋而貳是也九五尊位六四近之在險之時剛柔相際故有但用薄禮益以誠心進結自牖之象牖非所由之正而室之所以受明也始雖艱阻終得无咎故其占如此或問六四舊讀樽酒簋句貳用缶句本義從之其說如何朱子曰既曰樽酒簋貳又曰用缶亦不成文理貳益之也又曰人硬說作二簋其實无二簋之實陸德明自注斷人自不曽去㸔如所謂貳乃大祭三贰之貳是副貳之義六四居近尊位而在險之時剛柔相際故有但用薄禮益以誠心進結自牖之象問牖非所由之正乃室中受明之處豈險難之時不容由正以進耶曰非是不可由正葢事變不一勢有不容不自牖者不由戸而自牖以言艱險之時不可直致也納約自牖雖有向明之意然非是路之正終无咎者始雖不甚好然於義理无害故終无咎无咎者善補過之謂也臨川呉氏曰以樽盛酒以簋盛食又以缶盛酒貳其尊虞翻云貳副也禮有副尊故貳用缶按周官大祭三貳其下云皆有酌數皆有器量鄭氏注謂酌器所用注尊中者缶即酌器也爲尊之副尊中之酒不滿則酌此器之酒以益之也雲峯胡氏曰缶之器實有誠實象酒簋之禮至薄當坎之時不得已而用之非益之以誠不可也納約不自戸而自牖亦坎之時不得已也潘氏夢旂曰樽酒簋貳用缶與損之二簋可用享同意皆言其窮約之時不事多儀而尚誠實也納約自牖與睽之遇主于巷同意皆言其艱難之時自間道而通於君也六四居大臣之位當坎險之時盡其誠實雖自牖而納約非其正道終无咎也居治平之世由間道而結於君則不可矣惟睽坎之時爲然象曰樽酒簋貳剛柔際也傳象只舉首句如此比多矣樽酒簋貳質實之至剛柔相際接之道能如此則可終保无咎君臣之交能固而常者在誠實而已剛柔指四與五謂君臣之交際也本義晁氏曰陸氏釋文本无貳字今從之隆山李氏曰八純卦六爻俱无應惟以比而相交際爲義居坎險之時以漸出上爲貴六四離下體進而附五有欲出險之意真情相向期於濟難不待繁文縟禮以逹誠意也九五坎不盈祗既平无咎傳九五在坎之中是不盈也盈則平而出矣祗宜音柢抵也復卦云无祗悔必抵於己平則无咎既曰不盈則是未平而一无而字尚在險中未得无咎也以九五剛中之才居尊位宜可以濟於險然下无助也二䧟於險中未能出餘皆隂柔无一作非濟險之才人君雖才安能獨濟天下之險居君位而不能致天下出於險則爲有咎必祗既平乃得无咎本義九五雖在坎中然以陽剛中正居尊位而時亦將出矣故其象占如此朱子曰坎不盈祗既平祗字他无說處㸔來只得作扺字觧復卦亦然不盈是未平但將來必㑹平二與五雖是䧟於隂中畢竟是陽㑹動䧟他不得如有孚維心亨如行有尚皆是也雲峯胡氏曰坎不盈猶有險也抵既平則无險矣二居重險之中五將出重險之外所以二之有險不如五之既平瀘川毛氏曰水之性行則亨止則盈水以亨爲用不以盈也盈則有泛溢之虞不盈所以抵於既平厚齋馮氏曰五在上卦之中有剛明之才居大君之位宜有以出險矣而上猶有一隂焉此所以不盈而祗既平也葢下有坎故水流而不盈上无隂則爲盈之象矣尚未出險故祗既平而已上一隂猶岸也龍門之險水流湍激至孟津而平乃利渉焉以水既平也既平則險可濟故无咎卦中惟二五才足以出險而皆䧟焉二在下上又一坎故曰有險五在上流下坎焉故曰不盈象曰坎不盈中未大也傳九五剛中之才而得尊位當濟天下之險難而坎尚不盈乃未能平乎險難是其剛中之道未光大也險難之時非君臣協力其能濟乎五之道未大以无臣也人君之道不能濟天下之險難則爲未大不稱其位也本義有中德而未大朱子曰水之爲物其在坎只能平自不能盈故曰不盈盈高之義中未大者平則是得中不盈是未大也雲峯胡氏曰大有六五以柔居五則曰大中坎九五以剛居中乃曰中未大者大有之時柔能統剛重坎之時剛猶䧟於柔也上六係用徽纆寘于叢棘三歳不得凶纆音墨寘之豉反傳上六以隂柔而居險之極其䧟之深者也以其䧟之深取牢獄爲喻如係縳之以徽纆囚寘於叢棘之中隂柔而䧟之深其不能出矣故云至於三歲之久不得免也其凶可知本義以隂柔居險極故其象占如此陸氏德明曰三股曰徽兩股曰纆皆索名蒲陽張氏曰坎爲刑獄荀九家易坎爲叢棘傳曰叢棘如今之棘寺雲峯胡氏曰係之徽纆而又寘於叢棘重險之象三歳亦復不得出以隂柔處坎險之極故也隆山李氏曰上六當出險矣而隂柔下比无出險之才下乘五剛將有係寘之患猶人䧟犴獄舉手掛徽纆投足蹈叢棘者也三歲不得凶猶困坎在下初六亦曰三歳不覿凶遇坎而三歲羈縻一律也臨川呉氏曰周官司圜收敎罷民能改者上罪三年而舍其不能改而出圜土者殺三歲不得其罪大而不能改者歟象曰上六失道凶三歲也傳以隂柔而自處極險之地是其失道也故其凶至於三歲也三歲之久而不得免焉終凶之辭也言久有曰十有曰三隨其事也䧟於獄至於三歲乆之極也他卦以年數言者亦各以其事也如三歲不興十年乃字是也雲峯胡氏曰初六以柔居險之初失道上六以柔居險之極无復出險亦失道坤初上皆曰其道坎初上皆曰失道首尾相應建安丘氏曰坎䧟也以一陽而䧟於二隂也上下皆坎則二五皆䧟然坎之性下下坎則爲䧟之太甚故上坎爲安以五得位而二不得位故五之祗既平異乎二之求小得也其四隂爻則處陽外而䧟隂者最凶是以初言入於坎窞上言寘於叢棘以在二五兩陽之外也若中二隂三則失位乘陽而无功四則得位承陽而无咎也離下離上傳離序卦坎者䧟也䧟必有所麗故受之以離離者麗也䧟於險難之中則必有所附麗理自然也離所以次坎也離麗也明也取其隂麗於上下之陽則爲附麗之義取其中虗則爲明義離爲火火體虗麗於物而明者也又爲日亦以虗明之象隆山李氏曰文王序卦以乾坤坎離居上經乾坤者隂陽之純而坎離者隂陽之中不若震巽艮兌爲隂陽之偏也以六十四卦之序觀之乾坤居六十四卦之首坎離居六十四卦之中尤有深意葢坎離二卦爲天地心天地造化之本坎藏天之陽中受明爲月離麗地之隂中含明爲日坎爲水而司寒離爲火而司暑坎爲月而司夜離爲日而司晝水火日月之用寒暑晝夜之運天地造化之妙孰有出於此哉離利貞亨畜牝牛吉畜許六反傳離麗也萬物莫不皆有所麗有形則有麗矣在人則爲一无爲字所親附之人所由之道所主之事皆其所麗也人之所麗利於貞正得其正則可以亨通故曰離利貞亨畜牝牛吉牛之性順而又牝焉順之至也既附麗於正必能順於正道如牝牛則吉也畜牝牛謂養其順德一无德字人之順德由養以成既麗於正當養習以成其順德也本義離麗也隂麗於陽其象爲火體隂而用陽也物之所麗貴乎得正牝牛柔順之物也故占者能正則亨而畜牝牛則吉也朱子曰離便是麗附著之意易中多說做麗也有兼說明處也有單說明處明是離之體麗是麗著底意思離字古人多用做離著說然而物相離去也只是這字古來自有這般兩用底字如亂字又喚做治問火體隂而用陽是如何曰此言三畫卦中隂而外陽者也坎象爲隂水體陽而用隂葢三畫卦中陽而外隂者又曰火中虗暗則離中之隂也水中虗明則坎中之陽也問離卦是陽包隂占利畜牝牛便也是宜畜柔順之物曰然臨川呉氏曰牛牝皆坤象離中畫一隂坤之中畫也故象牝牛平庵項氏曰坤以全體配乾而行故爲牝馬之行地離以二五附乾而居故爲牝牛之畜養雲峯胡氏曰本義於坎曰中實而外虗則知離中虗而外實於離曰體隂而用陽則知坎體陽而用隂互見也夫麗則易至於不正麗而正則亨矣以畜牝牛乃吉何也坎之明在内以剛徤而行之於外離之明在外當柔順以養之於中也坎水潤下愈下則陷矣故以行爲尚離火炎上愈上則焚矣故以止爲吉雙湖胡氏曰文王於坤取牝馬象於離取牝牛象固自不同也後之言象者但見說卦乾爲馬坤爲牛於是坤之馬反欲求之乾離之牛反欲求之坤未免膠泥而有不通者豈知夫子於說卦取象又自有所見本不必盡同於先聖豈可以夫子之象爲文王周公之象哉彖曰離麗也日月麗乎天百穀草木麗乎土傳離麗也謂附麗也如日月則麗於天百穀草木則麗於土萬物莫不各有所麗天地之中无无麗之物在人當審其所麗麗得其正則能亨也節初齊氏曰龜山楊氏云火无常形麗物而有形最得本㫖人之生也得水爲精得火爲神其合也氣聚而形成於有其分也氣散而神泯於无葢精所以爲形而神麗於形者也天地形之大者也日月麗天百穀草木麗土其神之𤼵見而可見者也重明以麗乎正乃化成天下重直龍反傳以卦才言也上下皆離重明也二五皆處中正麗乎正也君臣上下皆有明德而處中正可以化天下成文明之俗也本義釋卦名義朱子曰彖辭重明自是五二兩爻爲君臣重明之義大象又自說繼世重明之義不同平庵項氏曰日月麗乎天而成明百穀草木麗乎土而成文故離爲文又爲明重明以麗乎正此統論一卦之義以釋卦名也建安丘氏曰五爲天位故離上有日月麗乎天之象此以氣麗氣者也二居地位故離下有百穀草木麗乎土之象此以形麗形者也上下皆離故曰重明君臣上下重明而共麗乎正則可以成天下文明之化矣柔麗乎中正故亨是以畜牝牛吉也傳二五以柔順麗於中正所以能亨人能養其至順以麗中正則吉故曰畜牝牛吉也或曰二則中正矣五以隂居陽得爲正乎曰離主於所麗五中正之位六麗於正位乃爲正也學者知時義而不失輕重則可以言易矣本義以卦體釋卦辭朱子曰六二中正六五中而不正今言麗乎正麗乎中正次第說六二分數多此卦惟這爻較好平庵項氏曰柔麗乎中正此以二五成卦之爻釋卦辭也五麗乎中二麗乎正中人能附順乎中正之道故亨是以畜牝牛吉加是以二字明柔附本非令德以能附麗乎中正是以吉也苟附麗非正則安得吉哉雲峯胡氏曰坎之剛中九五分數多故九五曰坎不盈卦辭釋有孚亦曰水流而不盈離之中正六二分數多故卦辭曰畜牝牛而六二爻辭亦曰黄離元吉象曰明兩作離大人以繼明照于四方傳若云兩明則是二明不見繼明之義故曰明兩明而重兩謂相繼也作離明兩而爲離繼明之義也震巽之類亦取洊隨之義然離之義尤重也大人以德言則聖人以位言則王者大人觀離明相繼之象以世繼其明德照臨於四方大凡以明相繼皆繼明也舉其大者故以世襲繼照言之本義作起也朱子曰明兩作猶言水洊至今日明來日又明明字便是指日而言若說兩明却是兩箇日只是這一箇明兩番作非明兩乃兩作也開封耿氏曰重明者上下明也繼明者前後明也彖言二五君臣故以重明言之象言明兩作皆君也故以繼明言之蘭氏廷瑞曰離爲火爲日爲電而獨言明者葢指一偏則不足以盡繼明之義六十四卦惟離稱大人平庵項氏曰繼明如言聖繼聖雲峯胡氏曰程傳明兩句絶本義以水洊至例之故訓作爲起初九履錯然敬之无咎錯七各反傳陽固好動又居下而離體陽居下則欲進離性炎上志在上麗幾於躁動其履錯然謂交錯也雖未進而跡已動矣動則一无則字失居下之分而有咎也然其剛明之才若知其義而敬慎之則不至於咎矣初在下无位者也明其身之進退乃所麗之道也其志既動不能敬慎則妄動是不明所麗乃有咎也本義以剛居下而處明體志欲上進故有履錯然之象敬之則无咎矣戒占者宜如是也進齋徐氏曰履在下之象錯然交雜之貌居離之始才剛而妄動識淺而未明所履乖錯未得其當烏能无咎惟能敬慎則其咎可免矣雙湖胡氏曰錯然是事物紛錯之意能敬則心有主宰酬應不亂可免於咎不能敬則反是象曰履錯之敬以辟咎也辟音避傳履錯然欲動而知敬慎不敢進所以求辟免過咎也居明而剛故知而能辟不剛明則妄動矣中溪張氏曰初居離之始所履之邪正善惡紛錯而未知適從也不敬則妄動而獲咎矣故履錯之敬可以避咎六二黄離元吉傳二居中得正麗於中正也黄中之色文之美也文明中正美之盛也故云黄離以文明中正之德上同於文明中順之君其明如是所麗如是大善之吉也本義黄中色柔麗乎中而得其正故其象占如此朱子曰六二一爻柔麗乎中而得其正故元吉至六五雖是柔麗乎中而不得其正特借中字而包正字雲峯胡氏曰離六二以黄言者離之二自坤來也二與五皆自坤來而五不以黄離言者坤五爻皆臣道故於五曰黄裳元吉離五君二臣故於二曰黄離元吉况離性炎上上之中又不如下之中也李氏開曰六二本坤之中爻黄地之中色與黄裳元吉同裳下餙而離爲日此其異也象曰黄離元吉得中道也傳所以元吉者以其得中道也不云正者離以中爲重所以成文明由中也正在其中矣節齋蔡氏曰坎之時用在中二五皆卦之中也五當位而二不當位故五爲勝離之時用在中二五皆卦之中也二當位而五不當位故二爲勝雲峯胡氏曰坎五之中中而未大離二之中聖人特以得中道許之九三日昃之離不鼓缶而歌則大耋之嗟凶耋田節反傳八純卦皆有二體之義乾内外皆健坤上下皆順震威震相繼巽上下順隨坎重險相習離二明繼照艮内外皆止兌彼已相說而離之義在人事最大九三居下體之終是前明將盡後明當繼之時人之始終時之革易也故爲日昃之離日下昃之明也昃則將没矣以理言之盛必有衰始必有終常道也達者順理爲樂缶常用之器也鼓缶而歌樂其常也不能如是則以大耋爲嗟憂乃爲凶也大耋傾没也人之終盡達者則知其常理樂天而已遇常皆樂如鼓缶而歌不達者則恐怛有將盡之悲乃大耋之嗟爲其凶也此處死生之道也耋與昳同本義重離之間前明將盡故有日昃之象不安常以自樂則不能自處而凶矣戒占者宜如是也或問日昃之離朱子曰死生常理也若不能安常以自樂則不免有嗟戚又問生之有死猶晝之必夜故君子當觀日昃之象以自處曰人固知常理如此只是臨時自不能安耳雲峯胡氏曰日昃晝而將夜也晝之必夜生之必死皆常道也缶常用之器不鼔缶而歌是不安常以自樂也不安其常則不能自處而以大耊爲嗟矣嗟者歌之反故凶藍田呂氏曰詩云我今不樂逝者其耋與此意同庸齋趙氏曰離爲日三過中前明將盡有日昃之象於是時也鼓缶而歌是以樂消日也王羲之所謂年在桑榆賴絲竹陶冩是也大耊之嗟是以憂度日也趙孟所謂焉能恤逺朝不謀夕是也象曰日昃之離何可久也傳日既傾昃明能久乎明者知其然也故求人以繼其事退處以休其身安常處順何足以爲凶也九四突如其來如焚如死如棄如突如忽反傳九四離下體而升上體繼明之初故言繼承之義在上而近君繼承之地也以陽居離體而處四剛躁而不中正且重剛以不正而剛盛之勢突如而來非善繼者也夫善繼者必有巽譲之誠順承之道若舜啟然今四突如其來失善繼之道也又承六五隂柔之君其剛盛陵爍之勢氣熖如焚然故云焚如四之所行不善如此必被禍害故曰死如失繼紹之義承上之道皆逆德也衆所棄絶故云棄如至於死棄禍之極矣故不假言凶也本義後明將繼之時而九四以剛廹之故其象如此朱子曰九四有侵陵六五之象故突如其來如又曰只是說九四陽爻突出來逼拶上爻離爲火故有焚如之象焚如是不戢自焚之意棄是死而棄之之意漢上朱氏曰九四處不當位不善繼而求繼者也臨川呉氏曰繼承之際不善如此必至身殞國亡雲峯胡氏曰離以二五為主本義所謂前明後明者指二與五也三近二則前明將盡四近五則後明將繼突如其來四迫五也坎三離四正上下之交故兩卦於此深致意焉坎性下三在下卦之上故曰來來而下也離性上四在上卦之下故曰突如其來來而上也水本下又來而之下入於坎窞而後已火本上又來而之上焚如死如棄如而後已然坎之三有枕象三枕下之險而四又下枕三故三之入也愈深離之四有突象四既上突而廹乎五三亦上突而廹乎四故四之焚也愈甚象曰突如其來如无所容也傳上陵其君不順所承人惡衆棄天下所不容也本義无所容言焚死棄也六五出涕沱若戚嗟若吉沱徒河反傳六五居尊位而守中有文明之德可謂善矣然以柔居上在下无助獨附麗於剛强之間危懼之勢也唯其明也故能畏懼之深至於出涕憂慮之深至於戚嗟所以能保其吉也出涕戚嗟極言其憂懼之深耳時當然也居尊位而文明知憂畏如此故得吉若自恃其文明之德與所麗中正泰然不懼一作慮則安能保其吉也本義以隂居尊柔麗乎中然不得其正而廹於上下之陽故憂懼如此然後得吉戒占者宜如是也朱子曰五介于兩陽之間憂懼如此然處得其中故不失其吉潘氏夢旂曰五居尊位天下之所附麗也明德在中慮事深遠出涕戚嗟憂懼之至所以吉也雲峯胡氏曰坎中有離自牖離虗明之象也離中有坎沱若坎水象戚嗟若心憂之象也九三大耋之嗟以死生爲憂者也不當憂而憂故凶六五戚嗟若居君位而能憂者也憂所當憂故吉東谷鄭氏曰二五皆以柔麗剛二之辭安五之辭危者二得位五失位也失位則危知危則吉象曰六五之吉離王公也離音麗傳六五之吉者所麗得王公之正位也據在上之勢而明察事理畏懼憂虞以持之所以能吉也不然豈能安乎孔氏曰五爲王位而言公者變文以恊韻也上九王用出征有嘉傳九以陽居上在離之終剛明之極者也明則能照剛則能斷能照足以察邪惡能斷足以行威刑故王者宜用如是剛明以辨天下之邪惡而行其征伐則有嘉美之功也征伐用刑之大者節齋蔡氏曰以剛居上處離之極剛明可以及遠故用之出征則有嘉美之功西溪李氏曰繼體之君自當出征有扈之戰啟所以承禹商奄淮夷之征成王所以繼武王周公作立政終之曰其克詰爾戎兵以陟禹之迹召公畢公命康王无他意惟曰張皇六師无壊我高祖寡命而已葢不如是不足以正邦也然則出征豈細事哉折首獲匪其醜无咎傳夫明極則无㣲不照斷極則无所寛宥不約之以中則傷於嚴察矣去天下之惡若盡究其漸染詿誤則何可勝誅所傷殘亦甚矣故但當折取其魁首所執獲者非其醜類則无殘暴之咎也書曰殱厥渠魁脇從罔治本義剛明及遠威震而刑不濫无咎之道也故其象占如此朱子曰有嘉折首是句西溪李氏曰有嘉折首王者之兵只誅首惡醜類不獲不以爲咎也南軒張氏曰離有甲胄兵戈之象而周官司馬之職列於夏官葢有以也雲峯胡氏曰坎水内明而外暗上六暗於外者也故必䧟於刑離火内暗而外明上九明於外者也故可用行兵本義云剛明及逺威震而刑不濫葢剛逺則威震故曰折首明逺則刑不濫故曰獲匪其醜象曰王用出征以正邦也傳王者用此上九之德明照而剛斷以察除天下之惡所以正治其邦國剛明居上之道也中溪張氏曰征之爲言正也故曰以正邦也建安丘氏曰離麗也以一隂而麗二陽也上下皆離則二五皆麗然離之性上上離則炎上之太過故下離爲安又二得位而五不得位也故二之黄離元吉異乎五之出涕沱若也其四陽爻則處隂内而爲隂所麗者最凶是以三言日昃之離四言焚如棄如以皆在二五兩隂之内也若初上二陽初明在下則知以敬而辟咎上剛在外則能以征而正邦也周易傳義大全卷十一
