body:
  text: 周易𫝊義大全卷四明胡廣等撰坎下坤上𫝊師序卦訟必有衆起故受之以師師之興由有爭也所以次訟也為卦坤上坎下以二體言之地中有水為衆聚之象以二卦之義言之內險外順險道而以順行師之義也以爻言之一陽而為衆隂之主統衆之象也比以一陽為衆隂之主而在上君之象也師以一陽為衆隂之主而在下將帥之象也龜山楊氏曰自昔先王之制民居則為比閭族黨州鄉故比則衆在內一陽在上為之主君象也伍兩卒旅軍師之制則衆在外一陽在下為主將帥象也雲峰胡氏曰乾坤而後屯䝉需訟師比皆有坎險之一體興師動衆尤其最險者也師貞丈人吉無咎𫝊師之道以正為本興師動衆以毒天下而不以正民弗從也強驅之耳故師以貞為主其動雖正也帥之者必丈人則吉而無咎也蓋有吉而有咎者有無咎而不吉者吉且無咎乃盡善也丈人者尊嚴之稱帥師總衆非衆所尊信畏服則安能得人心之從故司馬穰苴擢自微賤授之以衆乃以衆心未服請莊賈為將也所謂丈人不必素居崇貴但其才謀德業衆所畏服一作嚴畏則是也如穰苴既誅莊賈則衆心畏服乃丈人矣又如淮隂侯起於微賤遂為大將蓋其謀為有以使人尊畏也本義師兵衆也下坎上坤坎險坤順坎水坤地古者寓兵於農伏至險於大順藏不測於至靜之中又卦惟九二一陽居下卦之中為將之象上下五隂順而從之為衆之象九二以剛居下而用事六五以柔居上而任之為人君命將出師之象故其卦之名曰師丈人長老之稱用師之道利於得正而任老成之人乃得吉而無咎戒占者亦必如是也朱子曰吉無咎謂如一件事自家做出來好方得無罪咎若做得不好雖是好事也則有咎無咎吉謂如一件事元是合做底自家做出來又好如所謂戰則克祭則受福戰而臨事懼好謀成祭而恭敬齊肅便是無咎克與受福便是吉如行師之道既已正了又用丈人率之如此則是都做得是便是吉了還有甚咎師彖辭亦是說得齊整東萊吕氏曰丈人者老成持重諳練之人如趙充國之比是也二以一陽為卦之主猶將帥也二雖剛中必待五之應猶將帥雖賢必待君為之應然後能成功也苟五不應師變為坎矣將帥臨敵而上無君之應豈非天下之至險乎隆山李氏曰師止言貞而不及元亨利者凡兵出似非一元生育之事故不言元不以亨利誨天下者懼其貪功困生靈也要之師之為用惟守一貞足矣又曰師以殺伐為事死生存亡繫焉豈無悔咎唯以丈人行之則吉而咎可無矣彖曰師衆也貞正也能以衆正可以王矣王往况反𫝊能使衆人皆正可以王天下矣得衆心服從而歸正王道止於是也本義此以卦體釋師貞之義以謂能左右之也一陽在下之中而五隂皆為所以也能以衆正則王者之師矣漢上朱氏曰周官自五人為伍積之至於二千五百人為師衆之義也西溪李氏曰王者之兵行一不義殺一不辜而得天下不為故曰能以衆正可以王矣雲峰胡氏曰本義提出一以字依春秋書法謂能左右之也一陽而五隂皆為所以閫外之事將得専制之也然以之歸於正則為王者之師以之微有不正則為霸者之術剛中而應行險而順𫝊言二也以剛處中剛而得中道也六五之君為正應信任之専也雖行險道而以順動所謂義兵王者之師也上順下險行險而順也進齊徐氏曰剛中而應行險而順此為將之道蓋不剛則無威嚴而不足以服衆過剛則暴而無以懷之有剛中之才而信任不専亦不能有成功此師所以貴乎剛中而應也兵凶器戰危事不得已而興師動衆禁暴除亂此師所以貴乎行險而順也以此毒天下而民從之吉又何咎矣𫝊師旅之興不無傷財害人毒害天下然而民心從之者以其義動也古者東征西怨民心從也如是故吉而無咎吉謂必克無咎謂合義又何咎矣其義故一作固無咎也本義又以卦體卦德釋丈人吉無咎之義剛中謂九二應謂六五應之行險謂行危道順謂順人心此非有老成之德者不能也毒害也師旅之興不無害於天下然以其有是才德是以民悅而從之也童溪王氏曰殺戮之慘供億之苦勞民而費財所謂毒天下也雙湖胡氏曰衆正可王贊六五剛中而應贊九二行險而順贊兩體師本毒害而民從之吉且無咎者特以中正順道耳後之王者可以觀矣雲峰胡氏曰剛中而應彖𫝊凡五見或五應二或二應五本義於他卦不明言之而師獨曰剛中謂九二應謂六五應之以在師之時五之信任乎二尤不可不専也毒之一字見得王者之師不得已而用之如毒藥之攻病非有沈痾堅癥不輕用也其指深矣象曰地中有水師君子以容民畜衆畜𫝊敕六反本義許六反𫝊地中有水水聚於地中為衆聚之象故為師也君子觀地中有水之象以容保其民畜聚其衆也本義水不外於地兵不外於民故能養民則可以得衆矣朱子曰易有精有藴如師貞丈人吉此聖人之精畫前之易不可易之妙理至於容民畜衆等處因卦以發皆其藴也李氏曰容民則無流民畜衆則無叛衆左𫝊武有七德安民和衆亦此義也習靜劉氏曰古者兵農合一居則為比閭族黨之民役則為卒伍軍旅之衆容之畜之於無事之時而用之於有事之日此衆即此民也隆山李氏曰於師得古人井田之法於比得古人封建之法初六師出以律否臧凶𫝊初師之始也故言出師之義及行師之道在邦國興師一作動衆而言合義理則是以律法也謂以禁亂誅暴而動茍動不以義則雖善亦凶道也善謂克勝凶謂殃民害義也在行師而言律謂號令莭制行師之道以號令莭制為本所以統制於衆不以律則雖善亦凶雖使勝捷猶凶道也制師無法幸而不敗且勝者時有之矣聖人之所戒也程子曰律有二義有出師不以義者有行師而無號令節制者皆失律也師出當以律不然雖臧亦凶本義律法也否臧謂不善也朝氏曰否字先儒多作不是也在卦之初為師之始出師之道當謹其始以律則吉不臧則凶戒占者當謹始而守法也隆山李氏曰二為師主初受節制有師出以律之象西溪李氏曰甘誓攻右攻左御非其馬之正牧誓五步六步七步五伐六伐七伐皆不可亂周公司馬法坐作進退皆有常莭魯侯撫師牛馬臣妾戒以勿逐以其亂部分後不可以為師也雲峰胡氏曰初六才柔故有否臧之戒然以律不言吉否臧則言凶者律令謹嚴出師之常其勝負猶未可知也故不言吉出而失律凶立見矣象曰師出以律失律凶也𫝊師出當以律失律則凶矣雖幸而勝亦凶道也九二在師中吉無咎王三錫命𫝊師卦唯九二一陽為衆隂所歸五居君位是其正應二乃師之主專制其事者也居下而専制其事唯在師則可自古命將閫外之事得専制之在師専制而得中道故吉而無咎蓋恃専則失為下之道不専則無成功之理故得中為吉凡師之道威和並至則吉也既處之盡其善則能成功而安天下故王錫寵命至于三也凡事至于三者極也六五在上既専倚任復厚其寵數蓋禮不稱則威不重而下不信也他卦九二為六五所任者有矣唯師専主其事而為衆隂所歸故其義最大人臣之道於事無所敢専唯閫外之事則専制之雖制之在已然因師之力而能致者皆君所與而職當為也世儒有論魯祀周公以天子禮樂以為周公能為人臣不能為之功則可用人臣不得用之禮樂是不知人臣之道也夫居周公之位則一有能字為周公之事由其位而能為者皆所當為也周公乃盡其職耳子道亦然唯孟子為知此義故曰事親若曽子者可也未嘗以曾子之孝為有餘也蓋子之身所能為者皆所當為也兼山郭氏曰威克厥愛允濟愛克厥威允罔功九二剛勝之將能用中焉是以有功而宜膺寵錫者也臨川吳氏曰錫命如王使宰周公錫齊侯命王使內使過錫晉侯命是也至于三者天寵之優渥也本義九二在下為衆隂所歸而有剛中之德上應於五而為所寵任故其象占如此朱子曰在師中吉言以剛中之德在師中所以為吉建安丘氏曰九二即師之丈人也以一陽統衆隂而居下卦之中有帥師之象唯二以剛居柔得師之中無過不及故吉無咎獨與卦辭同也雲峰胡氏曰九二剛中所謂丈人者故吉而無咎六四無咎不言吉三則凶矣二曰王三錫命五應也五曰長子帥師二應也五應二故曰錫象曰在師中吉承天寵也王三錫命懷萬邦也𫝊在師中吉者以其承天之寵任也天謂王也人臣非君寵任之則安得専征之權而有成功之吉象以二専主其事故發此義與前所云世儒之見異矣王三錫以恩命褒其成功所以一有威字懷萬邦也建安丘氏曰上承天子之寵任而以兵權屬之錫命至三使之得専閫外之事王者用兵非得已嗜殺豈其本心故三錫之命惟在於懷綏萬邦而已雲峰胡氏曰言王命象言天寵亦春秋王必稱天之意也六三師或輿尸凶𫝊三居下卦之上居位當任者也不唯其才隂柔不中正師旅之事任當専一二既以剛中之才為上信倚必専其事乃有成功若或更使衆人主之凶之道也與尸衆主也蓋指三也以三居下之上故發此義軍旅之事任不専一覆敗必矣龜山楊氏曰師之或以衆尸之也衆尸之禀命不一而無功矣凶之道也六三上乘衆隂輿尸也故凶唐九節度之師不立統帥雖李郭之善兵猶不免敗衄則輿尸之凶可知誠齊楊氏曰河曲之師趙盾為將而令出趙穿邲之師荀林父為將而令出先縠後世復有中人監軍者師焉往而不敗本義輿尸謂師徒撓敗輿尸而歸也以隂居陽才弱志剛不中不正而犯非其分故其象占如此或問師或輿尸伊川說為衆主如何朱子曰從來有輿尸血刃之說何必又牽引别說某自少時未曾識訓詁只讀白本時便疑如此說後來從鄉先生學皆作衆主說甚不以為然今看來只是兵敗輿其尸而歸之義雲峰胡氏曰剝一陽在上而衆隂載之有得輿象六三衆隂在上如積尸而坤為輿坎為車輪有輿尸象此爻甚言師徒撓敗之凶以見師之成敗生死皆繫於將九二剛中可以用師六四柔正猶能全師以退六三不中不正才柔志剛輿尸而歸其凶何如哉象曰師或輿尸大無功也𫝊倚付二三安能成功豈唯無功所以致凶也六四師左次無咎𫝊師之進以強勇也四以柔居隂非能進而克捷者也知不能進而退故左次左次退舍也量宜進退乃所當也故無咎見可而進知難而退師之常也唯取其退之得宜不論其才之能否也度不能勝一作進而完師以退愈於覆敗逺矣可進而退乃為咎也易之發此義以示後世其仁深矣本義左次謂退舍也隂柔不中而居隂得正故其象如此全師以退賢於六三逺矣故其占如此臨川吳氏曰春秋師次于郎次于召陵左氏𫝊曰凡師三宿為次按兵家尚右右為前左為後故八陳圖天前衝地前衝在右天後衝地後衝在左左次猶言退舍謂不進前而退後也象曰左次無咎未失常也𫝊行師之道因時施宜乃其常也故左次未必一無必字為失也如四退次乃得其宜是以無咎本義知難而退師之常也誠齊楊氏曰善戰者不必進而退亦進也禹之班師晉文之退舍是已使髙帝不至白登太宗不渡鴨緑咎於何有雲峰胡氏曰恐人以退為怯故明當退而退亦師之常也六五田有禽利執言無咎長子帥師弟子輿尸貞凶長丁丈反象同𫝊五君位興師之主也故言興師任將之道師之興必以蠻一作戎夷猾夏寇賊姦宄為生民之害不可懷來然後奉辭以誅之若禽獸入于田中侵害稼穡於義宜獵取則獵取之如此而動乃得無咎若輕動以毒天下其咎大矣執言奉辭也明其罪而討之也若秦皇漢武皆窮山林以索禽獸者也非田有禽也任將授師之道當以長子帥師二在下而為師之主長子也若以弟子衆主之則所為雖正亦凶也弟子凡非長一有子字者也自古任將不専而致覆敗者如晉荀林父邲之戰唐郭子儀相州之敗是也程子曰帥師以長子今以弟子衆主之亦是失律故雖貞亦凶也厚齊馮氏曰禹之征苗啓之伐有扈􅏷之征羲和自虞夏以來其伐有罪必執言不但鳴條以後也本義六五用師之主柔順而中不為兵端者也敵加於已不得已而應之故為田有禽之象而其占利以摶執而無咎也言語辭也長子九二也弟子三四也又戒占者専於委任若使君子任事而又使小人參之則是使之輿尸而歸故雖貞而亦不免於凶也或問易爻取義如師之五長子帥師乃是本爻有此象又却說弟子輿尸何也朱子曰此假設之辭也言若弟子輿尸則凶矣問此例恐與家人嗃嗃而繼以婦子嘻嘻同曰然雲峰胡氏曰二三四皆將也五任將者也於三曰師或輿尸危之之辭而不忍必言之也至五則直書曰弟子輿尸蓋謂五用二而又用三必至於如此故長子帥師不言吉而弟子則曰輿尸貞凶甚言任將之不可不審且専也長子即彖所謂丈人也自衆尊之則曰丈人自君稱之則曰長子皆長老之稱彖言師必用老成則既貞又吉爻言用老成而或以新進參之雖貞亦凶吉凶之鑒昭然矣象曰長子帥師以中行也弟子輿尸使不當也當去聲𫝊長子謂二以中正之德合於上而受任以行若復使其餘者衆尸其事是任使之不當也其凶宜矣建安丘氏曰以中行者謂九二以剛中之道而行師也使不當者謂六三才弱不足倚仗必致喪師而歸是任使之不當也雲峰胡氏曰一使字繫民命之生死國家之安危或當或否吉凶天壤可不戒哉上六大君有命開國承家小人勿用𫝊上師之終也功之成也大君以爵命賞有功也開國封之為諸侯也承家以為卿大夫也承受也小人者雖有功不可用也故戒使勿用師旅之興成功非一道不必皆君子也故戒以小人有功不可用也賞之以金帛祿位可也不可使有國家而為政也小人平時易致驕盈况挾其功乎漢之英彭所以亡也聖人之深慮逺戒也此専言師終之義不取爻義蓋以其大者若以爻言則六以柔居順之極師既終而在無位之地善處而無咎者也本義師之終順之極論功行賞之時也坤為土故有開國承家之象然小人則雖有功亦不可使之得有爵土但優以金帛可也戒行賞之人於小人則不可用此占而小人遇之亦不得用此爻也朱子曰開國承家一句是公共得底未分别君子小人在小人勿用則是勿更用他與之謀議經畫爾漢光武能用此義自定天下之後一例論功行封其所以用之在左右者則鄧禹耿弇賈復數人他不與焉建安丘氏曰初言師之出上言師之還至此則功成凱奏之時也大君必有賞功之命開國功之大者也承家功之小者也象曰以正功者言爵賞之命乃所以正諸將武功之等差也然兵行詭道而販繒屠狗之人孰不願出竒以立功而立功不必皆君子也此又曰小人勿用何耶蓋以小人有功固當例以賞之若使之參預國家之謀議則挾功以逞必生僭竊亂邦之禍故於小人戒以勿用而象曰必亂邦也其意嚴矣象曰大君有命以正功也小人勿用必亂邦也𫝊大君持恩賞之柄以正軍旅之功師之終也雖賞其功小人則不可以有功而任用之用之必亂邦小人恃功而亂邦者古有之矣本義聖人之戒深矣雲峰胡氏曰王三錫命命於行師之始大君有命命於行師之終懷邦亂邦丈人小人之所以分此固聖人之所深慮逺戒也隆山李氏曰六爻出師駐師將兵將將與夫奉辭伐罪旅師班賞無所不載雖後世兵書之繁殆不如師卦六爻之略而况於論王者之師比之後世權謀之書竒正甚逺為天下者不得已而用師又何必捨此而他求哉建安丘氏曰師卦以九二一陽統衆隂有大將總兵之象故卦名曰師出師之道不可不正故曰師貞帥師之任不可非人故曰丈人吉無咎蓋只七字而用師之道盡矣初六師之始故曰師出以律上六師之終故曰開國承家師之次序然也中四爻六五為任將之君也故以長子弟子係之二三四三爻則皆用師之將也九二以剛居中威而不暴持重之將也故有師中之吉即五所謂長子也六三以柔居剛輕躁妄動僨師之將也故有輿尸之凶即五所謂弟子也六四以柔居柔僅知自守蓋度德量力之人固無戰勝之功亦無喪敗之禍止於左次無咎而已四之無咎不如二之吉而三之凶又不如四之無咎聖人以萬世用兵利害而權輕重於吉凶無咎四字之間後之出師命將者盍亦鑒之於斯乎坤下坎上𫝊比序卦衆必有所比故受之以比比親輔也一作比輔比也一作比輔也人之類必相親輔然後能安故既有衆則必有所比比所以次師也為卦上坎下坤以二體言之水在地上物之相切比無間莫如水之在地上故為比也又衆爻皆隂獨五以陽剛居君位衆所親附而上亦親下故為比也東萊吕氏曰師以二為主二將帥也以一陽而為衆隂之所聽命者比以五為主以一陽而為衆隂之所親輔者也比所以次師者言衆雖聽命於將帥而心當親輔於君也白雲郭氏曰一陽之卦得位者師比而已得君位者為比得臣位者為師雲峰胡氏曰易一陽之卦九六復師謙豫比剝也而最吉莫如比比吉原筮元永貞無咎比毗志反𫝊比吉道也人相親比自為吉道故雜卦云比樂師憂人相親比必有其道茍非其道則有悔咎故必推原占決其可比者而比之筮謂占決卜度非謂以蓍龜也所比得元永貞則無咎元謂有君長之道永謂可以常久貞謂得正道上之比下必有此三者下之從上必求此三者則無咎也龜山楊氏曰先王什伍其民鄉田同井出入相友守望相助疾病相扶持比所以吉也衆散民流用蕩析離居凶可知矣白雲郭氏曰卦之一陽惟比得天位莫吉於此故直言吉涑水司馬氏曰原筮者比不可以茍合也比之道不可以不善也不可以不長久也不可以不正也故曰元永貞無咎漢上朱氏曰凡物孤則危羣則強父子夫婦朋友未有孤危而不凶者人君為甚故比而吉厚齊馮氏曰萃與比下體坤順同上體水澤不相逺惟九四一爻有分權之象故元永貞言於五比下無分權者故元永貞言於卦義各有在也不寧方來後夫凶𫝊人之不能自保其安寧方且來求親比得所比則能保其安當其不寧之時固宜汲汲以求比若獨立自恃求比之志不速而後則雖夫亦凶矣夫猶凶况柔弱者乎夫剛立之稱𫝊曰子南夫也又曰是謂我非夫凡生天地之間者未有不相親比而能自存者也雖剛強之至未有能獨立者也比之道由兩志相求兩志不相求則暌矣君懷撫其下下親輔一作附於上親戚朋友鄉黨皆然故當上下合志以相從茍無相求之意則離而凶矣大抵人情相求則合相持則暌相持相待莫先也人之相親固有道然而欲比之志不可緩也進齊徐氏曰後夫凶如萬國朝禹而防風後至天下歸漢而田橫不來隗囂公孫述之徒皆是也本義比親輔也九五以陽剛居上之中而得其正上下五隂比而從之以一人而撫萬邦以四海而仰一人之象故筮者得之則當為人所親輔然必再筮以自審有元善長永正固之德然後可以當衆之歸而無咎其未比而有所不安者亦將皆來歸之若又遲而後至則此交巳固彼來已晚而得凶矣若欲比人則亦以是而反觀之耳或問比卦大抵占得之多是人君為人所比之象朱子曰也不必拘若三家村中推一箇人作頭首也是為人所比也須自審自家才德可以為之比否所以原筮元永貞也問不寧方來後夫凶曰别人自相比了已既後於衆人却要強去比他豈不為人所惡是取凶也後夫猶言後人亦是占中一義左𫝊齊崔武子卜娶妻卦云入於其宫不見其妻凶人以為凶他云先夫已當之矣彼云先夫則此云後夫正是一樣語陽便是夫隂便是婦後夫凶言九五既為衆隂所歸若後面更添一箇陽來則必凶古人如袁紹劉馥劉繇劉備之事可見兩雄不並棲之義雲峰胡氏曰蒙之筮問之人者也不一則不専比之筮問其在我者也不再則不審曰吉曰無咎曰凶皆占辭吉乃上下相比之占統言之也無咎則所比者之占凶為比人者之占分言之也不寧方來指下四隂而言後夫凶指上一隂而言來者自來後者自後吾惟問我之可比不可比彼之來比不來比吾不問也此固王者大公之道而為九五之顯比者也又曰原筮元永貞為比於人者言也本義又發出比人之義言外意也彖曰比吉也本義此三字疑衍文朱子曰比吉也也字羡當云比吉比輔也下順從也比輔也解比字下順從也解吉字嵩山朝氏曰王昭素謂多此也字比輔也下順從也𫝊比吉也比者吉之道也物相親比乃吉道也比輔也釋比之義比者相親輔也下順從也解卦所以為比也五以陽居尊位羣下順從以親輔之所以為比也本義此以卦體釋卦名義原筮元永貞無咎以剛中也𫝊推原筮一作占決相比之道得元永貞而後可以無咎所謂元永貞如五是也以陽剛居中正盡比道之善者也以陽剛當尊位為君德元也居中得正能永而貞也卦辭本泛言比道彖言元永貞者九五以剛處中正是也不寧方來上下應也𫝊人之生不能保其安寧方且來求附比民不能自保故戴君以求寧君不能獨立故保民以為安不寧而來比者上下相應也以聖人之公言之固至誠求天下之比以安民也以後王之私言之不求下民之附則危亡至矣故上下之志必相應也在卦言之上下羣隂比於五五比其衆乃上下應也朱子曰程𫝊云以聖人之公言之固至誠求天下之比以安民也以後王之私言之不求下民之附則危亡至矣蓋且得他畏危亡之禍而求所以比附其民猶勝於全不顧者也後夫凶其道窮也𫝊衆必相比而後能遂其生天地之間未有不相親比而能遂者也若相從之志不疾而後則不能成比雖夫亦凶矣無所親比困屈以致凶窮之道也本義亦以卦體釋卦辭剛中謂五上下謂五隂雲峰胡氏曰凡應字多謂剛柔兩爻相應此則為上下五隂應乎五之剛又一例也師比皆一陽五隂師之應獨重謂五應二將之任専也比之應則謂上下應五君之分嚴也其曰上下應者五隂皆當應也曰其道窮者上以一隂獨不能應也易窮則變乾上九窮之災坤比上六皆曰其道窮皆不知變者象曰地上有水比先王以建萬國親諸侯𫝊夫物相親比而無間者莫如水在地上所以為比也先王觀比之象以建萬國親諸侯建立萬國所以比民也親撫諸侯所以比天下也朱子曰伊川言建萬國以比民言民不可盡得而比故建諸侯使比民而天子所親者諸侯而已這便是他比天下之道本義地上有水水比於地不容有間建國親侯亦先王所以比於天下而無間者也彖意人來比我此取我往比人龜山楊氏曰水在地上相比而不離先王觀比之象建國畫地而封之為之屬連使相親比則諸侯知尊君親上而天下從之矣建安丘氏曰夫水與地相親比有合無間也先王以建萬國親諸侯而不曰親萬國者蓋人君以一身而居九重之上萬國如此其廣人民如此其衆安得人人而親比之必也分建萬國而先親諸侯使諸侯又親萬國之民則莫不尊君親上而比于一矣方塘徐氏曰彖言五隂比一陽象言一陽比五隂以互相發比之義盡矣雲峰胡氏曰師之容民畜衆井田法也可以使民自相合而無間比之建國親侯封建法也可使君與民相合而無間初六有孚比之無咎𫝊初六比之始也相比之道以誠信為本中心不信而親人人誰與之故比之始必有孚誠乃無咎也孚信之在中也朱子曰孚有在陽爻者有在隂爻者伊川謂中虛信之本中實信之質是也蘭氏廷瑞曰易言有孚者二十一有言信其如此者有言有孚誠者有孚盈缶終來有他吉𫝊誠信充實於內若物之盈滿於缶中也缶質素之器言若缶之盈實其中外不加文飾則終能來有他吉也他非此也外也若誠實充於內物無不信豈用飾外以求比乎誠信中實雖他外皆當感而來從孚信比之本也本義比之初貴乎有信則可以無咎矣若其充實則又有他吉也朱子曰終來有他說將來似顯比便有那周遍底意思厚齊馮氏曰缶瓦器爾雅云盎也初陽實六隂虛虛者缶也實者盈也雲峰胡氏曰與人交止於信親比之初能有誠信所以比之無咎及其誠信充實則非特無咎又有他吉初六不與五應故曰有他大過九四中孚初九皆曰有他皆指非應而言但彼則戒其有他向之心此則許其有他至之吉也沙隨程氏曰終來有他吉者非初之時吉在後也趙氏曰易六爻貴於正應其近而相得亦有不應者惟比諸爻不論應否而専以比五為義象曰比之初六有他吉也𫝊言比之初六者比之道在乎始也始能有孚則終致有他之吉其始不誠終焉得吉上六之凶由無首也六二比之自內貞吉𫝊二與五為正應皆得中正以中正之道相比者也二處於內自內謂由己也擇才而用雖在乎上而以身許國必由於己已以得君道合而進乃得正而吉也以中正之道應上之求乃自內也不自失也汲汲以求比者非君子自重之道乃自失也本義柔順中正上應九五自內比外而得其貞吉之道也占者如是則正而吉矣中溪張氏曰小人比而不周所惡於比者為其不正也茍比之以正則無惡於比矣五為比之主二其應也以隂從陽各當其位故曰貞吉隆山李氏曰比之世隂皆求陽而非陽求隂故二之比五自內之外出應乎上者也雲峰胡氏曰初不係四之應而五應之故曰他四不係初之應而應乎五故曰外惟二本與五應故曰比之自內而又以正故吉凡卦以下卦為內上卦為外比六二言內六四言外內外卦之分見於此象曰比之自內不自失也𫝊守己中正之道以待上之求乃不自失也易之為戒嚴密二雖中正質柔體順故有貞吉自失之戒戒之自守以待上之求無乃涉後凶乎曰士之修己乃求上之道降志辱身非自重之道也故伊尹武侯救天下之心非不切必待禮至然後出也本義得正則不自失矣進齊徐氏曰二柔順中正上應九五由內比外故曰自內以中相應故曰貞吉象言不自失者則又推原二之比五必當反求諸己自無所失而後可以比於人也六三比之匪人匪非鬼反𫝊三不中正而所比皆不中正四隂柔而不中二有應而比初皆不中正匪人也比於匪人其失可知悔吝一作咎不假言也故可傷二之中正而謂之匪人隨時取義各不同也東萊吕氏曰二之中正本未嘗有應而比初但三以私心觀之故見其有應而比初耳蓋君子之所為本公茍以私心觀之則但見其私也三既看得二為小人故與二相比未嘗得近君子之益反得近小人之損此三之罪非二之咎也爻辭隨時取義最當詳考本義隂柔不中正承乘應皆隂所比皆非其人之象其占大凶不言可知朱子曰初應四四是外比於賢為比得其人二應五五為顯比之君亦為比得其人惟三乃應上上為比之無首者故為比之匪人也進齊徐氏曰匪人謂上六五為比主上獨背之而六三位不中正復與之應是所比之非其人也三山劉氏曰承乘應皆隂匪人之象凡居者之鄰學者之友仕者之同僚皆所當戒也象曰比之匪人不亦傷乎傳人之相比求安吉也乃比於匪人必將一無必將字反得悔吝一作咎其亦可傷矣深戒失所比也進齊徐氏曰三居不正之位而應上比之匪人也上比無首而凶己乃應之亦可傷矣馬援勸隗囂専意東方而隗囂降蜀至於殺身亡宗為天下笑者非大可傷乎雲峰胡氏曰爻不言其大凶而夫子於象惻然痛憫之曰不亦傷乎即孟子哀哉之意令人惕然有深省處六四外比之貞吉𫝊四與初不相應而五比之外比於五乃得貞正而吉也君臣相比正也相比相與宜也五剛陽中正賢也居尊位在上也親賢從上比之正也故為貞吉以六居四亦為得正之義又隂柔不中之人能比於剛明中正之賢乃得正而吉也又比賢從上必以正道則吉也數說相須其義始備本義以柔居柔外比九五為得其正吉之道也占者如是則正而吉矣王氏湘卿曰五為比主六二自內卦比之六四自外卦比之二四隂皆得正故皆貞吉趙氏曰外有可比則為貞吉不必應而後為正也雲峰胡氏曰初六內也九五外也四宜應內者內無可比而比乎五義之與比而無適莫者是舍柔暗而比剛明得正而吉之道也象曰外比於賢以從上也𫝊外比謂從五也五剛明中正之賢又居君位四比之是比賢且從上所以吉也中溪張氏曰以位言之五在四之外也五有剛中之德賢而在上四外比而佐之即彖所謂比輔也君剛臣柔以下從上故曰貞吉九五顯比王用三驅失前禽邑人不誡吉驅匡愚反𫝊五居君位處中得正盡比道之善者也人君比天下之道當顯明其比道而已如誠意以待物恕己以及人發政施仁使天下蒙其惠澤是人君親比天下之道也如是天下孰不親比於上若乃暴其小仁違道干譽欲以求下之比其道亦狹矣其能得天下之比乎故聖人以九五盡比道之正取三驅為喻曰王用三驅失前禽邑人不誡吉先王以四時之畋不可廢也故推其仁心為三驅之禮乃禮所謂天子不合圍也成湯祝網是其義也天子之畋圍合其三面前開一路使之可去不忍盡物好生之仁也只取其不用命者不出而反入者也禽獸前去者皆免矣故曰失前禽也王者顯用其比道天下自然來比來者撫之固不煦煦一作詬詬然求比於物若田之三驅禽之去者從而不追來者則取之也此王道之大所以其民皞皞而莫知為之者也邑人不誡吉言其至公不私無逺邇親疏之别也邑者居邑易中所言邑皆同王者所都諸侯國中也誡期約也待物之一不期誡於居邑如是則吉也聖人以大公無私治天下於顯比見之矣非唯人君比天下之道如此大率人之相比莫不然以臣於君言之竭其忠誠致其才力乃顯其比一作比其君之道也用之與否在君而已不可阿諛逢迎求其比己也在朋友亦然修身誠意以待之親己與否在人而已不可巧言令色曲求茍合以求人之比己也於鄉黨親戚於衆人莫不皆然三驅失前禽之義也或問伊川解顯比王用三驅失前禽所謂來者撫之去者不追與失前禽而殺不去者所譬頗不相類如何朱子曰田獵之禮置旃以為門刈草以為長圍田獵者自門驅而入禽獸向我而出者皆免惟被驅而入者皆獲故以前禽比去者不追獲者譬來則取之大意如此無緣得一一相似伊川解此句不須疑但邑人不誡吉一句似可疑恐易之文義不如此耳進齊徐氏曰五以剛健之德而居正中之位能顯明比道於天下比以顯言則天下皆依光之臣近光之民矣其吉可知王者田獵合三面之網而開其一面以驅逐禽獸至再至三使之可去其順而來者則取之以喻下四隂之順乎五也其逆而去者則舍之以喻上一隂之背乎五也前禽指上六也一卦五隂而四隂從陽上獨背之是失前禽也然聖人雖無心於留天下而天下自不能釋然於聖人有不待告誡而自然順從之者矣故曰邑人不誡吉本義一陽居尊剛健中正卦之羣隂皆來比已顯其比而無私如天子不合圍開一面之網來者不拒去者不追故為用三驅失前禽而邑人不誡之象蓋雖私屬亦喻上意不相警備以求必得也凡此皆吉之道占者如是則吉也朱子曰邑人不誡蓋上之人顯明其比道而不必人之從己而其私屬亦化之不相戒約而自然從己也歸邑人不誡如有聞無聲言其自不消相告誡又如市者不止耕者不變相似林氏栗曰陽為明故稱顯比沙隨程氏曰比卦師之反也故九五喻王者之田雲峰胡氏曰諸隂爻皆言比之隂比陽也五言顯比陽為隂之所比也比易近於私王者之比大公至正顯然於天下而無私三驅失前禽此成湯祝綱之心也師比之五俱取禽象師之田有禽害物之禽也比之前禽背己之禽也在師則執之王者之義也在比能失之王者之仁也然使邑人不喻上意或有惟恐失之之心則禽無遺類其仁不廣矣未可以吉言也象曰顯比之吉位正中也𫝊顯比所以吉者以其所居之位得正中也處正中之地乃由正中之道也比以不偏為善故云正中凡言正中者其處正得中也比與隨是也言中正者得中與正也訟與需是也舍逆取順失前禽也舍音捨𫝊禮取不用命者乃是舍順取逆也順命而去者皆免矣比以向背而言謂去者為逆來者為順也故所失者前去之禽也言來者撫之去者不追也建安丘氏曰舍逆謂舍上一隂而隂以乘陽為逆也取順謂取下四隂而隂以承陽為順也失上一隂故曰失前禽邑人不誡上使中也𫝊不期誡於親近上之使下中平不偏逺近如一也本義由上之德使不偏也雲峰胡氏曰使字與師六五同師之使不當誰使之五也比之使中誰使之亦五也上六比之無首凶𫝊六居上比之終也首謂始也凡比之道其始善則其終善矣有其始而無其終者或有矣未有無其始而有終者也故比之無首至終則凶也此據比終而言然上六隂柔不中處險之極固非克終者也始比不以道隙於終者天下多矣本義隂柔居上無以比下凶之道也故為無首之象而其占則凶也厚齊馮氏曰以六位自下言之初始而上終初本而上末以全體自上觀之上首而初足上角而初尾乾姤艮賁既未濟之象可見上六無首不能率衆以比於君之象言無能為首也與乾用九辭同而旨異沙隨程氏曰卦言其才則夫當順從而不可後爻言其變則首當統下而不可無其凶一也雲峰胡氏曰王弼云乾剛惡首比吉惡後上六居五之後比之不先即卦辭所謂後夫凶者也諸家皆依之惟本義則與後夫之取義不同蓋乾以六爻陽剛盡變而為坤之隂柔故曰無首比以隂柔居上亦曰無首者乾之無首剛而能柔不為首也故吉比之無首隂柔不足為首也故凶然卦辭惡其後爻辭惡其無首蓋其才既不足以髙人又不能自卑以從人其凶同耳兩義亦自相貫象曰比之無首無所終也𫝊比既無首何所終乎相比有首猶或終違始不以道終復何保故曰無所終也本義以上下之象言之則為無首以終始之象言之則為無終無首則無終矣雲峰胡氏曰隂柔在上其德不足以為首無以比下其效不能以有終建安丘氏曰比卦六爻一陽五隂九五居得尊位為顯比之主五隂爻皆求比者也比貴急不貴緩彖曰後夫凶是也初六比之始先於比者故有他吉上六比之終後於比者故無首凶二以應五而內比四以承五而外比以柔比剛得比之正者故皆曰貞吉三於五非近非應不知比五反應上六無位之爻此所以有匪人之傷也歟乾下巽上𫝊小畜序卦比必有所畜故受之以小畜物相比附則為聚聚畜也又相親比則志相畜小畜所以次比也畜止也止則聚矣為卦巽上乾下乾在上之物乃居巽下夫畜止剛健莫如巽順為巽所畜故為畜也然巽隂也其體柔順唯能以巽順柔其剛健非能力止之也畜道之小者也又四以一隂得位為五陽所說得位得柔巽之道也能畜羣陽之志是以為畜也小畜謂以小畜大所畜聚者小所畜之事小以隂故也彖専以六四畜諸陽為成卦之義不言二體蓋舉其重者或以小畜為臣畜君以大畜為君畜臣程子曰不必如此大畜只是所畜者大小畜只是所畜者小不必指定一件事便是君畜臣臣畜君皆是這道理隨大小用或問有說此卦作巽體順是小人以柔順畜君子以虛體卑辭相拘係其畜止人術甚小而無大謀大作故曰小畜不知如何朱子曰易不可専就人上說且就隂陽上看分明巽畜乾隂畜陽故謂之小若配之人事則為小人畜君子也得為臣畜君也得為因小小事畜止也得不可泥定事說南軒張氏曰以大畜小以隂畜陽天地之大經古今之通義也然事有出於一時不獨天下國家凡百君子之欲行事小人得以擾係之大事之將就小物得以邀阻之皆小畜也白雲郭氏曰有止而畜之者畜之大也有入而畜之者畜之小也小畜亨密雲不雨自我西郊畜勑六反大畜卦同𫝊雲隂陽之氣二氣交而和則相畜固而成雨陽倡而隂和順也故和若隂先陽倡不順也故不和不和則不能成雨雲之畜聚雖密而不一有能字成雨者自西郊故也東北陽方西南隂方自隂倡故不和而不能成雨以人觀之雲氣之興皆自四逺故云郊據西而言故云自我畜陽者四畜之主也或問密雲不雨自我西郊程子曰西郊隂所凡雨須陽倡乃成隂倡則不成矣今雲過西則雨過東則否是其義也所謂尚往者隂自西而往不待陽矣建安丘氏曰乾本在上之物今在巽下則為柔所畜故曰小畜巽為隂乾為陽惟巽順為能畜乾健之性但六四以一隂而畜止五陽能係其志而不能固其志此又畜道之小者也夫物畜則止止極則行故小畜亦有亨義密雲隂氣也自二至四互兌屬西方故曰西郊四以柔居柔故有此象自我指四也凡雲自東而西則雨自西而東則不雨隂先倡也小畜以柔為主不能固陽而止之故雲雖密而不雨本義㢲亦三畫卦之名一隂伏於二陽之下故其德為㢲為入其象為風為木小隂也畜止之之義也上㢲下乾以隂畜陽又卦唯六四一隂上下五陽皆為所畜故為小畜又以隂畜陽能係而不能固亦為所畜者小之象內健外㢲二五皆陽各居一卦之中而用事有剛而能中其志得行之象故其占當得亨通然畜未極而施未行故有密雲不雨自我西郊之象蓋密雲隂物西郊隂方我者文王自我也文王演易於羑里視岐周為西方正小畜之時也筮者得之則占亦如其象云朱子曰小畜是以㢲之柔順而畜三陽畜他不住大畜則以艮畜乾畜得有力所以喚作大畜小畜亨是說陽緣隂畜他不住故陽得自亨橫渠言易為君子謀不為小人謀凡言亨皆是說陽到得說隂處便分曉說道小人吉亨字便是下面剛中而志行乃亨問密雲不雨自我西郊曰此是以㢲畜乾㢲順乾健畜他不得故不能雨沙隨程氏曰不雨者未能施澤也人臣道盛而未得君之象胡氏旦曰文王當紂之時左右憸人終不能以止其進以此知文王志在明夷而道在小畜雲峰胡氏曰自乾坤而下屯蒙需訟師比皆三男陽卦用事至此方見㢲之一隂用事而以小畜名焉尊陽也隂之畜陽唯能以㢲入柔其剛健非能力制之故陽之亨自若也小過六五爻辭與小畜彖辭同文王之意謂一隂畜乎五陽隂有所不及不能成雨也周公之意謂四隂過乎二陽陽有所不及亦不能成雨也隂不及不許小者之畜陽不及不許小者之過何也易固為尊陽作也本義以為文王之事何也下畜上小畜大正為文王與紂之事但能用柔㢲之道以止畜其惡然終不能大有所為文王觀象而適有㑹於心故以其所遭者而言之彖曰小畜柔得位而上下應之曰小畜𫝊言成卦之義也以隂居四又處上位柔得位也上下五陽皆應之為所畜也以一隂而畜五陽能係而不能固是以為小畜也彖解成卦之義而加曰字者皆重卦名文勢當然單名卦惟革有曰字亦文勢然也本義以卦體釋卦名義柔得位指六居四上下謂五陽進齊徐氏曰柔得位者以六居四也上下應者五陽應之也凡卦一隂五陽則一隂為之主小畜以四為主而又得位故上下五陽皆為所畜也然四得位而不能大有所畜者以柔故爾此卦之所以為小畜也健而㢲剛中而志行乃亨𫝊以卦才言也內健而外㢲健而能㢲也二五居中剛中也陽性上進下復乾體志在於行也剛居中為剛而得中又為中剛言畜陽則以柔㢲言能亨則由剛中以成卦之義言則為隂畜陽以卦才言則陽為剛中才如是故畜雖小而能亨也本義以卦德卦體而言陽猶可亨也進齊徐氏曰健而㢲以二德言剛中以二五言志行謂陽之志可以行也亦釋亨義厚齊馮氏曰凡卦一隂五陽則一隂為之主此孔子論易之例非必包犧文王命卦之本意也又曰健而巽剛中而志行彖多言卦材此亦孔子之例也上九之雨豈非亨乎天下之理未有畜而不亨者說者止述孔子之意而文王之志隱矣雙湖胡氏曰朱子嘗說四聖之易不同因論大畜卦辭而曰文王說只是占得者為利貞不家食而吉利涉大川至於剛上尚賢等處乃孔子發明卦義各有所主今厚齊可謂得朱子之心者若能如此灼見解經則非但文王之指不晦而夫子翼易又自發胸中所藴不盡同於先聖之意亦昭然可見矣惜朱子欲以此例更定本義而未能也密雲不雨尚往也自我西郊施未行也施始䜴反𫝊畜道不能成大如密雲而不成雨隂陽交而和則相固而成雨二氣不和陽尚往而上故不成雨蓋自我隂方之氣先倡故不和而不能成雨其功施未行也小畜之不能成大猶西郊之雲不能成雨也本義尚往言畜之未極其氣猶上進也朱子曰凡雨者皆是隂氣盛凝結得密方溼潤下降為雨且如飯甑蓋得密了氣鬱不通四畔方有溼汗今乾上進一隂止他不得所以云尚往也是指乾欲上進之象是隂包住他不得陽氣更散做雨不成所以尚往也進齊徐氏曰尚往陽也言陽升而隂不能固止之也施未行隂也言隂未能畜陽降而成雨也言未行則非終不行矣中溪張氏曰彖既言志行而又言施未行何哉蓋志行者指二五兩陽而言謂陽以得行為亨也施未行者主六四一隂而言謂其未能畜陽而成雨也雲峰胡氏曰曰剛中而志行曰施未行兩行字相應陽被畜而志猶可行隂雖得位而施未可行本義兩猶字専為陽言亦扶陽抑隂之意也象曰風行天上小畜君子以懿文德𫝊乾之剛健而為㢲所畜夫剛健之性惟柔順為能畜止之雖可以畜止之然非能固制其剛健也但柔順以擾係之耳故為小畜也君子觀小畜之義以懿美其文德畜聚為藴畜之義君子所藴畜者大則道德經綸之業小則文章才藝君子觀小畜之象以懿美其文德文德方之道義為小也本義風有氣而無質能畜而不能久故為小畜之象懿文德言未能厚積而逺施也或問風行天上小畜象義如何朱子曰天在山中大畜蓋山是堅剛之物故能力畜其三陽風是柔軟之物止能小畜之而已君子以懿文德言畜他不住且只逐些子發泄出來只以大畜比之便見得大畜說多識前言往行以畜其德小畜只是做得這些箇文德如威儀文辭之類潜室陳氏曰風行天上而有取於畜之理何也蓋風者披揚解散之意今為風矣而止行於天之上是猶有物止畜而未得解散所以成畜之小也雲峰胡氏曰小畜風行天上有氣無質懿文德者以之大畜天在山中氣凝於質多識前言往行者以之初九復自道何其咎吉𫝊初九陽爻而乾體陽在上之物又剛健之才足以上進而復與在上同志其進復於上乃其道也故云復自道復既自道何過咎之有無咎而又有吉也諸爻言無咎者如是則無咎矣故云無咎者善補過也雖使爻義本善亦不害於不如是則有咎之義初九乃由其道而行無有過咎故云何其咎無咎之甚明也本義下卦乾體本皆在上之物志欲上進而為隂所畜然初九體乾居下得正前逺於隂雖與四為正應而能自守以正不為所畜故有進復自道之象占者如是則無咎而吉也或問此爻與四相應正為四所畜者乃云復自道何耶朱子曰易有不必泥爻義看者如此爻只平看自好復自道便吉復不自道便凶自無可疑者矣復自道之復與復卦之復不同復卦言已前不見了這陽如今復在此復自道是復他本位從那道路上去如無往不復之復厚齊馮氏曰陽本在上之物故自下升上曰復此言由其所復之故道也雲峰胡氏曰復字雖與復卦之復不同然復卦惟初與二言復言吉小畜惟初與二言復言吉復自道似不逺復二之牽復似休復休復以其下於初牽復以其連於初也彼則於六隂已極之時喜陽之復生於下此則於一隂得位之時喜陽之復升於上者也象曰復自道其義吉也𫝊陽剛之才由其道而復其義吉也初與四為正應在畜時乃相畜者也雲峰胡氏曰卦言畜取止之義爻言復取進之義爻與卦不可一例觀也蓋在下而畜於隂勢也其不為所畜而復於上者理也况初以陽居陽雖與四隂為正應而能自守以正其進復於上乃當然之理何咎之有其義當吉也九二牽復吉𫝊二以陽居下體之中五以陽居上體之中皆以陽剛居中為隂所畜俱欲上復五雖在四上而為其所畜則同是同志者也夫同患相憂二五同志故相牽連而復二陽並進則隂不能勝得遂其復矣故吉也曰遂其復則離畜矣乎曰凡爻之辭皆謂如是則可以如是若已然則時已變矣尚何教誡乎五為㢲體㢲畜於乾而反與二相牽何也曰舉二體而言則㢲畜乎乾全卦而言則一隂畜五陽也在易隨時取義皆如此也雙湖胡氏曰九二以陽剛應五五雖剛陽居上而體本隂柔非制畜之極不能逆已之進故得牽連而復所以得吉者居中之故也東萊吕氏曰初九復自道何其咎吉九二牽復吉九陽也陽非久為隂所畜者也故其志皆欲進復於上焉然則安於豢養而不復進者非可恥邪本義三陽志同而九二漸近於隂以其剛中故能與初九牽連而復亦吉道也占者如是則吉矣建安丘氏曰九二以陽剛而在下體之中亦欲上進非六四所能畜故與初九陽類牽連而進復其本位不失其中道所以吉也雲峰胡氏曰初九前逺於隂以剛正能復九二漸近於隂以剛中而能牽復亦吉道也按程𫝊以為二與五相牽攣本義之說則以為二與五無應二之牽復自係於初五之攣如自係於四象曰牽復在中亦不自失也𫝊二居中得正者也剛柔進退不失乎中道也陽之復其勢必強二以處中故雖強於進亦不至於過剛過剛乃自失也爻止言牽復而吉之義象復發明其在中之美本義亦者承上爻義張子曰初反自道三為說輻二以彚征在中故未為失中溪張氏曰復待於牽已不如初復之為易然牽而能復亦不為失也九三輿說輻夫妻反目說吐活反𫝊三以陽爻居不得中而密比於四隂陽之情相求也又昵比而不中為隂畜制者也故不能前進猶車輿說去輪輻言不能行也夫妻反目隂制於陽者也今反制陽如夫妻之反目也反目為怒目相視不順其夫而反制之也婦人為夫寵惑既而遂反制其夫未有夫不失道而妻能制之者也故說輻反目三自為也本義九三亦欲上進然剛而不中迫近於隂而又非正應但以隂陽相說而為所係畜不能自進故有輿說輻之象然以志剛故又不能平而與之爭故又為夫妻反目之象戒占者如是則不得進而有所爭也朱子曰小畜但能畜得九三一爻而已九三是迫近他底那下兩爻自牽連上來龜山楊氏曰輿說輻不能有行也重剛不中切比於四為隂所畜則道不行於妻子矣漢上朱氏曰初二皆復三畜於四而不復者比而說之也陽無失道隂豈能畜之哉平菴項氏曰輻陸氏釋文云本亦作輹按輻車轑也輹車軸轉也輻以利輪之轉輹以利軸之轉然輻無說理必輪破轂裂而後可說若輹則有說時車不行則說之矣大畜大壯皆作輹字又曰九三反目稱妻言相敵也上九既雨稱婦言相順也雲峰胡氏曰大畜九三曰日間輿衛則利有攸往小畜則曰輿說輻何也大畜以艮畜乾小畜以㢲畜乾大畜九三與艮一陽同德故其輿利往小畜九三近㢲之一隂而為其所制故其輿不可行輿說輻陽畜於隂而不得進也夫妻反目陽不平其畜而與之爭也象曰夫妻反目不能正室也𫝊夫妻反目蓋由不能正其室家也三自處不以道故四得制之不使進猶夫不能正其室家故致反目也本義程子曰說輻反目三自為也建安丘氏曰三雖陽剛乃昵於六四不正之隂為其係畜而不能進至於反目皆三有以自取之也夫制於妻則其正家之道蓋可知矣孔子曰大車無輗小車無軏其何以行之哉此之謂也雲峰胡氏曰非四之能制三三剛而不中自制於四耳六四有孚血去惕出無咎去上聲𫝊四於畜時處近君之位畜君者也若內有孚誠則五志信之從其畜也卦獨一隂畜衆陽者也諸陽之志係于四四茍欲以力畜之則一柔敵衆剛必見傷害惟盡其孚誠以應之則可以感之矣故其傷害逺其危懼免也如此則可以無咎不然則不免乎害矣此以柔畜剛之道也以人君之威嚴而微細之臣有能畜止其欲者蓋有孚信以感之也本義以一隂畜衆陽本有傷害憂懼以其柔順得正虛中㢲體二陽助之是有孚而血去惕出之象也無咎宜矣故戒占者亦有其德則無咎也隆山李氏曰需三陽竝進九三雖曰致寇而六四則曰需于血出自穴小畜三陽並進九三雖曰說輻而六四亦曰血去惕出隂陽相迫不能無傷聖人必使隂避陽著以為訓雖六四為一卦之主不少假借也易之書其専戒隂柔之用事者耶雲峰胡氏曰三陽健進四強畜之三雖說輻四亦不能無傷故曰血曰惕危之也必有孚而後血可去惕可出乃可無咎戒之也或曰九五陽實曰有孚六四隂虛亦曰有孚何也曰中孚二隂居一卦之中中虛為信之本二五皆陽居上下卦之中中實為信之質小畜四與五皆曰有孚亦此意也象曰有孚惕出上合志也𫝊四既有孚則五信任之與之合志所以得惕出而無咎也惕出則血去可知舉其輕者也五既合志衆陽皆從之矣雙湖胡氏曰三陽上進而六四獨當其鋒將拒而止之必為所傷然以由中之信依附上之二陽與之合志而共畜之則可以血去惕出而無咎矣九五有孚攣如富以其鄰攣力専反𫝊小畜衆陽為隂所畜之時也五以中正居尊位而有孚信則其類皆應之矣故曰攣如謂牽連相從也五必援挽與之相濟是富以其鄰也五以居尊位之勢如富者推其才力與鄰比共之也君子為小人所困正人為羣邪所厄則在下者必攀挽於上期於同進在上者必援引於下與之戮力非獨推已力以及人也固資在下之助以成其力耳本義㢲體三爻同力畜乾鄰之象也而九五居中處尊勢能有為以兼乎上下故為有孚攣固用富厚之力而以其鄰之象以猶春秋以某師之以言能左右之也占者有孚則能如是也朱子曰富以其鄰與上合志是說上面㢲體同力畜乾鄰如東家取箇西家取箇取上下兩畫也此言五居尊位便動得那上下底攣如手把攣住之象問小畜以一隂而畜五陽而九五乃云富以其鄰是與六四之隂竝力而畜下三陽不知九五何故反助隂邪曰九五上九皆為隂所畜又是同㢲之體故反助之也徂徠石氏曰上三爻巽體皆務畜者也六四為畜之主然隂則虛乏九五陽為富能推其富以助六四共止畜之是富以其鄰也朝氏淵曰以統體言之固是以一隂畜五陽然就九五而言則下與四比上與上連為鄰之象謂巽三爻同力畜乾却見得自上畜下之意分明也雲峰胡氏曰攣字與牽字皆有相連之義初與二皆乾體故二連初皆欲上進有牽之象四與五皆巽體故五連四上相與畜下之三陽有攣之象然二與初之占皆吉五與四上皆無占吉之辭聖人言外之意可見也中孚九五亦言有孚交如蓋言交如者異體之交也攣如者同體之合也象曰有孚攣如不獨富也𫝊有孚一有而字攣如蓋其鄰類皆牽攣而一無而字從之與衆同欲不獨有其富也君子之處難厄惟其至誠故得衆力之助而能濟其衆也臨川吳氏曰五之能攣四也不獨有富而與四共之也上九既雨既處尚德載婦貞厲𫝊九以巽順之極居卦之上處畜之終從畜而止者也為四所止也既雨和也既處止也隂之畜陽不和則不能止既和而止畜之道成矣一作畜道之成也大畜畜之大故極而散小畜畜之小故極而成尚德載四用柔㢲之德積滿而至於成也隂柔之畜剛非一朝一夕能成由積纍而至可不戒乎載積滿也詩云厥聲載路婦貞厲婦謂隂以隂而畜陽以柔而制剛婦若貞固守此危厲之道也安有婦制其夫臣制其君而能安者乎建安丘氏曰卦辭言不雨未成畜也上九言既雨畜道成矣此卦爻互辭以見意也如履卦不嘻人亨爻言嘻人凶亦與此類同雙湖胡氏曰嘗觀卦爻辭多不同今小畜諸爻各自取義無復密雲西郊意亦可見爻辭周公作故不同也月幾望君子征凶幾音機𫝊月望則與日敵矣幾望言其盛將敵也隂已能畜陽而云幾望何也此以柔㢲畜其志也非力能制也然不已則將盛於陽而凶矣於幾望而為之戒曰婦將敵矣君子動則凶也君子謂陽征動也幾望將盈之時若已望則陽已消矣尚何戒乎本義畜極而成隂陽和矣故為既雨既處之象蓋尊尚隂德至於積滿而然也隂加於陽故雖正亦厲然隂既盛而抗陽則君子亦不可以有行矣其占如此為戒深矣朱子曰既雨既處言便做畜得住了做得雨後這氣畢竟便透出散了德積是說隂德婦人雖正亦危月才滿便虧君子到此亦行不得這是那隂陽皆不利底象又曰上九雖是隂畜陽至極處和而為雨畢竟隂制陽是不順所以雖正亦厲厚齊馮氏曰乾陽至上而窮窮則不可復進而受畜矣故不雨者今既雨牽復者今既處㢲之隂於是乎尚德之載然使為婦者以是為貞則厲也戒巽也巽於是乎為幾望之月使為君子者猶有所征則凶也戒乾也夫隂雖盛豈得加陽陽不失道豈制於隂此易所以兩致其戒不使至於極也雲峰胡氏曰四之畜道成於終故於終爻示戒密雲不雨為隂言也今既雨矣剛中志行為陽言也今既處而不行矣尚德載婦貞厲又為隂言月幾望君子貞凶又為陽言蓋隂畜陽至此已成隂雖正亦厲陽有動必凶隂陽兩不利之象坤六隂欲敵陽極而隂陽兩傷小畜一隂欲畜陽極而隂陽兩不利為戒深矣象曰既雨既處德積載也君子征凶有所疑也傳既雨既處言畜道積滿而成也隂將一作既盛一有則字極君子動則有凶也隂敵陽則必消陽小人抗君子則必害君子安得不疑慮乎若前知疑慮而警懼求所以制之則不至於凶矣節齊蔡氏曰疑均敵也柔畜既盛必敵剛也臨川吳氏曰此與訟卦九二象𫝊例同全舉爻辭下文有所疑也四字乃并釋其義建安丘氏曰小畜以㢲畜乾巽隂卦隂小也故為小畜在六爻上三爻㢲為畜者也下三爻乾受畜者也初與四應未受四之畜故初復自道而四有孚血去也二與五應漸為五所畜故二牽復而五有孚攣如也此四爻皆未成畜者至三與上以同德相應始為上所畜而不能進焉故三言輿說輻上言既雨既處也畜而至此畜道成矣周易𫝊義大全卷四
