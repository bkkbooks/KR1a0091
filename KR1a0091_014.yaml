body:
  text: 周易傳義大全卷八明胡廣等撰兌下坤上傳臨序卦有事而後可大故受之以臨臨者大也蠱者事也有事則可大矣故受之以臨也韓康伯云可大之業由事而生二陽方長而盛大故為臨也為卦澤上有地澤上之地岸也與水相際臨近乎水故為臨天下之物密近一作邇相臨者莫若地與水故地上有水則為比澤上有地則為臨也臨者臨民臨事凡所臨皆是在卦取自上臨下臨民為義臨元亨利貞傳以卦才言也臨之道如卦之才則大亨而正也至于八月有凶傳二陽方長於下陽道嚮盛之時聖人豫為之戒曰陽雖方盛至于八月則其道消矣是有凶也大率聖人為戒必於方盛之時方盛而慮衰則可以防其滿極而圖其永乆若旣衰而後戒亦无及矣自古天下安治未有乆而不亂者葢不能戒於盛也方其盛而不知戒故狃安富則驕侈生樂舒肆則綱紀壞忘禍亂則釁孽萌是以浸淫不知亂之至也程子曰臨言八月有凶謂至八月是遯也當其剛浸長之時便戒以陰長之意節齋蔡氏曰臨與遯反自臨之初爻至遯之二爻在卦經八爻於月經八月剛柔皆變臨盡消矣故曰至于八月有凶本義臨進而淩逼於物也二陽浸長以逼於陰故為臨十二月之卦也又其為卦下兌說上坤順九二以剛居中上應六五故占者大亨而利於正然至于八月當有凶也八月謂自復卦一陽之月至于遯卦二陰之月陰長陽遯之時也或曰八月謂夏正八月於卦為觀亦臨之反對也又因占而戒之或問臨不特上臨下之謂臨凡進而逼近者皆謂之臨否朱子曰然此是二陽自下而進上則凡相逼近者皆為臨也問至于八月有兩説前説自復一陽之月至遯二陰之月陰長陽遯之時後説自泰至觀觀二陽在上四陰在下與臨相反亦陰長陽消之時二説孰長曰前説是周正八月後説是夏正八月恐文王作卦辭時只用周正紀之不可知也雙湖胡氏曰自乾以下元亨利貞占辭凡七卦乾坤屯隨臨无妄革此臨卦元亨利貞二陽浸長之占也然一陽復惟曰亨三陽泰惟曰吉亨四陽壯惟曰利貞五陽夬元亨利貞皆不言何獨臨與乾似也豈非元則一陽初動自二陽以徃皆陽德亨通皆利在貞正乎七卦除坤外皆一陽居下可見矣後儒不作占辭惟以四德論以為乾坤後數卦與諸卦優劣不同故得具四德誤矣若作占辭方知文王偶於數卦及之他卦未嘗不可用此占也臨川呉氏曰自天王建子之月一陽始生為復其二建丑之月二陽長而為臨其七建午之月一陰始生為姤至其八建未之月則二陰長而為遯遯者臨之正對臨卦六畫變盡也今日二陽之臨陽長而消陰也至于八月二陰之遯則陰長而消陽也故其占為至于八月則有凶也隆山李氏曰陽生於子終於已陰生於午終於亥故一陽復十一月至已為乾則陽極陰生一陰姤五月二陰遯六月三陰否七月四陰觀八月方建丑月卦為臨二陽浸長逼四陰當此之時陽勢方盛至于八月建酉卦為觀四陰浸長逼二陽則臨二陽至觀危矣故曰至于八月有凶所謂至于八月有凶者言之于臨則當自臨數而不當自復數以觀次臨則當數至觀而不當數至遯臨觀乃陰陽反對消長之常理文王於臨以八月有凶為戒其義甚著豈可外引遯卦謂周八月哉雲峰胡氏曰本義解臨字諸家所未發葢訓近訓大即見上臨下不見下剛臨柔之意本義依如臨深淵之臨謂進而逼於淵此所謂臨者剛進而逼於柔也葢謂之復者七日來復陰之極而陽初來也謂之臨者朋來无咎二陽皆來而逼於陰也故復亨而臨則大亨復不言利貞者復是初陽之萌无有不善臨則二陽浸盛易至放肆故戒之也或曰方臨之時即懼其為遯何也曰遯者去也剛浸而長君子之朋來固可喜陰浸而長君子之易去尤可憂長有消之幾來有去之幾不可不戒也陽長至二未過乎中即為之戒戒貴乎早也若論反對則觀為八月聖人於觀不言陰之盛而於臨言之易為君子謀也又曰八月有三説觀八月一説也歴臨六位至遯初二二陽凡八位八於數為陰於象為月歴剝六爻至復初一陽凡七位七於數為陽於象為日二也復下震震少陽七位於東為日出之方臨下兌兌少陰八位於西為月出之方三也彖曰臨剛浸而長長丁丈反本義以卦體釋卦名進齋徐氏曰浸漸也陰符經曰天地之道浸亦用此義言一義不頓進一形不頓虧二陽長於下而漸進也中溪張氏曰自復一陽生積而至臨則二陽長矣故曰剛浸而長遯者臨之反也臨彖曰剛浸而長易為君子謀也遯彖不曰柔浸而長而止曰小利貞浸而長易不為小人謀也説而順剛中而應説音悦本義又以卦德卦體言卦之善中溪張氏曰説而順以二德言内兌為説説則二陽之進也為不逼外坤為順順則四陰之從也為不逆二以剛中而應乎五故能大亨而得正大亨以正天之道也傳浸漸也二陽長於下而漸進也下兌上坤和説而順也剛得中道而有應助是以能大亨而得正合天之道剛正而和順天之道也化育之功所以不息者剛正和順而已以此臨人臨事臨天下莫不大亨而得正也兌為説説乃和也夬彖云決而和本義當剛長之時又有此善故其占如此也朱子曰剛浸而長以下三句解臨字大亨以正便是天之道也解亨字亦是惟其如此所以如此又曰易中言天之道也天之命也義只一般但取其成韵耳不必强分析中溪張氏曰剛貴乎長已有成乾之勢天之道也雲峰胡氏曰臨无妄皆曰元亨利貞臨曰剛中而應大亨以正天之道也无妄曰剛中而應大亨以正天之命也本義於臨曰以卦德卦體言卦之善當剛長之時有此善故其占如此无妄亦曰言卦之善如此故其占當獲大亨而利於正乃天命之當然也他卦但曰釋卦名義釋卦辭此二卦又有所謂言卦之善者何哉葢二卦皆以剛為主剛不如此非剛之善也兼之天道賦予无有不善善字又從天道天命而言也至于八月有凶消不乆也傳臨二陽生陽方漸盛之時故聖人為之戒云陽雖方長然至于八月則消而凶矣八月謂陽生之八月陽始生于復自復至遯凡八月自建子至建未也二陰長而陽消矣故云消不久也在陰陽之氣言之則消長如循環不可易也以人事言之則陽為君子陰為小人方君子道長之時聖人為之誡使知極則有凶之理而虞備之常不至于滿極則无凶也本義言雖天運之當然然君子宜知所戒中溪張氏曰自臨之丑至遯之未凡八月歴時尚乆而曰消不乆者於其方長之時而告之以將消之理則庻乎知所戒也廬陵龍氏曰臨反對為觀乃八月卦一轉則為剝為坤故曰消不乆也雲峰胡氏曰觀卦不取四陰為義於臨曰八月有凶則觀為八月卦已見於此矣進齋徐氏曰陰陽消長若循環然彖易聖人深言消長之機其來甚速吉凶靡定禍福无常思患豫防君子所當戒懼也象曰澤上有地臨君子以教思无窮容保民无疆思去聲傳澤之上有地澤岸也水之際也物之相臨與含容无若水之在地故澤上有地為臨也君子觀親臨之象則教思无窮親臨於民則有一无有字教導之意思也无窮至誠无斁也觀含容之象則有容保民之心无疆廣大无疆限也含容有廣大之意故為无窮无疆之義本義地臨於澤上臨下也二者皆臨下之事教之无窮者兌也容之无疆者坤也節齋蔡氏曰教思无窮澤潤地之象也容保民无疆地容澤之象也雲峰胡氏曰不徒曰教而曰教思其意思如兌澤之深不徒曰保民而曰容民在度量如坤土之大初九咸臨貞吉傳咸感也陽長之時感動於陰四應於初感之者也比他卦相應尤重四近君之位初得正位與四感應是以正道為當位所信任得行其志獲乎上而得行其正道是以吉也他卦初上爻不言得位失位葢初終之義為重也臨則以初得位居正為重凡言貞吉有旣正且吉者有得正則吉者有貞固守之則吉者各隨其事一作時也或問程易作咸感之義如何朱子曰陰必從陽謂咸為感亦是但覺得牽强些童溪王氏曰咸感也陰陽之氣相感而相應故也初九當君子道長之初所居者正位所行者正道而所與相感而相應者又皆履正之人故曰貞吉隆山李氏曰山澤通氣故山上有澤其卦為咸而澤上有地初二爻亦謂之咸陰陽之氣相感也本義卦唯二陽徧臨四陰故二爻皆有咸臨之象初九剛而得正故其占為貞吉建安丘氏曰咸皆也以二陽而臨四陰陽雖長而陰猶盛非恊力不足以勝故初二皆曰咸臨雲峰胡氏曰復曰朋來初二兩咸字即朋之義兩臨字即來之義故復初元吉臨初亦貞吉雙湖胡氏曰王弼已訓咸為感諸儒因之然而以二陽方長乃區區感四五二陰與之相臨置三上不問不亦狹乎故不若訓徧與皆義見得陽道廣大公溥而且於立卦命爻之義皆得也象曰咸臨貞吉志行正也傳所謂貞吉九之志在於行正也以九居陽又應四之正其志正也建安丘氏曰當臨之始初能固守其正以從二則陽剛浸長羣陰退聽而得吉也以其未當臨陰之任故曰志行正而已九二咸臨吉无不利傳二方陽長而漸盛感一作咸動於六五中順之君其交之親故見信任得行其志所臨吉而无不利也吉者已然如是故吉也无不利者將然於所施為无所不利也厚齋馮氏曰以卦義言之以大臨小初九九二臨四陰也以爻位言之以上臨下六四六五臨初九九二者也惟其正應而陰陽相感故交相為臨而謂之咸言其交相感而交相臨也初與二同為咸臨而初貞二无不利者葢初位卑而不中故取其正二得中而應君故无不利不言貞位不當也君臣正應以相與故陽之上進羣陰順之所以无不利也本義剛得中而勢上進故其占吉而无不利也進齋徐氏曰初九曰咸臨貞吉而九二則曰咸臨吉无不利何也曰初未得中未當臨陰之任故在初惟當固守其志以從二得貞而吉也二得中則勢上進已當臨陰之任矣在二不過率初之陽以同徃則柔不能拒是以吉而无不利也貞吉者戒初之辭吉无不利者勉二之辭也雲峰胡氏曰初剛得正未見其勢之進故曰貞吉二剛得中勢可以上進故不特曰吉又曰无不利至六三則曰无攸利扶陽抑陰之意可見矣象曰咸臨吉无不利未順命也傳未者非遽之辭孟子或問勸齊伐燕有諸曰未也又云仲子所食之粟伯夷之所樹歟抑亦盜跖之所樹歟是未可知也史記侯嬴曰人固未易知古人用字之意皆如此今人大率用對己字故意似異然實不殊也九二與五感應以臨下葢以剛德之長而又得中至誠相感非由順上之命也是以吉而无不利五順體而二説體又陰陽相應故象特明其非由説順也本義未詳節齊蔡氏曰命君命謂五也進齋徐氏曰二剛咸臨有進逼陵躐之勢五柔二剛有君弱臣强之疑以此相臨豈能遽合自二言之其初未順命也然五以柔中用二二以剛中應五豈終不順哉聖人以未順命釋之欲人知以道事君而不茍於從上也六三甘臨无攸利旣憂之无咎傳三居下之上臨人者也陰柔而説體又處不中正以甘説臨人者也在上而一旡而字以甘説臨下失德之甚无所利也兌性旣説又乘二陽之上陽方長而上進故不安而益甘旣知危懼而憂之若能持謙守正至誠以自處則无咎也邪説由已能憂而改之復何咎乎本義陰柔不中正而居下之上為以甘説臨人之象其占固无所利然能憂而改之則无咎也勉人遷善為教深矣朱子曰三近二陽也去臨他如小人在上位却把甘言好語臨在下之君子節齋蔡氏曰爻柔而位不正兌體而迫於剛故以甘説邪佞而臨乎二也然剛長以正又豈甘説邪妄之所利也能順剛長之正理憂懼知變不為甘説之態則咎可无矣平菴項氏曰六三以甘媚臨而无攸利見君子之難悦也旣憂之无咎又見君子之易事也其處己也嚴故不受不正之媚其與人也寛故不治旣憂之人爻辭雖為六三言之然亦可以見二陽之用心矣雲峰胡氏曰彖惟取剛臨柔爻則初二外皆上臨下三兌體在二陽之上為以甘説臨人之象節九五以中正為甘則吉此以不中不正為甘故无攸利憂者說之反能憂而改則无咎矣六三變則為泰九三能改而自新則旣憂之无咎即泰之艱貞无咎也彖以八月有凶警君子爻以旣憂之无咎戒小人易於君子小人之際用意深矣哉象曰甘臨位不當也旣憂之咎不長也傳陰柔之人處不中正而居下之上復乘二陽是處不當位也旣能知懼而憂之則必强勉自改故其過咎不長也臨川呉氏曰以不正故為媚説之態先雖媚説而後能憂則始雖有咎而其咎不長故可无咎也六四至臨无咎傳四居上之下與下體相比是切臨於下臨之至也臨道尚近故以比為至四居正位而下應於剛陽之初處近君之位守正而任賢以親臨於下是以无咎所處當也本義處得其位下應初九相臨之至宜无咎者也或問六四以陰居正柔順臨下又有正應臨之極善故謂之至臨朱子曰至臨无咎未是極好只是與初相臨得切至故謂之至龜山楊氏曰六四初九皆當位誠意以相與至臨也故无咎雲峰胡氏曰六四以陰居陰處得其正下應初九之正相臨之至所以无咎又地附澤澤依地六四坤兌之間地與澤相臨之至也象曰至臨无咎位當也傳居近君之位為得其任以陰處四為得其正與初相應為下賢所以无咎葢由位之當也建安丘氏曰三四皆陰柔三无攸利而四无咎者三乘陽而四應陽三位不當而四位當也六五知臨大君之宜吉知音智傳五以柔中順體居尊位而下應於二剛中之臣是能倚任於二不勞而治以知臨下者也夫以一人之身臨乎天下之廣若區區自任豈能周於萬事故自任其知者適足為不知唯能取天下之善任天下之聰明則无所不周是不自任其知則其知大矣五順應於九二剛中之賢任之以臨下乃己以明知臨天下大君之所宜也其吉可知本義以柔居中下應九二不自用而任人乃知之事而大君之宜吉之道也中溪張氏曰一人出而君天下自任者其智小任人而不自任者其智大况當二剛浸長之世六五在上與九二為正應不忌其進而以柔道接之則剛中而應反為吾用是兼衆智以臨天下大君之宜孰大於此吉可知矣此帝舜能用禹臯陶而臨下以簡謂之大智者歟雲峰胡氏曰六五自是柔闇之士何為以智稱葢謂之臨多是以己臨人五虛中下應九二不任已而任人所以為知所以為大君之宜中庸曰聰明睿智足以有臨又曰舜其大知也歟舜好問而好察邇言其皆出於此歟夫子釋乾四德言仁義禮不言智知光大言於坤周公爻辭獨於臨之坤體曰知臨五常之德知藏於内坤以藏之故也象曰大君之宜行中之謂也傳君臣道合葢以氣類相求五有中德故能倚任剛中之賢得大君之宜成知臨之功葢由行其中德也人君之於賢才非道同德合豈能用也南軒張氏曰六五知臨者豈任察以為明挾暴以為剛乎立大中之道使天下得以共行之而已舜惟能用中于民此所以為大智也上六敦臨吉无咎傳上六坤之極順之至也而君臨之終敦厚於臨也與初二雖非正應然大率陰求於陽又其至順故志在從乎二陽尊而應卑高而從下尊賢取善敦厚之至也故曰敦臨所以吉而无咎陰柔在上非能臨者宜有咎也以其敦厚於順剛是以吉而无咎六居臨之中而不取極義臨无過極故止為厚義上无位之地止以在上言本義居卦之上處臨之終敦厚於臨吉而无咎之道也故其象占如此朱子曰上六敦臨自是積累至極處有敦篤之義艮上九亦謂之敦艮復上六爻不好了所以只於五爻謂之敦復又曰臨便是好卦不獨説道理自是好讀所謂卦有小大辭有險易此便是大底卦臨川呉氏曰敦厚也坤之上畫地之最厚處天高而覆物者以上臨下也地厚而載物者以下承上非臨也上六陰柔居高臨下然以坤厚載物之德臨之以俟二陽之進而非敢以柔臨剛也在上而不以高自居厚之至也故曰敦臨此爻取義乃臨卦之正意雲峰胡氏曰坤與艮皆土也有敦厚之象然皆於終見之復除上六迷復外六五為復之終曰敦復艮上九艮之終曰敦艮此曰敦臨相與而厚於終者也故吉且无咎隆山李氏曰以厚接物未有不安者故易之爻辭敦復无悔敦艮吉敦臨吉象曰敦臨之吉志在内也傳志在内應乎初與二也志順剛陽而敦篤其吉可知也朱子曰居臨之時二陽得時上進陰不敢與之爭而志與之應所謂在内者非謂正應只是卦内與二陽應也雲峰胡氏曰上六非與内之二陽應而其志在二陽斯其為厚之至也進齋徐氏曰二剛浸長進逼於柔此雖成卦之體而雜卦又曰臨觀之義或與或求與者又言上下相與為臨也爻辭初二咸臨此下臨上剛臨柔也三甘臨四至臨五知臨上敦臨此上臨下柔臨剛也上下相臨所謂與也建安丘氏曰臨有凌逼之義以下之二陽而凌乎上之四陰也然二當任而初不當任故二為臨主是以在二曰咸臨吉无不利而初曰咸臨貞吉而已其上四陰則皆受陽之臨者而遠者吉近者凶三其最近者也故甘臨无攸利四五則漸遠矣故四至臨无咎五知臨吉也唯上去陽獨遠而志應乎内故有敦臨吉无咎之辭焉豈非臨之道利遠而不利近者乎坤下巽上傳觀序卦臨者大也物大然後可觀故受之以觀觀所以次臨也凡觀視於物則為觀平聲爲觀於下則爲觀去聲如樓觀謂之觀者為觀於下也人君上觀天道下觀民俗則為觀修德行政為民瞻仰則為觀風行地上徧觸萬類周觀之象也二陽在上四陰在下陽剛居尊為羣下所觀仰觀之義也在諸爻則唯取觀見隨時為義也朱子曰自上示下曰觀自下觀上曰觀故卦名之觀去聲而六爻之觀皆平聲觀盥而不薦有孚顒若觀官喚反下大觀以觀之觀大象觀字竝同傳予聞之胡翼之先生曰君子居上為天下之一无之字表儀必極其莊敬則下觀仰而化也故為天下之觀當如宗廟之祭始盥之時不可如旣薦之後則下民盡其至誠顒然瞻仰之矣盥謂祭祀之始盥手酌鬱鬯於地求神之時也薦謂獻腥獻熟之時也盥者事之始人心方盡其精誠嚴肅之至也至旣薦之後禮數繁縟則人心㪚而精一不若始盥之時矣居上者正其表儀以為下民之觀當一作常莊嚴一作敬如始盥之初勿使誠意少㪚如旣薦之後則天下之人莫不盡其孚誠顒然瞻仰之矣顒仰望也或問伊川以為灌鬯之初誠意猶存至薦羞之後精意懈怠本義以為致其潔清而不輕自用其義不同朱子曰盥只是浣手不是灌鬯伊川承先儒之誤若云薦羞之後誠意懈怠則先王祭祀只是灌鬯之初猶有誠意及薦羞之後皆不成禮矣問若爾則是聖人在上視聼言動皆當為天下法而不敢輕亦猶祭祀之時致其潔清而不敢輕用否曰然本義觀者有以中正示人而為人所仰也九五居上四陰仰之又内順外巽而九五以中正示天下所以為觀盥將祭而潔手也薦奉酒食以祭也顒然尊敬之貌言致其潔清而不輕自用則其孚信在中而顒然可仰戒占者當如是也或曰有孚顒若謂在下之人信而仰之也此卦四陰長而二陽消正為八月之卦而名卦繫辭更取他義亦扶陽抑陰之意或問盥而不薦是取未薦之時誠意渾全而未㪚否朱子曰祭祀无不薦者此是假設來説薦是用事了盥是未用事之初云不薦者言常持得這誠敬如盥之意常在若薦則是用出用出則纔畢便過了无復有初意矣詩云心乎愛矣遐不謂矣中心藏之何日忘之楚詞云思公子兮未敢言正是此意説出這愛了則都无事可把持矣惟其不説但藏在中心所以常見其不忘也問有孚顒若承上文盥而不薦葢致其潔清而不輕自用則孚信在中而顒然可仰一説下之人信而仰之二説孰長曰從後説則合得彖辭下觀而化之義問前説似好曰當以彖辭為定龜山楊氏曰盥而不薦初未嘗致物也威儀度數亦皆未舉而已有孚顒若其所以交神明者葢有在矣又曰古人修身齊家治國平天下本於誠吾意而已詩書所言莫非明此者但人自信不及故无其效聖人知其效必本於此故於觀曰盥而不薦有孚顒若平庵項氏曰盥者祭之初歩方詣東榮盥手於洗凡祭之事百未一為也薦者祭禮之最盛四海九州之美味四時之和氣无不陳也此但以盥而不薦象恭己无為耳非重盥而輕薦也先儒謂盥則誠意方專薦則誠意已㪚仁人孝子之奉祀豈皆至薦而誠㪚乎雲峰胡氏曰諸家謂盥者祭之始盥手酌鬱鬯於地以求神之時也本義但以為將祭而盥手葢酌鬱鬯之酒以降神灌也非盥也諸家謂薦則誠意已㪚不復如盥之時本義之意則謂盥豈有不薦者孝子之薦豈皆有至薦而誠㪚者獨就觀示上𤼵盥而不薦之義以喻二陽在上无為而化葢祭必先盥盥者未用事之時祭則薦而用事聖人至德之化如將祭而盥不待見於用事孚信在中已顒然可仰觀之者見其盥未見其薦亦已信而仰之葢不待觀其行事而化也不薦而孚葢與未占有孚畧同夫觀四陰二陽八月之卦四陽之卦名曰大壯以陽之盛言也四陰豈不可以陰盛言卦名謂之觀取二陽在上為四陰所仰且就觀字上𤼵出示民神化之妙扶陽抑陰之義深矣彖曰大觀在上順而巽中正以觀天下傳五居尊位以剛陽中正之德為下所觀其德甚大故曰大觀在上下坤而上巽是能順而巽也五居中正以巽順中正之德為觀於天下也本義以卦體卦德釋卦名義進齋徐氏曰大觀在上以位言順巽中正以德言有其位无其德不足以觀天下有其德无其位亦不足以觀天下雲峰胡氏曰四陽為大壯四陰不曰小者之壯而曰觀取二陽示四陰也釋彖且曰大觀壯以下之四陽為大觀以上之二陽為大釋卦名義則以為大而在上釋卦辭以為下觀而化上下之分嚴崇陽抑陰之意可見矣觀盥而不薦有孚顒若下觀而化也觀如字下觀天大象觀民之觀六爻觀字竝同傳為觀之道嚴敬如始盥之時則下民至誠瞻仰一作仰觀而從化也不薦謂不使誠意少㪚也本義釋卦辭進齋徐氏曰下觀而化以四陰觀二陽言謂上有精潔誠敬之德顒然可仰則天下有所觀感而化如舜恭己正南面而天下自治文王不大聲以色而萬邦作孚自然之感固如此也雲峰胡氏曰盥而不薦與神武而不殺朱子皆以為是聖人不犯手做底葢盥則必薦不薦是喻聖人致其潔清而不輕自用武則必殺不殺是喻聖人得其理而不假其物故彼謂之神武而此下文别以神道言之觀天之神道而四時不忒聖人以神道設敎而天下服矣傳天道至神故曰神道觀天之運行四時无有差忒則見其神妙聖人見天道之神體神道以設教故天下莫不服也夫天道至神故運行四時化育萬物无有差忒至神之道莫可名言唯聖人黙契體其妙用設為政教故天下之人涵泳其德而不知其功鼓舞其化而莫測其用自然仰觀而戴服故曰以神道設教而天下服矣本義極言觀之道也四時不忒天之所以為觀也神道設教聖人之所以為觀也朱子曰盥本為薦而不薦是欲蓄其誠意以觀示民使民觀感而化之義有孚顒若便是䢷下觀而化却不是説人君身上事聖人以神道設教是聖人不犯手做底卽是盥而不薦之義順而巽中正以觀天下謂以此觀示之也又曰觀天之神道只是自然運行底道理四時自然不忒聖人神道亦是説他有教人自然觀感處臨川呉氏曰此廣觀義上文所言感應之速者觀道之神也因言天道之神神者妙不可測之謂服者從而化也人觀天道之神莫知其然而四時代謝終古如一无少差忒觀道亦然常人以言設教則有聲音以身設教則有形迹聖人之道如天之妙不可測以之設敎非有聲音非有形迹不設而設不教而教天下一觀感之餘其應㨗如影響莫不從而化焉應其所感亦如四時之應乎天而无有差忒也葢所存甚神故所過卽篤恭而天下平如上天之无聲无臭而萬邦皆作孚此其所以為神道與象曰風行地上觀先王以省方觀民設敎省悉井反傳風行地上周及庶物為由歷周覧之象故先王體之為省方之禮以觀民俗而設政敎也天子廵省四方觀視民俗設為政敎如奢則約之以儉儉則示之以禮是也省方觀民也設教為民觀也本義省方以觀民設教以為觀庸齋趙氏曰風行地上徧觸萬物有周觀之象先王體之得風以動之教以化之之象故以省方觀民設教建安丘氏曰坤為土有土此有民省方觀民乃坤之象巽以申命設教乃巽之象三山劉氏曰觀民設教如齊之末業教以農桑衞之淫風教以禮别奢如曹則示之以儉儉如魏則示之以禮之類是也初六童觀小人无咎君子吝傳六以陰柔之質居遠於陽是以一作其觀見者淺近如童稚然故曰童觀陽剛中正在上聖賢之君也近之則見其道德之盛所觀深遠初乃遠之所見不明如童蒙之觀也小人下民也所見昬淺不能識君子之道乃常分也不足謂之過咎若君子而如是則可鄙吝也本義卦以觀示為義據九五為主也爻以觀瞻為義皆觀乎九五也初六陰柔在下不能遠見童觀之象小人之道君子之羞也故其占在小人則无咎君子得之則可羞矣臨川呉氏曰下之所觀觀九五中正之道也初最下去五最遠如未有知識之童子而觀不能有所見也平菴項氏曰初六為下民日用而不知則其常也故无咎君子而不著不察則可羞矣雲峰胡氏曰童之象陽位而陰爻陽則男而陰則稚也故蒙六五亦曰童童觀以近為明初六去二陽最遠故為兒童之觀又曰遯大壯皆四陽二陰之卦曰君子好遯小人否曰君子用壯小人用罔觀亦四陰二陽故拳拳於君子小人之分葢以小人而可如此者君子愼不可如此也其愛君子之意至矣象曰初六童觀小人道也傳所觀不明如童稚乃小人之分故曰小人道也朱子曰初六童觀小人道也小人自是如此故无咎六二闚觀利女貞傳二應於五觀於五也五剛陽中正之道非二陰暗柔弱所能觀見也故但如闚覘之觀耳闚覘之觀雖少見而不能甚一悦盡明也二旣不能明見剛陽中正之道則利如女子之貞雖見之不能甚明而能順從者女子之道也在女子為貞也二旣不能明見九五之道能如女子之順從則不失中正乃為利也本義陰柔居内而觀乎外闚觀之象女子之正也故其占如此丈夫得之則非所利矣進齋徐氏曰闚門中視也陰柔居内而觀外雖與五為應前為三四所蔽所見不明闚觀之象雲峰胡氏曰闚坤闔户象柔居内而觀乎外有闚觀象初二皆陰故皆有幼稚象初位陽故為童二位陰故為女童觀是芒然无所見小人日用而不知者也闚觀是所見者小而不見全體仁者見之謂之仁知者見之謂之知也占曰利女貞則非大丈夫之所為可知也象曰闚觀女貞亦可醜也傳君子不能觀見剛陽中正之大道而僅一有能字闚覘其彷彿雖能順從乃同女子之貞亦可羞醜也本義在丈夫則為醜也平菴項氏曰婦人之目所闚者狹婦无公事所知者蠶織女无是非所議者酒食此在女德為不失女子而寡見謏聞則可醜矣雲峰胡氏曰小人而為兒童之觀固其道也丈夫而為女子之觀豈非可醜乎六三觀我生進退傳三居非其位處順之極能順時以進退者也若居當其位則无進退之義也觀我生我之所生謂動作施為出於己者觀其所生而隨宜進退所以處雖非正而未至失道也隨時進退求不失道故无悔咎一作吝以能順也本義我生我之所行也六三居下之上可進可退故不觀九五而獨觀己所行之通塞以為進退占者宜自審也朱子曰我者彼我對待之言是以彼觀此觀其生是以此自觀六三之觀我生進退者事君則觀其言聼計從治民則觀其政教可行膏澤可下可以見自家所施之當否而為進退童溪王氏曰我生者吾身之動作施為也六三處進退之間宜誰從曰進退者時也可以進可以退者我也觀我生以决其進退爾楊氏曰觀我生而進退所謂可以仕則仕可以止則止我无官守我无言責則進退之間豈不綽綽乎有餘裕哉者是也誠齋楊氏曰三五皆曰觀我生辭同而德異六三察己以從人九五察人以修己六三似漆雕開雲峰胡氏曰三處上下之間有進退之象他卦三不中多不吉二居中多善而觀以遠近取義故如此諸爻皆欲觀五惟近者得之六四最近故可決於進六三上下之間可以進退之地故不必觀五但觀我所為而為之進退本義謂占者宜自審葢當進退之際惟當自審其所為何如耳象曰觀我生進退未失道也傳觀己之生而進退以順乎宜故未至於失道也中溪張氏曰五為觀之主近五者宜進遠五者宜退若初二去五遠則无可進之理四去五近則用賓于王矣可進可退唯三之特為然道觀之道也觀四陰爻惟四得觀之道初二則失觀之道三之進退在我故曰未失道也六四觀國之光利用賓于王傳觀莫明於近五以剛陽中正居尊位聖賢之君也四切近之觀見其道故云觀國之光觀見國之盛德光輝也不指君之身而云國者在人君而言豈止觀其行一身乎當觀天下之政化則人君之道德可見矣四雖陰柔而巽體居正切近於五觀見而能順從者也利用賓于王夫聖明在上則懷抱才德之人皆願進於朝廷輔戴之以康濟天下四旣觀見人君之德國家之治光華甚美所宜賓于王朝效其智力上輔於君以施澤天下故云利用賓于王也古者有賢德之人則人君賓禮之故士之仕進於王朝則謂之賓本義六四最近於五故有此象其占為利於朝覲仕進也蘭氏廷瑞曰九五陽明居上是有光華者也童溪王氏曰觀以遠陽為晦近陽為明漢上朱氏曰古者諸侯入見于王王以賓禮之士而未受祿者亦賓之雲峰胡氏曰觀國之光四字下與童觀闚觀相反上與九五觀我生相應葢國之光即九五所謂我生者也特五之自觀則曰生方出於我者也自四觀五則曰光已達於國者也不指君之生而曰國者觀其達於國者則其出於君者可知矣象曰觀國之光尚賓也傳君子懷負才業志在乎兼善天下然有卷懷自守者葢時无明君莫能用其道不得已也豈君子之志哉故孟子曰中天下而立定四海之民君子樂之旣觀見國之盛德光華古人所謂非常之遇也一无也字所以志願登進王朝以行其道故云觀國之光尚賓也尚謂志尚其志意願慕賓于王朝也九五觀我生君子无咎傳九五居人君之位時之治亂俗之美惡係乎己而已觀己之生若天下之俗皆君子矣則是已之所為政化善也乃无咎矣若天下之俗未合君子之道則是已之所為政治未善不一作未能免於咎也本義九五陽剛中正以居尊位其下四陰仰而觀之君子之象也故戒居此位得此占者當觀己所行必其陽剛中正亦如是焉則得无咎也朱子曰九五之觀我生如觀風俗之媺惡民臣之從違可以見自家所施之善惡瓜山潘氏曰九五居尊處正為觀於下反觀諸己所為而皆君子則可以无咎矣進齋徐氏曰九五為大觀之主巍乎在上乃天下之儀表在下四陰莫不仰之然民皆仰乎五矣五將何所觀乎亦唯先觀我身之所行揭其中正以觀示於天下可也亦必我為陽明之君子乃能盡觀我之道而无陰侵陽之咎平庵項氏曰觀本是小人逐君子之卦但以九五中正在上羣陰仰而觀之故聖人取以為小人觀君子之象象雖如此勢實漸危故五上二爻皆曰君子无咎言君子方危能如九五之居中履正能如上九之謹身在上僅可无咎耳不然則九五居中正以觀天下雖元吉大亨可也豈止无咎而已哉明二陽向消故道大而福小也此即唐武宗之時内之宦者外之牛黨之徒皆欲攻李德裕者也但以武宗剛明在位故仰視而不敢動一日事變萬事去矣雙湖胡氏曰知時識勢學易之大方項氏深為得之當觀之君知此所以自處者有道可也象曰觀我生觀民也傳我生出於己者人君欲觀己之施為善否當觀於民民俗善則政化善也王弼云觀民以察己之道是也本義此夫子以義言之明人君觀己所行不但一身之得失又當觀民德之善否以自省察也建安丘氏曰象言觀民者葢觀民正所以為觀我之鑑欲觀吾身所行之當否但觀民俗之善惡而已此本諸身而徵諸民者也書云當於民監亦此意也雲峰胡氏曰民德之善否生於我身之得失故觀民即所以觀我生乃以義言之非以象言也上九觀其生君子无咎傳上九以陽剛之德處於上為下之所觀而不當位是賢人君子不在於位而道德為天下所觀仰者也觀其生觀其所生也謂出於己者徳業行義也旣為天下所觀仰故自觀其所生若皆君子矣則无過咎也茍未君子則何以使人觀仰矜式是其咎也本義上九陽剛居尊位之上雖不當事任而亦為下所觀故其戒辭略與五同但以我為其小有主賓之異耳朱子曰上九之觀其生是就自家視聼言動應事接物處自觀九五上九君子无咎葢為君子有剛陽之德故无咎小人无此德自當不得此爻又曰觀我是自觀如視履考祥底語勢觀其亦是自觀却從别人説易中其字不説别人只是自家如乘其墉之類平菴項氏曰上在卦外无名无位小人之進退下民之向背皆不由己但謹視其身思自免咎而已潛室陳氏曰觀之時為觀於天下者五也旣欲為的於天下須當觀省我之所行上九雖无位乃是位高之人亦下之所觀瞻故亦當自觀其所行但避九五不得稱我猶若他人之辭耳六三去九五相遠又不為觀於人止是自觀其所行當進與不進故不嫌於同辭象曰觀其生志未平也傳雖不在位然以人觀其德用為儀法故當自愼省觀其所生常不失於君子則人不失所望而化之矣不可以不在於位故安然放意无所事也是其志意未得安也故云志未平也平謂安寧也程子曰上九以剛陽之德居无位之地是賢人君子抱道德而不居其位為衆人仰觀法式者也雖不當位然為衆人所觀固不得安然放意謂已无與於天下也必觀其所生君子矣乃得无咎聖人又從而贊之謂志當在此固未得安然平定无所慮也觀聖人教示後賢如是之深賢者存心如是之仁與夫素隱行怪獨善其身者異矣本義志未平言雖不得位未可忘戒懼也或問觀其生志未平也朱子曰其生謂言行事為之見於外者旣有所省便是未得安然无事雲峰胡氏曰五與上皆為下四陰所觀五有位故當觀民以觀我之所為上雖无位亦不敢安然不自省其所為也或問觀卦陰盛而不言凶咎朱子曰此卦取義不同葢陰雖盛於下而九五之君乃當正位故只取為觀於下之義而不取陰盛之象也問觀六爻一爻勝似一爻豈所據之位愈高則所見愈大邪曰上二爻意自别下四爻是所據之位愈近則所見愈親切底意思建安丘氏曰觀有觀示之義以上二陽而示乎下四陰也然九五得位而上九不得位故五為觀主是以在五曰觀我生而上曰觀其生而已其下四陰則皆以陽為觀者而近者吉遠者凶初其最逺者也故曰童觀君子吝二三則漸近矣故二曰闚觀女貞三曰觀我生進退也惟四去陽獨近盡所觀之美故有觀光賓王之象焉豈非觀之道利近而不利遠者乎震下離上傳噬嗑序卦可觀而後有所合故受之以噬嗑嗑者合也旣有可觀然後有來合之者也噬嗑所以次觀也噬齧也嗑合也口中有物間之齧而後合之也卦上下二剛爻而中柔外剛中虛人頤口之象也中虛之中又一剛爻為頤中有物之象口中有物則隔其上下不得嗑必齧之則得嗑故為噬嗑聖人以卦之象推之於天下之事在口則為有物隔而不得合在天下則為有强梗或讒邪間隔於其間故天下之事不得合也一无也字當用刑法小則懲戒大則誅戮以除去之然後天下之治得成矣凡天下至于一國一家至于萬事所以不和合者皆由有間也无間則合矣以至天地之生萬物之成皆合而後能遂凡未合者皆為間也若君臣父子親戚朋友之間有離貳怨隙者葢讒邪間於其間也除去之則和合矣故間隔者天下之大害也聖人觀噬嗑一作囓合之象推之於天下萬事皆使去其間隔而合之則无不和且治一作洽矣噬嗑者治天下之大用也去天下之間在任刑罰故卦取用刑為義在二體明照而威震乃用刑之象也噬嗑亨利用獄傳噬嗑亨卦自有亨義也天下之事所以不得亨者以有間也噬而嗑之則亨通矣利用獄噬而嗑之之道宜用刑獄也天下之間非刑獄何以一作不可以去之不云利用刑而云利用一无利用字獄者卦有明照之象利於察獄也獄者所以究察情偽得其情則知為間之道然後可以設防與致刑也本義噬齧也嗑合也物有間者齧而合之也為卦上下兩陽而中虛頤口之象九四一陽間於其中必齧之而後合故為噬嗑其占當得亨通者有間故不通齧之而合則亨通矣又三陰三陽剛柔中半下動上明下雷上電本自益卦六四之柔上行以至於五而得其中是知以陰居陽雖不當位而利用獄葢治獄之道惟威與明而得其中之為貴故筮得之者有其德則應其占也龜山楊氏曰噬嗑除間之卦也除間以刑為用故利用獄獄者所以治間而求其情也治而得其情則刑之而天下服矣故不言利用刑而曰利用獄也隆山李氏曰噬嗑震下離上震雷離電天地生物有為造物之梗者必用雷電擊摶之聖人治天下有為民之梗者必用刑獄斷制之故噬嗑以去頤中之梗雷電以去天地之梗刑獄以去天下之梗也雲峰胡氏曰凡物不合由有間也必噬而後嗑嗑而後亨不曰利用刑而曰利用獄者先之以電之明而雷從之也電之明所以察獄也雷之威所以決獄也雷電有時獄之用亦有時不至如頤中有物强梗者為之間獄豈宜用哉旣明且威又柔且中治獄之道也不如是獄豈用哉彖曰頤中有物曰噬嗑本義以卦體釋卦名義童溪王氏曰易之立卦其命名立象各有所指鼎井大過棟橈小過飛鳥若此類者遠取諸物也艮背頤頤噬嗑頤中有物若此類者近取諸身也噬嗑而亨傳頤中有物故為噬嗑有物間於頤中則為害噬而嗑之則其害亡乃亨通也故云噬嗑而亨建安丘氏曰頤卦初上二爻皆陽其間四爻皆陰有頤口之象噬嗑變六四而為九四則為頤中有物之象去其所謂物者合則无間矣故曰噬嗑夫噬嗑乃賁之反對皆頤中有物之象噬嗑得頤之下動則四九為梗賁得頤之上止則九三為梗上止而下不動則无可合之理上止而下動則有噬而合之之象噬嗑而亨乃噬去强梗无所間隔而自亨通也剛柔分動而明雷電合而章傳以卦才言也剛爻與柔爻相間剛柔分而不相雜為明辨之象明辨察獄之本也動而明下震上離其動而明也雷電合而章雷震而電耀相須竝見合而章也照與威竝行用獄之道也能照則无所隱情有威則莫敢不畏上旣以二象言其動而明故復言威照竝用之意龜山楊氏曰剛在下則動柔在上則明動而明也初未章合而後章進齋徐氏曰剛柔分未噬之象動而明方噬之象雷電合而章已噬之象猶噬物然噬則頤分嗑則頤合也柔得中而上行雖不當位利用獄也上時掌反傳六五以柔居中為用柔得中之義上行謂居尊位雖不當位謂以柔居五為不當而利於用獄者治獄之道全剛則傷於嚴暴過柔則失於寛縱五為用獄之主以柔處剛而得中得用獄之宜也以柔居剛為利用獄以剛居柔為利否曰剛柔質也居用也用柔非治獄之宜也漢上朱氏曰六五柔中雖不當位施之用獄則无若柔中之為利矣或曰柔足以用獄乎曰為人君止於仁不以剛斷稱也龜山楊氏曰古之治獄吏以獄成告于正正聼之正以獄成告于大司寇司寇聼之棘木之下大司寇以獄成告于王王命三公叅聼之三公以獄成告于王王三宥之而後制刑此以柔用之意也本義以卦名卦體卦德二象卦變釋卦辭朱子曰彖辭中剛柔分以下都掉了頤中有物只説利用獄爻各自取義不説頤中之物問易中言剛柔分兩處一是噬嗑一是節此頗難解曰據某所見只是一卦三陰三陽謂之剛柔分分猶均也又問易中三陰三陽卦多獨於此言之何也曰偶於此言之其他卦别有義又曰剛柔分語意與日夜分同雲峰胡氏曰卦辭云噬嗑亨彖傳加一而字謂必噬嗑之而後亨也此以卦名釋辭臨川呉氏曰剛柔分動而明言未嗑之前以噬而致亨雷電合而章言旣噬之後以嗑而致亨此二句解噬嗑亨也柔自六四上行至五雖不當位然以柔居剛為以剛濟柔而不過於柔治獄所宜也結之以利用獄也四字者此兩句解利用獄也噬嗑而亨何事不利而獨利用獄者六五以柔在上才不當位不足以致大利獨以柔得中利於用獄而已雲峰胡氏曰動不如雷不能斷獄明不如電不能察獄不柔則失之暴柔而不中則失之縱甚言用獄之難也象曰雷電噬嗑先王以明罸勅法傳象无倒置者疑此文互也雷電相須竝見之物亦有嗑象電明而雷威先王觀雷電之象法其明與威以明其刑罸飭其法令法者明事理而為之防者也本義雷電當作電雷或問諸卦象皆順説獨雷電噬嗑倒説何邪朱子曰先儒皆以為倒寫二字相似疑是如此中溪張氏曰蔡邕石經本作電雷臨川呉氏曰明者辨别精審之意勅者整飭嚴警之意明象電光勅象雷威罸者一時所用之法法者平日所定之罸一時所用之允當者示平日所定之信必也故明其罸所以勅其法進齋徐氏曰明罸者所以示民而使之知所避勅法者所以防民而使之知所畏此先王忠厚之意也未至折獄致刑處故與豐象異然罸之當避人猶有冐法而為之法之可畏猶有犯法不顧者先王不得已而後用刑焉初九屨校滅趾无咎校音教傳九居初最下无位者也下民之象為受刑之人當用刑之始罪小而刑輕校木械也其過小故屨之於足以滅傷其趾人有小過校而滅其趾則當懲懼不敢進於惡矣故得无咎繫辭云小懲而大誡此小人之福也言懲之於小與初故一有後字得无咎也初與上无位為受刑之人餘四爻皆為用刑之人初居最下无位者也上處尊位之上過於尊位亦无位者也王弼以為无陰陽之位陰陽係於竒偶豈容无也然諸卦初上不言當位不當位者一作不言位當不當者葢初終之義為大臨之初九則以位為正若需上六云不當位乾上九云无位爵位之位非陰陽之位也本義初上无位為受刑之象中四爻為用刑之象初在卦始罪薄過小又在卦下故為屨校滅趾之象止惡於初故得无咎占者小傷而无咎也漢上朱氏曰周官掌囚下罪桎桎足械也械亦曰校臨川呉氏曰屨謂著於其足如納屨然校足械也雲峰胡氏曰趾乃人之所用以行者屨校滅趾懲之於初使不得行乃小人之福也小人受刑而所傷者尚小故曰无咎誠齋楊氏曰屨校不懲必至何校滅趾不戒必至滅耳初九之小人能懲於薄刑止其惡而不行則不貽上九惡積罪大之凶禍矣象曰屨校滅趾不行也傳屨校而滅傷其趾則知懲誡而不敢長其惡故云不行也古人制刑有小罪則校其趾葢取禁止其行使不進於惡也本義滅趾又有不進於惡之象雲峰胡氏曰下卦為震滅趾使其不敢如震之動也動則進於惡矣六二噬膚滅鼻无咎傳二應五之位用刑者也四爻皆取噬為義二居中得正是用刑得其中正也用刑得其中正則罪惡者易服故取噬膚為象噬齧人之肌膚為易入也滅没也深入至没其鼻也二以中正之道其刑易服然乘初剛是用刑於剛强之人刑剛强之人必須深痛故至滅鼻而无咎也中正之道易以服人與嚴刑以待剛强義不相妨厚齋馮氏曰膚皮之表也噬者治獄之人膚肉腊胏肉也爻取噬為治獄之象又取膚為獄囚之象二之滅鼻无咎者指治獄也初之无咎囚可无咎也二三五之无咎囚不得而咎之也中四爻治獄者也初上囚之始惡怙終者也本義祭有膚鼎葢肉之柔脆噬而易嗑者六二中正故其所治如噬膚之易然以柔乘剛故雖甚易亦不免於傷滅其鼻占者雖傷而終无咎也涑水司馬氏曰噬嗑食也故以食物明之臨川呉氏曰膚者豕腹之下柔軟无骨之肉古禮别實于一鼎曰膚鼎雲峰胡氏曰噬而言膚腊胏肉者取頤中有物之象也各爻雖取所噬之難易而言然因各爻自有此象故其所噬者因而為之象耳六二柔而中正故所治如噬膚之易入但初剛未服反不能无傷然始雖有傷終而无咎是初之剛終可服也象曰噬膚滅鼻乘剛也傳深至滅鼻者乘剛故也乘剛乃用刑於剛强之人不得不深嚴也深嚴則得宜乃所謂中也六三噬腊肉遇毒小吝无咎腊音昔傳三居下之上用刑者也六居三處不當位自處不得其當而刑於人則人不服而怨懟悖犯之如噬齧乾腊堅韌之物而遇毒惡之味反傷於口也用刑而人不服反致怨傷是可鄙吝也然當噬嗑之時大要噬間而嗑之雖其身處位不當而强梗難服至於遇毒然用刑非為不當也故雖可吝而一无而字亦小噬而嗑之非有咎也本義腊肉謂獸腊全體骨而為之者堅韌之物也陰柔不中正治人而人不服為噬腊遇毒之象占雖小吝然時當噬嗑於義為无咎也朱子曰六三噬腊肉遇毒是所噬者堅韌難合三以陰柔不中正而遇此所以遇毒而小吝然此亦是合當治者但難治耳治之雖小吝終无咎也節初齊氏曰周禮腊人掌田獸之脯注薄物為脯小物全乾為腊雲峰胡氏曰肉因六柔取象腊因三剛取象三至五互坎坎有毒象師有坎故釋彖亦曰毒六二柔居柔故所噬象膚之柔六三柔居剛故所噬象腊肉柔中有剛三比之二難矣然三遇毒二亦滅鼻甚言刑之不可輕用也二三皆无咎而三小吝者中正不中正之分也象曰遇毒位不當也傳六三一无三字以陰居陽處位不當自處不當故所刑者難服而反毒之也誠齋楊氏曰六三以柔弱之才居剛決之位比弱於齒而噬夫堅者也能不遇毒乎故曰位不當也九四噬乾胏得金矢利艱貞吉乾音干胏美緇反傳九四居近君之位當噬嗑之任者也四已過中是其間愈大而用刑愈深也故云噬乾胏胏肉之有聯一无聯字骨者乾肉而兼骨至堅難噬者也噬至堅而得金矢金取剛矢取直九四陽德剛直為得剛直之道雖用剛直之道利在克艱其事而貞固其守則吉也九一无九字四剛而明體陽而居柔剛明則傷於果故戒以知難居柔則守不固故戒以堅貞剛而不貞者有矣凡失剛者皆不貞也在噬嗑四為最善龜山楊氏曰九四合一卦言之則為間者也以六爻言之則居大臣之位任除間之責者也建安丘氏曰噬嗑惟四五兩爻能盡治獄之道彖以五之柔為主故曰柔得中而上行雖不當位利用獄也利用之言獨歸之五而他爻不與焉爻以四之剛為主故曰噬乾胏得金矢利艱貞吉吉之言獨歸之四而他爻謂之无咎也主柔而言以仁為治獄之本主剛而言以威為治獄之用仁以寓其哀矜威以懲其奸慝剛柔迭用畏愛兼施治獄之道得矣雙湖胡氏曰以全體言九四為一卦之間則受噬者在四卦辭利用獄是刑四也以六爻言則受噬者在初上故初上皆受刑四反為噬之主與三陰爻同噬初上者也卦言其位則梗在其中爻言其才則剛足以噬其取義故不同也本義胏肉之帶骨者與胾同周禮獄訟入鈞金束矢而後聽之九四以剛居柔得用刑之道故有此象言所噬愈堅而得聽訟之宜也然必利於艱難正固則吉戒占者宜如是也或問古人獄訟要鈞金束矢之意如何朱子曰這不見得想是詞訟時便令他納此教他无切要之事不敢妄來又問如此則不問曲直一例出此則實有寃枉者亦懼而不敢訴矣曰這箇須是大切要底事古人如平常事又别有所在如劑石之類周禮秋官大司寇以兩造禁民訟入束矢於朝然後聽之以兩劑禁民獄入鈞金三日乃致於朝然後聽之注訟謂以財貨相告者造至也使訟者兩至旣兩至使入束矢乃治之不至不入束矢則是自服其不直者也必入束矢者取其直也束矢百矢也獄謂相告以罪名者劑今劵書使獄者各齎劵書旣兩劵書使入鈞金又三日乃治之重刑也不劵書不入金則是亦自服不直者也必入金者取其堅也三十斤為鈞雲峰胡氏曰胏肉之帶骨者骨因九取象肉因四取象離為乾卦故為乾胏腊肉肉藏骨柔中有剛六三柔居剛故所噬如之乾胏骨連肉剛中有柔九四剛居柔故所噬如之三遇毒所治之人不服也四得金矢其人服矣然必艱難正固乃无咎象曰利艱貞吉未光也傳凡言未光其道未光大也戒於一作以利艱貞葢其所不足也不得中正故也臨川呉氏曰六二以所噬之易而有易心焉故至滅鼻九四則噬之難矣戒以艱貞而後得吉是其道之未光也六五噬乾肉得黄金貞厲无咎傳五在卦愈上而為噬乾肉反易於四之乾胏者五居尊位乘在上之勢以刑於下其勢易也在卦將極矣其為間甚大非易嗑也故為噬乾肉也得黄金黄中色金剛物五居中為得中道處剛而四輔以剛得黄金也五无應而四居大臣之位得其助也貞厲无咎六五雖處中剛然實柔體故戒以必正固而懷危厲則得无咎也以柔居尊而當噬嗑一作堅之時豈可不貞固而懷危懼哉一作忘危懼也建安丘氏曰噬嗑三柔爻皆用獄者也而五最勝五之位與二同而五能噬乾肉二但能噬膚者二以柔居柔而五以柔居剛五之才勝乎二之才也五之才與三同而五得黄金三不免遇毒者三之柔不中五之柔得中五之位勝乎三之位也六五之才之位視二三固有間矣而爻辭但无咎而不及九四之吉者五之柔又不如四之剛也然則欲盡噬嗑治獄之道捨九四其何以哉西溪李氏曰九四以剛噬六五以柔噬以剛噬者有司執法之公以柔噬者人君不忍之仁也然猶貞厲則无咎正如穆王訓夏贖刑刑旣輕矣猶曰朕言多懼是也本義噬乾肉難於膚而易於腊胏者也黄中色金亦謂鈞金六五柔順而中以居尊位用刑於人人无不服故有此象然必貞厲乃得无咎亦戒占者之辭也或問九四利艱貞六五貞厲皆有艱難正固危懼之意故皆為戒占者之辭朱子曰亦是爻中元自有此道理大抵纔是治人彼必為敵不是易事故雖是時位卦德得用刑之宜亦須以艱難正固處之雲峰胡氏曰乾因五取象肉因六取象噬膚噬腊肉噬乾胏一節難於一節六五噬乾肉則易矣五君位也以柔居剛柔而得中用獄之道也何難之有然六三亦以柔居剛遇毒何也六三柔不中正故噬之難而且遇毒六五柔而得中故噬之易而得黄金九四金矢兼得五獨得黄金何也獄訟而出金矢已非尋常小小之訟訟則出矢獄則出金訟為小獄為大矣四於獄訟兼得大小兼理之也五君也非大獄不敢以聞書所謂罔攸兼於庻獄是也故獨曰得黄金葢君臣之分如此象曰貞厲无咎得當也傳所以能无咎者以所為得其當也所謂當居中用剛而能守正慮危也中溪張氏曰得當者謂處剛而得中也剛則不茹中則不偏五貞厲无咎者其以是歟上九何校滅耳凶何何可反傳上過乎尊位无位者也故為受刑者居卦之終是其間大噬之極也繋辭所謂惡積而不可揜罪大而不可解者也故何校而滅其耳凶可知矣何負也謂在頸也本義何負也過極之陽在卦之上惡極罪大凶之道也故其象占如此胡氏曰居卦之極罪之大者也校加於首而没其耳所以凶也中溪張氏曰上九居噬嗑之極為用獄之終是小人惡積罪大怙終而不悛者也故有何校滅耳之凶雲峰胡氏曰本義於初曰過小於上則曰惡極葢過而不改必流於惡初能改過是止惡於始故曰无咎上則怙惡於終直曰凶矣象曰何校滅耳聰不明也傳人之聾暗不悟積其罪惡以至於極古人制法罪之大者何之以校為其无所聞知積成其惡故以校而滅傷一无傷字其耳誡聰之不明也本義滅耳葢罪其聼之不聰也若能審聽而早圖之則无此凶矣雲峰胡氏曰上卦為離滅耳言其不能如離之明也明則能審聽而早圖之无此凶矣建安丘氏曰噬嗑去間之卦也故六爻皆言用獄之事初上无位為受刑之人初過小而在下為用獄之始故以屨校滅趾為象上惡極而怙終為用獄之終故以何校滅耳為象中四爻有位為治獄之人然卦才之剛柔不同故所噬之難易亦異六二以柔居柔純乎柔者故象為噬膚膚易噬之物也六五以柔居剛為剛柔得中於象為噬乾肉乾肉比膚則難矣六三柔中有剛故為噬腊肉腊則有骨矣比乾肉又難也九四剛中有柔故為噬乾胏胏則骨大於腊噬之最難者也然二噬膚滅鼻三噬腊遇毒四噬乾胏艱貞五噬乾肉貞厲者皆言治獄之道不可不謹也至于占辭三爻无咎四獨吉者則治獄又以剛為尚也柔豈去間之道哉周易傳義大全卷八
