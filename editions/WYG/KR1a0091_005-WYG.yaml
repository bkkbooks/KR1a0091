body:
  text: 筮儀擇地潔處為蓍室南户置牀于室中央牀大約長五尺廣三尺毋太近壁雙湖胡氏曰蓍必有室則神有所寓而人心亦日有致敬之所惟人神相接於平居閒暇之時一旦臨事質疑自然有如響斯答之效其與倉卒冐瀆者有間矣蓍五十莖韜以纁帛貯以皂囊納之櫝中置于牀北櫝以竹筒或堅木或布漆為之圓徑三寸如蓍之長半為厎半為盖下别為臺函之使不偃仆設木格于櫝南居牀二分之北格以横木板為之髙一尺長竟牀當中為兩大刻相距一尺大刻之西為三小刻相距各五寸許下施横足側立案下置香罏一于格南香合一于罏南日炷香致敬将筮則洒埽拂拭滌研一注水及筆一墨一黄漆板一于罏東東上筮者齊潔衣冠北面盥手焚香致敬筮者北面見儀禮若使人筮則主人焚香畢少退北面立筮者進立于牀前少西南向受命主人直述所占之事筮者許諾主人右還西向立筮者右還北向立兩手奉櫝盖置于格南罏北出蓍于櫝去囊解韜置于櫝東合五十策兩手執之熏于罏上此後所用蓍策之數其說竝見啟蒙命之曰假爾泰筮有常假爾泰筮有常某官姓名今以某事云云未知可否爰質所疑于神于靈吉凶得失悔吝憂虞惟爾有神尚明告之乃以右手取其一策反於櫝中而以左右手中分四十九策置格之左右兩大刻此第一營所謂分而為二以象兩者也次以左手取左大刻之策執之而以右手取右大刻之一策掛于左手之小指間此第二營所謂掛一以象三者也次以右手四揲左手之策此第三營之半所謂揲之以四以象四時者也次歸其所餘之策或一或二或三或四而扐之左手无名指間此第四營之半所謂歸竒於扐以象閏者也次以右手反過揲之策於左大刻遂取右大刻之策執之而以左手四揲之此第三營之半次歸其所餘之策如前而扐之左手中指之間此第四營之半所謂再扐以象再閏者也一變所餘之策左一則右必三左二則右亦二左三則右必一左四則右亦四通掛一之策不五則九五以一其四而為竒九以兩其四而為偶竒者三而偶者一也次以右手反過揲之策於右大刻而合左手一掛二扐之策置於格上第一小刻以東為上後放此是為一變再兩手取左右大刻之蓍合之或四十四策或四十策復四營如第一變之儀而置其掛扐之策於格上第二小刻是為二變二變所餘之策左一則右必二左二則右必一左三則右必四左四則右必三通掛一之策不四則八四以一其四而為竒八以兩其四而為偶竒偶各得四之二焉又再取左右大刻之蓍合之或四十策或三十六策或三十二策復四營如第二變之儀而致其掛扐之策於格上第三小刻是為三變三變餘策與二變同三變既畢乃視其三變所得掛扐過揲之策而畫其爻於版掛扐之數五四為竒九八為偶掛扐三竒合十三策則過揲三十六策而為老陽其畫為所謂重也掛扐兩竒一偶合十七策則過揲三十二策而為少隂其畫為􅄲所謂拆也掛扐兩偶一竒合二十一策則過揲二十八策而為少陽其畫為􅅀所為單也掛扐三偶合二十五策則過揲二十四策而為老隂其畫為㐅所謂交也朱子答曽三異曰交者拆之聚故為老隂重者單之積則為老陽然此六爻既成而畫地以記之象耳於揲法初无預也鄱陽董氏曰㐅者偶之欲合中已實而未純乎􅅀也􅅀則為單矣者竒之欲分中已虚而未離乎二也􅄲則為拆矣此老隂老陽之所以為變爻也如是每三變而成爻第一第四第七第十第十三第十六凡六變竝同但第三變以下不命而但用四十九蓍耳第二第五第八第十一第十四第十七凡六變亦同第三第六第九第十二第十五第十八凡六變亦同凡十有八變而成卦乃考其卦之變而占其事之吉凶卦變别有圖說見啟蒙禮畢韜蓍襲之以囊入櫝加盖斂筆硯墨版再焚香致敬而退如使人筮則主人焚香揖筮者而退朱子曰揲蓍之法周禮頌於太卜之官其法度必甚詳密今皆不可見獨頼大傳有此數句可以畧見彷彿而今推之亦无不可通處學者既不得見當時舊法則亦且當守此不當妄以私意横起計度也蒿固非蓍然亦是其類若以木棊竹算金錢當之則去蓍益逺矣又曰卜易卦以錢擲以甲子起卦始於京房今之說易者先掊擊了卜筮如下繫說卜筮是甚次第某所恨者不深曉古人卜筮之法故今說處多是想象古人如此若更曉得湏更有奥義可推或曰布蓍求卦即其法也曰爻卦與事不相應則推不去古人於此湏有變通或以支干推之筮短龜長近得其說是筮有箇病了才一畫定便只有三十二卦永不到是那三十二卦到二畫便只有十六卦又到三畫便只有八卦又到四畫便只有四卦又五畫便只有二卦這二卦便可以著意揣度了不似龜才鑽拆便无救處全不可容心輔廣曰淛人多尚龜卜雖盜賊亦取決於此曰左傳載臧㑹卜信與僭僭吉此其法所以不傳聖人作易示人以吉凶却无此弊故言利貞不言利不貞言貞吉不言不貞吉言利禦寇不言利為寇也雙湖胡氏曰朱子筮法雖備見於啟蒙而筮儀則莫要切如此其制度儀物曲盡敬誠此誠尚占者所不可忽也又曰朱子甞謂易只是卜筮之書本非以設教然今凡讀一卦一爻便如筮斯得觀象玩辭觀變玩占而又求其理之所以然者方為善讀是故於乾坤當識君臣父母之分於咸恒當識夫婦之别於震坎艮㢲離兌當識長㓜之序於麗澤兌當識朋友之講習以至慎言語節飲食當有得於頤懲忿窒欲遷善改過當有得於損益不諂不瀆以謹上下之交安其身之數語以為全身之道當有得於大傳即此而推随讀而受用焉是則君平依孝依忠之微意也雖日端策而筮其根柢所在亦何以尚此
