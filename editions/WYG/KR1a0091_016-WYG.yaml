body:
  text: 周易傳義大全卷十明胡廣等撰震下乾上傳无妄序卦復則不妄矣故受之以无妄復者反於道也既復於道則合一无合字正理而无妄故復之後受之以无妄也為卦乾上震下震動也動以天為无妄動以人欲則妄矣无妄之義大矣哉程子曰无妄震下乾上聖人之動以天賢人之動以人若顔子之有不善豈如衆人哉惟只在此間爾盖猶有已焉至於无我則聖人也隆山李氏曰人受天地之中以生天神天明本自无妄有生之後人偽誘之妄念乃起又曰乾通變化一氣冥運而生者自生化者自化无不得其性命之正夫安有所謂妄者哉雙溪王氏曰復者賢人之事无妄者聖人之事无妄則誠而復者所以求至於无妄者也无妄元亨利貞其匪正有眚不利有攸往傳无妄者至誠也至誠者一无者字天之道也天之化育萬物生生不窮各正其性命乃无妄也人能合无妄之道則所謂與天地合其徳也无妄有大亨之理君子行无妄之道則可以致大亨矣无妄天之道也卦言人由无妄之道也一无也字利貞法无妄之道利在貞正失貞正則妄也雖无邪心苟不合正理則妄也乃邪心也故有一作其匪正則為過眚既已无妄不冝有往往則妄也或問程傳云雖无邪心苟不合正理則妄也既无邪心何以不合正理朱子曰有人自是其心全无邪而却不合於正理如賢智者過之他其心豈曾有邪却不合正理佛氏亦豈有邪心者又問荘敬持飬此心既存亦可謂之无邪心矣然知有未至理有未窮則於應事接物之際不能處其當則未免於紛擾而敬亦不得行焉雖與流放而不知者異然苟不合正理則亦未免為妄與邪心也曰所論甚善但所謂雖旡邪心而不合正理者實該動靜而言然燕居獨處之時物有來感理所當應而此心頑然固執不動則雖无邪心而只此不動處便非正理又如應事接物處理當如彼而吾所以應之者乃如此則雖未必出於有意之私然只此亦是不合正理既有不合正理則非邪妄而何恐不可専以荘敬持飬此心既存為无邪心而必以未免紛擾敬不得行然後為有妄之邪心也本義无妄實理自然之謂史記作无望謂无所期望而有得焉者其義亦通為卦自訟而變九自二來而居於初又為震主動而不妄者也故為无妄又二體震動而乾健九五剛中而應六二故其占大亨而利於正若其不正則有眚而不利有所往也朱子曰无妄本是无望這是没理㑹時節忽然如此得來靣前朱英所謂无望之福是也問史記作无望若以為无望則是願望之望非誠妄之妄曰有所願望即是妄但望字説得淺妄字説得㴱无妄是箇不指望偶然厎卦忽然而有福忽然而有禍如人方病忽然勿藥而愈是所謂无妄也據諸爻名義合作无望不知孔子何故説歸无妄无妄自是大亨了又却須是貞正始得若些子不正他那裏便有災來无妄一卦雖云禍福之來也无常然自家所守者不可不利於正不可以彼之无常而吾之所守亦為之无常也故曰无妄元亨利貞其匪正有眚若所守匪正則有眚矣眚即災也厚齋馮氏曰朱子謂史記作无望自文王以來多為無望之義焉季長鄭康成王子雍皆同斯義古人用字同聲者義亦通之如豫之為預履之為禮噬嗑之為市合不一端而足今觀卦内作无所期望而有得其義多通序卦之意非可如此推也盖動出於人則為之而期其成有所望也動而聴命於天非可期望也建安丘氏曰惟其无妄所以无望也若其處心未免於妄則无道以致福而妄欲徼福非所謂无望之福有過以召災而妄欲免災非所謂无妄之災此皆未免容心於禍福間非所謂无妄也若真實无妄之人則純乎正理禍福一付之天而无苟得幸免之心也雲峯胡氏曰朱子解中庸誠字以為真實无妄之謂此解无妄則以為實理自然之謂自然二字已兼無所期望之意矣其占元亨而必利於貞者无妄誠也正而固誠之者也不正則妄矣占辭曰貞曰匪正曰利曰不利其辭一正一反聖人示戒深矣彖曰无妄剛自外來而為主於内傳謂初九也坤初爻變而為震剛自外而來也震以初爻為主成卦由之故初為无妄之主動以天為无妄動而以天動為主也以剛變柔為以正去妄之象又剛正為主於内无妄之義也九居初正也進齋徐氏曰剛自外來而為主於内以卦變言則下體乾交坤而為震也非本卦剛柔之往來故曰外來初九為震動之主爻故曰為主於内動而健剛中而應大亨以正天之命也傳下動而上健是其動剛健也剛健无妄之體也剛中而應五以剛居中正二復以中正相應是順理而不妄也故其道大亨通而貞正乃天之命也天命謂天道也所謂无妄也白雲郭氏曰動而健者動以天不以人也龜山楊氏曰五以剛健中正位乎上二以柔順中正應於下上下相與以正故其大亨也以正而已大亨以正非人之私智所能為也循天理而已故曰天之命也維天之命於穆不已所謂命者亦誠而已矣其匪正有眚不利有攸往无妄之往何之矣天命不祐行矣哉傳所謂无妄正而已小失於正則為有過乃妄也所謂匪正盖由有往若无妄而不往何由有匪正乎无妄者理之正也更有往将何之矣乃入於妄也往則悖於天理天道所不祐可行乎哉龜山楊氏曰大亨以正則亨以正為體匪正則有眚非順理也故天命所不祐欲往安之乎進齋徐氏曰行矣哉即州里行乎哉之義本義以卦變卦徳卦體言卦之善如此故其占當獲大亨而利於正乃天命之當然也其有不正則不利有所往欲何往哉盖其逆天之命而天不祐之故不可以有行也朱子曰剛自外來説卦變動而健説卦徳剛中而應説卦體大亨以正説元亨利貞伊川易傳似不是本意剛自外來是所以做造无妄動而健是有卦後説厎雲峯胡氏曰本義謂自訟而來二之剛來居初也或謂外卦為乾震之剛自乾來也亦通无妄釋元亨利貞與臨同命即道也叶韵耳无妄之往程子以為无妄而又往本義只順上文本意解正者天之命不正故不可行也盖无妄之往與泰卦包荒得尚于中行句相似舉首尾句而包中間也不可泥文而失意象曰天下雷行物與无妄先王以茂對時育萬物傳雷行於天下隂陽交和相薄而成聲於是驚蟄藏振萌芽發生一作育萬物其所賦與洪纖髙下各正其性命无有差妄一作忒物與无妄也先王觀天下雷行發生賦與之象而以茂對天時飬育萬物使各得其宜如天與之无妄也茂盛也茂對之為言猶盛行永言之比對時謂順合天時天道生萬物各正其性命而不妄王者體天之道飬育人民以至昆蟲草木使各得其宜乃對時育物之道也程子曰天下雷行物與无妄天下雷行付與无妄天性豈有妄邪聖人以茂對時育萬物各使得其性也无妄則一毫不可加安可往也往則妄矣无妄震下乾上動以天安有妄乎動以人則有妄矣天下雷行物與无妄先天後天皆合于天理者也人欲則偽矣天下雷行物與无妄動以天理故也其大畧如此又須研究之則自有得處本義天下雷行震動發生萬物各得其性命是物物而與之以无妄也先王法此以對時育物因其所性而不為私焉或問物與无妄是各正性命之意朱子曰然一物與他一箇无妄節齋蔡氏曰對與對越上帝之對同茂者篤實感發之意至誠之動无時不對无物不育也中溪張氏曰天之生物不違乎時至誠贊化亦不違乎時聖人與天同一无妄此所謂動以天也雙湖胡氏曰天下雷行物與无妄以理言之有㑹萬為一一實萬分之義以象言之則一震之頃物皆震動邪念頓消是物與之以无妄也聖人茂對天時以飬育萬物是亦聖人之雷行物與之以无妄矣雲峯胡氏曰夫子釋彖從天命上説本義釋夫子大象從性上説性即天之命也天下雷行物物與之以无妄物物各具一性物物各一自然之天聖人因物之所性以育萬物聖人一自然之天也初九无妄往吉傳九以陽剛為主於内无妄之象以剛實一无實字變柔而居内中誠不妄者也以无妄而往何所不吉卦辭言不利有攸往謂既无妄不可復有往也過則妄矣爻言往吉謂以无妄之道而行則吉也本義以剛在内誠之主也如是而往其吉可知故其象占如此進齋徐氏曰初剛當位而動為无妄之主動以正者如是而行何往非吉隆山李氏曰初陽无應而爻辭謂之往吉何也兩剛相遇不率於係應之私是之謂无妄此初所以吉四所以无咎也若夫六二九五應六三上九應而三不免於災五不免於疾上不免於眚有應者反不若无應之為愈可見矣震陽初動誠一未分剛實无私以此而往動與天合其又奚必有應而後能往哉此初九之往所以得无心之吉也雲峰胡氏曰釋彖曰剛自外來而為主於内本義於此曰以剛在内誠之主也主字最有力盖妄者誠之反也誠之主如此妄自然无矣如斯而往其吉固冝此占辭而本義以為象者初九之剛為主於内誠之主之象也蘭氏廷瑞曰初則當行終則當止行止適當則无妄不妄則吉无妄之初當行者也故往則有吉无妄之終當止者也故行則有眚象曰无妄之往得志也傳以无妄而往无不得其志也盖誠之於物无不能動以之脩身則身正以之治事則事得其理以之臨人則人感而化无所往而不得其志也誠齋楊氏曰九本乾體初居震始動以天者也焉往而不吉不得志哉丹陽都氏曰二隂在前无陽以拒之故吉故得志六二不耕穫不菑畬則利有攸往菑側其反畬音餘傳凡理之所然者非妄也人所欲一无欲字為者乃妄也故以耕穫菑畬譬之六二居中得正又應五之中正居動體而柔順為動能順乎中正乃无妄者也故極言无妄之義耕農之始穫其成終也田一歲曰菑三歲曰畬不耕而穫不菑而畬謂不首造其事因其事理所當然也首造其事則是人心所作為乃妄也因事之當然則是順理應物非妄也穫與畬是也盖耕則必有穫菑則必有一作為畬是事理之固然非心意之所造作也如是則為无妄不妄則所往利而无害也或曰聖人制作以利天下者皆造端也豈非妄乎曰聖人隨時制作合一作因乎風氣之宜未甞先時而開之也若不待時則一聖人足以盡為矣豈待累聖繼作也時乃事之端聖人隨時而為也廣平游氏曰不耕穫不菑畬以明君子之於物應而不唱其於事述而不作非樂通物也樂循理也朱子曰耕菑固必因時而作然對穫畬而言則為首造矣易中取象亦不可以文害辭辭害義若必字字拘泥則不耕而望穫不菑而望畬亦豈有此理耶問程傳爻辭恐未明白竊謂无不耕而穫不菑而畬之理只是不於耕而計穫之利如程子所解象辭移之以解爻辭則可曰易傳爻象之辭雖若相反而意實相近特辭有未足耳爻辭言當循理象辭言不計利循理則不計利計利非循理也但考之經文則若有可疑者若曰不耕而穫則多却而字若曰不於耕而求穫之利則又須增數字方通嘗謂此爻乃自始至終都不營為而偶然有得之意耕穫菑畬舉事之始終而言也當无妄之世事盖有如此者若以義言則聖人之无為而治學者之不要人爵而人爵從之皆是也大扺此爻所謂无妄之福而六三則所謂无妄之禍也潛室陳氏曰伊川大意只謂不為穫而耕不為畬而菑凡有所為而為者皆計利之私心即妄也但經文中不如此下語故易傳中頗費言語始謂不耕而穫不菑而畬謂不首造其事則似以耕菑為私意中謂耕則必有穫菑則必有畬非心造意作則以耕穫菑畬為非私意終謂既耕則必有穫既菑則必成畬非必以穫畬之富而為則又似以穫畬為私意三説不免自相抵牾所以本義但據經文直説謂无耕穫菑畬之私心盖農夫治田都无計利之私心當无妄之時皆不可有此意想如農夫之耕穫則於經文甚直无繚繞之礙又曰不首造者謂作事之始不可萌計較課功意乃明道不計功之説也本義柔順中正因時順理而无私意期望之心故有不耕穫不菑畬之象言其无所為於前无所冀於後也占者如是則利有所往也朱子曰六二在无妄之時居中得正故吉其曰不耕穫不菑畬是四事都不做盖自有一様時節都不須得作為事事都不動作亦自利有攸往看來无妄合是无望之義如无妄之災无妄之疾都是没巴鼻恁地伊川作三意説不耕而穫耕而不穫耕而不必穫看來只是見成領㑹他西溪李氏曰无妄誠也實理也有一毫求得於外之心便害无妄之體耕穫菑畬求得於外也必无耕穫菑畬之心然後可以有所往二以隂居隂雖得中然未實也中未實則必外求因有此戒廬陵龍氏曰耕穫菑畬而得穀此常理也然天命偶然亦有不用力而穫者无妄之福也若有如此福利自然至前則宜有所往矣則字喚得分明然利往與否又在占者審擇此未定之占雲峯胡氏曰耕穫者種而歛之也菑畬者墾而熟之也諸家以為不耕而穫不菑而畬是從外添一而字惟本義以為一歲之農始於耕終於穫三歲之田始於菑終於畬不耕穫不菑畬六二柔順中正終始无所作為之象而必曰因時順理者理本自然无所作為亦有時可如此不煩作為者六二柔順之至因其時順其理自始至終絶无計功謀利之心无所望而有得焉者也故其占曰利有攸往或曰利有攸往則宜於有為矣而以為无所作為者何也曰惟其因時順理而不自作為此所以可有為也象曰不耕穫未富也傳未者非必之辭臨卦曰未順命是也不耕而穫不菑而畬因其事之當然既耕則必有穫既菑則必成畬非必以一无以字一无必字穫畬之富而為也其始耕菑乃設心在於求一无求字穫畬是以其富也心有欲而為者則妄也本義富如非富天下之富言非計其利而為之也雲峯胡氏曰无妄天也計其利而為之則人而非天矣六三无妄之災或繫之牛行人之得邑人之災傳三以隂柔而不中正是為妄者也又志應於上欲也亦妄也在无妄之道為災害也人之妄動由有欲也妄動而得亦必有失雖使得其所利其動而妄失已大矣况復凶悔隨之乎知者見妄之得則知其失必與稱也故聖人因六三有妄之象而發眀其理云无妄之災或繫之牛行人之得邑人之災言如三之為妄乃无妄之災害也設如有得其失隨至如或繫之牛或謂設或也或繫得牛行人得之以為有得邑人失牛乃是災也借使邑人繫得馬則行人失馬乃是災也言有得則有失不足以為得也行人邑人但言有得則有失非以為彼已也妄得之福災亦隨之妄得之得失亦稱之固不足以為得也人能知此則不為妄動矣臨川吳氏曰此假設其象以明之如或繫一牛於此乃邑人之牛也偶脫所繫而為行人所得邑人有失牛之災亦適然不幸爾非己有以致之是謂无妄之災六三之遇此災莫之致而至者也誠齋楊氏曰我求而我得者有妄之災非我求而我得者无妄之災本義卦之六爻皆无妄者也六三處不得正故遇其占者无故而有災如行人牽牛以去而居者反遭詰捕之擾也或問无妄之災朱子曰此卦六爻皆是无妄但六三地頭不正故有无妄之災言无故而有災也如行人牽牛已去而居人反遭捕詰之擾此正无妄之災之象習靜劉氏曰六三才柔而位不當所謂匪正者也故有災然出於意料之外故曰无妄之災雲峯胡氏曰六爻皆无妄三之時則无妄而有災者也六二得位而有无妄之福時也六三失位而有无妄之禍亦時也行人牽牛以去而居人反受詰捕之擾其災出於意料之外雜卦曰无妄災也其此之謂乎雙湖胡氏曰三固是无妄之災然亦其不正之所致使九三得正寧有是乎象曰行人得牛邑人災也傳行人得牛乃邑人之災也有得則有失何足以為得乎臨川吳氏曰其得者无妄之福其失者无妄之災以无妄之人居无妄之時災福皆非以妄而致也九四可貞无咎傳四剛陽而居乾體復无應與无妄者也剛而无私豈有妄乎可貞固守此自无咎也九居隂得為正一作貞乎曰以陽居乾體若復處剛則為一无為字過矣過則妄也居四无尚剛之志也可貞與利貞不同可貞謂其所處可貞固守之利貞謂利於貞也本義陽剛乾體下无應與可固守而无咎不可以有為之占也進齋徐氏曰九四得乾體之剛下无係應无妄者也但可貞與利貞不同利貞謂利於貞也可者僅可之辭謂以九居四剛而不中僅可堅守其剛貞而勿動爾妄動則有咎也雙湖胡氏曰四處不中正故戒之以可貞則无咎不正則有咎也可之云者有誨之之意雲峯胡氏曰貞正而固也曰利貞則訓正字而兼固字之義曰不可貞則専訓固字而无正字之義不可不辯九四陽剛健體下无應與僅可貞固守之而其占不可有為不如初之吉亦不至如上之凶僅得无咎而已象曰可貞无咎固有之也傳貞固守之則无咎也本義有猶守也九五无妄之疾勿藥有喜傳九以中正當尊位下復以中正順應之可謂无妄之至者也其道无以加矣疾為之病者也以九五之无妄如其有疾勿以藥治則有喜也人之有疾則以藥石攻去其邪以飬其正若氣體平和本无疾病而攻治之則反害其正矣故勿藥則有喜也有喜謂疾自亡也无妄之所謂疾者謂若治之而不治率之而不從化之而不革以妄而為无妄之疾舜之有苗周公之管蔡孔子之叔孫武叔是也既已无妄而有疾之者則當自如无妄之疾不足患也若遂自攻治乃是渝其无妄而遷於妄也五既處无妄之極故唯戒在動動則妄矣本義乾剛中正以居尊位而下應亦中正无妄之至也如是而有疾勿藥而自愈矣故其象占如此或問九五陽剛中正以居尊位无妄之至何為而有疾朱子曰此是不期而有此但聽其自爾久則自定所以勿藥有喜而无疾也大抵无妄一卦固是无妄但亦有无故非意之事故聖人因象以示戒白雲郭氏曰易以乗剛為疾如豫六五自取之也非无妄也九五以剛乗剛居中得正非自取之道故為无妄之疾也人之有疾以藥石攻其邪然以治豫之貞疾則可治无妄之疾則不可也雲峯胡氏曰豫六五以柔乗剛貞疾固宜无妄九五剛健中正下應柔順中正无妄之至也如是而有疾文王羑里之囚周公流言之變也不殄厥愠亦不殞厥問公孫碩膚徳音不瑕文王周公之疾不藥而自愈矣象曰无妄之藥不可試也傳人之有妄理必修改既无妄矣復藥以治之是反為妄也其可用乎故云不可試也試暫用也猶曰少甞之也本義既已无妄而復藥之則反為妄而生疾矣試謂少甞之也中溪張氏曰无妄而疾又无妄而藥則反為妄而起其疾矣此无妄之藥所以不可試也孔子曰某未達不敢甞聖人不試无妄之藥如此上九无妄行有眚无攸利傳上九居卦之終无妄之極者也極而復行過於理也過於理則妄也一作矣故上九而行則有過眚而无所利矣本義上九非有妄也但以其窮極而不可行耳故其象占如此西溪李氏曰處卦之終其位不正所謂匪正有眚也中溪張氏曰上九居乾之終則純乎天矣苟復動而妄行則失於亢故有過眚而无所利卦辭所謂匪正有眚不利有攸往即指此也漢武漠北之征唐皇雲南之師此爻之謂矣象曰无妄之行窮之災也傳无妄既極而復加進乃為妄矣是窮極而為災害也雲峯胡氏曰六爻皆无妄也特初九得位而為震動之主時之方來故无妄往吉上九失位而居乾體之極時已去矣故其行雖无妄有眚无攸利是故善學易者在識時初曰吉二曰利時也三曰災五曰疾上曰眚非有妄以致之也亦時也初與二皆可往時當動而動也四可貞五勿藥上行有眚時當靜而靜也楊氏文煥曰无妄動以天也拂天而動則妄矣下三爻震體初往吉二利往三行人之得利於動也在下當動動則應天上三爻乾體四可貞五勿藥戒在動也動則拂天上行有眚已之天也動将何之故當動而不動與不當動而動皆妄也夫乾下艮上傳大畜序卦有无妄然後可畜故受之以大畜无妄則為有實故可畜聚大畜所以次无妄也為卦艮上乾下天而在於山中所畜至大之象畜為畜止又為畜聚止則聚矣一有又字取天在山中之象則為藴畜取艮之止乾則為畜止止而後有積故止為畜義朱子曰小畜以㢲之柔順而畜三陽畜他不住大畜則以艮畜乾畜得有力所以喚作大畜趙氏曰乾健上進為艮所止故有畜義艮陽卦也陽為大故曰大畜大小畜所畜皆乾所别者艮㢲耳是故以大畜大謂之大畜隆山李氏曰以隂畜陽所畜之力小故謂之小畜以陽畜陽所畜之力大故謂之大畜大畜利貞不家食吉利渉大川傳莫大於天而在山中艮在上而止乾於下皆藴畜至大之象也在人為學術道徳充積於内乃所畜之大也凡所畜聚皆是専言其大者人之藴畜宜得正道故云利貞若夫異端偏學所畜至多而不正者固有矣既道德充積於内冝在上位以享天禄施為於天下則不獨於一无於字一身之吉天下之吉也若窮處而自食於家道之否也故不家食則吉所畜既大宜施之於時濟天下之艱險乃大畜之用也故利渉大川此只據大畜之義而言彖更以卦之才徳而言諸爻則惟有止畜之義盖易體道隨宜取眀且近者白雲郭氏曰賢不家食禄之也古之人不仕无禄則耕而食之於家也仕而禄足以代耕則不耕矣非家食也建安丘氏曰大畜利貞言所畜者大而利於貞正也不家食吉言賢者當與之共天位享天禄食於朝而不食於家則吉也然有所畜者必有所用有所飬者必有所施賢人又當出而濟天下之艱險以究大畜之才故曰利渉大川利渉者乾健於行也本義大陽也以艮畜乾又畜之大者也又以内乾剛健外艮篤實輝光是以能日新其徳而為畜之大也以卦變言此卦自需而來九自五而上以卦體言六五尊而尚之以卦徳言又能止健皆非大正不能故其占為利貞而不家食吉也又六五下應於乾為應乎天故其占又為利渉大川也不家食謂食禄於朝不食於家也朱子曰大畜利貞不家食吉利渉大川只是占得大畜者為利貞不家食而吉利於渉大川至于剛上尚賢等處乃孔子發明各有所主爻象亦然雲峯胡氏曰大畜大壯皆四陽卦故皆謂之大其占皆曰利貞者大壯而不貞其壯也剛而无禮大畜而不貞其畜也愽而寡要不家食是賢者不畜于家而畜於朝渉大川又似有畜極而通之意要之兩利字一吉字占辭自分而為三不必泥而一之也彖曰大畜剛健篤實輝光日新其徳傳以卦之才徳而言也乾體剛健艮體篤實人之才剛健篤實則所畜能大充實而有輝光畜之不已則其徳日新也本義以卦徳釋卦名義朱子曰篤實便有輝光艮止便能篤實雲峯胡氏曰諸卦艮徳只一止字此則有篤實輝光四字盖大畜之所重者在艮上一爻卦名畜字已具艮止之義此曰篤實艮一陽之所以能畜也曰輝光陽能畜諸中而見諸外也東谷鄭氏曰畜有三義以畜飬言之畜賢也以畜止言之畜健也以藴畜言之畜徳也飬賢以及萬民此畜飬之大者乾天下之至健而四五能畜之此畜止之大者剛健篤實輝光日新其徳此藴畜之大者故彖傳兼此三者言之剛上而尚賢能止健大正也傳剛上陽居上也陽剛居尊位之上為尚賢之義止居健上為能止健之義止乎健者非大正則安能以剛陽在上與尊尚賢徳能止至健皆大正之道也本義以卦變卦體釋卦辭朱子曰能止健都不説健而止見得是艮來止這乾以艮之止止乾之健也中溪張氏曰止健以二德言不曰健而止而曰能止健者盖乾之為物也最健而處於艮之下甘受其畜止而不辭以剛畜剛乃大者之正也故曰大正此釋利貞之義臨川吳氏曰二柔尊尚一剛於已之上其能止健者一剛之大正也而非二柔之小者為之不以止健之功歸之於隂小盖聖人之微意不家食吉飬賢也本義亦取尚賢之象利渉大川應乎天也傳大畜之人所宜施其所畜以濟天下故不食於家則吉謂居天位亨天禄也國家飬賢賢者得行其道也利渉大川謂大有藴畜之人宜濟天下之艱險也彖更發明卦才云所以能渉大川者以應乎天也六五君也下應乾之中爻乃大畜之君應乾而行也所行能應乎天无艱險之不可濟况其他乎本義亦以卦體而言臨川吳氏曰渉險非乾健之力不能六五下應乎乾故能渉大川也雲峯胡氏曰卦有乾體者多曰利渉大川健故也象曰天在山中大畜君子以多識前言往行以畜其徳識如字又音志行下孟反傳天為至大而在山之中所畜至大之象君子觀象以大其藴畜人之藴畜由學而大在多聞前古聖賢之言與行考跡以觀其用察言以求其心識而得之以畜成其德乃大畜之義也本義天在山中不必實有是事但以其象言之耳雙湖胡氏曰天包地外地外有天山雖在地上然地下之天即山中有天也中字只作下字觧如地中有山雷在地中以卦體言只是下義鶴山魏氏曰天在山中譬則心之體也聞一言焉見一行焉審問而謹思明辨而篤行即所以畜其心之徳盖畜故乃所以飬新而新非自外至也昭昭之多止於所不見是以愈畜而愈大建安丘氏曰風以氣畜氣息則散故風行天上為小畜山以形畜形畜則固故天在山中為大畜大畜言畜徳小畜言懿文徳畜徳雖同而文徳則徳之小者也初九有厲利已已夷止反傳大畜艮止畜乾也故乾三爻皆取被止一作止之為義艮三爻皆取止之為義初以陽剛又健體而居下必上進者也六四在上畜止於已安能敵在上得位之勢若犯之而進則有危厲故利在已而不進也在他卦則四與初為正應相援者也在大畜則相應乃為相止畜上與三皆陽則為合志盖陽皆上進之物故有同志之象而无相止之義本義乾之三陽為艮所止故内外之卦各取其義初九為六四所止故其占往則有危而利於止也中溪張氏曰初九乾體志於上進六四下與之應而畜止之四雖柔而止體當畜之時剛不能進初若恃其陽剛方銳之勢而欲遽往則為所畜制而有厲矣故曰有厲利已子夏傳曰居而俟命則利往而違上則厲雲峯胡氏曰他卦取隂陽相應此取相畜内卦受畜以自止為義外卦能畜以止之為義獨三與上居内外卦之極畜極而通不取止義象曰有厲利己不犯災也傳有危則宜已不可犯災危而行也不度其勢而進有災必矣中溪張氏曰厲災也惟已故不犯九二輿說輹說吐活反輹音服又音福傳二為六五所畜止勢不可進也五據在上之勢豈可犯也二雖剛健之體然其處得中道故進止无失雖志於進度其勢之不可則止而不行如車輿脱去一有其字輪輹謂不行也本義九二亦為六五所畜以其處中故能自止而不進有此象也雲峯胡氏曰初剛居剛性欲上進曰利已者勉其止也二剛中自能止而不行可謂知時者矣漢上朱氏曰初剛正也二剛中也四五柔也柔能畜剛剛知其不可遽犯而安之時也夫氣雄九軍者或屈於賔贊之儀才力盖世者或聽於委裘之命故曰大畜時也童溪王氏曰小畜之九三見畜於六四而曰輿說輻四說其輻也大畜之九二受畜於六五又曰輿說輹是自說其輹也夫說人之輻與自說其輹語其勢之逆順盖有間矣何者九三剛過而九二則剛得中故也剛而得中則進止无失故象釋之曰中无尤也蘭氏廷瑞曰小畜以一隂而畜五陽而六四為小畜之主近畜九三以小畜大以隂畜陽又非正應所以九三不受畜而有夫妻反目之象大畜則艮能止三陽之健九二在下卦之中而止受六五大君所畜以君畜臣以上畜下二五皆中又其正應居中相應何尤之有所以不同也象曰輿說輹中无尤也傳輿說輹而不行者盖其處得中道動不失宜故无過尤也善莫善於剛中柔中者不至於過柔耳剛中中而才也初九處不得中故戒以有危宜已二得中進止自无過差故但言輿說輹謂其能不行也不行則无尤矣初與二乾體剛健而不足以進四與五隂柔而能止時之盛衰勢之強弱學易者所宜深識也息齋余氏曰小畜待隂廹之而後說輻故反目大畜才及中而自說其輹此有知幾之吉彼有來廹之嫌故无尤九三良馬逐利艱貞曰閑輿衛利有攸往曰讀為日傳三剛健之極而上九之陽亦上進之物又處畜之極而思變也與三乃不相畜而志同相應以進者也三以剛健之才而在上者與合志而進其進如良馬之馳逐言其速也雖其進之勢一作志速不可恃其才之健與上之應而忘備與慎也故宜艱難其事而由貞正之道輿者用行之物衛者所以自防當自一无自字日常閑習其車輿與其防衛則利有攸往矣三乾體而居正能貞者也當有銳進故戒以知難與不失其貞一作正也志既銳於進雖剛眀有時而失不得不誡也本義三以陽居健極上以陽居畜極極而通之時也又皆陽爻故不相畜而俱進有良馬逐之象焉然過剛銳進故其占必戒以艱貞閑習乃利於有往也曰當為日月之日朱子曰九三一爻不為所畜而欲進與上九合志同進俱為畜極而通之時故有良馬逐何天之衢亨之象但上九已通達无礙只是滔滔去三過剛銳進故戒以艱貞閑習盖初二兩爻皆為所畜獨九三一爻自進耳問九六為正應皆隂皆陽則為无應獨畜卦不爾何也曰陽遇隂則為隂所畜九三與上九皆陽皆欲上進故但以同類相求也小畜亦然雲峯胡氏曰閑習也日閑猶言時習閑輿衛又因二之輿三之馬取象輿者乗内之二陽衛者防外之二隂良馬逐者上一陽與已同志三逐上以上而下二陽又逐三以進之象也初利已戒其進也二說輹喜其不進也三可進矣而猶戒之艱難貞固日閑習輿衛之事者懼其可進而銳於進也二之輿既說輹而不進三復閑輿衛而不輕進至是則初之利已者三可利往矣平庵項氏曰衛古書之稱皆武衛也考工記周人上輿車有六等之數戈也人也殳也㦸也矛也軫也皆衞名節齋蔡氏曰凡剛進而上遇柔則利遇剛則不利如大壯之四曰藩決不羸大畜之三曰良馬逐皆前遇乎柔也大壯之初曰征凶三曰羝羊觸藩羸其角大畜之初曰有厲利已皆前遇乎剛也象曰利有攸往上合志也傳所以利有攸往者以與在上者合志也上九陽性上進且畜已極故不下畜三而與一有三字合志上進也六四童牛之牿元吉牿古毒反傳以位而言則四下應於初畜初者也初居最下陽之微者微而畜之則易制猶童牛而加牿大善而吉也槩論畜道則四艮體居上位而得正是以正徳居大臣之位當畜之任者也大臣之任上畜止人君之邪心下畜止天下之惡人一无人字人之惡止於初則易既盛而後禁則扞格而難勝故上之惡既甚則雖聖人救之不能免違拂下之惡既甚則雖聖人治之不能免刑戮莫若止之於初如童牛而加牿則元吉也牛之性觝觸以角故牿以制之若童犢始角而加之以牿使觝觸之性不發則易而无傷以況六四能畜止上下之惡於未發之前則大善之吉也程子曰敎人之術若童牛之牿當其未能觸時已先制之其次則豶豕之牙豕之有牙既已難制以百方制之終不能使之改惟豶其勢則自調伏雖有牙亦不能為害如有不率敎之人却須置其檟楚别以道格其心則不須檟楚将自化矣藍田吕氏曰六四六五皆以柔畜剛止健者也牛之剛健在角豕之剛健在牙厚齋馮氏曰小畜之畜乾者六四也九居五為之助者也大畜之畜陽者六四六五也九居上為之助者也夫外无陽爻則坤順而不能畜内无隂爻則同類而不相畜然則成大畜之義者在艮之上九而能畜乾之陽者在艮之六四六五也建安丘氏曰或謂小畜大畜皆以六四下畜乾初在小畜有復自道之吉在大畜有有厲利已之戒何也曰小畜以㢲畜乾㢲隂卦也而四又柔爻故未能畜初大畜以艮畜乾艮陽卦也四雖柔爻而實艮體故初為所畜而不能進二爻雖同為柔而㢲艮畜乾之義異矣本義童者未角之稱牿施横木於牛角以防其觸詩所謂楅衡者也止之於未角之時為力則易大善之吉也故其象占如此學記曰禁於未發之謂豫正此意也朱子詩傳曰楅衡施於牛角所以止觸也周禮封人凡祭飾其牛牲設其楅衡學記禁於未發之謂豫注云豫者先事之謂雲峯胡氏曰祭天地之牛角繭栗童則猶未有角其天全矣此時牿之禁於未發者也用力甚易故其占大善而吉象曰六四元吉有喜也傳天下之惡已盛而止之則上勞於禁制而下傷於刑誅故畜止於微小之前則大善而吉不勞而无傷故可喜也四之畜初是也上畜亦然六五豶豕之牙吉豶符云反傳六五居君位止畜天下之邪惡夫以億兆之衆發其邪欲之心人君欲力以制之雖宻法嚴刑不能勝也夫物有總攝事有機㑹聖人操得其要則視一无視字億兆之心猶一心道之斯行止之則戢故不勞而治其用若豶豕之牙也豕剛躁之物而牙為猛利若強制其牙則用力勞而不能止其躁猛雖縶之維之不能使之變也若豶去其勢則牙雖存而剛躁自止其用如此所以吉也君子發豶豕之義知天下之惡不可以力制也則察其機持其要塞絶其本原故不假刑法嚴峻而惡自止也且如止盜民有欲心見利則動苟不知敎而廹於飢寒雖刑殺日施其能勝億兆利欲之心乎聖人則知所以止之之道不尚威刑而修政敎使之有農一作耕桑之業知㢘恥之道雖賞之不竊矣故止惡之道在知其本得其要而已不嚴刑於彼而修政於此是猶患牙之利不制其牙而豶其勢也程子曰豶豕之牙豕牙最能嚙害人只制其牙如何制得今人為惡却只就他惡禁之便无由禁止此見聖人機㑹處進齋徐氏曰牡豕曰豭攻其特而去之曰豶所以去其勢也豕之害物在牙人不能去其牙之猛利惟去其勢以絶其剛躁之性則牙雖存亦不能害物矣豕牙二也豶之者五也二陽已壯則難制五得其要領而能制也制於已壯之後猶欲去豕牙之害而豶之此用柔畜剛之道也本義陽已進而止之不若初之易矣然以柔居中而當尊位是以得其機㑹而可制故其象如此占雖吉而不言元也朱子曰大畜下三爻取其能自畜而不進上三爻取其能畜彼而不使進然四能止之於初故為力易五則陽己進而止之則難但以柔居尊得其機㑹可制故亦吉但不能如四之元吉耳雲峯胡氏曰初之陽未進而止之用力猶易二陽己進則亦難矣六五柔中居尊故得其機㑹而可制如豶豕然然已不如初之易故曰吉而不如初之元吉也或曰牛與豕皆隂物而以象陽者何也曰牛之剛在角豕之剛在牙四五下畜二剛盖取牿牛防其角豶豕防其牙之象也象曰六五之吉有慶也傳在上者不知止惡之方嚴刑以適民欲則其傷甚而无功若知其本制之有道則不勞无傷而俗革天下之福慶也上九何天之衢亨傳予聞之胡先生曰天之衢亨誤加何字事極則反理之常也故畜極而亨小畜畜之小故極而成大畜畜之大故極而散極既當變又陽性上行故遂散也天衢天路也謂虚空之中雲氣飛鳥往來故謂之天衢天衢之亨謂其亨通曠濶无有蔽阻也在畜道則變矣變而亨非畜道之亨也本義何天之衢言何其通逹之甚也畜極而通豁達无礙故其象占如此朱子曰何天之衢亨或如伊川說衍一何字亦不可知陳氏􅆏曰陽久被抑今而亨通故曰何訝之也實喜之也雙湖胡氏曰艮為徑路衢亦路也在上故為天衢厚齋馮氏曰五天位也上位乎天之上乾三陽上達于此之路故曰天衢雲峯胡氏曰隨畜隨發不足為大畜惟畜之極而通豁達无礙如天衢然何之一字讚之之辭也盖曰是何通達之甚如此也此不徒為仕者之占大學章句所謂用力之久一旦豁然貫通者亦是此意多識前言往行以畜其徳者以之可也象曰何天之衢道大行也傳何以謂之天衢以其无止礙道路大通行也以天衢非常語故象特設問曰何謂天之衢以道路大通行取空豁之狀也以象有何字故爻下亦誤加之開封耿氏曰下體受畜者也上體畜下者也受畜者至於九三則良馬逐矣无復如初二也畜下者至於上九則天衢亨矣无復如四五也白雲郭氏曰觀童牛之牿則知有厲利已矣觀豶豕之牙則知輿說輹矣觀良馬逐則知何天之衢亨矣盖乾健為艮所止是以三爻各相類建安丘氏曰大畜六爻上三爻艮為畜者也下三爻乾受畜者也初與四應受四之畜者故初言有厲利己四言童牛之牿二與五應受五之畜者故二言輿說輹而五言豶豕之牙此四爻皆已成畜者也至三與上應始與上合志而同進故三言良馬逐而上言天衢亨也畜而至此畜道散矣震下艮上傳頤序卦物畜然後可飬故受之以頤夫物既畜聚則必有以飬之无飬則不能存息頤所以次大畜也卦上艮下震上下二陽爻中含四隂上止而下動外實而中虗人頤頷之象也頤飬也人口所以飲食飬人之身故名為頤聖人設卦推飬之義大至於天地飬育萬物聖人飬賢以及萬民與人之飬生飬形飬徳飬人皆頤飬之道也動息節宣以飬生也飲食衣服以飬形也威儀行義以飬徳也推己及物以飬人也頤貞吉觀頤自求口實傳頤之道以正則吉也人之飬身飬徳飬人飬於人皆以正道則吉也天地造化飬育萬物各得其宜者亦正而已矣觀頤自求口實觀人之所頤與其自求口實之道則善惡吉凶可見矣平庵項氏曰頤貞吉總言一卦之義觀頤自求口實乃觀頤之道中溪張氏曰觀頤者觀其所飬之道於人也主上下二陽言陽為實唯實故能飬人自求口實者觀其自飬之道於已也主中四隂而言隂為虗唯虗故求口實陽實則能飬隂隂虗則受飬於陽頤飬之道當以靜為本靜則知止而不妄求所以得貞而吉一累於動専為口體之奉則失所飬之正而凶矣本義頤口旁也口食物以自飬故為飬義為卦上下二陽内含四隂外實内虗上止下動為頤之象飬之義也貞吉者占者得正則吉觀頤謂觀其所飬之道自求口實謂觀其所以飬身之術皆得正則吉也朱子曰頤須是正則吉何以觀其正不正盖觀頤是觀其飬徳是正不正自求口實是又觀其飬身是正不正未說到飬人處問觀其所飬之道觀其所以飬身之術曰所飬之道如學聖賢之道則為正黄老中商則為非凡見於修身行義皆是也所飬之術則飲食起居是也建安丘氏曰頤頷也飬也輔上九之象車初九之象中四隂衆齒之象上覆下承衆齒森然全頤之象見矣隆山李氏曰頤中有物曰噬嗑頤中有物則害其所以為飬故不取頥飬之義而頤中之虗元未有物則以貞吉告之方其未受外物之間要當擇其所飬故正則吉不正則不吉也彖曰頤貞吉飬正則吉也觀頤觀其所飬也自求口實觀其自飬也傳貞吉所飬者正則吉也所飬謂所飬之人與飬之之道自求口實謂其自求飬身之道皆以正則吉也臨川吴氏曰所飬飬人自飬飬己平庵項氏曰觀其所飬指上九言觀其自飬指初九言初上二陽上下兩卦之主爻也非夫子贊辭明白則後儒必不分作飬己飬人兩條也雲峯胡氏曰槃澗董氏嘗問朱子曰本義謂觀頤觀其所飬之道自求口實觀其所以養身之術與程傳以觀頤為所以飬人之道自求口實謂所以自飬之道如何朱子沉吟良久曰程傳似勝盖下體三爻皆是自飬上體三爻皆是飬人先人而後己者君子觀頤之象自上而下於上體則觀其所以飬人者於下體則求其所以自飬者要在皆得正則吉爾本義釋卦辭朱子曰觀其所飬亦只是說君子之所飬飬浩然之氣模様自飬則如爵祿下至飲食之類是說自求口實又曰這兩句是觧飬正則吉所飬之道與飬生之術正則吉不正則不吉隆山李氏曰古之觀人每毎觀其所飬而所飬之大小則必以其所自飬者觀之夫重道義之飬而畧口體此飬之大者也急口體之飬而輕道義此飬之小者也飬其大體則為大人飬其小體則為小人天之賦予初無小大之别而人之所飬各殊則其所成就者亦異開封耿氏曰不觀其飬心之大而觀其自求口實何也人之所以忘其大體者以從事於口體之飬也口體之飬求不失飬則飬其大體可知矣是以觀其自求口實足以知其自飬矣天地飬萬物聖人飬賢以及萬民頤之時大矣哉傳聖人極言頤之道而贊其大天地之道則飬育萬物飬育萬物之道正而已矣聖人作飬賢才與之共天位使之食天祿俾施澤於天下飬賢以及萬民也飬賢所以飬萬民也夫天地之中品物之衆非飬則不生聖人裁成天地之道輔相天地之宜以飬天下至於鳥獸草木皆有飬之之政其道配天地故夫子推頤之道贊天地與聖人之功曰頤之時大矣哉或云義或云用或止云時以其大者也萬物之生與飬時為大故云時本義極言飬道而贊之龜山楊氏曰頤之義飬也而以貞正為道天地飬萬物失其正則隂陽繆戾而物不遂其生矣聖人飬賢不以正則賢者不安其位而民不被其澤矣夫天地之飬物聖人之飬賢與人之自飬各當其可然後得其正得其正而後吉則頤之時豈不大矣哉象曰山下有雷頤君子以慎言語節飲食傳以二體言之山下有雷雷震於山下山之生物皆動其根荄發其萌芽為飬之象以上下之義言之艮止而震動上止下動頤頷之象一有也字以卦形言之上下二陽中含一无含字四隂外實中虗頤口之象口所以飬身也故君子觀其象以飬其身慎言語以飬其徳節飲食以飬其體不唯就口取飬一无飬字義事之至近而所繋至大者莫過於言語飲食也在身為言語於天下則凡命令政敎出於身者皆是慎之則必當而无失在身為飲食於天下則凡貨資財用飬於人者皆是節之則適宜而无傷推飬之道一有則字飬徳飬天下莫不然也本義二者飬徳飬身之切務朱子曰諺云禍從口出病從口入甚好此語前軰曽用以解頤之象慎言語節飲食中溪張氏曰慎言語所以飬其徳也出而動者為言語不慎則妄出而招禍節飲食所以飬其體也入而動者為飲食不節則妄入而致疾皆取止其動為義西山真氏曰頤之為義在天地則飬萬物在聖人則飬賢以及萬民功用至博大也而象獨以言語飲食為言何哉盖己得其飬然後可推以及人未有不先成吾身而能逹之天下者也白圭有詩南容復之金人有銘孔門識之可不謹乎三爵之過猶為非禮萬錢之奉適以賈禍可不節乎曰謹曰節云者皆飬之之功也誠齋楊氏曰慎言非默當其可則諫死不羡括囊節食非矯當其可則采薇不羡林肉初九舎爾靈龜觀我朶頤凶舎音捨傳蒙之初六蒙者也爻乃主發蒙而言頤之初九亦假外而言爾謂初也舎爾之靈龜乃觀我而朶頤我對爾而設初之所以朶頤者四也然非四謂之也假設之辭爾九陽體剛明其才智足以飬正者也龜能咽息不食靈龜喻其明智而可以不求飬於外也才雖如是然以陽居動體而在頤之時求頤人所欲也上應於四不能自守志在上行說所欲而朶頤者也心既動則其自失必矣迷欲而失己以陽而從隂則何所不至是以凶也朶頤為朶動其頤頷人見食而欲之則動頤垂涎故以為象本義靈龜不食之物朶垂也朶頤欲食之貌初九陽剛在下足以不食乃上應六四之隂而動於欲凶之道也故其象占如此朱子曰凡卦中說龜底不是正得個離卦必是伏個離卦如觀我朶頤卦雖无離卦却是伏得這卦進齋徐氏曰以頤二體合而觀之似乎離體之中虗離為龜惟虗故靈故曰靈龜龜能咽息不食以氣自飬可以不求飬於外者也爾者初也我者四也舎爾觀我若四語初之辭也靈龜以靜而為飬朶頤以動而為飬朶動也初九居震體之下亦足以為自飬之賢而不必求飬於人今乃舎爾靈龜而朶頤於我失其靜飬之道而溺於動飬之欲雖與四為正應不能自守乃仰觀六四而朶頤是陽說乎隂而動念垂涎矣孔子曰棖也慾焉得剛苟誠剛也則豈屈於欲哉雲峯胡氏曰觀三五皆曰觀我各指本爻而言此曰觀我獨指外爻而言何也盖如靈龜可貴也自不知貴故爾之在此者為爾則在彼者反為主而以我稱矣中孚九二曰我有好爵吾與爾靡之此為我則彼為爾爾我二字理欲内外之分如此其嚴矣哉象曰觀我朶頤亦不足貴也傳九動體朶頤謂其說隂而志動既為欲所動則雖有剛健明智之才終必自失故其才亦不足貴也人之貴乎剛者為其能立而不屈於欲也貴乎明者為其能照而不失於正也既惑所欲而失其正何剛明之有為可賤也中溪張氏曰初九陽本可貴而累於動體從慾而動則飲食之人人皆賤之烏得而不凶此樂正子之徒餔啜所以見斥於孟子也平庵項氏曰亦不足貴者示其本貴也六二顛頤拂經于丘頤征凶傳女不能自處必從男隂不能獨立必從陽二隂柔不能自飬待飬於人者也天子飬天下諸侯飬一國臣食君上之祿民頼司牧之飬皆以上飬下理之正也二既不能自飬必求飬於剛陽若反下求於初則為顛倒故云顛頤顛則拂違經常不可行也若求飬于丘則往必有凶丘在外而髙之物謂上九也卦止二陽既不可顛頤于初若求頤于上九往則有凶在頤之時相應則相飬者也上非其應而往求飬非道妄動是以凶也顛頥則拂經不獲其飬爾妄求於上往則得凶也今有人才不足以自飬見在上者勢力足以飬人非其族類妄往求之取辱得凶必矣六二中正在他卦多吉而凶何也曰時然也隂柔既不足以自飬初上二爻皆非其與故往來則悖理而得凶也本義求飬於初則顛倒而違於常理求飬於上則往而得凶丘土之髙者上之象也雲峯胡氏曰初上二陽衆隂所資以飬者也二在初之上反受飬於初則為顛頤又違五正應則為拂經若往而求飬於上必有凶六二在他卦為柔順中正在頤則為動於口體初動於六四二則下為初九所動上為上九所動兩有所從一无所利艮為山上九在外而髙有丘象雙湖胡氏曰二之顛頤與四同拂經與五同而吉凶異者頤飬之道以安靜為无失二動體故顛拂而凶四五靜體故雖顛拂亦吉震三爻凶艮三爻吉可見矣象曰六二征凶行失類也傳征而從上則凶者非其類故也往求而失其類得凶宜矣行往也本義初上皆非其類也雲峯胡氏曰初上二陽皆非其應故曰失類六三拂頤貞凶十年勿用无攸利傳頤之道唯正則吉三以隂柔之質而處一有又字不中正又在動之極是柔邪不正而動者也其飬如此拂違於頤之正道是以凶也得頤之正則所飬皆吉求飬飬人則合於義自飬則成其徳三乃拂違正道故戒以十年勿用十數之終謂終不可用无所往而利也本義隂柔不中正以處動極拂於頤矣既拂於頤雖正亦凶故其象占如此雙湖胡氏曰六三不正而云貞凶者盖謂拂頤之常理雖貞且凶況不正乎其凶必矣雲峯胡氏曰諸家多以為拂頤之貞故凶本義謂既拂於頤雖正亦凶盖謂之拂頥貞凶疑與拂經同意但曰拂頤則又不止拂經而已雖貞亦凶況不貞乎三隂柔不中正又居動極人皆求頤於上三獨拂之而隨下體之動是自拂於頤矣故不但曰凶且曰十年勿用无攸利下三爻皆動故凶三動之極故貞十數之終互坤象象曰十年勿用道大悖也傳所以戒終不可用以其所由之道大悖義理也中溪張氏曰悖釋拂義六四顛頤吉虎視耽耽其欲逐逐无咎傳四在人上大臣之位六以隂居之隂柔不足以自飬況飬天下乎初九以剛陽居下在下之賢也與四為應四又柔順而正是能順於初賴初之飬也以上飬下則為順今反求下之飬顛倒也故曰顛頥然已不勝其任求在下之賢而順從之以濟其事則天下得其飬而已无曠敗之咎故為吉也夫居上位者必有一作其才徳威望為下民所尊畏則事行而衆心服從若或下易其上則政出而人違刑施而怨起輕於陵犯亂之由也六四雖能順從剛陽不廢厥職然質本隂柔賴人以濟人之所輕故必飬其威嚴耽耽然如虎視則能重其體貎下不敢易又從於人者必逐逐相繼而不乏則其事可濟若取於人而无繼則困竆矣既有威嚴又所施不竆故能无咎也二顛頤則拂經四則吉何也曰二在上而反求飬於下下非其應類故為拂經四則居上位以貴下賤使在一无在字下之賢由已以行其道上下之志相應而一有澤字施於民何吉如之自三以下飬口體者也四以上飬徳義者也以君而資飬於臣以上位而賴飬於下皆飬徳也本義柔居上而得正所應又正而賴其飬以施於下故雖顛而吉虎視耽耽下而専也其欲逐逐求而繼也又能如是則无咎矣朱子曰頤六四一爻理㑹不得雖是恁地解畢竟曉不得如何是施於下又如何是虎六五隂柔之才但守正則吉故不可以渉患難問虎視耽耽本義以為下而専也盖賴其飬以施於下必有下専之誠方能无咎程傳作欲立威嚴恐未必然曰頤卦難看正謂此等且虎視耽耽必是此象但今未曉耳董銖曰音辯載馬氏云耽耽虎下視貌則當為下而専矣曰然又問其欲逐逐如何曰求飬於下以飬人必當繼繼求之不厭乎數然後可以飬人而不竆不然則所以飬人者必无繼矣以四而賴飬於初亦是顛倒但是求飬以飬人所以雖顛而吉南軒張氏曰虎視常垂首按荀九家易艮有虎象頤川吳氏曰隂柔不能自飬而求飬在下之正應如在上之人才有不足而求益於在下之賢以飬其徳者夫求飬於外者莫如虎虎視常下四之於初其下賢求益之心必如虎之視下求食而後可其視下也専一而不他其欲食也繼續而不歇如是則於人不貳於己不自足乃得居上求下之道苟下賢之心不専則賢者不樂告以善矣求益之心不繼則未少有得而止矣雲峯胡氏曰二與四柔順得正皆曰顛頤而吉凶不同何也卦有二陽衆隂所資以飬者二下比初之陽又欲上求上之陽兩用其心故凶六四柔順唯知下應初剛上非其應也虎視耽耽下視初九之陽而専不以上之陽間之也其欲逐逐求於初之陽者不己也求飬於下以飬人求之既專又繼繼求之不厭乎數故其飬人不窮非特吉且无咎矣象曰顛頤之吉上施光也施始䜴反傳顛倒求飬而所以吉者盖得剛陽之應以濟其事致已居上之徳施光明被于天下吉孰大焉六五拂經居貞吉不可渉大川傳六五頤之時居君位飬天下者也然其隂柔之質才不足以飬天下上有剛陽之賢故順從之賴其飬己以濟天下君者飬人者也反賴人之飬是違拂於經常既以己之不足而順從於賢師傅上師傅之位也必居守貞固篤於委信則能輔翼其身澤及天下故吉也隂柔之質元貞剛之性故戒以能居貞則吉以隂柔之才雖倚賴剛賢能持循於平時不可處艱難變故之際故云不可渉大川也以成王之才不至甚柔弱也當管蔡之亂幾不保於周公況其下者乎故書曰王亦未敢誚公賴二公得終信故艱險一作難之際非剛明之主不可恃也不得已而濟艱險者則有矣發此義者所以深戒於為君也於上九則據為臣致身盡忠之道言故不同也本義六五隂柔不正居尊位而不能飬人反賴上九之飬故其象占如此朱子曰六五居貞吉猶洪範用靜吉用作凶所以不可涉大川六五不能飬人反賴上九之飬是以拂其常矣故守常則吉而渉險阻則不可也此卦下體三爻皆是自飬上體三爻皆是飬人不能自求所飬而求人以飬己則凶故下三爻皆凶求於人以飬其下雖不免於顛拂畢竟皆好故上三爻皆吉古為徐氏曰上飬下者常也五以君位无剛健之徳不足以飬天下方待上九之飬亦拂其常者也於是獨不言頤而於上九言由頤其意微矣瀘川毛氏曰六五君也飬人者其事也飬賢者其道也而爻則隂也二者胥失之是拂其常者也无事猶可以分相縻故曰居貞吉欲有所為則難以濟矣故曰不可渉大川雲峯胡氏曰二與四言顛頤者皆在初之上而反求飬於初也五與二皆言拂經者二五相應經也今則二拂五而求飬於初五拂二而求飬於上也五獨不言頤者由豫在九四故五獨不言豫由頤在上九故五獨不曰頤也然彼貞疾而此居貞吉彼在豫之時以柔乗剛此在頤之時以柔乗剛也六二亦拂頤而彼曰凶此曰吉者何也下三爻動皆凶上三爻靜皆吉故曰征凶動而凶也曰居貞吉靜而吉也居貞吉猶云用靜吉謂自養可也不可渉大川猶云用作凶謂欲以飬人不可也艮為止有居之象象曰居貞之吉順以從上也傳居貞之吉者謂能堅固順從於上九之賢以飬天下也中溪張氏曰五不恃其尊能柔順以從上九之賢賴之以飬天下真聖人飬賢以及萬民之事也然六二拂經而凶者以動而求上也六五拂經而吉者以靜而從上也上九由頥厲吉利渉大川傳上九以剛陽之徳居師傅之任六五之君柔順而從於己賴已之飬是當天下之任天下由之以飬也以人臣而當是任必常懐危厲則吉也如伊尹周公何嘗不憂勤兢畏故得終吉夫以君之才不足而倚賴於己身當天下一有之字大任宜竭其才力濟天下之艱危成天下之治安故曰利渉大川得君如此之専受任如此之重苟不濟天下艱危何足稱委遇而謂之賢乎當盡誠竭力而不顧慮然惕厲則不可忘也本義六五頼上九之飬以飬人是物由上九以飬也位髙任重故厲而吉陽剛在上故利渉川建安丘氏曰飬人之權在五而已居其上為衆所歸位髙任重易失之專故必以危厲處之而後得吉也雲峯胡氏曰六五君也君不能飬人而賴上九之飬以飬天下是上九者頤之由五不利渉大川而上則利渉大川五柔而上剛也隆山李氏曰豫九四曰由豫者即由頤之謂也由豫在四猶下於五也而已有可疑之迹乃今由頤在上則過中而嫌於不安故厲然艮止之性雖使之當權亦必不致於侵暴以招凶而況君子居此要之以仁徳為飬使天下皆被其澤何嫌之有故由豫則終於勿疑由頤則雖厲而吉也此非周公之才徳不足以勝也象曰由頤厲吉大有慶也傳若上九之當大任如是能兢畏如是天下被其徳澤是大有福慶也朱子曰頤卦下三爻是資人以為飬上三爻是飬人六四六五雖是資初與上之飬其實是他居尊位藉人以飬而又推以飬人故此三爻以都是飬人之事厚齋馮氏曰頤者飬也飬人亦所以自飬也六爻之中動而從人以求飬者皆凶靜而受人之飬者皆吉隆山李氏曰頤六爻上三爻皆吉下三爻皆凶盖下體震易失於妄動上體艮知止其所當止故也觀此則君子之所飬當如何哉西溪李氏曰口容止故頥貴止不貴動而艮上三爻皆吉震下三爻皆凶建安丘氏曰陽實隂虗實者飬人虗者求人之飬故四隂皆求飬於陽者然飬之權在上是二陽爻又以上為主而初陽亦求飬者也故直於上九一爻曰由頥焉周易傳義大全卷十
