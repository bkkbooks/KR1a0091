body:
  text: 周易傳義大全卷七明胡廣等撰坤下震上傳豫序卦有大而能謙必豫故受之以豫承二卦之義而為次也有既大而能謙則有豫樂也豫者安和悦樂之義為卦震上坤下順動之象動而和順是以豫也九四為動之主上下羣陰所共應也坤又承之以順是以動而上下順應故為和豫之義以二象言之雷出於地上陽始潛閉一作閉潛於地中及其動而出地奮𤼵其聲通暢和豫故為豫也程子曰豫者備豫也逸豫也事豫故逸樂其義一也王氏大寳曰豫以和樂主義和而不備則乖戾隨之故有備豫之義和而不飭則驕怠生焉故又有豫怠之義卦辭云利建矦行師雖主人心和樂而言亦有豫備飭豫之意豫利建侯行師傳豫順而動也豫之義所利在於建侯行師夫建侯樹屏所以共安天下諸侯和順則萬一作兆民悦服兵師之興衆心和悦則順從而有功故悦豫之道利於建侯行師也又上動而下順諸侯從王師衆順令之象君萬邦聚大衆非和悦不能使之服從也本義豫和樂也人心和樂以應其上也九四一陽上下應之其志得行又以坤遇震為順以動故其卦為豫而其占利以立君用師也朱子曰建侯行師順動之大者雲峰胡氏曰建萬國聚大衆非順理而動使人心皆和樂而從不可也中溪張氏曰坤下震上為豫地以靜鎭建侯也雷以威動行師也建安丘氏曰屯有震无坤則言建侯而不言行師謙有坤无震則言行師而不言建侯豫卦合震坤成體故兼言之彖曰豫剛應而志行順以動豫傳剛應謂四為羣陰所應剛得衆應也志行謂陽志上行動而上下順從其志得行也順以動豫震動而坤順為動而順理順理而動又為動而衆順所以豫也本義以卦體卦德釋卦名義嵩山晁氏曰剛應志行以爻言豫之才也順以動豫以卦言豫之德也雲峰胡氏曰小畜與豫皆以四為主小畜剛中而志行是釋卦義亨字此剛應而志行是釋卦名豫字小畜一陰畜五陽陽之志自行故亨豫則五陰皆應一陽陽之志得行故豫皆扶陽之意也豫順以動故天地如之而况建侯行師乎傳以豫順而動則天地如之而弗違况建侯行師豈有不順乎天地之道萬物之理唯至順而已大人所以先天後天而不違者亦順乎理而已本義以卦德釋卦辭西溪李氏曰建侯行師六爻无此意故彖以一卦之德言之天地以順動故日月不過而四時不忒聖人以順動則刑罰清而民服傳復詳言順動之道天地之運以其順動所以日月之度不過差四時之行不愆忒聖人以順動故經正而民興於善刑罰清簡而萬民服也厚齋馮氏曰日月之行景長不過南陸短不過北陸故分至啓閉不差其序以順陰陽之氣而動也朱子曰刑罰不清民不服只為舉動不順了致得民不服便是徒配了他亦不服豫之時義大矣哉傳旣言豫順之道矣然其㫖味淵永言盡而意有餘也故復贊之云豫之時義大矣哉欲人研味其理優柔涵泳而識之也時義謂豫之時義諸卦之時與義用大者皆贊其大矣哉豫以下十一卦是也豫遯姤旅言時義坎睽蹇言時用頤大過解革言時各以其大者也本義極言之而贊其大也朱子曰豫之時義言豫之時底道理雲峰胡氏曰頤大過解革言時坎睽蹇言時用豫隨遯旅姤言時義凡十二卦釋彖之已言者又復推廣彖所未言者於是極言以贊其大欲人涵泳於言意之表卽如乾之文言是也隆山李氏曰自豫以下凡十二卦或言時義或言時用或只言時各隨卦體而贊之初无異義未有有時而无義有義而无用者也要之時義特用共歸於大哉者均所以為推廣之意嘗觀彖辭因論天地聖人王公則多有是言所以廣言之也不如是拘隘而不通矣學易者從羲文以探其始從孔子以要其終其庻幾知易之道乎象曰雷出地奮豫先王以作樂崇德殷薦之上帝以配祖考傳雷者陽氣奮𤼵陰陽相薄而成聲也陽始潛閉地中及其動則出地奮震也始閉鬱及奮𤼵則通暢和豫故為豫也坤順震𤼵和順積中而𤼵於聲樂之象也先王觀雷出地而奮和暢𤼵於聲之象作聲樂以褒崇功德其殷盛至於薦之上帝推配之以祖考殷盛也禮有殷奠謂盛也薦上帝配祖考盛之至也本義雷出地奮和之至也先王作樂旣象其聲又取其義殷盛也朱子曰先王作樂无處不用然用樂之大者尤在於薦上帝配祖考也問崇德是自崇其德如大韶大武之類是否曰是涑水司馬氏曰雷出地者春分候也春分之時雷迅出地以動萬物萬物莫不奮迅悦豫而從之也豫喜意也作樂所以飾喜也薦之上帝以配祖考用樂之盛者𤓰山潘氏曰樂之為用朝覲聘享祭祀各有所主惟郊祀上帝則大合古今衆樂而奏之大司樂圜丘之奏樂極九變是也故曰殷薦之上帝以配祖考郊祀后稷以配天配以祖也宗祀文王於明堂以配上帝配以考也雲峰胡氏曰本義云象其聲者樂之聲法雷之聲又取其義者豫以和為義雷所以𤼵揚化功而鼓天地之和樂所以𤼵揚功德而召神人之和也東萊呂氏曰履為易中之禮豫為易中之樂進齋徐氏曰先王之一動一靜皆禮以奉天從事方雷在地中伏而未𤼵則以之閉關商旅不行而后不省方法其靜也及出也奮而成聲則以之作樂崇德薦上帝而配祖考法其動也曰閉曰不行曰不省皆靜之意曰作曰崇曰薦配皆動之意也初六鳴豫凶傳初六以陰柔居下四豫之主也而應之是不中正之小人處豫而為上所寵其志意滿極不勝其豫至𤼵於聲音輕淺如是必至於凶也鳴𤼵於聲也本義陰柔小人上有强援得時主事故不勝其豫而以自鳴凶之道也故其占如此卦之得名本為和樂然卦辭為衆樂之義爻辭除九四與卦同外皆為自樂所以有吉凶之異或問豫初六與九四為應九四由豫大有得本亦自好但初六恃有强援不勝其豫至於自鳴所以凶否朱子曰九四自好自是初六不好雙湖胡氏曰豫初六即謙上六向也鳴謙今也鳴豫然鳴謙猶有行師之利鳴豫直凶而已信矣豫之不可沉溺如此雲峰胡氏曰爻辭與卦辭不同者三卦辭取同樂之意爻辭除九四外皆為獨樂卦辭只一豫字而爻之言豫者不同初六上六逸豫也六二幾先之豫也六三之遲猶豫也九四和豫也六五之疾弗豫也卦辭主九四曰剛應而志行是以德言至于爻辭則九四以勢位言六三以其有勢位之可慕故上視之以為豫初六以其勢位可以為强援故應之以為豫且不勝其豫而以自鳴凶之道也或曰豫與謙反對謙之上反而為豫之初者也本義於上之鳴謙則曰謙極有聞於初之鳴豫不曰有聞而曰自鳴均之為鳴也何其訓釋之異耶曰謙之極而有聞善不能不聞也豫之初而以豫自鳴志已極矣其惡有聞不言可知也象曰初六鳴豫志窮凶也傳云初六謂其以陰柔一无柔字處下而志意窮極不勝其豫至於鳴也必驕肆而致一作至凶矣本義窮謂滿極雲峰胡氏曰志不可滿樂不可極初六位卑材弱當豫之初而志已滿極凶可知也六二介于石不終日貞吉傳逸豫之道放則失正故豫之諸爻多不得正才與時合也唯六二一爻處中正又无應為自守之象當豫之時獨能以中正自守可謂特立之操是其節介如石之堅也介于石其介如石也人之於豫樂心悦之故遲遲遂致於耽戀不能已也二以中正自守其介如石其去之速不俟終日故貞正而吉也處豫不可安且乆也乆則溺矣如二可謂見幾而作者也夫子因二之見幾而極言知幾之道曰知幾其神乎君子上交不諂下交不凟其知幾乎幾者動之微吉之先見者也君子見幾而作不俟終日易曰介于石不終日貞吉介如石焉寕用終日斷可識矣君子知微知彰知柔知剛萬夫之望夫見事之幾微者其神妙矣乎君子上交不至於諂下交不至於凟者葢知幾也不知幾則至於過而不已交於上以恭巽故過則為諂交於下以和易故過則為凟君子見於幾微故不至於過也所謂幾者始動之微也吉凶之端可先見而未著者也獨言吉者見之於先豈復至有凶也君子明哲見事之幾微故能其介如石其守旣堅則不惑而明見幾而動豈俟終日也斷别也其判别可見矣微與彰柔與剛相對者也君子見微則知彰矣見柔則知剛矣知幾如是衆所仰也故贊之曰萬夫之望本義豫雖主樂然易以溺人溺則反而憂矣卦獨此爻中而得正是上下皆溺於豫而獨能以中正自守其介如石也其德安靜而堅確故其思慮明審不俟終日而見凡事之幾微也大學曰安而后能慮慮而后能得意正如此占者如是則正而吉矣建安丘氏曰豫諸爻以无所係應者為吉豫初應四而三五比四皆有係者也是以為凶為悔為疾獨六二陰靜而中正與四无係特立於衆陰之中而无遲遲耽戀之意方其靜也則確然自守而介于石及其動也則見幾而作不俟終日葢其所居得正故動靜之間不失其正吉可知矣雲峰胡氏曰諸爻皆溺於豫者惟二五不言豫六五貞疾不得豫也六二貞吉不為豫也初應四三五比四故為凶為悔為疾六二不係於四介乎初與三之間獨以中正自守其堅確如石故豫最易以溺人而六二則不俟終日而去之其德安靜而堅確故能見幾而作葢不為逸豫之豫而知有先事之豫者也象曰不終日貞吉以中正也傳能不終日而貞且吉者以有中正之德也中正故其守堅而能辨之早去之速爻言六二處豫之道為教之意深矣雲峰胡氏曰九四一陽用事初應之而鳴豫三比之而盱豫不中不正也五乘之而貞疾中而不正也六爻之中不係應於四者惟六二中而且正也六三盱豫悔遲有悔盱况于反傳六三陰而居陽不中不正之人也以不中正而處豫動皆有悔盱上視也上瞻望於四則以不中正不為四所取故有悔也四豫之主與之切近苟遲遲而不前則見棄絶亦有悔也葢處身不正進退皆有悔吝當如之何在正身而已君子處已有道以禮制心雖處豫時不失中正故无悔也厚齋馮氏曰三四本近而相得然震動而上坤靜而下上下異趣故有此象東谷鄭氏曰此猶豫之豫故動則取悔本義盱上視也陰不中正而近於四四為卦主故六三上視於四而下溺於豫宜有悔者也故其象如此而其占為事當速悔若悔之遲則必有悔也朱子曰盱豫悔言覻著六四之豫便當速悔遲時便有悔盱豫是句問上視於四而下溺於豫下溺之義如何曰此如人趨時附勢以得富貴而自以為樂者也雲峰胡氏曰二中而得正三陰不中正故盱豫與介石相反遲與不終日相反中正與不中正故也六三雖柔其位則陽猶有能悔意然悔之速可也悔之遲則又必有悔矣此葢溺於逸豫而悔之遲則又猶豫者也中溪張氏曰聖人於六三一爻凡兩言悔者始則示人以致悔之端終則勉人以改過之悔也象曰盱豫有悔位不當也傳自處不當失中正也是以進退有悔臨川呉氏曰六三與六二相反者六二中正而六三不中正也九四由豫大有得勿疑朋盍簪傳豫之所以為豫者由一无由字九四也為動之主動而衆陰悦順為豫之義四大臣之位六五之君順從之以陽剛而任上之事豫之所由也故云由豫大有得言得大行其志以致天下之豫也勿疑朋盍簪四居大臣之位承柔弱之君而當天下之任危疑之地也獨當上之倚任而下旡同德之助所以疑也唯當盡其至誠勿有疑慮則一有其字朋類自當盍聚夫欲上下之信唯至誠而已苟盡其至誠則何患乎其一无乎字一无其字无助也簪聚也簪之名簪取聚髪也或曰卦唯一陽安得同德之助曰居上位而至誠求助理必得之姤之九五曰有隕自天是也四以陽剛迫一作逼近君位而專主乎豫聖人宜為之戒而不然者豫和順之道也由和順之道不失為臣之正也如此而專主於豫乃是任天下之事而致時於豫者也故唯戒以至誠勿疑本義九四卦之所由以為豫者也故其象如此而其占為大有得然又當至誠不疑則朋類合而從之矣故又因而戒之簪聚也又速也朱子曰由豫猶言由頤梅巖袁氏曰莫不由之以致養謂之由頥莫不由之以和悦謂之由豫進齋徐氏曰大剛也由如觀其所由之由豫之所從來也一剛而得五柔故曰大有得居位非正故有疑朋謂衆柔劉氏曰德雖陽而位則陰猶未離其類也故稱朋焉雲峰胡氏曰九四一陽而衆陰皆為其所得故其象曰由豫其占曰大有得然四以陽居陰性易有疑乾九四或躍疑其所當疑故曰或之或之者疑之也許之之辭也豫九四不當疑而疑故曰勿疑戒之之辭也吾惟至誠不疑則一誠之感衆陰之朋自聚而從之簪又訓速也謂不疑則朋之從者自速也此和豫之豫也象曰由豫大有得志大行也傳由已而致天下於樂豫故為大有得謂其志得大行也臨川呉氏曰即彖傳所謂剛應而志行者誠齋楊氏曰神禹集治水之大勲伊尹任伐桀之大事周公决東征之大議此皆大有得之事故曰志大行也六五貞疾恒不死傳六五以陰一无陰字柔居君位當豫之時沉溺於豫不能自立者也權之所生衆之所歸皆在於四四之陽剛得衆非耽惑柔弱之君所能制也乃柔弱不能自立之君受制於專權之臣也居得君位貞也受制於下有疾苦也六居尊位權雖失而位未亡也故云貞疾恒不死言貞而有疾常疾而不死如漢魏末世之君也人君致危亾之道非一而以豫為多在四不言失正而於五乃見其强逼者四本无失故於四言大臣任天下之事之義於五則言柔弱居尊不能自立威權去已之義各據爻以取義故不同也若五不失君道而四主於豫乃是任得其人安享其功如太甲成王也蒙亦以一无以字陰居尊位二以陽為蒙之主然彼吉而此疾者時不同也童蒙而資之於人宜也耽豫而失之於人危亾之道也故蒙相應則倚任者也豫相逼則失權者也又上下之心專歸於四也本義當豫之時以柔居尊沈溺於豫又乘九四之剛衆不附而處勢危故為貞疾之象然以其得中故又為恒不死之象即象而觀占在其中矣厚齋馮氏曰貞疾猶曰痼疾也痼猶固也疾自外入者也六五陰柔當豫之時上下耽於逸樂以天下之事天下之才盡付九四大臣而漫不省此貞疾之證也然四雖剛强猶在下也五雖陰柔猶在上也君臣之名位未亡此恒不死之證也春秋時不唯周存名號而已齊以諸田疾魯以三家疾政在大夫孔子周流列國欲起其疾而无能用者童溪王氏曰六二貞吉以中且正也六五貞疾以雖中不正也當豫之時而不為豫者六二是也當豫之時而不得豫者六五是也雲峰胡氏曰頤之由在上九故六五不可渉大川豫之由在九四故六五貞疾易之言疾者四曰无妄之疾勿藥有喜曰損其疾使遄有喜曰介疾有喜皆言疾之愈而可喜此言貞疾僅得不死爾未可喜也豫最易以溺人六二柔中且正能不終日而去之六五陰柔不正未免溺於豫而有疾矣猶得不死者中未亡也人莫不生於憂患死於逸樂以六五之中僅得不死然則初之鳴三之盱上之冥其不中者皆非生道矣象曰六五貞疾乘剛也恒不死中未亡也傳貞而疾由乘剛為剛所逼也恒不死中之尊位未亡也臨川呉氏曰乘剛而有衰弱之疾則无以御其下矣處上卦之中則位與號猶未亡也周衰之時權歸霸國周雖微弱亦以乆存此爻近之中溪張氏曰正而不死中而未亡者君臣之分不可冺滅故也上六冥豫成有渝无咎傳上六陰柔非有中正之德以陰居上不正也而當豫極之時以君子居斯時亦當戒懼况陰柔乎乃耽肆於豫昬迷不知反者也在豫之終故為昬冥已成也若能有渝變則可以无咎矣在豫之終有變之義人之失苟能自變皆可以无咎故冥豫雖已成能變則善也聖人𤼵此義所以勸遷善也故更不言冥之凶專言渝之无咎本義以陰柔居豫極為昬冥於豫之象以其動體故又為其事雖成而能有渝之象戒占者如是則能補過而无咎所以廣遷善之門也雲峰胡氏曰冥豫與冥升迷復同義聖人不言冥豫之凶而言成有渝之无咎廣遷善之門也事已成而能變猶可无咎則未成而變可知矣初鳴豫即斷之以凶甚於初者所以遏其惡也上冥豫則開之以无咎恕於終者所以開其善也或曰豫上六變則為晉晉明出地上非冥矣象曰冥豫在上何可長也傳昬冥於豫至於終極災咎行及矣其可長然乎當速渝也中溪張氏曰上雖處豫之終昬迷而不知反然在震之極動則有能渝變之理苟能知逸豫之不可長幡然而改安知冥冥者其不昭昭乎建安丘氏曰豫以和豫逸豫為義六爻惟九四由豫與卦辭同至于諸爻皆有心於求豫則失豫之正流為逸豫矣故在豫以四之一陽為主初以應四而豫故曰鳴豫凶三以比四而豫故曰盱豫悔五以乘四而不知所豫故有貞疾恒不死之證上去四雖遠而與震同體則亦冥然為豫而已皆有渉乎四者也惟六二柔順中正與四无係獨能介于石不終日焉葢見幾者也故爻以貞吉歸之豫之不可溺也葢如此進齋徐氏曰豫有三義曰和豫曰逸豫曰備豫大象所言和豫也六爻所言逸豫也豫備不虞卦爻无此義傳曰重門擊柝以待暴客葢取諸豫此備豫也震下兌上傳隨序卦豫必有隨故受之以隨夫悦豫之道物所隨也隨所以次豫也為卦兌上震下兌為説震為動説而動動而説皆隨之義女隨人者也以少女從長男隨之義也又震為雷兌為澤雷震於澤中澤隨而動隨之象也又以卦變言之乾之上來居坤之下坤之初徃居乾之上陽來下於陰也以陽下陰陰必説隨為隨之義凡成卦旣取二體之義又有取爻義者復有更取卦變之義者如隨之取義尤為詳備朱子曰伊川説説而動動而説不是不當説説而動凡卦皆從内説出去葢卦自内生動而説却是若説説而動却是自家説他後動不成隨了我動彼説此之謂隨動而説成隨如巽而止成蠱隆山李氏曰咸隨二卦皆男下女者也咸少男少女陰陽之氣相等而相應故謂之咸隨長男少女陽上於陰可以相制而陰自隨之故謂之隨君子體陽剛之德以立斯世要當使我能轉物而物自隨我不可使物得以轉我而我反隨物此所以岀而應世雖无心於致人而自得於一世之説隨也隨元亨利貞无咎傳隨之道可以致大亨也君子之道為衆所隨與已隨於人及臨事擇所隨皆隨也隨得其道則可以致大亨也凡人君之從善臣下之奉命學者之徙義臨事而從長皆隨也隨之道利在於貞正隨得其正然後能大亨而无咎失其正則有咎矣豈能亨乎本義隨從也以卦變言之本自困卦九來居初又自噬嗑九來居五而自未濟來者兼此二變皆剛來隨柔之義以二體言之為此動而彼説亦隨之義故為隨已能隨物物來隨已彼此相從其通易矣故其占為元亨然必利於貞乃得无咎若所隨不貞則雖大亨而不免於有咎矣春秋傳穆姜曰有是四德隨而无咎我皆无之豈隨也哉今按四德雖非本義然其下云云深得占法之意左傳襄公九年穆姜薨於東宮始徃而筮之遇艮之八史曰是謂艮之隨隨其出也君必速出姜曰亡是於周易曰隨元亨利貞元體之長也亨嘉之㑹也利義之和也貞事之幹也體仁足以長人嘉德足以合禮利物足以和義貞固足以幹事然我不可誣也是以雖隨无咎今我婦人而與於亂固在下位而有不仁不可謂元不靖國家不可謂亨作而害身不可謂利棄位而姣不可謂貞有四德者隨而无咎我皆无之豈隨也哉厚齋馮氏曰震動而兌説隨之所以元亨也元者震也葢乾之一元來為動之主是以亨也九五正中當位所謂利貞也中溪張氏曰隨而得其道則可以致大亨然隨之道利於貞正不正則為詭隨雖大亨而有咎故必大亨而利於正然後无咎亦猶影之隨形響之應聲也雲峰胡氏曰屯臨无妄革皆言元亨利貞不言无咎惟隨則以无咎繼之葢我隨人或為人所隨其事雖大亨非貞固易有咎也况動而説易失於不正其何能无咎不正則隨中有事而蠱患生矣作易者繼之以无咎有深意焉彖曰隨剛來而下柔動而説隨下遐嫁反説音悦本義以卦變卦德釋卦名義大亨貞无咎而天下隨時傳卦所以為隨以剛來而下柔動而説也謂乾之上九來居坤之下坤之初六徃居乾之上以陽剛來下於陰柔是以上下下以貴下賤能如是物之所説隨也又下動而上説動而可悦也所以隨也如是則可一有以字大亨而得正能大亨而得正則為无咎不能亨不得正則非可隨之道豈能使天下隨之乎天下所隨者時也故云天下隨時本義王肅本時作之今當從之釋卦辭言能如是則天下之所從也隨時之義大矣哉傳君子之道隨時而動從宜適變不可為典要非造道之深知幾能權者不能與於此也故贊之曰隨時之義大矣哉凡贊之者欲人知其義之大玩而識之也此贊隨時之義大與豫等諸卦不同諸卦時與義是兩事一作與豫卦以下諸卦不同時義是兩事一作與豫等諸卦不同時與義是兩事程子曰自畫卦垂衣裳至周文方徧只為時也若不是隨時即一聖人岀百事皆做了後來者没事又非聖人智慮所不及只有時不可也龜山楊氏曰夫趨變无常各當其可非夫可與權者其孰能之其義豈不大矣哉節齋蔡氏曰天下所隨者聖人之時而聖人制作又當隨天下之時禮樂法度始於伏羲成於周者豈聖人智慮有所不及哉此隨時之義所以大也本義王肅本時字在之字下今當從之臨川呉氏曰為人之隨者以已從人而已宜若小然於斯時也而思義之大則不以隨為小事而輕且茍矣雲峰胡氏曰今本作隨時之義惟本義從王肅本作隨之時義必如此而後贊時之大者凡十二卦然曰隨時之義則隨字重義字輕曰隨之時義則二字俱重而所謂隨時之義自在其中矣象曰澤中有雷隨君子以嚮晦入宴息傳雷震於澤中澤隨震而動為隨之象君子觀象以隨時而動隨時之宜萬事皆然取其最明且近者言之君子以嚮晦入宴息君子晝則自强不息及嚮昏晦則入居於内宴息以安其身起居隨時適其宜也禮君子晝不居内夜不居外隨時之道也程子曰凡易卦有就卦才而得其義者亦有舉兩體便得其義者隨剛來而下柔動而説隨此是就卦才而得隨之義澤中有雷隨此是就象上得隨之義也問程子云澤隨雷動君子當隨時宴息是否朱子曰旣曰雷動何不言君子以動作却言宴息葢其卦震下兌上乃雷入地中之象雷隨時藏伏故君子亦嚮晦入宴息本義雷藏澤中隨時休息黄氏曰卦爻取隨時而動大象取隨時而息南軒張氏曰隨者非隨時俛仰之謂葢有是事則有是理君子順理而行如嚮晦則入宴息特舉一事之著者言之耳建安丘氏曰雷陽聲也𤼵聲於春夏其動也收聲於秋冬其靜也澤中有雷其秋冬之時乎君子體天行事故動與雷俱出而靜與雷俱入如雷出地奮豫以之作樂崇德雷在天上大壯以之非禮弗履天下雷行无妄以之對時育物皆法雷之動也如雷在地中復以之閉關息旅后不省方澤中有雷隨以之嚮晦宴息皆法雷之靜也或曰周公坐以待旦孔子終夜不寢果嚮晦入宴息之義哉曰嚮晦入宴息者君子隨時之義待旦不寢者聖人救時拯世之心也初九官有渝貞吉出門交有功傳九居隨時而震體且動之主有所隨者也官主守也旣有所隨是其所主守有變易也故曰官有渝貞吉所隨得正則吉也有渝而不得正乃過動也出門交有功人心所從多所親愛者也常人之情愛之則見其是惡之則見其非故妻孥之言雖失而多從所憎之言雖善為惡也茍以親愛而隨之則是私情所與豈合正理故出門而交則有功也出門謂非私暱交不以私故其隨當而有功本義卦以物隨為義爻以隨物為義初九以陽居下為震之主卦之所以為隨者也旣有所隨則有所偏主而變其常矣惟得其正則吉又當出門以交不私其隨則有功也故其象占如此亦因以戒之或問官是主守之義初九是一卦之主首變得正便吉不正便凶朱子曰是如此又曰官有渝隨之初主有變動然尚未深中溪張氏曰官主也渝變也當隨之初剛來下柔為震之主震動也官有渝是主守有變動之象官其事而有渝是隨時而動有所變易不能保其无偏也故必變而從其正則吉出門而交即同人于門之意得隨之正而不牽于私則有功而无失矣雲峰胡氏曰无妄内震故曰主此亦内震故曰官初為動之主有官守者也九之剛能守官者也官本在上今來居於初官之有渝者也官守者不可渝今陽得陽有渝而正矣故吉然必出門以交方為有功否則所隨或昵於私非惟无功且有過咎所謂因以戒之者也象曰官有渝從正吉也傳旣有隨而變必所從得正則吉也所從不正則有悔吝出門交有功不失也傳出門而交非牽於私其交必正矣正則无失而有功六二係小子失丈夫傳二應五而比初隨先於近柔不能固守故為之戒云若係小子則失丈夫也初陽在下小子也五正應在一作居上丈夫也二若志係於初則失九五之正應是失丈夫也一无也字係小子而失丈夫捨正應而從不正其咎大矣二有中正之德非必至如是也在隨之時當為之戒也本義初陽在下而近五陽正應而遠二陰柔不能自守以須正應故其象如此凶吝可知不假言矣朱子曰小子丈夫程傳説是雲峰胡氏曰六柔有係象小子初陽在下象丈夫五陽在上象六二以初陽在近而係之則五陽雖正應必失之矣楊氏曰以剛隨人者謂之隨以柔隨人者謂之係剛有以自立而柔不足以自立也故初九九四九五不言係而六二六三上六皆言係也象曰係小子弗兼與也傳人之所隨得正則遠邪從非則失是无兩從之理二茍係初則失五矣弗能兼與也所以戒人從正當專一也臨川呉氏曰二之中正非必果背五嚮二也但以其近比易於牽係儻若係此則必失彼二者弗能兼與也故爻辭示戒云爾六三係丈夫失小子隨有求得利居貞傳丈夫九四也小子初也陽之在上者丈夫也居下者小子也三雖與初同體而切近於四故係於四也大抵陰柔不能自立常親係於所近者上係於四故下失於初舍初從上得隨之宜也上隨則善也如昏之隨明事之從善上隨也背是從非舍明逐暗下隨也四亦无應无隨之者也近得三之隨必與之親善故三之隨四有求必得也人之隨於上而上與之是得所求也又凡所求者可得也雖然固不可非理枉道以隨於上茍取愛説以遂所求如此乃小人邪諂趨利之為也故云利居貞自處於正則所謂有求而必一无必字得者乃正事君子之隨也本義丈夫謂九四小子亦謂初也三近係四而失於初其象與六二正相反四陽當任而已隨之有求必得然非正應故有不正而為邪媚之嫌故其占如此而又戒以居貞也進齋徐氏曰以六居三不正也以九居四亦不正也以不正相比必至於詭隨故又以居貞為利也雲峰胡氏曰程傳本義皆以初為小子易之例不問陰陽小子皆指初而言隨初九陽稱小子漸初六陰亦稱小子也事有得必有失失於此必有得於彼六二失丈夫失其所不可失也故不言得六三失小子而言有求得失其所當失也失即是得瘡以潰為得病以去為得六二之失乃所以為得也利居貞有三義初九陽居陽貞也故言貞吉六三陰居陽不正故戒之曰利居貞而不言吉三係丈夫固異於二之係小子然四非正應又有所係而隨已非正大之情故不言吉而戒以居貞或曰士之病莫大於有所求三之於四不可以有求必得之故而妄有不正之求也故戒之象曰係丈夫志舍下也舍音捨傳旣隨於上則是其志舍下而不從也舍下而從上舍卑而從高也於隨為善矣建安丘氏曰以陰隨陽舍下隨上不求則已有求必得其志亦可嘉矣但以非其正故戒之九四隨有獲貞凶有孚在道以明何咎傳九四以陽剛之才處臣位之極若於隨有獲則雖正亦凶有獲謂得天下之心隨於已為臣之道當使恩威一出於上衆心皆隨於君若人心從已危疑之道也故凶居此地者奈何唯孚誠積於中動為合於道以明哲處之則又何咎古之人有行之者伊尹周公孔明是也皆德及於一无於字民而民隨之其得民之隨所以成其君之功致其國之安其至誠存乎中是有孚也其所施為无不中道在道也唯其明哲故能如是以明也復何過咎之有是以下信而上不疑位極而无逼上之嫌勢重而无專强一作權之過非聖人大賢則不能也其次如唐之郭子儀威震主而主不疑亦由中有誠孚而處无甚失也非明哲能如是乎本義九四以剛居上之下與五同德故其占隨而有獲然勢陵於五故雖正而凶惟有孚在道而明則上安而下從之可以无咎也占者當時之任宜審此戒白雲郭氏曰六三隨有求得隨人而有得也九四隨有獲以得人之隨為獲也建安丘氏曰豫隨九四皆大臣也豫之有得猶隨之有獲也但豫柔君在上四之志可以行故其戒在君而五貞疾隨剛君在上非四之所可犯故其戒在臣而四貞凶也然則處豫隨九四之位者奈何曰唯有以自信而孚上下之心斯免矣是以豫四勿疑則朋盍簪而從隨四有孚則有明功而无咎也雲峰胡氏曰豫九四大有得不言凶隨九四有獲而言貞凶何也豫九四以一陽得五陰卦之所以為豫者在四若夫卦之所以為隨者不在四而在初四下不與初應而上次勢凌於五未必上安而下從之也雖貞亦凶况不貞乎有孚在道以明戒之深矣非孚非明凶咎其能免乎象曰隨有獲其義凶也有孚在道明功也傳居近君之位而有獲其義固凶能有孚而在道則无咎葢明哲之功也梅巖袁氏曰其義凶者有凶之理而未必凶也處得其道如下所云則无咎矣九五孚于嘉吉傳九五居尊得正而中實是其中誠在於隨善其吉可知嘉善也自人君至於庶人隨道之吉唯在隨善而已下應二之正中為隨善之義本義陽剛中正下應中正是信於善也占者如是其吉宜矣進齋徐氏曰九五陽剛中正為隨之主得衆爻之隨者而五之應唯在於二故曰孚于嘉吉此隨之至善者也中溪張氏曰九五居正中之位而下得六二之正應中正相孚善莫大焉所謂亨嘉之㑹也其吉可知彖曰大亨貞无咎而天下隨之九五足以當之矣雲峰胡氏曰四五以陽居三上二陰之中陽内陰外有中實之象故皆曰孚然四之孚戒之之辭也欲其孚乎五也五之孚許之之辭也喜其孚于二也象曰孚于嘉吉位正中也傳處正中之位由正中之道孚誠所隨者正中也所謂嘉也其吉可知所孚之嘉謂六二也隨以得中為善隨之所防者過也葢心所説隨則不知其過矣進齋徐氏曰明五之於二皆得乎位之正中也上六拘係之乃從維之王用亨于西山亨音見大有卦後升卦同傳上六以柔順而居隨之極極乎隨者也拘係之謂隨之極如拘持縻係之乃從維之又從而維繫之也謂隨之固結如此王用亨於西山隨之極如是昔者太王用此道亨王業於西山太王避狄之難去豳來岐豳人老稚扶攜以隨之如歸市葢其人心之隨固結如此用此故能亨盛其王業於西山西山岐山也周之王業葢興於此上居隨極固為太過然在得民一有心字之隨與隨善之固如此乃為善也施於他則過矣程子曰隨之上六才與位皆陰柔隨之極也故曰拘係之乃從維之王用亨于西山唯太王之事民心固結而不可解者其他皆不可如是之固也章溪王氏曰王用亨于西山則歸市之隨至此亦莫之禦矣此周家王業始基之地本義居隨之極隨之固結而不可解者也誠意之極可通神明故其占為王用亨于西山亨亦當作祭享之享自周而言岐山在西凡筮祭山川者得之其誠意如是則吉也朱子曰王用享于西山言誠意通神明神亦隨之如況於鬼神乎之意雲峰胡氏曰六柔有係象居柔又有拘係象西兌象山互艮象兌為巫西陰方有祭而固結於幽陰之象拘係之所以象隨之極固結而不可解也至誠之極可以固結神明而況於人乎故曰王用享于西山周視岐山為西意者大王之在岐其祭山川必嘗占得此歟平庵項氏曰大有九三公用亨于天子隨上六王用亨于西山益六二王用亨于帝升六四王用亨于岐山四爻句法皆同古文亨即享字今獨益作享讀者俗師不識古字獨於享帝不敢作亨帝也若天子則或以為无享理不知賓禮自有享王此爻與升四則吉禮山川之祭也象曰拘係之上窮也傳隨之固如拘係一无係字維持一无持字隨道之窮極也本義窮極也雲峰胡氏曰窮之義一爾豫初而曰滿極惡其人欲沉溺而不能脱也隨終而曰窮極喜其人心固結而不可解也又曰六爻陰陽各半陽有所隨无所係故初五皆吉而四何咎陰性隨而不能无所係故二係小子三係丈夫上拘係之皆不言吉然係丈夫猶可也係小子凶咎不言可知建安丘氏曰卦以物隨為義爻以隨物為義六爻以陰隨陽者言則上之陽可隨而下之陽不可隨此三隨四所以有得上隨五所以用亨而二隨初所以有係小子之失以陽得隂之隨者言則五君位當為人所隨四臣位不當為人所隨此四得陰之隨所以貞凶五得陰之隨所以貞吉隨之不可茍也如此巽下艮上傳蠱序卦以喜隨人者必有事故受之以蠱承二卦之義以爲次也夫喜説以隨於人者必有事也无事則何喜何隨蠱所以次隨也蠱事也蠱非訓事蠱乃有事也爲卦山下有風風在山下遇山而回則物亂是爲蠱象蠱之義壞亂也在文爲蟲皿皿之有蟲蠱壞之義左氏傳云風落山女惑男以長女下於少男亂其情也風遇山而回物皆撓亂是爲有事之象故云蠱者事也旣蠱而治之亦事也以卦之象言之所以成蠱也以卦之才言之所以治蠱也東坡蘇氏曰器乆不用則蠱生之謂蠱人乆宴溺而疾生之謂蠱天下乆安无爲而弊生之謂蠱蠱元亨利渉大川傳旣蠱則有復治之理自古治必因亂亂則開治理自然也如卦之才以治蠱則能致元亨也蠱之大者濟時之艱難險阻也故曰利渉大川朱子曰皿蟲為蠱言器中盛䢷蟲敎他自相併便是䢷積蓄到䢷壞爛底意思一似漢唐之衰弄得來到䢷極弊大壞時所以言元亨葢極弊則將復興故言元亨問蠱是壞亂之象雖亂極必治如何便㑹元亨曰亂極必治天道循環自是如此如五胡亂華以至於隋亂之極必有唐太宗者出又如五季必生太祖若不如此便无天道了所以彖只云蠱元亨而天下治也雙湖胡氏曰蠱者事也壞也事欝而不𤼵者謂之蠱草之欝也其乆必腐木之欝也其乆必蠧未有事而不壞者也蠱之所以元亨者以能飭之爾飭之則不壞矣易窮則變變則通是以事之壊者又當振而起之臨川呉氏曰蠱之時不可靜俟當徃濟險難故利渉大川也先甲三日後甲三日先息薦反後胡豆反傳甲數之首事之始也如辰之甲乙甲第甲令皆謂首也事之端也治蠱之道當思慮其先後三日葢推原先後為救弊可乆之道先甲謂先於此究其所以然也後甲謂後於此慮其將然也一日二日至於三日言慮之深推之遠也究其所以然則知救之之道慮其將然則知備之之方善救則前弊可革善備則後利可乆此古之聖王所以新天下而垂後世也後之治蠱者不明聖人先甲後甲之誡慮淺而事近故勞於救世而亂不革功未及成而弊已生矣甲者事之首庚者變更之首制作政敎之類則云甲舉其首也𤼵號施令之事則云庚庚猶更也有所更變也程子曰先甲三日以窮其所以然而處其事後甲三日以究其將然而為之防甲者事之始也庚者有所革也自甲乙至于戊己春夏生物之氣已備庚者秋冬成物之氣也故有所革别一般氣本義蠱壞極而有事也其卦艮剛居上巽柔居下上下不交下卑巽而上茍止故其卦為蠱或曰剛上柔下謂卦變自賁來者初上二下自井來者五上上下自旣濟來者兼之亦剛上而柔下皆所以為蠱也蠱壞之極亂當復治故其占為元亨而利渉大川甲日之始事之端也先甲三日辛也後甲三日丁也前事過中而將壞則可自新以為後事之端而不使至於大壞後事方始而尚新然便當致其丁寜之意以監其前事之失而不使至於速壞聖人之戒深也朱子曰先甲後甲言先甲之前三日乃辛也是時前叚事已過中了是䢷欲壞之時便當圖後事之端略略撐拄則箇雖終歸於弊且得支吾幾時問先甲辛也後甲丁也辛有新意丁有丁寜意其説似出月令注曰然但古人祭祀亦多用先庚先甲先庚丁也先甲辛也如用丁亥辛亥之類雲峰胡氏曰先甲後甲之説不一愚以為蠱由巽艮而成當從艮巽看先天甲在東之離由甲逆數離震坤三位得艮先甲三日也自甲順數離兌乾三位得巽後甲三日也然則上艮止下卑巽所以為蠱於艮得先甲三日之辛於巽得後甲三日之丁又所以治蠱也彖曰蠱剛上而柔下巽而止蠱傳以卦變及二體之義而言剛上而柔下謂乾之初九上而為上九坤之上六下而為初六也陽剛尊而在上者也今徃居於上陰柔卑而在下者也今來居於下男雖少而居上女雖長而在下尊卑得正上下順理治蠱之道也由剛之上柔之下變而為艮巽艮止也巽順也下巽而上止止於巽順也以巽順之道治蠱是以元亨也或問巽而止蠱莫是遇事巽順以求其理之所止而後為治蠱之道朱子曰非也大抵資質柔巽之人遇事便不能做无奮迅之意所以事遂至於蠱壞了蠱只是事之壞者大凡看易須先看成卦之義險而健則成訟巽而止則成蠱蠱艮上而巽下艮剛居上巽柔居下上高亢而不下交下卑巽而不能救此所以蠱壞也巽而止只是巽順便止了更无所施為如何治蠱易要分内外卦看伊川却不甚理㑹如巽而止則成蠱止而巽便不同葢先止後巽却是有根株了方巽將去故為漸剛上柔下巽而止此是言致蠱之由非治蠱之道本義以卦體卦變卦德釋卦名義葢如此則積弊而至於蠱矣朱子曰龜山説巽而止乃治蠱之道言當柔順而止不可堅正必為此説非惟不成道理且失易彖文義巽而止蠱猶順以動豫動而説隨皆言卦義趙德莊説下面人只務巽上面人又懶惰不肯向前上面一向剛下面一向柔倒塌了這便是蠱底道理盤澗董氏曰卦之為蠱有數義剛在上柔在下此卦體也下卑巽而上茍止所以為蠱此卦德也又自賁井旣濟來皆剛上而柔下此卦變也童溪王氏曰夫蠱非事也以天下為无事而不事事則後有不勝事矣此蠱之所以為事也剛上艮也柔下巽也在上者有止忌而无動作在下者有巽順而无違忤則禍亂之萌乃在於已安已治之中遂至於敗壞而不可勝矣此剛上而柔下巽而止所以成蠱也雲峰胡氏曰諸解以巽而止為治蠱之道夫茍下卑巽而上茍止豈所以治蠱哉先儒云通其變則為隨不能通其變則為蠱葢剛來而下柔剛柔之情交兼此動而彼應故曰隨剛上而柔下上下不交且下卑巽而上茍止故曰蠱蠱隨之相反以此凡卦德當分内外先後如隨則我先動而彼説歸妹則先説而後動歸妹之凶又與隨反蠱則内卑巽而外茍止漸則内靜止而外卑巽漸之吉又與蠱反蠱元亨而天下治也傳治蠱之道如卦之才則元亨而天下治矣夫治亂者茍能使尊卑上下之義正在下者巽順在上者能止齊安定之事皆止於順則何蠱之不治也其道大善而亨也如此則天下治矣南軒張氏曰由朝廷至閭里孰非事也而卦之治蠱獨舉父子何也葢天下之本在國國之本在家一家之責莫重於子能盡父道則家齊矣由是而之焉則國可治而天下可平故曰蠱元亨而天下治也利渉大川徃有事也傳方天下壞亂之際宜渉艱險以徃而濟之是徃有所事也臨川呉氏曰蠱之時當勇徃有所事以濟險難若巽懦而止則終於蠱而已豈能元亨哉先甲三日後甲三日終則有始天行也傳夫有始則必有終旣終則必有始天之道也聖人知終始之道故能原始而究其所以然要終而僃其將然先甲後甲而為之慮所以能治蠱而致元亨也本義釋卦辭治蠱至於元亨則亂而復治之象也亂之終治之始天運然也朱子曰蠱元亨而天下治須是大善以亨方能治蠱也臨川呉氏曰數日以甲者以其為十日之始也先乎甲之三日者辛也由辛歷壬癸而十日終終則又始於甲歷乙丙以至于丁而爲後乎甲之三日矣終始循環天之運行也治蠱者亦當終前事始後事如天之行也古為徐氏曰先三後三者六爻也爻終于六七則更為之端矣所謂終則有始天行也七日得七日來復皆其義也雲峰胡氏曰諸卦皆言徃有功蠱獨曰徃有事蠱者事也事雖已治不可以无事視之也前事過中而將壞即當為自新之圖後事方始而尚新即當致丁寧之意亂之極而治之始雖天運然也亦人事致然也象曰山下有風蠱君子以振民育德傳山下有風風遇山而囘則物皆㪚亂故為有事之象君子觀有事之象以振濟於民養育其德也在已則養德於天下則濟民君子之所事无大於此二者程子曰蠱之象君子以振民育德君子之事惟有此二者餘无他為二者為已為人之道也童溪王氏曰於民務振作其氣使力其所謂相生相養之道无廢惰自安之人於已務涵養其德使日新又新无逸豫自止之意本義山下有風物壞而有事矣而事莫大於二者乃治己治人之道也或問振民育德如何朱子曰當蠱之時必有以振起聳動民之觀聼而在已進德不已必須有此二者則可以治蠱矣隆山李氏曰山下有風則風落山之謂山木摧落蠱敗之象飭蠱者必須有以振起之振民者猶巽風之鼔為號令也育德者猶艮山之養成材力也易中育德多取於山故蒙亦曰果行育德臨川呉氏曰蠱之象非美也君子以之則取其美風在内而能振動外物則象之以振動其民山在外而能涵育内氣則象之以涵育其德振者作興彼之善新民之事也育者培養已之善明德之事也初六幹父之蠱有子考无咎厲終吉傳初六雖居最下成卦由之有主之義居内在下而為主子幹父蠱也子幹父蠱之道能堪其事則為有子而其考得无咎不然則為父之累故必惕厲則得終吉也處卑而尸尊事自當兢畏以六之才雖能巽順體乃陰柔在下无應而主幹非有能濟之義若以不克幹而一无而字言則其義甚小故專言為子幹蠱之道必克濟則不累其父能厲則可以終吉乃僃見為子幹蠱之大法也本義幹如木之幹枝葉之所附而立者也蠱者前人已壞之緒故諸爻皆有父母之象子能幹之則飭治而振起矣初六蠱未深而事易濟故其占為有子則能治蠱而考得无咎然亦危矣戒占者宜如是又知危而能戒則終吉也或問有子考无咎與意承考之考皆是指父在父在而得云考何也朱子曰古人多通言如康誥大傷厥考心可見南軒張氏曰艮止於上巽順於下无為而尊於上者父道也服勞而順於下者子道也故蠱多言幹父之事雲峰胡氏曰爻辭有以時位言者有以才質言者如蠱初六以陰在下所應又柔才不足以治蠱以時言之則為蠱之初蠱猶未深事猶易濟故其占為有子則其考可无咎矣然謂之蠱則已危厲不可以蠱未深而忽之也故又戒占者知危而能戒則終吉藍田呂氏曰父母之蠱人子所難治也幹者以身任其事而不敢避也以子之難故初則厲二則不可貞三則小有悔然卒任其事為功故初終吉三无咎五用譽也瓜山潘氏曰程傳云初居内而在下故取子幹父蠱之象本義云蠱者前人已壞之緒故諸爻皆以子幹父蠱為言若如程説惟初爻為可通若他爻則説不行矣本義之説則諸爻皆可通也象曰幹父之蠱意承考也傳子幹父蠱之道意在承當於父之事也故祗敬其事以置父於无咎之地常懷惕厲則終得其吉也盡誠於父事吉之道也鄭氏曰子改父道始雖厲而終則吉事若不順而意則順也中溪張氏曰不承其事而承其意此善繼父之志者也九二幹母之蠱不可貞傳九二陽剛為六五所應是以陽剛之才在下而幹夫在上陰柔之事也故取子幹母蠱為義以剛陽之臣輔柔弱之君義亦相近二巽體而處柔順義為多幹母之蠱之道也夫子之於母當以柔巽輔導之使得於義一有母字不順而致敗蠱則子之罪也從容將順豈无道乎以婦人言之則陰柔可知若伸已剛陽之道遽然矯拂則傷恩所害大矣亦安能入乎在乎屈己下意巽順將承使之身正事治而已故曰不可貞謂不可貞固盡其剛直之道如是乃中道也又安能使之為甚高之事乎若於柔弱之君盡誠竭忠致之於中道則可矣又安能使之大有為乎且以周公之聖輔成王成王非甚柔弱也然能使之為成王而已守成不失道則可矣固不能使之為羲黄堯舜之事也二巽體而得中是能巽順而得中道合不可貞之義得幹母蠱之道也本義九二剛中上應六五子幹母蠱而得中之象以剛承柔而治其壞故又戒以不可堅貞言當巽以入之也朱子曰幹母之蠱伊川説得是龜山楊氏曰或曰卦以五為君位而可以母言乎曰母者陰尊之稱如晉六二之稱王母小過六二之稱遇其妣皆謂六五也厚齋馮氏曰世固有父䘮而母任家事者以衆子在而母總其事也故六五以陰柔為一卦之上而取象於母蠱焉諸爻不取此義而獨於九二言之者以其正應在下又取乎内有陽剛之才能幹者也又家事之敗或由婦人亂政而其才子能飭之亦為幹母之蠱李氏椿年曰母柔子剛於義為得然而不可以為貞也有母在而以剛行之有時而違拂矣雲峰胡氏曰貞者事之幹九二幹蠱而戒之曰不可貞幹母之蠱也非不可正也不可固執以為正也母性多柔暗以二之剛承五之柔巽以入之不固守其剛乃中道也固則反傷恩害義矣象曰幹母之蠱得中道也傳二得中道而不過剛幹母蠱之善者也中溪張氏曰幹母之蠱與幹父之蠱不同子之於母但當柔行巽入以飭治其蠱者專尚剛直盡行撥亂反正之事則於中道未為得也九三幹父之蠱小有悔无大咎傳二以剛陽之才居下之上主幹者也子幹父之蠱也以陽處剛而不中剛之過也然而在巽體雖剛過而不為无順順事親之本也又居得正故无大過以剛陽之才克幹其事雖以剛過而有小小之悔終无大過咎也然有小悔已非善事親也本義過剛不中故小有悔巽體得正故无大咎或問九三幹父之蠱小有悔无大咎言有小悔則无大悔矣言无大咎則不免有小咎矣但象曰終无咎則以九三雖過剛不中然在巽體不為无順而得正故雖悔而无咎至六四則不然以陰居柔不能有為寛裕以治蠱將日深而不可治故徃則見吝言自此以徃則有吝也朱子曰此兩爻説得悔吝二字最分明九三有悔而无咎由凶而趨吉也六四雖目下无事然却終吝由吉而趨凶也元祐間劉莘老劉器之之徒欲盡去小人却是未免有悔至其他諸公欲且寛裕无事莫大段整頓不知目前雖遮掩拖延得過後面憂吝却召可見聖人之深戒蘭氏廷瑞曰三剛太過不免小有悔然時方蠱壞非剛過之才不能以濟也雲峰胡氏曰幹蠱之道以剛柔相濟為尚初六六五柔而剛九二剛而居柔皆可幹蠱不然與其為六四之過於柔而吝不若九三過於剛而悔始焉曰小有悔若不足其過於剛繼之曰无大咎猶幸其能剛也幸其能體巽之權而不失其正也象曰幹父之蠱終无咎也傳以三之才幹父之蠱雖小有悔終无大咎也葢剛斷能幹不失正而有順所以終无咎也王氏湘卿曰以九居三剛之至也以此為臣是諍君之臣以此為子是諍父之子諍則有不順之名故始不免於小有悔然不陷君父於不義則終无大咎也六四裕父之蠱徃見吝傳四以陰居陰柔順之才也所處得正故為寛裕以處其父事者也夫柔順之才而處正僅能循常自守而已若徃幹過常之事則不勝而見吝也以陰柔而无應助徃安能濟本義以陰居陰不能有為寛裕以治蠱之象也如是則蠱將日深故徃則見吝戒占者不可如是也習靜劉氏曰强以立事為幹怠而委事為裕事弊而裕之弊益甚矣葢六四體艮之止而爻位俱柔夫貞固足以幹事今止者怠柔者懦怠且懦皆增益其蠱者也持是以徃吝道也安能治蠱耶雲峰胡氏曰初六之時蠱猶未深故但有子則考可以无咎四之時非初比也而復寛裕以視之蠱將日深矣以是而徃其見吝也固宜梅巖袁氏曰諸爻之幹蠱者或體剛或乗剛或應剛獨六四以柔而止所以致蠱非所以幹蠱也象曰裕父之蠱徃未得也傳以四之才守常居寛裕之時則可矣欲有所徃則未得也加其所任則不勝矣瀘川毛氏曰九三之剛失之過故悔六四之緩失之不及故吝必不得已焉寜為三之悔不可為四之吝此治亂興亡之幾也六五幹父之蠱用譽傳五居尊位以陰柔之質當人君之幹而下應于九二是能任剛陽之臣也雖能下應剛陽之賢而倚任之然已實陰柔故一作固不能為創始開基之事承其舊業則可矣故為幹父之蠱夫創業垂統之事非剛明之才則不能繼世之君雖柔弱之資茍能一有信字任剛賢則可以為善繼而成令譽也太甲成王皆以成而用譽者也本義柔中居尊而九二承之以德以此幹蠱可致聞譽故其象占如此張子曰雖天子必有繼也故亦云幹父之蠱進齋徐氏曰六五柔中之主本无幹蠱之才而九二陽剛得中又處多譽之地位與五應五能任之以治蠱則二之譽卽五之譽也雲峯胡氏曰五為繼世之君有九二承之以德是能用賢以致聞譽者也諸家以為用九二令譽之臣近於以名用人不若謂任九二之德自可成六五之名者也雙湖胡氏曰在六二以五為母柔居尊也在六五又自取子道以繼世之君言也象何常之有象曰幹父用譽承以德也傳幹父之蠱而用有令譽者以其在下之賢承輔之以剛中之德也上九不事王矦高尚其事傳上九居蠱之終无係應一无應字於下處事之外无所事之地也以剛明之才无應援而處无事之地是賢人君子不偶於時而高潔自守不係於世務者也故云不事王侯高尚其事古之人有行之者伊尹太公望之始曾子子思之徒是也不屈道以徇時旣不得施設於天下則自善其身尊高敦尚其事守其志節而已士之自高尚亦一无亦字非一道有懷抱道德不偶於時而高潔自守者有知止足之道退而自保者有量能度分安於不求知一无知字者有清介自守不屑天下之事獨潔其身者所處雖有得失小大之殊皆自高尚其事者也象所謂志可則者進退合道者也或問程傳云知止足之道退而自保者與量能度分安於不求知者何以别朱子曰知止足是能做底量能度分是不能做底本義剛陽居上在事之外故為此象而占與戒皆在其中矣朱子曰不事王矦无位之地如何出得來更幹箇甚麽問此爻本義云占與戒皆在其中如何曰有此象則其占當如此又戒其必如此乃可也若得此象而不能從則有凶矣隆山李氏曰君子當蠱之由方事之興也盡力以幹焉操巽之權而行其所當行及事之休也絜身以退體艮之義而止其所當止故也誠齋楊氏曰上九在蠱之終事之蠱壞者至六五而幹之畢矣此上九所以高尚其事也臨川呉氏曰上九在一卦至高至上之位故曰高尚下五爻屑屑於一家之事至此則一國之事天下之事猶且視為卑下而不屑為彼一家之事又何足道哉雲峰胡氏曰初至五皆以蠱言不言君臣而言父子臣於君事猶子於父事也上九獨以不事王矦言者葢君臣以義合也子於父母有不可自諉於事之外王侯之事君子有不可事者矣是故君子之出處在事之中盡力以幹焉而不為汙在事之外絜身以退焉而不為僻本義謂占與戒皆在其中葢以時當高尚或自在卑下而當戒也象曰不事王侯志可則也傳如上九之處事外不累於世務不臣事於王侯葢進退以道用捨隨時非賢者能之乎其所存之志可為法則也朱子曰當此時節若能斷然不事王矦高尚其事不半上落下或出或入則其志眞可法則矣只為人不能如此也雲峰胡氏曰初六言意上九言志意柔而志剛也建安丘氏曰六爻取家事為象上為父故本爻不稱父而他爻言父五為母故本爻不言母而他爻言母在下四爻則皆子也然子幹父母之蠱惟剛柔相濟者為善初爻柔位剛故无咎二爻剛位柔故得中三爻位俱剛過於剛者故小有悔四爻位俱柔過於柔者故徃未得此四位剛柔之異而得失之判也然上五二爻以家事言則上為父五為母衆爻為子以國事言則五為君下四爻為用事之臣上一爻為不事之臣故曰不事王侯高尚其事觀下五爻以幹父言則父之位存矣觀上一爻以王侯言則君之位存矣此易之道所以屢遷而不可為典要也周易傳義大全卷七
