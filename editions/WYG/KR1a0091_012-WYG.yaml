body:
  text: 周易傳義大全卷六明胡廣等撰離下乾上傳同人序卦物不可以終否故受之以同人夫天地不交則為否上下相同則為同人與否義相反故相次又世之方否必與人同力一作欲乃能濟同人所以次否也為卦乾上離下以二象言之天在上者也火之性炎上與天同也故為同人以二體言之五居正位為乾之主二為離之主二爻以中正相應上下相同同人之義也又卦唯一陰衆陽所欲同亦同人之義也他卦固有一陰者在同人之時而二五相應天火相同故其義大厚齋馮氏曰上乾君也天也下離六二一爻在離之中人位也乾上離下五陽同歸二之一陰有以天同人之象亦為人君同乎斯人之象故成卦曰同人雲峯胡氏曰坎離皆乾坤之用易至此十二卦坎體凡六見離體於此二見焉需訟小畜履四卦互離至同人大有而見離體凡六離之用與坎等矣同人大有皆主離之一陰而言離一陰在二而上下五陽同與之故曰同人離一陰在五而上下五易皆為所有故曰大有也同人于野亨利渉大川利君子貞傳野謂曠野取遠與外之義夫同人者以天下大同之道則聖賢大公之心也常人之同者以其私意所合乃暱比之情耳故必于野謂不以暱近情之所私而于郊野曠遠之地既不繫所私乃至公大同之道无遠不同也其亨可知能一作既與天下大同是天下皆同之也天下皆同何險阻之不可濟何艱危之不可亨故利渉大川利君子貞上言于野止謂不在暱比此復言宜以君子正道君子之貞謂天下至公大同之道故雖居千里之遠生千歳之後若合符節推而行之四海之廣兆民之衆莫不同一作合小人則唯用其私意所比者雖非亦同所惡者雖是亦異故其所同者則為阿黨葢其心不正也故同人之道利在君子之貞正本義離亦三畫卦之名一陰麗於二陽之間故其徳為麗為文明其象為火為日為電同人與人同也以離遇乾火上同於天六二得位得中而上應九五又卦唯一陰而五陽同與之故為同人于野謂曠遠而无私也有亨道矣以健而行故能渉川為卦内文明而外剛健六二中正而有應則君子之道也占者能如是則亨而又可渉險然必其所同合於君子之道乃為利也程子曰同人于野亨利渉大川是兩象一義利君子貞是一象建安丘氏曰以三畫卦言之二五皆在人位相應則相同故曰同人野者廣大曠遠之地川者險阻艱難之所于野而亨者大同也涉川而利者此同舟共濟何患胡越之異心也利君子貞者葢正則同邪則異正則公邪則私所以利君子之守正也雲峰胡氏曰或曰君子周而不比和而不同而卦名曰比曰同何哉曰比者一陽為衆隂所比而坎陽居五為得其正故曰元永貞是其比也即所以為君子之周同人一陰為五陽所同而離陰居二為得其正故曰利君子貞是其同也即所以為君子之和同人于野其同也大利君子貞其同也正為人大同亨道也雖大川可涉然有所同者大而不出於正者故又當以正為本彖曰同人柔得位得中而應乎乾曰同人傳言成卦之義柔得位謂二以陰居陰得其正位也五中正而二以中正應之得中而應乎乾也五剛健中正而二以柔順中正應之各得其正其徳同也故為同人五乾之主故云應乎乾象取天火之象而彖專以二言本義以卦體釋卦名義柔六二乾謂九五沙随程氏曰所以成卦者在六二故曰柔得位得中而應乎乾厚齋馮氏曰孔子贊易五陽一陰卦則以一陰為主明卦名義自是孔子之例非經之本旨也至序卦乃云與人同者物必歸焉則經之本旨孔子非不知之同人曰傳此三字羡文本義衍文嵩山晁氏曰按虞翻諸儒無一人為之説者特王弼失之耳同人于野亨利涉大川乾行也傳至誠无私可以蹈險難者乾之行也无私天徳也朱子曰乾行也言須是這般剛健之人方做得這般事若柔弱者如何㑹出去外面同人又去涉險沙随程氏曰所以同人利涉者在九五故曰乾行文明以健中正而應君子正也傳又以二體言其義有文明之徳而剛健以中正之道相應乃君子之正道也節齋蔡氏曰以象言則文明以健以爻言則中正而應沙随程氏曰所以利君子貞者在一體之相為用故曰文明以健中正而應臨川呉氏曰内文明則察於理外剛健則勇於義中正則内无私心應乾則外合天徳此皆君子之正道也唯君子為能通天下之志傳天下之志萬殊理則一也君子明理故能通天下之志聖人視億兆之心猶一心者通於理而已文明則能燭理故能明大同之義剛健則能克己故能盡大同之道然後能中正合乎乾行也朱子曰程𫝊説得通天下之志處好云文明則能燭理故能明大同之義剛健則能克己故能盡大同之道此説甚善大凡讀書只就眼前説出底便好﨑嶇尋出底便不好本義以卦徳卦體釋卦辭通天下之志乃為大同不然則是私情之合而已何以致亨而利涉哉誠齋楊氏曰人與人羣居天地中能髙飛遠走不在人間乎而獨與人異何也人異乎人者物之棄人同乎人者物之歸然同而隘則其同不大同而暱則其同不公同人于野公而大也雲峰胡氏曰必通天下之志乃為大同然非明與健不能大同也象曰天與火同人君子以類族辨物傳不云火在天下天下有火而云天與火者天在上火性炎上火與天同故為同人之義君子觀同人之象而以類族辨物各以其類族辨物之同異也若君子小人之黨善惡是非之理物情之離合事理之異同凡異同者君子能辨明之故處物不失其方也或問伊川説云各以其類族辨物之同異則是就類族上辨物否朱子曰類族是就人上説辨物是就物上説天下有不可皆同之理故随他頭項去分别類族如分姓氏張姓同作一類李姓同作一類辨物如牛類是一類馬類是一類就其異處以致其同此其所以為同伊川之説不可曉本義天在上而火炎上其性同也類族辨物所以審異而致同也朱子曰類族辨物言類其族辨其物且如青底做一類白底做一類恁地類了時同底自同異底自異馮氏去非曰類族如天之兼覆辨物如火之燭照厚齋馮氏曰族如非此族也不在祀典之族物如是其生也與吾同物其物如士大夫之族為士大夫農之族為農工商之族為工商此類族也裸生為裸物羽生為羽物毛生為毛物鱗介之生為鱗介之物此辨物也臨川吳氏曰天之所生各族殊分法乾覆之无私者於殊分之族而類聚其所同異中之同也火之所及凡物均照法離明之有别者於均照之物而辨析其所異同中之異也東坡蘇氏曰水之於地為比火之於天為同人然比以无所不比為比同人以有所不同為同也初九同人于門无咎傳九居同人之初而无係應是无偏私同人之公者也故為出門同人出門謂在外在外則无私昵之偏其同博而公如此則无過咎也本義同人之初未有私主以剛在下上无係應可以无咎故其象占如此節齋蔡氏曰同人之始出門即同未見逺近廣狹之情故无咎建安丘氏曰兩户為門陰畫偶有門之象同人随之初九節之九二皆前遇偶故謂之門一扇為户陽畫竒有户之象節之初九亦前遇竒故謂之户户一而門二也雲峰胡氏曰同人與随之初皆易溺於私随必出門而後可以有功同人必出門而後可以无咎盖易以人名卦者有二卦名家人一家之人也卦名同人天下之人也門以内所同者一家之人而已六二同人於宗是也出門同人所同者一國之人也天下之人也卦辭同人于野是也象曰出門同人又誰咎也傳出門同人于外是其所同者廣无所偏私人之同也有厚薄親踈之異過咎所由生也既無所偏黨誰其咎之朱子曰易中所謂又誰咎也自有三箇而其義則有兩樣如不節之嗟與自我致冦言之則謂咎皆由己不可咎諸人如出門同人言之則謂人誰有咎之者矣以此見古人立言有用字雖同而其義則不同誠齋楊氏曰門室之始初九同人之始吾與人曷嘗不同隔之者門也吾一出門則天地四方孰不吾同者何咎之有雷氏曰同人于門亦吝道也故釋之曰出門同人則通而不狹矣六二同人于宗吝傳二與五為正應故曰同人于宗宗謂宗黨也同於所係應是有所偏與在同人之道為私狹矣故可吝二若陽爻則為剛中之徳乃以中道相同不為私也本義宗黨也六二雖中且正然有應於上不能大同而係於私吝之道也故其象占如此朱子曰易雖抑陰然有時把陰為主如同人是也然此一陰雖是一卦之主又却柔弱做主不得問六二與九五柔剛中正上下相應可謂盡善却有同人於宗吝與先號咷之象如何曰以其太好兩者時位相應意趣相合只知款宻却无至公大同之心未免係於私故有吝觀二人同心其利斷金同心之言其臭如蘭固是他好處然於好處猶有失以其係於私暱而不能大同也大凡悔者自凶而之吉吝者自吉而趨凶節齋蔡氏曰二與五本應故曰宗雲峰胡氏曰二往同五復成離五來同二復成乾往來相同乾離各反其本是之謂宗同人于宗似不失其為六二之正也較之于野之同則亦係於私矣初九出門无所係故无咎六二于宗有所係故吝縉雲馮氏曰以卦體言之則有大同之義以爻義言之則示阿黨之戒雙湖胡氏曰卦統論乾天下同乎離六二之人而六二爻則自論其與人同之道固不可以一概論也象曰同人于宗吝道也傳諸卦以中正相應為善而在同人則為可吝故五不取君義葢私比非人君之道相同以私為可吝也臨川吳氏曰六二一爻衆陽之所與而獨同於五所同者私狹而不公廣其為道可吝也九三伏戎于莽升其髙陵三嵗不興傳三以陽居剛而不得中是剛暴之人也在同人之時志在於同卦唯一有二字一陰諸陽之志皆欲同之三又與之比然二以中正之道與五相應三以剛强居二五之間欲奪而同之然理不直義不勝故不敢顯發伏藏兵戎于林莽之中懷惡而内負不直故又畏懼時升髙陵以顧望如此至于三歳之久終不敢興此爻深見小人之情狀然不曰凶者既不敢發故未至凶也或問伏戎于莽升其髙陵如何朱子曰只是伏于髙陵之草莽中三歲不敢出輿九四乘其墉皆為剛盛而髙三欲同於二而懼九五之見攻故升髙伏戎欲敵之而五陽方剛則不可奪故三嵗不興而象曰不能行也四欲同於二而為三所隔故乘墉攻之而以居柔遂自反而弗克而象曰義弗克也程傳謂升髙陵有升髙顧望之意此説雖巧恐非本意東谷鄭氏曰伏戎于莽以伺五之隙升其髙陵以窺二之動本義剛而不中上无正應欲同於二而非其正懼九五之見攻故有此象劉氏瓛曰三居下體之上故謂之陵有憑上之志故謂之升西溪李氏曰三與五隔三爻故曰三歳雲峰胡氏曰二與五同者也九三欲攘二而畏五伏與升備見三之情狀伏戎于莽欲攻二似有畏五意升其髙陵雖畏五又有顧望意五終不可敵也是以三歳不興卦唯三四不言同人二與五相同而三四有爭奪之象非同者也隆山李氏曰天下之理萃則必爭卦以相同為義而三則㐲戎四則乘墉五則大師克何也二應五而三爻據之所以争也嗚呼出而與人同至易至簡之事而乃如此故易中必知險簡中必知阻不學易者殆不可以涉世也象曰伏戎于莽敵剛也三歳不興安行也傳所敵者五旣剛且正其可奪乎故畏憚伏藏也至於三歳不興矣終安能行乎本義言不能行項氏曰言敵剛恐人誤以為攻二也節齋蔡氏曰安何也讀如安往而不得貧賤之安九四乘其墉弗克攻吉傳四剛而不中正其志欲同二亦與五為仇者也墉垣所以限隔也四切近於五如隔墉耳乘其墉欲攻之知義不直而不克也茍能自知義之不直而不攻則為吉也若肆其邪欲不能反思義理妄行攻奪則其凶大矣三以剛居剛故終其强而不能反四以剛居柔故有困而能反之義能反則吉矣畏義而能改其吉宐矣童溪王氏曰九四乗其墉其志亦欲阻三以攻五也然九三以剛敵剛猶不能行其欲况九四之非全剛乎其弗克攻也宐矣本義剛不中正又无應與亦欲同於六二而為三所隔故為乘墉以攻之象然以剛居柔故有自反而不克攻之象占者如是則是能改過而得吉也或問同人三四皆有争奪之義朱子曰只是争六二一陰爻却六二自與九五相應三以剛居剛便迷而不返四以剛居柔便有反底道理繋辭云近而不相得則凶如初上則各在事外不相干涉所以无爭潛齋胡氏曰三之升髙陵升四而望五也四之乘其墉乘三而攻二也三惡五之親二故有犯上之心四惡二之比三故有陵下之志雲峰胡氏曰三雖以剛居剛猶懼五之見攻者屈於勢而不可敵也四以剛居柔欲乗墉以攻終不克攻者是能屈於義而不敢敵也春秋文公十年書晉人納捷菑于邾弗克納有得於周公爻辭弗克攻之㫖矣穀梁傳曰弗克納其義也有得於夫子象傳義弗克之㫖矣諸家多以三四為欲攻五於理悖甚唯木義得之象曰乘其墉義弗克也其吉則困而反則也傳所以乗其墉而弗克攻之者以其義之弗一作不克也以邪攻正義不勝也其所以得吉者由其義不勝困窮而反於法則也二者衆陽所同欲也獨三四有爭奪之義者二爻居二五之間也初終遠故取義别本義乗其墉矣則非其力之不足也特以義之弗克而不攻耳能以義斷困而反於法則故吉也雲峯胡氏曰力不足而不攻者屈於勢也力有餘而不攻者屈於理也則者理之不可踰者也進齋徐氏曰四之困而反則聖人予之以吉者正欲反天下之睽異而為同也建安丘氏曰或謂同人之世二五正應當同者也而三四介乎其間皆欲爭之其不顧命義一也而商其罪之輕重則三為甚何也曰三近二而爭者也四逺二而爭者也四之乗墉方萌窺伺之意而三之伏戎已見爭奪之形矣四之反則則知義之不勝而止而三之不興則畏勢之不敵而不敢爭况四之所欲攻者三三臣位同人之冦也三之欲敵者五五君位同人之主也其逆順之勢又不侔焉噫此四之吉所以異乎三之不興歟九五同人先號咷而後笑大師克相遇號戶羔反咷道刀反旅卦同傳九五同於二而為三四二陽所隔五自以義直理勝故不勝憤抑至於號咷然邪不勝正雖為所隔終必得合故後笑也大師克相遇五與二正應而二陽非理隔奪必用大師克勝之乃得相遇也云大師云克者見二陽之强也九五君位而爻不取人君同人之義者葢五專以私暱應於二而失其中正之徳人君當與天下大同而獨私一人非君道也又先隔則號咷後遇則笑一有正字是私暱之情非大同之體也二之在下尚以同於宗為吝况人君乎五旣於君道无取故更不言君道而明二人同心不可間隔之義繫辭云君子之道或出或處或黙或語二人同心其利斷金中誠所同出處語黙无不同天下莫能間也同者一也一不可分分乃二也一可以通金石冒水火无所不能入故云其利斷金其理至微故聖人贊之曰同心之言其臭如蘭謂其言意味深長也本義五剛中正二以柔中正相應於下同心者也而為三四所隔不得其同然義理所同物不得而間之故有此象然六二柔弱而三四剛强故必用大師以勝之然後得相遇也厚齋馮氏曰九五大君也當與天下相孚於大同之世而乃私繫所應是以彊弗友之徒競起而爭之夫以上伐下直舉而措之耳何至動大衆而僅能勝之哉私故也作易者以為失君人大同之道故備言其私昵之狀而以敵國交兵之法言之其訓嚴矣雲峰胡氏曰二五剛柔相應而皆合乎中正本義所謂義理之同也程傳謂五自以義直理勝不勝憤抑故號咷邪不勝正終必得合故後笑春秋書鄭伯克段于鄢𫝊曰如二君故曰克五之於四也必用大師克之而始與二遇則三之非理而强可見矣又曰同人九五剛中正而有應于六二故先號咷而後笑旅上九剛不中正而无應于九三故先笑而後號咷象曰同人之先以中直也大師相遇言相克也傳先所以號咷者以中誠理直故不勝其忿切而然也雖其敵剛强至用大師然義直理勝終能克之故言能相克也相克謂能勝見二陽之强也本義直謂理直盤澗董氏曰二五本自同心而為三四所隔故先號咷先謂理直也雖大師相克而後相遇亦以義理之同物終不得而間之故也雲峯胡氏曰六爻惟三四不言同傳以二五之同者為理直則可以見三四之爭同者為非理矣上九同人於郊无悔傳郊在外而遠之地求同者必相親相與上九居外而无應終无與同者也始有同則至終或有睽悔處遠而无與故雖无同亦无悔雖欲同之志不遂而其終无所悔也本義居外无應物莫與同然亦可以无悔故其象占如此郊在野之内未至於曠遠但荒僻无與同耳朱子曰郊是荒寂无人之所言不能如同人于野曠遠无私荒僻无與同葢居外无應莫與同者亦可以无悔也又曰同人於野是廣大无我之意同人于郊是无可與同之人也取義不同自不相悖節齋蔡氏曰國外曰郊郊外曰野雖在卦上猶未出乎卦也故止曰郊雲峰胡氏曰初上皆無應初出門同人出乎家之外而同乎國之人也在下而无私應者也上九不同乎國之人乃出乎國之外見荒僻无人之所在外而无與應者如荷蕢之徒是也故不謂之凶但謂之无悔象曰同人于郊志未得也傳居遠莫同故終无所悔然而在同人之道求同之志不得遂雖无悔非善處也臨川呉氏曰无可同之人故志未得建安丘氏曰上九處同人之世豈不欲與人同者哉特以一卦五陽皆欲同二而三伏戎四乘墉五用師相刃相摩不奪不厭而已適處於无與同之地超然出於羣爭之表於人固无所失矣而於己亦未為得也周公於爻以不異於人者喜之故言其无悔孔子於象以不能同於人者病之故釋之曰志未得也又曰同人六爻以六二一陰為卦主上下五陽皆欲同之同人之道貴廣不貴狹卦言于野亨是也在諸爻以比應為同故不能盡卦義合而論之有應而同者有比而同者有遠而无與同者有爭而不能同者二與五應以正道相同在二言于宗五言相遇此應而同者初在卦下出即遇二无爭于五故同人于門此比而同者上處卦外无應于五亦无得于二故同人于郊此遠而无與同者三四介乎二五之間與五爭二而不知天理之同物莫能間故三伏戎不興四乘墉弗克此爭而不能同者同人之道難矣哉然則世之與人同者與其為初之比而同不若五之應而同者之出於正為三四之爭而不能同不若上之遠而无與同者之无所爭也乾下離上傳大有序卦與人同者物必歸焉故受之以大有夫與人同者物之所歸也大有所以次同人也為卦火在天上火之處髙其明及遠萬物之衆无不照見為大有之象又一柔居尊衆陽竝應居尊執柔物之所歸也上下應之為大有之義大有盛大豐有也雙湖胡氏曰易以陽為大凡卦稱大者皆以陽得名大有以一陰統五陽大畜以一陰畜三陽大過四陽過盛於中大壯四陽壯長於下皆名之曰大也雲峰胡氏曰或曰小畜亦五陽一陰之卦主巽之一陰則曰小此主離之一陰則曰大何也曰巽之一陰在四欲畜上下五陽其勢逆而難離之一陰在五而有上下五陽其勢順而易卦名因四五二爻而有大小之分君人者之大分明矣故小畜之亨不在六四而在上下五陽大有之元亨不但在上下五陽而在六五大有元亨傳卦之才可以元亨也凡卦德有卦名自有其義者如比吉謙亨是也有因其卦義便為訓戒者如師貞丈人吉同人于野亨是也有以其卦才而言者大有元亨是也由剛健文明應天時行故能元亨也本義大有所有之大也離居乾上火在天上无所不照又六五一陰居尊得中而五陽應之故為大有乾健離明居尊應天有亨之道占者有其德則大善而亨也建安丘氏曰一陰在上卦之中而五陽宗之居尊能柔物之所與而諸爻之有皆六五之有也豈不大哉唯其所有者大故其亨亦大也彖曰大有柔得尊位大中而上下應之曰大有傳言卦之所以為大有也五以陰居君位柔得尊位也處中得大中之道也為諸陽所宗上下應之也夫居尊執柔固衆之所歸也而又有虛中文明大中一无大中字之德故上下同志應之所以為大有也本義以卦體釋卦名義柔謂六五上下謂五陽誠齋楊氏曰同人大有一柔五剛均也柔在下者曰得位曰得中曰應乎乾而為同人我同乎彼之辭也柔在上者曰尊位曰大中曰上下應而為大有我有其大之辭也雲峰胡氏曰同人以六居二則曰柔得位得中大有以六居五則曰柔得尊位大中上下之分嚴矣其德剛健而文明應乎天而時行是以元亨傳卦之德内剛健而外文明六五之君應於乾之九二五之一有體字性柔順而明能順應乎二二乾之主也是應乎乾也順應乾行順乎天時也故曰應乎天而時行其德如此是以元亨也王弼云不大通何由得大有乎大有則必元亨矣此不識卦義離乾成大有之義非大有之義便有元亨由其才故得元亨大有而不善者與不能亨者有矣諸卦具元亨利貞則彖皆釋為大亨恐疑與乾坤同也不兼利貞則釋為元亨盡元義也元有大善之義有元亨者四卦大有蠱升鼎也唯升之彖誤隨他卦作大亨曰諸卦之元與乾不同何也曰元之在乾為元始之義為首出庻物之義他卦則不能有此義為善為大而已曰元之為大可矣為善何也曰元者物之先也物之先豈有不善者乎事成而後有敗敗非先成者也興而後有衰衰固後於興也得而後有失非得則何以有一作為失也至於善惡治亂是非天下之事莫不皆然必善為先故文言曰元者善之長也涑水司馬氏曰夫柔而不明則前有讒而不見後有賊而不知明而不健則知善而不能舉知惡而不能去二者皆亂亡之端也明以燭之健以決之居不失中行不失時然後能保有其衆元亨也或問應乎天而時行程説以為應天時而行何如朱子曰是以時而行是有可行之時楊氏文煥曰上下應而不得尊位者小畜之六四也有能致之資居得致之位者正大有之時也本義以卦德卦體釋卦辭應天指六五也建安丘氏曰六五以柔居尊故曰尊位處剛而中故曰大中卦唯一柔而二體皆以剛應故曰上下應之剛健居内乾德也文明居外離德也五以柔而應二之剛應乎天也順時而行是以大亨也雙湖胡氏曰彖辭自柔得尊位以下專主六五一爻以論人君之位能有衆陽之大自其德剛健以下實兼上下兩體以論人君之徳能致元亨之治也唯一陰居尊位故可以全體歸之雲峰胡氏曰文明以健自明而誠之事剛健而文明自誠而明之事又若有聖賢之等焉象曰火在天上大有君子以遏惡揚善順天休命傳火髙在天上照見萬物之衆多故為大有大有繁庻之義君子觀大有之象以遏絶衆惡揚明善類以奉順天休美之命萬物衆多則有善惡之殊君子享大有之盛當代天工治飬庻類治衆之道在遏惡揚善而已惡懲善勸所以順天命而安羣生也本義火在天上所照者廣為大有之象所有既大无以治之則釁櫱萌於其間矣天命有善而无惡故遏惡揚善所以順天反之於身亦若是而已矣朱子曰火在天上大有凡有物須是自家照見得方見得有若不照見則有无不可知何名為直天命有善而无惡當大有時遏止其惡顯揚其善反之於身亦莫不然非止用人用人乃其一事耳龜山楊氏曰因天之明物无遁形矣君子觀火天之象以遏惡揚善休命者正命也善惡不當其實非順休命者也誠齋楊氏曰天討有罪吾遏之以天天命有德吾揚之以天吾何與焉此舜禹有天下而不與也故曰順天休命同人離在下而權不敢專故止於類而辨大有離在上而權由已出故極於遏而揚雲峰胡氏曰休命諸家多作眷命本義以為性命葢天命之性有善而无惡遏惡揚善亦不過順天命之本然者而已用人反身皆當若是本義之説精矣初九无交害匪咎艱則无咎傳九居大有之初未至於盛處卑无應與未有驕盈之失故无交害未涉於害也大凡富有鮮不有害以子貢之賢未能盡免况其下者乎匪咎艱則无咎言富有本匪有咎也人因富有自為咎耳若能享富有而知難處則自无咎也處富有而不能思艱兢畏則驕侈之心生矣所以有咎也本義雖當大有之時然以陽居下上无係應而在事初未涉乎害者也何咎之有然亦必艱以處之則无咎戒占者宜如是也或問初九无交害匪咎艱則无咎朱子曰此爻本最吉不解有咎然須説艱則无咎葢易之書大抵教人戒謹恐懼无有以為易而處之者雖至易之事亦必以艱難處之然後无咎也雲峰胡氏曰諸家多以初九无交害為无上下之交所以有害本義從程子之説謂居下无係應而未涉乎害盖无係應三字已自見无上下之交矣富者怨之府故當大有之時反易有害初陽在下未與物接所以未涉於害也何咎之有然以為匪咎而以易心處之反有咎矣无交害大有之初如此艱則无咎大有自初至終皆當如此象曰大有初九无交害也傳在大有之初克念艱難則驕溢之心无由生矣所以不交渉於害也中溪張氏曰大有其時也初九其位也時位如此是以无害也九二大車以載有攸往无咎傳九以陽剛居二為六五之君所倚任剛健則才勝居柔則謙順得中則无過其才如此所以能勝大有之任如大車之材强壯能勝載重物也可以任重行遠故有攸往而无咎也大有豐盛之時有而未極故以二之才可往而无咎至於盛極則不可以往矣本義剛中在下得應乎上為大車以載之象有所往而如是可以无咎矣占者必有此德乃應其占也節齋蔡氏曰大車二也載謂載五也剛健居中而應五故有大車以載之象林氏栗曰二五相應陽志上行故有有攸徃之象以是而往何咎之有雲峯胡氏曰坤為大輿九二體乾而曰大車者輿指軫之方而能載者言車則以其全體而言引之以馬之健行之以輪之圜皆乾象也况九二以剛居柔柔則其虚足以受剛則其健足以行有大車象徳應乎五載上之象有所往而如是可以无咎矣不曰吉者大臣任天下之重職當如此也僅得无咎處大冇之難如此象曰大車以載積中不敗也傳壯大之車重積載於其中而不損敗猶九二材力之强能勝大有之任也臨川呉氏曰車大則能勝重載故載雖多積於中而車行不至於敗占之所以往而无咎也中溪張氏曰伊尹任天下之重此爻足以當之九三公用亨于天子小人弗克亨傳如字本義讀作享傳三居下體之上在下而居人上諸侯人君之象也公侯上承天子天子居天下之尊率土之濵莫非王臣在下者何敢專其有凡土地之富人民之衆皆王者之有也此理之正也故三當大有之時居諸侯之位有其富盛必用亨通乎天子謂以其有為天子之有也乃人臣之常義也若小人處之則專其富有以為私不知公以奉上之道故曰小人弗克也隆山李氏曰居下卦之上為三陽之長以君子而當公侯之任者也臨川王氏曰易之辭有王有先王有帝有后有大君王以德業言先王以垂統言帝以主宰言天子以正位言后天子諸侯通稱大君天子尊稱本義亨春秋傳作享謂朝獻也古者亨通之亨享獻之享烹飪之烹皆作亨字九三居下之上公侯之象剛而得正上有六五之君虛中下賢故為享于天子之象占者有其德則其占如是小人无剛正之德則雖得此爻不能當也朱子曰古文元亨字亨享烹竝通用如公用享于天子解作亨字便不是又曰亨享二字據説文本是一字故易中多互用如王用亨於岐山亦當為享如王用享于帝之云也字畫音韻是經中淺事故先儒得其大者多不留意然不知此等處不理會却枉費了无限辭説牽補而卒不得其本義亦甚害事也京房傳曰享獻也雙湖胡氏曰按春秋傳晉文公將納王使卜偃筮之遇大有之睽曰吉遇公用享于天子之卦戰克而王享吉孰大焉則是卜偃時巳讀為享矣雲峰胡氏曰九二宰相任重之事九三諸侯朝享之事皆不言吉皆臣職之當然者然享有朝享之享有宴享之享本義直訓享為朝獻又曰六五虚中下賢則又兼宴享之義矣享禮之盛者必如九三有剛正之德乃能當之在小人則有不供苞茅不修朝貢者矣安足以當此象曰公用亨于天子小人害也傳公當用一无用字亨于天子若小人處之則為害也自古諸侯能守臣節忠順奉上者則蕃飬其衆以為王之屏翰豐殖其財以待上之徴賦若小人處之則不知為臣奉上之道以其為己之私民衆財豐則反擅其富强益為不順是小人大有則為害又大有為小人之害也臨川吳氏曰小人得此占則不利也九四匪其彭无咎彭步郎反傳九四居大有之時已過中矣是大有之盛者也過盛則凶咎所由生也故處之之道匪其彭則得无咎謂能謙損不處其大盛則得无咎也四近君之髙位茍處太盛則致凶咎彭盛多之貌詩載馳云汶水湯湯行人彭彭行人盛多之狀雅大明云駟騵彭彭言武王戎馬之盛也本義彭字音義未詳程傳曰盛貌理或當然六五柔中之君九四以剛近之有􅆫偪之嫌然以其處柔也故有不極其盛之象而得无咎戒占者宜如是也東谷鄭氏曰九四居四陽之首而率諸陽與之偕進其盛多葢彭彭矣然明不能燭理智不能慮遠以其盛多者而震之必非柔中之君所能安也下三陽皆健體四乃明之首也有明辨之晳則匪其彭然後免於咎雲峰胡氏曰卦名大有彭字即大有之義大有皆六五之有也六五在上而九四以剛近之有􅆫偪之嫌必不有其大而後可以无咎也象曰匪其彭无咎明辨晳也傳能不處其盛而得无咎者葢有明辨之智也晳明智也賢智之人明辨物理當其方盛則知咎之將至故能損抑不敢至於滿極也本義晳明貌雲峯胡氏曰當大有之時而不冇其大非明者不能也明辨晳皆以離言六五厥孚交如威如吉傳六五當大有之時居君位虚中為孚信之象人君執柔守中而以孚信接於下則下亦盡其信誠以事於上上下孚信相交也以柔居尊位當大有之時人心安易若專尚柔順則陵慢生矣故必威如則吉威如有威嚴之謂也既以柔和孚信接於下衆志説從又有威嚴使之有畏善處有者也吉可知矣本義大有之世柔順而中以處尊位虚己以應九二之賢而上下歸之是其孚信之交也然君道貴剛太柔則廢當以威濟之則吉故其象占如此亦戒辭也潛室陳氏曰大有之六五但言厥孚交如威如吉者葢一卦以一陰為主所有已極其大但當交之以孚濟之以威則能保有其大矣孚者其本冇威者其不足也中溪張氏曰六五為大冇之主離體中虚有厥孚之象柔得尊位而上下應之故曰交如以我之誠心而發彼之誠心此其所以交孚也然當大有海内富庻之時人心易至玩弛寛裕温柔雖足以有容非發强剛毅則不足以有執故交如之後繼之以威如則可以保其吉也苟徒有以孚之而无以威之則人將慢易之心生而无畏備之者矣豈能常保其有乎此威如之吉聖人之深戒也象曰厥孚交如信以發志也本義一人之信足以發上下之志也威如之吉易而无備也易以䜴反傳下之志從乎上者也上以孚信接於下則下亦以誠信事其上故厥孚交如由上有孚信以發其下孚信之志下之從上猶響之應聲也一有威如之吉易而无備也九字威如之所以吉者謂若无威嚴則下易慢而无戒備也謂无恭畏備上之道備謂備上之求責也本義太柔則人將易之而无畏備之心西溪李氏曰太平之世禍亂皆起於无虞故必威如而後吉才上下玩易則无畏備也故詰爾戎兵董正治官皆守成之世所當講者也上九自天祐之吉无不利傳上九在卦之終居无位之地是大有之極而不居其有者也處離之上明之極也唯至明所以不居其有不至於過極也有極而不處則无盈滿之災能順乎理者也五之孚信而履其上為蹈履誠信之義五有文明之徳上能降志以應之為尚賢崇善之義其處如此合道之至也自當享其福慶自天祐之行順乎天而獲天祐故所徃皆吉无所不利也本義大有之世以剛居上而能下從六五是能履信思順而尚賢也滿而不溢故其占如此或問上九自天祐之吉无不利朱子曰上九以陽剛居上而能下從六五者葢陽從陰也大有唯六五一陰而上下五陽應之上九能下從六五則為履信思順而尚賢葢五之交孚信也而上能履之謙退不居思順也志從於五尚賢也天之所助者順人之所助者信所以有自天祐之吉无不利之象若无繫辭此數句此爻遂无收殺以此見聖人讀易見爻辭有不分明處則於繫辭傳説破如此類是也象曰大有上吉自天祐也傳大有之上有極當變由其所為順天合道故天祐助之所以吉也君子滿而不溢乃天祐也繫辭復申之云天之所助者順也人之所助者信也履信思乎順又以尚賢也是以自天祐之吉无不利也履謂信履五五虛中信也思順為謙退不居尚賢謂志從於五大有之世不可以盈豐而復處盈焉非所宜也六爻之中皆樂據權位唯初上不處其位故初九无咎上九无不利上九在上履信思順故在上而得吉葢自天祐也節齋蔡氏曰大有一柔五剛故以柔為一卦之主而衆爻皆于五取義初以遠五而有艱二以應五而无咎三以公位而用享于天子四以能謙承五而无咎上以近五而獲自天之祐也平庵項氏曰大有之卦以六五為主初之无交害逸民也上九在上賔師也中爻三位為臣二大臣也受大有之任故為載三外臣也奉大冇之物以朝貢故為享二中故无咎三不中故戒君子用享則為桓文小人弗克則為曹馬矣四近臣也以柔自抑不怙大有之􅃂故為匪其彭五離中虛中孚為信而上下應之則其孚交矣所慮者居易无備故必威如乃吉欲其克自警畏也誠齋楊氏曰八卦乾為尊六十四卦泰為盛然乾之上九悔於亢泰之上六吝於亂盛治備福孰若大有者六爻亨一吉二无咎三明主在上羣賢畢集无一敗亂之小人无一害治之棐德士生斯世也緼袍華於佩玊飲水甘於列鼎而况九二之大臣九三之諸侯上九功成身退之耆舊乎嗚呼盛哉艮下坤上傳謙序卦有大者不可以盈故受之以謙其有旣大不可至於盈滿必在謙損故大有之後受之以謙也為卦坤上艮下地中有山也地體卑下山髙大之物而居地之下謙之象也以崇髙之德而處卑之下謙之義也隆山李氏曰設卦命名多以畫之反對取象謙豫二卦反履小畜之對也履謙取畫在三豫小畜取象在四特陰陽之畫不同耳皆五陰一陽五陽一陰之卦也一陰在下卦三陽之上其位不順故名之小畜一陽在下卦三陰之上其位則順故名之豫一陰在上卦三陽之下其位則宜故名之履一陽在上卦三陰之下其位非宜故名之謙厚齋馮氏曰一陽五陰之卦其立象也一陽在上下者為剝復象陽氣之消長也在中者為師比象衆之所歸也至於三四在二體之際當六畫之中故以其自上而退處於下者為謙自下而奮出乎上者為豫此觀畫立象之本旨也謙亨君子有終傳謙有亨之道也有其德而不居謂之謙人以謙巽自處何往而不亨乎君子有終君子志存乎謙巽逹理故樂天而不競内充故退讓而不矜安履乎謙終身不易自卑而人益尊之自晦而德益光顯此所謂君子有終也在小人則有欲必競有德必伐雖使勉慕於謙亦不能安行而固守不能有終也程子曰他卦皆有悔凶咎唯謙卦未嘗有他卦有待而亨唯謙則便亨涑水司馬氏曰君子之德誠盛矣業誠大矣不謙以持之无以保其終也隆山李氏曰此易中最吉之卦而天下最難行之事非謙之難謙而能終者之難也非君子豈能有終乎本義謙者有而不居之義止乎内而順乎外謙之意也山至髙而地至卑乃屈而止於其下謙之象也占者如是則亨通而有終矣有終謂先屈而後伸也朱子曰謙便能亨又為君子有終之象節齋蔡氏曰剛屈乎柔之下謙之義也剛下乎柔交通之道故亨君子三也君子有是德則始雖卑而終益尊始雖晦而終益光故有終雲峰胡氏曰乾為易第一卦本義謂筮得乾卦者其事雖大亨猶未易以保其終葢天下之事始而亨者十九亨而有終者十一唯謙則於德為君子於事為亨而有終彖曰謙亨天道下濟而光明地道卑而上行上時掌反傳濟當為際此明謙而能亨之義天之道以其氣下際故能化育萬物其道光明下際謂下交也地之道以其處卑所以其氣上行交於天皆以卑降而亨也本義言謙之必亨童溪王氏曰夫天氣下降以濟萬物天之謙也化育之功光明著見則謙之亨也地勢卑順處物之下地之謙也其氣上行以交於天則謙之亨也莫大乎天地而天地猶不敢以自滿况於人與鬼神乎節齋蔡氏曰下濟而光明艮也艮有光明之象故艮之彖曰其道光明謂艮陽止乎上陰不得而掩之故光明卑而上行坤也雲峰胡氏曰下濟為謙光明為亨卑為謙上行為亨彖傳但言謙之必亨而不言卦體葢下濟光明自含艮坤二體於其間也天道虧盈而益謙傳以天行而言盈者則虧謙者則益日月陰陽是也程子曰虧盈益謙此通上下言理亦如此天道之運亦如此朱子曰虧盈益謙是自然之理地道變盈而流謙傳以地勢而言盈滿者傾變而益䧟卑下者流注而益增也朱子曰變盈流謙掦子雲言山殺瘦澤増髙此是説山上之土為水漂流下來山更瘦澤便髙鬼神害盈而福謙傳鬼神謂造化之跡盈滿者禍害之謙損者福祐之凡過而損不足而益者皆是也朱子曰天道是就寒暑往來上説地道是就地形髙下上説鬼神言害福是有些造化之柄各自主一事而言耳人道惡盈而好謙惡烏路反好呼報反傳人情疾惡於盈滿而好與於謙巽也謙者人之至德故聖人詳言所以戒盈而勸謙也或問謙之為義不知天地人鬼何以皆好尚之朱子曰太極中本无物若事業功勞於我何有觀天地生萬物而不言所利可見矣節齋蔡氏曰虧盈益謙以氣言日月陰陽是也變盈流謙以形言山谷川澤是也害盈福謙以理言災祥禍福是也惡盈好謙以情言予奪進退是也白雲郭氏曰四者非有心於如是其道自然故皆曰道厚齋程氏曰復舉天地因及鬼神與人以推廣謙所以亨之意謙尊而光卑而不可踰君子之終也傳謙為卑巽也而其道尊大而光顯自處雖卑屈而其德實髙不可加尚是不可踰也君子至誠於謙恒而不變有終也故尊光本義變謂傾壞流謂聚而歸之人能謙則其居尊者其徳愈光其居卑者人亦莫能過此君子所以有終也或問謙尊而光卑而不可踰朱子曰尊字是對卑字説言能謙則位處尊而德愈光位雖卑而莫能踰如古之聖賢之君以謙下人則愈尊而愈光若驕奢自大則雖尊而不光葢以尊而行謙則其道光以卑而行謙則其德不可踰也伊川以謙對卑説非是童溪王氏曰尊者三居下卦之上也光艮體也卑者三居上卦之下也不可踰謂位雖居下而德剛莫有過之者葢以謙居尊而道光以謙居卑而德不可踰此專以九三爻言君子有終之義也臨川吳氏曰六十四卦惟謙之占辭最美夫子傳彖亦惟謙之贊辭最盛内三爻俱吉外三爻俱利卦辭則云亨且有終他卦之占未有若是其全美者也天之所益地之所流人之所好鬼神之所福悉萃於能謙者之身他卦之贊未有若是其盛者此謙之所以為至德也象曰地中有山謙君子以裒多益寡稱物平施裒蒲侯反稱尺證反施始䜴反傳地體卑下山之髙大而在地中外卑下而内藴髙大之象故為謙也不云山在地中而曰地中有山言卑下之中藴其崇髙也若言崇髙藴於卑下之中則文理不順諸象皆然觀文可見君子以裒多益寡稱物平施君子觀謙之象山而在地下是髙者下之卑者上之見抑髙舉下損過益不及之義以施於事則裒取多者増益寡者稱物之多寡以均其施與使得其平也程子曰謙者治盈之道故曰裒多益寡稱物平施本義以卑藴髙謙之象也裒多益寡所以稱物之宜而平其施損髙増卑以趣於平亦謙之意也朱子曰裒多益寡便是謙稱物平施便是裒多益寡問裒多益寡是損髙就低使教恰好不是一下低去曰大扺人多見得在已者髙在人者卑謙則抑已之髙而卑以下人便是平也臨川呉氏曰山在地中則髙者降而下卑者升而上一升一降而髙卑適平矣物之多者裒取而使之寡猶降山之髙而使之卑也物之寡者増益而使之多猶升地之卑而使之髙也一裒一益而多寡適平矣稱物平施謂稱量物之多寡而損益之然後所施均平而多者不偏多寡者亦不偏寡也厚齋馮氏曰凡大象皆别立一意使人知用意之理裒多益寡稱物平施俾小大長短各得其平非君子謙徳之象乃君子治一世使謙之象也彖與六爻全无此意初六謙謙君子用涉大川傳初六以柔順處謙又居一卦之下為自處卑下之至謙而又謙也故曰謙謙能如是者君子也自處至謙衆所共與也雖用涉險難亦无患害况居平易乎何所不吉也初處剛而以柔居下得无過於謙乎曰柔居下乃其常也但見其謙之至故為謙謙未見其失也本義以柔處下謙之至也君子之行也以此涉難何往不濟故占者如是則利以涉川也童溪王氏曰六謙德也初卑位也以謙德而處卑位謙而又謙者也故曰謙謙蘭氏廷瑞曰用涉與利涉不同用涉自我用之不若利之无往不濟也臨川王氏曰利涉者其才其時利於涉耳用涉者用此以涉然後吉也雙湖胡氏曰涉川貴於遲重不貴於急速用謙謙之道以渉川只是謙退居後而不争先自然萬无失一故吉後登舟亦有先登㟁之利謙固自多利也雲峰胡氏曰謙主九三故三爻辭與卦辭皆稱君子有終初亦曰君子何也三在下卦之上勞而能謙在上之君子也初在下卦之下謙而又謙在下之君子也在上者尊而光在下者卑而不可踰皆所以為君子之終也用渉大川吉雖用以濟患可也况平居乎象曰謙謙君子卑以自牧也傳謙謙謙之至也謂君子以謙卑之道自牧也自牧自處也詩云自牧歸荑南軒張氏曰謙謙君子卑以自牧如牧牛羊然使之馴服方可以言謙今人往往反以驕矜為飬氣此特客氣非浩然之氣也建安丘氏曰牧飬也飬德之地未有不基於至卑所飬者至則愈卑而愈不卑矣六二鳴謙貞吉傳二以柔順居中是為謙徳積於中謙徳充積於中故發於外見於聲音顔色故曰鳴謙居中得正有中正之德也故云貞吉凡貞吉有為貞且吉者有為得貞一有正字則吉者六二之貞吉所自有也童溪王氏曰六二以謙德而居下之正位則得其所欲矣故發於聲音也无非中心之誠然者故曰鳴謙貞吉而象以中心得也釋之本義柔順中正以謙有聞正而且吉者也故其占如此朱子曰鳴謙在六二又言貞者言謙而有聞須得其正則吉葢六二以陰處陰所以戒他要貞謙而不貞則近於邪佞上六之鳴却不同處謙之極而有聞則失謙之意葢謙本不要人知况在人之上而有聞乎此所以志未得雲峯胡氏曰諸家釋鳴謙多謂自鳴其謙謙而以自鳴非謙矣或以為六二謙徳積於中發見於聲音者如此本義以為六二柔順中正以謙有聞葢謂發於聲音不若謙而有聲有非可勉强為之者要之初六謙謙在下而謙未必人皆聞之至六二則宜聞之矣象曰鳴謙貞吉中心得也傳二之謙德由至誠積於中所以發於聲音中心所自得也非勉一有强字為之也九三勞謙君子有終吉傳三以陽剛之德而居下體為衆陰所宗履得其一作正位為下之上是上為君所任下為衆所從有功勞而持謙德者也故曰勞謙古之人有當之者周公是也身當天下之大任上奉㓜弱之主謙恭自牧夔夔如畏然可謂有勞而能謙矣既能勞謙又須君子行之有終則吉夫樂髙喜勝人之常情平時能謙固已鮮矣况有功勞可尊乎雖使知謙之善勉而為之若矜負之心不忘則不能常久欲其有終不可得也唯君子安履謙順乃其常行故久而不變乃所謂有終有終則吉也九三以剛居正能終者也此爻之德最盛故象辭特重本義卦唯一陽居下之上剛而得正上下所歸有功勞而能謙尤人所難故有終而吉占者如是則如其應矣雙湖胡氏曰謙以九三一陽爻為成卦之主文王彖辭唯主九三一爻而言不及其他故周公爻辭不復易但推原其勞而要其吉耳雲峰胡氏曰文王卦辭曰謙亨君子有終周公於三之爻辭以吉代亨字謙之上加一勞字葢謙非難勞而能謙為難九三之勞當在上位而位止於下所謂勞而能謙者也乾之三以君子稱坤之三以有終言謙之三兼乾坤之占辭葢所謂勞者即乾之終日乾乾者是也而謙則又坤之含章也楊氏曰夫六謙德也而三則以九居之何邪曰所以成天下之功者非剛明之才不可也今三以剛明之才上為君所任下為衆所倚信勞而有功矣然勞而不伐有功而不德此君子恭以存其位之道也故獲有終之古象曰勞謙君子萬民服也傳能勞謙之君子萬民所尊服也繋辭云勞而不伐有功而不德厚之至也語以其功下人者也德言盛禮言恭謙也者致恭以存其位者也有勞而不自矜伐有功而不自以為德是其德𢎞厚之至也言以其功勞而自謙以下於人也德言盛禮言恭以其徳言之則至盛以其自處之禮言之則至恭此所謂謙也夫謙也者謂致恭以存其位者也存守也致其恭巽以守其位故髙而不危滿而不溢是以能終吉也夫君子履謙乃其常行非為保其位而為之也而言存其位者葢能致恭所以能存其位言謙之道如此如言為善有令名君子豈為令名而為善也哉亦言其令名者為善之故一作效也臨川王氏曰萬民服謂有終而吉也萬民以卦之五陰言誠齋楊氏曰萬民服者非服其勞也服其勞而能謙謙而有終也童溪王氏曰舜之賢禹也而曰洚水儆予成允成功惟汝賢此服其勞也又曰汝惟不矜天下莫與爭能汝惟不伐天下莫與爭功此服其勞而能謙也夫功吾功也能吾能也天下何與焉矜伐之心一不克去則天下羣起而與之爭功何以致萬民之服哉六四无不利撝謙撝揮同傳四居上體切近君位六五之君又以謙柔自處九三又有大功德為上所任衆所宗而已居其上當恭畏以奉謙德之君卑巽以讓勞謙之臣動作施為无所不利於撝謙也撝施布之象如人手之撝也動息進退必施其謙盖居多懼之地又在賢臣之上故也本義柔而得正上而能下其占无不利矣然居九三之上故戒以更當發揮其謙以示不敢自安之意也朱子曰撝謙言發揚其謙盖四是陰位又在上卦之下九三之上所以更當𤼵揮其謙雲峰胡氏曰四多懼之地下乘功臣非利也上近於君非利也今而上下皆謙四又柔而得正上而能下此四之所以无不利也无不利之時人每易以自安况四以柔乘剛无功而在功臣之上危地也愈當撝布其謙以示其不自安之意可也故先言无不利而後言撝謙者以其所處之地雖无不利而尤貴於散布其謙也六五言利用侵伐而後言无不利者言侵伐五之柄於五為利而其他亦无所不利也象曰无不利撝謙不違則也傳凡人之謙有所宜施不可過其宜也如六五或用侵伐是也唯四以處近君之地據勞臣之上故凡所動作靡不利於施謙如是然後中於法則故曰不違則也謂得其宜也本義言不為過朱子曰不違則言不違法則撝謙是合如此不是過分事雲峰胡氏曰以六居四而撝布其謙似失之過而象斷之曰不違則以見四之撝謙乃天理之當然非過也六五不富以其鄰利用侵伐无不利傳富者衆之所歸唯財為能聚人五以君位之尊而執謙順以接於下衆所歸也故不富而能有其鄰也鄰近也不富而得人之親也為人君而持謙順天下所歸心也然君道不可專尚謙柔必須威武相濟然後能懷服天下故利用行侵伐也威徳竝著然後盡君道之宜而无所不利也葢五之謙柔當防於過故發此義本義以柔居尊在上而能謙者也故為不富而能以其鄰之象葢從之者衆矣猶有未服者則利以征之而於他事亦无不利人有是徳則如其占也雲峰胡氏曰謙之一字自禹征冇苖而伯益𤼵之六五一爻不言謙而曰利用侵伐何也葢不富者六五虚中而能謙也以其鄰者衆莫不服五之謙也如此而猶有不服者則征之固宜抑亦以戒夫謙柔之過或不能自立者也故六五獨不言謙无不利者又言謙非特利於侵伐而他事亦无不利又以示夫後世之主或不能謙者也聖人之言詳宻如此中溪張氏曰六五謙柔之主而利用侵伐毋乃内謙而外好勝乎豈知惟辟作福作威而威武乃文徳之輔助也其有梗化而不服者如之何而勿征倘君道專用謙柔則流於姑息失之驕縱乃謙之過也非謙之益也象曰利用侵伐征不服也傳征其文徳謙巽所不能服者也文徳所不能服而不用威武何以平治天下非人君之中道謙之過也誠齋楊氏曰征不服者不服而征不得已爾舜征苗不得已也武征匈奴豈不得已乎漢上朱氏曰征者上伐下也以正而行司馬法曰負固不服則侵之聖人慮後世觀此爻有干戈妄動者故𤼵之曰征不服也上六鳴謙利用行師征邑國傳六以柔處柔順之極又處謙之極極乎謙者也以極謙而反居髙未得遂其謙之志故至𤼵於聲音又柔處謙之極亦必見於聲色故曰鳴謙雖居无位之地非任天下之事然人之行已必須剛柔相濟上謙之極也至於太盛則反為過矣故利在以剛武自治邑國已之私有行師謂用剛武征邑國謂自治其私本義謙極有聞人之所與故可用行師然以其質柔而无位故可以征已之邑國而已或問謙之五上專説征伐何意朱子曰坤為地為衆凡説國邑征伐處多是因坤聖人元不曽著意只是因有此象方説此事又問程易説利用侵伐葢以六五柔順謙卑然君道又當有剛武意故有利用侵伐之象然上九亦言利用行師如何曰便是此等有不通處雲峰故氏曰二與上皆曰鳴謙何也有諸中自然聞諸外故於下卦之中爻言之凡善惡不能掩人之聞况至於極乎故又於上卦之極言之本義於六二之鳴謙曰柔順中正以謙有聞於上則曰謙極有聞葢謂此也初曰用渉大川吉五曰利用侵伐上曰利用行師歴言夫謙之功用非特可以處常用之亦可以濟變非特可以致萬民之服用之亦可以征不服故初无位其謙也用之可以濟人五居君位其謙也用之可以治人上无位用之唯可以治己之私而已夫初上皆无位而上之征邑不如初之涉大川何也初居卦之始有出而用之之時上則居卦之極故也象曰鳴謙志未得也可用行師征邑國也傳謙極而居上欲謙之志未得故不勝其切至於鳴也雖不當位謙既過極宜以剛武自治其私故云利用行師征邑國也本義陰柔无位才力不足故其志未得而至於行師然亦適足以治其私邑而已或問上六志未得也如何朱子曰為其志未得所以行師征邑國葢以未盡信從故也雲峰胡氏曰上雖謙極有聞然陰柔无位志未得也視二之中心得者有間矣至於行師足以治其私邑而已視五之征不服者有間矣无位故也然而猶不至於悔且凶者謙故也建安丘氏曰謙卦六爻五陰一陽陽實陰虗陰皆有求於陽者故以九三一陽為卦之主其諸陰爻則以去三遠近取義三四兩爻與三最近皆有得乎陽者故二鳴謙貞吉而四无不利撝謙也初在下欲進而求三則隔乎二五上在上欲下而求三則隔乎四皆无得乎陽者故初用涉而五侵伐上行師也雙湖胡氏曰謙一卦下三爻皆吉而无凶上三爻皆利而无害易中吉利罕有若是純全者謙之效固如此然艮體稱吉而坤體稱利者靜則多吉順則多利故也周易傳義大全卷六
