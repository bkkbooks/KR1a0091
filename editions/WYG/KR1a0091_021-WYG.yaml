body:
  text: 周易傳義大全卷十五明胡廣等撰兌下艮上傳損序卦解者緩也緩必有所失故受之以損縱緩則必有所失失則損也損所以繼解也為卦艮上兌下山體髙澤體深下深則上益髙為損下益上之義又澤在山下其氣上通潤及草木百物是損下而益上也又下為兌說三爻皆上應是說以奉上亦損下益上之義又下兌之成兌由六三之變也上艮之成艮自上九之變也三本剛而成柔上本柔而成剛亦損下益上之義損上而益於下則為益取下而益於上則為損在人上者施其澤以及下則益也取其下以自厚則損也譬諸壘土損於上以培厚其基本則上下安固矣豈非益乎取於下以增上之髙則危墜至矣豈非損乎故損者損下益上之義益則反是雲峰胡氏曰上下經隂陽各三十畫然後為泰否為損益咸男女之交變而損則不交恒男女之不交變而益則交咸者夫婦之情情之感也極必損恒者夫婦之道道之乆也極必益然損九三益上六為損初九上而為四為五胡不謂之損損九四益初六謂之益上九下而為三為二胡不謂之益益在下卦之下民爻也下之上容可損下之下為民決不可損也故損之釋彖曰損下益上而不言損民益之釋彖曰損上益下民說无疆則其為損民也可知矣民為邦本可益而不可損如此漢上朱氏曰損泰變也損九三以益上六也益上矣而謂之損何也蓋上以下為基譬之築墉損其基以增上之髙則危矣非益也損有孚元吉无咎可貞利有攸往傳損減損也凡損抑其過以就義理皆損之道也損之道必有孚誠謂至誠順於理也損而順理則大善而吉所損无過差可貞固常行而利有所往也人之所損或過或不及一有或常字或不常一作當皆不合正理非有孚也非有孚則无吉而有咎非可貞之道不可行也本義損減省也為卦損下卦上畫之陽益上卦上畫之隂損兌澤之深益艮山之髙損下益上損内益外剝民奉君之象所以為損也損所當損而有孚信則其占當有此下四者之應矣節齋蔡氏曰内本乾外本坤乾上爻與坤上爻往来本剛得柔為損本柔得剛為益凡卦以内為貞主貞而言故為損進齋徐氏曰孚信實也損所當損適時之宜而有孚信可行之理所謂有孚也可貞者可以正故守此也其道可行故利往損而有孚則元吉无咎可貞而利有攸往也蓋損者拂人情之事易至凶咎故特詳之雲峰胡氏曰損之元吉无咎可貞利往占之辭繁而不殺自坤彖外未有如此反覆詳悉者損本拂人情之事也損下未必大善而吉未必无過未必可固守未必可有往唯損其所當損於理可行而下信之則其占可如此爾曷之用二簋可用享傳損者損過而就中損浮末而就本實也聖人以寧儉為禮之本故於損發明其義以享祀言之享祀之禮其文最繁然以誠敬為本多儀備物所以將飾其誠敬之心飾過其誠則為偽矣損飾所以存誠也故云曷之用二簋可用享二簋之約可用享祭言在乎誠而已誠為本也天下之害无不由末之勝也峻宇雕牆本於宫室酒池肉林本於飲食淫酷殘忍本於刑罰窮兵黷武本於征討凡人欲之過者皆本於奉養其流之逺則為害矣先王制其本者天理也後人流於末者人欲也損之義損人欲以復天理而已本義言當損時則至薄无害朱子曰二簋與簋貳字不同可見其義亦不同進齋徐氏曰曷之用者問辭二簋可用享者答辭下之奉上皆謂之享即燕享之享也雲峰胡氏曰上有不得已而損下者非以自用也曷之用二簋可用享必用享為訓者損之時享猶不敢過則所以自奉者可知矣古者享禮陳饋八簋為盛四簋為中二簋為簡坎之時以一簋貳一尊則又簡矣彖曰損損下益上其道上行上行之上時掌反傳損之所以為損者以損於下而益於上也取下以益上故云其道上行夫損上而益下則為益損下而益上則為損損基本以為髙者豈可謂之益乎隆山李氏曰在下者民之象而在上者君之象也損民益君亦分之常而作易者名之為損蓋損民者乃所以損國故設卦命名深寓至戒也劉氏曰古之為人上者无損下獲益之理故易以損下為損益下為益後世乃有百姓輸已之財以助公上者皆非盛世之事也開封耿氏曰貴以賤為本髙以下為基故益下則下與上俱益損下則下與上俱損本義以卦體釋卦名義中溪張氏曰損者損下益上之卦自三而上其益在上故曰其道上行道者當然而然之謂以下奉上損實益虚損有餘益不足其道當如是非過損也蘭氏廷瑞曰損益二卦専為三隂設也損乾之九四故曰損上損乾之九三故曰損下建安丘氏曰損之名由有餘而起益之名自不足而生損有餘所以補不足也故滿則招損謙則受益若多寡適稱則无所損益矣今觀損下體本乾三畫皆陽過於富實當損者也上體本坤三畫皆隂過於虚乏當益者也當損而損當益而益是乃理之正事之宜也聖人豈以損民之不足者為損哉損而有孚元吉无咎可貞利有攸往傳謂損而以至誠則有此元吉以下四者損道之盡善也進齋徐氏曰卦辭曰損有孚彖辭曰損而有孚加以而之一字則其義曉然矣曷之用二簋可用享二簋應有時損剛益柔有時傳夫子特釋曷之用二簋可用享卦辭簡直謂當損去浮飾曰何所用哉二簋可以享也厚本損末之謂也夫子恐後人不達遂以為文飾當盡去故詳言之有本必有末有實必有文天下萬事无不然者无本不立无文不行父子主恩必有嚴順之體君臣主敬必有承接之儀禮讓存乎内待威儀而後行尊卑有其序非物采則一作而无别文之與實相須而不可缺也及夫文之勝末之流逺本喪實乃當損之時也故云曷所用哉二簋足以薦其誠矣謂當務實而損飾也夫子恐人之泥言也故復明之曰二簋之質用之當有時非其所用而用之不可也謂文飾未過而損之與損之至於過甚則非也損剛益柔有時剛為過柔為不足損益皆損剛益柔也必順時而行不當時而損益之則非也厚齋馮氏曰夫剛非當損柔非當益也損剛益柔蓋有時如此故二簋之享亦當有時如此也三剛而損其一止有二剛可以用享耳潘氏曰於時為損則享祀何所用哉曰二簋足矣蓋處損之時則可若處萃之時則大牲矣損益盈虛與時偕行傳或損或益或盈或虛唯隨時而已過者損之不足一作及者益之虧者盈之實者虚之與時偕行也本義此釋卦辭時謂當損之時厚齋馮氏曰損益盈虚與時偕行復釋損剛益柔之義謂損而不已必虚益而不已必盈亦惟與時偕行耳中溪張氏曰當其可之謂時當損而損時也不當損而損則非時矣損其盈者益其虛者適時之宜與之偕行雖聖人亦不能違乎時也雲峰胡氏曰益曰與時偕行損於時之一字凡三言之然則不當損之時而損可乎哉非特二簋之用有時以卦畫推之損剛益柔有時以天下之理推之凡損益盈虚皆有時也象曰山下有澤損君子以懲忿窒欲傳山下有澤氣通上潤與深下以增髙皆損下之象君子觀損之象以損於已在脩已之道所當損者唯忿與欲故以懲戒其忿怒窒塞其意欲也本義君子終身所當損者莫切於此或問懲忿窒慾忿怒易發難制故曰懲懲是戒於其後慾之起則甚㣲漸漸到熾處故曰窒窒謂塞於初古人說情竇竇是罅隙須是塞其罅隙朱子曰懲也不専是戒於後若是怒時也須先懲治他始得懲者懲於今而戒於後耳窒亦非是真有箇孔穴去塞了但遏絶之使不行耳又曰觀山之象以懲忿觀澤之象以窒慾慾如汙澤然其中穢濁解汙染人湏當填塞了問觀山之象以懲忿是如何曰人怒時自是恁突兀起来故孫權曰令人氣湧如山懲忿如摧山窒慾如填壑又曰懲忿如救火窒慾如防水山下有澤損君子以懲忿窒慾必是降下山以塞其澤便是此象六十四卦象皆如此問何以窒慾伊川云思此莫是言慾心一萌當思禮義以勝之否曰然龜山楊氏曰君子之修徳可損者莫過於忿慾忿之不懲必至於遷怒慾之不窒必至於貳過節齋蔡氏曰山下之澤潤上行而水漸減損之象也懲止也窒塞也忿則陵物欲則溺已二者皆所當損懲忿艮象窒慾兌象林氏栗曰風雷為益者雷震則益風風怒則益雷山澤為損者山摧則損澤澤動則損山此損益二卦有自然之象也建安丘氏曰忿慾者吾身愛惡之私皆所當損也然懲忿易窒慾難蓋忿屬陽其發也氣勢暴湧如山之突兀人皆知之故懲之易欲屬隂其溺人也如水之浸淫泯无痕迹使人不覺陷其中而不能出故窒之難懲忿唯用心之剛者即能制之窒慾不唯用剛非見理之精未易察也初九已事遄往无咎酌損之遄市専反傳損之義損剛益柔損下益上也初以陽剛應於四四以隂柔居上位賴初之益者也下之益上當損已而不自以為功所益於上者事既已則速去之不居其功乃无咎也若享其成功之美非損已益上也於為下之道為有咎矣四之隂柔賴初者也故聽於初初當酌度其宜而損己以益之過與不及皆不可也本義初九當損下益上之時上應六四之隂輟所為之事而速往以益之无咎之道也故其象占如此然居下而益上亦當斟酌其淺深也朱子曰酌損之在損之初下猶可以斟酌也問損卦二陽皆能益隂而二上二爻則弗損益之初則曰酌損之何邪曰這一爻難解只得用伊川說又云易解得處少難解處多今且恁地說去到那占時又自别消詳有應處難豫為定說也臨川吴氏曰損之時皆當以下陽益上隂已止也事所作為之事也陽動喜作為初在下當止其所作為之事而速往以益四也居下者不當有為以其有餘之才補益其上已損而上益此處下之道也故无咎廣平㳺氏曰損下而益上者或失其節則後難繼故必酌損之雲峰胡氏曰初九以剛居剛而當損之初唯其以剛居剛則為之過故可自已其所為而速往以益四唯其當損之初則又未可自損之過故當酌其淺深之宜而不自傷其本量其所受隨器而止酌之義也象曰已事遄往尚合志也傳尚上也時之所崇用為尚初之所尚者與上合志也四賴於初初益於四與上合志也本義尚上通廣平游氏曰四之志欲損其疾而初遄往使遄有喜焉故曰尚合志也九二利貞征凶弗損益之傳二以剛中當損剛之時居柔而說體上應六五隂柔之君以柔說應上則失其剛中之徳故戒所利在貞正也征行也離乎中則失其貞正而凶矣守其中乃貞也弗損益之不自損其剛貞則能益其上乃益之也若失其剛貞而用柔說適足以損之而已一无而已字非損己而一有以字益上也世之愚者有雖无邪心而唯知竭力順上為忠者蓋不知弗損益之之義也董氏曰二以剛益五之柔亦如初益四初以剛居剛少損之則可裁度以助四二以剛居柔更損之將至媚說以狥五矣故既以利貞勉之復以征凶警之廣平游氏曰兌之情說而陽性好動故有利貞征凶之戒也本義九二剛中志在自守不肯妄進故占者利貞而征則凶也弗損益之言不變其所守乃所以益上也雲峰胡氏曰二剛中无有不正倘不能自守而妄進則非正矣故凶卦唯九三剛過乎中故當損初九九二則深恐其損之之過初以剛居剛而未及乎中當酌其所當損而損之二以剛居柔而得乎中不自損其所守者乃所以益之也損兼言益益不言損此又易之微意臨川吴氏曰初九九二皆是以下卦之陽益上卦之隂者而爻辭之意相反初必自止其事而速當上往就四二當利於正固而不可上征就五初之益四則損己而益之二之益五則不損己而益之蓋初以陽居陽二以陽居隂故不同也雙湖胡氏曰二雖弗損然與六五為正應以剛濟柔固未嘗无益之之道也象曰九二利貞中以為志也傳九居二非正也處說非剛也而得中為善若守其中徳何有不善豈有中而不正者豈有中而有過者二所謂利貞謂以中為志也志存乎中則自正矣大率中重於正中則正矣正不必中也能守中則有益於上矣臨川吴氏曰以其中為志而益六五利在自守不宜行往也六三三人行則損一人一人行則得其友傳損者損所餘也益者益不足也三人謂下三陽上三隂三陽同行則損九三以益上三隂同行則損上六以為三三人行則損一人也上以柔易剛而謂之損但言其減一耳上與三雖本相應由二爻升降而一卦皆成兩相與也初二二陽四五二隂同徳相比三與上應皆兩相與則其志専皆為得其友也三雖與四相比然異體而應上非同行者也三人則損一人一人則得其友蓋天下无不二者一與二相對待生生之本也三則餘而當損矣此損益之大義也夫子又於繫辭盡其義曰天地絪縕萬物化醇男女構精萬物化生易曰三人行則損一人一人行則得其友言致一也絪縕交密之狀天地之氣相交而密則生萬物之化醇醇謂醲厚醲厚猶精一也男女精氣交構則化生萬物唯精醇専一所以能生也一隂一陽豈可二也故三則當損言専致乎一也天地之間當損益之明且大者莫過此也程子曰道二仁與不仁而已自然理如此道无无對有隂則有陽有善則有惡有是則有非无一亦无三易曰三人行則損一人一人行則得其友只是二也絪縕隂陽之感朱子曰三人行損一人一人行得其友一陽上去換得一隂来伊川就六爻上說得好中溪張氏曰隂陽對待唯二而已三則餘其一而當損此所以損九三而益上六也故曰三人行則損一人此一人也獨往以應上則艮兌相合男女構精而有萬物化生之功矣故曰一人行則得其友也本義下卦本乾而損上爻以益坤三人行而損一人也一陽上而一隂下一人行而得其友也兩相與則専三則雜而亂卦有此象故戒占者當致一也建安丘氏曰此爻乃損之所以為損也下體之乾三陽竝進三人行也九三一爻損而上之三人行則損一人也九三上而為上則上六下而為三剛柔偶合一人行則得其友也雲峰胡氏曰損以三之損而名故於此爻極論損之精義三人行而損一人兩也一人行而得其友亦兩也天地間隂陽剛柔鬼神造化之類皆兩而已本義兩相與則専曰戒占者當致一一則一隂一陽之謂也各致其一則為兩矣雙湖胡氏曰此爻大㫖本義已盡之矣繋辭致一之說已自是夫子之意而程傳則又推之六爻者也象曰一人行三則疑也傳一人行而得一人乃得友也若三人行則疑所與矣理當損去其一人損其餘也中溪張氏曰夫一隂一陽之謂道苟參之以三則疑心生焉此聖人因一人之行而得致一之理也雲峰胡氏曰損因三而成故必損六三然後隂陽各以兩而相資六三損則三於上為得友上於三為得臣三與上為兩九二利貞六五元吉二與五為兩初尚合志四亦可喜初與四為兩天地男女之義不過乎兩故曰三則疑也六四損其疾使遄有喜无咎傳四以隂柔居上與初之剛陽相應在損時而應剛能自損以從剛陽也損不善以從善也初之益四損其柔而益之以剛損其不善也故曰損其疾疾謂疾病不善也損於不善唯使之遄速則有喜而无咎人之損過惟患不速速則不致於深過為可喜也本義以初九之陽剛益己而損其隂柔之疾唯速則善戒占者如是則无咎矣楊氏曰物不得剛柔之中者俱謂之疾偏乎剛者忿之疾也偏乎柔者欲之疾也六四以柔居柔偏乎柔者之疾也得初九之陽以為應損其疾者也損其疾則喜者速矣中溪張氏曰初言遄往四言使遄蓋初之遄實四有以使之也雲峰胡氏曰六四與初九為應初方已其事而速於益四四以初之陽剛而損其隂柔之疾唯速則有喜不然彼方汲汲此乃悠悠非受益之道也象曰損其疾亦可喜也傳損其所疾固可喜也云亦發語辭廣平游氏曰有疾初无可喜因人而去之故曰亦可喜也六五或益之十朋之龜弗克違元吉傳六五於損時以中順居尊位虚其中以應乎二之剛陽是人君能虚中自損以順從在下之賢也能如是天下孰不損己自盡以益之故或有益之之事則十朋助之矣十衆辭龜者決是非吉凶之物衆人之公論必合正理雖龜䇲不能違也如此可謂大善之吉矣古人曰謀從衆則合天心中溪張氏曰十朋之龜弗克違則天下之益皆歸焉本義柔順虚中以居尊位當損之時受天下之益者也兩貝為朋十朋之龜大寳也或以此益之而不能辭其吉可知占者有是徳則獲其應也朱子曰或益之十朋之龜句弗克違易象自是一法如離為龜則損益二卦皆說龜此類甚多損益二卦說龜一在二一在五是顛倒說去未濟與既濟說鬼方亦然汪彦章說離為龜故卦言龜處皆有離象如頤之靈龜損益十朋之龜以其卦雖无離而通體似離也頤六爻損自二至上益自初至五此其求之巧矣然頤猶取龜義而无取於離損益則但言其得益之多而義亦不復繫於龜矣今乃不論其所以得益之故以為求益之方而必求其龜之所自来亦可謂枉費心力矣節齋蔡氏曰元龜有國之大寳言益之大也弗克違者不求而必至之意故元吉雲峰胡氏曰益不可以有心求唯不知其益之所自来而有不能辭者有徳而自然益之者也龜為大寳直二十貝為大龜或益之以此其益也大矣然五有柔順虚中之徳未嘗求此益非五有柔順虚中之徳亦莫能受此益進齋徐氏曰班固食貨志元龜岠冉長尺二寸直二千一百六十為大貝十朋注冉龜甲緣也岠至也度背兩邉縁尺二寸也兩貝為朋朋直二百一十六元龜十朋故二千一百六十也又有公龜九寸直五百為壯貝十朋矦龜七寸以上直三百為么貝十朋于龜五寸以上直百為小貝十朋是為龜寳四品大貝四寸八分以上二枚為一朋直二百一十六壯貝三寸六分以上二枚為一朋直五十么貝二寸四分以上二枚為一朋直三十小貝寸二分以上二枚為一朋直十不盈寸二分漏貝不得為朋東谷鄭氏曰凡曰或益曰有它吉曰有隕自天曰自天祐皆謂不期於得之也象曰六五元吉自上祐也傳所以得元吉者以其能盡衆人之見合天地之理故自上天降之福祐也上九弗損益之无咎貞吉利有攸往得臣无家傳凡損之義有三損己從人也自損以益於人也行損道以損於人也損已從人徙於義也自損益人及於物也行損道以損於人行其義也各因其時取大者言之四五二爻取損己從人下體三爻取自損以益人損時之用行損道以損天下之當損者也上九則取不行其損為義九居損之終損極而當變者一无者字也以剛陽居上若用一有其字剛以損削於下非為上之道其咎大矣若不行其損變而以剛陽之道益於下則无咎而得其正且吉也如是則宜有所往往則有益矣在上能不損其下而益之天下孰不服從從服之衆无有内外也故曰得臣无家得臣謂得人心歸服无家謂无有逺近内外之限也本義上九當損下益上之時居卦之上受益之極而欲自損以益人也然居上而益下有所謂恵而不費者不待損己然後可以益人也能如是則无咎然亦必以正則吉而利有所往恵而不費其恵廣矣故又曰得臣无家朱子曰得臣无家猶言化家為國相似得臣有家其所得也小矣无家則可見其大雲峰胡氏曰弗損益之上與二辭同而意異二當益上之時不損其所守乃所以益上上受益既至于極則又當推以益下然有不待損己而後可以益人者所謂恵而不費是也恵而不費其恵也廣故得臣无家其得也大然曰无咎又曰貞吉利有攸往者九二先言利貞而後言弗損益之二剛中无有不貞者貞其所有也上九曰弗損益之无咎而又曰貞吉者上以剛居益之極貞其所欠也故戒之象曰弗損益之大得志也傳居上不損下而反益之是君子大得行其志也君子之志唯在益於人而已或問損卦下三爻皆是損已益人四五兩爻是損己從人上爻有為人上之象不待損己而自有以益人朱子曰三爻无損己益人底意只是盛到極處去不得自是損了四爻損其疾只是損了那不好了便自好五爻是受益也無損己從人厎意陳埴說損益曰勢自是如此有人主出来也只因這箇勢自往不得到這裏方看做是如何唯是聖人能順得這勢盡得這道理以下人不能識得損益之宜便會錯了壊了也是自立不得節齋蔡氏曰損之為義損下益上聖人不得已用之故卦辭必曰有孚爻辭初曰酌損二上皆曰弗損四但損其疾而已五則无損而大有益唯三當可損之時耳損兼言益益不兼言損意亦可見建安丘氏曰損者損下乾之陽以益上坤之隂也合六爻觀之損在下則益在上矣其在下卦初爻位俱剛可損也故曰酌損之二處柔得中不可損矣故曰弗損益之三則有餘於陽當損其一以奉上故曰損一人此三爻皆知損者也其在上卦四隂虚賴初之陽以為益故曰損其疾五受二之益而又得上之益故曰或益之上與三為往来之爻既得三之益不待損人以益己故曰弗損益此三爻則處損而得益者也震下巽上傳益序卦損而不已必益故受之以益盛衰損益如循環損極必益理之自然益所以繼損也為卦巽上震下雷風二物相益者也風烈則雷迅雷激則風怒兩相助益所以為益此以象言也巽震二卦皆由下變而成陽變而為隂者損也隂變而為陽者益也上卦損而下卦益損上益下所以為益此以義言也下厚則上安故益下為益朱子曰損上益下曰益損下益上曰損所以然者蓋邦本厚則邦寧而君安乃所以為益也否則反是隆山李氏曰益者損卦之反也損卦兌在下本乾體天下富實之象也乾陽在下損乾之九三以益坤于上則是損下之陽實以益上之隂虛者也益卦巽在上本乾體朝廷富實之象也乾陽在上損乾之九四以益坤于下則是損上之陽實以益下之隂虚者也下富實而上虚弱則損下以益上上富實而下虚弱則損上而益下上下相交而更為損益其道一也而損下益上則謂之損損上益下則謂之益何也古之聖賢富厚之資則寜使在民而不在已儉薄之用則寧使在己而不在民蓋肥己瘠人者民貧而已无所寄已雖瘠而天下肥者民樂而吾亦无憂故損下以自益君子以為自損自損以益下君子以為自益也益利有攸往利渉大川傳益者益於天下之道也故利有攸往益之道可以濟險難利渉大川也本義益增益也為卦損上卦初畫之陽益下卦初畫之隂自上卦而下於下卦之下故為益卦之九五六二皆得中正下震上巽皆木之象故其占利有所往而利渉大川也中溪張氏曰益増也其卦下體本坤上體本乾損乾下爻以益坤下爻其益在下故曰益處益之時无所不利以行則利往以濟則利渉也雲峰胡氏曰凡卦以内為主凡物以下為本損下謂之損益下謂之益而上之損益不與焉厚其本也他卦言利往者不言利渉益兼之蓋益以興利也兼山郭氏曰易象中虛上下二體皆木所以利渉大川彖曰益損上益下民說无疆自上下下其道大光下下上遐嫁反下如字傳以卦義與卦才言也卦之為益以其損上益下也損於上而益下則民說之无疆謂无窮極也自上而降已以下下其道之大光顯也陽下居初隂上居四為自上下下之義本義以卦體釋卦名義進齋徐氏曰損上益下者損上之剛益下之柔也下卦坤坤柔為民坤得益故民說无疆上乾之下爻下為坤之下爻自上下下也天道下濟而光明其道大光也故為益雲峰胡氏曰損其道上行以上兩句皆釋損義益其道大光以上四句皆釋益字損益皆以道言後世以聚斂掊克為損下益上者非道也况損下之道僅可上行益下之道大而且光釋彖之㫖深矣哉趙氏汝楳曰二卦之損剛益柔一也而損下為損益下為益何耶蓋損下非聖人之得已而益下乃聖人之本心唐帝所謂吾瘠天下肥亦此意也番昜董氏曰魯哀公以年饑用不足問於有若有若對以盍徹又對以百姓足君孰與不足百姓不足君孰與足蓋深有得於損上益下之㫖也利有攸往中正有慶傳五以剛陽中正居尊位二復以中正應之是以中正之道益天下天下受其福慶也雙湖胡氏曰五以中正應二二亦以中正應五以此而利往以益天下固為君臣之慶㑹而天下實同受其福慶矣利渉大川木道乃行傳益之為一无為字一作於道於平常无事之際其益猶小當艱危險難則所益至大故利涉大川也於濟艱險乃益道大行之時也益誤作木或以為上巽下震故云木道非也本義以卦體卦象釋卦辭或問木道乃行程傳以為木字本益字之誤如何朱子曰㸔来只是木字渙卦說乘木有功中孚說乘木舟虚以此見得只是木字某見一朋友說有八卦之金木水火土有五行之金木水火土如乾為金易卦之金也兊之金五行之金也巽為木是卦中取象震為木乃東方屬木五行之木也五方取四維故也雙湖胡氏曰利有攸往以二五之中正有慶也利涉大川以震巽之木道乃行也雲峰胡氏曰中正兼二五言木道兼震巽言震陽木巽隂木中溪張氏曰神農氏斲木為耜揉木為耒蓋取諸益者亦木道之行也漢上朱氏曰利涉大川言木者三益也渙也中孚也皆巽也益動而巽日進无疆傳又以二體言卦才下動而上巽動而巽也為益之道其動巽順於理則其益日進一本益字在日進下廣大无有疆限也動而不順於理豈能成大益也天施地生其益无方施始䜴反傳以天地之功言益道之大聖人體之以益天下也天道資始地道生物天施地生化育萬物各正性命其益可謂无方矣方所也有方所一无所字則有限量无方謂廣大无窮極也天地之益萬物豈有窮際乎隆山李氏曰天施地生指乾坤初體而言也乾施一陽以益於下而為震坤以一隂上應於乾之生育而為巽上施下生二者相濟无所不被故曰其益无方雲峰胡氏曰益增益也日之進天之施地之生无疆无方皆形容增益之義也凡益之道與時偕行傳天地之益无窮者理而已矣聖人利益天下之道應時順理與天地合與時偕行也本義動巽二卦之徳乾下施坤上生亦上文卦體之義又以此極言贊益之大臨川吴氏曰以卦徳言人事之益人之動而能卑巽則日有進益无窮已也書曰惟學遜志務時敏厥修乃来是也又以卦變言天地之益乾之九四易初而下交於坤天之施也坤之初六易四而上達於乾地之生也天布施地發生萬物竝育其増益衆多无有方所也凡益之道總言天地之於萬物人之於萬事其於增益皆无時而止息所謂與時偕行也節齋蔡氏曰无疆以悠久言无方以廣大言與時偕行又言益道之適乎時也建安丘氏曰時者損益之準也上不足而下有餘則當損下而益上可損而損此損之時也若下不足則不當損矣上有餘而下不足則當損上而益下可益而益此益之時也若下有餘則不必益矣時者當其可之謂此損益二彖聖人皆以時言也雙湖胡氏曰震巽於時為春夏正當天地施生雷雨益物之時故曰凡益之道與時偕行言聖人體此凡所以為益之道有慶賞而无刑威也象曰風雷益君子以見善則遷有過則改傳風烈則雷迅雷激則風怒二物相益者也君子觀風雷相益之象而求益於已為益之道无若見善則遷有過則改也見善能遷則可以見天下之善有過能改則无過矣益於人者无大於是本義風雷之勢交相助益遷善改過益之大者而其相益亦猶是也朱子曰遷善當如風之速改過當如雷之猛又曰風是一箇急底物見人之善己將不及遷之如風之急雷是一箇湧決底物己有過便斷然改之如雷之勇決不容有些子遲緩問莫是纔遷善便是改過否曰不然遷善字輕改過字重遷善如滲淡之物要使之白改過如黑之物要使之白用力自是不同遷善者但是見人做得一事强似我心有所未安即便遷之若改過須是大段勇猛始得中溪張氏曰撓萬物者莫疾乎風動萬物者莫疾乎雷風飛雷厲交相助益君子取象於此見善則遷之必如風之速有過則改之必如雷之迅則有即之義此則遷則改所以貴乎疾也得善服膺且不貳過惟顔氏子得之而聞義不能徙不善不能改者夫子所以深憂之也臨川吴氏曰遷善巽象巽在外於人之善見則遷之自外而益也改過震象震在内於已之過有則改之自内而益也雲峰胡氏曰雷與風自有相益之勢速於遷善則過當益寡決於改過則善當益純是遷善改過又自有相益之功也東莱吕氏曰損益二象最切學者損无如忿慾益无如遷改若甚易知推到精宻處甚難懲窒遷改皆是用力處初九利用為大作元吉无咎傳初九震動之主剛陽之盛也居益之時其才足以益物雖居至一无至字下而上有六四之大臣應於已四巽順之主上能巽於君下能順一作巽於賢才也在下者不能有為也得在上者應從之則宜以其道輔於上作大益天下之事利用為大作也居下而得上之用以行其志必須所為大善而吉則无過咎不能元吉則不唯在已有咎乃累乎上為上之咎也在至下而當大任小善不足以稱也故必元吉然後得无咎中溪張氏曰初九為震動之主上應六四近君之臣則初受四之任者重矣故利用為大作興之事而所作之事必得大善之吉乃得无咎進齋徐氏曰初剛在下為動之主當益之時受上之益者也宜用之為大有作興之事然位卑志剛力小任重則有所不堪唯處之當用之審大善而吉乃可无咎苟輕用敗事无益有害皆為有咎也王氏曰得其時而无其位故元吉乃得无咎也馮氏曰元者震初九之象也益之爻用享帝用凶事用遷國皆大有作為之卦故曰益以興利是也本義初雖居下然當益下之時受上之益者也不可徒然无所報效故利用為大作必元吉然後得无咎朱子曰吉凶是事咎是道理蓋有事雖吉而理則過差者是之謂吉而有咎初九在下為四所任而作大者必盡善而後无咎若所作不盡善未免有咎也故孔子釋之曰下不厚事若在下之人為在上之人作事未能盡善自應有咎也雲峰胡氏曰隂為小陽為大初隂在下本小也損乾之陽以益之則大矣在下而受上之益非大有作為以效報稱不可也必元吉而後无咎所為非大善未免有咎與師言无咎之義同象曰元吉无咎下不厚事也傳在下者本不當處厚事厚事重大之事也以為在上所任所以當大事必能濟大事而致元吉乃為无咎能致元吉則在上者任之為知人已當之為勝任不然則上下皆有咎也本義下本不當任厚事故不如是不足以塞咎也朱子曰利用大作一爻象只曰下不厚事也自此推之則凡居下者不當厚事如子之於父臣之於君僚屬之於官長皆不可以踰分越職縱可為亦須是盡善方能无過所以有元吉无咎之戒也雲峰胡氏曰凡在下者以分言之本不當為重大之事豈能无咎故必大善而吉庶可塞咎云耳六二或益之十朋之龜弗克違永貞吉王用享于帝吉傳六二處中正而體柔順有虚中之象人處中正之道虚其中以求益而能順從天下孰不願告而益之孟子曰夫苟好善則四海之内皆將輕千里而来告之以善夫滿則不受虚則来物理自然也故或有可益之事則衆朋助而益之十者衆辭衆人所是理之至當也龜者占吉凶辨是非之物言其至是龜不能違也永貞吉就六二之才而言二中正虚中能得衆人之益者也然而質本隂柔故戒在常永貞固則吉也求益之道非永貞則安能守也一作之損之六五十朋之則元吉者蓋居尊自損應下之剛以柔而居剛柔為虚受剛為固守求益之至善故元吉也六二虛中求益亦有剛陽之應而以柔居柔疑益之未固也故戒能常永貞固則吉也王用享于帝吉如二之虚中而能永貞用以享上帝猶當獲吉況與人接物其意有不通乎求益於人有不應乎祭天天子之事故云王用也中溪張氏曰六二以柔居中有虚中受益之象夫滿則招損虛則受益二既虚中故或有可益之事則衆皆朋合而益之故曰十朋之龜弗克違本義六二當益下之時虚中處下故其象占與損六五同然爻位皆隂故以永貞為戒以其居下而受上之益故又為卜郊之吉占朱子曰王用享于帝吉是祭則受福底道理建安邱氏曰益者損之反益之六二損之六五也損之五曰元吉則謂其居得尊位以柔履剛為善益之二曰永貞吉則以爻位皆柔不能固守故以永貞為戒也又曰凡卦象肖離者皆有龜象頤之自初至上與損之自二至上益之自初至五皆外實中虚所以取諸龜也雲峰胡氏曰損五上卦之中當下益上之時而受下之益益二下卦之中當上益下之時而受上之益五元吉二必永貞而後吉位有剛柔之殊分有君臣之異也二非陽也而曰王用享于帝吉者占在二則永貞吉在王者之占則為享帝之吉占也享帝亦以下而受上之益故於下卦之中言之此可見占法矣二臣也豈特臣可占哉二簋可用享損之時用也王用享于帝益之時用也故曰損益盈虚與時偕行象曰或益之自外来也傳既中正虚中能受天下之善而固守則有有益之事衆人自外来益之矣或曰自外来豈非謂五乎曰如二之中正虚中天下孰不願益之五為正應固在其中矣本義或者衆无定主之辭雲峰胡氏曰乾言或躍坤言或從或在我者未定也恒或承之損益或益之或在人者未定也六三益之用凶事无咎有孚中行告公用圭傳三居下體之上在民上者也乃守令也居陽應剛處動之極居民上而剛決果於為益者一无者字也果於為益用之凶事則无咎凶事謂患難非常之事三居下之上在下當承禀於上安得自任擅為益乎唯於患難非常之事則可量宜應卒奮不顧身力庇其民故无咎也下専自任上必忌疾雖當凶難以一无以字義在可為然必有其孚誠而所為合於中道則誠意通於上而上信與之矣専為而无為上愛民之至誠固不可也雖有誠意而所為不合中行亦不可也圭者通信之物禮云大夫執圭而使所以申信也凡祭祀朝聘用圭玉所以通達誠信也有誠孚而得中道則能使上信之是猶告公上用圭玉也其孚能通達於上矣在下而有為之道固當有孚中行又三隂爻而不中故發此義或曰三乃隂柔何得反以剛果任事為義曰三質雖本隂然其居陽乃自處以剛也應剛乃志在乎剛也居動之極剛果於行也以此行益非剛果而何易以所勝為義故不論其本質也朱子曰伊川說易亦有不分曉處甚多如益之用凶事說作凶荒之凶直指刺史郡守而言在當時未見有這守令恐難如此說林氏栗曰凶事有三有扎瘥之政有死喪之禮有甲兵之事歉嵗曰凶今益之時損上益下其凶荒扎瘥之政乎隆山李氏曰周官以委積待凶荒以荒禮哀凶扎或弛其政或去其征皆損上之所取以益下之凶荒者也潘氏曰汲黯擅發倉廪以救飢民益之用凶事也何咎之有西溪李氏曰居下之上而長民奉君命以益民者也凶荒扎瘥益之用凶事也凶荒之年宜發倉廪以賑救乃非常之舉為下為民如此故可无咎有孚中行心苟自信酌中行之可也用圭告公正如汲黯河内之事潛齋胡氏曰周禮珍圭以徵守以恤凶荒杜云珍作鎮鄭元云玉使人徵諸矦憂凶荒則授之以往致王命焉本義六三隂柔不中不正不當得益者也然當益下之時居下之上故有益之以凶事者蓋警戒震動乃所以益之也占者如此然後可以无咎又戒以有孚中行而告公用圭也用圭所以通信朱子曰益之用凶事猶書言用降我凶徳嘉績于朕邦節齋蔡氏曰凶事困心衡慮之事也六三與上為應故有凶事之象中行在一卦之中也故三四皆曰中行圭所以通其中之信告公雖見於外而所用者亦唯在通中之信而已雲峰胡氏曰下三爻皆當益下之時而受上之益者也三處多凶之地有益之以凶事者困心衡慮乃所以増益其所不能也如此既可以无咎又告之以有孚中行而告公用圭者孚信也圭所以通信也當信上之人所以警戒震動我者益我者也信之篤而行之必合乎中則可以通信于上矣或曰以二體則二五各居中以全體則三四竝居中故中孚以三四為中此三四稱中行象曰益用凶事固有之也傳六三益之獨可用於凶事者以其固有之也謂専固自任其事也居下當禀承於上乃専任其事唯救民之凶災拯時之艱急則可也乃處急難變故之權宜故得无咎若平時則不可也本義益用凶事欲其困心衡慮而固有之也雲峰胡氏曰爻唯三上言凶上之凶自取之也三之凶人益之也欲其困心衡慮而固守之乃益之大者六四中行告公從利用為依遷國傳四當益時處近君之位居得其正以柔巽輔上而下順應於初之剛陽如是可以益於上也唯處不得其中而所應又不中是不足於中也故云若行得中道則可以益於君上告於上而獲信從矣以柔巽之體非有剛特之操故利用為依遷國為依依附於上也遷國順下而動也上依剛中之君而致其益下順剛陽之才以行其事利用如是也自古國邑民不安其居則遷遷國者順下而動也進齋徐氏曰四居近君之位必得中道而行則告諸公上而見從況四與初為往来之爻四有上遷之象遷國順下而動也而利於用者為依衆心之所欲雖遷徙國都之大勞亦可成功而致益矣本義三四皆不得中故皆以中行為戒此言以益下為心而合於中行則告公而見從矣傳曰周之東遷晉鄭焉依蓋古者遷國以益下必有所依然後能立此爻又為遷國之吉占也雲峰胡氏曰遷四自上而遷於初初自下而遷於四也坤為國四下之初有遷國象三四皆非中三而中則告公而可以用圭矣四而中告公則見從矣皆戒辭也於四復許之曰利用為依遷國者損乾之初陽下益坤之初隂四與初上下往来之爻也故於初曰作於四曰遷二為郊之吉占此為遷國之吉占皆非小益之事也中溪張氏曰初本坤體而上遷於四有遷國之象依依五也以四依五是以柔附剛以弱附强得所依矣用之遷國何往不利誠齋楊氏曰周遷依晉鄭邢遷依齊許遷依楚皆弱故也若盤庚之遷亳髙祖之遷長安光武之遷洛何依人之有隆山李氏曰初利用大作元吉是用之於大事也二王用享于帝吉是用之於大禮也三益用凶事是用之於大災也四利用為依遷國是用之於大遷也象曰告公從以益志也傳爻辭但云得中行則告公而獲從象復明之曰告公而獲從者告之以益天下之志也志苟在於益天下上必信而從之事君者不患上之不從患其志之不誠也中溪張氏曰益志謂益民之志也夫遷國者不以利己唯欲益民此所以告公上而見從也觀盤庚三篇可見古人益民之實矣九五有孚恵心勿問元吉有孚恵我徳傳五剛陽中正居尊位又得六二之一无之字中正相應以行其益何所不利以陽實在中有孚之象也以九五之徳之才之位而中心至誠在恵益於物其至善大吉不問可知故云勿問元吉人君居得致之位操可致之權苟至誠益於一作於益天下天下受其大福其元吉不假言也有孚恵我徳人君至誠益於一作於益天下天下之人无不至誠愛戴以君之徳澤為恩恵也本義上有信以恵于下則下亦有信以恵於上矣不問而元吉可知隆山李氏曰剛中有孚象恵心者非可人給而家養之也聖人之仁如一氣之春舉斯加彼使欲富夀安佚之心皆遂所欲也我之所恵以心則人之感恵以為徳矣中溪張氏曰上之孚下以心為恵下之孚上以徳為恵雲峰胡氏曰益莫大於信恵莫大於心有孚恵心上有信以益下也有孚恵我徳下有徳信以益上也言恵不言益益之大者也不問而元吉可知矣節齋蔡氏曰上以有孚而順下之心即洪範所謂皇建有極用敷錫厥庶民者也下亦以有孚而順上之徳即洪範所謂錫汝保極者是也象曰有孚恵心勿問之矣恵我徳大得志也傳人君有至誠恵益天下之心其元吉不假言也故云勿問之矣天下至誠懐吾徳以為恵是其道大行人君之志得矣白雲郭氏曰損之上九言大得志蓋自損得益而為得志也此言大得志蓋有君恵天下之志至於天下信而懐其徳是為大得志之時也上九莫益之或擊之立心勿恒凶傳上居无位之地非行益於人者也以剛處益之極求益之甚者也所應者隂非取善自益者也利者衆人所同欲也専欲益已其害大矣欲之甚則昏蔽而忘義理求之極則侵奪而致仇怨故夫子曰放於利而行多怨孟子謂先利則不奪不饜聖賢之深戒也九以剛而求益之極衆人所共惡故无益之者而或攻擊之矣立心勿恒凶聖人戒人存心不可専利云勿恒如是凶之道也所一作謂當速改也本義以陽居益之極求益不已故莫益而或擊之立心勿恒戒之也或問或擊之朱子曰或字衆无定主之辭言非但一人擊之也立心勿恒勿字只是不字非禁止之辭此處亦可疑且闕之損益二卦諸爻皆互換損好益却不好如損六五却成益六二損上九好益上九却不好雙峰胡氏曰益之上九即恒之九三不安於恒陵躐等級超於震上以求益者也故其辭同三上皆巽體說卦謂巽為不果為進退為躁卦其立心勿恒之驗歟此所以莫有以益之而反或有以擊之也此爻其戒恒之九三乎大抵損極則益而吉益極則損而凶是以君子恒處其益之極也雲峰胡氏曰六二柔居下之中不求益而或益之上九剛居上之極求益不已人莫益之而或擊之嗚呼九二之吉由中心之有孚上九之凶由立心之勿恒吉凶之道孰有不自心生者哉厚齋馮氏曰益卦恒之交也巽下震上為恒震下巽上為益今益之窮將復易位而為恒矣故聖人戒之以立心可恒也不然凶矣象曰莫益之偏辭也或擊之自外来也傳理者天下之至公利者衆人所同欲苟公其心不失其正理則與衆同利无侵於人人亦欲與之若切於好利蔽於自私求自益以損於人則人亦與之力爭故莫肯益之而有擊奪之者矣云莫益之者非有偏己之辭也苟不偏己合於公道則人亦益之何為擊之乎既求益於人至於甚極則人皆惡而欲攻之故擊之者自外来也人為善則千里之外應之六二中正虚己益之者自外而至是也苟為不善則千里之外違之上九求益之極擊之者自外而至是也繫辭曰君子安其身而後動易其心而後語定其交而後求君子修此三者故全也危以動則民不與也懼以語則民不應也无交而求則民不與也莫之與則傷之者至矣易曰莫益之或擊之立心勿恒凶君子言動與求皆以其道乃完善也不然則取傷而凶矣本義莫益之者猶從其求益之偏辭而言也若究而言之則又有擊之者矣雲峰胡氏曰莫益之者以上九求益姑從其求益之偏辭而言也究其極則非特莫益之且有擊之者矣二不求益而或益之自外来也上求益而或擊之亦自外来也嗚呼是孰有以来之哉建安丘氏曰益者損上乾之陽以益下坤之隂也合六爻觀之損在上則益在下矣其在下卦初與四為往来之爻受四之制者故曰利用大作二得五之益而又受初之益故曰或益之三處益時唯凶事則不可不益故曰益用凶事此三爻皆受益者也其在上卦四以順下之動而為益故曰利用遷國五以感人以誠而致益故曰有孚惠心上則不知損己反以求人之益而人或擊之矣故曰莫益之或擊之此三爻則處益而當損者也乾下兌上傳夬序卦益而不已必決故受之以夬夬者決也益之極必決而後止理無常益益一无下益字而不已已乃決也夬所以次益也為卦兌上乾下以二體言之澤水之聚也乃上於至髙之處有潰決之象以爻言之五陽在下長而將極一隂在上消而將盡衆陽上進決去一隂所以為夬也夬者剛決之義衆陽進而決去一隂君子道長小人道消將盡之時也隆山李氏曰上古結繩而治後世聖人易之以書契百官以治萬民以察蓋取諸夬夬者決也天下之才不至於決則不通故雜卦之次序與十三卦之制器尚象皆終于夬夬揚于王庭孚號有厲夬古快反號傳去聲九二爻同本義戶羔反爻内竝同傳小人方盛之時君子之道未勝安能顯然以正道決去之故含晦俟時漸圖消之之道今既小人衰微君子道盛當顯行之於公朝使人明知善惡故云揚于王庭孚信之在中誠意也號者命衆之辭君子之道雖長盛而不敢忘戒備故至誠以命衆使知尚有危道雖以此之甚盛決彼之甚衰若易而無備則有不虞之悔是尚有危理必有戒懼之心則无患也聖人設戒之意深矣朱子曰上卦有兌體兌為口故多言號夬卦號字皆作戶羔反唯孚號只作去聲讀看来亦只當平聲進齋徐氏曰王五也王庭君位之前林氏栗曰庭内而虚九五為王宫上六為王庭之象蘭氏廷瑞曰孚信以布號令與衆棄之也丹陽都氏曰乾剛實有孚之象兌號令之象隆山李氏曰孚號有厲有之為言不必然之辭也五陽相信而不忘於號令知其危而戒之斯有萬全之勢无一跌之虞矣進齋徐氏曰陽剛之長當終於六位不可有未盡之隂也除惡務本君子雖盛不可以小人之勢孤謂无能為不盡去之而存其孽也唐五王不去一武三思而患生於所忽不旋踵而君子之祻烈矣聖人於夬設戒之意甚深告自邑不利即戎利有攸往傳君子之治小人以其不善也必以已之善道勝革之故聖人誅亂必先修已舜之敷文徳是也邑私邑告自邑先自治也以衆陽之盛決於一隂力固有餘然不可極其剛至於太過太過乃如蒙上九之為宼也戎兵者强武之事不利即戎謂不宜尚壯武也即從也從戎尚武也利有攸往陽雖盛未及乎上隂雖微猶有未去是小人尚有存者君子之道有未至也故宜進而往也不尚剛武而其道益進乃夬之善也建安丘氏曰不利即戎與莫夜有戎相應莫夜有戎言小人常伺隙興兵宼君子不利即戎言君子不當専尚威力以勝小人蓋君子之勝小人固自有道若徒以力角力則君子未必有加於小人而適以敗天下之事爾此聖人之所以深戒也中溪張氏曰一決之後則由夬而乾往无不利矣故曰利有攸往本義夬決也陽決隂也三月之卦也以五陽去一隂決之而已然其決之也必正名其罪而盡誠以呼號其衆相與合力然亦尚有危厲不可安肆又當先治其私而不可専尚威武則利有所往也皆戒之之辭朱子曰夬以五陽之盛而比一隂猶欲決之故其繇曰揚于王庭孚號有厲告自邑不利即戎利有攸往蓋雖危懼自修不極其武而揚庭孚號利有攸往初不顧後患而小却也問夬卦聖人於隂消陽長之時亦如此戒懼其警戒之意深矣曰不用如此說自是无時不戒警恐懼不是到這時方戒懼不成說天下已平治可以安意肆志只纔有些放肆便弄得靡所不至雲峰胡氏曰夬以五陽去一隂亦易易爾而彖為危懼警戒之辭不一蓋必楊于王庭使小人之罪眀以至誠呼號其衆使君子之類合不可以小人之衰而遂安肆也有危道焉不可以君子之盛而事威武也有自治之道焉必如是乃利有攸往復利往往而為臨為泰為夬也夬利往往而為乾也聖人彖復其辭平彖夬其辭危蓋隂之勢雖微蔓或可滋窮或為敵君子固无時不戒懼尤不可於小人道衰之時忘戒懼也聖人為君子謀至矣於剥見剥一陽之易於夬見決一隂之難君子難進易退小人易進難退故也為君子者安可以易心處之也哉彖曰夬決也剛決柔也健而說決而和說音恱傳夬為決義五陽決上之一隂也健而說決而和以二體言卦才也下健而上說是健而能說決而能和決之至善也兌說為和蘭氏廷瑞曰内健則能決外說則能和隆山李氏曰健決乾體說和兌體以和說濟健決則決之道不傷太過於是為得矣本義釋卦名義而贊其徳雲峰胡氏曰他卦或以卦徳釋卦名義此既釋卦義而復贊其徳是徳也君子之徳也以五剛決一柔宜无難者然君子勢雖可如此健而說決而和君子之徳固自如此也臨川吴氏曰夬雖以五陽決去一隂然不可恃陽之盛而過於猛卦徳内健而外說健說相濟則其決隂也无不及亦无過故和和者无過不及之中也揚于王庭柔乗五剛也傳柔雖消矣然居五剛之上猶為乗陵之象隂而乗陽非理之甚君子勢既足以去之當顯陽其罪於王朝大庭使衆知善惡也孚號有厲其危乃光也傳盡誠信以命其衆而知有危懼則君子之道乃无虞而光大也告自邑不利即戎所尚乃窮也傳當先自治不宜専向剛武即戎則所尚乃至窮極矣夬之時所尚謂剛武也利有攸往剛長乃終也長丁丈反傳陽剛雖盛長猶未終尚有一隂更當決去則君子之道純一而无害之者矣乃剛長之終也本義此釋卦辭柔乗五剛以卦體言謂以一小人加于衆君子之上是其罪也剛長乃終謂一變則為純乾也朱子曰彖云利有攸往剛長乃終今人以為陽不能无隂中國不能无夷狄君子不能无小人故小人不可盡去今觀剛長乃終之言則聖人豈不欲小人之盡去耶但所以決之者自有道耳雲峰胡氏曰易於剛乗柔不書柔乗剛則書志變也一柔乗五剛變甚易矣復利有攸往剛長也夬利有攸往剛長乃終也小人有一人之未去猶足為君子之憂人欲有一分之未盡猶足為天理之累復之陽必至於純陽為乾方為剛長乃終也中溪張氏曰夬言利有攸往蓋欲其為純乾剥言不利有攸往蓋不欲其為純坤此亦崇陽抑隂之微意也進齋徐氏曰夬以盛進之五剛決衰退之一柔其勢若甚易然而聖人不敢以易而忽之故於夬之一卦丁寧深切其道貴審而不貴廹所以周防戒備者无所不至又曰君子自治甚嚴治人甚寛固不為疾惡之已甚未嘗容惡而不去也俾小人自知惡大罪積不可乆居其上而甘心於退屈也衆剛從而決之則不勞餘力一決而為乾矣若虞朝之去四凶周室之誅三監藹藹賢才之盛无復貞勝之憂是得決之義也後世衆賢在位得時得君其始未嘗不欲去小人以除君側之惡大抵不知夬夬之義而勇於一決機失事敗祻亂相尋卒貽衆君子之害而家國從之者何可勝數可不戒哉象曰澤上於天夬君子以施禄及下居徳則忌施始䜴反傳澤水之聚也而上於天至髙之處故為夬象君子觀澤決於上而注漑於下之象則以施禄及下謂施其禄澤以及於下也觀其決潰之象則以居徳則忌居徳謂安處其徳則約也忌防也謂約立防禁有防禁則无潰散也王弼作明忌亦通不云澤在天上而云澤上於天上於天則意不安而有決潰之勢云在天上乃安辭也本義澤上於天潰決之勢也施禄及下潰決之意也居徳則忌未詳中溪張氏曰雲上於天需則澤不及下澤上於天夬則天之所以澤萬物者決矣君子觀澤決於上而注於下之象則施布其禄澤以及于下也居者止也若自止其徳而澤不下施則非夬決之義矣故忌隆山李氏曰居徳則忌居者積而不流之謂若傳所謂竒貨可居之居平庵項氏曰居訓積書之化居易之居業皆是漢人猶言居積雲峰胡氏曰居徳則忌程傳則約也忌防也以為約立防禁則與潰決之意相妨王弼作明忌非也諸家以為居其徳而不決則忌則大象例无反辭本義缺之為是初九壯于前趾不勝為咎傳九陽爻而乾體剛健在上之物乃在下而居決時壯于前進者也前趾謂進行人之決於行也行而宜則其決為是往而不宜則決之過也故往而不勝則為咎也夬之時而往往決也故以勝負言九居初而壯于進躁于動者也故有不勝之戒隂雖將盡而已之躁動自宜有不勝之咎不計彼也本義前猶進也當決之時居下任壯不勝宜矣故其象占如此朱子曰壯于前趾與大壯初爻同此卦大率似大壯只爭一畫節齋蔡氏曰壯者决之勇也臨川吴氏曰陽盛之時陽居陽位故戒其輕往瀘川毛氏曰勝在往前者兵法也必往之道也往不勝為咎者逺慮也所以戒其往也聖人於五陽之盛而有不勝之憂微矣哉潘氏曰趾在下而先動者也初九在四陽之下首以剛進壯于前趾也隂居髙位而初欲決之猶布衣論權臣不量力之甚往則不勝其咎宜也雲峰胡氏曰夬五陽由五陽之壯而成故初與三猶存壯之名而初象又與壯同壯之初而壯于趾征凶有孚夬之初而壯于前趾往不勝宜矣夬五陽一隂君子豈不足以勝小人然居下而早用其壯固自有不勝之理不可不戒勝在往前可必其往往而不勝故戒其往李氏曰壯于趾征凶當壯之時而戒其用壯也壯于前趾往不勝為咎當決之初而戒其好勝也象曰不勝而往咎也傳人之行必度其事可為然後決之則无過矣理不能勝而且往其咎可知凡行而有咎者皆決之過也中溪張氏曰隂居髙位而初欲決之往必不勝徒取咎爾知其不勝而且往焉能无咎乎誠齋楊氏曰勝在往先者勝往在勝先者負况不勝在往先者乎故周公言往不勝而仲尼斷之曰不勝而往咎也濳齋胡氏曰京房欲去恭顯而卒困於恭顯劉蕡欲去宦官而卒困于宦官皆不勝而往之咎也九二惕號莫夜有戎勿恤莫音暮傳夬者陽決隂君子決小人之時不可忘戒備也陽長將極之時而二處中居柔不為過剛能知戒備處夬之至善也内懐兢惕而外嚴誡號雖莫夜有兵戎亦可勿恤矣本義九二當決之時剛而居柔又得中道故能憂惕號呼以自戒備而莫夜有戎亦可无患也朱子曰王子獻卜遇夬之九二卜者告之曰必夜有驚恐後有兵權未幾果夜遇宼旋得洪帥臨川吴氏曰能惕號則有戒備矣故雖莫夜之時卒有兵戎之變亦不用憂恤也誠齋楊氏曰九二以剛陽之才當夬決之時能居柔以晦其剛得中而戒於過雖與四陽之盛而決一隂之衰乃惕然若臨大敵諄然若警夕掫有備如此雖有兵戎而驟至亦勿憂恤矣此狄仁傑從容存唐之事也雲峰胡氏曰惕號孚號皆取號呼之義彖合衆剛爻而言剛實故孚號此指九二一爻而言二柔故惕號象曰有戎勿恤得中道也傳莫夜有兵戎可懼之甚也然可勿恤者以自處之善也既得中道又知惕懼且有戒備何事之足恤也九居二雖得中然非正其為至善何也曰陽決隂君子決小人而得中豈有不正也知時識勢學易之大方也中溪張氏曰宼至而勿憂以九二得處中之道而不忘戒備故也臨川吴氏曰得中則不恃剛而能惕能惕則有備故雖有戎而无憂也九三壯于頄有凶君子夬夬獨行遇雨若濡有慍无咎頄求龜反傳爻辭差錯安定胡公移其文曰壯于頄有凶獨行遇雨若濡有慍君子夬夬无咎亦未安也當云壯于頄有凶獨行遇雨君子夬夬若濡有慍无咎夬決尚剛健之時三居下體之上又處健體之極剛果於決者也頄顴骨也在上而未極於上者也三居下體之上雖在上而未為最上上有君而自任其剛決壯于頄者也有凶之道也獨行遇雨三與上六為正應方羣陽共決一隂之時已若以私應之故不與衆同而獨行則與上六隂陽和合故云遇雨易中言雨者皆謂隂陽和也君子道長決去小人之時而已獨與之和其非可知唯君子處斯時則能夬夬謂夬其夬果決其斷也雖其私與當逺絶之若見濡汙有慍惡之色如此則无過咎也三健體而處正非必有是失也因此義以為教耳爻文所以交錯者由有遇雨字又有濡字故誤以為連也一作誤而相連也朱子曰卦中與復卦六四有獨字此卦諸爻皆欲去隂獨此一爻與六為應也是惡模様九三舊文本義自順不知程子何故欲易之看来不必易建安邱氏曰復六四處五隂之中與初九應故爻言獨復決九三處五陽之中與上六應故爻言獨行獨者違衆而自立之辭也隂處隂中獨復以應陽陽善也則為捨小人從君子陽處陽中獨行以應隂隂惡也則為捨君子從小人聖人於此爻故以獨言之誠齋楊氏曰九三處五陽衆君子之林而獨與上六一小人為正應此小人之諜也聖人曉之曰来汝九三取凶在汝取无咎亦在汝汝君子徒也舎君子從小人凶之道也決然舎小人從君子无咎之道也為九三者盍亦謹所擇乎本義頄觀也九三當決之時以剛而過乎中是欲決小人而剛壯見于面目也如是則有凶道矣然在衆陽之中獨與上六為應若能果決其決不係私愛則雖合於上六如獨行遇雨至於若濡而為君子所慍然終必能決去小人而无所咎也溫嶠之於王敦其事類此或問九三壯于頄朱子曰君子之去小人不必悻悻然見于面目至於遇雨而為所濡溼雖為衆陽所慍然志在決隂必能終去小人故亦可得无咎也蓋九三雖與上六為應而實以剛居剛有能決之象故壯于頄則有凶而和柔以去之乃无咎如王允之於董卓温嶠之於王敦是也有愠也是自不能堪正如顔杲卿使安禄山受其衣服至道間與其徒曰吾軰何為服此歸而借兵伐之正類此也漢上朱氏曰面外為頬頄頬骨間也童溪王氏曰壯于頄聖人戒剛也居乾健之極而疾惡之心見於顔色此凶之道也何則小人我疑也小人我疑君子之祻至矣雲峰胡氏曰頄以九三本爻取象雨濡連上六應爻取象夬夬二字則聖人深勉九三之辭蓋謂九三之去上六露其剛如頄之壯固自是凶若獨與上六為應如雨之濡亦豈為吉睽之時上九與六三為應陽求隂也曰往遇雨吉夬之時亦陽求隂也曰遇雨而不曰吉者當衆陽之中而獨應乎隂不能不為隂所濡不能不為陽所愠矣然君子果能能決其夬不牽於私應則雖遇雨若濡有愠而猶可以无咎矣蓋其以勢不能不合於上六而其心能決於去之也息齋余氏曰夬之三與五皆曰夬夬者一應隂一比隂非倍其決不可也厚齋馮氏曰或疑咸之象腓股脢輔未嘗逆施今初為趾而四為臀何也曰是與咸異咸合六爻取象猶剥艮之類也夬分二體為象猶大過鼎之類也故三在下卦上為頄四在上卦下為臀六爻不相蒙也不然臀下體也上體烏得而象之此易之所以為易而不可一說定也象曰君子夬夬終无咎也傳牽梏於私好由无決也君子義之與比決於當決故終不至於有咎也臨川吴氏曰君子之夬夬也雖和次柔而終能決去之故无咎與壯而有凶者異矣九四臀旡膚其行次且牽羊悔亾聞言不信臀徒敦反次七私反且七餘反姤卦同傳臀无膚居不安也行次且進不前也次且進難之狀九四以陽居隂剛決不足欲止則衆陽竝進於下勢不得安猶臀傷而居不能安也欲行則居柔失其剛壯不能强進故其行次且也牽羊悔亾羊者羣行之物牽者挽拽之義言若能自强而牽挽以從羣行則可以亾其悔然既處柔必不能也雖使聞是言亦必不能信用也夫過而能改聞善而能用克己以從義唯剛明者能之在它卦九居四其失未至如此之甚在夬而居柔其害大矣鄭氏剛中曰膚隂柔之物故噬嗑剥言膚皆隂爻李氏曰四以剛居柔欲決而泥於和故止則不能安有臀无膚之象進則不能前有其行次且之象不果於決也西溪李氏曰四與上同在君側位望已重无意除亂欲止則衆陽竝進於下勢不能安故臀无膚欲往則與六同事心不能斷故其行次且四若能牽引羣陽以進則悔可亾然四不中正非能決者雖聞此言亦必不信本義以陽居隂不中不正居則不安行則不進若不與衆陽兢進而安出其後則可以亾其悔然當決之時志在上進必不能也占者聞其言而信則轉凶而吉矣牽羊者當其前則不進縱之使前而隨其後則可以行矣朱子曰牽羊悔亾其說得於許慎之張子曰牽羊讓而先之蓋牽羊者非挽拽之謂也讓之使先行則有肯前之勢故也東谷鄭氏曰羊之性狠居前而力挽之則忿而不行却行而使之先則行矣雲峰胡氏曰牽羊諸家以為牽連衆陽而進横渠獨謂牽羊者讓而先之九五陽居陽又君位在陽之先可也九四以陽居隂而在陽之先宜乎有无膚次且之悔唯如牽羊然不與衆陽竝進而安出其後則可以亾其悔然又曰聞言不信者蓋如牽羊則悔亾而九剛必无下人之志聞牽羊之言當信而四柔必无克已之功象曰其行次且位不當也聞言不信聰不明也傳九處隂位不當也以剛居柔失其剛決故不能强進其行次且剛然後能明處柔則遷失其正性豈復有明也故聞言而不能信者蓋其聰聽之不明也臨川吳氏曰位不當謂以剛居柔故次且聰不明謂坎耳塞其内也故不聰於聽九五莧陸夬夬中行无咎莧賢辨反又胡練反傳五雖剛陽中正居尊位然切近於上六上六說體而卦獨一隂陽之所比也五為決隂之主而反比之其咎大矣故必決其決如莧陸然則於其中行之徳為无咎也中行中道也莧陸今所謂馬齒莧是也曝之難乾感隂氣之多者也而脆易折五若如莧陸雖感於隂而決斷之易則於中行无過咎矣不然則失其中正也感隂多之物莧陸為易斷故取為象本義莧陸今馬齒莧感隂氣之多者九五當決之時為決之主而切近上六之隂如莧陸然若決而決之而又不為過暴合於中行則无咎矣戒占者當如是也朱子曰莧陸是兩物莧者馬齒莧陸者章陸一名商陸皆感隂氣多之物藥中用商陸治水腫其物難乾其子紅漢上朱氏曰莧蕢澤草也葉柔根小堅且赤陸商陸亦澤草也葉大而柔根猥大而深有赤白二種建安丘氏曰夬五陽爻而三五皆稱夬夬者蓋三應上五比上皆當決柔之任故欲其決而又決而不係累於柔也又皆以剛居剛亦有夬夬之義雲峰胡氏曰決隂者陽也初九陽位在下不能決三五陽位當決者也而三有相應之情五有相比之情故皆曰夬夬三取雨象五取莧陸象皆象其感於隂而莧陸又感隂氣之多者勉之以夬夬而又戒其中行則无咎者五當可決之位其勢易於三三唯其夬夬即可以无咎五之夬夬或失之過暴則猶為有咎也或曰夬三月卦莧始生之時姤五月卦瓜始生之時故以取象象曰中行无咎中未光也傳卦辭言夬夬則於中行為无咎矣象復盡其義云中未光也夫人心正意誠乃能極中正之道而充實光輝五心有所比以義之不可而決之雖行於外不失中正之義可以无咎然於中道未得為光大也蓋人心一有所欲則離道矣夫子於此示人之意深矣本義程傳備矣朱子曰中行无咎言人能剛決自勝其私合乎中行則无咎但能補過而已未是極至處這是說那微茫間有些箇意思斷未得釋氏所謂流注想荀子謂偷則自行便是這意思照管不著便走將那裏去爻雖無此意孔子作象所以禆爻辭之不足如自我致宼敬慎不敗之類甚多中行无咎易中却不恁地看言人占得此爻者能中則无咎不然則有咎中未光也言事雖正而意濳有所係吝流注不斷皆意不誠之本也鄭氏剛中曰五陽竝進同力為夬而夬夬之戒獨見於三五者蓋三與六應五與六比當決隂之時二爻容有牽私愛昵近習之心故雖以九五之尊得中行之道而象猶以為未光也雲峰胡氏曰三與上應三健體也健於決之終可无咎五與上比皆說體也程傳曰人有所欲則離道矣事雖正而意有所係故於中道未得為光大也本義於履大象及此獨曰程傳備矣蓋其於履也痛後世風俗之弊甚切於夬也誅後世君心之非甚嚴上六无號終有凶傳陽長將極隂消將盡獨一隂處窮極之地是衆君子得時決去危極之小人也其勢必須消盡故云无用號咷畏懼終必有凶也中溪張氏曰上以一柔而乗五剛之上怙終不悛其罪大矣其危甚矣決而去之則夬其乾矣陽長隂消理之必然勿用號咷其終有凶不可以乆處也終即彖辭剛長乃終之終潘氏曰小人在上髙而危滿而溢豈能長守富貴哉无用號咷終於凶爾本義隂柔小人居窮極之時黨類已盡无所號呼終必有凶也占者有君子之徳則其敵當之不然反是或問夬卦辭言孚號九二言惕號上言无號取象之義如何朱子曰卦有兌體兌為口故多言號也又問以五陽決一隂君子盛而小人衰之勢而卦辭則曰告自邑不利即戎初九壯于前趾則往不勝九二惕號則有戎勿恤壯于頄則凶牽羊則悔亾中行无咎豈去小人之道須先自治而嚴厲戒懼不可安肆耶曰觀上六一爻則小人勢竆无號有凶之時而君子去之之道猶當如此嚴謹自做手脚蓋不可以其勢衰而安意自肆也其為戒深矣雲峰胡氏曰九二惕號呼衆陽也上六一隂何所號哉終凶而已聖人於五陽未嘗許之曰吉一隂爻直絶之曰凶意最可見厚齋馮氏曰易於剥見剥一陽之易於夬見決一隂之難蓋君子明白洞達難進易退而小人綢繆固結麾之不去也象曰无號之凶終不可長也傳陽剛君子之道進而益盛小人之道既已窮極自然消亾豈復能長乆乎雖號咷无以為也故云終不可長也先儒以卦中有孚號惕號欲以无號為无號作去聲謂无用更加號令非也一卦中適有兩去聲字一平聲字何害而讀易者率皆疑之或曰聖人之於天下雖大惡未嘗必絶之也今直使之无號謂必有凶可乎曰夬者小人之道消亾之時也決去小人之道豈必盡誅之乎使之變革乃小人之道亾也道亾乃其凶也臨川吴氏曰一柔在上終不可以長乆必為五陽所決去也建安丘氏曰夬者決也以五陽而決上之一隂也故六爻以上隂為主而下五陽則皆以上取義凡陽之決隂逺則不能相及唯比與應當之五比上者也故曰莧陸夬夬三應上者也故曰君子夬夬者夬者言當決而又決不可係累於隂也四介三五兩剛之間亦欲決上以進則礙五居則礙三故有臀无膚行次且之象至二去上逺則无相及之理矣故但惕號以為莫夜有戎之備而已初又最逺者也故有壯趾往不勝之戒周易傳義大全第十五
