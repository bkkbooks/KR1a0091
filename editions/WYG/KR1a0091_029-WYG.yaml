body:
  text: 周易傳義大全卷二十三明胡廣等撰繫辭下傳八卦成列象在其中矣因而重之爻在其中矣重直龍反本義成列謂乾一兌二離三震四巽五坎六艮七坤八之類象謂卦之形體也因而重之謂各因一卦而以八卦次第加之為六十四也爻六爻也既重而後卦有六爻也朱子曰八卦所以成列乃是從太極兩儀四象漸次生出以至於此畫成之後方見其有三才之象非聖人因見三才遂以己意思維而連畫三爻以象之也因而重之亦是因八卦之已成各就上面節次生出若旋生逐爻則更加三變方成六十四卦若併生全卦則只用一變便成六十四卦雖有遲速之不同然皆自然漸次生出各有行列次第畫成之後然後見其可盡天下之變不是聖人見下三爻不足以盡天下之變然後别生計較又幷畫上三爻以盡之也此等皆是作易妙處方其畫時雖是聖人亦自不知裏面有許多巧妙竒特直是要人細心體認不可草草立說問八卦成列只是說乾兌離震巽坎艮坤先生解云之類如何曰所謂成列者不止只論此橫圖若乾南坤北又是一列所以云之類問象只是乾兌離震之象未說到天地雷風處否曰是然八卦是一項看象在其中又是逐箇看又問成列是自一竒一耦畫到三畫處其中逐一分便有乾兌離震之象否曰是南軒張氏曰謂在其中者言非自外至也童溪王氏曰聖人因象以設卦則象在卦先設卦以立象則象在卦中剛柔相推變在其中矣繫辭焉而命之動在其中矣夲義剛柔相推而卦爻之變徃來交錯无不可見聖人因其如此而皆繫之辭以命其吉凶則占者所値當動之爻象亦不出乎此矣或問變字是總卦爻有徃來交錯者言動字是專指占者所值當動底爻象而言否朱子曰變是就剛柔交錯而成卦爻上言動是專主當占之爻言如二爻變則占者以上爻為主這上爻便是動處如五爻變一爻不變則占者以不變之爻為主則這不變者便是動處也節齋蔡氏曰剛柔爻之體相推謂剛推柔柔推剛也唯其相推故能成其變繫辭爻象之辭即其變而命之故能鼔其動也吉凶悔吝者生乎動者也夲義吉凶悔吝皆辭之所命也然必因卦爻之動而後見柴氏中行曰吉凶悔吝生乎動者主動爻而言也如情偽相感遠近相取好惡相攻皆是動也雲峰胡氏曰八卦成列即先天八卦橫圖也因而重之六十四卦橫圖也象非特天地山澤之類即八卦之畫成列而象即在畫矣未動之先有八卦之畫而未見八卦之交也因而重之爻在其中者爻之為言交也有交則有變故剛柔相推而變在其中變統指卦爻而言動專指所值之變爻而言也繫辭焉而命之則文王周公之易也臨川吳氏曰此承前篇卒章言蓍卦之象辭變占曰在其中者凡四一象二爻三變四動爻者辭也動則有吉凶悔吝之占焉前篇動者尚其變而此以動屬占者動因變而得占也剛柔者立本者也變通者趣時者也趣七樹反夲義一剛一柔各有定位自此而彼變以從時朱子曰此兩句亦相對說剛柔者隂陽之質是移易不得之定體故謂之夲若剛變為柔柔變為剛便是變通之用又曰變通便只是其徃來者節齋蔡氏曰剛柔者變通之夲體變通者剛柔之時用雲峰胡氏曰上繫曰剛柔者晝夜之象即此所謂立夲曰變化者進退之象即此所謂趣時卦有卦之時爻有爻之時立夲者天地之常經趣時者古今之通義臨川吳氏曰剛柔之畫其體一定如木本之植立因蓍之變其用相通隨時所遇趨而就之剛或化柔柔或化剛此承剛柔相推變在其中之語而言蓍之變也吉凶者貞勝者也夲義貞正也常也物以其所正為常者也天下之事非吉則凶非凶則吉常相勝而不已也朱子曰貞只是說他體處常常如此貞常也隂陽常只是箇相勝如子以前便是夜勝晝子以後便是晝勝夜吉凶者貞勝者也這一句最好看這箇物事常在這裏相勝一箇吉便有一箇凶在後面來這兩箇不是一定往在裏底物各有其所正為常正是說他當然之理進齋徐氏曰先言變動而後獨言吉凶悔吝生乎動者以動詳於變故也此言吉凶悔吝而後止言吉凶者以吉凶者悔吝之積也天地之道貞觀者也日月之道貞明者也天下之動貞夫一者也觀官喚反夫音扶程子曰天地之道常垂象以示人故曰貞觀日月常明而不息故曰貞明夲義觀示也天下之動其變无窮然順理則吉逆理則凶則其所正而常者亦一理而已矣朱子曰吉凶常相勝不是吉勝凶便是凶勝吉二者常相勝故曰貞勝天地之道則常示日月之道則常明天下之動貞夫一者也天下之動雖不齊常有一箇是底故曰貞夫一雲峰胡氏曰上繫於吉凶悔吝无咎之義發之詳矣獨貞字未發故於下繫發之貞者正而固也本義曰正而常何哉固者人事之當然常者天理之必然天下之動非吉勝凶則凶勝吉二者常相勝而不已然亦天下之正理也人之所為正則吉不正則凶雖其動也不一而常有至一者存亦不外乎此至正之理而已天地日月之道亦猶是也夫乾確然示人易矣夫坤隤然示人簡矣確苦角反易以䜴反隤大回反夲義確然健貌隤然順貌所謂貞觀者也爻也者效此者也象也者像此者也像音象夲義此謂上文乾坤所示之理爻之奇偶卦之消息所以效而象之或問爻也者效此者也是效乾坤之變化而分六爻象也者像此者也是象乾坤之虚實而為奇偶朱子曰效此便是乾坤之理象只是像其奇偶爻象動乎内吉凶見乎外功業見乎變聖人之情見乎辭見賢遍反夲義内謂蓍卦之中外謂蓍卦之外變即動乎内之變辭即見乎外之辭或問爻象動乎内吉凶見乎外或謂隂陽老少在分蓍揲卦之時而吉凶乃見於成卦之後如何朱子曰也是如此然内外字猶言先後微顯功業見乎變是就那動底爻見得這功業字似吉凶生大業之業猶言事變庶事相似潘氏曰確然隤然乾坤之體也隤與頽同乾坤之所以示人者易而不難簡而不繁爻者傚此易簡者也象者像此易簡者也及其爻象動乎卦之内則吉凶見於事之外功業見於變通之間蓋動則有吉凶不動則吉凶无自而生變則有功業不變則功業无自而成聖人之情則見爻辭象辭之間所以指人以所之也天地之大德曰生聖人之大寶曰位何以守位曰仁何以聚人曰財理財正辭禁民為非曰義夲義曰人之人今夲作仁呂氏從古蓋所謂非衆罔與守邦朱子曰天地以生物為心葢天地之間品物萬形各有所事唯天則確然於上地則隤然於下一无所為只以生物為事故易曰天地之大徳曰生聖人之情見乎辭下連接說天地大徳曰生此不是相連乃各自說去聖人之大寳曰位有徳有位則事事做得問人君臨天下大小大事只言理財正辭如何曰是因上文而言聚得許多人无財何以養之有財不能理又不得正辭便只是分别是非又曰教化便在正辭裏面理財正辭禁非是三事大㮣是辨别是非理財言你底還你我底還我正辭言是底說是不是底說不是猶所謂正名白雲郭氏曰天地以生物為徳故人以大徳歸之聖人得崇髙之位然後成位乎中而贊化育故以位為大寳也大寳者亦非聖人自以為寳也天下有生幸聖人之徳位以䝉其澤故天下以為寳也臨川王氏曰生生不己者天地之大徳然天地生物生人又生與天地合徳之聖人命之居君師之位為人物之主而後能使天地之所生得以各遂其生也苟或但有其徳而无其位則亦不能相天地而遂人物之生故位為聖人之大寳大寳謂大可貴重守謂保有之必得衆人之歸嚮乃能保有君師之位聚謂養之而使蕃盛衆多也平庵項氏曰財者百物總名皆民之所利也正辭謂殊貴賤使有度明取予使有義辨名實使有信葢利之所在不可不𨗳之使知義也禁民為非謂憲禁令致刑罰以齊其不可導者也葢養之教之而後齊之聖人不忍之政盡於此三者矣理財則易之備物致用也正辭則易之辨物正言也禁民為非則易之斷吉凶明失得外内使知懼也易之事業盡於此三者矣雲峰胡氏曰上繫首章由乾之始坤之成說歸乾坤易簡之理下繫首章則由乾之易坤之簡說出天地大生之徳得乾坤易簡之理如聖人乃可以成人之位行天地大生之徳在聖人不可无大寳之位兩位字不同位乎天地之中人所同也而聖人能成之大寳曰位聖人之所獨也而天地實賴之上下繫之首章其有望於後世有徳有位之聖人也如此哉右第一章夲義此章言卦爻吉凶造化功業雙湖胡氏曰按此章首論重卦繫辭有爻象變動四者其下文皆是覆說上面爻畫剛柔之變繫辭之動兩股其曰吉凶悔吝生乎動者所以明繫辭焉而命之動在其中之意其曰剛柔立夲變通趨時者所以明剛柔相推變在其中之意而自吉凶貞勝以下又申明吉凶悔吝生乎動一句謂天地之道以貞而勝日月之道以貞而明天下之動亦唯當一以貞而勝之而已大抵易為斯人作卦爻辭无非所以明失得之報故說吉凶為甚詳也次論乾坤易簡對天地徳生說作易聖人以憂世之情發明易簡於卦爻之辭用易聖人有御世之位推行徳生於仁義之道前一股是易後一股是用易要之乾坤即天地也易簡即大徳之生也作易聖人之情見乎辭用易聖人以仁守其位无非所以為斯人而已耳合兩節而觀一章之㫖可見矣古者包犧氏之王天下也仰則觀象於天俯則觀法於地觀鳥獸之文與地之宜近取諸身逺取諸物於是始作八卦以通神明之德以類萬物之情王于况反程子曰近取諸身一身之上百理具備甚物是沒底背在上故為陽胷在下故為隂至如男女之生已有此象天有五行亦有五藏心火也著些天地間熱氣乘之則便須發燥肝木也著些天地風氣乘之則便須怒推之五藏亦然夲義王昭素曰與地之間諸夲多有天字俯仰逺近所取不一然不過以驗隂陽消息兩端而已神明之德如健順動止之性萬物之情如雷風山澤之象朱子曰仰則觀象於天一段只是隂陽奇耦聖人看這許多般事物都不出隂陽兩字便是河圖洛書也只是隂陽觀鳥獸之文與地之宜那時未有文字只是仰觀俯察而已想得聖人心細雖鳥獸羽毛之微也盡察得有隂陽今人心麄如何察得或曰伊川見兔曰察此亦可以畫卦便是此義曰就這一端上亦可以見凡草木禽獸无不有隂陽鯉魚脊上有三十六鱗隂數龍脊上有八十一鱗陽數龍不曾見鯉魚必有之又龜背上文中間一簇成五段兩邊各插四段共成八段子八段之外兩邊周圍共有二十四段中間五段者五行也兩邊插八段者八卦也周圍二十四段者二十四氣也箇箇如此又如草木之有雌雄銀杏桐楮牝牡麻竹之類皆然又樹木向陽處則堅實其背隂處必虚軟男生必伏女生必偃其死於水也亦然葢男陽氣在背女陽氣在腹也以通神明之徳以類萬物之情盡于八卦而震巽坎離艮兊又總於乾坤曰動曰陷曰止皆健底意思曰入曰麗曰說皆順底意思聖人下此八字極狀得八卦性情盡問夲義謂伏羲作易驗隂陽消息兩端而已此語最盡曰隂陽雖是兩箇字然却是一氣之消息一進一退一消一長進處便是陽退處便是隂長處便是陽消處便是隂只是這一氣之消息做出古今天地間無限事來所以隂陽做一箇說亦得做兩箇說亦得柴氏中行曰仰觀象於天而參驗於鳥獸之文於是得隂陽之理俯觀法於地而參驗於地宜於是得剛柔之情近取諸身遠取諸物而知理之所在物我无二三才之道默㑹於心要不出乎隂陽二端相變而已平庵項氏曰象以氣言屬陽法以形言屬隂鳥獸之文謂天産之物飛陽而走隂也土地所宜謂地産之物木陽而草隂也節齋蔡氏曰聖人所畫之卦精可以通神明之徳粗可以類萬物之情神明之徳不可見者也故曰通萬物之情可見者也故曰類雲峰胡氏曰神明之徳不外乎健順動止八者之徳萬物之情不止乎天地雷風八物之情作結繩而為網罟以佃以漁葢取諸離罟音古佃音田程子曰聖人制器不待見卦而後知象以衆人由之而不能知之故因卦以示之耳夲義兩目相承而物麗焉朱子曰葢取諸等字乃模様是恁地葢字便是一箇半間半界底字又曰據十三卦取象葢取之離者言繩為網罟有離之象非覩離而始有此也誠齋楊氏曰教民肉食自包犧始南軒張氏曰古者禽獸多而人民少故伏羲氏為之網罟以佃以漁非徒使民皆知鮮食之利抑亦去其害而安其居也取諸離者葢離以一隂麗乎二陽之間則鳥獸之麗乎網魚鼈之麗乎罟其義可推矣厚齋馮氏曰離有二義曰象曰理理謂麗也謂鳥獸魚鼈麗乎網罟也象謂虚中網罟之日虚也雲峰胡氏曰民以食為先自古未有耕種則鮮食乃其先也伏羲氏非取諸離然後為網罟特網罟兩目相承而物麗自有似於離之象焉耳葢之言疑辭也下倣此包犧氏没神農氏作斵木為耜揉木為耒耒耨之利以敎天下葢取諸益斵陟角反耜音似耒力對反耨奴豆反夲義二體皆木上入下動天下之益莫大於此或問上入下動於取象有所未曉朱子曰耜乃今之鏵胡瓜反鍫七消反耒乃鏵柄雖下入畢竟是上面用力方得入沙隨程氏曰飛走之類實害禾稼唯網罟佃漁之制立然後耒耨之利見於天下誠齋楊氏曰教民粒食自神農始節齋蔡氏曰耜耒首也斵木之銳而為之耒耜柄也揉木使曲而為之疉山謝氏曰耒耜者今謂之犂曲木在上俗名犂衝即耒也斵削二片在下以承鐵二片俗呼犂壁即耜也漢上朱氏曰炎帝時民厭鮮食而食草木之實於是始為耒耜以教天下故曰神農耨耘除草也雲峰胡氏曰自古未有牛耕神農教民耒耜其動也其下之耜而所以入之者在上之耒於益之卦徳上入下動葢有合焉况為天下之益於卦名又有合也日中為市致天下之民聚天下之貨交易而退各得其所葢取諸噬嗑夲義日中為市上明而下動又借噬為市嗑為合也開封耿氏曰有菽粟者或不足乎禽魚有禽魚者或不足于菽粟罄者无所取積者无所散則利市不布養不均矣于是日中為市焉日中者萬物相見之時也當萬物相見之時而致天下之民聚天下之貨使遷其有无則得其所矣丹陽都氏曰五十里為市而各致其民則天下之民无不致矣市各聚其貨則天下之貨无不聚矣於是以其所有易其所无交易而退各得其所則動而噬嗑以為養葢取諸噬嗑也節齋蔡氏曰天下之民不同業天下之貨不同用致而聚之噬而嗑之之義進齋徐氏曰噬嗑離明在上日中象震動於下致民交易於市之義合沙鄭氏曰十三卦始離次益次噬嗑所取者食貨而已食貨者生民之夲也神農氏没黃帝堯舜氏作通其變使民不倦神而化之使民宜之易窮則變變則通通則乆是以自天祐之吉无不利黃帝堯舜垂衣裳而天下治葢取諸乾坤治去聲程子曰聖人主化如禹之治水順則當順之治則順治之古之伏羲豈不能垂衣裳必待堯舜然後垂衣裳據如此事只是一箇聖人都做得了然必須數世然後成亦因時而已又曰識變知化為難古今風氣不同故器用亦異是以聖人通變使民不倦各隨其時而已矣後世雖有作者虞舜為弗可及矣葢當是時風氣未開而虞舜之徳又如此故後世莫可及也若三代之治後世決可復不以三代為治者終苟道也夲義乾坤變化而无為朱子曰黃帝堯舜氏作到這時候合當如此變易窮則變道理亦如此垂衣裳而天下治是大變他以前底事了通其變須是得一箇人通其變若聽其自變如何得南軒張氏曰作衣裳以被之於身垂綃為衣其色元而象道襞幅為裳其色纁而象事法乾坤以示人使民知君臣父子尊卑貴賤莫不各安其分也誠齋楊氏曰所謂衣裳即舜所謂古人之象五色作服者是也葢始於黃帝備於堯舜疉山謝氏曰乾天在上衣象衣上闔而圓有陽奇象坤地在下裳象裳下兩股有隂偶象上衣下裳不可顛倒使人知尊卑上下不可亂則民志定天下治矣建安丘氏曰十三卦制器而尚象皆通變宜民之事特於黃帝堯舜氏言之者犧農之時人害雖消而人文未著衣食雖足而禮義未興為之君者方且與民竝耕而食饔飱而治蚩蚩蠢蠢葢未識所謂上下尊卑之分於是三聖人者仰觀俯察體乾坤之象正衣裳之儀使君臣分義截然於天髙地下之間天下其有不治乎斯時也其世道一新之會而黎民於變之機也雲峰胡氏曰食貨既足不可无禮於是垂衣裳以明尊卑貴賤之分而於乾坤之尊卑有合然垂衣裳而天下治即乾坤之變化而无為也刳木為舟剡木為楫舟楫之利以濟不通致逺以利天下葢取諸渙刳口姑反剡以冉反夲義木在水上也致逺以利天下疑衍南軒張氏曰衣裳之垂欲逺近之民下觀而化然川途之險阻則有所不通唯夫舟楫之利既興則日月所照霜露所墜莫不拭目觀化天下如一家中國如一人矣是以刳其木而中虚剡其楫而末銳舟所以載物而楫所以進舟致逺以利天下而取諸渙者葢渙之成卦上巽下坎彖曰利涉大川乘木有功也服牛乘馬引重致逺以利天下葢取諸隨程子曰服牛乘馬皆因其性而為之胡不乘牛而服馬乎理之所不可也夲義下動上說漢上朱氏曰上古牛未穿馬未絡至是始服乘之鄱陽董氏曰服牛乘馬穿鼻絡頭雖人為也亦各因其天而任之故取諸隨安定胡氏曰隨者是動作必隨於人以之逺則隨於人以之近則亦隨於人李氏曰刳木為舟剡木為楫因植物之材而川通矣服牛乘馬引重致逺因動物之性而途通矣牛以順為道故服而馴之以引重馬以行為事故乘而駕之以致逺牛非不可以致逺於引重為力而已馬非不可以引重於致逺為敏而已引重謂之引以有所進為義致逺謂之致以有所至為義重門擊柝以待暴客葢取諸豫重直龍反柝他洛反夲義豫備之意朱子曰重門擊柝以待暴客只是豫備之意却須待用互體推艮為門闕雷震乎外之義剡木為矢弦木為弧只是睽乖故有威天下之象亦必待穿鑿附㑹就卦推出制器之義殊不知卦中但有此理而已故孔子各以葢取諸某卦言之亦曰其大意云爾漢書所謂獲一角獸葢麟云皆疑辭也漢上朱氏曰上古外户不閉禦風氣而已至是始有暴客之防楊氏曰川途既通則暴客至矣又不可无禦之之術故取諸豫重門以禦之擊柝以警之則暴客无自而至二隂在前重門之象也一陽在下擊柝之象也三隂安於内說豫之象也涑水司馬氏曰豫者怠惰之意擊柝者所以警怠惰也斷木為杵掘地為臼臼杵之利萬民以濟葢取諸小過斷丁緩反杵昌呂反掘其曰反夲義下止上動誠齋楊氏曰耒耜耕稼之始臼杵脫粟之始建安丘氏曰以象言之上震為木下艮為土震木上動艮土下止杵臼治米之象進齋徐氏曰民粒食矣又杵臼以治之而使精小有所過而利人者也弦木為弧剡木為矢弧矢之利以威天下葢取諸睽夲義睽乖然後威以服之南軒張氏曰外有擊柝以防暴客内有杵臼以治粒食而无以威其不軌則雖有險不能守雖有粟而不得食此弧矢之利不可緩也臨川吳氏曰弧木弓也兵器不一弓矢所及者逺為長兵威天下者示有警備而使之畏也漢上朱氏曰知門柝而不知弧矢之利則威天下者有未盡故教之以弧矢之利進齋徐氏曰其害之大者以重門擊柝不足以待之故必有弧矢以威之利天下者仁也威天下者義也上古穴居而野處後世聖人易之以宮室上棟下宇以待風雨葢取諸大壯程子曰上古之時民皆巢居而穴處後世易之以棟宇而不以巢居穴處為可變者以棟宇之利故也夲義壯固之意節齋蔡氏曰棟屋脊檁也宇椽也棟直承而上故曰上棟宇兩垂而下故曰下宇棟取四剛義宇取二柔義涑水司馬氏曰風雨動物也風雨動於上棟宇建於下大壯之象也進齋徐氏曰冬穴居无以待風夏野處无以待雨故宮室不得不興震風凌雨然後知厦屋之為帡幪故棟宇不可不固大壯之意也古之葬者厚衣之以薪葬之中野不封不樹喪期无數後世聖人易之以棺槨葢取諸大過衣於既反夲義送死大事而過於厚南軒張氏曰君子不以天下儉其親於此而過无害也丹陽都氏曰杵臼棺槨所以使民養生送死无憾所以依於人者過厚也然養生不足以當大事故取小過之義而已送死足以當大事故取大過之義焉合沙鄭氏曰大壯外震震動也風雨飄搖之象大過内巽巽入也殯𦵏入土之象上古結繩而治後世聖人易之以書契百官以治萬民以察葢取諸夬夲義明決之意朱子曰上古結䋲而治後世聖人易之以書契天下事有古木之為而後人為之固不可无者此類是也又曰結䋲今溪洞諸蠻猶有此俗又有刻版者凡年月日時以至人馬糧草之數皆刻版為記都不相亂問六十四卦重於伏羲果否曰此不可考或曰耒耜市井已取重卦之象則疑伏羲已重卦或者又謂此十三卦皆云葢取則亦疑辭未必因見此卦而制此物也今无所考但既有八卦則六十四卦已在其中此則不可不知耳進齋徐氏曰上古民淳事簡事之小大唯結䋲以識之亦足以為治至後世風俗媮薄欺詐日生而書契不容不作矣書文字也契合約也言有不能記者書識之事有不能信者契驗之取明決之義葢夬乃君子決小人之卦而造書契者亦所以決去小人之偽而防其欺也開封耿氏曰已前不云上古已下三事或言古與上不同者葢未造此器之前更无餘物之用非是後世以替前物故不言上古也此以下三事皆是未造此物之前已更别有所用今將後用而代前用故夲之云上古及古者右第二章夲義此章言聖人制器尚象之事息齋余氏曰卜筮之說詳於上繫制器之說詳於下繫潛室陳氏曰十三卦取象說上古雖未有易之書元自有易之理故所作事暗合易書即邵子所謂畫前之易是也開封耿氏曰十三卦之辭或言利或不言利何也網罟非不為利也然必耒耜杵臼而後能裕萬民之食是則網罟之利不足言而耒耜杵臼之利大矣所以言利也門柝非不為利也然門柝則能保其内使暴客不能入而已弧矢則又能威其外使暴客不能至是則門柝之利不足言而弧矢之利大矣所以言利也獨於舟楫馬牛言利天下者舟楫馬牛之利无所不通可以周天下故也苟軒程氏曰網罟耒耜所以足民食交易舟車所以通民財杵臼弧矢所以利民用衣裳以華其身宮室以定其居門柝以衛其生棺槨以送其死凡所以為民生利用安身養生送死之道已无遺憾矣然百官以治萬民以察卒歸之夬之書契何也葢器利用便則巧偽生憂患作聖人憂之故終之以書契之取象書契可以代忘言之兌乾天可以防書契之偽其視網罟等象雖非一時之利實萬世之大利也故結䋲初易為網罟終易為書契聖人以定大業斷大疑悉於書契乎觀百官治萬民察誠非書契不可也十三卦終以夬卦之取象聖人之意深矣雲峰胡氏曰舟楫取渙以卦象取也服乘取隨臼杵取過以卦徳取也豫備睽乖壯固夬決大過過於厚皆以卦義取也諸家徃徃皆以互體推之未免穿鑿殊不知夫子之意亦不過謂聖人之制此器也此卦之中自有此理而已葢之一字疑取諸此而非必取之此也自天祐之吉无不利上傳為君子之用易者言之下傳又為聖人之通變者言之何也天者理而已聖人之制器不能先天而强為不能後天而不為非一時之所可為也非一人之所能為也皆天理之自然者也所以亦曰自天祐之誠齋楊氏曰嗚呼鴻荒之世民之初生非若今日之備器用便起居其服食也自斯人之飢而未知佃漁也聖人於是乎作網罟自斯人之肉食而未知粒食也聖人於是乎作耒耜自斯人之食貨或有餘或不足之偏匱也聖人於是乎作市易自斯人之寒而衣皮未知織紝之制也聖人於是乎作衣裳自斯人之出入厄於川隔而道斷也聖人於是乎作舟楫自斯人之疲於負擔而趼於逺塗也聖人於是乎作輪轡自斯人之虞於寇攘而懈於守禦也聖人於是乎作門柝自斯人之知有耕耨而未知有春揄也聖人於是乎作杵臼自斯人之无爪牙以自濟而憂於搏噬也聖人於是乎作弧矢自斯人之穴處而病於溼墊也聖人於是乎作宮室自斯人之死而蹙於虆梩之掩也聖人於是乎作棺槨自斯人之窮於結繩而相欺无藉也聖人於是乎作書契然非聖人之私知也取於十三卦之象然後成亦非一聖人之能為也歴五聖人而後備葢斯人生生之道若此其難而聖人所以生生斯人者若此其勞也故曰如古之无聖人人之類滅乆矣西山真氏曰此章所列卦象之意皆物理之自然者也有自然之象則有自然之理人之所共睹也然常人見其象而昧其理唯聖人見是象則知是理知是理則制是器人皆謂備物致用立成器以利天下出於聖人之心思不知聖人亦因其所固有而已學者誠能虚心以體天下之物則精義妙道莫不昭昭然接於吾之心日然後真知道器之相合而顯微之无間也是故易者象也象也者像也夲義易卦之形理之似也朱子曰易者象也象也者像也只是彷彿說不可求得太深易者象也是總說起言易不過只言隂陽之象下云像也材也天下之動也則皆是說那上面象字問易者象也象也者像也四句莫只是解箇象字否曰是解易字像又是解象字材又是解彖字末句意亦然蔡氏攸曰昔者聖人之作易也始畫八卦而象在其中象與卦竝生以寓天下之賾故曰易者象也葢俯仰以觀逺近以取神明之徳可通鬼神之情狀可得而况於人乎况於萬物乎及因而重之發揮於剛柔而生爻則擬諸其形容者其變不一而象亦為之滋矣故邑屋宮庭舟車器械服帶簮履下至鳥獸蟲魚金石草木之類皆在所擬至纖至悉无所不有所謂其道甚大百物不廢者此也其在上古尚此以制器其在中古觀此以繫辭而後世之言易者乃曰得意在忘象得象在忘言一切指為魚兔筌蹄殆非聖人作易前民用以教天下之意也彖者材也夲義彖言一卦之材漢上朱氏曰卦有剛柔材也有是時有是象必有是才以濟之才與時㑹斯足以成務矣爻也者效天下之動者也夲義效放也漢上朱氏曰天下之動其微難知有同處一時同處一事所當之位有不同焉則進退趨舍殊塗矣故曰爻也者效天下之動也是故吉凶生而悔吝著也夲義悔吝本微因此而著南軒張氏曰易者象也象也者像此者也謂之彖則言其象之材而已謂之爻則放其象之變而已至於吉凶則悔吝之著也故悔者有改過之意而吉則悔之著也吝者有文過之意而凶則吝之著也雲峰胡氏曰至著者象至微者理易之象理之似也彖者材也材者象之質爻效天下之動動者象之變悔吝在心未著吉凶在事已著吉者悔之著凶者吝之著也右第三章雙湖胡氏曰此章說卦象及彖辭爻辭論人事之悔吝至吉凶而始著葢卦爻辭无非所以明得失之報欲人觀象玩辭之際知有悔心而不吝於改過庶幾有吉而无凶耳陽卦多隂隂卦多陽夲義震坎艮為陽卦皆一陽二隂巽離兌為隂卦皆一隂二陽潛室陳氏曰二耦一奇即奇為主是為陽卦二奇一耦即耦為主是為隂卦故曰陽卦多隂隂卦多陽其故何也陽卦奇隂卦耦本義凡陽卦皆五畫凡隂卦皆四畫二山林氏曰陽卦宜多陽而多隂隂卦宜多隂而多陽何也葢陽卦之數必五奇數也奇則隂畫自多隂卦之數必四耦數也耦則陽畫自多其多隂多陽皆自然而然非人力所能參也雙湖胡氏曰嘗推八卦奇耦之畫每卦雖各得其三而合之則為六乾坤合為六震巽合亦六坎離合亦六艮兌合亦六適符老隂掛扐之用數總之則四六二十四畫而成老隂過揲之數若无與於老陽之數矣然以陽卦五畫隂卦四畫觀之奇耦之合又皆老陽掛扐之用數故乾坤合為九震巽合亦九坎離合亦九艮兌合亦九悉數之實成三十六而為老陽過揲之數焉此乾坤用九用六其數黙見於卦畫之可推者如此雖出於偶然其實亦莫非自然之妙也豈可以人力參哉其德行何也陽一君而二民君子之道也隂二君而一民小人之道也行下孟反夲義君謂陽民謂隂朱子曰二君一民試敎一箇民而有兩箇君㸔是甚模様柴氏中行曰一君二民道大而公君子之道也二君一民道小而私小人之道也卦體乎君子小人之道而象彖爻所以發明此道者也然在諸卦為陽卦者未必皆君子之道為隂卦者未必皆小人之道葢此特借隂陽二卦之體以明君子小人之道不同耳非可一例成卦也爻彖象乃是發明此道非發明此卦也雲峰胡氏曰論其故則陽卦五畫隂卦四畫陽與隂一定之分固如此論其德行則陽為君隂為民陽為君子隂為小人易之扶陽抑隂又如此右第四章雙湖胡氏曰此章專以八卦隂陽畫數分君子小人之道易曰憧憧徃來朋從爾思子曰天下何思何慮天下同歸而殊塗一致而百慮天下何思何慮憧音冲夲義此引咸九四爻辭而釋之言理本无二而殊塗百慮莫非自然何以思慮為哉必思而從則所從者亦狹矣朱子曰所謂天下何思何慮正謂雖萬變之紛紜而所以應之各有定理不假思慮而知也問天下同歸而殊塗一致而百慮何故不云殊塗而同歸百慮而一致曰也只一般但他是從上說下自合如此說感應之理本不消思慮空費思量空費計較空費安排只順其自然而已臨川吳氏曰思者心之用也慮者謀度其事也心體虚雲如止水明鏡未與物接寂然不動何思之有既與物接應之各有定理何慮之有理之在心者同因事之不同而所行之塗各殊理之在心者一因事之不一而所發之慮有百塗雖殊慮雖百而應事之理則同而一也故定心應事動而无動則亦何思何慮之有此人心定應寂然之感也若九四之憧憧則豈如是乎柴氏中行曰言天地萬物皆本於天理之自然人當棄私欲而循天理也所謂理夫子之一貫子思之誠曾子之守約是也同歸而殊塗天下无二理也一致而百慮天下无二心也致謂極致明其所同歸極其所一致則天下雖塗殊慮百无不應者何以思慮為哉進齋徐氏曰塗雖殊而歸同則徃來自不容无而加之憧憧則私矣慮雖百而致一則思亦人心所當有而局於朋從則狹矣人於此但當以貞守之不必自為紛紛也日徃則月來月徃則日來日月相推而明生焉寒徃則暑來暑徃則寒來寒暑相推而歲成焉徃者屈也來者信也屈信相感而利生焉信音申夲義言徃來屈信皆感應自然之常理加憧憧焉則入於私矣所以必思而後有從也朱子曰日徃則月來一段乃承上文憧憧徃來而言徃來皆人所不能无者但憧憧則不可誠齋楊氏曰觀諸日今夕之徃所以為來朝之來觀諸月今夕之來所以為來朝之徃葢前之屈乃後之信也觀諸寒暑折膠之寒不生於寒而生於烈日流金之暑流金之暑不生於暑而生於堅氷折膠之寒葢今之信乃昔之屈也臨川吳氏曰因日之徃而有月之來因月之徃而有日之來二曜相推以相繼則明生而不匱因寒之徃而有暑之來因暑之徃而有寒之來二氣相推以相代則歲成而不缺徃者之屈感來者之信來者之信又感徃者之屈而有明生歲成之利此天道徃來自然之感也若九四之徃來則豈如是乎張子曰屈信相感而利生焉感以誠也情偽相感而利害生雜以偽也尺蠖之屈以求信也龍蛇之蟄以存身也精義入神以致用也利用安身以崇德也蠖紀縛反夲義因言屈信徃來之理而又推以言學亦有自然之機也精研其義至於入神屈之至也然乃所以為出而致用之本利其施用无適不安信之極也然乃所以為入而崇德之資内外交相養互相發也朱子曰尺蠖之屈以求信也龍蛇之蟄以存身也屈信消長闔闢徃來其機不曽停息大處有大闔闢小處有小闔闢大處有大消息小處有小消息此理萬古不易如目有瞬時亦豈能常瞬定又須開不能常開定又須瞬瞬了又開開了又瞬至纎至微无時不然問此章言萬變雖不同然皆一理之中所自有知不用安排曰此只說得一頭尺蠖若不屈則不信得身龍蛇若不蟄則不伏得氣如何存得身精義入神疑與行處不相關然而見得道理通徹乃所以致用利用安身亦疑與崇德不相關然而動作得其理則德自崇天下萬事萬變无不有感通徃來之理又曰尺蠖屈便要求信龍蛇蟄便要存身精研義理无絲毫之差入那神妙處這便是要出來致用外面用得利而身安乃所以入來自崇已徳致用之用即利用之用所以横渠云精義入神事豫吾内求利吾外利用安身素利吾外致養吾内事豫吾内言曽到這裏面來又曰尺蠖屈得一寸便能信得一寸來許他之屈乃所以為信龍蛇於冬若不蟄則凍殺了其蟄也乃所以存身也精義入神乃所以致用也利用安身乃所以崇徳也欲罷不能如人行歩左腳起了不由得右腳不起所謂過此以徃未之或知也若到那窮神知化則須是德之盛也方能精義二字所謂義者宜而已物之有宜有不宜事之有可有不可吾心處之知其各有定分而不可易所謂義也精義者精諸此而已所謂精云者猶曰察之云耳精之至而入於神則於事物之所宜毫釐委曲之間无所不悉有不容言之妙矣此所以致用而用无不利也又曰義至於精則應事接物間无一非義不問小事大事千變萬化改頭換面出來自家應付他如利刀快劒相似迎刃而解件件判作兩邊去且如精義入神如何不思那致用底却不必思致用底是事功是效驗利用安身今人循理則自然安利不循理則自然不安利息齋余氏曰既曰屈信相感而利生矣恐人知信之利而不知屈之所以利也故以尺蠖龍蛇明之其為人切矣臨川吳氏曰夫子既以屈信二字釋徃來之相感復以物理之屈信聖學之屈信言之而廣其意尺蠖不屈則其行不能信既信而再行則又屈也龍蛇不蟄則其來歲之身不能奮既奮於來歲則又蟄也此物理之屈信相感也義理精明則應物有定而神不外馳入者无出内之屈也而乃所以致極其外之用屈之感信也日用宜利則每事曲當而身之所處隨寓而安外之信也而乃所以增崇其内之德信之感屈也此聖學之屈信相感也因言聖學之交相養互相發工力至此則蔑以加矣過此以徃未之或知也窮神知化德之盛也夲義下學之事盡力於精義利用而交養互發之機自不能己自是以上則亦无所用其力矣至於窮神知化乃德盛仁熟而自致耳然不知者徃而屈也自致者來而信也是亦感應自然之理而已張子曰氣有隂陽推行有漸為化合一不測為神此上四節皆以釋咸九四爻義朱子曰窮神知化徳之盛這徳字只是上面崇德之德徳盛後便能窮神知化便如聰明睿知皆由此出自誠而明相似又曰精義入神以致用也利用安身以崇德也過此以徃未之或知也窮神知化徳之盛也只是這一箇非於崇德之外别有箇徳之盛也做來做去做到徹處便是木之或知是到這裏不可奈何窮神知化雖不從這裏出來然也有這箇意思神化二字雖程子說得亦不甚分明唯是横渠推出來推行有漸為化合一不測為神又曰一故神兩在故不測兩故化窮神知化化是逐些子挨將去底一日復一日一月復一月節節挨將去便成一年神是一箇物事或在彼或在此當其在隂時全體在隂在陽時全體在陽都只是這一物兩處都在不可測故謂神橫渠言一故神兩故化又注云兩在故不測這說得甚分曉此章解咸九四據爻義看上文說貞吉悔亡貞字甚重程子謂聖人感天下如兩暘寒暑无不通无不應者貞而已所以感人者果貞矣則吉而悔亡葢天下本无二理果同歸矣何患乎殊塗果一致矣何患乎百慮所以重言何思何慮也如日月寒暑之徃來皆是自然感應如此日不徃則月不來月不徃則日不來寒暑亦然徃來只是一般徃來但憧憧之徃來者患得患失既要感這箇又要感那箇便自憧憧忙亂用其私心而已屈信相感而利生焉者有晝必有夜設使長長為晝而不夜則何以息夜而不晝焉得有此光明春氣同是和好只有春夏而无秋冬萬物何以成一向秋冬而无春夏人何以生屈信徃來之理所以必待迭相為用而使利所由生春秋冬夏只是一箇感應所應復為感所感復為應也春夏是一箇大感秋冬則必應之而秋冬又為春夏之感以細言之則春為夏之感夏則應春而又為秋之感秋為冬之感冬則應秋而又為春之感所以不窮也尺蠖不屈則不可以信龍蛇不蟄則不可以藏身今山林冬暖而蛇出者徃徃多死此則屈信徃來感應必然之理夫子因徃來兩字說得許多大又推以言學所以内外交相養亦只是此理而已橫渠曰事豫吾内求利吾外素利吾外致養吾内此下學所當致力處過此以上則不容訃較所謂窮神知化乃養盛自致非思勉所及此則聖人事矣天下何思何慮一段此是言自然而然如精義入神自然致用利用安身自然崇徳天下何思何慮一句便是先打破那箇思字却說同歸殊塗一致百慮又再說天下何思何慮謂何用如此憧憧徃來而如此朋從之思也日月寒暑之徃來尺蠖龍蛇之屈信皆是自然底道理不徃則不來不屈則亦不能信也今之為學亦只是如此精義入神用力於内乃所以致用乎外利用安身求利於外乃所以崇徳乎内只是如此做將去雖至於窮神知化地位亦只是德盛仁熟之所致何思何慮之有雲峰胡氏曰天下何思何慮一語所以破思慮之感息憧憧之思也天下間凡一徃一來皆感應自然之常理非唯日月寒暑如此以吾之學言之精義以致用利用以崇德亦有自然屈信之理至於窮神知化而德之盛皆自然而已矣皆非思慮所及故曰天下何思何慮易曰困于石據于蒺藜入于其宮不見其妻凶子曰非所困而困焉名必辱非所據而據焉身必危既辱且危死期將至妻其可得見邪夲義釋困六三爻義或問非所困而困焉名必辱大意謂石不能動底物自是不須去動他若只管去用力徒自困耳朱子曰此爻大意謂不可做底便不可入頭去做又曰且以人事言之有著力不得處若只管著力去做少間去做不成他人便道自家无能便是辱了名南軒張氏曰有應於上將以求名今用於石此非所困而困焉名必辱也有依於下得以安身今據于蒺藜非所據而據焉身必危也在用之時名辱身危有死之理此身不行道雖妻且不可見宜乎凶也誠齋楊氏曰君子有不幸之困无以致之在陳畏匡是已故名不辱而身不危小人无幸免之困為不善以致之以其非所據而據是以非所困而困尚可得而保其名保其身保其家保其妻子乎易曰公用射隼于髙墉之上獲之无不利子曰隼者禽也弓矢者器也射之者人也君子藏器於身待時而動何不利之有動而不括是以出而有獲語成器而動者也射食亦反隼恤允反括古活反夲義括結礙也此釋解上六爻義朱子曰張敬夫說易謂只依孔子繫辭說便了如說公用射隼至成器而動者也只如此說便了固是如此聖人之意只恁地說不得緣在當時只理㑹得象數故聖人明之以理又曰公用射隼孔子是發出言外之意漢上朱氏曰藏可用之器待可為之時動无結礙出則有獲唯乘屈信之理而其用利者能之子曰小人不恥不仁不畏不義不見利不勸不威不懲小懲而大誡此小人之福也易曰屨校滅趾无咎此之謂也夲義此釋噬嗑初九爻義厚齋馮氏曰不以不仁為恥故見利而後勸於為仁不以不義為畏故畏威而後懲於不義漢上朱氏曰小人不恥不仁故不畏不義陷於死亡辱及其先恥孰大焉雖愚也而就利避害與人同故見利而後勸威之而後懲小懲大誡猶為小人之福况真知義乎善不積不足以成名惡不積不足以滅身小人以小善為无益而弗為也以小惡為无傷而弗去也故惡積而不可掩罪大而不可解易曰何校滅耳凶何河可反去羌呂反夲義此釋噬嗑上九爻義漢上朱氏曰精於義者豈一日積哉彼積不善而滅其身者不知小善者大善之積也融堂錢氏曰積字宜玩凡善惡未有不由積而成也誠齋楊氏曰夫子釋噬嗑初上之辭謂懲惡在初改過在小建安丘氏曰惡小而不能懲則罪大而不可解猶滅趾不防而至於滅耳也烏得而不凶子曰危者安其位者也亡者保其存者也亂者有其治者也是故君子安而不忘危存而不忘亡治而不忘亂是以身安而國家可保也易曰其亡其亡繫于苞桑夲義此釋否九五爻義或問危者以其位為可安而不知戒懼故危亡者以其存為可常保是以亡亂者有其治是自有其治如有其善之有是以亂朱子曰某舊也如此說看來保字說得較牽强只是常有危亡與亂之意則可以安其位其保其存有其治臨川吳氏曰自處於危者乃自安位之道也凛乎若將亡將亂者乃所以常保其存常有其治也九五否將休矣而不忘戒懼如此葢於安存治之時而能不忘危亡亂之禍是以身之位得以安而國家可保其久存長治也張子曰明君子之見幾子曰德薄而位尊知小而謀大力小而任重鮮不及矣易曰鼎折足覆公餗其形渥凶言不勝其任也知音智鮮仙善反折之設反餗音速渥於角反勝音升夲義此釋鼎九四爻義漢上朱氏曰位欲當徳謀欲量知任欲稱力三者各得其實則利用而安身小人志在於得而已以人之團徼倖萬一鮮不及禍自古一敗塗地殺身不足以塞其責者夲於不知義而已融堂錢氏曰古之人君必量力度徳而後授之官古之人臣亦必度力度德而後居其任雖百工胥史且猶不苟况三公乎為君不明於所擇為臣不審於自擇以至亡身危主誤國亂天下皆由不勝任之故可不戒哉誠齋楊氏曰聖人亦豈責天下之人皆德厚而不薄皆知大而不小皆力多而不少哉亦責其貪位而不量已過分而不勝任以至覆人之餗敗己之身爾子曰知幾其神乎君子上交不諂下交不瀆其知幾乎幾者動之微吉之先見者也君子見幾而作不俟終日易曰介于石不終日貞吉介如石焉寧用終日斷可識矣君子知微知彰知柔知剛萬夫之望先見之見賢遍反程子曰先見則吉可知不見則致凶見幾而作不俟終日智之圓也介如石理素定也理索定故見幾而作何俟終日哉夲義此釋豫六二爻義漢書吉之之間有凶字朱子曰知幾其神乎便是這事難如邦有道危言危行邦无道危行言遜今有一様人其爽顗者又言過於直其畏謹者又縮做一團更不敢做事說話此便是曉不得那幾若知幾則自中節无此疚矣君子上交不諂下交不瀆葢上交貴於恭遜恭則便近於諂下交貴於和易和則便近於瀆葢恭與諂相近和與瀆相近只爭些子便至于流也又曰上交近於諂下交近於瀆如此當知幾纔過些子便不是知幾周子所謂幾善惡者此也又曰君子上交不諂下交不瀆他這下而說幾最要看箇幾字只爭些子凡事未至而空說道理易見事已至而顯然道理也易見唯事之方萌而動之㣲處此最難見問幾者動之微何以獨於上下交言之曰上交要恭遜纔恭遜便不知不覺有箇諂底意思在裏頭下交不瀆亦是如此所謂幾者只纔覺得近諂近瀆便匆令如此便是知幾幾者動之微吉之先見者也漢書引此句吉下有凶字當有凶字又曰凡人上交必有些小取奉底心下交必有些小簡傲底心所爭又只是些子能如此而察之非知幾者莫能又曰幾者動之微是欲動未動之間便有善惡便須就這處理㑹若到發出處更怎生奈何得所以聖賢說謹獨便都是要就幾微處理㑹知微知彰知柔知剛是四件事問知微知彰知柔知剛伊川作見微則知彰矣見柔則知剛矣其說如何曰也好看來只作四體事亦自好既知微又知彰既知柔又知剛言其无所不知所以為萬民之望也張子曰幾者象見而未形者也形則涉乎明不待神而後知也吉之先見云者順性命則所先皆吉也漢上朱氏曰神難言也精義入神其唯知幾乎知幾其神矣幾者動之微吉之先見者也譬如陽生而井溫雨降而雲出衆人不識而君子見之誠齋楊氏曰夫石者至静而无欲至重而不動者也今也君子介然如石天下之可欲者何物能動之乎其見幾寧用終日而後識之乎雙湖胡氏曰豫六二爻唯曰介于石不終日貞吉而夫子發明幾學以教人葢介有幾義倪寛謂至纖至細處者深為得之上交謂五下交謂初唯當豫時不諂不瀆不沉溺於豫此其所以為知幾也臨川吳氏曰穆生得免申白之禍者能見幾而作也劉栁竟陷伾文之黨者不能見幾而作也子曰顔氏之子其殆庶幾乎有不善未嘗不知知之未嘗復行也易曰不逺復无祗悔元吉復行之復扶又反夲義殆危也庶幾近意言近道也此釋復初九爻義朱子曰其殆庶幾乎殆是幾字之義又曰是近義又曰殆是危殆者是爭些子底意思或以幾為因上文幾字而言但左傳與孟子庶幾兩字都只做近字說顏子有不善未嘗不知知之未嘗復行今人只知知之未嘗復行為難殊不知有不善未嘗不知是難處今人亦有說道知得這箇道理及事到面前又却只隨私欲做將去前所知者都自忘了只為是不曾知有不善未嘗不知知之未嘗復行直是顔子天資好如至清之水纖芥必見李氏椿年曰聖人无不善賢人則容有不善但未嘗不知知之未嘗復行也臨川吳氏曰程子云顔子无形顯之過夫子謂其庶幾未能不勉而中所欲不踰矩是有過也然其明而剛故一有不善未嘗不知既知未嘗不遽改乃不逺復也過既未形而改何悔之有復者陽反來復也陽君子之道故復為反善之義初陽來復處卦之初復之最先不逺而復者也失而後有復唯失之不逺而復則不至于悔也天地絪緼萬物化醇男女構精萬物化生易曰三人行則損一人一人行則得其友言致一也絪音因縕紓云反夲義絪縕交密之狀醇謂厚而凝也言氣化者也化生形化者也此釋損六三爻義朱子曰天地絪縕言氣化也男女構精言形化也致一專一也唯專一所以能絪緼若不專一則各自相離矣化醇是已化後化生指氣化而言草木是也天地男女都是兩箇方得專一若三箇便亂了三人行滅了一箇則是兩箇便專一一人行得其友成兩箇便專一程子說初與二三與上四與五皆兩相與自說得好臨川吳氏曰絪緼者氣之交也構精者形之交也天地之二氣交故物之以氣化者其氣醲厚而能醇男女之二氣交故物之以形化者其精凝聚而能生此氣形之相交以二與三人損一一人得友之相合以二者其理同皆言其以一合一故能致一而不二也漢上朱氏曰天地萬物其本一也天地升降其氣絪緼萬物化矣醇而未離言其一而未始離也天地既生萬物萬物各有隂陽精氣相交化生无窮男女曰化生者言有兩則有一也建安丘氏曰損自㤗來以未成卦言之下乾為天上坤為地以乾上三爻交坤下三爻而為損有天地絪緼之象以既成卦言之上坤變艮艮為少男下乾變兌兌為少女有男女構精之象張子曰虚則受盈則虧隂陽之義也故隂得陽則為益以其虚也陽得隂則為損以其盈也艮三索而得男乾道之所以成也兌三索而得女坤道之所以成也故三之於上則有天地絪緼男女構精之義子曰君子安其身而後動易其心而後語定其交而後求君子修此三者故全也危以動則民不與也懼以語則民不應也无交而求則民不與也莫之與則傷之者至矣易曰莫益之或擊之立心勿恆凶易其之易以䜴反夲義此釋益上九爻義朱子曰心平氣和則能言易其心而後語謂平易其心而後語也上下繫說許多爻直如此分明他人如說得分明便淺近聖人說來却不淺近有含蓄所以分在上下繫也无甚意義是聖人偶去這處說又去那處說爾融堂錢氏曰安其身易其心定其交非立心有恒者不能然立心有恒種種周密缺一便不謂全平庵項氏曰危以動則民不與者黨與之與也无交而求則民不與者取與之與也柴氏中行曰身順道則安悖道則危心无險陂則易有險陂則懼以義相與為交定以利相與為无交動而與語而應求而與者物我一心而无間之者也小人反是獨言莫之與則傷之者至矣以益之上九專利自益故也右第五章雙湖胡氏曰夫子於繫辭上傳既舉七卦爻辭以發明易道今於此章復舉十卦十一爻之辭以論之看來亦只是隨一時意之所欲言者則舉之逐爻各自有意義皆是為學者取法未必先立主意却以卦實之也雲峰胡氏曰上繫七爻下繫十一爻皆象傳之文言也學易者可觸類而通其餘矣子曰乾坤其易之門邪乾陽物也坤隂物也隂陽合德而剛柔有體以體天地之撰以通神明之德撰仕勉反程子曰或曰乾坤易之門其義難知餘卦則易知也曰乾坤天地也萬物烏有出天地之外者乎知道者統之有宗則然也而在卦觀之乾坤之道簡易故其辭平直餘卦隨時應變取舍无當至為難知也知乾坤之道者以為易則可也夲義諸卦剛柔之體皆以乾坤合德而成故曰乾坤易之門撰猶事也朱子曰乾坤易之門不是乾坤外别有易只易便是乾坤乾坤便是易似那兩扇門相似一扇開便一扇閉只是一箇隂陽做底如闔户謂之坤闢户謂之乾問門者是六十四卦皆由是出如兩儀生四象只管生出故曰門邪為復是取闔闢之義邪曰只是取闔闢之義六十四卦只是這一箇隂陽闔闢而成但看他下文云乾陽物也坤隂物也隂陽合德而剛柔有體便見得只是這兩箇乾陽物坤隂物隂陽形而下者乾坤形而上者天地之撰即是說他做處進齋徐氏曰陽畫為乾隂畫為坤門猶闔户闢户之義一闔一闢為易之門其變无窮皆二物也隂陽合徳謂二物交錯而相得有合剛柔有體謂成卦爻之體也天地之撰隂陽造化之迹也有形可擬故曰體體天地之撰言聖人作易皆以體法造化之事而效其至著者也神明之徳隂陽健順之性也有理可推故曰通通神明之徳言易畫既作又以通知造化之理而極於至微者也又曰自形而上者言之故先隂而後陽自形而下者言之故先剛而後柔凌氏曰乾坤物於隂陽而由隂陽以闔闢故曰乾陽物也坤隂物也節齋蔡氏曰乾坤合而後成衆卦爻之體如剛來而下柔剛上而柔下此類皆由乾坤相合而成所謂隂陽合德而剛柔有體也雲峰胡氏曰其初也隂陽分而為兩儀隂陽之合則為四象八卦而剛柔於是乎有體著而天地之撰微而神明之德皆自乾開其始而坤成其終故曰乾坤易之門其稱名也雜而不越於稽其類其衰世之意邪夲義萬物雖多无不出於隂陽之變故卦爻之義雖雜出而不差繆然非上古淳質之時思慮所及也故以為衰世之意葢指文王與紂之時也或問其稱名也雜而不越是指繫辭而言是指卦名而言朱子曰他後面兩三番說名後又舉九卦說看來只是謂卦名問於稽其類曰但不過是說稽攷其事類其衰世之意邪伏羲畫卦時這般事都已有了只是未曾經歴到文王時世變不好古來未曾有底事都有了他一一經歴這崎嶇萬變過來所以說出那卦辭如箕子之明夷如入于左腹獲明夷之心于出門庭此若不是經歴如何說雲峰胡氏曰伏羲三畫卦名自乾一至坤八有自然之序因而重之亦然至文王稱卦之名則雜而非復伏羲之序矣然其稱名雖雜而於伏義之易未嘗差違稽類考占世之衰也葢有不得不然者矣柴氏中行曰乾坤足以盡天下之道萬物由之足矣何用不一之名世衰道微人之情偽滋熾聖人不得不明其道以示天下進齋徐氏曰上古之世俗朴民淳迷於吉凶之塗而莫知所趨故伏羲畫卦以教之占而吉凶以明斯民由之而无疑也雖乾陽坤隂剛柔交錯顯而體天地之撰微而通神明之德然剛勝則吉柔勝則凶亦未嘗費辭也中古以來人心變詐迷謬愈甚文王周公於是繫卦爻之辭稱名辨物稽類考占以開示隂陽之義易之道雖无餘藴而聖人憂患後世之意葢亦有不得已然者故下文又申言之夫易彰徃而察來而微顯闡幽開而當名辨物正言斷辭則備矣夫音扶當去聲斷丁亂反夲義而微顯恐當作微顯而開而之而亦疑有誤朱子曰彰徃察來徃者如隂陽消長來者事之未來吉凶問彰徃察來如神以知來知以藏徃相似徃是已定㡳如天地隂陽之變皆已見在只卦上了來謂方來之變亦皆在這上曰是微顯闡幽幽者不可見便就這顯處說出來顯者便就上面尋其不可見底教人知得如此顯道神德行相似徳行顯然可見者道不可見者微顯闡幽是將道來事上看言那箇雖是粗底然皆出於道義之藴微顯所以闡幽闡幽所以微顯只是一箇物事繫辭自此以後皆難曉進齋徐氏曰徃謂隂陽消長剛柔變化卦爻所藏者易皆著而明之故曰彰徃來謂吉凶未定事之方來者占筮中所告可以前知故曰察來顯者微之使求其原故曰微顯幽者闡之使見其端故曰闡幽當名謂父子君臣之分貴賤上下之等各當其位也辨物謂乾馬坤牛離火坎水碩果莧陸之類悉辨其似也正言謂元亨利貞直方大之辭正其言以曉人也斷辭謂利涉大川不利涉大川可小事不可大事之語有以決其疑也雲峰胡氏曰辨物正言斷辭後天之易也視先天則為備矣臨川吳氏曰彰徃即藏徃也謂明於天之道而彰明已徃之理察來即知來也謂察於民之故而察知未來之事微顯即神德行也謂以人事之顯而本之於天道所以微其顯闡者闢而顯之也闡幽即顯道也謂以天道之幽而用之於人事所以闡其幽上篇之藏徃知來顯道神徳行兼蓍而言此則專以卦而言也其稱名也小其取類也大其㫖逺其辭文其言曲而中其事肆而隱因貳以濟民行以明失得之報中丁仲反行下孟反夲義肆陳也貳疑也進齋徐氏曰負乘徃來事名之小者也茅棘豕雉物名之小者也所稱雖小而其所取之類皆本於隂陽非稱名也小取類也大乎㫖謂所示之理文謂經緯錯綜也極天下之賾凡天地隂陽道德性命之奥象皆示之而其所繫之辭經緯錯綜皆有自然之文非其㫖逺其辭文乎曲委曲也凡委曲其文者未必皆中乎理易則言雖曲而无不中也肆陳也凡敷陳其事者无有隱而不彰易則事雖肆而其理未嘗不隱也貳疑也報猶應也失得之報吉凶之應也因民之疑貳以決其疑以濟其所行有以明著其吉凶之應也雲峰胡氏曰稱名雖小而取類於隂陽也甚大不可以淺近卑吾易也其㫖雖逺而其文經緯可見不可以髙逺荒吾易也其言雖委曲而又皆中於理易豈髙逺之書哉其事雖橫陳而實本於至隱易豈淺近之書哉上古之時唯有易畫以明失得之報而民无疑至于衰世不得不因民之疑而明之以辭矣雙湖胡氏曰此一節上六句皆是抑揚說易書所載名雖小而類則大㫖雖逺而辭則文言雖曲而理則中事雖肆而理則隱正與書直而温寛而栗等語同意凡此者无非因民心之疑貳而欲濟其所行以易而明示其失得之報故也臨川吳氏曰自夫易以下至此皆論文王彖辭雖取類之大辭之文事之肆而隱爻辭亦然而此則專為彖辭言也右第六章夲義此章多闕文疑字不可盡通後皆放此雙湖胡氏曰此章專論乾坤為易之門六十四卦之所從出乃易之關鍵也其究則无非所以斷民疑明吉凶之報耳易之興也其於中古乎作易者其有憂患乎程子曰如言仁者不憂又却言作易者其有憂患須要知用處各别也天下只有一箇憂字一箇患字阮有此二字聖人安得无之夲義夏商之末易道中微文王拘於羑里而繫彖辭易道復興臨川吳氏曰中古謂文王時羲皇之易有畫而已三畫之卦雖有名而六畫之卦未有名文王始名六畫而繫之以辭易道幾微而至此復興也卦名及辭皆前所未有故不云述而云作作易在羑里時故云其有憂患乎葢於其名卦而知其有憂患也下文舉九卦之名以見其憂患之意是故履德之基也謙德之柄也復德之本也恒德之固也損德之修也益德之裕也困德之辨也井德之地也巽德之制也夲義履禮也上天下澤定分不易必謹乎此然後其德有以為基而立也謙者自卑而尊人又為禮者之所當執持而不可失者也九卦皆反身修德以處憂患之事也而有序焉基所以立柄所以持復者心不外而善端存恒者守不變而常且乆懲忿窒慾以修身遷善改過以長善困以自驗其力井以不變其所然後能巽順於理以制事變也朱子曰履徳之基只是要以踐履為本謙德之柄只是要謙退若處患難而驕亢自髙取禍必矣復徳之本如孟子所謂自反困德之辨困而通則可辨其是困而不通則可辨其非損是懲忿窒慾益是修德益令廣大巽德之制巽以行權巽只是低心下意要制事須是將心入那事裏面去順他道理方能制事方能行權若心粗只從事皮膚上綽過如此行權便錯了巽伏也入也問井德之地曰井有本故澤及於物而井未嘗動故曰居其所而遷如人有德而後能施以及人然其德性未嘗動也問巽何以為德之制曰巽為資斧巽多作斷制之象葢巽字之義非順所能盡乃順而能入之義謂巽一隂入在二陽之下是入細直徹到底不只是到皮子上如此方能斷得殺落而見得盡何不可以行權進齋徐氏曰履踐也基猶基址禮卑如地人之踐履一循乎禮是從實地上立脚步步皆實則德有基基自下積累而上故曰德之基復為反善之義人非聖人不能不流於惡能於念慮之萌人所不知已所獨知之處審其幾而復於善焉是德有其本也人處困窮出處語黙之間取予辭受之際最可觀德當義則為君子違理則為小人明辨於斯所以自驗其所守也雲峰胡氏曰夫子偶於上經取三卦下經取六卦言文王以憂患之心作易而文王處憂患之道自无非易也履之象上天下澤定分不易履之爻以一隂安處於三陽之下此履之所以為禮也謙之象地中有山不見其髙謙之爻以一陽而退處於三隂之下此謙之所以制禮也復則一陽生於五隂之下天地之心可見夲義所謂心不外而善存者指仁而言也如墉之基所以立也如器之柄所以執也文王之禮也如木之本所以生也文王之仁也恒德之固文王之心无時而非禮无時而非仁也損以懲忿窒慾益以遷善改過困以知命而取舍有辨非以定性而動静不改其終也巽順於理以制事變文王葢无適而非義也雙湖胡氏曰此初陳九卦之德雖未說到聖人用易處然以文王之聖之徳純亦不已其於九卦之德固自統㑹於其心也乆矣履和而至謙尊而光復小而辨於物恒雜而不厭損先難而後易益長裕而不設困窮而通井居其所而遷巽稱而隱易以䜴反長丁丈反稱尺証反程子曰益長裕而不設謂固有此理而就上充長之設是撰造也撰造則為偽也夲義此如書之九德禮非强世然事皆至極謙以自卑而尊且光復陽微而不亂於羣隂恒處雜而常德不厭損欲先難習熟則易益但充長而不造作困身困而道亨井不動而及物巽稱物之宜而潛隱不露朱子曰履之為卦君臣上下各履其位而得其和者也和則疑於平易而非極至之義然各得其所而不亂焉是乃所以和而至其下八卦之說其例皆然履和而至以下毎句皆是反說如謙本以自卑却尊而且光若秦人尊君卑臣則雖尊而不光唯謙則尊而又光復小而辨於物者葢復卦是一陽方生於羣隂之下如幽暗中一㸃白是小而辨也又曰復雖一陽方生然而與衆隂却不相亂如人之善端方萌雖小然而衆惡却遏他不得損先難而後易如子産為政鄭人歌之曰孰殺子産吾其與之及三年人復歌而頌之葢事之初在我亦有所勉强在人亦有所難堪乆之當事理順人心這裏方易便如利者義之和一般義是一箇斷制物事却似不和乆之事得其宜乃所以為和如萬物到秋許多嚴凝肅殺之氣似可畏然萬物到這裏若不得此氣收歛凝結許多生意又无所成就其難者乃所以為易也益長裕而不設長裕只是一事但充長自家物事教寛裕而已困窮而通此因困卦說澤无水困君子以致命遂志葢此是致命遂志之時所以困之彖曰險以說困而不失其所亨其唯君子乎葢處困而能說也井居其所而遷又云井德之地也葢井有定體不動然水却流行出去不窮猶人心有持守不動而應變不窮也德之地也地是指那不動底巽稱而隱巽是箇卑巽底物事如兌見而巽伏也自是箇隱伏底物事葢巽一隂在下二陽在上隂初生時已自稱量得箇道理了不待顯而後見如事到面前自家便有一箇道理處置他不待發露出來又曰稱而隱是巽順恰好底道理有隱而不能稱量者有能稱量而不能隱伏不露形跡者皆非巽之道也巽德之制也巽以行權都是此意問隱字何訓曰隱不見也如風之動物无物不入但見其動而不見其形權之用亦猶是也節齋蔡氏曰和則不能必至而履之和則能至尊者不能必光而謙之尊則能光微昧者不辨於物而復之小則能辨雜者人厭之而恒之雜則不厭難者不易而損先難則有後易之理設施為也裕則多施為而益之裕則不施窮則不通而困之窮則能通遷謂養物不窮也居其所則不遷而井之居則能遷稱輕重等也稱則形著而巽之稱則能隱此如書之九德葢兼體用而言也進齋徐氏曰設施為也自然充長不待施為以求其益也益之道當俟其􅇽養從容自然有得不可萌欲速助長之心設謂有所安排布置要如何也西山真氏曰損先難而後易葢忿心易發難制欲心易開難塞故其始也懲之塞之為甚難然天理既明人欲自熄其為力又有所不難者故曰後易益長裕而不設葢主利物而言長裕者謂充廣吾寛裕之德則其利益自然及物不待安排做作也故曰不設雙湖胡氏曰此再陳九卦之材亦未說到聖人用易處然聖人既有九卦之德亦必有九卦之材其和而至稱而隱固其餘事矣履以和行謙以制禮復以自知恒以一德損以逺害益以興利困以寡怨井以辨義巽以行權和行之行下孟反逺袁萬反程子曰巽以行權義理所順處所以行權夲義寡怨謂少所怨尤辨義謂安而能慮朱子曰三陳九卦初无他意觀上面其有憂患一句便見得是聖人說處憂患之道聖人去這裏偶然看得這幾卦有這箇道理所以就這箇說去天下道理只在聖人口頭開口便是道理偶說此九卦意思自足若更添一卦也不妨更不說一卦也不妨只就此九卦中亦自儘有道理且易中儘有處憂患底卦非謂九卦之外皆非所以處憂患也後世拘於象數之學者以為九陽數聖人之舉九卦葢合此數也尤泥而不通觀聖人之經正不當如此若以困為處憂患底卦則屯蹇非處憂患而何又曰今之談經者徃徃有四者之病本卑也而抗之使髙本淺也而鑿之使深本近也而推之使逺本明也而必使至於晦禮主卑下履也是那踐履處所行若不由禮自是乖戻所以曰履以和行謙又更卑下所以節制乎禮又曰禮是自家恁地卑下謙是應物而言困以寡怨是得其處亨之道故无所怨於天无所尤於人若不得其道則有所怨尤矣井以辨義辨義謂安而能慮葢守得自家先定方能辨事之是非若自家心不定事到面前安能辨其義也問巽有優游巽入之義權是仁精義熟於事能優游以入之意曰是巽是入細底意說在九卦之後是這八卦事了方可以行權問巽以行權曰權之用便是如此見得道理精熟後於物之精微委曲處无處不入所以說巽以行權又問恐是神道曰不須如此說巽只是柔順低心下意底氣象人至行權處不少巽順如何行得巽以行權兌見而巽伏權是隱然做底物事若顯然地做却不成行權此外八卦各有所主皆是處憂患之道雲峰胡氏曰謙以制禮而履以和行則禮之至者也井以辨義而巽以行權則義之精者也邵子曰人道不能无怨故言寡怨所謂怨是用希是也柴氏中行曰道始於踐履而終以知權故孔子以可與權為學之到西山真氏曰九卦之義更當各就全卦反覆觀之以求夫所謂處憂患者庶乎得之又此章之下云易之為書也不可逺又明於憂患與故則易之一書无非明於憂患而處以道者又不特九卦為然也雙湖胡氏曰三陳九卦自有次第第一節論九卦之德第二節論九卦之材第三節方論聖人用九卦以處憂患之道故皆以以字明之亦如六十四卦大象必著一以字以明用易也然文王之聖心與易㑹居平時處憂患无一非易况演易羑里即身是易豈待逐卦而以之乎夫子亦姑論其處憂患之道以其近似者言之而為萬世學易者之法矣苟􅀈焉不通則豈所謂易者哉右第七章夲義此章三陳九卦以明處憂患之道雲峰胡氏曰此章三陳九德雖夫子偶即九卦言之然上經自乾至履九卦下經自恒至損益亦九卦上經履至謙五卦下經益至困井亦五卦上經謙至復又九卦下經井至巽又九卦上經自復而咸八卦而為下經之恒下經自巽而未濟亦八卦復為上經之乾上下經對待又似非偶然者或於此可見文王之心焉對待凡十卦置乾不言乾為君也文王常存事君之小心而不知其有君民之大德者也九卦上下體无離文王晦其明者也然有互體離在焉實未嘗不明也易之為書也不可逺為道也屢遷變動不居周流六虛上下无常剛柔相易不可為典要唯變所適逺袁萬反上時掌反夲義逺猶忘也周流六虛謂隂陽流行於卦之六位朱子曰易不可為典要易不是確定硬本子揚雄太𤣥却是可為典要他搛定三百五十四贊當畫三百五十四贊當夜晝底吉夜底凶吉之中又自分輕重凶之中又自分輕重易却不然有陽居陽爻而吉底又有凶底有隂居隂爻而吉底又有凶底有有應而吉底有有應而凶底是不可為典要之書也是有那許多變所以如此上下无常唯變所適便見得易人人可用不是死法雖道是二五是中却其間有位二五而不吉者有當位而吉亦有當位而不吉者三山林氏曰易之所言无非天地自然之理人生日用之不可須臾離者故曰不可逺張子曰心不存之是逺也不觀其書亦是逺也白雲郭氏曰人之於道不可須臾離也故於易不可逺可離者非道可逺者亦非易也節齋蔡氏曰屢遷謂為道變通而不滯乎物自易之為書至屢遷此總言為書為道以起下文之意也自變動不居至唯變所適言易道之屢遷也不居猶不止也六虚六位也位未有爻曰虚卦雖六位而剛柔爻畫徃來如寄非實有也故以虚言或自上而降或由下而升上下无常也柔來文剛分剛上而文柔剛柔相易也典常也要約也其屢變无常不可為典要唯變所適而已鶴山魏氏曰六畫六爻六位六虚四者相近而不同爻者動也專指九六則父母之䇿也畫者卦也兼七八九六則包男女之䇿也總而言之畫即為爻析而言之爻與畫異畫之見者又為位爻之變者又為虛故曰變動不居周流六虚位從爻而為虛也曰六畫成卦六位成章虚從畫而為位也然其實皆自竒耦之畫始竒耦則太極之分者也其出入以度外内使知懼夲義此句未詳疑有脫誤或問外内使知懼據文勢合作使内外知懼始得朱子曰是如此不知此兩句是如何硬解時也解得去但不曉其意是解甚底上下文意都不相屬漢上朱氏曰出入者以卦内外體言出者自内之外徃也入者自外之内來也以是觀消息虚盈之變出處進退之理使知戒懼當出而入當入而出其患一也又明於憂患與故无有師保如臨父母夲義雖无師保而常若父母臨之戒懼之至朱子曰使知懼便是使人有戒懼之意易中說如此則吉如此則凶是也既知懼則雖无師保一似臨父母相似常恁地戒懼南軒張氏曰師者教之道保者輔其躬節齋蔡氏曰故所以也又明所當之憂患與致憂患之所以也是雖无師保亦如臨乎父母之側而愛敬之至此言易書之不可逺也息齋余氏曰上繫雖言與民同患而必以洗心先之又發造化不與聖人同憂之意下繫則多言憂患矣初率其辭而揆其方既有典常苟非其人道不虛行揆葵癸反夲義方道也始由辭以度其理則見其有典常矣然神而明之則存乎其人也朱子曰既有典常是一定了占得他這爻了吉凶自定這便是有典常凌氏曰率其辭之所指而揆其方之所向則其道雖不可為典要而其書則有典可循有常可蹈也然非得其人亦何以行之哉節齋蔡氏曰此又合書與道而言也右第八章雙湖胡氏曰此章專論玩辭觀變為學易之事而深有望於其人也書者卦爻之辭也道之屢遷者卦爻之變也此二句一章綱領變動不居以下言其變也明於憂患以下言其辭也自其變觀之則九六之爻周流於虚位之間或上或下而无常皆一剛一柔之相易不可為典要而唯變所適然其剛柔之或上而出於外也既足為斯人之法度使知懼於外其剛柔之或下而入於内也亦足為斯人之法度使知懼於内豈徒變之云乎自其辭觀之則明於憂患而如父母之臨率辭揆方而有典常之可法而後總之以苟非其人道不虚行則玩辭觀變之學誠有望於其人也聖人之意可見矣易之為書也原始要終以為質也六爻相雜唯其時物也要一遙反下同夲義質謂卦體卦必舉其始終而後成體爻則唯其時物而已進齋徐氏曰此總言聖人作易所以立卦生爻之義下文又逐爻分說而申明之也質謂卦體時謂六位之時物謂隂陽二物也原其事之始要其事之終以為一卦之體質卦有六爻剛柔錯雜隨其時辨其物言卦雖有全體而爻亦无定用也雲峰胡氏曰卦有定體故曰質爻无定用故曰時錢氏藻曰六爻相雜唯其時之不同而其事物亦異如乾之取龍一物也或潛或見或躍或飛之不同者時也如漸之取鴻一物也而于干于磐于陸于木之不同者亦時也其初難知其上易知本末也初辭擬之卒成之終易以䜴反夲義此言初上二爻節齋蔡氏曰初爻者卦之本本則其質未明故難知上爻者卦之末末則其質已著故易知難知則所繫之辭必擬議而後得易知但卒其卦之辭而成其卦之終也雲峰胡氏曰此承上文原始要終而言也原其始則初爻為本質未明故難知要其終則上爻為末質已著故易知故初爻之辭必擬之而上爻之辭則成之矣臨川吳氏曰初與終為對擬之與卒成之為對兩句文法顛倒相互若夫雜物撰德辨是與非則非其中爻不備夫音扶夲義此謂卦中四爻朱子曰其初難知至非其中爻不備若解也硬解了但都曉他意不得這下面却說一箇噫字都不成文章不知是如何後面說二與四同功三與五同功却說得好但不利逺者也曉不得問雜物撰徳辨是與非則非其中爻不備曰這様處曉不得某常疑有闕文先儒解此多以為互體如屯卦震下坎上就中間四爻觀之自二至四則為坤自三至五則為艮故曰非其中爻不備互體說漢儒多用之左傳中一處說占得觀卦處亦舉得分明看來此說亦不可廢問易中互體之說或以為雜物撰德辨是與非則非其中爻不備此是說互體曰今人言互體皆以此為說但亦有取不得處如頤大過之類是也王輔嗣又言納甲飛伏尤更難理此等不必深泥雲峰胡氏曰此承上文六爻相雜而言也六爻夲自相雜二三四五於六爻之中又雜物撰德者如屯下震物為雷德為動上坎物為雲徳為險下互坤則雜物為地撰徳為順矣上互艮則又雜物為山撰徳為止矣亦可以辨是與非而易愈精矣容齋洪氏曰如坤坎為師而六五之爻曰長子帥師以正應九二而言葢指二至四為震也坤艮為謙而初六之爻曰涉大川葢自二而上則六二九三六四為坎也臨川吳氏曰内外既有二正卦之體中四爻又成二互體之卦然後其義愈无遺闕非以此正體互體竝觀則其義猶有不備正體則二為内卦之中五為外卦之中互體則三為内卦之中四為外卦之中故皆謂之中爻雙湖胡氏曰是非者當位不當位中不中正不正也内外卦既足以示人矣復自互體而辨之則是是非非於是乎益可見焉潘氏夣旂曰不言吉凶而曰辨是與非則吉凶可知矣噫亦要存亡吉凶則居可知矣知者觀其彖辭則思過半矣知音智夲義彖統論一卦六爻之體臨川吳氏曰上文既分言初上二爻及中四爻此又總六爻言之噫嘆美辭存亡者隂陽之消息吉凶者事情之得失要其存亡吉凶之所歸則六爻之義居然易見可指掌而知矣又謂知者能見事於木形雖不觀各爻之義但觀卦首之彖辭則所思已得十分之五六矣葢彖辭或論二體或論主爻或論卦變相易之爻是以不待觀六爻而已可見也章首第一句言彖第二句總言六爻此一節又總言六爻而復歸重於彖葢為結語與章首起語相始終下文則又更端而言中四爻也括蒼龔氏曰彖者原始要終以為質者也故智者觀之无待於爻葢所要愈約則所知愈易中四爻者六爻之要而彖者又一卦之要也二與四同功而異位其善不同二多譽四多懼近也柔之為道不利逺者其要无咎其用柔中也要如字又一遙反下章同夲義此以下論中爻同功謂皆隂位異位謂逺近不同四近君故多懼柔不利逺而二多譽者以其柔中也或問其要无咎其用柔中也近君則當柔和逺去則當有强毅剛果之象始得此二之所以不利然而居中所以无咎朱子曰也是恁地說潘氏夣旂曰二與四功同乎隂而位有内外之異二逺於君雖在下而多譽四近於君雖在上而多懼然隂柔之道逺則難援二之逺而大要无咎者以其雖柔而居下體之中也雲峰胡氏曰上文雜物撰徳是謂中爻之互體此則論中爻之本體二與四為隂隂以降為用故不成乎四退而成乎二柔雖不利逺者二隂成而得中故多譽四近君若隂柔未成而不中故多懼魯齋許氏曰二與四皆隂位也四雖得正而猶有不中之累況不得其正者乎二雖不正猶有得中之美况正而得中者乎四近君之臣也二逺君之臣也其勢又不同此二之所以多譽四之所以多懼也三與五同功而異位三多凶五多功貴賤之等也其柔危其剛勝耶勝音升夲義三五同陽位而貴賤不同然以柔居之則危唯剛則能勝之潘氏夣旂曰三與五功同乎陽而位有貴賤之異三以臣之賤而居下卦之上故多凶五以君之貴而居上體之中故多功然五君位也柔居之則危剛居之則能勝其事故六居五多危九居五多吉也雲峰胡氏曰三與五為陽陽以升為用故不成乎三獨進而成乎五五為貴又陽剛成而得中故多功三為賤又陽剛未成而不中故多凶其柔危其剛勝專為五言也於四不曰其剛危者九居四猶為剛而能柔者危者六居五則才柔而志剛所以危也魯齋許氏曰上卦之中乃人君之位也一卦之徳莫精於此在乾則剛健而斷在坤則重厚而順未或有先之者至於坎險之孚誠離麗之文明巽順於理艮篤於實皆能首出乎庶物不問何時克濟大事傳謂五多功者此也獨震忌强輔兊比小人於君道為未善觀其戒之之辭則可知矣右第九章雙湖胡氏曰此章專論爻畫以示人首論六爻之始終次論爻之初上又次論中四爻因及彖辭末則申論中四爻分二四三五隂陽而論以見逺近貴賤安危之不同而剛柔之用亦異其致意在中四爻而四爻之中所主又在二五居二體之中也易之為書也廣大悉備有天道焉有人道焉有地道焉兼三才而兩之故六六者非他也三才之道也夲義三畫已具三才重之故六而以上二爻為天中二爻為人下二爻為地漢上朱氏曰天地人三者一物而兩體隂陽也而謂之天剛柔也而謂之地仁義也而謂之人故曰三才兼三才而兩之故六兼之者天之道兼隂與陽也地之道兼柔與剛也人之道兼仁與義也六者非他即三才之道也是故三畫有重卦六即三三即一也臨川吳氏曰一而不兩則獨而无對天獨陽而无隂地獨隂而无陽人之隂陽亦混而不分必皆兼而兩之天人地各有隂陽然後其道全而不偏所以重三畫之卦而為六畫者此也誠齋楊氏曰重卦之後則兼三才而兩之是一三才為兩三才也合為一卦則隂或居上安知地之不為天陽或居下安知天之不為地五為君則天道為人道矣二為臣則地道為人道矣道有變動故曰爻爻有等故曰物物相雜故曰文文不當故吉凶生焉當都浪反夲義道有變動謂卦之一體等謂逺近貴賤之差相雜謂剛柔之位相間不當謂爻不當位或問道有變動故曰爻爻有等故曰物物相雜故曰文朱子曰道有變動不是指那隂陽老少之變是說卦中變動如乾卦六畫初潛二見三惕四躍這箇便是有變動所以謂之爻爻中自有等差或髙或低或逺或近或貴或賤皆謂之等易中便可見如說逺近相取而悔吝生近而不相得則凶二與四同功而異位二多譽四多懼近也三與五同功而異位三多凶五多功貴踐之等也如列貴賤者存乎位皆是等也物者想見古人占卦必有箇物事名為物而今亡矣這箇物是那列貴賤辨尊卑底物相雜故曰文如有君又有臣便為君臣之文是兩物相對待在這裏故有文若相離去不相干便不成文矣卦中有隂爻又有陽爻相間錯則為文若有隂无陽有陽无隂如何得有文進齋徐氏曰卦之全體三才之道也道則變通不居如潛見躍飛之類皆道之變通而謂之爻爻也者效天下之動也或剛或柔而小大有等故謂之物物即隂陽二物也一不獨立二則為文隂陽兩物交相錯雜故謂之文陽居陽位隂居隂位當也陽居隂位隂居陽位不當也吉凶由是而生則可以觀變玩占而見其文之著矣雲峰胡氏曰前章始以質言此章末以文言卦必舉始終而成體故曰質爻必雜剛柔以為用故曰文右第十章雙湖胡氏曰此章論易不徒爻畫有天地人之道具焉唯其有是道所以變動不居即其為道也屢遷之義使徒有是爻而非有道寓於其間則亦何變動之有若物相雜則是因六爻中隂陽二物自相雜居而成文以生吉凶而為人事失得之象耳易之興也其當殷之末世周之盛德邪當文王與紂之事邪是故其辭危危者使平易者使傾其道甚大百物不廢懼以終始其要无咎此之謂易之道也易者之易以䜴反夲義危懼故得平安慢易則必傾覆易之道也朱子曰其辭危是有危懼之意故危懼者能使之安平慢易者能使之傾覆易之書於萬物之理无所不具故曰百物不廢其要无咎若作去聲則是要約之義若作平聲則是要其歸之意又曰要去聲是要恁地要平聲是這裏取那裏意思又曰其要只欲无咎柴氏中行曰非末世則情偽不如是之滋熾也非盛徳則易道无自而傳也末世紂之事也盛徳文王之事也文王之心憂患天下後世故其辭危懼此因文王危辭而論易道能使如此豈易使之邪殖有禮覆昏暴天之道也節齋蔡氏曰易之道大百物皆不能廢也懼即憂危之謂苟能懼以終而猶始焉則要其終而无咎矣進齋徐氏曰危者使平易者使傾然非有使之也天之生物必因材而篤焉故栽者培之傾者覆之亦自然之理也雲峰胡氏曰文王以憂患之心作易故其辭危危懼故安平慢易故傾覆易之道雖廣大悉備不過使人懼以終始而已懼以始者易懼以終而猶始者難乾第一卦而曰君子終日乾乾夕惕若厲无咎此懼以終始其要无咎之說也右第十一章誠齋楊氏曰前言易興於中古作於憂患仲尼之意已屬之文王矣以為未足也此章又明言易興於殷之末世周之盛徳猶以為未足也又指而名之曰當文王與紂之事則無復秋毫隱情矣嗟夫千載之屈有幸逢一朝之伸一家之私有不沒天下之公文王无遇於紂而有遇於仲尼其千載之屈一朝之伸歟紂殷王也仲尼殷後也而仲尼貶殷為末世褒周為盛徳指紂之名而不諱稱文王之王而不抑其不以一家之私没天下之公歟大哉文王之聖歟大哉仲尼之公歟雙湖胡氏曰夫子原易之作明指伏羲原易之興明指文王曰畫卦因重辭危可謂萬世之日月獨少一言以及周公之爻惜哉夫乾天下之至健也德行恒易以知險夫坤天下之至順也德行恒簡以知阻行下孟反易以䜴反阻莊呂反夲義至健則所行无難故易至順則所行不煩故簡然其於事皆有以知其難而不敢易以處之也是以其有憂患則健者如自髙臨下而知其險順者如自下趨上而知其阻葢雖易而能知險則不陷於險矣既簡而又知阻則不困於阻矣所以能危能懼而无易者之傾也或問乾是至健不息之物經歴艱險處多雖有險處皆不足為其病自然足以進之而无難否朱子曰不然舊亦嘗如此說覺得終是硬說易之書夲意不如此正要人知險而不進不說是恃我至健至順了凡有險阻只認冐進而无難如此大非聖人作易之意觀上文云易之興也其當殷之末世周之盛徳耶當文王與紂之事耶是故其辭危危者使平易者使傾其道甚大百物不廢懼以終始其要无咎此謂易之道也看他此語但是恐懼危險便不敢輕進之意乾之道便是如此卦中皆然所以多說見險而能止如需卦之類可見易之道正是要人知進退存亡之道若是冐險前進必陷於險是知進而不知退知存而不知亡豈乾之道耶唯其至健而知險故止於險而不陷於險也此是就人事上說險與阻不同險是自上視下見下之險故不敢行阻是自下觀上為上所阻故不敢進又曰自山下上山為阻故指坤而言自山上觀山下為險故指乾而言因登山而明險阻之義又曰乾雖至健知得險了却不下去坤雖至順知得阻了更不上去此段專是以憂患之際而言且如健當憂患之際則知險之不可乘順當憂患之際便知阻之不可越這都是知憂患之際處憂患之道當如此因憂患方生那知險知阻若止就健順上看便不相似如上下文說危者使平易者使傾能說諸心能研諸慮皆因憂患說大要乾坤只是循理而已他若知得前有險之不可乘而不去則不陷於險知得前有阻之不可冐而不去則不困於阻若人不循理以私意行乎其間其過乎剛者雖知險之不可乘却硬要乘則陷於險矣雖知阻之不可越却硬要越則困於阻矣只是順理便无事又問在人固是如此以天地言之則如何曰在天地自是无險阻這只是大綱說箇乾坤底意思是如此又曰順自是畏謹宜其不越夫阻夫健却疑其不畏險然却知險而不去葢他當憂患之際故也人問簡易曰若長是易時更有甚麽險他便不知險矣若長是簡時更有甚麽阻他便不知阻矣只是當憂患之際方見得南軒張氏曰健者疑若不知險也今乾至健而徳行恒易故知險而不為隂所陷順者疑若不知阻也今坤至順而徳行恒簡故知阻而不為陽所拒漢上朱氏曰上繫言易簡而天下之理得下繫終之以易簡而知險阻故曰殊塗而同歸一致而百慮雲峰胡氏曰前言乾坤之易簡此言乾坤之所以為易簡葢乾之徳行所以恒易者何也乾天下之至健也坤之徳行所以恒簡者何也坤天下之至順也乾健而易宜无險矣坤順而簡宜无阻矣此復曰險阻者為上文有憂患而言也下危曰險乾在上也上難曰阻坤在下也以乾坤健順而又曰險阻易之辭危也健而知險則其健也不陷順而知阻則其順也不阻此危者之所平也不能知險阻而或陷焉此易者之使傾也聖人憂患之意至矣哉能說諸心能研諸侯之慮定天下之吉凶成天下之亹亹者說音恱夲義侯之二字衍說諸心者心與理㑹乾之事也研諸慮者理因慮審坤之事也說諸心故有以定吉凶研諸慮故有以成亹亹朱子曰能說諸心是凡事見得通透了自然懽悅既說諸心是理㑹得了於事上更審一審便是研諸慮研是去研磨他能說諸心乾也能研諸慮坤也說諸心有自然底意思故屬陽研諸慮有作為底意思故屬隂定吉凶乾也成亹亹坤也事之未定者屬乎陽定吉凶所以為乾事之已為者屬乎隂成亹亹所以為坤大抵言語兩端處皆有隂陽如開物成務開物是陽成務是隂如致知力行致知是陽力行是隂周子之書屢發此意推之可見又曰定吉凶是陽成亹亹是隂且以做事言之吉凶未定時人自意思懶散不肻做去吉凶定了他自勉勉做將去所以屬隂大率輕清屬陽重濁屬隂成亹亹是做將去涉於事為故屬隂定天下之吉凶是剖判得這事成天下之亹亹是做得事業平庵項氏曰唯乾坤知之明故能道占者之心使之說能因占者之慮為之研漢上朱氏曰天下之吉凶藏於无形至難定也天下之亹亹來而不已至難成也定之成之者易簡而已雲峰胡氏曰理悟而心悅乾之事也故有以定吉凶事來而慮研坤之事也故有以成亹亹此言易之辭危而能使人如此也是故變化云為吉事有祥象事知器占事知來夲義變化云為故象事可以知器吉事有祥故占事可以知來朱子曰此節上兩句是說理如此下兩句是人就理上知得在隂陽則為變化在人事則為云為吉事自有祥兆唯其理如此故於變化云為則象之而知已有之器於吉事有祥則占之而知未然之事也問凡見於有形之實事者皆為器否曰易中器字是恁此說問易書之中有許多變化云為又吉事皆有休祥之應所以象事者於此而知器占事者於此而知來曰是問變化云為主於人而言否曰變化者隂陽之所為云為者人事之所作變化云為是明吉事有祥是幽象事知器是人事占事知來是筮象事知器是人做這事去占事知來是他方有箇禎祥便占得他如中庸言必有禎祥見乎蓍龜之類吉事有祥凶事亦有息齋余氏曰變化云為吉事有祥不假象占者也象事知器占事知來求諸象占者也不假象占百姓之所以與能也雲峰胡氏曰在天道為變化在人事為云為人事與天道相符則吉事有祥矣此言易之理如此也如變化云為則象之而知其已形之器於吉事有祥則占之而知其未形之事此言人於易之理可以知其如此也天地設位聖人成能人謀鬼謀百姓與能與音預程子曰天地設位聖人成能日行乎天地之中所以為三才天地夲一物也地一天也只是人為天地心是心之動則分了天為上地為下兼三才而兩之故六也夲義天地設位而聖人作易以成其功於是人謀鬼謀雖百姓之愚皆得以與其能朱子曰天地設位四句說天人合處天地設位使聖人成其功能人謀鬼謀則雖百姓亦可以與其能成能與與能雖大小不同然亦是小小底造化之功用然百姓與能却須因蓍龜而方知得百姓无知因卜筮便㑹做得事人謀鬼謀猶洪範之謀及卜筮卿士庶人相似雲峰胡氏曰天地有此理不能以告人聖人作為卜筮之書明則謀諸人幽則謀諸鬼百姓亦得以與其能此聖人所以成天地之能也聖人成天地所不能成之能百姓得以與聖人所已成之能也臨川吳氏曰健順易簡知險知阻此天地之能說心研慮定吉凶成亹亹此聖人之能而成天地之能也云為之祥象占之知此百姓之能而與聖人之能者也八卦以象告爻彖以情言剛柔雜居而吉凶可見矣夲義象謂卦畫爻彖謂卦爻辭朱子曰八卦以象告以後說得叢雜不知如何張子曰八卦有體故象在其中錯綜為六十四卦爻彖所趨各異故曰情言南軒張氏曰八卦成列象在其中矣此八卦所以告人以象至於爻者變也彖者材也皆有辭者此聖人以情而言於人也剛柔雜居則交通以趨時而或失或得故吉凶見焉雲峰胡氏曰以象告者先天之易也以情言者後天之易也剛柔雜居而吉凶可見上古觀之於象可見後世非爻彖以情言不可也變動以利言吉凶以情遷是故愛惡相攻而吉凶生逺近相取而悔吝生情偽相感而利害生凡易之情近而不相得則凶或害之悔且吝惡烏路反夲義不相得謂相惡也凶害悔吝皆由此生或問易之情近而不相得則凶或害之悔且吝是如何朱子曰此疑是指占法而言想古人占法更多今不見得葢逺而不相得則安能為害唯切近不相得則凶害便能相及如一箇凶人在五湖四海之外安能害自家若與之為鄰近則有害矣又問此如今人占火珠林諜底是凶神動與世不相干則不能為害性是克世應世則能為害否曰恐是這様意思平庵項氏曰上文言剛柔雜居而吉凶可見則象之所以示人者明矣變動以利言吉凶以情遷此再言辭之諭人者殊也是故愛惡相攻以下皆言吉凶以情遷之事而以六爻之情與辭明之吉凶悔吝利害之三辭分出於相攻相取相感之三情而總屬於相近之一情此四相者爻之情也命辭之法必各象其爻之情故觀其辭可以知其情利害者商略其事宜有利有不利也悔吝則有迹矣吉凶則其成也故總而名之曰吉凶相感者情之始交故以利害言之相取則有事矣故以悔吝言之相攻則其事極矣故以吉凶言之逺近情偽姑就淺深分之若錯而總之則相攻相取相感之人其居皆有逺近其行皆有情偽其情皆有愛惡也故總以相近一條明之近而不相得則以惡相攻而凶生矣以偽相感而害生矣不以近相取而悔吝生矣是則一近之中備此三條也凡爻有比爻有應爻有一卦之主爻皆情之當相得者也今稱近者止據比爻言之反以三隅則逺而為應為主者亦必備此三條矣但居之近者其吉凶尤多故聖人槩以近者明之進齋徐氏曰易道變動開物成務以利言也而卦爻之辭有吉有凶以其情之有所遷耳愛惡相攻如訟九四不克訟復即命以與初相愛也謙六五利用侵伐上六利用行師以與九三相愛也同人九三伏戎于莽惡九五也九五大師克相遇惡三四也逺近相取如姤九五以杞包𤓰上九姤其角逺取初六也解六三負且乘近取二四也豫六三盱豫近取九四也情偽相感如中孚九二鳴鶴在隂以情感乎五也屯六四求婚媾徃以情感乎初也蒙六三見金夫不有躬以偽感乎二也漸九三夫征不復婦孕不育以偽感乎四也凡此皆以情遷者也臨川吳氏曰爻彖以情言彖與爻皆言情也吉凶以情遷則情專屬爻而不及彖何也葢變動以利言利亦自情而生也彖亦有情爻亦有利互文也不相得謂惡相攻偽相攻近不相取則愛相攻情相感近相取為相得矣不相得則凶害悔吝其相得則吉利悔亡无悔无咎從可知也夫子之已言者三其未言者三總之凡六條然此據近之比爻言爾若逺之應爻及主爻亦當各備六條總之為十八條矣愚嘗以此十八條之例考之爻辭皆合乃知作傳聖人以此該括易之辭情至為精密而諸家注釋唯項氏能究其底藴焉將叛者其辭慙中心疑者其辭枝吉人之辭寡躁人之辭多誣善之人其辭游失其守者其辭屈夲義卦爻之辭亦猶是也朱子曰中心疑者其辭枝中心疑故不敢說殺其辭枝者如木之有枝開兩岐去問此章切疑自吉凶可見矣而上只是總說易書所載如此自變動以利言而下則專就人占時上説如何曰然節齋蔡氏曰漸三所繫將叛者之辭也睽上所繫中心疑者之辭也臨二所繫吉人之辭也睽三所繫躁人之辭也中孚三所繫誣善之人之辭也節上所繫失其守者之辭也平庵項氏曰六辭之中吉一而躁叛疑誣失居其五叛非叛逆但背實棄信皆是也言與實相背故慙吉者静躁者動叛者无信疑者不自信誣者敗人失守者自敗皆相反對也守謂其所依據吳王失國故辭屈於晉夷之失對故辭屈於孟子皆失其所據也以類推之艮吉也震躁也兌叛也巽疑也坎喜陷為誣善離喜麗為失守人情大約不出乎六者仁者黙勇者譁能言者寡信善巽者少決智人多險文士罕守剛柔之變其盡於此矣雲峰胡氏曰末及六辭則謂非特彖爻之辭可以見其情人之辭亦可以占其情使人又由易以知言也進齋徐氏曰叛背叛也背叛正理其中有歉則發於言辭自然慚怍也枝如木之有枝開兩岐疑者可否未決則其辭不直截或兩岐也誣善者謂謗善為惡言語不實如物在水上浮游不定失其守者言見理不定无所操執其辭多屈而不伸言心之聲由乎中而見乎外也孟子詖淫邪遁一章意亦如此臨川吳氏曰易之辭皆由情而生人之辭亦由情而生故此又以人譬之夲義云卦爻之辭亦由是也此篇首章云繫辭焉而命之又云聖人之情見乎辭葢唯聖人能因易之情而繫易之辭是為一篇始終之脈絡云息齋余氏曰上繫以黙而成之不言而信存乎徳行為結下繫以諸辭之不同者為結義相發也吉人辭寡其黙成之次歟右第十二章周易傳義大全卷二十三
