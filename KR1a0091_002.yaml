front:
  text: 右繫辭傳曰河出圖洛出書聖人則之又曰天一地二天三地四天五地六天七地八天九地十天數五地數五五位相得而各有合天數二十有五地數三十凡天地之數五十有五此所以成變化而行鬼神也此河圖之數也洛書蓋取龜象故其數戴九履一左三右七二四為肩六八為足蔡元定曰圖書之象自漢孔安國劉歆魏關朗子明有宋康節先生邵雍堯夫皆謂如此至劉牧始兩易其名而諸家因之故今復之悉從其舊
