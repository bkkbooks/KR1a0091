body:
  text: 附録孔氏安國曰河圖者伏羲氏王天下龍馬出河遂則其文以畫八卦洛書者禹治水時神龜負文而列於背有數至九禹遂因而第之以成九類玉齋胡氏曰龍馬周禮夏官馬八尺以上為龍言馬之特異如此漢武帝元狩三年得神馬於渥窪水中亦此之類神龜大戴禮曰甲蟲三百六十而神龜為之長臨川吳氏曰河圖自一至十五十五點之在馬背者其旋毛之圈有如星象故謂之圗非五十五數之外别有所謂圗也劉氏歆曰伏羲氏繼天而王受河圗而畫之八卦是也禹治洪水賜洛書法而陳之九疇是也河圗洛書相為經緯八卦九章相為表裏潛室陳氏曰經緯之説非是以上下為經左右為緯大抵經言其正緯言其變而二圗互為正變主河圗而言則河圗為正洛書為變主洛書而言則洛書為正而河圗又為變要之天地間不過一隂一陽以兩其五行而太極常居其中二圗雖縱橫變動要只是參互呈見此所以謂之相為經緯也表裏之説亦然蓋河圗不但可以畫卦亦可以明疇洛書不特可以明疇亦可以畫卦但當時聖人各因一事以垂後世伏羲但據河圗而畫卦大禹但據洛書而明疇要之伏羲之畫卦其表為八卦而其裏固可以為疇大禹之敘疇其表為九疇而其裏固可以為卦此所以謂之相為表裏也關氏朗曰河圗之文七前六後八左九右洛書之文九前一後三左七右四前左二前右八後左六後右邵子曰圓者星也厯紀之數其肇於此乎朱子曰厯法合二始以定剛柔二中以定律厯二終以紀閏餘是所謂厯紀也問二始二中二終之説曰此本唐志一行之説二始者一二也一奇故為剛二偶故為柔二中者五六也五者十日六者十二辰也二終者十與九也閏餘之法以十九歲為一章故其言如此然一章之數似亦附會當時姑借其説以明十數之為河圗爾方者土也畫州井地之法其放於此乎朱子曰州有九井九百畝是所謂畫州井地也玉齋胡氏曰禹别九州冀北揚南青東梁西兖東北雍西北徐東南荆西南豫中也孟子井九百畝其中為公田八家各私百畝同養公田蓋圓者河圗之數方者洛書之文故羲文因之而造易禹箕敘之而作範也朱子曰圓者星也圓者河圗之數言無那四角砥其形便圓又曰河圗既無四隅則比之洛書固亦為圎九峰蔡氏曰河圗體圎而用方聖人以之而畫卦洛書體方而用圎聖人以之而敘疇卦者隂陽之象也疇者五行之數也象非偶不立數非奇不行奇偶之分象數之始也隂陽五行固非二體八卦九疇亦非二致理一分殊非深於造化者安能識之又曰河圗非無奇也而用則存乎偶洛書非無偶也而用則存乎奇偶者隂陽之對待乎奇者五行之迭運乎對待者不能孤迭運者不可窮天地之形四時之行人物之生萬化之凝其妙矣乎朱子曰天地之間一氣而已分而為二則為隂陽而五行造化萬物始終無不管於是焉故河圗之位一與六共宗而居乎北二與七為朋而居乎南三與八同道而居乎東四與九為友而居乎西五與十相守而居乎中蓋其所以為數者不過一陰一陽一奇一偶以兩其五行而已朱子曰一與六共宗二與七為朋者蓋是那一在五下便有那六砥數二在五邉便有那七砥數三四皆然天地生數到五便住那一二三四遇著那五便成六七八九五却自對五成十問河圗自五之外便成六七八九十曰皆從五過則一對五而成六二對五而成七三對五而成八四對五而成九到末梢五又撞著箇五便成十所謂天者陽之輕清而位乎上者也所謂地者隂之重濁而位乎下者也陽數奇故一三五七九皆屬乎天所謂天數五也隂數偶故二四六八十皆屬乎地所謂地數五也天數地數各以類而相求所謂五位之相得者然也天以一生水而地以六成之地以二生火而天以七成之天以三生木而地以八成之地以四生金而天以九成之天以五生土而地以十成之此又其所謂各有合焉者也積五奇而為二十五積五偶而為三十合是二者而為五十有五此河圗之全數皆夫子之意而諸儒之説也朱子曰相得如兄弟有合如夫婦蓋以相得則取其奇偶之相為次第辨其類而不容紊也有合則取其奇偶之相為生成合其類而不容間也相得有合四字該盡河圗之數又曰在十于甲乙木丙丁火戊巳土庚辛金壬癸水便是相得甲與巳合乙與庚合丙與辛合丁與壬合戊與癸合便是各有合也勉齋黃氏曰自一至十特言奇偶之多寡爾初非以次序而言天得奇而為水故曰一生水一之極而為三故曰三生木地得偶而為火故曰二生火二之極而為四故曰四生金何也一極為三以一運之圎而成三故一而三也二極為四以二周之方而成四故二而四也如果以次序言則一生水而未成水必至五行俱足猶待第六而後成水二生火而未成火必待五行俱足然後第七而成火耶如此則全不成造化亦不成義理矣六之成水也猶坎之為卦也一陽居中天一生水也地六包於外陽少隂多而水始盛成七之成火也猶離之為卦也一陽居中地二生火也天七包於外隂少陽多而火始盛成坎屬陽而離屬隂以其內者為主而在外者成之也雲莊劉氏曰水隂也生於天一火陽也生於地二是其方生之始隂陽互根故其運行水居子位極隂之方而陽巳生於子火居午位極陽之方而隂巳生於午若木生於天三專屬陽故其行於春亦屬陽金生於地四専屬隂故其行於秋亦屬隂不可以隂陽互言矣蓋水火未離乎氣隂陽交合之初其氣自有互根之妙木則陽之發逹金則隂之收斂而有定質矣此其所以與水火不同也思齋翁氏曰水火金木不得土不能各成一器何以見之且天一生水一得五便為水之成地二生火二得五便為火之成天三生木三得五便為木之成地四生金四得五便為金之成皆本於中五之土也又曰河圗隂陽之位生數為主而成數配之東北陽方則主之以奇而與合者偶西南隂方則主之以偶而與合者奇也雙湖胡氏曰五行質具於地氣行於天以質言則曰水火木金土取天地生成之序也以氣言則曰木火土金水取春夏秋冬運行之序也至於洛書雖夫子之所未言然其象其説巳具於前有以通之則劉歆所謂經緯表裏者可見矣朱子曰河圗四面太陽居一而連九少隂居二而連八少陽居三而連七太隂居四而連六數與位合為十也洛書之位一與九對二與八對三與七對四與六對亦與河圗不異又曰河圗七八連於左九六連於右皆為十五生數一三五連於左為九二四連於右為六九六之合亦為十五五與十相守於中亦為十五洛書縱橫數之皆十五互為七八九六雙湖胡氏曰書之中視河圗惟有五而無十然一九二八三七四六之合環而向之未嘗無十焉合圗書之數悉計之為數者百如犬牙之相制牝牡之相銜其巧妙有如此者或曰河圗洛書之位與數所以不同何也曰河圗以五生數統五成數而同處其方蓋揭其全以示人而道其常數之體也洛書以五奇數統四偶數而各居其所蓋主於陽以統隂而肇其變數之用也玉齋胡氏曰河圗以生成分隂陽以五生數之陽統五成數之隂而同處其方陽內隂外生成相合交泰之義也洛書以奇偶分隂陽以五奇數之陽統四偶數之隂而各居其所陽正隂偏奇偶既分尊卑之位也河圗數十十者對待以立其體故為常洛書數九九者流行以致其用故為變也常變之説朱子特各舉所重者為言非謂河圖専於常有體而無用洛書專於變有用而無體也自河圖四象之合者觀之象之列于四方者各當其所處之位此其體之常象之處于西南者不協夫所生之卦又為用之變矣伏羲則其變者以作易即橫圗卦畫之成而究圎圗卦氣之運則知四象分為八卦隂之老少不動而陽之老少迭遷此主變也豈拘於常者乎自洛書四象之分者觀之象之居於西南者不當其所處之位此其用之變象之列於四方者悉協夫所生之卦又為體之常矣大禹則其常者以作範因武王彛倫攸敘之問以究天錫禹疇之對則知四象分為九疇陽居四正則配四陽之卦以為隂之宰隂居四偶則配四隂之卦以為陽之輔此主常也豈撓於變者乎曰其皆以五居中者何也曰凡數之始一隂一陽而已矣陽之象圓圓者徑一而圍三隂之象方方者徑一而圍四圍三者以一為一故參其一陽而為三圍四者以二為一故兩其一隂而為二是所謂參天兩地者也三二之合則為五矣此河圖洛書之數所以皆以五為中也然河圖以生數為主故其中之所以為五者亦具五生數之象焉其下一點天一之象也其上一點地二之象也其左一點天三之象也其右一點地四之象也其中一點天五之象也洛書以奇數為主故其中之所以為五者亦具五竒數之象焉其下一點亦天一之象也其左一點亦天三之象也其中一點亦天五之象也其右一點則天七之象也其上一點則天九之象也其數與位皆三同而二異蓋陽不可易而隂可易成數雖陽固亦生之隂也朱子曰成數雖陽固亦生之隂如子者父之隂臣者君之隂玉齋胡氏曰三同者圖書之一六皆在北三八皆在東五皆在中三者之位數皆同也二異者圖之二七在南而書則二七在西圗之四九在西而書則四九在南二者之位數皆異也陽不可易專指一三五隂可易統指二七四九二四以生數言雖屬陽然以偶數言則屬隂不得謂之陽矣故可易七九以奇數言雖屬陽然以成數言只可謂之隂矣故亦可易其曰成數雖陽固亦生之隂不曰生數雖隂固亦成之陽也蓋但主隂可易而言也雲莊劉氏曰圖之一三五七九皆竒數陽也而一三五之位不易七九之位易者亦以天地之間陽動主變故也然陽於北東則不動於西南則互遷者蓋北東陽始生之方西南陽極盛之方陽主進數又必進於極而後變也雙湖胡氏曰圖書之數三同二異其居中者不可易矣獨西南二方之數相易者則金乘火位火入金鄉有相克制之義焉此造化所以必易二方之數者正以成其相克之象也自二方既易之後圖則左旋相生書則右轉相克造化不可無生亦不可無克不生則或幾乎熄不克亦無以為之成就也曰中央之五固為五數之象矣然則其為數也奈何曰以數言之則通乎一圖由內及外固各有積實可紀之數矣然河圖之一二三四各居其五象本方之外而六七八九十者又各因五而得數以附于其生數之外洛書之一三七九亦各居其五象本方之外而二四六八者又各因其類以附于竒數之側蓋中者為主而外者為客正者為君而側者為臣亦各有條而不紊也盤澗董氏曰河圖之數不過一竒一偶相錯而已故太陽之位即太隂之數太隂之位即太陽之數少隂之位即少陽之數少陽之位即少隂之數見其迭隂迭陽隂陽相錯所以為生成也天五地十居中者地十亦天五之成數蓋一二三四已含六七八九者以五乘之故也蓋數不過五也洛書之數因一二三四以對九八七六其數亦不過十蓋太陽占第一位巳含太陽之數少隂占第二位已含少隂之數少陽占第三位已含少陽之數太隂占第四位已含太隂之數雖其隂陽各自為數然五數居中太陽居一得五而成六少隂居二得五而成七少陽居三得五而成八太隂居四得五而成九則與河圖一隂一陽相錯而為生成之數者亦無以異也覺軒蔡氏曰河圖位與數常相錯然五居中一得五而為六二得五而為七三得五而為八四得五而為九各居其方雖相錯而未嘗不相對也洛書位與數常相對然五數居中一得五而為後右之六二得五而為右之七三得五而為後左之八四得五而為前之九縱橫交綜雖相對而未嘗不相錯也曰其多寡之不同何也曰河圖主全故極於十而竒偶之位均論其積實然後見其偶贏而竒乏也洛書主變故極於九而其位與實皆竒贏而偶乏也必皆虛其中也然後隂陽之數均於二十而無偏爾玉齋胡氏曰河圖偶贏而竒乏者地三十天二十五也洛書竒贏而偶乏者天二十五地三十也河圖虛其中之十五洛書虛其中之五則隂陽之數均於二十矣曰其序之不同何也曰河圖以生出之次言之則始下次上次左次右以復於中而又始于下也以運行之次言之則始東次南次中次西次北左旋一周而又始于東也其生數之在內者則陽居下左而隂居上右也其成數之在外者則隂居下左而陽居上右也洛書之次其陽數則首北次東次中次西次南其隂數則首西南次東南次西北次東北也合而言之則首北次西南次東次東南次中次西北次西次東北而究于南也其運行則水克火火克金金克木木克土右旋一周而土復克水也是亦各有説矣思齋翁氏曰河圖運行之序自北而東左旋相生固也然對待之位則北方一六水克南方二七火西方四九金克東方三八木而相克者已寓於相生之中洛書運行之序自北而西右轉相克故也然對待之位則東南方四九金生西北方一六水東北方三八木生西南方二七火其相生者已寓於相克之中蓋造化之運生而不克則生者無從而裁制克而不生則克者有時而間斷此圖書生成之妙未嘗不各自全備也曰其七八九六之數不同何也曰河圖六七八九既附于生數之外矣此隂陽老少進退饒乏之正也其九者生數一三五之積也故自北而東自東而西以成于四之外其六者生數二四之積也故自南而西自西而北以成于一之外七則九之自西而南者也八則六之自北而東者也此又隂陽老少互藏其宅之變也朱子曰老陽之位一老隂之位四今河圖以老陽之九居乎四之外而老隂之六却居乎一之外是老隂老陽互大其宅也少隂之位二少陽之位三而河圖以少隂之八居乎三之外少陽之七却居乎二之外是少隂少陽互藏其宅也又曰一六共宗一為老陽之位六為老隂之數四九為友四為老隂之位九為老陽之數此固二老之合然陽居隂位隂居陽位亦二老互藏其宅也二七為朋二為少隂之位七為少陽之數三八同道三為少陽之位八為少隂之數此則二少之合然亦陽居隂位隂居陽位亦二少互藏其宅也洛書之縱橫十五而七八九六迭為消長虛五分十而一含九二含八三含七四含六則參伍錯綜無適而不遇其合焉此變化無窮之所以為妙也玉齋胡氏曰洛書雖縱橫有十五之數實皆七八九六之迭為消長一得五為六而與南方之九迭為消長四得五為九而與西北之六迭為消長三得五為八而與西方之七迭為消長二得五為七而與東北之八迭為消長數之進者為長退者為消長者退則又消消者進則又長六進為九則九長而六消九退為六則九反消而六又長矣七進為八則八長而七消八退為七則八反消而七又長矣虛五分十者虛其中五之外則縱橫皆十以其十者分之則九者十分一之餘八者十分二之餘七者十分三之餘六者十分四之餘也參伍錯綜無適而不遇七八九六之合焉然則聖人之則之也奈何曰則河圖者虛其中則洛書者總其實也河圖之虛五與十者太極也竒數二十偶數二十者兩儀也以一二三四為六七八九者四象也析四方之合以為乾坤離坎補四隅之空以為兌震巽艮者八卦也朱子曰以四象觀之太陽之位居一而數則九乾得其數而兌得其位故乾為九而兌為一少隂之位居二而數則八離得其數而震得其位故離為八而震為二少陽之位居三而數則七坎得其數而巽得其位故坎為七而巽為三太隂之位居四而數則六坤得其數而艮得其位故坤為六而艮為四今析六七八九之合以為乾坤離坎而在四正之位依一二三四之次以為震兌巽艮而補四隅之空也洛書之實其一為五行其二為五事其三為八政其四為五紀其五為皇極其六為三德其七為稽疑其八為庶徴其九為福極其位與數尤曉然矣玉齋胡氏曰大禹之則洛書以作範也未必拘拘於書之位次以定疇之先後然自一至九之數實有以默啓聖人作範之心故自初一之五行包天地自然之數餘八法則是大禹參酌天時人事而類之不必盡協於火木土金之位也曰洛書而虛其中五則亦太極也竒偶各居二十則亦兩儀也一二三四而含九八七六縱橫十五而互為七八九六則亦四象也四方之正以為乾坤離坎四隅之偏以為兌震巽艮則亦八卦也河圖之一六為水二七為火三八為木四九為金五十為土則固洪範之五行而五十五者又九疇之子目也是則洛書固可以為易而河圖亦可以為範矣又安知圖之不為書書之不為圖也耶曰是其時雖有先後數雖有多寡然其為理則一而已但易乃伏羲之先得乎圖而初無所待於書範則大禹之所獨得乎書而未必追考於圖爾且以河圖而虛十則洛書四十有五之數也虛五則大衍五十之數也積五與十則洛書縱橫十五之數也以五乘十以十乘五則又皆大衍之數也洛書之五又自含五則得十而通為大衍之數矣積五與十則得十五而通為河洛之數矣茍明乎此則橫斜曲直無所不通而河圖洛書又豈有先後彼此之間哉玉齋胡氏曰洛書之五又自含五而得十者下一點含天一之象上一點含地二之象左一點含天三之象右一點舍地四之象中一點含天五之象所謂五自含五而得十通在外四十為大衍之數積五與十而得十五者以其所含之五積之則又合五與十而為十五通在外四十而為河圖之五十五也西山蔡氏曰古今傳記曰孔安國劉向父子班固皆以為河圖授羲洛書錫禹關子明邵康節皆以為十為河圖九為洛書蓋大傳既陳天地五十有五之數洪範又明言天乃錫禹洪範九疇而九宮之數戴九履一左三右七二四為肩六八為足正龜背之象也唯劉牧意見以九為河圖十為洛書託言出於希夷既與先儒舊説不合又引大傳以為二者皆出於伏羲之世其易置圖書並無明驗但謂伏羲兼取圖書則易範之數誠相表裏為可疑耳其實天地之理一而已矣雖時有古今先後之不同而其理則不容有二也故伏羲但據河圖以作易則不必預見洛書而已逆與之合矣大禹但據洛書以作範則亦不必追考河圖而已暗與之符矣其所以然者何哉誠以此理之外無復它理故也潛室陳氏曰河圖以生數統成數洛書以奇數統偶數若不相似也然一必配六二必配七三必配八四必配九五必居中而配十圗書未嘗不相似也河圖之生成同方洛書之奇偶異位若不相似也然同方者有內外之分是河圖猶洛書也異位者有比肩之義是洛書亦猶河圖也節齋蔡氏曰河圖數偶偶者靜靜以動為用故河圖之行合皆竒一合六二合七三合八四合九五合十是故易之吉凶生乎動蓋靜者必動而後生也洛書數竒竒者動動以靜為用故洛書之位合皆偶一合九二合八三合七四合六是故範之吉凶見乎靜蓋動者必靜而後成也然不特此耳律呂有五聲十二律而其相乘之數究於六十日名有十幹十二支而其相乘之數亦究於六十日者皆出於易之後其起數又各不同然與易之隂陽策數老少自相配合皆為六十者無不若合符契也朱子曰凡易數三十六對二十四三十二對二十八皆六十也以此知天地之數以六十為節下至運氣參同太一之屬雖不足道然亦無不相通蓋自然之理也玉齋胡氏曰五運者甲巳化土乙庚化金丙辛化水丁壬化木戊癸化火是也六氣子午少隂君火寅申少陽相火丑未太隂溼土辰戌太陽寒水巳亥厥隂風木各司天為主氣是也參同契修養之書漢魏伯陽作太一日家有太一統紀之書假令今世復有圖書者出其數亦必相符可謂伏羲有取於今日而作易乎大傳所謂河出圖洛出書聖人則之者亦泛言聖人作易作範其原皆出於天之意如言以卜筮者尚其占與莫大乎蓍龜之類易之書豈有龜與卜之法乎亦言其理無二而已爾朱子曰世傳一至九數者為河圖一至十數者為洛書正是反而置之豫於啓蒙辨之詳矣近讀大戴禮明堂篇言其制度有曰二九四七五三六一八鄭氏注云法龜文也得此一證則漢人固以此九數者為洛書矣又曰夫以河圖洛書為不足信自歐陽公以來已有此説然終無奈顧命繫辭論語皆有是言而諸儒所傳二圖之數雖有交互而無乖戾順數逆推縱橫曲直皆有明法不可得而破除也至如河圖與易之天一至地十者合而戴天地五十有五之數則固易之所自出也洛書與洪範之初一至次九者合而具九疇之數則固洪範之所自出也繫辭雖不言伏羲受河圖以作易然所謂仰觀俯察近取逺取安知河圖非其中之一事耶大抵聖人制作所由初非一端然其法象之規模必有最親切處如洪荒之世天地之間隂陽之氣雖各有象然初未嘗有數也至於河圖之出然後五十有五之數竒偶生成粲然可見此其所以深發聖人之獨智又非泛然氣象之所可得而擬也是以仰觀俯察逺求近取至此而後兩儀四象八卦之隂陽竒偶可得而言雖繫辭所論聖人作易之由者非一而不害其得此而後決也玉齋胡氏曰先天八卦乾兌生於老陽之四九離震生於少隂之三八巽坎生於少陽之二七艮坤生於老隂之一六其卦未嘗不與洛書之位數合後天八卦坎一六水離二七火震巽三八木乾兌四九金坤艮五十土其卦未嘗不與河圖之位數合此圖書所以相為經緯而先後天亦有相為表裏之妙也雙湖胡氏曰河圖洛書皆木數居東方伏羲畫卦自下而上即木之自根而幹幹而枝也其畫三木之生數也其卦八木之成數也重卦亦兩其三八其八爾三八木數大備而後六十四卦大成一六水二七火四九金五十土皆在包羅中矣此春所以貫四時仁所以包四端元所以統四德大哉易也斯其至矣又曰以大傳之文詳之河圖洛書蓋皆聖人所取以為八卦者而九疇亦并出焉今以其象觀之則虛其中者所以為易也實其中者所以為洪範也其所以為易者巳具於前假矣所以為洪範則河圖九疇之象洛書五行之數有不可誣者恐不得以其出於緯書而略之也古人做易其巧不可言太陽數九少隂數八少陽數七太隂數六初亦不知其數如何恁地元來只是十數太陽居一除了本身便是九箇少隂居二除了本身便是八箇少陽居三除了本身便是七箇太隂居四除了本身便是六箇這處都不曽有人見得問老陽少隂少陽老隂除了本身一二三四便是九八七六之數今觀啓蒙陽進隂退之説也是如此曰他進退亦是如此不是人去強教他進退但是以十言之則如前説大故分曉若以十五言之則九便對六七便對八曉得時這物事也好則劇問看河圖上此數控定了曰天地只是不會説倩他聖人出來説若天地自會説話想更説得好在如河圖洛書便自天地畫出底謂甘叔懷曰曾看河圖洛書數否無事時好看且得自家心流轉得動右繫辭傳曰易有太極是生兩儀兩儀生四象四象生八卦邵子曰一分為二二分為四四分為八也説卦傳曰易逆數也邵子曰乾一兑二離三震四巽五坎六艮七坤八自乾至坤皆得未生之卦若逆推四時之比也後六十四卦次序放此黑白之位本非古法但今欲易曉且為此以寓之耳後六十四卦次序放此附録朱子曰太極者象數未形而其理巳具之稱形器巳具而其理無聯之目在河圖洛書皆虛中之象也太極之判始生一竒一偶而為一畫者二是為兩儀其數則陽一而隂二在河圖洛書則竒偶是也兩儀之上各生一竒一偶而為二畫者四是謂四象其位則太陽一少隂二少陽三太隂四其數則太陽九少隂八少陽七太隂六以河圖言之則六者一而得於五者也七者二而得於五者也八者三而得於五者也九者四而得於五者也以洛書言之則九者十分一之餘也八者十分二之餘也七者十分三之餘也六者十分四之餘也四象之上各生一竒一偶而為三畫者八於是三才略具而有八卦之名矣其位則乾一兌二離三震四巽五坎六艮七坤八在河圖則乾坤離坎分居四實兌震巽艮分居四虛在洛書則乾坤離坎分居四方兌震巽艮分居四隅也盤澗董氏曰自兩儀生四象則太陽太隂不動而少隂少陽則交自四象生八卦則乾坤震巽不動而兌離坎艮則交蓋二老不動者陽儀還生陽之象隂儀還生隂之象二少則交者陽儀乃生隂之象隂儀乃生陽之象也乾坤震巽不動者陽象還生陽爻隂象還生隂爻兌離艮坎則交者陽象乃生隂爻隂象乃生陽爻問易有太極是生兩儀兩儀生四象四象生八卦曰此太極却是為畫卦説當未畫卦前太極只是一箇混淪底道理裏面包含隂陽剛柔竒偶無所不有及畫一竒一偶是生兩儀再於一竒畫上加一竒此是陽中之陽又於一竒畫上加一偶此是陽中之隂又於一偶上加一竒此是隂中之陽又於一偶上加一偶此是隂中之隂是謂四象所謂八卦者一象上有兩卦每象各添一竒一偶便是八卦或説一為儀二為象三為卦四象如春夏秋冬金木水火東西南北無不可推矣朱子曰太極之義正謂理之極致耳有是理即有是物無先後次序之可言故曰易有太極則是太極乃在隂陽之中而非在隂陽之外也若以乾坤未判大衍未分之時論之則非也形而上者謂之道形而下者謂之器有是理即有是氣理一而已氣則無不兩者故曰太極生二儀而老子乃謂道生一而後乃生二則其察理亦不精矣西山真氏曰朱子此言可謂有功於學者大抵自周子以前凡論太極者皆以氣言莊子以道在太極之先所謂太極乃是指作天地人三者氣形巳具而渾淪未判者之名而道又别是一懸空底物在太極之先則道與太極為二矣不知道即太極太極即道以其通行而言則曰道以其極致而言則曰極又何嘗有二耶若列子渾淪之云漢志函三為一之説所指皆同倘非周子啓其禍而朱子又闡而明之敦知太極之為理而非氣也哉右説卦傳曰天地定位山澤通氣雷風相薄水火不相射八卦相錯數往者順知來者逆邵子曰乾南坤北離東坎西震東北兌東南巽西南艮西北自震至乾為順自巽至坤為逆後六十四卦方位放此附録邵子曰乾坤縱而六子橫易之本也又曰震始交隂而陽生巽始消陽而陰生兌陽長也艮隂長也震兌在天之隂也巽艮在地之陽也故震兊上隂而下陽巽艮上陽而下隂天以始生言之故隂上而陽下交泰之義也地以既成言之故陽上而隂下尊卑之位也乾坤定上下之位坎離列左右之門天地之所闔闢日月之所出入春夏秋冬晦朔弦望晝夜長短行度盈縮莫不由乎此矣朱子曰此條是説圓圖震與坤接是震始交隂而一陽生也巽與乾接是巽始消陽而一隂生也進齋徐氏曰一氣循環自復至乾為陽生物之始也故震兌隂上而陽下為交泰之義蓋主動而言太極之用所以行自姤至坤為隂成物之終也故巽艮陽上而隂下為尊卑之位蓋主靜而言太極之體所以立也思齋翁氏曰卯為日門太陽所生酉為月門太隂所生不但日月出入於此大而天地之開物雖始於寅至卯而門彌闢閉物雖始於戌至酉而門已闔一嵗而春夏秋冬一月而晦朔弦望一日而晝夜行度莫不由乎左右之門所以極贊坎離功用之大也又曰此一節明伏羲八卦也八卦相錯者明交相錯而成六十四也數往者順若順天而行是左旋也皆巳生之卦也故云數往也知來者逆若逆天而行是右行也皆未生之卦也故云知來也夫易之數由逆而成矣此一節直解圖意若逆知四時之謂也朱子曰以橫圖觀之有乾一而後有兌二有兌二而後有離三有離三而後有震四有震四而巽五坎六艮七坤八亦以次而生焉此易之所以成也而圓圖之左方自震之初為冬至離兌之中為春分以至於乾之末為夏至焉皆進而得其已生之卦猶自今日而追數昨日也故曰數往者順其右方自巽之初為夏至坎艮之中為秋分以至於坤之末而交冬至焉皆進而得其未生之卦猶自今日而逆計來日也故曰知來者逆然本易之所以成則其先後始終如橫圖及圓圖右方之序而已故曰易逆數也玉齋胡氏曰邵子據經文解釋則先圎圖而後及橫圖朱子釋邵子之説則先自橫圗而論者誠以橫圖可以見卦畫之立圓圖可以見卦氣之行所謂圓圖者其實即橫圖規而圓之耳又曰嘗因邵子冬至子半之説推之以卦分配節候復為冬至子之半頤屯益為小寒丑之初震噬嗑隨為大寒丑之半無妄眀夷為立春寅之初賁既濟家人為雨水寅之半豐離革為驚蟄卯之初同人臨為春分卯之半損節中孚為清明辰之初歸妹睽兌為穀雨辰之半履泰為立夏己之初大畜需小畜為小滿己之半大壯大有夬為芒種午之初至乾之末交夏至午之半焉此三十二卦皆進而得夫震離兌乾已生之卦也姤為夏至午之半大過鼎恆為小暑未之初巽井蠱為大暑未之半升訟為立秋申之初困未濟解為處暑申之半渙坎蒙為白露酉之初師遁為秋分酉之半咸旅小過為寒露戌之初漸蹇艮為霜降戌之半謙否為立冬亥之初萃晉豫為小雪亥之半觀比剝為大雪子之初至坤之末交冬至子之半焉此三十二卦皆進而得夬巽坎艮坤未生之卦也二分二至四立總為八節每節各計兩卦如坤復為冬至無妄眀夷為立春同人臨為春分之類是也其十六氣每氣各計三卦如頤屯益為小寒至觀比剝為大雪之類是也八節計十六卦十六氣計四十八卦合之為六十四卦此以卦配氣者焉也朱子答董銖曰所問先天圖曲折細詳圖意若自乾一橫排至坤八此則全是自然故説卦云易逆數也皆自已生以得未生之卦若如圓圖則須如此方見隂陽消長次第震一陽離兑二陽乾三陽巽一隂坎艮二隂坤三陰雖自稍涉安排然亦莫非自然之理自冬至夏至為順蓋與前逆數者相反皆自未生而反得已生之卦自夏至冬至為逆蓋與前逆數者同其左右與今天文説左右不同蓋從中而分其初若有左右之勢爾自北而東為左自南而西為右又曰易逆數也以康節説方可通但方圖則一向皆逆若以圎圖看又只是一半逆不知如何西山蔡氏曰其法自子中至午中為陽初四爻皆陽中前二爻皆隂後二爻皆陽上一爻為隂二爻為陽三爻為隂四爻為陽自午中至子中為隂初四爻皆隂中前二爻為陽後二爻為隂上一爻為陽二爻為隂三爻為陽四爻為隂在陽中上二爻則先隂而後陽陽生於隂也在隂中上二爻則先陽而後隂隂生於陽也其序始震終坤者以隂陽消息為數也雙湖胡氏曰觀此圖以四正卦居四方之正位乾坤坎離反覆只是一卦以二反卦居四隅不正之位震反為艮巽反為兌本只震巽二卦反而成四卦合而言之天位乎上地位乎下日生於東月生於西山鎮西北澤注東南風起西南雷動東北自然與天地大造化合先天八卦對待以立體如此其位則乾一坤八兌二艮七離三坎六震四巽五各各相對而合成九數其畫則乾三坤六兑四艮五離四坎五震五巽四亦各各相對而合成九數九老陽之數乾之象而無所不包也造化隱然尊乾之意可見矣右前八卦次序圖即繫辭傳所謂八卦成列者此圖即其所謂因而重之者也故下三畫即前圖之八卦上三畫則各以其序重之而下卦因亦各衍而為八也若逐爻漸生則邵子所謂八分為十六十六分為三十二三十二分為六十四者尤見法象自然之妙也附録朱子曰易有太極是生兩儀兩儀生四象四象生八卦此一節乃孔子發明伏羲畫卦自然之形體次第最為切要古今説者惟康節眀道二先生為能知之故康節之言曰一分為二二分為四四分為八八分為十六十六分為三十二三十二分為六十四猶根之有幹幹之有枝愈大則愈小愈細則愈繁而眀道先生以為加一倍法其發明孔子之言又可謂最切要矣蓋以河圖洛書論之太極者虛中之象也兩儀者隂陽奇偶之象也四象者河圖之一合六二合七三合八四合九洛書之一含九二含八三含七四含六也八卦者河圖四實四虛之數洛書四正四隅之位也以卦畫言之太極者象數未形之全體也兩儀者􅅀為陽而􅄲為隂陽數一而隂數二也四象者陽之上生一陽則為而謂之太陽生一隂則為而謂之少隂隂之上生一陽則為而謂之少陽生一隂則為而謂之太隂也四象既立則太陽居一而含九少隂居二而含八少陽居三而含七太隂居四而含六此六七八九之數所由定也八卦者太陽之上生一陽則為而名乾生一隂則為而名兑少隂之上生一陽則為而名離生一隂則為而名震少陽之上生一陽則為而名巽生一陰則為而名坎太隂之上生一陽則為而名艮生一隂則為而名坤康節先天之説所謂乾一兌二離三震四巽五坎六艮七坤八者蓋謂此也至於八卦之上又各生一隂一陽則為四畫者十有六經雖無文而康節所謂八分為十六者此也四畫之上又各生一隂一陽則為五畫者三十有二經雖無文而康節所謂十六分為三十二者此也五畫之上又各生一隂一陽則為六畫之卦六十有四而八卦相重又各得乾一兑二離三震四巽五坎六艮七坤八之次其在圖可見矣天地之間莫非太極隂陽之妙聖人仰觀俯察逺求近取固有超然而默契於心矣故自兩儀未分渾然太極而兩儀四象六十四卦之理已粲然於其中太極分而兩儀則太極固太極兩儀固兩儀也兩儀分而四象則兩儀又為太極而四象又為兩儀矣自是而推四而八八而十六十六而三十二三十二而六十四以至於有百千萬億之無窮雖見於模畫若有先後而出於人為然其已定之形已成之勢固已具於渾然之中而不容毫髮思慮作為於其間也答袁樞曰要見得聖人作易根原直截分明不如且看卷首橫圖自始初止有兩畫時漸次看起以至生滿六畫之後其先後多寡既有次第而位置分眀不費辭説於此看得方見六十四卦全是天理自然挨排出來聖人只是見得分眀便只依本畫出元不曽用一毫智力添助問四爻五爻者何所主名曰一畫為儀二畫為象三畫為卦則八卦備矣此上若旋次各加隂陽一畫則積至三重再成八卦者八方有六十四卦之名若徑以八卦遍加乎一卦之上則亦如其位而得名焉方其四畫之時未成外卦故不得而名之耳又曰第四畫者以八卦為太極而復生之兩儀也第五畫者八卦之四象也第六畫者八卦之八卦也又詩曰諸儒談易漫紛紛只見繁枝不見根觀象徒勞推互體玩辭亦是逞空言須知一本能雙幹始信千兒與萬孫喫緊包犧為人意悠悠千古向誰論雲莊劉氏曰易畫生於太極故其理為天下之至精易畫原於圖書故其數為天下之至變太極理也形而上者也必有所依而後立故雖不雜乎圖書之數而亦不離乎圖書之數太極為理之原圖書為數之祖理之於數本非二致也合而觀之斯可矣周易傳義大全前八卦次序右伏羲四圖其説皆出於邵氏蓋邵氏得之李之才挺之挺之得之穆修伯長伯長得之華山希夷先生陳搏圖南者所謂先天之學也此圖圎布者乾盡午中坤盡子中離盡卯中坎盡酉中陽生於子中極於午中隂生於午中極於子中其陽在南其隂在北方布者乾始於西北坤盡於東南其陽在北其隂在南此二者隂陽對待之數圎於外者為陽方於中者為隂圎者動而為天方者靜而為地者也附録邵子曰太極既分兩儀立矣朱子曰此下四節通論伏羲六十四卦圎圖此一節以第一爻而言左一奇為陽右一偶為隂所謂兩儀者也今此一奇為左三十二卦之初爻一偶為右三十二卦之初爻乃以纍變而分非本即有此六十四假也後放此陽上交於隂隂下交於陽而四象生矣朱子曰此一節以第一爻生第二爻而言也陽下之半上交於隂上之半則生隂中第二爻之一竒一偶而為少陽太隂矣隂上之半下交於陽下之半則生陽中第二爻之一奇一偶而為太陽少隂矣所謂兩儀生四象者也太陽一奇今分為左上十六卦之第二爻少隂一偶今分為左下十六卦之第二爻少陽太隂其分放此而初爻之二亦分為四矣陽交於隂隂交於陽而生天之四象剛交於柔柔交於剛而生地之四象朱子曰此一節以第二爻生第三爻言也陽謂太陽隂謂太隂剛謂少陽柔謂少隂太陽之下半交於太隂之上半則生太隂中第三爻之一奇一偶而為艮為坤矣太隂之上半交於太陽之下半則生太陽中第三爻之一奇一偶而為乾為兌矣少陽之上半交於少隂之下半則生少隂中第三爻之一奇一偶而為離為震矣少隂之下半交於少陽之上半則生少陽中第三爻之一奇一偶而為巽為坎矣此所謂四象生八卦也乾一奇今分為八卦之第三爻坤一偶今分為八卦之第三爻餘皆放此而初爻二爻之四今又分而為八矣乾兌艮坤生於二大故為天之四象離震巽坎生於二少故為地之四象八卦相錯而後萬物生焉朱子曰一卦之上各加八卦以相間錯則六十四卦成矣然第三爻之相交則生第四爻之一奇一偶於是一奇一偶各為四卦之第四爻而下三爻亦分為十六矣第四爻又相交則生第五爻之一奇一偶於是一奇一偶各為二卦之第五爻而下四爻亦分而為三十二矣第五爻又相交則生第六爻之一奇一偶則一奇一偶各為一卦之第六爻而下五爻亦分而為六十四矣蓋八卦相乘為六十四而自三畫以上三加一倍以至六畫則三畫者亦加一倍而卦體橫分亦為六十四矣二數殊途不約而會如合符節不差毫釐正是易之妙處是故一分為二二分為四四分為八八分為十六十六分為三十二三十二分為六十四猶根之有幹幹之有枝愈大則愈少愈細則愈繁是故乾以分之坤以翕之震以長之巽以消之長則分分則消消則翕也乾坤定位也震巽一交也兌離坎艮再交也故震陽少而隂尚多也巽隂少而陽尚多也兌離陽浸多也坎艮隂浸多也玉齋胡氏曰震者長之始雷以動之也歷離兌而乾則長之極而為隂陽之分限矣乾以君之也巽者消之始風以散之也歷坎艮而坤則消之極而為純隂之翕聚矣坤以藏之也此所以長則分分則消消則翕翕則復長而循環無端也乾至陽也居上而臨下故曰君以震離兌之陽得乾而有所君宰坤至隂也居下而括終故曰藏以巽坎艮之隂得坤而有所歸宿然謂乾以分之則動而陽者乾也靜而隂者亦乾也乾實分隂陽而無不君宰也又曰乾坤以隂陽之純定上下之位震一交兌離再交由一陽之交以至二陽之交也巽一交坎艮再交由一隂之交以至二隂之交也故初交為震則陽尚少再交為離兌則陽浸多矣初交為巽則隂尚少再交為坎艮則隂浸多矣又曰無極之前隂含陽也有象之後陽分隂也隂為陽之母陽為隂之父故母孕長男而為復父生長女而為姤是以陽起於復而隂起於姤也朱子曰邵子自圖上説循環之意自姤至坤是隂含陽自復至乾是陽分隂坤復之間乃無極自坤反姤是無極之前思齋翁氏曰無極之前隂含陽也言自巽消而至坤翕靜之妙也有象之後陽分隂也言自震長而至乾分動之妙也隂含陽故曰母孕陽分隂故曰父生臨川吳氏曰六十四卦圎圖左邊自復卦至乾卦屬陽陽主生言生物自無而有也右邊自姤卦至坤卦屬隂隂主殺言殺物自有而無也無極之前謂自坤卦右旋以至於姤也有象之後謂自復卦左旋以至於乾也自坤前至姤皆屬隂而隂之中有八十陽者隂中所含之陽也自復後至乾皆屬陽而陽之中有八十隂者陽中所分之隂也又曰陽在隂中陽逆行隂在陽中隂逆行陽在陽中隂在隂中則皆順行此真至之理按圖可見矣朱子曰圖左屬陽右屬隂自震一陽離兌二陽乾三陽為陽在陽中順行自巽一隂坎艮二隂坤三隂為隂在隂中順行坤無陽艮坎一陽巽二陽為陽在隂中逆行乾無隂兌離一隂震二隂為隂在陽中逆行思齋翁氏曰先天圎圖左陽右隂左三十二卦陽始於復之初九歷十六變而二陽臨又八變而三陽泰又三變而四陽大壯又一變而五陽夬而乾以君之陽之進也始緩而終速其進也以漸所謂陽在陽中順也陽主升自下而升亦順也復至無妄二十陽明夷至同人二十八陽臨至履亦二十八陽乾至泰三十六陽二十者陽之微二十八陽之著三十六陽之盛陽在北則微在東則著在南則盛亦順也陽順而隂逆不言可知矣陽在右方三十二卦則反是故曰真至之理按圖可見矣又曰復至乾凡百一十有二陽姤至坤凡八十陽姤至坤凡百一十有二隂復至乾凡八十隂玉齋胡氏曰自復至乾居圖之左陽方也故陽多而隂少自姤至坤居圖之右隂方也故隂多而陽少左邊一畫陽便對右邊一畫隂左邊一畫隂便對右邊一畫陽對待以立體而隂陽各居其半也由此觀之天地間隂陽各居其半本無截然為陽截然為隂之理但造化貴陽賤隂聖人扶陽抑隂故於消長之際淑慝之分又不能不致其區别耳豈容以槩論哉又曰坎離者隂陽之限也故離當寅坎當申而數常踰之者隂陽之溢也然用數不過乎中也朱子曰此更宜思離當卯坎當酉但以坤為子半可見矣西山蔡氏曰此一節論隂陽往來皆以馴致以坎離言離中當卯坎中當酉然離之生巳起於寅震中坎之生巳起於申巽中故謂離當寅坎當申也坤當子半乾當午半則離卯坎酉之謂也玉齋胡氏曰坎離隂陽之限者就寅申而言也以四時言之春為陽而始於寅是離當寅而為陽之限秋為隂而始於申是坎當申而為隂之限也數常踰之者離雖當寅而盡於卯中坎雖當申而盡於酉中是踰寅申之限而為隂陽之溢矣用數不過乎中者取寅申而不取卯酉也蓋子位陽雖生而未出乎地至寅則溫厚之氣始用事午位隂雖生而未害於陽至申則嚴凝之氣始用事是所謂用數仍不過乎寅申之中也由是推之則乾當已坤當亥兌當卯辰震當子丑巽當午未艮當酉戌皆數之不及而邵子以為中者也乾當午坤當子兌當辰巳震當丑寅巽當未申艮當戌亥皆四方之中四隅之會處而邵子以為數常踰之者也此即邵子怕處其盛之意又大易吟曰天地定位否泰反類山澤通氣損咸見義風雷相薄恆益起意水火相射既濟未濟四象相交成十六事八卦相蕩為六十四朱子曰此是説方圖中兩交股底且如西北角乾東南角坤是天地定位便對東北角泰西南角否次乾是兌次坤是艮便對次否之咸次泰之損後四卦亦如是共十六卦又曰方圖自西北之東南便是自乾以之坤自東北之西南便是由泰以之否其間有咸恆損益既濟未濟所以又於此八卦見義蓋為是自兩角尖射上與乾坤相對不知怎生恁地巧天台董氏曰愚因邵子大易吟欲以方圖分作四層看其第一層四隅乾坤否泰四卦所謂天地定位否泰反類也然以周圍二十八卦橫直觀之皆乾一坤八之卦此見天地定位之不可易也其第二層四隅兌艮咸損四卦所謂山澤通氣損咸見義也然以周圍二十卦橫直觀之亦皆兌二艮七之卦此見山澤通氣之象也其第三層四隅為坎離既濟未濟四卦所謂水火相射既濟未濟是也然以周圍十二卦橫直觀之亦皆離三坎六之卦此足以見水火不相射之象也其最裏一層為震巽恆益四卦所謂風雷相薄恆益起意其象亦可見矣以此言之邵子之詩曉然足以見先天法象自然之妙又詩曰耳目聰明男子身洪鈞賦豫不為貧須探月窟方知物未躡天根豈識人乾遇巽時觀月窟地逢雷處見天根天根月窟間來往三十六宮都是春朱子曰先天圖自復至乾陽也自姤至坤隂也陽主人隂主物天根月窟指復姤二卦乃是説他圖之所從起處三十六宫之説邵子嘗曰八卦之象不易者四乾坤坎離反易者二震反為艮巽反為兌本是四卦以反易為二卦以六變而成八也重卦之象不易者八乾坤坎離頤中孚大小過反易者二十八如屯反為蒙之類本五十六卦反易只二十八卦以三十六變為六十四也張行成曰天地之間惟一無對惟中無對乾坤隂陽之一坎離隂陽之中頤大過似乾坤之一中孚小過似坎離之中所以皆無對其餘五十六卦不純乎一與中者則有對也劉氏問都是春蓋云天理流行而已常周流其間之意否曰是朱子曰圓圖乾在南坤在北方圖坤在南乾在北乾位陽畫之聚為多坤位隂畫之聚為多此隂陽之各以類而聚也亦莫不有自然之法象焉又曰圓圖象天一順一逆流行中有對待如震八卦對巽八卦之類方圖象地有逆無順定位中有對待四角相對如乾八卦對坤八卦之類此則方圎圖之辨也圎圖象天者天圎而動包乎地外方圖象地者地方而靜囿乎天中圎圖者天道之隂陽方圖者地道之柔剛震離兌乾為天之陽地之剛巽坎艮坤為天之隂地之柔地道承天而行以地之柔剛應天之隂陽同一理也特在天者一逆一順卦氣所以運在地者惟主乎逆卦畫所以成耳西山蔡氏曰邵子經世衍易圖一動一靜之間者易所謂太極也動靜者易所謂兩儀也隂陽剛柔者易所謂四象也太陽太隂少陽少隂少剛少柔太剛太柔者易所謂八卦也又曰動者為天天冇隂陽陽者動之始陰者動之極隂陽之中又各有隂陽故有太陽太隂少陽少隂太陽為日乾太隂為月兌少陽為星離少隂為辰震是為天之四象靜者為地地有柔剛柔者靜之始剛者靜之極剛柔之中又有剛柔故有太剛太柔少剛少柔大柔為水坤太剛為火艮少柔為土坎少剛為石巽是為地之四象天台董氏曰邵子以乾兌離震分太陽太隂少陽少隂為天之四象以巽坎艮坤分少剛少柔太剛太柔為地之四象蔡氏之説是也朱子以乾兌艮坤分隂陽為天之四象以離震巽坎分剛柔為地之四象又别是一説當闕疑以俟知者玉齊胡氏曰邵子以太陽為乾太隂為兌少陽為離少隂為震四卦天四象少剛為巽少柔為坎太剛為艮太柔為坤四卦地四象天地各四象此八卦也朱子釋之乃曰乾兌艮坤生於二太故為天四象離震巽坎生於二少故為地四象其言乾兌巽坎同而言離震艮坤異何也蓋四象八卦之位邵子以隂陽剛柔四字分之朱子唯以隂陽二字明之其論四象既殊則論八卦亦異邵子以乾兌離震為天四象者以此四卦自陽儀中來以巽坎艮坤為地四象者以此四卦自隂儀中來朱子則以乾兌艮坤生於太陽太隂故屬其象於天離震巽坎生於少隂少陽故屬其象於地二者各有不同也但詳玩邵子本意謂隂陽相交者指陽儀中之隂陽剛柔相交者指隂儀中之剛柔是以老交少少交老而生天地四象其機混然而無間朱子易陽為太陽隂為太隂剛為少陽柔為少隂二太相交而生天四象二少相交而生地四象其分粲然而有别朱子之説雖非邵子本意然因是可以見圖之分隂陽者以交易而成象之或老或少初不易其分也朱子嘗言文王後天八卦震東兌西為長少相合於正方巽東南艮東北為長少相合於偏方以長少之合為非其偶必若伏羲先天八卦震以長男而合隂長之巽為雷風不相悖艮以少男而合隂少之兌為山澤通氣以長合長少合少為得其偶又言無伏羲底做文王底不成其歸却在伏羲上今邵子説四象之交即文王之説也朱子説四象之交即伏羲之説也觀朱子之説實廣邵子未盡之意而觀邵子説者亦庶乎有折𠂻矣問邵子云先天之學心法也圖皆從中起萬化萬事生于心何也曰其中白處便是太極三十二隂三十二陽便是兩儀十六隂十六陽底便是四象八隂八陽底便是八卦又曰萬物萬化皆從這裏流出是心法皆從中起也新安程氏曰先天學心法也圖皆從中起曰皆者其故何也兼方圎圖而言也天地定位圎圖之從中起也雷以動之風以散之方圖之從中起也皆五與十所寄之位也故圎圖左旋起於六十四之坤右轉起於一之乾是中起於天地之定位也方圖西北與東南之交也起於震巽東北與西南之交也起於恆益南北相直也則起於恆震巽益東北相直也則起於震益恆巽是中起於雷風之動散也由此而論圎者動以定位為本方者靜以動散為用故動而無動靜而無靜固先天之心法歟是不可不皆求之圖也雙湖胡氏曰程氏此論甚的愚因推之天地定位起南北子午之中山澤通氣次西北東南之卦雷風相薄次東北西南之卦水火不相射又次東西之卦圎圖自南北之中起也雷以動之風以散之正居圎圖中心雨以潤之日以烜之則坎次巽離次震艮以止之兌以説之則艮次坎兌次離乾以君之坤以藏之則乾次兌坤次艮實由中而達乎西北東南方圖亦自中起也問圖雖無文吾終日言之不離乎是何也曰先天圖今所寫者是以一歲之運言之若大而古今十二萬九千六百年亦只是這圈子小而一日十二時亦只是這圈子都從復上推起去又曰以月言之自坤而震月之始生初三日也至兌則月之上弦初八日也至乾則月之望十五日也至巽則月之始虧十八日也至艮則月之下弦二十三日也至坤則月之晦三十日也又曰一日有一日之運一歲有一歲之運大而天地之終始小而人物之生死逺而古今之世變皆不外乎此只是一箇盈虛消息之理如納甲法乾納甲壬坤納乙癸離納己坎納戊巽納辛震納庚兌納丁艮納丙亦是此玉齋胡氏曰自有先天圖以後如納甲法道家修養法下至火珠林占筮等書莫不自先天圖出所謂天地萬物之理盡在其中者是也易訓變易又訓交易是博易之義觀先天圖便可見東邉一畫隂便對西邉一畫陽蓋東一邉本皆是陽西一邉本皆是隂東邉隂畫本皆是自西邉來西邉陽畫都是自東邉來姤在西是東邉五畫陽過來復在東是西邉五畫隂過來互相博易而成易之變雖多般然此是第一變又曰陽中有隂隂中有陽兩邉交易各各相對其實非此往彼來只是其象如此然聖人當初亦不恁地思量只是畫一箇隂畫一箇陽每箇便生兩箇就一箇陽上又生一箇陽一箇隂就一箇隂上又生一箇隂一箇陽只管恁地去自一為二二為四四為八八為十六十六為三十二三十二為六十四既成便如此齊整皆是天地本然之妙元如此但略假聖人手畫出來問先天圖有自然之象數伏羲當初亦知其然否曰也不見得如何但橫圖據見在底畫較自然圎圖便是就這中間拗做兩截恁地轉來底是奇恁地轉去底是偶有些造作不甚依他元初畫底伏羲當初也只見太極下面有箇隂陽便知得一生二二又生四四又生八恁地推去做成這物事不覺成來却如此齊整答葉永卿曰先天之説此須先將六十四卦作一橫圖則震巽復姤正在中間先自震復却行以至於乾乃自巽姤而順行以至於坤便成圎圖而春夏秋冬晦朔弦望晝夜昏旦皆有次第此作圖之大指也又左方百九十二爻本皆陽右方百九十二爻本皆隂乃以對望交相博易而成此圖若不從中起以向兩端而但從頭至尾則此等類皆不可通矣誠用此意推之當自見得也先天乃伏羲本圖非康節所自作雖無言語而所該甚廣凡今易中一字一義無不自其中流出者問先天圖與太極圖不同如何曰中間虛者便是太極他圖説從中起今不合方圖在中間塞却待取出放外他兩邊生者即是隂根陽陽根隂這箇有對從中出者無對問先天圖如何移出方圖在下曰是某挑出臨川吳氏曰羲皇始畫八卦因而重之但有方圎二圖而無書也後聖因之作連山歸藏周易雖一本諸羲皇之圖而其取用又各不同焉三易既亡其二而周易獨存世儒誦習知有周易而已羲皇卦圖鮮或傳授而淪落於方技家雖其説具見於繫辭説卦而讀者莫之察也至邵子始得而發揮之於是人乃知有羲皇之易不至於沿流而迷其源焉厥功大矣右見説卦附録朱子曰坤求於乾得其初九而為震故曰一索而得男乾求於坤得其初六而為巽故曰一索而得女坤再求而得乾之九二以為坎故曰再索而得男乾再求而得坤之六二以為離故曰再索而得女坤三求而得乾之九三以為艮故曰三索而得男乾三求而得坤之六三以為兌故曰三索而得女又曰乾索於坤而得女坤索于乾而得男初間畫卦時不是恁地只是畫卦後便見有此象耳玉齋胡氏曰二男陽也乾之似也乃歸之於坤求而得後三女陰也坤之似也乃歸之於乾求而後得何也蓋三男本坤體各得乾一陽而成此陽根於陰故歸之坤也三女本乾體各得坤一陰而成此陰根於陽故歸之乾也邵子曰母孕長男而為復父生長女而為姤陰陽互根之義可見矣右見説卦邵子曰此文王八卦乃入用之位後天之學也附録邵子曰至哉文王之作易也其得天地之用乎故乾坤交而為泰坎離交而為既濟也乾生於子坤生於午坎終於寅離終於申以應天之時也置乾於西北退坤於西南長子用事而長女代母坎離得位而兌艮為偶以應地之方也王者之法其盡於是矣朱子曰此言文王改易伏羲卦圖之意也蓋自乾南坤北而交則乾北坤南而為泰矣自離東坎西而交則離西坎東而為既濟矣乾坤之交者自其所以成而反其所由生也故再變則乾退乎西北坤退乎西南也坎離之變者東自上而西西自下而東也故乾坤既退則離得乾位而坎得坤位也震用事者發生於東方巽代母者長養而東南也玉齋胡氏曰乾南坤北離東坎西者先天卦位乾坤由南北而交坤南乾北則坤上乾下故交而為泰也離坎由東西而交則坎上離下故交而為既濟也先天卦乾居午而云生於子者以乾陽始生於復復子之半也坤居子而云生於午者以坤隂始生於姤姤午之半也午乾之所已成今下而交坤於子是反其所由生也子坤之所已成今上而交乾於午是反其所由生也故再變而為後天卦則乾退西北坤退西南也先天卦離當寅而云終於申者申乃坎之位離交坎而終於申也坎當申而云終於寅者寅乃離之位坎交離而終於寅也東者離之本位其變則交於坎而向西是東自上而西也西者坎之本位其變則交於離而向東是西自下而東也故再變而為後天卦乾坤既退則離上而得乾位坎下而得坤位也震代父始事而發生於東方巽代母繼事而長養於東南也先天主乾坤坎離之交其交也將變而無定位天時之不窮也故曰應天後天主坎離震兌之交其交也不變而有定位地方而有常也故曰應地此文王作易所以得天地之用而邵子以至哉之辭贊之也雙湖胡氏曰邵子以此圖屬之文王八卦蓋本之坤卦下之辭卦辭文王所作而謂西南得明東北喪朋正此圖之方位也又曰易者一隂一陽之謂也震兌始交者也故當朝夕之位坎離交之極者也故當子午之位巽艮不交而隂陽猶雜也故當用中之偏乾坤純陽純隂也故當不用之位也西山蔡氏曰此一節論隂陽以易位為交陽本在上隂本在下艮一陽在上巽一隂在下故云不交震一陽在下兌一隂在上故為始交坎陽在中離隂在中故為交之極春陽之始故震居之秋隂之始故兌居之夏陽極隂生故離居之冬隂極陽生故坎居之艮一陽二隂巽二陽一隂猶有用乾純陽坤純隂不為用東方為陽主用西方為隂不用故乾坤居西隅艮巽居東隅也乾艮為陽坤巽為隂北為地之陽南為地之隂故乾艮居北隅而巽坤居南隅也又曰兌離巽得陽之多者也艮坎震得隂之多者也是以為天地用也乾極陽坤極隂是以不用也又曰震兌橫而六卦縱易之用也朱子曰嘗考此圖而更為之説曰震東兌西者陽主進故以長為先而位乎左隂主退故以少為貴而位乎右也坎北者進之中也離南者退之中也男北而女南者互藏其宅也四者皆當四方之正位而為用事之卦然震兌始而坎離終震兌輕而坎離重也乾西北坤西南者父母既老而退居不用之地也然母親而父尊故坤猶半用而乾全不用也艮東北巽東南者少男進之後而長女退之先故亦皆不用也然男未就傅女將有行故巽稍向用而艮全未用也四者皆居四隅不正之位然居東者未用而居西者不復用也故下文歷舉六子而不數乾坤至其水火雷風山澤之相隅則又用伏羲卦云盤澗董氏曰天地以中相易為坎離水火以上下相易為震兌澤雷以上下相易為巽艮風山以上下交相易為乾坤六子並以一爻變惟乾坤變其二爻隂陽之純故也故震兌橫而六爻縱有自然之象矣思齋翁氏曰坎離是乾坤中爻之交在八卦位中只有東西南北四正位位之極好先天則位坎離以卯酉後天則位坎離以子午只此四位陽中有隂隂中有陽皆是義文微意隆山陳氏曰離為日大明生於東故在先天居東日正照於午日中時也故在後天居南坎為月月生於西故在先天居西月正照於子夜分時也故在後天居北在先天則居生之地在後天則居旺之地不特坎離後天卦位皆以生旺為序震木旺於卯兌金旺於酉土旺中央故坤位金火之間艮位水木之間兌隂金乾陽金故乾次兌居西北震陽木巽隂木故巽次震居東南皆以五行生旺為序此所謂易之用也平菴項氏曰後天之序播五行於四時也震巽二木主春故震在東方巽東南次之離火主夏故為南方之卦兌乾二金主秋故兌為正秋乾西北次之坎水主冬故為北方之卦土旺四季故坤土在夏秋之交為西南之卦艮土在冬春之交為東北之卦木金土各二者以形王也水火各一者以氣王也坤隂土故在隂地艮陽土故在陽地震陽木故正東巽隂木故近南而接乎隂兌隂金故正西乾陽金故近北而接乎陽也觀於説卦帝出乎震章其指瞭然矣朱子答袁樞曰來喻謂冬春為陽夏秋為隂以文王八卦論之則自西北之乾以至東方之震皆父與三男之位也自東南之巽以至西方之兌皆母與三女之位也故坤蹇解卦之彖辭皆以東北為陽方西南為隂方然則謂冬春為陽夏秋為隂亦是一説但説卦又以乾為西北則隂有不盡乎西以巽為東南則陽有不盡乎東此亦以來書之説推之而説卦之文適與彖辭相為表裏亦可以見此圖之出於文王也但此自是一説與他説十二卦之類各不相通耳又曰據邵氏説先天者伏羲所畫之易也後天者文王所演之易也伏羲之易初無文字只有一圖以寓其象數而天地萬物之理隂陽始終之變具焉文王之易即今之周易而孔子所為作傳者是也孔子既因文王之易以作傳則其所論固當專以文王之易為主然不推本伏羲始畫之易只從中半説起不識向上根源矣故一翼之中如八卦成列因而重之太極兩儀四象八卦而天地山澤雷風水火之類皆本伏義畫卦之意而某於啓蒙原卦畫一篇亦分兩義伏義在前文王在後必欲知聖人作易之本則當考伏羲之畫若只欲知今易書文義則但求之文王之經孔子之傳足矣兩者初不相妨而亦不可以相雜也又曰自初未有畫時説到六畫滿處者邵子所謂先天之學也卦成之後各因一義推説邵子所謂後天之學也如繫辭説卦三才六位之説即所謂後天者也先天後天既各自有一義而後天説中取義又多不同彼此自不相妨不可執一而廢百也西山蔡氏曰伏羲八卦是數之自然文王八卦乃是見之於用或謂先天乃模寫天地所以然純乎天理者也後天乃整頓天地所當然之理參以人事此意固好然先天豈非人事後天亦是天理之自然顧有明體致用之不同二者不可相無故夫子釋帝出乎震一章又以先天説六子之用也邵子以帝出乎震為文王所定今觀連山首艮以萬物成終成始恐古亦有此矣玉齋胡氏曰先天卦乾以君言則所主者在乾後天卦震以帝言則所主者又在震何哉此正夫子發明羲文尊陽之意也蓋乾為震之父震為乾之子以統臨謂之君則統天者莫如乾而先天卦位宗一乾也此乾方用事則震居東北而緩其用也以主宰謂之帝主器者莫若長子後天卦位宗一震也此乾不用則震居正東而司其用也先天所重者在正南後天所重者在正東如此則文王改易伏羲卦圖均一尊陽之心可見矣又曰愚嘗合先後天之易而參之圖書矣伏羲先天之易固以河圖為本而其卦位未嘗不與洛書合且以乾南兌東南則老陽四九之位也離東震東北則少陽三八之位也巽西南坎西則少隂七九之位也艮西北坤北則老隂一六之位也其卦實與六書合焉文王後天之易雖但本之伏羲然亦未嘗不與河圖合且以坎離當南北之正子午之中則兩卦各當夫水火之一象離當地二天七之火而居南坎當天一地六之水而居北外此六卦則每卦各當一象震者木之生當天三之木於東巽者木之成當地八之木於東南兌者金之生當地四之金於西乾者金之成當天九之金於西北艮者土之生當天五之土於東北坤者土之成當地十之土於西南坤艮所以屬配夫中宮之五十者以土實寄旺於四季無乎不在故配夫中數耳其卦實與河圖合焉原其初伏羲但據河圖以作易未必預見於書文王但據先天八卦以為後天八卦未必追考於圖而方位既成自默相符合于以見天地之間河洛自然之數其與聖人心意之所為自有不期合而合者此理之所必同也不可不察焉雙湖胡氏曰先天乾中爻下變坤中爻則成坎而襲坤之位故天氣下降而乾位西北先天坤中爻上變乾中爻則成離而襲乾之位故地氣上騰而坤位西南先天離下爻變坎下爻則成兌襲先天坎之位故離居南而為夏兌居西而次夏為秋先天坎上爻變離上爻則成震襲先天離之位故坎居北而為冬震居東而次冬為春後天乾既位西北而當先天艮之位則艮進而位於東北襲先天震之位艮亦震之反也後天坤既位西南而當先天巽之位則巽退而位於東南襲先天兌之位巽亦兌之反也後天四正四隅之卦所由定如此夫豈舍先天而自為之哉卦變圖彖傳或以卦變為説今作此圖以明之蓋易中之一義非畫卦作易之本指也凡一陰一陽之卦各六皆自復姤而來五陰五陽卦同圖易剝比豫謙師復夬大有小畜履同人姤凡二陰二陽之卦各十有五皆自臨遁而來四陰四陽卦同圖異頤屯震明夷臨蒙坎解升艮蹇小過晉萃觀大過鼎巽訟遁革離家人旡妄兌睽中孚需大畜大壯凡三陰三陽之卦各二十皆自泰否而來損節歸妹泰賁既濟豐噬嗑隨益蠱井恆未濟困渙旅咸漸否咸旅漸否困未濟渙井蠱恆隨噬嗑益既濟賁豐節損歸妹泰凡四陰四陽之卦各十有五皆自大壯觀而來二陰二陽圖已見前大畜需大壯睽兌中孚離革家人旡妄鼎大過巽訟遁萃晉觀蹇艮小過坎蒙解升屯頤震明夷臨凡五陰五陽之卦各六皆自夬剝來一陰一陽圖已見前大有夬小畜履同人姤比剝豫謙師復右易之圖九有天地自然之易有伏羲之易有文王周公之易有孔子之易自伏羲以上皆無文字只有圖畫最宜深玩可見作易本原精微之意文王以下方有文字即今之周易然讀者亦宜各就本文消息不可便以孔子之説為文王之説也附録董銖問近略考卦變以彖辭考之説卦變者凡九卦蓋言成卦之由凡彖辭不取成卦之由則不言所變之爻程子專以乾坤言變卦然只是上下兩體皆變者可通若只一體變者則不通兩體變者凡七卦隨蠱賁咸恆漸渙是也一體變者兩卦訟無妄是也七卦中取剛來下柔剛上柔下之類者可通至一體變者則以來為自外來故説得有礙大凡卦變須觀兩體上下為變方知其所由以成之卦朱子曰便是此處説得有礙且程傳賁卦所云豈有乾坤重而為泰又自泰而變為賁之理若其説果然則所謂乾坤變而為六子八卦重而為六十四皆由乾坤而變者其説不得而通矣蓋有則俱有自一畫而二二而四四而八而八卦成八而十六十六而三十二三十二而六十四而重卦備故有八卦則有六十四矣此康節所謂先天者也若震一索而得男以下乃是已有此卦了就此卦生出此義皆所謂後天之學也今所謂卦變者亦是有卦之後聖人見得有此象故發於彖辭安得謂之乾坤重而為是卦則更不可變而為他卦耶若論先天一卦亦無既畫之後乾一兌二離三震四至坤居末又安有乾坤變而為六子之理凡今日易中所言皆是後天之易耳以此見得康節先天後天之説最為有功太極兩儀四象八卦者伏羲畫卦之法也説卦天地定位至坤以藏之以見伏羲所畫八卦之位也帝出乎震以下文王即伏羲已成之卦而推其義類之辭也如卦變圗剛來柔進之類亦是就卦已成後用意推説以見此為自彼卦而來耳非真先有彼卦而後方有此卦也古注説賁卦自泰卦而來先儒非之以為乾坤合而為泰豈有泰復變為賁之理殊不知若論伏羲畫卦則六十四卦一時俱了雖乾坤亦無能生諸卦之理若如文王孔子之説則縱橫曲直反覆相生無所不可要在看得活終無所拘泥則無不通耳伊川不取卦變之説至柔來而文剛剛自外來而為主於內諸處皆牽強説了王輔嗣卦變又變得不自然某之説却覺得有自然氣象只是換了一爻非是聖人合下作卦如此自是卦成了自然有此象朱漢上易卦變只變到三爻而止於卦辭多有不通處某更推盡去方通如無妄剛自外來而為主於內只是初剛自訟二移下來晉柔進而上行只是五柔自觀四挨上去此等類按漢上卦變則通不得卦有兩樣生有從兩儀四象加倍生來底有卦中互換自生一卦底互換成卦不過換兩爻這般變卦伊川破之及到那剛來而得中却推不行大率在就義理上看不過如剛自外來而得中分剛上而文柔等處看其餘多在占處用也賁變節之象這雖無緊要然後面有數處彖辭不如此看無來處解不得雙湖胡氏曰按彖傳中本義所釋卦變訟泰隨否蠱噬嗑賁無妄大畜咸恆晉睽蹇解升鼎漸渙只十九卦且所釋自訟晉與圗同外餘皆不合如隨自困噬嗑未濟既濟來據圖則自泰否來之類是也蓋圗雖因彖傳而作而卦變則無所不通不可以一定拘也嘗考此圖之變各生於兩卦凡陽爻變隂則陽自下而上往居隂位隂自上而下來居陽位如復變師復初上為師之二復二下為師之初之類是也凡隂爻變陽則隂自下而上往居陽位陽自上而下來居隂位如姤變同人姤初上為同人之二姤二下為同人之初之類是也此圖變法又自是一例不過隂陽爻移上換下而與初九變為初爻之八初六變為初爻之七者其例又不同要之卜筮所用必八九六七之變如啓蒙三十三圖變例乃為備也鄱陽董氏曰鶴山魏氏謂朱子易大抵得於邵子為多不讀邵易則茫不知啓蒙本義之所以作今觀此諸圖則魏氏之言為尤信朱子嘗稱邵傳羲畫愚亦謂朱子又所以傳邵易云
