body:
  text: 周易傳義大全卷九明胡廣等撰離下艮上𫝊賁序卦嗑者合也物不可以茍合而已故受之以賁賁者飾也物之合則必有文文乃飾也如人之合聚則有威儀上下物之合聚則有次序行列合則必有文也賁所以次噬嗑也為卦山下有火山者草木百物之所聚也下有火則照見其上草木品彚皆被其光彩有賁飾之象故為賁也賁亨小利有攸往賁彼偽反𫝊物有飾而後能亨故曰无本不立无文不行有實而加飾則可以亨矣文飾之道可増其光彩故能小利於進也本義賁飾也卦自損來者柔自三來而文二剛自二上而文三自既濟而來者柔自上來而文五剛自五上而文上又内離而外艮有文明而各得其分之象故為賁占者以其柔來文剛陽得隂助而離明於内故為亨以其剛上文柔而艮止於外故小利有攸徃雲峯胡氏曰无本不立无文不行有賁之文所以能亨然不過小利有所徃而已何者本為大文為小也至彖乃分上下體言亨與小利有攸徃亦謂有本而復有文内離則質本剛而柔文之故亨外艮則質本柔而剛文之故小利有攸徃彖曰賁亨本義亨字疑衍柔來而文剛故亨分剛上而文柔故小利有攸徃天文也本義以卦變釋卦辭剛柔之交自然之象故曰天文先儒說天文上當有剛柔交錯四字理或然也雲峯胡氏曰柔來而文剛是以剛為主也剛徃文柔必曰分剛上而文柔者亦以剛為主也故本義於柔文剛則曰陽得隂助於剛文柔而不曰隂得陽助盖一隂下而為離則隂為陽之助而明於内一陽上而為艮則陽為隂之主而止於外是知皆以剛為主而彖𫝊以隂為小者此也文明以止人文也𫝊卦為賁飾之象以上下二體剛柔交相一作相交為文飾也下體本乾柔來文其中而為離上體本坤剛往文其上而為艮乃為山下有火止於文明而成賁也天下之事无飾不行故賁則能亨也柔來而文剛故亨柔來文於剛而成文明之象文明所以為賁也賁之道能致亨實由飾而能亨也分剛上而文柔故小利有攸徃分乾之中爻徃文於艮之上也事由飾而加盛由飾而能行故小利有攸往夫往而能利者以有本也賁飾之道非能増其實也但加之文彩耳事由文而顯盛故為小利有攸往亨者亨通也往者加進也二卦之變共成賁義而彖分言一无言字上下各主一事者盖離明足以致亨文柔又能小進也天文也文明以止人文也此承上文言隂陽剛柔相文者天之文也止於文明者人之文也止謂處於文明也質必有文自然之理理必有對待生生之本也有上則有下有此則一作必字有彼有質則有文一不獨立二則為文非知道者孰能識之天文天之理也人文人之道也本義又以卦徳言之止謂各得其分潛齋胡氏曰日月五星之運錯行乎二十八宿經星之次舍此天之文也即卦中剛柔交錯乎六位者也君臣父子兄弟夫婦朋友粲然有禮以相接者文之明也截然有分以相守者文之止也是則卦中離明而艮止者也雲峯胡氏曰上文以卦變言則剛柔之交可以見天文此以卦徳言則文明各得其分可以見人文觀乎天文以察時變傳天文謂日月星辰之錯列寒暑隂陽之代變觀其運行以察四時之遷改也觀乎人文以化成天下𫝊人文人理之倫序觀人文以敎化天下天一无天字下一无下字成其禮俗乃聖人用賁之道也賁之象取山下有火又取卦變柔來文剛剛上文柔凡卦有以二體之義及二象而一无而字成者如屯取動乎險中與雲雷訟取上剛下險與天水違行是也有取一爻者成卦之由也柔得位而上下應之曰小畜柔得尊位大中而上下應之曰大有是也有取二體又取消長之義者雷在地中復山附於地剝是也有取二象兼取二爻交變為義者風雷益兼取損上益下山下有澤損兼取損下益上是也有既以二象成卦復取爻之義者夬之剛決柔姤之柔遇剛是也有以用成卦者㢲乎水而上水井木上有火鼎是也鼎又以卦形為象有以形為象者山下有雷頤頥中有物曰噬嗑是也此成卦之義也如剛上柔下損上益下謂剛居上柔在下損於上益於下據成卦而言非謂就卦中升降也如訟无妄云剛來豈自上體而來也凡以柔居五者皆云柔進而上行柔居下者也乃居尊位是進而上也非謂是下體而上也卦之變皆自乾坤先儒不達故謂賁本是泰卦豈有乾坤重而為泰又由泰而變之理下離本乾中爻變而成離上艮本坤上爻變而成艮離在内故云柔來艮在上故云剛上非自下體而上也乾坤變而為六子八卦重而為六十四皆由乾坤之變也朱子曰伊川說乾坤變為六子非是卦不是逐一卦畫了旋變去這話難説伊川説兩儀四象自不分明卦不是旋取象了方畫須是都畫了這卦方只就已成厎卦上面取象所以有剛柔來往上下本義極言賁道之大也臨川呉氏曰此廣賁義以卦體言交錯者初與二三與四五與上皆以一剛一柔相間在天日月之行星辰之布亦剛柔交錯故曰天文也以卦徳言文明者文采著明止者不踰分限在人五典之叙五禮之秩粲然有文而各安所止故曰人文也時變謂四時寒暑代謝之變化謂舊者化新成謂久而成俗潛齋胡氏曰聖人南面而立視昏旦之星日月之次以知四時寒暑之變觀君臣父子兄弟夫婦朋友之文則導以禮樂風以詩書彰以車服辨以采章而化成於天下象曰山下有火賁君子以明庶政无敢折獄𫝊山者草木百物之一无之字所聚生也火在其一无其字下而上照庶類皆被其光明為賁飾之象也君子觀山下有火明照之象以修明其庶政成文明之治而无果敢於折獄也折獄者人君之所致慎也豈可恃其一无其字明而輕自用乎乃聖人之用心也為戒深矣象之所取唯以山下有火明照庶物以用明為戒而賁亦自有无敢折獄之義折獄者専用情實有文飾則沒其情矣故无敢用文以折獄也本義山下有火明不及逺明庶政事之小者折獄事之大者内離明而外艮止故取象如此或問本義云明庶政是明之小者无敢折獄是明之大者此専是就象上取義伊川説此則又就賁飾上説不知二説可相備否朱子曰明庶政是就離上説無敢折獄是就艮上説離明在内艮止在外則是事之小者可以用明折獄是大事一折便了有止之義明在内不能及他故止而不敢折也大凡就象中説則意味長若懸空説道理雖説得去亦不甚親切也又曰此與旅卦都説刑獄事但爭艮與離之在内外故其説相反止在外明在内故明庶政而不敢折獄止在内明在外故明謹用刑而不敢㽞獄粗言之如今州縣治獄禁勘審覆自有許多節次過乎此而不決便是㽞獄不及乎此而決便是敢於折獄書曰要囚服念五六日至于旬時丕蔽要囚周禮秋官亦有此數句便是有合如此者若獄未具而決之是所謂敢折獄也若獄已具而㽞之不決是所謂㽞獄也雲峯胡氏曰明庶政之小者而不敢折其獄之大者亦以明不及逺故也明離象无敢折艮象沙隨程氏曰離為刑獄之象凡四卦賁旅不嫌於用明故稱火豐噬嗑稱電者暫明於幽暗之間不以為常也初九賁其趾舎車而徒舎音捨𫝊初九以剛陽居明體而處下君子有剛明之徳而在下者也君子在无位之地无所施於天下唯自賁飾其所行而已趾取在下而所以行也君子修飾之道正其所行守節處義其行不茍義或不當則舎車輿而寧徒行衆人之所羞而君子以為賁也舎車而徒之義兼於比應取之初比二而應四應四正也與二非正也九之剛明守義不近與於二而逺應於四舎易而從難如舎車而徒行也守節義君子之賁也是故君子所賁世俗所羞世俗所貴一作賁君子所賤以車徒為言者因趾與行為義也本義剛徳明體自賁於下為舎非道之車而安於徒歩之象占者自處當如是也白雲郭氏曰君子以義為榮不以徒行為辱初九以賤自居舎車而徒所謂窮不失義者矣雲峯胡氏曰壯初剛居剛而健體故壯于趾賁初剛居剛而明體故賁其趾壯初壯于趾不安在下之分者也賁初舎車而徒能安在下之分者也盖易之義所乗者在下而乗之者在上初在下卦之下而无所乗分也然曰賁其趾非徒安分而已舎車之榮而徒行是不以徒為辱而自以義為榮也是故君子行義必於在下之時發足之初觀之象曰舎車而徒義弗乗也𫝊舎車而徒行者於義不可以乗也初應四正也從二非正也近舎二之易而從四之難舎車而徒行也君子之賁守其義而已本義君子之取舎決於義而已雲峯胡氏曰初九以徒為義不以乘為義即孟子所謂往役義也往見不義也六二賁其須𫝊卦之為賁雖由兩爻之變而文明之義為重二實賁之主也故主言賁之道飾於物者不能大變其質也因其質而加飾耳故取須義須隨頥而動者也動止惟係於一无於字所附猶善惡不由於賁也二之文明唯為賁飾善惡則係其質也本義二以隂柔居中正三以陽剛而得正皆无應與故二附三而動有賁須之象占者宜從上之陽剛而動也漢上朱氏曰毛在頥曰須在口曰髭在頰曰髯三至上有頥體二在頥下須之象二三剛柔相賁賁其須也夫文不虛生須生於頥血盛則煩滋血衰則減耗須所以賁其頥也臨川吴氏曰須之美者生而美也美由中出不假外飾六二柔麗乎中正固有其美而須之賁非有待於外物而賁者然隂柔不能自動必附麗於陽如須雖有美必附麗於頥也雲峯胡氏曰本義以二與三皆無應與故二自附三而動如須附頥而動二柔居中正三剛而得正得其附矣象曰賁其須與上興也𫝊以須為象者謂其與上同興也隨上而動動止唯係所附也猶加飾於物因其質而賁之善惡在其質也梅巖袁氏曰隂不能以自明也得陽而後明柔不能以自立也得剛而後立下不能以自興也得上而後興九三賁如濡如永貞吉𫝊三處文明之極與二四二隂間處相賁賁之盛者也故云賁如如辭助也賁飾之盛光彩潤澤故云濡如光彩之盛則有潤澤詩云麀􅎷濯濯永貞吉三與二四非正應相比而成相賁故戒以常永貞正賁者飾也賁一作修飾之事難乎常也故永貞則吉三與四相賁又下比於二二柔文一剛上下交賁為賁之盛也本義一陽居二隂之間得其賁而潤澤者也然不可溺於所安故有永貞之戒童溪王氏曰剛柔相賁相與潤色以成其文此所謂賁如濡如也六二六四柔之正也九三剛之正也相比而相賁不失正道則為吉矣莭齋蔡氏曰三陷二柔之中有坎象故曰濡如坎剛中必亨故永貞吉雲峯胡氏曰互坎有濡義亦有陷義既未濟濡首濡尾濡而陷者也九三非不貞也能永其貞則二隂於我為潤澤之濡我於彼不為陷溺之濡矣象曰永貞之吉終莫之陵也𫝊飾而不常且非正一有則字人所陵侮也故戒能永正則吉也其賁既常而正誰能陵之乎節齋蔡氏曰陵侮也三能永貞則二柔雖比已而濡如然終莫之陵侮而不至陷溺也六四賁如皤如白馬翰如匪宼婚媾𫝊四與初為正應相賁者也本當賁如而為三所隔故不獲相賁而皤如皤白也未獲賁也馬在下而動者也未獲相賁故云白馬其從正應之志如飛故云翰如匪為九三之寇讎所隔則婚媾遂其相親矣已之所乗與動於下者馬之象也初四正應終必獲親第始為其間隔耳本義皤白也馬人所乗人白則馬亦白矣四與初相賁者乃為九三所隔而不得遂故皤如而其往求之心如飛翰之疾也然九三剛正非為寇者也乃求婚媾耳故其象如此王氏大寳曰皤髪白柔飾於柔隂盛陽衰皤如之象平庵項氏曰三當賁道之隆四當賁道之變也雲峯胡氏曰二與五三與上非應則亦非相賁者惟四以初之應為賁而為三所隔所謂賁如者皤如矣皤白也曰皤如又曰白馬者人與馬俱白象六四徳與位俱柔也白馬而曰翰如者六四隂柔之正下求初九陽剛之正雖為三所隔而其往求之心如飛翰之疾也然三剛正亦非與己為宼乃欲與己為婚媾耳此與屯六二相似屯剛柔始交賁剛柔相雜皆有婚媾象然屯之二乗馬斑如應五之心何其緩賁之四白馬翰如應初之心何其急時不同也屯二應五下求上也不可以急賁四應初上求下也不可以緩象曰六四當位疑也匪寇婚媾終无尤也𫝊四與初相逺而三介於其間是所當之位為一无為字可疑也雖為三寇讎所隔未得親於婚媾然其正應理直義勝終必得合故云終无尤也尤怨也終得相賁故无怨尤也本義當位疑謂所當之位可疑也終无尤謂若守正而不與亦無他患也六五賁于丘園束帛戔戔吝終吉戔在千反又音牋𫝊六五以隂柔之質密比於上九剛陽之賢隂比於陽復无所繫應從之者也受賁於上九也自古設險守國故城壘多依丘坂丘謂在外而近且高者園圃之地最近城邑亦在外而近者丘園謂在外而近者指上九也六五雖居君位而隂柔之才不足自守與上之剛陽相比而志從焉獲賁於外比之賢賁于丘園也若能受賁於上九受一作隨其裁制如束帛而一无而字戔戔則雖其柔弱不能自為為可少吝然能從於人成賁之功終獲其吉也戔戔剪裁分裂之狀帛未用則束之故謂之束帛及其制為衣服必剪裁分裂戔戔然束帛喻六五本質戔戔謂受人剪製而成用也其資於人與蒙同而蒙不言吝者盖童蒙而賴於人乃其宜也非童幼而資賁於人為可吝耳然享其功終為吉也或問伊川解賁于丘園指上九而言看來似好盖賁三隂皆受賁于陽不應此又獨異而作敦本務實說也朱子曰如何丘園便能賁人束帛戔戔他解作剪裁之象尤艱曲説不出這八字只平白在這裏若如所説則曲折多意思逺舊説指上九作高尚隱于丘園之賢而用束帛之禮聘召之若不用某説則此説似近若将丘園作上九之象束帛戔戔作剪裁紛裂之象則與象意大故相逺也孔氏曰諸儒以此爻為賁飾丘園之士且爻象无待士之文此盖普論為國之道不尚華飾而貴儉約也若唯用束帛招聘丘園以儉約待賢豈其義也本義六五柔中為賁之主敦本尚實得賁之道故有丘園之象然隂性吝嗇故有束帛戔戔之象束帛薄物戔戔淺小之意人而如此雖可羞吝然禮奢寧儉故得終吉朱子曰賁于丘園束帛戔戔此兩句只是當來卦辭非主事而言看如何用皆是這箇道理賁于丘園是箇務實底束帛戔戔是賁得不甚大所以説吝兩句是兩意戔戔淺小之意凡淺字箋字皆從戔淺小即是儉之義所以下文云吝終吉吝者雖不好看然終却吉問六五是在艮體故安止于丘園而不復有外賁之象曰雖是止體亦是上比於九漸漸到極處若一向賁飾去亦自不好須是收歛方得問敦本務實莫是反朴還淳之義否曰賁取賁飾之義他今却來賁田園為農圃之事當賁之時似若鄙吝然儉約故終得吉吉則有喜故象云有喜也雲峯胡氏曰諸家多言賁于丘園之賢本義謂不賁于市朝而賁于丘園敦本也束帛戔戔尚實也隂性吝嗇而終吉林放問禮之本夫子荅以與其奢也寧儉即此意也聖人謂賁以文飾成卦後世必有因飾而過者故於五明敦本尚儉之為吉又於上見賁極反本之為无咎也象曰六五之吉有喜也傳能從人以成賁之功享其吉美是有喜也上九白賁无咎傳上九賁之極也賁飾之極則失於華偽唯能質白其賁則无過失之咎白素也尚質素則不失其本真所謂尚質素者非无飾也不使華沒實耳本義賁極反本復於无色善補過矣故其象占如此或問白賁无咎朱子曰賁飾之事太盛則有咎所以處大盛之終則歸於白賁勢當然也問如本義説六五上九両爻却是賁極反本之意曰六五已有反本之漸故曰賁于丘園束帛戔戔至上九白賁則反本而復於无飾矣盖皆賁極之象也白賁无咎据剛上文柔是不當説自然而卦之取象不恁地拘各自説一義雲峯胡氏曰初取上下之義賁之趾下象也上取始終之義文之極則反為質白賁終象也賁上卦言白馬言束帛戔戔終言白賁雜卦曰賁无色也可謂一言以蔽之矣履禮也初素履往无咎賁文也終白賁无咎其反賁之文而為履之素歟象曰白賁无咎上得志也傳白賁无咎以其在上而得志也上九為得志者在上而文柔成賁之功六五之君又受其賁故雖居无位之地而實尸賁之功為得志也與他卦居極者異矣既在上而得志處賁之極将有華偽失實之咎故戒以質素則无咎飾不可過也或問何謂得志朱子曰居卦之上在事之外不假文飾而有自然之文便是優游自得也潘氏夢旂曰處賁之極文變為素潔白自守其志得矣進齋徐氏曰内三爻離體以文明為賁初賁其趾二賁其須三濡如皆有所設飾也外三爻艮體以篤實為賁四皤如五丘園上白賁皆尚質素无假外飾故曰賁无色也建安丘氏曰賁之一卦以卦變言則柔來文剛剛上文柔而為賁以二體言則下離上艮文明以止而為賁以六爻言則三陽三隂相比相賁而為賁然隂陽二物有應者以應而相賁无應者以比而相賁四與初應求賁於初故初賁趾而四翰如也二比三而賁乎三故二賁須而三濡如也五比上而賁乎上故五賁丘園而上白賁也初與四應而相賁者也二與三五與上比而相賁者也此賁六爻之大旨也坤下艮上傳剝序卦賁者飾也致飾然後亨則盡矣故受之以剝夫物至於文飾亨之極也極則必反故賁終則剝也卦五隂而一陽隂始自下生漸長至於盛極羣隂消剝於陽故為剝也以二體言之山附於地山髙起地上而反附著於地頽剝之象也剝不利有攸往傳剝者羣隂長盛消剝於一无於字陽之時衆小人剝喪於一无於字君子故君子不利有所往唯當㢲言晦迹隨時消息以免小人之害也本義剝落也五隂在下而方生一陽在上而将盡隂盛長而陽消落九月之卦也隂盛陽衰小人壯而君子病又内坤而外艮有順時而止之象故占得之者不可有所往也雲峯胡氏曰剝落之也五隂剥一陽欲落之以至於盡也否三隂三陽隂陽猶相等且曰不利君子貞剝五隂而一陽小人盛而君子孤如之何可有所往哉雖然陽無可盡之理也一變而後利有攸往也臨川吴氏曰以卦體而言則隂長以至五僅存一陽再往則幷一陽消之矣故不宜有往以占者而言則小人極盛之時當順時而止不可以有所往也彖曰剝剝也柔變剛也本義以卦體釋卦名義言柔進于陽變剛為柔也建安丘氏曰自一柔變剛而為姤再變遯三變否四變觀五變剝更進則盡變而卦為純坤矣聖人於姤言柔遇剛者姤相邂逅之謂也此言柔變剛變則盡反其所為君子悉為小人天下之事有不忍言者故遇可為也變不可為也不利有攸往小人長也長丁丈反傳剝剝也謂剝落也柔變剛也柔長而剛變也夏至一隂生而漸長一隂長則一陽消至於一无於字建戌則極而成剥是隂柔變剛陽也隂小人之道方長盛而剝消於一作剛陽故君子不利有所往也建安丘氏曰剝之柔變剛言小人長則復之剛反為君子長可知矣隆山陳氏曰夬彖曰剛決柔而剝曰柔變剛何也曰此君子小人之辨也君子剛明果斷小人隂賊險很君子之去小人聲其罪與天下共棄之名正言順故曰決小人之欲去君子辭不順理不直必萋斐浸潤以侵蝕之使之日消月鑠而不自知故曰變一字之間君子小人之情狀皦然矣順而止之觀象也君子尚消息盈虚天行也傳君子當剝之時知不可有所往順時而止乃能觀剝之象也卦有順止之象乃處剝之道君子當觀而體之君子尚消息盈虚天行也君子存心消息盈虚之理而能順之乃合乎天行也理有消衰有息長有盈滿有虚損順之則吉逆之則凶君子隨時敦尚所以事天也本義以卦體卦徳釋卦辭建安丘氏曰剥言不利有攸往則曰順而止復言利有攸往則曰以順行於柔長而戒之使止者所以憂小人之進於剛長而勉之使行者所以喜君子之來觀聖人利不利之辭則知其為君子發也雲峯胡氏曰凡卦畫皆象也皆當觀也於剝獨言之者為處變君子言也消息盈虚四字皆為陽言復者陽之息姤者陽之消乾者陽之盈坤者陽之虚剝五隂而一陽則陽之消而至於虚者也其變也大矣然亦天行也故剥曰天行復亦曰天行隆山李氏曰消息盈虚乃時運之使然君子尚之與時偕行雖處剥之時而不至於咨嗟戚憂而變其所守者知其後之必復而屏心寧耐以待之也不然心憤羣隂之進盡力以抗之則必激起其蠆尾之毒甘受其摧剥糜爛之禍而不可救藥矣象曰山附於地剝上以厚下安宅傳艮重於坤山附於地也山髙起於地而反附著於地圮剝之象也上謂人君與居人上者觀剝之象而厚固其下以安其居也下者上之本未有基本固而能剝者也故上一作山之剝必自下下剝則上危矣為人上者知理之如是則安飬人民以厚其本乃所以安其居也書曰民惟邦本本固邦寧朱子曰厚下者乃所以安宅如山附於地唯其地厚所以山安其居而不摇人君厚下以得民則其位亦安而不摇猶所謂本固邦寧也雲峯胡氏曰不曰君子而曰上上指一陽下指五隂也隂陽之分明矣厚下坤地象安宅艮土象節齋蔡氏曰卦以下剝上取義乃小人剝君子也象以上厚下取義乃人君厚生民也下剝上者成剝之義上厚下者治剝之道也厚齋馮氏曰以上下厚薄取象而不以隂陽消長為義此聖人用卦之微權也初六剝牀以足蔑貞凶傳隂之剝陽自下而上以牀為象者取身之所處也自下而剝漸至於身也剝牀以足剝牀之足也剝始自下故為剥足隂自下進漸消蔑於一无於字貞正凶之道也蔑无也謂消亡於正道也一作消亡正道也一作消亡於正道隂剝陽柔變剛是邪侵正小人消君子其凶可知本義剝自下起滅正則凶故其占如此蔑滅也節齋蔡氏曰牀者人之所安其體則上實下虚故取以象剝足在下又取以象初臨川吴氏曰五月姤之一隂始消一陽於下猶剝牀而先及其足也雲峯胡氏曰正道天地間不可一日无也方其剥之自下未至於滅貞也而曰蔑貞則凶戒小人之辭也隆山李氏曰剝卦隂爻凡五六三舎羣隂以應上九故无咎六五率羣隂以受制於陽故无不利若初六六二六四則居剝之世専以隂剝陽者故三爻皆因剝牀而凶聖人雖於隂類當長之時猶不許小人之害君子其戒昭然也象曰剝牀以足以滅下也傳取牀足為象者以隂侵沒陽於下也滅沒也侵滅正道自下而上也六二剝牀以辨蔑貞凶傳辨分隔上下者牀之幹也隂漸進而上剝至於辨愈蔑於正也凶益甚矣本義辨牀幹也進而上矣或問初與二蔑貞凶是以隂蔑陽以小人蔑君子之正道凶之象也不知只是陽與君子當之則凶為復隂與小人亦自為凶朱子曰自古小人滅害君子終亦有凶但此爻象只説陽與君子之凶也孔氏曰辨謂牀身之下足之上分辨處也雲峯胡氏曰剝自下起剝牀以辨進及上矣然二隂為遯猶未至於蔑貞辭與初同亦戒之也象曰剝牀以辨未有與也傳隂之侵剝於一作剛陽得以並盛至於剝辨者以陽未有應與故也小人侵剝君子若君子有與則可以勝小人不能為害矣唯其无與所以被蔑而凶當消剝之時而无徒與豈能自存也言未有與剝之未盛有與猶可勝也示人之意深矣本義言未大盛雲峯胡氏曰程傳言陽未有與本義言隂未有與二隂猶未至於五隂之盛也六三剝之无咎傳衆隂剝陽之時而三獨居剛應剛與上下之隂異矣志從於正在剥之時為无咎者也三之為可謂善矣不言吉何也曰方羣隂剝陽衆小人害君子三雖從正其勢孤弱所應在无位之地於斯時也難乎免矣安得吉也其義為无咎耳言其无咎所以勸也本義衆隂方剥陽而已獨應之去其黨而從正无咎之道也占者如是則得无咎建安丘氏曰剝下五隂皆剝陽者而三處其中獨與上應不忍黨邪以害正是小人而知有君子也故在剥之時為无咎梅巖袁氏曰剝雖小人之事以近陽為善以有應於陽次之近陽者六五是也故可以治剝有應者此爻是也故不為剝雲峯胡氏曰剝之三即復之四復六四在五隂中獨與初應而不許以吉剝六三在五隂中獨與上應而許以无咎何也曰復君子之事明道不計功不以吉許之可也剝小人之事小人中獨知有君子不以无咎許之則无以開其補過之門也象曰剝之无咎失上下也傳三居剝而无咎者其所處與上下諸隂不同是與其同類相失於處剝之道為无咎如東漢之吕強是也本義上下謂四隂雲峯胡氏曰六三居四隂中而獨與一陽所失者隂是其失乃所以為得也六四剝牀以膚凶傳始剝於牀足漸至於膚膚身之外也將滅其身矣其凶可知隂長已盛陽剝已甚貞道已消故更不言蔑貞直言凶也本義隂禍切身故不復言蔑貞而直言凶也白雲郭氏曰六四上體居牀之上則膚矣臨川吳氏曰初為牀足二為牀辨三為牀上人所卧處四人之身也非牀也非牀而曰剝牀以膚言剝牀而上及於人之肌膚也建安丘氏曰剝道已成故直言凶而不言蔑貞也雲峯胡氏曰本義曰蔑貞則凶盖猶許其不蔑貞則猶未至於凶也剥而及膚小人豈不欲蔑貞哉然正道終不可得而蔑故不言蔑貞而直言凶亦豈獨君子之凶哉象曰剝牀以膚切近災也傳五為君位剝己及四在人則剝其膚矣剝及其膚身垂於亡矣切近於災禍也龜山楊氏曰剝牀以足以辨剝其所安而已六四則剝及膚矣其為災也不切近乎六五貫魚以宫人寵無不利傳剝及君位剝之極也其凶可知故更不言剝而别設義以開小人遷善之門五羣隂之主也魚隂物故以為象五能使羣隂順序如貫魚然反獲寵愛於在上之陽如宫人則無所不利也宫人宫中之人妻妾侍使也以隂言且取獲寵一作親愛之義以一陽在上衆隂有順從之道故發此義本義魚隂物宫人隂之美而受制於陽者也五為衆隂之長當率其類受制於陽故有此象而占者如是則无不利也進齋徐氏曰六五以柔居中為羣隂之長總率羣隂順序以聽於陽有后妃以宫人備數進御於君之象平菴項氏曰六五君位五為王后與君同處四為夫人佐后者也三為九嬪以主九御下卦之長也二為世婦初為御妻臨川吳氏曰宫人衆妾也以之者后也后為宫人之主五統羣隂如后統衆妾衆隂戴陽如后以衆妾進御於主而獲寵愛之象隂長消陽至五極矣不可以再長也一陽在上非可剥者故取羣隂順承一陽為義六三應上九而寜失羣隂之心六五比上九而率羣隂以求一陽之寵一陽之功大矣天道之不可一日无陽世道之不可一日无君子者此也雲峯胡氏曰剝五不取君位如坤遯明夷歸妹旅皆非君所處也剝而至於五是為剝之極故五不取剝義别設為貫魚宫寵之象所以開小人改過遷善之門也五為羣隂之尊能率其類受制於陽无不利矣剝牀自足而辨而膚隂以次而剝陽也后以宫人備數進御於君望前先卑望後先尊亦以次而承陽聖人至是則戒之曰與其以次剝陽而至於凶孰若以次承陽之為利哉彖曰不利有攸往為君子戒也此曰无不利為小人勉也建安丘氏曰遯剝皆隂長之卦遯隂長而猶微可制也在遯之九三言陽制隂之道故曰畜臣妾吉剝隂長而已極不可制矣故不復言陽之制隂而言隂之從陽是以六五曰貫魚以宫人寵畜隂之權在陽則告陽以制隂之道剝陽之權在隂則教隂以從陽之道聖人於隂長之卦其委曲為君子謀者如此象曰以宫人寵終无尤也傳羣隂消一无消字剝於一无於字陽以至於極六五若能長率羣隂駢首順序反獲寵愛於陽則終无過尤也於剝之將終復發此義聖人勸遷善之意深切之至也平菴項氏曰剥之五隂但用於午未申酉戌之月亦在天道未為不利也若用於陽月以侵發生之事則為厲氣耳此爻别明後宫之義而象釋之曰終无尤者以見小人但以此寵之則終無害也雙湖胡氏曰易以天道明人事卦至九月五隂既長謂觀九五不剥為隂不可也特聖人繫爻不言隂剥陽但言處剥之道此便是扶陽抑隂挽囬世道之意雖然亦卦爻本有此象聖人因而發之隂陽消長固有自然之勢人事之盡自有轉移之妙也上九碩果不食君子得輿小人剥廬傳諸陽消剝已盡獨有上九一爻尚存如碩大之果不見食将見復生之理上九亦一作一一作已變則純隂矣然陽无可盡之理變於上則生於下无間可容息也聖人發明此理以見陽與君子之道不可亡也或曰剝盡則為純坤豈復有陽乎曰以卦配月則坤當十月以氣消息言則陽剝一有盡字為坤陽一有復字來為復一有然字陽未嘗盡也剝盡於上則復生於下矣故十月謂之陽月恐疑其无陽也隂亦然聖人不言耳隂道盛極之時其亂可知亂極則自當思治故衆心願載於君子君子得輿也詩匪風下泉所以居變風之終也理既如是在卦亦衆隂宗陽為共載之象小人剥廬若小人則當剥之極剝其廬矣无所容其身也更不論爻之隂陽但言小人處剝極則及其廬矣廬取在上之象或曰隂陽之消一作交必待盡而後復生於下此在上便有復生之義何也夬之上六何以言終有凶曰上九居剝之極止有一陽陽无可盡之理故明其有復生之義見君子之道不可亡也夬者陽消隂隂小人之道也故但言其消亡耳何用更言却有復生之理乎或問十月何以謂之陽月程子曰十月謂之陽月者陽盡恐疑於无陽也故謂之陽月也然何時无陽如日有夜光之類盖隂陽之氣有常存而不移者有消長而无窮者或問伊川云陽无可盡之理剝於上則生於下无間可容息也變於上則生於下矣乃剥復相因之理畢竟須經由坤坤卦純隂无陽如此則陽有斷滅也何以能生於復朱子曰凡隂陽之生一爻當一月須是滿三十日方滿得那腔子做得一畫成今坤卦非是無陽陽始生甚微未滿那腔子做一畫未成非是坤卦純隂使无陽也然此亦不是甚深奥事但伊川當時解不曽分曉道與人故令人做一件大事㸔自觀至剝三十日剝方盡日剥至坤三十日方成坤三十日陽漸長至冬至方是一陽第二陽方從此生隂剥每日剝三十分之一一月方剥得盡陽長每日長三十分之一一月方長得成一陽隂剥時一日十二刻亦每刻中漸漸剥全一日方剥得三十分之一陽長之漸亦如此問十月何以為陽月曰剥盡為坤復則一陽生也復之一陽不是頓然便生乃是自坤卦中積來且一月三十日以復之一陽分作三十分從小雪後便一日生一分上靣趲得一分下靣便生一分到十一月半一陽始成也以此便見得天地無休息處雙峯饒氏曰十月雖當純坤之月而其序介乎剥復二卦之間以言乎前半月則有剥而未盡之陽小雪以前以言乎後半月則有復而方生之陽小雪以後剥之陽方盡於上而復之陽已生於下矣是烏得為无陽乎知十月之非无陽則四月之非无隂亦可知矣此隂陽消息之理至精至微自程傳始發之然所言者其理耳而未有以驗其氣數之必然也朱子又從而推明之曰是當以一爻分三十分隂陽日進退一分剝之陽剝於九月之霜降而盡於十月之小雪復之陽則生於小雪而成於十一月之冬至夬之隂決於三月之穀雨而盡於四月之小滿姤之隂則生於小滿而成於五月之夏至於是理與數合然後知隂陽絶續之際果無一息之間斷而程子之言為益信矣建安丘氏曰剥爛也復反也剥之上九變則為復之初九自最髙而最下自剥爛而復生故有碩果不食之象木脱僵立幾无一毫生意者此純坤之象也而生意已在其根矣此自坤而復也木末猶有碩大之果不為人所食則亦剥爛墜而已矣墜則生之所起果中有核實也核中有仁仁也仁則生矣此自剥而復也陽無可盡之理故剥即為復不必六自坤而復也本義一陽在上剝未盡而能復生君子在上則為衆隂所載小人居之則剝極於上自失所覆而无復碩果得輿之象矣取象既明而君子小人其占不同聖人之情益可見矣朱子曰上九一陽在上如碩大之果人不及食而獨㽞如君子在上而小人皆載於下則是君子之得輿也然小人雖載君子而乃欲自下而剝之則是自剝其廬耳盖唯君子乃能覆盖小人小人必頼君子以保其身今小人欲剥君子則君子亡而小人亦无所容其身如自剥其廬也且看自古小人欲害君子到害得盡後國破家亡其小人曽有存活得者否故聖人於象曰君子得輿民所載也小人剥廬終不可用也若人占得此爻則為君子之所為者必吉而為小人之所為者必凶矣其象如此而理在其中矣小人剝廬是說隂到這裏時把他這些陽都剝了此是自剝其廬舎无安身己處衆小人託這一君子為芘覆若更剝了是自剥其廬舎便不成剥了臨川吳氏曰下五陽皆已剥獨存一陽在上如木之果實皆已落獨一碩大之果不為人所食而猶在木末君子謂一陽坤為輿五隂承載上九之一陽如人之在車上君子筮得此爻則其象為得輿而占亦如之小人謂上九變為柔也一陽上覆五隂有廬之象竒變為偶則如廬之破壊穿漏其上而无以盖覆其下故小人筮得此爻則其象為剥廬而占亦如之也雲峰胡氏曰艮為果蓏艮上陽下隂果陽而蓏隂乾為木果衆陽皆變而上獨存有碩果不食象果中有仁天地生生之心存焉此一陽也在坤之月則剥之盡而復生在此則剥未盡而能復生指陽之性言也故有取於碩果不食之象碩果専以象言得輿剥廬兼象占而言小人剝廬亦戒辭也牀上之藉下以安者也廬下之藉上以安者也始而剥牀欲上失所安今而剝廬自失所安矣自古小人欲害君子亦豈小人之利哉象曰君子得輿民所載也小人剥廬終不可用也傳正道消剥既極則人復思治故陽剛君子為民所承載也若小人處剥之極則小人之竆耳終不可用也非謂九為小人但言剥極之時小人如是也建安丘氏曰剥者言一陽在五隂之上而為隂所剥也故卦以上九為主其曰碩果不食幸一陽之存也在下五隂爻則有與乎陽者吉無與乎陽者凶六三應陽則无咎六五承陽則无不利以其有與乎陽也餘三隂无陽可與則皆謂之凶然初六六二去陽逺而剥未盡故初蔑貞凶二亦蔑貞凶也至六四則已廹乎陽而剥極矣故不言蔑貞而直言凶也雙湖胡氏曰下四隂爻雖因已成之卦繋辭其實各原其初剥陽言之盖卦本純乾也初之蔑貞其姤之時乎二之蔑貞其遯之時乎但以剝陽為蔑貞不以位論矣三之无咎其否之時乎四之凶其觀之時乎五之以宫人寵正當剝之時也聖人既於觀四别取觀國之光義而於剥五又取率羣隂以受制於陽為利焉至上九直象之以不食之碩果其扶陽抑隂之意每如此夫震下坤上傳復序卦物不可以終盡剥窮上反下故受之以復物无剥盡之理故剝極則復來一无來字隂極則陽生陽剥極於上而復生於下窮上而反下也復所以次剥也為卦一陽生於五隂之下隂極而陽復也歲十月隂盛既極冬至則一陽復生於地中故為復也陽君子之道陽消極而復反君子之道消極而復長也故為反善之義朱子曰十月坤卦皆純隂自交過十月節氣固是純隂然潛陽在地下已旋生起來了且以一月分作三十分細以時分之是三百六十分陽生時逐旋生生到十一月冬至方生得就一畫陽這一畫是卦中六分之一在地下二畫又較在上靣則箇至三陽則全在地上矣四陽五陽六陽則又層層在上面去不解到冬至時便頓然生得一畫又曰陽无驟生之理如冬至前半月中氣是小雪陽已生三十分之一分到得冬至前幾日須已生到二十七八分到至日方始成一畫不是昨日全无今日一旦便復了大抵剝盡處便生如列子所謂運轉无已天地密移疇覺之哉凡一氣不頓進一形不頓虧亦是不覺其進不覺其虧盖隂陽浸消浸長人之一身自少至老莫不皆然天運流行本無一息間斷豈解一月无陽且如木之黄落時萌芽已生了不特如此木之冬青者必先萌芽而後舊葉方落若論變時天地無時不變如楞嚴經第二卷首叚所載非唯一歲有變月亦有之非唯月有變日亦有之非唯日有變時亦有之但人不知耳此説亦是天地中間此氣升降上下當分為六層十一月冬至自下面第一層生起直到第六層上至天為四月陽氣纔生足便消下靣隂氣便生只是這一氣升降循環不已往來乎六層之中也大抵發生都只是一箇陽氣只是有消長上面陽消一分下靣便隂長一分又不是别討箇隂來只是陽消處便是隂故陽來謂之復復是本來物事隂來謂之姤姤是偶然相遇臨川吳氏曰復還反也冬至之前六陽消盡而為純坤冬至之後一陽還反而生於下也隆山李氏曰承剝之後而一陽來復乃生生之本也天地之運一息不㽞剝終復始不容少緩若稍遅不及則生理息也復亨出入无疾朋來无咎傳復亨既復則亨也陽氣復生於下漸亨盛而生育萬物君子之道既復則漸以亨通澤於天下故復則有亨盛之理也出入无疾出入謂生長復生於内入也長進於外出也先云出語順耳陽生非自外也來於内故謂之入物之始生其氣至微故多屯艱陽之始生其氣至微故多摧折春陽之發為隂寒所折觀草木於朝暮則可見矣出入无疾謂微陽生長无害之者也既无害之而其類漸進而來則将亨盛故无咎也所謂咎在氣則為差忒在君子一有之道字則為抑塞不得盡其理陽之當復雖使有疾之固不能止其復也但為阻礙耳而卦之才有无疾之義乃復道之善也一陽始生至微固未能勝羣隂而發生萬物必待諸陽之來然後能成生物之功而无差忒以朋來而无咎也三陽子丑寅之氣生成萬物衆陽之功也若君子之道既消而復豈能便勝於小人必待其朋類漸盛則能協力以勝之也或問復一陽動於下而云朋來无咎何也朱子曰方一陽生未有朋類畢竟是陽長将次竝進以其為君子之道故亨通而无咎也反復其道七日來復利有攸往反復之復芳福反又作覆彖同傳謂消長之道反復迭至陽之消至七日而來復姤陽之始消也七變而成復故云七日謂七更也臨云八月有凶謂陽長至於隂長歴八月也陽進則隂退君子道長則小人道消故利有攸往也程子曰近取諸身百理皆具屈伸往來之義只於鼻息之間見之屈伸往來只是理不必将既屈之氣復為方伸之氣生生之理自然不息如復言七日來復其間元不斷續陽已復生物極必返其理須如此有生便有死有始便有終又曰凡物之散其氣遂盡无復歸本原之理天地間如紅罏雖生物消鑠亦盡况既散之氣豈有復在天地造化又焉用此既散之氣其造化者自是生氣至如海水潮日出水涸是潮退也其涸者已无也月出則潮水生也非却是将已涸之水為潮此是氣之終始開闔便是易一闔一闢謂之變本義復陽復生於下也剝盡則為純坤十月之卦而陽氣已生於下矣積之踰月然後一陽之體始成而來復故十有一月其卦為復以其陽既往而復反故有亨道又内震外坤有陽動於下而以順上行之象故其占又為己之出入既得无疾朋類之來亦得无咎又自五月姤卦一隂始生至此七爻而一陽來復乃天運之自然故其占又為反復其道至於七日當得來復又以剛徳方長故其占又為利有攸往也反復其道往而復來來而復往之意七日者所占來復之期也朱子曰七日來復者終不是已往之陽重新将來復生舊厎己自過了這裏自然生出來又曰復反也言陽氣既往而來復也夫大徳敦化而川流不窮豈假乎既消之氣以為方息之資也哉亦見其絶於彼而生於此而因以著其往來之象爾唯人亦然大和保合善端无窮所謂復者非曰追夫已放之心而還之録夫已棄之善而屬之也亦曰不肆焉以騁於外則本心全體即此而存固然之善自有所不能已耳隆山李氏曰陽反而復生生之氣自此萌動故曰復亨又曰於臨曰八月有凶於復則曰七日來復陽消而數月者幸其消之遟陽長而數日者幸其長之速也節齋蔡氏曰陽自建午之月漸消漸剝至建子之月而為復在卦經七爻於時經七月故曰七日來復不言月而言日者猶詩所謂一之日二之日也鄭氏剛中曰七者陽數日者陽物故於陽長言七日八者隂數月者隂物臨剛長以隂為戒故曰八月雲峰胡氏曰本義於剝之碩果曰剝未盡而復生至此則曰剝盡為純坤十月之卦而陽氣巳生於下盖陽无頓生之理故先天卦序剝而坤坤而後復陽无可盡之理故後天卦序則以復次剝其曰剝未盡而能復者指果中之仁而言也可見其所以為元者未嘗息其曰坤十月陽氣已生於下積之踰月然後一陽之體始成而來復可見其所以至於亨者未嘗驟前乎此自姤而剝隂在内為主陽常行逆境今自剝而復陽在内為主陽方行順境故其占為亨已之出入而得无疾者一陽順而亨也朋類之來亦得无咎者衆陽順而亨也是皆陽順而動之象也反復其道統言隂陽往來其理如此七日來復専言一陽方來其數如此利有攸往則其占又言一陽之長可往而為臨為泰以至於乾也彖曰復亨剛反本義剛反則亨朱子曰剛反二字是解復亨下云動而以順行是解出入无疾以下大抵彖辭解得易極分明子細尋索儘有條理臨川吳氏曰剛反釋復字而亨之意在其中剛既反則日長日盛而亨矣建安丘氏曰此云剛反言剝之一剛窮上反下而為復也下文剛長言復之一剛自下進上為臨為泰以至為乾也以其既去而來反也故亨以其既反而漸長也故利有攸往剛反言方復之初剛長言已復之後動而以順行是以出入无疾朋來无咎傳復亨謂剛反而亨也陽剛消極而來反既來反則漸長盛而亨通矣動而以順行是以出入无疾朋來无咎以卦才言其所以然也下動而上順是動而以順行也陽剛反而順動是以得出入无疾朋來而无咎也朋之來亦順動也本義以卦徳而言進齋徐氏曰動而以順行者震動之始以坤順而行也出入朋來陽之動也无疾无咎以順行也龜山楊氏曰一陽復於下而五隂在上則陽微而隂猶盛小人衆而君子獨動而不以順行則疾之者至身不能保尚何朋來之有潘氏夢旂曰剝以順而止復以順而行君子處道消之極至道長之初未嘗一毫之不以順也反復其道七日來復天行也本義隂陽消息天運然也朱子曰反復其道七日來復天行也消長之道自然如此故曰天行處隂之極亂者復治往者復還凶者復吉危者復安天地自然之運也龜山楊氏曰四時之變浸而為寒暑固非一日之積也天且不能暴為之况於人乎利有攸往剛長也長丁丈反本義以卦體而言既生則漸長矣雙湖胡氏曰剛長則自復而臨而泰而壯夬至于乾其勢自不容禦矣平菴項氏曰剝曰不利有攸往小人長也復曰利有攸往剛長也易之意凡以為君子謀也鄱陽董氏曰自外而入者曰來自内而出者曰往疾之者衆則未可往无疾則利於往矣消息盈虚天命之自然而君子不謂命也上文言出入无疾而後朋來无咎朋來无咎而後利有往盖常不以天命之自來者為幸而深以人情之難測者為憂何也來者微而疾其來者衆也來者微則豈可遽以自幸疾其來者衆則豈可不善於自飬哉復其見天地之心乎𫝊其道反復往來迭消迭息一有也字七日而來復者天地之運行如是也消長相因天之理也陽剛君子之道長故利有攸往一陽復於下乃天地生物之心也先儒皆以靜為見天地之心盖不知動之端乃天地之心也非知道者孰能識之程子曰復其見天地之心一言以蔽之曰天地以生物為心復卦非天地之心復則見天地之心聖人无復故未嘗見其心人説復其見天地之心皆以為至靜能見天地之心非也復之卦下面一畫便是動了安得謂之靜自古儒者皆言静見天地之心唯某言動而見天地之心問莫是於動處求靜否曰固是然最難張子曰復見天地之心咸恒遯壯見天地之情心隱於微情發乎顯或問程子言動之端乃天地之心切謂十月純坤不為无陽天地生物之心未嘗間息但未動耳因動而生物之心始可見朱子曰十月陽氣收歛一時關閉得盡天地生物之心固未嘗息但无端倪可見惟一陽動則生意始發露出乃始可見端緒也言動之頭緒於此處起於此處方見得天地之心也問天地之心動處如何見得曰這處便見得陽氣發生其端已兆於此春了又冬冬了又春都從這裏發去事物間亦可見只是這裏見得較親切問動之端乃心之發處何故云天地之心曰此須就卦上看上坤下震坤是靜震是動十月純坤當貞之時萬物收歛寂无蹤跡到此一陽復生便是動然不直下動字却云動之端端又從此起雖動而物未生未到大叚動處凡發生萬物都從這裏起豈不是天地之心天地以生生為徳元亨利貞乃生物之心也但其靜而復乃未發之體動而通焉則已發之用一陽來復其始生甚微固若靜焉然其實動之機其勢日長而萬物莫不資始焉是天命流行之初造化發育之始天地生生不已之心於是而可見矣若其靜而未發則此心之體雖无所不在然却有未發處此程子所以以動之端為天地之心亦舉用以該其體爾程子説天地以生物為心最好此乃是无心之心也又曰天地若果无心則須牛生出馬桃樹上發李花他又却自定心便是主宰處所以謂天地以生物為心也又曰天地之心動後方見聖人之心應事接物方見程子云聖人无復故未嘗見其心且堯舜孔子之心千古常在聖人之心周流運行何往而不可見若言天地之心如春生發育猶是顯著此獨曰聖人无復未嘗見其心者只為是説復卦繫辭曰復小而辨於物盖復卦是一陽方生於羣隂之下如幽暗中一㸃白便是小而辨也聖人贊易而曰復見天地之心今人多言唯是復卦可以見天地之心非也六十四卦无非天地之心但於復卦忽見一陽之復故即此而贊之爾論此者當知有動靜之心有善惡之心各隨事而看今人乍見孺子將入於井因發動而見其惻隱之心未有孺子将入井之時此心未動只靜而已衆人物欲昏蔽便是惡厎心及其復也然後本然之善心可見聖人之心純於善而已所以謂未嘗見其心者只是言不見其有昏蔽忽明之心如所謂幽暗中一點白者而已但此等語話只可就此一路看去纔轉入别處便不分明也不可不知又曰天地之氣所以有陽之復者以其有隂故也衆人之心所以有善之復者以其有惡故也若聖人之心則天理渾然初无間斷人孰得以窺其心之起滅耶若靜而復動則亦有之但不可以善惡而為言耳復非天地心復則見天地心盖天地以生物為心而此卦之下一陽爻即天地所以生物之心也至於復之得名則以此陽之復生而已猶言臨泰大壯夬也但於其復而見此一陽之萌於下則是因其復而見天地之心耳伊川與濂溪説復字不同濂溪就坤上説就回來處説如云利貞者誠之復誠心復其不善之動而已矣皆是就歸來處説伊川却正就動處説如元亨利貞濂溪就利貞上説復字伊川就元字頭説復字以周易卦爻之義推之則伊川之説為正然濂溪伊川之説道理只一般非有所異只是所指地頭不同以復卦言之下靣一畫便是動處伊川云下靣一爻正是動如何説靜得看來伊川説得較好本義積隂之下一陽復生天地生物之心幾於滅息而至此乃復可見在人則為靜極而動惡極而善本心幾息而復見之端也程子論之詳矣而邵子之詩亦曰冬至子之半天心無改移一陽初動處萬物未生時𤣥酒味方淡大音聲正希此言如不信更請問包羲至哉言也學者宜盡心焉或問復見天地之心朱子曰三陽之時萬物蕃新只見物之盛大天地之心却不可見唯是一陽初復萬物未生冷冷靜靜而一陽既動生物之心闖然而見雖在積隂之中自掩藏不得此所以必於復見天地之心也又曰要説得見字親切盖此時天地之間无物可見天地之心只有一陽初生淨淨潔潔見得天地之心在此若是三陽發生萬物之後則天地之心盡散在萬物不能見得如此端的問生理初未嘗息但到坤時藏伏在此至復乃見其動之端否曰不是如此這箇只是就隂陽動靜闔闢消長處而言如一堆火自其初發以至漸漸發過消盡為灰其消之未盡處固天地之心也然那消盡厎亦天地之心也但那箇不如那新生厎鮮好故指那接頭再生者言之則可以見天地之心親切如云利貞者性情也一元之氣亨通發散品物流形天地之心盡發見在品物上但叢雜難看及到利貞時萬物悉已收歛那時只有箇天地之心丹青著見故云利貞者性情也正與復其見天地之心相似康節云一陽初動處萬物未生時盖萬物生時此心非不見也但天地之心悉已布散叢雜无非此理呈露到多了難見若㑹㸔者能於此觀之則所見无非天地之心矣唯是復時萬物皆未生只有一箇天地之心昭然著見在這裏所以易看也靜極而動聖人之復惡極而善常人之復但常人也有靜極而動厎時節聖人則不復有惡極而善之復問一陽之復在人言之只是善端萌處否曰以善言之是善端方萌處以惡言之昏迷中有悔悟向善意便是復如睡到忽然醒覺處亦是復氣象又如人之沉滯道不得行到極處忽小亨道雖未大行已有可行之兆亦是復這道理千變萬化隨所在无不渾淪問今寂然至靜在此若一念之動此便是復否曰恁地説不盡復有兩様有善惡之復有動靜之復兩様復自不相須須各看得分曉終日營營與萬物竝馳忽然有惻隱是非羞惡之心發見此善惡為隂陽也若寂然至靜之中有一念之動此動靜為隂陽也二者各不同須推敎子細問冬至子之半曰康節此詩最好故某於本義特載之盖立冬是十月初小雪是十月中大雪十一月初冬至十一月中小寒十二月初大寒十二月中冬至子之半即十一月之半也人言夜半子時冬至盖夜半以前一半已属子時今推五行者多不知之然數毎從這處起畧不差移此所以為天心然當是時一陽方動萬物未生未有聲臭氣味之可聞可見所謂𤣥酒味方淡大音聲正希也問天心无改移謂何曰年年歲歲是如此月月日日是如此一陽初動處萬物未生時此是欲動未動之間如怵惕惻隱於赤子入井之初方怵惕惻隱而未成怵惕惻隱之時故上云冬至子之半是康節常要就中間説子之半則是未成子方離於亥而為子方四五分是他常要如此説常要説隂陽之間動靜之間便與周程不同周程只是體用動靜互換无極康節只要説循環便須指消息動靜之間而言西溪李氏曰窮冬積隂之時幾於无生意矣而陽氣已動於黄泉之下猶之人焉方其物慾之深也幾於无天理矣而性善之端要不可泯也必有時而發就其發處觀之則天地之心見矣臨川吳氏曰草木不歛其液則不能以敷榮昆蟲不蟄其身則不能以振奮此人之所以貴於復而復之所以貴於靜也寂者感之君翕者闢之根冬之藏一歲之復也夜之息一日之復也喜怒哀樂之未發須臾之復也雲峯胡氏曰天地生物之心即人之本心也皆於幾熄而復萌之時見之本義辭尚簡要未嘗泛引古語此則全引康節詩殊有意也朱子詩曰忽然夜半一聲雷萬户千門次第開識得无中含有處許君親見伏羲來學者有得於此詩則可以知康節之詩矣象曰雷在地中復先王以至日閉關啇旅不行后不省方傳雷者隂陽相薄而成聲當陽之微未能發也雷在地中陽始復之時也陽始生於下而甚微安靜一作順而後能長先王順天道當至日陽之始生安靜以飬之故閉闗使商旅不得行人君不省視四方觀復之象而順天道也在一人之身亦然當安靜以飬其陽也程子曰聖人无一事不順天時故至日閉闗本義安靜以飬微陽也月令是月齋戒掩身以待隂陽之所定朱子曰一陽來復與雷在地中只是一義盖陽生於閉藏之中至微而未可有為之時也問陽始生甚微安靜而後能長故復之象曰先王以至日閉闗人於迷途之復其善端之萌亦甚微故須荘敬持飬然後能大不然復亡之矣曰然至日閉闗正是於已動之後要安靜以飬之盖一陽初復其氣甚微勞動他不得故當安靜以飬微陽如人善端初萌正欲靜以飬之方能盛大又曰古人所以四十強而仕者前靣許多年亦且飬其善端若一下便出來與事物袞了豈不壊事建安丘氏曰地靜雷動雷在地中靜飬動也闗宜開者也而閉之商旅出諸塗者也而不行古者歲十一月朔廵守而后於是日則不省方皆法雷在地中之義而飬微陽也丹陽都氏曰舜十一月朔廵守而此言后不省方則知廵守者是月也不省方者是月之至日也潛室陳氏曰一陽復於地下即是動之端但萌芽方動當靜以候之不可擾也故卦辭言出入无疾而象言閉闗息民盖動者天地生物之心而靜者聖人裁成之道也雙峯饒氏曰閉闗休息所以培飬生意使之深潜固密而无所泄于以順隂而固陽也推此以往則政事云為之間凡可以扶陽抑隂而參贊化育者必将无所不用其至矣雲峯胡氏曰安靜以飬微陽大象從事上説本義引月令從身上説其敎人之意深矣初九不逺復无祗悔元吉傳復者陽反來復也陽君子之道故復為反善之義初剛陽來復處卦之初復之最先者也是不逺而復也失而後有復不失則何復之有唯失之不逺而復則不至於悔大善而吉也祗宜音柢抵也玉篇云適也義亦同无祗悔不至於悔也坎卦曰祗既平无咎謂至既平也顔子无形顯之過夫子謂其庶幾乃无祗悔也過既未形而改何悔之有既未能不勉而中所欲不踰矩是有過也然其明而剛故一有不善未嘗不知既知未嘗不遽改故不至於悔乃不逺復也祗陸徳明音支玉篇五經文字羣經音辨竝見衣部本義一陽復生於下復之主也祗抵也又居事初失之未逺能復於善不抵於悔大善而吉之道也故其象占如此或問无祗悔祗字何訓朱子曰書中祗字只有這祗字使得别看來只是解做至字又有訓多為祗者如多見其不知量也多祗也祗與只同建安丘氏曰坤上震下為復上體乃坤而靜之時下體乃震而動之始初九又復而反之機初以一陽為五隂之主居復之最先不逺而復故不至於悔而得大善之吉者也復以修身唯不貳過之顔子其殆庶幾乎西溪李氏曰一陽在内天地之心性善之端也故六爻以復善為義南軒張氏曰復之初九震體也微動之時也當是時而能復焉則去无妄不逺矣及其守之固居之安則纎毫不萌即无妄也即誠也即天之道也即聖人之心也雲峯胡氏曰春秋公孫敖如京師不至而復公如晉至河乃復皆以不極其往為復復善貴早故易以不極其徃者言之善失之逺而復必至有悔唯失之未逺而即復所以不祗於悔元吉本義云大善而吉是從事上説一本作向善而吉是從心上説讀者詳焉象曰不逺之復以脩身也傳不逺而復者君子所以脩其身之道也學問一无問字之道无他也唯其知不善則速改以從善而已雙峯饒氏曰人之一心善端緜緜本自相續念慮之間雖或小有所差而其慊然不自安之意已萌於中是即天地生物之心之所呈露而孟子所謂怵惕惻隱之心者也人唯省察克治之功不加雖有為善之幾而无反善之實是以縱欲妄行而其悔至於不可追也善用力者誠能因是心之萌而速反之使不厎於悔焉則人欲去而天理還矣此不逺之復以脩身也六二休復吉傳二雖隂爻處中正而切比於初志從於陽能下仁也復之休美者也復者復於禮也復禮則為仁初陽復復於仁也二比而下之所以美而吉也本義柔順中正近於初九而能下之復之休美吉之道也哉問休復之吉以下仁也朱子曰初爻為仁人之體六二爻能下之謂附下於仁者學莫便於近乎仁既得仁者而親之資其善以自益則力不勞而學美矣故曰休復吉建安丘氏曰人不能皆賢親賢則賢矣六二下仁之謂也卦惟初九一爻為陽二非陽而能下之則隂變而陽小人變而君子而復之六二亦變為臨之九二矣烏得而不吉哉雲峰胡氏曰遯貴逺逺莫逺於上九而九五能比之故嘉遯遯之美者也徳貴不逺初曰不逺復而六二能比之故曰休復復之美者也里仁為美亦此意歟象曰休復之吉以下仁也傳為復之休美而吉者以其能下仁也仁者天下之公善之本也初復於仁二能親而下之是以吉也進齋徐氏曰仁謂初剛剛復於下在人則惻隱之心仁之端也初不逺復二從初而復故曰以下仁也南軒張氏曰易三百八十四爻未嘗言仁此獨言之夫子盖有深旨克己復禮為仁克其私心復其天理所以為仁二去初未逺上无係應能從初而復所以為下仁也至四但言以從道也而不謂之仁矣盖道者舉其大凡不若仁為切至也李氏閎祖曰天下之公是无一毫私心善之本是萬善從此出西山真氏曰伊川語録中説仁者以天地萬物為一體説得太寛无捉摸處易傳只云四徳之元猶五常之仁偏言則一事専言則包四者又云仁者天下之公善之本也只此兩處説仁極平正確實學者且當玩此此是程子手筆也六三頻復厲无咎傳三以隂躁處動之極復之頻數而不能固者也復貴安固頻復頻失不安於復也復善而屢失危之道也聖人開遷善之道與其復而危其屢失故云厲无咎不可以頻失而戒其復也頻失則為危屢復何咎過在失而不在復也本義以隂居陽不中不正又處動極復而不固屢失屢復之象屢失故危復則无咎故其占又如此誠齋楊氏曰頻復非危頻過為危復義故无咎聖人危其頻過故曰厲以警之開其頻復故曰无咎以勸之雲峯胡氏曰三上下進退之間故曰頻㢲以柔為主九三剛而不中失之失以其比柔故頻㢲復以剛為主六三柔而不中失之失以其比柔位剛故頻復然頻㢲吝頻復雖厲无咎此又不同也象曰頻復之厲義无咎也傳頻復頻失雖為危厲然復善之義則无咎也臨川吳氏曰頻雖有厲復則能補過矣故於義為无咎也六四中行獨復傳此爻之義最冝詳玩四行羣隂之中而獨能復自處於正下應於陽剛其志可謂善矣不言吉凶者盖四以柔居羣隂之間初方甚微不足以相援无可濟之理故聖人但稱其能獨復而不欲言其獨從道而必凶也曰然則不言无咎何也曰以隂居隂柔弱之甚雖有從陽之志終不克濟非无咎也本義四處羣隂之中而獨與初應為與衆俱行而獨能從善之象當此之時陽氣甚微未足以有為故不言吉然理所當然吉凶非所論也董子曰仁人者正其義不謀其利明其道不計其功於剝之六三及此爻見之徂徠石氏曰處上下四隂之中故曰中行不從其類而下應初故曰獨復節初徐氏曰中者隨時取義非一定之謂也就上下二卦則二五為中就五隂爻則四為中此所謂時中雲峯胡氏曰泰二夬五曰中行二五上下之中也益三四曰中行三四在一卦之中也此曰中行六四在五隂之中也然則二五之中中也或以三四為中隨時以取中也象曰中行獨復以從道也傳稱其獨復者以其從陽剛君子之善道也雲峯胡氏曰脩身以道脩道以仁小象曰脩身曰仁曰道惟初九當之白雲郭氏曰剝六三乃復六四反對其義相類在剥取其失上下以應乎陽在復則取其獨復以從道六五敦復无悔傳六五以中順之徳處君位能敦篤於復善者也故无悔雖本善戒亦在其中矣陽復方㣲之時以柔居尊下復无助未能致亨吉也能无悔而已本義以中順居尊而當復之時敦復之象无悔之道也節齋蔡氏曰敦厚也坤象復主初陽五雖與初无繫而處位得中能自厚於復者也可以无悔雲峯胡氏曰諸家於此爻皆輕看殊不知不逺復者善心之萌敦復者善行之固故初九无祗悔敦復則其復也无轉移可无悔矣又曰不逺復入徳之事也敦復其成徳之事歟隆山李氏曰易中陽長之卦凡在上隂柔之主則未嘗不附而順之无所於逆故復為一陽之長而六五則以敦復无悔臨為二陽之長而六五則以知臨為宜泰為三陽之長而六五則以帝乙歸妹為祉大壯為四陽之長而六五則以喪羊于易无悔諸卦六五爻大率皆以下順陽剛而得居上之體作易者當陽長之世以此垂訓要之皆所以為君子地云耳象曰敦復无悔中以自考也傳以中道自成也五以隂居尊處中而體順能敦篤其志以中道自成則可以无悔也自成謂成其中順之徳本義考成也建安丘氏曰二四待初而復故曰下仁曰從道五不待初而復故曰自考二四其學力之功五其天質之美歟上六迷復凶有災眚用行師終有大敗以其國君凶至于十年不克征傳以隂柔居復之終終迷不復者也迷而不復其凶可知有災眚災天災自外來眚已過由自作既迷不復善在已則動皆過失災禍亦自外而至盖所招也迷道不復无施而可用以行師則終有大敗以之為國則君之凶也十年者數之終至於十年不克征謂終不能行既迷於道何時而可行也或問伊川言災自外來眚自内作是否朱子曰看來只一般微有不同耳災是偶然生於彼者眚是過誤致然書曰眚災肆赦春秋曰肆大眚皆以其過誤而赦之也本義以隂柔居復終終迷不復之象凶之道也故其占如此以猶及也朱子曰上六迷復凶至于十年不克征這是箇極不好厎爻故其終如此凡言十年三年五年七月八月三月者想是象數中自有箇數如此故聖人取而言之問上六迷復至于十年不克征何如曰過而能改則亦可以進善迷而不復自是无説所以无往而不凶凡言三年猶是有箇期限到十年便是无説了進齋徐氏曰上六位高而无下仁之美剛逺而失遷善之機厚極而有難開之蔽柔終而无改過之勇是昏迷而不知復者也雲峯胡氏曰坤體而居上體之上先迷者也迷不特凶又有天災有人眚用行師終有大敗及其國君亦凶至于十年終不能行甚言迷復之不可也迷復與不逺復相反初不逺而復迷則逺而不復敦復與頻復相反敦无轉易頻則屢易獨復與休復相似休則比初獨則應初也十年不克征亦七日來復之反乾无十坤无一隂數極於六而七則又為乾之始陽數極於九而十則自為坤之終故凡言十年者坤終之象也屯十年乃字頤十年勿用皆互坤南軒張氏曰易之爻辭鮮有如是之詳其凶鮮有如是之極者而獨於復之上六言之盖自古亡家覆國反道敗徳无所不在其源起於一念之微不能制過之爾夫以隂柔之才去本之逺所謂人欲肆而天理滅者故有大敗終凶之戒也象曰迷復之凶反君道也傳復則合道既迷於復與道相反也其凶可知以其國君凶謂其反君道也人君居上而治衆當從天下之善乃迷於復反君之道也非止人君凡人迷於復者皆反道而凶也雲峯胡氏曰剝上九民所載也一陽在上指衆隂之為民復上六反君道也衆隂之極表一陽之為君建安丘氏曰復卦以初九為主其言不逺復无祗悔者喜一陽之來也其上五隂爻則有得乎陽者吉无得乎陽者凶二比初則曰下仁四應初則曰從道此皆有得乎陽者餘三隂无得乎陽者五去初雖逺以居得中位自厚於復无悔三處位不中以去初未逺頻失而頻復者也故雖厲而可以无咎獨上六一爻最逺乎初又居一卦之窮迷而不復者也故凶又曰初為明睿之君子知過則改上也二四為樂善之賢者舎己從人次也六五為不踐迹之善人自厚其身又其次也六三為改過不勇之人復而失失而復抑又其次也上六則物欲沈滯本心喪失下愚不移者也尚何復之可言哉民斯為下矣雙峯饒氏曰復卦辭専以氣數言爻辭専以人事言以氣數言則復有必亨之理如出入无疾朋來无咎皆是復之亨處其所以然者以反復其道七日來復故也此是氣數之常自然如此若以人事言則須不逺復與休復方吉敦復方无悔獨復亦可以免凶咎若頻復則雖厲而亦可以无咎迷復則必至於凶而有災眚矣此皆人事所致君子不可不慎也習靜劉氏曰動靜天道之復也善惡人道之復也故彖象言動靜之復六爻言善惡之復復者剛之反也自五及初皆以從剛為復五之自考不如四之從道四之從道不如二之下仁二之下仁不如初之脩身三頻復雖危猶知復也上迷復反道則不知復矣周易傳義大全卷九
