body:
  text: 周易傳義大全卷十九明胡廣等撰艮下巽上傳漸序卦艮者止也物不可以終止故受之以漸漸者進也止必有進屈伸消息之理也止之所生亦進也所反亦進也漸所以次艮也進以序為漸今人以緩進為漸進以序不越次所以緩也為卦上㢲下艮山上有木木之高而因山其高一有而字有因也其高有因乃其進有序也所以為漸也漸女歸吉利貞傳以卦才兼漸義而言也乾坤之變為㢲艮㢲艮重而為漸在漸體而言中二爻交也由二爻之交然後男女各得正位初終二爻雖不當位亦陽上隂下得尊卑之正男女各得其正亦得位也與歸妹正相對女之歸能如是之正則吉也天下之事進必以一作有漸者莫如女歸臣之進於朝人之進於事固當有序不以其序一作漸則陵節犯義凶咎隨之然以義之輕重廉耻之道女之從人最為大也故以女歸為義且男女萬事之先也一有利貞字諸卦多有利貞而所施或不同有渉不正之疑而為之戒者有其事必貞乃得其宜者有言所以利者以其有貞也所謂渉不正之疑而為之戒者損之九二是也處陰居説故戒以宜貞也有其事必貞乃得宜者大畜是也言所畜利於貞也有言所以利者以其有貞者漸是也言女歸之所以吉利於如此貞正也葢其固有非設戒也漸之義宜能亨而不云亨者葢亨者通達之義非漸進之義也本義漸漸進也為卦止於下而㢲於上為不遽進之義有女歸之象焉又自二至五位皆得正故其占為女歸吉而又戒以利貞也中溪張氏曰漸者進以序而不廹之義女㢲也適人為歸故曰女歸以二體言艮男下於㢲女亦為女歸之義故聖人取女歸以明漸進之象所以為吉然女歸固以漸為吉而其利尤在於得正也以中四爻而觀雖陰陽皆當位而三四相比非正應也唯二五相應為正故曰利貞漢上朱氏曰女謂嫁曰歸自内而外也漸專以女歸為義葢禮義廉恥之重天下國家之本无若女之歸也白雲郭氏曰女歸不以漸則奔也漸則為歸故女歸以漸為吉臨川呉氏曰㢲女在外將入而來歸艮男在内方止而未往迎有女歸以漸之象聘則為妻奔則為妾自納采問名納吉納徴請期親迎六禮備而後成婚女歸之以漸如此雲峯胡氏曰咸取女吉取者之占也漸女歸吉嫁者之占也然皆以貞艮為主艮止也止而悦則其感也以正是為取女之吉止而㢲則其進也以正是為女歸之吉彖曰漸之進也女歸吉也傳如漸之義而進乃女歸之吉也謂正而有漸也女歸為大耳他進亦然本義之字疑衍或是漸字瀘川毛氏曰易未有一義明兩卦者晉進也漸亦進何也漸非進以漸而進耳進得位往有功也傳漸進之時而陰陽各得正位進而有功也四復由上進而得正位三離下而為上遂得正位亦為進得位之義一有是往而有功也六字進以正可以正邦也傳以正道而進可以正邦國至於天下也凡進於事進於徳進於位莫不皆當以正也本義以卦變釋利貞之意葢此卦之變自渙而來九進居三自旅而來九進居五皆為得位之正楊氏曰聖人於漸以敦風化乎執此道仕進則无干禄慕位之恥无假塗㨗徑之患以此而進則得位以此而往則有功其位剛得中也傳上云進得位往有功也統言陰陽得位是以進而有功復云其位剛得中也所謂位者五以剛陽中正得尊位也諸爻之得正亦可謂之得位矣然未若五之得尊位故特言之本義以卦體言謂九五也中溪張氏曰進以正可以正邦者家道正而天下定也非五居尊位剛而得中能如是乎止而㢲動不竆也傳内艮止外㢲順止為安静之象㢲為和順之義人之進也若以欲心之動則躁而不得其漸故有困竆在漸之義内止静而外㢲順故其進動不有一作至困竆也本義以卦徳言漸進之義東平劉氏曰夫物未有進而不上竆者動而不竆者惟漸為然止乎下而㢲以行之是以動不竆也中溪張氏曰艮止於内而㢲以行之動而不暴則不至於困窮也象曰山上有木漸君子以居賢徳善俗傳山上有木其高有因漸之義也君子觀漸之象以居賢善之徳化美於風俗人之進於賢徳必有其漸習而後能安非可陵節而遽至也在己且然敎化之於人不以漸其能入乎移風易俗非一朝一夕所能成故善俗必以漸也本義二者皆當以漸而進疑賢字衍或善下有脫字朱子曰山上有木木漸長則山漸高所以為漸楊氏曰地中生木以時而升山上有木其進以漸君子知木者至微之物猶不可以不漸而況於居賢徳善俗乎居賢徳而以漸修而後至勤而後精此楊子雲所謂始乎為士終乎為聖也善俗而以漸期而始變久而後成此孔子所謂善人為邦百年可以勝殘去殺矣雲峯胡氏曰居徳象艮之止不漸豈能遽止善俗象巽之入不漸豈能遽入建安丘氏曰夬居徳則忌而漸言居賢徳何也葢夬以潰決為義漸以積累為義故也初六鴻漸于干小子厲有言无咎傳漸諸爻皆取鴻象鴻之為物至有時而羣有序不失其時序乃為漸也干水湄水鳥止於水之湄水至近也其進可謂漸矣行而以時乃所謂漸漸一无漸字進不失漸得其宜矣六居初至下也陰之才至弱也而上无應援以此而進常情之所憂也君子則深識逺照知義理之所安時事之所宜處之不疑小人幼子唯能見已然之事從衆人之一有所字知非能燭理也故危懼而有言葢不知在下所以有進也用柔所以不躁也无應所以能漸也於義自无咎也若漸之初而用剛急進則失漸之義不能進而有咎必矣本義鴻之行有序而進有漸干水涯也始進於下未得所安而上復无應故其象如此而其占則為小子厲雖有言而於義則无咎也中溪張氏曰漸之六爻皆以鴻取義鴻水鳥也木落南翔氷泮北徂其往來也有時其先後也有序漸之象也干者水之湄也鴻為水宿之物初在卑下有鴻漸于干之象建安丘氏曰當漸之始以水鳥而止于水湄其進不驟得漸之義矣張子曰鴻漸之始出至于干鴻鵠之志非小小所量見其出陸争欲危之且疑其所處之非君子信己而行義无咎也雲峯胡氏曰三至四互坎故初有水涯之象艮少男故有小子象或曰鴻之飛長在前而幼在後幼者惟恐失羣故危之而號呼長者必緩飛以俟之故為小子厲有言之象以占者則小子在下未可遽進而進鴻之幼者不若也象曰小子之厲義无咎也傳雖小子以為危厲在義理實无咎也六二鴻漸于磐飲食衎衎吉衎苦旦反傳二居中得正上應於五進之安裕者也但居漸故進不速磐石之安平者江河之濱所有象進之安自干之磐又漸進也二與九五之君以中正之道相應其進之安固平易莫加焉故其飲食和樂衎衎然吉可知也本義磐大石也漸逺於水進於磐而益安矣衎衎和樂意六二柔順中正進以其漸而上有九五之應故其象如此而占則吉也雲峯胡氏曰艮為石故有磐象互坎有飲食象鴻食則呼衆飲食衎衎和鳴二柔順而有應之象初始進於下未得所安二則自干進於磐未安者安矣初之小子厲有言危而傷也二飲食衎衎安且樂矣時使之然也在初則無應在二則柔順中正而上有九五之應也中溪張氏曰凡禽鳥之食也俛而啄仰而四顧一或驚心則飛而去之今鴻漸而進由于干而處于磐之上高而不危飲食衎衎何其吉也二與五為正應進居大臣之位猶鴻漸于磐也安然飲食有衎衎和樂之意其吉可知象曰飲食衎衎不素飽也傳爻辭以其進之安平故取飲食和樂為言夫子恐後人之未喻又釋之云中正君子遇中正之主漸進于上將行其道以及天下所謂飲食衎衎謂其得志和樂不謂空飽飲一无飲字食而已素空也本義素飽如詩言素飡得之以道則不為徒飽而處之安矣臨川呉氏曰待可進而進非徒飽於飲食以自養而已誠齋楊氏曰鴻自干而至于磐石之上則安而高矣此六二漸進而居大臣之位也食君之禄又豈素飡云乎亦欲置國家於磐石之安納人民於和衎之樂而已故傅説之志在中興有商而非后則不食其禄孟子之志在平治天下而食前方丈則得志不為九三鴻漸于陸夫征不復婦孕不育凶利禦宼傳平高曰陸平原也三在下卦之上進至於陸也陽上進者也居漸之時志將漸進而上无應援當守正以俟時安處平地則一无則字得漸之道若或不能自守欲有所牽志有所就則失漸之道四陰在上而密比陽所説也三陽在下而相親陰所從也二爻相比而无應相比則相親而易合无應則无適而相求故為之戒夫陽也夫謂三三若不守正而與四合是知征而不知復征行也復反也不復謂不反顧義理婦謂四若以不正而合則雖孕而不育葢非其道也如是則凶也三之所利在於禦宼非理一作禮而至者宼也守正以閑邪所謂禦宼也不能禦宼則自失而凶矣進齋徐氏曰夫謂三婦謂四與小畜同義三四位皆不中相比而无應相比則相親而易合无應則无適而相求征往也孕得陽也鄭氏剛中曰三上无應而親四四下无應而奔三三務進而妄動故征則不可還四失守而私交故孕則不敢育雙湖胡氏曰嘗合卦爻辭觀之卦辭女歸吉者以三四兩爻也爻辭夫婦凶者亦三四兩爻也卦以兩體論巽女有歸艮男之象爻以應否論當相應之位者為正不當相應之位者為邪四女无歸三男之理也特相比而相得為私情之相合耳此卦但言女歸不言取女不得與咸例論其謹始之意已可見於言外矣本義鴻水鳥陸非所安也九三過剛不中而无應故其象如此而其占夫征則不復婦孕則不育凶莫甚焉然以其過剛也故利禦宼朱子曰漸九三爻雖不好夫征不復婦孕不育却利禦宼今術家擇日利婚姻底日不宜用兵利相戰底日不宜婚姻正是此意葢用兵則要相殺相勝婚姻則要和合故用有不同也中溪張氏曰三處艮體之上猶鴻自于干于磐而進至于高平之陸也雲峯胡氏曰夫征不復者三恱四之陰往不以事也婦孕不育者四從三之陽合不以正也其凶也宜矣爻因彖言女歸之吉故又以此𤼵明為夫婦之所以凶者以為戒也然以九三之剛而比六四之柔則為夫婦不正之象九三倘能以其剛而遏六四之柔則又自有禦宼之象也或曰鴈羣不亂止則相保亦有禦宼象進齋徐氏曰此爻占凶凡皆不利唯利禦宼謂情好相比可濟患難也象曰夫征不復離羣醜也婦孕不育失其道也利用禦宼順相保也離力智反傳夫征不復則失漸之正從欲而失正離叛其羣類為可醜也卦之諸爻皆无不善若獨失正是離其羣類婦孕不由其道所以不育也所利在禦宼謂以順道相保君子之與小人比也自守以正豈唯君子自完其己而已乎亦使小人得不陷於非義是以順道相保禦止其惡故曰禦宼朱子曰順相保也言須是上下同心協力相保聚方足以禦宼六四鴻漸于木或得其桷无咎傳當漸之時四以陰柔進據剛陽之上陽剛而上進豈能安處陰柔之下故四之處非安地如鴻之進一作漸于木也木漸高矣一无矣字而有不安之象鴻趾連不能握枝故不木棲桷橫平之柯唯平柯之上乃能安處謂四之處本危或能自得安寧之道則无咎也如鴻之于木本不安或得平柯而處之則安也四居正而㢲順宜无咎者也必以得失言者因得失以明其義也本義鴻不木棲桷平柯也或得平柯則可以安矣六四乗剛而順巽故其象如此占者如之則无咎也雲峯胡氏曰巽為木而處艮山之上九三之前三以一陽畫衡于下有桷之象鴻漸于此則愈高矣鴻之掌不能握木木雖高非鴻所安也然陰居陰得正如於木之中或得平柯而處之則亦安矣故无咎臨川呉氏曰鴻水鳥而乗風以飛下卦艮止而有坎水故下三爻之象曰干曰磐曰陸皆鴻之漸進而止于水際者也上卦㢲為風為高故上三爻之象曰木曰陵曰逵皆鴻之漸進而飛于風中者也象曰或得其桷順以㢲也傳桷者平安之處求安之道唯順與巽若其義順正其處卑㢲何處而不安如四之順正而㢲乃得桷也九五鴻漸于陵婦三歳不孕終莫之勝吉傳陵高阜也鴻之所止最高處也象君之位雖得尊位然漸之時其道之行固亦非遽與二為正應而中正之徳同乃隔於三四三比二四比五皆隔其交者也未能即合故三歳不孕然中正之道有必亨之理不正豈能隔害之故終莫之能勝但其合有漸耳終得其吉也以不正而敵中正一時之為耳久其能勝乎本義陵高阜也九五居尊六二正應在下而為三四所隔然終不能奪其正也故其象如此而占者如是則吉也沙隨程氏曰二五當位非三所能抗終莫之勝是以吉也開封耿氏曰剛上柔下是以物終莫之勝中溪張氏曰鴻漸于陵陵為高阜下視于磐于陸則于陵為最高此人君處九五位之象也况五與二為正應則二乃五之婦二漸進以歸於五也雖三欲塞之四欲間之歴三歳而不孕然二五以中正之道相應必得遂其室家之願彼不中不正者終莫能奪而勝之宜其吉也卦以㢲為女艮為男而爻以五為夫二為婦者葢以二五陰陽相應而言取義不同此其所以為變易也雲峯胡氏曰三與五皆言婦五以二為婦正也三與四為婦非正也三四相比而為夫婦婦雖孕而不敢育女歸之不以漸者也故凶二五相應而為夫婦婦雖孕而三四莫能勝女歸之以其漸者也故吉周公於三五二爻言婦之吉凶而卦辭所謂女歸吉者愈明矣象曰終莫之勝吉得所願也傳君臣以中正相交其道當行雖有間其閒者終豈能勝哉徐必得其所願乃漸之吉也臨川呉氏曰中正相應乃二五所願其合雖遲終得其所願也上九鴻漸于陸其羽可用為儀吉傳安定胡公以陸為逵逵雲路也謂虛空之中爾雅九逹謂之逵逵通逹无阻蔽之義也上九在至高之位又益上進是出乎位之外在他時則為過矣於漸之時居㢲之極必有其序如鴻之離所止而飛于雲空在人則超逸乎常事之外者也進至於是而不失其漸賢逹之高致也故可用為儀法而吉也羽鴻之所用進也以其進之用况上九進之道也本義胡氏程氏皆云陸當作逵謂雲路也今以韻讀之良是儀羽毛旌纛之飾也上九至高出乎人位之外而其羽毛可用以為儀飾位雖極高而不為无用之象故其占為如是則吉也鄭氏剛中曰鳥羽皆有用而各有所取雉取其綵鷺取其白鴻取其知時取其羽以為儀則則君子進退去就之義亦孰得而亂之可觀以為法矣建安丘氏曰上九居漸之極猶鴻自江干漸進于此而雲飛也羽乃鴻所用以進者而其進莫不有漸可以為儀也賢逹之人進處高潔不累於位非外物之所能屈其心而亂其志斯亦足以為天下之儀表矣何吉如之雲峯胡氏曰鴻進以漸而不失其時翔以羣而不失其序所謂進退可法者也而獨於上爻言之者要其終而不可亂也大抵无位者多无用上九猶賢逹之高致其用可以為法雖高而无位然不為无用也故其象占如此或曰自子午以東為陽子午以西為陰由艮逹㢲子午以東陽氣之地也立春以後鴻雁來故六爻皆係以鴻鴈隨陽之鳥也然龍為陽物乾至上則亢漸至上則吉何也乾以六陽之極故過高而亢漸三陰三陽之進有序故致高而吉也象曰其羽可用為儀吉不可亂也傳君子之進自下而上由微而著跬歩造次莫不有序不失其序則无所不得其吉故九雖窮高而不失其吉可用為儀法者以其有序而不可亂也本義漸進愈高而不為无用其志卓然豈可得而亂哉雲峯胡氏曰本義獨釋二與上兩爻象傳葢以二居有用之位有益於人之國家而非素飽者上在无位之地亦足為人之儀表而非无用者二志不在溫飽上志卓然不可亂士大夫之出處於此當有取焉建安丘氏曰六爻皆以鴻為象鴻水鳥也初言于干進之始也二言于磐則進于干矣三言于陸則又進于磐矣至四于木五于陵則鴻之漸愈高而无可進之地故以鴻飛為象言逵者以其在天位之外也然漸卦以女歸為義故中四爻有夫婦之象五與二應夫婦之正配也故以婦三歳不孕終莫之勝為象三與四比夫婦之邪匹也故以婦孕不育失其道也為象葢夫婦之交亦當以漸夫苟患正配之難合而樂邪匹之易從則亦失漸之義矣兌下震上傳歸妹序卦漸者進也進必有所歸故受之以歸妹進則必有所至故漸有歸義歸妹所以繼漸也歸妹者女之歸也妹少女之稱為卦震上兌下以少女從長男也男動而女説又以説而動皆男説女女從男之義卦有男女配合之義者四咸恒漸歸妹也咸男女之相感也男下女二氣感應止而說男女之情相感之象恒常也男上女下㢲順而動陰陽皆相應是男女居室夫婦唱隨之常道漸女歸之得其正也男下女而各得正位止静而㢲順其進有漸男女配合得其道也歸妹女之嫁歸也男上女下女一无女字從男也而有說少之義以説而動動以説則不得其正矣故位皆不當初與上雖當陰陽之位而陽在下陰在上亦不當位也與漸正相對咸恒夫婦之道漸歸妹女歸之義咸與歸妹男女之情也咸止而說歸妹動於說皆以說也恒與漸夫婦之義也恒㢲而動漸止而㢲皆以㢲順也男女之道夫婦之義備於是矣歸妹為卦澤上有雷雷震而澤動從之象也物之隨動莫如水男動於上而女從之嫁歸從男之象震長男兌少女少女從長男以説而動動而相說也人之所說者少女故云妹為女歸之象又有長男說少女之義故為歸妹也雙湖胡氏曰漸以長女歸少男歸嫁也長女嫁少男而歸之也主六四一爻言故曰女歸女之歸男則女自内而外也歸妹以長男歸少女歸取也長男取少女而來歸也主九四一爻言故曰歸妹男之歸女則女自外而内也歸妹征凶无攸利傳以説而動動而不當故凶不當位不當也征凶動則凶也如卦之義不獨女歸无所往而利也本義婦人謂嫁曰歸妹少女也兌以少女而從震之長男而其情又為以說而動皆非正也故卦為歸妹而卦之諸爻自二至五皆不得正三五又皆以柔乗剛故其占征凶而无所利也丹陽都氏曰男女之相從正則吉而中爻之才剛柔雜居非所謂正如是而有行非禮法之所容也故征凶夫婦之相與順則利而六爻之才柔上剛下非所謂順如是而有為非室家之宜也故无攸利雲峯胡氏曰彖辭唯臨與井言凶否與剥言不利言凶者未嘗言不利言不利者未嘗言凶歸妹既曰征凶又无攸利何也以説而動非情之正恣情肆欲何所不至故六十四卦中其不吉未有若是之甚者聖人著之以為世戒也然隨亦動而説者而曰元亨利貞何也易以内卦為貞隨貞震此動而彼説歸妹貞兌女說而男動故不同也彖曰歸妹天地之大義也傳一陰一陽之謂道陰陽交感男女配合天地之常理也歸妹女歸於男也故云天地之大義也男在女上陰從陽動故為女歸之象天地不交而萬物不興歸妹人之終始也傳天地不交則萬物何從而生女之歸男乃生生相續之道男女交而後有生息有生息而後其終不窮前者有終而後者有始相續不窮是人之終始也本義釋卦名義也歸者女之終生育者人之始朱子曰兩終字伊川説未安雙湖胡氏曰天地不交萬物不興反其辭也卦自泰來乾九三交坤而為九四坤六四交乾而為六三是天地交也出震見離説兌勞坎是萬物興也兌為少女豈非女之終乎震為長男豈非男之始乎是歸妹人之終始也中溪張氏曰女子之嫁子道終於此母道始於此説以動所歸妹也本義又以卦徳言之朱子曰歸妹未有不好只是說以動帶累他征凶位不當也傳以二體釋歸妹之義男女相感說而動者少女之事故以說而動所歸者妹也所以征則凶者以諸爻皆不當位也所處皆不正何動而不凶大率以說而動安有不失正者无攸利柔乘剛也傳不唯位不當也又有乘剛之過三五皆乘剛男女有尊卑之序夫婦有唱隨之禮此一无此字常理也如恒是也苟不由常正之道徇情肆欲唯說是動則夫婦瀆亂男牽欲而失其剛婦狃說而忘其順如歸妹之乘剛是也所以凶无所往而利也夫陰陽之配合男女之交媾理之常也然從欲而流放不由義理則淫邪无所不至傷身敗徳豈人理哉歸妹之所以一有征字凶也本義又以卦體釋卦辭男女之交本皆正理唯若此卦則不得其正也嵩山晁氏曰以爻位推之二四以陽居陰有男以不正從女之象三五以陰居陽有女以不正從男之象行皆失正故為征凶上卦以六五乘九四下卦以六三乘九二有夫屈于婦婦制其夫之象故為无攸利也進齋徐氏曰位不當則紊男女内外之正柔乘剛則悖夫婦唱隨之理所以征凶而无攸利也雙湖胡氏曰嘗合隨卦觀之隨與歸妹兌震易位者也動而說為隨此陽倡而陰和男行而女隨得男女之正故元亨利貞說以動為歸妹則是陰反先倡而陽和女反先行而男從失男女之正故征凶无攸利柔乘剛柔謂三五剛謂二四皆陰陽失位也雲峯胡氏曰漸歸妹相反在三四兩爻漸之六自三之四為進得位歸妹之六自四之三為位不當漸自三至五皆得位之正歸妹自二至五皆不得位漸止而㢲其動也不窮歸妹說以動其征也必凶漸以九五為剛得中歸妹六五亦柔得中也不書抑陰也漸剛乘柔不書歸妹柔乗剛則書亦抑陰也漸之女歸亦天地之大義而人之終始亦不書止而㢲者其常也說以動者非常也彖傳之意若曰歸妹天地之大義人之終始也本非凶也本无所謂不利也惟陰之說而陽動焉所以征凶所以无攸利也故抑之又抑之象曰澤上有雷歸妹君子以永終知敝傳雷震於上澤隨而動陽動於上陰說而從女從男之象也故為歸妹君子觀男女配合生息相續之象而以永其終知有敝也永終謂生息嗣續永久其傳也知敝謂知物有敝壊而為相繼之道也女歸則有生息故有永終之義又夫婦之道當常永有終必知其有敝壊之理而戒慎之敝壊謂離隙歸妹說以動者也異乎恒之㢲而動漸之止而㢲也少女之說情之感動動則失正非夫婦正而可常之道久必敝壊知其必敝則當思永其終也天下之反目者皆不能永終者也不獨夫婦之道天下之事莫不有終有敝莫不有可繼可久之道觀歸妹則當思永終之戒也本義雷動澤隨歸妹之象君子觀其合之不正知其終之有敝也推之事物莫不皆然建安丘氏曰雷震澤上水氣隨之而升女子從人之象也永終知敝謂婚姻之道欲其永逺而有終也必預有以知其不終之敝女子從人以説而動至於失身敗徳不能永其所終者多矣所謂華落色衰復相棄背者是也而原其所以則由奔誘而為夫婦徇情肆欲之所致而不知其敝之過也向使於說動之時而為永終知敝之戒則无此失矣中溪張氏曰物生必有終有以永之則不終事久必有敝有以知之則不敝然永之非艱而知之唯難苟能知其敝斯可以永其終而君子偕老矣雲峯胡氏曰澤中有雷雷隨澤止君子嚮晦宴息取其止也澤上有雷澤隨雷動君子永終知敝戒其動也初九歸妹以娣跛能履征吉傳女之歸居下而无正應娣之象也剛陽在婦人為賢一作堅貞之徳而處卑順娣之賢正者也處説居下為順義娣之卑下雖賢何所能為不過自善其身以承助其君而已如跛之能履言不能及逺也然在其分為善故以是而行則吉也本義初九居下而无正應故為娣象然陽剛在女子為賢正之徳但為娣之賤僅能承助其君而已故又為跛能履之象而其占則征吉也蘭氏廷瑞曰跛者不能以專行依人乃可娣妾之道承正室以行則吉節齋蔡氏曰无應不行故跛居位當而近二故能履適三而媵五得娣之正故征吉隆山李氏曰古者諸侯一娶九女嫡夫人及左右媵皆以姪娣從聖人制禮必以姪娣充媵者所以廣國嗣使所自出者一同而无他異也進齋徐氏曰三爻同處于下有娣從之象雲峯胡氏曰卦辭征凶初爻之辭征吉何也以一卦論則以説而動故其征也凶即此一爻論初以剛居剛是女子而有賢正之徳者故征吉然為女而在下无應非匹也媵也為媵雖賢正僅能承助其君不能大有所行也故有跛能履之象象如此而占吉以有徳故也象曰歸妹以娣以恒也跛能履吉相承也傳歸妹之義以説而動非夫婦能常之道九乃剛陽有賢一作堅貞之徳雖娣之微乃能以常者也雖在下不能有所為如跛者之能履然征而吉者以其能相承助也能助其君娣之吉也本義恆謂有常久之徳建安丘氏曰卦辭言歸妹征凶者葢歸妹以説而動故征則凶也初九歸妹以娣反言征吉者葢初九以常徳承君故征則吉也九二眇能視利幽人之貞傳九二陽剛而得中女之賢正一作貞者也上有正應而反隂柔之質動於説者也乃女賢而配不良故二雖一作之賢不能自遂以成其内助之功適可以善其身而小施之如眇者之能視而己言不能及逺也男女之際當以正禮五雖不正二自守其幽静貞正乃所利也二有剛正之徳幽静之人也二之才如是而言利貞者一无此五字利言宜於如是之貞一无之貞字非不足而為之戒也本義眇能視承上爻而言九二陽剛得中女之賢也上有正應而反隂柔不正乃女賢而配不良不能大成内助之功故為眇能視之象而其占則利幽人之貞也幽人亦抱道守正而不偶者也誠齋楊氏曰諸爻言歸妹二獨不言者以二下卦之尊即妹之身也幽人賢徳之稱言少妹之幽貞也幽則至静而不可動貞則至潔而不可渝皆陽剛中正之徳也厚齋馮氏曰二以其陽明居兌體故以眇能視為象剛中而位陰故以利幽人之貞為占言有望於君而未偶守正於内而未行宜固守其正者也雙湖胡氏曰九二以陽爻居陰位又為兌體而居下卦之中故有幽人之象以其不正故又戒之以利貞雲峯胡氏曰初曰跛能履此曰眇能視承初而言也九二陽剛得中女之賢者也上有正應則非初之娣矣在娣則不能有行非娣而亦眇能視何也九二剛中而上應六五隂柔不正是女之賢而不遇其夫如豐之六二文明而上應六五之柔暗臣之賢而不遇其君者也故豐曰日中見斗此曰眇能視其見其視由於彼而不由於此也履亦下兌六三眇能視跛能履刺之也此分言於初二憫之也履九二曰幽人征吉此亦曰利幽人之貞皆以近於三故也六三隂柔不中正二獨以剛中自守履之三武人為于大君不貞者也然後見二為君子之幽貞歸妹之三反歸以娣不貞者也然後見二為女子之幽貞象曰利幽人之貞未變常也傳守其幽貞未失夫婦常正之道也世人以媟狎為常故以貞静為變常不知乃常久之道也滿氏曰守其幽静之正以奉承乎五可謂賢矣幽女徳也未變女徳之常也世之悍婦庸奴其夫者由有才而不知道也建安丘氏曰娣之從嫡必當如跛者之履而不足以與行則无僭上之疑而嫡妾之分明妻之従夫必當如眇者之視而不足以有明則无反目之嫌而夫婦之倫正是妾婦之常道也釋象於初曰以恒於二曰未變常唯各安其常此初之所以吉二之所以利歟六三歸妹以須反歸以娣傳三居下之上本非賤者以失徳而无正應故為欲有歸而未得其歸須待也待者未有所適也六居三不當位徳不正也柔而尚一作上剛行不順也為說之主以說求歸動非禮也上无應无受之者也无所適故須也女子之處如是人誰取之不可以為人配矣當反歸而求為娣媵則可也以不正而失其所也本義六三陰柔而不中正又為說之主女之不正人莫之取者也故為未得所適而反歸為娣之象或曰須女之賤者進齋徐氏曰須待也三本非賤者无應宜待而急於従人不得為人配而反歸為娣是自賤也夫人志在禄位而不自重欲速好進而甘於卑下卒為人所賤者何以異此哉漢上朱氏曰天官書須女四星賤妾之稱織女三星天女也陸震云天文織女貴須女賤則須賤女可知雲峯胡氏曰初九居下娣也六三居下之上非娣也陰柔而不中正又為兌說之主无徳之女也无徳之女人无取之者故本宜須而反歸以娣也初之吉二之利皆以徳取六三无徳彖所謂征凶无攸利不言可知矣象曰歸妹以須未當也傳未當者其處其徳其求歸之道皆不當故无取之者所以須也建安丘氏曰六三陰柔不正而上无正應无受之者故以須而從二然二剛中而應五小君之貴也而已乗之如此則是以卑賤之妾驕而上僭其為二所棄必矣在三不若反歸于下如初之為以娣媵之禮事之則為當位而无驕僭之患象言未當者以六居三柔乗剛賤陵貴皆未當之義九四歸妹愆期遲歸有時傳九以陽居四四上體地之高也陽剛在女子為正徳賢明者也无正應未得其歸也過時未歸故云愆期女子居貴高之地有賢明之資人情所願娶故其愆期乃為有時葢自有待非不售也待得佳配而後行也九居四雖不當位而處柔乃婦人之道一有也字以无應故為愆期之義而聖人推理以女賢而愆期葢有待也本義九四以陽居上體而无正應賢女不輕從人而愆期以待所歸之象正與六三相反節初齊氏曰九四正歸妹者也而曰歸妹愆期剛履柔而能從容俟時以全其妹之正者也詩曰士如歸妻迨氷未泮故家語云霜降多婚氷泮殺止震則氷泮矣而猶曰遟歸有時非愆期乎隆山李氏曰三四雖无應而震兌終相合故曰遟歸有時雲峯胡氏曰六三九四皆失位无應三以其无應也急於從人而反歸以娣四雖无應不輕從人而愆期遟歸何其相反如此之甚哉三陰柔不中正為无女徳者四剛健在女則為賢明有徳者也士之自賤自貴如之象曰愆期之志有待而行也傳所以愆期者由己而不由彼賢女人所願娶所以愆期乃其志欲有所待待得佳配而後行也六五帝乙歸妹其君之袂不如其娣之袂良月幾望吉傳六五居尊位妹之貴高者也下應於二為下嫁之象王姬下嫁自古而然至帝乙而後正婚姻之禮明男女之分雖至貴之女不得失柔㢲之道有貴驕之志故易中陰尊而謙降者則曰帝乙歸妹泰六五是也貴女之歸唯謙降以從禮乃尊高之徳也不事容飾以說於人也娣媵者以容飾為事者也衣袂所以為容飾也六五尊貴之女尚禮而不尚飾故其袂不及其娣之袂良也良美好也月望陰之盈也盈則敵陽矣幾望未至於盈也五之貴高常不至於盈極則不亢其夫乃為吉也女之處尊貴之道也本義六五柔中居尊下應九二尚徳而不貴飾故為帝女下嫁而服不盛之象然女徳之盛无以加此故又為月幾望之象而占者如之則吉也朱子曰易中言帝乙歸妹箕子明夷高宗伐鬼方之類疑皆當時帝乙高宗箕子曽占得此爻故後人因而記之而聖人以入爻也如漢書大橫庚庚余為天王夏啓以光亦是啓曽占得此爻也火珠林亦如此月幾望是説陰盛丹陽都氏曰月者至陰之精而羣陰之主女君之象也幾望言女君之謙盛而未盈也望則盈矣吉宜家之謂也節初齊氏曰袂衣袖君小君堯降二女于溈汭而後世一稱湘君一稱夫人嫡例為君而餘皆媵也雲峯胡氏曰娣以容飾為事五君也豈假容飾以悦人者故曰其君之袂不如其娣之袂良良在徳而不在袂也下三陽皆以女徳稱六五柔中居尊下應九二是帝之女而下嫁者也而不盛其服飾徳之盛无以加于此矣故又取月幾望之象月幾望在小畜中孚以位言陰盛而與陽亢也在歸妹以徳言陰盛而可與陽對也本義於二與四皆以女之賢稱於初則曰在女則為賢正之徳於五則曰女徳之盛无以加此其旨深哉象曰帝乙歸妹不如其娣之袂良也其位在中以貴行也傳以帝乙歸妹之道言其袂不如其娣之袂良尚禮而不尚飾也五以柔中在尊高之位以尊貴而行中道也柔順降屈尚禮而不尚飾乃中道也本義以其有中徳之貴而行故不尚飾雲峯胡氏曰本義於漸獨釋二與上之象於歸妹獨釋初與五之象歸妹漸之反漸之上以无應為高尚之賢歸妹之初以无應為賢正之娣漸之二為臣志不在於溫飽即歸妹之五為君徳不在於飾本義謂二有恒久之徳五有中徳之貴提出兩徳字真足為女之説以動者戒矣士大夫之輕動當如何哉上六女承筐无實士刲羊无血无攸利刲苦圭反傳上六女歸之終而无應女歸之无終者也婦者所以承先祖奉祭祀不能奉祭祀則不可以為婦矣筐篚之實婦職所供也古者房中之俎葅歜一作醯之類后夫人職之諸侯之祭親割牲卿大夫皆然割取血以祭禮云血祭盛祭也女當承事筐篚而充實无實則无以祭謂不能奉祭祀也夫婦共承宗廟婦不能奉祭祀乃夫不能承祭祀也故刲羊而无血亦无以祭也謂不可以承祭祀也婦不能奉祭祀則當離絶矣一无矣字是夫婦之无終者也何所往而利哉本義上六以陰柔居歸妹之中而无應約婚而不終者也故其象如此而於占為无所利也隆山李氏曰三上二爻皆陰不能相合為夫婦故止以士女稱之古者婦助祭必有筐篚實蘋藻之類而諸侯卿大夫躬割牲所以重宗廟之祀盡繼承之道今三上无應承筐无實刲羊无血是夫婦之禮不成而祭祀无主矣雲峯胡氏曰震有虚筐象兌羊象上與三皆隂虚无應故有承筐无實刲羊无血之象程傳以為女歸之无終本義以為約婚而无終葢曰士曰女未成為夫婦也先女而後士罪在女矣故无攸利之占與卦辭同而有不同者卦以六來居三失夫婦之正故无攸利爻以三上不相應是約婚而不終故无攸利然其歸罪於兌之陰則一也象曰上六无實承虛筐也傳筐无實是空筐也空筐可以祭乎言不可以奉祭祀也女不可以承祭祀則離絶而已是女歸之无終者也董氏曰象不及刲羊无血者卦為歸妹設也建安丘氏曰震長男也兌少女也以少女從長男歸妹之象也合六爻論之五言帝乙于歸妹之上則歸妹之主也二與五應居内卦之中而不言歸妹者則正妹之身也初三乃妹之娣媵皆稱娣于歸妹之下初在二下即娣之以吉相承于妹者三在二上即娣之以賤而躐居於貴者二以少女之身幽静之節體陰而性陽質柔而徳剛皆常徳之不可變者其妹之賢者乎而五以帝乙之賢居柔履謙而歸其妹以徳禮為光華而不以衣服為容飾故曰其君之袂不如其娣之袂良也初以陽明安分為美三以柔邪上僭為嫌二又能不矜其才自遜其美何吉如之在九四為二五正應之間則言歸妹之愆期上陰柔處一卦之極則泛言夫婦之无終而不言歸妹離下震上傳豐序卦得其所歸者必大故受之以豐物所歸聚必成其大故歸妹之後受之以豐也豐盛大之義為卦震上離下震動也離明也以明而動動而能一无能字明皆致豐之道明足以照動足以亨然後能致豐大也豐亨王假之勿憂宜日中假庚白反傳豐為盛大其義自亨極天下之光大者唯王者能至之假至也天位之尊四海之富羣生之衆王道之大極豐之道其唯王者乎豐之時人民之繁庻事物之殷盛治之豈易周為可憂一作患慮宜如日中之盛明廣照无所不及然後无憂也本義豐大也以明而動盛大之勢也故其占有亨道焉然王者至此盛極當衰則又有憂道焉聖人以為徒憂无益但能守常不至於過盛則可矣故戒以勿憂宜日中也朱子曰須是王假之了方且勿憂宜日中若未到這箇田地更憂甚底王亦未有可憂漢上朱氏曰豐大之時所宜憂者不在乎日之未中而在乎日之既中也明動不已未有能保其大者也保此道者其唯中乎童溪王氏曰六五以柔居尊位而屬震體有震動憂驚之象聖人則戒之以勿憂離明在下又勉之以宜日中雙湖胡氏曰豐下離上震正日未出東之天其光亨之勢未已何憂之有豈非以柔中之主履豐亨之㑹故不能无憂重煩聖人致戒致勉耳然不勉以日進但勉以日中母亦康節怕處其盛之意歟雲峯胡氏曰卦辭稱王者三渙草曰王假有廟豐曰王假之假至也唯王者為能至此豐之大有亨道焉大則必通也亦有憂道焉大則可憂也不必過於憂如日之中斯可矣泰晋夬家人升皆曰勿恤此曰勿憂皆當極之時常人所不憂而聖人所深憂其辭曰勿深切之辭非謂无憂也於此有道焉可不必憂也彖曰豐大也明以動故豐傳豐者盛大之義離明而震動明動相資而成豐大也本義以卦徳釋卦名義朱子曰明以動故豐以明心應事物非明則動无所之非動則明无所用王假之尚大也傳王者有四海之廣兆民之衆極天下之大也故豐大之道唯王者能致之所有既大其保之治之之道亦當大也故王者之所尚至大也朱子曰王假之尚大也只是王者至此一箇極大底時節所尚者皆大事勿憂宜日中宜照天下也傳所有既廣所治既衆當憂慮其不能周及宜如日中之盛明普照天下无所不至則可勿憂矣如是然後能保其豐大保有豐大豈小才小知之所能也本義釋卦辭或問宜日中宜照天下人君之徳如日之中乃能盡照天下否朱子曰易如此看不得只是如日之中則自然照天下不可將作道埋解他日中則昃月盈則食天地盈虚與時消息而況於人乎況於鬼神乎自是如此物事到盛時必衰雖鬼神有所不能違也問此卦後面諸爻不甚好曰是他忒豐大了這物事盛極去不得了必衰也人若於此之時當如捧盤水戰兢自持方无傾側滿溢之患若纔有纎毫驕矜自滿之心即敗矣所以此處極難日中則昃月盈則食天地盈虚與時消息而況於人乎況於鬼神乎傳既言豐盛之至復言其難常以為誡也日中盛極則當昃昳月既盈滿則有虧缺天地之盈虚尚與時消息況人與鬼神乎盈虚謂盛衰消息謂進退天地之運亦隨時進退也鬼神謂造化之迹於萬物盛衰可見其消息也於豐盛之時而為此誡欲其守中不至過盛處豐之道豈易也哉本義此又𤼵明卦辭外意言不可過中也朱子曰天地是舉其大體而言鬼神是舉其中運動變化者通上徹下而言如雨風露雷草木之類皆是豐卦彖許多言語其實只在日中則昃月盈則食天地盈虚與時消息數語上這盛得極常須謹保守得日中時候方得不然便是偃仆傾壊了又曰這處去危亾只是一間耳須是兢兢如捧盤水方得須是謙抑貶損方可保得人曰這便是康節所謂酩酊離披時候如何不憂危謹畏宣政間有以奢侈為言者小人都云當豐亨豫大之時須是恁地侈泰方得所以一向放肆如何得不亂物事到盛時必衰雖鬼神有不能違也問鬼神者造化之迹然天地盈虚即是造化之迹矣而復言鬼神何邪曰天地舉全體而言鬼神指其功用之迹似有人所為者瀘川毛氏曰豐大也亦盈也唯有道者明徳若不足未嘗中故不昃未嘗盈故不食日新則為大反是則為盈知日中之宜則知日昃之可戒西溪李氏曰極弊大壊之形常出於豐亨豫大之後天地盈虚與時消息此理也雖天地如之人與鬼神安得而違也卦言宜日中故贊𤼵此意而為玩治者之戒雲峯胡氏曰盈虚消息唯剥與豐言之剥則君子之道已消而虚故有息之幾豐則天下之勢已息而盈故有消之幾天地鬼神乾卦後唯謙與豐言之謙則有虚可以持盈豐則自盈必至於虚此固天地鬼神之常理也此本義所謂不可過乎中者也象曰雷電皆至豐君子以折獄致刑折之舌反傳雷電皆至明震竝行也二體相合故云皆至明動相資成豐之象離明也照察之象震動也威斷之象折獄者必照其情實唯明克允致刑者以威於一作其姦惡唯斷乃成故君子觀雷電明動之象以折獄致刑也噬嗑言先王飾法豐言君子折獄以明在上而麗於威震王者之事故為制刑立法以明在下而麗於威震君子之用故為折獄致刑旅明在上而云君子者旅取慎用刑與不留獄君子皆當然也本義取其威照竝行之象或問雷電噬嗑與雷電豐亦一同朱子曰噬嗑明在上是明得事理先立這法在此未有犯底人畱待異時之用故云明罸勅法豐威在上明在下是用這法時須是明見下情曲折方得不然威動於上必有過錯也故云折獄致刑此是伊川之意其說極好節齋蔡氏曰折獄離明象致刑震懼象震者陽破陰刑者君子所以懼小人雲峯胡氏曰折獄象電之照致刑象雷之威威照竝行象雷電皆至蘭氏廷瑞曰折者折衷其至當之理致者自此而致之於彼中溪張氏曰君子體電之明可以折斷獄情體雷之威可以致用刑殺苟威至而明不至則片言何以折獄明至而威不至則姑息何以致刑必威明皆至而後可以成豐亨之功初九遇其配主雖旬无咎往有尚傳雷電皆至成豐之象明動相資致豐之道非明无以照非動无以行一作亨相須猶形影相資猶表裏初一无初字九明之初九一无九字四動之初宜相須以成其用故雖旬而相應位則相應用則相資故初謂四為配主已所配也配雖匹稱然就之者也如配天以配君子故初於四云配四於初云夷也雖旬无咎旬均也天下之相應者常非均敵如陰之應陽柔之從剛下之附上敵則安肯相從唯豐之初四其用則相資其應則相成故雖均是陽剛相從而无過咎也葢非一有剛字明則動无所之非動則明无所用相資而成用同舟則呉越一心共難則仇怨協力事勢使然也往而相従則能成其豐故云有尚有可嘉尚也在他卦則不相下而離隙矣本義配主謂四旬均也謂皆陽也當豐之時明動相資故初九之遇九四雖皆陽剛而其占如此也或問動非明則无所之明非動則无所用朱子曰徒行不明則行无所向㝠行而已徒明不行則明无所用空明而已節齋蔡氏曰初四爻皆剛則相敵理勢之常也唯豐盛之時事物至多其明易惑故以剛明同徳而相遇雖均无咎往有尚謂應四也雲峯胡氏曰初不言豐初未至豐也五亦不言豐者陰虚歉然方賴在下之助不知有其豐也凡卦爻取剛柔相應豐則取明動相資初當離體之初四在震體之初同徳而相遇雖兩陽之勢均敵往而從之非特无咎且有尚矣或曰離納已震納庚至已十日為旬象曰雖旬无咎過旬災也傳聖人因時而處宜隨事而順理夫勢均則不相下者常理也然有雖敵而相資者則相求也初四是也所以雖旬而无咎也與人同而力均者在乎降己以相求協力一作心以從事若懐先一作先懐己之私有加上之意則患當至矣故曰過旬災也均而先己是過旬也一求勝則不能同矣本義戒占者不可求勝其配亦爻辭外意建安丘氏曰兩剛相遇勢已均等不可復過矣過則偏勝之患生是有災也初爻位俱陽徳盛於四倘或過旬能无災乎雲峯胡氏曰需九三致宼至而象曰敬慎不敗也本義以為占外之占豐初九曰雖旬无咎而象曰過旬災也本義以為爻辭外意葢旬則配而與之均過旬則勝而出其上處豐之下而有欲上人之心可乎哉六二豐其蔀日中見斗往得疑疾有孚𤼵若吉傳明動相資乃能成豐二為明之主又得中正可謂明者也而五在正應之地陰柔不正非能動者二五雖皆陰而在明動相資之時居相應之地五一作乃才不足一有耳字既其應之才一无才字不足資則獨明不能成豐既不能成豐則喪其明功故為豐其蔀日中見斗二至明之才以所應不足與而不能成其豐喪其明功无明功則為昏暗故云見斗斗昏見者也蔀周匝之義用障蔽之物掩晦於明者也斗屬陰而主運乎上五以陰柔而當君位日中盛明之時乃見斗猶豐大之時乃一作而遇柔弱之主斗以昏見言見斗則是明䘮一作䘮明而暗矣二雖至明中正之才所遇乃柔暗不正之君既不能下求於己若往求之則反得疑猜忌疾暗主如是也然則如之何而可夫君子之事上也不得其心則盡其至誠以感發其志意而已苟誠意能動則雖昏䝉可開也雖柔弱可輔也雖不正可正也古人之事庸君常主而克行其道者已之誠意一无意字上達而君見信之篤耳管仲之相桓公孔明之輔後主是也若能以誠信發其志意則得行其道乃為吉也本義六二居豐之時為離之主至明者也而上應六五之柔暗故為豐蔀見斗之象蔀障蔽也大其障蔽故日中而昏也往而従之則昏暗之主必反見疑唯在積其誠意以感發之則吉戒占者宜如是也虚中有孚之象涑水司馬氏曰六二處下而在内以隂居陰如蔀屋幽暗不見知於人也故往得疑疾君子居中守正久幽不變人將信之然後可以發其蔀而行其志也厚齋馮氏曰離日方中而陰蔽其上此豐之蔀也李氏曰居中守正人臣之盛位卦體為離而處震下為掩覆之象雲峯胡氏曰日中豈有見斗之理謂之疑疾猶睽之載鬼一車也凡言往者多自下而進上初之往上而從四也初以陽居陽而四又陽故往有尚二之往上而從五也二以陰居陰而五又陰故往得疑疾然二有居陰從陰之象固足以致疾有離明中虚之象亦足以致吉所以占辭兩及之豐其蔀外也有孚發若内也外有疑内有孚孚疑之反也發蔀之反也象曰有孚發若信以發志也傳有孚發若謂以己之孚信感發上之心志也苟能發則其吉可知雖柔一作昏暗有可𤼵之道也中溪張氏曰臣之事君不可以君之明暗而異其心一於孚信終可以感發六五之志而行其道顧不吉歟九三豐其沛日中見沬折其右肱无咎沬作昧兦大反傳沛字古本有作斾字者王弼以為幡幔則是斾也幡幔圍蔽於内者豐其沛其暗更甚於蔀也三明體而反暗於四者所應陰暗故也三居明體之上陽剛得正本能明者也豐之道必明動相資而成三應於上上陰柔又无位而處震之終既終則止矣不能動者也他卦至終則極震至終則止矣三无上之應則不能成豐沬星之微小无名數者一有是字見沬暗之甚也豐之時而遇上六日中而見沬者也右肱人之所用乃折矣其无能為可知賢智之木遇明君則能有為於天下上无可賴之主則不能有為如人之折其右肱也人之為有所失則有所歸咎曰由是故致是若欲動而无右肱欲為而上无所賴則不能而已更復何言无所歸咎也本義沛一作斾謂幡幔也其蔽甚於蔀矣沬小星也三處明極而應上六雖不可用而非咎也故其象占如此進齋徐氏曰三與上應上柔暗極甚於二四所見益小故取見沬為象折毁也右肱謂上也前為右右肱人之所用而最便者三欲用上之切如右肱也上暗益甚失其所應如折其右肱无所賴矣雲峯胡氏曰蔽愈大則見愈小沛之蔽甚於蔀故沬之見甚於斗三剛正又居明之極可以有為上幽暗不足以有為故有折右肱之象然非三之咎也象曰豐其沛不可大事也折其右肱終不可用也傳三應於上上應而无位陰柔无勢力而處既終其可共濟大事乎既无所賴如右肱之折終不可用矣中溪張氏曰九三豐其沛則不可以出任大事至於斷折其右肱則雖有左在而隻其手亦終不可以有所用也如此則无所措手又何所歸咎乎九四豐其蔀日中見斗遇其夷主吉傳四雖陽剛為動之主又得大臣之位然以不中正遇陰暗柔弱之主豈能致豐大也故為豐其蔀蔀周圍掩蔽之物周圍則不大掩蔽則不明日中見斗當盛明之時反昏暗也夷主其等夷也相應故謂之主初四皆陽而居初是其徳同又居相應之地故為夷主居大臣之位而得一作徳又有同字在下之賢同徳相輔其助豈小也哉故吉也如四之才得在下之賢為之助則能致豐大乎曰在下者上有當位為之與在上者下有賢才為之助豈无益乎故吉也然而致天下之豐有君而後能也五陰柔居尊而震體无虚中㢲順下賢之象下雖多賢亦將何為葢非陽剛中正不能致天下之豐也本義象與六二同夷等夷也謂初九也其占為當豐而遇暗主下就同徳則吉也或問九四近幽暗之君所以有豐其蔀日中見斗之象亦是他本身不中正所致故象云位不當也朱子曰也是如此進齋徐氏曰夷主謂四與初皆剛同徳相應故初以四為配主四以初為夷主也雙湖胡氏曰配者配合之義彼來為我配也夷者等夷之義與我為等夷也皆陽故皆曰主東谷鄭氏曰初視四為配以下偶上也四視初為夷降上就下也建安丘氏曰六五暗主在上二應而四承之所覩均也故皆曰豐蔀見斗夷等夷也初四皆剛故曰夷處豐盛之時四以剛明之才上承暗主欲有所發則已亦居陰明不足也故不若資人以同往初剛在下而離體至明之才上與己應可以助己四若資之以輔五則昏蔽之主可開而豐盛之治可保宜其吉也象曰豐其蔀位不當也傳位不當謂以不中正居髙位所一作非以闇而不能致豐一有乎字日中見斗幽不明也傳謂幽暗不能光明君陰柔而臣不中正故也臨川呉氏曰豐蔀見斗之象六二爻辭已有象傳不於六二釋之而於九四釋之者葢二象由九四而成四為蔀故二見斗二爻之象同而所重在四也遇其夷主吉行也傳陽剛相遇吉之行也下就於初故云行下求則為吉也六五來章有慶譽吉傳五以陰柔之才為豐之主固不能成其豐大若能來致在下章美之才而用之則有福慶復得美譽所謂吉也六二文明中正章美之才也為五者誠能致之在位而委任之可以致豐大之慶名譽之美故吉也章美之才主二而言然初與三四皆陽剛之才五能用賢則彚征矣二雖陰有文明中正之徳大賢之在下者也五與二雖非陰陽正應在明動相資之時有相為用之義五若能來章則有慶譽而吉也然六五无虛己下賢之義聖人設此義以為教耳本義質雖柔暗若能來致天下之明則有慶譽而吉矣葢因其柔暗而設此以開之占者能如是則如其占矣進齋徐氏曰來謂來之也以六五柔中之君而能來六二中正之臣資其開導之益則有慶且有譽矣此二五同徳相照得處豐之道故吉臨川呉氏曰陰下從陽是庸愚從賢智既有福慶歸於己而又有名譽開於人有慶有譽所以吉也建安丘氏曰二之應五未信則不可往往則反召其疑唯積誠以感之而後五之蔽可開故曰有孚𤼵若吉四之比五无助則不可行行則未必見信唯求初九同徳之賢以助己而後五之昏可輔故曰遇其夷主吉此人臣事暗君之訓也六五陰暗在上處豐之時本无慶譽以在下有二四剛明之臣可以輔己上若屈意下之資人之明以為明則不唯有慶有譽而且得吉也此暗主用臣之訓也雲峯胡氏曰四爻稱豐皆无善道初與五不言豐獨為可尚三爻稱日中皆有所蔽六五不稱日中葢宜日中无蔽也自二之五則曰往互暗主也往則得疾自五致二則曰來二文明者也來之則有慶譽而吉柔暗之主未必能如此本義從程傳謂因其柔暗而設此以開之真得聖人作易之旨矣象曰六五之吉有慶也傳其所謂吉者可以有慶福及于天下也人君雖柔暗若能用賢才則可以為天下之福唯患不能耳上六豐其屋蔀其家闚其戸闃其无人三歳不覿凶闃苦鶪反傳六以陰柔之質而居豐之極處動之終其滿假躁動甚矣處豐大之時宜乎謙屈而處極高致豐大之功在乎剛健而體陰柔當豐大之任在乎得時而不當位如上一无上字六者處无一當其凶可知豐其屋處太高也蔀其家居不明也以陰柔居豐大而在无位之地乃高亢昏暗自絶於人人誰與之故闚其戸闃其无人也至於三歳之久而不知變其凶宜矣不覿謂尚不見人葢不變也六居卦終有變之義而不能遷是其才不能也本義以陰柔居豐極處動終明極而反暗者也故為豐大其屋而反以自蔽之象无人不覿亦言障蔽之深其凶甚矣路氏純中曰居一卦之上而位極其高故曰豐其屋體陰柔之質而材蔽於暗故曰蔀其家无剛明之才以用下而且窮大以失其居焉九三雖應於下彼孰肯為之應哉此所以闚其戸闃其无人而三歳不覿也誠齋楊氏曰自古小人揜其君之明者不過欲豐乎己之屋而已不知豐其屋者適以揜其家而不光又不過欲高其位而天飛而已不知高其位者適以空其門而自遁家之揜也門之空也自此三歳而熠燿行於室麋鹿遊於臺矣豈復覿汝家之有人跡乎凶莫大焉沙隨程氏曰六五以謙接物故雖九三非應而必來上六以亢自居雖九三正應而不為用此吉凶之斷也雲峯胡氏曰六以陰柔居豐極處動終明極反暗故蔀其家動極必静故闚其戸闃其无人闃静也卦辭曰勿憂宜日中二下卦之中日中之象五上卦之中日中之位初與四未及乎中三與上已過乎中者也況上又處豐之極其凶宜矣象曰豐其屋天際翔也闚其戸闃其无人自藏也傳六處豐大之極在上而自高若飛翔於天際謂其高大之甚闚其戸而无人者雖居豐大之極而實无位之地人以其昏暗自高大故皆棄絶之自藏避而弗與親也本義藏謂障蔽張子曰處上之極而居動之末故曰天際翔也朱子曰豐其屋天際翔也似説如翬斯飛樣言其屋高大到於天際却只是自蔽障得闊九三爻觧得便順九四上六二爻不可曉看來聖人曽得九四上六爻文義人與三爻不同童溪王氏曰自藏則非人之逺己乃已逺人也雲峯胡氏曰辭與明夷上六相似皆暗之極但彼之暗足以傷人卒至於自殞厥命此之暗秪自障蔽耳建安丘氏曰豐大也以卦體言則明動相資而成豐然卦以豐名而爻彖反多戒辭者雜卦曰豐多故是也六五為豐盛之主其諸爻皆從五者也五以柔居君位而言來章者乃來二四剛明之臣也四比五而二應五以五之暗也故二四皆有豐蔀見斗之象二言有孚𤼵若者𤼵乎五也四言遇其夷主者欲得初以共輔乎五也初去五最逺不能自致則遇四之配主而同往焉此四爻所以吉也獨九三不知從五而逺應上六故有折肱之患上處豐盛之極障蔽之甚亦卒至自蔀其家而闃其无人也豐其可恃乎哉節齋蔡氏曰豐大也又曰多故極天下事物之多難於盡見也惟以剛遇剛以柔遇柔則所見同而可以无疑以剛遇柔則剛者明而柔者暗終不能相信也初與四皆剛也故有配主之无咎夷主之吉然四位居柔又不免有豐蔀見斗之象二與五皆柔也故有有孚來章之喜然二位居柔又未免有往得疑疾之事惟三與上以剛遇柔故三折右肱而上至於三歳不覿也艮下離上傳旅序卦豐大也窮大者必失其居故受之以旅豐盛至於窮極則必失其所安旅所以次豐也為卦離上艮下山止而不遷火行而不居違去而不處之象故為旅也又麗乎外亦旅之象臨川王氏曰入而麗乎内所以為家人出而麗乎外所以為旅呉氏應囘曰旅非商賈之謂凡客於外者皆是也天子有天子之旅天王出居于鄭是也諸侯有諸侯之旅公在楚是也大夫有大夫之旅崔子之去他邦是也聖賢有聖賢之旅孔子之轍環孟子之歴聘是也旅豈一槩哉旅小亨旅貞吉傳以卦才言也如卦之才可以小亨得旅之貞正而吉也本義旅覉旅也山止於下火炎於上為去其所止而不處之象故為旅以六五得中於外而順乎上下之二陽艮止而離麗於明故其占可以小亨而能守其旅之貞則吉旅非常居若可苟者然道无不在故自有其正不可須臾離也平菴項氏曰旅小亨就旅之卦才言之可以小亨不可以大用旅貞吉者旅於貞則吉不貞則凶乃處旅之道也中溪張氏曰以卦變言則旅自否來六本居三今往居五而麗於外猶人失其所居而客於外乃旅之象也凡人處旅本无大通之理覉旅而亨者雖大亦小也所貴者守正則吉爾雲峯胡氏曰止而麗乎外旅之義也山上之火去其所止而不處旅之象也或曰山止而不動旅館之象火動而不止旅人之象豐為大則旅為小在旅而亨亨之小者也然事有大小道无不在大亨固利於貞慎不可以旅亨之小而失其貞也道果可須臾離哉彖曰旅小亨柔得中乎外而順乎剛止而麗乎明是以小亨旅貞吉也傳六上居五柔得中乎外也麗乎上下之剛順乎剛也下艮止上離麗止而麗於明也柔順而得在外之中所止能麗於明是以小亨得旅之貞正而吉也旅困之時非陽剛中正有助於下不能致大亨也所謂得在外之中中非一揆旅有旅之中也止麗於明則不失時宜然後得一作能處旅之道本義以卦體卦徳釋卦辭進齋徐氏曰一柔在外而處二剛之中是覉旅之人交於強有力者苟非善處卑則取辱高則招禍鮮不失矣惟於止知其所止无私交无暗事非賢不主非善不與止而麗乎明也夫如是内不失己外不失人雖在旅困亦可小亨得旅之正而吉也雲峯胡氏曰以卦體釋小亨以卦徳釋旅貞吉柔而不順乎剛則不亨止而不麗乎明則不正旅之時義大矣哉傳天下之事當隨時各適其宐而旅為難處故稱其時義之大本義旅之時為難處李氏曰適旅之時動得其宐其義大矣雲峯胡氏曰難盡者旅之義難處者旅之時此其時義之所以為大象曰山上有火旅君子以明慎用刑而不留獄傳火之在高明无不照君子觀明照之象則以明慎用刑明不可恃故戒於慎明而止亦慎象觀火行不處之象則不留獄獄者不得已而設民有罪而入豈可留滯淹久也本義慎刑如山不留如火朱子曰明慎用刑而不留獄却只是火在山上之象又不干旅事瀘川毛氏曰君子觀象而用刑則取其火以為明取其止以為慎取其旅以不留獄建安丘氏曰山者火之所旅久則延燒獄者囚徒之所旅留則淹滯旅有行而不處之象故火不可使久處於山囚徒不可使久留於獄也明象火之燭物慎象山之静止中溪張氏曰明則无遁情慎則无濫罰明慎既盡斷決隨之聖人取象於旅正恐其留獄也雲峯胡氏曰明如火慎如山不留獄如山不留火初六旅𤨏𤨏斯其所取災傳六以陰柔在旅之時處於卑下是柔弱之人處旅困而在卑賤所存汚下者也志卑之人既處旅困鄙猥瑣細无所不至乃其所以致悔辱取災咎也瑣瑣猥細之狀當旅困之時才質如是上雖有援无能為也四陽性而離體亦非就下者也又在旅與他卦為大臣之位者異矣本義當旅之時以陰柔居下位故其象占如此建安丘氏曰初以陰柔而在下是卑賤之人處旅不得志而困窮者也不務逺大而局於瑣屑此其所以自取災殃也雲峯胡氏曰旅而居下其道途負販之旅乎柔弱卑賤其鄙固宜而以為斯其所取災葢為旅之賤者而瑣細取災如此富商巨賈葢可知也象之意可以旁通又不特為旅言也象曰旅瑣瑣志窮災也傳志意窮廹益自取災也災眚對言則有分獨言則謂災患耳臨川呉氏曰柔而居下其志猥陋故曰窮中溪張氏曰詩云瑣兮尾兮流離之子初六有焉六二旅即次懐其資得童僕貞傳二有柔順中正之徳柔順則衆與之中正則處不失當故能保其所有童僕亦盡其忠信雖不若五有文明之徳上下之助亦處旅之善者也次舎旅所安也財貨旅所資也童僕旅所賴也得就次舎懐畜其資財又得童僕之貞良旅之善也柔弱在下者童也強壯處外者僕也二柔順中正故得内外之心在旅所親比者童僕也不云吉者旅寓之際得免於災厲則已善矣本義即次則安懐資則裕得其童僕之貞信則无欺而有賴旅之最吉者也二有柔順中正之徳故其象占如此童溪王氏曰次旅之居也資旅之用也童僕旅之役走者也旅即次則其所舎也有其居懐其資則其所畜也有其用得童僕則其所以奔走而服役也又有其人旅道何脩而得此哉葢以六居二之為正故也雲峯胡氏曰旅貴卑㢲故位陰爻柔者多吉而六二兼之二以柔居中承剛乗柔旅之甚安而且裕者貞字諸家自作一句讀本義以連上文葢即次懐資自見六二有柔順中正之徳不必復以貞戒之惟旅中不能无賴乎童僕之用亦多不能免乎童僕之欺惟得其貞信者則无欺而有賴此旅之最吉者也象曰得童僕貞終无尤也傳羇旅之人所賴者童僕也既得童僕之忠貞終无尤悔矣中溪張氏曰六二居位得中旅即次也上承九三之剛懐其資也下乗初六之柔得童僕也人之處旅有次可安有資可用又有童僕之忠貞者可託雖在旅寓之中終无悔尤矣九三旅焚其次䘮其童僕貞厲䘮息浪反象同傳處旅之道以柔順謙下為先三剛而不中又居下體之上與艮之上有自高之象在旅而過剛自高致困災之道也自高則不順於上故上不與而焚其次失所安也上離為焚象過剛則暴下故下離而䘮其童僕之貞信謂失其心也如此則一作者危厲之道也本義過剛不中居下之上故其象占如此䘮其童僕則不止於失其心矣故貞字連下句為義建安丘氏曰九三爻辭全與二反二即次而三焚二得童僕而三䘮二之貞无尤而三之貞則厲者二柔順得中三過剛不中故也過剛豈處旅之道哉雲峯胡氏曰九三因六二取象二柔順中正故即次三過剛不中又近離故焚其次二居中乗柔故得童僕貞三過剛則无徒又下之柔已為二所得故䘮其童僕是雖於爻為貞於旅則為厲也潘氏曰居剛而用剛平時猶不可况旅乎以此與下焚次䘮僕固其宜也九三以剛居下體之上則焚次上九以剛居上體之上則焚巣位愈高剛愈亢則禍愈深矣象曰旅焚其次亦以傷矣以旅與下其義䘮也傳旅焚失其次舎亦以困傷矣以旅之時而與下之道如此義當䘮也在旅而以過剛自高待下必䘮其忠貞謂失其心也在旅而失其童僕之心為可危也本義以旅之時而與下之道如此義當䘮也雲峯胡氏曰柔而得中旅之道也九三過剛不中而處下卦之上以旅之時而與下之道如此義當䘮也上九過剛不中而居上卦之上以旅之時而在上之道如此義亦當䘮也兩象辭本相對説九四旅于處得其資斧我心不快傳四陽剛雖不居中而處柔在上體之下有用柔能下之象得旅之宐也以剛明之才為五所與為初所應在旅之善者也然四非正位故雖得其處止不若二之就次舎也有剛明之才為上下所與乃旅而得貨財之貲器用之利也雖在旅為善然上无剛陽之與下唯陰柔之應故不能伸其才行其志其心不快也云我者據四而言本義以陽居陰處上之下用柔能下故其象占如此然非其正位又上无剛陽之與下唯陰柔之應故其心有所不快也朱子曰資斧有做齎斧説底這資斧在㢲上説也自分曉然而旅中亦豈可无備禦底物事次第這便是雲峯胡氏曰旅以行為義處而不行非旅之亨也雖勝三之焚次終不若二之行而即次也得其資斧雖勝三之䘮童僕視二之懐其資得童僕者有間矣三以剛居剛而在下卦之上用剛而不能下人者也四以剛居柔而在上卦之下猶為能用柔而下於人者故得資足以自利得斧足以自防也進齋徐氏曰才剛得其資斧也或曰資當作齊按漢書王莾遣王尋屯洛陽將𤼵亡其黃鉞其士房楊曰此經所謂䘮其齊斧者也應劭云齊利也讀如齊衰之齊資齊音同誤作資雙湖胡氏曰徐氏或曰之説即語録有做齊斧説之義又按資與二象同斧即離為兵象亦互兌金在㢲木上象離兌在四上所以得也若㢲上九䘮其資斧亦有離兌㢲象然皆在上爻下所以䘮也合兩卦論取象甚明象曰旅于處未得位也得其資斧心未快也傳四以近君為當位在旅五不取君義故四為未得位也曰然則以九居四不正為有咎矣曰以剛居柔旅之宐也九以剛明之才欲得時而行其志故雖得資斧於旅為善其心志未快也中溪張氏曰九四雖在近君之地而處于䩻旅之中此其所以未得位也縱得其資斧之利而以剛居柔未得盡行其志故我心未快也六五射雉一矢亡終以譽命射食亦反傳六五有文明柔順之徳處得中道而上下與之處旅之至善者也人之處旅能合文明之道可謂善矣羈旅之人動而或失則困辱隨之動而无失然後為善離為雉文明之物射雉謂取則於文明之道而必合如射雉一矢而亡之𤼵无不中則終能致譽命也譽令聞也命福禄也五居文明之位有文明之徳故動必中文明之道也五君位人君无旅旅則失位故不取君義本義雉文明之物離之象也六五柔順文明又得中道為離之主故得此爻者為射雉之象雖不无亡矢之費而所䘮不多終有譽命也朱子曰亡字正如秦无亡矢遺鏃之亡不是如伊川之説易中凡言終吉者皆是初不甚好也而今只如這小小文義亦无人去解析得他雲峯胡氏曰人君无旅旅則失位故五不取君位終以譽命本義謂雖不无亡矢之費而所䘮不多者為旅人言也為旅者不免計得䘮故下卦曰得曰䘮上卦曰得曰亡六五則所亡者少而有所得者也象曰終以譽命上逮也傳有文明柔順之徳則上下與之逮與也能順承於上而上與之為上所逮也在上而得乎下為下所上一无上字逮也在旅而上下與之所以致譽命也旅者困而未得所安之時也終以譽命終當致譽命也已譽命則非旅也困而親寡則為旅不必在外也本義上逮言其譽命聞於上也朱子曰上逮也不得如伊川説雲峯胡氏曰五君位在上者也爻曰上逮而本義以其譽命聞於上者何哉不以君位處五者人君无旅故也上九鳥焚其巢旅人先笑後號咷䘮牛于易凶傳鳥飛騰處高者也上九剛不中而處最高又離體其亢可知故取鳥象在旅之時謙降柔和乃可自保而過剛自高失其所宐安矣巢鳥所安止一有上字焚其巢失其所安无所止也在離上為焚象陽剛自處於至高始快其意故先笑既而失安莫與故號咷輕易以䘮其順徳所以凶也牛順物䘮牛于易謂忽易以失其順也離火性上為躁易之象上承鳥焚其巢故更加旅人字不云旅人則是鳥笑哭也本義上九過剛處旅之上離之極驕而不順凶之道也故其象占如此節初齊氏曰離為科上槁有巢象而火又附焉故曰焚莆陽張氏曰火有聲有笑號之象離為飛鳥為牝牛雙湖胡氏曰旅人恐指占者只就上説為有情本義驕謂先笑不順謂䘮牛皆致凶之道也林氏栗曰三與上應皆以剛居上无相與之情故三焚其次上焚其巢三承九四之離為他人所焚也上焚其巢自焚也三焚其次則巢尚在也䘮其童僕則牛尚存也巢在則有可歸之理牛存則有可行之資今也巢焚牛䘮欲歸則无其所欲行則无其資凶斯致矣雲峯胡氏曰同人親也故先號咷後笑親寡旅也故先笑後號咷旅之時不宐用剛故三陽皆不利六二柔順中正六五柔順文明皆得於道上九剛亢失其柔順而不自知故有䘮牛于易之象以内卦論初六不及乎中故有瑣瑣之災三過乎中故有焚次之危以外卦論四不及乎中故不快上過乎中故號咷不及則弱不自持過則剛必自折在内在外皆然象曰以旅在上其義焚也䘮牛于易終莫之聞也傳以旅在上而以尊高自處豈能保其居其義當有焚巢之事方以極剛自高為得志而笑不知䘮其順徳於躁易是終莫之聞謂終不自聞知也使自覺知則不至於極而號咷矣陽剛不中而處極固有高亢躁動之象而火復炎上則又甚焉潘氏曰羇旅之極居高用剛始意甚快其如終何焚巢䘮牛終凶而泣也于易者禍生於所忽而莫之察也東谷鄭氏曰以易而䘮其順是罔聞知也建安丘氏曰雜卦云親寡旅也人之窮者也故處旅之道以得中為善卑則取辱高則召禍初處最下旅之卑者也故以瑣瑣而取災三在下之上上在上之上旅之高者也故三焚次䘮僕上焚巢䘮牛也四處上之下雖無太高太卑之失亦未得中故雖得資斧而心未快也惟二五得二體之中故二即次懐資而得僕五亦終有譽命之榮也然二當位而五不當位故五不免射雉亡矢之患然則居旅道之善者其唯六二乎周易傳義大全卷十九
