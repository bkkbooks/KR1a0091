body:
  text: 周易大全易𩔖提要臣等謹案周易大全二十四卷明胡廣等奉勅撰考明成祖實録永樂十二年十一月甲寅命行在翰林院學士胡廣侍講楊榮金幼孜修五經四書大全十三年九月告成成祖親制序弁之卷首命禮部刊賜天下賜胡廣等鈔幣有差仍賜宴於禮部同時預纂修者自廣榮幼孜外尚有翰林編修葉時中等三十九人此其五經之首也朱彝尊經義考謂廣等就前儒成編雜為鈔録而去其姓名易則取諸天台鄱陽二董氏雙湖雲峯二胡氏於諸書外未寓目者至多云云天台董氏者董楷之周易傳義附録鄱陽董氏者董真卿之周易㑹通雙湖胡氏者胡一桂之周易本義附録纂疏雲峰胡氏者胡炳文之周易本義通釋也今勘騐舊文一一符合彛尊所論未可謂之苛求然董楷胡一桂胡炳文篤守朱子其説頗謹嚴董真卿則以程朱為主而博採諸家以翼之其説頗為賅備取材於四家之書而刊除重複勒為一編雖不免守匱抱殘要其宗㫖則尚可謂不失其正且二百餘年以此取士一代之令甲在焉録存其書見有明儒者之經學其初之不敢放軼者由於此其後之不免固陋者亦由於此鄭曉今言曰洪武開科五經皆主古注疏及宋儒易程朱書蔡詩朱春秋左公羊穀梁程胡張禮記陳後乃盡棄注疏不知始何時或曰始于頒五經大全時以為諸家説優者采入故耳然古注疏終不可廢也是當明盛時識者已憂其弊矣觀于是編未始非千古得失之林也乾隆四十二年六月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀易序易之為書卦爻彖象之義備而天地萬物之情見聖人之憂天下來世其至矣先天下而開其物後天下而成其務是故極其數以定天下之𧰼著其象以定天下之吉凶六十四卦三百八十四爻皆所以順性命之理盡變化之道也散之在理則有萬殊統之在道則無二致所以易有太極是生兩儀太極者道也兩儀者隂陽也隂陽一道也太極无極也萬物之生負隂而抱陽莫不有太極莫不有兩儀細緼交感變化不窮形一受其生神一發其智情偽出焉萬緒起焉易所以定吉凶而生大業故易者隂陽之道也卦者隂陽之物也爻者隂陽之動也卦雖不同所同者竒偶爻雖不同所同者九六是以六十四卦為其體三百八十四爻互為其用逺在六合之外近在一身之中暫於瞬息微於動竫莫不有卦之象焉莫不有爻之義焉至哉易乎其道至大而无不包其用至神而无不存時固未始有一而卦未始有定象事固未始有窮而爻亦未始有定位以一時而索卦則拘於无變非易也以一事而明爻則窒而不通非易也知所謂卦爻彖象之義而不知有卦爻彖象之用亦非易也故得之於精神之運心術之動與天地合其徳與日月合其明與四時合其序與鬼神合其吉凶然後可以謂知易也雖然易之有卦易之已形者也卦之有爻卦之已見者也已形已見者可以言知未形未見者不可以名求則所謂易者果何如哉此學者所當知也周易傳義大全凡例一周易上下經二篇孔子十翼十篇各自為卷漢書藝文志云易經十二篇顔師古曰上下經及十翼故十二篇初無傳字漢費直初以彖𧰼釋經附於其後今乾卦起大哉乾元至用九天徳不可為首也加一傳字附於卦後坤以下倣此係費直舊本鄭𤣥王弼宗之又分附卦爻之下増入乾坤文言始加彖曰𧰼曰文言曰以别於經今乾卦文言曰以後至坤以下諸卦係鄭王所定本而繫辭以後自如其舊歴代因之是為今易程子所為作傳者是也自嵩山晁說之始考訂古經釐為八卷卦爻一彖二象三文言四繫辭五說卦六序卦七雜卦八朱子謂未能盡合古文者此也東莱呂祖謙乃定為經二卷傳十卷是為古易朱子本義從之上經一下經二彖上傳一彖下傳二𧰼上傳三𧰼下傳四繫辭上傳五繫辭下傳六文言傳七說卦傳八序卦傳九雜卦傳十朱子所序古周易即此也桉藍田呂大防已甞訂定與呂本同但自一至十二之序小異呂盖偶未及見之耳然程傳本義既已竝行而諸家定本又各不同天台董氏集程朱說據王弼本分為髙下字行以别四聖二賢之易而不能盡行於繫辭諸篇今所刋本已變其例建安張氏又據董本獨刋本義番陽董氏傳義㑹通既不盡從今易又别為經傳新例大畧如費本且移大𧰼寘於彖傳之前雲峰胡氏本義通既輒變古易且於今易又不免離析先後故今定從程傳元本而本義仍以𩔖從凡經文皆平行書之傳義則低一字書以别之其繫辭以下程傳既闕則壹從本義所定章次總釐為二十四卷云一程傳據王弼本只有六十四卦繫辭以後無傳王弼只註六十四卦繫辭說卦序卦雜卦門人韓伯註今法天台董氏例以東莱呂氏所集經說補之自上繫第一章至十章皆係全文十一章以後今參用吕氏精義二董附録掇其要語附之以備一家之言仍只稱程子曰分註書之别於傳也一程傳本義刋本間有脫誤字句今合諸本讐校歸正其傳有兩存同異者則係東莱呂氏舊例云一二程文集遺書外書與朱子文集語𩔖有及於易者今合天台董氏番陽董氏附録二本參互考訂取其與傳義相合而有𤼵明者各分注其次朱子甞折𠂻程傳得失者則附傳下仍以程子朱子曰别之其程子二序上下篇義朱子圖說五贊筮儀并二家說經綱領則參取二董附録及啟蒙諸書别為義例列於篇端自為一卷云一諸家之說壹宗程傳本義折衷竝取其辭論之精醇理𧰼之明當者分注二氏之後以羽翼之而其同異得失先儒雙湖胡氏雲峰胡氏甞論訂者亦詳擇而附著焉一經中文字有當音者今從天台董氏例參考呂氏音訓直附其下間有傳義音讀異者則明識别之一經文圈㸃句絶傳義間有不同處今壹以本義為正一引用先儒姓氏孔氏安國子國楊氏雄雲子劉氏歆駿子鄭氏𤣥成康王氏弼嗣輔韓氏伯伯康董氏遇直季虞氏翻朔仲關氏朗明子孔氏穎達仲達劉氏瓛陳氏皋希夷陳氏摶南圖胡氏旦安定胡氏瑗之翼泰山孫氏復復明徂徕石氏介道守廬陵歐陽氏脩叔永錢氏藻劉氏彝中執于氏弇臨川王氏安石介甫廣陵王氏逢邵子雍夫堯張子載厚子涑水司馬氏光實君東坡蘇氏軾瞻子房氏審權嵩山晁氏說之以道和靖尹氏焞明彦藍田呂氏大臨與叔廣平游氏酢夫定上蔡謝氏顯道良佐龜山楊氏時立中壽安張氏繹叔思兼山郭氏忠孝立之張氏汝明舜文莆田張氏汝弼舜元括蒼龔氏源父㴱開封耿氏南仲希道李氏元量東明劉氏槩平仲路氏純中漢上朱氏震𤼵子白雲郭氏雍和子鄭氏正夫閻氏彦升東谷鄭氏汝諧舜舉凌氏唐佐陸氏秉李氏開非去王氏湘卿李氏光𤼵泰丹陽都氏潔與聖合沙鄭氏東卿少梅容齋洪氏邁盧景劉氏翔鄭氏剛中亨仲閭丘氏昕辰逢蘭氏廷瑞惠卿王氏大寳元龜李氏椿年仲永沙隨程氏迥久可莆田鄭氏厚隆山李氏舜臣子思縉雲馮氏當可時行童溪王氏宗傳景孟誠齋楊氏萬里廷秀雙溪王氏炎叔晦南軒張氏栻夫敬東莱呂氏祖謙伯恭林氏栗中黄西山蔡氏元定季通勉齋黄氏榦卿直盤澗董氏銖重叔潛室陳氏埴之器清江張氏洽徳元范氏念徳伯崇梅巖𡊮氏樞仲機瓜山潘氏柄之謙節齋蔡氏淵静伯九峯蔡氏沈黙仲三山吳氏綺畝忠雲荘劉氏爚伯晦覺軒蔡氏模西溪李氏過辨季厚齋馮氏椅之竒瀘川毛氏璞玉伯庸齋趙氏汝騰趙氏汝楳山齋易氏芾章彦融堂錢氏時是子雙峯饒氏魯元仲進齋徐氏㡬與子馮氏去非姚氏小彭黄氏以翼宗台鶴山魏氏了翁華父西山眞氏徳秀景元習靜劉氏彌邵壽翁平菴項氏安世平甫柴氏中行與之潘氏夢旂天錫楊氏文煥彬夫隆山陳氏友文思齋翁氏泳叔永天台董氏楷古為徐氏直方立大毅齋沈氏貴珤又名汝礪誠叔建安丘氏富國行可單氏雷氏史氏詠冷氏蛟峯方氏逢辰吳氏應回疊山謝氏枋得君直魯齋許氏衡平仲玉齋胡氏方平新安胡氏次焱濟鼎潛齋胡氏允節初齊氏夢龍覺翁程氏鉅夫茍軒程氏龍俞舜新安程氏直方道大葵初王氏希旦愈明勿軒熊氏禾非去雙湖胡氏庭芳一桂方塘徐氏之祥麒父中溪張氏清子希獻汪氏㴱性所雲峯胡氏炳文仲虎息齋余氏芑舒徳新臨川吳氏􅊹清㓜廬陵龍氏仁夫觀復番陽董氏真卿季真周易程子傳序易變易也隨時變易以從道也郭忠孝議易傳序曰易即道也又何從道或以為問程子曰人随時變易為何為從道也楊廸問有道又有易何如曰此語全未是更將傳序詳思當自通矣變易而後合道易字與道字不相似也朱子曰随時變易以從道主卦爻而言然天理人事皆在其中今以乾卦潛見飛躍觀之其流行而至易者易也其定理之當然者道也故明道亦曰其體則謂之易其理則謂之道而伊川又謂變易而後合道易字與道字不相似也又云人随時變易為何為從道也此皆可以見其意矣易中无一卦一爻不具此理所以沿流而可以求其源也易變易也随時變易以從道正謂伊川這般說話難曉盖他把這書硬定做人事之書他說聖人做這書只為世間人事本有許多變様所以做這書出来范氏念徳曰易也時也道也皆一也自其流行不息而言之則謂之易自其推遷无常而言之則謂之時而其所以然之理則謂之道臨川吳氏曰凡隂陽變易道理便在其中元不相離直以道字解易字則不可而易之所以為易者道也又曰時之為時莫備於易程子謂之随時變易以從道夫子傳六十四彖獨於十二卦𤼵其凡而贊其時與時義時用之大一卦一時則六十四時不同也一爻一時則三百八十四時不同也始於乾之乾終於未濟之未濟則四千九十六時各有所值引而伸觸𩔖而長時之百千萬變无窮而吾之所以時其時者則一而已其為書也廣大悉備將以順性命之理通幽明之故盡事物之情而示開物成務之道也聖人之憂患後世可謂至矣去古雖逺遺經尚存然而前儒失意以傳言後學誦言而忘味自秦而下盖无傳矣予生千一有餘字載之後悼斯文之湮晦將俾後人沿流而求源此傳所以作也程子曰自孔子贊易之後更無人㑹讀易先儒不見於書者有則不可知見於書者皆未盡如王輔嗣韓康伯只以老荘解之是何道理某於易傳殺曽下工夫如學者見問儘有可商量書則未欲出之也某於易傳已自成書但逐旋脩𥙷期以七十其書可出韓退之嘆聰明不及於前時道徳日負於初心然某於易傳後来所改者无㡬不知如何故更期以十年之功看如何張閎中問易傳不傳曰易傳未傳自量精力未衰尚覬有少進爾然亦不必直待身後覺老耄則傳矣書雖未出學未嘗不傳也第患无受之者爾和靖尹氏曰伊川先生踐履盡易其作傳只是因而寫成熟讀玩味即可見矣夀安張氏曰伊川易傳成書已久學者莫得傳授其後寝疾始以授尹焞上蔡謝氏曰伊川以易傳示門人曰只說得七分後人更湏自體究易有聖人之道四焉以言者尚其辭以動者尚其變以制器者尚其𧰼以卜筮者尚其占吉凶消長之理進退存亡之道備於辭推辭考卦可以知變𧰼與占在其中矣君子居則觀其象而玩其辭動則觀其變而玩其占得於辭不達其意者有矣未有不得於辭而能通其意者也至微者理也至著者𧰼也體用一源顯微无間觀㑹通以行其典禮則辭无所不備尹焞問至微者理也至著者象也體用一源顯微无間莫太露天機否程子曰如此分明說破猶自人不解悟朱子曰至微者理也至著者𧰼也體用一源顯微无間盖自理而言則即體而用在其中所謂一源也自象而言則即顯而微不能外所謂无間也又曰體用一源者以至微之理言之則冲漠无联而萬象昭然已具也顯微无間者以至著之𧰼言之則即事即物而此理无乎不在也言理則先體而後用盖舉體而用之理已具是所以為一源也言事則先顯而後微盖即事而理之體可見是所以為无間也至微者理也至著者象也體用一源顯微无間觀㑹通以行其典禮則辭无所不備此是一箇理一箇象一箇辭然欲理㑹理與象又湏就辭上理㑹辭上所載皆觀㑹通以行其典禮之事凡於事物湏就其聚處理㑹尋得一箇通路行去若不尋得一箇通路只驀地行去則必有礙典禮只是常事㑹是事之合聚交加難分别處如庖丁解牛雖是奏刀騞然莫不中節若至那難處便著些氣力方得通汪瑞明說沈元用嘗問尹和靖易傳何處是切要處尹云體用一源顯微无間此是最切要處嘗舉似李先生先生曰尹說固好然雖看得六十四卦三百八十四爻都有下落處方始說得此話若學者未曽子細理㑹便與他如此說豈不誤也臨川吳氏曰至微之理者體也然體之至微而用之至著者已同時而有非是先有體而後有用也故曰一源至顯之象而與至微之理相合為一更无間别非是顯生於微也故曰无間故善學者求言必自近易於近者非知言者也朱子曰求言必自近易於近者非知言者也此伊川喫力為人處予所傳者辭也由辭以得其意則在乎人焉有宋元符二年已卯正月庚申河南程頤正叔序和靖尹氏曰先生平生用意惟在易傳求先生之學者觀此足矣語録之𩔖出於學者所記所見有淺深故所記有工拙盖未能无失也甞謂祁寛曰汝與其讀他書不若專讀易與其看伊川雜說不若專看伊川易傳易之為書經四聖人乃成皆聖人粹言垂訓後世者也伊川作易傳意欲傳後者皆極至之言又曰某日讀伊川易傳一卦近来甚覺有與心相契融㑹處又曰學者湏要自得至如伊川易傳吾輩讀時言下㑹解與伊川何異只是不似伊川自得者也自得者更不待思只恁胸中流出朱子曰伊川先生晚年所見甚實更无一句懸空說底語今觀易傳可見何甞有一句不着實伊川晚年文字如易傳直是盛得水住易傳不看本文亦自成一書詩書畧看訓詁解釋文義令通而已却只玩味本文其道理只在本文下面小字儘說如何㑹過得他若易傳却可脫去本文程子此書平淡地慢慢委曲說得更无餘藴不是那㪣磕逼迊出底義理平鋪地放在面前只如此等行文亦自難學如其他峭拔雄健之文却可做若易傳淡底文字如何可及易傳明白无難看處但此是先生以天下許多道理散入六十四卦三百八十四爻之中將作易看即无意味湏將来作事看即句句字字有用處耳問易傳大槩將三百八十四爻做人說恐通未盡否曰也是即是不可装定做人說看占得如何有就事言者有以位言者以吉凶言之則為事以終始言之則為時以髙下言之則為位随所作而看皆通繫辭云不可為典要唯變所適豈可装定做人說易傳難看其用意精密道理平正更无抑揚若能看得有味則其人亦大段知義理矣盖易中說理是預先說下箇未曽有底事故乍看甚難問看易傳曰此書難看湏經歴世故多識盡人情物理方看得入盖此書平淡所說之事皆是見今所未甞有者如言事君處及處事變患難處今皆未甞當著可知讀時无味盖他說得闊逺未有底事預包載在此學者湏讀詩書他經自有箇見處及曽經歴過前件此等事方可以讀之得其无味之味盖其間義理闊多伊川所自𤼵與經文又似隔一重皮膜所以看者无箇貫穿處易傳湏先讀他書理㑹得義理了方有入路見其精密處盖其所言義理極妙初學者未曽使著不識其味都无啟𤼵如遺書之𩔖人看著却有啟𤼵處非是易傳不好是不合使未當看者看湏是已知理義者得此便可磨礲入細此書與學者非是啟𤼵工夫乃磨礲工夫呂伯恭謂易傳理到語精平易的當立言无毫髪遺恨此乃名言伯恭多勸人看易傳一禁禁定更不得疑著局定學者只得守定此箇義理固是好但縁此使學者不自長意智何縁㑹有聦明伊川言理甚備𧰼數却欠在易傳義理精字數足无一毫欠闕只是於本義不相合易本是卜筮之書程先生只說得一理又曰某本義只是卜筮大綱若義理充實遍滿離不得程夫子書也書易傳後曰易之為書更三聖人而制作不同若包犧氏之𧰼文王之辭皆依卜筮以為教而其法則異至於孔子之贊則又一以義理為教而不專於卜筮也是豈其故相反哉俗之淳漓既異故其所以為教為法不得不異而道則未甞不同也然自秦漢以来考𧰼辭者泥於術數而不得其弘通簡易之法論義理者淪於空寂而不適乎仁義中正之歸求其因時立教以承三聖不同於法而同於道者則惟伊川先生程氏之書而已後之君子誠能日取其一卦若一爻者熟復而深玩之如已有疑將決於筮而得之者虚心端意推之於事而反之於身以求其所以處此之實則於吉凶消長之理進退存亡之道將无所求而不得邇之事父逺之事君亦无處而不當矣東萊呂氏曰伊川先生遺言見於世者獨易傳為成書傳摹浸舛失其本真學者病之某舊所蔵本出尹和靖先生家摽注皆和靖親筆近復得新安朱元晦新訂讐挍精甚遂合尹氏朱氏書與一二同志叅合其同異兩存之以待知者臨川吳氏曰上古聖人作卦象以先天而其體備於八八作蓍數以前民而其用衍於七七八八之𧰼本於一而一无體七七之數始於一而一不用合卦與蓍是之謂易中古聖人體卦用蓍繫之彖繫之爻其辭雖為占設然擬議所言理无不貫推而行之占云乎哉秦漢而下泥術數者陋演辭義者泛而易道晦矣至邵子極深卦象蓍數之原而易之道大明夫子以来一人而已而於文王周公之辭有未暇及也若程子之傳則因文王周公之辭以𤼵其真知實踐之理推之為修齊治平之用宜與三古聖人之易而為四非可以傳註論也
