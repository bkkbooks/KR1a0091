body:
  text: 易説綱領程子曰上天之載無聲無臭其體則謂之易其理則謂之道其用則謂之神隂陽闔闢便是易一闔一闢謂之變命之曰易便有理若安排定則更有甚理天地隂陽之變便如二扇磨升降盈虛剛柔初未嘗停息陽常盈隂常虧故便不齊譬如磨既行齒都不齊既不齊便生出萬變故物之不齊物之情也而莊周強要齊物然而物終不齊也堯夫有言泥空終是著齊物到頭爭易中只言反復往來上下作易者自天地幽明至于昆蟲草木微細無不合聖人之道如河圖洛書其始止於畫上便出義後之人既重卦又繫辭求之未必得其理因見賣兔者曰聖人見河圖洛書而畫八卦然何必圖書只看此兔亦可作八卦數便此中可起古聖人只取神物之至著者耳只如樹木亦可見數張閎中問易之義本起於數曰謂義起於數則非也有理而後有象有象而後有數易因象以知數得其義則象數在其中矣必欲窮象之隱微盡數之毫忽乃尋流逐末術家之所尚非儒者之所務也管輅郭璞之學是也又曰理無形也故因象以明理理見乎辭矣則可由辭以觀象故曰得其義則象數在其中矣謂堯夫曰知易數為知天知易理為知天堯夫云還須知易理為知天尹焞問易乾坤二卦斯可矣曰聖人設六十四卦三百八十四爻後世尚不能了乾坤二卦豈能盡也既而曰子以為何人分上事對曰聖人分上事曰若聖人分上事則乾坤二卦亦不須况六十四卦乎看易且要知時凡六爻人人有用聖人自有聖人用賢人自有賢人用衆人自有聚人用學者自有學者用君有君用臣有臣用無所不通觀易須看時然後觀逐爻之才一爻之間常包涵數意聖人當取其重者而為之辭亦有易中言之已多取其未嘗言者亦不必重事又有且言其時不及其爻之才皆臨時參考須先看卦乃看得繫辭大抵卦爻始立義既具即聖人别起義以錯綜之如春秋時已前既已立例到近後來書得全别一般事便書得别有意思若依前例觀之殊失之也凡看書各有門庭詩易春秋不可逐句看尚書論語可以逐句看聖人用意深處全在繫辭詩書乃格言古之學者皆有傳授如聖人作經本欲明道今人若不先明義理不可治經蓋不得傳授之意云爾如繫辭本欲明易若不先求卦義則看繫辭不得易學後來曽子子夏煞到上面也由孟子可以觀易今時人看易皆不識得易是何物只就上穿鑿若念得不熟與就上添一德亦不覺多就上減一德亦不覺少譬如不識此兀子若減一隻腳不覺是少添一隻腳亦不知是多若識則自添減不得也易須是默識心通只窮文義徒費力朱子曰聖人作易之初蓋是仰觀俯察見得盈乎天地之間無非一隂一陽之理有是理則有是象有是象則其數便自在這裏非特河圖洛書為然蓋所謂數者秖是氣之分限節度處得陽必竒得隂必偶凡物皆然而圖書為特巧而著耳於是聖人因之而畫卦其始也只是畫一竒以象陽畫一偶以象隂而已但才有兩則便有四才有四則便有八又從而再倍之便是十六蓋自其無眹之中而無窮之數已具不待安排而其勢有不容已者卦畫既立便有吉凶在裏蓋是隂陽往來交錯於其間其時則有消長之不同長者便為主消者便為客事則有當否之或異當者便為善否者便為惡即其主客善惡之辨而吉凶見矣故曰八卦定吉凶吉凶既決定而不差則以之立事而大業自此生矣此聖人作易教民占筮而以開天下之愚以定天下之志以成天下之事者如此但自伏羲而上只有此六畫而未有文字可傳到文王周公乃繫之以辭故曰聖人設卦觀象繫辭焉而明吉凶蓋是卦之未畫也因觀天地自然之法象而畫及其既畫也一卦自有一卦之象象謂有箇形似也故聖人即其象而命之名以爻之進退而言則如剝復之類以其形之肖似而言則如鼎井之類此是伏羲即卦體之全而立箇名如此及文王觀卦體之象而為之彖辭周公視卦爻之變而為之爻辭而吉凶之象益著矣大率天下之道只是善惡而已但所居之位不同所處之時既異而其幾甚微只為天下之人不能曉會所以聖人因此占筮之法以曉人使人居則觀象玩辭動則觀變玩占不迷於是非得失之途所以是書夏商周皆用之其所言雖不同其辭雖不可盡見然皆太卜之官掌之以為占筮之用有所謂繇辭者左氏所載尤可見古人用易處蓋其所謂象者皆是假此衆人共曉之物以形容此事之理使人知所取舍而已故自伏羲而文王周公雖自略而詳所謂占筮之用則一蓋即那占筮之中而所以處置是事之理便在那裏了故其法若粗淺而隨人賢愚皆得其用蓋文王雖是有定象有定辭皆是虛説此箇地頭合是如此處置初不黏著物上故一卦一爻足以包無窮之事不可只以一事指定説他裏面也有指一事説處如利建侯利用祭祀之類其他皆不是指一事説此所以見易之為用無所不該無所不遍但看人如何用之耳到得夫子方始純以理言雖未必是羲文本意而事上説理亦是如此但不可便以夫子之説為文王之説也天地之間别有甚事只是隂與陽兩箇字看是甚麼物事都離不得只就身上體看才開眼不是隂便是陽密拶拶在這裏都不著得别物事不是仁便是義不是剛便是柔只自家要做向前便是陽才收退便是隂意思才動便是陽才靜便是隂未消别看只是一動一靜便是隂陽伏羲只因此畫卦以示人若只就一隂一陽又不足以該衆理於是錯綜為六十四卦三百八十四爻初只是許多卦爻後來聖人又繫許多辭在下如他書則元有這事方説出這箇道理易則未曽有此事先假託都説在這裏又曰隂陽是氣才有此理便有此氣才有此氣便有此理天下萬事萬物何者不出於此理何者不出於隂陽易只是隂陽錯綜交換代易莊生曰易以道隂陽不為無見如竒偶剛柔便只是隂陽做了易易是隂陽屈伸隨時變易大抵古今有大闔闢小闔闢今人説易都無著摸聖人便於六十四卦只以隂陽竒偶寫出來至於所以為隂陽為古今乃是此道理龜山過黃亭詹季魯家季魯問易龜山取一張紙畫箇圈子用墨塗其半云這便是易此説極好易只是一隂一陽做出許多般樣潔靜精微之謂易自是不惹著事只懸空説一樣道理不比似他書各著事上説所以後來道家取之與老子為類便是老子説話也不就事上説又曰潔靜精微是不犯手問卦下之辭為彖辭左傳以為繇辭何也曰此只是彖辭故孔子曰知者觀其彖辭則思過半矣如元亨利貞乃文王所繫卦下之辭以斷一卦之吉凶此名彖辭彖斷也陸氏音中語所謂彖之經也大哉乾元以下孔子釋經之辭亦謂之彖所謂彖之傳也爻下之辭如潛龍勿用乃周公所繫之辭以斷一爻之吉凶也天行健君子以自強不息所謂大象之傳潛龍勿用陽在下也所謂小象之傳皆孔子所作也天尊地卑以下孔子所述繫辭之傳通論一經之大體凡例無經可附而自分上繫下繫也左氏所謂繇字從系疑亦是言繫辭繫辭者於卦下繫之以辭也通書云聖人之精畫卦以示聖人之緼因卦以發精是聖人本意緼是偏傍帶來道理如易有太極是生兩儀兩儀生四象四象生八卦是聖人本意砥如文言繫辭等孔子之言皆是因而發砥不可一例作重看易之有象其取之有所從其推之有所用非茍為寓言也然兩漢諸儒必欲究其所從則既滯泥而不通王弼以來直欲推其所用則又疏略而無據二者皆失之一偏而不能闕其所疑之過也且以一端論之乾之為馬坤之為牛説卦有明文矣馬之為健牛之為順在物有常理矣至於案文責卦若屯之有馬而無乾離之有牛而無坤乾之六龍則或疑為震坤之牝馬則當反為乾是皆有不可曉者是以漢儒求之説卦而不得則遂相與創為互體變卦五行納甲飛伏之法參互以求而幸其偶合其説雖詳然其不可通者終不可通其可通者又皆傅會穿鑿而非有自然之勢雖其一二之適然而無待於巧説者為若可信然上無所關於義理之本源下無所資於人事之訓戒則又何必苦心極力以求於此而欲必得之哉故王弼曰義茍應健何必乾乃為馬爻茍合順何必坤乃為牛而程子亦曰理無形也故假象以顯義此其所以破先儒膠固支離之失而開後學玩辭玩占之方則至矣然觀其意又似直以易之取象無復有所自來但如詩之比興孟子之譬喻而已如此則是説卦之作為無所與於易而近取諸身逺取諸物者亦􅓑語矣故疑其説亦若有未盡者因竊論之以為易之取象因必有所自來而其為説必已具於太卜之官顧今不可復考則姑闕之而直據辭中之象以求象中之意使足以為訓戒而決吉凶如王氏程子與吾本義之云者其亦可矣固不必深求其象之所自來然亦不可謂假設而遽欲忘之也伏羲畫八卦只此數畫該盡天下萬物之理學者於言上會得者淺於象上會得者深王輔嗣伊川皆不信象如今却不敢如此説只可説道不及見這箇了且從象以下説免得穿鑿某嘗作易象説大率以簡治繁不以繁御簡易之象似有三樣有本畫自有之象如竒畫象陽偶畫象隂是也六十四卦之爻一爻各自一象有實取諸物之象如乾坤六子以天地雷風之類象之是也有只是聖人以意自取那象來明是義者如白馬翰如載鬼一車之類是也看易若是靠定象去看便滋味長若只恁地懸空看也沒甚意思又曰説易得其理則象數在其中固是如此然泝流以觀却須先見象數的當下落方説得理不走作不然事無實證則虛理易差也上古之時民心昧然不知吉凶所在故聖人作易教之卜筮吉則行之凶則避之此是開物成務之道故繫辭云以通天下之志以定天下之業以斷天下之疑正謂此也初但有占而無文往往如今人用火珠林起課者相似但用其爻而不用其辭則知古人占不待辭而後見吉凶至孔子又恐人不知其所以然故又復逐爻解之謂此爻所以吉者謂以中正也此爻所以凶者謂不當位也明言之使人易曉爾至如文言之類却又就上面發明道理非是聖人本意知此方可學易聖人一部易皆是假借虛設之辭蓋緣天下之理若正説出便只作一件用唯以象言則當卜筮之時看是甚事都來應得上古之易方是利用厚生周易始有正德意如利貞是教人利於貞正貞吉是教人貞正則吉至孔子則説得道理又多易只是設箇卦象以明吉凶而已更無他説又曰易是箇有道理砥卦影易以卜筮作許多理便也在裏易本卜筮之書後人以為止於卜筮至王弼用老莊解後人便只以為理而不以為卜筮亦非想當初伏羲畫卦之時偶見得一是陽二是隂從而畫放那裏只是陽為吉隂為凶無文字後文王見其不可曉故為之作彖辭或占得爻處不可曉故周公為之作爻辭又不可曉故孔子為之作十翼皆解當初之意今人不看卦爻而看繫辭是猶不看刑統而看刑統之序例也安能曉今人須以卜筮之書看之方得不然不可看易易只是為卜筮而作故周禮分明言太卜掌三易連山歸藏周易古人於卜筮之官立之凡數人秦去古未逺故周易亦以卜筮得不焚今人才説易是卜筮之書便以為辱纍了易見夫子説許多道理便以為易只是説道理殊不知其言吉凶悔吝皆有理而其教人之意無不在也而今所以難理會時蓋緣亡了那卜筮之法如太卜掌三易之法連山歸藏周易便是别有理會周易之法而今却只有上下經兩篇皆不見許多法了所以難理會今人却道聖人言理而其中因有卜筮之説他説理後説從那卜筮上來做麼易只是與人卜筮以決疑惑若道理當為固是便為若道理不當為自是不可做何用更占却是有一樣事或吉或凶或兩岐道理處置不得所以用占今學者諱言易本為卜筮作須要説做為義理作若果為義理作時何不直述一件文字如中庸大學之書言義理以曉人須得畫八卦則甚陽爻多吉隂爻多凶又看他所處之地位如何易中大槩陽吉而隂凶間亦有陽凶而隂吉者何故蓋有當為有不當為若當為而不為不當為而為之雖陽亦凶易中却是貞吉不曽有不貞吉却是利貞不曽説利不貞如占得乾卦固是大亨下則云利貞蓋正則利不正則不利至理之權輿聖人之至教寓其間矣大率是為君子設非小人盜賊所得竊取而用橫渠云易為君子謀不為小人謀極好易中利字多為占者設如利涉大川是利於行舟也利有攸往是利於啓行也利用祭祀利用享祀是卜祭吉田獲三狐田獲三品是卜田吉公用享於天子是卜朝覲吉利建侯是卜立君吉利用為依遷國是卜遷國吉利用侵伐是卜侵伐吉之類今人讀易當分為三等看伏羲之易如未有許多彖象文言説話方見得易之本意只是要作卜筮用如伏羲畫卦那裏有許多文字言語只是某卦有某象如乾有乾之象坤有坤之象而已今人説易未曽明乾坤之象便先説乾坤之理所以説得都無情理及文王周公分為六十四卦添入乾元亨利貞坤元亨利牝馬之貞早不是伏羲之意已是文王周公自説出一般道理了然猶是就人占處説如占得乾卦則大亨而利於正耳及孔子繫易作彖象文言則以元亨利貞為乾之四德又非文王之易矣讀易之法竊疑卦爻之辭本為卜筮者斷吉凶而具訓戒至彖象文言之作始因其吉凶訓戒之意而推説其義理以明之後人但見孔子所説義理而不復推本文王周公之本意因鄙卜筮以為不足言而其所以言者遂逺於日用之實類皆牽合委曲偏主一事而言無復包含該貫曲暢旁通之妙若但如此則聖人當時自可别作一書明言義理以詔後世何用假託卦象為此艱深隱晦之辭乎故今欲凡讀一卦一爻便如占筮所得虛心以求其辭義之所指以為吉凶可否之決然後考其象之所以然者求其理之所以然者推之於事使上自王公下至民庶所以修身治國皆有可用私竊以為如此求之似得三聖之遺意孔子之易非文王之易文王之易非伏羲之易伊川易傳自是程氏之易也故學者且依古易次第先讀本文則見本旨矣看易須是看他未畫卦已前是怎生模樣却就這裏看他許多卦爻象數非是杜撰都是合如此未畫已前便是寂然不動喜怒哀樂未發之中只是箇至虛至靜而已忽然在這至虛至靜之中有箇象方説出許多象數吉凶道理所以禮曰潔靜精微易教也蓋易之為書是懸空做出來如書便真箇有這政事謀謨方做出書來詩便真箇有這人情風俗方做出詩來易却都無這已往底事只是懸空做砥未有爻畫之先在易則渾然一理在人則湛然一心既有爻畫方見得這爻是如何這爻又是如何然而皆是就這至虛至靜中做出許多象數來此其所以靈易須是錯綜看天下事無不出於此善惡是非得失以至於屈伸消長盛衰看甚事都出於此伏羲以前不知如何占考至伏羲將隂陽兩箇畫卦以示人使人於此占考吉凶禍福一畫為陽二畫為隂一畫為奇二畫為偶遂為八卦又錯綜為六十四卦凡三百八十四爻文王又為之彖辭以釋其義無非隂陽消長盛衰屈伸之理聖人之所以學者學此而已易最難看其為書也廣大悉備包涵萬理無所不有其實是古者卜筮書不必只説理象數亦可説初不曾滯於一偏某近看易見得聖人本無許多勞攘自是後世一向妄意增減便要作一説以強通其意所以聖人經旨愈見不明且如解易只是添虛字去迎過意來便得今人解易乃去添他實字却是借他做已意説了又恐或者一説有以破之其勢不得不支離更為一説以護吝之説千説萬與易全不相干此書本是難看底物不可將小巧去説又不可將大話去説易難看不比他書易説一箇物非真是一箇物如説龍非真龍若他書則真是實孝悌便是孝悌仁便是仁易中多有不可曉處易難看無箇言語可形容得蓋爻辭是説箇形像在那裏無所不包看易須著四日看一卦一日看卦辭彖象兩日看六爻一日統看方子細又曰和靖學易一日只看一爻此物事成一片動著便都成片如何看一爻得又曰先就乾坤二卦上看得本意了則後面皆有通路易大槩欲人恐懼修省今學易非必待遇事而占方有所戒只平居玩味看他所説道理於自家所處地位合是如何故云居則觀其象而玩其辭動則觀其變而玩其占孔子所謂學易正是平日常常學之想見聖人之所讀異乎人之所謂讀想見胸中洞然於易之理無纎毫蔽處故云可以無大過讀易之法先讀正經不曉則將彖象繫辭來解又曰易爻辭如籖辭問易如何讀曰只要虛其心以求其義不要執巳見讀他書亦然問讀易未能浹洽何也曰此須是此心虛明寧靜自然道理流通方包羅得許多義理蓋易不比詩書他是説盡天下後世無窮無盡底事理只一兩字便是一箇道理又人須是經歷天下許多事變讀易方知各有一理精審端正今既未盡經歷非是此心大假虛明寧靜如何見得此不可不自勉也又曰如今不曾經歷得許多事過都自揍他道理不著若便去看也卒未得他受用孔子晚而好易可見這書卒未可理會問易本義何專以卜筮為主曰且須熟讀正文莫看注解蓋古易彖象文言各在一處至王弼始合為一後世諸儒遂不敢與移動今雖卒説且須熟讀正文久當自悟問讀本義所釋卦辭若看得分明則彖辭之義亦自明只須略提破此是卦義此是卦象卦體卦變不必更下注腳矣曰某當初作此文字時正欲如此蓋彖傳本是釋經之卦辭若看卦辭分明則彖亦可見但後來要重整頓過未及不知今所解者能如本意否又曰某一本義欲將文王卦辭只大綱依文王卦辭略説至其所以然之故却於孔子彖辭中發之且如大畜利貞不家食吉利涉大川只是占得大畜者為利正不家食而吉利於涉大川至於剛上而尚賢等處乃孔子發明各有所主爻象亦然如此則不失文王本意又可見孔子之意但而今未暇整頓耳某解一部易只是作卜筮之書今人説得來太精了更入粗不得如某之説雖粗却入得精精義皆在其中若曉得某説則曉得羲文之易本是如此元未有許多道理在方不失易之本意今未曉得聖人作易之本意便先要説道理縱饒説得好只是與易元不相干某之易簡略者當時只是略搭記兼文義伊川及諸儒皆説了某只就語脈中略牽過這意思近得趙子欽書云語孟説極詳易説太略此譬如燭籠添一條骨則障了一路明若能盡去其障使之統體光明乃更好蓋著不得詳説也看易先看某本義了却看程傳以相參考如未看他易先看某説却也易看蓋不為他説所汨故也天台董氏曰昔者聖人之作易也因河圗而畫卦命爻因卦爻而取象繫辭更三聖人而卦爻象辭始備其要皆依卜筮以為教使天下後世之人得以決嫌疑定猶豫不迷於吉凶悔吝之途而已至夫子彖傳與大小象之辭則推明其所以為卦爻象辭之理而大傳之書又自夫卦爻象辭以推極乎隂陽變化性命道德之藴奧而河圖大衍之數太極兩儀四象八卦相生之序蓍䇿分揲挂扐之法無不備具其所以承三聖開來學功至大也及秦焚滅典籍此書以卜筮得不亡而千餘年間諸儒無有能明其義者於是借異端空妙之説而欲闡夫極深研幾之旨以術數拘泥之學而欲究夫開物成務之方其去易也不甚逺而程子奮乎千載之下始以隨時變易從道而發明隂陽變易之妙因象以明理由理以貫事該體用合顯微使夫學是書者立言制行處已治人守常應變莫不有度逮乎朱子本義辭益簡嚴深探古聖因卜筮教人之本意而不墮於諸儒術數之末流釋彖傳則第明其為卦象卦變卦體卦德而不費於辭説釋大傳則又精密微妙明白簡易有先儒所未及者故愚竊嘗妄論以為三聖之易惟夫子能明之而夫子十翼之外其有功於易道者則惟程子朱子之書而已其他不失於支離破碎則失於誕謾怪僻皆非卓然有見於斯道者也或曰程子言理而不及卜筮朱子則推本古聖人因卜筮教人之意二者固不同矣子比而同之何耶愚聞之北溪陳氏曰易之起原於象數自象數之既形則理又具於象數之中而不可以本末二其觀也易之作本於占筮自占筮之既立則理又寓於占筮之內而不可以精粗二其用也此正程子所謂體用一源顯微無間者若偏於象占而不該夫理義則孔子之意泯一於理義而不及夫象占則羲文周公之心亦幾乎息矣朱子本義之書作所以必表伏羲圖象冠諸篇端以明作易根源之所自來一出於天之自然而非人為智巧之私又復古經傳次序推原四聖所以成書之本意遞相解釋而惟占法之明隨人取決而無偏辭之滯而天下義理為之磨刮精明依然涵萃於其中本末精粗兼該具舉近以補程傳之所不足而上以承四聖之心所謂開物成務之大用至是又益周備而易道之盛於此無餘藴矣又曰凡文公之説皆所以發明程子之説或足其所未盡或補其所未圎或白其所未瑩或貫其所未一其實不離乎程説之中必如是而後謂有功於程子未可以優劣校之也夫朱子之書固以補程子之所未及而程子之名言蓋有朱子不能加毫末於其間者謂二書為不同可乎讀者詳之葵初王氏曰善讀易者要識聖人畫卦作易來處無非太極河圖理數自然之妙則繫辭啓蒙是其機括又須分别四聖之易通卦名義然後以本義程傳相參考沿流泝源由藴探精分合看之逺近取之則數陳象列言盡理得上極天地自然之易於是始信易與天地凖窮理盡性開物成務內聖外王之學備於斯易何止五經之源其天地鬼神之奧豈欺我哉
