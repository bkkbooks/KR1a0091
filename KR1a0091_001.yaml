body:
  text: 上下篇義乾坤天地之道隂陽之本故為上篇之首坎離隂陽之成質故為上篇之終咸恒夫婦之道生育之本故為下篇之首未濟坎離之合既濟坎離之交合而交則生物隂陽之成功也故為下篇之終二篇之卦既分而後推其義以為之次序卦是也卦之分則以隂陽陽盛者居上隂盛者居下所謂盛者或以卦或以爻卦與爻取義有不同如剝以卦言則隂長陽剝也以爻言則陽極於上又一陽為衆隂主也如大壮以卦言則陽長而壮以爻言則隂盛於上用各於其所不相害也乾父也莫亢焉坤母也非乾无與為一无為字敵也故卦有乾者居上篇有坤者居下篇而復陽生臨陽長觀陽盛剝陽極則雖有坤而居上姤隂生遯隂長大壮隂盛夬隂極則雖有乾而居下其餘有乾者皆在上篇泰否需訟小畜履同人大有无妄大畜也有坤而在上篇皆一陽之卦也卦五隂而一陽則一陽為之主故一陽之卦皆在上篇師謙豫比復剝也其餘有坤者皆在下篇晉明夷萃升也卦一隂五陽者皆有乾也又陽衆而盛也雖衆陽說於一隂說之而已非如一陽為衆隂主也王弼云一隂為之主非也故一隂之卦皆在上篇小畜履同人大有也卦二陽者有坤則居下篇小過雖無坤隂過之卦也亦在下篇其餘二陽之卦皆一陽生於下而達於上又二體皆陽陽之盛也皆在上篇屯蒙頤習坎也陽生於下謂震坎在下震生於下也坎始於中也達於上謂一陽至一作在上或得正位也生于下而上一作陽達陽暢之盛也陽生於下而不達於上又隂衆而陽寡復失正位陽之弱也震也解也上有陽而下无陽无本也艮也蹇也震坎艮以卦言則陽也以爻言則皆始變微也而震之上艮之下无陽坎則陽陷皆非盛也惟習坎則陽上達矣故為盛卦二隂者有乾則陽盛可知需訟大畜无妄也无乾而為盛者大過也離也大過陽一有過字盛於中上下之隂弱矣陽居上下則綱紀於隂頤是也隂居上下不能主制於陽而反弱也必上下各二隂中唯兩陽然後為勝小過是也大過小過之名可見也離則二體上下皆陽隂實麗焉陽之盛也其餘二隂之卦二體俱隂隂盛也皆在下篇家人睽革鼎㢲兌中孚也卦三隂三陽者敵也則以義為勝隂陽尊卑之義男女長少之序天地之大經也陽少於隂而居上則為勝蠱少陽居長隂上賁少男在中女上皆陽盛也坎雖陽卦而陽為隂所陷溺也又與隂卦重隂盛也故隂陽敵而有坎者皆在下篇困井渙節既濟未濟也或曰一體有坎尚為陽陷二體皆坎反為陽盛何也曰一體有坎陽為隂所陷又重為隂也二體皆坎陽生於下而達於上又二體皆陽可謂盛矣男在女上乃理之常未為盛也若失正位而隂反居尊則弱也故恒損歸妹豐皆在下篇女在男上隂之勝也凡女居上者皆在下篇咸益漸旅困渙未濟也唯隨與噬嗑則男下女非女勝男也故隨之彖曰剛来而下柔噬嗑彖曰柔得中而上行長陽非少隂可敵以長男下中少女故為下之若長少敵𫝑力侔則隂在上為陵陽在下為弱咸益之𩔖是也咸亦有下女之𧰼非以長下少也乃二少相感一作感說以相與所以致陵也故有利貞之戒困雖女少於男乃陽陷而為隂揜无相下之義也小過二陽居四隂之中則為隂盛中孚二隂居四陽之中而不為陽盛何也曰陽體實中孚中虚也然則頤中四隂不為虚乎曰頤二體皆陽卦而本末皆陽盛之至也中孚二體皆隂卦上下各二陽不成本末之𧰼以其中虚故為中孚隂盛可知矣鄱陽董氏曰按易序及上下篇義或以不載伊川文集為疑然世俗相傳已久玩其辭義非大程夫子亦不能及此也讀者詳焉建安丘氏曰說卦曰天地定位山澤通氣雷風相薄水火不相射此八卦者上下經成始成終之義也上經首以乾坤者天地定位之象下經首咸而次恒者咸者山澤通氣之象恒者雷風相薄之𧰼上經終以坎離下經終以既濟未濟又水火不相射之象也然水火天地之大用也是以艮兊震㢲之卦各一而坎離象也又曰乾坤者父母之道坎離者男女之道有父母而後有男女此上經終始之義也咸者少男少女之合恒者長男長女之合既濟未濟中男中女之合男女一配則成夫婦此下經始終之義也雙湖胡氏曰甞觀六十四卦反對之序上經自乾至離共用十八卦反對為三十卦下經自咸至未濟亦用十八卦反對為三十四卦有十八變而成卦之𧰼乾數九二九為十八坤數六三六亦十八乾竒其畫六坤偶二六十二合之則為三六亦十八然上下經豈无以為之主者乎盖甞思之天地為萬物之祖乾坤為六十四卦之祖不易之論也然以六十四卦分上下經則乾坤為上經之首即為上經之主而終之以坎離餘震艮㢲兌與坎離之餘卦皆其遇也故八卦各體散見於上經者乾坤最多各十有二而震艮各七㢲兌各四坎八離六而已以咸恒為下經之首即為下經之主艮兌㢲震是也而終之以既未濟亦坎離也餘乾坤坎離皆其遇也故八卦各體散見於下經者兌㢲最多各十有二震艮各九而乾坤各四坎八離十而已此上經自坎離外无一卦无乾坤下經自既未濟外亦无一卦无艮兌㢲震上經自乾坤之後三隂三陽之卦凡六乃乾坤之三變否泰乾坤之三隂三陽交不交也随蠱乾坤之三隂三陽雜居也噬嗑賁乾坤之三隂三陽分布也餘則乾坤兩體各司諸卦下經自咸恒而後艮兌㢲震相重之卦亦凡六乃咸恒之三變損益咸恒之首變咸變盡為損而艮上兌下恒變盡為益而㢲上震下猶上經之有泰否也漸歸妹咸恒之冄變咸恒之下二體艮㢲合而為漸咸恒之上二體兌震合而為歸妹猶上經之有隨蠱也中孚小過咸恒之三變咸恒上下二體交互相重以咸下體艮遇恒上體震則為小過以咸上體兌遇恒下體㢲則為中孚亦猶上經之有噬嗑賁也餘則艮兌㢲震各司諸卦焉然乾坤三變必一吉而一凶泰随賁吉而否蠱噬嗑凶矣咸恒三變亦必一吉而一凶益漸中孚吉而損歸妹小過凶矣或曰乾坤艮兊㢲震分主上下經固也而上經屯蒙隨蠱噬嗑賁頥大過八卦乃艮兌㢲震之合无乾坤正體下經遯壮普明夷夬姤萃升八卦乃有乾坤非盡艮兌㢲震之合體文王序卦何不徑以十六卦兩相傳易則非特上經自坎離外无一卦无乾坤正體而下經自既未濟外艮兌㢲震兩兩相從正體之外尤无間斷今下經普明夷无艮兌㢲震之正體只有互體之艮震不亦可乎曰聖人之智豈不及此而必為是者其意誠不欲使上下經截然為乾坤截然為艮兌㢲震於以見男女有從父母之𧰼父母有臨男女之𧰼而又不害其為上下經雖不盡有主卦之正體而亦未甞无可取之乾坤艮兌㢲震也上經屯䝉有互體坤随蠱噬嗑賁頥大過實分具乾坤三陽三隂之體下經普明夷有艮震互體此猶分隂分陽隂陽又互為根正易之妙處衆人固不識也以此求之庶乎可以竊窺文王之心而其間闗節脉理之通黙而識之又存乎其人焉
