body:
  text: 易五贊原象太一肇判隂降陽升陽一以施隂兩而承雲峰胡氏曰此畫前之易也太一即太極以其未分則曰太一以其極至則曰太極陽實則能施隂虛則能承乾曰雲行兩施曰德施普坤曰乃順承天曰承天時行施與承雖見於乾坤已畫之後此所言則未畫之前天地間隂陽之象與數凡陽皆一以施凡隂皆兩而承其理固如此太極判而生隂陽一每生兩此天地自然之易也惟皇昊羲仰觀俯察奇偶既陳兩儀斯設既幹乃支一各生兩隂陽交錯以立四象奇加以奇曰陽之陽奇而加偶陽隂以章偶而加竒隂內陽外偶復加偶隂與隂㑹兩一既分一復生兩三才在目八卦指掌奇奇而奇初一曰乾奇奇而偶兊次二焉奇偶而奇次三曰離奇偶而偶四震以隨偶奇而奇㢲居次五偶奇而偶坎六斯覩偶偶而竒艮居次七偶偶而偶坤八以畢初畫為儀中畫為象上畫卦成人文斯朗因而重之一貞八悔六十四卦由內達外或問一貞八悔朱子曰如乾夬大有大壯小畜需大畜泰內體皆乾是一貞外體八卦是八悔餘放此問內卦為貞外卦為悔何如曰此出於洪範貞看來是正悔是過意凡悔字都是過了方悔這悔字是過底意思亦是多底意思下三爻便是正卦上三爻似是過多了恐是如此這貞悔亦似今占卜分甚主客貞是事之始悔是事之終貞是事之主悔是事之客貞是在我底悔是應人底又曰本卦是貞攴卦是悔前後十卦又自有貞悔貞便是一箇靜之本體悔是動用之意問卦爻几初者多吉上者多凶曰時運之窮自是如此亦是貞悔意交易為體往此來彼變易為用時靜時動降帝而王傳夏歷商有占無文民用弗章文王繫彖周公繫爻視此八卦二純六交乃乾斯父乃坤斯母震坎艮男㢲離兊女離南坎北震東兊西乾坤艮㢲位以四維建官立師命曰周易孔聖傳之是為十翼遭秦弗燼及宋而明邵傳羲畫程演周經象陳數列言盡理得彌億萬年永著常式述旨㫺在上古世質民淳是非莫别利害不分風氣既開乃生聖人聰明睿知出類超羣仰觀俯察始畫竒偶教之卜筮以斷可否或問伏羲之後文王周公之前未有爻卦辭何以定吉凶朱子曰此無可考但周禮三易經卦皆八别皆六十有四則疑已有辭矣作為君師開鑿民牖民用不迷以有常守降及中古世變風移淳澆質喪民僞日滋穆穆文王身䝉大難安土樂天惟世之患乃本卦義繫此彖辭爰及周公六爻是資因事設教丁寧詳密必中必正乃亨乃吉語子惟孝語臣則忠鈎深闡微如日之中爰暨末流淫於術數僂句成欺黃裳亦誤左傳昭公二十五年臧昭伯如晋臧會竊其寶龜僂句以卜為信與僭僭吉後平子立會會曰僂句不余欺也注僂句龜所出地名僭不信也謂求立為臧氏後也僂力主力具二反句居其反雲峰吳氏曰臧會本有僭上之心曰僂句成欺者會欲以欺人不過借龜以成其欺也南蒯有叛志得黃裳之占以為大吉殊不知其舉事正反乎黃之中裳之下其大敗也固宜曰黃裳亦誤者非易之誤南蒯南蒯用易之誤也大哉孔子晚好是書韋編既絶八索以祛乃作彖象十翼之篇專用義理發揮經言居省象辭動察變占存亡進退陟降飛潛曰毫曰釐匪差匪謬假我數年庶無大咎恭惟三古四聖一心垂象炳明千載是臨惟是學者不本其初文辭象數或肆或拘嗟豫小子既微且陋鑽仰沒身奚測奚究匪警滋荒匪識滋漏維用存疑敢曰垂後明筮倚數之元參天兩地衍而極之五十乃備是曰大衍虛一無為其為用者四十九蓍信手平分置右於几取右一蓍掛左小指乃以右手揲左之策四四之餘歸之於扐初扐左手無名指間右策左揲將指是安再扐之奇通掛之算不五則九是謂一變置此掛扐再用存策分掛揲歸復準前式三亦如之竒皆四八三變既備數斯可察數之可察其辨伊何四五為少八九為多三少為九是曰老陽三多為六老隂是當一少兩多少陽之七孰八少隂少兩多一朱子曰老隂老陽所以變者無他到極處了無去處只得變回來做八六下來便是五生數了也去不得所以却去做七又曰七八九六雖是逐爻之數然全用七八則當占本卦辭三爻七八則當占兩卦辭全用九六則當占爻卦辭既得初爻復合前蓍四十有九如前之為三變一爻通十八變六爻發揮卦體可見老極而變少守其常六爻皆守彖辭是當變視其爻兩兼首尾變及三爻占兩卦體或四或五視彼所存四二五一二分一專皆變而他新成舊毁消息盈虛舍此視彼乾占用九坤占用六泰愕匪人姤喜來復朱子曰凡卦六爻皆不變則占本卦彖辭而以內卦為貞外卦為悔一爻變則以本卦變爻辭占二爻變則以本卦二變爻辭占仍以上爻為主三爻變則占本卦及之卦之彖辭而以本卦為貞爻卦為悔前十卦主貞後十卦主悔四爻變則以之卦二不變爻占仍以下爻為主五爻變則以之卦不變爻占六爻變則乾坤占二用餘卦占之卦彖辭汪氏深曰聖人用易以明民托之卜筮或所得之辭闊然不相對者何哉古人非有大事不疑不卜也若誠有兩可之疑而合筮之必誠敬專一以達于神明故神明亦以正告之倘有一毫不敬不誠不一則問此而答彼實神明之所不至而不告者也文王於䝉特發不告之例夫揲蓍必成一卦卦爻必皆有辭何以言其不告也蓋誠意專一則神告之辭皆應所問否則問此而答彼是則不告也若是而臆度遷就曲推强取以定吉凶惑之甚矣雲莊劉氏曰筮法占卦爻之辭然其辭或有不相應者吉凶何自而決蓋人於辭上會者淺於象上㑹者深伏羲教人卜筮亦有卦而已隨其所遇求之卦體卦象卦變無不應矣文王周公之辭所該終有限故有時而不應必如左傳國語所載占卦體卦象卦變而推互體始足以濟辭之所不及而為吉凶之前知耳讀易者不可不察也鄱陽董氏曰劉氏之說雖與汪氏不同然此說又自不可廢也稽類八卦之象說卦詳焉考之於經其用弗專彖以情言象以象告唯是之求斯得其要乾健天行坤順地從震動為雷㢲入木風坎險水泉亦雲亦雨離麗文明電日而火艮止為山兊說為澤以是舉之其要斯得雙湖胡氏曰文王繫彖周公繫爻至孔子而有象傳說卦其取象宜非一端也說卦之言象其有合於彖爻者即括彖爻之例也如震坎稱馬之類其有不合於彖爻者則又夫子之所自取也如坤牛震龍之類其有彖爻所未取而取者則又夫子所以括大象之例如乾天坤地之類而亦有出於大象之外者也如乾父坤母之類以此求之其庶乎不至於膠且泥矣凡卦六虛竒偶殊位竒陽偶隂各以其類得位為正二五為中二臣五君初始上終貞悔體分爻以位應隂陽相求乃得其正雲峰胡氏曰須看兩正字不同得位為正主一爻而論陽居陽位隂居隂位是之謂正乃得其正分上下兩爻而論隂與陽應陽與隂應是之謂正也凡陽斯淑君子居之凡隂斯慝小人是為常可類求變非例測非常曷變謹此為則警學讀易之法先正其心肅容端席有翼其臨朱子曰翼敬也于卦于爻如筮斯得假彼象辭為我儀則字從其訓句逆其情事因其理意適其平曰否曰臧如目斯見曰止曰行如足斯踐毋寬以略毋密以窮毋固而可毋必而通平易從容自表而裏及其貫之萬事一理理定既實事來尚虛用應始有體該本無稽實待虛存體應用執古御今由靜制動或問理定既實以下八句朱子曰聖人作易只是說一箇理都未曽有許多事却待他甚麼事來湊所謂事來尚虛蓋謂事之方來尚虗而未有若論其理則先自定固已實矣用應始有謂理之用實故有體該本無謂理之體該萬物又初無形迹之可見故無下面云稽考實理以待物事之來存此理之體以應無窮之用執古古便是易書裏面文字言語御今今便是今日之事以靜制動理便是靜底事便是動底且如即鹿無虞唯入于林中君子幾不如舍往吝其理謂將即鹿而無虞人必陷于林中若不舍而往是取吝之道這箇道理若後人做事如求官爵者求之不已便是取吝之道求財利者求之不已亦是取吝之道又如潛龍勿用其理謂當此時只當潛悔不當用若占得此爻凡事便未可做所謂君子動則觀其變而玩其占若是無事之時觀其象而玩其辭亦當知其理如此某每見前輩說易止把一事說某之說易所以異于前輩者正謂其理人人皆可用之不問君臣上下大事小事皆可用前輩止緣不把做占說了故此易竟無用處勉齊黃氏曰理定既實以下皆深指學易者而言理則體也事則用也理之為體雖甚實而所該者無形事之為用雖本虗而因應乃有稽實存體所以玩理待虛應用所以制事當潛而潛當見而見皆理之自然而不可易者非實乎然求其所謂當然者則無形之可見非本無乎未有潛見之事非虛乎處陋巷三過其門而不入則有迹之可覩非始有乎潔靜精微是之謂易體之在我動有常吉在㫺程氏繼周紹孔奧指宏綱星陳極拱唯斯未啓以俟後人小子狂簡敢述而申朱子答陸九韶曰近又作一小卜筮書亦以附呈蓋緣近世說易者於象數全然闊略其不然者又太拘滯支離不可究詰故推本聖人經傳中說象數者只此數條以意推之以為是足以上究聖人作易之本㫖下濟生人觀變玩占之實用學易者決不可以不知而凡說象數之過乎此者皆可以束之髙閣而不必問矣答呂祖儉曰所論易是聖人模寫隂陽造化此說甚善但恐於盡其言處未免多著道理說殺了耳此非面論未易窮竟然向於五贊數章說得似已分明卒章尤切不知曾細看否幸試考之有所未安却望見教也雙湖胡氏曰按五贊大要皆教人以象占之學首篇原竒偶之象推象之由也次篇述作者之旨為占而作也三篇明筮以發其占四篇稽類以考其象五篇以警學名欲人讀易之際常如卜筮之臨假象辭以為儀則而終趨於吉是又會象占而一之也朱子嘗曰某解易只作卜筮之書今五贊皆以象占示教其旨深矣又本義啓䝉論曰有天地矣可無易乎不可也有易矣可無本義啓䝉乎不可也金聲玉振集大成衆言淆亂折諸聖朱夫子其聖人之徒歟蓋自漢儒始變亂古易至有流為術數之歸而卒大亂於王弼且雜以虗無之論吾易遂晦蝕於天下寥寥千載孰覺我之太極有圖易通有書發往古不傳之祕開萬世理學之源斯道始有係屬逮夫易傳寫胸中之成書皇極其經世之大法正䝉闡象數之條目是雖古經變亂未就釐正而術數虛無之學為之一洗吾易粲然復明未幾陋儒妄作異端蜂起易置圖書劉牧指斥邵子林栗冒僞著述麻衣易之類易道又幾晦蝕朱夫子勃興探前聖之精微破俗學之繆妄本義啓䝉有作而後吾易始大明於世愚嘗謂孔聖以來朱夫子有功於易斷斷乎其不可及已今觀本義之為書也圖書定位而天地自然之易明先後天卦分而羲文之易辨二篇十翼不相混雜而經始為之復古六十四卦三百八十四爻兩言以蔽之曰象占而觀玩不涉虛文至於扶陽抑隂進君子退小人發於坤初六之爻者不過數語而天之經地之義人之紀易之要領直包括無遺恨此本義不可少於天下也啓䝉之為書也本圖書則揭天生神物章而易之本原正原卦畫則表易有太極章而易之位列明明蓍策則發明大衍章而掛扐之法定考變占則博取左氏傳以明斷例而吉凶趨避之見審合四篇大㫖一皆寓尊陽之微意而小人盜賊不得竊取而用此啓䝉不可少於天下也其他如太𤣥關易麻衣劉牧與夫林栗袁樞之徒所以惑世誣民者莫不斥其繆黜其僞折其悖摧陷廓清羽翼數聖人之易於天下此愚所謂自孔聖以來朱夫子有功於易斷斷乎不可極者豈誣也哉或曰是則然矣易者隂陽剛柔仁義性命道德之書今斷然蔽之以卜筮得無局於一偏而不免漢儒術數之弊乎且繫辭明言易有聖人之道四焉今本義惟以象占分之而不及辭變得無四者之目遺其二乎吁是皆未之思也是固隂陽剛柔仁義性命道德之書而卜筮者正將使人盡仁義之道參隂陽剛柔以順性命以和道德耳豈徒託之空言而不見諸實用乎又况卜筮之頃至理無乎不在正得聖人作易本意朱子已嘗言之奈何以此疑吾易乎至於聖人之道雖有四實不離乎二有象而後有辭有占而後有變不得於象則玩辭為空言不由於占則觀變於何所故有象辭有占辭占而後有卦變爻辭舉占象則辭變在其中若惟舉占則象辭變在其中此四者之序由輕歸重辭變統於象占象又統於占所以本義舉象占而統論易書一以貫之曰占謂之有遺可乎哉或又曰易之所重在占固也人之於易必占而後可用不占則易竟無用矣乎曰不然也朱子嘗曰凡讀一卦一爻便如占筮所得虛心以求辭義之所歸以為吉凶可否之決然後考其象之所以然求其理之所以然推之於事便上自王公下至民庶所以修身治國皆有所用初未嘗不示人以學易而用之之方也必曰占乎而後用之朱子之志荒矣
