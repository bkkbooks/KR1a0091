body:
  text: 周易傳義大全卷十七明胡廣等撰坎下兊上傳困序卦升而不已必困故受之以困升者自下而上自下升上以力進也不已必困矣故升之後受之以困也困者憊乏之義為卦兊上而坎下水居澤上則澤中有水也乃在澤下枯涸无水之象為困乏之義又兊以隂在上坎以陽居下與上六在二陽之上而九二陷於二隂之中皆隂柔揜於陽剛所以為困也君子為小人所揜蔽窮困之時也叠山謝氏曰困井相表裏困為塞井為通困則澤中无水井則木上有水困有未濟井有既濟困塞而井通明矣困亨貞大人吉无咎有言不信傳如卦之才則困而能亨且得貞正乃大人處困之道也故能吉而无咎大人處困不唯其道自吉樂天安命一作知命一作安義乃不失其吉也況隨時善處復有裕乎有言不信當困而言人誰信之本義困者窮而不能自振之義坎剛為兊柔所揜九二為二隂所揜四五為上六所揜所以為困坎險兌說處險而說是身雖困而道則亨也二五剛中又有大人之象占者處困能亨則得其正矣非大人其敦能之故曰貞又曰大人者明不正之小人不能當也有言不信又戒以當務晦黙不可尚口益取困窮朱子曰困卦難理㑹不可曉易中有數卦如此繫辭云卦有小大辭有險易辭也者各指其所之困是個極不好底卦所以卦辭也做得如此難曉如蹇剥否睽皆是不好卦只是剥卦分明是剥所以分曉困卦是個進退不得窮極底卦所以難曉其大意亦可見矣雲峰胡氏曰蹇能止則知足以避需不陷則義无所窮困之為卦上下三剛皆掩於柔窮而无所容此所以為困也然剛之困如此剛之亨自如處坎之險不失兊之說時雖困而道則亨身雖困而心則亨也他卦言亨與貞不貞則不亨亨由於貞也此卦言亨與貞處困能亨則得其貞貞由於亨也曰貞又曰大人者困而能亨是為貞正之大人非不正之小人所能也剛柔自乾坤往来于二與上而以九居五未嘗夑也是之謂貞是之謂大人此其所以吉而无咎也有言不信又戒處坎之險不可尚兊之口也進齋徐氏曰兊口不掩言象坎剛中有孚信象坎兊相失故有言不信處困之時當務晦黙尚口多言人誰信之困且窮而已故戒雙湖胡氏曰以卦體言坎遇兊而成困澤自涸于上坎自流於下兩不相得以卦爻言二為坎主上為兊主又居不相應之地兩不相向皆困之道蓋天地之氣由西而北則其勢順故兊下坎上為節由北而西則其勢逆而坎下兊上斯為困也亨者以卦徳言本義盡之以卦才言則二五剛中故亨貞主九五一爻言也大人兼指二五當困之時有二五剛健中正之大人以濟之吉无咎矣但二體終不相得故兊言而坎不信其亦居困之時而二五各自為謀者乎看来文王卦辭不過如此若剛掩之象已是夫子彖傳自發其意就彖傳釋之可也彖曰困剛揜也揜本又作掩於撿反傳卦所以為困以剛為柔所掩蔽也陷於下而掩於上所以困也陷亦掩也剛陽君子而為隂柔小人所掩蔽君子之道困窒之時也本義以卦體釋卦名于氏弇曰乾上九降居九二而之險坤六二上為上六而掩剛成困之義東平劉氏曰不曰柔掩剛而曰剛掩者何也无所歸咎故以剛自掩為辭蓋卦為君子設也縉雲馮氏曰下卦陽也陽寡而陷於二隂之中上卦隂也陽雖衆而在一隂之下隂為之主此陽剛之困君子窮之象也險以說困而不失其所亨其唯君子乎說音悅傳以卦才言處困之道也下險而上說為處險而能說雖在困窮艱險一作險艱之中樂天安義自得其說樂也時雖困也處不失義則其道自亨困而不失其所亨也能如是者其唯君子乎若時當困而反亨身雖亨乃其道之困也君子大人通稱朱子曰困而不失其所亨這句自說得好誠齋楊氏曰坎一陽陷二隂之中兊一隂蔽二陽之上皆剛揜於柔也剛揜於柔君子揜於小人能不困乎然困而亨何也亨不于其身于其心不于其時于其道也趙氏曰險以說在險而能說則無入而不自得矣其於處困也何有中溪張氏曰處險而說如顔子在陋巷而不改其樂栁下恵阨窮而不憫夫子厄於陳畏于匡孟子毁於臧倉身彌困而道彌亨唯君子能之廬陵龍氏曰所字合為句亨字為句所如艮止之所之所雖在困中不愧不怍泰然不失其常處此之謂亨能此者其唯君子乎貞大人吉以剛中也傳困而能貞大人所以吉也蓋其以剛中之道也五與二是也非剛中則遇困而失其正矣南軒張氏曰唯大人能處困凡人處之大則失節小則憂隕以中不剛耳雲峰胡氏曰剛之困於柔猶人之困於疾使易専論其困而无以通之是知其疾而不能用藥也如是則安用易哉故彖曰困亨彖傳曰困而不失其所亨彖以大人稱彖傳曰其唯君子乎蓋困而不失其所亨即是貞君子即是大人困而亨之君子其即剛貞之大人乎吉无咎由於貞貞由於亨有言不信尚口乃窮也傳當困而言人所不信欲以口免困乃所以致窮也以說處困故有尚口之戒本義以卦徳卦體釋卦辭吴園張氏曰兌為口在上故曰尚口乃窮西溪李氏曰當遜言以避禍雙湖胡氏曰夫子於困彖傳自以剛掩發伏義卦象文王卦辭初无是也以說處險則剛雖見掩而不失其所亨其唯二五剛中之君子乎又以卦徳論之也貞大人吉无咎而釋之以剛中也之辭歸重又在九五一爻上有言不信而釋之以尚口乃窮也之辭是說上六雖窮於言而終不見信於坎坎兊相失而成困象矣象曰澤无水困君子以致命遂志傳澤无水困乏之象也君子當困窮之時既盡其防慮之道而不得免則命也當推致其命以遂其志知命之當然也則窮塞禍患不以動其心行吾義而已苟不知命則恐懼於險難隕穫於窮戹所守亾矣安能遂其為善之志乎程子曰大凡利害禍福亦須致命須得致之為言直如人以力自致之謂也得之不得命固已定君子須知他命方得不知命无以為君子蓋命苟不知无所不至故君子於困窮之時須致命便遂得志其得禍得福皆已自致只要申其志而已本義水下漏則澤上枯故曰澤无水致命猶言授命言持以與人而不之有也能如是則雖困而亨矣朱子曰困厄有重輕力量有小大若能一日十二時㸃檢自已念慮動作須是合宜仰不愧俯不怍如此而不幸填溝壑䘮身殞命有不暇恤只得成就一個是處如此則方寸之間全是天理雖遇大困厄有致命遂志而已亦不知有人之是非向背惟其是而已問澤无水困君子以致命遂志曰澤无水困君子道窮之時但當委致其命以遂吾之志而已致命猶送這命與他不復為我之有雖委致其命而志則自遂无所囘屈伊川解作推致其命雖說得通然論語中致命字却是委致之致事君能致其身與士見危致命見危授命皆是此意授亦致字之意言將這命授與之也建安丘氏曰兊上離下其卦為革聖人象之曰澤中有火兌上坎下其卦為困聖人宜象之以澤中有水而曰澤无水何哉曰澤中不宜有火也而有火所以為革之象澤中宜有水也而反无水非困而何哉若亦言有水則困之義隐矣有无二字聖人蓋有深意存焉中溪張氏曰澤所以瀦水今水在澤下則澤涸而无水所以為困君子觀困窮之象但委命於天而成吾之志而已拘羑里以演易厄陳蔡而弦歌此皆善處困者也致命遂志猶殺身以成仁也致命有坎險之象遂志有兊說之象東谷鄭氏曰在命者不可求在志者可遂所謂從吾所好者也雲峰胡氏曰命在天志在我困則委其命於天困而亨則遂其志於我初六臀困于株木入于幽谷三嵗不覿臀徒敦反傳六以隂柔處於至卑又居坎險之下在困不能自濟者也必得在上剛明之人為援助則可以濟其困矣初與四為正應九四以陽而居隂為不正失一作夫剛而不中又方困於隂揜是惡能濟人之困猶株木之下不能䕃覆於物株木无枝葉之木也四近君之位在他卦不為无助以居困而不能庇物故為株木臀所以居也臀困於株木謂无所庇而不得安其居居安則非困也入于幽谷隂柔之人非能安其所遇既不能免於困則亦迷暗妄動入於深困幽谷深暗之所也方益入於困无自出之勢故至於三嵗不覿終困者也不覿不遇其所亨也建安丘氏曰初六居困體之下故曰臀株木乃木之无枝者指九四也初本與四相應四方為上六所揜猶无枝葉之木不能庇覆之故初不安其居是臀困于株木也初又處坎之下是入于幽暗之谷雖歴三嵗之乆而不能上覿乎四之正應也本義臀物之底也困于株木傷而不能安也初六以隂柔處困之底居暗之甚故其象占如此或問臀困於株木如何朱子曰在困之下至困者也株木不可坐臀在株木上其不安可知又問伊川將株木作初之正應不能庇他說如何曰恐說臀字不去中溪張氏曰人之體行則趾為下坐則臀為下初六困而不行此坐困之象也臨川吴氏曰入于幽谷不能自㧞以出於困也平庵項氏曰初六在坎下故為入于幽谷即坎初爻入于坎窞也雲峰胡氏曰卦名困以剛為柔所困也爻論困義非特剛困柔之困亦甚矣柔之困也困于株木困于石困于葛藟所困者槎枿之木纒繞之草困于石則又甚焉剛之困困于飲食困于金車困于赤紱飲食車服皆美物也六爻别而言之其崇陽抑隂亦可見矣合沙鄭氏曰困坎兊相重兌正西坎正北兊一隂始得秋氣而蔓草未殺故為葛藟之困六三秋冬之交蔓草葉脫而刺存故為蒺藜之困若初六在坎之下正大冬之時也蔓草為霜雪所殺靡有孑遺所存者株木而已三爻皆隂故繫以草木之象象曰入于幽谷幽不明也傳幽不明也謂益入昏暗自陷於深困也明則不至於陷矣張子曰處困者正乃无咎居非得中故幽不明也九二困于酒食朱紱方来利用亨祀征凶无咎紱音弗亨讀作享傳酒食人所欲而所以施恵也二以剛中之才而處困之時君子安其所遇雖窮戹險難无所動其心不恤其為困也所困者唯困於所欲耳君子之所欲者澤天下之民濟天下之困也二未得遂其欲施其恵故為困于酒食也大人君子懐其道而困於下必得有道之君求而用之然後能施其所藴二以剛中之徳困於下上有亢五剛中之君道同徳合必来相求故云朱紱方来方来方且来也朱紱王者之服蔽膝也以行来為義故以蔽膝言之利用享祀享祀以至誠通神明也在困之時利用至誠如享祀然其徳旣誠一作成自能感通於上自昔賢哲困於幽逺而徳卒升聞道卒為用者唯自守至誠而已征凶无咎方困之時若不至誠安處以俟命往而求之則犯難得凶乃自取也將誰咎乎不度時而征乃不安其所為困所動也失剛中之徳自取凶悔何所怨咎諸卦二五以隂陽相應而吉唯小畜與困乃戹於隂故同道相求小畜陽為隂所畜困陽為隂所掩也朱子曰朱紱赤紱若如伊川說使書傳中說臣下皆是赤紱則可詩中却有朱芾斯皇一句是說方叔於理又似不甚通白雲郭氏曰九二剛中之大臣困而不失其所亨者君子困於家食之際無飲食宴樂之奉其道則不可得而困九五之君子方將以同徳而来求則困于酒食非所憂也本義困于酒食厭飫苦惱之意酒食人之所欲然醉飽過宜則是反為所困矣朱紱方来上應之也九二有剛中之徳以處困時雖無凶害而反困於得其所欲之多故其象如此而其占利以享祀若征行則非其時故凶而於義為无咎也或問困于酒食木義作饜飫於所欲是如何朱子曰此是困於好底事在困之時有困於好事者有困於不好事者此爻是好爻當困時則是困於好事如感時花濺淚恨别鳥驚心花鳥好娛戲底物這時却發人不好底意思是因好物而困也酒食饜飫亦如此問朱紱方来利用享祀曰以之事君則君應之以之事神則神應之問困二五皆利用祭祀是如何曰他得中正又似取無應而心専一底意思祭祀享祀想只說箇祭祀无那自家活人却享他人祭之說中溪張氏曰坎為水水潤萬物如飲食之養人故需五困二上下卦有坎體者亦皆有酒食之象况九二以剛居中自有方来之慶又豈真困于酒食也哉雲峯胡氏曰困于酒食醉飽之過因饜飫而生苦惱者也視初之困于株木三之困于石有間矣所以初入幽谷三不見其妻二則有朱紱方来之慶特五亦為柔所掩其来也緩故曰方来耳其占利於享祀而不利於征行困之時誠一切至可通神明不必急於往也无咎諸家以為誰咎則當如節之象曰又誰咎也今象曰中有慶則征凶者行非其時故凶而於義无咎也本義精矣象曰困于酒食中有慶也傳雖困于所欲未能施恵於人然守其剛中之徳必能致亨而有福慶也雖使時未亨通守其中徳亦君子之道亨乃有慶也或問象云中有慶也是如何朱子曰他下面有許多好事六三困于石據于蒺藜入于其宫不見其妻凶傳六三以隂柔不中正之質處險極而用剛居陽用剛也不善處困之甚者也石堅重難勝之物蒺藜刺一无刺字不可據之物三以剛險而上進則二陽在上力不能勝堅不可犯益自困耳困于石也以不善之徳居九二剛中之上其不安猶藉刺據于蒺藜也進退既皆益困欲安其所益不能矣一作也宫其居所安也妻所安之主也知進退之不可而欲安其居則失其所安矣進退與處皆不可一有則字唯死而已其凶可知繫辭曰非所困而困焉名必辱非所據而據焉身必危既辱且危死期將至妻其可得見耶二陽不可犯也而犯之以取困是非所困而困也名辱其事惡也三在二上困為據之然苟能謙柔以下之則无害矣乃用剛險以乗之則不安而取困如據蒺藜也如是死期將至所安之主可得而一无而字見乎本義隂柔而不中正故有此象而其占則凶石指四蒺藜指二宫謂三而妻則六也其義則繫辭備矣朱子曰六三陽之隂上六隂之隂故將六三言之則上六為妻中溪張氏曰石之為物堅確而不納者也指九四四與初為應三雖比四而四不納之矣坎為叢棘乃蒺藜也六三進則遇乎九四之陽如石壓其上而无所納是困于石也退則乗乎九二之陽如棘刺其下而失所憑是據于蒺藜也六三以隂居陽而上六以隂居隂故三以上為妻然三與上无應无應而入于其宫宜不見其匹耦而凶也童溪王氏曰六三隂也而居陽自以為陽也故求配於上六然上六宫則是也而非其妻故曰入于其宫不見其妻雲峰胡氏曰六三本欲揜九二之剛然九二剛中正三隂柔不中正故自取困焉上六困之極悔則猶可至於吉如六三則上困於九四下據于九二以不正處二剛之間失其所安唯凶而已象曰據于蒺藜乗剛也入于其宫不見其妻不祥也傳據于蒺藜謂乗九二之剛不安猶藉刺也不祥者不善之徵失其所安者不善之效故云不見其妻不祥也九四来徐徐困于金車吝有終傳唯力不足故困亨困之道必由援助當困之時上下相求理當然也四與初為正應然四以不中正處困其才不足以濟人之困初比二二有剛中之才足以拯困則宜為初所從矣金剛也車載物者也以二剛在下載已故謂之金車四欲從初而阻於二故其来遲疑而徐徐是困于金車也已之所應疑其少已而之他將從之則猶豫不敢遽前豈不可羞吝乎有終者事之所歸者正也初四正應終必相從也寒士之妻弱國之臣各安其正而已苟擇勢而從則惡之大者不容於世矣二與四皆以陽居隂而二以剛中之才所以能濟困也居隂者尚柔也得中者不失剛柔之宜也本義初六九四之正應九四處位不當不能濟物而初六方困於下又為九二所隔故其象如此然邪不勝正故其占雖為可吝而必有終也金車為九二象未詳疑坎有輪象也中溪張氏曰坎為輿九二居坎體而又剛健故曰金車初六之来徐徐者以困于九二之金車也然四之志則在乎初始若可吝乆必有終也雲峰胡氏曰當困之時不可求以亟通故二曰方来五曰乃徐有說四曰来徐徐皆緩辭也初與四應其来之所以徐徐者為九二金車所隔也然隂陽相應正也九二隔之非正也邪終不得以勝正故始雖可吝而必有終也潛齋胡氏曰九四欲来初六之心即初六欲覿九四之心其未覿未來者一時之困耳時移困觧則欲覿者終於覿欲来者終於来故曰有終象曰来徐徐志在下也雖不當位有與也傳四應於一无於字初而隔於二志在下求故徐徐而来雖居不當位為未善然其正應相與故有終也臨川吴氏曰下謂初志在於拯初也不當位謂居柔故其行徐有與謂與初為正應行雖徐終能就初而拯其困也九五劓刖困于赤紱乃徐有說利用祭祀說音恱傳截鼻曰劓傷于上也去足為刖傷於下也上下皆揜於隂為其傷害劓刖之象也五君位也人君之困由上下無與也赤紱臣下之服取行来之義故以紱言人君之困以天下不来也天下皆来則非困也五雖在困而有剛中之徳下有九二剛中之賢道同徳合徐必相應而来共濟天下之困是始困而徐有喜說也利用祭祀祭祀之事必致其誠敬而後受福人君在困時宜念天下之困求天下之賢若祭祀然致其誠敬一作至誠則能致天下之賢濟天下之困矣五與二同徳而云上下无與何也曰隂陽相應者自然相應也如夫婦骨肉分定也五與二皆陽爻以剛中之徳同而相應相求而後合者一无者也也如君臣朋友義合也方其始困安有上下之與有與則非困故徐合而後有一无有字說也二云享祀五云祭祀大意則宜用至誠乃受福也祭與祀享泛言之則可通分而言之祭天神祀地示亨人鬼五君位言祭二在下言亨各以其所當用也開封耿氏曰享祀人神所以祀宗廟祭祀天子所以禮百神節齋蔡氏曰享狹祭廣君臣之用異也建安丘氏曰困卦二五蓋君臣同徳以拯困彖所謂貞大人吉者也卦於二爻互明其義故在二言朱紱五言赤紱在二言亨祀而五言祭祀也雲峰胡氏曰九五君也亦言困者下无應也然二雖非應而同徳故一時雖困乃遲乆而有說也二五取象皆相應二曰朱紱五曰赤紱紱所以行也二五不應欲遽行得乎故二方来五乃徐有說二曰亨祀五曰祭祀亦以二五當困之時必誠一切至如祭亨然則或有可通之理也二言征凶五不言者二在下不可急征以求上上之求下則不可以是例論也本義劓刖者傷於上下下既傷則赤紱無所用而反為困矣九五當困之時上為隂揜下則乗剛故有此象然剛中而說體故能遲乆而有說也占具象中又利用祭祀乆當獲福進齋徐氏曰二五同徳始雖未應終則應也濳室陳氏曰凡易言祭祀處爻多中實否則中虚中實則誠信之象中虚則誠信之理當困之時以九居五百事不利唯有中實利祭祀耳凡曰利祭祀則有亨通獲福之理焉象曰劓刖志未得也乃徐有說以中直也利用祭祀受福也傳始為隂揜无上下之與方困未得志之時也徐而有說以中直之道得在下之賢共濟於困也不曰中正與二合者云直乃宜也直比正意差緩盡其誠意如祭祀然以求天下之賢則能一无能字亨天下之困而享受其福慶也建安丘氏曰二言中而五言中直所以釋彖辭貞字之義二言有慶五言受福所以釋彖辭吉字之義上六困于葛藟于臲卼曰動悔有悔征吉藟力軌反臲五結反卼五骨反傳物極則反事極則變困既極矣理當變矣葛藟纒束之物臲卼危動之狀六處困之極為困所纒束而居最髙危之地困于葛藟與臲卼也動悔動輙有悔无所不困也有悔咎前之失也曰自謂也若能曰如是動皆得悔當變前之所為有悔也能悔則往而得吉也困極而征則出於困矣故吉三以隂在下卦之上而凶上居一卦之上而无凶何也曰三居剛而處險困而用剛險故凶上以柔居說唯為困極耳困極則有變困之道也困與屯之上皆以無應居卦終屯則泣血漣如困則有悔征吉屯險極而困說體故也以說順進可以離乎困也本義以隂柔處困極故有困于葛藟于臲卼曰動悔之象然物窮則變故其占曰若能有悔則可以征而吉矣縉雲馮氏曰葛之附木最出木杪此上六困于葛藟之象也雙湖胡氏曰藟蔓生上爻柔之象中溪張氏曰困至上六困之極矣處困而窮動輒得悔必知有悔艾之心斯有可出困窮之道故聖人特以征吉勉之李氏椿年曰自四以上困之極也自四以下處困之極而思有以通之也動固悔矣與其静而无悔孰若動而有悔為窮之通往則吉也雲峰胡氏曰困窮而通其上之時乎然剛困不害其亨柔困不悔不吉兩悔字與豫悔遲有悔不同豫言悔遲則事必有可悔此言事雖可悔而能悔則吉聖人拳拳欲人悔過如此開封耿氏曰處困之終有自通之路知柔不可牽捨之可也剛不可乗去之可也鄭氏剛中曰困有不可動九二是也故征凶有不可不動上六是也故征吉趙氏曰五爻皆不言吉獨於上六言吉者要當時而不可欲速也九二征凶九四来徐徐九五乃徐有說至上六始有征吉之辭象曰困于葛藟未當也動悔有悔吉行也傳為困所纒而不能變未得其道也是處之未當也知動則得悔遂有悔而去之可出於困是其行而吉也臨川吴氏曰未當者所處未得其當也吉行者能行而去之則吉也建安丘氏曰困剛揜也卦以三柔揜三剛為象然剛為柔揜者吉而柔揜剛者凶下卦則以初三之柔揜九二之剛然初言困于株木三言困于石二則言困于酒食而象以為中有慶是初三凶而二吉也上卦以上六之柔揜四五之剛然四言徐有終五言徐有說而上則言困于葛藟而象以為未當是四五吉而上凶也彖曰困而不失其所亨其惟君子乎三剛爻之謂矣巽下坎上傳井序卦困乎上者必反下故受之以井承上升而不已必困為言謂上升不已而困則必反於下也物之在下者莫如井井所以次困也為卦坎上巽下坎水也巽之象則木也巽之義則入也木器之象木入於水下而上乎水汲井之象也朱子曰井象只取巽入之義不取木義進齋徐氏曰以卦體言初柔為泉眼二三剛為泉石四柔為井中空處五剛為泉實已汲將出井也上柔為井空處有全井象隆山李氏曰自古國邑之建必先視其泉之所在是以公劉創京于豳之初相其隂陽觀其流泉先卜其井泉之便而後居之也又曰坎者天一之水見於諸卦者皆諸水下流之失故多以險喻其在卦而得水之真性者惟井是也以畫觀之一陽實其中二隂圍其外譬之陽氣初囘暖律於凝隂之中冬水因之而變溫此坎之真性也嘗以此觀天下之水其在冬而温者獨井泉而已蓋得之地脈不失其本真及注之川澤風雨霜露之所剥失其本性无復有向来一陽之溫矣載觀井泉之水在人身則精血是也川流之水在人身則涕洟之類是也精血固藏者乃井泉生動之性而涕洟往而不反者諸水下流之失也井改邑不改井无喪无得往来井井喪息浪反傳井之為物常而不可改也邑可改而之他井不可遷也故曰改邑不改井汲之而不竭存之而不盈无喪无得也至者皆得其用往来井井也无喪无得其徳也常往来井井其用也周常也周也井之道也朱子曰井是那掇不動底物事所以改邑不改井中溪張氏曰井徳之地也而以不變為徳下體本乾上體本坤初五剛柔相易而成井坤為邑變坤為坎改邑也坎水為井五以剛居中而不變是不改井也邑居其所而能聚可改而就井井居其所而有常不可改而就邑汲之而不竭故无所喪不汲之而不盈故无所得剛往居五柔来居初往者得水而上来者求水扵下往来皆井其井則无飢渇之害矣故曰往来井井汔至亦未繘井羸其瓶凶汔許訖反繘音橘羸律悲反傳汔幾也繘綆也井以濟用為功幾至而未及用亦與未下繘於井同也君子之道貴乎有成所以五穀不熟不如荑稗掘井九仭而不及泉猶為棄井有濟物之用而未及物猶无有也羸敗其瓶而失之其用喪矣是以凶也羸毁敗也本義井者穴地出水之處以巽木入乎坎水之下而上出其水故為井改邑不改井故无喪无得而往者来者皆井其井也汔幾也繘綆也羸敗也汲井幾至未盡綆而敗其瓶則凶也其占為事仍舊无得喪而又當敬勉不可幾成而敗也朱子曰汔至作一句亦未繘井羸其瓶是一句意謂幾至而止如綆未及井而瓶敗言功不成也建安丘氏曰改邑不改井井之體也无喪无得井之徳也往来井井井之用也此三句言井之事汔至亦未繘井未及於用也羸其瓶則併失其用也此二句言汲井之事厚齋馮氏曰繘關西謂綆汲水索瓶汲器文從缶瓦器也或謂古無桶故不取巽木象韓信以木罌渡師如尊罍古皆用木疑古以木為瓶從缶則又瓦為之者此象巽木無疑雲峰胡氏曰澤无水為困命也澤雖无水而井則有水性也知困之義則知安命知井之義則知盡性易性命之書而言之明且切者莫困井二卦若也改邑不改井三句為井言汔至三句為汲者言改邑不改井井之體也性静而定也无喪无得往来井井井之用也性動亦定也汔至未繘井而羸其瓶人之於性知之行有未盡者其猶是乎彖曰巽乎水而上水井井養而不窮也上時掌反本義以卦象釋卦名義隆山李氏曰坎三爻二隂在外為險陷井象也一陽居内陷二隂之中泉象也以巽遇坎巽木在坎水中巽水而上亦猶鑿木為機後重前輕挈水若抽者葢汲井之象也井之汲為烹飲漑濯日用可既乎故曰巽乎水而上水井井養而不窮也改邑不改井乃以剛中也傳巽入於水下而上其水者井也井之養於物不有窮已一作无有窮也取之而不竭徳有常也邑可改井不可遷亦其徳之常也二五之爻剛中之徳其常乃如是卦之才與義合也建安邱氏曰剛中五也剛則不變故邑可改而井不可改林氏栗曰井者君子之德井不可改以其剛中也剛中者泉在中也雲峰胡氏曰惟井之不改故不以往而喪不以来而得而往者米者自井其井彖傳但言其體而用已該矣汔至亦未繘井未有功也羸其瓶是以凶也傳雖使幾至既未為用亦與未繘井同井以濟用為功水出乃為用未出則何功也瓶所以上水而致用也羸敗其瓶則不為用矣是以凶也本義以卦體釋卦辭无喪无得往来井井兩句意與不改井同故不復出剛中以二五而言未有功而敗其瓶所以凶也建安丘氏曰井以上乎水為功汔至亦未繘井猶未可以得水故未有功也既不得水併與其瓶而羸之則汲之用廢矣是以凶也嵩山晁氏曰或謂彖主三陽言五井洌寒泉食是陽剛居得中正邑可改而井不可改也三井渫不食是水未見於用未有功也二甕敝漏是既不得水併其瓶而亾之羸其瓶而凶者也象曰木上有水井君子以勞民勸相上如字又時掌反勞力報反相息亮反傳木承水而上之一作来乃器汲水而出井之象君子觀井之象法井之徳以勞徕其民而勸勉以相助之道也勞徕其民法井之用也勸民使相助法井之施也本義木上有水津潤上行井之象也勞民者以君養民勸相者使民相養皆取井養之義朱子曰木上有水井說者以為木是汲器則前面却有瓶瓶自是瓦器此不可曉怕只是說水之津潤上行至那木之杪這便是井水上行之象草木之生津潤皆上行直至樹木便是木上有水之義雖至小之物亦然如菖蒲葉每晨葉葉尾皆有水如珠顆雖藏之宻室亦然非露水也問如此則井之義與木上有水何預曰木上有水便如井中之水水本在井底却能汲上来給人之食故取象如此問程子井桶之說是否曰不然木上有水是木穿水中張上那水若作汲桶則解不通矣且與羸其瓶之說不相合也臨川吴氏曰井之養人所及者衆君子觀其象教民以相養之道勞者閔其勞而休息之也勸勤勉之意相助力也勸相者使之各勤勉以相助也建安丘氏曰无君子莫治野人无野人莫養君子君勞乎民民助乎君古者井田之制或取諸此雲峰胡氏曰井以喻性然則勞民勸相所以養人之性也而以君養民使民自養又有井田之義焉初六井泥不食舊井无禽泥乃計反傳井與鼎皆物也就物以為義六以隂柔居下上无應援无上水之象不能濟物乃井之不可食也井之不可一无可字食以泥汙也在井之下有泥之象井之用以其水之養人也无水則舎置不用矣井水之上人獲其用禽鳥亦就而求焉舊廢之井人既不食水不復上則禽鳥亦不復往矣蓋无以濟物也井本濟人之物六以隂居下无上水之象故為不食井之不食以泥也猶人當濟物之時而才弱无援不能及物為時舎也本義井以陽剛為泉上出為功初六以隂居下故為此象蓋不泉而泥則人所不食而禽鳥亦莫之顧也臨川吴氏曰井以陽剛為泉隂柔為上初六隂柔在水之下故為泥雲峰胡氏曰井以上出為功初在井下泥而不為人所食矣井以汲而日新泥不可汲而為舊井而禽亦莫之頋矣進齋徐氏曰人品汚下不能强于為善无用於世為人所棄觀於此爻可以知所當勉矣象曰井泥不食下也舊井无禽時舎也舎音捨傳以隂而居井之下泥之象也无水而泥人所不食也人不食則水不上无以及禽鳥禽鳥亦不至矣見其不能濟物為時所舎置不用也若能及禽鳥是亦有所濟也舎上聲與乾之時舎音不同本義言為時所棄九二井谷射鮒甕敝漏射食亦反鮒音付傳二雖剛陽之才而居下上无應而比於初不上而下之象也井之道上行者也澗谷之水則旁出而就下二居井而就下失井之道乃井而如谷也井上出則養人而濟物一作上出而養人濟物今乃下就汚泥注於鮒而已鮒或以為蝦或以為蟇井泥中微物耳射注也如谷之下流注於鮒也甕敝漏如甕之破漏也陽剛之才本可以養人濟物而上无應援故不能上而就下是以无濟用之功如水之在甕本可為用乃破敝而漏之不為用也井之初二无功而不言悔咎何也曰失則有悔過則為咎无應援而不能成用非悔咎乎居二比初豈非過乎曰處中非過也不能上由无援非以比初也本義九二剛中有泉之象然上无正應下比初六功不上行故其象如此朱子曰鮒程沙隨以為蝸牛如今廢井中多有之進齋徐氏曰井谷者井傍穴也射下注也鮒泥中微物蛙屬謂初甕汲水瓶也九二剛中上无應與下比初六不上出而下注有井谷射鮒之象又為泉實可汲而在甕敝漏之象雲峰胡氏曰井以上出為功二无應而下昵於初以井言如井旁穴出之水僅能射鮒以汲井言如敝甕不足以上水而反漏於下中溪張氏曰彖言羸其瓶即此之甕敝漏也巽體覆盂亦有甕敝漏之象象曰井谷射鮒无與也傳井以上出為功二陽剛之才本可濟用以在下而上无應援是以下比而射鮒若上有與之者則當汲引而上成井之功矣臨川吴氏曰與謂應无應在上故无提挈之以出者進齋徐氏曰在井而射鮒在甕而敝漏皆无與之故也嘗謂人才生世自非果於暴棄甘為下流之歸者皆可與為善苟陽剛之禀資質之美者皆可以進徳良由上无應與而為之誘掖汲引者故上逹之難下達之易也九三井渫不食為我心惻可用汲王明並受其福渫息列反傳三以陽剛居得其正是有濟用之才者也在井下之上水之清潔可食者也井以上為用居下未得其用也陽之性上又志應上六處剛而過中汲汲於上進乃有才用而切於施為未得其用則如井之渫治清潔而不見食為心之惻怛也三居井之時剛而不中故切於施為異乎用之則行舎之則藏者也然明王用人豈求備也故王明則受福矣三之才足以濟用如井之清潔可用汲而食也若上有明王則當用之而得其效賢才見用則已得行其道君得享其功下得被其澤上下竝受其福也本義渫不停汙也井渫不食而使人心惻可用汲矣王明則汲井以及物而施者受者竝受其福也九三以陽居陽在下之上而未為時用故其象占如此朱子曰九三可用汲以上三句是象下兩句是占大槩是說理決不是說汲井若非王明則无以收拾人才中溪張氏曰九三以陽剛之才而居一井之半則泥者去注者深此渫治之井泉可食矣泉可食而人莫之食非惟使我心測也而行者過之亦為之惻然也然三有甘潔之泉苟上遇汲者之明則美泉見食而邑人皆被其井養之功猶下有陽剛之才而上遇王者之明則賢才見用而天下竝受其利澤之福也雲峰胡氏曰初六井泥而不食可也九三井渫可食矣而不食何哉為我心惻者非我心自惻也行道之人為我而心惻也惻此水可用汲而不汲也惻其與應者才柔不能汲也汲之者其惟五乎五非應也而曰王明周公特筆也王明則汲之以汲物而上下竝受其福矣象曰井渫不食行惻也求王明受福也傳井渫治而不見食乃人有才知而不見用以不得行為憂惻也既以不得行為惻則豈免有求也故求王明而受福志切於行也本義行惻者行道之人皆以為惻也誠齋楊氏曰可食者泉也不食者人也井何惻焉人之行者惻之非為井惻也為有才徳之君子不見用於上者惻也井一用一邑受其福君子一用天下受其福有美井无善汲則如无井有賢者无明王則如无賢仲尼曰王明不興天下孰能宗予然則九三之惻也井云乎哉君子云乎哉故微明揚之堯帝則大舜雷澤之漁父微明哲之髙宗則傳說巖野之胥靡六四井甃无咎甃側舊反傳四雖隂柔而處正上承九五之君才不足以廣施利物亦可自守者也故能修治則得无咎甃砌累也謂修治也四雖才弱不能廣濟物之功修治其事不至於廢可也若不能修治廢其養人之功則失井之道其咎大矣居髙位而得剛陽中正之君但能處正承上不廢其事亦可以免咎也本義以六居四雖得其正然隂柔不泉則但能修治而无及物之功故其象為井甃而占則无咎占者能自修治則雖无及物之功而亦可以无咎矣中溪張氏曰井甃者甓而修之也井而甃矣則舊井完而新之俾勿壊然六四才柔雖未能施其井養之用而近承九五井洌之主苟能甃而治之修而潔之則將有汲引上出之功而无汚濁不食之咎矣雲峰胡氏曰初才柔有井泥象三之渫渫初之泥也二位柔有井谷象四之甃甃二之谷也渫與甃其皆日新之功乎日新而不已寒泉之来不窮矣象曰井甃无咎修井也傳甃者修治於井也雖不能大其濟物之功亦一作若能修治一有亦字不廢也故无咎僅能免咎而已若在剛陽自不至如是如是則可咎矣平庵項氏曰泥與甃皆隂也初六不正在下故不能自修而為泥六四正而在上故能自修而為甃甃所以禦泥而達泉也有閑邪存誠之功故為修井之象建安丘氏曰三在内卦渫井内以致其潔四在外卦甃井外以禦其汚蓋不渫則汚者不潔不甃則潔者易汚此君子内外交相養之道也九五井洌寒泉食洌音烈傳五以陽剛中正居尊位其才其徳盡善盡美井洌寒泉食也洌謂甘潔也井泉以寒為美甘潔之寒泉可以人食也於井道為至善也然而不言吉者井以上出為成功未至於上未及用也故至上而後言元吉本義洌潔也陽剛中正功及於物故為此象占者有其徳則契其象也嵩山晁氏曰井者隂之質也故静而虚泉者陽之用也故動而實沙隨程氏曰水始達曰泉坎水之正性則寒坎北方也瀘川毛氏曰三與五皆泉之潔者也三居甃下未汲之泉也故曰不食五出乎甃已汲之泉也故曰食雲峰胡氏曰井至此初泥已浚二漏已修井道全矣所謂井養而不窮者正在此爻寒者水之性也洌潔也三之渫潔之也潔之可食矣而不如五之食者何哉五在上三猶在下故也然則渫與冽性也食與不食命也白雲郭氏曰洌言井之修潔主人事言寒言泉自然之性主天理言人事學也天理命也兩得之斯為至矣合沙鄭氏曰井以陽為泉者水固天之一陽而生也巽二陽二在地位趨下射谷而非井矣三在人位居甃之下汲之不及不若坎之一陽浮溢於甃上也井欲溢而鼎戒盈徳與器之辨也象曰寒泉之食中正也傳寒泉而可食井道之至善者也九五中正之徳為至善之義建安丘氏曰井六爻惟五曰泉蓋九五為井之主位中而正泉洌而寒井之徳已盡美矣井至九五雖未能收上出之功而寒泉之食則異乎井泥之不食井渫之不食者非坎中之泉洌而且寒則人亦將出而吐之況食之乎上六井收勿幕有孚元吉收詩救反又如字傳井以上出為用居井之上井道之成也收汲取也幕蔽覆也取而不蔽其利无窮井之施廣矣大矣有孚有常而不變也博施而有常大善之吉也夫一作人體井之用博施而有常非大人孰能他卦之終為極為變唯井與鼎終乃為成功是以吉也建安丘氏曰上六有井口之象收者汲器之出也幕者覆井之具也勿者禁止之也井以上出為功繘至於收而井養之用成矣聖人之心以博施濟衆為公而不以井養之利為私故勿幕焉夫惟收而勿幕然後天下信其心之公而有孚故獲大善之吉苟收繘之後復幕其井則非元吉在上井道之大成矣蓋内卦井道之小成外卦井道之大成也本義收汲取也晁氏云收鹿盧收繘者也亦通幕蔽覆也有孚謂其出有源而不窮也井以上出為功而坎口不揜故上六雖非陽剛而其象如此然占者應之必有孚乃元吉也雲峰胡氏曰六隂柔非泉也而有收之象元吉之占何哉他卦之終為極為變唯井與鼎終乃成功孚字例訓為信本義曰有孚謂出有源而不窮也蓋其出有源井之體也其應不窮井之用也必如此而後為盡性之極功象曰元吉在上大成也傳以大善之吉在卦之上井道之大成也井以上為成功雲峰胡氏曰象始末揭下上二字見井之用在上而不在下初井泥為時所棄下也故在上則由修而中正由中正而大成愈上則井之功愈大建安丘氏曰井卦六爻合而觀之一井也泉井實也先儒以三陽為泉三隂為井陽實隂虚之象也九二言井谷射鮒九三言井渫不食九五言井洌寒泉曰射曰渫曰洌非泉之象乎初六言井泥不食六四言井甃无咎上六言井收勿幕曰泥曰甃曰收非井之象乎以卦序而言則二之射始達之泉也三之渫已潔之泉也五之洌則可食之泉矣初之泥方掘之井也四之甃已修之井也上之收則出汲之井矣又以二爻為一例則初二皆在井下不見于用故初為泥而二為谷三四皆在井中將見於用故三為渫而四為甃五上皆在井上而已見於用矣故五言食而上言收也西溪李氏曰井六爻綱領最好初井泥二井谷皆廢井也三井渫則渫初之泥四井甃則甃二之谷既渫既甃則井道全矣故五爻井洌而泉寒上爻井收而勿幕功用始及物而井道大成矣又曰初與二在井之地故初泥而二谷三與四人位必盡人事故三渫而四甃五與上則得之天矣是以三才之位取義也離下兌上傳革序卦井道不可不革故受之以革井之為物存之則穢敗易之則清潔不可不革者也故井之後受之以革也爲卦兊上離下澤中有火也革變革也水火相息之物水滅火火涸水相變革者也火之性上水之性下若相違行則睽而已乃火在下水在上相就而相尅相滅息者也所以為革也又二女同居而其歸各異其志不同為不相得也故為革也革已日乃孚元亨利貞悔亾傳革者變其故也變其故則人未能遽信故必已日然後人心信從元亨利貞悔亾弊壊而後革之革之所以致其通也故革之而可以大亨革之而利於正道則可乆而得去故之義无變動之悔乃悔亾也革而无甚益猶一有有字可悔也況反害乎古人所以重改作也本義革變革也兊澤在上離火在下火然則水乾水決則火滅中少二女合為一卦而少上中下志不相得故其卦為革也變革之初人未之信故必已日而後信又以其内有文明之徳而外有和說之氣故其占為有所更革皆大亨而得其正所革皆當而所革之悔亾也一有不正則所革不信不通而反有悔矣朱子曰鄭東卿解革卦以為風爐亦解得好初爻為爐底二爻為爐眼三四五爻是爐腰處上爻是爐口卦中要看得親切須是兼象看但象不傳了鄭東卿易専取象如以鼎為鼎革為爐小過為飛鳥亦有義理其他更有好處亦有杜撰處合沙鄭氏曰革有鼎革生為熟之象故爐鞴之象為正蓋以離火鼔鑄兊金従革也革而受之以鼎者以鼔鑄成鼎也沙隨程氏曰澤火不相遇則睽相遇則革革也者從其所勝而已隆山李氏曰巳日乃孚言不信于方革之時而信于己革之日也王氏曰民可與習常難與通變可與樂成難與慮始革之道所以已日乃孚也進齋徐氏曰元亨利貞悔亾者變有大通之理也然必利於貞則其悔可亾變不以貞則事有不可勝悔者古人所以重改作也雲峰胡氏曰日離象日入澤有已日象革必已日乃孚者民難與慮始革之初人未遽信必已日而後信也離明則約義理而非妄革兊說則隨時勢而非强革此所謂革之貞也不貞則所革人不信事不通悔不亾矣凡彖未有言悔亾者此獨言之重改革也彖曰革水火相息二女同居其志不相得曰革傳澤火相滅息又二女志不相得故為革息為止息又為生息物止而後有生故為生義革之相息謂止息也程子曰息訓為生者蓋息則生矣一事息則一事生中无間斷碩果不食則便為復也寒往則暑来暑往則寒来寒暑相推而嵗成焉本義以卦象釋卦名義大略與睽相似然以相違而為睽相息而為革也息滅息也又為生息之義滅息而後生息也或問革二女志不相得與睽不同行有二否朱子曰意則一也但變韻而叶之爾臨川王氏曰澤火非如坎離有隂陽相逮之道其相遇則相息而已其相息也唯勝者能革其不勝者爾隆山李氏曰澤火相息必有一勝兊非北方之正水少隂之氣不能以敵南方之正火兊之隂畫下有二陽畫限之而離火從下暵之此火能革澤水也故有温泉而无寒火又曰睽彖曰二女同居其志不同行革彖曰二女同居其志不相得不同行不過有相離之意故止於睽不相得則不免有相克之事故至於革雲峰胡氏曰卦以相違為睽相息為革而既濟水在火上不曰相息者何也坎之水動水也火不能息之澤之水止水也止水在上而火炎上故息滅息之中有生息者存猶人一吸一嘘而謂之一息亦有止而復生之義也已日乃孚革而信之傳事之變革人心豈能便信必終日而後孚在上者於改為之際當詳告申令至於已日使人信之人心不信雖强之行不能成也先王政令人心始以為疑者有矣然其乆也必信終不孚而成善治者未之有也文明以說大亨以正革而當其悔乃亾說音恱當去聲傳以卦才言革之道也離為文明兊為說文明則理无不盡事无不察說則人心和順革而能照察事理和順人心可致大亨而得貞正如是變革得其至當故悔亾也天下之事革之不得其道則反致弊害故革有悔之道唯革之至當則新舊之悔皆亾也本義以卦徳釋卦辭白雲郭氏曰明故見於未革之先說故見於已革之後庸齋趙氏曰變革之難非内明而外說不可也内明則見理必盡外說則无咈於人情雲峰胡氏曰彖未有言悔亾者惟革言之革易有悔也必革而當其悔乃亾當字即是貞字一有不貞則有不信有不通皆不當者也不當則不見革之亨唯有革之悔革而當其悔乃亾聖人慎之之意可知矣楊氏曰革而當者如盤庚之遷始則其民之不孚迨夫遷都一定民情安然无所疑慮其悔乃亾使其革而不當則是嬴秦取井田而阡陌之取封建而郡縣之取鄉遂而兵農之安能免其所謂悔歟天地革而四時成湯武革命順乎天而應乎人革之時大矣哉傳推革之道極乎天地變易時運終始也天地隂陽推遷改易而成四時萬物於是生長成終各得其宜革而後四時成也時運既終必有革而新之者王者之興受命於天故易世謂之革命湯武之王上順天命下應人心順乎天而應乎人也天道變改世故一作事遷易革之至大也故贊之曰革之時大矣哉本義極言而贊其大也朱子曰革是更革之謂到這裏須盡翻轉更變一番所謂上下與天地同流豈曰小補之哉小補之者謂扶衰救弊逐些補緝如錮露家事相似若是更革則須徹底從新鑄造一番非止補其罅漏而已湯武順天應人便如此易言順天應人後来盡說應天順人非也順天應人革就革命上說言順天理應人心李氏曰夏革春而陽事畢春革冬而隂事畢時變係焉湯革夏而為商武革商而為周天命係焉建安丘氏曰大而天地造化宻運潛移革春而為夏革秋而為冬隂陽代謝而四時以成況古往今来世代更變則革夏而為商革商而為周非湯武强為之也不過順天應人而已中溪張氏曰夫時未當革聖人不能先時時有當革聖人不能後時上順天命下應人心革而當其可之謂時故彖辭贊之曰革之時大矣哉雲峰胡氏曰順乎天而應乎人革言之兊亦言之兊恱也順天理應人心恱道也革重事也而必以恱道行之其義大矣象曰澤中有火革君子以治歴明時傳水火相息為革革變也君子觀變革之象推日月星辰之遷易以治歴數明四時之序也夫變易之道事之至大理之至明跡之至著莫如四時觀四時而順變革則與天地合其序矣本義四時之變革之大者朱子曰澤中有火水能滅火此只是說隂盛陽衰火盛則克水水盛則克火此是澤中有火之象便有那四時改革底意思君子觀這象便去治歴明時問革象不曰澤在火上而曰澤中有火蓋水在火上則水滅了火不得見水決則火滅火炎則水凅之義曰澤中有火則二物竝在有相息之象否曰亦是恁地林艾軒說因革卦得歴法云歴須年年改革不改革便差了天度此說不然天度之差蓋緣不曾推得那歴元定却不因不改而然歴豈是那年年改革底物治歴明時非謂歴當改革蓋四時變革中便有個治歴明時底道理澤中有火自與治歴明時不甚相干聖人取象處只是依稀地說不曾確定指殺只是見得這些意思便說楊氏曰相生相尅者五行之自然水上火下相尅之義也澤中有火則相息必矣然不有尅何以相生不有革何以相因君子觀革之象知天地之屢革也如此於歴數以推之即時氣以明之則千歳之日至可坐而致者此无他治歴以明之也臨川吴氏曰此變革之至大者也歴謂日月五緯之躔次時謂春夏秋冬之代序推日月而後可定四時故治歴所以明時也雲峰胡氏曰四時以相生為革離兊之交以相克為革不相克何以相生善治歴者當能明之西溪李氏曰晝夜者一日之革晦望者一月之革分至者一歳之革歴元者无窮之革初九鞏用黄牛之革鞏九勇反傳變革事之大也必有其時有其位有其才審慮而慎動而後可以无悔九以時則初也動於事初則无審慎之意而有躁易之象以位則下也无時无援而動於下則有潛妄之咎而无體勢之重以才則離體而陽也離性上而剛體健皆速於動也其才如此有為則凶咎至矣蓋剛不中而體躁所不足者中與順也當以中順自固而无妄動則可也鞏局束也革所以包束黄中色牛順物鞏用黄牛之革謂以中順之道自固不妄動也不云吉凶何也曰妄動則有凶咎以中順自固則不革而已安得便有吉凶乎本義雖當革時居初无應未可有為故為此象鞏固也黄中色牛順物革所以固物亦取卦名而義不同也其占為當堅確固守而不可以有為聖人之於變革其謹如此中溪張氏曰鞏有拘束之義革皮之堅韌者也革下卦離黄牛象初剛在外為革蓋初處變革之始在下則非可革之位居初則非當革之時上无應援豈宜輕躁但當用此中順之道固執而堅守之如用黄牛之革焉而不可妄動以有為也雲峰胡氏曰革取卦名而義不同猶噬嗑而取市合之義也易道尚變故賁之爻有不賁者存損之爻有不損者在而革亦不専言革也反其義為黄牛之革鞏而固之戒其輕也遯六二執用黄牛之革六柔順而二中正中順之道所固有也革初九鞏用黄牛之革離性上而剛不中中順之道所不足也下无位上无應不可有為惟可固守中順之道而已象曰鞏用黄牛不可以有為也傳以初九時位才皆不可以有為故當以中順自固也六二已日乃革之征吉无咎傳以六居二柔順而得中正又文明之主上有剛陽之君同徳相應中正則无偏蔽文明則盡事理應上則得權勢體順則无違悖時可矣位得矣才足矣處革之至善者也然臣道不當為革之先又必待上下之信故已日乃革之也如二之才徳所居之地所逢之時足以革天下之弊新天下之治當進而上輔於君以行其道則吉而无咎也不進則失可為之時為有咎也以二體柔而處當位體柔則其進緩當位則其處固變革者事之大故有此戒二得中而應剛未至失於柔也聖人因其有可戒之疑而明其義耳使賢才不失可為之時也本義六二柔順中正而為文明之主有應於上於是可以革矣然必已日然後革之則征吉而无咎戒占者猶未可遽變也雲峰胡氏曰一爻為一日初至二已日也初无位二有位矣初无應二有應矣柔順中正而文明又有徳矣有徳有位而有應可革之時也而必已日乃革之寧詳緩无遽急也如是則往吉而无咎聖人謹重之意可見卦曰已日乃孚爻曰已日乃革者君之革不待已日其所革已日而後孚耳臣待君之造始而後代終故已日乃革之中溪張氏曰彖言已日乃孚爻言已日乃革惟孚故能革也王氏曰二五雖有澤火之異同處厥中隂陽相應往必合志不憂咎也象曰已日革之行有嘉也傳已日而革之征則吉而无咎者行則有嘉慶也謂可以革天下之弊新天下之事處而不行是无救弊濟世之心失時而有咎也進齋徐氏曰六二當革之時上應九五其才文明其體柔順其位中正備此三者處革之至善者也然猶已日而後革者示不輕變也故以之征行則吉而无咎而有可嘉之功也凡卦中言嘉者皆二與五應如隨之孚于嘉遯之嘉遯是也九三征凶貞厲革言三就有孚傳九三以剛陽為下之上又居離之上而不得中躁動於革者也在下而躁於變革以是而行則有凶也然居下之上事苟當革豈可不為也在乎守貞正而懐危懼順從公論則可行之不疑革言猶當革之論就成也合也審察當革之言至於三而皆合則可信也言重慎之至能如是則必得至當乃有孚也已可信而衆所信也如此則可以革矣在革之時居下之上事之一作有當革若畏懼而不為則失時為害唯當慎重之至不自任其剛明審稽公論至於三就一作復而後革之則无過矣本義過剛不中居離之極躁動於革者也故其占有征凶貞厲之戒然其時則當革故至於革言三就則亦有孚而可革也朱子曰革言三就言三番結裹成就如第一番商量這個是當革不當革說成一番又更如此商量一番至於三番然後說成了却不是三人來說瀘川毛氏曰火居澤下能无危乎往則凶而居則危本爻適當其㑹也建安丘氏曰革之征一也而二征吉三征凶者蓋以六居二其才順而位中及時而革革而當者也故以征則吉以九居三其才剛而位偏過時而革革之不當者也故以征則凶革雖同而時位異也雲峰胡氏曰革貴乎中初九不及乎中故勉以鞏用黄牛之革九三過乎中故戒以征凶貞厲以其過剛也故恐其征而不已則凶以其不中也又恐其一於貞固而失變革之義則厲故必革之言至三就審之屢則有孚而可革矣兊為口有言象第三爻有三就象象曰革言三就又何之矣傳稽之衆論至於三就事至當也又何之矣乃俗語更何往也如是而行乃順理時行非已之私意所欲為也必得其宜矣本義言已審進齋徐氏曰初未可革二乃革之三則有孚而變革之事成矣凡事詳審至再至三則止矣革至於就又何往焉九四悔亡有孚改命吉傳九四革之盛也陽剛革之才也離下體而進上體革之時也居水火之際革之勢也得近君之位革之任也下无係一有无字應革之志也以九居四剛柔相際革之用也四既具此可謂當革之時也事之可悔而後革之革之而當其悔乃亾也革之既當唯在處之以至誠故有孚則改命吉改命改為也謂革之也既事當而弊革行之以誠上信而下順其吉可知四非中正而至善何也曰唯其處柔也故剛而不過近而不逼順承中正之君乃中正之人也易之取義无常也隨時而已本義以陽居隂故有悔然卦已過中水火之際乃革之時而剛柔不偏又革之用也是以悔亾然又必有孚然後革乃可獲吉明占者有其徳而當其時又必有信乃悔亾而得吉也節齋蔡氏曰革則有悔悔亾革而當也當則人心皆信之矣故可改前之命令湯武革命是也雲峰胡氏曰三剛居剛故征凶四剛柔不偏故悔亾然必有孚則有改命之吉下三爻方欲革故而為新故有謹重不輕改之意上三爻則故者已革而為新矣故不言革直言改命至鼎則曰凝命革而後可改改而後可凝也爻在離火兊澤之交其夏令改而為秋令之時乎九四有其時有其徳亦既改命矣必有孚乃吉甚矣天下事不可輕改也其謹重之意可見自三至五皆言有孚三議革而後孚四有孚而後改淺深之序也未占而有孚積孚之素也象曰改命之吉信志也傳改命而吉以上下信其志也誠既至則上下信矣一作也革之道以上下之信為本不當不孚則不信當而不信猶不可行也況不當乎中溪張氏曰革至於四則革者當矣彖所謂革而當其悔乃亾是也故乾九四亦曰乾道乃革有孚謂上下信之也九五大人虎變未占有孚傳九五以陽剛之才中正之徳居尊位大人也以大人之道革天下之事无不當也无不時也所過變化事理炳著如虎之文采故云虎變龍虎大人之象也變者事物之變曰虎何也曰大人變之乃大人之變也以大人中正之道一作徳變革之炳然昭著不待占決知其至當而天下必信也天下蒙大人之革不待占決知其至當而信之也朱子曰未占有孚伊川於爻中占字皆不把做卜筮尚其占說伊川言所過變化事理炳著所過謂身所經歴處也本義虎大人之象變謂希革而毛毨也在大人則自新新民之極順天應人之時也九五以陽剛中正為革之主故有此象占而得此則有此應然亦必自其未占之時人已信其如此乃足以當之耳或問大人虎變是就事上變君子豹變是就身上變朱子曰豈止是事上也從裏面做出来這個事却不只是空殻子做得文王其命維新也是他自新後如此堯克明俊徳然後黎民於變大人虎變正如孟子所謂所過者化所存者神上下與天地同流豈曰小補之哉補只是這個裏破補這一些如世人些小功只是補如聖人直是渾淪都換過了如罏鞴相似補底只是銅露聖人却是渾淪鑄過漢上朱氏曰兊為虎虎其天地之文然未著也變則其文炳然雲峰胡氏曰乾九五飛龍革九五虎變皆大人造之象下卦言革上卦言改言變革道愈進而愈成也虎變則希革而毛毨蓋仲夏毛希而革易仲秋毛落更生潤澤而鮮好卦體離夏革為兊秋故有此象此所謂變即孟子所謂存神過化與天地同流而非區區小補之事也未占有孚諸家皆以為不待占決而人自信之本義亦然蓋革重事也占當在未革之先而孚又在未占之先則其孚也久矣必如成湯未革夏命而室家已相慶於來蘓之先乃應此占不然湯武之事未易舉也如此則九五象占雖若美之之辭而中實含戒之之意蘭氏廷瑞曰乾之飛則曰龍革之變則曰虎要之為大人則一也堯舜之揖遜天下唯徳之見故曰龍湯武之征伐則有威存焉故曰虎雙湖胡氏曰文王卦辭於蒙比發筮義周公又於此爻發占義不但可見易為卜筮作又可以見聖人於君師變革等事謹重不敢輕如此象曰大人虎變其文炳也傳事理明著若虎文之炳煥明盛也天下有不孚乎程子曰虎變文章大故炳豹變文章小故蔚臨川吴氏曰炳者如火日之光明也上六君子豹變小人革面征凶居貞吉傳革之終革道之成也君子謂善人良善則已從革而變其著見若豹之彬蔚也小人昏愚難遷者雖未能心化亦革其面以從上之敎令也龍虎大人之象故大人云虎君子云豹也人性本善皆可以變化然有下愚雖聖人不能移者以堯舜為君以聖繼聖百有餘年天下被化可謂深且乆矣而有苗有象其来格烝乂盖亦革面而已小人既革其外革道可以為成也苟更從而深治之則為已甚已甚非道也故至革之終而又征則凶也當貞固以自守革至於極而不守以貞則所革隨復變矣天下之事始則患乎難革已革則患乎不能守也故革之終戒以居貞則吉也居貞非為六戒乎曰為革終言也莫不在其中矣人性本善有不可革者何也曰語其性則皆善也語其才則有下愚之不移所謂下愚有二焉自暴也一无也字自棄也人苟以善自治則无不可移者雖昏愚之至皆可漸磨而進也唯自暴者拒之以不信自棄者絶之以不為雖聖人與居不能化而入也仲尼之所謂下愚也然天下自棄自暴者非必皆昏愚也往往强戾而才力有過人者商辛是也聖人以其自絶於善謂之下愚然考其歸則誠愚也既曰下愚其能革面何也曰心雖絶於善道其畏威而寡罪則與人同也唯其有與人同所以知其非性之罪也本義革道已成君子如豹之變小人亦革面以聽從矣不可以往而居正則吉變革之事非得已者不可以過而上六之才亦不可以有行也故占者如之王氏湘卿曰豹虎之小者文次於虎均為能變特其文有炳蔚不同虎文疎而著故曰炳豹文密而理故曰蔚五與上革道成矣故皆言變九居五者皆陽也大人虎變之象六居上者皆隂也君子豹變之象臨川吴氏曰處革之極革道終矣君子變革其外而有文小人變革其外而順君復何求哉靜守可也征行則凶矣雲峰胡氏曰虎豹皆兊象豹小於虎兊說見於上有革面象二三四五皆革者上則從革者也君子小人以位則有上下以徳則有正邪今既无不革矣此時豈可復有往哉惟居貞不動則吉革非得已之事初未可革當中順以自守上既已革當静正以自居象曰君子豹變其文蔚也小人革面順以從君也傳君子從化遷善成文彬蔚章見於外也中人以上莫不變革雖一作唯不移之小人則亦不敢肆其惡革易其外以順從君上之教令是革面也至此革道成矣小人勉而假善君子所容也更往而治之則凶矣節齋蔡氏曰蔚者隐然有文之謂柔順故如此或問下三爻有謹重難改之意上三爻則革而善蓋事有新故革者變故而新也下三爻則故事也未變之時必當謹審於其先上三爻則變而為新事矣故漸漸好朱子曰然建安丘氏曰革之彖曰已日乃孚又曰革而當其悔乃亾孚謂信于人心當謂合乎天理此革之道也在革六爻初未可革故曰鞏用黄牛之革而象言其不可有為二之時可革矣故曰已日乃革而象稱其行有嘉三革道已成无所事革故曰革言三就有孚而象以又何之釋之此革三爻之序也至六四則因下卦革之未善者而更改之故曰有孚改命吉改則輕於革矣五言大人虎變上言君子豹變則論從革之效變者革之成改又不足論矣中溪張氏曰象言巳日乃孚革而信之而爻之三四五皆曰有孚則知變革之道非有人心之孚信不可為也下卦三爻皆言革上卦三爻或言改或言變蓋變乃革之成而改猶未也周易傳義大全卷十七
