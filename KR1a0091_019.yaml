body:
  text: 周易傳義大全卷十三明胡廣等撰乾下震上傳大壯序卦遁者退也物不可以終遁故受之以大壯遁為違去之義壯為進盛之義遁者隂長而陽遁也大壯陽之壯盛也衰則必盛消息一作長相須故既遁則必壯大壯所以次遁也為卦震上乾下乾剛而震動以剛而動大壯之義也剛陽大也陽長已過中矣大者壯盛也又雷之威震而在天上亦大壯之義也漢上朱氏曰陽動於復長於臨交於泰至四而後壯泰不言壯者陰陽敵也猶人之血氣方剛故曰大壯雲峰胡氏曰三畫卦初為少二為壯三為究六畫卦初二為少三四為壯泰不言者陰陽敵也以四陽上升而動於外乃謂之壯如大畜大過皆四陽故謂之大楊氏曰姤者女之壯也大壯者陽之壯也陰陽之理迭為羸壯彼羸則此壯彼壯則此羸女而壯者非女之所宜陽而壯者則為陽之常理大壯之時四陽過於泰矣二隂而當四陽之進則陽者壯而隂者羸矣庸齊趙氏曰四陽在下而進至上卦矣乾健上升而震動于外其壯孰大於此大壯利貞傳大壯之道利於貞正也大壯而不得其正強猛之為耳非君子之道壯盛也本義大謂陽也四陽盛長故為大壯二月之卦也陽壯則占者吉亨不假言但利在正固而已建安丘氏曰遁小利貞小者利於貞也指二隂言大壯利貞大者利於貞也指四陽言隂之進不正則小人得以陵君子陽之進不正則君子不能勝小人皆扶陽抑隂之意也中溪張氏曰大者陽也壯者強盛也六爻之卦三隂三陽則小大均等至於四陽浸長則大壯於小故名大壯然大壯之道利於貞正不得其正又奚利哉雙湖胡氏曰四陽爻初三正二四不正而云利貞者戒之也而成卦之主又重在九四一爻然則戒四尤切也四雖不正聖人方喜其震動得時故但戒之雲峰胡氏曰復臨泰陽長於內皆言亨大壯陽自內而達於外亨不待言利貞自一陽至於四陽而動而進正也亦不可以剛動而進遂失其正也觀四隂不取少者之壯而以二陽在上為觀大壯則以四陽為大者之壯而猶恐大者或失其正小者得以乘之也戒以利貞其拳拳君子之意可知矣彖曰大壯大者壯也剛以動故壯傳所以名大壯者謂大者壯也陰為小陽為大陽長以盛是大者壯也下剛而上動以乾之至剛而動故為大壯為大者壯與壯之大也本義釋卦名義以卦體言則陽長過中大者壯也以卦德言則乾剛震動所以壯也中溪張氏曰大壯者陽壯也內卦乾不變外卦本坤乾一索於坤而得震乾剛而震動所以壯也大壯利貞大者正也正大而天地之情可見矣傳大者既壯則利於貞正正而大者道也極正大之理則天地之情可見矣天地之道常久而不已者至大至正也正大之理學者默識心通可也不云大正而云正大恐疑為一事也本義釋利貞之義而極言之朱子曰大壯利貞是利於正也所以大者以其正也既正且大則天地之情不過於正大問大者正與正大不同上大字是指陽下正大是說理曰然亦緣上面有大者正字方說此問如何見天地之情曰正大便見得天地之情天地只是正大未嘗有些子邪處節初齊氏曰大者壯以氣言也大者正以理言也進齊徐氏曰大者壯乃壯之本體也而大者正則所以用壯之道也正大而天地之情可見則又推極其理而言之也隆山李氏曰大而利貞乃天地之情也孔子贊彖非獨大壯如咸恆萃皆曰天地萬物之情可見豈非因諸卦利貞之象而論天地之至情者乎建安丘氏曰心動物也情則心之動而見於外者也復震下坤上靜中有動故曰見天地之心大壯乾下震上動已發於外故曰見天地之情此以動有內外而為心情之别也中溪張氏曰復雷在地中則天地生物之機伏而未露聖人有以見其心大壯雷在天上則天地生物之心已達於外聖人有以見其情也雲峰胡氏曰心未易見故疑其辭曰復其見天地之心乎情則可見矣故直書之人能情天地之情動孰非禮人能心天地之心動之端孰非仁愚嘗謂孟子養氣之論自此而出大者壯也剛以動即是其為氣也至大至剛大者正也即是以直飬而無害象曰雷在天上大壯君子以非禮弗履傳雷震於天上大而壯也君子觀大壯之象以行其壯君子之大壯者莫若克己復禮古人云自勝之謂強中庸於和而不流中立而不倚皆曰強哉矯赴湯火蹈白刃武夫之勇可能也至於克己復禮則非君子之大壯不可能也故云君子以非禮弗履本義自勝者強或問伊川以為自勝者強非君子之大壯不可能也又引中庸四說強哉矯以為證其義是如此否朱子曰固是雷在天上是甚生威嚴人之克己能如雷在天上則威嚴果決以去其惡而必為善若半上落下則不濟事何以為君子須是如雷在天上方能克去非禮中溪張氏曰雷之威本震而在天上乃雷聲之壯盛者也君子有浩然之氣剛大以直其動以天然後能非禮弗履苟非禮而履則猶雷非時而震又何足以為君子之大壯哉建安丘氏曰非禮勿履者復之事也至大壯則動皆天理無待於勿故君子以非禮弗履勿者禁止之辭弗者則自不為矣臨川吳氏曰君子之非禮弗履唯剛健以動者能之禮者天之理而其用卑下乾在下之象也履者足之所踐如雷行所過震在上之象也雲峰胡氏曰勝人者血氣之強自勝者義理之強也初九壯于趾征凶有孚傳初陽剛乾體而處下壯于進者也在下而用壯壯于趾也趾在下而進動之物九在下用壯而不得其中夫以剛處壯雖居上猶不可行况在下乎故征則其凶有孚孚信也謂以壯往則得凶可必也本義趾在下而進動之物也剛陽處下而當壯時壯于進者也故有此象居下而壯于進其凶必矣故其占又如此進齊徐氏曰趾在下初象三剛在前未可進也趾進則進犯于剛而其凶必矣縉雲馮氏曰人行趾先動古人之始事必躊躇進退孫以出之期於成事今壯于趾是始事而用壯進鋭如此何為不凶蘭氏廷瑞曰壯之初九與夬之初九一也或為趾或為前趾何也曰夬五陽已盛將决一隂初九前往而不可遏故謂之前趾而戒之以往不勝為咎大壯則四陽雖壯而二隂未全消未可即往故謂之趾而直繼之以征凶有孚也雲峰胡氏曰賁初亦以趾取象本義曰剛德明體自賁於下此不取其剛德健德何也亦唯其時而已賁飾也賁之時而在下自飾其所以行可也壯之時而在下欲進而必行不可也易有變例壯初與三以陽居陽正也而曰凶曰厲當剛壯之時不可過於剛况剛居下而欲壯于進不特曰凶而曰有孚言其凶之可必也象曰壯于趾其孚窮也傳在最下而用壯以行可必信其窮困而凶也本義言必窮困中溪張氏曰其孚窮者蓋征則有必然困窮之理也九二貞吉傳二雖以陽剛當大壯之時然居柔而處中是剛柔得中不過於壯得貞正而吉也或曰貞非以九居二為戒乎曰易取所勝為義以陽剛健體當大壯之時處得中道無不正也在四則有不正之戒人能識時義之輕重則可以學易矣本義以陽居隂已不得其正矣然所處得中則猶可因以不失其正故戒占者使因中以求正然後可以得吉也雙湖胡氏曰九二不正而云貞吉者戒之以正則吉也若匪正則有凶矣劉氏曰二之應五以陽剛承柔用剛得中乃能貞吉四剛不中故必貞吉而後悔亡白雲郭氏曰卦辭言利貞指九二也然九二以剛而居下體之中未能究天德之用故但曰貞吉而已若九二者蓋非禮弗履之士也雲峰胡氏曰易春秋美惡不嫌同辭九二因中得正曰貞吉許之也九四不中不正曰貞吉戒之也象曰九二貞吉以中也傳所以貞正而吉者以其得中道也中則不失正况陽剛一有壯字而乾體乎臨川吳氏曰中則無過不恃其壯而猛進也中溪張氏曰中立而不倚強哉矯九二有焉九三小人用壯君子用罔貞厲羝羊觸藩羸其角傳九三以剛居陽而處壯又當乾體之終壯之極者也極壯如此在小人則為用壯在君子則為用罔小人尚力故用其壯勇君子志剛故用罔罔無也猶云蔑也以其至剛蔑視於事而無所忌憚也君子小人以地言如君子有勇而無義為亂剛柔得中則不折不屈施於天下而無不宜苟剛之太過則無和順之德多傷莫與貞固守此則危道也凡物莫不用其壯齒者齧角者觸蹄者踶羊壯於首羝為喜觸故取為象羊喜觸藩籬以藩籬當其前也蓋所當必觸喜用壯如此必羸困其角矣猶人尚剛壯所當必用必至摧困也三壯甚如此而不至凶何也曰如三之為其往足以致凶而方言其危故未及於凶也凡可以致凶而未至者則曰厲也本義過剛不中當壯之時是小人用壯而君子則用罔也罔無也視有如無君子之過於勇者也如此則雖正亦危矣羝羊剛壯喜觸之物藩籬也羸困也貞厲之占其象如此節齊蔡氏曰用壯無禮之勇也用罔不慮之决也處位不中而好進前犯乎剛固守乎此以為正則危矣大壯三四五爻有兑象兼二爻看亦有兌象兑為羊羝羊喜用其角而觸者藩四也羸拘纍纒繞也進則為四所困故以羝羊羸角為象劉氏曰三欲應上而四隔之以重剛不中而鋭於進凡用壯如此者未有不羸角雲峰胡氏曰大壯九三即遁九四兩爻皆分君子小人在遁者其辭平在大壯者其辭危危九三之過剛也剛壯之時又過於剛小人用之為壯不足責君子用之蔑視天下之事雖正亦危矣三過剛而上遇四之剛故有羝羊觸藩羸其角之象爻皆用象以為占此則因上文以貞厲為占又因以取貞厲之象雙湖胡氏曰聖人於九三一爻設君子小人兩義亦如恆六五婦人吉夫子凶大有九三公用亨于天子小人弗克否六三小人吉大人否亨遁九四君子吉小人否之類非謂九三既為君子又為小人也象曰小人用壯君子罔也傳在小人則為用其強壯之力在君子則為用罔志氣剛強蔑視於事靡所顧憚也本義小人以壯敗君子以罔困雲峰胡氏曰恆九二惟悔亡二字而象曰能久中大壯九二惟貞吉二字而象曰以中意正相似當剛壯之時以剛居柔則為中初九以剛居剛非中也故可必其窮困九三以剛居剛非中也故小人以此敗君子以此困九四貞吉悔亡藩決不羸壯于大輿之輹傳四陽剛長盛壯已過中壯之盛也然居四為不正方君子道長之時豈可有不正也故戒以貞則吉而悔亡蓋方道長之時小失則害亨進之勢是有悔也若在他卦重剛而居柔未必不為善也大過是也藩所以限隔也藩籬決開不復羸困其壯也髙大之車輪輹強壯其行之利可知故云壯于大輿之輹輹輪之要處也車之敗常在折輹輹壯則車強矣云壯于輹謂壯于進也輹與輻同本義貞吉悔亡與咸九四同占藩決不羸承上文而言也決開也三前有四猶有藩焉四前二隂則藩決矣壯于大輿之輹亦可進之象也以陽居隂不極其剛故其象占如此朱子曰此卦如九二貞吉只是自守而不進九四藩決不羸壯于大輿之輹却是有可進之象此卦爻之好者蓋以陽居隂不極其剛而前遇二隂有藩決之象所以為進非如九二前有三四二陽隔之不得進也節齊蔡氏曰九四為壯之主以剛決柔壯之正者也位不當故有悔得正而吉其悔可亡藩五也決開也以剛決柔易而無困也輹在車之下所用以行者下乘三剛壯輹之象中溪張氏曰四以上則震為大塗羣羊竝驅而前無羸困之患輿之行正在輹輹壯則大輿由大塗而往四陽上進將為夬之決乾之純矣雲峰胡氏曰乾九二既言見龍所以九四或躍在淵不必言龍則此上爻言羊故藩決不羸不復言羊貞吉悔亡與咸九四同占皆因占以設戒之辭但在咸之四以陽居隂不得其正故有憧憧往來之戒在壯之時以陽居隂又為不極其剛故有藩決不羸之喜大畜九二在三陽之中為六五所止故輿說輹壯九四在三陽之上六五不能止故壯于大輿之輹象曰藩決不羸尚往也傳剛陽之長必至於極四雖已盛然其往未止也以至盛之陽用壯而進故莫有當之藩決開而不羸困其力也尚往其進不已也節齊蔡氏曰尚往者前無困沮可以上進也六五喪羊于易無悔易以䜴反一音亦旅卦同傳羊羣行而喜觸以象諸陽竝進四陽方長而竝進五以柔居上若以力制則難勝而有悔唯和易以待之則羣陽無所用其剛是喪其壯于和易也如此則可以無悔五以位言則正以德言則中故能用和易之道使羣陽雖壯無所用也程子曰喪羊于易羊羣行而觸物大壯衆陽竝進六五以隂居位惟和易然後可以喪羊易非難易之易乃和易樂易之易中溪張氏曰五以柔處剛其位不當又值乾陽下進之衝勢不容遏故有喪羊之象然柔而得中不與剛抗能以和易處之則衆陽無所用其壯而強暴之氣屈矣然則喪羊雖五之不幸而于易亦五之善處也處以和易則不至有悔漢光武曰吾治天下以柔道六五之謂矣本義卦體似兌有羊象焉外柔而內剛者也獨六五以柔居中不能抵觸雖失其壯然亦無所悔矣故其象如此而占亦與咸九五同易容易之易言忽然不覺其亡也或作疆埸之埸亦通漢食貨志埸作易朱子曰喪羊于易不若作疆埸之易漢食貨志疆埸之埸正作易蓋後面有喪牛于易亦同此義雲峰胡氏曰諸家多以喪羊為下四陽本義獨為五五互兌自有羊象觀四隂有剝陽之勢至四則曰觀國之光觀五也壯四陽有決隂之勢至四則曰大輿之輹載五也凡若是者尊君也喪羊于易又若人君自亡其剛而不與衆陽較然亦尊君也旅上九喪牛于易牛性順上九以剛居極不覺失其所謂順此曰喪羊于易羊性剛六五以柔居中不覺失其所謂剛自失其壯故爻不言壯無悔與咸六五同亦非深許之辭象曰喪羊于易位不當也傳所以必用柔和者以陰柔居尊位故也若以陽剛中正得一作居尊位則下無壯矣以六五位不當也故設喪羊于易之義然大率治壯不可用剛夫君臣上下之勢不相侔也苟君之權足以制乎下則雖有強壯跋扈之人不足謂之壯也必人君之勢有所不足然後謂之治壯故治壯之道不可以剛也上六羝羊觸藩不能退不能遂無攸利艱則吉傳羝羊但取其用一無用字壯故陰爻亦稱之六以陰處震終而當壯極其過可知如羝羊之觸藩籬進則礙身退則妨角進退皆不可也才本陰柔故不能勝己以就義是不能退也陰柔之人雖極用壯之心然必不能終其壯有摧必縮是不能遂也其所為如此無所往而利也隂柔處壯不能固其守若遇艱困必失其壯失其壯則反得一有其字柔弱之分矣是艱則得吉也用壯則不利知艱而處柔則吉也居壯之終有變之義也或問傳以艱字為遇艱困則失其壯而得柔弱之分故吉竊意不能退遂而無所利則是已艱困矣而又曰遇艱何也恐此艱字只作艱難其事而不敢求進不已則吉如大畜九三利艱貞之艱說如何朱子曰當如大畜之例本義壯終動極故觸藩而不能退然其質本柔故又不能遂其進也其象如此其占可知然猶幸其不剛故能艱以處則尚可以得吉也朱子曰上六取喻甚巧蓋壯終動極無可去處如羝羊之角掛于藩上不能退遂然艱則吉者畢竟有可進之理但必艱始吉耳問大壯本好爻中所取却不好睽本不好爻中所取却好如六五對九二處非其位九四對上九本非相應都成好爻不知何故曰大壯便是過了才過便不好如睽卦之類却是易之取爻多為占者而言占法取變爻便是到此處變了所以困卦雖是不好然其間利用祭祀之屬却都好問此正與見羣龍無首吉利永貞一殷曰然却是變了故如此節齊蔡氏曰大壯之時剛者壯也柔居動體之極見剛者壯亦從之而用壯不知其不可也故其進退皆無所利艱則吉者苟知其難能安乎柔而不進則吉也雙湖胡氏曰九三居乾體之極在下卦之上剛動而欲進上六居震體之極在上卦之上動極而在上又卦有互兌全體有爽畫兌故皆取羝羊用角之義又三與上為正應本當有合者也然三欲進而為四所陷故羸其角而不能應乎上上雖與三為應而窮於上故既不能退而得乎三又不能遂而成其進故無攸利必艱難自守以待之庶成其吉耳雲峰胡氏曰五上皆隂五已喪羊上又取羝羊觸藩者五喪羊專以一爻言也上羝羊合一卦而言也蓋至於上則壯終動極故與下卦之終同象上之壯已極不能退六之質本柔不能遂然三羸角上艱則吉者三過剛必至於自困上不剛故可勉之以艱也兼壯終有變之義象曰不能退不能遂不詳也艱則吉咎不長也傳非其處而處故進退不能是其自處之不詳慎也艱則吉柔遇艱難又居壯終自當變矣變則得其分過咎不長乃吉也進齊徐氏曰上六進退皆無所利由自處之不詳審故也苟知其艱難順守以待終亦獲吉雖有殃咎亦不長久也雲峰胡氏曰臨六三壯上六皆無攸利皆曰咎不長蓋六三之憂上六之艱不貴無過而貴改過也建安丘氏曰大壯剛進也二陰退而四陽進也而九四乃壯之所以為壯者其曰藩決不羸壯于大輿之輹蓋許陽之壯也壯貴進不暴過剛則失其所以為壯矣其下三剛爻當隨四而壯不利自往初三皆以剛居剛好進者也故初征凶而三羸其角二以剛履柔居中能守不進者也故貞吉若上之二陰五柔居中而能受陽之壯故雖喪羊而無悔上柔居壯之終不能壯者而亦終用壯焉故有不能退不能遂之戒王輔嗣云本有違謙越禮能全其壯者也故陽爻皆以處陰位為美用壯處壯則觸藩矣坤下離上傳晉序卦物不可以終壯故受之以晉晉者進也物無壯而終止之理既盛壯則必進晉所以繼大壯也為卦離在坤上明出地上也日出於地升而益明故為晉晉進而光明盛大之意一作義也凡物漸盛為進故彖云晉進也卦有有德者有無德者隨其宜也乾坤之外云元亨者固有也云利貞者所不足而可以有功也有不同者革漸是也隨卦可見晉之盛而無德者無用有也晉之明盛故更不言亨順乎大明無用戒正也或問傳曰物無壯而終止之理既壯盛則必進竊意物進而後至於壯盛既壯盛則衰退繼之矣今曰壯盛則必進此義如何朱子曰物固有壯而後進者亦有進而後壯者其義自有不同此各隨其事而言難以一說拘也且以十二月卦論大壯之為夬夬之為乾豈非壯而後進乎至乾乃極而衰耳又問晉之盛而無德者無用有也然大有可謂盛矣而有卦德不知如何曰元亨利貞本非四德但為大亨而利於正之占耳乾卦之彖傳文言乃借為四德在他卦尤不當以德論也晉康矦用錫馬蕃庶晝日三接傳晉為進盛之時大明在上而下體順附諸矦承王之象也故為康矦康矦者治安之矦也上之大明而能同德以順附治安之矦也故受其寵數錫之馬衆多也車馬重賜也蕃庶衆多也不唯錫與之厚又見親禮晝日之中至於三接言寵遇之至也晉進盛之時上明下順君臣相得在上而言則進於明盛在臣而言則進升髙顯受其光寵也本義晉進也康矦安國之矦也錫馬蕃庶晝日三接言多受大賜而顯被親禮也蓋其為卦上離下坤有日出地上之象順而麗乎大明之德又其變自觀而來為六四之柔進而上行以至于五占者有是三者則亦當有是寵也朱子曰康矦似說寧矦相似用錫馬之用只是箇虛字說他得這箇物事晝日是那上卦離也晝日為之是此意誠齊楊氏曰康矦者治安之矦也錫馬蕃庶而思之者豐晝日三接而禮之者頻也進齊徐氏曰康矦用錫馬蕃庶晝日三接言諸矦有安民之功故用此以受君之錫豫而被其親禮也左傳僖公二十八年晉文公朝王王賜之車輅弓矢命之曰敬服王命以綏四國受策而出出入三覲是也中溪張氏曰當晉進之時大明在上而下體皆同德順附有君明臣順諸矦承王之象治進而順躋一世於康寧之域矦之力也不惟錫馬蕃庶可見錫豫之厚而正晝盛明之際乃三接其臣尤見親禮之至也漢上朱氏曰周官校人天子十有二間馬六種邦國六間馬四種凡朝覲㑹同毛馬而頒之錫馬蕃庶也大行人公之禮三享三問三勞晝日三接也姚氏小彭曰晝日三接王接矦之禮也覲禮延升一也覲畢致享升致命二也享畢王勞之升成拜三也雲峰胡氏曰彖言矦者三屯豫建矦震也晉康矦坤也坤有土有民有安之象錫馬蕃庶坤為牝馬為衆之象晝日三接離為日為中虛之象或曰馬與晝日離午象蕃庶三接坤為衆為文之象離配卦十有六象最美者莫如晉大有大有明在天上其明最盛晉明出地上其明方新有進義明君在上下以柔順進而承之所謂康矦也康矦者治安之矦非以功矦也下之務進者易生事以徼寵今多受大賜而顯被親禮者惟治安之矦其所以為大明之時乎彖曰晉進也本義釋卦名義建安丘氏曰彖曰晉進也雜卦曰晉晝也蓋晉之義不特以進為進而必以明為進也明出地上順而麗乎大明柔進而上行是以康矦用錫馬蕃庶晝日三接也傳晉進也明進而盛也明出於地益進而盛故為晉所以不謂之進者進為前進不能包明盛之義明出地上離在坤上也坤麗于離以順麗於大明順德之臣上附於大明之君也柔進而上行凡卦離在上者柔居君位多云柔進而上行噬嗑睽鼎是也六五以柔居君位明而順麗為能待下寵遇親密之義是以為康矦用錫馬蕃庶晝日三接也大明之君安天下者也諸矦能順附天子之明德是康民安國之矦也故謂之康矦是以享寵錫而見親禮晝日之間三接見於天子也不曰公卿而曰矦天子治於上者也諸矦治於下者也在下而順附於大明之君諸矦之象也本義以卦象卦德卦變釋卦辭進齊徐氏曰明出地上離乘坤也順而麗乎大明坤附離也以順德之臣而附麗乎大明之君宜六五以柔進而上行也凡離居上體皆柔進而上行是以康矦用此順德以受錫馬蕃庶之恩晝日三接之禮也臨川吳氏曰坤順之臣進而附麗於離明之君此釋康矦錫馬之義柔臣德也五君位也四近君卦自觀變六四之柔近君進而上行至五九五之剛下降居四而成離日猶朝貢之臣為天子所禮接此釋晝日三接之義胡氏曰易言柔進而上行者三卦晉睽鼎也噬嗑則曰柔得中而上行晉六五之柔自觀四進五也睽中孚之四進五也鼎巽四進五也噬嗑雖不言進而六五之柔由益四上行至五也此可以見柔進上行之例雲峰胡氏曰康矦非順者不能錫馬三接非君之大明而柔者不能提起一二字卦辭盡可見矣象曰明出地上晉君子以自昭明德傳昭明之也傳曰昭德塞違昭其度也君子觀明出地上而益明盛之象而以自昭其明德去蔽致知昭明德於己也明明德於天下昭明德於外也明明德在已故云自昭本義昭明之也進齊徐氏曰日初出地進而上行為晉之象然日出地則明入地則晦日之明本無增損也蔽與不蔽之隔耳亦猶人之德性得於天者其體本明特為物欲所蔽不能無少昏昧而本然之明則未嘗息也君子觀明出地上之象悟性分之本明故以之自昭其明德也建安丘氏曰晉之自昭明德者君子致知之學也乾之自強不息者君子力行之學也易大象惟乾晉二象以自言之信矣知行之學皆君子已分所當為之事也雲峰胡氏曰至健莫如天君子以之自強至明莫如日君子以之自昭雙湖胡氏曰合兩體成一卦夫象天子論體象君子只以卦之重者論如此卦只取離明之義置坤於不言蓋有不必盡論兩體者即此亦可以推他卦矣初六晉如摧如貞吉罔孚裕無咎傳初居晉之下進之始也晉如升進也摧如抑退也於始進而言遂其進不遂其進唯得正則吉也罔孚者在下而始進豈遽能深見信於上苟上未見信則當安中自守雍容寬裕無急於求上之信也苟欲信之心切非汲汲以失其守則悻悻以傷於義矣皆有咎也故裕則無咎君子處進退之道也本義以隂居下應不中正有欲進見摧之象占者如是而能守正則吉設不為人所信亦當處以寬裕則無咎也或問初六晉如摧如象也貞吉占辭朱子曰罔孚裕無咎又是解上兩句恐貞吉說不明故又曉之厚齊馮氏曰摧說文擠也折也有所抑而不得進之象能寬裕自處不戚戚於上下之不我知則無咎雙湖胡氏曰爻不正故戒以能正則吉坤體寬裕故誨以能裕則無咎也雲峰胡氏曰欲進而退六象上互艮有欲進而止之之象凡始進必資薦引四應不中正乃若相摧抑者進之初人多有未信者然摧如在彼而吾不可以不正罔孚在人而吾不可以不裕初以隂居陽非正才柔志剛不足於裕貞與裕皆戒辭也象曰晉如摧如獨行正也裕無咎未受命也傳無進無抑唯獨行正道也寬裕則無咎者始欲進而未當位故也君子之於進退或遲或速唯義所當未嘗不裕也聖人恐後之人不逹寬裕之義居位者廢職失守以為裕故特云初六裕則無咎者始進未受命當職任故也若有官守不信於上而失其職一日不可居也然事非一槩久速唯時亦容有為之兆者本義初居下位未有官守之命進齊徐氏曰居無位之初以寬裕自處不汲汲於求進乃其宜也故無咎若已受命則是當事有官職苟一於裕則有曠廢之失能無咎乎雲峰胡氏曰孟子曰我無官守我無言責則吾進退豈不綽綽然有餘裕哉即此意也六二晉如愁如貞吉受兹介福于其王母傳六二在下上無應援以中正柔和一作順之德非強於進者也故於進為可憂愁謂其進之難也然守其貞正則當得吉故云晉如愁如貞吉王母祖母也謂隂之至尊者指六五也二以中正之道自守雖上無應援不能自進然其中正之德久而必彰上之人自當求之蓋六五大明之君與之同德必當求之加之寵祿受介福于王母也介大也本義六二中正上無應援故欲進而愁占者如是而能守正則吉而受福于王母也王母指六五蓋享先妣之吉占而凡以隂居尊者皆其類也或問王母指六五以為享先妣之吉占何也朱子曰恐是如此蓋周禮有享先妣之禮雙湖胡氏曰晉如愁如二欲進而復愁以其無應於五也五下互坎為加憂二欲進而前有坎險又為艮山所阻故有憂愁之象以能守正故終得吉進齊徐氏曰上雖無應而同德相戒故受兹介福于其王母也言受六五之福也雲峰胡氏曰愁二隂柔無應之象王母六五陰而居尊之象小過六二曰遇其妣彼言祖妣即此言王母也二柔中正五雖不應而同德彖蕃馬三接即爻所謂介福彖言錫爻言受互文也凡進退皆不可以自必初有應宜可進也而有欲進見摧之象二無應若可愁也而有受福王母之占聖人皆戒之曰貞吉蓋不以應之有無為吉凶而惟以不失在我之正者為吉也象曰受兹介福以中正也傳受兹介福以中正之道也人能守中正之道久而必亨况大明在上而同德必受大福也中溪張氏曰二之所以受福者以能居中而得正也六三衆允悔亡傳以六居三不得中正宜有悔咎一作吝而三在順體之上順之極者也三陰皆順上者也是三之順上與衆同志衆所允從其悔所以亡也有順上向明之志而衆允從之何所不利或曰不由中正而與衆同得為善乎曰衆所允者必至當也况順上之大明豈有不善也是以悔亡蓋亡其不中正之失矣古人曰謀從衆則合天心本義三不中正宜有悔者以其與下二陰皆欲上進是以為衆所信而悔亡也朱子曰衆允象也悔亡占也問晉六三如何見得為衆所信處曰晉之時二陰皆欲上進三處地較近故二隂皆從之以進問如何得悔亡曰居非其位本當有悔以其得衆故悔可亡中溪張氏曰六三位不中正有悔宜也然三能率初二以順上而衆皆允信而從之故其悔可亡雲峰胡氏曰衆坤象坤順之極故有允象三居下卦之上為衆陰之長正康矦之謂也初罔孚衆未允也二愁如猶有悔也三居順之極而衆皆相信可以進而受三接之寵矣未信而進其悔在後衆允而進其悔乃亡象曰衆允之志上行也傳上行上順麗於大明也上從大明之君衆志之所同也中溪張氏曰六三順極而明近順而麗乎大明此衆所同允故皆有上行之志也九四晉如鼫鼠貞厲鼫音石傳以九居四非其位也非其位而居之貪據其位者也貪處髙位既非所安而又與上同德順麗於上三陰皆在已下勢必上進故其心畏忌之貪而畏人者鼫鼠也故云晉如鼫鼠貪於非據而存畏忌之心貞固守此其危可知言貞厲者開有改之道也本義不中不正以竊髙位貪而畏人蓋危道也故為鼫鼠之象占者如是雖正亦危厚齊馮氏曰鼫詩作碩疑此傳注從鼠郭景純云形大如鼠好在田中食粟豆蓋田鼠也中溪張氏曰詩以碩鼠刺貪此之碩鼠象其貪於進也雲峰胡氏曰鼫鼠貪而畏人九四爻剛位柔之象解以陰居陽者象狐晉以陽居隂者象鼠九家易坎為狐解以初至五互重坎上下三陰故稱三狐艮為鼠晉互體艮艮上一陽故稱鼫鼠狐性疑解當去其疑鼠性貪晉當去其貪取象各有攸當况晉晝也鼠亦晝伏非能以晝進者九四不中不正以竊髙位又畏大明之君而不敢進故有此象其占曰貞厲雖正亦危况不中正乎象曰鼫鼠貞厲位不當也傳賢者以正德宜在髙位不正而處髙位則為非據貪而懼失則畏人固處其地危可知也童溪王氏曰當柔進之時九四獨以剛進故進之義於貞為厲於位為不當也六五悔亡失得勿恤往吉無不利傳六以柔居尊位本當有悔以大明而下皆順附故其悔得亡也下既同德順附當推誠委任盡衆人之才通天下之志勿復自任其明恤其失德如此而往則吉而無不利也六五大明之主不患其不能明照患其用明之過至於察察失委任之道故戒以失得勿恤也夫私意偏任不察則有蔽蓋天下之公豈當一作得復用一有其字私察也本義以陰居陽宜有悔矣以大明在上而下皆順從故占者得之則其悔亡又一切去其計功謀利之心則往吉而無不利也然亦必有其德乃應其占耳朱子曰失得勿恤此說失也不須問他得也不須問他自是好猶言勝負兵家之常云爾此卦六爻無如此爻吉問六五悔亡失得勿恤之說曰便是伊川說得大深據此爻只是占者占得此爻則不必恤其失得而自亦無所不利耳如何說道人君既得同德之人而委任之不復恤其失得如此則蕩然無復是非而天下之事亂矣假使其所任之人或有作亂者亦將不恤之乎雖以堯舜之聖臯夔益稷之賢猶云屢省乃成如何說既得同心同德之人而任之則在上者一切不管而任其所為豈有此理且彼所為既失矣為上者如何不恤得聖人無此等說話聖人所說卦爻只是略略說過以為人當著此爻則大勢已好雖有所失得亦不必慮而自無所不利也聖人說得甚淺伊川解得太深聖人所說短伊川解得長失得勿恤只是自家自作教是莫管他得失如云人發解做官這箇却必不得只得盡其所當為者而已如仁人正其誼不謀其利明其道不計其功相似建安丘氏曰五以柔居尊位為離明之主彖所謂柔進而上行者也在下三陰皆欲附已而九四阻之本當有悔以同德相孚其勢必合故得亡也失得主三陰言為四所間失也終與已合得也勿恤不必憂也言五但當往而上進三柔志在上行終必從已而或得或失皆當置而勿問則自然吉無不利矣五爻柔疑於進故勉之中溪張氏曰待衆允而悔亡者六三是已不待衆允而悔亡者六五是已六五為自昭明德之主天下臣民莫不順而麗之何悔不亡苟能失得不纍於心勿勞憂恤持此以往吉無不利也雲峰胡氏曰大明在上下皆順從非特悔亡其往也宜吉無不利矣復戒之以失得勿恤何也彖惟升言勿恤豐言勿憂爻則泰九三家人九四萃初六皆言勿恤事有不必憂者勿恤寬之辭也有不當憂者勿恤戒之之辭也晉六五曰失得勿恤戒辭明矣蓋當晉之時易有患得患失之心六五處大明之中而才柔又易有失得之纍本義以為一切去其計功謀利之心者大明在上用其明於當為而不當用其明於計功謀利之私也不然則明反為纍矣象曰失得勿恤往有慶也傳以大明之德得下之附推誠委任則可以成天下之大功是往而有福慶也上九晉其角維用伐邑厲吉無咎貞吝傳角剛而居上之物上九以剛居卦之極故取角為象以陽居上剛之極也在晉之上進之極也剛極則有強猛之過進極則有躁急之失以剛而極於進失中之甚也無所用而可維獨用於伐邑則雖厲而吉且無咎也伐四方者治外也伐其居邑者治內也言伐邑謂內自治也人之自治剛極則守道愈固進極則遷善愈速如上九者以之自治則雖傷於厲而吉且無咎也嚴厲非安和之道而於自治則有功也復云貞吝以盡其義極於剛進雖自治有功然非中和之德故於貞正之道為可吝也不失中正為貞朱子曰貞吝之義諸義只云貞同守此則吝不應於此獨云於正道為吝也進齊徐氏曰此爻剛而在上有角之象進而至於角窮而無所往獨可用其剛而伐邑以治其內必常懷惕厲自危之心則吉而無咎矣李氏聞曰晉而至於角前無餘地矣伐其邑自治也春秋之墮三都其策雖窮不猶愈於不墮乎雖危而吉此公至自圍郕所以善之也本義角剛而居上上九剛進之極有其象矣占者得之而以伐其私邑則雖危而吉且無咎然以極剛治小邑雖得其正亦可吝矣或問上九剛進之極以伐私邑安能吉而無咎朱子曰以其剛故可伐邑若不剛則不能伐邑矣但易中言伐邑皆是用之於小若伐國則其用大矣如髙宗伐鬼方三年之類維用伐邑則不可用之於大可知雖用以伐邑然亦必能自危厲乃可以吉而無咎過剛而能危厲則不至於過矣問本義作伐其私邑程傳以為自治如何曰便是程傳多不肯說實事皆以為取喻伐邑如墮費墮郈之類是也大抵今人說易多是見易中有此一語便以為通體事當如此不知當其時節地頭其人所占得者其象如何若果如今人所說則易之說有窮矣雲峰胡氏曰上九剛進之極而以伐私邑雖危而吉且無咎許之也然以剛進之極僅能伐其小邑雖正亦可吝鄙之也本義曰私邑又曰小邑謙六五伐不言邑其伐也公晉上九伐其內地之邑則為私矣既濟九三伐鬼方其伐也大晉上九僅能伐其私邑則為小矣雙湖胡氏曰晉其角與姤其角同義皆剛上之象上九與九四皆不正一云貞厲一云貞吝者蓋云雖正猶厲猶吝况不貞乎其警戒之意抑又深切矣象曰維用伐邑道未光也傳維用伐邑既得吉而無咎復云貞吝者其道未光大也以正理言之尤可吝也夫道既光大則無不中正安有過也今以過剛自治雖有功矣然其道未光大故亦可吝聖人言盡善之道龜山楊氏曰非日中之時剛上窮而不足以照天下道未光也故維用伐邑而已若夫道足以照天下則無思不服矣尚何伐邑之有進齊徐氏曰上九之維用伐邑所用者小而於晉進之道未為光大也建安丘氏曰上陽體本光以四據其應陽不得用故道本光如屯隂為初九所據萃陰為九四所據故九五皆以未光言之又曰晉進也柔進而上行也故卦專主柔進為義六爻四柔二剛六五一柔自四而升已進者也故往吉無不利下坤三柔皆欲進者而九四以剛間之故有晉如鼫鼠之象三與五近下接二柔志在上行四莫能間故曰衆允悔亡二在下卦之中去五漸逺則憂其不得進故晉如愁如初最逺於五當進之始上與四應反為所抑故晉如摧如也上以剛居一卦之窮無可進之地故有晉其角之象趙氏曰下三爻皆柔順而坤體故初二吉三悔亡四上以陽不當位故厲且吝唯五以柔明居尊位故往吉無不利也離下坤上傳明夷序卦晉者進也進必有所傷故受之以明夷夷者傷也夫進之一作而不已必有所傷理自然也明夷所以次晉也為卦坤上離下明入地中也反晉成明夷故義與晉正相反晉者明盛之卦明君在上羣賢竝進之時也明夷昏暗之卦暗君在上明者見傷之時也日入於地中明傷而昏暗也故為明夷明夷利艱貞傳君子當明夷之時利在知艱難而不失其貞正也在昏暗艱難之時而能不失其正所以為明一有為字君子也本義夷傷也為卦下離上坤日入地中明而見傷之象故為明夷又其上六為暗之主六五近之故占者利於艱難以守正而自晦其明也中溪張氏曰離下坤上為明夷離日為坤地所掩有傷其明之象斯時也宜克艱其心而不失乎貞正此則處明夷之道也孔氏曰暗主在上明臣在下不敢顯其明智亦明夷之義時雖至暗不可隨世傾邪政宜艱難堅固守其貞正之德故利在艱貞雲峰胡氏曰以二體則離明也傷之者坤以六爻則初至五皆明也傷之者上上為暗主而五近之故本義從彖傳以利艱貞為五彖辭多言利貞惟坤利牝馬之貞同人利君子貞家人利女貞明夷則曰利艱貞在諸爻中惟噬嗑九四大畜九三言之未有一卦全體以為利義者蓋明夷之時艱難之時也貞一也與處平常之時異矣彼方欲晦我之明艱難守貞而自昭其明可也雙湖胡氏曰艱則患難之時也處此時者利在遭患難而守其貞故曰利艱貞明傷於坤地之下居中而不失其正其六二當之乎彖辭文王所作也於坤曰安貞吉於明夷曰利艱貞終守臣節而不失其不可見於此乎彖曰明入地中明夷本義以卦象釋卦名進齊徐氏曰離日在坤地之下故曰明入地中日出地則明入地則晦故以晦為夷內文明而外柔順以蒙大難文王以之難乃旦反下同傳明入於地其明滅也故為明夷內卦離離者文明之象外卦坤坤者柔順之象為人內有文明之德而外能柔順也昔者文王如是故曰文王以之當紂之昏暗乃明夷之時而文王內有文明之德外柔順以事紂蒙犯大難而內不失其明聖而外足以逺禍患一作害此文王所用之道也故曰文王以之本義以卦德釋卦義蒙大難謂遭紂之亂而見囚也臨川吳氏曰文王為紂所囚內文明而不失己外柔順以免禍是文王所用合於明夷全卦之義利艱貞晦其明也內難而能正其志箕子以之傳明夷之時利於處艱厄而不失其貞正謂能晦藏其明也不晦其明則被禍患不守其正則非賢明箕子當紂之時身處其國內切近其難故云內難然箕子能一無能字藏晦其明而自守其正志箕子所用之道也故曰箕子以之本義以六五一爻之義釋卦辭內難謂為紂近親在其國內如六五之近於上六也朱子曰文王箕子大槩皆是晦其明然文王外柔順是本分自然做底箕子晦其明又云艱是他那佯狂底意思便是艱難底氣象建安丘氏曰文王得明夷二體之義內有文明之德而外以柔順掩之故雖蒙被大難而卒能脫身於羑里者用此道也箕子得明夷六五一爻之義故處難處之世而知以艱貞為利晦其明而不耀其明屈其身而能正其志况以暗君在上事之不可諌之不行不忍其宗國之顛亡罹此內難而能卒免於禍者用此道也中溪張氏曰以全卦言離明文王象坤晦紂象以坤乘離是文王之明為紂所蔽也以一爻言五箕子象五體本陽以六居之為陰中藏陽是箕子自晦其明也雲峰胡氏曰彖曰明夷利艱貞周公於六五爻辭曰箕子之明夷利貞釋彖兼文王發之蓋羑里演易處之甚從容可見文王之德佯狂受辱處之極艱難可見箕子之志然此一時也文王因而發伏羲河圖之易箕子因而發大禹洛書之疇聖賢之於患難自係斯文之㑹蓋有天意存焉此非彖傳本意姑及之象曰明入地中明夷君子以蒞衆用晦而明傳明所以照君子無所不照然用明之過則傷於察太察則盡事而無含𢎞之度故君子觀明入地中之象於蒞衆也不極其明察而用晦然後能容物和衆衆親而安是用晦乃所以為明也若自任其明無所不察則己不勝其忿疾而無寬厚含容一作𢎞之德人情睽疑而不安失蒞衆之道適所以為不明也古之聖人設前旒屏樹者不欲明之盡乎隱也朱子曰君子用晦而明晦地象明日象晦則是不察察若晦而不明則晦得沒理㑹了故外晦而內必明乃好白雲郭氏曰明入地中而後為明夷夷之為傷非毁其明也晦其明而已晦其明則有終明之道是知艱貞之君子所以能用晦而明也建安丘氏曰明入地中外晦內明故君子以之蒞衆不用明而用晦此其所以明也東萊呂氏曰用晦而明者君子養明之道不有虞淵之入焉有暘谷之明雲峰胡氏曰晋明盛之象君子斂而用以自治明夷晦其明之象君子推而用以治人皆善用易者也初九明夷于飛垂其翼君子于行三日不食有攸往主人有言傳初九明體而居明夷之初見傷之始也九陽明上升者也故取飛象昏暗在上傷陽之明使不得上進是于飛而傷其翼也翼見傷故垂朵凡小人之害君子害其所以行者君子于行三日不食君子明照見事之微雖始有見傷之端未顯也君子則能見之矣故行去避之君子于行謂去其祿位而退藏也三日不食言困窮之極也事未顯而處甚艱非見幾之明不能也夫知幾者君子之獨見非衆人所能識也故明夷之始其見傷未顯而去之則世俗孰不疑怪故有所往適則主人有言也然君子不以世俗之見怪而遲疑其行也若俟衆人盡識則傷己及而不能去矣此薛方所以為明而揚雄所以不獲其去也或曰傷至於垂翼傷己明矣何得衆人猶未識也曰初傷之始也云垂其翼謂傷其所以飛爾其事則未顯也君子見幾故亟去之世俗之人未能見也故異而非之如穆生之去楚申公白公且非之况世俗之人乎但譏其責小禮而不知穆生之去避胥靡之禍也當其言曰不去楚人將鉗我於市雖二儒者亦以為過甚之言也又如袁閎於黨事未起之前名德之士方鋒起而獨濳身土室故人以為狂生卒免黨錮之禍所往而人有言胡足怪也本義飛而垂翼見傷之象占者行而不食所如不合時義當然不得而避也建安丘氏曰明夷暗主在上初體離明去上最遠見傷即避有飛而垂翼之象垂翼不敢上進戢身避禍也君子知幾義當速去蓋可以不食而不可以不去去重於食故也主人主我者也謂初與四為應也有言謂訝其去之早也雲峰胡氏曰飛離鳥象象為飛占為行為往象為垂其翼占為不食有言飛而垂翼物之傷也行而不食所如不合君子之傷也君子此時惟有安於義命而已蔡氏謂初二爻三仁象愚意于行不食伯夷避紂之象節齊蔡氏曰曰飛曰行曰往皆進之謂也曰垂翼曰不食曰有言皆傷之謂也言當明夷之初進而有傷也取上獨遠故傷者淺象曰君子于行義不食也傳君子遁藏而困窮義當然也唯義之當然故安處而無悶雖不食可也本義唯義所在不食可也童溪王氏曰君子于行謂去其祿位也三日不食謂義不食其祿也雲峰胡氏曰君子去就之義皆於其初占之賁之初不可乘而不乘義也明夷之初不當食而不食亦義也卦皆下離决去就之義於早者非明不能也六二明夷夷于左股用拯馬壯吉傳六二以至明之才得中正而體順順時自處處之至善也雖君子自處之善然當陰暗小人傷明之時亦不免為其所傷但君子自處有道故不能深相傷害終能違避之爾足者所以行也股在脛足之上於行之用為不甚切左又非便用者手足之用以右為便唯蹶張用左蓋右立為本也夷于左股謂傷害其行而不甚切也雖然亦必自免有道拯用一作其字壯健之馬則獲免之速而吉也君子為陰暗所傷其自處有道故其傷不甚自拯有道故獲免之疾用拯之道不壯則被傷深矣故云馬壯則吉也二以明居陰暗之下所謂吉者得免傷害而已非謂可以有為於斯時也本義傷而未切救之速則免矣故其象占如此或問明夷初二二爻不取爻義朱子曰初爻所傷地遠故雖傷而尚能飛問初爻比二爻却似二爻傷得淺初爻傷得深曰非也初尚能飛但垂翼耳進齊徐氏曰初傷其翼初傷猶淺二傷其股則傷於行矣二在下故曰左兵法前為右後為左今人以下移為左遷夷于左股傷于下也馬壯則行速言救之道速則獲免于難而吉也雲峰胡氏曰明夷取手足心腹為象初二為股三四為腹五上為首初三右也故二四為左左弱而右強右陽而左陰也豐與明夷下體離皆以上六二爻為暗主豐九三與上為應故折其右股傷之切而不可用也明夷六二去上逺故夷于左股傷之未切猶可用也用拯馬壯吉渙初六亦言之本義以初柔非濟渙之才取九二之剛為馬明夷六二亦柔也諸家多取九三之剛為馬而本義但曰救之速則免何也蓋渙下坎主九二初欲救渙之速非假二之剛健中正不可明夷下離主六二六二文明中正救傷之速有不必假於三者鄭氏剛中曰大抵救傷拯渙非健速不可故皆以馬壯言象曰六二之吉順以則也傳六二之得吉者以其順處而有法則也則謂中正之道能順而得中正所以處明傷之時而能保其吉也臨川吳氏曰六二以柔居中為順而有則故能得強壯之馬以拯己之傷而有吉也九三明夷于南狩得其大首不可疾貞傳九三離之上明之極也又處剛而進上六坤之上暗之極也至明居下而為下之上至暗在上而處窮極之地正相敵應將以明去暗者也斯義也其湯武之事乎南在前而明方也狩畋而去害之事也南狩謂前進而除害也當克獲其大首大首謂暗之魁首上六也三與上正相應為至明克至暗之象不可疾貞謂誅其元惡舊染汚俗未能遽革必有其漸革之遽則駭懼而不安故酒誥云惟殷之迪諸臣惟工乃湎于酒勿庸殺之姑惟教之至於既久尚曰餘風未殄是漸漬之俗不可以遽革也故曰不可疾貞正之不可急也上六雖非君位以其居上而暗之極故為暗之主謂之大首本義以剛居剛又在明體之上而屈於至暗之下正與上六暗主為應故有向明除害得其首惡之象然不可以亟也故有不可疾貞之戒成湯起於夏臺文王興於羑里正合此爻之義而小事亦有然者建安丘氏曰他卦三與上為正應在明夷則為以至明伐至暗之象也故曰明夷于南狩南者進而在前之方狩者畋而去之之事大首指上六得其大首者殲厥渠魁也九三出而專南狩之權以應上六柔暗之敵為民除害一舉而獲其首惡之大者然九三以剛居剛又有不可疾貞之戒不可疾貞者猶冀其改過遷善則伐可不舉矣雲峰胡氏曰初無位可去則去之宜速二在位可救則救之宜速若九三至明之極與上至暗之極者為應不可復救矣故有向明除害得其首惡之象然二之救難可速也三之除害不可速也故又有不可疾貞之戒武王須假五年其得此歟西溪李氏曰武王處明夷則以不可疾為貞箕子處明夷則以利艱為貞各當其事也隆山李氏曰雜卦云晉晝則明夷為夜又曰明夷誅則晉為賞錫馬三接賞也南狩得大首誅也白雲郭氏曰不可疾者離之性失之過則暴故戒象曰南狩之志乃大得也傳夫以下之明除上之暗其志在去害而已如商周之湯武豈有意於利天下乎得其大首是能去害而大得其志矣志苟不然乃悖亂之事也建安丘氏曰三在明體之上以昭去昏以順取逆持此以往則南狩可以大得志矣中溪張氏曰是狩也必有湯武之志然後可以行湯武之事也六四入于左腹獲明夷之心于出門庭傳六四以陰居陰而在陰柔之體處近君之位是陰邪小人居髙位以柔邪順於君者也六五明夷之君位傷明之主也四以柔邪順從之以固其交夫小人之事君未有由顯明以道合者也必以隱僻之道自結於上右當用故為明顯之所左不當用故為隱僻之所人之手足皆以右為用世謂僻所為僻左是左者隱僻之所也四由一有是字隱僻之道深入其君故云入于左腹入腹謂其交深也其交之深故得其心凡奸邪之見信於其君皆由奪其心也不奪其心能無悟乎于出一作出于門庭既信之于心一作既奪其心而後行之於外也邪臣之事暗君必先蠱其心而後能行於外本義此爻之義未詳竊疑左腹者幽隱之處獲明夷之心于出門庭者得意於逺去之義言筮而得此者其自處當如是也蓋離體為至明之德坤體為至暗之地下三爻明在暗外故隨其逺近髙下而處之不同六四以柔正居暗地而尚淺故猶可以得意於遠去五以柔中居暗地而已迫故為內難正志以晦其明之象上則極乎暗矣故為自傷其明以至於暗而又足以傷人之明蓋下五爻皆為君子獨上一爻為暗君也朱子曰明夷下三爻皆說明夷是明而見傷者六四爻說者却以為是奸邪之臣先蠱惑其君心而後肆行於外殊不知上六是暗主六五却不作君說六四之與上六既非正應又不相比又况下三爻皆說明夷是好底何獨此爻却作不好說以意觀之六四居暗地尚淺猶可以得意而逺去故雖入於幽隱之處猶能獲明夷之心于出門庭也故小象曰獲心意也上六不明晦則是合下已是不明故初登于天可以照四國而不免後入于地則是始於傷人之明而終於自傷以墜其命矣呂原明以為唐明皇可以當之蓋言始明而終暗也于出門庭言君子去暗尚逺可以得其本心而逺去雲峰胡氏曰腹坤象故坤體之下有左腹象自明之暗有入于幽隱之象左僻為幽腹在內為隱諸家皆以入于左腹為小人左道惑君本義謂上為暗主傷人之明者下五爻皆君子之明為其所傷者初二三明在暗外至四則明將入于暗中然比之六五則暗尚淺猶可得意于遠去坤有腹象入于左腹自離而入于坤也坤偶有門象于出門庭猶可去而出乎坤也獲明夷之心者微子之自靖出門庭者微子之行遁也建安丘氏曰坤為腹左者隱僻之所也六四進居坤體之下故曰入于左腹傷人之明者上也六四深入其腹而得其傷明之心故曰獲明夷之心幸而四與上同體于此而得其密意知上之暗主不可輔舍而去之以就九三之明故有于出門庭之象此微子於紂為同姓肺腑之親知其意之不可諌舍商紂而歸武王書云吾家耄遁于荒我不顧行遁正得此爻之義矣雙湖胡氏曰節初九戶庭指九二九二門庭指六三陽為戶陰為門今六四稱門庭蓋指本爻之象也象曰入于左腹獲心意也傳入于左腹謂以邪僻之道入于君而得其心意也得其心所以終不悟也六五箕子之明夷利貞傳五為君位乃常也然易之取義變動隨時上六處坤之上而明夷之極隂暗傷明之極者也五切近之聖人因以五為切近至暗之人以見處之之義故不專以君位一作義言上六隂暗傷明之極故以為明夷之主五切近傷明之主若顯其明則見傷害必矣故當如箕子之自晦藏則可以一無以字免於難箕子商之舊臣而同姓之親可謂切近於紂矣若不自晦其明被禍可必也故佯狂為奴以免於害雖晦藏其明而內守其正所謂內難而能正其志所以謂之仁與明也若箕子可謂貞矣以五陰柔故為之戒云利貞謂宜如箕子之貞固也若以君道言義亦如是人君有當含晦之時亦外晦其明而內正其志也本義居至暗之地近至暗之君而能正其志箕子之象也貞之至也利貞以戒占者或問商之三仁其行不同而同於至誠惻怛之意微子之去欲存宗祀比干之死欲紂改行可見其至誠惻怛處不知箕子至誠惻怛何以見朱子曰箕子比干都是一樣心箕子偶然不衝著紂之怒自不殺他然他見比干恁地死若更死諫無益於國徒使人君有殺諫臣之名在他處此最難微子去却易比干一向諫死又却索性箕子在半上落下最是難處被他監繫在那裏不免佯狂所以易中特說箕子之明夷可見其難處故彖曰利艱貞晦其明也內難而能正其志箕子以之他外雖狂而心則定也爻說貞而不言艱者蓋言箕子則艱可見不必更言之進齊徐氏曰上六為明夷之主則暗君也而六五近之雖當明夷之時然居位得中守其明而不息此箕子之貞也王氏湘卿曰微子去之利而不貞比干諫而死貞而不利惟箕子囚奴利且正也以六居五乃能利貞中溪張氏曰爻言利貞即彖所謂利艱貞也雲峰胡氏曰士大夫處平時易處明夷之時難處明夷之時為微子比干猶易為箕子難微子已去不可復去比干已死不必復死內難而能正其志箕子以之此殷有三仁而爻獨以箕子言之也易以意為主此卦之意主於上六故以象暗君則君位不在五諸卦意有類此者唯學者識之象曰箕子之貞明不可息也傳箕子晦藏不失其貞固雖遭患難其明自存不可滅息也若逼禍患遂失其所守則是亡其明乃滅息也古之人如揚雄者是也中溪張氏曰箕子之明可晦而不可息者蓋其明在內故也上六不明晦初登于天後入于地傳上居卦之終為明夷一作夷明之主又為明夷之極上至髙之地明在至髙本當遠照明既夷傷故不明而反昏晦也本居於髙明當及遠初登于天也乃夷傷其明而昏暗後入于地也上明夷之終又坤陰之終明傷之極者也本義以陰居坤之極不明其德以至於晦始則處髙位以傷人之明終必至於自傷而墜厥命故其象如此而占亦在其中矣朱子曰明夷未是說暗之主只是說明而被傷者乃君子也上六方是說暗君王氏湘卿曰前五爻言明夷猶有明可夷也上居明夷之極無明可夷直不明而晦矣雲峰胡氏曰下三爻以明夷為句首四則明夷之辭在句中上六不曰明夷而曰不明晦蓋惟上六不明而晦所以五爻之明皆為所夷矣始則居髙位而傷人之明終則必至於自傷而墜厥命爻設為此象以為後世人主之大戒人之明未必傷也卒乃自傷而遂隕絶厥命則亦何益之有哉如紂者亦可鍳矣雙湖胡氏曰下五爻皆設明夷是有明而見傷者也上一爻說不明晦是實晦而不明者也以卦言則傷離之明者在坤坤為晦以爻言則傷下五爻之明者在上上獨為晦各有不同也五上為天有登天之象坤地至上方成又有入地之象嘗觀朱子贊易曰理定既實事來尚虗用應始有體該本無此文王周公為垂世立教而作易豈欲故以明夷一卦紀商周之事哉卦爻自有此象則繫此辭自後世觀之非特箕子一爻紂君臣當時事體無一不與明夷卦爻相似耳若謂先因此事而後為此辭則六十四卦只載六十四事文王周公之志荒矣象曰初登于天照四國也後入于地失則也傳初登于天居髙而明則當照及四方也乃被傷而昏暗是後入于地失明之道也失則失其道也本義照四國以位言建安丘氏曰明夷六二受人之傷者以其順則故卒能自全其明而免禍上六傷人之明者以其失則故至於自墜厥命而喪邦則者君道之正也其可失乎雲峰胡氏曰離之照四國以德言此之照四國以位言爾則者不可踰之理失則所以為紂順則所以為文王進齊徐氏曰下三爻離體明也上三爻坤體暗也上六暗極所以為明夷之主也故不言明夷下五爻皆所以處明夷之道而有逺近淺深之殊者也故皆言明夷初明雖傷去上最遠垂翼而已二則傷股而害已深矣以其在下居中去上猶遠有可拯之道也三則與上為正應可以南狩而獲其大首矣四入坤晦之門庭其暗尚淺有可去之道五則迫近于難義不可去亦惟艱貞自晦其明而已此紂之時聖賢所處之道不同有如此建安丘氏曰明夷以二體言則離明為坤暗所傷以六爻言則上一爻為暗君自五而下皆為所傷所以下五爻皆曰明夷此受傷者也上一爻曰不明晦而獨不言明夷此傷人之明者也今以商周之事槩論則上一爻極暗為紂之昏棄五近晦為箕子之囚奴四與上同體避暗就明為微子之遁去三與上應以明尅時為武王之伐紂二在大臣之位藏明於暗為文王之羑里初去暗稍遠見傷即避其伯夷太公居海濱之事乎明夷六爻之義於此可見矣離下巽上傳家人序卦夷者傷也傷於外者必反於家故受之以家人夫傷困於外則必反於內家人所以次明夷也家人者家內之道父子之親夫婦之義尊卑長幼之序正倫理篤恩義家人之道也卦外巽內離為風自火出火熾則風生風生自火自內而出也自內而出由家而一無而字及於外之象二與五正男女之位於內外為家人之道明於內而巽於外處家之道也夫人有諸身者則能施於家行於家者則能施於國至於天下治治天下之道蓋治家之道也推而行之於外耳故取自內而出之象為家人之義也文中子書以明內齊外為義古今善之非取象之意也所謂齊乎巽言萬物潔齊於巽方非巽有齊義也如戰乎乾乾非有戰義也或問易傳云正家之道在於正倫理篤恩義今欲正倫理則有傷恩義欲篤恩義又有乖於倫理如何朱子曰須是於正倫理處篤恩義篤恩義而不失倫理方可合沙鄭氏曰家人之卦由人事而名也天理在焉學者不旁通其情而拘於家人一事則六十四卦皆拘也家人利女貞傳家人之道利在女正女正則家道正矣夫夫婦婦而家道正獨云利女貞者夫正者身正也女正者家正也女正則男正可知矣本義家人者一家之人卦之九五六二外內各得其正故為家人利女貞者欲先正乎內也內正則外無不正矣中溪張氏曰家人之義以內為主六二居內而位正故曰利女貞女正則家道成矣或謂男女莫非家人而獨曰利女貞者何邪蓋家人合巽離而成卦巽長女而位四離中女而位二以柔居柔各得其正此亦利女貞之義昔舜刑于二女正合家人巽離之象誠齊楊氏曰正莫易於天下而莫難於一家莫易於一家之父子兄弟而莫難於一婦一婦正一家正一家正天下定矣故家人之卦辭曰利女貞雲峰胡氏曰家人九五居外六二居內男女正位之象也長女居上中女居下尊卑有序之象也四陽二陰陽強而陰弱夫唱婦隨之象也二柔皆居陰位執柔而不敢抗之象也內明而外巽處家之象也自初至五皆貞尊卑各安其分之象也而卦獨曰利女貞先正乎內也天下以國為內國以家為內家以女為內在咸之時二女尚少此中女與長女則家道既成之象也巽長女一陰在下而順今居上卦之下而得其正離中女一陰在中而明今居下卦之中而得其正此所以為女之正而其家無不正者要之家人內也當以離內為主彖曰家人女正位乎內男正位乎外男女正天地之大義也傳彖以卦才而言陽居五在外也陰居二處內也男女各得其正位也尊卑內外之道正合天地陰陽之大義也本義以卦體九五六二釋利女貞之義雲峰胡氏曰家人離多由女之不正故言男之正必先以女正言之中溪張氏曰卦辭但言利女貞而彖辭則曰男女正蓋離下巽上則為家人在內卦以六居二陰得陰位則女正位乎內也在外卦以九居五陽得陽位則男正位乎外也男女之位各得其正乃天地陰陽之大義也馮氏去非曰經止言女正而孔子推明一家之人皆利於正有補世教為多又曰兼三才而兩之五天二地也家人有嚴君焉父母之謂也傳家人一無人字之道必有所尊嚴而君長者謂父母也雖一家之小無尊嚴則孝敬衰無君長則法度廢有嚴君而後家道正家者國之則也本義亦謂二五或問傳曰家人之道必有所尊嚴而君長者謂父母也如此則嚴君作兩字說然自舊諸家只作一字說未知如何朱子曰所尊嚴之君長也問家人彖辭不盡取象曰注中所以但取二五不及他象者但因彖傳而言耳大扺彖傳取象最精象中所取却恐有假合處涑水司馬氏曰家者治之至小者也然亦有嚴君之道焉嚴恭也知事親則知事君矣建安丘氏曰既言男女之正至此又推本於父母之嚴曰家人人有嚴君焉君謂父母即一家之君長也君長嚴則臣下肅父母嚴則家道齊必父母之嚴於其子如君之嚴於其臣則倫理一定尊卑截然無干名犯分之事而家道正家道既正則天下莫不一於正矣趙氏曰父義母慈母何以亦稱嚴蓋母之不嚴家之蠧也瀆上下之分庇子弟之過亂內外之别嫚帷薄之儀父雖嚴有不能盡察者必父母尊嚴內外齊肅然後父尊子卑兄友弟恭夫制婦聽各盡其道而後家道正正家而天下定矣雲峰胡氏曰本義指二五言在男女則九五六二皆正在父母則九五之剛可謂之嚴六二之柔未必能嚴故夫子發彖辭言外之意曰家人有嚴君焉父母之謂也其旨深哉父父子子兄兄弟弟夫夫婦婦而家道正正家而天下定矣傳父子兄弟夫婦各得其道則家道正矣推一家之道可以及天下故家正則天下定矣本義上父初子五三夫四二婦五兄三弟以卦畫推之又有此象雲峰胡氏曰齊家之道在篤恩義然以正倫理為本上父初子上下分而父子之倫正矣五夫二婦五上四下也三夫二婦三上二下也五兄三弟五上三下也夫婦之上下分而夫婦正兄弟之上下分而兄弟正矣特父子之上下相去甚遠而其分嚴兄弟之相去甚近而其情親夫婦雖相比而亦未嘗無上下之分也卦惟以女正為利夫子發言外之意則謂男女皆當正又謂父子兄弟夫婦皆當正本義又即卦畫以推其象明且備矣象曰風自火出家人君子以言有物而行有恆行下孟反傳正家之本在正其身正身之道一言一動不可易也君子觀風自火出之象知事之由內而出故所言必有物所行必有恆也物謂事實恆謂常度法則也德業之著於外由言行之謹於內也言慎行修則身正而家治矣本義身修則家治矣朱子曰風自火出家人自火中有風如一堆火光此氣自熏蒸上出是也問風自火出曰謂如一火火必有氣衝上去便是風自火出然此只是言自內及外之意勉齊黃氏曰風自火出明內齊外之義今曰身修家治則於風自火出之象有所未明火在內卦為明內明身修也風在外卦為齊外齊家治也上九一爻是其義也中溪張氏曰巽為風離為火蓋火熾則風生而火者風之母也君子知風自火出之象則知風化之本自家而出而家之本又自身而出也夫身之所出惟言與行物猶不誠無物之物謂事實也恆常度也言有物則非虛言行有恆則非僞行言行相顧則其身修身修則家齊國治天下平矣此知風之自也雲峰胡氏曰風自火出一家之化自吾言行出皆由內及外自然熏蒸而成者也西溪李氏曰風自火出槖籥之火也大凡鼓鑄須是鼓得許多風從火裏出故風自火出槖籥自有一箇戶庭閫奧家之象也就中必有模範風也火也金也器也皆有模範君子體之言有物行有恆正家以身言行身之模範也物恆其則也一身之模範一家之模範也一家之模範天下之模範也初九間有家悔亡傳初家道之始也間謂防間法度也治其有家之始能以法度為之防間則不至於悔矣治家者治乎衆人也苟不間之以法度則人情流放必至於有悔失長幼之序亂男女之别傷恩義害倫理無所不至能以法度間之於始則無是矣故悔亡也九剛明之才能間其家者也不云無悔者羣居必有悔以能間故亡耳本義初九以剛陽處有家之始能防間之其悔亡矣戒占者當如是也龜山楊氏曰禮始於謹夫婦為宫室辨內外男位乎外女位乎內男不入女不出所以間有家也所以謹始也始不間終必亂矣中溪張氏曰離外實中虛有家之象二為家人之主初以剛明之才居其下得防間之道於其始而羣居紛爭之悔自亡矣雲峰胡氏曰初之時當間九之剛能間三五以剛居剛而吉初以剛居剛而能防間其家者也僅曰悔亡何哉家難而天下易能間於初僅可免悔初之不間悔將若何象曰間有家志未變也傳間之於始家人志意未變動之前也正志未流散變動而間之則不傷恩不失義處家之善也是以悔亡志變而後治則所傷多矣乃有悔也本義志未變而豫防之庸齊趙氏曰間於始則人心未變無傷恩害義之事故悔亡教婦初來教子嬰孩是也中溪張氏曰防間之道當謹其初也若待家瀆而後嚴之志變而後治之則敬戒之意失而有悔矣雲峰胡氏曰家人志已變而防之者難未變而防之者易六二無攸遂在中饋貞吉傳人之處家在骨肉父子之間大率以情勝禮以恩奪義唯剛立之人則能不以私愛失其正理故家人卦大要以剛為善初三上是也六二以陰柔之才而居柔不能治於家者也故無攸遂無所為而可也夫以英雄之才尚有溺情愛而不能自守者况柔弱之人其能勝妻子之情乎如二之才若為婦人之道則其正也以柔順處中它本無此五字正婦人之道也故在中饋則得其正而吉也婦人居中而主饋者也故云中饋本義六二柔順中正女之正位乎內者也故其象占如此進齊徐氏曰六二以柔居中巽順應五婦之道也遂專成也婦人無所專成惟在主中饋而已所謂惟酒食是議者也貞吉者居中得正固守順道故吉也漢上朱氏曰孟母曰婦人之禮精五飯羃酒漿養舅姑縫衣裳而已故有閨門之修無境外之志是也雲峰胡氏曰婦人無遂事從人而已六二正應九五從之者也故曰無攸遂居下卦之中故曰在中互坎故有飲食之象雙湖胡氏曰采蘩采蘋之詩以公候夫人奉祭祀為不失職大夫妻共祭祀為循法度祭祀蓋饋事之大者婦無遂事惟在中饋可見矣故六二貞吉惟以在中饋言彖辭所謂利女貞者其六二當之歟象曰六二之吉順以巽也傳二以陰柔居中正能順從而卑巽者也故為婦人之貞吉也中溪張氏曰六二得正而吉者以其能順從九五之正應而卑巽之也九三家人嗃嗃悔厲吉婦子嘻嘻終吝嗃呼落反嘻喜悲反象同傳嗃嗃未詳字義然以文義及音意觀之與嗷嗷相類又若一作人苦急束一作速之意九三在內卦之上主治乎內者也以陽居剛而不中雖得正而過乎剛者也治內過剛則傷於嚴急故家人嗃嗃然治家過嚴不能無傷故必悔於嚴厲骨肉恩勝嚴過故悔也雖悔於嚴厲未得寬猛之中然而家道齊肅人心祗畏猶為家之吉也若婦子嘻嘻則終至羞吝矣在卦非有嘻嘻之象蓋對嗃嗃而言謂與其失於放肆寧過於嚴也嘻嘻笑樂無節也自恣無節則終至敗家可羞吝也蓋嚴謹之過雖於人情不能無傷然苟法度立倫理正乃恩義之所存也若嘻嘻無度乃法度之所由廢倫理之所由亂安能保其家乎嘻嘻之甚則致敗家之凶但云吝者可吝之甚則至於凶故未遽言凶也本義以剛居剛而不中過乎剛者也故有嗃嗃嚴厲之象如是則雖有悔厲而吉也嘻嘻者嗃嗃之反吝之道也占者各以其德為應故兩言之朱子曰禮本天下之至嚴行之各得其分則至和如家人嗃嗃悔厲吉婦子嘻嘻終吝都是此理進齊徐氏曰九三以剛居剛而不中故有嗃嗃之象比乎二四兩柔之間故又有嘻嘻之象治家之道易以情勝義苟剛而不中雖過於嚴而有悔厲然而家道齊肅人心祗畏猶為家之吉而未失道也若笑樂無節而情愛昵比之私勝則敗度喪禮失節亂倫家道所由以壞也豈不終可吝乎雲峰胡氏曰嗃嗃以義勝情雖悔厲而吉嘻嘻以情勝義終吝悔自凶而吉吝自吉而凶九三以剛居剛若能嚴於家人者比乎二柔又若易昵於婦子者三其在吉凶之間乎故悔吝之占兩言之東萊呂氏曰此爻如對兩家而言且如入一家見其父子夫婦濟濟有禮可以知其必興見其嘻嘻然日以歌舞為樂可以知其必敗雙湖胡氏曰六爻獨於九三稱家人以其當一卦之中介乎二陰之間有夫婦焉為一家之主者也象曰家人嗃嗃未失也婦子嘻嘻失家節也傳雖嗃嗃於治家之道未為甚失若婦子嘻嘻是無禮法失家之節家必亂矣中溪張氏曰治家嚴急寧無傷恩之悔然猶未失治家之道也若夫婦子嘻嘻笑樂無度豈不失治家之節乎六四富家大吉傳六以巽順之體而居四得其正位居得其正為安處之義巽順於事而由正道能保有一無有字其富者也居家之道能保有一無有字其富則為大吉也四髙位而獨云富者於家而言髙位家之尊也能有其富是能保其家也吉孰大焉本義陽主義陰主利以陰居陰而在上位能富其家者也朱子曰占法陽主貴陰主富中溪張氏曰六四與初九為正應又介乎九三九五之間以柔得剛以虛受實故能富盛其家而有大吉之占六四以巽順之道而在髙位其一家之母歟記曰父子篤兄弟睦夫婦和家之肥也家之肥即家之富也雲峰胡氏曰小畜九五稱富泰六五稱不富陽實而陰虛也家人六四陰也而稱富陽主義陰主利也卦二陰爻皆得正二之貞吉順以巽也四之大吉順在位也玩兩順字婦道盡矣二在下之婦也四之位其在上而主家之婦乎主家如此是冝其家之富而大吉也李氏開曰初間之二饋之三治之四則享其富此治家之序也象曰富家大吉順在位也傳以巽順而居正位正而巽順能保有一無有字其富者也富家之大吉也建安丘氏曰女子之道以順為正聖人於二之象曰順以巽於四之象曰順在位以言女子未有不順其夫而家道得其正者故二象皆以順言之進齊徐氏曰富家者非必金帛寶玉而後為富但父父子子兄兄弟弟夫夫婦婦各安其位順而無逆能保有其家而不敗即所謂富也吉莫大焉若父子兄弟夫婦之間各失其道則家敗無日富可保乎九五王假有家勿恤吉假更白反象同傳九五男而在外剛而處陽居尊而中正又其應順正於內治家之至正至善者也王假有家五君位故以王言假至也極乎有家之道也夫王者之道修身以齊家家正而天下治矣自古聖王未有不以恭己正家為本故有家之道既至則不憂勞而天下治矣勿恤而吉也五恭己於外二正家於內內外同德可謂至矣蘭氏廷瑞曰剛中正為家人之主而初二三四各當其位亦如人君正身齊家使父子兄弟夫婦各正位乎內外而不相紊故不待憂恤而吉建安丘氏曰三五陽剛皆主治家者也三剛而不中失之過嚴未免有悔厲之失五剛而得中威而能愛盡乎治家之道者故人無不化可以勿憂恤而吉也或曰治家之道尚嚴在彖以嚴正為吉五以相愛為義何也曰嚴以分言正家之義也愛以情言假家之義也假有感格之義故象以相愛言之雙湖胡氏曰常人處家之道九三爻己盡之此又自王者事所謂刑于寡妻至于兄弟以御于家邦者是也然王者自可用初三上爻常人得五爻亦有有家之道也本義假至也如假于太廟之假有家猶言有國也九五剛健中正下應六二之柔順中正王者以是至于其家則勿用憂恤而吉可必矣蓋聘納后妃之吉占而凡有是德者遇之皆吉也朱子曰王假有家言到這裏方具得許多物事有妻有妾方始成箇家有家之有只是如夙夜浚明有家亮采有邦之有謂三德者則夙夜浚明於其家有六德者則亮采於其邦有是虛字非如奄有四海之有也雲峰胡氏曰不曰有國有天下而曰有家卦名家人主卦而言也初九間有家家道之始九五王假有家家道之成王者之有天下至此不必憂而吉可必矣象曰王假有家交相愛也傳王假有家之道者非止能使之順從而已必致其心化誠合夫愛其內助婦愛其刑家交相愛也能如是者文王之妃乎若身修法立而家未化未得為假有家之道也本義程子曰夫愛其內助婦愛其刑家童溪王氏曰以二五言之則二爻居相應之地二有內助之德而五愛之五有刑家之道而二愛之此謂交相愛也雲峰胡氏曰二五皆中正其愛也非情欲之愛五愛二之柔順中正足以助乎五二愛五之剛健中正足以刑于二也誠齊楊氏曰以文王為君以太姒為妃以王季為父以太任為母以武王為子以邑姜為婦其不交相愛乎詩人歌之曰刑于寡妻至于兄弟以御于家邦此之謂矣上九有孚威如終吉傳上卦之終家道之成也故極言治家之本治家之道非至誠不能也故必中有孚信則能常久而衆人自化為善不由至誠己且不能常守也况欲使一作使衆人乎故治家以有孚為本治家者在妻孥情愛之間慈過則無嚴恩勝則掩義故家之患常在禮法不足而瀆慢生也長失尊嚴少忘恭順而家不亂者未之有也故必有威嚴則能終吉保家之終在有孚威如二者而已故於卦終言之本義上九以剛居上在卦之終故言正家久逺之道占者必有誠信嚴威則終吉也進齊徐氏曰上九以陽剛居卦之終家道大成人信之矣故曰有孚然不以人信而或弛律身益嚴故曰威如身愈修則家愈齊保家之道也故曰終吉涑水司馬氏曰上九以陽居上家之至尊者也家人望之以為儀表苟具身正不令而行是以內盡至誠為下所信然後有威如可畏而獲終吉也縉雲馮氏曰為人父者躬行之有素則家人無不孚之者矣其所謂躬行者豈飭厲以為威哉正其衣冠尊其瞻視儼然人望而畏之非心罔念己潛消而默化矣此威如之吉而象以為反身之謂也雲峰胡氏曰九三嗃嗃處家之過嚴上九威如律身之自嚴大有六五厥孚交如威如六陰柔以其不足於嚴而勉之家人有孚威如九陽剛以其能自律之嚴而許之也卦未有如家人皆吉者然始之吉易終之吉難故必有誠信威嚴則終吉矣卦以家人名一家之人也本義以卦推之上父初子五三夫二四婦五兄三弟或又以內外卦推之正位乎內則初女二婦三母母嚴婦順女當自間故初三剛而二柔正位乎外則四子五夫上父父嚴夫義子順乎親故上與五剛而四柔易之曲暢旁通也如此象曰威如之吉反身之謂也傳治家之道以正身為本故云反身之謂爻辭謂治家當有威嚴而夫子又復戒云當先嚴其身也威嚴不先行於己則人怨而不服故云威如而吉者能自反於身也孟子所謂身不行道不行於妻子也本義謂非作威也反身自治則人畏服之也南軒張氏曰居家人之上家人所瞻仰而視效者也身不修則家不可齊此家人六爻卒歸於反身也反身謂何言有物而行有恆而已雲峰胡氏曰未有不嚴於身而能嚴於家者九三嗃嗃之嚴有悔而吉上九反身之嚴終吉無悔節齊蔡氏曰初與四二與五皆以柔應剛故有順德三與上以剛遇剛故三嗃嗃而上威如也西溪李氏曰卦中六爻不惟男女之定位剛柔之位亦不可易上父道三母道貴嚴五夫道貴義故以九居之四子道二婦道貴順故以六居之初女之道安得用剛蓋女子之未從人也當以禮自防不然則為不有躬之女故亦以九居之剛柔皆當所以為家道之善建安丘氏曰家人一卦先儒謂內卦三爻女子之事也外卦三爻男子之事也女子之道始也為人女故初間有家中也為人婦故二在中饋終也為人母故三家人嗃嗃即彖辭女正位乎內也男子之道始也為人子故四富家吉中也為人夫故王假有家終也為人父故上威如吉即彖辭男正位乎外也周易傳義大全卷十三
