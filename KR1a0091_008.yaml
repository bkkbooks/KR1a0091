body:
  text: 周易傳義大全卷二明胡廣等撰坤下坤上坤元亨利牝馬之貞牝頻忍反傳坤乾之對也四德同而貞體則異乾以剛固為貞坤則一作以柔順而一作為貞牝馬柔順而健行故取其象曰牝馬之貞程子曰利字不聯牝馬為義如云利牝馬之貞則坤便只有三德朱子曰利牝馬之貞不可將利字自作一句後云主利卻當如此絶句此伊川只為泥那四德所以如此說不通平菴項氏曰物之牝者皆能順陽而行求其從一而不變莫牝馬若也故聖人取以象坤建安邱氏曰馬象乾而坤言牝馬者明其為乾之配也節齊蔡氏曰乾貞剛健專固坤貞柔順承從君子有攸往傳君子所行柔順而利且貞合坤德也朱子曰君子有攸往此是虛句伊川只見彖傳辭押韻有柔順利貞君子攸行之語遂解云君子所行柔順而利且貞非也先迷後得主利傳陰從陽者也待唱而和陰而先陽則為迷錯居後乃得其常也主利利萬物則主於坤生成皆地之功也臣道亦然君令臣行勞於事者臣之職也程子曰先迷後得是一句主利是一句蓋坤道惟是主利西南得朋東北喪朋安貞吉喪息浪反傳西南陰方東北陽方陰必從陽離喪其朋類乃能成化育之功而有安貞之吉得其常則安安於常則貞是以吉也本義􅄲者偶也陰之數也坤者順也陰之性也注中者三畫卦之名也經中者六畫卦之名也陰之成形莫大於地此卦三畫皆偶故名坤而象地重之又得坤焉則是陰之純順之至故其名與象皆不易也牝馬順而健行者陽先陰後陽主義陰主利西南陰方東北陽方安順之為也貞健之守也遇此卦者其占為大亨而利以順健為正如有所往則先迷後得而主於利往西南則得朋往東北則喪朋大抵能安於正則吉也朱子曰利牝馬之貞言利於柔順之正而不利於剛健之正利是箇虗字本無四德砥意彖中方有之又曰乾卦元亨利貞便都好到坤只一半好故云利牝馬之貞即是亦有不利者問牝馬取其柔順健行坤順而言健何也曰守得這柔順亦堅確故有健象柔順而不堅確則不足以配乾矣乾主義坤便主利占得這卦便主利這事不是坤道主利萬物問東北喪朋西南得朋何也曰陰不比陽陰只理㑹得一半不似陽兼得陰故無所不利陰半用故得於西南喪於東北先迷後得以下亦然自王弼以下皆不知此錯解了又曰占得坤體從西南方得其朋從東北方失其朋西南陰方東北陽方坤比乾減半先迷後得東北西南大槩是陰為陽一半就前後言沒了前一截就四方言沒了東北一截陽却是全體陰體柔躁只為他柔所以躁剛便不躁躁是䢷欲動而不得動之意剛則便動矣柔躁不能自守所以說安貞吉安貞之吉他這分假只到這理若更妄作以求全時便凶了在人亦當如此廬陵龍氏曰巽離坤兊陰之朋也乾坎艮震陽之朋也雲峰胡氏曰乾言利貞貞則旡所不利矣坤言利牝馬之貞如牝馬之貞則利非牝馬之貞則不利也下文曰後得曰得朋利也牝馬之貞故也曰先迷曰喪朋不利也非牝馬之貞故也坤但得乾之半故乾無不利而坤有利不利與下文主利之利不同陽主義乾有剛斷意陰主利坤有斂藏意又輕清主義重濁主利安貞分而言之安者順之為貞者健之守合而言之則以順乎健為正雙湖胡氏曰文王卦辭取象始此坤自取牝馬象晉錫馬蕃庶亦坤象此象雜占中元亨利牝馬之貞已盡坤之全體君子以下則申占辭也又曰彖辭文王所作西南得朋東北喪朋後天卦位至哉文王之作易也其當西伯之時羑里之囚耶味安貞吉之辭文王之心盡於此矣今觀自利牝馬貞而下反覆致戒無非謹守為臣之分使凡居坤位者一守之以貞也萬世而下可想見文王之心且可為不安貞而占者之戒矣彖曰至哉坤元萬物資生乃順承天本義此以地道明坤之義而首言元也至極也比大義差緩始者氣之始生者形之始順承天施地之道也朱子曰資乾以始便資坤以生不爭得霎時間乾砥亨時坤砥亦亨萬物資乾以始而冇氣資坤以生而有形氣至而生即坤元也廣平游氏曰乾曰大哉坤曰至哉大則無所不包至則無所不盡乾之大無方而坤則求離乎方也臨川吳氏曰萬物之形皆生於地而其氣實出於天坤所生之物即乾所始之物同此一元之亨利貞乾始之而坤順承之也坤厚載物德合無疆疆居良反下同傳資生之道可謂大矣乾既稱大故坤稱至至義差緩不若大之盛也聖人於尊卑之辨謹嚴如此萬物資乾以始資坤以生父母之道也順承天施以成其功坤之厚德持載萬物合於乾之無疆也中溪張氏曰乾職覆坤職載凡物之無不載於坤者厚為之也博厚高明同乎悠久乃合上天覆物之德而無疆無疆即乾之不息也不息故可久無疆故可大含𢎞光大品物咸亨本義言亨也德合無疆謂配乾也廣平游氏曰其靜也翕故曰含𢎞含言無所不容𢎞言無所不有其動也闢故曰光大光言無所不著大言無所不被此所以德合無疆也節齊蔡氏曰含𢎞坤之事也光大乾之事也德合乎乾故亦至乎光大也臨川吳氏曰坤德配乾元而能致品物之咸亨者雖乾之功亦坤之功也乾坤非有二元亨也牝馬地類行地無疆柔順利貞君子攸行傳以含𢎞光大四者形容坤道猶乾之剛健中正純粹也含包容也𢎞寬裕也光昭明也大博厚也有此四者故能成承一作順天之功品物一作類咸得亨遂取牝馬為象者以其柔順而健行地之類也行地無疆謂健也乾健坤順坤亦健乎曰非健何以配乾未有乾行而坤止也其動也剛不害其為柔也柔順而利貞乃坤德也君子之所行也君子之道合坤德也朱子曰程𫝊云未有乾行而坤止此說是且如乾施物坤不應則不能生物既㑹生物便是動若不是他健後如何配乾只是健得來順本義言利貞也馬乾之象而以為地類者牝陰物而馬又行地之物也行地無疆則順而健矣柔順利貞坤之德也君子攸行人之所行如坤之德也所行如是則其占如下文所云也朱子曰彖中說四德自不分曉前數句說元亨處郤分明後面幾句無理㑹牝馬地類行地無疆便是那柔順利貞君子攸行本連下面緣他趂押韻後故說在此問柔順利貞君子攸行曰柔順利貞坤之德也君子而能柔順堅正則其所行雖先迷而後得雖東北喪朋反之西南則得朋而有慶也先迷失道後順得常西南得朋乃與類行東北喪朋乃終有慶本義陽大陰小陽得兼陰陰不得兼陽故坤之德常减於乾之半也東北雖喪朋然反之西南則終有慶矣朱子曰東北非陰之位陰柔至此既喪其朋自立腳不得必須歸本位故終有慶也牝是柔順故先迷而喪朋然馬行郤健故後得而有慶將牝馬字分開卻形容得這意思言終有慶則慶不在今矣為他是箇柔順砥物東北陽方非他所安之地自是喪朋如慢水中魚去急水中不得喪朋於東北則必反於西南是終有慶也問大抵柔順中正砥人做越常過分砥事不得只是循常守分時又卻自做得他砥事曰是如此建安丘氏曰坤道主成成在後故先乾而動則迷而失其道後乾而動則順而得其常西南為後於坤為得地故往西南則與類行東北為先於坤為不得地故往東北則必喪朋喪於東北則必反於西南乃終有慶終即後也言其慶當在東北之後也平庵項氏曰東北喪朋乃終有慶者所以發文王言外之意也地之交乎天臣之事乎君婦之從乎夫皆喪朋之慶也安貞之吉應地無疆傳乾之用陽之為也坤之用陰之為也形而上曰天地之道形而下曰陰陽之功先迷後得以下言陰道也先唱則迷失陰道後和則順而得其常理西南陰方從其類得朋也東北陽方離其類喪朋也離其類而從陽則能成生物之功終有吉慶也與類行者本也從於陽者用也陰體柔躁故從於陽則能安貞而吉應地道之無疆也陰而不安貞豈能應地之道彖有三無疆蓋不同也德合無疆天之不已也應地無疆地之無窮也行地無疆馬之健行也本義安而且貞地之德也潛室陳氏曰德合無疆是坤配乾之德行地無疆是坤之本德應地無疆是人法坤之德建安丘氏曰無疆天德也惟地能合天之無疆則地亦無疆君子能法地之無疆則君子亦無疆然則君子法地地法天不出於一天德之無疆而已矣象曰地勢坤君子以厚德載物傳坤道之大猶乾也非聖人孰能體之地厚而其勢順傾故取其順厚之象而云地勢坤也君子觀坤厚之象以深厚之德容載庶物或問坤者臣道也在君亦有用乎程子曰厚德載物豈非人君之用本義地坤之象亦一而已故不言重而言其勢之順則見其高下相因之無窮至順極厚而無所不載也朱子曰地之勢常有順砥道理且如這箇平地前面便有坡陀處突然起砥也自順地平則不見其順必其高下層層地去此所以見地勢之坤順問大象乾不言乾而言健坤不言順而言坤如何曰只是當時下字時偶有不同必欲求說則穿鑿郤反晦了當理㑹砥問地勢高下相因以其順且厚否曰高下相因只是順若厚又是一箇道理然惟其厚所以上下只管相因去只見得他順若是薄砥物高下只管相因則傾陷了不能如此之無窮矣惟其高下相因無窮所以為至順也君子體之惟至厚為能載物李氏開曰天以氣運故曰行地以形載故曰勢誠齊楊氏曰地之體不厚則載萬物不勝其重君子之德不厚則載萬民不勝其衆也初六履霜堅冰至傳陰爻稱六陰之盛也八則陽生矣非純盛也陰始生於下至微也聖人於陰之始生以其將長則為之戒陰之始凝而為霜履霜則當知陰漸盛而至堅氷矣猶小人始雖甚微不可使長長則至於盛也本義六陰爻之名陰數六老而八少故謂陰爻為六也霜陰氣所結盛則水凍而為氷此爻陰始生於下其端甚微而其勢必盛故其象如履霜則知堅氷之將至也夫陰陽者造化之本不能相無而消長有常亦非人所能損益也然陽主生陰主殺則其類有淑慝之分焉故聖人作易於其不能相無者既以健順仁義之屬明之而無所偏主至其消長之際淑慝之分則未嘗不致其扶陽抑陰之意焉蓋所以贊化育而參天地者其旨深矣不言其占者謹微之意已可見於象中矣朱子曰陰陽有以動靜言者有以善惡言者如乾元資始坤元資生則獨陽不生獨陰不成造化周流須是竝用如履霜堅氷至則一陰之生便如一賊這道理在人如何看直看是一般道理橫看是一般道理所以謂之易盈天地之間所以為造化者陰陽二氣之終始盛衰而已陽生於北長於東而盛於南陰始於南中於西而終於北故陽常居左而以生育長養為功其類則為剛為明為公為義而凡君子之道屬焉陰常居右而以夷傷慘殺為事其類則為柔為暗為私為利而凡小人之道屬焉聖人作易畫卦係辭於其進退消長之際所以示人者深矣又曰易中說到陽處便扶助推移他說到陰處便抑遏壅絶他聖人作易常以陽為君子而引翼扶持惟恐其不盛陰為小人而排擯抑黜惟恐其不衰問履霜堅氷何以不著占象曰此自分曉占者目前未見有害却有未萌之禍所宜戒謹雲峰胡氏曰履初象霜一陰象堅氷六陰象至危之之辭本義於此爻特詳焉者易交易也變易也交易者對待之陰陽陽之性健為仁禮陰之性順為義知不能相無者也變易者流行之陰陽消長之際陽為生為淑為君子隂為殺為慝為小人聖人未嘗不致其扶陽抑陰之意又曰履霜而知堅氷之將至羸豕而知蹢躑之有孚姤之一陰即坤之初陰也其謹微之意可見矣乾之陽主發見潛龍則明其未見坤之陰主隱伏履霜則彰其巳至君子進之難而小人進之易也象曰履霜堅氷陰始凝也馴致其道至堅氷也傳陰始凝而為霜漸盛則至於堅氷一有也字小人雖微長則漸至於盛故戒於初馴謂習習而至於盛習因循也本義按魏志作初六履霜今當從之馴順習也習靜劉氏曰坤初六在姤為五月一陰始生便有凝意驗之井泉已寒然去氷霜之時尚逺聖人見微知著謂所履者已凝之霜馴致其道則至堅氷矣雲峰胡氏曰上六曰其道窮也由初六順習其道以至於窮示兩其道字具載始末經曰堅氷至要其終也傳曰至堅氷原其始也六二直方大不習無不利傳二陰位在下故為坤之主統言坤道中正在下地之道也以直方大三者形容其德用盡地之道矣由直方大故不習而無所不利不習謂其自然在坤道則莫之為而為也在聖人則從容中道也直方大孟子所謂至大至剛以直也在坤體故以方易剛猶貞加牝馬也言氣則先大大氣之體也於坤則先直方由直方而大也直方大足以盡地道在人識之耳乾坤純體以位相應二坤之主故不取五應不以君道處五也乾則二五相應程子曰至大至剛以直此三者不可缺一缺一便不是浩然之氣如坤所謂直方大是也但坤卦不可言剛言剛則害坤體然孔子於文言又曰坤至柔而動也剛方即剛也又曰坤六二直方大不習無不利方便是剛大便是大直便是直於坤不言剛而言方者言剛則害於地道故下復云至柔而動也剛以其先言柔而後云剛無害大只是對小而言是大也剛只是對柔而言是剛也直只是對曲而言是直也如此自然不習無不利坤之六二只為巳是地道又是二又是六地道之精純者至如六五便不同欲得學者且只看取地道坤雖是學者之事然亦有聖人之道聖賢之道其發無二但至有深淺大小朱子曰坤卦中惟這一爻最純粹蓋五雖尊位卻是陽爻破了體了四重陰而不中三又不正惟此爻得中正所以就這說箇直方大此是說坤卦之本體然而本意卻是教人知道這爻有這箇德不待習學而無不利人占得這箇時若能直能方能大則亦不習無不利郤不是要發明坤道伊川有這箇病從頭到尾皆然厚齊馮氏曰乾六爻莫盛於五坤六爻莫盛於二何也中而且正乾尊坤卑各盡其道也本義柔順正固坤之直也賦形有定坤之方也德合無疆坤之大也六二柔順而中正又得坤道之純者故其德內直外方而又盛大不待學習而無不利占者有其德則其占如是也朱子曰方是一定不變之意坤受天之氣而生物而其直止是一定問直方大不習無不利曰坤是純陰一卦諸爻皆不中正五雖中亦以陰居陽唯六二居中得正為坤之最盛者故以象言之則有是三者之德而不習無不利占者得之有是則吉占者有直方大之德則不習而無不利占者無此德則雖習而不利也如奢侈之人而德共儉則吉之占明不共儉者是占為不吉也他皆倣此如此看自然意思活問不習無不利或以為此是成德之事或以為學者須時習然後至於不習曰不是如此聖人作易只是說此爻中有此象人若占得便應此事有此用也未說到時習至於不習與成德之事若說到學者須習至於不習然聖人作易未有此意在雲峰胡氏曰乾五爻皆取象唯九三獨指其性體剛健者言之坤五爻各取象唯六二獨指其性體柔順者言之初三五柔順而不正四上柔順而不中唯六二柔順而中正得坤道之純者也正則內直中則外方直則生物不可屈撓方則賦形不可移易內直外方其德自然盛大不待習熟而無不利占者如之則自然無不利也初六占在象中六二象在占中學者㑹於辭意之表可也象曰六二之動直以方也不習無不利地道光也傳承天而動直以方耳直方則大矣直方之義其大無窮地道光顯其功順成豈習而後利哉雙湖胡氏曰六二之動直以方也欲知其直方當於動處觀之地之生物也藏於中者畢達於外而無所回隱此可以見其直其成物也洪纎高下飛潛動植隨物賦形而各有定分此可以見其方若其大則地之無不持載固不待言而可見矣地道之光自然而然人之德能如地道之內直外方而又盛大則豈待學習而後利乎六三含章可貞或從王事無成有終傳三居下之上得位者也為臣之道當含晦其章美有善則歸之於君乃可常而得正上無忌惡之心下得柔一作恭順之道也可貞謂可貞固守之又可以常久而無悔咎一作吝也或從上之事不敢當其成功唯奉事以守其終耳守職以終其事一有者字臣之道也王氏大寶曰剛柔相雜曰文文之成者曰章剛動而柔縕之含章也進齊徐氏曰或者不敢自决之辭從者不敢造始之意成謂專成無成謂以陰承陽但當盡臣道不可有所專成也有終陰之事也陽不足於後代其終者陰也三下卦之終故亦以終言本義六陰三陽內含章美可貞以守然居下之上不終含藏故或時出而從上之事則始雖無成而後必有終爻有此象故戒占者有此德則如此占也朱子曰六三陰居陽位本是陰帶些陽故為含章之象又貞以守則為陰象矣或從王事者以居下卦之上不終含藏故有或時出從王事之象無成有終者在人臣用之則為不居其成而能有終之象在占者用之則為始雖無成而能有終也此亦占意已見於象中者雲峰胡氏曰陽主進陰主退乾九三陽居陽故曰乾乾其德主乎進也坤六四陰居陰故曰括囊其位主乎退也乾九四陽居陰坤六三陰居陽故皆曰或進退未定之際也特其退也曰在淵曰含章唯進則皆曰或聖人不欲人之急於進也如此三多凶故聖人首於乾坤之第三爻其辭又獨詳焉象曰含章可貞以時發也傳夫子懼人之守文而不達義也又從而明之言為臣處下之道不當有其功善必含晦其美乃正而可常然義所當為者則以時而發不有其功耳不失其宜乃以時也非含藏終不為也含而不為不盡忠者也漢上朱氏曰含章者坤之靜也以時發者坤之動也東萊呂氏曰大凡人出來做事多被人疑忌只為預先多露圭角不能含章惟含章然後可以時發初不是兩件事或從王事知光大也知音智傳象只舉上句解義則并及下文它卦皆然或從王事而能無成有終者是其知之光大也唯其知之光大故能含晦淺暗之人有善唯恐人之不知豈能含章也東萊呂氏曰傳云惟其知之光大故能含晦此極有意味尋常人欲含晦者多只去鋤治驕矜深匿名迹然逾鋤逾生逾匿逾露者蓋不曾去根本上理㑹自已知未光大胸中淺狹才有一功一善便無安著處雖强欲抑遏終制不住譬如瓶小水多雖抑遏固閉終必泛溢若瓶大則水自不泛溢都不須間費力雲峰胡氏曰小象於三言知於二言義仁禮之性健義知之性順君子於坤法其柔順之貞而已六四括囊無咎無譽括古活反譽音餘又音預傳四居近五之位而無相得之義乃上下閉隔之時其自處以正危疑之地也若晦藏其知如括結囊口而不露則可得無咎不然則有害也既晦藏則無譽矣或問程易云六四近君而不得於君為上下間隔之時與重陰不中二說如何朱子曰只是重陰不中故當謹密如此六四爻不止言大臣事凡得此爻在位者便當去未仕者便當隱問比干事如何曰此又别是一義雖凶無咎廬陵龍氏曰朱子當去當隱之說蓋深有功於易若當去不去當隱不隱惟阿諛乾沒竊位全身以應括囊之象者小人之流也豈易之㫖哉本義括囊言結囊口而不出也譽者過實之名謹密如是則無咎而亦無譽矣六四重陰不中故其象占如此蓋或事當謹密或時當隱遁也朱子曰六四重陰不中故有括囊之象無咎無譽亦是象中已見占意陰則渾是不發砥六三含章為是有陽半動半靜之爻若六四則渾是柔了所以括囊問本義云六四重陰不中何以見其有括囊之象曰陰而又陰其結塞不開即為括囊矣又問占者必當括囊則無咎何也曰當天地閉賢人隱之時若非括囊則有咎矣雲峰胡氏曰陰虗能受有囊象六三含章六四括囊皆取含蓄不露之象三以陰居陽猶或可出而從王事六四以陰居陰惟可括囊不出而已隆山李氏曰譽者咎之招也六四之所以無咎者以其無譽也象曰括囊無咎愼不害也傳能愼如此則無害也建安丘氏曰愼釋括囊義不害釋無咎義愼則不害矣六五黃裳元吉傳坤雖臣道五實君位故為之戒云黃裳元吉黃中色裳下服守中而居下則元吉謂守其分也元大而善也爻象唯言守中居下則元吉不盡發其義也黃裳既元吉則居尊為天下大凶可知後之人未達則此義晦矣不得不辨也五尊位也在它卦六居五或為柔順或為文明或為暗弱在坤則為居尊位陰者臣道也婦道也臣居尊位羿莽是也猶可言也婦居尊位女媧氏武氏是也非常之變一作大不可言也故有黃裳之戒而不盡言也或疑在革湯武之事猶盡言之獨於此不言何也曰廢興理之常也以陰居尊位非常之變也或問伊川解作聖人示戒竝舉女媧武后之事今考本爻無此象這又是象外立教之意否朱子曰伊川要立議論教人可向别處說不可硬配在易上說此爻何曾有這義都是硬入這意所以說得絮了隆山李氏曰乾之九五堯舜之君也坤之六五臯䕫稷契之臣也坤六五之應在乾九五乾坤相應者堯舜臯䕫之遇合也乾之事業則堯舜二典是也坤之事業則禹臯陶益稷三謨是也合典謨而觀然後堯舜臯䕫之事業可見合乾坤二卦而觀然後君臣之配應可見乾坤定體一純而不雜坤六爻無君位與諸卦六爻自為配應例不同乾為君六爻皆君事坤為臣六爻皆臣道也先儒謂五君位以陰居之為新莽武后之類此賊教之大者不可無辨縉雲馮氏曰天下之變無常社稷有綴旒之危莫不賴腹心之臣從權制變而社稷以安君薨百官總已以聽於冢宰三代之常制然則人臣而行君事無世無之坤之六爻初戒之四戒之上又戒之而五復為戒懼之辭世不幸而至於大變則為臣者不敢犯難而任事為君者終疑其臣於下誰與寄社稷之計不可之大者也亦惟忠誠純至臨大節而不可奪如黃裳者是賴焉而後成社稷之功矣雙湖胡氏曰隆山所論甚當然先儒說乃是程傳傳意誠以五為君位不可以臣與婦居之而不知坤既純臣道則六五正大臣之位不得例以君位言矣然使羿莽媧武之徒居此位其不為羿莽媧武之禍者亦希矣居此位者其必如六五黃裳之大臣焉斯可耳善觀程傳者正自不妨益致其戒也本義黃中色裳下飾六五以陰居尊中順之德充諸內而見於外故其象如此而其占為大善之吉也占者德必如是則其占亦如是矣春秋傳南蒯將叛筮得此爻以為大吉子服惠伯曰忠信之事則可不然必敗外强內溫忠也和以率貞信也故曰黃裳元吉黃中之色也裳下之飾也元善之長也中不忠不得其色下不共不得其飾事不善不得其極且夫易不可以占險三者有闕筮雖當未也後蒯果敗此可以見占法矣朱子曰黃裳元吉不過是說在上之人能盡柔順之道黃中色裳是下體之服能似這箇則無不吉這是䢷居中處下之道乾之九五自是剛健砥道理坤之六五自是柔順砥道理各隨他陰陽自有一箇道理其為九六不同所以在那五處亦不同這箇五之柔順從䢷六裏來又曰凡易中言占者有其德則其占如是言無其德而得是占者卻是反說如南蒯是也左傳昭公十二年南蒯將叛枚筮之遇坤之比曰黃裳元吉以為大吉子服惠伯注坎外卦險故强坤內卦順故溫强而能溫所以為忠水和而上安正和正信之本也夫易猶言此易謂此黃裳之占易道正大故險事不可以占節齊蔡氏曰黃象五裳象六厚齊馮氏曰黃以明其為地之色也裳以明其配乾之衣也林氏栗曰乾為衣坤為裳五雖尊配乾而為下矣雲峰胡氏曰離六二象黃離遁六二象黃牛裳又下象坤六二象黃裳可也何乃於六五言之蓋六二陰而在下柔順中正自然無不利六五以陰居尊非中順之德充諸內而見諸外必不能大善而吉也故曰黃裳元吉否則大凶言外之意可見矣象曰黃裳元吉文在中也傳黃中之文在中不過也內積至美而居下故為元吉息齊余氏曰坤六五黃裳元吉象曰文在中也則止發黃裳義蓋通坤卦皆可言裳唯六五則為黃裳所以可貴也六二雖中而不文六三雖文而不中故直方但言其質之中而含章但戒其華之露本義文在中而見於外也上六龍戰于野其血𤣥黃傳陰從陽者也然盛極則抗而爭六既極矣復進不已則必戰故云戰于野野謂進至於外也既敵矣必皆傷故其血𤣥黃本義陰盛之極至與陽爭兩敗俱傷其象如此占者如是其凶可知或問坤上六不言凶何耶朱子曰戰而至於俱傷其血𤣥黃不言而凶可知問乾只言亢坤卻言戰何也曰乾無對待只有乾而已故不言坤坤則不可無乾陰體不足常虧缺若無乾便沒上截大抵陰陽二物本别無陰只陽盡處便是陰臨川王氏曰陰盛於陽故與陽俱稱龍陽衰於陰故與陰俱稱血厚齊馮氏曰主龍而言則知陰不可亢亢則陽必伐之戒陰也以戰而言則知陰不可長長則與陽敵矣戒陽也雲峰胡氏曰坤六爻皆臣而下卦之上曰王有君也六爻皆陰而上卦之上曰龍有陽也不言陰與陽戰而曰龍戰于野與春秋王師敗績于茅戎天王狩於河陽同一書法也其血𤣥黃兩敗俱傷陰雖極盛豈能獨傷陽哉又曰初上取象小人之情狀著矣曰堅氷至者防龍戰于野之禍於其始曰龍戰于野者著堅氷之至於其終也象曰龍戰于野其道窮也傳陰盛至於窮極則必爭而傷也朱子曰坤六爻雖有重輕大槩皆是持守收斂畏謹砥意建安丘氏曰坤卦六爻上二爻言陰道之消長中四爻言臣道之顯晦初六陰之微故曰履霜堅氷忌其長也上六陰之極故曰龍戰于野著其窮也此以陰道之消長言也二與五居得中位臣道之顯者二位內故曰直方大言其德之盛也五位外故曰黃裳元吉言其業之美也三與四居位不中臣道之晦者三爻陰位陽靜中有動故曰含章含則有時而發也四爻位俱陰靜而無動故曰括囊括則無時而可出矣此以臣道之顯晦言也雲峰胡氏曰乾六爻皆取龍為象坤之取象曰履霜曰直方曰含章曰括囊曰黃裳曰其血𤣥黃不一而足陽純而陰雜也用六利永貞傳坤之用六猶乾之用九用陰之道也陰道柔而難常故用六之道利在常永貞固厚齊馮氏曰乾極矣九將變而為六能用九則不失其為君之道坤極矣六將變而為九能用六則不失其為臣之節用九在無首用六在永貞永貞所以用六也本義用六言凡筮得陰爻者皆用六而不用八亦通例也以此卦純陰而居首故發之遇此卦而六爻俱變者其占如此辭蓋陰柔而不能固守變而為陽則能永貞矣故戒占者以利永貞即乾之利貞也自坤而變故不足於元亨云朱子曰乾吉在無首坤利在永貞這只說二用變卦坤利在永貞不知有何關捩子這坤卻不得見他元亨只得他永貞坤之本卦固自有元亨變卦卻無又曰坤雖變而為陽然坤性依舊在他本是箇無頭底物如婦從夫臣從君地承天先迷後得東北喪朋西南得朋皆是無頭處也雲峰胡氏曰坤安貞變而為乾則為永貞安者順而不動永者健而不息乾變坤剛而能柔坤變乾雖柔必强善變化氣質者當如之陽先於陰而陽之極不為首陰小於陽而陰之極以大終善撫馭世變者當如之象曰用六永貞以大終也傳陰既貞固不足則不能永終故用六之道利在盛大於終能大於終乃永貞也沙隨程氏曰乾以元為本所以資始坤以貞為主所以大終也本義初陰後陽故曰大終朱子曰陽為大陰為小如大過小過之類皆是以陰陽而言六爻皆陰其始本小到此陰皆變為陽矣所謂以大終也言始小而終大雲峰胡氏曰既提出陰陽二字於乾坤初爻至此曰以大終也於以見陰為小陽為大陰陽之大分明矣文言曰坤至柔而動也剛至靜而德方本義剛方釋牝馬之貞也方謂生物有常朱子曰坤至柔而動也剛坤只是承天如一氣之施坤則盡能發生承載非剛安能如此又曰乾行健固是有力坤雖柔順亦是決然恁地順不是柔弱放倒了所以聖人說坤至柔而動也剛建安丘氏曰坤體本至柔及其生物發動處柔中未嘗無剛也本至靜而大德曰生賦形一定不易於此可見其德之方也西溪李氏曰聖人恐剛字害坤之體故曰動也剛動其發用處臨川吳氏曰乾之為德不徒剛健而能中正故為乾元之大坤之為德不徒柔靜而能剛方故為坤元之至後得主而有常本義程傳曰主下當有利字臨川吳氏曰彖傳言後順得常此言後得主利是為坤道之常也進齊徐氏曰後得主利而有常是再釋利貞之義謂處後順乾則得其道而主利可以常久也含萬物而化光本義復明亨義臨川吳氏曰彖傳言含𢎞光大此言靜翕之時含萬物生意於中動闢則化生萬物而光輝坤道其順乎承天而時行傳坤道至柔而其動則剛坤體至靜而其德則方動剛故應乾不違德方故生物有常陰之道不唱而和故居後為得而主利成萬物坤之常也含容萬類其功化光大也主字下脫利字坤道其順乎承天而時行承天之施行不違時贊坤道之順也或問程傳云坤道至柔而動則剛坤體至靜而德則方柔與剛相反靜與方疑相似朱子曰靜無形方有體方謂生物有常言其得方正一定確然不易而生物有常也靜言其體則不可得見方言其德則是其著也本義復明順承天之義此以上申彖傳之意臨川吳氏曰彖言乃順承天此言坤道之順承天之健而隨天之時以行彖與文言互相發隆山李氏曰坤道無成而代有終不可先乾而起亦不可後乾而不應一以柔順為正承天之時而作成物以終其功則得矣故曰坤道其順乎承天而時行此總言純坤之大體以為體坤元之用者當後天而不可先天也中溪張氏曰陰陽寒暑生殺榮悴一出於天而地但聽命焉方其暖然為春地亦與之為春也及其凄然為秋地亦與之為秋也坤道其順乎亦惟上承天施而與時偕行爾雲峰胡氏曰乾文言釋元亨利貞自元而亨亨而利利而貞乾以君之所主在元也坤文言則首釋牝馬之貞自貞而利利而亨亨而元坤以藏之所主在貞也積善之家必有餘慶積不善之家必有餘殃臣弒其君子弒其父非一朝一夕之故其所由來者漸矣由辨之不早辨也易曰履霜堅氷至蓋言順也傳天下之事未有不由積而成家之所積者善則福慶及於子孫所積不善則災殃流於後世其大至於弒逆之禍皆因積纍而至非朝夕所能成也明者則知漸不可長小積成大辨之於早不使順長故天下之惡無由而成乃知霜氷之戒也霜而至於一無於字氷小惡而至於一無於字大皆事勢之順長也本義古字順慎通用按此當作慎言當辨之於微也朱子曰陰陽皆自微至著不是陰便積著陽便合下具足此處亦不說這箇意履霜堅氷只是說從微時便須著慎來所以說蓋言慎也由辨之不早辨李光祖云不早辨他直到得郎當了却方辨剗地激成事來此說最好東萊呂氏曰積善之家必有餘慶積不善之家必有餘殃善如何得積惡如何得不積肉羶則蟻集醯酸則蚋聚若胸中有容著善處善自然積胸中無容著惡處惡自然不積臨川吳氏曰小善積而為大善則福慶亦大而為餘慶小不善積而為大不善則禍殃亦大而為餘殃必然之理也雲峰胡氏曰諸家釋順字謂善與不善皆由順而後積本義作愼言當辨之於微也蓋善與不善皆自微而至著於其微也審而謹之則善惡之幾以決善念之萌以長自不肯甘為不善之習矣以此見讀作順字不若愼字有下工夫處直其正也方其義也君子敬以直內義以方外敬義立而德不孤直方大不習無不利則不疑其所行也傳直言其正也方言其義也君子主敬以直其內守義以方其外敬立而一作則內直義形而一作則外方義形於外非在外也敬義既立其德盛矣不期大而大矣德不孤也無所用而不周無所施而不利孰為疑乎程子曰敬以直內義以方外合內外之道也切要之道無如敬以直內心敬則內自直敬義夾持直上達天德自此問人有專務敬以直內不務方外何如曰有諸中者必形諸外惟恐不直內內直則外必方問敬義如何别曰敬只是持已之道義便知有是非順理而行是為義也若只守一箇敬不是集義却是都無事也乾九三言聖人之學坤六二言賢人之學此其大致也若夫敬以直內義以方外則雖聖人不越乎此無異道故也龜山楊氏曰守一之謂敬無適之謂一敬足以直內而已發之於外則未能時措之宜也故必有義以方外又曰盡其誠心而無僞焉所謂直也若施之於事則厚薄隆殺一定而不可易為有方矣所主者敬而義則自此出焉故有內外之辨朱子曰敬立而內自直義形而外自方若欲以敬要去直內以義要去方外則非矣問義形而外方曰義是心頭斷事砥心斷於內而外便方正萬物各得其宜敬義夾持直上達天德自此最是他下得夾持兩字好敬主乎中義防於外二者相夾持要放下霎時也不得只得直上去故便達天德自此表裏夾持更無東西走作去處上面只更有箇天德直上者無許多人欲牽惹也本義此以學而言之也正謂本體義謂裁制敬則本體之守也直內方外程傳僃矣不孤言大也疑故習而後利不疑則何假於習朱子曰敬以直內是持守工夫義以方外是講學工夫直是直上直下胸中無纎毫委曲方是割截方正之意是處此事皆合宜截然區處得如一物四方在靣前截然不可得而移易之意若是圓時便轉動得未有事時只說敬以直內若事物之來當辨别一箇是非敬譬如鏡義便是能照砥敬以養其心無一毫私念可以言直矣由此而發所施各得其當是之謂義又曰須將敬來做本領涵養得貫通時才敬以直內便義以方外若無敬也不知義之所在敬以直內義以方外八箇字一生用之不窮敬以直內是無纎毫私意胸中洞然徹上徹下表裏如一義以方外是見得是處決定是恁地不是處決定不恁地截然方方正正須是自將去做工夫又曰敬義工夫不可偏廢彼專務集義而不知主敬者固有虛驕急迫之病而所謂義者或非其義矣然專言敬而不知就日用念慮起處分别其公私義利之所在而決取舍之幾焉則亦不免於昏憒雜擾而所謂敬者有非敬矣又曰有人專要就寂然不動上理㑹及其應事卻顛倒又牽動它寂然底又有人專要理㑹事却於根本上全無工夫須是徹上徹下表裏洞徹如敬以直內便義以方外義以方外便敬以直內又曰敬義只是一事如兩腳立定是敬才行是義合目是敬開眼見物便是義文言將敬字解直字義字解方字敬義立而德不孤即解大字敬而無義則做事出來必錯了只義而無敬則無本何以為義皆是孤也須是敬義立方不孤施之事君則忠於君事親則悅於親交朋友則信於朋友皆不待習而無一之不利也坤六二末乃言不疑所行不疑方可入乾知處潛室陳氏曰直其正也方其義也而不言正以直內何也蓋以正解直則可以敬解直則不可轉正為敬者蓋才敬則心必正敬則竪起精神不令放倒乃是正以直內處為下一轉語即喚起精神所以敬字更有工夫雙峰饒氏曰所謂直者即人心本然之正所謂方者即人心裁制之義皆其固有而非外鑠我者君子當主敬以直其內守義以方其外敬義竝立則其德不孤蓋孤則偏於一善而其德狹不孤則衆善畢集而其德大矣體用全備無適不宜其於行事坦然無所疑惑此所以不習而無不利也雲峰胡氏曰直方以用言正義以體言敬立而內直義形而外方有體固有用也就敬與義言之則敬為體義又為用體用兼全此其德所以不孤也又曰乾九三明誠竝進聖人事也坤六二敬義偕立學者事也主敬是為學之要集義乃講學之功隆山李氏曰文言字字皆有位置非茍然也乾九三言誠坤六二言敬誠敬者乾坤之别也先儒誠敬之學起於此乾九二言仁坤六二言義仁義者陰陽之辨也先儒論仁義之用取諸此陰雖有美含之以從王事弗敢成也地道也妻道也臣道也地道無成而代有終也傳為下之道不居其功含晦其章美以從王事代上以終其事而不敢有其成功也猶地道代天終物而成功則主於天也妻道亦然朱子曰天地之間萬物粲然而陳者皆陰麗於陽其美外見者也六三六五皆以陰居陽故三則曰陰雖有美而五則曰美在其中然三方進而位不中者也故雖有美而尚含之五正位而居體者也故美在其中而發於事業人臣事業之著於世固自有時殆不可挾才能而躐進以取三五同功嫌迫之禍也節齊蔡氏曰代天終物而成功主於天者地道也以數言之天數終於九不足於終代其終者地十也中溪張氏曰弗敢云者非其才有所不足於其分有所不敢也凡地之於天妻之於夫臣之於君其道皆當如是則得以陰從陽之正而能代上以終其事也下獨言地道蓋舉其大者爾平菴項氏曰陰雖有美含之絶句以含之連下文讀者非天地變化草木蕃天地閉賢人隱易曰括囊無咎無譽蓋言謹也傳四居上近君而無相得之義故為隔絶之象天地交感則變化萬物草木蕃盛君臣相際而道亨天地閉隔則萬物不遂君臣道絶賢者隱遁四於閉隔之時括囊晦藏則雖無令譽可得無咎言當謹自守也臨川吳氏曰草木蕃者召南所謂朝廷既治庶類蕃殖是也賢人隱者洪範所謂百穀用不成俊民用微是也平菴項氏曰草木且蕃况於人乎言盛者要其終也賢人隱則物從之矣言衰者記其始也東萊呂氏曰天地變化草木蕃天地閉賢人隱人與天地萬物同是一氣泰則見否則隱猶春生秋落氣至即應間不容髮初不待思慮計較也若謂相時而動則已作兩事看所以獨稱賢人隱者蓋衆人强自隔絶故與天地之氣不相通氣至而覺者獨賢人而已雲峰胡氏曰六四文言與初六相似兩爻當合看初六首言人之善不善末斷之曰蓋言愼也六四首言天地之交不交末斷之曰蓋言謹也初當謹審母縱夫微陰之長四當謹審母衒於重陰之時君子黃中通理本義黃中言中德在內釋黃字之義也正位居體本義雖在尊位而居下體釋裳字之義也平菴項氏曰黃中正位美在其中屬黃字通理居體暢於四支屬裳字美在其中而暢於四支發於事業美之至也傳黃中文居中也君子文中而達於理居正位而不失為下之體五尊位在坤則惟一作故唯取中正之義美積於中而通暢於四體發見於事業德美之至盛也本義美在其中復釋黃中暢於四支復釋居體或問坤二五皆中爻二是就盡得地道上說五是就著見於文章事業上說否朱子曰不可說盡得地道他便是坤道也二在下方是就工夫處說文言云不疑其所行是也五得尊位則是就他成就處說所以云美在其中而暢於四支發於事業美之至也進齊徐氏曰黃中中德在內通理文無不通言柔順之德蘊乎內而至盛也正位當在中之位居體居下體而不僭言柔順之德形於外而德當也黃中通理則美在其中而暢於四支正位居體則可發於事業二五皆中二內卦之中其發於外者不疑其所行而巳五外卦之中其施於外者有事業之可觀坤道之美至此極矣故曰美之至也又曰黃中通理四字當玩涵養不熟操守不固天理有一毫之未純人欲有一毫之未去未得為黃中也涵養熟矣操存固矣天理全而人欲去矣然條理未達脉絡未貫則是蘊於內者雖有中和渾厚之美而無融暢貫通之妙未得為通理也必黃中而通理暢於四支發於事業而後為美之至孟子曰充實而有光輝之謂大大而化之之謂聖亦此意也雲峰胡氏曰六五當與六二竝看故皆以君子言蓋直內方外之君子即黃中通理之君子也朱子嘗謂敬以直內是持守工夫義以方外是講學工夫大抵敬以直內則胸中洞然徹上徹下表裏如一是即所以為黃中義以方外則凡事之來義以處之無不合理是即所以為通理五之黃中通理本於直內方外故其正位也雖居乎五之尊而其居體也則不失乎二之常二之直內方外是內外夾持兩致其力到五之黃中通理則內外通貫無所容其力矣陰疑於陽必戰為其嫌於無陽也故稱龍焉猶未離其類也故稱血焉夫𤣥黃者天地之雜也天𤣥而地黃為于僞反離力智反夫音扶傳陽大陰小陰必從陽陰既盛極與陽偕矣是疑於陽也不相從則必戰卦雖純陰恐疑無陽故稱龍見其與陽戰也于野進不已而至於外也盛極而進不巳則戰矣雖盛極不離陰類也而與陽爭其傷可知故稱血陰既盛極至與陽爭雖陽不能無傷故其血𤣥黃𤣥黃天地之色謂皆傷也本義疑謂鈞敵而無小大之差也坤雖無陽然陽未嘗無也血陰屬蓋氣陽而血陰也𤣥黃天地之正色言陰陽皆傷也此以上申象傳之意平菴項氏曰𤣥黃者上下無别所謂雜也曰疑於陽曰嫌於無陽曰猶未離其類曰天地之雜皆言陰之似陽臣之似君楚公子圍之美矣君哉也然終以野死則何利哉西溪李氏曰𤣥天色也黃地色也雖曰天地之雜然天地定分終不可易故終之曰天𤣥而地黃節齊蔡氏曰十月為純坤之月六爻皆陰然生生之理無頃刻而息一陽雖生於子而實始於亥十月之陽特未成文耳聖人為其純陰而或嫌於無陽也故稱龍以明之古人謂十月為陽月者蓋出於此雲峰胡氏曰上六亦當與六三竝看故皆揭以陰之一字三曰陰雖有美含之猶知有陽也上曰陰疑於陽必戰則與陽為均敵而無小大之差矣天道不可一日無陽故稱龍於盛陰之時存陽也戰而俱傷在臣子雖罪不容誅在君父則宜早辨也蓋能辨之於初則如六五之黃裳元吉積善之慶有餘也不能辨之於初則如上六之其血𤣥黃積不善之殃有餘也震下坎上傳屯序卦曰一無曰字有天地然後萬物生焉盈天地之間者惟萬物故受之以屯屯者盈也屯者物之始生也萬物始生鬱結未通故為盈塞於天地之間至通暢茂盛則塞意亡矣天地生萬物屯物之始生故繼乾坤之後以二象言之雲雷之興陰陽始交也以二體言之震始交於下坎始交於中陰陽相交乃成雲雷陰陽始交雲雷相應而未成澤故為屯若已成澤則為解也又動於險中亦屯之義陰陽不交則為否始交而未暢則為屯在時則天下屯難未亨泰之時也誠齊楊氏曰氣始交未暢曰屯物勾萌未舒曰屯世多難未泰曰屯隆山李氏曰乾坤之後次以屯蒙此乾坤以生育之功付之三子也屯初建矦蒙二克家五童蒙蓋為是也雲峰胡氏曰屯蒙繼乾坤之後上下體有震坎艮坤交乾而成也震則乾坤之始交故先焉屯元亨利貞勿用有攸往利建侯屯張倫反傳屯有大亨之道而處之利在貞一作正固非貞一作正固何以濟屯方屯之時未可有所往也天下之屯豈獨力所能濟必廣資輔助故利建侯也或問程傳只言宜建侯輔助如何朱子曰易只有三處言利建侯屯兩言之豫一言之皆言立君左氏分明有立君之說衛公子元遇屯則可見矣中溪張氏曰盈天地之間者萬物也而萬物以人為首故屯為人道之始具四德而繼乾坤也本義震坎皆三畫卦之名震一陽動於二陰之下故其德為動其象為雷坎一陽陷於二陰之間故其德為陷為險其象為雲為雨為水屯六畫卦之名也難也物始生而未通之意故其為字象􅋄穿地始出而未申也其卦以震遇坎乾坤始交而遇險陷故其名為屯震動在下坎險在上是能動乎險中能動雖可以亨而在險則宜守正而未可遽進故筮得之者其占為大亨而利於正但未可遽有所往耳又初九陽居陰下而為成卦之主是能以賢下人得民而可君之象故筮立君者遇之則吉也朱子曰屯是陰陽未通之時蹇是流行之中有蹇滯困則窮矣問彖云利建侯而本義取初九陽居陰下為成卦之主何也曰有一例成卦之主皆說於彖辭下如屯之初九利建侯大有之五同人之二皆如此又問屯利建侯此占恐與乾卦利見大人同例曰然此亦大槩如此若是自卜為君者得之則所謂建侯者乃已也若是卜立君者得之則所謂建侯者乃君也此又看其所遇如何緣易本不是箇綳定砥文字所以曰不可為典要雙湖胡氏曰元亨利貞占辭也當屯難之世遽稱元亨亦猶蠱壞之時而有元亨之義卦辭大抵主在震初九一爻勿用有攸往震性好動戒震也雲峰胡氏曰初九以震之一陽居陰下而為成卦之主元亨震之動也利貞為震遇坎而言也非不利有攸往不可輕用以往也易言利建侯者二豫建侯上震也屯建侯下震也震長子震驚百里皆有侯象彖曰屯剛柔始交而難生難乃旦反六二象同本義以二體釋卦名義始交謂震難生謂坎中溪張氏曰乾坤之後一索得震為始交再索得坎為難生而者承上接下之辭所以合震坎之義而釋其為屯也動乎險中傳以雲雷二象言之則剛柔始交也以坎震二體言之動乎險中也剛柔始交未能通暢則艱屯故云難生又動於險中為艱屯之義大亨貞本義以二體之德釋卦辭動震之為也險坎之地也自此以下釋元亨利貞乃用文王本意或問本義云此以下釋元亨利貞用文王本意何也曰乾元亨利貞至孔子方作四德說後人不知將謂文王作易便作四德說即非也如屯卦所謂元亨利貞者以其能動雖可以亨而在險則宜守正故筮得之者其占為大亨而利於正初非謂四德也故孔子釋此彖辭只曰動乎險中大亨貞是用文王本意釋之也雷雨之動滿盈傳所謂大亨而貞一作正者雷雨之動滿盈也陰陽始交則艱屯未能通暢及其和洽則成雷雨滿盈於天地之間生物乃遂屯有大亨之道也所以能大亨由夫一無夫字貞也非貞固安能出屯人之處屯有致大亨之道亦在夫一無夫字貞固也天造草昧宜建侯而不寧傳上文一有既字言一有夫字天地生物之義一有是以字此言時事天造謂時運也草草亂無倫序昧冥昧不明當此時運所宜建立輔助則可以濟屯雖建侯自輔又當憂勤兢畏不遑寧處聖人之深戒也龜山楊氏曰天造草昧非寧居之時故宜建侯而不寧建侯所以自輔也使人各有主而天下定矣或問剛柔始交而難生程傳以雲雷之象為始交謂震始交於下坎始交於中如何朱子曰剛柔始交只指震言所謂震一索而得男也此三句各有所指剛柔始交而難生是以二體釋卦名義動乎險中大亨貞是以二體之德釋卦辭雷雨之動滿盈天造草昧宜建侯而不寧是以二體之象釋卦辭只如此看甚明緣後來說者交雜混了故覺語意重復本義以二體之象釋卦辭雷震象雨坎象天造猶言天運草雜亂昧晦冥也陰陽交而雷雨作雜亂晦冥塞乎兩間天下未定名分未明宜立君以統治而未可遽謂安寧之時也不取初九爻義者取義多端姑舉其一也朱子曰雷雨之動滿盈亦是䢷鬱塞砥意思天造草昧宜建侯而不寧孔子又是别發出一道理說當此擾攘之時不可無君故須立君終不可道建侯便了須更自以為不安寧方可蓋方動而遇險聖人見有此象故又因以為戒也雲峰胡氏曰彖傳自屯以下例分作兩節釋卦名是一節釋卦辭是一節或卦辭有未盡者從而推廣之如乾坤文言是也本義但分卦體卦象卦德卦變而彖之㫖盡矣惟屯曰二體之象又曰二體之德見卦象卦德又因卦體而見之也象曰雲雷屯君子以經綸傳坎不云雨而云雲者雲為雨而未成者也未能成雨所以為屯君子觀屯之象經綸天下之事以濟於屯一無屯字難經緯綸緝謂營為也本義坎不言水而言雲者未通之意經綸治絲之事經引之綸理之也屯難之世君子有為之時也或問屯需二象皆陰陽未和洽成雨之象然屯言君子以經綸需乃言飲食宴樂何也朱子曰需是緩意在他無所致力只得飲食宴樂屯是物之始生象草木初出地之狀其初出時欲破地靣而出不無齟齬艱難故當為經綸其義所以不同也東萊呂氏曰屯難之世人皆惶懼沮喪不敢有為殊不知正是君子經綸時節隆山李氏曰坎在震上為屯以雲方上升畜而未散也坎在震下為解以雨澤既沛無所不被也故雷雨作解者乃所以散屯而雲雷方興則屯難之始也臨川吳氏曰君子治世猶治絲欲解其紛亂亦猶屯之時必欲解其鬱結也經者先總其序為一而後分之象雷之自一而分綸者先理其緒為二而後合之象雷之自二而合也初九磐桓利居貞利建侯磐步干反傳初以陽爻在下乃剛明之才當屯難之世居下位者也未能便往濟屯故磐桓也方屯之初不磐桓而遽進則犯難矣故宜居正而固其志凡人處屯難則鮮能守正苟無貞固之守則將失義安能濟時之屯乎居屯之世方屯於下所宜有助乃居屯濟屯之道也故取建侯之義謂求輔助也東萊呂氏曰說者謂初以剛居剛在屯難之世恐其鋭於進故戒之以磐桓此說不然蓋初以剛明之才乃能與時消息自制其剛磐桓而不敢騁此正所謂自勝之强也此正所謂剛也惟剛然後能磐桓孰謂以剛為戒乎瀘川毛氏曰利居貞者其利在我利建侯者其利在民本義磐桓難進之貌屯難之初以陽在下又居動體而上應陰柔險陷之爻故有盤桓之象然居得其正故其占利於居貞又本成卦之主以陽下陰為民所歸侯之象也故其象又如此而占者如是則利建以為侯也或問初九利建侯本義云占者如是則利建以為侯此占與彖異如何朱子曰卦辭通論一卦所謂侯者乃屬他人即爻之初九也爻辭專言一爻所謂侯者乃其自已故不同也雲峰胡氏曰文王卦辭有專主成卦之主而言者周公首於此爻之辭發之卦主震震主初磐桓即勿用有攸往利居貞即利貞卦言利建侯者其事也利於建初以為侯也爻言利建侯者其人也如初之才利建以為侯也爻言磐桓主為侯者而言宜緩卦言利建侯而不寧主建侯者而言不宜緩也象曰雖磐桓志行正也傳賢人在下時茍未利雖磐桓未能遂往濟時之屯然有濟屯之志與濟屯之用志在行其正也臨川吳氏曰志行正因爻辭居貞而廣其義居則不行行則不居初陽剛之才雖磐桓未可進其志固在於得行其正也居而貞非其志也以貴下賤大得民也傳九當屯難之時以陽而來居陰下為以貴下賤之象方屯之時陰柔不能自存有一剛陽之才衆所歸從也更能自處卑下所以大得民也或疑方屯于下何有貴乎夫以剛明之才而下於陰柔以能濟屯之才而下於不能乃以貴下賤也况陽之於陰自為貴乎誠齊楊氏曰震以一陽為二陰之主故曰貴二陰賤而一陽下之故曰下賤雲峰胡氏曰乾坤初爻提出陰陽二字此則以陽為貴陰為賤陽為君陰為臣尊陽之義益嚴矣六二屯如邅如乘馬班如匪寇婚媾女子貞不字十年乃字邅張連反乘繩證反又音繩傳二以陰柔居屯之世雖正一作五應在上而逼於初剛故屯難邅回如辭一有助字也乘馬欲行也欲從正應而復班如不能進也班分布之義下馬為班與馬異處也二當屯世雖不能自濟而居中得正有應在上不失義者也然逼近於初陰乃陽所求柔者剛所陵柔當屯時固難自濟又為剛陽所逼故為難也設匪逼於寇難則往求於婚媾矣婚媾正應也寇非理而至者二守中正不苟合於初所以不字茍貞一作正固不易至于十年屯極必通乃獲正應而字育矣以女子陰柔苟能守其志節久必獲通况君子守道不回乎初為賢明剛正之人而為寇以侵逼於人何也曰此自據二以柔近剛而為義更不計初之德如何也易之取義如此或問匪寇婚媾程傳云設匪逼於寇難則往求於婚媾此說如何朱子曰此四字文義不應必如此費力解六二乘初九之剛下為陽所逼然非為寇也乃來求己為婚媾耳此婚媾與已皆正指六二也縉雲馮氏曰初寇二二欲應五而不得應屯之象也自己行藏他人得而制之者陰柔故也進齊徐氏曰易之道有已正而他爻取之以為邪者有已凶而他爻得之以獲吉者屯之初非不正也而二近之則為寇旅之上非不凶也而五承之則有譽命本義班分布不進之貌字許嫁也禮曰女子許嫁笄而字六二陰柔中正有應於上而乘初剛故為所難而邅回不進然初非為寇也乃求與己為婚媾耳但已守正故不之許至于十年數窮理極則妄求者去正應者合而可許矣爻有此象故因以戒占者朱子曰耿氏解女子貞不字作嫁笄而字貞不字者未許嫁也郤與婚媾之義相通亦說得有理伊川說作字育之字問十年乃字十年只是指數窮理極而言耶曰易中此等取象不可曉如說十年三年七日八月等處皆必有所指但今不可穿鑿姑闕之可也雲峰胡氏曰屯如以時言塞而未遽通也邅如以遇屯之時者而言回而未遽進也屯者陰陽之始交二與四陰居陰初與五陽居陽二應五四應初故皆曰婚媾取陰陽之始交也孔氏曰因六二之象以明男女婚媾之事其餘人事亦當法此如有人逼近於難遠有外應未敢遽進被近者所凌經久之後乃得相合是知萬事皆象於此非惟男女而已諸爻男女之象義皆然象曰六二之難乘剛也十年乃字反常也傳六二居屯之時而又乘剛為剛陽所逼是其患難也至於十年則難久必通矣乃得反其常與正應合也十數之終也雲峰胡氏曰柔乘剛非常也十年乃字則應乎剛而反常矣六三即鹿無虞惟入于林中君子幾不如舍往吝幾音機舍音捨象同傳六三以陰一無陰字柔居剛柔既不能安屯居剛而不中正則妄動雖貪於所求既不足以自濟又無應援將安之乎如即鹿而無虞人也入山林者必有虞人以導之無導之者則惟陷入于林莽中君子見事之幾微不若舍而勿逐往則徒取窮吝而已本義陰柔居下不中不正上無正應妄行取困為逐鹿無虞陷入林中之象君子見幾不如舍去若往逐而不舍必致羞吝戒占者宜如是也朱子曰六三陰柔在下而居陽位陰不安於陰則貪求陽欲乘陰即妄行故不中不正又上無正應妄行取困所以為即鹿無虞陷入林中之象此爻在六二六四之間便是林中之象鹿陽物指五無虞無應也以此觸類而長之當自見得建安丘氏曰屯四陰爻二四上皆言乘馬而三獨言即鹿者蓋二四上爻皆以陰居陰才位皆柔不能進者故有乘馬班如之象班者將進而止不能往者也六三以陰居陽爻柔位剛躁於進者故有即鹿無虞之象無虞即鹿者不量而進徒勞而無功也雲峰胡氏曰卦下體震震動也初九利居貞猶戒其輕動六二貞不字則喜其不輕動六三不中不正上無正應而妄動取困必矣故有逐鹿無虞陷入林中之象幾者動之微六三互體艮聖人於其震之動而猶庶幾其知艮之止故勉之曰不如舍欲其止也懼之曰往吝戒其動也象曰即鹿無虞以從禽也君子舍之往吝窮也傳事不可而妄動以從欲也無虞而即鹿以貪禽也當屯之時不可動而動猶無虞而即鹿以有從禽之心也君子則見幾而舍之不從若往則可吝而困窮一作窮困也雲峰胡氏曰經言不如舍辨之審也傳言舍之去之决也六四乘馬班如求婚媾往吉無不利傳六四以柔順居近君之位得於上者也而其才不足以濟屯故欲進而復止乘馬班如也已既不足以濟時之屯若能求賢以自輔則可濟矣初陽剛一作剛陽之賢乃是正應巳之婚媾也若求此陽剛一作剛陽之婚媾往與共輔陽一無陽字剛中正之君濟時之屯則吉而無所不利也居公卿之位已之才雖不足以濟時之屯若能求在下之賢親而用之何所不濟哉東萊呂氏曰屯之六四居近君之位其才陰柔不足以濟屯故將進復止如乘馬之班如若能自知不足下親昵於初與之同向前共濟天下之事則吉無不利夫子釋之曰求而往明也明之一字最宜詳玩蓋得時得位肻自伏弱求賢自助非明者能之乎本義陰柔居屯不能上進故為乘馬班如之象然初九守正居下以應於巳故其占為下求婚媾則吉也或問六四求婚媾此婚媾疑指初九之陽婚媾是陰何得陽亦可言朱子曰婚媾通指陰陽但程傳謂六四往求初九之婚媾則恐其未然也雙湖胡氏曰本義云下求婚媾是指初九在下來求四為婚媾求者在彼往者在我故吉不然豈有陽不倡而陰反倡男不行而女先行以是為吉無不利者乎建安丘氏曰三四皆欲從初者也四以應而往吉三以不應而往則吝往同而吉凶異者應不應故也雲峰胡氏曰凡爻例上為往下為來六四下而從初亦謂之往者據我適人於文當言往不可言來如需上六三人來據人適我可謂之來不可謂往人變例也男下女為婚初下二婚媾也二之不字非應也初下四求婚媾也四之往者應也士夫有不待求而往者讀二四爻辭亦可愧矣諸家多以求婚媾為四求初唯夲義謂初居下而應於已四待下之求而後往則吉必如是而後合男女婚媾之禮必如是而後見士夫出處之義象曰求而往明也傳知已不足求賢自輔而後往可謂明矣居得致之地一作位已不能而遂已至暗者也九五屯其膏小貞吉大貞凶傳五居尊得正而當屯時若有剛明之賢為之輔則能濟屯矣以其無臣也故屯其膏人君之尊雖屯難之世於其名位非有損也唯其施為有所不行德澤有所不下是屯其膏人君之屯也既膏澤有所不下是威權不在已也威權去巳而欲驟正之求凶之道魯昭公高貴鄉公之事是也故小貞則吉也小貞則漸正之也若盤庚周宣修德用賢復先王之政諸侯復朝謂以道馴致為之不暴也又非恬然不為若唐之僖昭也不為則常屯以至於亡矣朱子曰伊川易解也失契勘說屯其膏云又非恬然不為若唐之僖昭也這兩人全不同一人是要做事一人是不要做與小黃門啖果實度日呼田令孜為阿父不知東漢時若一向盡引得忠賢布列在內不知如何只䢷時都無可立天下大勢如人衰老之極百病交作略有些變動便成大病誠齊楊氏曰以剛明之主宜其撥亂反正有餘也然其膏猶屯者有君無臣故也六四近臣則弱六三近臣則又弱六二大臣則又弱惟一初九遠而在下賢而在下然則將欲有為誰與有為哉此所以屯其膏也本義九五雖以陽剛中正居尊位然當屯之時陷於險中雖有六二正應而陰柔才弱不足以濟初九得民於下衆皆歸之九五坎體有膏潤而不得施為屯其膏之象占者以處小事則守正猶可獲吉以處大事則雖正而不免於凶雲峰胡氏曰六爻唯二五言屯二在下而柔五剛而陷於柔皆非濟屯之才二曰屯如時之屯也五曰屯其膏五自屯之也可以施而不施是自屯其膏出納之吝謂之有司非大君之道也又曰學易者貴於觀時識變卦有二陽初陽在下而衆方歸之時之方來者也五陽在上而陷於險時之巳去者也時已去雖陽剛亦無如之何矣故凶象曰屯其膏施未光也施式豉反傳膏澤不下及是以德施未能光大也人君之屯也中溪張氏曰光陽德也五陽體本明以陷於坎中為二陰所掩故曰施未光也上六乘馬班如泣血漣如傳六以陰柔居屯之終在險之極而無應援居則不安動無所之乘馬欲往復班如不進窮厄之甚至於泣血漣如屯之極也若陽剛而有助則屯既極可濟矣誠齊楊氏曰屯上難極非剛明何以亨今以柔當之進無必為之才退有無益之泣朝夕必亡而已唐之僖昭是也東萊呂氏曰屯極則當通如亂極則當治上居屯之極正是一機㑹然六以陰柔居之雖欲有為而才不足坐失機㑹故乘馬班如泣血漣如也象所以言何可長也者蓋謂屯極之時若不變而為治即入於亂亡只有兩件更不容停待本義陰柔無應處屯之終進無所之憂懼而已故其象如此雲峰胡氏曰爻言乘馬班如者三二班如待五應也四班如待初應也上陰柔無應處屯之終其班如也獨無所待進又無所之憂懼而巳蓋初得時二比初亦得之五失時上比五亦失之象曰泣血漣如何可長也長直良反傳屯難窮極莫知所為故至泣血顛沛如此其能長久乎夫卦者事也爻者事之時也分三而又兩之足以抱括衆理引而伸之觸類而長之天下之能事畢矣建安丘氏曰屯卦六爻二陽四陰凡卦以陰陽爻之少者為主故二陽為四陰之主然五坎體陷而失勢初震體動而得時故初又為屯之主也其曰利居貞利建侯則卦之所主可知矣至九五則但曰屯其膏小貞吉而已其餘陰爻皆因初以起義四應初則往吉三不應初則往吝二乘初而應五則邅如而不能進上遠初而處卦之窮此所以泣血漣如也周易傳義大全卷二
