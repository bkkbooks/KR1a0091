body:
  text: 周易傳義大全卷二十一明胡廣等撰兊下巽上傳中孚序卦節而信之故受之以中孚節者為之制節使不得過越也信而後能行上能信守之下則信從之節而信之也中孚所以次節也為卦澤上有風風行澤上而感于水中為中孚之象惑謂感而動也內外皆實而中虛為中孚之象又二五皆陽一有而字中實亦為孚義在二體則中實在全體則中虛中虛信之本中實信之質或問中虛信之本中實信之質如何朱子曰只看中虛中實字便見本質之異中虛是無事時虛而無物故曰中虛若有物則不謂之中虛自中虛中發出來皆是實理所以曰中實一念之間中無私主便謂之虛事皆不妄便謂之實不是兩件事又曰敬則內欲不萌外誘不入自其內欲不萌而言則曰虛自其外誘不入而言故曰實只是一時事不可作兩截看潛室陳氏曰中實為孚謂實理充乎其內而外邪不得入之此中孚之體中虛為孚謂外邪既不得入故中唯有虛明道理此中孚之用中孚豚魚吉利涉大川利貞傳豚躁魚冥物之難感者也孚信能感於豚魚則無不至矣所以吉也忠信可以蹈水火況涉川乎守信之道在乎堅正故利於貞也本義孚信也為卦二隂在內四陽在外而二五之陽皆得其中以一卦言之為中虛以二體言之為中實皆孚信之象也又下說以應上上巽以順下亦為孚義豚魚無知之物又木在澤上外實內虛皆舟楫之象至信可感豚魚涉險難而不可以失其貞故占者能致豚魚之應則吉而利涉大川又必利於貞也或問孚字與信字恐亦有别朱子曰伊川云存於中為孚見於事為信說得極好因舉字說孚字從爪從子如鳥抱子之象今之乳字也一邉從孚蓋中所抱者實有物也中間實有物所以人自信之鄭東卿說易亦有好處如說中孚有卵之象小過有飛鳥之象孚字從爪從子如鳥以爪抱卵也蓋中孚之象以卦言之四陽居外二隂居內外實中虛有卵之象又言鼎象鼎形革象風罏亦是此義此等處說得有些意思但易一書盡欲如此牽合附㑹少間便疏脫學者須是先理㑹得正當道理了然後於此等些小零碎處收拾以相資益不為無補若未得正路脈先去理㑹這樣處便疏略豚魚吉這卦中也須見得有豚魚之象今不可考占法則莫須是見豚魚則吉如鳥占之意象若十分理㑹著便須穿鑿雲峯胡氏曰程子云中虛信之本中實信之質實所以為信虛所以受信也心者神明之舍舍不虛神明何所居譬之羽蟲之孚剛殼於外其質雖實溫柔於內其氣則虛雌伏呼啄不違其自然之期信之最可必者也或以豚魚為江豚生大澤中每作知風之至是物之有自然之信本義不取蓋以為江豚則信在豚魚不在我以豚魚為無知之物而信足以及之則信在我而自能及物於義為長下說以應上下信上也上巽以順下上信下也豚魚至愚無知惟信足以感之大川至險不測惟信足以濟之然信而或失其正則如盜賊相羣男女相私士夫死黨小人出肺肝相示而遂背之其為孚也人為之僞非天理之正也故又戒之以利貞彖曰中孚柔在內而剛得中傳二柔在內中虛為誠之象二剛得上下體之中中實為孚之象卦所以為中孚也朱子曰柔在內剛得中這個是就全體看則中虛就二體看則中實他都見得有孚信之意故喚作中孚伊川這二句說得好中溪張氏曰六三六四以柔而在中孚全體之中是中虛也九二九五以剛而得中孚二體之中是中實也虛者所以受信實者所以為信皆中孚之義也說而巽孚乃化邦也說音恱傳以二體言卦之用也上巽下說為上至誠以順巽於下下有孚以說從其上如是其孚乃能化於邦國也若人不說從或違拂事理豈能化天下乎本義以卦體卦德釋卦名義厚齊馮氏曰柔在內六三六四也剛得中九二九五也柔在內中虛之象中虛則生信信者孚之德剛得中則中實實者孚之本上以巽行之下以說從之所以孚也中溪張氏曰下說以孚乎上上巽以孚乎下則何往而不孚可以感化乎萬邦也豚魚吉信及豚魚也傳信能及於豚魚信道至矣所以吉也中溪張氏曰豚魚冥昧無知之物飼之以信則應期而集孚誠之道尚及於豚魚則天下無難感之物矣鄭氏湘卿曰仁及草木言草木難仁也誠動金石言金石難誠也信及豚魚言豚魚難信也天則真人則情聖人與天地同德任真不任情故信及豚魚然後為吉利涉大川乘木舟虛也傳以中孚一作虛涉險難其利如乘木濟川而以虛舟也舟虛一有中字則無沈覆之患一無之患二字卦虛中為虛舟之象涑水司馬氏曰中孚者發於中而孚於人也豚魚幽賤無知之物苟飼以時則應聲而集而况於人乎至誠以涉險如乘虛舟物莫之害故曰利涉大川乘木舟虛也本義以卦象言中溪張氏曰卦之全體外實中虛有舟虛之象乘巽之木而其中枵然以此而行乎兑澤之上則利涉大川又豈復有風濤之患哉中孚以利貞乃應乎天也傳中孚而貞則應乎天矣天之道孚貞而已本義信而正則應乎天矣厚齊馮氏曰又以六四九五明卦占中孚六四也貞九五也五天位四應之應乎天也誠者天之道孚之正則應乎天不正則徇乎人而孚不足言矣中溪張氏曰中孚而以貞正則利此天有所孚感則可以上應乎彼天矣雲峯胡氏曰合上下卦則柔在內為中虛所以受信分上下體則剛得中為中實所以為信上巽則君以信入於民下說則民以信通於君所以為化信及豚魚其化深矣然信必合乎正乃天理也惟天有自然之化象曰澤上有風中孚君子以議獄緩死傳澤上有風感于澤中水體虛故風能入之人心虛故物能感之風之動乎澤猶物之感于中故為中孚之象君子觀其象以議獄與緩死君子之於議獄盡其忠而已於決死極於惻而已故誠意常求於緩緩寬也於天下之事無所不盡其忠而議獄緩死最其大者也本義風感水受中孚之象議獄緩死中孚之意或問澤上有風中孚風之性善入水虛而能順承波浪洶湧惟其所感有相信從之義故為中孚朱子曰也是如此風去感他他便相順有相孚之象澤上有風中孚須是澤中之水海即澤之大者方能相從乎風若溪湍之水則其性急流就下風又不奈他何議獄緩死只是以誠意求之澤上有風感得水動議獄緩死則能感人心問中孚是誠信之義議獄緩死是誠信之事故君子盡心於是曰聖人取象有不端確處如此之類今也只恁地解但是不甚親切誠齊楊氏曰風無形而能震川澤鼓幽潛誠無象而能動天地感人物此澤上有風所以為中孚故君子以之議獄緩死蓋好生洽民舜之中孚也不犯有司天下之中孚也天下中孚則萬心一心矣鳥巢可窺況豚魚乎無他不殺之心孚于烏爾使無誠慤好生之心巢中之烏不為海上之鷗乎議獄者求其入中之出緩死者求其死中之生若元惡大姦不在是典故四凶無議法少正卯無緩理平庵項氏曰獄之將決則議之其既決則又緩之然後盡於人心王聽之司寇聽之三公聽之議獄也句而職聽二句而職聽三月而上之緩死也故獄成而孚輸而孚在我者盡故在人者無憾也雲峯胡氏曰水不定不可受風必澤上有風然後成其風之孚見不定不可以折獄必議獄緩死然後可成其獄之孚或曰議獄兑象緩死巽象進齊徐氏曰象言刑獄者五噬嗑賁豐旅中孚離為戈兵有刑獄象又取離明照知情實則刑不濫也中孚後畫底離噬嗑豐兼取震賁旅兼取艮者明以察其情動以致其決噬嗑去間豐則多故非震以動之無以威重也賁過於文旅不留獄非艮以止之或輕於用刑也蓋獄乃人命所繫一成不可變聖人立象盡意而致其謹審如此象言刑獄五卦噬嗑豐以其有離之明震之威也賁次噬嗑旅次豐離明不易震皆反為艮矣蓋明貴無時不然威則有時當止至於中孚則全體似離互體有震艮而又兑以議之巽以緩之聖人即象垂教其忠厚惻怛之意見於謹刑如此何其仁哉五卦中文王唯於噬嗑取象夫子即噬嗑賁豐旅中孚以盡其義初九虞吉有他不燕傳九當中孚之初故戒在審其所信虞度也度其可信而後從也雖有至信若不得其所則有悔咎故虞度而後信則吉也既得所信則當誠一若有它則不得其燕安矣燕安裕也有它志不定也人志不定則惑而不安初與四為正應四巽體而居正無不善也爻以謀始之義大故不取相應之義若用應則非虞也本義當中孚之初上應六四能度其可信而信之則吉復有它焉則失其所以度之之正而不得其所安矣戒占者之辭也中溪張氏曰初九居中孚之始與四為正應初度其可以孚感者無如六四故有相應相孚之吉苟舍六四之正應而有它志則不得享其燕安矣故識者必於初志未變動之際而度其可孚者孚之一真不僞一誠無妄庶幾靡有它向而孚感得其正矣雲峯胡氏曰信凡失於後者由不能度於初四隂柔得正初與四正應當孚之初度其可信而信之吉之道也若復舍四之正應而有他焉心之不一而信不専必不得其所安矣凡言有他指非應而言比之初有孚自有非正應而來應者有他許之之辭也中孚之初若舍正應而他求所謂應焉非吉之道有他戒之之辭也象曰初九虞吉志未變也傳當信之始志一無志字未有所從而虞度所信則得其正是以吉也蓋其志未有變動志有所從則是變動虞之不得其正矣在初言求所信之道也誠齊楊氏曰虞雖訓度亦防也書警戒無虞萃戒不虞是也邪不間則誠不存家人之間有家中孚之虞皆見於初九防家防心皆在初也故孔子皆以志未變贊之九二鳴鶴在隂其子和之我有好爵吾與爾靡之和胡卧反靡亡弛反傳二剛實於中孚之至者也孚至則能感通鶴鳴於幽隱之處不聞也而其子相應和中心之願相通也好爵我有而彼亦係慕說好爵之意同也有孚於中物無不應誠同故也至誠無逺近幽深之間故繫辭云善則千里之外應之不善則千里違之言誠通也至誠感通之理知道者為能識之本義九二中孚之實而九五亦以中孚之實應之故有鶴鳴子和我爵爾靡之象鶴在隂謂九居二好爵謂得中靡與縻同言懿德人之所好故好爵雖我之所獨有而彼亦繫戀之也朱子曰九二爻自不可曉看來我有好爵吾與爾靡之是兩個都要這物事所以鶴鳴子和是兩個中心都愛所以相應如此中溪張氏曰二與五同德而居相應之位分則君臣也情則父子也故以類相孚鶴陽鳥謂九也在隂謂二也鶴鳴於幽隱之地而其子和之鶴鳴而感指二而言子和而應指五而言蓋出於中心所願也我爵指五五為君位故以爵言吾亦五也爾指二靡二係於五也二五以誠實相孚故其象如此厚齊馮氏曰諸爻有應皆有關隔反無應義惟二五無間隔乃以同德相孚中虛相感雲峯胡氏曰兊為正秋為口舌感於秋而鳴鶴之象也卵生為孚故又取鶴母子之象好爵諸家多以為爵祿之爵本義謂之懿德蓋謂二五剛而得中皆能修其天爵者也天爵我之所固有吾與爾靡之二與五皆得中是吾之心與爾皆靡繫也人無所不至惟天不容僞鶴鳴子和天機之自動好爵爾靡天理之自孚也象曰其子和之中心願也傳中心願謂誠意所願也故通而相應進齊徐氏曰九二以實感九五以實應卦體中虛自然相應無所隔塞也六三得敵或鼓或罷或泣或歌傳敵對敵也謂所交孚者正應上九是也三四皆以虛中為成孚之主然所處則異四得位居正故亡匹以從上三不中失正故得敵以纍志一作心以柔說之質既有所係唯所信是從或鼓張或罷廢或悲泣或歌樂動息憂樂皆係乎所信也唯係所信故未知吉凶然非明達君子之所為也本義敵謂上九信之窮者六三隂柔不中正以居說極而與之為應故不能自主而其象如此或問中孚六三大義是如何朱子曰某所以說中孚小過皆不可曉便是如此依文解字看來只是不中不正所以歌泣喜樂都無常也中溪張氏曰六三雖得上九之應為匹敵然三居兑說之極中心莫知所主故或鼓而前或罷而止或泣而悲或歌而樂或之者疑之也劉氏曰人唯信不足故言行之間變動不常如此雲峯胡氏曰三與上居上下卦之極體均力敵者也中孚六爻唯取柔而正剛而中者九二九五剛而中者也上九不中矣六四柔而正者也六三不正矣以柔而不正者應剛而不中者此為說之極彼當信之窮所以不能自主或鼓或罷作止之無常或泣或歌哀樂之無常凡爻以柔居陽者多以或言象曰或鼓或罷位不當也傳居不當位故無所主唯所信是從所處得正則所信有方矣臨川吳氏曰位不當者陽位而柔居之柔則不實豈能得人之孚哉六四月幾望馬匹亡無咎幾音機傳四為成孚之主居近君之位處得其正而上信之至一作位當孚之任者也如月之幾望盛之至也已望則敵矣臣而敵君禍敗必至故以幾望為至盛馬匹亡四與初為正應匹也古者駕車用四馬不能備純色則兩服兩驂各一色又小大必相稱故兩馬為匹謂對也馬者行物也初上應四而四亦進從五皆上行故以馬為象孚道在一四既從五若復下係於初則不一而害於孚為有咎矣故馬匹亡則無咎也上從五而不係於初是亡其匹也係初則不進不能成孚之功也本義六四居隂得正位近於君為月幾望之象馬匹謂初與已為匹四乃絶之而上以信於五故為馬匹亡之象占者如是則無咎也蛟峯方氏曰月幾望不處盈也馬匹亡不為黨也四捨初九之黨而上從五此大臣之絶私黨而一心於君者故有馬匹亡之象以隂居隂履柔處正不敢敵陽此人臣功業已盛而不敢居其盛者故有月幾望之象若大臣而處盈植黨則有咎矣禹之不伐周公之不驕月幾望也晏子不入崔陳之黨韓退之不污牛李之朋馬匹亡也雲峯胡氏曰月本無光受日之光以為光隂不能以自孚信於陽以為孚六四近九五其象為月幾望而又有馬匹亡之象何也六三與上九為亢故曰敵六四與初九為配故曰匹三隂柔不正故不能舍上九以從剛中之二四隂柔得正故能絶初九以從剛中之五然則三之得敵非所以為得四亡其匹乃所以為得也坤以喪朋為有慶中孚之中以絶類為無咎象曰馬匹亡絶類上也上時掌反傳絶其類而上從五也類謂一作相應也中溪張氏曰四能下絶初九之匹類而上孚九五是馬匹亡矣尚何咎之有哉九五有孚攣如無咎攣力圓反傳五居君位人君之道當以至誠感通天下使天下之心信之固結如拘攣然則為無咎也人君之孚不能使天下固結如是則億兆之心安能保其不離乎進齊徐氏曰攣如固結之義位正而有孚是以誠實固結天下之心若拘攣然建安丘氏曰居九五之位為中孚之主以至誠而感孚天下之心拳拳然而固結之若拘攣然則無咎也諸爻皆不言孚而九五獨言有孚者蓋非天下之至誠孰能與於此哉本義九五剛健中正中孚之實而居尊位為孚之主者也下應九二與之同德故其象占如此雲峯胡氏曰六爻不言孚唯九五言之九五孚之主也合九二共為一體包二隂以成中孚其固結如此故其象為攣如占為無咎在九二則曰靡九五則曰攣皆固結不可解之象無應五與二一心故也一則孚孚則化小畜三至五為中孚故於五亦曰有孚攣如月幾望與小畜同象曰有孚攣如位正當也傳五居君位之尊由中正之道能使天下信之如拘攣之固乃稱其位人君之道當如是也臨川吳氏曰位正而當故能得人之孚也上九翰音登于天貞凶翰胡旦反傳翰音者音飛而實不從處信之終信終則衰忠篤內喪華美外揚故云翰音登天正亦滅矣陽性上進風體飛揚九居中孚之時處於最上孚於上進而不知止者也其極至於羽翰之音登聞于天貞固於此而不知變凶可知矣夫子曰好信不好學其敝也賊固守而不通之謂也進齊徐氏曰翰者羽翰之音也音登于天虛聲逺聞也有信之名無信之實以此為正固守則凶上居終故戒東谷鄭氏曰翰音登天者聲聞過情君子恥之本義居信之極而不知變雖得其貞亦凶道也故其象占如此雞曰翰音乃巽之象居巽之極為登于天雞非登天之物而欲登天信非所信而不知變亦猶是也朱子曰中孚與小過都是有飛鳥之象中孚是個卵象是鳥之未出殼底孚亦是那孚膜意思所以卦中都說鳴鶴翰音之類翰音登天言不知變者蓋說一向恁麼去不知道去不得這兩卦十分解不得且只依稀地說臨川吳氏曰巽為雞雞曰翰音謂其羽有文采而能鳴也豚魚知風鶴知夜半雞知旦皆物之有信者故中孚彖爻取三物為象上九天之位也雞飛類之走鳴于地上以孚於人者欲其音登徹于天則非所能矣平庵項氏曰巽雞之翰音而欲效澤鳥之鳴登聞于天愈久愈凶雲峯胡氏曰雞鳴必先振其羽故曰翰音而其鳴有信故於中孚言之五上天位九二鶴也而鳴於地之隂上九雞也而鳴於天之髙有是理乎居信之極而不知變雖正亦凶况不正乎象曰翰音登于天何可長也傳守孚至於窮極而不知變豈可長久也固守而一無而字不通如是則凶也中溪張氏曰有孚之名無孚之實此特假虛聲而好髙者也雖正亦凶何可長也建安丘氏曰柔在內而剛得中則剛中者成孚之象也在六爻以二五之剛為主故二言鶴鳴子和而五言有孚二言我爵爾靡而五言攣如其交孚之實可見矣餘四爻初上則以實應虛三四則以虛應實而所居之位又復不中皆未能有孚者也初之應四初實而四虛也故初虞四之有他而四絶初之類而從五也三之應上三虛而上實也故三之應上則鼓罷歌泣之不常而上之應三則如翰音登天之無實也合中孚六爻而詳其虛實之義則剛中為孚之象昭昭矣艮下震上傳小過序卦有其信者必行之故受之以小過人之所信則必行行則過也小過所以繼中孚也為卦山上有雷雷震於髙其聲過常故為小過又隂居尊位陽失位而不中小者過其常也蓋為小者過又為小事過又為過之小小過亨利貞傳過者過其常也若矯枉而過正過所以就正也事有時而當然有待過而後能亨者故小過自有亨義利貞者過之道利於貞也不失時宜之謂正可小事不可大事飛鳥遺之音不宜上宜下大吉傳過所以求就中也所過者小事也事之大者豈可過也於大過論之詳矣飛鳥遺之音謂過之不逺也不宜上宜下謂宜順也順則大吉過以就之蓋順理也過而順理其吉必大本義小謂隂也為卦四隂在外二陽在內隂多於陽小者過也既過於陽可以亨矣然必利於守貞則又不可以不戒也卦之二五皆以柔而得中故可小事三四皆以剛失位而不中故不可大事卦體內實外虛如鳥之飛其聲下而不上故能致飛鳥遺音之應則宜下而大吉亦不可大事之類也或問飛鳥遺之音本義謂致飛鳥遺音之應如何朱子曰看這象似有羽蟲之孽之意如賈誼鵩鳥之類是也鄭氏剛中曰不宜上者上二隂乘陽乘陽而上非隂所宜也宜下者謂下二隂順陽順陽而協非上逆之比也中溪張氏曰卦體二剛四柔柔過於剛小過之義過未至於太甚亦有可亨之理然必利於貞正所謂小過者但可施於小事不可施於大事蓋事之大者豈可過也小過中二爻象鳥之身上下四爻象鳥之翼橫飛之鳥其勢迅速身已飛過而微有遺音爾不宜上宜下順隂性也故大吉雲峯胡氏曰易貴陽賤隂故二陽函四隂為頤四陽函二隂為中孚中孚頤皆美名也二隂函四陽為大過四隂函二陽為小過過非美名也大過陽多於隂小過隂多於陽易於陽之過則猶許其往此則利貞以下無非戒辭蓋曰陽之過利貞而亨隂之過其亨必利貞不貞則不亨也曰陽之過可大事隂之過不可大事而僅可小事何也曰陽之過宜上隂之過宜下而不宜上也所以致戒於隂之過者切矣臨川吳氏曰大者陽剛君子也小過之時大者非可以吉唯善於自處能辭尊而居卑勇退而不進如鳥音之下而不上則大者可吉此君子不得志之時轉凶為吉之道也彖曰小過小者過而亨也傳陽大隂小隂得位剛失位而不中是小者過也故為小事過過之小小者與小事有時而當過過之亦小故為小過事固有待過而後能亨者過之所以能一作求亨也本義以卦體釋卦名義與其辭建安丘氏曰陽大隂小此卦隂多陽寡故曰小者過過以利貞與時行也傳過而利於貞謂與時行也時當過而過乃非過也時之宜也乃所謂正也建安丘氏曰過而利在貞正乃合時宜而與時偕行也平庵項氏曰時當小過不稍過則執而不通小過所以亨也然必利於正而後可通故曰過以利貞與時行也柔得中是以小事吉也本義以二五言建安丘氏曰六五六二柔居二體之中是以小事吉也剛失位而不中是以不可大事也本義以三四言建安丘氏曰九三九四剛而不中是以不可大事也大事非陽剛得位之才則不可為也臨川吳氏曰二五之柔得中隂柔小人得時也然小人可以為小事而已為大事者必陽剛君子而後能三四之剛不中而四又失位則陽剛不得志矣是以不可為大事也有飛鳥之象焉傳小過之道於小事有過則吉者而彖以卦才言吉義柔得中二五居中也隂柔得位能致小事吉耳不能濟大事也剛失位而不中是以不可大事大事非剛陽之才不能濟三不中四失位是以不可大事小過之時自不可大事而卦才又不堪大事與時合也有飛鳥之象焉此一句不類彖體蓋解者之辭誤入彖中中剛一作實外柔飛鳥之象卦有此象故就飛鳥為義陸氏希聲曰中孚卦柔在內而剛在外有鳥卵實之象今變為小過則剛在內而柔在外有飛鳥之象建安丘氏曰以全體觀之有飛鳥之象焉飛鳥遺之音不宜上宜下大吉上逆而下順也傳事有時而當過所以從宜然豈可甚過也如過恭過哀過儉大過則不可所以在小過也所過當如飛鳥之遺音鳥飛迅疾聲出而身已過然豈能相逺也事之當過者亦如是身不能甚逺於聲事不可一作能逺過其常在得宜耳不宜上宜下更就鳥音取宜順之義過之道當如飛鳥之遺音夫聲逆而上則難順而下則易故在髙則大山上有雷所以為過也過之道順行則吉如飛鳥之遺音宜順也所以過者為順乎宜也能順乎宜所以大吉本義以卦體言建安丘氏曰遺之音者言鳥雖飛而音尚遺過之不逺者也隂以承陽為順乘陽為逆上逆而下順者明不宜上宜下之義雲峯胡氏曰矯天下之枉者以過為正然剛過而中為大過未得中為小過是則事有當過者而皆不可外乎中也小過可小事不可大事大則凶矣如飛鳥宜下不宜上上則逆矣為隂危之也象曰山上有雷小過君子以行過乎恭喪過乎哀用過乎儉行下孟反傳雷震於山上其聲過常故為小過天下之事有時當過而不可過甚故為小過君子觀小過之象事之宜過者則勉之行過乎恭喪過乎哀用過乎儉是也當過而過乃其宜也不當過而過則過矣本義山上有雷其聲小過三者之過皆小者之過可過於小而不可過於大可以小過而不可甚過彖所謂可小事而宜下者也朱子曰山上有雷小過是聲在髙處下來是小過之義飛鳥遺之音也是自髙處放下聲來小過是過於慈惠之類大過則是剛嚴果毅底氣象小過大率是過得不多如大過便說獨立不懼小過只說這行喪用都只是這般小事小過是小事過又是過於小如行過乎恭喪過乎哀用過乎儉皆是過於小退後一步自貶底意思又曰君子行過恭喪過哀用過儉皆是宜下之意建安丘氏曰雷陽聲也方伏於地中其聲未發於卦為復及出於地上其聲和暢於卦為豫在於天上則震薄宇宙於卦為大壯今在於山上則已離於地未升於天其聲小過而已平庵項氏曰曰行曰喪曰用皆見於動以象震也曰恭曰哀曰儉皆當止之節以象艮也嵩山朝氏曰恭過則僞哀過則毁儉過則陋而君子以之者蓋有為而為之將矯之以為中也時有舉趾髙之莫敖故正考父矯之以循牆時有短喪之宰豫故髙柴矯之以泣血時有三歸反坫之管仲故晏子矯之以弊裘雖非中行亦足以矯時厲俗也徂徠石氏曰晏子一狐裘三十年祭豚肩不掩豆人皆謂之不知禮獨曽子以為國奢則示之以儉蓋齊奢侈之甚晏子能矯時之弊是得小過之義雲峯胡氏曰本義以為小者之過蓋如不懼無聞是過於激烈過之大者此則過於收斂過之小者也又以為可過於小而不可過於大蓋可過乎恭不可過乎傲可過乎哀不可過乎易可過乎儉不可過乎奢也又以為不可甚過蓋恐其恭之甚則為足恭哀之甚則為喪明儉之甚則為豚肩不掩豆也初六飛鳥以凶傳初六隂柔在下小人之象又上應於四四復動體小人躁易而上有應助於所當過必至過甚況不當過而過乎其過如飛鳥之迅疾所以凶也躁疾如是一有則字所以過之速且逺救止莫及也本義初六隂柔上應九四又居過時上而不下者也飛鳥遺音不宜上宜下故其象占如此郭璞洞林占得此者或致羽蟲之孽朱子曰初六飛鳥以凶只是取其飛過髙了不是取遺音之義中乎有卵之象小過中間二畫是鳥腹上下四隂為鳥翼之象鳥出乎卵此小過所以次中孚也進齊徐氏曰初柔本下而上與四應四動體初從四而動如鳥之飛動而不止又小過之義上逆下順初躁動而從上失宜下之義故凶平庵項氏曰二爻皆當鳥翅之末初六在艮之下當止而反飛以飛致凶故曰飛鳥以凶上六居震之極其飛已髙動而成離則麗於罔罟故曰飛鳥離之凶雲峯胡氏曰大過有棟橈象棟之用在中故於三四言之小過有飛鳥象鳥之用在翼故於初上言之然初二五上皆翼也獨初上言之何也鳥飛不在翼而在翰初上其翰也飛於初已凶飛於上可知矣聖人戒辭與坤姤同大過之初過謹則無咎小過之初不謹已有咎象曰飛鳥以凶不可如何也傳其過之疾如飛鳥之迅豈容救止也凶其宜矣不可如何無所用其力也朱子曰若占得者更無可避之理故象曰不可如何也中溪張氏曰不可如何者猶言無可奈何也六二過其祖遇其妣不及其君遇其臣無咎傳陽之在上者父之象尊於父者祖之象四在三上故為祖二與五居相應之地同有柔中之德志不從於三四故過四而遇五是過其祖也五隂而尊祖妣之象與二同德相應在它卦則隂陽相求過之時必過其常故異也無所不過故二從五亦戒其過不及其君遇其臣謂上進而不陵及於君適當臣道則無咎也遇當也過臣之分則其咎可知本義六二柔順中正進則過三四而遇六五是過陽而反遇隂也如此則不及六五而自得其分是不及君而適遇其臣也皆過而不過守正得中之意無咎之道也故其象占如此朱子曰三父四祖五便當妣過祖而遇妣是過陽而遇隂然而陽不可過則不能及六五却反回來六二上面雲峯胡氏曰相過謂之過過是有心邂逅謂之遇遇是無心春秋公及宋公遇于清我所欲曰及不期而㑹曰遇及是有心遇是無心遇字與及字相反過字與不及相反六二柔順中正設使進而往則過三四之陽而遇六五是過其祖遇其妣也只如此而不進則不及六五而自遇其臣之分矣兩遇字微不同遇其妣邂逅之遇故本義曰反遇遇其臣適相當之遇故本義曰適遇皆過而不過者二之隂本過於陽今進則過而遇其妣不進則不及而遇其臣皆過而不過者也二柔順中正所以如此他爻過者不遇遇者不過唯六二過而又遇然以不及其君為無咎則過其君可知過其祖則有繼世之譽過其君則有犯分之嫌中溪張氏曰過其祖遇其妣上逆也不及其君遇其臣下順也順則無咎臨川吳氏曰二五當隂過之時而無害陽之事得中故也五中而不正二中而正故其爻辭比六五尤善象曰不及其君臣不可過也傳過之時事無不過其常故於上進則戒及其一作其及君臣不可過臣之分也本義所以不及君而還遇臣者以臣不可過故也中溪張氏曰君尊臣卑為臣者不可陵及其君象言臣不可過者亦臣之分也雲峯胡氏曰小者有時不可過臣之於君不可過也本義發之君臣之大分嚴矣九三弗過防之從或戕之凶戕在良反傳小過隂過陽失位之時三獨居正然在下無所能為而為隂所忌惡故有一作所當過者在過防於小人若弗過防之則或從而戕害之矣如是則凶也三於隂過之時以陽居剛過於剛也既戒之過防則過剛亦在所戒矣防小人之道正已為先三不失正故無必凶之義能過防則免矣三居下之上居上為下皆如是也本義小過之時事每當過然後得中九三以剛居正衆隂所欲害者也而自恃其剛不肯過為之備故其象占如此若占者能過防之則可以免矣朱子曰中孚小過二卦鶻突不可曉小過尤甚如云弗過防之則是不能過防之也四字只是一句至弗過遇之與弗遇過之皆是兩字為絶句意義更不可曉瓜山潘氏曰柔過之時九三獨得位不過為之防則撗逆至矣雙湖胡氏曰朱子謂弗過遇之是兩字為絶句愚謂弗過防之從或戕之亦當兩字為絶句蓋小過乃隂過之時故二陽爻皆稱弗過是言陽弗能過也防之防隂也言弗能過之則當防之若不防而反從之則彼或得以戕我而凶矣二隂在下有上進之勢故當防雲峯胡氏曰弗過防之作一句讀戒辭也依九四例作兩句讀亦戒辭也謂三恃其剛而不肯過防可也謂三之陽雖弗過而當防隂之過亦可也隂欲害陽陽當為備若反從之則或被其戕而凶或者未必然之辭聖人以此戒三謂當以隂之過也而防之不當以隂之比也而狎之象曰從或戕之凶如何也傳隂過之時必害於陽小人道盛必害君子當過為之防防之不至則為其所戕矣故曰凶如何也言其甚也中溪張氏曰為九三者若不過防二隂浸長之患而輕從之或者得以戕君子之陽其凶當如何也凡事不可過唯君子之防小人不可不過為之慮也九四無咎弗過遇之往厲必戒勿用永貞傳四當小過之時以剛處柔剛不過也是以無咎既弗過則合其宜矣故云遇之謂得其道也若往則有危必當戒懼也往去柔而以剛進也勿用永貞陽性堅剛故戒以隨宜不可固守也方隂過之時陽剛失位則君子當隨時順處不可固守其常也四居髙位而無上下之交雖比五應初方隂過之時彼豈肯從陽也故往則有厲本義當過之時以剛處柔過乎恭矣無咎之道也弗過遇之言弗過於剛而適合其宜也往則過矣故有厲而當戒陽性堅剛故又戒以勿用永貞言當隨時之宜不可固守也或曰弗過遇之若以六二爻例則當如此說若依九三爻例則過遇當如過防之義未詳孰是當闕以俟知者朱子曰九四弗過遇之過遇猶言加意待之也上六弗遇過之疑亦當作弗過遇之與九三弗過防之文體正同雙湖胡氏曰九四弗過與九三同義遇之前遇乎隂也上往則危厲必當致其戒謹然陽性本上故又戒其勿用於貞言不必永久貞固以自守但戒謹則可免厲矣二隂在上有遇之之勢故當戒雲峯胡氏曰二陽皆當隂過之時然三當二隂方來之衝不可不防四當二隂已上之勢可以無咎故九三弗過防之防當用力九四弗過遇之遇非有心然往則有厲而當戒故戒三之從者從在下之隂也戒四之往者往而從上之隂也然往非也固守不能隨時之宜亦非也必知時識變者可悟此矣象曰弗過遇之位不當也往厲必戒終不可長也傳位不當謂處柔九四當過之時不過剛而反居柔乃得其宜故曰遇之遇其宜也以一無以字九居四位不當也居柔乃遇其宜也當隂過之時陽退縮自保足矣終豈能長而盛也故往則有危必當戒也長上聲作平聲則大失易意以夬與剝觀之可見與夬之象文同而音異也本義爻義未明此亦當闕朱子曰此爻小象恐不得如伊川說以長字為上聲勿用永貞便是不可長久勿用永貞是莫常常恁地又曰莫一向要進底意李氏光曰方羣隂用事之時求動而進則危矣故當戒謹亦勿固守其正而昧於幾也處小人之間求進則為所擠陷守節則為所嫉忌蓋處位不當姑靜以俟天時而已雲峯胡氏曰程傳長作上聲本義以為爻義未明者何可長也凡四皆上爻言之終不可長凡三訟言於初夬言於上其義甚明此獨言於四故本義闕之六五密雲不雨自我西郊公弋取彼在穴弋餘職反傳五以隂柔居尊位雖欲過為豈能成功如密雲而不能成雨所以不能成雨自西郊故也隂不能成雨小畜卦中已解公弋取彼在穴弋射取之也射止是射弋有取義穴山中之空中虛乃空也在穴指六二也五與二本非相應乃弋而取之五當位故云公謂公上也同類相取雖得之兩隂豈能濟大事乎猶密雲之不能成雨也本義以隂居尊又當隂過之時不能有為而弋取六二以為助故有此象在穴隂物也兩隂相得其不能濟大事可知朱子曰密雲不雨大槩是做不得事底意思弋是俊壯底意却只弋得這般物事雲峯胡氏曰密雲不雨自我西郊文王為小畜六四言也而周公以言小過之六五蓋皆言小者不能大有為也皆互兌皆有雲雨自西之象坎為弓凡互坎或厚坎皆取弋射象然彼射隼射雉此僅取彼在穴甚言隂小之不足大有為也初上有飛鳥象在穴不飛者也易之取象大者以田為象最大者以狩為象小則以弋為象象曰密雲不雨已上也傳陽降隂升合則和而成雨隂已在上雲雖密豈能成雨乎隂過不能成大之義也本義已上太髙也中溪張氏曰小畜小過皆言密雲不雨自我西郊何也曰隂陽二氣以均調適平而後雨隂多陽少陽多隂少則皆不雨也小畜以一隂畜五陽隂少於陽則不能以固乎陽故曰密雲不雨尚往也言陽尚往則不與隂和而不能雨矣小過以四隂而包二陽陽少於隂則不能制乎隂故曰密雲不雨已上也言隂已上則不與陽和而不能雨矣雲峯胡氏曰二曰臣不可過五太髙則又言君不可過也上六弗遇過之飛鳥離之凶是謂災眚眚生穎反傳六隂而動體處過之極不與理遇動皆過之其違理過常如飛鳥之迅速所以凶也離過之逺也是謂災眚是當有災眚也災者天殃眚者人為既過之極豈惟人眚天災亦至其凶可知天理人事皆然也本義六以隂居動體之上處隂過之極過之已髙而甚逺者也故其象占如此或曰遇過恐亦只當作過遇義同九四未知是否誠齊楊氏曰上六以隂柔之資居震動之體豈惟不與二陽相遇而已直欲超而過之出其上極其髙如飛鳥焉亢滿如此豈不罹災眚之凶乎雙湖胡氏曰此爻與四正相反九四曰弗過遇之上六曰弗遇過之弗過遇之者陽微而弗能過乎隂反遇乎隂也弗遇過之者隂上而弗能遇陽反過乎陽也小過隂過而陽弗過之時故四言弗過而上言過四前有隂有相遇之理上已過陽無復遇之期故四言遇而上言弗遇亦可見也飛鳥離之取逺過之象隂過如此非隂之福也災眚荐至凶孰甚焉此可為小人過盛者之戒雲峯胡氏曰六二隂柔中正故曰過曰遇九四陽弗過而遇乎隂上六隂弗能遇而過乎陽四無心之遇上有心之過也初之飛鳥已凶上飛鳥而離之凶可知矣不特曰凶且天災人眚無不有之然則隂之過豈隂之福哉象曰弗遇過之已亢也傳居過之終弗遇於理而過之過已亢極其凶宜也一作矣進齊徐氏曰上六弗與陽遇而且過之躐其上極其亢如鳥之不能戢翼垂翅而超然髙飛上而不能下所謂飛鳥離之凶也建安丘氏曰小過四隂二陽隂過於陽故為小過合六爻而論初上兩爻皆隂不中過者也故初飛鳥以凶上飛鳥離之凶皆戒其過也二五兩爻二比三五比四剛柔相濟位復得中不過者也故二言遇其臣五言弋在穴亦無凶咎之戒此上下四隂爻之别也至三四兩陽在三則曰弗過防之防謂防下二隂也使三在二隂之上而不謹為之防則隂柔必至害已故曰從或戕之凶四曰弗過遇之遇謂遇上二隂也使四在二隂之下一或輕重致五六之遇則危厲之事也故曰往厲必戒然隂在陽上其害猶可逭隂在陽下其禍不可測矣是以九三凶而九四無咎此又中兩陽爻之别也觀小過者苟能於爻位隂陽求之則過與不過之義得矣臨川吳氏曰此卦初六與九四九三與上六兩爻之辭皆相表裏然初六之以凶其辭若急至九四曰無咎曰厲曰勿用則其辭緩何也九三之或戕其辭有疑至上六曰離之曰凶曰災眚則其辭決何也蓋隂柔過盛陽剛但宜下退不宜上進四居柔則能下也三居剛則好上也下則凶或可免上則凶不可免矣此初四之辭所以先急而後緩三上之辭所以始疑而終決與嗚呼陽剛有不幸而際斯時者可不知所以自處之道哉離下坎上傳既濟序卦有過物者必濟故受之以既濟能過於物必可以濟故小過之後受之以既濟也為卦水在火上水火相交則為用矣各當其用故為既濟天下萬事已濟之時也雲峯胡氏曰後天以坎離居先天乾坤之位故上經首乾坤終坎離下經亦以坎離之交不交終焉坎陽而離隂坎先而離後上經乾坤之後坎上坎下凡六卦下經亦以坎上坎下終焉卦名既濟未濟亦且取義於坎五行坎中之水最先而天下坎險之時最多也庸齊趙氏曰坤上乾下為泰以天地之交也坎上離下為既濟以水火之交也以畫觀之則乾居坤中為坎坎者乾之中也故乾居西北而坎居正北坤在乾中為離離者坤之中也故坤居西南而離居正南坎離者乾坤之大用也故泰六爻雖相應而二五處非其位既濟六爻不唯皆相應而剛柔無一之不當以是爻居是位其應者皆正也水火相交而剛柔正應其為既濟豈不大哉中溪張氏曰涉川曰濟既未濟皆有坎體坎在外則內無險故為既濟坎在內則內有險故為未濟既濟亨小利貞初吉終亂傳既濟之時大者既已亨矣小者尚有一有未字亨也雖既濟之時不能無小未亨也小字在下語當然也若言小亨則為亨之小也利貞處既濟之時一無之時字利在貞固以守之也初吉方濟之時也終亂濟極則反也朱子曰既濟是已濟了大事都已亨過了只更小小底正在亨通若能戒謹恐懼得常似今猶自得不然便一向不好去了伊川之意亦是如此但要說做亨小所以不分曉本義既濟事之既成也為卦水火相交各得其用六爻之位各得其正故為既濟亨小當為小亨大抵此卦及六爻占辭皆有警戒之意時當然也朱子曰亨小當作小亨大率到那既濟了時便有不好去所以說小亨如唐時貞觀之盛便向那不好處又曰若將濟便是好今已濟便只是不好去了初吉終亂便有不好在术後底意思隆山李氏曰水火相逮兩相交接既濟之象既濟則為亨矣其所以致亨者非獨兩兩相應以居位各正故也初三五陽位皆以九居之二四六隂位皆以六居之六十四卦無如既濟最正故曰利貞向使不正安能相濟夫既濟功成物極則反理之必然故曰初吉終亂卦辭亦慮既濟後盈溢太過者耶潜室陳氏曰既濟之卦時既濟矣而曰亨小者蓋既濟之尾乃未濟之首有警戒無虞之意故只可言小亨也有初無終而二以柔居中此初吉也既濟終為未濟故又曰終亂中溪張氏曰利貞者六位當也初吉者二也終亂者上也離內坎外出離入坎則既濟為未濟矣雲峯胡氏曰易之道一隂一陽天下之生一治一亂陽一而隂二故治常少而亂常多創業之主以憂勤而吉守成之君以逸樂而亂初吉不幾時終亂乃迭見聖人所以於既濟之時深戒之也彖曰既濟亨小者亨也本義濟下疑脫小字郭氏京曰既濟亨小小者亨也按亨小下脫小字嵩山朝氏曰孔氏正義亦謂合有兩小字中溪張氏曰既濟之亨何以謂之小者亨也蓋爻有六位三隂得位而三陽下之故曰小者亨也利貞剛柔正而位當也傳既濟之時大者固一無固字已亨矣唯有小者一有未字亨也時既濟矣固宜貞固以守之卦才剛柔正當其位當位者其常也乃正固之義利於如是之貞一有正字也隂陽各得正位所以為既濟也本義以卦體言白雲郭氏曰六爻有應者八卦然應而皆得位者六十四卦獨此一卦而已是知既濟者必在有應必得其位然後可也中溪張氏曰既濟之道所利者貞謂初九九三九五陽皆居陽六二六四上六隂皆居隂此剛柔各得其正而位當也初吉柔得中也傳二以柔順文明而得中故能成既濟之功二居下體方濟之初也而又善處是以吉也本義指六二中溪張氏曰初吉者以六二之柔而得下體之中也終止則亂其道窮也傳天下之事不進則退無一定之理濟之終不進而止矣無常止也衰亂至矣蓋其道已窮極也九五之才非不善也時極道窮理當必變也聖人至此奈何曰一無曰字唯聖人為能通其變於未窮不使至於極也堯舜是也故有終而無亂中溪張氏曰卦曰終亂而彖曰終止則亂非終之能亂也於其終而有止心此亂之所由主也建安丘氏曰古今治亂之變何有窮也治極生亂亂極生治此雖天運實人事也人之常情處無事則止心生止則心有所怠而不復進此亂之所從起處多事則戒心生戒則心有所畏而不敢肆此治之所由兆治亂者天也所以制其治亂者人也彖曰終亂而傳曰終止則亂止則亂矣不止亂安從生玩一止字則知夫子之於贊易也其㫖深矣雙湖胡氏曰文王卦辭初吉終亂之云不過如泰極則否之類既濟極則反為未濟耳非有他也夫子釋之則曰終止則亂味止之一字即雜卦所謂既濟定也之義蓋既濟之隂陽各歸其家易於伏而不動履其運者若一切止而不為則亂之所由起矣此又夫子之㫖也然則如之何而可亦曰剛柔雖正位雖當而氣機之運不可使一息或停譬之人身心火既降腎水既升可謂一身之既濟矣然善於康濟者豈可使升者不降降者不升必如所謂靜極復動動極復靜一動一靜互為其根而循環無端焉而後可耳此夫子終止則亂之微意也象曰水在火上既濟君子以思患而豫防之傳水火既交各得其用為既濟時當既濟唯慮患害之生故思而豫防使不至於患也自古天下既濟而致禍亂者蓋不能思慮而豫防也節齊蔡氏曰思患坎難象豫防離明象臨川吳氏曰時雖既濟凡事當慮其後患而為之先備有備則無患思者慮其後也豫者為之於其先也平庵項氏曰人之用莫大於火而火常生患善濟火者莫如水思火之為患而儲水以防使水常在火上其力足以勝之則其患亡矣是故君子之道立教設政舉事知未流之生患必皆有以防而濟之進齊徐氏曰既濟雖非有患之時而患每生於既濟之後君子於此慎思而豫為之防則不至於患矣白雲郭氏曰成湯之危懼成王之小毖皆思患豫防之謂也故卦言終亂象言豫防爻有濡首之厲其義一也涑水司馬氏曰既濟未濟反覆相承也艱險未濟君子以矜慎之志辨物之宜處之以道如是險無不濟功無不成事既濟矣無所復為則又當思未萌之患而豫防之是以君子能康乂民物而永保安榮也初九曵其輪濡其尾無咎曵以制反濡音儒傳初以陽居下上應於四又火體其進之志鋭也然時既濟矣進不已則及於悔咎一作吝故曵其輪濡其尾乃得無咎輪所以行倒曵之使不進也獸之涉水必揭其尾濡其尾則不能濟方既濟之初能止其進乃得無咎不知已則至於咎也本義輪在下尾在後初之象也曵輪則車不前濡尾則狐不濟既濟之初謹戒如是無咎之道占者如是則無咎矣朱子曰曵輪濡尾是只爭些子時候是欲到與未到之間不是不欲濟是要濟而未敢輕濟如曹操臨敵意思安閒如不欲戰老子所謂與兮若冬涉川之象涉則畢竟涉只是畏那寒了未敢便涉臨川吳氏曰既濟之初可以濟而守正不遽進也如車將濟水而曳其輪狐將濟水而濡其尾雖不遽濟而終可濟故無咎中溪張氏曰輿以輪而行曳其輪則不前不亟行也獸必揭其尾而後濟濡其尾則不掉不速濟也初以剛居剛而應乎四當濟之始勇於上進故以此戒之隆山李氏曰徐進而不躐等無咎之道也雲峯胡氏曰九剛動之才有輪象初一卦之後有尾象輪所以行此既濟之時也而有未濟之象謹戒如此蓋欲濟而未肯輕也故無咎象曰曳其輪義無咎也傳既濟之初而能止其進則不至於極其義自無咎也六二婦喪其茀勿逐七日得喪息浪反茀方弗反傳二以文明中正之德上應九五剛陽中正之君宜得行其志也然五既得尊位時已既濟無復進而有為矣則於在下賢才豈有求用之意故二不得遂其行也自古既濟而能用人者鮮矣以唐太宗之用言尚怠於終况其下者乎於斯時也則剛中反為中滿坎離乃為相戾矣人能識時知變則可以言易矣二隂也故以婦言茀婦人出門以自蔽者也喪其茀則不可行矣二不為五之求用則不得行如婦之喪茀也然中正之道豈可廢也時過則行矣逐者從物也從物則失其素守故戒勿逐自守不失則七日當復得也卦有六位七則變矣七日得謂時變也雖不為上所用中正之道無終廢之理不得行於今必行於異時也聖人之一有為字勸戒深矣本義二以文明中正之德上應九五剛陽中正之君宜得行其志而九五居既濟之時不能下賢以行其道故二有婦喪其茀之象茀婦車之蔽言失其所以行也然中正之道不可終廢時過則行矣故又有勿逐而自得之戒中溪張氏曰婦二也茀所以蔽車者婦人出門必有茀自蔽而後行詩云翟茀以朝是也二應在五以五溺於二柔未即應已故有喪茀之象雲峯胡氏曰五雖與二應而不汲汲於求二者處既濟之時剛中反為中滿故也二欲自行其道不可得矣然五雖不汲汲於二二守中正之道亦不汲汲然逐之數極則必變道窮則必通不然喪但失其在外者逐則自失其在我者矣震六二亦曰七日得皆自二反覆數之歷七數又值二是二之所以為中正者固在也中正可久廢哉象曰七日得以中道也傳中正之道雖不為時所用然無終不行之理故喪茀七日當復得謂自守其中異時必行也不失其中則正矣九三髙宗伐鬼方三年克之小人勿用傳九三當既濟之時以剛居剛用剛之至也既濟而用剛如是乃髙宗伐鬼方之事髙宗必商之髙宗天下之事既濟而逺伐暴亂也威武可及而以救民為心乃王者之事也唯聖賢之君則可若騁威武忿不服貪土地則殘民肆欲也故戒不可用小人小人為之則以貪忿私意也非貪忿則莫肯為也三年克之見其勞憊之甚聖人因九三當既濟而用剛發此義以示人為法為戒豈淺見所能及也本義既濟之時以剛居剛髙宗伐鬼方之象也三年克之言其久而後克戒占者不可輕動之意小人勿用占法與師上六同朱子曰髙宗伐鬼方疑是髙宗舊日占得此爻故聖人引之以證此爻之吉凶如箕子之明夷利貞帝乙歸妹皆恐是如此建安丘氏曰鬼方幽逺小國也蒼頡篇云鬼逺也三近坎體有鬼方之象離為戈兵有伐之象東谷鄭氏曰九三以剛陽處欲變之位剛陽則過於有為欲變則動而之外內治已濟必欲用陽剛以求功於外者故為之戒曰以髙宗之盛而伐鬼方猶三年而後克之其可用小人而啓多事之源乎無事之世捨內治而幸邉功者皆小人啓之也雲峯胡氏曰三居離明之極上在坎險之外故有髙宗伐鬼方之象或是髙宗伐鬼方嘗占得此爻故引之以為象本義以為六爻皆警戒意然則此亦為九三戒也三居離中火性易燥况復以剛居剛聖人唯恐其失之躁動也故曰髙宗之伐鬼方也宜若易然然且三年克之其不如髙宗者可知矣小人勿用用小人則有躁動之失故也三代之兵未嘗用一小人用小人是平一亂而生一亂也聖人此意甚微故於初則勉其戒謹於二則戒以勿逐於三則戒以小人勿用蓋於既濟之時唯欲其持重緩進常如未濟之時中溪張氏曰小人夷狄皆為隂類戎狄之禍逺小人之禍近故作易者於用兵之後必以小人勿用戒之如師之上既濟之三是也象曰三年克之憊也憊蒲拜反傳言憊以見其事之至難在髙宗為之則可無髙宗之心則貪忿以殃一作殘民也或問三年克之憊也以言用兵是不得已之事以髙宗之賢三年而克鬼方亦不勝其憊矣朱子曰言兵不可輕用也建安丘氏曰三年而後克之則師老財匱其困憊亦已甚矣臨川吳氏曰憊言用力之疲困以見克之之難而用兵非美事也六四繻有衣袽終日戒繻而朱反袽女居反傳四在濟卦而水體故取舟為義四近君之位當其任者也當既濟之時以防患慮變為急繻當作濡謂滲漏也舟有罅漏則塞以衣袽有衣袽以備濡漏又終日戒懼不怠慮患當如是也不言吉方免於患也既濟之時免患則足矣豈復有加也本義既濟之時以柔居柔能預備而戒懼者也故其象如此程子曰繻當作濡衣袽所以塞舟之罅漏朱子曰六四以柔居柔能慮患預防蓋是心低小底人便能慮事柔善底人心不粗慮事細密剛果之人心粗不解如此中溪張氏曰六四出離入坎此濟道將革之時也濟道將革則罅漏必生於此四坎體也故取漏舟為戒終日戒者自朝至夕不忘戒備常若坐弊舟而水驟至焉斯可以免覆溺之患雲峯胡氏曰九三以剛居剛易失之躁故以髙宗三年克鬼方之象戒之六四以柔居柔自有能預備而戒懼之象矣譬如乘舟者不可以無繻而忘衣袽亦不可謂衣袽已備遂恝然不知戒水寖至而不知則雖有衣袽不及施矣備患之具不失於尋常而慮患之念又不忘於頃刻此處既濟之道也象曰終日戒有所疑也傳終日戒懼常疑患之將至也處既濟之時當畏慎如是也中溪張氏曰人之於事惟其有所疑於心然後能思所以處之此君子所以必思患而豫防之也九五東鄰殺牛不如西鄰之禴祭實受其福傳五中實孚也二虛中誠也故皆取祭祀為義東鄰陽也謂五西鄰隂也謂二殺牛盛祭也禴薄祭也盛不如薄者時不同也二五皆有孚誠中正之德二在濟下尚有進也故受福五處濟極無所進矣以至誠中正守之尚未至於反耳理無極而終不反者也已至於極雖善處無如之何矣故爻象唯言其時也本義東陽西隂言九五居尊而時已過不如六二之在下而始得時也又當文王與紂之事故其象占如此彖辭初吉終亂亦此意也或問九五爻以言紂雖貴為天子祭祀之盛而不若文王之薄祭却可以福祐蓋時之興衰自是如此朱子曰楊子雲云月未望則戴魄於西既望則終魄於東蓋十六日月雖缺未多更圓似生明之時畢竟是漸缺去月初雖小於生魄時畢竟是長底時節又問占得此爻則如何曰這當看所值之時如何大意大抵不得便宜白雲郭氏曰祭之盛者非無誠也然以物為主祭之薄者非無物也然以誠為主物過於誠則物勝誠而誠日以衰誠過乎物則誠勝物而誠日以著是也雲峯胡氏曰東陽也謂五西隂也謂二禴夏祭也離為夏本義於爻辭拳拳於時之一字此則曰九五居尊而時已過不如六二在下而始得時也時之過如月已望而將晦之時乎時之始至如月方弦而將至於望之時也夫文王與紂同此一時也在紂則為已過之時在文王則為未至之時也然福在天地間未嘗不以與人非吝於紂而私於文王也文王實有以受之紂自無受之道爾象曰東鄰殺牛不如西鄰之時也實受其福吉大來也傳五之才德非不善不如二之時也二在下有進之時故中正而孚則其吉大來所謂受福也吉大來者在既濟之時為大來也亨小初吉是也中溪張氏曰既濟之後唯恐過盛以祭言之于斯時也豐不如約故東鄰不如西鄰牛不如禴蓋祭而得其時雖禴之薄實足以受其福而吉之大來可知矣上六濡其首厲傳既濟之極固不安而危也又隂柔處之而在險體之上坎為水濟亦取水義故言其窮至於濡首危可知也既濟之終而小人處之其敗壞可立而待也本義既濟之極險體之上而以隂柔處之為狐涉水而濡其首之象占者不戒危之道也隆山李氏曰涉水而至於濡尾不害其為濟也首亦濡則溺矣故厲誠齊楊氏曰上六以柔懦之資懷亢滿之志居治安之極如已濟大川自謂沒世無風濤之虞矣不知濟其一又遇其一求載而無宿舟求涉而無善遊褰裳馮河濡至於首則溺其身可知矣中溪張氏曰初九濡其尾而無咎者以既濟之初則吉也上六濡其首而厲者以既濟之終止則亂也馮氏去非曰首在前尾在後則既未濟之六爻象皆橫觀也皆有坎水故首尾皆濡以見凡事之欲濟者身在其中乃可濟也首尾皆濡則身在其中矣又曰既濟險乃在前未濟乃出乎險者也而卦義相反蓋以水火相濟不相濟為象也然險終在前故既濟終厲終出乎險故未濟終孚應易窮則變之義象曰濡其首厲何可久也傳既濟之窮危至於濡首其能長久乎或問既濟上三爻皆漸漸不好去蓋出明而入險四有衣袽之象而曰有所疑也便是不美底端倪自此已露五殺牛則太自過盛上濡首則極而亂矣不知如何朱子曰然時運到那時都過了康節所謂飲酒酩酊開花離披時節所以有這樣不好底意思出來建安丘氏曰既濟合離坎成卦坎在外無險矣故為既濟合六爻言之內三爻離明也初言曵輪無咎二言喪茀勿逐三有伐鬼方而克之象此已濟之事也外三爻坎險也在四則有衣袽之戒五則歎東鄰殺牛不如西鄰之時而上又有濡首厲何可久之訓則既濟為未濟矣坎下離上傳未濟序卦物不可窮也故受之以未濟終焉既濟矣物之窮也物窮而不變則無不已之理易者變易而不窮也故既濟之後受之以未濟而終焉未濟則未窮也未窮則有生生之義為卦離上坎下火在水上不相為用故為未濟雲峯胡氏曰上經首乾坤乾坤之後六卦皆主坎之一陽下經終既濟未濟濟曰坎水取義而亨又皆主離之一隂天地終始皆水火相為用也三陽失位故未濟三隂應三陽而隂又得中所以未濟終於濟也鄭氏相卿曰上坎下離為既濟上離下坎為未濟然離中有坎坎中有離二體而互成四卦四卦而歸二體其實一也坎水也其情淫而邪離火也其性烈而正坎常為小人離常為君子然離中有坎情其性也故既未之離反為小人坎中有離性其情也故既未之坎反為君子君子在上而小人在下則治無不濟故坎上離下為既濟小人在上而君子在下則治莫能濟故離上坎下為未濟此以人事言也未濟亨小狐汔濟濡其尾無攸利汔傳魚乞反本義許訖反傳未濟之時有亨之理而卦才復有致亨之道唯在慎處狐能度水濡尾則不能濟其老者多疑畏故履氷而聽懼其陷也小者則未能畏慎故勇於濟汔當為仡壯勇之狀書曰仡仡勇夫小狐果於濟則濡其尾而不能濟也未濟之時求濟之道當至慎則能亨若如小狐之果則不能濟也既不能濟無所利矣本義未濟事未成之時也水火不交不相為用卦之六爻皆失其位故為未濟汔幾也幾濟而濡尾猶未濟也占者如此何所利哉建安丘氏曰未者有所待之辭未濟非不濟也待時而濟爾進齊徐氏曰未濟有終濟之理故亨狐能渡水濡尾則不能濟以六居初小狐也汔幾也尾謂初也幾濟而濡其尾則力竭而不能濟無所利矣隆山李氏曰聖人作易一卦必求所以亨之理在既濟時有既濟之亨未濟時有未濟之亨既濟已然之亨未濟方來之亨又曰坎為水為穴為隱伏物之穴居隱伏往來水間者狐也息齊余氏曰未濟本有亨之道但如小狐幾濟而濡尾則無所利爾謂占遇未濟者皆無攸利不可也在所處如何爾雲峯胡氏曰小狐汔濟濡其尾未濟之象也無攸利未濟之占也易不終既濟而終未濟易不可窮故也未濟之時其花未開之春月未圓之夜乎天地不交為否否不曰亨否不通也水火不交為未濟非不濟也未焉爾故曰未濟亨無他未濟水火之不交而坎男居離女下又男女之交也况既濟下離互坎上坎互離既濟之中互未濟未濟下坎互離上離互坎未濟之中互既濟非唯見時變之相為反覆而水火互藏其宅復於易中見之彖曰未濟亨柔得中也傳以卦才言也所以能亨者以柔得中也五以柔居尊位居剛而應剛得柔之中也剛柔得中處未濟之時可以亨也本義指六五言或問未濟所以亨者謂之未濟便是有濟之理但尚遲遲故謂之未濟而柔得中又自有亨之道朱子曰然建安丘氏曰未濟非終於不濟欲濟而未爾柔得中謂五以柔而得中位也雲峯胡氏曰乾坤之後為坎者六至既濟未濟雖因坎取義然皆曰柔得中也則又専指離而言坎之與離終始可相有而不可相無如此小狐汔濟未出中也傳據二而言也二以剛陽居險中將濟者也又上應於五險非可安之地五有當從之理故果於濟如小狐也既果於濟故有濡尾之患未能出於險中也朱子曰小狐汔濟汔字訓幾與井卦同既曰幾便是未濟未出坎中不獨是說九二爻通一卦之體皆是未出乎坎險所以未濟濡其尾無攸利不續終也傳其進鋭者其退速始雖勇於濟不能繼續而終之無所往而利也朱子曰不續終也自首濟而尾濡不能濟不相接續去故曰不續終也狐尾大濡其尾則濟不得矣瀘川毛氏曰未濟之初六隂也小狐之象小人也非濡尾之不可濟而小人之不足以濟也建安丘氏曰不續終指初也下坎象狐初其尾也二之未能出險者以初柔力微而不能續其後也正猶狐幾濟而濡其尾首濟而尾未濟也何所利乎雖不當位剛柔應也傳雖隂陽不當位然剛柔皆相應當未濟而有與若能重慎則有可濟之理二以汔濟故濡尾也卦之諸爻皆不得位故為未濟雜卦云未濟男之窮也謂三陽皆失位也斯義也聞之成都隱者朱子曰張敬夫說伊川之在涪也方讀易有箍桶人以此問伊川不能答其人云三陽失位伊川謂是不知此語火珠林上已有蓋伊川未曽看雜書所以被他說動了馮氏去非曰六爻雖不當位而剛柔皆應苟能協力以濟可以致亨未濟者終濟矣建安丘氏曰六爻剛居隂位柔居陽位雖未當位而一隂一陽各相應上下協力故終有出險之功也平庵項氏曰既濟三剛三柔皆正然剛柔正而位當即謂六二九五剛柔正應而又當位也若泛言則失彖義未濟六爻皆不當位其曰雖不當位亦指六五言之剛柔應者覆解亨字雖無攸利用其柔中以與剛應自有致亨之理象曰火在水上未濟君子以慎辨物居方傳水火不交不相濟為用故為未濟火在水上非其處也君子觀其處不當之象以慎處於事物辨其所當各居其方謂止於其所也本義水火異物各居其所故君子觀象而審辨之白雲郭氏曰水火不交不相為用所以為未濟亦猶天地不交而為否也物之有可辨者如水火之性是也居方者猶居上居下是也君子觀未濟之象而慎於辨物居方者欲其所居各得交濟之道毋若火在水上而不相為用也不然則物自各止其所君子何慎之有建安丘氏曰辨物如火之明居方如水之聚猶火在天上大有亦以類族辨物言之其義可見雲峯胡氏曰水火異物故以之辨物水火各居其所故以之居方開封耿氏曰既濟未濟之所以不同者分定與亂耳故君子慎辨物使物以羣分慎居方使方以類聚如此則分定不亂而為既濟矣初六濡其尾吝傳六以隂柔在下處險而應四處險則不安其居有應則志行於上然已既隂柔而一無而字四非中正之才不能援之以濟也獸之濟水必揭其尾尾濡則不能濟濡其尾言不能濟也不度其才力而進終不能濟可羞吝也本義以隂居下當未濟之初未能自進故其象占如此進齊徐氏曰既濟初濡其尾無咎未濟初濡其尾吝者既濟之初才剛足以有濟又下卦離體明也明則知緩急之宜而不急濟又苟知緩濟之義則雖濡尾亦終濟矣故無咎未濟之初才柔不足以濟又下卦坎體陷也陷則冒險以進而急於求濟不知未濟之義則至於濡尾而不能濟矣故可吝雲峯胡氏曰以陽居陽當既濟之初而濡其尾時可濟不敢輕濟也故無咎初以隂居陽當未濟之初而濡其尾時未可濟不能自濟也故吝林氏栗曰卦言無攸利而爻言吝者以在下一卦之初其失未逺也故係之以憂虞爾象曰濡其尾亦不知極也傳不度其才力而進至於濡尾是不知之極也本義極字未詳考上下韻亦不叶或恐是敬字今且闕之朱子曰極字猶言極則又曰猶言界至之謂或云當作極字雷氏曰初六知始之欲濟而不知終之不能續故曰亦不知極也極者終窮之謂九二曳其輪貞吉傳在他卦九居二為居柔得中無過剛之義也於未濟聖人深取卦象以為戒明事上恭順之道未濟者君道艱難之時也五以柔處君位而二乃剛陽之才而居相應之地當用者也剛有陵柔之義水有勝火之象方艱難之時所賴者才臣耳尤當盡恭順之道故戒曵其輪則得正而吉也倒曵其輪殺其勢緩其進戒用剛之過也剛過則好犯上一無上字而順不足唐之郭子儀李晟當艱危未濟之時能極其恭順所以為得正而能保其終吉也於六五則言其貞吉光輝盡君道之善於九二則戒其恭順盡臣道之正盡上下之道也本義以九二應六五而居柔得中為能自止而不進得為下之正也故其象占如此朱子曰坎有輪象所以說輪節齊蔡氏曰以剛居中上應六五有才濟難者也然以剛應柔易生陵忽之心故能緩其所以行乃得正而吉也雲峯胡氏曰既濟初九兼濡尾曵輪二象未濟初與二分之初在下當為尾九剛動當為輪初濡其尾才柔不能自進二曵其輪剛居柔而得中能自止而不進也中則無有不正是以貞吉厚齊馮氏曰未濟緣既濟立象故濡尾濡首兩卦既同而伐鬼方與曵其輪先從一位爾蓋未濟之二乃既濟之五未濟之四乃既濟之三其爻之剛則然也所不同者時與位之異故吉凶異焉象曰九二貞吉中以行正也傳九二得正而吉者以曵輪而得中道乃正也本義九居二本非正以中故得正也雲峯胡氏曰程子云正有不中中無不正此曰以中故得正易之大義也六三未濟征凶利涉大川傳未濟征凶謂居險無出險之用而行則凶也必出險而後可征三以隂柔不中正之才而居險不足以濟一有也字未有可濟之道出險之用而征所以凶也然未濟有可濟之道險終有出險之理上有剛陽之應若能涉險而往從之則濟矣故利涉大川也然三之隂柔豈能出險而往非時不可才不能也本義隂柔不中正居未濟之時以征則凶然以柔乘剛將出乎坎有利涉之象故其占如此蓋行者可以水浮而不可以陸走也或疑利字上當有不字莆陽劉氏曰六三居險之極未能出險而隂柔失位才不足以濟又求進焉凶可知矣烏能涉夫難乎既曰未濟征凶又曰利涉大川文義相背本義或疑利字上有不字為得之大抵未濟下三爻皆未能出險三與初爻皆隂柔才不足以濟險九二剛中才足以濟險時未可進守貞則吉以此推之三非利涉可知矣雲峯胡氏曰既濟六爻不出卦名未濟六三卦名獨見蓋爻俱失位初上處無位之地中四爻三皆曰貞吉獨於六三曰未濟征凶豈非未濟之時以征則凶而以居貞則吉乎况未濟之時唯剛乃克有濟故九二九四貞吉上九無咎如六三隂柔又不中正未濟終難濟矣故以征則凶亦不利涉川也象曰未濟征凶位不當也傳三征則凶者以位不當也謂隂柔不中正無濟險之才也若能涉險一無險字以從應則利矣臨川吳氏曰未濟諸爻位皆不當而象傳特於六三言之者隂柔居險極也瀘川毛氏曰九二九四以不純用其剛故吉而六五又以柔中而亨各因爻取義獨此爻以非其人而居其位也九四貞吉悔亡震用伐鬼方三年有賞于大國傳九四陽剛居大臣之位上有虛中明順之主又已出於險未濟已過中矣有可濟之道也濟天下之艱難非剛健之才不能也九雖陽而居四故戒以貞固則吉而悔亡不貞則不能濟有悔者一無者字也震動之極也古之人用力之甚者伐鬼方也故以為義力勤而逺伐至於三年然後成功而行大國之賞必如是乃能濟也濟天下之道當貞固如是四居柔故設此戒誠齊楊氏曰既濟伐鬼方而憂其憊者既濟之世利用靜也未濟伐鬼方而得其賞者未濟之世利用動也隆山李氏曰既濟之三離之上也未濟之四離之下也三爻正當濟難之地故象討伐但既濟言髙宗未濟則受命出征者耳本義以九居四不正而有悔也能勉而貞則悔亡矣然以不貞之資欲勉而貞非極其陽剛用力之久不能也故為伐鬼方三年而受賞之象雲峯胡氏曰爻言貞吉者三九二剛中中則正矣言貞吉而不言悔亡五柔中故貞吉無悔九四不中故勉之以貞吉而後悔亡言不如是則悔不亡也既濟九三以剛居剛故直曰髙宗伐鬼方未濟九四以剛居柔故曰震用伐鬼方震懼也臨事而懼未濟者必濟矣大抵三四爻皆人位易於乾之三曰終日乾乾夕惕若懼也於既濟之四曰終日戒戒懼也此復取震懼之意懼以終始所以為易之教也象曰貞吉悔亡志行也傳如四之才與時合而加以貞固則能行其志吉而悔亡鬼方之伐貞之至也臨川吳氏曰近柔中之君其志得行也沙隨程氏曰震用伐鬼方此大臣贊其興衰撥亂之事六五貞吉無悔君子之光有孚吉傳五文明之主居剛而應剛其處得中虛其心而陽為之輔雖以柔居尊處之至正至善無不足也既得貞正故吉而無悔貞其固有非戒也以此而濟無不濟也五文明之主故稱其光君子德輝之盛而功實稱之有孚也上云吉以貞也柔而能貞德之吉也下云吉以功也既光而有孚時可濟也本義以六居五亦非正也然文明之主居中應剛虛心以求下之助故得貞而吉且無悔又有光輝之盛信實而不妄吉而又吉也李氏光曰九二中正之臣為之正應四上二陽相與夾輔能虛已而任用之故貞吉而無悔也林氏栗曰四應在初故先悔而後亡五應在二故貞吉而無悔節齊蔡氏曰文明之主故稱君子之光下得二四恭順剛明之臣故言孚吉雲峯胡氏曰九居四非貞貞吉悔亡勉之之辭也六居五亦非貞貞吉無悔與之之辭也蓋五文明之主是為君子之光虛心以求九二剛中之助是為有孚此所以為正吉而又吉也象曰君子之光其暉吉也傳光盛則有暉暉光之散也君子積充而光盛至於有暉善之至也故重云吉本義暉者光之散也童溪王氏曰暉者光之發也光盛則有暉然則暉生於光而光又生於謙此六五所以為未濟之謙主也中溪張氏曰君臣同心以致治則未濟者終濟矣此君子所以有光暉之吉也上九有孚于飲酒無咎濡其首有孚失是傳九以剛在上剛之極也居明之上明之極也剛極而能明則不為躁而為決明能燭理剛能斷義居未濟之極非得濟之位無可濟之理則當樂天順命而已若否終則有傾時之變也未濟則無極而自濟之理故止為未濟之極至誠安於義命而自樂則可無咎飲酒自樂也不樂其處則忿躁隕穫入於凶咎矣若從樂而耽肆過禮至濡其首亦非能安其處也有孚自信于中也失是失其宜也如是則於有孚為失也人之處患難知其無可奈何而放意不反者豈安於義命者哉建安丘氏曰既言飲酒之無咎復言飲酒濡首之失何耶蓋飲酒可也耽飲而至於濡首則昔之有孚者今失於是矣誠齊楊氏曰既濟上六之濡首者水也未濟上九之濡首者非水也酒也水之溺人溺其一身酒之溺人溺其心以及其天下國家故洚水之害小於儀狄之酒禹惡㫖酒之功大於平洚水本義以剛明居未濟之極時將可以有為而自信自養以俟命無咎之道也若縱而不反如狐之涉水而濡其首則過於自信而失其義矣朱子曰未濟卦取狐為象上象頭下象尾未濟只陽爻便好隂爻便不好但六五上九兩爻不如此六五謂其得中故以為吉上九有可濟時之才又當未濟之極可以濟矣亦不云吉更曉不得又曰濡首分明是狐過溪而濡其首今象却云飲酒濡首皆不可曉問未濟上九以陽居未濟之極宜可以濟而反不善者竊謂未濟則當寬靜以待九二九四以陽居隂皆能靜守上九則極陽不中所以如此曰也未見得是如此大抵時運既當未濟雖有陽剛之才亦無所用況又不得位所以如此易不是說殺底物事只可輕輕地說若是確定一爻吉一爻凶便是揚子雲太𤣥了易不恁地兩卦各自說濡尾濡首不必拘說在此言首在彼言尾大槩既濟是那日中將晡時候盛了只是向衰去未濟是那五史初時只是向明去聖人當初見這個爻裏有這個意思便說出這一爻來或是從隂陽上說或是從卦位上說他這個說得散漫不恁地逼拶他他這個說得疏到他密時盛水不漏到他疏時疏得無理㑹若只要就名義上求他便是今人說易了大失他易底本意周公做這爻辭只依稀地見這個意便說這個事出來大段散漫節齊蔡氏曰五為濟主三四助之已成濟功矣已獨處上無所用力唯孚于飲酒自樂不妄生事乃為無咎又曰既濟之後必亂故處在初卦而亨取二未濟之後必濟故主在上卦而亨取五雲峯胡氏曰既濟三陽皆得位未濟三陽皆失位然既濟初曵輪未濟二亦曵輪既濟三伐鬼方未濟四亦伐鬼方既濟之五反不如未濟之上者以時而言未濟不如既濟之初既濟不如未濟之終也程傳如此二爻發出義命二字本義分言之蓋謂未濟之極將可濟矣自信自養所以俟命也若縱而不反如狐之濡其首則過於自信自養而失其義矣命在天義在我不能自信自樂以俟命非也過於自信自樂而失我之義亦非也周公係易於既濟之終以濡其首為時事之失於未濟之終以濡其首為人事之失其與民同患之意愈切故於辭愈懼善學易者信不可頃刻不知所懼也西溪李氏曰聖人設卦必終於未濟者所以寓生生不窮之意也未濟易之終上九未濟之終生生不窮之理在是大亂者治之基治者亂之伏未濟之極豈終不濟哉以上九之才言終於必濟矣象曰飲酒濡首亦不知節也傳飲酒至於濡首不知節之甚也所以至如是不能安義命也能安則不失其常矣雲峯胡氏曰既濟以中道離之中也未濟中以行正坎之中也既濟九五東鄰殺牛不如西鄰之時時即所謂中也未濟上九不知節節即所謂中也堯之授舜只是一中字易三百八十四爻只是一時字易於小象之末曰中曰時易之大義略可見矣末一句亦不知節也不知節者不知隨時以取中也大易教人之意切矣或問居未濟之時未可動作初六隂柔不能固守而輕進故有濡尾之吝九二陽剛得中得正曵其輪而不進所以貞吉朱子曰也是如此大槩難曉又曰大槩未濟之下卦皆是未可進用濡尾曵輪皆是此意六三未離坎體便也不好到四五已出乎險方好上九又不好了未濟與既濟諸爻頭尾相似中間三四兩爻如損益模樣顛倒了他曵輪濡尾在既濟為無咎在此卦則或吝或貞吉這便是不同了建安丘氏曰未濟合坎離成卦坎在內猶有險也故為未濟合六爻言之內三爻坎險也初言濡尾之吝二言曵輪之貞三有貞凶位不當之戒皆未濟之事也外三爻離明也四言伐鬼方有賞五言君子之光有孚上言飲酒無咎則未濟為既濟矣莆陽劉氏曰未濟下三爻未出險初濡尾二曵輪三征凶上三爻已出險矣四志行五有孚吉上有孚飲酒而已既濟吉少凶多未濟吉多凶少然雖吉未嘗不戒也西溪李氏曰上篇首乾坤終坎離下篇首咸恆終既濟未濟亦坎離也天地之道不過於隂陽五行之用莫先於水火上篇首天地隂陽之正也故以水火之正終焉下篇首夫婦隂陽之交也故以水火之交終焉周易傳義大全卷二十一
