body:
  text: 周易傳義大全卷十四明胡廣等撰兌下離上傳睽序卦家道窮必乖故受之以睽睽者乖也家道窮則睽乖離散理必然也故家人之後受之以睽也為卦上離下兌離火炎上兌澤潤下二體相違睽之義也又中少二女雖同居而所歸各異是其志不同行也亦為睽義沙龜程氏曰水火相逮山澤通氣而火澤无相用之理故相遇則革不相遇則睽睽小事吉睽苦圭反傳睽者睽乖離散之時非吉道也以卦才之善雖處睽時而小事吉也程子曰睽卦不見四德葢不容著四德繫言小事吉者止是方睽之時猶足以致小事之吉不成終睽而已須有濟睽之道本義睽乖異也為卦上火下澤性相違異中女少女志不同歸故為睽然以卦德言之内説而外明以卦變言之則自離來者柔進居三自中孚來者柔進居五自家人來者兼之以卦體言之則六五得中而下應九二之剛是以其占不可大事而小事尚有吉之道也建安丘氏曰小事吉柔為卦主也凡卦陽剛為主則可以大事睽合兑離成卦而柔進乎五其才不能大有所為故以之處小事則猶可得吉也孔氏曰大事謂興役動衆必須大同之世方可為小事謂飲食衣服不待衆力雖睽而可故曰小事吉雲峰胡氏曰中女少女志不同歸為睽長女中女亦非同歸而曰家人何也家人離之陰在二巽之陰在四女正者也睽則兌陰在三離陰在五不正矣女正家无不正女不正此象之所以睽也睽小事吉者小過柔過乎剛故可小事不可大事睽柔進而居剛故亦小事吉而已中溪張氏曰離下兌上為革兌下離上為睽革以九居五而六居二剛柔得位故曰元亨利貞睽以六居五而九居二剛柔失位故曰小事吉若革之九五則可以大有為矣湯武之革命順天而應人是也彖曰睽火動而上澤動而下二女同居其志不同行傳彖先釋睽一无睽字義一作意字次言卦才終言合睽之道而贊其時用之大火之性動而上澤之性動而下二物之性違異故為睽義中少二女雖同居其志不同行亦為睽義女之少也同處長則各適其歸其志異也言睽者本同也本不同則非睽也本義以卦象釋卦名義臨川吳氏曰燎而麗于髙上之處者火也流而瀦于卑下之地者澤也故曰動而上動而下此二物之性睽異也婦人以嫁為行少則同處長則各有夫家故曰同居不同行此二女之志睽異也林氏栗曰離火兌澤同賦形於天地中女季女同鞠育於閨門其始未嘗不同也火性炎上澤性潤下中女儷坎季女妃艮其終未嘗不睽也中溪張氏曰火澤无相得之性二女有難和之情所以為睽説而麗乎明柔進而上行得中而應乎剛是以小事吉傳卦才如此所以小事吉也兌說也離麗也又為明故為説順而附麗于明凡離在上而彖欲見柔居尊者則曰柔進而上行晉鼎是也方睽乖之時六五以柔居尊位有説順麗明之善又得中道而應剛雖不能合天下之睽成天下之大事亦可以小濟是於小事吉也五以明而應剛不能致大吉何也曰五陰柔雖應二而睽之時相與之道未能深固故二必遇主于巷五噬膚則无咎也天下睽散之時必君臣剛陽中正至誠協力而後能合也本義以卦德卦變卦體釋卦辭臨川吳氏曰睽之時无所謂吉者觀其説而麗乎明進而上行得中而應剛皆柔之為也柔豈能成大事哉故其吉者小事而已雲峰胡氏曰火性上動而愈上澤性下動而愈下此所以為睽家人諸卦二女同居者多矣以卦體睽故以不同行明之柔進而上行得中而應乎剛皆主上離之中言之在鼎則曰是以元亨在睽則曰是以小事吉爻位同而事異學者不可不知時也天地睽而其事同也男女睽而其志通也萬物睽而其事類也睽之時用大矣哉傳推物理之同以明睽之時用乃聖人合睽之道也見同之為同者世俗之知也聖人則明物理之本同所以能同天下而和合萬類也以天地男女萬物明之天髙地下其體睽也然陽降隂升相合而成化育之事則同也男女異質睽也而相求之志則通也生物萬殊睽也然而得天地之和禀陰陽之氣則相類也物雖異而理本同故天下之大羣生之衆睽散萬殊而聖人為能同之處睽之時合睽之用其事至大故云大矣哉本義極言其理而贊之朱子曰睽皆言始異終同之理問程傳物雖異而理本同之旨曰天施地生男倡女随此感彼應葢不能以相无也非理之本同何以如此厚齋馮氏曰以三才推廣卦義且恐人以吉止小事故推時用之大者以明之天地初上也男女二五也萬物二三四五也天尊地卑睽矣而事同於覆載男陽女陰睽矣而志同於相應萬物羣分睽矣其事各以類聚謂二與四類三與五類也當睽之時其用如此豈不大哉象曰上火下澤睽君子以同而異傳上火下澤二物之性違異所以為睽離之象君子觀睽異之象於大同之中而知所當異也夫聖賢之處世在人理之常莫不大同於世俗所同者則有時而獨異葢於秉彞則同矣於世俗之失則異也不能大同者亂常拂理之人也不能獨異者隨俗習非之人也要在同而能異耳中庸曰和而不流是也本義二卦合體而性不同或問君子以同而異朱子曰此是取兩象合體為同而其性各異在人則是和而不同之意葢其趍則同而所以為同則異如伯夷柳下惠伊尹三子所趍不同而其歸則一彖辭言睽而同大象言同而異在人則出處語黙雖不同而同歸於理講論文字為説不同而同於求合義理立朝論事所見不同而同於忠君本義所謂二卦合體者言同也而性不同者言異也以同而異語意與用晦而明相似大凡讀易到精熟後顛倒説來皆合不然則是死説耳問君子以同而異作理一分殊看如何曰理一分殊是理之自然如此這處又就人事之異同上説葢君子有同處有異處如所謂周而不比羣而不黨是也大抵易中六十四象下句皆是就人事之近處説不必深去求他此處伊川説得甚好建安丘氏曰離火兌澤二陰同體而炎上潤下所性異趍睽之象也故君子體之以同而異同以理言異以事言也葢天下无不同之理而有不同之事異其事而同其理所以同而異非苟異矣平菴項氏曰睽非善事然有當睽者同而異是也二女同居同也其志不同行異也此人道之當然其在君子則周而不比和而不同羣而不黨皆同而異也誠齋楊氏曰禹稷回同道而異趣夷惠同聖而異行未足為同之異也孔子一孔子也而齊魯之去異遲速孟子一孟子也而今昔之餽異辭受此同而異也雲峰胡氏曰當同於理而不同亂常拂理以為異也當異於理而不異隨俗習非以為同也同人類族辨物審異以致同此則於同而審異或曰同象兌澤之說異象離火之明隆山李氏曰孔子於彖言睽中有合所以責君子濟睽之功象言同中有異所以論君子不苟同之性君子之性不苟於同而其出而同心協力以合天下之睽異者則同嗚呼安得不苟同之君子而與共議和同天人之事也哉初九悔亡喪馬勿逐自復見惡人无咎喪息浪反傳九居卦初睽之始也在睽乖之時以剛動於下有悔可知所以得亡者九四在上亦以剛陽睽離无與自然同類相合同是陽爻同居下又當相應之位二陽本非相應者以在睽故合也上下相與故能亡其悔也在睽諸爻皆有應夫合則有睽本異則何睽唯初與四雖非應而同德相與故相遇馬者所以行也陽上行者也睽獨无與則不能行是喪其馬也四既與之合則能行矣是勿逐而馬復得也惡人與己乖異者也見者與相通也當睽之時雖同德者相與然小人乖異者至衆若棄絶之不幾盡天下以仇君子乎如此則失含𢎞之義致凶咎之道也又安能化不善而使之合乎故必見惡人則无咎也古之聖王所以能化奸凶為善良革仇敵為臣民者由弗絶也本義上无正應有悔也而居睽之時同德相應其悔亡矣故有喪馬勿逐而自復之象然亦必見惡人然後可以辟咎如孔子之於陽貨也朱子曰馬是行底物初間行不得後來却行得大率睽之諸爻都如此多説先異而後同問睽見惡人其義何取曰以其當睽之時故須見惡人乃能无咎趙氏秉曰无應悔也剛足以自守故悔亡又曰初四睽而同德終必相與睽極必通天下之常理也故有勿逐自復之象雙湖胡氏曰此爻以爻為象悔亡為占喪馬以下為象見惡人以下為占然象亦取占中六爻唯初九正時既乖異辭亦艱險也中溪張氏曰見者遇而勿絶之辭非必欲見之也建安丘氏曰既見惡人則非避矣唯初九不以避為避而以見為避化惡人而為善人則終能合初四之睽而无咎也雲峰胡氏曰六五陰居陽故悔初九陽居陽亦曰悔者无正應故也雖无正應四同德相應其悔亡矣睽初九剛正故喪馬勿逐而自復既濟六二柔正故喪茀勿逐而自得本義於彼以為戒辭此則以為象何也葢此承上文悔亡之占而言也喪馬悔之象勿逐自復悔亡之象因占取象本義之釋經精矣見惡人謂睽之時初九雖正不可以彼之不正而絶之也象曰見惡人以辟咎也辟音避傳睽離之時人情乖違求和合之且病其不一作未能得也若以惡人而拒絶之則將衆仇於君子而禍咎至矣故必見之所以免辟怨咎也无怨咎則有可合之道誠齋楊氏曰見惡人子見南子陳寔弔張讓是也若非辟咎則无事乎見惡人矣孔子不見陽貨是也雲峰胡氏曰爻曰无咎象曰辟咎睽之時不得不辟也九二遇主于巷无咎傳二與五正應為相與者也然在睽乖之時陰陽相應之道衰而剛柔相戾之意勝學易者識此則知變通矣故二五雖正應當委曲以相求也二以剛中之德居下上應六五之君道合則志行成濟睽之功矣而居睽離之時其交非固二當委曲求於相遇覬其得合也故曰遇主于巷必能合而後无咎君臣睽離其咎大矣巷者委曲之途也遇者㑹逢之謂也當委曲相求期於㑹遇與之合也所謂委曲者以善道宛轉將就使合而已非枉己屈道也本義二五隂陽正應居睽之時乖戾不合必委曲相求而得㑹遇乃為无咎故其象占如此中溪張氏曰在睽之時唯九二獨遇六五之主故曰遇主于巷彖所謂得中而應乎剛者指此爻也西溪李氏曰二五君臣之位故言君臣之睽當事勢睽離之時君臣相求必欲拘堂陛之常分則賢者无自而進矣遇主于巷處睽之時則然隆山李氏曰當睽之時上下乖隔道不得行不免委曲求合期於行道以救斯世唯二以剛中之才具和兌之性足以行之雲峯胡氏曰坎四比五納約自牖睽二應五遇主于巷皆非所由之正坎險睽乖之時不得不委曲相求如此也委曲求合乃聖賢達節之事非狷介避世者之所知唯二之才剛而得中足以行之爻言无咎者當睽之時必如此然後无咎也象曰遇主于巷未失道也傳當睽之時君心未合賢臣在下竭力盡誠期使之信合而已至誠以感動之盡力以扶持之明義理以致其知杜蔽惑以誠其意如是宛轉以求其合也遇非枉道迎逢也巷非邪僻曲徑也故夫子特云遇主于巷未失道也未非必也非必謂失道也南軒張氏曰遇主于巷巷者委曲之途也或謂諌君者當盡其委曲之義非也伊川云至誠以感動之盡力以扶持之明義理以致其知杜蔽惑以誠其意如是宛轉將就之期於明信而後已此其所以謂之委曲也故孟子謂引君以當道本義本其正應非有邪也建安丘氏曰二五正應乖戾不合在二必委曲求與五應象以為未失事君之道者當睽之時故也雲峰胡氏曰不期而㑹曰遇遇本非正也二與五本正應而亦曰遇者非有邪也睽之時不得不如此也上曰遇雨三曰遇剛三與上本正應也睽而未遇彼此不无不見之疑疑之既亡彼此又若一旦之遇六三見輿曵其牛掣其人天且劓无初有終掣昌逝反劓魚器反傳隂柔於平時且不足以自立况當睽離之際乎三居二剛之間處不得其所安其見侵陵可知矣三以正應在上欲進與上合志而四阻于前二牽於後車牛所以行之具也輿曵牽於後也牛掣阻於前也在後者牽曵之而已當前者進者之所力犯也故重傷於上為四所傷也其人天且劓天髠首也劓截鼻也三從正應而四隔止之三雖隂柔處剛而志行故力進以犯之是以傷也天而又劓言重傷也三不合於二與四睽之時自无合義適合居剛守正之道也其於正應則睽極有終合之理始為二陽所戹是无初也後必得合是有終也掣從制從手執止之義也本義六三上九正應而三居二陽之間後為二所曵前為四所掣而當睽之時上九猜狠方深故又有髠劓之傷然邪不勝正終必得合故其象占如此朱子曰天合作而剃鬚也篆文天作而作平庵項氏曰天去髪之刑劓去鼻之刑中溪張氏曰三與上本為正應非睽者也但三以孤陰而處於二剛之間則睽我者二與四也輿所以載己者也牛所以引車者也六三居不當位欲進而應乎上則九二曵之於後九四掣之於前前者掣之而不得行後者曵之而不得上進退齟齬間而未合故上乃刑之使服其人且有髠劓之傷无初謂與上睽也有終謂與上合也以三應上以柔遇剛睽極自有復合之理也雲峰胡氏曰見離目象輿在下二在三下見有輿曵象牛在前四在三前見有牛掣象天與劓傷於上見上有傷之象三上兩爻皆提起一見字意見之見非眞見也火澤之睽生於動三上之睽生於見本无輿曵本无牛掣本无天且劓疑故其見如此耳其見如此故无初正理本不如此故有終雙湖胡氏曰六爻中唯此爻辭最險葢以不正之隂乘承應又皆不正之陽當此睽時故進退无據而受刑傷特以隂陽配偶終當有合其亦可憐不足恤者矣象曰見輿曵位不當也无初有終遇剛也傳以六居三非正也非正則不安又在二陽之間所以有如是艱戹由位不當也无初一有而字有終者終必與上九相遇而合乃遇剛也不正而合未有乆而不離者也合以正道自无終睽之理故賢者順理而安行智者知幾而固守九四睽孤遇元夫交孚厲无咎傳九四當睽時居非所安无應而在二隂之間是睽離孤處者也以剛陽之德當睽離之時孤立无與必以氣類相求而合是以遇元夫也夫陽稱元善也初九當睽之初遂能與同德而亡睽之悔處睽之至善者也故目之為元夫猶云善士也四則過中為睽已甚不若初之善也四與初皆以陽處一卦之下居相應之位當睽乖之時各无應援自然同德相親故㑹遇也同德相遇必須至誠相與交孚各有孚誠也上下二陽以至誠相合則何時之不能行何危之不能濟故雖處一无處字危厲而无咎也當睽離之時孤居二陰之間處不當位危且有咎也以遇元夫而交孚故得无咎也本義睽孤謂无應遇元夫謂得初九交孚謂同德相信然當睽時故必危厲乃得无咎占者亦如是也雲峰胡氏曰元夫初九象六三以柔居剛不正故謂之惡人初九以剛居剛得正故謂之元夫元善也惡之反也初見惡人而不害其為元夫如夫子見陽貨而不害其為夫子也交孚初與四皆剛實之象爻唯四與初无應故謂之孤兼之九本居五則二九相比不孤今九來居四則上孤而四亦孤矣故皆有孤象他爻睽而合者剛柔相遇也四與初睽而合者剛遇剛也彼此以剛實相交可无咎必厲无咎者他卦三危地故多言厲睽之四非危地也然當睽之時必以危處之乃得无咎也建安丘氏曰初九陽之陽九四陽之陰故四目初為元夫李氏曰情以疑而相睽唯剛則足以去疑而相合故四終於遇元夫而上終於遇雨也象曰交孚无咎志行也傳初四皆陽剛君子當睽乖之時上下以至誠相交協志同力則其志可以行不止无咎而已卦辭但言无咎夫子又從而明之云可以行其志救時之睽也葢以君子陽剛之才而至誠相輔何所不能濟也唯有君子則能行其志矣邱氏曰四與初同德相與一誠交孚則孤者合厲者安豈唯无咎而二陽之志得以行矣六五悔亡厥宗噬膚往何咎傳六以陰柔當睽離之時而居尊位有悔可知然而下有九二剛陽之賢與之為應以輔翼之故得悔亡厥宗其黨也謂九二正應也噬膚噬齧其肌膚而深入之也當睽之時非入之者深豈能合也五雖陰柔之才二輔以陽剛之道而深入之則可往而有慶一有也字復何過咎之有以成周之幼稚而興盛王之治以劉禪之昏弱而有中興之勢葢由任聖賢之輔而姬公孔明所以入之者深也本義以陰居陽悔也居中得應故能亡之厥宗指九二噬膚言易合六五有柔中之德故其象占如是朱子曰宗如同人于宗之宗誠齋楊氏曰厥宗者五與二應而二為宗臣也雲峰胡氏曰宗二象噬膚五與二易入象噬嗑六二曰噬膚睽六五以九二為厥宗噬膚睽二變即噬嗑也或曰二至上有噬嗑象初與五先言悔亡而後言象睽本有悔悔之所以亡者以其有合之象也同人六二以九五為宗睽六五以九二為宗皆以辭中陰爻言之隂從陽支子從宗子也二五剛柔得中故五以二為宗其合也如噬膚之易二以五為主其合也有于巷之遭宗親之也上當以情親下也主尊之也下當以分嚴上也隆山李氏曰所謂噬膚猶噬嗑噬以求合也夫君臣相應當太平之時精神交際志協義從堯舜臯夔之遇合也不幸當睽之時兩兩間隙相疑而至於相噬以求合可謂德之下衰也矣然不如是以通其相應之志則彼此之情轉相乖隔而天下之睽无時可合也象曰厥宗噬膚往有慶也傳爻辭但言厥宗噬膚則可以往而无咎象復推明其義言人君雖已才不足若能信任賢輔使以其道深入於己則可以有為是往而有福慶也臨川吳氏曰二剛噬五之柔則陰陽相合而有慶矣上九睽孤見豕負塗載鬼一車先張之弧後説之弧匪宼婚媾往遇雨則吉説吐活反傳上居卦之終睽之極也陽剛居上剛之極也在離之上用明之極也睽極則咈戾而難合剛極則躁暴而不詳明極則過察而多疑上九有六三之正應實不孤而其才性如此自睽孤也如人雖有親黨而多自疑猜妄生乖離雖處骨肉親黨之間而常孤獨也上之與三雖為正應然居睽極无所不疑其見三如豕之汚穢而又背負泥塗見其可惡之甚也既惡之甚則猜成其罪惡如見載鬼滿一車也鬼本无形而見載之一車言其以无為有妄之極也物理極而必反以近明之如人適東東極矣動則西也如升髙髙極矣動則下也既極則動而必反也上之睽乖既極三之所處者正理大凡失道既極則必反正理故上於三始疑而終必合也先張之弧始疑惡而欲射之也疑之者妄也妄安能常故終必復於正三實无惡故後說弧而弗射睽極而反故與三非復為寇讎乃婚媾也此匪寇婚媾之語與他一作屯卦同而義則殊也隂陽交而和暢則為雨上於三始疑而睽睽極則不疑而合陰陽合而益和則為雨故云往遇雨則吉往者自此以往也謂既合而益和則吉也程子曰睽之上九離也離之為德在諸卦莫不以為明獨於睽便變為惡以陽在上則為亢以剛在上則為狠以明在上變而為察以狠以察所以為睽之極也故曰見豕負塗載鬼一車皆自任已察之所致然往而遇雨則吉遇雨者睽解也睽解有二義一是物極則必反故睽極則必通若睽極不通却終於睽而已二是所以能解睽者却是用明之功也本義睽孤謂六三為二陽所制而已以剛處明極睽極之地又自猜狠而乖離也見豕負塗見其汚也載鬼一車以无為有也張弧欲射之也説弧疑稍釋也匪寇婚媾知其非寇而實親也往遇雨則吉疑盡釋而睽合也上九之與六三先睽後合故其象占如此朱子曰載鬼一車等語所以差異者為他這般事是差異底事所以却把世間差異底明之世間自有這般差異底事吉小畜之上九曰既雨既處睽之上九曰往遇雨則者畜極則通睽極則和陰陽之氣至是而方暢也建安丘氏曰上本與三應不孤也睽極而疑生不孤而以為孤故亦曰睽孤豕鬼皆指三也上睽疑而未敢親近乎三如見豕背之負泥塗疑其汚我也又如載鬼滿于一車之中疑其祟我也豕猶有之鬼則妄矣始焉致疑則張弧終焉釋疑則説弧知其非為寇讐乃我之婚媾也自此以往上與三合陰陽和暢遇雨則吉向之疑心群起者至此盡冰釋而亡矣開封耿氏曰凡物之情信然後合合則愈信疑然後睽睽則愈疑雲峰胡氏曰上與三取象相應三在二之上見二有輿曵之象故上見二載三有載鬼一車之象三在四之下見四有牛掣之象故上見三負四有豕負塗之象弦木為弧本取睽象匪寇婚媾凡三出程傳解此獨與本義同疑者小人之道聖人无疑也睽成卦本自二女小人之象明矣故上九極言其疑四與上皆言睽孤者四无應故孤上有應而自猜狠以至於孤也三之見二四或曵或掣疑也上見二四之於三或載或負亦疑也三疑而見上猶以為人之有傷也上疑而見三則以為豕且以為鬼矣始疑為豕理或有之及其甚也无是理而以為有矣見其為豕為鬼而張之弧疑也後説之弧疑漸亡矣匪寇婚媾往遇雨則吉至是則疑盡亡而睽可合矣凡易之道卦吉者必於諸爻戒之卦不吉者必於諸爻反之睽初與四二與五三與上皆先睽後合而三上之睽尤甚故其辭亦險怪之甚中心疑者其辭枝此之謂乎象曰遇雨之吉羣疑亡也傳雨者陰陽和也始睽而能終和故吉也所以能和者以羣疑盡亡也其始睽也无所不疑故云羣疑睽極而合則皆亡也一作則疑皆亡矣朱子曰孔子不説象如見豕負塗載鬼一車之類只説羣疑亡也便見得上面許多皆是狐惑可疑之事而已到後人解説多牽強雙湖胡氏曰夫子讀易象已了然於未贊之先及其贊易則以一二字㸃掇過雖不説象而義理自著然其為象固已備具於説卦中矣或問睽卦无正應而同德相應者何朱子曰无正應所以為睽當睽之時當合者既離其離者却合也問睽卦本不好爻中所取却好如六五對九二處非其位九四對初九本非相應都成好爻不知何故曰易之取爻多為占者而言占法取變爻便是到此處變了所以困卦雖是不好然其間利用祭祀之屬却多好問此正與見羣龍无首吉利永貞一般曰然却是變了故如此節齋蔡氏曰睽乖之時疑而難合然在柔為尤疑二與五應而五柔故必待噬膚而二遇巷也三與上應而三柔故必待其天且劓而上遇雨也獨初與四皆剛故其相遇有不待刑者然初有喪馬勿逐見惡人之戒葢居睽之初而四非正應故初宜援其接之之道而四乃交孚也縉雲馮氏曰内卦皆睽而有所待外卦皆反而有所應初喪馬勿逐至四遇元夫而初四合矣二委曲以求遇至五往何咎而三五合矣三輿曵牛掣至上遇雨而三上合矣天下之理固不能乆合亦未有終睽也隆山李氏曰睽之為卦初觀其象疑若不可一矣而六爻之辭或遇主于巷或遇元夫而交孚或往遇雨而終吉其始之睽者要之終皆有遇其所以不至合天下乖違之情而使之不至於終窮而無所歸者乎艮下坎上傳蹇序卦睽者乖也乖必有難故受之以蹇蹇者難也睽乖之時必有蹇難蹇所以次睽也蹇險阻之義故為蹇難為卦坎上艮下坎險也艮止也險在前而止不能進也前有險陷後有峻阻故為蹇也程子曰蹇便是處蹇之道困便是處困之道道无時不可行隆山李氏曰震坎艮相遇為蹇解而坎常在焉二卦皆以坎為義艮下坎上則是止乎險中故為蹇坎上震下則是動而出乎險中故為解命名大率以出險與不出險為義也又曰坎配諸卦凡十有四大半皆險難之謂其間遇難而不救者无如困遇難而不行者莫如蹇葢困則有澤而无水之象蹇則具天下山川之至險蹇利西南不利東北利見大人貞吉傳西南坤方坤地也體順而易東北艮方艮山也體止而險在蹇難之時利於順處平易之地不利止於危險也處順易則難可紓止於險則難益甚矣蹇難之時必有聖賢之人則能濟天下之難故利見大人也濟難者必以大正之道而堅固其守故貞則吉也凡處難者必在乎一无乎字守貞正一无正字設使難不解不失正德是以吉也若遇難而不能固其守入於邪濫雖使苟免亦惡德也知義命者不為也本義蹇難也足不能進行之難也為卦艮下坎上見險而止故為蹇西南平易東北險阻又艮方也方在蹇中不宜走險又卦自小過而來陽進則往居五而得中退則入於艮而不進故其占曰利西南而不利東北當蹇之時必見大人然後可以濟難又必守正然後得吉而卦之九五剛健中正有大人之象自二以上五爻皆得正位則又貞之義也故其占又曰利見大人貞吉葢見險者貴於能止而又不可終於止處險者利於進而不可失其正也朱子曰艮下坎上其卦為蹇蹇難也西南陰方平易之地東北陽方險阻之處當蹇之時利趍平易而不利于阻險又利見大人以濟蹇而守正則吉故筮得此卦其占如此蹇利西南是説坤卦分曉但不知從何插入這坤卦來此須是箇變例聖人到這裏看見得有箇做坤底道理大率陽卦多自陰來陰卦多是陽來震是坤第一畫變坎是第二畫變艮是第三畫變易之取象不曽確定了他據卦體艮下坎上无坤而繫辭言地者往往只取坎中爻變變則為坤矣沈存中論五姓自古无之後人既如此呼喚即便有義可推進齋徐氏曰卦合艮坎而為蹇坎北方也艮東北方也而乃利西南不利東北何耶葢處蹇難之時當適他方所以利於坤西南之平易也不宜止於危險之地所以不利於坎艮東北之險阻也大人指九五也當蹇厄之時利見大德之人以濟大蹇之難難由正濟故曰貞吉處難失正其能吉乎雙湖胡氏曰後天八卦方位艮坎東北卦與西南坤離卦為對艮坎合為蹇故不利東北則坤離合為晉是為利西南矣是以蹇為難而晉為進也蹇卦无西南文王姑即東北對方言之不必卦内有取於西南也况二陽盡變而之坤則亦有離東北而就西南之象乎艮坎成蹇卦體雖為不利而九五以剛健中正君於上六二以柔順中正臣於下二五互離目為見又有人臣利見大人之象焉大人謂五見謂二二五剛柔皆正故吉又睽盡變為蹇睽取目有所見象重離在前也蹇取足不能進象重坎在前也名義甚巧雲峰胡氏曰屯困蹇同為難入屯之初為難方微而未深困之為難絶援而難救蹇之為難遇險而不進葢前有水之陷後有山之阻足不能進行之難也坤西南艮東北坤言西南得朋是矣又言東北喪朋取艮與坤對也蹇下艮言不利東北是矣又言利西南取坤與艮對也葢以對待言則此為得彼為喪此為不利知彼為利蹇難之時去難為利處蹇不可无其人故以見五為利處蹇不可无其道故以蹇難而不失其正者為吉彖曰蹇難也險在前也難乃旦反傳蹇難也蹇之為難如乾之為健若易之為難則義有未足一作盡蹇有險阻之義屯亦難也困亦難也同為難而義則異屯者始難而未得通困者力之窮蹇乃險阻艱難之義各不同也險在前也坎險在前下止而不得進故為蹇見險而能止知矣哉知音智傳以卦才言處蹇之道也上險而下止見險而能止也犯險而進則有悔咎一作吝故美其能止為知也方蹇難之時唯能止為善故諸爻除五與二外皆以往為失來為得也本義以卦德釋卦名義而贊其美中溪張氏曰蹇之所以為難者以其險之在前也見坎險之難而明艮止之義非智者孰能識之丹陽都氏曰險在下可行而乃止焉非知險者也此卦所以為蒙有不明之義險在前知其不可進而止焉可謂知險矣此卦所以為蹇而蹇則知者之事所以反乎蒙也雲峰胡氏曰蹇上下體易則為蒙蒙曰險而止止於外也蹇曰見險而止止於内也内險莫能安外止莫能進所以為蒙見外之險而内能止所以為知知者蒙之反也蹇利西南往得中也不利東北其道窮也傳蹇之時利於處平易西南坤方為順易東北艮方為險阻九上居五而得中正之位是往而得平易之地故為利也五居坎險之中而謂之平易者葢卦本坤由五往而成坎故但取往而得中不取成坎之義也方蹇而又止危險之地則蹇益甚矣故不利東北其道窮也謂蹇之極也中溪張氏曰往得中指五也夫以乾剛之才由四而往居坤之五以為坎位得其中將出坎而為坤此西南所以利也其道窮指三也三為艮體之主止而不進則常在險中其道窮矣此東北之所以不利也童溪王氏曰五實坎體而謂之利西南者葢坎體本坤九往居中而成坎夫九以剛明之才而往處坤之中位非利西南往得中之義乎若不知西南之為利而反其所詣焉則有所不利矣故易於此指其所之而避其所忌而以利不利明告之利見大人往有功也當位貞吉以正邦也傳蹇難之時非聖賢一有大人字不能濟天下之蹇故利於見大人也大人當位則成濟蹇之功矣往而有功也能濟天下之蹇者唯大正之道夫子又取卦才而言蹇之諸爻除初外餘皆當正位故為貞正而吉也初六雖以隂居陽而處下亦陰之正也以如一作如字此正道正其邦可以濟於蹇矣童溪王氏曰利見大人往有功也此六二往應九五而有濟蹇之功也中溪張氏曰二五各當陰陽之位故得正而吉可以正邦國也蹇之時用大矣哉傳處蹇之時濟蹇之道其用至大故云大矣哉天下之難豈易平也非聖賢不能其用可謂大矣順時而處量險而行從平易之道由至正之理乃蹇之時用也本義以卦變卦體釋卦辭而贊其時用之大也雙湖胡氏曰利西南往得中論卦變也蹇本升卦坤上巽下坤乃西南平易之方自升九二上往得坤體之中是為利西南而往得中矣升九二既往五則下體成艮艮正東北方卦所謂不利東北其道窮也大人九五也九二之往為九五可謂有功矣九五剛中當位貞吉可以正邦矣當蹇之時而成其用之大有如此者本義釋卦辭謂蹇自小過來而彖傳則分明自升來或自既濟來則皆有往西南之象耳雲峰胡氏曰坎睽蹇皆非順境夫子以為雖此時亦有可用者故皆極言贊之但坎睽釋卦辭後復從天地人物極言之以贊其大蹇則釋卦辭以贊之而已葢上文所謂往得中有功正邦即其用之大者也象曰山上有水蹇君子以反身脩德傳山之峻阻上復有水坎水為險陷之象上下險阻故為蹇也君子觀蹇難之象而以反身脩德君子之遇艱阻必反求諸己而益自脩孟子曰行有不得者皆反求諸己故遇艱蹇必自省於身有失而致之乎是反身也有所未善則改之无歉於心則加勉乃自脩其德也君子脩德以俟時而已或問蹇與困相似君子致命遂志與君子反身脩德亦一般朱子曰不然澤无水困是盡乾燥處困之極事无可為者故只得致命遂志若山上有水蹇則猶可進歩如山上之泉曲折多艱阻然猶可行故敎以反身脩德豈可與困為比只觀澤无水困與山上有水蹇兩句便全然不同雙湖胡氏曰反身即思不出其位之義艮象也脩德即常德行之義坎象也坎在艮下為蒙而稱君子以果行育德坎在艮上為蹇而稱君子以反身脩德葢反身如山不動而脩德如水滋潤乎山之象也中溪張氏曰山上有水者澗谷之泉土石礙而止之不能流行其象為蹇孟子曰行有不得者皆反求諸己此君子所以反身脩德也反身取艮之背脩德取坎之心雲峰胡氏曰水之蹇也止而不流君子之蹇也反而自脩白雲郭氏曰夫蹇利得朋而象言反身脩德者葢君子愛人不親反其仁治人不治反其智禮人不答反其敬反而求之則皆不出於吾身其身正而天下歸之故得朋之道莫要於反身脩德也初六往蹇來譽傳六居蹇之初往進則益入於蹇往蹇也當蹇之時以陰柔无援而進其蹇可知來者對往之辭上進則為往不進則為來止而不進則有見幾知時之美來則有譽也本義往遇險來得譽或問往蹇來譽朱子曰來往二字唯程傳言上進則為往不進則為來説得極好今人或謂六四往蹇來連是來就三九三往蹇來反是來就二上六往蹇來碩是來就五亦説得通但初六來譽則位居最下无可來之地其説不得通矣故不若程傳好只是不彺為佳耳不往者守而不進故不進則為來沙隨程氏曰六非濟蹇之才初非濟蹇之位往則犯難來則獲見險能止之譽雲峰胡氏曰六爻除二五外皆貴於見險而止故曰往而進則蹇來而止則不蹇譽反連碩四字不同各有攸當初位卑分微未能有譽故聖人特許其來則譽也隆山李氏曰古人生居亂世无官守言責者類皆髙蹈隱淪以待天下之清卒之身名俱髙傳播萬世夫是之謂往蹇來譽與夫履富貴而蹈危機以致名位俱仆為後代之指笑者有間哉象曰往蹇來譽宜待也傳方蹇之初進則益蹇時之未可進也故宜見幾而止以待時可行而後行也諸爻皆蹇往而善來然則无出蹇之義乎曰在蹇而往則蹇也蹇終則變矣故上己一作六有碩義潘氏曰往則入險不如有所待也六二王臣蹇蹇匪躬之故傳二以中正之德居艮體止於中正者也與五相應是中正之人為中正之君所信任故謂之王臣雖上下同德而五方在大蹇之中致力於蹇難之時其艱蹇至甚故為蹇於蹇也二雖中正以陰柔之才豈易勝其任所以蹇於蹇也志在濟君於蹇一作艱難之中其蹇蹇者非為身之故也雖使不勝志義可嘉故稱其忠藎不為己也然其才不足以濟蹇也小可濟則聖人當盛稱以為勸矣本義柔順中正正應在上而在險中故蹇而又蹇以求濟之非以其身之故也不言吉凶者占者但當鞠躬盡力而已至於成敗利鈍則非所論也容齋洪氏曰外卦一坎諸爻所同而自六二推之上承九三六四又互坎體是一卦之中已有二坎言蹇蹇者猶言坎坎也節齋蔡氏曰王臣為五之臣也蹇蹇入難之深也匪躬之故為王之事也誠齋楊氏曰諸爻聖人皆不許其往唯六二九五无不許其往之辭者二為王者之大臣五履大君之正位復不往以濟而誰當任乎雲峰胡氏曰坎互坎蹇蹇象匪躬艮其背不獲其身之象凡二皆王臣而蹇獨稱之者平時未足以見臣節蹇之時方見之五位蹇中王之蹇也主憂臣辱亦二之蹇也他爻戒其往蹇二應五故稱其蹇蹇事君能致其身者也復六四中行獨復不言吉本義引董子明道不計功正誼不謀利之説以為理所當然吉凶非所論此不言吉則引孔明之言曰鞠躬盡力死而後已成敗利鈍則非所論烏虖必如此而後義利之界限明矣天下事固當論是非不當論成敗也象曰王臣蹇蹇終无尤也傳雖艱一作蹇戹於蹇時然其志在濟君難雖未成功然一无然字終无過尤也聖人取其志義而謂其无尤所以勸忠藎也本義事雖不濟亦无可尤誠齋楊氏曰蹇蹇者多難而非一難也大臣犯天下之多難而捐軀以求濟何尤之有然以六二之匪躬而不聞濟難何耶葢捐軀在志濟難在才六二陰柔短於才也聖人不尤之者嘉其志而恕其才也雷氏曰初六以不往為有譽六二以匪躬為无尤有位无位之間耳雲峰胡氏曰本義於爻引孔明之言此復本程傳意曰事雖不濟亦无可尤葢孔明雖志決身殱然天下後世誰得而尤孔明者斯言眞足以勸忠藎矣九三往蹇來反傳九三以剛居正處下體之上當蹇之時在下者皆柔必依於三是為下所附者也三與上為正應上陰柔而无位不足以為援故上往則蹇也來下來也反還歸也三為下二陰所喜故來為反其所也稍安之地也本義反就二陰得其所安進齋徐氏曰九三當位與上為應上柔无位不足與濟難故曰往蹇白雲郭氏曰反者既往復反之辭雲峰胡氏曰反身為背艮象故爻曰來反象亦曰反身九居三是居其本位反如返故鄉歸故廬來而得其所安下有二陰就之愈安矣象曰往蹇來反内喜之也傳内在下之陰也方蹇之時陰柔不能自立故皆附於九三之陽而喜愛之九之處三在蹇為得其所也處蹇而得下之心可以求安故以來為反猶春秋之言歸也潘氏曰往則入險不如反乎内也内二陰樂於從陽故喜也六四往蹇來連傳往則益入於坎險之深往蹇也居蹇難之時同處艱戹者其志不謀而同也又四居上位而與在下者同有得位之正又與三相比相親者也二與初同類相與者也是與下同志衆所從附也故曰來連來則與在下之衆相連合也能與衆合得處蹇之道也本義連於九三合力以濟單氏曰六四已至於險中而猶往焉則益蹇矣進齋徐氏曰六四近君往從乎五則陰柔不足以濟五之蹇唯下連九三牽引以進乃克有濟雲峰胡氏曰連牽連九三也上卦坎四往則陷於險來則與三牽連可以濟險四與三柔上剛下有連象象曰往蹇來連當位實也傳四當蹇之時居上位不往而來與下同志固足以得衆矣又以陰居陰為得其實以誠實與下故能連合而下之二三亦各得其實初以陰居下亦其實也當同患之時相交以實其合可知故來而連者當位以實也處蹇難非誠實何以濟當位不曰正而曰實上下之交主於誠實用各有其所也雲峰胡氏曰六四陰也而曰當位實者四來連三以三之陽當位實四陰虛以連三之陽實合力以濟楊氏曰六四居二陽之間求之已者雖謂之陰而當位實者以陰比於陽也易之為義以得陽為實以失陽為虛如翩翩不富皆失實者无陽故爾九五大蹇朋來傳五居君位而在蹇難之中是天下之大蹇也當蹇而又在險中亦為大蹇大蹇之時而二在下以中正相應是其朋助之來也方天下之蹇而得中正之臣相輔其助豈小也得朋來而无吉何也曰未足以濟蹇也以剛陽中正之君而方在大蹇之中非得剛陽中正之臣相輔之不能濟天下之蹇也二之中正固有助也欲以陰柔之助濟天下之難非所能也自古聖王濟天下之蹇未有不由賢聖之臣為之助者湯武得伊呂是也中常之君得剛明之臣而能濟大難者則有矣劉禪之孔明唐肅宗之郭子儀德宗之李晟是也雖賢明之君苟无其臣則不能濟於難也故凡六居五九居二者則多由助而有功䝉泰之類是也九居五六居二則其功一作助多不足屯否之類是也葢臣賢於君則輔君以君所不能臣不及君則贊助之而已故不能成大功也本義大蹇者非常之蹇也九五居尊而有剛健中正之德必有朋來而助之者占者有是德則有是助矣或問蹇九五何故為大蹇朱子曰五是為蹇主凡人臣之蹇只是一事至大蹇須人主當之問大蹇朋來之義曰處九五尊位而居蹇之中所以為大蹇所謂遺大投艱於朕身人君當此之時須屈羣策用羣力乃可濟也瀘川毛氏曰禍亂天所以開聖人也九五德正而位尊立乎險中以合天下使天下之有志者朋來而取節於我是故自我言之所謂當位貞吉以正邦也自朋來者言之所謂利見大人往有功也然則九五陷坎險之中所以為蹇也而其位則君也治蹇者也以治蹇之主而居至險之中此所以撥亂反正乘危致安也歟中溪張氏曰九五以陽剛而陷於坎中是遺大投艱於朕身夫豈小蹇也哉斯時也正望羣賢之來出其險以㧞其禍幸而下有六二柔順之大臣為之正應必能朋合來譽來反來連來碩之才翕然而至與同心協力共濟九五大蹇之難苟非二居下體之中能盡匪躬之節又安能朋合衆賢于于而來哉雲峰胡氏曰諸爻皆以往為蹇聖人又慮天下皆不往蹇无由出矣二五君臣復不往誰當往乎故於二曰蹇蹇於五曰大蹇或曰朋三也三四陰與陽相比有連象三五陽與陽同德有朋象蹇之三反為解之四彼於四曰朋至故此以三為朋來鄭氏剛中曰諸爻皆以來為言與朋來之來異諸爻之來自外反内也朋來之來自下趍五也象曰大蹇朋來以中節也傳朋者其朋類也五有中正之德而二亦中正雖大蹇之時不失其守蹇於蹇以相應助是以其中正之節也上下中正而弗濟者臣之才不足也自古守節秉義而才不足以濟者豈少乎漢李固王允晉周顗王導之徒是也潘氏曰五君位也而在坎中蹇孰大焉然動而不失中正之節故能感其朋之來以共成正邦之功也上六往蹇來碩吉利見大人傳六以陰柔居蹇之極冒極一作陰險一作蹇而往所以蹇也不往而來從五求三得剛陽之助是以碩也蹇之道戹塞窮蹇碩大也寛裕之稱來則寛大其蹇紓矣蹇之極有出蹇之道上六以陰柔故不得出一作能耳得剛陽之助可以紓蹇而已在蹇極之時得紓則為吉矣非剛陽中正豈能出乎蹇也利見大人蹇極之時見大德之人則能一作利有濟於蹇也大人謂五以相比發此義五剛陽中正而居君位大人也在五不言其濟蹇之功而上六利見之何也曰在五不言以其居坎險之中无剛陽之助故无能濟蹇之義在上六蹇極而見大德之人則能濟於蹇故為利也各爻取義不同如屯初九之志正而於六二則目之為宼也諸爻皆不言吉上獨言吉者諸爻皆得正各有所善然皆未能出於蹇故未足為吉唯上處蹇極而得寛裕乃為吉也建安丘氏曰上六才柔固不足以濟難而得助猶可以有為下與三應即其助也唯不往而來與三同力則何蹇不濟所以吉也來碩應三也陽為大故曰碩大人五也上既得三之應則宜與之共見大人而成濟蹇之功矣先言來碩後言利見者葢上得三而後可以援五也中溪張氏曰上居坎上之上將出蹇矣而亦曰往蹇何哉葢上之才雖柔而下有九三陽剛之才為之正應相與共濟九五之蹇不往而來則有碩大之功而此爻所以獨言吉也本義已在卦極往无所之益以蹇耳來就九五與之濟蹇則有碩大之功大人指九五曉占者宜如是也朱子曰諸爻皆不言吉葢未離乎蹇中也至上六往蹇來碩吉却是蹇極有可濟之理既是不往唯守於蹇則必見九五之大人與共濟蹇而有碩大之功矣進齋徐氏曰碩大也剛也近附九五之大人故曰來碩下得乎剛可以出蹇故吉也雲峰胡氏曰剝上九陽稱碩果蹇上六從五之陽故亦曰碩碩以功之大言大人以德之大言平庵項氏曰上六之往猶初六之來上六本无所往特以不來為往耳初六本无所來特以不往為來耳童溪王氏曰大蹇至上六始為吉者以謂蹇至此極物極則反蹇極必通也象曰往蹇來碩志在内也利見大人以從貴也傳上六應三而從五志在内也蹇既極而有助是以碩而吉也六以陰柔當蹇之極密近剛陽中正之君自然其志從附以求自濟故利見大人謂從九五之貴也所以云從貴恐人不知大人為指五也程子曰蹇以反身脩德故往者在外也在外必蹇來者在内也在内則有譽无尤來連朋來來碩皆反身脩德之謂也蹇蹇不暴進内顧之象也暴進出外則无事矣連則无窮也朋來則衆來言朋來未免於有思也至於來碩則來處於大人之事也故曰從貴董氏曰内以五之位言貴以五之德言以位則上不當往於外而當來於内以德則五有大人之象居大人之位此其可貴也中溪張氏曰三内卦也上應之故曰志在内也五大人也上利見之故曰以從貴也建安丘氏曰蹇難也詳六爻之義則處蹇者五也五在坎中需衆爻以出險故大蹇朋來蹇其蹇者二也二與五應與君同患難者故王臣蹇蹇餘四爻雖亦處蹇以不任濟蹇之責是以喜來而惡往故爻以往來為辭然諸爻中唯三有剛實之才可以濟難以與五非近非應不能從五唯反而就二則可與之同往而濟君之蹇故爻言其來反而象以内喜釋之言二亦喜三之來也在四而言來連者比三也故象稱其當位實在上而言來碩者應三也故象稱其志在内葢當蹇之世五方待三之來者也三來則衆爻俱來而蹇可濟矣獨初六才柔位卑未能有為故以來譽勉之此蹇六爻之大旨也坎下震上傳解序卦蹇者難也物不可以終難故受之以解物无終難之理難極則必散解者散也所以次蹇也為卦震上坎下震動也坎險也動於險外出乎險也故為患難解散之象又震為雷坎為雨雷雨之作葢陰陽交感和暢而緩散故為解解者天下患難解散之時也解利西南无所往其來復吉有攸往夙吉解音蟹彖傳大象竝同傳西南坤方坤之體廣大平易當天下之難方解人始離艱苦不可復以煩苛嚴急治之當濟以寛大簡易乃其宜也如是則人心懷而安之故利於西南也湯除桀之虐而以寛治武王誅紂之暴而反商政皆從寛易也无所往其來復吉有攸往夙吉无所往謂天下之難已解散无所為也有攸往謂尚有所當解之事也夫天下國家必紀綱法度廢亂而後禍患生聖人既解其難而安平无事矣是无所往也則當脩復治道正紀綱明法度進復先代明王之治是來復也謂反正理也天下之吉也其發語辭自古聖王救難定亂其始未暇遽為也既安定則為可乆可繼之治自漢以下亂既除則不復有為姑隨時維持而已故不能成善治葢不知來復之義也有攸往夙吉謂尚有當解之事則早為之乃吉也當解而未盡者不早去則將復盛事之復生者不早為則將漸大故夙則吉也朱子曰无所往其來復吉程傳以為天下之難已解而安平无事則當脩復治道正紀綱明法度進復先代明王之治夫禍亂既平正合脩治道求復三代之規模却只便休了兩漢以來人主還有理㑹正心誠意否須得人主如窮閻陋巷之士治心脩身講明義理以此應天下之務用天下之才方見次第本義解難之散也居險能動則出於險之外矣解之象也難之既解利於平易安靜不欲乆為煩擾且其卦自升來三往居四入於坤體二居其所而又得中故利於西南平易之地若无所往則宜來復其所而安靜若尚有所往則宜早往早復不可乆煩擾也節齋蔡氏曰坎難震動動則離乎難解之義也利西南者坎震東北之卦也難解於東北至西南則无不利矣无所往其來復吉往進也來復退歸也謂二難既解則居中以復其安静也主内象言有攸往夙吉夙早也難有未解者當急往而解之不可乆擾也主外象言雲峰胡氏曰蹇解西南皆取後天對待蹇下體艮東北隅與西南對解二體坎震震東坎北亦與西南對蹇未解且利西南既解可知矣蹇言不利東北解不言者蹇方止於險中故言利平易不利險阻解已出險外故但言平易之利不言險阻之不利大扺解之時以平易為利畧有苛急即非利以安靜為吉乆為煩擾即非吉本義曰若無所往則宜來復其所而安靜是以安靜為吉也曰若有所往則宜早往早復不可乆為煩擾亦以安靜為吉也本義兩若字未定之辭顧其時何如耳然其吉也則皆在於來復而已彖曰解險以動動而免乎險解傳坎險震動險以動也不險則非難不動則不能出難動而出於險外是免乎險難也故為解本義以卦德釋卦名義白雲郭氏曰遇險而止者才之不足也遇險而動者才之有餘也以有餘之才故能動而免乎險所以為解也臨川吳氏曰解者險難釋散之時也坎險在内震動在外是動而出乎險之外得以脱免於險難也隆山李氏曰以畫觀之四陰二陽坎險在前是為蹇四陰二陽坎險已過是為解則解者蹇之反也以卦觀之坎上震下為屯坎下震上為解則解者屯之反也屯蹇者難之方興解則難之已散蹇之止于險下固不若屯之動于險中屯之動于險中又不若解之動于險外也解利西南往得衆也傳解難之道利在廣大平易以寛易而往濟解則得衆心之歸也進齋徐氏曰往得衆指四也坤為衆變坤成震九四往趍於西南平易之地則得衆心而無難矣豈非利乎白雲郭氏曰解利西南往得衆者西南得朋之地也得朋而動乃能濟險故蹇之大蹇朋來與解之朋至斯孚皆一道也其來復吉乃得中也傳不云无所往省文爾救亂除難一時之事未能成治道也必待難解无所往然後來復先王之治乃得中道謂合宜也進齋徐氏曰乃得中指二也葢天下禍亂已散來則復返於安靜之域不事煩擾此以靜而吉也有攸往夙吉往有功也傳有所為則夙吉也早則往而有功緩則惡滋而害深矣本義以卦變釋卦辭坤為衆得衆謂九四入坤體得中有功皆指九二西溪李氏曰未可以往則以來復為中今難既解則往而有功矣進齋徐氏曰往有功亦指二也謂當時或有未解之難則宜亟往而散之夙則有功此又以速而吉也建安丘氏曰大抵處時方平者易緩除惡不盡者易滋聖人於患難方平之際既不欲人以多事自疲又不欲人以无事自怠也天地解而雷雨作雷雨作而百果草木皆甲拆解之時太矣哉傳既明處解之道復言天地之解以見解時之大天地之氣開散交感而和暢則成雷雨雷雨作而萬物皆生發甲拆天地之功由解而成故贊解之時大矣哉王者法天道行寛宥施恩惠養育兆民至於昆蟲草木乃順解之時與天地合德也本義極言而贊其大也朱子曰陰陽之氣閉結之極忽然迸散出做這雷雨只管閉結了若不解散如何㑹有雷雨作小畜所以不能成雷雨者畜不極也厚齋馮氏曰以天地推廣卦義而贊之作興也拆分裂也雷雨為屯故雷雨作為解雨自天施雷出地天地解也雲雷二卦象百果草木四陰象或甲或拆得二陽而發育也王氏曰天地否結則雷雨不作交通感散雷雨乃作雷雨之作則險厄者亨否結者散故百果草木皆甲拆也誠齋楊氏曰當解之時如冬閉之乆而忽逢春生天地之凝者散雷雨之静者作萬物之甲者拆大哉解之時乎進齋徐氏曰雷雨作者氣之解也百果草木皆甲拆者形之解也形隨氣而解則屈者伸鬱者暢生意流行充周普徧解之時其大矣哉中溪張氏曰剝之碩果不食者藏天地生物之仁也解之百果草木皆甲拆者發天地生物之仁也雲峰胡氏曰解上下體易為屯動乎險中為屯動而出乎險之外為解屯象草穿地而未申解則雷雨作而百果草木皆甲拆蹇解得中皆指坎中而言蹇之中在五往則得中解之中在二无所往而來乃得中當蹇之未解必動而免乎險方可以為解蹇之既解即宜安静而不可乆煩擾故蹇之時以往居五為中既解之時以復其安靜則為中也是之謂時中故蹇之時用解之時義聖人皆極言而贊其大象曰雷雨作解君子以赦過宥罪傳天地解散而成雷雨故雷雨作而為解也與明兩而作離語不同赦釋之宥寛之過失則赦之可也罪惡而赦之則非義也故寛之而已君子觀雷雨作解之象體其發育則施恩仁體其解散則行寛釋也建安丘氏曰雷雨交作天地以之而解萬物之屯赦過宥罪君子以之而解萬民之難雙湖胡氏曰坎在上為雲在下為雨方雲雷為屯則陰陽之未通今雷雨作解則陰陽之已通矣屯其為難之始解其解屯之難者歟雲峰胡氏曰程傳云過失則赦之可也罪惡而赦之非義也寛之而已葢雷雨者造化與物更新之仁也赦過宥罪君子與民更新之仁也而有義存焉中溪張氏曰夫雷雨交作則為解雷者天之威雨者天之澤威中有澤刑獄之有赦宥也有過者赦而不問有罪者宥而從輕此君子所以推廣天地之仁心也初六无咎傳六居解初患難既解之時以柔居剛以陰應陽柔而能剛之義既无患難而自處得剛柔之宜一有也字患難既解安寕无事唯自處得宜則為无咎矣方解之初宜安靜以休息之爻之辭寡所以示意本義難既解矣以柔在下上有正應何咎之有故其占如此隆山李氏曰震陽動乎險上初與為應藉以解散于屯蹇者安有咎哉雲峰胡氏曰恒九二悔亡大壯九二貞吉解初六无咎三爻之占只二字其言甚簡象在爻中不復言也但恒大壯占在本爻此占在應爻又兼方解之初宜安靜以休息之爻之辭寡亦所以示意也象曰剛柔之際義无咎也傳初四相應是剛柔相際接也剛柔相際為得其宜難既解而處之剛柔得宜其義无咎也節齋蔡氏曰際謂交際柔居解初入坎尚淺而承剛應剛得剛柔交際之冝難必解者也故曰義无咎也中溪張氏曰居解之初患難方散之時也初才柔位卑未能有為幸而初四相應剛柔交際以此處解揆之於義自无咎也雲峰胡氏曰初六无咎有占无象剛柔之際舉初與四之象以明占也九二田獲三狐得黄矢貞吉傳九二以陽剛得中之才上應六五之君用於時者也天下小人常衆剛明之君在上則明足以照之威足以懼之剛足以斷之故小人不敢用其情然尤常存警戒慮其有間而害正一作政也六五以陰柔居尊位其明易蔽其威易犯其斷不果而易惑小人一近之則移其心矣况難方解而治之初其變尚易二既當用必須能去小人則可以正君心而行其剛中之道田者去害之事狐者邪媚之獸三狐指卦之三陰時之小人也獲謂能變化除去之如田之獲狐也獲之則得中直之道乃貞正而吉也黄中色矢直物黄矢謂中直也羣邪不去君心一入則中直之道无由行矣桓敬之不去武三思是也本義此爻取象之意未詳或曰卦凡四陰除六五君位餘三陰即三狐之象也大抵此爻為卜田之吉占亦為去邪媚而得中直之象能守其正則无不吉矣劉氏彞曰狐者性柔而情奸晝伏而夜動小人道也雲峰胡氏曰當解之時四欲其解拇上欲其射隼三則直以負且乘明其為小人五則直欲其退小人一卦六爻而去小人者居其五此爻謂之獲狐者狐邪媚之獸所以形容小人者尤切九剛直而二得中故本義以為去邪媚得中直之象葢中直與邪媚相反中則无有不正故吉象曰九二貞吉得中道也傳所謂貞吉者得其中道也除去邪惡使其一无其字中直之道得行乃正而吉也中溪張氏曰九二所以攷守正之吉者以其能得居中之道也六三負且乘致寇至貞吝傳六三陰柔居下之上處非其位猶小人宜在下以負荷而且乘車非其據也必致寇奪之至雖使所為得正亦可鄙吝也小人而竊盛位雖勉為正事而氣質卑下本非在上之物終可吝也若能大正則如何曰大正非陰柔所能也若能之則是化為君子矣三陰柔小人宜在下而反處下之上猶小人宜負而反乘當致宼奪也難解之時而小人竊位復致宼矣本義繫辭備矣貞吝言雖以正得之亦可羞也唯避而去之為可免耳朱子曰六居三大率少有好底負且乘聖人到這裏又見得有箇小人乘君子之器底象故又於此發出這箇道理來臨川王氏曰負者小人之事六小人之材也乘者君子之器三君子之位也南軒張氏曰小人乘君子之器乃所以招宼而起禍貞固守此寕不可吝乎雲峰胡氏曰六才柔當上負乎四負小人之事也三志剛欲下乘乎二乘君子之器也寇上象解難莫切於解小人六三負者而乘君子之器小人據非其分宼至自致之也本義謂唯避而去之為可免耳葢使三能避而去之是三自解之也宼亦當解而去矣雙湖胡氏曰六爻中唯三為吝而不言凶咎者終是以卦體吉也象曰負且乘亦可醜也自我致戎又誰咎也傳負荷之人而且乘載為可醜惡也處非其據德不稱一作勝其器則宼戎之致乃已招取將誰咎乎聖人又於繫辭明其致宼之道謂作易者其知盗乎盜者乘釁而至苟无釁隙則盜安能犯負者小人之事乘者君子之器以小人而乘君子之器非其所能安也故盜乘釁而奪之小人而居君子之位非其所能堪也故滿假而陵慢其上侵暴其下盜則乘其過惡而伐之矣伐者聲其罪也盜横暴而至者也貨財而輕慢其藏是教誨乎盜使取之也女子而妖冶其容是敎誨淫者使暴之也小人而乘君子之器是招盜使奪之也皆自取之之謂也雷氏曰負且乘小人自以為榮而君子所恥故可醜宼小則為盜大則為戎任使非人則變解而蹇天下起戎矣已所致也復誰咎哉中溪張氏曰負販之人而且乘車處非其據竊位而已亦可醜也宼戎之至自我招之將誰咎乎我指三也戎指上也九四解而拇朋至斯孚解佳買反象同傳九四以陽剛之才居上位承六五之君大臣也而下與初六之陰為應拇在下而微者謂初也居上位而親小人則賢人正士遠退矣斥去小人則君子之黨進而誠相得也四能解去初六之陰柔則陽剛君子之朋來至而誠合矣不解去小人則已之誠未至安能得人之孚也初六其應故謂遠之為解本義拇指初初與四皆不得其位而相應應之不以正者也然四陽而初陰其類則不同矣若能解而去之則君子之朋至而相信也朱子曰四與初皆不得正四能解而拇者以四雖陰位而才則陽與初六陰柔則為有間所以能解去其拇故得陽剛之朋類至而相信矣進齋徐氏曰朋謂二四與二皆剛故曰朋解之時陽能解陰剛能解柔九四欲解初六在下之陰解而拇也雲峰胡氏曰本義謂四陽初陰其類不同初應四固无可咎自四觀之九二非應類也初六雖應非類也必去初六非類之陰則九二之陽朋至而相信本義但曰君子之朋意可見矣象曰解而拇未當位也傳四雖陽剛然居陰於正疑不足若復親比小人則其失正必矣故戒必解其拇然後能來君子以其處未當位也解者本合而離之也必解拇而後朋孚葢君子之交而小人容於其間是與君子之誠未至也中溪張氏曰四以剛居柔故有未當位之戒六五君子維有解吉有孚于小人解音蟹象同傳六五居尊位為解之主人君之解也以君子通言之君子所親比者必君子也所解去者必小人也故君子維有解則吉也小人去則君子進矣吉孰大焉有孚者世云見驗也可驗之於小人小人之黨去則是君子能有解也小人去則君子自進正道自行天下不足治也本義卦凡四陰而六五當君位與三陰同類者必解而去之則吉也孚驗也君子有解以小人之退為驗也雲峰胡氏曰爻位吉凶无常原其卦體之休咎觀其時物之向背或指而云吉或戒而示凶作易者自有微權也此爻曰君子維有解吉者五得中可為君子六為陰亦類小人君子有解之吉必以小人之去為驗也九二以陽居臣位三陰非類也必解而去之乃吉六五以陰居尊位三陰同類也不解而去之失君道矣吉未可知也卦唯四五言解四能解非類之小人可以來君子五能解同類之小人亦可騐其能為君子建安丘氏曰險難小人之為也小人情狀最為不一狐以言其蠱惑隼以言其鷙害拇以言其附麗負且乘以言其僭竊也聖人於諸爻所以斥六三者已極其形容矣至此復明以小人斥之斥之以小人者所以顯其罪而去之也然生天下之難者莫甚於小人而人君能解天下之難者莫大於君子唯六五之君得君子以為解難之助此小人之所以心服而退聼也雙湖胡氏曰嘗觀卦體不吉諸爻雖得位以剛中正之君幾濟之不足蹇之九五是也卦體既吉諸爻雖不得位以柔不中正之主亦處之有餘解之六五是也以是知卦有小大實係卦體而不專係六爻於此可以見矣然解六五不過為守成之常君蹇九五則實為撥亂之英主遇蹇困而非如是之君生人之類復何賴焉吁此易之所以為易也象曰君子有解小人退也傳君子之所解者謂退去小人也小人去則君子之道行是以吉也上六公用射隼於髙墉之上獲之无不利射食亦反隼荀尹反傳上六尊髙之地而非君位故曰公但據解終而言也隼鷙害之物象為害之小人墉牆内外之限也害若在内則是未解之時也若出墉外則是无害矣復何所解故在墉上離乎内而未去也云髙見防限之嚴而未去者上解之極也解極之時而獨有未解者乃害之堅強者也上居解極解道已至器已成也故能射而獲之既獲之則天下之患解已盡矣何所不利夫子於繫辭復伸其義曰隼者禽也弓矢者器也射之者人也君子藏器於身待時而動何不利之有動而不括是以出而有獲語成器而動者也鷙害之物在墉上苟无其器與不待時而發則安能獲之所以解之之道器也事之當解與已解之之道至者時也如是而動故无括結發而无不利矣括結謂阻礙聖人於此發明藏器待時之義夫行一身至於天下之事苟无其器與不以時而動小則括塞大則喪敗自古喜有為而无成功或顛覆者皆由是也本義繫辭備矣中溪張氏曰公者大臣之稱即上六也隼者鷙害之禽也六三其小人之鷙者乎三負且乘竊據髙位乃髙墉也上與六三既无應乃其敵也故公用射六三之隼于髙墉之上獲之无不利矣雲峰胡氏曰九二剛中視三柔而不中象狐之邪媚上柔正視三居剛不正又象隼之鷙害繋辭以三為小人以上為藏器待時之君子卦六爻唯上六獨正故又以象君子也易於震動多有戒辭今於動之極而曰无不利自坎而進於震經歴險阻而後動動必不妄也繫辭曰待時而動待解終也曰成器而動器至終而成也厚齋馮氏曰解之時諸爻皆不當位故以二五得中為貴以剛爻皆出險為尚唯上一爻當位故无不利也象曰公用射隼以解悖也解佳買反傳至解終而未解者悖亂之大者也射之所以解之也解則天下平矣節齋蔡氏曰悖逆也解悖謂解三之悖逆而卒得其順也雲峰胡氏曰諸爻唯六三為小人之尤亦可醜也猶未見其為惡以解悖也悖之一字其惡著矣建安丘氏曰解散也散天下之難也然小人者難之根故蹇難之後猶當思於去小人解去小人之卦也在卦以六三一陰為主其爻曰負且乘致冦至言三以小人陰險之才處非其據而召天下之兵也在諸爻皆欲去三者二在三下而言獲狐者獲三也四處三上而言解拇者解三也上與三應而言射隼者射三也五解之王而言有孚于小人者退三也觀上下諸爻莫不一唯六三之去小人不去難根不除此作是正人之所深懼也唯初六才柔位卑不任解難之責故爻无他辭但曰无咎而已此解六爻之大旨也周易傳義大全卷十四
