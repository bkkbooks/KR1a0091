body:
  text: 周易傳義大全卷二十四明胡廣等撰說卦傳臨川吳氏曰說卦者備載卦位卦徳卦象之說葢自昔有其說意者如八索之書所載有若此者而夫子筆削之以為傳爾首章次章則夫子總說聖人作易大意以為說卦傳之發端也雙湖胡氏曰說卦首論幽贊於神明而生蓍立卦以及伏羲文王卦位不同次論八卦之象甚備其象多是夫子所自取不盡同於先聖漢儒以來千五百餘年未能勘破此義以為夫子只是檃括前聖所取之象求之於經又不同是以言象者多牽合傅㑹而不得其說愚嘗謂數聖人取象各有不同故說卦言象求之於經不盡合葢夫子自取之象為多不必盡同於先聖若分文王周公之易各自求之則坦然明白矣昔者聖人之作易也幽贊於神明而生蓍音尸程子曰幽贊於神明而生蓍用蓍以求卦非謂有蓍而後畫卦夲義幽贊神明猶言贊化育龜筴傳曰天下和平王道得而蓍莖長丈其叢生滿百莖朱子曰能贊化育和氣充塞所以能出這物生蓍便是大衍之數五十如何恰限生出百莖物事教人做蓍用到那參天兩地方是取數處問生蓍按夲義引龜筴傳蓍生滿百莖為證某謂生字似只當與下面立卦立字生爻生字同例看所謂生蓍者猶言立蓍而用之耳未知是否曰卦爻是人所畫蓍是天地所生不可作一例說兼以立蓍而用之為生蓍亦不成文理陸氏徳明曰說文云蓍蒿屬生千歳三百莖易以為數天子九尺諸侯七尺大夫五尺士三尺毛詩草木疏云似藾蕭青色科生建安丘氏曰蓍神草所以用筮而求卦者贊神明猶言贊化育言聖人作易幽則贊於神明而生蓍以為筮卦之用蓍草生則易之數有所托而易之用行矣楊氏曰天地生蓍之靈也固可以揲而成卦衍而為數不有聖人幽贊於神明則混同於區宇之間與凡草木俱腐爾神明之道何自而通乎參天兩地而倚數參七南反夲義天圓地方圓者一而圍三三各一奇故參天而為三方者一而圍四四合二偶故兩地而為二數皆倚此而起故揲蓍三變之末其餘三竒則三三而九三偶則三二而六兩二一三則為七兩三一二則為八朱子曰參天兩地而倚數此在揲蓍上說參者元是箇三數底物事自家從而參之兩者元是箇兩數底物事自家從而兩之雖然却只是說得箇參兩未見得成何數倚數云者似把幾件物事挨放這裏如已有三數更把箇三數倚在這邊成六又把箇三數倚在此成九兩亦如之問參天兩地舊說以為五生數中天三地兩不知其說如何曰此只是三天二地不見參兩之意參天者參之以三兩地者兩之以二也以方圓而言則七八九六之數都自此而起問以方圓而言參兩如天之圓徑一則以圍三而參之地之方徑一則以圍四而兩之否曰然參天兩地而倚數一箇天參之為三一箇地兩之為二三三為九三二為六兩其二一其三為七兩其三一其二為八二老為隂陽二少為剛柔參不是三之數是无徃參焉之參倚數倚是靠在那裏且如先得箇三又得箇三只成六更得箇三方成九若得箇二却成八恁地倚得數出來有人說參作三謂一三五兩謂二四一三五固是天數二四固是地數然而這却是積數不是倚數問參天兩地而倚數曰天圓得數之三地方得數之四一畫中有三畫參之則為九此天數也陽道常饒隂道常乏地之數不能為三止於兩而已三而兩之為六故六為坤一箇天參之則三一箇地兩之則二數便從此起此與大衍之數五十各自說一箇道理不須合來看然要合也合得一箇三一箇二成五衍之則成十便是五十𤓰山潘氏曰蓍數卦爻易之粗也道徳性命易之妙也參天兩地謂五也數數者必以五雖窮乎十百千萬必以五數之所以倚數也建安丘氏曰天陽也陽象奇奇一畫中實得三分參天之數地隂也隂象偶偶一畫中虚此陽闕一分而得二分兩地之數倚依也言卦畫之數依此而起也故三奇為乾則三其參天之數而為九是為老陽三偶為坤則三其兩地之數而為六是謂老隂二奇一偶為巽離兌則二參一兩而為八是謂少隂二偶一奇為震坎艮則二兩一參而為七是謂少陽因七八九六之數以定隂陽老少之畫此立卦生爻之夲也觀變於隂陽而立卦發揮於剛柔而生爻或問觀變於隂陽而立卦是就蓍上數觀否朱子曰恐只是就隂陽上觀未用說到蓍數處觀變於隂陽且統說道有幾畫隂幾畫陽成箇甚卦發揮剛柔却是就七八九六上說初間做這卦時未䁱得是變與不變及至發揮出剛柔了方知這是老隂少隂那是老陽少陽問既有卦則有爻矣先言卦而後言爻何也曰自作易言之則有爻而後有卦此却似自後人觀聖人作易而言方其立卦時只見是卦及細别之則有六爻又問隂陽剛柔一也而别言之何也曰觀變於隂陽近於造化而言發揮剛柔近於人事而言且如泰卦以卦言之只見得小徃大來隂陽消長之意爻裏面便有包荒之類誠齋楊氏曰數既形矣卦斯立焉聖人因其變之或九或七而為陽因其變之或六或八而為隂變至十有八而卦成焉聖人无與也特觀其變而立之爾故曰觀變於隂陽而立卦卦既立矣爻斯生焉聖人因其數之陽而發明其為爻之剛因其數之隂而發明其為爻之柔聖人无與也特發揮之爾故曰發揮於剛柔而生爻節齋蔡氏曰變即十有八變之變也隂陽七八九六也觀七八九六之變則卦可得而立矣隂陽之變即所以為爻復言發揮剛柔而生爻者葢未入用則謂之隂陽已入用則謂之剛柔也和順於道德而理於義窮理盡性以至於命程子曰和順於道徳而理於義者體用也和順於道徳而理於義義即是天道也易言理於義一也求是即為理義言理義不如且言求是易曉求是之心俄頃不可忘理於義此理云者猶人言語之間常所謂理者非同窮理之理所務於窮理者非道須盡窮了天下萬物之理又不道是窮得一理便到只是要積累多後自然見去窮理盡性矣曰以至於命則全无着力處如成於樂樂則生矣之意同窮理盡性以至於命三事一時竝了元无次第不可将窮理作知之事若實窮得理即性命亦可了如言窮理以至於命以序言之不得不然其實只是窮理便能盡性至命也窮理盡性至命一事也才窮理便盡性盡性便至命如木可以為柱理也其曲直者性也其所以曲直者命也理性命一而已理也性也命也三者未嘗有異窮理則盡性盡性則知天命矣天命猶天道也以其用言之則謂之命命者造化之謂也理則須窮性則須盡命則不可言窮與盡只是至於命也張子曰程子說只窮理便是至於命亦是失於大快此義儘有次序須是窮理便能盡得已之性則推類又盡人之性既盡得人之性須盡併萬物之性一齊盡得如此然後至於天道也其間煞有事豈有當下便理㑹了學者須是窮理為先如此則方有學今言知命與至於命儘有遠近豈可以知便謂之至也或問窮理盡性以至於命程張之說孰是朱子曰各是一說程子皆以見言不如張子有作用窮理是知盡性是行覺程子是說得快了如為子知所以為孝為臣知所以為忠此窮理也為子能孝為臣能忠此盡性也能窮其理而充其性之所有方謂之盡以至於命是拖腳說得於天者葢性是我之所至者命是天之所以與我者也如舜盡事親之道至天下之為父子者定知此者窮理者也能此者盡性者也夲義和順從容无所乖逆統言之也理謂隨事得其條理析言之也窮天下之理盡人物之性而合於天道此聖人作易之極功也或問和順於道徳而理於義是就聖人上說是就易上說朱子曰是說易又問和順是聖人和順否曰是易之和順道徳而理於義如吉凶消長之道順而无逆是和順道徳也理於義又極其細而言葢隨事各得其宜之謂也和順道徳如極髙明理於義如道中庸和順道徳而理於義是統說底窮理盡性至命是分說底上一句是離合言之下一句以淺深言之凡卦中所說莫非和順那道徳不悖了他理於義是細分他逐事上各有箇義理和順字理字最好看聖人這般字改移不得和順於道徳是默契夲原處理於義是應變合宜處物物皆有理須一一推窮性則是理之極處故云盡命則性之所自來處故云至窮理是理㑹得道理窮盡盡性是做到盡處如能事父然後盡仁之性能事君然後盡義之性窮理是知上說盡性是仁上說言能造其極也至於範圍天地是至命言與造化一般又問窮理盡性至於命曰此夲是就易上說易上盡具許多道理直是窮得物理盡得人性到得那天命所以通書說易者性命之原此只言作易者如此後來不合將做學者事看窮理盡性至命夲是就易上說易上皆說物理便是窮理盡性即此便是至命也諸先生把來就人上說能窮理了方至於命聖人作易時固是其得許多道理人能體之而盡則便似那易他說那吉凶悔吝處莫非和順道徳理於義窮理盡性之事這一句夲是說易之書如此後人說去學問上却是借他底然這上也有這意思皆是自淺至深雲峰胡氏曰蓍夲自神明聖人幽贊之而已天圓地方之象自具一二之數聖人不過參之兩之而已其為數也自有隂陽之變其為變也自成剛柔之爻聖人不過觀其變而發揮之爾於蓍卦之徳則和順之而一无所逆於六爻之義則條理之而各有其序窮天地之理盡人物之性聖人作易之功至是與天命為一矣天命自然而然聖人之易亦非心思智慮之所為也進齋徐氏曰如乾為天道而彖之元亨利貞則其徳爻之潛見躍飛則其義以一卦而統言之所謂和順也就六爻而言之所謂理也善觀易者推爻義以窮天下之理明卦徳以盡一已之性窮理盡性則進退存亡得喪之天道可以知而天命在我矣勉齋黄氏曰性命一也天所賦為命物所受為性性命係於氣則天之所賦吾之所受者剛柔通塞受制於不齊性命純乎徳則天之所賦吾之所受者中正純粹皆原於固有之徳窮理盡性則不但徳勝其氣而已且將性命於天矣天徳天理徳以所得者而言理以夲然者而言故性曰天徳命曰天理亦一而已非二物也如此則氣之偏者變而正柔者變而强昏者變而明矣其不可變者死生壽夭有定數也南軒張氏曰義在我也命在天也天下之人皆知義命則聖人之易不作矣惟夫不知義不知命此聖人不得已而生蓍倚數立卦生爻凡以為天下不知義命者設也右第一章漢上朱氏曰此章自昔者聖人止倚數說䇿數也觀變於隂陽而立卦說揲蓍分卦也發揮於剛柔而生爻說爻有變動也和順止至於命說所係爻彖之辭也雙湖胡氏曰此章大抵論伏羲作易後欲教天下後世用易故示人以因蓍求卦之法无非欲使斯人安於義命之天而已聖人雖專指伏羲然文王周公繫辭初不出義命之敎亦在其中矣昔者聖人之作易也將以順性命之理是以立天之道曰隂與陽立地之道曰柔與剛立人之道曰仁與義兼三才而兩之故易六畫而成卦分隂分陽迭用柔剛故易六位而成章程子曰立天之道曰隂與陽立地之道曰柔與剛立人之道曰仁與義兼三才而兩之不兩則无用又曰隂陽剛柔仁義只是一箇道理仲尼言仁未嘗兼義於易曰立人之道曰仁與義而孟子言仁必以義配葢仁者體也義者用也知義之為用而不外焉者可與語道矣世之所論於義者多外之不然則混而无别非知仁義之說也立人之道曰仁與義據今日合人道廢則是今尚不廢者猶只是有那些秉彛卒殄滅不得夲義兼三才而兩之總言六畫又細分之則隂陽之位間雜而成文章也朱子曰聖人作易只是要發揮性命之理模寫那箇物事下文所說隂陽剛柔仁義便是性中有這箇物事問將以順性命之理而下言立天地人之道乃繼之以兼三才而兩之此恐是言聖人作易之由如觀鳥獸之文與地之宜始作八卦相似葢聖人見得三才之理只是隂陽剛柔仁義故為兩儀四象八卦也祗是這道理六畫而成卦也祗是這道理不知如何曰聖人見得天下只是這兩箇物事故作易只是模寫出這底問模寫出來便所謂性命之理性命之理便是隂陽剛柔仁義否曰便是立天之道曰隂與陽是以氣言立地之道曰柔與剛是以質言立人之道曰仁與義是以理言隂陽成象天道之所以立也剛柔成質地道之所以立也仁義成徳人道之所以立也道一而已隨事著見故有三才之别而於其中又各有體用之分焉其實則一太極也隂陽是陽中之隂陽剛柔是隂中之隂陽剛柔以質言是有箇物了見得是剛底柔底隂陽以氣言仁義看來當作義與仁當以仁對陽仁若不是陽剛如何做得許多造化義雖剛却主於收斂仁却主發舒這也是陽中之隂隂中之陽互藏其根之意且如今人用賞罰到得與人自是无疑便做將去若是刑殺時便遲疑不肻果決做這見得陽舒隂歛仁屬陽義屬隂處問仁如何比剛曰如春生則氣舒自是剛秋殺則氣收斂而漸衰自是柔問揚子雲謂君子於仁也柔於義也剛曰仁體剛而用柔義體柔而用剛又曰於仁也柔於義也剛又自是一義便是這箇物事不可以一定名之看他用處如何問兼三才而兩之如何分曰以一卦言之上兩畫是天中兩畫是人下兩畫是地兩卦各自看則上與三為天五與二為人四與初為地間以八卦言之則九三者天之陽六三者天之隂九二者人之仁六二者人之義初九者地之剛初六者地之柔不知是否曰恁地看也得如上便是天之隂三便是天之陽五便是人之仁二便是人之義四便是地之柔初便是地之剛兼三才而兩之初剛而二柔三仁而四義五陽而上隂兩之如言加一倍夲是一箇各加一箇為兩問分隂分陽迭用柔剛隂陽剛柔只是一理兼而舉之否曰然勉齋黃氏曰天之道不外乎隂陽寒暑徃來之類是也地之道不外乎剛柔山川流峙之類是也人之道不外乎仁義事親從兄之類是也隂陽以氣言剛柔以質言仁義以理言雖若有所不同然仁者陽剛之理也義者隂柔之理也其實則一而已建安􅉌氏曰上言窮理盡性至命此言順性命之理則易中所言之理皆性命也然所謂性命之理即隂陽剛柔仁義是也以爻分之則上二爻為天之隂陽下二爻為地之剛柔中二爻為人之仁義兼三才而兩之言重卦也方卦之小成三畫已其三才之道至重而六則天地人之道各兩所謂六畫成卦也分隂分陽以位言凡卦初三五位為陽二四上位為隂自初至上隂陽各半故曰分迭用剛柔以爻言柔謂六剛謂九也位之陽者剛居之柔亦居之位之隂者柔居之剛亦居之或柔或剛更相為用故曰迭分之以示其經迭用以為之緯經緯錯綜粲然有文所謂六位成章也雲峰胡氏曰上章和順於道徳統言之也理於義析言之也此章六畫而成卦統言之也分隂分陽迭用柔剛六位而成章又析言之也雙湖胡氏曰易為斯人作也性命之理天所賦於人人所受於天之理也聖人將以順人心性命之理是以兼三而兩六畫成卦以立天地人之道三才之道雖有隂陽剛柔仁義之殊大抵以立人道仁義為主葢人負隂陽之氣以有生肖剛柔之質以有形具仁義之理以成性莫不有三才之道焉仁義之道立即所以使之隂陽合徳剛柔有體以順性命之理也故下文惟曰分隂分陽迭用柔剛以成六位之章而不復言仁義者豈不以使斯人皆得以揲蓍求卦分隂陽用柔剛以斷吉凶而成亹亹則仁義之道固在其中矣右第二章天地定位山澤通氣雷風相薄水火不相射八卦相錯射音石本義邵子曰此伏羲八卦之位乾南坤北離東坎西兌居東南震居東北巽居西南艮居西北於是八卦相交而成六十四卦所謂先天之學也朱子曰先天圖更不可易以象言之天居上地居下艮為山故居西北兌為澤故居東南離為日故居于東坎為月故居于西震為雷居東北巽為風居西南問山澤通氣只為兩卦相對所以氣通曰澤氣之升於山為雲為雨是山通澤之氣山之泉脉流於澤為泉為水是澤通山之氣是兩箇之氣相通山澤一髙一下而水脈相為灌輸也水火下燃上沸而不相滅息也射音食犯也是不相害音斁是不相厭二義皆通問射二音孰是曰音石是水火與風雷山澤不相類水火夲是相尅底物事今却相應而不相害問若以不相厭射而言則與上文通氣相薄之文相類不知如何曰不相射乃下文不相悖之意不相悖乃不相害也水火本相害之物便如相濟之水火亦是中間有物隔之却相為用若无物隔之則相害矣此乃以其不相害而明其相應也問八卦相錯曰乾坤自是箇不動底物事動是隂陽如一隂對一陽一陽對一隂六十四卦圓轉皆如此相錯平庵項氏曰八卦既成按而數之天地以上下相對水火以東西横對雷風山澤以四角斜對八卦相錯粲然有倫也臨川呉氏曰天地定位者乾南坤北上天下地定其尊卑之位也山澤通氣者艮西北兌東南山根著於地澤連接於天通乎天地之氣也雷風相薄者震東北巽西南雷從地而起風從天而行互相衝激也水火不相射者坎西離東一左一右不相侵克也雲峰胡氏曰八卦錯而為六十四卦其位亦然觀之圓圖可見矣柴氏中行曰不言八卦而言八物非物无以見相與變化之理也數徃者順知來者逆是故易逆數也數色主反本義起震而歴離兌以至於乾數已生之卦也自巽而歴坎艮以至於坤推未生之卦也易之生卦則以乾兌離震巽坎艮坤為次故皆逆數也朱子曰數徃者順知來者逆這一段是從卦氣上看來也是從卦畫生處看來恁地方交錯成六十四卦潛室陳氏曰易夲逆數也有一便有二有三便有四有四便有十六以至于六十四皆由此可以知彼由今可以知來故自乾一以至于坤八皆循序而生一如橫圖之次今欲以圓圖象渾天之形若一依此序則乾坤相竝寒暑不分故伏羲取天地定位山澤通氣雷風相薄水火不相射之義以乾坤定上下之位坎離列左右之門艮兌震巽皆相對而立葢乾兌震離皆屬陽巽坎艮坤皆屬隂悉以隂陽相配圖必從中起者葢萬事從心出之義卦必從復起者葢天開於子之義自一陽始生之復起冬至節歴離震之間為春分以至于乾為純陽是進而得其已生之卦如今日覆數昨日故曰數徃者順自一隂始生之姤起夏至節歴艮兌之間為秋分以至于坤為純隂是進而能推其未生之卦如今日逆計來日故曰知來者逆然夲其易之所成只是自乾一而兌二離三而震四巽五而坎六艮七而坤八如横圖之序與圓圖之右方而已故曰易逆數也雲峰胡氏曰諸儒訓釋此皆謂已徃而易見為順未來而前知為逆易主於前民用故曰易逆數也惟夲義依邵子以數徃者順一段為指圓圖而言卦氣之所以行易逆數一段為指橫圖而言卦畫之所以生非夲義發邵子之藴則學者孰知此所謂先天之學哉此夲義之功所以為大也右第三章雷以動之風以散之雨以潤之日以晅之艮以止之兌以說之乾以君之坤以藏之晅况晚反說音悅本義此卦位相對與上章同朱子曰雷以動之以下四句取象義多故以象言艮以止之以下四句取卦義多故以卦言乾以君之坤以藏之兩句恁地說得好節齋蔡氏曰動則物萌散則物具二者言生物之功也潤則物滋晅則物舒二者言長物之功也止則物成說則物遂二者言收物之功也君則物有所歸藏則物有所息二者言藏物之功也此章卦位相對與上章同而上章則言卦象自相為用此章則言八卦造物流行有生長收藏之事也建安􅉌氏曰雷動風散乾坤初爻相易而為震巽也雨潤日晅乾坤中爻相易而為坎離也止之說之乾坤終爻相易而為艮兌也此六子生物之序也然六子致用主於乾而動歸於坤而藏此又父母之功也故以乾坤終之雲峰胡氏曰自動至晅物之出機自止至藏物之入機出无於有氣之行也故以象言入有於无質之具也故以卦言右第四章雲峰胡氏曰此章卦位相對與上章同特上章先之以乾坤此章則終之以乾坤也潘氏夣旂曰上章先言乎天地之无為後言乎六子之相為用言天地之用六子也此章先言乎六子之職後言乎乾坤之道言六子非乾坤无以主之藏之也帝出乎震齊乎巽相見乎離致役乎坤說言乎兌戰乎乾勞乎坎成言乎艮說音悅後同勞去聲下同本義帝者天之主宰邵子曰此卦位乃文王所定所謂後天之學也朱子曰帝出乎震與萬物出乎震只這兩段說文王卦帝出乎震萬物發生便是他主宰從這裏出齊乎巽曉不得離中虛明可以為南方之卦坤安在西南不成西北方无地西方肅殺之地如何云萬物之所說乾西北也不可曉如何隂陽只來這裏相薄勞乎坎勞字去聲似乎慰勞之意言萬物皆歸藏乎此去安存慰勞他問戰乎乾何也曰此恐是箇肅殺收成底時節故曰戰乎乾問何以謂之隂陽相薄曰乾陽也乃居西北故曰隂陽相薄恐是如此也見端的未得勞乎坎是說萬物休息底意成言乎艮在東北是說萬物終始處又曰艮者萬物之所以成終而成始也猶春冬之交故其位在東北節齋蔡氏曰帝者以主宰乎物為言也出者發露之謂震居東方於時為春齊者畢達之謂巽居東南於時為春夏之交也相見物形明盛皆相見也離居南方於時為夏致猶委也委致於萬物无不養也坤居西南於時為秋夏之交也說言者物形至此充足而說也兌居西方於時為秋戰者陽氣始萌隂疑而戰也乾居西北於時為秋冬之交也勞者萬物歸藏於内而休息也坎居北方於時為冬成言者陽氣至北物之所成終而成始也艮居東北於時為冬春之交也雙湖胡氏曰自巽至兌皆隂卦忽與乾遇隂疑於陽必戰故曰戰乎乾龜山楊氏曰成言乎艮艮者萬物之所成終而成始止如此矣復出乎震不終止也故艮曰時止則止時行則行榕臺林氏曰出而齊齊而相見見而致養養而後說說而後戰戰而後勞勞而後成成而復出自然之序也雲峰胡氏曰自出震以至成言乎艮萬物生成之序也然孰生孰成之必有為之主宰者故謂之帝邵子曰此卦位乃文王所定所謂後天之學也葢以彖辭坤西南得朋蹇不利艮之東北而知之也萬物出乎震震東方也齊乎巽巽東南也齊也者言萬物之潔齊也離也者明也萬物皆相見南方之卦也聖人南面而聽天下嚮明而治葢取諸此也坤也者地也萬物皆致養焉故曰致役乎坤兌正秋也萬物之所說也故曰說言乎兌戰乎乾乾西北之卦也言隂陽相薄也坎者水也正北方之卦也勞卦也萬物之所歸也故曰勞乎坎艮東北之卦也萬物之所成終而所成始也故曰成言乎艮程子曰南北之位所以定者在坎離也坎離又不是人安排得來莫非自然也艮止也生也止則便生不止則不生此艮終始萬物又曰隂陽消長之際无截然斷絶之理故相纔掩過終始萬物萬物盛乎艮此儘神妙須研窮這箇理本義上言帝此言萬物之隨帝以出入也柴氏中行曰此言八卦見於一嵗之造化節齋蔡氏曰帝之出入不可見而為物者可見故又以物言焉氣无物不行物无氣不生然氣之生也有漸不能遽遍乎物自帝出乎震至成言乎艮一氣流行之漸萬物生成之功也震巽離乾坎艮皆以方言兌以時言坤以地言所以然者夫子欲備三者之義互言之耳是雖有三又足以見其未嘗相離之義雲峰胡氏曰離明以徳言八卦之徳可推坤地坎水以象言八卦之象可推兌秋以時言八卦之時可推以互見也坤於方獨不言西南坤土之用不止於西南也葢春屬木夏屬火夏而秋火克金者也火金之交有坤土焉則火生土土生金克者又順以相生秋屬金冬屬水冬而春水生木者也水木之交有艮土焉木克土土克水生者又逆以相克土金順以相生所以為秋之克木土逆以相克所以為春之生生生克克變化无窮孰主宰之曰帝是也誠齋楊氏曰由帝出乎震至于成言乎艮者帝之所乘也由萬物出乎震而至于成言乎艮者又萬物之所主也帝乘之萬物主之者悉皆由乎八卦也聖人象八卦而為治故南面而治取諸離離者陽明之卦萬物交相見之時其象曰大人以繼明照四方以之而垂拱豈不宜哉然聖人不獨取諸離以為治至于握乾符闡坤維興震巽坎兌之治无非取之也易取其一則其他可以類推矣抑嘗觀之帝與萬物所乘者皆八卦也於帝獨言致役乎坤而萬物言致養何耶曾不知坤於帝言致役者葢坤臣也帝君也君之於臣役之而已於萬物言致養者葢坤母也萬物子也母之於子養之而已至于他卦不言戰而乾言戰則乾西北之卦九十月之交隂盛陽微之時故不能无戰何則隂疑於陽必戰不然則坤之上六十月之卦也何以言龍戰於野由此而觀則言隂陽相薄之語不為虚設矣右第五章本義此章所推卦位之說多未詳者朱子曰文王八卦不可曉處多如離南坎北離坎却不應在南北且做水火居南北兌也不屬金如今只是見他底慣了一似合當恁地相似文王八卦坎艮震在東北離坤兌在西南所以分隂方陽方文王八卦有些似京房卦氣不取卦畫只取卦名京房卦氣以復中孚屯為次復陽氣之始也中孚陽實在内而未發也屯始發而艱難也只取名義文王八卦配四方四時離南坎北震東兌西若卦畫則不可移換進齋徐氏曰坎離天地之大用也得乾坤之中氣故離火居南坎水居北也震動也物生之初也故居東兌悅也物成之後也故居西北四者各居正位也震屬木巽亦屬木震陽木也巽隂木也故巽居東南已之位也兌屬金乾亦屬金兌隂金也乾陽金也故乾居西北亥之方也坤艮皆土也坤隂土艮陽土坤居西南艮居東北者所以均旺乎四時也此四者分居四隅也後天八卦以震巽離坤兌乾坎艮為次者震巽屬木木生火故離次之離火生土故坤次之坤土生金故兌乾次之金生水故坎次之水非土亦不能以生木故艮次之水土又生木水又生火八卦之用五行之主循環无窮此所以為造化流行之序也雙湖胡氏曰邵子以此章屬之文王八卦意其夲之文王卦辭坤卦西南得朋東北喪朋正此章之方位也蹇解卦辭亦然竊嘗謂帝出乎震至成言乎艮八句疑似八卦圓圖之題目萬物出乎震以下皆是解說或如朱子論天一地二章未可知也神也者妙萬物而為言者也動萬物者莫疾乎雷橈萬物者莫疾乎風燥萬物者莫熯乎火說萬物者莫說乎澤潤萬物者莫潤乎水終萬物始萬物者莫盛乎艮故水火相逮雷風不相悖山澤通氣然後能變化既成萬物也橈乃飽反熯呼但反說音悅悖必内反程子曰神是極妙之語天者理也神者妙萬物而為言者也帝者以主宰事而名本義此去乾坤而專言六子以見神之所為然其位序亦用上章之說未詳其義朱子曰水火相逮一段又似與上面水火不相射同又似是伏羲卦問前兩段說伏羲卦位後兩段自帝出乎震以下說文王卦位自神也者妙萬物而為言下有兩段前一段乃文王卦位後段乃伏羲底恐夫子之意以為伏羲文王所定方位不同如此然生育萬物既如文王所次則其方位非如伏羲所定亦不能變化既成萬物也无伏羲底則做文王底不出竊恐文義如此說較分明曰如是則其歸却主在伏羲上恁地說也好又曰此兩段却除了乾坤著一句神者妙萬物而為言引起則乾坤在其中矣且如雷風水火山澤自不可喚做神神者乃其所以動所以橈者是也文王八卦則兌震以長男而合少女艮巽以長女而合少男皆非其偶故自動萬物者莫疾乎雷至終萬物始萬物者莫盛乎艮皆别言六子之用故以四時之序次言之而用文王八卦之序下則推其所以成用在於隂陽各得其偶故用伏羲八卦之序若上用伏羲卦序則四時失其序下用文王八卦則兌震艮巽皆非其偶矣漢上朱氏曰上說天地定位六子致用此說六子合而為乾坤乾坤合而生神妙萬物而為言者物物自妙也鄭康成曰共成萬物不可得而分故合謂之神橫渠曰一則神兩則化妙萬物者一則神也南軒張氏曰八卦各有所在也而神則无在而无不在八卦各有所為也而神則无為而无不為强名之曰神者即其妙萬物而為言也龜山楊氏曰離帝而為神則其運无方其居无迹非妙萬物者能如是乎前論震離坎兌艮巽之屬則兼乾坤而言之此不言乾坤而言六子者豈非乾坤其始任六子以成功及其終也六子成其功以歸於乾坤乾坤則有不與者乎沙隨程氏曰始言六子之才各有所長終言六子之情各有所合建安丘氏曰序六子之用不及乾坤者六子之用皆乾坤之為也五卦皆言象而艮不言者終始萬物義不係於山也虞氏翻曰不言乾坤者乾主變坤主化言變化則乾坤備矣進齋徐氏曰伏羲八卦方位主造化對待之體而言文王八卦方位主造化流行之用而言對待非流行則不能變化流行非對待則不能自行平庵項氏曰動橈燥說潤盛皆據後天分治之序而相逮不相悖通氣變化復據先天相合之位者明五氣順布四季分王之時而无極之真二五之精所以妙合而凝者未始有戾於先天之事也苟无此章則文王為无體而伏羲為无用矣故讀易者如此不可不深玩也相逮與不相射相薄與不相悖此皆互言之也右第六章平庵項氏曰上章陳八卦辨其分治之跡此章舉八物明其氣化之神雲峰胡氏曰以上第三章第四章言先天第五章言後天此第六章則由後天而推先天者也去乾坤而專言六子以見神之所為言神則乾坤在其中矣雷之所以動風之所以橈以至艮之所以終所以始皆神之所為也然後天之所以變化者實由先天而來先天水火相逮以次隂陽之交合後天雷動風橈以次五行之變化惟其交合之妙如此然後變化之妙亦如此乾健也坤順也震動也巽入也坎陷也離麗也艮止也兌說也本義此言八卦之性情朱子曰八卦之性情謂之性者言其性如此又謂之情者言其發用處亦如此如乾之健夲性如此用時亦如此伏羲畫八卦只此數畫該盡萬物之理陽在下為震震動也在上為艮艮止也陽在下自動在上自止節齋蔡氏曰乾純陽剛故健坤純隂柔故順震坎艮陽卦陽生乎二隂之下則剛而進故動在二隂之中則剛為隂所溺故陷出二隂之上雖剛則亦无所徃矣故止巽離兌隂卦隂成乎二陽之下以順而伏故入在二陽之中以順而附故麗在二陽之上以順而見故說雲峰胡氏曰夫子欲於下文言八卦之象故先言其性情如此象者其似性情者其真彖傳於巽不言入而直言巽坎不言陷而言險離罕言麗而言明則又得其真矣右第七章臨川吳氏曰此章以八字斷八卦之徳其下乃以物以身以家依八徳之類而分主之自此以下皆以隂陽純卦及初中終為序又非上章先天後天之序也乾為馬坤為牛震為龍巽為雞坎為豕離為雉艮為狗兌為羊夲義逺取諸物如此或問易之象朱子曰便是理㑹不得如乾為馬而乾之象却專說龍如此之類皆不通易中占辭其取象亦有來歴不是假説譬喻但今以說卦求之多所不通故不得已而闕之或且從先儒之說耳徐彦章說夲義只說得箇占其說不然說象牵合不得為坤為牛遍求諸卦必要尋箇牛或以一體取或以一爻取如坤牛不可見便於離一畫是牛頤之龜又虎視更說不得又曰易象也須有此理但恁地零零碎碎去牵合附㑹得來不濟事須是見他一箇大原許多名物件數皆貫通在裏面方是臨川吳氏曰健而行不息者馬也順而勝重載者牛也以動奮之身而静息於地勢重隂之下與地雷同其寂者龍也龍之潛於淵底者重隂之處也以入伏之身而出聲於天氣重陽之内與地風同其感者鷄也鷄之鳴於丑半者重陽之時也或曰鷄之行首動於前足動於中身不動而隨其後能動之二陽在前在中不動之一隂在後也前後皆隂之汚濁而中心剛躁者豕也前後皆陽之文明而中心柔怯者雉也外剛能止物而中内柔媚者狗也外柔能說草而中内剛狠者羊也此以動類之八物擬八卦也平庵項氏曰造化權輿云馬乾象故蹄圓牛坤象故蹄拼括蒼龔氏曰鷄羽屬也而能飛其性則為入為伏知時而善應故巽為鷄南軒張氏曰豕主汚濕其性趨下故坎為豕雉性耿介而外文明故離為雉艮為狗言其止於人而能止人也雲峰胡氏曰周公以乾為龍而夫子以為馬文王以坤為牝馬而夫子以為牛以見象之不必泥也如此學易者必以坤為牛或以一體取或以一爻取或以互變體爻取至不可取則又取離之牝牛其鑿甚矣要之天地間萬物无非易也又豈特此八物哉觸類而長之可也右第八章雙湖胡氏曰夫子於八卦取象有括文王周公彖爻之例者有自括大象之例者又有於說卦别取者如上章天地山澤雷風水火是括大象之例如此章乾馬兌羊巽鷄離雉是括周公爻例周公於大畜乾爻稱馬大壯以兌稱羊中孚巽爻稱鷄睽互坎卦稱豕至若坤牛震龍艮狗實夫子於說卦又有所取而前聖未有其例者也下章皆然數聖人取象夲各不同如必欲執彖爻之象盡求合於說卦則多不通矣乾為首坤為腹震為足巽為股坎為耳離為目艮為手兌為口本義近取諸身如此或問艮何以如手朱子曰手去捉定那物便是艮又問捉物乃手之用不見取象正意曰也只是大槩略恁地建安􅉌氏曰首㑹諸陽尊而在上腹藏諸隂大而容物足在下而動股兩垂而下耳輪内陷陽在内而聰目睛附外陽在外而明手剛在前口開于上又曰震陽動于下為足艮陽止于上為手手上而足下也巽隂兩開于下為股兌隂兩拆于上為口口上而股下也平庵項氏曰足動股隨雷風相與也耳日通竅水火相逮也口與鼻通山澤通氣也漢上朱氏曰人之經脈十有二其六動於足其六動於手動於足者震之陽自下而升動於手者艮之陽自上而止震艮相反疾走者掉臂束手者緩行坎為耳陽陷乎隂也輪偶者隂也竅竒者坎中之陽也精脫腎水竭則撟離為目隂麗乎陽也陽中有隂故肉白隂中有陽故睛黑精竭者目肓離火无所麗也離為目寐者神棲於心其日昃乎寤者神見於目其日出乎故寐者形閉坤之闔也寤者形開乾之闢也一闔一闢目瞑耳聽唯善用者能達耳目於外唯善養者能反耳目於内也雲峰胡氏曰八卦近取諸身如此要之一身之中无非易也又豈特此八者為然哉息齋余氏曰八卦之象近取諸身者六子以反對逺取諸物者六子以序對四者易而坎離不易也首以君之腹以藏之足履於下為動手持於上為止股下岐而伏口上竅而見耳外虚目内虛各以反對也其在物乾坤與二少皆取走二長二中一走一飛龍者走之飛鷄者飛之走各以序對也右第九章雙湖胡氏曰夫子於此章取象坤為腹與明夷六四同巽為股與咸九三互體同兌為口與咸上六輔頰舌同外餘皆自取乾天也故稱乎父坤地也故稱乎母震一索而得男故謂之長男巽一索而得女故謂之長女坎再索而得男故謂之中男離再索而得女故謂之中女艮三索而得男故謂之少男兌三索而得女故謂之少女索色白反長丁丈反少詩照反下章同本義索求也謂揲蓍以求爻也男女指卦中一隂一陽之爻而言朱子曰八卦次序是伏羲底此時未有文王次序三索而為六子這自是文王底各自有箇道理非震一索而得男乃是一索得陽爻而後成震一說是就變體上說謂就坤上求得一陽爻而成震卦一說乃是說揲蓍求卦求得一陽後面二隂便是震求得一隂後面二陽便是巽又曰看來不當專作揲蓍看揲蓍有不依這序時便說不通大槩只是乾求於坤而得震坎艮坤求於乾而得巽離兌一二三者以其畫之次序言也一索再索之說初問畫卦時也不恁地只是畫成八卦後便見有此象耳節齋蔡氏曰乾坤交而生震巽坎離艮兌故以能生者為父母而生者為子一索再索三索者以初中終三畫而取此長中少之序也震坎艮皆陽故曰男巽離兌皆隂故曰女平庵項氏曰乾坤六子初為氣末為形中為精雷風氣也山澤形也水火精也漢上朱氏曰將說天地生萬物而先言人者天地之性人為貴萬物皆備於人也乾天也為隂之父坤地也為陽之母萬物分天地也男女分萬物也察乎此則天北與我竝生萬物與我同體是故聖人親其親長其長而天下平伐一草木殺一禽獸非其時謂之不孝柴氏中行曰先儒不以此章竝於諸象是惑於謂之之語而未循夲以求之也又但知男女之為人而未知物物有男女之象天地之性人為貴故以人言之耳不然何以别象中有為父為長子為長女為中女為少男等語與此章所稱无異此葢以男女分八卦言也物皆有雌雄牝牡之異則父母男女之象也其生皆有先後次序之異則長中少之象也或曰乾坤生萬物有男女之别固也其生也皆生孰見其長中少之異有長中少之異者物自為父母而生也殊不知父母之生即天地之生也豈於父母之外别有天地之生乎雲峰胡氏曰此章夲義乃朱子未改正之筆要當以語錄說為正若專言揲蓍求卦則无復此卦序矣要之卦畫已成之後方見有父母男女之象非卦之初畫時即有此象也讀者詳之右第十章乾為天為圜為君為父為玉為金為寒為冰為大赤為良馬為老馬為瘠馬為駁馬為木果圜音圓駁邦角反程子曰說卦於乾雖言為天又言為金為玉以至為駁馬為良馬為木果之類豈盡言天若此者所謂類萬物之情也故孔子推明之曰此卦於天文地理則為某物於鳥獸草木則為某物於身於物則為某物各以例舉不盡言也學者觸類而求之則思過半矣不然說卦所叙何所用之本義苟九家此下有為龍為直為衣為言朱子曰卦象指文王卦言所以乾言為寒為冰苟爽有集九家易解十卷節齋蔡氏曰積陽為天陽體動為圜尊而在上為君圜而在上為木果沙隨程氏曰為圜天之體也為君居上而覆下也為玉德粹也為金堅剛也為寒位西北也為冰寒之凝也為大赤盛陽之色也為木果以實承實也若艮為果蓏則下有柔者存焉𤓰山潘氏曰圜无端也息齋余氏曰乾為寒者隂不生於隂而生於陽也冰者隂之變而剛者也縉雲馮氏曰乾居西北卦氣為立冬之節水始冰之時故為寒為冰平庵項氏曰良馬徳莫加焉駁馬鋸牙食虎力莫加焉老馬智最髙瘠馬筋骨至峻鄱陽董氏曰按韵㑹駁獸如馬鋸牙食虎豹宋劉敞奉使契丹時順州山中有異獸如馬而食虎豹虜人不識以問公曰此駁也為言形狀音聲皆是虜歎服之又駁馬色不純或曰純極而駁生焉臨川吳氏曰坎中陽為赤乾純陽赤加大字以别於坎也馬加良老瘠駁四字以見純陽无隂異於震坎隂陽相襍之馬也良謂純陽健之最善者也老謂老陽健之最乆者也瘠謂多骨少肉健之最堅强者也駁馬鋸牙食虎豹健之最威猛者也楊氏曰果實而不剝於隂為木果如剝之碩果不食是也雙湖胡氏曰乾无所不統為君變生六子為父爻剛位間柔相濟為玉爻純剛為金金故為寒金生水水極寒為冰又乾為天而貫四時故在秋冬為寒為冰在夏為大赤純陽而健為馬在春為良夏為老秋為瘠冬為駁乾取象无所不包不可與諸卦例論故發其義又曰夫子取乾象稱馬夲之大畜爻外餘皆所自取如乾天坤地之類亦夫子彖傳大象所取也坤為地為母為布為釡為吝嗇為均為子母牛為大輿為文為衆為柄其於地也為黑釡房甫反嗇音色本義苟九家有為牝為迷為方為囊為裳為黃為帛為漿進齋徐氏曰坤積隂於下故為地物資以生故為母動闢而廣故為布為均虚而容物故為釡静翕而不施故為吝嗇性順故為子母牛厚而載物故為大輿坤畫偶故為文偶畫多故為衆有形可執故為柄純隂故於色為黑融堂錢氏曰吝嗇至隂之性女子小人未有不吝嗇者為文正蒙曰坤為文衆色也又曰物之生於地至雜而文柄者生物之權南軒張氏曰均者其勢均平而无偏陂者也臨川吳氏曰為布旁有邊幅而中平廣也為大輿三畫虚所容載者多也坎惟二畫虚亦為輿而不得為大也為柄謂在下而承物於上凡執持之物其夲著地者柄也其於物也為黒地之土色有五若坤之所象則為地為黑土也黒者隂極之色也息齋余氏曰金玉自然之寳布釡皆出於金然受變於模冶而成此所以為效法之坤歟布謂泉也又曰吝嗇者翕之守也均者闢之敷也柄也者勤於造事而不名其功者歟雙湖胡氏曰夫子取坤象稱輿夲之剝上九爻稱衆夲之晉六三爻餘皆所自取震為雷為龍為元黃為旉為大塗為長子為決躁為蒼􅀢竹為萑葦其於馬也為善鳴為馵足為作足為的顙其於稼也為反生其究為健為蕃鮮旉音孚筤音郎萑音九馵主樹反蕃音煩本義荀九家有為玉為鵠為鼔張子曰隂氣凝聚陽在内者不得出則奮擊而為雷節齋蔡氏曰陽動於下故為雷隂陽始交故為元黄陽氣始施故為旉萬物畢出故為大塗動故為决躁氣始亨故於馬為善鳴陽在下故又為馵足為作足隂在上故為的顙的白也而顙在上也詩所謂白顚傳所謂的顱是也剛反動於下故於稼為反生陽長必終於乾故其究為健臨川吳氏曰為元黃乾坤始交而生震故兼有天地之色得乾初畫為元得坤中畫上畫為黃孔疏謂元黃雜而成蒼色也為旉字又作􅞉與華通花蒂下連而上分為花出也為大塗一奇動於内而二偶開通前无壅塞也為决躁决者陽生於下而上進以决隂躁者陽之動也為蒼莨竹蒼深青色筤謂色之美葢竹之筠也為萑葦萑荻葦蘆竹萑葦皆下夲實而上榦虚其於馬也為善鳴為馵足為作足為的顙善鳴者陽在内為聲上畫偶口開出聲也馵足足骹白陽之色作足足超起陽之健皆言下畫之陽也的顙額有旋毛中虚如射者之的言上畫之虚也其於稼也為反生稼諸穀之類反生萌芽自下而生反勾向上陽在下也其究為健中上二畫變則為乾也為蕃鮮蕃盛而鮮美謂春生之草也草下一根而葉分開於上也雙湖胡氏曰夫子取震卦象稱雷夲彖辭震驚百里稱長子夲師六五爻互震體稱馬夲屯卦諸爻餘皆自取巽為木為風為長女為䋲直為工為白為長為髙為進退為不果為臭其於人也為寡髮為廣顙為多白眼為近利市三倍其究為躁卦本義荀九家有為楊為鸛張子曰隂氣凝聚陽在外者不得入則周旋不舍而為風進齋徐氏曰巽入也物之入者莫如木氣之善入者莫如風䋲糾木之曲而取直者工引䋲之直而制木者巽徳之制故為䋲直為工巽少隂故於色為白木下入而上升故為長為髙隂性多疑故為進退為不果隂伏於下氣欝不散故為臭髪隂也陽盛於上為寡髪二陽在上為廣顙離為目反離中爻於下故為多白眼隂得乎陽故為近利市三倍或謂離日中為市而巽近之故有此象震為決躁巽三爻皆變則為震故其究為躁卦融堂錢氏曰為木者榦陽而根隂也為長者風行也為髙者木性也寡髪者隂血不升廣顙者陽氣上盛也節齋蔡氏曰為進退不果者一隂盤旋於二陽之下也臨川吳氏曰臭者香羶腥焦朽之五氣凡物有聲色臭味聲臭屬陽色味屬隂巽二陽外逹故為臭反以三隅則震一陽内主為聲兌者巽之反體為味艮者震之反體為色也為寡髪為廣顙為多白眼皆上陽盛也以頭言隂血盛者髮多陽氣盛者髮少以顙言陽體勝者額廣隂體勝者額狹以眼言白者為陽黒者為隂離目上下白而黑者居中黒白相間而停勻巽目上中白而黑者在下上白多於黑也為近利市三倍義理陽也利市隂也震陽在内義理主於内也故一剛為主於内之卦為无妄巽隂在内利欲主於内也故為近利曰市三倍者猶詩言賈三倍謂市物而得利三倍近利之至甚者也其究為躁卦三畫皆變則為震也震之三畫皆變則成巽巽之中上二畫變則成坤於震不變其初畫之陽而但變其中上二畫故其究為乾而不為巽於巽先變其初畫之隂而盡變其初中上三畫故其究為震而不為坤葢喜隂卦為陽卦陽卦為純陽卦而不欲陽卦為隂卦隂卦為純隂也雙湖胡氏曰夫子於巽卦取象稱木夲之漸六四外餘皆自取坎為水為溝瀆為隐伏為矯輮為弓輪其於人也為加憂為心病為耳痛為血卦為赤其於馬也為美脊為亟心為下首為薄蹄為曵其於輿也為多眚為通為月為盜其於木也為堅多心輮如九反亟紀力反曵以制反本義荀九家有為宮為律為可為棟為叢棘為狐為蒺藜為桎梏閻氏彦升曰坎一陽在内而明二隂在外而陷内明外陷故為水溝瀆所以行水水流而不盈故為溝瀆進齋徐氏曰内明外暗者水與月也坎内陽外隂故為水為月陽匿隂中故為隱伏為盜太𤣥以水為盜隂陽家以𤣥武為盜以其皆屬北方之坎也陽在隂中抑而能制故為矯輮為弓輪矯者矯曲而使之直輮者輮直而使之曲也弓葢二十八所以蔽其車之上輪輻三十六所以載其下弓與輪皆矯輮之所成也陽陷隂中故為加憂心耳皆以虚為體坎中實則為病為痛三畫之卦上畫為馬顙下畫為馬足坎中畫陽故為美脊為亟心上柔故又為下首下柔故又為薄蹄為曵柔在下不任重故於輿為多眚坎維心亨故為通剛在中故於木為堅多心鄭氏正夫曰陽居中而无隂以蔽之則見而不隱陽在下而動得時則起而不伏坎則隂陷陽而包之故為隱伏素問金在志為憂水在志為恐恐則甚於憂故為加憂火藏在心坎水勝之故為心病水藏在腎開竅於耳而水在志為恐恐則傷腎故為耳痛氣為陽運動常顯血為隂流行常幽血在形如水在天地間故為血卦臨川王氏曰水之勢一曲一直一方一圓皆順其勢之所利而因其人之所導故為矯輮臨川吳氏曰為血卦離火在人身為氣坎水在人身為血也為赤者得乾中畫之陽故與乾同色也其於馬也為美脊為亟心為下首為薄蹄脊者外體之中心者内藏之中坎陽在中故脊美心亟急也前畫柔故首下而不昂下畫柔故蹄薄而不厚其於輿為多眚者謂有險陷而多阻礙也葢行於險道不若坤輿之行於平地者易且安也沙隨程氏曰坎為馬為曵者陷則失健也潘氏夣旂曰通者水之性月者水之精也雙湖胡氏曰夫子取坎卦象如輪夲既未濟爻如心夲坎卦彖如血夲需卦爻如馬夲屯卦爻如輿夲睽卦爻如盜夲䝉賁等卦爻此外皆自取離為火為日為電為中女為甲胄為戈兵其於人也為大腹為乾卦為鼈為蟹為蠃為蚌為龜其於木也為科上槁乾音干蟹户買反蠃力禾反蚌歩項反本義荀九家有為牝牛節齋蔡氏曰内暗外明者火與日也離内隂外陽故為火為日隂麗於陽則明故為電剛在外故為甲胄為戈兵中虚故於人為大腹火熯燥故為乾卦外剛内柔故為鼈為蟹為蠃為蚌為龜中虚故於為科上槁科空也木既中空上必枯槁矣南軒張氏曰甲胄外堅所以象乾之畫戈兵上銳所以象離之性腹隂而有容坤為腹離得坤中爻亦為腹楊氏曰鼈性静取其中畫之柔蟹性躁取其上下二畫之剛蠃取善麗之象蚌取中虚之象龜取文明之象張子曰離為乾卦於木為科上槁附而燥也括蒼龔氏曰科上槁中虛而外乾也雙湖胡氏曰按張子謂附而燥是不以科為木科為水盈科之科謂科巢之附於木上者也科中虛有離象燥則科上之木乾燥耳如鵲巢之類皆是以木枝結構而成也又按夫子取離卦象如日夲離晉革豐彖辭如龜夲頤損益似體此外皆所自取艮為山為徑路為小石為門闕為果蓏為閽寺為指為狗為䑕為黔喙之屬其於木也為堅多節蓏力火反黔其亷反喙况廢反本義荀九家有為鼻為虎為狐陳安卿說麻衣易以艮為鼻朱子曰鼻者面之山晉管輅已如此說鄭氏正夫曰静以止者山也臨川吳氏曰為徑路徑者路之小也艮者震之反體髙山之上成蹊非如平地之大塗也為小石剛在坤土之上象山頂髙處之小石坎剛在坤土之中則象平地土中之大石也為門闕闕者門之出入處上畫連亘中下二畫雙峙而虚似門闕也為果蓏果者木實蓏者草實乾純剛故為木果艮一剛在上者木之果二柔在下者草之蓏為䑕為黔喙之屬皆謂前剛也黔字當與鈐通以鐡持束物者黔喙之屬山居猛獸齒牙堅利如鐵能食生物者也其於木也為堅多節剛在外也平庵項氏曰震為旉為蕃鮮草木之始也艮為果蓏草木之終也果蓏能終又能始故於艮之象為切開封耿氏曰周官閽人掌王宮中門之禁止物之不應入者寺人掌王之内人及宮女之戒令止物之不得出者皆為阻於前而衛内之柔者也冷氏曰鳥善以喙止物者黔喙之屬也巽能曲直故為木之全材坎陽内故堅多心艮陽上故堅多節離為火於木生盛則藏於夲生衰則顯於末故為科上槁白雲郭氏曰三陽卦艮獨不言馬者其剛在上所用益小故於獸畜无行健之功徒有囓噬之象雙湖胡氏曰艮為山一陽髙出二隂之上而止其所也為指艮為手而所用以止物者又在指也又按夫子取艮卦象如石本之豫互體之爻如䑕本之晉互體之爻如果本之剝上爻此外皆所自取兌為澤為少女為巫為口舌為毁折為附決其於地也為剛鹵為妾為羊鹵力杜反本義荀九家有為常為輔頰進齋徐氏曰隂停於外故為澤巫口舌之官以口語說神者兌上拆口象故為巫為口舌金氣始殺條枯始落故為毁折柔附於剛剛能決柔故曰附決潤極故為剛鹵陽在下為剛隂在上為鹵剛鹵之地不能生物鹵者水之死氣也坎水絶於下而澤見於上則足以為鹵而已節齋蔡氏曰少女從姊為娣故為妾内狠外說故為羊漢上朱氏曰澤者水之聚二陽沉於下一隂見於上坎兌一也故坎壅成澤澤決成川口者說見於外也舌者動於内也鄭氏正夫曰通乎幽者以言說乎神故為巫交乎顯者以言說乎人故為口舌融堂錢氏曰為毁折上柔象為剛鹵水夲柔也凝而鹵陽聚於下也息齋余氏曰隂在上皆有決義震陽動故躁兌隂說故附決躁者有所去以逹其怒也附決者始雖親而終不免於去也平庵項氏曰地之鹵非不潤也暫熯而乾已而復潤天下之潤者莫乆焉然不生物以其潤氣之在外也見於外者其上則甘而為露露之凝為霜其下則鹹而為鹵鹵之凝也為鹽二者皆殺物之具也鄭少梅謂剛者出金鹵者出鹽雖不生五榖而寳藏興焉此天地之仁也沙隨程氏曰八卦之象八物而已充其類則有所謂百物不廢者極其說則又可以類萬物之情然說卦之象有與卦爻相符者如乾為天坤為地之類是也有不與卦爻相符者如乾坤稱龍而不必在震坤屯稱馬而不必在乾之類是也有見於卦爻而說卦不載者如漸之鴻中孚之豚魚之類是也有見於說卦而卦无之者如為釡為布為蠃為蚌之類是也若夫大琴謂之離小罍謂之坎此見於他書而易與說卦又可以類推也進齋徐氏曰易道无窮苟通其類可以盡利王弼所謂忘象忘言固非說卦之意而荀九家又逐一附益於說卦之後亦豈足以盡擬議之神哉右第十一章本義此章廣八卦之象其間多不可曉者求之於經亦不盡合也雲峰胡氏曰此章廣八卦之象凡百十有二夲義以為多有不可曉葢有當解者有不必强解者其中有相對取象者如乾為天坤為地之類是也上文乾為馬此則為良馬老馬瘠馬駁馬良取其德老取其知瘠取其骨駁取其力皆取其健也上文坤為牛此則為子母牛取其生生有繼兼取其順也乾為木果結於上而圓坤為大輿載於下而方震為决躁巽為進退為不果剛柔之性也震巽獨以其究言剛柔之始也坎内陽外隂水與月則内明外暗離内隂外陽火與日則内暗外明坎中實故於人為加憂為心病為耳痛離中虛故於人為大腹艮為閽寺為指陽之止也兌為巫為口舌隂之說也有相反取象者震為大塗反而艮則為徑路大塗陽闢乎隂无險阻也徑路陽阻而下隂不能闢也巽為長為髙反而兌則為毁折長且髙者陽之上逹毁而折者隂之上窮也有相因取象者乾為馬震得乾初之陽故於馬為善鳴馵足作足的顙震陽下而隂上也坎得乾中爻之陽故於馬為美脊亟心下首薄蹄曵坎陽中而隂外也善鳴似乾馬之良美脊似乾馬之脊也作足者陽下而强薄蹄者隂下而弱也坤為大輿坎為輿為多眚坤中虛而力能載坎中滿而下无力也巽為木榦陽而根隂也坎中陽故於木為堅多心艮上陽故於木為堅多節離中隂而虛故於木為科上槁震為敷乾為木果震之一陽花之敷乾之三陽果之結乾為木果艮為果蓏果陽在上果蓏陽上而隂下也有一卦之中自相因取象者坎為隱伏因而為盜巽為繩直因而為工艮為門闕因而為閽寺兌為口舌因而為巫有不言而互見者乾為君以見坤之為臣乾為圜以見坤之為方吝嗇者隂之翕也以見陽之闢均者地之平也以見天之髙為文者物生於地雜而可見也知其始於天者不可見矣為柄者有形之可執也乾之氣不可執矣離為乾卦以見坎之為溼坎為血卦以見離之為氣巽為臭以見震之為聲巽離兌三女震為長子而坎艮不言者尊嫡也於陽之長者尊之也兌少女為妾而巽離不言者少女從姊為娣於隂之少者卑之也坎為馬震坎得乾之陽皆言馬而艮不言者艮止也止之性非馬也他可以觸類而通矣柴氏中行曰易自太極而分隂陽變化在物莫非象也為馬為首稱乎父三章正象也為天以下八章别象也今以一物言之使人以類觀則八卦何物而不具且乾為馬為首以下亦馬一體象也男女之分亦馬牝牡象也别而言之於乾又有良老瘠駁之不同於震又有善鳴馵足作足的顙之各異於坎又有美脊亟心下首薄蹄之别坤之象又為牝馬自此推之豈一端哉又曰此八卦别象然自坤而降或曰其於地其於人其於馬其於輿其於稼其於木唯乾无之何也葢物不足以盡卦則正言為天為地之類卦不足以盡物則有其於人其於木之類至於乾之為道无不周徧萬物皆不足以盡之故无所言焉八卦之象反而求之皆不出吾身而已精之為道徳性命粗之為形色聲容内之為視聽言動外之為君臣父子大而至於手足微而至於爪髪皆不越乎八卦八卦何物也太極也太極何物也至中至正不偏不倚道之大原也人徒知以七尺之軀戴天履地飢食渴飲與造化日夜運轉消息盈虚屈伸徃來之中孰知自頂至踵天之與我者有如是至精至妙至廣至大之理是吾身也大而天地微而蟲魚草木幽而鬼神之理明而事變之迹亦然也上極天地之始下極天地之終亦然也吾能反身而誠默而識之不言而信則大足以參天地微足以育庶物幽无愧於神明无忤於人直與天地相為終始是則豈直俟不惑而已至所謂象者眞筌蹄耳雙湖胡氏曰說卦之象夫子自取為多括前聖之例為少故求之於經不盡合也嘗考之說卦所論八卦方位之不同夫子初未嘗有先後天之分也自邵子發明之朱子表章之然後羲文之易辨明於世而夫子所論八卦方位之不同始各有歸著俾學者觀於卦位之對待流行而先後天之分較然矣今觀第六章自神也者妙萬物而為言至莫盛乎艮是承前章論後天八卦之位自水火不相逮至既成萬物也仍是先天八卦位次啓蒙亦已言之矣若自第七章至第十章啓蒙引之以為文王觀已成之卦推未明之象以為說而謂之後天之學入用之位竊謂自七章至篇末十一章皆先天八卦位次而夫子推未明之象以為說故其卦次與第三章第四章同姑附聽說于此序卦傳程子曰韓康伯謂序卦非易之藴此不合道或問序卦非聖人之書信乎朱子曰此沙隨程氏之說也先儒以為非聖人之蘊某以為謂之非聖人之精則可謂非易之蘊則不可周子分精與蘊字甚分明序卦却是易之蘊事事夾襍都有在這裏面問如何謂易之精曰如易有太極是生兩儀兩儀生四象四象生八卦這是易之精問如序卦中亦見消長進退之義喚作不是精不得曰此正是事事夾襍有在裏面正是蘊須是自一箇生出以至于无窮便是精序卦首言天地萬物男女夫婦是因咸恒為夫婦之道說起非如舊人分天道人事之說大率上經用乾坤坎離為始終下經便當用艮兌巽震為始終問易上經三十卦下經三十四卦多寡不均何也曰卦有正對有反對乾坤坎離頤大過中孚小過八卦正對也正對不變故反覆觀之止成八卦其餘五十六卦反對也反對者皆變故反覆觀之共二十八卦以正對卦合反對卦觀之總而為三十六卦其在上經不變卦凡六乾坤坎離頤大過是也自屯蒙以下二十四卦反之則為十二以十二而加六則十八也其在下經不變卦凡二中孚小過是也自咸恒而下三十二卦反之則為十六以十六而加二亦十八也其多寡之數則未嘗不均也臨川吳氏曰羲皇六十四卦之序始乾終坤葢奇畫偶畫之上每加一奇一偶二而四四而八八而十六十六而三十二以極於六十四乃其生卦自然之序非人所安排也後之易各囚羲皇之卦而其序不同如連山之首艮歸藏之首坤不復可知其六十四卦之序何如矣始乾坤終既濟未濟者周易六十四卦之序也葢文王既立卦名之後而次其先後之序如此皆以施用於人事者起義而夫子為之傳以發明其卦序之意或者乃疑其非夫子之作張子曰序卦不可謂非聖人之藴其間雖无極至精義大槩皆有意思今欲安置一物猶求審處况聖人之於易必須布遍精宻如是大匠豈以一斧可知哉雙湖胡氏曰文王序卦大抵本先天圖以東西南北四方正卦乾坤坎離為上經之始終以西北隅艮東南隅兌合而為咸西南隅巽東北隅震合而為恒四隅反卦為下經之始而終之以既未濟則亦坎離之交不交也故乾坤坎離四純卦皆居上經震巽艮兌四純卦皆居下經又以反對為次雖非伏羲之舊而先天一圖大㫖則備見焉夫子序卦直以卦名發其次第之義而他則未暇及耳又按呂氏要㫖曰易變易也天下有可變之理聖人有能變之道反需為訟泰為否隨為蠱晉為明夷家人為睽此不善變者也反剝為復遯為壯蹇為解損為益困為井此善變者也文王示人以可變之機則危可安亂可治特在一轉移間爾後天之學其以人事贊天地之妙歟又嘗合上下經始終而論之乾坤天地也坎離水火也以體言也咸恒夫婦也既未濟水火之交不交也以用言也上經以天道為主具人道於其中下經以人道為主具天道於其内三才之間坎離最為切用日月不運寒暑不成矣民非水火不生活矣心火炎躁而不降腎水涸竭而不升百病侵陵矣故上下經皆以坎離為終焉有天地然後萬物生焉臨川吳氏曰此言乾坤所以為上經之首也天地謂乾坤二卦雙湖胡氏曰乾坤為上經主自坎離外諸卦皆乾坤㑹遇盈天地之間者唯萬物故受之以屯屯者盈也屯者物之始生也張子曰聚而不得出故盈雖雷亦然平庵項氏曰屯不訓盈剛柔始交雷雨動盪其氣充盈故謂之盈耳謂物之始生者其時也若屯之訓紛紜盤錯之義耳物生必蒙故受之以蒙雙湖胡氏曰乾坤後次屯䝉者震坎艮以三男代父母用事雖无乾坤正體然三男實坤三索於乾而得有互體之坤亦是坤與三男㑹也蒙者蒙也物之穉也物穉不可不養也故受之以需需者飲食之道也漢上朱氏曰幼稚而无以養之則夭閼不遂蓄徳養才者亦然南軒張氏曰需者乃養之以中正為飲食之道也雙湖胡氏曰中正取五爻象然需待亦有從容不廹後其食之道飲食必有訟故受之以訟漢上朱氏曰乾餱以愆豕酒生禍有血氣者必有争心故次以訟訟必有衆起故受之以師師者衆也衆必有所比故受之以比雙湖胡氏曰需訟之後坤遇坎而為師比自屯至比三男卦震艮各一用坎獨六用者亦見天地間水為最多猶人一身无非血脈之流轉也比者比也比必有所畜故受之以小畜物畜然後有禮故受之以履張子曰徳積則行必有方物積則散必有道平庵項氏曰履不訓禮人之所履未有外於禮者故以履為有禮也雙湖胡氏曰師比後乾方與巽兌㑹成小畜履此長少二女代兄從父始入用惟離中女未用耳乾坤至此十變十成數也隂陽之氣一周矣履而泰然後安故受之以泰本義晁氏云鄭无而泰二字漢上朱氏曰禮者履而行之者也所履者君子之大道故其心泰然西安故次之以泰鄱陽董氏曰人有禮則安无禮則危正此意也泰者通也物不可以終通故受之以否南軒張氏曰治亂相仍如環无端物安有乆通者乎故受之以否夫泰而驕所以致否否而畏所以復泰雙湖胡氏曰小畜履後乾坤自相遇成泰否然乾坤十變方泰何其難泰一變即否何其易履其交處其㑹者宜知警戒為變化持守之道可也物不可以終否故受之以同人與人同者物必歸焉故受之以大有涷水司馬氏曰否者物不相交之卦不相交則異異則争争則窮故受之以同人同人者所以通之也物通則大有矣雙湖胡氏曰泰否而後乾坤異處乾自與離相遇為同人大有至此則離始入用而三女之卦全用矣有大者不可以盈故受之以謙漢上朱氏曰認物之歸為已有者必驕驕則亢滿大復為累矣有大者不可盈故次以謙有大而能謙必豫故受之以豫雙湖胡氏曰同人大有後坤又自與艮震相遇成謙豫亦為長少二男之從母也至此震艮二男復用事矣豫必有隨故受之以隨以喜隨人者必有事故受之以蠱漢上朱氏曰以喜隨人必有所事臣事君子事父婦事夫弟子事師非樂於所事者其肻隨乎雙湖胡氏曰謙豫後震兌巽艮㑹男女長少成隨蠱若无預乾坤其實乾坤三隂三陽雜居隨自否初上變蠱自泰初爻上變謂非由於乾坤可乎蠱者事也平庵項氏曰蠱者壞也物壊則萬事生矣事因壞而起故以蠱為事之先有事而後可大故受之以臨韓氏康伯曰可大之業由事以生臨川吳氏曰因蠱之有事而後有臨之盛大也臨者大也臨川吳氏曰臨不訓大大者以上臨下以大臨小凡稱臨者皆大者之號故以大稱之若豐者大也則直訓大也是以六十四卦有二大而不相妨焉南軒張氏曰臨者二陽進而四隂退駸駸向於大矣物大然後可觀故受之以觀以觀之觀去聲餘如字臨川吳氏曰物之小者在下視之而不見必大而後可以觀也以臨卦二陽之大反易其體則大者在上矣故為在下四隂之所觀南軒張氏曰天下皆山也唯泰山可觀天下皆水也唯東海可觀葢物大然後可觀况於人乎雙湖胡氏曰隨蠱而後坤與巽兌相遇而為臨觀亦為長少二女之從母也可觀而後有所合故受之以噬嗑漢上朱氏曰在上无可觀在下引而去矣非可觀而能有嗑乎嗑者合也物不可以苟合而已故受之以賁龜山楊氏曰物不可以苟合无故而合者必无故而離又在乎賁以飾之東坡蘇氏曰君臣父子夫婦朋友之際所謂合也直情而行之謂之苟禮以飾情謂之賁苟則易合合則相凟相凟則易以離賁則難合難合則相敬敬則乆矣臨川吳氏曰不執贄則不可以成賓主之合不受幣則不可以成男女之合賁所以次合也雙湖胡氏曰臨觀而後噬賁雖震離艮相遇而成實亦乾坤三隂三陽分布隨蠱由泰否變噬賁由隨蠱變隨五上易為噬嗑蠱初二易為賁也賁者飾也致飾然後亨則盡矣故受之以剝南軒張氏曰賁飾則貴於文文之太過則又滅其質而有所不通故致飾則亨有所盡言其不通故受之以剝剝者剝也物不可以終盡剝窮上反下故受之以復漢上朱氏曰此周末所以不勝其弊文之末流也物窮則反不可終盡剝陽窮於上而終反於下故次之以復雙湖胡氏曰噬嗑賁後坤遇艮而成剝復亦為長少二男之從母也復則不妄矣故受之以无妄漢上朱氏曰復天理則无妄无妄則其動也大息齋余氏曰自有事而大大而可觀可觀而合合而飾所謂忠信之薄而偽之始也故一變而為剝剝而復則真實獨存而不妄矣有无妄然後可畜故受之以大畜漢上朱氏曰前曰比必有所畜者比而後畜其畜也小故次以小畜无妄然後事事循理乃可大畜故次之以大畜閻氏彦升曰无妄然後可畜所畜者在徳故曰大雙湖胡氏曰剝復而後乾遇震艮而成无妄大畜亦為長少二男之從父也物畜然後可養故受之以頤南軒張氏曰畜然後可推以養人故受之以頤頤者養也不養則不可動故受之以大過或問不養則不可動故受之以大過何也朱子曰動則過矣故大過亦曰有其信者必行之故受之以大過平庵項氏曰需當物生之初如兒之須乳苗之須溉故曰飲食之道頤當畜聚之極萬物交致其養故曰養也閻氏彦升曰養者君子所以成已動者君子所以應物然君子處則中立動則中行豈求勝物哉及其應變則有時或過故受之以大過雙湖胡氏曰无妄大畜後震艮巽兌雖男女長少自合成頤大過然頤互兩坤大過互兩乾謂之无乾坤不可也自乾坤至此无一卦无乾坤信矣物不可以終過故受之以坎雙湖胡氏曰物不可終過故受以坎之辭葢以中為貴以坎之陽中而節其過則无過矣下文又以陷言之坎者陷也陷必有所麗故受之以離離者麗也張子曰一陷溺而不得出為坎一附麗而得出為離龜山楊氏曰坎者陽也必有所麗則庶可以扶危拯溺不有所麗而一於陷者不可也作易者於坎後必繼以離豈无仁民愛物之心哉雙湖胡氏曰頤大過而後坎離終焉頤似離大過似坎固也頤初二五上變則為重體之坎大過初二五上變亦為重體之離矣本義右上篇臨川吳氏曰吕大圭云序卦之意有以相因為序如屯蒙需訟是也有以相反為序如否泰同人是也天地間不出相反相因而已有天地然後有萬物有萬物然後有男女有男女然後有夫婦有夫婦然後有父子有父子然後有君臣有君臣然後有上下有上下然後禮義有所錯或問太極圖下二圈固是乾道成男坤道成女是各有一太極也如曰乾道成男坤道成女方始萬物化生此却云有天地然後有萬物有萬物然後有男女是如何朱子曰太極所說乃生物之初隂陽之精自凝結成兩箇後來方漸漸生去萬物皆然如牛羊草木皆牝牡一為陽一為隂萬物有生之初亦各自有兩箇故曰二五之精妙合而凝問六十四卦獨不言咸何也曰夫婦之道即咸也亦如上經不言乾坤但言天地則乾坤可見也問錯字陸氏有兩音曰只作措字謂禮義有所施設耳南軒張氏曰上經不言乾坤下經不言咸者葢乾坤與咸初无所受故也龜山楊氏曰乾坤者萬物父母咸恒人之父母臨川吳氏曰先言天地萬物男女者有夫婦之所由也後言父子君臣上下者有夫婦之所致也有夫婦則其所生為父子由家而國雖非父子而君尊臣卑之分如父子也由國而天下雖非君臣而上貴下賤之分如君臣也禮義所以分别尊卑貴賤之等錯猶置也乾坤咸不出卦名者以其為上下篇之首卦特别異之平庵項氏曰上下既具則拜趨坐立之節形而宫室車旗之制設其行之必有文故謂之禮辨之必有理故謂之義禮義者非能制為人倫也有人倫而後禮義行其間耳夫婦之道不可以不乆也故受之以恒雙湖胡氏曰咸恒為下經之主自既未濟外諸卦皆艮兌巽震之㑹遇恒者乆也物不可以乆居其所故受之以遯閻氏彦升曰不可以乆居其所此以物言之也雙湖胡氏曰此又借恒之名汎論物義若夫婦之道豈可以不乆居其所者乎遯者退也物不可以終遯故受之以大壯雙湖胡氏曰咸恒而後艮震遇乾而為遯壯亦為父之臨二男也物不可以終壯故受之以晉或問壯與晉何别朱子曰不但如此壯而已又更須進一歩也晉者進也進必有所傷故受之以明夷閻氏彦升曰知進而已不知消息盈虚與時偕行則傷之者至矣故受之以明夷雙湖胡氏曰遯壯而後為晉明夷由離坤而成為母之臨中女雖无震巽艮兌然有互艮互震亦猶上經屯䝉雖无乾坤正體而實未嘗不互坤也夷者傷也傷於外者必反其家故受之以家人閻氏彦升曰以利合者廹窮禍患害相棄也以天屬者廹窮禍患害相收也明夷之傷豈得不反於家人乎家道窮必乖故受之以睽南軒張氏曰夫家有父子之親夫婦之愛然身不行道則父子夫婦无復親矣此家道窮則乖離所以次睽也睽者乖也乖必有難故受之以蹇難乃旦反下同平庵項氏曰凡言屯者皆以為難而蹇又稱難者卦皆有坎也然屯動乎險中行乎患難者也蹇見險而止但為所阻難而不得前耳非患難之難也故居屯者必以經綸濟之遇蹇者待其解緩而後前難易固不侔矣蹇者難也物不可以終難故受之以解雙湖胡氏曰家人睽而後艮震遇坎而為蹇解自遯至解八卦艮震巽兌之遇乾坤離坎也自成一局解者緩也緩必有所失故受之以損或問序卦中如所謂緩必有所失似此等事恐後人道不到朱子曰然問緩字恐不是遲緩之緩乃是解怠之意故曰解緩也曰緩字是散意問如縱弛之類否曰然損而不已必益故受之以益雙湖胡氏曰蹇解而後損益次之者咸十卦變之盡為損而艮上兌下恒十卦變之盡為益而巽上震下亦猶上經乾坤十變而有否泰也益而不已必決故受之以夬漢上朱氏曰益乆則盈盈則必決隄防故次夬夬者決也決必有所遇故受之以姤雙湖胡氏曰上決一隂下復一陽猶可也今上決一隂下遇一隂姑論卦名相次又曰損益而後兌巽遇乾而成夬姤亦為父之臨二女也乾體止於此姤者遇也物相遇而後聚故受之以萃萃者聚也聚而上者謂之升故受之以升南軒張氏曰天下之物散之則小合而聚之則積小以成其髙大故聚而上者為升也雙湖胡氏曰夬姤而後兌巽遇坤而成萃升亦為母之臨二女也坤體止於此升而不已必困故受之以困困乎上者必反下故受之以井雙湖胡氏曰萃升而後兌巽遇坎而成困井井道不可不革故受之以革漢上朱氏曰井乆則穢濁不食治井之道革去其害井者而已革物者莫若鼎故受之以鼎雙湖胡氏曰困井而後兌巽遇離而成革鼎自夬至鼎八卦皆兌巽之遇乾坤坎離也又自成一局主器者莫若長子故受之以震長丁丈反漢上朱氏曰鼎者宗廟之器主之者莫如震震長子也震者動也物不可以終動止之故受之以艮漢上朱氏曰震一陽動於下艮一陽止於上動極則止故受之以艮雙湖胡氏曰革鼎而後震艮純卦次之艮者止也物不可以終止故受之以漸南軒張氏曰漸者止於下而漸於上不終於止而有所進也漸者進也進必有所歸故受之以歸妹閻氏彦升曰晉者進也晉必有所傷漸者進也進必有所歸何也曰晉所謂進者有進而已此進必有傷也漸之所謂進者漸進而已烏有不得所歸者乎雙湖胡氏曰夫子特借歸之一字以論其序非以明卦㫖也又曰震艮而後艮巽兌震又自相遇而為漸歸妹亦咸恒下二體合為漸上二體合為歸妹也得其所歸者必大故受之以豐漢上朱氏曰前曰與人同者物必歸焉故受之以大有此曰得其所歸者必大大有次同人者處大之道也豐次歸妹者致大之道也雙湖胡氏曰亦借歸字泛論致豐之由非取歸妹義矣豐者大也窮大者必失其居故受之以旅臨川吳氏曰臨之大以其所臨之二陽為大豐之大以其卦名為盛大之義雙湖胡氏曰漸歸妹後震艮遇離成豐旅旅而无所容故受之以巽巽者入也入而後說之故受之以兌說音悅下同平庵項氏曰人之情相拒則怒相入則說故入而後說之雙湖胡氏曰豐旅而後巽兌純卦次之兌者說也說而後散之故受之以渙渙者離也物不可以終離故受之以節雙湖胡氏曰巽兌又自出而遇坎以成渙節節而信之故受之以中孚有其信者必行之故受之以小過平庵項氏曰有其信猶書所謂有其善言以此自負而居有之也自恃其信者其行必果而過於中臨川吳氏曰過者行動而踰越之也故大過云動小過云行凡行動未至其所為未及既至其所為至既至而又動又行則為踰越而過也雙湖胡氏曰渙節後兌巽艮震自相遇為中孚小過亦咸恒上下二體交互相重成卦也咸恒一變損益再變漸歸妹三變中孚小過隂陽各從其類焉有過物者必濟故受之以既濟南軒張氏曰能髙於人而過之然後可以濟天下平庵項氏曰大過則踰越常理故必至於陷小過或可濟事故有濟而无陷也物不可窮也故受之以未濟終焉平庵項氏曰坎離之交謂之既濟此生生不窮之所從出也而聖人猶以為有窮也又分之以為未濟故即咸感之後繼之以長乆之義也葢情之交者不可以乆而无弊故必分之正者終之人之心腎其氣何嘗不交而心必在上腎必在下不可易也觀此可以知既濟未濟之象矣雙湖胡氏曰中孚小過後離坎重為既未濟為下經之終中孚小過似離坎固也中孚二三四五各易位則為離小過二三四五各易位亦為坎矣本義右下篇雜卦傳朱子曰雜卦反對之義只是反覆則其吉凶禍福動静剛柔皆相反也序卦雜卦聖人去這裏見有那无𦂳要底道理也說則箇然雜卦中亦有說得極精處南軒張氏曰序卦所以言易道之常雜卦所以言易道之變此古有是言也殊不知易之雜卦乃言其卦畫反對各以類而言之非雜也於雜之中而有不雜者存焉臨川吳氏曰序卦上經三十卦下經三十四卦以反對而觀則上經十八卦下經十八卦也此篇仍其反對之偶而不仍其先後之序故曰雜其義則以明六十四卦所主之爻也雙湖胡氏曰雜卦自乾至困非但當上經三十卦實雜下經十二卦於其中咸至夬非但當下經三十四卦亦雜上經十二卦於其中雜中不雜必有至理又嘗觀雜卦以乾為首不終之以他卦而必終之以夬者葢夬以五陽決一隂決去一隂則復為純乾矣故曰君子道長小人道憂也張子曰易為君子謀大哉言乎息齋余氏曰雜卦一篇乃序卦之變通也序卦自乾坤而下三十自咸恒而下三十四雜卦亦然序卦反對雜卦亦多反對此其所同也序卦以乾坤頥大過坎離在上篇中孚小過在下篇故二篇反對皆成十八卦雜卦但以乾坤在上篇餘盡在下篇又自大過以下不復反對此其所異也廬陵龍氏曰按春秋傳釋繫辭所謂屯固比入坤安震殺之屬以一字斷卦義徃徃占筮書多有之雜卦此類是也夫子存之為經羽翼非創作也乾剛坤柔朱子曰剛柔雖若各有所偏必相錯而後得中然在乾坤二卦之全體當剛而剛當柔而柔則不待相錯而不害其全矣其爻位之无過不及者如乾坤之二五亦不待相錯而不害其為中矣隂陽變化而太極之妙无不在焉於此葢可見也若謂乾剛坤柔便有所偏則於二卦之彖及二五之爻有不通者漢上朱氏曰乾坤易之門剛皆乾柔皆坤剛柔雜成諸卦故曰乾剛坤柔臨川吳氏曰六十四卦乾坤為純剛純柔之卦剛柔之畫自初起至上而極然後見乾為純剛坤為純柔故乾主上九坤主上六乾坤六陽六隂之卦上為主夬剝五隂五陽之卦五為主大壯觀四陽四隂之卦四為主泰否三陽三隂之卦三為主臨遯二陽二隂之卦二為主復姤一陽一隂之卦初為主此十二卦主爻與術家同比樂師憂東坡蘇氏曰有親則樂動衆則憂閻氏彦升曰比順從故樂師行險故憂息齋余氏曰在上而得衆故樂居下而任重故憂中天下而立定四海之民比之樂也鞠躬盡力死而後已成敗利鈍非所逆覩師之憂也臨川吴氏曰比九五居上為顯比之主故樂師九二居下為行師之主故憂臨觀之義或與或求本義以我臨物曰與物來觀我曰求或曰二卦互有與求之義朱子曰臨觀更有與求之義臨以二陽言之則二陽可以臨上四隂以卦中爻言之則六五上六又以上而臨下臨川吳氏曰臨九二二陽浸長在上之隂不敢以勢臨之而與之以俟其上進觀六四四隂已盛然不進逼犯陽而統率三隂居下以求觀九五之中正屯見而不失其居蒙雜而著見賢遍反本義屯震遇坎震動故見坎險不行也蒙坎遇艮坎幽昧艮光明也或曰屯以初言蒙以二言節齋蔡氏曰屯物之始生故見主初也未得位而利居貞故不失其居蒙然而生故雜二為蒙主而能治之使明故著柴氏中行曰在蒙昧之中雖未有識别而善理昭著臨川吳氏曰屯䝉皆二陽之卦屯九五見於上卦二隂之中而為主其下一陽則動於坎險之内而固守故曰不失其居蒙九二雜於下卦二隂之中而為主其上一陽則止於坎險之外而光明故曰著坎陽陷於隂中一也見者陽在上卦之天而位顯雜者陽在下卦之地而位幽也震起也艮止也損益盛衰之始也節齋蔡氏曰震陽起於下艮陽止於上損者盛之始益者衰之始息齋余氏曰損益盛衰之始泰否之變也鄱陽董氏曰損者人之所憂也而乃為盛之始益者人之所喜也而乃為衰之始則是於吉凶消長之幾進退存亡之理其可迷而不悟哉大畜時也无妄災也本義止健者時有適然无妄而災自外至節齋蔡氏曰剛健者難畜當剛止之時故能畜莫非災也无妄之災乃所謂災也息齋余氏曰止有静中之得故大畜曰時動有慮外之失故无妄曰災柴氏中行曰禍非自取曰災萃聚而升不來也節齋蔡氏曰澤聚而下木升而上臨川吳氏曰萃以觀之四徃上為主而同類之三隂聚於下升以臨之三來初為主而同類之三隂升於上升上為徃降下為來不來謂升而不降也謙輕而豫怠也朱子曰謙輕是自謙抑不自尊重問謙何以為輕曰輕是自卑小之義說豫之極便放倒了如上文㝠豫是也柴氏中行曰謙者視已若甚輕豫則有滿盈之志而怠矣臨川吳氏曰謙一陽居下卦之上為謙卑之主而不尊大故自小而輕豫一陽居上卦之下為豫樂之主而志滿足故自肆而怠噬嗑食也賁无色也本義白受采節齋蔡氏曰頤中有物故食賁則其色不常故无色白雲郭氏曰賁以白賁无咎故无色則質全有天下之至賁存焉息齋余氏曰食色人情所不免噬嗑曰食而賁曰无色者葢色至於賁則易過矣故戒之臨川吳氏曰噬嗑以否初徃五而為主賁以泰上來二文剛而為主兌見而巽伏也見賢遍反本義兌隂外見巽隂内伏楊氏曰柔一也居於上者為見處於下者為伏隨无故也蠱則飭也本義隨前无故蠱後當飭柴氏中行曰隨以无故為善有故皆利心也又曰不主於故隨時而行也平庵項氏曰隨以无故而為安蠱以有故而修飭故聖人不畏多難而畏无難也息齋余氏曰隨從否變欲捨其故蠱從泰變欲飭其後剝爛也復反也漢上朱氏曰剝爛五隂潰於内也進齋徐氏曰剝爛則陽窮於上復反則陽生於下猶果之爛墜於中則可種而生矣晉晝也明夷誅也本義誅傷也節齋蔡氏曰晉離在上而明著夷離在下而明傷白雲郭氏曰晉與明夷朝暮象也故言明出地上明入地中臨川吳氏曰晉六五離日當天晝也明夷六二離日入地明者夷傷也誅即夷傷之義井通而困相遇也本義剛柔相遇而剛見揜也白雲郭氏曰徃來井井則其道通困遇剛揜所以為困平庵項氏曰以通與遇為反對則遇為相抵而不通之象矣巽之上爻主塞坎水之上源而井之坎乃出其上葢塞而復通者也故謂之通兌之下爻主塞坎水之下流而困之坎適在其下正遇其塞所以困也自乾坤至此三十卦正與上卦之數相當而下經亦以咸恒為始以此見卦雖以雜名而乾坤咸恒上下經之首則未嘗雜也咸速也恒乆也本義咸速恒乆白雲郭氏曰咸為天下至速之道所謂不疾而速者也節齋蔡氏曰有感則應故速常故能乆渙離也節止也節齋蔡氏曰風散水故離澤防水故止平庵項氏曰渙節正與井困相反井以水出水故居塞而能通渙則以水浮木故通之極而至于散也節以澤上之水水故居通而能塞困為澤下之水故塞之極而至于困也臨川吳氏曰渙九二坎水在巽風之下為風所離散節九五坎水在兌澤之上為澤所節止解緩也蹇難也難乃旦反張子曰天下之難既解故安於佚樂每失於緩蹇者見險而止故為難臨川吳氏曰解九二坎陷在内震則出險而動於外内險已解緩也蹇九五坎險在外艮則見險而止於内外險方艱難也睽外也家人内也進齋徐氏曰睽者疎而外也家人者親而内也臨川吳氏曰睽六五在外為主家人六二在内為主否泰反其類也進齋徐氏曰否大徃小來泰小徃大來故曰反其類大壯則止遯則退也本義止謂不進臨川吳氏曰大壯四陽進而消隂遯二隂進而消陽慮後陽之恃其壯故不欲九四之進而欲其止慮前陽之不及遯故不欲六二之進而欲其退也聖人於五陽之夬亦不欲陽之輕進於一隂之姤亦惟欲隂之不進葢同此意也大有衆也同人親也漢上朱氏曰大有六五柔得尊位而有其衆衆亦歸之故曰大有衆也同人六二得中得位而同乎人人亦親之故曰同人親也革去故也鼎取新也去起呂反漢上朱氏曰水火相革革已廢也故革去故以木巽火火方興也故鼎取新平庵項氏曰革以火鎔金故為去故鼎以木鑽火故為取新亦以離為主也小過過也中孚信也節齋蔡氏曰莫非過也小過之過乃所謂過也小者能過夫豈常理哉莫非信也中孚之信乃所謂信也信出于中夫豈邀約之所能致哉臨川吳氏曰小過九四主也而為六五所過葢隂盛能過陽衰不及也中孚六四主也而為九五所信葢陽實能感隂虚能應也豐多故親寡旅也夲義既明且動其故多矣平庵項氏曰卦名皆在句上旅獨在下者取韻協也潘氏夣旂曰物盛則多故旅寓則少親楊氏曰昔華封祝堯而堯曰辭以豐則多故爾孔子當西周之時栖栖然一旅人者以旅則親寡爾嵩山晁氏曰豐多故今夲有也字按荀夲无之離上而坎下也上時掌反夲義火炎上水潤下小畜寡也履不處也夲義不處行進之義雙湖胡氏曰寡一隂小義不處行履之義需不進也訟不親也漢上朱氏曰關子明云履而不處者其周公乎需而不進者其仲尼乎險在下而陽上行相違者也故曰訟不親也平庵項氏曰需訟皆主乾言止坎下故不進違坎去故不親大過顚也進齋徐氏曰夲末弱故顛南軒張氏曰小過過而未顛過中於大故曰顛姤遇也柔遇剛也漸女歸待男行也朱子曰女待男而行所以為漸頤養正也南軒張氏曰所養不正則是養其小者以害其大者矣臨川吳氏曰頤上九為主而下養五三以上養下所以為正也既濟定也節齋蔡氏曰六位皆當故定潘氏夣旂曰事已濟則定矣歸妹女之終也雙湖胡氏曰女未嫁之稱既嫁為歸則女之終矣未濟男之窮也臨川吳氏曰既濟六二主也以隂居隂得其定位而上下五爻亦皆得其定位故曰定也未濟九二主也以陽居隂失其正位而同類二陽亦皆失其正位故曰男之窮也三隂亦不得正位不足言也南軒張氏曰雜卦先言離坎後言既濟未濟則上下經之終亦未嘗雜亂也夬決也剛決柔也君子道長小人道憂也長丁丈反本義自大過以下卦不反對或疑其錯簡今以韻協之又似非誤未詳何義朱子曰卦有反有對乾坤坎離是反艮兌震巽是對乾坤坎離倒轉也只是四卦兌艮震巽倒轉則為中孚頤小過大過其餘皆是對卦問乾坤大過頤坎離中孚小過八卦翻覆不成别卦是如何曰八卦便只是六卦乾坤坎離是四正卦兌便是翻轉底巽震便是翻轉底艮六十四卦只八卦是正卦餘便只二十四卦翻轉為五十六卦中孚便是箇大底離小過是箇大底坎又曰中孚是箇雙夾底離小過是箇雙夾底坎大過是箇厚畫底坎頤是箇厚畫底離三畫之卦只是六卦即六畫一卦以正卦八加反卦二十有八為三十有六六六三十六也邵子謂之暗卦小成之卦八即大成之卦六十四八八六十四也二十六與六十四同鄭氏康成曰自大過以下卦㫖不協似錯亂失正弗敢改耳節齋蔡氏曰按雜卦例皆反對協韻為序今以其例改正大過顛也頤養正也既濟定也未濟男之窮也歸妹女之終也漸女歸待男行也姤遇也柔遇剛也夬決也剛決柔也君子道長小人道憂也建安丘氏曰今依蔡易讀之則八卦既得以類從而韻亦協但不當僭改經文爾鄱陽董氏曰按蘇氏亦有改正自頤大過而下數卦然不若蔡氏之妥雲峰胡氏曰易終於雜卦而交易變易之義愈可見矣每一卦反覆為兩卦而剛柔吉凶每每相反此變易之義也自乾坤至困三十卦與上經之數相當而雜下經十二卦於其中自咸至夬三十四卦與下經之數相當而雜上經十二卦於其中此交易之義也或曰此偶然爾愚曰非偶然也皆理之自然也坎離交之中者夲居上經三十卦内今附於下三十四卦震艮巽兌交之偏者夲居下經三十四卦内今附於上三十卦至若无反對者上經六卦下經二卦今附於上者二卦附於下者六卦皆交易之義也十二月卦氣除乾坤外上經泰否臨觀賁復隂之多於陽者十二下經遯壯姤夬陽之多於隂者十二今雜卦移否泰於三十四卦之中而隂陽之多少復如之特在上經者三十六畫在下經者二十四畫今附於上者二十四畫附於下者三十六畫愈見其交易之妙爾若合六十四卦論之上經三十卦隂爻之多於陽者八下經三十四卦陽爻之多於隂者亦八今則附於三十卦者陽爻七十二隂爻一百八而隂多於陽者三十六附於三十四卦者陽爻一百二十隂爻八十四而陽之多於隂者亦三十六特反對論上經隂之多於陽者四下經陽之多於隂者亦四今則附於上者陽爻三十九隂爻五十七而隂爻多於陽者十八附於下者陽爻六十九隂爻五十一而陽之多於隂者亦十八或三十六或十八互為多少非特可見隂陽交易之妙而三十六宮之妙愈可見矣是豈聖人之心思智慮之所為哉愚固曰伏羲之畫文王周公孔子之言皆天也本義謂自大過以下卦不反對或疑其錯簡今以韻協之又似非誤未詳何義愚窃以為雜物撰徳非其中爻不備此葢指中四爻互體而言也先天圖之左互復頤既濟家人歸妹睽夬乾八卦右互姤大過未濟解漸蹇剝坤八卦此則於右取姤大過未濟漸四卦於左取頤既濟歸妹夬四卦各舉其半可兼其餘矣是雖所取不能无雜葢此為雜卦而互體又其最雜者也上三十卦終之以困柔揜剛也下三十四卦終之以夬剛決柔也柔揜剛君子不失其所亨剛決柔君子道長小人道憂矣然則天地間剛柔每每相雜至若君子之為剛小人之為柔決不可使相雜也雜卦之末特分别君子小人之道言之聖人贊化育扶世變之意微矣始於乾終於夬或曰夬之一隂决盡則為乾也以皇極經世考之乾已㑹之終堯舜雍熈之世也十二萬九千六百年安得常如自夬而乾所值堯舜之世哉嗚呼任賢勿貳去邪勿疑疑謀勿成即此所謂夬之決也後之涖天下者亦法堯舜而已矣周易傳義大全卷二十四
