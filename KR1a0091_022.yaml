body:
  text: 周易傳義大全卷十六明胡廣等撰巽下乾上傳姤序卦夬決也決必有遇故受之以姤姤遇也決判也物之決判則有遇合本合則何遇姤所以次夬也為卦乾上巽下以二體言之風行天下天之下者萬物也風之行无不經觸乃遇之象又一隂始生於下隂與陽遇也故為姤邵子曰復次剥明治生於亂乎姤次夬明亂生於治乎時哉時哉未有剥而不復夬而不姤者防乎其防邦家其長子孫其昌是以聖人貴未然之防是謂易之大綱厚齋馮氏曰古文姤作遘遇也亦婚媾也以女遇男為象王洙易改為今文為姤雜卦猶是古文鄭本同姤女壯勿用取女姤古豆反取七喻反傳一隂始生自是而長漸以盛大是女之將長壯也隂長則陽消女壯則男弱故戒勿用取如是之女取女者欲其柔和順從以成家道姤乃方進之隂漸壯而敵陽者是以不可取也女漸壯則失男女之正家道敗矣姤雖一隂甚微然有漸壯之道所以戒也本義姤遇也決盡則為純乾四月之卦至姤然後一隂可見而為五月之卦以其本非所望而卒然值之如不期而遇者故為遇遇已非正又一隂而遇五陽則女徳不貞而壯之甚也取以自配必害乎陽故其象占如此朱子曰不是說隂漸長為女壯乃是一隂遇五陽姤卦上五爻皆陽下面一隂生五陽便立不住了中溪張氏曰姤一隂方生始與陽遇而遽曰女壯何也蓋隂陽往来機不容息未有剥而不復者亦未有夬而不姤者夫一隂方決於上而一隂已生於下陽不擬隂之来而與之邂逅故名曰姤自姤以往為遯為否為觀為剥為坤皆初六之為也非女壯而何女壯則男弱故以勿用取女戒之也誠齋楊氏曰隂陽之相為消長如循環然剥者陽之消然剥極為復不旋踵而一陽生夬者隂之消然夬極為姤不旋踵而一隂生當一陽之生也聖人未敢為君子而喜必曰朋来无咎言一陽未易勝五隂也當一隂之生也聖人已為君子而憂遽曰女壯言一隂已有敵五陽之志也既曰女壯又曰勿用取女申戒五陽以勿輕一隂之微而親䁥之也雲峰胡氏曰女壯諸家皆以為一隂有將盛之漸本義以為一隂當五陽已有女壯之象本義於復曰剥盡則為純坤十月之卦而陽氣已生於下積之踰月而復一陽之體始成而来復於陽言其理生之漸於隂不言者亦扶陽抑隂之意也况謂之復者本失之而今来復謂之姤者本非所望者而卒然值之也哉彖曰姤遇也柔遇剛也傳姤之義遇也卦之為姤以柔遇剛也一隂方生始與陽相遇也本義釋卦名或問隂何以比小人朱子曰有時如此平看之則都好以類言之則有不好然亦只是皮不好骨子却好大扺發生都即是一個陽氣只是有消長陽長一分下面隂生一分又不是討個隂来即是陽消處便是隂故陽来謂之復復者是本来物事隂来謂之姤姤是偶然相遇李氏元量曰夬之一隂不為主者隂往而窮也故曰剛決柔姤之五陽不為主者隂来而信也故曰柔遇剛月建一隂月曰㽔賔則隂為主而陽已為之賔矣是姤主隂遇陽而為言也勿用取女不可與長也傳一隂既生漸長而盛隂盛則陽衰矣取女者欲長乆而成家也此漸盛之隂將消勝於陽不可與之長乆也凡女子小人夷狄勢苟漸盛何可與乆也故戒勿用取如是之女本義釋卦辭隆山李氏曰以一隂遇五陽女下於男即相比附有女不正之象故曰勿用取女咸所以取女吉者以男下女得婚姻正禮故也若蒙之六三以隂而先求陽其行不順故亦曰勿用取女天地相遇品物咸章也傳隂始生於下與陽相遇天地相遇也隂陽不相交遇則萬物不生天地相遇則化育庶類品物咸章萬物章明也本義以卦體言朱子曰大率姤是一個女遇五陽是個不正當底如人盡夫也之事聖人去這裏又看見得那天地相遇底道理出来隆山李氏曰姤巽下乾上有以坤之初六變乾初九之義是為天地相遇之象以畫觀之則一隂之生是為五月五月在辰為午南離之光所照耀者也萬物相見乎離而蕃衍乎大夏非品物咸章而何中溪張氏曰五陽在上而一隂生於下以隂遇陽是天地相遇也於時為夏至夫天地不遇則已遇則品物皆茂育而章著矣萬物相見乎離亦有品物咸章之義剛遇中正天下大行也傳以卦才言也五與二皆以陽剛居中與正以中正相遇也君得剛中之臣臣遇中正之君君臣以剛陽遇中正其道可以大行於天下矣本義指九五朱子曰姤是不好底卦然天地相遇品物咸章剛遇中正天下大行却又甚好蓋天地相遇又是别取一義剛遇中正只取九五或謂亦以九二言非也節齋蔡氏曰中正五也以剛明之才遇中正之位也臨川吴氏曰九五以陽剛居中正之位故曰剛遇中正有徳有位居尊臨下其陽剛之道得行於天下故曰天下大行卦之一隂遇五陽乃隂始生而消陽之卦然九五剛中正居尊位故彖辭雖慮小者之始生而勢漸盛彖傳又喜大者之居尊而道得行亦扶陽抑隂之意也姤之時義大矣哉傳贊姤之時與姤之義至大也天地不相遇則萬物不生君臣不相遇則政治不興聖賢不相遇則道徳不亨事物不相遇則功用不成姤之時與義皆甚大也涑水司馬氏曰姤遇也世之治亂人之窮通事之成敗不可以力致不可以數求遇不遇而已矣舜遇堯而五典克從百揆時叙禹稷臯陶遇舜而六府三事允治地平天成不然則泯泯於衆人之中後世誰知哉姤之時義大矣本義幾㣲之際聖人所謹或問本義云幾微之際聖人所謹與伊川之說不同何也朱子曰上面說天地相遇至天下大行也正是好時節而不好之漸已生於微矣故當謹於此雲峰胡氏曰他卦言大矣哉者多是釋卦辭後别引天地聖人而極言之姤亦然本義不曰極言之何也蓋柔遇剛遇之不善者也别取一義曰天地相遇曰剛遇中正遇之善者也曰品物咸章曰天下大行亦既極言之矣姤之時義大矣哉非贊遇之大也一隂之生雖微可慮者大也人之為善亦既誠意忽有一念之自欺潛萌於中衆君子在上忽有一小人欲長於下幾微之際大可慮也故聖人謹之象曰天下有風姤后以施命誥四方傳風行天下无所不周為君后者觀其周徧之象以施其命令周誥四方也風行地上與天下有風皆為周徧庶物之象而行於地上徧觸萬物則為觀經歴觀省之象也行於天下周徧四方則為姤施發命令之象也諸象或稱先王或稱后或稱君子大人稱先王者先王所以立法制建國作樂省方敇法閉關育物享帝皆是也稱后者后王之所為也財成天地之道施命誥四方是也君子則上下之通稱大人者王公之通稱節齋蔡氏曰風行天下物无不遇姤之象也施乾象命巽象誥四方取風行天下之象趙氏汝楳曰天下有風與風行地上義頗同姤為太虚之風自上而下觀為地上之風旁行而遍歴大虚之風吹號萬籟后之誥命象之中溪張氏曰風者天之號令所以鼔舞萬物命者君之號令所以鼔舞萬民風自天而下无物不遇而君之命令實以之人君尊居九重與下民本无相遇之理唯王言一布則萬民爭先快覩莫不鼓舞於其下而君民之心始遇矣李氏開曰天子曰元后諸侯曰羣后一國天下皆可言四方初六繫于金柅貞吉有攸往見凶羸豕孚蹢躅柅乃履反又女紀反蹢直益反躅直録反傳姤隂始生而將長之卦一隂生則長而漸盛隂長則陽消小人道長也制之當於其微而未盛之時柅止車之物金為之堅强之至也止之以金柅而又繫之止之固也固止使不得進則陽剛貞正之道吉也使之進往則漸盛而害於陽是見凶也羸豕孚蹢躅聖人重為之戒言隂雖甚微不可忽也豕隂躁之物故以為况羸弱之豕雖未能强猛然其中心在乎蹢躅蹢躅跳躑也隂微而在下可謂羸矣然其中心常在乎一无乎字消陽也君子小人異道小人雖微弱之時未嘗无害君子之心防於微則无能為矣本義柅所以止車以金為之其剛可知一隂始生靜正則吉往進則凶故以二義戒小人使不害於君子則有吉而无凶然其勢不可止也故以羸豕蹢躅曉君子使深為之備云建安丘氏曰姤之所以為姤者在此一爻一隂始生非以金柅繫之則柔道何所牽制而不敢進雖然一隂方生其勢漸長終有不容遏者繋之正所以防之也張子曰豕初羸時力未能動然至誠在於蹢躅得申則申矣雲峰胡氏曰巽為繩有繫之象金柅剛而止物九二象繫于金柅非有以繫之也一隂之柔能自繫于五陽之下而不進是之謂靜正而吉也動而進則見凶矣一動一静分而為一吉一凶之占使小人自擇焉又以一隂雖微而至於盛時設羸豕蹢躅之象使君子深自備焉其為君子謀至矣然非特為君子小人言也吾心天理人欲之幾固如是也人欲之萌蓋有甚於羸豕之可畏者能自止之而不使滋長則善矣彖總一卦而言則以一隂而當五陽故于女為壯爻指此一畫而言五陽之下一隂甚微故於豕為羸壯可畏也羸不可忽也中溪張氏曰初六取象非一於本爻觀之則曰豕於二四觀之則曰魚於九五觀之則曰𤓰大抵皆取隂物而在下之象象曰繫于金柅柔道牽也傳牽者引而進也隂始生而漸進柔道方牽也繫之于金柅所以止其進也不使進則不能消正道乃貞吉也本義牽進也以其進故止之雲峰胡氏曰初曰柔道牽三曰行未牽初柔有必進之勢而三之剛其行反不能進也九二包有魚无咎不利賔傳姤遇也二與初密比相遇者也在他卦則初正應於四在姤則以遇為重相遇之道主於專一二之剛中遇固以誠然初之隂柔羣陽在上而又有所應者其志所求也隂柔之質鮮克貞固二之於初難得其誠心矣所遇不得其誠心遇道之乖也包者苴裹也魚隂物之美者陽之於隂其所恱美故取魚象二於初若能固畜之如包苴之有魚則於遇為无咎矣賓外来者也不利賔包苴之魚豈能及賔謂不可更及外人也遇道當專一二則雜矣中溪張氏曰魚隂物之美者指初六也初與四為正應魚本四之有也今九二先與初遇以陽納隂包而有之則二為主而四為賓矣此豈四之利乎故曰不利賔息齋余氏曰姤九二包有魚无咎不利賔當如程傳即三人行損一人之意本義魚隂物二與初遇為包有魚之象然制之在已故猶可以无咎若不制而使遇於衆則其為害廣矣故其象占如此雲峰胡氏曰剥五隂曰貫魚姤一隂故但曰魚包如包苴之包容之于内而制之使不得逸於外也二與初遇制之猶可以无咎若不制而使遇於衆姤之有魚將為剥之貫魚矣吁可畏哉或曰初應在四二豈能包之曰卦以遇合之女未嘗擇配也二近而先斯得之矣李氏開曰剥之貫魚姤之包有魚皆陽能制隂者也故剥六五无不利而此亦无咎象曰包有魚義不及賔也傳二之遇初不可使有二於外當如包苴之有魚包苴之魚義不及於賔客也潘氏曰二既有魚則不利於四反指為賔而不及之故四无魚也中溪張氏曰當遇之時二近四逺一隂不能兼二陽揆之於義則不及賔也譬衆漁之取魚先至者一舉網而得之後至者雖善漁而利不彼及矣九三臀无膚其行次且厲无大咎傳二與初既相遇三說初而密比於二非所安也又為二所忌惡其居不安若臀之无膚也處既不安則當去之而居姤之時志求乎遇一隂在下是所欲也故處雖不安而其行則又次且也次且進難之狀謂不能遽舎也然三剛正而處巽有不終迷之義若知其不正而懐危懼不敢妄動則可以无大咎也非義求遇固已有咎矣知危而止則不至於大一有咎字也本義九三過剛不中下不遇於初上无應於上居則不安行則不進故其象占如此然既无所遇則无隂邪之傷故雖危厲而无大咎也進齋徐氏曰姤者夬之反姤之三即夬之四也故皆有臀无膚其行次且之象但夬一隂在上故下之五陽皆趍而上姤一隂在下故上之五陽皆反而下其隂陽相求之情則然也夫九三之志亦在乎初初比二應四與三无繫三乃介乎其間求與之遇而承乘皆剛進退不能故曰臀无膚其行次且雲峰胡氏曰三下不遇於初故有居不安之象前无應於上故有行不進之象隆山李氏曰易之六爻唯九三自乾以下多厲无咎之辭豈非重剛不中須知戒懼然後危而復安者乎象曰其行次且行未牽也傳其始志在求遇於初故其行遲遲未牽不促其行也既知危而改之故未至於大咎也九四包无魚起凶傳包者所裹畜也魚所美也四與初為正應當相遇者也而初已遇於二矣失其所遇猶包之无魚亡其所有也四當姤遇之時居上位而失其下下之離由已之失徳也四之失者不中正也以不中正而失其民所以凶也曰初之從二以比近也豈四之罪乎曰在四而言義當有咎不能保其下由失道也豈有上不失道而下離者乎遇之道君臣民主夫婦朋友皆在焉四以下睽故主民而言為上而下離必有凶變起者將生之謂民心既離難將作矣本義初六正應已遇於二而不及於已故其象占如此臨川吴氏曰初者四之正應而為二所得故二之包中有魚而四之包中无魚也已之正應與他人遇猶男之失其配君之失其民也今雖未凶凶由是起矣雲峰胡氏曰遇非正道故四於初為正應无遇之象遇既非正則唯近者得之二與初為近二包魚四則无魚矣故其占如此象曰无魚之凶逺民也逺袁萬反傳下之離由已致之逺民者己逺之也為上者有以使之離也本義民之去已猶已逺之朱子曰包无魚又去這裏見得個君民底道理陽在上為君隂在下為民雲峰胡氏曰易象或以隂為小人或以為民以為小人逺之可也以為民民不可逺也小象是别取一義九五以杞包瓜含章有隕自天傳九五下亦无應非有遇也然得遇之一有之字道故終必有遇夫上下之遇由相求也杞髙木而葉大處髙體大而可以包物者杞也美實之在下者瓜也美而居下者側微之賢之象也九五尊居君位而下求賢才以至髙而求至下猶以杞葉而包瓜能自降屈如此又其内藴中正之徳充實章美人君如是則无有不遇所求者也雖屈已求賢若其徳不正賢者不屑也故必含蓄章美内積正誠則有隕自天矣猶云自天而降言必得之也自古人君至誠降屈以中正之道求天下之賢未有不遇者也髙宗感於夢寐文王遇於漁釣皆由是道也程子曰髙宗好賢之意與易姤卦同九五以杞包瓜含章有隕自天杞生於最髙處瓜美物生低處以杞包瓜則至尊逮下之意也既能如此自然有賢者出故有隕自天也後人遂有天祐生賢佐之說本義瓜隂物之在下者甘美而善潰杞髙大堅實之木也五以陽剛中正主卦於上而下防始生必潰之隂其象如此然隂陽迭勝時運之常若能含晦章美靜以制之則可以囘造化矣有隕自天本无而倏有之象也朱子曰有隕自天言能囘造化則陽氣復自天而隕復生上来都換了這時節隆山李氏曰姤所制在一隂爻中豕魚瓜皆象隂也杞叢生性堅而夀瓜蓏柔而不正附麗而生易以滋蔓小人之性初六之才也九五包制之有杞包瓜象陽明之謂章易遇隂中陽皆曰含章九五當隂長之世居陽明之位故曰含章一隂之生此造化消息盈虚之運非人力所致九五當此時含其陽明之章以中正之道臨制之造次顛沛不離於天命之正則所遇之時又何擇哉中溪張氏曰有隕自天猶碩果不食而剥落復生此言隂陽升降消長循環之理也剥之上九天位也復之初九地位也碩果自天而剥落於地復有生意存焉豈非有隕自天乎雲峰胡氏曰二視初為魚五視初為瓜魚與瓜皆隂物之美者魚之餒瓜之潰必自内始二與初遇故包有魚五與初无相遇之道猶以髙大之杞而欲包在地之瓜也然瓜雖始生而必潰九五陽剛中正能包含章美靜以待之是雖隂陽消長時運之常而造化未有不可回者姤其將可轉而為復乎剥之一陽窮上而復生於下其有隕自天之象乎雙湖胡氏曰九五本飛龍在天之主一步之初動纔不正昔之潛龍化為羸豕一小人之進局面頓更事體大異重煩諸君子包制而九五至於包瓜含章聼自天之有隕其視聖人作而萬物睹氣象為何如哉為人君者宜知所以謹其初矣象曰九五含章中正也傳所謂含章謂其含藴一无藴字中正之徳也徳充實則成章而有輝光有隕自天志不舎命也舎音捨傳命天理也舎違也至誠中正屈己求賢存志合於天理所以有隕自天必得之矣雙湖胡氏曰命謂天命命即理也志不違於天理所以有自天之福中溪張氏曰五有剛健中正之徳於一隂始生之際而知一陽復生之幾含晦章美以待乎時其志亦欲盡人謀以聼天命而已臨川吴氏曰志不舍命辭意與逺民相似民之逺君由君使其民之逺也故不曰民逺而曰逺民天命之不違人由人能使天命之不違也故不曰命不舎而曰不舎命也上九姤其角吝无咎傳至剛而在最上者角也九以剛居上故以角為象人之相遇由降屈以相從和順以相接故能合也上九髙亢而剛極人誰與之以此求遇固可吝也已則如是人之逺之非他人之罪也由己致之故无所歸咎臨川吴氏曰剛而在上者角也至姤之終下之所遇者如角之剛也前不可進剛而能觸竟何為哉故吝潘氏曰髙而傷物者角也以此遇合誰其與之本義角剛乎上者也上九以剛居上而无位不得其遇故其象占與九三類隆山李氏曰當遇之時已獨剛亢不與物合是為吝道然隂方長陽與之遇者要須有以制之如絲如包可也制之或失必反被隂邪之害獨上九巍然在上剛亢絶物雖无所合而亦不近隂邪可无意外之患雲峰胡氏曰九三以剛居下卦之上於初隂无所遇故雖厲而无大咎上九以剛居上卦之上於初隂亦不得遇故雖吝而亦无咎遇本非正不遇不足為過咎也象曰姤其角上竆吝也傳既處窮上剛亦極矣是上窮而致吝也以剛極居髙而求遇不亦難乎中溪張氏曰姤其角與晉其角皆取上窮之義節齋蔡氏曰姤者以一柔遇五剛而成卦遇非正道唯近者得之而正應者反凶也二最近故先有之三之厲以隔乎二而不遇也五之含章雖无相遇之道而處位中正也上之吝最逺而窮也四之起凶遇不利正應也馮氏去非曰外三爻者内三爻之應初往見凶故四則起凶二包有魚故五則以杞包瓜三之臂厲无大咎上之角吝而无咎逺近淺深之間耳建安丘氏曰姤遇也以一隂而遇五陽也故六爻以初隂為主而上五陽則皆以初取義凡陽之於隂逺則不遇唯近者得之二與初最近遇之最先者故曰包有魚四雖應初而初為二得非復已有故包无魚三介二四兩剛之間亦欲遇初以居則礙四進則礙三故有臀无膚行次且之象至五去初逺則无相得之理矣故但含章以聽天命之自至而已上又最逺者也故有姤角上窮吝之象趙氏曰當姤之時小人固不可初使之進為君子計亦不可无以蓄小人故聖人既戒六之不可往又於二四五言所以包制之道三重剛不中上以剛居一卦之極故厲而吝然皆无咎者以隂不相遇不與其進也坤下兌上傳萃序卦姤者遇也物相遇而后聚故受之以萃萃者聚也物相㑹遇則成羣萃所以次姤也為卦兊上坤下澤上於地水之聚也故為萃不言澤在地上而云澤上於地言上於地則為方聚之義也萃亨王假有廟假更白反豐渙卦辭竝同傳王者萃聚天下之道至於有廟極一无極字也羣生至衆也而可一其歸仰人心莫知其郷也而能致其誠敬鬼神之不可度也而能致其来格天下萃合人心總攝衆志之道非一其至大莫過於宗廟故王者萃天下之道至於有廟則萃道之至也祭祀之報本於人心聖人制禮以成其徳耳故豺獺能祭其性然也萃下有亨字羨文也亨字自在下與渙不同渙則先言卦才萃乃先言卦義彖辭甚明程子曰萃渙皆立廟因而精神之萃而形於此為其渙散故立此以收之古人祭祀用尸極有深意不可不深思蓋人之意氣既散孝子求神而祭无尸則不享无主則不依故易於渙萃皆言王假有廟即渙散之時事也魂氣必求其類而依之人與人既為類骨肉又為一家之類已與尸各既已潔齊至誠相通以此求神宜其亨之後世不知此直以尊卑之勢遂不肯行爾朱子曰王假有廟是祖考精神聚於廟又為人必能聚已之精神然後可以至於廟而承祖考今人擇日祀神多取神在日亦取聚意也大率人之精神萃於已祖考之精神萃於廟鄭氏剛中曰自四以下宗廟之象康成謂艮為門闕巽木宫闕象平庵項氏曰卦名下元无亨字獨王肅本有王弼遂用其說孔子彖辭初不及此字利見大人亨利貞傳天下之聚必得大人以治之人聚則亂物聚則爭事聚則紊非大人治之則萃所以致爭亂也萃以不正則人聚為苟合財聚則悖入安得亨乎故利貞進齋徐氏曰大人五也貞二五位正也當萃之時利見大人則萃道亨也然必利於貞聚不以正其能亨乎西溪李氏曰宗廟者人心所係武王伐商載主而行髙帝初興立漢社稷者以係人心也必得九五之位然後為萃之主故曰利見大人萃不以正其終必離故曰利貞趙氏曰陽居五而五隂從之為比陽居五與四而四隂從之為萃二卦若相似也然比者衆隂始附之初聖人作而萬物覩之時也故曰原筮元永貞无咎又曰不寜方来後夫凶皆附之意也萃者二陽相比羣隂萃而歸之君臣同徳萬物盛多之時也非下順上說不足以為萃豈特二五相應而已哉用大牲吉利有攸往傳萃者豐厚之時也其用宜稱故用大牲吉事莫重於祭故以祭享而言上交鬼神下接民物百用莫不皆一作當然當萃之時而交物以厚則是享豐富之吉也天下莫不同其富樂矣若時之一无之字厚而交物以薄乃不享其豐美天下莫之與而晦吝生矣蓋隨時之宜順理而行故彖云順天命也夫不能有為者力之不足也當萃之時故利有攸往大凡興功立事貴得可為之時萃而後用是以動而有裕天理然也本義萃聚也坤順兊說九五剛中而二應之又為澤上於地萬物萃聚之象故為萃亨字衍文王假有廟言王者可以至乎宗廟之中王者卜祭之吉占也祭義曰公假于太廟是也廟所以聚祖考之精神又人必能聚已之精神則可以至于廟而承祖考也物既聚則必見大人而後可以得亨然又必利於正所聚不正則亦不能亨也大牲必聚而後有聚則可以有所往皆占吉而有戒之辭朱子曰彖辭散漫說說了王假有廟又說利見大人又說用大牲吉大率是聖人觀象節節地看見許多道理看到這裏見有這個象便說出這一句来又看見那個象又說出那一個理来然而觀象則今不可得見是如何地觀矣問卦取聚之意曰數句是占辭非發明萃聚之意也此是諸儒說易之大病非聖人繋辭焉而明吉凶之意中溪張氏曰萃為豐盛之時則祭享之禮其用宜稱故用大牲則吉也處萃之時人心翕合以順而行故利有攸往也雲峰胡氏曰王假有廟於萃渙言之者渙散也謂祖宗精神易散故為廟以聚之萃聚也謂聚已之精神然後能至于廟而聚祖考之精神也彖五句各自是一事聖人見萃有假廟象又見五為大人之象故曰利見大人亨言羣聚於下必見大人以為之主而後亨也又見五與二皆得正故曰利貞萃不以正其能亨乎利亨利貞兩利字不相蒙孔子釋而合之謂聚之利於亨者以見大人則為所聚之正是乃利貞也後之說者但釋孔子之傳而文王之經隱矣又聖人見損之時二簋可用享則萃之時必用大牲乃吉渙之時且利涉大川則萃之時必利有攸往也本義以為皆占吉而有戒之辭蓋言萃之時如是則亨且利否則不亨不利如是則吉否則不吉也彖曰萃聚也順以說剛中而應故聚也說音悅傳萃之義聚也順以一作而說以卦才言也上說而下順為上以說道使民而順於人心下說上之政令而順從於上既上下順說又陽剛處中正之位而下有應助如此故能聚也欲天下之萃才非如是不能也本義以卦徳卦體釋卦名義中溪張氏曰萃之所以為聚者以其坤順而兊說也上有剛中之主而下得柔中之應此君臣聚㑹之際也王假有廟致孝享也傳王者萃人心之道至於建立宗廟所以致其孝享之誠也祭祀人心之所自盡也故萃天下之心者无如孝享王者萃天下之道至於有廟則其極也中溪張氏曰王者至於有廟得以致其孝享之誠此敬之所聚也臨川吴氏曰致者至其極也極盡孝享之道乃能萃已散之精神也胡氏曰人生則精神聚於身既没雖欲見其容貌而不得聖人觀萃卦設為廟祧以聚祖宗精神於其間以盡孝子之心也利見大人亨聚以正也傳萃之時見大人則能亨蓋聚以正道也見大人則其聚以正道得其正則亨矣萃不以正其能亨乎用大牲吉利有攸往順天命也傳用大牲承上有廟之文以享祀而言凡事莫不如是豐聚之時交於物者當厚稱其宜也物聚而力贍乃可以有為故利有攸往皆天理然也故云順天命也本義釋卦辭朱子曰順天命說道理彷彿如伊川說也去得只是文勢不如此他是說豐萃之時若不用大牲則便是與以天下儉其親相似也有此理這時節比不得那利用禴之事進齋徐氏曰大牲血祭之盛也物萃則用大牲以祭所以稱其萃之義也故吉時萃則動无不順故利有攸往臨川吳氏曰物聚人聚而衆多之時祭者宜盛居者宜往此皆順天道之自然也觀其所聚而天地萬物之情可見矣傳觀萃之理可以見天地萬物之情也天地之化育萬物之生成凡有者皆聚也有无動靜終始之理聚散而已故觀其所以聚則天地萬物之情可見矣本義極言其理而贊之白雲郭氏曰天地萬物之情所以聚者不過順說而已進齋徐氏曰天地萬物髙下散殊咸則見其情之通恆則見其情之久萃則見其情之同不于其聚而觀之情之一者不可得而見矣雲峰胡氏曰咸之情通恒之情久聚之情一然其所以感所以恒所以聚則皆有理存焉如天地聖人之感感之理也如日月之得天聖人之久於道恒之理也萃之所謂聚以正所謂順天命聚之理也凡天地萬物之情可見者皆此理之可見矣故本義於所感則曰極言感通之理於所恒則曰極言恒久之道於所聚亦曰極言其理而贊之象曰澤上於地萃君子以除戎器戒不虞上時掌反傳澤上於地為萃聚之象君子觀萃象以除治戎器用戒備於不虞凡物之萃則有不虞度之事故衆聚則有爭物聚則有奪大率既聚則多故矣故觀萃象而戒也除謂簡治也去弊惡也除而聚之所以戒不虞也本義除者修而聚之之謂或問澤上於地萃君子以除戎器戒不虞朱子曰大凡物聚衆盛處必有爭故當預為之備如人少處必无爭纔人多少間便自有爭所以當預為之防也又澤本當在地中今却上於地上是水盛有潰決奔突之憂故取象如此中溪張氏曰兌澤之水上於坤地之上有散而方聚之象水聚而不防則潰衆聚而不防則亂除者去舊取新之謂戎器久則必弊當簡治而除其弊壊也雲峰胡氏曰除戎器修兵器而聚之戒不虞者防民之聚者有時而散也建安丘氏曰天生五材誰能去兵用兵亂也去兵亦亂也君子當萃聚之世而除戎器非右武也特戒不虞而已如秦皇之銷鋒鏑鑄金人李唐之議銷兵則非謂之除戎器漢武席文景富庶之極至窮兵黷武以事四夷又豈戒不虞之義乎初六有孚不終乃亂乃萃若號一握為笑勿恤往无咎號戶羔反握烏學反傳初與四為正應本有孚以相從者也然當萃時三隂聚處柔无守正之節若捨正應而從其類乃有孚而不終也乃亂惑亂其心也乃萃與其同類聚也初若守正不從號呼以求正應則一握笑之矣一握俗語一團也謂衆一有聚字以為笑也若能勿恤而往從剛陽之正應則无過咎不然則入小人之羣矣本義初六上應九四而隔於二隂當萃之時不能自守是有孚而不終志亂而妄聚也若呼號正應則衆以為笑但勿恤而往從正應則无咎矣戒占者當如是也朱子曰不知如何說個一握底句出来節齋蔡氏曰有孚應四也不終柔也三柔相比亂萃者也雙湖胡氏曰初當萃之始何遽至失信亂萃號呼而貽笑乎皆隂柔不正應又不正故也捨衆隂而往僅以隂陽相得可无咎耳取象有蒙全體義者此爻號笑一握蒙上兊艮故也雲峰胡氏曰不終隂柔不能固守之象亂隂雜之象一握隂聚之象萃與比相似比初六有孚盈缶萃之初則有孚不終比初无應而孚信充實其終也自有他吉萃初與四應而惑於二隂是有孚而不能自守志亂而不无妄聚者也聖人戒之曰若號呼九四正應則二隂必以為笑唯勿恤二隂之笑而必往從庶乎可以无咎矣象曰乃亂乃萃其志亂也傳其心志為同類所惑亂故乃萃於羣隂也不能固其守則為小人所惑亂而失其正矣六二引吉无咎孚乃利用禴禴羊畧反傳初隂柔又非中正恐不能終其孚故因其才而為之戒二雖隂柔而得中正故雖戒而微辭一作其辭微凡爻之辭關一作開得失二端者為法為戒亦各隨其才而設也引吉无咎引者相牽也人之交相求則合相待一作持則離二與五為正應當萃者也而相逺又在羣隂之間必相牽引則得其萃矣五居尊位有中正之德二亦以中正之道往與之萃乃君臣和合也其所共致豈可量也是以吉而无咎也无咎者善補過也二與五不相引則過矣孚乃利用禴孚信之在中誠之謂也禴祭之簡薄者也菲薄而祭不尚備物直以誠意交於神眀也孚乃者謂有其一作其有孚則可不用文餙専以至誠交於上一有下字也以禴言者謂薦其誠而已上下相聚而尚餙焉是未誠也蓋其中實者不假餙於外用禴之義也孚信者萃之本也不獨君臣之聚凡天下之聚在誠而已朱子曰孚乃利用禴說如伊川固好但若如此却是聖人說個影子却恐不恁地想只是說祭升卦同進齋徐氏曰二五正應宜萃也二以柔居柔中類聚而安於下五以衆歸於四有位而匪孚雖應猶未萃也人之情相求則合相持則睽二五本應相引而萃則吉无咎厚齋馮氏曰下卦中爻多引其類如泰與小畜之二是也本爻與五為正應引初六六三以萃於五為得君臣之大義故吉而无咎建安丘氏曰君臣相孚之後上下皆以誠實相與不尚虚文猶用薄祭亦可薦之於神明矣苟未孚而用禴則非所利也中溪張氏曰卦以用大牲為吉而二乃以用禴為利何歟曰備物乃王者所以隨其時有孚乃臣下所以通乎上也本義二應五而雜於二隂之間必牽引以萃乃吉而无咎又二中正柔順虚中以上應九五剛健中正誠實而下交故卜祭者有其孚誠則雖薄物亦可以祭矣漢上朱氏曰禴夏祭以聲為主祭之薄也雙湖胡氏曰周禮大宗伯以禴夏享先王王氏註曰夏則陽盛矣其享以樂為主秋嘗則薦新冬烝則衆物備雲峰胡氏曰二在三隂之中而與五應唯牽引上下而萃於五則吉无咎矣爻之象占已備而於占之下又發孚乃利用禴之義以為卜祭之占者蓋謂萃之時用大牲吉然能如六二之孚則雖用禴亦利也本義謂虚中誠實發明孚字中虚信之本中實信之質也象曰引吉无咎中未變也傳萃之時以得聚為吉故九四為得上下之萃二與五雖正應然異處有間乃當萃而未合者也故能相引而萃則吉而无咎以其有中正之德未遽至改變也變則不相引矣或曰二既有中正之徳而象云未變辭若不足何也曰羣隂比處乃其類聚方萃之時居其間能自守不變逺須正應剛立者能之二隂柔之才以其有中正之徳可覬其未至於變耳故象含其意以存戒也六三萃如嗟如无攸利往无咎小吝傳三隂柔不中正之人也求萃於人而人莫與求四則非其正應又非其類是以不正為四所棄也與二則二自以中正應五是以不正為二所不與也故欲一无欲字萃如則為人棄絶而嗟如不獲萃而嗟恨也上下皆不與无所利也唯往而從上六則得其萃為无咎也三與上雖非隂陽正應然萃之時以類相從皆以柔居一體之上又皆无與居相應之地上復處說順之極故得其萃而无咎也易道變動无常在人識之然而小吝何也三始求萃於四與二不獲而後往從上六人之動為如此雖得所求亦可小羞吝也本義六三隂柔不中不正上无應與欲求萃於近而不得故嗟如而无所利唯往從於上可以无咎然不得其萃困然後往復得隂極无位之爻亦可小羞矣戒占者當近捨不正之强援而逺結正應之窮交則无咎也東谷鄭氏曰下二隂皆萃於陽三獨无附故咨嗟怨嘆而无攸利然三不以无應之故能往歸於上上雖不相得不免小吝而亦无咎也建安丘氏曰萃初三兩隂皆萃四者聖人不欲其以不正相萃故於初曰乃亂乃萃於三曰萃如嗟如深戒夫四之不可萃也而又皆斷以往无咎之辭往前進也欲其舎四而萃上也以正相聚何咎之有雲峰胡氏曰號與嗟皆上兊口之象號可尤咎嗟何所利必不得已唯徃從上六則亦可以无咎耳上六隂極无位又非正應故曰往无咎又曰小吝者以别初之往无咎也初往從四四其應也故无咎三往從上上非應也故雖无咎又以小吝少之本義以上為正應之窮交正應二字恐誤象曰往无咎上巽也傳上居柔說之極三往而无咎者上六巽順而受之也東谷鄭氏曰上體說能巽而受之无咎也九四大吉无咎傳四當萃之時上比九五之君得君臣之聚也下比下體羣隂得下民之聚也得上下之聚可謂善矣然四以陽居隂非正也雖得上下之聚必得大吉然後為无咎也大為周遍之義无所不周然後為大无所不正則為大吉大吉則无咎也一作矣夫上下之聚固有不由正道而得者非理枉道而得君者自古多矣非理枉道而得民者蓋亦有焉如齊之陳恒魯之季氏是也然得為大吉乎得為无咎乎故九四必能大吉然後為一作能无咎也本義上比九五下比衆隂得其萃矣然以陽居隂不正故戒占者必大吉然後得无咎也中溪張氏曰四處近君之位應初比三皆有求萃於四之意然四以陽居隂位則不當以臣得民聚不以正必得大吉盡善乃无僭竊之咎否則强君在上威權太逼未有不召釁産祻者九四可以戒矣建安丘氏曰此爻與隨九四同義隨四以上承九五而致天下之隨亦有强臣逼君之象在隨以有孚而後无咎在萃以大吉而後无咎聖人之戒深矣雲峰胡氏曰比卦五隂皆比五之一陽萃四隂皆聚歸五與四之二陽四必大吉而後可以无咎五曰萃有位以見四之萃非有位者也无尊位而得衆心非大吉安能无咎如益之初九在下而受上之益且戒之曰必元吉无咎然則萃之九四在上而受下之萃戒之固宜也象曰大吉无咎位不當也傳以其位之不當疑其所為未能盡善故云必得大吉然後為一作能无咎也非盡善安得為大吉乎白雲郭氏曰四得上下之聚而非君位故言不當也九五萃有位无咎匪孚元永貞悔亾傳九五居天下之尊萃天下之衆而君臨之當正其位修其徳以陽剛居尊位稱其位矣為有其位矣一作也得中正之道无過咎也如是而有不信而未歸者則當自反以修其元永貞之徳則无思不服而悔亾矣元永貞者君之徳民所歸也故比天下之道與萃天下之道皆在此三者王者既有其位又有其徳中正无過咎而天下尚有未信服歸附者蓋其道未光大也元永貞之道未至也在修徳以来之如苗民逆命帝乃誕敷文徳舜徳非不至也蓋有逺近昏明之異故其歸有先後既有未歸則當修徳也所謂徳元永貞之道也元首也長也為君徳首出庶物君長羣生有尊大之義焉有主統之義焉而又恒永貞固則通於神眀光於四海无思不服矣乃无匪孚而其悔亡也所謂悔志之未光心之未慊也本義九五剛陽中正當萃之時而居尊固无咎矣若有未信則亦修其元永貞之徳而悔亡矣戒占者當如是也或問九五萃有位以陽剛居中正當萃之時而居尊位安得又有匪孚朱子曰此言有位而无徳則雖萃而不能使人信故人有不信當修其元永貞之徳而後悔亾也縉雲馮氏曰卦二陽爻所以聚衆隂也九四臣位九五之位則君也故九五之萃為有位以四之位不當之也匪孚有悔也必盡君道元永貞然後匪孚之悔可亾雲峰胡氏曰四必大吉而无咎矣五萃有位而无咎君臣之分也然既有位以别於四或有其位无其徳所以為五者悔當何如哉故又戒之曰雖有位可致天下之萃或有未信當修其元永貞之徳則悔亾耳比獨以九五為主故卦有元永貞之辭萃有兩陽爻故元永貞獨歸之九五元以善其始永貞以善其終比與萃非此三徳未必始終盡善也建安丘氏曰比以一陽統五隂一陽為之主也一則專専則衆隂順從唯五之歸故五有顯比之吉萃以二陽統四隂二陽為之主也二則分分則衆隂有萃四者有萃五者而五不得以専其萃故在五有匪孚永貞之戒此萃天下之道不如比天下之廣也象曰萃有位志未光也傳象舉爻上句王者之志必欲誠信著於天下有感必通含生之類莫不懐歸若尚有匪孚是其志之未光大也本義未光謂匪孚或問萃九五一爻似亦甚好而反云有位未光也是如何朱子曰見不得讀易到這樣且恁地觧去若强說便至鑿了雲峰胡氏曰四必大吉而後无咎位不當也五有位矣而匪孚志猶未光也然則欲當天下之萃者不可无其位有其位者又不可无其徳上六齎咨涕洟无咎齎音咨又將啼反洟音夷象同傳六說之主隂柔小人說髙位而處之天下孰肯與也求萃而人莫之與其窮至於齎咨而涕洟也齎咨咨嗟也人之絶之由已自取又將誰咎為人惡絶不知所為則隕穫而至嗟涕真小人之情狀也縉雲馮氏曰萃極而散窮无所歸之象齎咨嗟也涕洟悲泣也錢氏曰初之號三之嗟上之齎咨涕洟皆隂柔之常態也本義處萃之終隂柔无位求萃不得故戒占者必如此而後可以无咎也平庵項氏曰齎咨兊口之嘆涕洟兊澤之流鄭氏曰自目曰涕自鼻曰洟建安丘氏曰上六居萃之終兊之極聚終而散說極而悲理之常也上六苟能於聚終說極之時而以憂戚處之則无咎也雲峰胡氏曰三求萃不得故嗟上隂柔无位亦求萃不得故齎咨涕洟然居兊終能反兊之說而憂者故无咎臨六五既憂之无咎亦下兊之終也夫萃極感之時也宜物情和說順適以應坤兊之象今也初則號三則嗟上則齎咨涕洟何也祻福倚㐲而盛滿難居故大象有不虞之戒而六爻皆言无咎者必能補過而後无咎也象曰齎咨涕洟未安上也傳小人所處常失其宜既貪而從欲不能自擇安地至於困窮則顛沛不知所為六之涕洟蓋不安於處上也君子慎其所處非義不居不幸而有危困則泰然自安不以累其心小人居不擇安常履非據及其窮廹則隕穫躁橈甚至涕洟為可羞也未者非遽之辭猶俗云未便也未便能安於上也隂而居上孤處无與既非其據豈能安乎中溪張氏曰五為萃主而上乘之故其心憂懼未敢自安於上也建安丘氏曰萃聚也卦唯二陽而四隂皆求萃于陽者然九五得位失權九四有權无位故五萃有位匪孚四大吉无咎二與五應萃五者也以其得正則二引吉无咎初應三比萃四者也以其不正則初乃亂乃萃三萃如嗟如聖人欲其舎四而往萃於五故初與三皆言往无咎而上以柔乘剛則齎咨涕洟而已隆山李氏曰萃六爻或有應无應或當位不當位而辭皆曰无咎乃天地萬物之真情真情相合吉多凶少故也兹萃之所以亨歟巽下坤上傳升序卦萃者聚也聚而上者謂之升故受之以升物之積聚而益髙大聚而上也故為升所以次於萃也為卦坤上巽下木在地下為地中生木木生地中長而益髙為升之象也升元亨用見大人勿恤南征吉傳升者進而上也升進一作進升則有亨義而以卦才之善故元亨也用此道以見大人不假憂恤前進則吉也南征前進也本義升進而上也卦自解来柔上居四内巽外順九二剛中而五應之是以其占如此南征前進也朱子曰升南征吉異坤二卦拱得個南如看命人虚拱底說話董氏曰升者柔進而上也柔進而上所以元亨由卦才之善也潘氏夢旂曰升自下而上者也乃升之初宜擇所從惟見大徳之人則无憂向陽明之方則得吉也中溪張氏曰升進也升而上之則有大通之理是以元亨大人三也用見五應之也勿恤勿勞憂恤也南征前進也二能前進以應乎五則吉矣明夷合坤離成卦故九三亦謂之南狩雲峰胡氏曰木生於地有進而上之象巽下坤上巽坤之中有離故有南象自巽而坤其行自南故有南征之象晉與升皆取進之義晉則明已出于地上方進而未已故不假言亨升則木方生於地中他日可必其進而未已故言元亨欲進于位者用見有位之大人則不憂其位之不進欲進于徳者用見有徳之大人則不憂其徳之不進然易以陽為大凡言大人者皆陽爻也萃見大人六二見九五之大人也升見大人六五見九二之大人也六五能下應九二之剛中則不必憂而有南征之吉專以徳之進而言也隆山李氏曰升首曰元亨何也以畫言也與蠱鼎大有皆九居二六居五故皆曰元亨此蓋主陽剛之畫有應于上而言之也彖曰柔以時升本義以卦變釋卦名中溪張氏曰柔指六四也柔本居三進而為四自下升上時焉而已故曰柔以時升隆山李氏曰隂陽二氣迭為升降隂升則陽降隂降則陽升未有陽常升而不降隂常降而不升者反萃而升是二陽降居下三隂反居上故曰柔以時升進齋徐氏曰升晉二卦皆以柔為主剛則有躁進之意晉自觀来六四上而為六五故曰柔進而上行升自解来六三上而為六四故曰柔以時升晉以五為主升以四為主也雲峰胡氏曰剛而在上者常也柔升於上時也識時者方可與言易巽而順剛中而應是以大亨傳以二體言柔升謂坤上行也巽既體卑而就下坤乃順時而上升以時也謂時當升也柔既上而成升則下巽而上順以巽順之道升可謂時矣二以剛中之道應於五五以中順之徳應於二能巽而順其升以時是以元亨也彖文誤作大亨解在大有卦本義以卦徳卦體釋卦辭童溪王氏曰坤順也巽亦順也其曰巽而順則亦无適而不用其順也以此為升寧有未亨者乎厚齋馮氏曰大亨則元主九二也九二以巽而順上以剛中而應上是以大亨乃上升之象也六五升之主也知九二之才足以升也乃用順應之道以見之胡氏曰易以陽為大巽順不足以大亨必剛中而應是以大亨用見大人勿恤有慶也傳凡升之道必由大人升於位則由上公升於道則由聖賢用巽順剛中之道以見大人必遂其升勿恤不憂其不遂也遂其升則已之一作有福慶而福慶及物也臨川吴氏曰六五見九二九二亦升而應之隂陽相得而有慶也中溪張氏曰萃升皆曰剛中而應萃剛中在上其衆必聚升剛中在下其勢必進故萃以五為大人升以二為大人聚者下之所樂故利見大人進者上之所忌故勸以用見大人勿恤者言上之三隂勿以陽升為憂而陽升則有慶矣南征吉志行也傳南人之所向南征謂前進也前進則遂其升而得行其志是以吉也中溪張氏曰九二苟能前進以輔乎五則已之志得行宜其吉也二言有喜即象之有慶也五言大得志即彖之志行也平庵項氏曰用見大人勿恤戒行也南征吉勉行也象曰地中生木升君子以順徳積小以髙大傳木生地中長而上升為升之象君子觀升之象以順修其徳積累微小以至髙大也順則可進逆乃退也萬物之進皆以順道也善不積不足以成名學業之充實道徳之崇髙皆由積累而至積小所以成髙大升之義也朱子曰因其固然之理而无容私焉者順之謂也由是而之則其進得也孰禦中溪張氏曰地中有木順其生理則自萌蘖而拱把自拱把而棟梁長而不已升之象也蓋物之髙大者必以積其所積者必以順木之始生伏於地中積之不已其髙可以干霄其大可以蔽日未見其忤者以順故也君子體巽順之象以其順徳自微小積之可以至髙大也順徳坤地象積小以髙大巽木象白雲郭氏曰萬物之升其象皆如地中生木自毫末至合抱人莫見其升之迹者以順積而致之耳順則不逆於徳積則為之有漸故能升而不已以極髙大不然逆徳暴行不升而困及之矣本義王肅本順作慎今按他書引此亦多作慎意尤明白蓋古字通用也說見上篇蒙卦朱子曰樹木之生日日滋長若一日不長便將枯瘁便是生理不接學者之於學不可一日少懈大抵徳須日日要進若一日不進便退也勉齋黄氏曰升言順徳謂物理之升皆以順積而致之本義順當作慎積小髙大方有升義以其小而能髙大則不可不慎故慎義為長雲峰胡氏曰木之生也一日不長則枯徳之進也一息不慎則退必念念謹審事事謹審其徳積小髙大當如木之升矣初六允升大吉傳初以柔居巽體之下又巽之主上承於九二之剛巽之至者也二以剛中之徳上應於君當升之任者也允者信從也初之柔巽唯信從於二信二而從之同升乃大吉也二以徳言則剛中以力言則當任初之隂柔又无應援不能自升從於剛中之賢以進是由剛中之道也吉孰大焉潘氏曰初六隂柔在下无應於上本不能升宻比九二剛中之臣隂陽志合而相允九二援而升之所以大吉賢者在下而无與非遇特達之知何以自奮哉本義初以柔順居下巽之主也當升之時巽於二陽占者如之則信能升而大吉矣王氏大寶曰柔自下升以剛而孚允升之象柔得剛而大大吉之象雲峰胡氏曰晉三衆允下為二隂所信也升初允升上為二陽所信也以隂信隂不過悔亡以陽信隂故大吉象曰允升大吉上合志也傳與在上者合志同升也上謂九二從二而升乃與二同志也能信從剛中之賢一作道所以大吉九二孚乃利用禴无咎傳二陽剛而在下五隂柔而居上夫以剛而事柔以陽而從隂雖有時而然非順道也以暗而臨明以剛而事弱若黽勉於事勢非誠服也上下之交不以誠其可以一无以字乆乎其可以有為乎五雖隂柔然居尊位二雖剛陽事上者也當内存至誠不假文餙於外誠積於中則自不事外餙故曰利用禴謂尚誠敬也自古剛强之臣事柔弱之君未有不為矯餙者也禴祭之簡質者也云孚乃謂既孚乃宜不用文餙専以其誠感通於上也如是則得无咎以剛强之臣而事柔弱之君又當升之時非誠意相交其能免於咎乎本義義見萃卦建安丘氏曰二與五為正應九二為巽木剛直之幹六五在坤地之中而能生木者也二五相應而相孚猶用薄祭亦可薦之於神明矣臨川吴氏曰二剛中而應五然五柔未易速孚故必待既孚於五而後乃利用禴也禴者宗廟之禮薄於常時者然誠孚於上而後用禴則上不疑其簡故无咎中溪張氏曰萃六二以中虚為孚而與九五應升九二以中實為孚而與六五應二爻虚實雖殊其孚則一也孚則雖用禴而亦利故二爻皆曰孚乃利用禴彖言剛中而應指此爻也雲峰胡氏曰萃與升相反萃之二曰孚乃利用禴則宜如損六二十朋之龜言之於反卦六五可也今皆在下卦中爻言之何哉萃六二求萃於上升九二求升乎上故其義同萃六二以柔而應九五之剛升九二以剛而應六五之柔其以至誠感應則一也故爻辭同而彖傳剛中而應之辭亦同李氏元量曰萃之二柔也則疑於進之易故引吉无咎而後孚乃利用禴升之二剛也剛則能審義以進故即其才孚乃利用禴而无咎也象曰九二之孚有喜也傳二能以孚誠事上則不唯為臣之道无咎而已可以行剛中之道澤及天下是有喜也凡象言有慶者如是則有福慶及於物也言有喜者事既善而又一无又字有可一无可字喜也如大畜童牛之牿元吉象曰有喜蓋牿於童則易又免强制之難是有可喜也建安丘氏曰九二雖不言升而上下既巳交孚豈唯无咎且有升進之喜也縉雲馮氏曰二中也五亦中也中誠相感雖五升而不来以二之孚誠五亦不能不守貞待二而為之升階也二能感五五能待二乃成升道故贊二為有喜五為大得志九三升虚邑傳三以陽剛之才正而且巽上皆順之復有援應一作者以是而升如入无人之邑孰禦哉本義陽實隂虚而坤有國邑之象九三以陽剛當升時而進臨於坤故其象占如此雲峰胡氏曰陽一故實隂二故虚九三進臨坤隂如入无人之邑其升如此之易者剛正故也象曰升虚邑无所疑也傳入无人之邑其進无疑阻也張子曰上皆隂柔往无所疑六四王用亨于岐山吉无咎傳四柔順之才上順君之升下順下之進已則止其所焉以隂居柔隂而在下止其所也昔者文王之居岐山之下上順天子而欲致之有道下順天下之賢而使之升進已則柔順謙恭不出其位至徳如此周之王業用是而亨也四能如是則亨而吉且无咎矣四之才固自善矣復有无咎之辭何也曰四之才雖善而其位當戒也居近君之位在升之時不可復升升則凶咎可知故云如文王則吉而无咎也然處大臣之位不得无事於升當上升其君之道下升天下之賢已則止其分焉分雖當止而徳則當升也道則當亨也盡斯道者其唯文王乎進齋徐氏曰岐山在禹貢雍州境南坤西南象王蓋指文王而言六四坤體本順又以柔居柔順之至也以順道而升此岐之王業所以亨也故有吉而无咎或曰升卦二四不言升何也曰五君位也二應五大臣也四承五近臣也其位不可升也升則疑于五而有逼上之嫌矣故在二言孚在四言順其義可槩見矣本義義見隨卦或問亨于岐山朱子曰只是亨字此是王者有事于山川之卦王亨于岐山與亨于西山只是說祭山川問升萃二卦多是言祭亨萃固取聚義不知升何取義曰人積其誠意以事鬼神有升而上通之義雲峰胡氏曰隨上體兊兊正西羑里視岐山為西方故曰西山此卦上體坤坤位西南故只曰岐山山皆以在上卦取象萃曰亨曰禴升亦曰亨曰禴萃取精神之聚可以事鬼神升則言人能聚精神以事鬼神有升而上通之義象曰王用亨于岐山順事也傳四居近君之位而當升時得吉而无咎者以其有順徳也以柔居坤順之至也文王之亨于岐山亦以順時而已上順於上下順乎下已順處其義故云順事也中溪張氏曰三分天下有其二而文王以服事殷豈非順事乎宜其有亨通之吉而无僭逼之咎六四不言升者可以昭文王順事之心也本義以順而升登祭于山之象雲峰胡氏曰象自初爻至五皆贊升之易順而升亦言其升之易也六五貞吉升階傳五以下有剛中之應故能居尊位而吉然質本隂柔必守貞固乃得其吉也若不能貞固則信賢不篤任賢不終安能吉也階所由而升也任剛中之賢輔之而升猶登進自階言有由而易也指言九二正應然在下之賢皆用升之階也能用賢則彚升矣沙隨程氏曰下應剛徳之臣自二升五如階有級此人君升進賢臣之象本義以隂居陽當升而居尊位必能正固則可以得吉而升階矣階升之易者朱子曰六五貞吉升階與萃九五萃有位匪孚元永貞悔亾皆謂有其位必當有其徳若无其徳則萃雖有位而人不信雖有升階之象而不足以升矣雲峰胡氏曰九三升虚邑六五升階皆象升之易也九三剛正故无戒辭六五先貞吉之占而後升階之象者謂升而不正則不吉雖有升階之象而不足以升也楊氏曰六五以柔得尊位其進甚易故曰升階雷氏曰六五貞吉升階先儒以為踐祚蓋貞吉然後可以升天子之位也中溪張氏曰坤為上故曰階六五柔進而上行貞正則吉階而升之則由岐山而豐鎬可以尊處九陛之上矣象曰貞吉升階大得志也傳倚任賢才而能貞固如是而升可以致天下之大治其志可大得也君道之升一作興患无賢才之助爾有助則猶自階而升也節齋蔡氏曰萃者澤聚於下故九五志未光升者木升於上故六五大得志也上六㝠升利于不息之貞傳六以隂居升之極昏𡨕於升知進而不知止者也其為不眀甚矣然求升不已之心有時而用於貞正而當不息之事則為宜矣君子於貞正之徳終日乾乾自强不息如一作以上六不已之心用之於此則利也以小人貪求无已之心移於進德則何善如之本義以隂居升極昏𡨕不已者也占者遇此无適而利但可反其不已於外之心施之於不息之正而已馮氏去非曰㝠升猶言㝠行也中溪張氏曰上六處坤之上升之極猶之晦㝠隂暗而猶升焉此進而不息者也然貞而不息則利不貞而不息則何利之有若能以升位之心而移之於升徳則譬山之積塵海之積汚愈増髙大也易曰終日乾乾自强不息詩云文王之徳之純純亦不己此非利於不息之貞也歟蘭氏廷瑞曰𡨕者晦也升豫皆以隂升居上位故豫曰𡨕豫升曰𡨕升雲峰胡氏曰豫上六𡨕豫戒以成有渝升上六𡨕升戒以利乎不息之貞者豫上震震動也欲動其悔過之心變其豫不為豫也升上坤坤順也欲順其不已於進之心移於不息之貞也象曰㝠升在上消不富也傳昏㝠於升極上而不知已唯有消亾豈復有加益也不富无復增益也升既極則有退而无進也白雲郭氏曰消息一理耳息則富而消則不富也中溪張氏曰坤為𡨕晦隂虚為不富𡨕晦在上猶且升而不息豈知升極當降長極當消消則不能有其富矣建安丘氏曰升卦之義以卦變言則柔以時升六自三上升而為四也以二體言則以巽升坤下三爻為方升之人上三爻皆受其升者以六爻言則六五貞吉升階居得尊位為升之主下四爻則皆来升者也初與三於五非近非應无嫌於五故初允升三升虚邑蓋可升而升者也如九二應五則礙而不得進故孚而用禴六四近五則進而不敢逼故亨而順事是知不可升而不升者也故二爻不言升至上處窮極之地不當升而猶升焉則是𡨕升而已矣升之道可易言哉周易傳義大全卷十六
