body:
  text: 周易傳義大全卷十二明胡廣等撰周易下經艮下兌上傳咸序卦有天地然後有萬物有萬物然後有男女有男女然後有夫婦有夫婦然後有父子有父子然後有君臣有君臣然後有上下有上下然後禮義有所錯天地萬物之本夫婦人倫之始所以上經首乾坤下經首咸繼以恒也天地二物故二卦分爲天地之道男女交合而成夫婦故咸與恒皆二體合爲夫婦之義咸感也以說爲主恒常也以正爲本而說之道自有正也正之道固有說焉巽而動剛柔皆應說也咸之爲卦兌上艮下少女少男也男女相感之深莫如少者故二少爲咸也艮體篤實止爲誠慤之義男志篤實以下交女心說而上應男感之先也男先以誠感則女說而應也建安丘氏曰咸二少相交者夫婦之始也所以論一時交感之情故以男下女爲象男先下於女婚姻之道成矣恒二長相承者夫婦之終也所以論萬世處家之道故以男尊女卑爲象女下於男居室之倫正矣或曰卦以二少二長相重者不有損益乎曰損雖二少而男不下女咸感之義㣲矣益雖二長而女居男上恒久之義悖矣此下經所以不首損益而首咸恒也雲峯胡氏曰先天八卦之象說卦凡兩言之先言天地而即繼之以山澤繼言水火雷風而終之以山澤相薄者有貴於不相悖不相射者有貴於相逮唯通氣則兩言之不改然則上經首於乾坤者天地定位也下經首於咸者山澤通氣也位欲其分故乾坤分而爲二卦氣欲其合故山澤合而爲一卦又易八純卦六爻皆不應泰否咸恒損益既未濟六爻皆應泰否天地相應故居上篇咸損少男少女相應恒益長男長女相應既未濟中男中女相應故居下篇咸以少男下少女又應之切至者故居下篇之首故上經彖辭不言女下經咸取女吉家人利女貞姤勿用取女漸女歸吉多言婚娶之事而自於咸見之咸亨利貞取女吉取七具反傳咸感也不曰感者咸有皆義男女交相感也物之相感莫如男女而少復甚焉凡君臣上下以至萬物皆有相感之道物之相感則有亨通之理君臣能相感則君臣之道通上下能相感則上下之志通以至父子夫婦親戚朋友皆情意相感則和順而亨通事物皆然故咸有亨之理也利貞相感之道利在於正也不以正則入於惡矣如夫婦之以滛姣君臣之以媚說上下之以邪僻皆相感之不以正也取女吉以卦才言也卦有柔上剛下二氣感應相與止而說男下女之義以此義取女則得正而吉也本義咸交感也兌柔在上艮剛在下而交相感應又艮止則感之專兌說則應之至又艮以少男下於兌之少女男先於女得男女之正婚姻之時故其卦爲咸其占亨而利貞取女則吉葢感有必通之理然不以貞則失其亨而所爲皆凶矣西溪李氏曰易无思也无爲也寂然不動感而遂通天下之故有心於求感非易之道也故去心而名卦以咸閭丘氏昕曰感非其正則夫婦不以禮合君臣不以道合朋友不以義合終必至於睽離故曰亨利貞中溪張氏曰物之相感莫如男女之少者故二少爲咸上下交感則有亨通之理然相感之道利在守正以此道而取女其吉可知雲峯胡氏曰咸感也不曰感而曰咸咸皆也无心之感也无心於感者无所不感也感則必通而利在於貞凡言感之道當如此取女吉專言取女者當如此女以静正爲主男不下女而女從之非貞女也不可取矣雙湖胡氏曰文王於咸卦自取取女象二卦重在三上兩爻三爲艮主上爲兌主男女皆得其正故曰利貞故取女吉也况二五又正其不正者初四而已曰取女二體又以艮爲重而咸之所以得名亦由於艮艮爲感主而兑已是應體本義謂艮止則感之專兌說則應之至已盡卦義此所以二少尤有夫婦感應之道而爲下經之首與乾坤分主上下經也先儒謂上經乾坤以二老對立下經咸以二少合體深爲得之彖曰咸感也本義釋卦名義臨川呉氏曰卦之二體陽感而隂應隂感而陽應六畫皆相與卦之所以得咸感之名也建安丘氏曰咸者感也所以感者心也无心者不能感故咸加心而爲感有心於感者亦不能咸感故感去心而爲咸咸皆也唯无容心於咸然後无所不感聖人以咸名卦而彖以感釋之所以互明其㫖也柔上而剛下二氣感應以相與止而說男下女是以亨利貞取女吉也說音悦男下之下遐嫁反傳咸之義感也在卦則柔爻上而剛爻下柔上變剛而成兌剛下變柔而成艮隂陽相交爲男女交感之義又兌女在上艮男居下亦柔上剛下也隂陽二氣相感相應而和合是相與也止而說止於說爲堅慤之意艮止於下篤誠相下也兌說於上和說相應也以男下女和之至也相感之道如此是以能亨通而得正取女如是則吉也卦才如此大率感道利於正也厚齋馮氏曰剛柔以質言感應以氣言乾之氣應乎坤坤應之而成兌是坤與乾也坤之氣感乎乾乾應之而成艮是乾與坤也縉雲馮氏曰柔上剛下感應相與所以爲亨止而說所以利貞男下女所以取女吉也龜山楊氏曰止而說以卦才言也夫婦之道止而不說則離說而不止則亂男不下女則剛柔不接非夫婦之正也建安丘氏曰柔上上也六本居三上與乾交而爲兌也剛下三也九本居上下與坤交而爲艮也二氣感應以相與山澤通氣也不言山澤者言山澤則不見相與之義故以二氣言之觀恒言雷風相與則知二氣相與之爲山澤爾此釋咸亨義止而說以二德言人心之說動易失正唯止而能說則无徇情縱欲之失此釋利貞義男下女以二象言謂以艮之少男下於兌之少女也凡婚姻之道无女先男者必女守貞静男先下之則爲得男女之正此釋取女吉義故下以是以二字總結之本義以卦體卦德卦象釋卦辭或以卦變言柔上剛下之義曰咸自旅來柔上居六剛下居五也亦通雲峯胡氏曰以卦體釋亨以卦德釋利貞止而後說所以爲貞不止非貞也以卦象釋取女吉天地感而萬物化生聖人感人心而天下和平觀其所感而天地萬物之情可見矣傳既言男女相感之義復推極感道以盡天地之理聖人之用天地二氣交感而化生萬物聖人至誠以感億兆之心而天下和平天下之心所以和平由聖人感之也觀天地交感化生萬物之理與聖人感人心致和平之道則天地萬物之情可見矣感通之理知道者黙而觀之可也本義極言感通之理胡氏曰天地感而萬物化生言乾坤交而大化行也聖人感人心而天下和平言二五交而治化行也張氏彭老曰分而言之則天地萬物以化生相感應聖人天下以和平相感應天地自天地聖人自聖人也合而言之此之呼吸語黙即彼之翕張闔闢此之喜怒哀樂即彼之慘舒榮悴道化之宰生意之充天地即聖人聖人即天地也中溪張氏曰天地之感也以氣聖人之感人也以心天地交感而萬物有化生之理聖人感人心而天下有和平之治寂然不動性也感而遂通情也於其所感而觀之而天地萬物之情可得而見矣情者感而動者也節齋蔡氏曰天地萬物之情感而必應應感之間情无所遁矣雲峯胡氏曰上經首乾氣化之始而曰品物流形下經首咸形化之始而曰二氣感應氣與形固未嘗相離也上經首乾彖傳言性下經首咸彖傳言情復之彖言天地之心咸言人心學易者於此當有悟矣象曰山上有澤咸君子以虗受人傳澤性潤下土性受潤澤在山上而其漸潤通徹是二物之氣相感通也君子觀山澤通氣之象而虗其中以受於人夫人中虗則能受實則不能入矣虗中者无我也中无私主則无感不通以量而容之擇合一作交而受之非聖人有感必通之道也朱子曰山上有澤當如伊川說水潤土燥有受之義上若不虗如何受得上兑下艮兑上缺有澤口之象兑下二陽畫有澤底之象艮上一畫陽有土之象下二隂畫中虗便是滲水之象問程傳以量而容之莫是要著意容之否曰非也以量者乃是隨我量之大小以容之便是不虗了中溪張氏曰水之性潤下土之性受潤土之中虗者則於潤无所不受心之中虗者則於人何所不容實則不能相入矣本義山上有澤以虗而通也白雲郭氏曰山澤通氣而後萬物化生君子法之以虗受人唯虗故受受故能感不能感者以不能受故也不能受者以不能虗中故也建安丘氏曰山上有澤其中必虗虗則山澤之氣通而感應之理以生君子觀虗而能感之象而以虗受人人之一心其寂然不動感而遂通者虗故也苟以私意實之則先入者爲主而感應之機窒雖有至者皆捍之而不受矣故山以虗則能受澤心以虗則能受人雲峯胡氏曰咸取无心之義以虗受人无心之感也上經首乾坤自强反諸己厚德施於人下經首咸恒虗以施於人立則反諸己初六咸其拇拇茂后反傳初六在下卦之下與四相感以㣲處初其感未深豈能動於人故如人拇之動未足以進也拇足大指人之相感有淺深輕重之異識其時勢則所處不失其宜矣本義拇足大指也咸以人身取象咸於最下咸拇之象也感之尚淺欲進未能故不言吉凶此卦雖主於感然六爻皆宜静而不宜動也藍田呂氏曰初與四應四以心感而初以足行不曰足而曰拇者以隂居下静而未行葢心感而跡未應也厚齋馮氏曰九四心之象咸之主也下體自拇而腓腓而股皆聼命於心而初六正應九四則尤爲所感之專者特去四尚歴三爻視腓之近以爲行故未有吉凶吉凶生乎動者也雙湖胡氏曰拇只取下體初象觧九四觧而拇亦指初也嘗觀文王於兩體重在三上兩爻以男女之正取婚姻之象周公於六爻又自以人身取象以四當心位爲感之主絶无卦辭之意卦爻不同如此使爻辭皆作於文王必互相𤼵明矣雲峯胡氏曰咸恒初爻皆淺之地咸拇感之未深而艮性能止故不言吉凶恒初未可求深而巽性善入雖貞亦凶淺深輕重異宜學易者信不可不知時也象曰咸其拇志在外也傳初志之動感於四也故曰在外志雖動而感未深如拇之動未足以進也中溪張氏曰初與四爲正應所感雖淺然觀其拇之動則知其志已在乎外卦之九四矣六二咸其腓凶居吉腓房非反傳二以隂在下與五爲應故設咸腓之戒腓足肚行則先動足乃舉之非如腓之自動也二若不守道待上之求而如腓之動則躁妄自失所以凶也安其居而不動以待上之求則得進退之道而吉也二中正之人以其在咸而應五故爲此戒復云居吉若安其分不自動則吉也本義腓足肚也欲行則先自動躁妄而不能固守者也二當其處又以隂柔不能固守故取其象然有中正之德能居其所故其占動凶而静吉也進齋徐氏曰咸體宜靜二柔不知順理而躁妄失正故凶中溪張氏曰六二在下體之中故曰咸其腓二與五爲正應當待五之感而後動今乃不待九五之感而先動躁妄自失所以凶也然以柔履柔則當其位苟能居以俟之不亦吉乎楊氏曰六二之感以腓可謂凶矣然居而不行静而不動故可以易凶而吉易害而利矣誠齋楊氏曰鍾不扣而鳴則妖石非言之物而言則怪物有不感而自動者乎故以居爲吉雲峯胡氏曰咸艮皆取身爲象咸六二即艮六二艮其腓不言吉凶咸其腓則曰凶者躁動故凶也居吉即艮其腓之謂也在咸下體則凶如艮本體則吉象曰雖凶居吉順不害也傳二居中得正所應又中正其才本善以其在咸之時質柔而上應故戒以先動求君則凶居以自守則吉象復明之云非戒之不得相感唯順理則不害謂守道不先動也中溪張氏曰隂性本静二能順其性而不動則不至有私感之害矣六二之居吉即洪範之用静吉也九三咸其股執其隨徃吝傳九三以陽居剛有剛陽之才而爲主於内居下之上是宜自得於正道以感於物而乃應於上六陽好上而說隂上居感說之極故三感而從之股者在身之下足之上不能自由隨身而動者也故以爲象言九三不能自主隨物而動如股然其所執守者隨於物也剛陽之才感於所說而隨之如此而徃可羞吝也東谷鄭氏曰初與二隂也感於陽而動故其咸爲拇爲腓三陽爲艮主宜止而不動今亦說上隂而應之故爲咸其股本義股隨足而動不能自專者也執者主當持守之意下二爻皆欲動者三亦不能自守而隨之徃則吝矣故其象占如此中溪張氏曰九三居下體之上故曰咸其股股不能自行而隨足以動是堅執下隨之說者也以此而徃誠有羞吝雲峯胡氏曰腓居下體之中二象股居下體之上三象程子謂三隨上蔡氏謂三動而二隨之本義以爲股隨足而動象三隨二與初而動艮言隨在二二腓隨三之限而止也咸言隨在三三股隨下之足而動也進齋徐氏曰世之君子位居人上所守不正感不以道而反徇夫䙝御臣僕在下者之私情至於多行可愧者皆執其隨者也象曰咸其股亦不處也志在隨人所執下也傳云亦者葢象辭一作體本不與易相比自作一處故諸爻之象辭意有相續者此言亦者承上爻一有象字辭也上云咸其拇志在外也雖凶居吉順不害也咸其股亦不處也前一作下二隂爻皆有感而動三雖陽爻亦然故云亦不處也不處謂動也有剛陽之質而不能自主一作立一作處志反在於隨人是所操執者卑下之甚也本義言亦者因前二爻皆欲動而云也二爻隂躁其動也宜九三陽剛居止之極宜静而動可吝之甚也建安丘氏曰下卦二隂感物而動故不知止三剛而止體乃亦如二隂之爲故曰亦不處陽在上而下隨二隂故曰所執下也雲峯胡氏曰彼不處而我亦不處不能自立而日究乎汚下者也九四貞吉悔亡憧憧徃來朋從爾思憧昌容反又音童傳感者人之動也故皆就人身取象拇取在下而動之㣲腓取先動股取其隨九四无所取直言感之道不言咸其心感乃心也四在中而居上當心之位故爲感之主而言感之道貞正則吉而悔亡感不以正則有悔也又四說體居隂而應初故戒於貞感之道无所不通有所私係則害於感通乃有悔也聖人感天下之心如寒暑雨𤾉无不通无不應者亦貞而已矣貞者虗中无我之謂也憧憧徃來朋從爾思夫貞一則所感无不通若徃來憧憧然用其私心以感物則思之所及者有能感而動所不及者不能感也是其朋類則從其思也以有係之私心既主於一隅一事豈能廓然无所不通乎繫辭曰天下何思何慮天下同歸而殊塗一致而百慮天下何思何慮夫子因咸極論感通之道夫以思慮之私心感物所感狹矣天下之理一也塗雖殊而其歸則同慮雖百而其致一有極字一作極致則一雖物有萬殊事有萬變統之以一則无能違也故貞其意則窮天下无不感通焉故曰天下何思何慮用其思慮之私心豈能无所不感也日徃則月來月徃則日來日月相推而明生焉寒徃則暑來暑徃則寒來寒暑相推而歲成焉徃者屈也來者信也屈信相感而利生焉此以徃來屈信明感應之理屈則有信信則有屈所謂感應也故日月相推而明生寒暑相推而歲成功用由是而成故曰屈信相感而利生焉感動也有感必有應凡有動皆爲感感則必有應所應復爲感一有所字感復有應所以不已也尺蠖之屈以求信也龍蛇之蟄以存身也精義入神以致用也利用安身以崇德也過此以徃未之或知也前云屈信之理矣復取物以明之尺蠖之行先屈而後信葢不屈則无信信而後有屈觀尺蠖則知感應之理矣龍蛇之藏所以存息其身而後能奮迅也不蟄則不能奮矣動息相感乃屈信也君子潛心精㣲之義入於神妙所以致其用也潛心精㣲積也致用施也積與施乃屈信也利用安身以崇德也承上文致用而言利其施用安處其身所以崇大其德業也所爲合理則事正而身安聖人一作賢能事盡於此矣故云過此以徃未之或知也窮神知化德之盛也既云過此以徃未之或知更以此語終之云窮極至神之妙知化育之道德之至盛也无加於此矣程子曰咸九四言貞吉悔亡言感之不可以心也天地之間只有一箇感與應而已更有甚事天地之常以其心普萬物而无心聖人之常以其情順萬物而无情故君子之學莫若廓然而大公物來而順應窮神知化化之妙者神也易聖人所以立道窮神則无易矣或問咸九四傳說虗心貞一處全似敬朱子曰葢嘗有此語曰敬心之貞也問感通之理曰感是事來感我通是自家受他感處之意問明道云莫若廓然而大公物來而順應如何曰廓然大公便不是憧憧物來順應便不是朋從爾思此只是比而不周周而不比之意問伊川觧屈信徃來一叚以屈伸爲感應屈伸之與感應若不相似何也曰屈則感伸伸則感屈自然之理也今以鼻息觀之出則必入出感入也入則必出入感出也故曰感則有應應復爲感所感復有應屈伸非感應而何凡在天地間无非感應之理造化與人事皆是感應且如雨𤾉雨不成只管雨便感得箇𤾉來𤾉不成只管𤾉𤾉已是應處又感得雨來寒暑晝夜无非此理如人夜睡不成只管睡至曉湏著起來一日運動向晦亦湏當息凡一死一生一出一入一徃一來一語一黙皆是感應如古今天下有一盛必有一衰聖人在上兢兢業業必曰保治及至衰廢自是整頓不起然不成一向如此必有興起時節問如日徃則感得那月來月徃則感得那日來寒徃則感得那暑來暑徃則感得那寒來一感一應一徃一來其理无窮感應之理是如此曰此以感應之理言之非有情者云有動皆爲感似以有情者言父慈則感得那子愈孝子孝則感得那父愈慈其理亦只一般又問那感應理於學者工夫有用處否曰此理无乎不在如何學者用不得精義入神以致用也利用安身以崇德也正是這道理易傳中說過此以徃未之或知也之意爲學正如推車子相似才用力推得動了便自轉將去更不費力節齋蔡氏曰憧憧動心之貌貞則静静則虗虗則一一則於來也无迎於徃也无將既應之後葢猶未應之初也静亦定動亦定寂也未嘗不感感也未嘗不寂何憧憧之有誠齋楊氏曰九四適當心位不言心而言思者責其廢心而任思也以思窮物適以物窮思安能窮神知化而成光大之盛德哉子曰天下何思何慮此之謂也龜山楊氏曰初言咸其拇二言咸其腓三言咸其股五言咸其脢上言咸其輔頰舌而九四一爻由一身觀之則心是也獨不言心其說葢有心以感物則其應必狹唯无心而待物之感故能无所不應焉其繇曰貞吉悔亡憧憧徃來朋從爾思夫思皆縁其類而已不能周也所謂朋從者以類而應故也故繋辭曰天下何思何慮天下同歸而殊塗一致而百慮天下何思何慮夫心猶鏡也居其所而物自以形來則所鑒者廣矣若執鏡隨物以度其形其照幾何本義九四居股之上脢之下又當三陽之中心之象咸之主也心之感物當正而固乃得其理今九四乃以陽居隂爲失其正而不能固故因占設戒以爲能正而固則吉而悔亡若憧憧徃來不能正固而累於私感則但其朋類從之不復能及逺矣或問程傳云貞者虗中无我之謂本義云貞者正而固不同何也朱子曰某尋常觧經只要依訓詁說字如貞字作正而固子細玩索自有滋味若曉得正而固則虗中无我亦在裏靣問貞吉悔亡憧憧徃來朋從爾思葢一徃一來皆感應之常理也加憧憧焉則私矣此以私感彼以私應所謂朋從爾思非有感必通之道矣曰然問憧憧徃來朋從爾思曰徃來自不妨天地間自是徃來不絶只不合著憧憧了便是私意聖人未嘗不教人思只是不可憧憧這便是私了感應自有箇自然底道理何必思他若是義理却不可不思問憧憧徃來朋從爾思莫是此感彼憧憧是添一箇心否曰徃來固是感應憧憧是一心方欲感他一心又欲他來應如正其義便欲謀其利明其道便欲計其功又如赤子入井之時此心方怵惕要去救他又欲他父母道我好這便是憧憧底病問徃來是心中憧憧然徃來猶言徃來於懐否曰非也繫辭分明說日徃則月來月徃則日來寒徃則暑來暑徃則寒來安得爲心中之徃來這箇只是對那日徃則月來底說那箇是自然之徃來此憧憧者是加私意不好底徃來憧憧只是加一箇忙廹底心不能順自然之理猶言助長正心與計獲相似方徃時又便要來方來時又便要徃只是一箇忙問憧憧徃來如覇者以私心感人便要人應自然徃來如王者我感之也无心而感其應我也无心而應周徧公溥无所私係如此是否曰是如此又問此以私而感恐彼之應者非以私而應只是應之者有限量否曰也是以私而應如自家以私惠及人少閒被我之惠者則以我爲恩不被我之惠者則不以我爲恩矣王者之感如云王用三驅失前禽去者不以爲恩獲者不以爲怨如此方是公正无私心感應二字有二義以感對應而言則彼感而此應專於感而言則感又兼應意易咸感處伊川說得未備徃來自還他有自然之理唯正静爲主則吉而悔亡至於憧憧則私意爲主而思慮之所及者朋從所不及者不從矣是以事未至則迎之事已過則將之全掉脫他不下今人皆病於无公平之心所以事物之來少有私意雜焉則䧟於所偏重矣徃來是感應合當底憧憧是私感應自是當有只是不當私感應爾問感只是内感曰物固有内感者然亦不專是内感固有外感者所謂内感如一動一静一徃一來此只是一物先後自相感如人語極湏黙黙極湏語此便是内感若有人自外來唤自家只是唤做外感感於内者自是内感於外者自是外如此㸔方周徧平正只做内感便偏頗了節齋蔡氏曰四當心位不曰咸其心者感通之道如天地聖人无不感通者亦唯此理之公无係於物云爾有心則拘矣故不言心雙湖胡氏曰四不正而云貞吉悔亡者貞則吉而悔可亡戒之也葢四與初爲徃來之爻而二爻皆不正故戒以憧憧徃來則所感者狹而不廣矣四當心象而不言心者以心在内而不可見故特言心之用思者心之用也雲峯胡氏曰爻言貞吉悔亡凡四卦皆先占後象巽九五咸大壯未濟皆九四九居四本非貞而有悔聖人因占設戒兩開其端以爲貞者正而固也如是則吉而悔亡若憧憧於徃來則失其正而固者矣寂然不動心之體感而遂通天下之故心之用憧憧徃來已失其寂然不動之體所思者朋類之從爾安能感而遂通天下之故哉象曰貞吉悔亡未感害也憧憧徃來未光大也傳貞則吉而悔亡未爲私感所害也係私應則害於感矣憧憧徃來以私心相感感之道狹矣故云未光大也本義感害言不正而感則有害也中溪張氏曰四當心位而不言心爻言思象言感者即心也夫本然虗静之天純乎貞一未有私感之害故吉而悔亡若憧憧然徃來乎比應之間則意向不定其所感者狹矣匪其朋則不從故曰未光大也雲峯胡氏曰二與四皆有吉四正而感則亦免於害九五咸其脢无悔脢武杯反又音毎傳九居尊位當以至誠感天下而應二比上若係二而說上則偏私淺狹非人君之道豈能感天下乎脢背肉也與心相背而所不見也言能背其私心感非其所見而說者則得人君感天下之正而无悔也或問程傳曰感非其所見而說者此是任貞一之理則如此朱子曰武王不泄邇不忘逺是其心量該遍故周流如此是此義也西溪李氏曰悔亡是有悔而亡之也无悔是无復有悔也中溪張氏曰九五尊居君位可以感人心而天下和平矣而僅能无悔何耶葢五與六二爲應又比上六係二而說上所感以私非聖人感人心之正道亦猶背肉之脢與心相背而昧无所見也本義脢背肉在心上而相背不能感物而无私係九五適當其處故取其象而戒占者以能如是則雖不能感物而亦可以无悔也節齋蔡氏曰脢无所感者无所感故无悔雲峯胡氏曰子夏云在脊曰脢諸爻象拇象股象心皆戒其感於物而動五象脢不動矣而又不能感物諸爻動而无静五静而无動皆非心之正也但以其无私係故曰无悔非深取之也象曰咸其脢志末也傳戒使背其心而咸脢者爲其存心一作志淺末係二而說上感於私欲也本義志末謂不能感物雲峯胡氏曰初曰志在外三曰志在隨人五雖无私係不能感物其志如此亦末矣上六咸其輔頰舌傳上隂柔而說體爲說之主又居感之極是其欲感物之極也故不能以至誠感物而𤼵見於口舌之間小人女子之常態也豈能動於人乎不直云口而云輔頰舌亦猶今人謂口過曰唇吻曰頰舌也輔頰舌皆所用以言也本義輔頰舌皆所以言者而在身之上上六以隂居說之終處咸之極感人以言而无其實又兌爲口舌故其象如此凶咎可知或問上六咸其輔頰舌竊意此爻宜有悔吝而不言悔吝何也朱子曰吉凶悔吝係乎邪正此但見其不足以感人之意耳未見有失故不得以悔吝言也童溪王氏曰上六居感之極常以兌之口舌務爲柔媚極感之事此小人女子之常態故曰咸其輔頰舌雲峯胡氏曰拇腓股動於下輔頰舌動於上感宜静不宜動况動以口乎感以言非矣况无實乎艮象輔咸象輔頰舌咸極於說艮終於止新安程氏曰初與四應故拇與心皆在前二與五應故腓與脢皆在後三與上應故股與輔頰皆在兩旁而舌居中有至理存焉象曰咸其輔頰舌滕口說也傳唯至誠爲能感人乃以柔說滕揚於口舌言說豈能感於人乎本義滕騰通用童溪王氏曰夫以心思感人所感己狹况滕口說以求感其能感人乎此感道之衰也中溪張氏曰蘇秦張儀之徒縱横其說即滕口說也或問咸内卦艮止也何以皆說動朱子曰艮雖是止然咸有交感之義都是要動所以都說動卦體雖是動然纔動便不吉動之所以不吉者以其内卦属艮也艮咸二卦皆就人身取義皆主静如艮其趾能止其動便无咎艮其腓腓亦動物故止之不拯其隨是不能拯止其隨限而動也故其心不快限即腰所在咸其拇自是不合動咸其腓亦是欲隨股而動動則凶不動則吉咸就人身取象㸔來便也是有些取象說咸上一畫如人口中三畫有腹背之象下有人脚之象艮就人身取象便也如此上一陽畫有頭之象中二隂有口之象所以艮其輔於五爻見内卦之下亦有足之象厚齋馮氏曰吉凶悔吝生乎動者咸感於物而動故六爻之中吉凶悔吝之辭備焉然感生於心唯心正則所感正而所動皆正故以貞吉戒九四葢吉凶悔吝之所由生也下三爻足之象感於動者也上二爻喉舌之象感於言者也建安丘氏曰咸六爻以人身取象上卦象上體下卦象下體初在下體之下爲拇二在下體之中爲腓三在下體之上爲股此下卦三爻之序也四在上體之下爲心五在上體之中爲脢上在上體之上爲口此上卦三爻之序也拇腓股隨體而動應感者也脢不能思无感者也輔頰舌以言爲說不足以感人者也皆不能盡乎感之道惟四居心位爲感之主似知感之義者然无心者固无所感而有心者憧憧徃來亦不能以咸感感之道其難哉大傳曰夫易无思也无爲也寂然不動感而遂通天下之故必如是而後可以言咸感之道巽下震上傳恒序卦夫婦之道不可以不久也故受之以恒恒久也咸夫婦之道夫婦一有之道字終身不一有可字變者也故咸之後受之以恒也咸少男在少女之下以男下女是男女交感之義恒長男在長女之上男尊女卑夫婦居室之常道也論交感之情則少爲親切論尊卑之序則長當謹正故兌艮爲咸而震巽爲恒也男在女上男動於外女順於内人理之常故爲恒也又剛上柔下雷風相與巽而動剛柔相應皆恒之義也程子曰咸恒體用也體用无先後節齋蔡氏曰上篇首乾坤言天地氣化之道下篇首咸恒言男女形化之道氣形之分雖有兩端究其所自則一原耳形化即氣化也使形化或息則氣化復作矣積土之草木聚水之蟲魚皆自然而生者也孫氏曰咸以男下女以成其家既成其家不可以不正也猶君先下臣以成其國既成其國不可以不治也故恒以二長相與因見正家之道隆山李氏曰易中諸卦大率皆以兩兩相從而合兩爲一隂陽相等則其爲用可以至於久大不爾偏隂偏陽造化將无所寄其作用矣然以巽遇艮而隂老陽少則爲蠱以兑遇震而陽老隂少則爲歸妹不若咸少男少女之相配恒長男長女之相匹隂陽之氣等而无差此其所以爲下經之首歟恒亨无咎利貞利有攸徃傳恒者常久也恒之道可以亨通恒而能亨乃无咎也恒而不可以亨非可恒之道也爲有咎矣如君子之恒於善可恒之道也小人恒於惡失可恒之道也恒所以能亨由貞正也故云利貞夫所謂恒謂可恒久之道非守一隅而不知變也故利於有徃唯其有徃故能恒也一定則不能常矣又常久之道何徃不利本義恒常久也爲卦震剛在上巽柔在下震雷巽風二物相與巽順震動爲巽而動二體六爻隂陽相應四者皆理之常故爲恒其占爲能久於其道則亨而无咎然又必利於守貞則乃爲得所常久之道而利有所徃也中溪張氏曰恒常久也恒字左旁從立心右旁從一日乃立心如一日也男上女下男尊女卑長男居外長女居内乃居室之恒故爲恒也恒而能久有亨之理亨則无咎而利於貞正利有攸徃也進齋徐氏曰聞之師曰恒有二義有不易之恒有不已之恒利貞者不易之恒也利有攸徃者不已之恒也合而言之乃常道也倚於一偏則非道矣雲峯胡氏曰乾坤氣化之始故曰元亨利貞咸恒形化之始故曰亨而不言元然咸亨不以正徒爲人欲之感恒亨不以正亦非天理之常也故皆以利貞戒之彖曰恒久也傳恒者長久之義也朱子曰恒是箇一條物事徹頭徹尾不是尋常字古字作恆其說象一隻船兩頭靠岸可見徹頭徹尾剛上而柔下雷風相與巽而動剛柔皆應恒傳卦才有此四者成恒之義也剛上而柔下謂乾之初上居於四坤之初一作四下居於初剛爻上而柔爻下也二爻易處則成震巽震上巽下亦剛上而柔下也剛處上而柔居下乃恒道也雷風相與雷震則風𤼵二者相湏交助其勢故云相與乃其常也巽而動下巽順上震動爲以巽而動天地造化恒久不已者順動而已巽而動常久之道也動而不順豈能常也剛柔皆應一有恒字一卦剛柔之爻皆相應剛柔相應理之常也此四者恒之道也卦所以為恒也雙湖胡氏曰剛上柔下乾坤交而雷風相與矣巽而後動卦體成而剛柔皆應矣此名卦所以有取於恒也兼山郭氏曰剛上柔下剛柔之常也雷風相與二氣之常也剛柔皆應交感之常也童溪王氏曰恒之六爻剛柔皆應自初至上三剛三柔各居相應之地理之常也中溪張氏曰不能體常者不可以盡變不能盡變者不可以體常天地所以能常久者以其能盡變也經曰易窮則變變則通通則久乆而无弊者其變之謂乎知柔上剛下者爲變則知剛上柔下者爲常矣知震雷暴風爲變則知雷風相與爲常矣本義以卦體卦象卦德釋卦名義或以卦變言剛上柔下之義曰恒自豐來剛上居二柔下居初也亦通雲峯胡氏曰咸以卦體卦德卦象釋卦辭恒亦疊是三者僅以釋卦名義葢咸之感者易知恒之所以爲久者未易知也恒亨无咎利貞久於其道也傳恒之道可致亨而无過咎但所恒宜得其正失正則非可恒之道也故曰久於其道其道可恒之正道也不恒其德與恒於不正皆不能亨而有咎也雲峯胡氏曰咸恒皆言利貞咸止而說即是貞恒巽而動動未必貞也故彖詳焉天地之道恒久而不已也傳天地之所以不已葢有恒久之道人能恒於可恒之道則合天地之理也本義恒固能亨且无咎矣然必利於正乃爲久於其道不正則久非其道矣天地之道所以長久亦以正而已矣朱子曰正便能久天地之道恒久而不已這箇只是說久雙湖胡氏曰亨无咎者以其利在於貞也恒久之大者莫如天地天地之道亦貞觀而已卦自乾坤交故以天地言也利有攸徃終則有始也傳天下一作地之理未有不動而能恒者也動則終而復始所以恒而不窮凡天地所生之物雖山嶽之堅厚未有能不變者也故恒非一定之謂也一定則不能恒矣唯隨時變易乃常道也故云利有攸徃明理之如是懼人之泥於常也或問易傳云恒非一定之謂一定則不能恒矣唯隨時變易乃常道也竊謂有不一定而隨時變易者有一定而不可變易者朱子曰他政是論物理之始終變易所以爲恒而不窮處然所謂不易者亦湏有變通乃能不窮如君尊臣卑分固不易然上下不交也不得父子固是親親然所謂命士以上父子皆異宮則又有變焉唯其如此所以爲恒論其體終是常然體之常所以爲用之變用之變所以爲體之常又曰恒非一定之謂故晝則必夜夜而復晝寒則必暑暑而復寒若一定則不能常也其在人冬日則飲湯夏日則飲水可以仕則仕可以止則止今日道合便從明日不合則去又如孟子辭齊王之金而受薛宋之餽皆隨時變易故可以爲常也能常而後能變能常而不已所以能變及其變也常亦只在其中伊川却說變而後能常非是童溪王氏曰天地之道自百刻積而爲晝夜自晝夜積而爲寒暑晝夜寒暑相爲徃來遲速進退機緘不停故終始相循如環无端者葢有恒而然也唯其有恒故有徃而利如此也如使有徃而不利則止有今日之晝夜今歲之寒暑烏有來日晝夜來歲寒暑乎本義久於其道終也利有攸徃始也動静相生循環之理然必静為主也臨川異氏曰天地之道非以一定爲可恒久以其變易相禪運動不已也所謂利有攸徃者欲其終則復始如環无端而後可恒久也雙湖胡氏曰利有攸徃者以二體相仍終則有始也巽終於三有震陽以始之震終於上又有巽隂以始之无間容息也雲峯胡氏曰本義釋乾彖曰始即元也終則貞也不終則无始不貞則无以為元乾言天道之終始此言人之於道其始終當如此不貞无以爲元不静无以爲動其爲始終循環之妙一也日月得天而能久照四時變化而能久成聖人久於其道而天下化成觀其所恒而天地萬物之情可見矣傳此極言常理日月隂陽之精一有二字氣耳唯其順天之道徃來盈縮故能久照而不已得天順天理也四時隂陽之氣耳徃來變化生成萬物亦以得天故常久不已聖人以常久之道行之有常而天下化之以成美俗也觀其所恒謂觀日月之久照四時之久成聖人之道所以能常乆之理觀此則天地萬物之情理可見矣天地常久之道天下常久之理非知道者孰能識之本義極言恒久之道朱子曰物各有箇情有箇人在此决定是有箇羞惡惻隐是非辭譲之情性只是箇物事情却多般或起或滅然而頭面却只一般長長恁地這便是觀其所恒而天地萬物之情可見之義誠齋楊氏曰天地能變故三百六十五度之推移終古而不息日月能變故或一月一周天或一歲一周天故其明不已四時能變故温凉者繼之以寒凛寒凛者繼之以溽暑循環不已即是而推无非由變而恒恒而變也白雲郭氏曰彖言所以爲恒者四剛上而柔下雷風相與巽而動剛柔相應是也又言恒之所以爲道者二久於其道也終則有始也久於其道雖天地亦如之終則有始雖日月四時亦如之此所以見天地萬物之情也象曰雷風恒君子以立不易方傳君子觀雷風相與成恒之象以常久其德自立於大中常久之道不變易其方所也西溪李氏曰雷風天下之至震動者衆人當雷風震動之時必倉皇自失改其常度唯德至於舜然後弗迷是舜能有常故處風雷震動之時視如平日可見胸中之有常故君子於此當立不易方若做箇事確爾如是初不因人作輟也建安丘氏曰巽入也而在内震出也而在外二物各居其位則謂之恒故君子體之而立不易方方者理之所不可易者若雷入而從風風出而從雷二物易位而相從則謂之益矣故君子體之亦有遷改之義此恒益二象之所以不同也雲峯胡氏曰雷風雖變而有不變者存體雷風之變者爲我之不變者善體雷風者也童溪王氏曰大學曰於止知其所止而其所止之目則曰爲人君止於仁爲人臣止於敬爲人子止於孝爲人父止於慈與國人交止於信此不易之地也君子立其身於此地則所謂有常之德也初六浚恒貞凶无攸利傳初居下而四爲正應柔暗之人能守常而不能度勢四震體而陽性以剛居高志上而不下又爲二三所隔應初之志異乎常矣而初乃求望之深是知常而不知變也浚深之也浚恒謂求恒之深也守常而不度勢求望於上之深堅固守此凶之道也泥常如此无所徃而利矣世之責望故素而致悔咎一作吝者皆浚恒者也志既上求之深是不能恒安其處者也柔㣲而不恒安其處亦致凶之道凡卦之初終淺與深㣲與盛之地也在下而求深亦不知時矣本義初與四為正應理之常也然初居下而在初未可以深有所求四震體而陽性上而不下又為二三所隔應初之意異乎常矣初之柔暗不能度勢又以隂居巽下為巽之主其性務入故深以常理求之浚恒之象也占者如此則雖貞亦凶而无所利矣或問浚恒貞凶恐是不安其常而深以常理求人之象朱子曰未見有不安其常之象只是欲深以常理求人耳雲峯胡氏曰此以時位言也本義兼卦德言震體性上而不下初爲巽主其性務入兩性字得其指矣二四相應固理之常時方初也而深以常理入之雖貞亦凶矣雙湖胡氏曰恒初乃咸上之反兌澤反爲巽入故冇浚恒象爻不正故戒以貞亦凶况於不貞乎漢上朱氏曰初居巽下以深入爲恒上居震極以震動為恒在始而求深在上而好動皆凶道也初如未信而諌未信而勞其民之類上如秦皇漢武之類是也象曰浚恒之凶始求深也傳居恒之始一作常而求望於上之深是知常而不知一无知字度勢之甚也所以凶隂暗不得恒之宜也或問劉蕡程子曰浚恒之凶始求深也曰然則宜如何曰尺蠖之屈以求伸也踈逖小臣一旦欲以新間舊難矣中溪張氏曰初以隂柔而居下相應之始而求望於九四者太深是以凶也進齋徐氏曰大凡交際之道自有淺深交之深則可求之深若交淺而遽以深望之豈常理哉九二悔亡傳在恒之義居得其正則常道也九陽爻居隂位非常理也處非其常本當有悔而九二以中德而應於五五復居中以中而應中其處與動皆得中也是能恒久於中也能恒久一无久字於中則不失正矣中重於正中則正矣正不必中也九二以剛中之德而應於中德之勝也足以亡其悔矣人能識重輕之勢則可以言易矣或問伊川云中无不正正未必中如何朱子曰如君子而時中則是中无不正若君子有時乎不中即正未必中葢正是骨子好了而所作事未有恰好處故未必中也又曰中重於正正不必中一件物事自以爲正却有不中在且如飢渴飲食是正若過些了便非中節中節處乃中也責善正也父子之間不責善本義以陽居隂本當有悔以其久中故得亡也中溪張氏曰二以陽而居隂非恒也處非其恒宜有悔也然二五相應唯能恒久於中道守而不變其悔乃亡雲峯胡氏曰咸恒六爻非不相應得者不過悔亡而已咸九四曰貞吉悔亡九居四非貞也故必貞然後悔亡恒九二亦非貞也但曰悔亡而不勉以貞何也咸九四不正又不中恒九二不正而得中是爲久於中者也所謂中重於正者此也沙隨程氏曰大壯九二觧初六及本爻皆不著其所以然葢以爻明之也象曰九二悔亡能久中也傳所以得悔亡者由其能恒久於中也人能恒久於中豈止亡其悔德之善也張子曰以陽係隂用以為常不能无悔以其久中故免臨川呉氏曰有悔而悔亡者以能常久於中而不過於剛也白雲郭氏曰可久之道无他中焉而已矣過猶不及皆非可久也雲峯胡氏曰九二提出能久中三字諸爻不中故不久皆可見也九三不恒其德或承之羞貞吝傳三陽爻居陽位處得其位是其常處也乃志從於上六不唯隂陽相應風復從雷於恒處而不處不恒之人也其德不恒則羞辱或承之矣或承之謂有時而至也貞吝固守不恒以爲恒豈不可羞吝乎本義位雖得正然過剛不中志從於上不能久於其所故為不恒其德或承之羞之象或者不知其何人之辭承奉也言人皆得奉而進之不知其所自來也貞吝者正而不恒爲可羞吝申戒占者之辭朱子曰承如承奉之承如人送羞辱與之也兼山郭氏曰九三剛已過中而巽為不果進退无常不恒其德者也中溪張氏曰三以剛躁而處雷風之交德之不恒者也不恒其德則或承受其羞辱矣雖貞亦吝雲峯胡氏曰九二得中故悔亡九三不中故羞且吝葢在恒之時二爲久於中三不中則不能久也厚齋馮氏曰巽爲進退不果九二與九三同也然九二以剛處柔而位得中是以悔亡九三過剛而不中其究爲躁卦是以不恒其德也六五體震而以柔處尊位而得中故爲恒其德象意甚明象曰不恒其德无所容也傳人既无恒何所容處當處之地既不能恒處非其據豈能恒哉是不恒之人无所容處其身也東谷鄭氏曰三過剛而純乎剛既不常其德又以其剛介於二剛之間進退无所容於人也中溪張氏曰无常之人孔子謂不可爲巫醫况其他乎宜其无所容身於天地間也九四田无禽傳以陽居隂處非其位處非其所雖常何益人之所為得其道則久而成功不得其道則雖久何益故以田為喻言九之居四雖使恒久如田獵而无禽獸之獲謂徒用力而无功也本義以陽居隂久非其位故爲此象占者田无所獲而凡事亦不得其所求也節齋蔡氏曰四為震體而處位不中好變者也以好變之心應浚恒之初必不能相有也故曰无禽雲峯胡氏曰本義謂九四以陽居隂久非其位然九二亦陽居隂而曰悔亡者唯中則可常九二中九四不中故也師之六五曰田有禽五柔中而所應者剛剛實故曰有禽恒之四以剛居不中而所應者柔柔虗故曰无禽象曰久非其位安得禽也傳處非其位雖久何所得乎以田爲喻故云安得禽也臨川呉氏曰非其位謂居柔大夫以剛爲有才居柔則是无才也安能得禽哉厚齋馮氏曰乆非其位處不當位也位不當與九二爻同而休咎異者中不中之辨也六五恒其德貞婦人吉夫子凶傳五應於二以隂柔而應陽剛居中而所應又中隂柔之正也故恒久其德則為貞也一則字在其字上夫以順從為恒者婦人之道在婦人則為貞故吉若丈夫而以順從於人為恒則失其剛陽之正乃凶也五君位而不以君道言者如六五之義在丈夫猶凶况一作豈人君之道乎在它卦六居君位而應剛未為失也在恒故不可耳君道豈可以柔順爲恒也本義以柔中而應剛中常久不易正而固矣然乃婦人之道非夫子之宜也故其象占如此或問恒其德貞婦人吉夫子凶德指六謂常其柔順之德固貞矣然此婦人之道非夫子之義葢婦人從一而終以順為正夫子則制義者也若從婦道則凶朱子曰固是如此然湏㸔得象占分明六五有恒其德貞之象占者若婦人則吉夫子則凶大抵㸔易湏是曉得象占分明所謂吉凶者非爻之能吉凶爻有此象而占者視其德而有吉凶耳且如此爻不是既爲婦人又為夫子只是有恒其德貞之象而以占者之德爲吉凶耳又如恒卦固能亨而无咎然必占者能久於其道方亨而无咎又如九三不恒其德非是九三能不恒其德乃九三有此象耳占者遇此雖正亦吝若占者能恒其德則无羞吝童溪王氏曰恒其德與不恒其德反九三之剛太過而六五以柔居中故也雙湖胡氏曰六五不正故戒之曰若以柔爲貞則婦人吉而夫子凶矣葢柔非夫子所宜也必陽剛之貞乃可以反於吉耳建安丘氏曰二以陽居隂五以隂居陽皆位不當而得中者也在二則悔亡而五有夫子凶之戒者葢二以剛中為常而五以柔中為常也以剛處常能常者也其悔可亡以柔為常則是婦人之道非夫子所尚此六五所以有從婦之凶恒九四之才與二同而位異故四之久不如二之久六五之位與二同而才異故五之柔中又不如二之剛中也是以爻辭於四言无禽於五言夫子凶而於二獨稱悔亡歟雲峯胡氏曰六五中矣然剛而中可恒也柔而中婦人之常非夫子之所當常也又曰咸其腓戒二之動也五咸其脢不動矣而又不能感或承之羞戒三之不恒也五恒其德貞矣而又執一不通故二爻皆无取焉易貴於知時識變固如此哉象曰婦人貞吉從一而終也夫子制義從婦凶也傳如五之從二在婦人則爲正而吉婦人以從為正以順為德當終守於從一夫子則以義制者也從婦人之道則為凶也兼山郭氏曰柔而在中位有餘而才不足稱也婦人吉夫子凶何也婦人從一而終可也夫子制義從婦之義可乎是以伯夷聖之清孟子謂之隘伯姬守禮而不去孔子取其恭於此可見也上六振恒凶傳六居恒之極在震之終恒極則不常震終則動極以隂居上非其安處又隂柔不能堅固其守皆不常之義也故為振恒以振為恒也振者動之速也如振衣如振書抖擻運動之意在上而其動无節以此為恒其凶宜矣本義振者動之速也上六居恒之極處震之終恒極則不常震終則過動又隂柔不能固守居上非其所安故有振恒之象而其占則凶也雲峯胡氏曰本義謂恒極則不常以一卦之極言震終則過動以上卦之極言隂柔不能固守居上非其所安以上六一爻言必合此四者而後振恒之象備矣咸不宜動恒亦以動之速為凶咸卦六爻吉凶悔吝之辭皆備反對為恒亦如之吉凶悔吝生乎動者也動其可不慎乎象曰振恒在上大无功也傳居上之道必有恒德乃能有功若躁動不常豈能有所成乎居上而不恒其凶甚矣象又言其不能有所成立故曰大无功也楊氏曰在下以入為常浚恒也在上以動為常振恒也在下而求浚非也在上而求振亦非也上六之振恒宜乎其无功也中溪張氏曰上六居恒終震極之位而以震動為恒豈特凶而已矣而且大无功也天下本无事庸人自擾之是之謂矣節齋蔡氏曰恒常也一體而含二義葢將自其不易者而觀之則窮天地亘古今而不可變也自其不已者而觀之則寒暑晝夜而其變未嘗已也故知不易者則拘常知不已者則厭常皆不得恒之正也初柔拘常而過求乎常故凶上柔居終三四位不正皆偏乎不已者也或厭常或亂常故凶且吝唯二五居中幾於得恒之正者然五位雖剛而爻柔故不能制義而凶二爻雖剛而位柔僅能久中无悔而皆非有得乎恒之正也語恒之正其唯彖乎建安丘氏曰恒中道也中則能恒不中則不恒矣恒卦六爻无上下相應之義唯以二體而取中焉則恒之義見矣初在下體之下四在上體之下皆未及乎恒者故泥常而不知變是以初浚恒四田无禽也三在下體之上上在上體之上皆已過乎恒者故好變而不知常是以三不恒而上振恒也唯二五得上下體之中似知恒之義者而五位剛爻柔以柔中爲恒故不能制義而但爲婦人之吉二位柔爻剛以剛中為恒而居位不當亦不能盡守常之義故特言悔亡而已恒之道豈易言哉隆山李氏曰咸恒二卦其彖甚善而六爻之義鮮有全吉者葢以爻而配六位則隂陽得失承乘逆順之理又各不同故也艮下乾上傳遯序卦恒者久也物不可以久居其所故受之以遯遯者退也夫久則有去相湏之理也遯所以繼恒也遯退也避也去之之謂也為卦天下有山天在上之物陽性上進山高起之物形雖高起體乃止物有上陵之象而止不進天乃上進而去之下陵而上去是相違遯故為遯去之義二隂生於下隂長將盛陽消而退小人漸盛君子退而避之一作避而去之故為遯也遯亨小利貞遯徙困反傳遯者隂長陽消君子遯藏之時也君子退藏以伸其道道不屈則為亨故遯所以有亨也在事亦有由遯避而亨者雖小人道長之時君子知幾退避固善也然事有不齊與時消息无必同也隂柔方長而未至於甚盛君子尚有遲遲致力之道不可大貞而尚利小貞也白雲郭氏曰二隂浸長不利君子進則否而遯則亨也李氏曰遯亨雖遯也乃所以亨也單氏曰三隂進而為否然後不利君子貞二隂方進而未至於否猶可小利貞也中溪張氏曰遯字從豚從走埤雅曰豚㣲物而遁逸葢遯取豚之遁逸也遯退也隂進陽退此君子見幾而作之時也然身之窮乃道之亨也自遯二而上更進一隂則不利君子貞无復小利貞之望矣本義遯退避也為卦二隂浸長陽當退避故為遯六月之卦也陽雖當遯然九五當位而下有六二之應若猶可以有為但二隂浸長於下則其勢不可以不遯故其占為君子能遯則身雖退而道亨小人則利於守正不可以浸長之故而遂侵廹於陽也小謂隂柔小人也此卦之占與否之初二兩爻相類或問遯小利貞本義謂小人也按易中小字未有以為小人者如小利有攸徃與小貞吉之類皆大小之小耳未知此義如何朱子曰經文固无此例然以彖傳推之則是指小人而言今當且依經而存傳耳建安丘氏曰遯亨為君子言也告君子使去不去則見害於小人矣安得亨小利貞為小人言也勉小人以正小人而不守正則凌廹乎君子雖已亦有所不利也卦辭止五字聖人雖為君子謀亦未嘗不為小人謀也雲峯胡氏曰復臨泰壯夬卦名皆主陽而言姤遯否觀剥主隂而言可也然謂之姤者陽之勢上盛而隂得遇之也謂之遯者隂之勢浸長而陽當避之也聖人於隂卦主陽而言其愛君子之意可見矣復臨泰皆曰亨陽之亨也遯亨疑若主隂之亨而言然其下曰小利貞為小人計也則遯亨為君子言也君子以遯為亨小人以静正為利本義於臨卦謂二陽浸長以廹於隂於遯曰小人不可以浸長之故而遂侵廹於陽然則陽浸長而逼隂可也隂浸長而逼陽不可也隂陽之大分明矣本義又曰此卦之占與否初二兩爻相類葢否初惡未形故戒以貞遯二隂猶未成否也故戒以利貞誠恐小者於此不知利貞遂至於否則不利君子貞也臨遯之對曰利貞大壯遯之反曰利貞皆為君子謀也遯亦曰利貞者其猶冀小人可化而為君子也彖曰遯亨遯而亨也傳小人道長之時君子遯退乃其道之亨也君子遯藏所以伸道也此言處遯之道自剛當位而應以下則論時與卦才尚有可為之理也中溪張氏曰遯本无亨義葢以小人道長之時君子身雖退遯而道未嘗不亨也故卦止曰遯亨彖則曰遯而亨也加一而字其義明矣剛當位而應與時行也傳雖遯之時君子處之未有必遯之義五以剛陽之德處中正之位又下與六二以中正相應雖隂長之時如卦之才尚當隨時消長苟可以致其力无不至誠自盡以扶持其道未必於遯一作退藏而不為故曰與時行也中溪張氏曰剛當位而應者以九居五而應乎二也二隂在下長而未驟四陽居上盛而未衰尚可與時消息以行其道未可專諉於遯藏而退避不為也本義以九五一爻釋亨義或問遯亨遯而亨也分明是說能遯便亨下靣更說剛當位而應與時行也是如何朱子曰此所以遯而亨也隂方㣲為他剛當位而應所以能知時而遯是能與時行不然便是與時背也蘭氏廷瑞曰九五陽剛當位下應六二與時之義也臨川呉氏曰彖辭遯亨為四陽言也彖傳專言九五者九五四陽之統得處遯之宜有致亨之道也隆山李氏曰隂陽寒暑之運各有時方隂道長盛乃小人得勢之時君子要湏隐忍遜避以待天定終以必勝不然不勝其忿盡力以抗之是不知天時必取凶敗猶漢元成之時宏恭石顯得勢於内而蕭望之劉向朱雲之徒不遜其迹以避終以及禍桓靈之際曹節王甫得志於内而李膺陳蕃竇武之徒不遜其迹以避終被誅戮此遯之時剛當位而應者葢所以隨時用權也小利貞浸而長也長丁丈反本義以下二隂釋小利貞或問小利貞浸而長也是見其浸長故設戒令其貞正且以寛君子之患然亦是他之福朱子曰是如此此與否初二爻相似問小利貞以彖辭小利貞浸而長也之語觀之則小當為隂柔之小人如小徃大來小過小畜之小言君子能遯則亨小人則利於守正不可以浸長之故而侵廹於陽也此與程傳遯者隂之始長君子知㣲故當深戒而聖人之意未便遽已故有與時行小利貞之教之意不同曰若如程傳所言則於剛當位而應與時行也之下當云止而健隂進而長故小利貞今但言小利貞浸而長也而不言隂進而長則小指隂小之小可知况當遯去之時事勢已有不容正之者程說雖善而有不通矣臨川呉氏曰小者利於正以其浸而長以消陽也於斯時也君子其可以不遯乎中溪張氏曰隂柔之道利於守貞不可以浸長之勢而侵廹乎陽剛浸長者如水之浸物以漸而長也况二陽為臨二隂為遯遯者臨之反對也臨之彖曰剛浸而長遯之彖不曰柔浸而長而止曰浸而長者葢剛之長可言也柔之長不可言也遯之時義大矣哉傳當隂長之時不可大貞而尚小利貞者葢隂長必以浸漸未能遽盛君子尚可小貞其道所謂小利貞扶持使未遂亡也遯者隂之始長君子知㣲故當深戒而聖人之意未便一作使遽已也故有與時行小利貞之敎聖賢之於天下雖知道之將廢豈肯坐視其亂而不救必區區致力於未極之間强此之衰艱彼之進圖其暫安苟得為之孔孟之所屑為也王允謝安之於漢晉是也若有可變之道可亨之理更不假言也此處遯時之道也故聖人贊其時義大矣哉或久或速其義皆大也朱子曰伊川說小利貞云尚可以有為隂已浸長如何可以有為所說王允謝安之於漢晋恐也不然允是算殺了董卓謝安是乘王敦之老病皆是他衰㣲時節不是浸長之時也兼他是大臣亦如何去此為在下位有為之兆者則可以去大臣任國安危君在與在君亡與亡如何去本義隂方浸長處之為難故其時義為尤大也雙湖胡氏曰遯以二隂之長成卦以四陽之遯得名易為君子謀名卦必以陽為主如是則時義之大亦以陽之能遯為大也雲峯胡氏曰遯與旅之時皆非順境也故本義皆曰處之為難時在天義在我觀君子所處可以知其義之大也象曰天下有山遯君子以遠小人不惡而嚴逺袁萬反傳天下有山山下一作上起而乃止天上進而相違是遯避之象也君子觀其象以避逺乎小人逺小人之道若以惡聲厲色適足以致其怨忿唯在乎矜莊威嚴使知敬畏則自然逺矣本義天體无窮山高有限遯之象也嚴者君子自守之常而小人自不能近或問遯字雖是逃隐大抵亦取逺去之意天上山下相去勢甚遼絶象之以君子逺小人則君子如天小人如山相絶之義湏是如此方得所以六爻在上而漸逺者愈善也朱子曰恁地推亦好童溪王氏曰遯之象有取於天下有山云者天非有心而與山較高下也而山之於天自有不可侵不可及之勢焉故為遯之象君子之於小人也亦然中溪張氏曰天之與山勢本遼絶自下觀之山之巔即天也乃登山之巔以觀天而天愈高愈逺愈不可及矣此遯之象也君子善於退遯故以逺小人為事使之自不可近不待惡聲之至而凛乎有不可犯之嚴則小人自逺矣不惡而嚴即不怒而威也逺小人亦敬小人而逺之之意逺小人艮止之象不惡而嚴乾剛之象雲峯胡氏曰天之窮也非以逺山山自絶於天君子之嚴也非以絶小人小人自絶於君子初六遯尾厲勿用有攸徃傳他卦以下為初遯者徃遯也在前者先進故初乃為尾尾在後之物也遯而在後不及者也是以危也初以柔處㣲既已後矣不可徃也徃則危矣㣲者易於晦藏徃既有危不若不徃之无災也本義遯而在後尾之象危之道也占者不可以有所徃但晦處静俟可免災耳或問遯尾厲勿用有攸徃者言不可有所徃但當晦處静俟耳此意如何朱子曰程傳作不可徃謂不可去也言遯已後矣不可徃徃則危徃既危不若不徃之為无災某竊以為不然遯而在後尾也既已危矣豈可更不徃乎若作占辭㸔尤分明又曰遯尾厲到這時節去不及了所以危厲不可有所徃只得㸔他如何賢人君子有這般底多節齋蔡氏曰遯剛退也以柔居下見剛者遯亦從而遯凡從物者必居後故曰尾不當遯而遯故厲勿用有攸徃以其質居其時不可遯也象曰遯尾之厲不徃何災也傳見幾先遯固為善也遯而為尾危之道也徃既有危不若不徃而晦藏可免於災處㣲故也古人處㣲下隐亂世而不去者多矣六二執之用黃牛之革莫之勝說勝音升說傳如字本義吐活反傳二與五為正應雖在相違遯之時二以中正順應於五五以中正親合於二其交自固黄中色牛順物革堅固之物二五以中正順道相與其固如執繫之以牛革也莫之勝說謂其交之固不可勝言也在遯之時故極言之本義以中順自守人莫能觧必遯之志也占者固守亦當如是朱子曰此言象而占在其中六二亦有此德也三山呉氏曰六二居大臣之位任國家之責不當遯者也故六二不言遯雲峯胡氏曰五在上得中二以中順固結之有黄牛之革之象莫之勝說喜二之從五者固也雙湖胡氏曰遯以二隂之長成卦而以四陽之遯得名故初遯則厲二不言遯三四五上皆言遯豈非以隂爻无取於遯之義歟象曰執用黄牛固志也傳上下以中順之道相固結其心志甚一作其堅如執之以牛革也九三係遯有疾厲畜臣妾吉畜許六反傳陽志說隂三與二切比係乎二者也遯貴速而逺有所係累則安能速且逺也害於遯矣故為有疾也遯而不速是以危也臣妾小人女子懐恩而不知義親愛之則忠其上係戀之私恩懐小人女子之道也故以畜養臣妾則得其心為吉也然君子之待小人亦不如是也三與二非正應以暱比相親非待君子之道若以正則雖係不得為有疾蜀先主之不忍棄士民是也雖危為无咎矣或問伊川曰係戀之私恩懐小人女子之道也故以畜飬臣妾則得其心為吉也小人女子近之則不遜逺之則怨若專以私恩懐之未必不有悔吝而此爻以為吉何耶朱子曰此爻不可大事但可畜臣妾耳御下而有以懐之未為失正但恐所以懐之者失其正耳問傳言待臣妾之道君子之待小人亦不如是如何曰君子小人便不可相對更不可與相接若臣妾是終日在自家腳手頭若无以係之則望望然去矣本義下比二隂當遯而有所係之象有疾而危之道也然以畜臣妾則吉葢君子之於小人唯臣妾則不必其賢而可畜耳故其占如此進齋徐氏曰係戀也比乎二隂宜遯而係故曰係遯遯之為義宜逺小人以陽附隂有所係戀不能逺害故有疾柔將剥剛故有危臣妾謂二隂之係遯以畜臣妾則吉施於大事則不可也中溪張氏曰艮為閽寺臣妾之象厚齋馮氏曰乾三陽所以得遯而避二隂之長者以有九三以止之也今九三為二隂所拘係而不得脱將為隂柔所薄而元氣危矣能如人主之畜臣妾柔而服之使二隂止於内而不徃乃吉道也作易者以隂陽消長之㑹寄之九三憂之治之其所以為君子慮者不其周乎節初齊氏曰剝五天子也故稱宫人寵遯三諸侯也故稱畜臣妾大概待小人之道當如此耳故彼无咎而此吉象曰係遯之厲有疾􅉵也畜臣妾吉不可大事也傳遯而有係累必以困􅉵致危其有疾乃􅉵也葢力亦不足矣以此暱愛之心畜養臣妾則吉豈可以當大事乎厚齋馮氏曰􅉵困也觧厲字中溪張氏曰二隂浸長於下以勢觀之九三不可以不遯當遯而係故有疾而厲至於􅉵乏也為九三者唯當以剛自守止在下之二隂而畜之以臣妾之道然後獲吉又豈可當大事乎况遯為二隂之卦浸長不已九三一變而為六三則遯其否矣可不謹哉九四好遯君子吉小人否好呼報反否傳音鄙本義方有反傳四與初為正應是所好愛者也君子雖有所好愛義苟當遯則去而不疑所謂克已復禮以道制欲是以吉也小人則不能以義處暱於所好牽於所私至於䧟辱其身而不能已故在小人則否也否不善也四乾體能剛斷者聖人以其處隂而有係故設小人之戒恐其失於正也本義下應初六而乾體剛徤有所好而能絶之以遯之象也惟自克之君子能之而小人不能故占者君子則吉而小人否也厚齋馮氏曰有情好而遯以義制欲而必去之象中溪張氏曰九四與初六為正應是四與初有交好也故曰好遯君子雖其心有所好義之當遯則必剛絶其私愛勇退而不顧所以吉也小人溺於私好則不能遯故否也雲峯胡氏曰三比隂四應隂本義於三則曰遯而有所係於四曰有所好而絶之以遯何也皆因下文而言也係遯之下曰有疾厲為其有所係故陽將為隂所係而元氣危也好遯之下曰君子吉有所好而能絶之以遯惟剛徤自克之君子能之小人不能也然九剛可為君子四柔亦能為小人在其所處何如耳故設小人之戒象曰君子好遯小人否也傳君子雖有好而能遯不失於義小人則不能勝其私意而至於不善也侯氏曰君子剛斷故能捨之小人係戀必不能也九五嘉遯貞吉傳九五中正遯之嘉美者也處得中正之道時止時行乃所謂嘉美也故為貞正而吉九五非无係應然與二皆以中正自處是其心志及乎動止莫非中正而无私係之失所以為嘉也在彖則概言遯時故云與時行小利貞尚有濟遯之意於爻至五遯將極矣故唯以中正處遯言之遯一无遯字非人君之事故不主君位言然人君之所避逺乃遯也亦在中正而已本義剛陽中正下應六二亦柔順而中正遯之嘉美者也占者如是而正則吉矣或問九五嘉遯以陽剛中正漸向遯極故為嘉美未是極處故戒以貞正則吉朱子曰是如此便是剛當位而應處是去得恰好時節小人亦未嫌自家只是自家合去莫見小人不嫌却與相接而不去便是不好所以戒約他貞正始得漢上朱氏曰剛中處外可行則行不復而徃不柔而應不安於疾􅉵不係於情好遯之至美也趙氏善譽曰九五當位雖與二應而與時偕行當遯則遯不必專於應也豈非遯之嘉美者與雲峯胡氏曰非正應而相昵曰係以中正而相應曰嘉隨九五孚于嘉葢因六三之係而見也然則此之嘉遯亦因三之係而見歟象曰嘉遯貞吉以正志也傳志正則動必由正所以為遯之嘉也居中得正而應中正是其志正也所以為吉人之遯也止也唯在正其志而已矣白雲郭氏曰以正志者九五嘉遯隨而不流无係也无執也无好也不事於外正其在我之志而已此其所以為嘉也雲峯胡氏曰二以隂應陽其志當堅五以陽從隂其志當正上九肥遯无不利傳肥者充大寛裕之意遯者唯飄然逺逝无所係滯之為善上九乾體剛斷在卦之外矣又下无所係是遯之逺而无累可謂寛綽有餘裕也遯者窮困之時也善處則為肥矣其遯如此何所不利本義以剛陽居卦外下无係應遯之遠而處之裕者也故其象占如此肥者寛裕自得之意節齋蔡氏曰遯者陽避隂君子所以逺小人貴速不貴遲貴逺不貴近上九去柔最逺高而无應剛而能決遯之速者也故无不利開封耿氏曰陽道常饒其或損者隂剥之也本爻超然處外不累於隂无有疾厲故稱肥焉王氏湘卿曰遯以最深為美故四之好不如五之嘉五之嘉不如上之肥雲峯胡氏曰三且遯且係依違牽制非遯而亨者也遯而亨其唯乾之三爻乎乾為天與山絶逺故皆得於遯非特剛徤之力亦其界限素嚴故能飄然逺逝而无礙上以陽居卦外尤其寛裕自得者三與二非應而係故疾􅉵上與二隂无應无係故肥肥者疾􅉵之反也象曰肥遯无不利无所疑也傳其遯之遠无所疑滯也葢在外則已逺无應則无累故為剛决无疑也雲峯胡氏曰三有所係則疾上无所疑故肥誠齋楊氏曰上九以剛徤之極居遯世无位之地遯之首者也自非道德之豐腴仁義之膏澤安能去之无不利決之无所疑乎中溪張氏曰非心廣體胖剛而善斷者不能决然遯去而无所疑也平庵項氏曰下三爻艮也主於止故為不徃為執革為係遯上三爻乾也主於行故為好遯為嘉遯為肥遯也建安丘氏曰遯剛退也二隂長而四陽退也而六二乃遯之所以為遯者故此爻不言遯而曰執之用黄牛之革莫之勝說葢恐其廹陽之遯也遯貴速而逺緩則不能去矣其上四剛爻三與二最近係而不能遯故曰係遯有疾厲四逺二而應初則為好遯而有小人之戒五得中而應二則為嘉遯而有貞吉之戒以皆有累於隂也至上則與二逺且无應於内遯之從容優裕者故曰肥遯无不利惟初與二同體位在衆陽之後則又以不遯為无災也周易傳義大全卷十二
