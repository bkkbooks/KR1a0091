body:
  text: 周易傳義大全卷二十明胡廣等撰巽下巽上傳巽序卦旅而無所容故受之以巽巽者入也羈旅親寡非巽順何所取容苟能巽順雖旅困之中何往而不能入巽所以次旅也為卦一隂在二陽之下巽順於陽所以為巽也巽小亨利有攸往利見大人傳卦之才可以小亨利有攸往利見大人也巽與兑皆剛中正巽說一作兑義亦相類而兑則亨巽乃小亨者兑陽之為也巽隂之為也兑柔在外用柔也巽柔在內性柔也巽之亨所以小也本義巽入也一隂伏於二陽之下其性能巽以入也其象為風亦取入義隂為主故其占為小亨以隂從陽故又利有所往然必知所從乃得其正故又曰利見大人也朱子曰巽有入之義巽為風如風之入物只為巽便能入義理之中無細不入厚齊馮氏曰巽一隂在二陽下取義卑也順也伏也入也卑以其下於陽順以其承於陽伏以其藏於下入以其進於下其象為風亦以其委曲而入於物無所不順也中溪張氏曰小謂初四二隂也順則能亨故曰小亨而利有攸往者剛得中也大人者二五也利見之者則初四也雲峯胡氏曰上經自乾坤後震坎艮三男皆用事至小畜履巽兑方用事小畜者小巽之一隂也下經震艮既重之後至此方見巽兑之重巽之繇曰小亨亦小巽之一隂也一隂之萌聖人每抑之如此八卦之重上經乾先而坤次之坎先而離次之下經震艮先而巽兑次之皆崇陽也巽次旅旅曰小亨離之一隂也此小亨巽之一隂也利有攸往利見大人二隂上從二五之陽也從陽為隂之利不從陽不利矣彖曰重巽以申命傳重巽者上下皆巽也上順道以出命下奉命而順從上下皆順重巽之象也又重為重復之義君子體重巽之義以申復其命令申重復也丁寧之謂也本義釋卦義也巽順而入必究乎下命令之象重巽故為申命也朱子曰巽卦是於重巽上取義重巽所以為申命問重字之義曰只是重卦八卦之象皆是如此問申字是兩番降命令否曰非也只是丁寧反覆說便是申命巽風也風之吹物無處不入無物不鼓動詔令之入人淪肌浹髓亦如風之動物也申字是丁寧反覆之意風無所不入如命令之丁寧告戒無所不至故象以之建安丘氏曰重巽上下皆巽也巽之德順而善入而於象為風風者天之號令故有命令之象內巽者命之始外巽者申前之命也君子於命令重復而丁寧之則柔順而入人也易故曰重巽以申命蛟峯方氏曰人君之巽莫大於順人心以行事發號施令最不可以不順我以為順人不以為順未可也上順下下不順於上未可也必三令五申使人心具孚而後行之此人君重巽之事剛巽乎中正而志行柔皆順乎剛是以小亨傳以卦才言也陽剛居巽而得中正巽順於中正之道也陽性上其志在以中正之道上行也又上下之柔皆巽順於剛其才如是雖內柔可以小亨也鄭氏剛中曰九二巽乎中者也重巽則兼五言之故曰巽乎中正而志行初六順乎剛者也重巽則兼四言之故曰柔皆順乎剛隆山李氏曰若剛不順乎中正則將褊隘而為邪若柔不順乎陽剛則將柔媚而為諂故柔順乎剛剛順乎中正者所以為巽之體也若徒以一隂潛伏謂之為巽而不究乎隂畫在二陽之下有順乎陽剛之象陽畫在二五之位有順乎中正之德則巽之所以致亨者不可得而見矣利有攸往利見大人傳巽順之道無往不能入故利有攸往巽順雖善道必知所從能巽順於陽剛中正之大人則為利故利見大人也如五二之陽剛中正大人也巽順不於大人未必不為過也本義以卦體釋卦辭剛巽乎中正而志行指九五柔謂初四建安丘氏曰巽二五剛也巽雖主於柔而二五之剛得中故論成卦則以初四之柔為主論六爻則以二五之剛為重惟二五之剛能巽乎中正則剛不過而志得行矣故曰剛巽乎中正而志行此以二五兩爻釋利有攸往之義柔謂初四剛謂二五也皆順謂初順二四順五也柔者多不能自振故必順乎剛則柔得剛助而後可行故曰柔皆順乎剛此以初四兩爻釋利見大人之義隆山李氏曰利見大人者蓋指二五以陽剛之畫處中正之位而初四二隂出而順從之乃所以為利也象曰隨風巽君子以申命行事傳兩風相重一作從隨風也隨相繼之義君子觀重巽相繼以順之象而以申命令行政事隨與重上下皆順也上順下而出之下順上而從之上下皆順重巽之義也命令政事順理則合民心而民順從矣本義隨相繼之義或問巽順以入於物必極乎下有命令之象而風之為物又能鼓舞萬類所以君子觀其象而申命令朱子曰風便也是㑹入物事李氏曰天下有風姤所以施命若風相隨而至則是申命不一之象古之出命者必反復申戒之然後其事可行於天下建安丘氏曰巽為風而風者所以發揚天之號令風隨風而不逆此重巽之象也在上之君子體隨風之巽出而發號施令凡事必申復詳審一再命之然後見之行事則四方風動順而易入申命者所以致其戒於行事之先行事者所以踐其言於申命之後雲峯胡氏曰命風象申命隨風象平庵項氏曰巽主命令重巽故以申命行事凡卦之有巽者多言文教風俗之事小畜之懿文德蠱之振民育德觀之觀民設教姤之施命誥四方漸之居賢德善俗鼎之正位凝命皆此意也初六進退利武人之貞傳六以隂柔居卑巽而不中處最下而承剛過於卑巽者也隂柔之人卑巽太過則志意恐畏而不安或進或退不知所從其所利在武人之貞若能用武人剛貞之志則為宜也勉為剛貞則無過卑恐畏之失矣本義初以隂居下為巽之主卑巽之過故為進退不果之象若以武人之貞處之則有以濟其所不及而得所宜矣節齊蔡氏曰進退巽柔不決也利武人之貞斷決也位剛故有此象雲峯胡氏曰巽為進退為不果初處重巽之下性柔進退不能決唯臨事如武人之貞斯無進退之疑矣此與履六三皆以隂居陽故皆稱武人此以隂居下卦之下武人之貞勉之之辭也履之三以隂居下卦之上武人為于大君危之之辭也故小象於此曰志治於彼曰志剛象曰進退志疑也利武人之貞志治也傳進退不知所安者其志疑懼也利用武人之剛貞以立其志則其志治也治謂修立也臨川吳氏曰進退者志之疑能如武人之剛強則志治矣建安丘氏曰初六不武甚矣能以其剛烈不屈之氣而矯其巽懦不立之志然後得其正而向之志疑者轉而志治也苟過於强悍不得其正則其志亂矣何治之有九二巽在牀下用史巫紛若吉無咎傳二居巽時以陽處隂而在下過於巽者也牀人之所安巽在牀下是過於巽過所安矣人之過於卑巽非恐怯則諂說皆非正也二實剛中雖巽體而居柔為過於巽非有邪心也恭巽之過雖非正禮可以逺恥辱絶怨咎亦吉道也史巫者通誠意於神明者也紛若多也苟至誠安於謙巽能使通其誠意者多則吉而無咎謂其誠足以動人也人不察其誠意則以過巽為諂矣本義二以陽處隂而居下有不安之意然當巽之時不厭其卑而二又居中不至已甚故其占為能過於巽而丁寧煩悉其辭以自道達則可以吉而無咎亦竭誠意以祭祀之吉占也朱子曰九二得中所以過於巽為善用史巫紛若吉看來是個盡誠以祭祀之吉占建安丘氏曰牀下初也古者尊上坐於牀卑者拜跪於牀下牀下卑者之所處也二以陽居隂失位不安乃欲巽柔而處卑巽在牀下之象也厚齊馮氏曰周官史掌卜筮巫掌祓禳卜筮所以占其吉凶祓禳所以除其烖害潘氏曰以陽處隂過於巽也故九二上九皆有牀下之象然上九喪其資斧九二可用於史巫二得中而上失中也雲峯胡氏曰牀所安也剝牀在隂爻言之是以隂剝陽使陽不能安巽在牀下在隂爻言之是以陽處隂陽不能自安巽之過者每失之不誠史職卜筮巫職禱祠丁寧煩悉其辭以自道達於鬼神雖巽之過而誠者也如是則吉無咎象曰紛若之吉得中也傳二以居柔在下為過巽之象而能使通其誠意者衆多紛然由得中也陽居中為中實之象中既誠實則一無則字人自當信之以誠意則非諂畏也所以吉而無咎中溪張氏曰他事過巽非所宜唯用史巫紛然其多則可以導達其誠意於神明人能以事神之禮而事上則吉而無咎蓋以九二得乎中道故也九三頻巽吝傳三以陽處剛不得其中又在下體之上以剛亢之質而居巽順之時非能巽者勉而為之故屢失也居巽之時處下而上臨之以巽又四以柔巽相親所乘者剛而上復有重剛雖欲不巽得乎故頻失而頻巽是可吝也本義過剛不中居下之上非能巽者勉為屢失吝之道也故其象占如此朱子曰九三頻巽不比頻復復是好事所以頻復為無咎巽不是甚好底事九三别無伎倆只管今日巽了明日又巽自是可吝童溪王氏曰九三居兩巽之間一巽既盡一巽復來故曰頻巽夫謂之頻巽則頻失可知蓋九三以剛處剛卑巽之志不出於自然而勉為之是可吝也雲峯胡氏曰復六三頻復厲巽九三頻巽吝聖人不重無過重改過屢失屢復復在失後故無咎三之剛非能巽者屢巽屢失失在巽後故吝象曰頻巽之吝志窮也傳三之才質本非能巽而上臨之以巽承重剛而履剛勢不得行其志故頻失而頻巽是其志窮困可吝之甚也童溪王氏曰前倨後恭動而易窮豈其志歟故曰志窮也六四悔亡田獲三品傳隂柔無援而承乘皆剛宜有悔也而四以隂居隂得巽之正在上體之下居上而能下也居上之下巽於上也以巽臨下巽於下也善處如此故得悔亡所以得悔亡以如田之獲三品也田獲三品及於上下也田獵之獲分三品一為乾豆一供賓客與充庖一頒徒御四能巽於上下之陽如田之獲三品謂遍及上下也四之地本有悔以處之至善故悔一無悔字亡而復有功天下之事苟善處則悔或可以為功也本義隂柔無應承乘皆剛宜有悔也而以隂居隂處上之下故得悔亡而又為卜田之吉占也三品者一為乾豆一為賓客一以充庖朱子曰田獲三品伊川主張作巽於上下說說得較牽強卜田之吉占特於巽之六三言之此等處有可解者有不可解者只得虛心玩味闕其所疑不可強穿鑿也雙湖胡氏曰王制天子諸侯無事則歲三田一為乾豆二為賓客三為充君之庖穀梁傳注乾豆謂臘之以為祭祀豆實也廬陵李氏曰詩車攻注自左膘達右髃為上殺達右耳本為中殺左髀達右䯚為下殺此又三品也面傷剪毛不成禽皆不獻一舉而獲三品此又田狩最吉之占雲峯胡氏曰三得陽之正而吝四得隂之正而悔亡何也三剛而不中非能巽以入者四得隂柔之正且以巽而入於二陽之中故非特悔亡且用有獲焉田武事也初利武人之貞四之田獲田武而有功者也下三爻有貴賤之等故曰三品或曰三陽剛在下體之上乾豆象初與己配賓客象二應五充君庖之象象曰田獲三品有功也傳巽於上下如田之獲三品而遍及上下成巽之功也中溪張氏曰搜田而獲其三品獲禽之多故曰有功九五貞吉悔亡無不利無初有終先庚三日後庚三日吉先西薦反後胡豆反傳五居尊位為巽之主命令之所出也處得中正盡巽之善然巽者柔順之道所利在貞非五之不足在巽當戒也既貞則吉而悔亡無所不利貞正中也處巽出令皆以中正為吉柔巽而不貞則有悔安能無所不利也命令之出有所變更也無初始未善也有終更之使善也若己善則何用命也何用更也先庚三日後庚三日吉出命更改一作故之道當如是也甲者事之端也庚者變更之始也十干戊己為中過中則變故謂之庚事之改更當原始要終如先甲後甲之義如是則吉也解在蠱卦本義九五剛健中正而居巽體故有悔以有貞而吉也故得亡其悔而無不利有悔是無初也亡之是有終也庚更也事之變也先庚三日丁也後庚三日癸也丁所以丁寧於其變之前癸所以揆度於其變之後有所變更而得此占者如是則吉也朱子曰九五先庚三日後庚三日不知是如何看來又似設此為卜日之占模樣蠱之先甲三日是辛後甲三日是丁此卦先庚三日亦是丁後庚三日是癸據丁與辛皆是古人祭祀之日但癸日不見用處無初有終也倣佛是伊川說始未善是無初更之而善是有終自貞吉悔亡以下都是這一個意思一如坤卦先迷後得以下都只是一個意思先庚後庚是說那後更變了底一截建安丘氏曰九五以剛健居中正之位出令之主也夫命出於上則下無不從能貞而吉則其悔可亡且無所往而不利矣中命以後巽為用故曰無初有終中溪張氏曰蠱言先後甲而曰終則有始巽言先後庚而曰無初有終何耶蓋甲者十干之首事之端也故謂之終則有始庚者十干之過中事之當更者也故謂之無初有終況巽九五乃蠱六五之變蠱者事之壞也以造事言之故取諸甲巽者事之權也以更事言之故取諸庚易於甲庚皆曰先後三日者蓋聖人謹其始終之意也雲峯胡氏曰文王發先天於彖故取先天艮巽前後三卦其方為甲周公發後天於爻故取後天艮巽前後三卦其方為庚巽體本無艮九五變則為巽下艮上之蠱故特於此爻發之先庚後庚申命以防蠱也與先甲後甲又自相貫象曰九五之吉位正中也傳九五之吉以處正中也得正中之道則吉而其悔亡也正中謂不過無不及一作無過不及正得其中也處柔巽與出命令唯得中為善失中則悔也上九巽在牀下喪其資斧貞凶傳牀人所安也在牀下過所安之義也九居巽之極過於巽者一無者字也資所有也斧以斷也陽剛本有斷以過巽而失其剛斷失其所有喪資斧也居上而過巽至於自失在正道為凶也本義巽在牀下過於巽者也喪其資斧失所以斷也如是則雖貞亦凶矣居巽之極失其陽剛之德故其象占如此誠齊楊氏曰上九位極人臣身極崇髙愛其富貴權勢而患失之心生故必極其巽順阿諛以保其所有不知順愈過身愈危小則喪資用大則喪權勢雖正亦凶況不正乎白雲郭氏曰九二有為之臣也以巽用剛者也上者巽之極也巽極不知變而欲同九二之道則其過也甚矣雲峯胡氏曰牀下亦以陽居隂不安之象旅九四以剛居柔曰得其資斧巽上九以剛居柔而反喪其資斧何也旅貴於用柔故以剛居柔者得之巽戒乎過柔故巽極以剛居柔者失之或曰離為戈兵旅九四本離故得資斧巽上九在互離之外故喪資斧象曰巽在牀下上窮也喪其資斧正乎凶也傳巽在牀下過於巽也處卦之上巽至於窮極也居上而過極於巽至於自失得為正乎乃凶道也巽本善行故疑之曰得為正乎復斷之曰乃凶也本義正乎凶言必凶雲峯胡氏曰程傳謂正乎疑辭凶也必辭本義以為必凶蓋大壯之初曰其孚窮言必窮此曰正乎凶言必凶黃氏曰巽以初與四為主初進退四有獲何也初在下卦伏亦甚焉四在上卦巽其揚揚矣凡巽不欲過二中吉五中正吉三過中故吝上窮巽故凶也建安丘氏曰巽順也以一隂而順乎上之二陽也在卦以二柔為巽主初柔居剛未安於巽故有進退之疑四柔居柔巽其安矣故有功三與五皆以剛居剛而五得中故五吉而三吝二與上皆以剛居柔而二得中故二吉而上凶大扺巽之為卦以居中得位為善二得中而失位三四得位而失中初上則位與中俱失皆不能盡巽之道也唯以九居五位乎中正此所以貞吉而為申命之主歟兑下兑上傳兑序卦巽者入也入而後說之故受之以兑兑者說也物相入則相說相說則相入兑所以次巽也兑亨利貞兑徒外反傳兑說也說致亨之道也能說於物物莫不說而與之足以致亨然為說之道利於貞正非道求說則為邪諂而有悔咎一作吝故戒利貞也本義兑說也一隂進乎二陽之上喜之見乎外也其象為澤取其說萬物又取坎水而塞其下流之象卦體剛中而柔外剛中故說而亨柔外故利於貞蓋說有亨道而其妄說不可以不戒故其占如此又柔外故為說亨剛中故利於貞亦一義也朱子曰川壅為澤坎為川兑為澤澤是水不流底坎下一畫閉合時便成兑卦便是川壅為澤之象隆山李氏曰以陽下隂隂陽相說故曰兑亨亦猶咸之所以為亨也漢上朱氏曰二五剛中而五又正乃戒以利貞在二三四不正則陷於邪諂悔吝將生建安丘氏曰嘗考三女之卦聖人多以貞戒之離曰利貞亨巽曰利貞兑曰亨利貞皆以正言也三男之卦則不言貞震曰亨坎曰心亨艮曰艮其背而已蓋隂柔之質多病於不正而陽剛之體為能有立也雲峯胡氏曰卦辭與咸同咸以艮陽下兑隂則相感感則亨矣而相感易失於不正兑以二陽下一隂則相說說則亨矣而相說亦易流於不正利貞者戒辭也三男之卦不言利貞剛固貞也故咸取無心之感兑取不言之說彖曰兑說也說音悅下同本義釋卦名義剛中而柔外說以利貞是以順乎天而應乎人說以先民民忘其勞說以犯難民忘其死說之大民勸矣哉先西薦反又如字難乃旦反傳兑之義說也一隂居二陽之上隂說於陽而為陽所說也陽剛居中中心誠實之象柔爻在外接物和柔之象故為說而能貞也利貞說之道宜正一作貞也卦有剛中之德能貞者也說而能貞是以上順天理下應人心說道之至正至善者也若夫違道以干百姓之譽者苟說之道違道不順天干譽非應人苟取一時之說耳非君子之正道君子之道其說於民如天地之施感於其心而說服無斁故以之先民則民心說隨而忘其勞率之以犯難則民心一無心字說服於義而不恤其死說道之大民莫不知勸勸謂信之而勉力順從人君一作君人之道以人心說服為本故聖人贊其大本義以卦體釋卦辭而極言之朱子曰兑說若不是剛中便成邪媚下面許多道理都從這個剛中柔外未說以先民如利之而不庸順天應人革卦就革命上說兑卦就說上說後人都做應天順人說了到了順天應人是言順天理應人心又曰說若不剛中便是違道干譽隆山李氏曰柔外故能說剛中故能利貞內剛而利貞者說之以道也若柔見乎外而內不剛是乃使以為伎說之說非和說之說也要必剛實在中外雖和而中有守是以和而不流此說之出于貞而與天人合也建安丘氏曰兑之義說也剛中指二五柔外指三上外雖柔說中實剛介故兑亨利在貞正是以上順天理下應人心革兑二彖皆有順天應人之說革之順應以湯武革命而言也兑之順應以剛中柔外說以利貞而言也兑上為君兑下為民夫逸與生人之所好勞與死人之所惡此常情也今乃忘勞忘死豈人之情也哉殊不知說以先民則勞之者正所以逸之也說以犯難則生之所以為仁殺之亦所以為仁也誠齊楊氏曰天人俱說是惟無事無難也有事而與民趨之則勞而忘勞有難而與民犯之則死而忘死忘死忘勞非人之情也而忘之者說而不自知其勞且死也曷為而說也知聖人勞我以逸我死我以生我也是以說而自勸也夫勸民與民自勸相去逺矣是以聖人大之曰說之大民勸矣哉中溪張氏曰禹之隨山濬川非說而忘勞者乎湯之東征西怨非說而忘死者乎雲峯胡氏曰說易於不正必剛中而後說也正說之正則能順乎天而應乎人以先民則民忘其勞以犯難則民忘其死皆所以為說之大也然不正則不大矣象曰麗澤兑君子以朋友講習傳麗澤二澤相附麗也兩澤相麗交相浸潤互有滋益之象故君子觀其象而以朋友講習朋友講習互相益也先儒謂天下之可說莫若朋友講習朋友講習固可說之大者然當明相益之象程子曰天下之恱不可極惟朋友講習雖過恱無害兑澤有相滋益處朋友講習更莫如相觀而善工夫多本義兩澤相麗互相滋益朋友講習其象如此節齊蔡氏曰講兊象習重兑象進齊徐氏曰天下之至可說者無如朋友講習講而不習則言語徒詳紬繹無得雖曰為學亦將枯燥生澀而無可嗜之味危殆機􅑾而無可即之安矣豈能終恱懌於心乎故必從容論說以講之於先又必切實體驗以習之於後則心與理相涵而所知者益精身與事相安而所能者益固麗澤之益庶乎其有相資之實而真說在我矣初九和兑吉傳初雖陽爻居說體而在最下無所係應是能卑下和順以為說而無所偏私者也以和為說而無所偏一無偏字私說之正也陽剛則不卑居下則能巽處說則能和無應則不偏處說如是所以吉也本義以陽爻居說體而處最下又無係應故其象占如此節齊蔡氏曰爻位皆剛不比於柔得說之正和而不流於邪者也故吉雙湖胡氏曰兑自有和義和獨於初言者以其得陽剛之正具和說之體故首言之且為吉占也縉雲馮氏曰初以陽德處下無欲於三無嫌於二是樂易君子謙退溫恭以待物之象也雲峯胡氏曰君子和而不同同與和異處說體之下得陽剛之正是說而不流於邪故其象為和其占為吉象曰和兑之吉行未疑也傳有求而和則涉於邪諂初隨時順處一作處順心無所係無所為也以和而已是以吉也象又以其處說在下而非中正故云行未疑也其行未有可疑謂未見其有失也若得中正則無是言也說以中正為本爻直陳其義象則推而盡之本義居卦之初其說也正未有所疑也雲峯胡氏曰四比三之隂有商兑之疑初剛正去三逺故未有疑進齊徐氏曰疑謂疑於隂也卦四陽惟初與隂無係故未疑若二則疑於三五則疑於上矣九二孚兑吉悔亡傳二承比隂柔隂柔小人也說之則當有悔二剛中之德孚信內充雖比小人自守不失君子和而不同說而不失剛中故吉而悔亡非二之剛中則有悔矣以自守而亡也本義剛中為孚居隂為悔占者以孚而說則吉而悔亡矣張氏曰私係於近悔也誠於接物信而不妄吉自悔亡融堂錢氏曰中實為孚二五剛中故皆曰孚西溪李氏曰二應五君臣同德而相說孚兑之吉也雲峯胡氏曰二孚孚五也以陽居隂本有悔孚五則吉而悔亡然以九二則悔亡以九五則有厲何也六三為兑主說猶未極上六成兑之主而居兑之極二比三能不孚乎三而孚五故吉五兊之君也而比上不孚乎二而孚上有厲矣象曰孚兑之吉信志也傳心之所存為志二剛實居中孚信存於中也志存誠信豈至說小人而自失乎是以吉也中溪張氏曰二處大臣之位當兑說之世而天下視其所說以為趨向者也苟非孚信出於剛中之志鮮不為六三說媚之所惑矣六三來兑凶傳六三隂柔不中正之人說不以道者也來兑就之以求說也比於在下之陽枉已非道就以求說所以凶也之內為來上下俱陽而獨之內者以同體而隂性一作性隂下也失道下行也本義隂柔不中正為兑之主上無所應而反來就二陽以求其說凶之道也雲峯胡氏曰六三隂柔不中不正而來求說於剛初剛而正二剛而中必不從也凶可知矣象曰來兑之凶位不當也傳自處不中正無與而妄求說所以凶也建安丘氏曰六三柔而不中故來就在下之陽而有妄說之凶無他以柔居剛位不當故也來者反而之內也九四商兑未寧介疾有喜傳四上承中正之五而下比柔邪之三雖剛陽而處非正三隂柔陽所說也故不能決而商度未寧謂擬議所從而未決未能有定也兩間謂之介分限也地之界則加田義乃同也故人有節守謂之介若介然守正而疾逺邪惡則有喜也從五正也說三邪也四近君之位若剛介守正疾逺邪惡將得君以行道福慶及物為有喜也若四者得失未有定繫所從耳本義四上承九五之中正而下比六三之柔邪故不能決而商度所說未能有定然質本陽剛故能介然守正而疾惡柔邪也如此則有喜矣象占如此為戒深矣朱子曰兑巽卦爻辭皆不端的可以移上移下如剝卦之類皆確定移不得不知是如何如和兑商兑之類皆不甚親切進齊徐氏曰天下之理是非不兩立公私不並行好善則疾惡從正則逺邪此君子小人之分也然邪念未易去也自非介然剛特有守之君子鮮不為邪柔之所移奪一牽於柔則將淪胥而為小人之歸矣豈不可畏哉况夫以陽剛之才處近君之位詔王以八柄馭臣者也所以奔走服役於其下而求說於我者無所不至况又與之親比者乎商兑未寧正天理人欲公私界限處不可不審所從也聖人以介疾有喜言之所以開示正道隄防邪心其意切矣雲峯胡氏曰九四介乎三五之間商兑而未寧必舍三從五截然有限介然有守疾邪如此有喜矣蓋位柔有商兑之象質剛又有介疾之象或能如此則三雖欲為之疾可有喜矣疾與喜相反無妄之疾損其疾皆以有喜言象曰九四之喜有慶也傳所謂喜者若守正而君說之則得行其剛陽之道而福慶及物也中溪張氏曰九四之質本剛苟能介然自守而釋其疑疾使說媚之小人不能為我之病則上承九五之中正而得君臣相說之道豈不有喜而有慶乎誠齊楊氏曰六三者君心之膏肓也九四者膏肓之鉞艾也故九四者六三之所甚不喜也六三不喜則九四有喜矣非九四之私喜也天下國家之大慶也九五孚于剝有厲傳九五得尊位而處中正盡說道之善矣而聖人復設有厲之戒蓋堯舜之盛未嘗無戒也戒所當戒而已雖聖賢在上天下未嘗無小人然不敢肆其惡也聖人亦說其能勉而革面也彼小人者未嘗不知聖賢之可說也如四凶處堯朝隱惡而順命是也聖人非不知其終惡也取其畏罪而強仁耳五若誠心信小人之假善為實善而不知其包藏則危道也小人者備之不至則害於善聖人為戒之意深矣剝者消陽之名隂消陽者也蓋指上六故孚于剝則危也以五在說之時而密比於上六故為之戒雖舜之聖且畏巧言令色安得不戒也說之惑人易入而可懼也如此本義剝謂隂能剝陽者也九五陽剛中正然當說之時而居尊位密近上六上六隂柔為說之主處說之極能妄說以剝陽者也故其占但戒以信于上六則有危也朱子曰九五只是上比於隂故有此戒進齊徐氏曰上柔處說之極無他係應惟附五以求說也五位雖當上柔親附說而信之必至剝剛故曰孚于剝建安丘氏曰九五剛中當位說將極而密與上比陽方有說隂之意而上復引之以為說五若不虞其害己而妄信之則將見剝於隂矣故曰孚于剝柔剝剛則剛危故有厲五位雖正而所說不正故也雲峯胡氏曰說之感人最為可懼感之者將以剝之也況為君者易狃於所說故雖聖人且畏巧言令色而況凡為君子者乎兑秋之終九月為剝他爻皆稱兑五不稱兑而稱剝深為君子戒也象曰孚于剝位正當也傳戒孚于剝者以五所處之位正當戒也密比隂柔有相說之道故戒在信之也本義與履九五同沙隨程氏曰二五同為隂所乘而所孚不同者二隂位不過剛故孚于五五以剛居陽故孚于剝孔子謂位正當者如此雲峯胡氏曰履否兑中孚九五皆曰位正當而此獨與履同何也否中孚九五位正當而能稱其居履兑不能稱其位者也兼履兑皆有厲之辭履五當君位而凡事决之以己見雖正且危兑五當君位而密比於小人不正之危又何如也上六引兑傳他卦至極則變兑為說極則愈說上六成說之主居說之極說不知己者也故說既極矣又引而長之然而不至悔咎何也曰方言其說不知己未見其所說善惡也又下乘九五之中正無所施其邪說六三則承乘皆非正是以有凶臨川吳氏曰說至於上可以已矣樂不可極也隂柔但知以說為事於說之終又引而長之豈君子之說哉本義上六成說之主以隂居說之極引下二陽相與為說而不能必其從也故九五當戒而此爻不言其吉凶雲峯胡氏曰凡隂爻稱引萃六二引吉引下而升也故吉兑上六引二陽而說引之者將以剝之也五言有厲上不言凶可知矣或曰兑為口舌六爻之辭簡抑以滕口說為戒歟象曰上六引兑未光也傳說既極矣又引而長之雖說之之心不已而事理已過實無所說事之盛則有光輝既極而強引之長其無意味甚矣豈有光也未非必之辭象中多用非必能有光輝謂不能光也臨川吳氏曰引長已終之說於說之道為未光中溪張氏曰柔道以牽為引上六柔居五上能牽誘五而為說媚者也然九五乃陽明之主以剝為懼不信上六之牽引故小人說媚之跡隱晦而未至於光顯也誠齊楊氏曰歡兜薦共上而堯吁僉言薦鯀而堯咈皆引兑而未光者歟建安丘氏曰兑說也以一隂而說乎下之二陽也在卦以二隂為說主四陽則皆為所說者三以柔居剛為下兑之主動而求陽之說故曰來兑上以柔居柔為上兑之主靜而誘陽之說故曰引兑來兑之惡易見故本爻凶引兑之情難知故比爻當戒是以四陽爻在下兑者多吉在上兑者多凶初剛在下與隂無係故和兑吉二已近三入說猶淺故孚兑吉悔亡四入上兑處二五之間莫知所決故有商兑未寧之象五與上比處說將極故孚于剝則有厲矣坎下巽上傳渙序卦兑者說也說而後散之故受之以渙說則舒散也人之氣憂則結聚說則舒散故說有散義渙所以繼兑也為卦巽上坎下風行於水上水遇風則渙散所以為渙也渙亨王假有廟利涉大川利貞渙呼亂反傳渙離散也人之離散由乎中人心離則散矣治乎散亦本於一作必由中能一有利貞字收合人心則散可聚也故卦之義皆主於中利貞合渙散之道在乎正固也本義渙散也為卦下坎上巽風行水上離披解散之象故為渙其變則本自漸卦九來居二而得中六往居三得九之位而上同於四故其占可亨又以祖考之精神既散故王者當至於廟以聚之又以巽木坎水舟楫之象故利涉大川其曰利貞則占者之深戒也或問萃言王假有廟是卦中有萃聚之象故可以為聚祖考之精神而為享祭之吉占渙卦既散而不聚本象不知何處有立廟之義恐是卦外立義謂渙散之時當聚祖考之精神邪為復是下卦是坎有幽隱之義因此象而設立廟之義邪朱子曰坎固是有鬼神之義然此卦未必是因此為義且作因渙散而立廟說大抵這處都見不得縉雲馮氏曰渙所以為散者繼兑之後人情說豫則間舒放肆而亂所由生漢上朱氏曰天下離散不安其居聖人將以聚之故以宗廟為先宗廟者收其心之渙散而存之也人孰不有父母知報本則知祭祀出於人心復其本心則離散者可合而天下無事矣治渙之道也隆山李氏曰萃因民之聚立廟以堅其歸向之心所以為懷保之道渙憂民之散立廟以收拾其蕩析之心所以為招攜之術皆所以統攝民心而堅疑之也庸齊趙氏曰天下之難非陽剛得位莫能濟故難之散也則為渙及其下之聚也則為萃二卦之辭略同然渙言亨者一萃則再言之渙言利者二萃則三言之渙言王假有廟萃則加以用大往之辭以是知渙而後萃誠有其序也雙湖胡氏曰渙有二義卦有因民渙散而萃之意假廟是也又有渙天下患難之意涉川是也爻則全以渙為美事各有不同不可以一例觀之也雲峯胡氏曰萃與渙皆互艮艮為門闕一陽在上為屋二隂在下為闕髙巍之象故曰有廟萃言假廟是言聚己之精神以聚祖考之精神渙言假廟是祖考之精神既散至於廟所以聚之彖言假廟夫子於大象曰立廟彖言涉川夫子於十三卦舟楫之象取此蓋以本卦自有廟與涉川之象也故其占宜祭祀宜涉險必曰利貞者祭祀而非正是媚神以徼福涉川而非正是行險以徼幸故深戒之彖曰渙亨剛來而不窮柔得位乎外而上同上如字又時掌反傳渙之能亨者以卦才如是也渙之成渙由九來居二六上居四也剛陽之來則不窮極於下而處得其中柔之往則得正位於外而上同於五之中巽順於五乃上同也四五君臣之位當渙而比其義相通同五乃從中也當渙之時而守其中則不至於離散故能亨也厚齊馮氏曰以二四往來明卦義不窮上同明亨剛來不窮即需剛健不陷義不困窮之象又曰觀孔子之彖全在二四兩爻九六往來成夾輔九五之功所以亨渙而王者以之假廟以之涉川以之貞固皆兩爻之力也本義以卦變釋卦辭或問剛來而不窮窮是窮極來處乎中不至窮極否朱子曰是居二為中若在下則是窮矣剛來不窮是九三來做二柔得位而上同是六二上做三此說有些不穩却為是六三不換做得位然而某這個例只是一爻互換轉移無那隔驀兩爻底九二渙奔其機是以變卦言之自三來居二得中而不窮所以為安如機之安也六四是自二往居四未為得位以其上同於五所以為得位象辭如此說未密若云六四上應上九為上同恐如此跳過了不得此亦是依文解義說終是不見得四來居二之為安二之於四為得位是如何雲峯胡氏曰彖本義曰其變本自漸來三之九來居二故曰剛來而不窮蓋如訟自遁來三之九來居二亦曰剛來而得中也或謂訟與渙皆下卦三與二之變渙之六二往居三曰柔得位乎外而上同則訟六二往而為三亦可以言也而不言者渙之柔得位者二往居外卦之四故曰得位乎外所謂上同者上同於五也訟以六居三則不得位矣要之本義以二爻相比者為變故朱子雖有是疑而不及改正也王假有廟王乃在中也傳王假有廟之義在萃卦詳矣天下離散之時王者收合人心至於有廟乃是在其中也在中謂求得其中攝其心之謂也中者心之象剛來而不窮柔得位而上同卦才之義皆主於中也王者拯渙之道在得其中而已孟子曰得其民有道得其心斯得民矣享帝立廟民心所歸從也歸人心之道無大於此故云至于有廟拯渙之道極於此也朱子曰此卦只是卜祭吉父宜涉川王乃在中是指廟中言宜在廟祭祀伊川說得那道理多了他見得許多道理了不肯自做他說須要寄搭放在經上易不須說得深只是輕輕說過南軒張氏曰夫收天下之心莫若奠宗廟而正王位王乃在中所謂中天下而立定四海之民是也本義中謂廟中臨川吳氏曰以卦體言九五互艮上畫為廟九居五是王乃在宗廟之中利涉大川乘木有功也傳治渙之道當濟於險難而卦有乘木濟川之象上巽木也下坎水大川也利涉險以濟渙也木在水上乘木之象乘木所以涉川也涉則有濟渙之功卦有是義有是象也誠齊楊氏曰濟難者才也散難者非才也德也巽之才木也其德風也水之殘則溺萬物然乘一木則悠然而濟水之怒則決九山然遇一風則欣然而散才以濟之德以散之天下之大難一朝渙然而不復聚渙之所以亨也雲峯胡氏曰易以巽言利涉大川者三皆以木言益曰木道乃行中孚曰乘木舟虛渙亦曰乘木有功也十三卦舟楫之利獨取諸渙亦以此也象曰風行水上渙先王以享于帝立廟傳風行水上有渙散之象先王觀是象救天下之渙散至于享帝立廟也收合人心無如宗廟祭祀之報出於其心故享帝立廟人心之所歸也係人心合離散之道無大於此程子曰萃渙皆享於帝立廟內其精神之聚而形於此為其渙散故立此以收之本義皆所以合其散平庵項氏曰享帝于郊象巽之髙立廟於宫象坎之隱漢上朱氏曰享于上帝使人知天無二主立廟則人知反本鬼有所歸所以一天下之心合天下之渙進齊徐氏曰風行水上渙散披離渙之象也先王享帝立廟所以合其渙也此誠敬仁孝之至幽無不格散無不聚故於彖象中言之建安丘氏曰鬼神之道幽深渺邈不可度思惟至誠貫徹潜孚冥感如水之遇風渙然相受則隂陽交通有合無間郊焉而天神假廟焉而鬼神享矣雲峯胡氏曰享帝而與天神接立廟而與祖禰交皆聚已之精神以合其渙者也初六用拯馬壯吉傳六居卦之初渙之始也始渙而拯之又得馬壯所以吉也六爻獨初不云渙者離散之勢辨之宜早方始而拯之則不至於渙也為教深矣馬人之所託也託於壯馬故能拯渙馬謂二也二有剛中之才初隂柔順兩皆無應無應則親比相求初之柔順而託於剛中之才以拯其渙如得壯馬以致逺必有濟矣故吉也渙拯於始為力則易時之順也本義居卦之初渙之始也始渙而拯之為力既易又有壯馬其吉可知初六非有濟渙之才但能順乎九二故其象占如此節齊蔡氏曰拯救也馬所用以行者馬壯則行速言用救渙之急也雲峯胡氏曰馬壯二剛之象五爻皆言渙初獨不言者救之尚早可不至於渙也初六一柔在下未有濟渙之才然拯之於初猶易但能順九二以進則吉矣二有剛中之才坎為美脊之馬象曰初六之吉順也傳初之所以吉者以其能順從剛中之才也始渙而用拯能順乎時也九二渙奔其機悔亡機音几傳諸爻皆云渙謂渙之時也在渙離之時而處險中其有悔可知若能奔就所安則得悔亡也機者俯憑以為安者也俯就下也奔急往也二與初雖非正應而當渙離之時兩皆無與以隂陽親比相求則相賴者也故二目初為機初謂二為馬二急就於初以為安則能亡其悔矣初雖坎體而不在險中也或疑初之柔微何足賴蓋渙之時合力為一作而勝先儒皆以五為機非也方渙離之時二陽豈能同也若能同則成濟渙之功當大一有吉字豈止悔亡而已機謂俯就也東谷鄭氏曰渙之時必剛柔上下相合則不散初柔也在二之下二剛也在初之上柔而在下者必有所賴以為援剛而在上者必有所託以為安故初之得二為壯馬馬壯則可賴以為援二之就初為奔機得機則可藉以為安此初之從二為順於理而二之就初為得所願也本義九而居二宜有悔也然當渙之時來而不窮能亡其悔者也故其象占如此蓋九奔而二機也朱子曰九二渙奔其機以人事言之是來就安處中溪張氏曰奔者來之速也二剛自外來有奔之象雲峯胡氏曰奔九象互震為足為動機二象互震為木位偶為足本義曰九奔二機蓋以卦變言也九剛故象奔二中故象機以九來居二得中而安矣本有悔得中而安故悔亡象曰渙奔其機得願也傳渙散之時以合為安二居險中急就於初求安也賴之如機而亡其悔乃得所願也中溪張氏曰當渙散之時隂陽相比則有相倚之勢今二來就初憑以為安則剛得柔助而濟渙之功成矣豈不遂其欲安之願乎六三渙其躬無悔傳三在渙時獨有應與無渙散之悔也然以隂柔之質不中正之才上居無位之地豈能拯時之渙而及人也止於其身可以無悔而已上加渙字在渙之時躬無渙之悔也隆山李氏曰坎二隂本為險陷三居坎上近接乎巽坎水得風而散巽木得水而通故能渙散其身出險自無悔吝也中溪張氏曰六三雖未能散乎天下之難亦可以自散其一已之難而無坎陷之悔也本義隂柔而不中正有私於己之象也然居得陽位志在濟時能散其私以得無悔故其占如此大率此上四爻皆因渙以濟渙者也隆山李氏曰己私散則為善三之躬四之羣上之血是也夫人之所以膠執蔽固終不能自脫於險者有我而已六三雖不中正而髙出坎險之上於是釋然消散其有我之私而志在於外自然無悔矣雲峯胡氏曰本義曰此上四爻皆因渙以濟渙者蓋承九二言也二不過就一身之安三則能散一身之私三渙其躬與艮四同取反身之義蹇有坎有艮故象曰反身修德艮上體為艮而四在互坎之上渙下體為坎三在互艮之下蓋凡遇坎險者惟有反身而已特艮六四柔正所謂艮其身者反身而止其所當止渙六三柔不中正有私於已渙其躬者反身而散其所當散艮曰無咎此但曰無悔亦有間矣象曰渙其躬志在外也傳志應於上在外也與上相應故其身得免於渙而無悔悔亡者本有而得亡無悔者本無也朱子曰渙其躬志在外也是舍己從人意思瓜山潘氏曰居下之上有應於外其志將以身濟渙也何悔之有六四渙其羣元吉渙有丘匪夷所思傳渙四五二爻義相須故通言之彖故曰上同也四巽順而正居大臣之位五剛中而正居君位君臣合力剛柔相濟以拯天下之渙者也方渙散之時用剛則不能使之懷附用柔則不足為之依歸四以巽順之正道輔剛中正之君君臣同功所以能濟渙也天下渙散而能一無能字使之羣聚可謂大善之吉也渙有丘匪夷所思贊美之辭也丘聚之大也方渙散而能致其大聚其功甚大其事甚難其用至妙夷平常也非平常之見所能思及也非大賢智孰能如是本義居隂得正上承九五當濟渙之任者也下無應與為能散其朋黨之象占者如是則大善而吉又言能散其小羣以成大羣使所散者聚而若丘則非常人思慮之所及也朱子曰老蘇云渙之六四曰渙其羣元吉夫羣者聖人之所欲渙以混一天下者也此說雖程傳有所不及如程傳之說則是羣其渙非渙其羣也蓋當人心渙散之時各相朋黨不能混一惟六四能渙小人之私羣成天下之公道此所以元吉也老蘇天資髙又善為文章故此等說話皆逹其意大抵渙卦上三爻是以渙濟渙也但六四一爻未見有大好處今爻辭却說得恁地浩大皆不可曉中溪張氏曰六四出坎體之上能輔佐九五之君渙散小人之羣類所以元吉然於羣小渙散之後而衆正聚之若丘此又豈平常之思慮所能及哉建安丘氏曰四處渙離之時能不溺於在下之私羣而上附乎陽剛之主所散者小而所聚者大濟渙之功莫盛於此故爻稱其元吉而象贊其光大也雲峯胡氏曰四下無應散其羣之象丘互艮象夷等也指下二隂而言渙惟此爻大善而吉蓋初二三上皆不正六四得隂柔之正九五得陽剛之正而四則近五能輔君以濟渙者也四五下無應皆有散其朋黨之象獨於四言之者四能散其朋而聚歸於五也丘聚之髙也髙則為丘指五而言平則為夷指下二隂而言三隂中六四一隂獨如此非二隂等夷所能及也豐四曰夷主陽與陽等此曰匪夷隂不與陽等也象曰渙其羣元吉光大也傳稱元吉者謂其功德光大也元吉光大不在五而在四者二爻之義通言也於四言其施用於五言其成功君臣之分也臨川吳氏曰去柔羣而承剛君是其光輝之盛大也九五渙汗其大號渙王居無咎傳五與四君臣合德以剛中正巽順之道治渙得其道矣唯在浹洽於人心則順從也當使號令洽一作浹於民心如人身之汗浹於四體則信服而從矣如是則可以濟天下之渙居王位為稱而無咎大號大政令也謂新民之大命救渙之大政再云渙者上謂渙之時下謂處渙如是則無咎也在四已言元吉五唯言稱其位也渙之四五通言者渙以離散為害拯之使合也非君臣同功合力其能濟乎爻義相須時之宜也一作而已沙隨程氏曰汗由中出浹於四體亦猶大號由君出浹於四方中溪張氏曰九五以巽順之大君而發渙汗之大號此令出惟行弗惟反猶膚之有汗出而不可反也然當天下渙散之時民思其主必有王者出而居中正之位乃可成濟渙之功而無反汗之咎也白雲郭氏曰王居渙號則正位以令天下得君道也故無咎本義陽剛中正以居尊位當渙之時能散其號令與其居積則可以濟渙而無咎矣故其象占如此九五巽體有號令之象汗謂如汗之出而不反也渙王居如陸贄所謂散小儲而成大儲之意朱子曰渙汗其大號號令當教如汗之出千毛百竅中迸散出來這個物出不㑹反却不是說那號令不當反只是取其如汗之散出自有不反底意思又曰渙汗其大號聖人當初就人身上說一汗字為象不為無意蓋人君之號令當出乎人君之中心由中而外由近而逺雖至幽至逺之處無不被而及之亦猶人身之汗出乎中而浹于四體也雲峯胡氏曰汗坎象號巽命象居陽實象九五君位當渙之時非散其號令與其居積無以收天下之心必如是僅可以免咎耳汗由中出浹於四體猶大號出於君之中心而浹於四方也本義謂如汗之出不反非謂不可反也若謂不可反涕泏涎液皆然豈獨汗哉六四渙小羣而成大羣九五渙王居渙小儲而成大儲猶武王之散財發粟也故無咎象曰王居無咎正位也傳王居謂正位人君之尊位也能如五之為則居尊位為稱而無咎也朱子曰散居積須是在他正位方可渙王居無咎象只是節做四字句伊川泥其句所以說得王居無咎差了如上九象亦自節了則此何疑王氏曰為渙之主惟王居之乃得無咎正位不可以假人也上九渙其血去逖出無咎去起吕反傳渙之諸爻皆無係應亦渙離之象唯上應於三三居險陷之極上若下從於彼則不能出於渙也險有傷害畏懼之象故云血惕然九以陽剛處渙之外有出渙之象又居巽之極為能巽順於事理故云若能使其血去其惕出則無咎也其者所有也渙之時以能合為功獨九居渙之極有係而臨險故以能出渙逺害為善也本義上九以陽居渙極能出乎渙故其象占如此血謂傷害逖當作惕與小畜六四同言渙其血則去渙其惕則出也雲峯胡氏曰血下坎象惕亦坎象上卦已出坎險之外上九居渙之極去險愈逺故有血去惕出之象小畜六四以隂居巽體之初必順乎二陽然後血去惕出此以陽居巽體之極故渙其血則去渙其惕則出也建安丘氏曰三上兩爻隂陽相應蓋相援者也然三渙躬而曰志在外上渙血而曰逺害三欲其應上上不欲其應三何也蓋三處險內而應在外應外則為有所攀援而出險故三以有應於上為美上處險外而應在內應內則為有所係纍而不能去故上以不應於三為善又易中以隂應陽則為柔得剛援以陽應隂則為剛以柔纍是以隂爻應陽多吉陽爻應隂多凶也象曰渙其血逺害也逺袁萬反傳若如象文為渙其血乃與屯其膏同也義則不然蓋血字下脫去字血去惕出謂能逺害則無咎也隆山陳氏曰上雖與三應超處渙上不為所染故渙散其血捨之逺去去坎險之害而得無咎也朱子曰渙卦亦不可曉只以大意看則人之所當渙者莫甚於己私其次須便渙散其小小羣隊合成其大其次便渙散其號令與其居積以周於人其次便渙去患害渙是渙散底意思物事有當散底號令當散積聚當散羣隊當散厚齊馮氏曰渙六爻皆以兩兩相比為象初拯馬而二奔機三渙其躬而四渙其羣五渙其汗而上渙其血蓋當物情渙散之時皆相比以相依也節齊蔡氏曰渙散也以成卦言之則在二與四以治渙言之則惟五與四當位故於五曰正位於四曰得位四能渙其羣而上同五能正王位而出令所以濟渙也其初與二救渙者也三則自治其渜上則避渙而已建安丘氏曰當渙之時惟剛柔上下相合而不散者然後能拯渙在渙六爻初柔也二剛也二附就初在下相合以任拯渙之責故初拯馬壯吉而二奔機得願也五剛也四柔也四上同五在上相合以成濟渙之功故四渙羣元吉而五渙汗無咎也此四爻皆協力以拯渙者至三上居相應之位以逺而不能相及故三則但能渙其躬之難而無悔上則不過渙血以逺害而已兑下坎上傳節序卦渙者離也物不可以終離故受之以節物既離散則當節止之節所以次渙也為卦澤上有水澤之容有限澤上置水滿則不容為有節之象故為節節亨苦節不可貞傳事既有節則能致亨通故節有亨義節貴適中過則苦矣節至於苦豈能常也不可固守以為常不可貞也本義節有限而止也為卦下兑上坎澤上有水其容有限故為節節固自有亨道矣又其體隂陽各半而二五皆陽故其占得亨然至於太甚則苦矣故又戒以不可守以為貞也中溪張氏曰凡事有節則裁制得中可以通行而無弊故亨苦節不可貞謂上六夫節中道也過而不節非中也節而至於苦者亦非中也苦則人病其難行不可固守以為貞也漢上朱氏曰凡物過則苦味之過正形之過勞心之過思皆曰苦苦節則違性情之正物不能堪申屠狄之潔陳仲子之廉非不正立節太苦不可貞也雲峯胡氏曰天地之數六十故卦六十而為節月有中氣有節氣節以抑其過而歸之中也節則適中故可通行於天下苦節則不中故不可貞何也損與節皆自泰來損而孚則可貞節而苦則不可貞彖曰節亨剛柔分而剛得中傳節之道自有亨義事有節則能亨也又卦之才剛柔分處剛得中而不過亦所以為節所以能亨也本義以卦體釋卦辭厚齊馮氏曰剛柔分謂乾本純剛坤本純柔則剛柔無節剛不得中則節苦而不亨今坤分五之六以來三節乾之剛乾亦分三之剛以往五節坤之柔是之謂節也向也坤以柔居中則不能節節使以止其過非剛不可剛常急於太過今剛當大君之位而得中則無過節之苦斯可通行於天下矣白雲郭氏曰賁與節皆自泰來賁則柔來文剛剛上文柔節則柔來節剛剛上節柔夫泰為天地純剛柔之卦賁以剛柔純質而無文故文之節以剛柔過盛而無節故節之彖曰剛柔分而剛得中則知節之名卦以剛柔過盛為義也苦節不可貞其道窮也傳節至於極而苦則不可堅固常守其道已窮極也本義又以理言李氏曰節以甘為吉苦為窮所謂甘節制之有遏使人說而不厭故吉所謂苦節損抑過常使人惡而不擇故窮胡氏應回曰夫喜怒哀樂未發謂之中發而皆中節謂之和節之見於用得宜而和者也中節則和否則不和稼穡作甘以得中央之土也火炎上則苦亦以焦枯之極也剛得中而能節乃為九五之甘柔失中而過節則為上六之苦故物得中則甘失中則苦此節則亨而苦不可貞也說以行險當位以節中正以通傳以卦才言也內兑外坎說以行險也人於所說則不知已遇艱險則思止方說而止為節之義當位以節五居尊當位也在澤上有節也當位而以節主節者也處得中正節而能通也中正則通過則苦矣朱子曰說以行險伊川之說是也說則欲進而有險在前進去不得故有止節之義節便是阻節之義本義又以卦德卦體言之當位中正指五又坎為通或問節卦大抵以當而處通為善觀九五中正而通本義云坎為通豈水在中間必流而不止耶朱子曰然天地節而四時成節以制度不傷財不害民傳推言節之道天地有節故能成四時無節則失序也聖人立制度以為節故能不傷財害民人欲之無窮也苟非節以制度則侈肆至於傷財害民矣本義極言節道朱子曰天地節而四時成天地轉來到這裏相節了更沒去處今年冬盡了明年又是春夏秋冬到這裏厮匝了更去不得這個折做兩截兩截又折做四截便是春夏秋冬他是自然之節初無人使他聖人則因其自然之節而節之如修道之謂教天秩有禮之類皆是天地則和這個都無只是自然如此聖人法天做這許多節掯出來建安丘氏曰天地之氣運有節則分至啓閉弦望晦朔四時不差而歲功以成聖人體節之義則立為制度量入為出無過取無泛用有損己益人之實而無剝下奉上之事故不傷財則不害民矣語曰節用而愛人正此意也中溪張氏曰天地節者剛節柔柔節剛也剛節柔猶冬之有春柔節剛猶夏之有秋不然則大冬大夏而已安能成四時乎雲峯胡氏曰凡天地節而四時成節以制度而不傷財不害民皆節之通者也卦辭曰節亨通即亨之義窮乃通之反苦節則窮必如五之甘節則通故無位者不能制節節而不以中正者不能通象曰澤上有水節君子以制數度議德行行下孟反傳澤之容水有限過則盈溢是有節故為節也君子觀節之象以制立數度凡物之大小輕重髙下文質皆有數度所以為節也數多寡度法制議德行者存諸中為德發於外為行人之德行當義則中節議謂商度求中節也童溪王氏曰數度所以為節也德行欲其中節也古者之制器用宫室衣服也莫不有多寡之數隆殺之度存乎其間使賤不踰貴上不侵下以是為節故貴賤上下各安其分存於中為德發於外為行隨時合宜無過不及則為中節如禹稷之於平世顔子之於亂世曽子之去子思之守是也而孟子以同道與之其善議德行也歟雲峯胡氏曰澤上有水水有所限而止也制數度所以定萬用之限議德行所以嚴一身之限也初九不出户庭無咎傳户庭戶外之庭門庭門內一作外之庭初以陽在下上復有應非能節者也又當節之初故一無故字戒之謹守至於不出戶庭則無咎也初能固守終或渝之不謹於初安能有卒故於節之初為戒甚嚴也本義户庭户外之庭也陽剛得正居節之初未可以行能節而止者也故其象占如此李氏曰以陽剛之才上有其應而險難在前不可往也自守以正慎密而不出此盡節之道也故可無咎雲峯胡氏曰初前遇九二九陽竒有户象二前遇六三六隂耦有門象初九以陽居陽得正而時當節之初九二近不相得隔塞在前未可以行故其象為不出户庭其占為無咎厚齊馮氏曰初四有應宜出者也然前有陽爻蔽塞一不可出也四為坎體應則入于坎窞二不可出也剛在下而無位三不可出也不出則免咎無陽爻之塞坎窞之險陵節之僭矣此知節者也象曰不出户庭知通塞也塞悉則反傳爻辭於節之初戒之謹守故云不出户庭則無咎也象恐人之泥於言也故復明之云雖當謹守不出户庭又必知時之通塞也通則行塞則止義當出則出矣尾生之信一無信字水至不去不知通塞也故君子貞而不諒繫辭所解獨以言者在人所節唯言與行節於言則行可知言當在先也中溪張氏曰節之道貴知時通塞塞則行之户庭而準通則放之四海而準此其出處所以能中節也或謂塞者乃九二以剛塞乎初之前也初唯知其塞故不出然通則出矣不出户庭陋巷之顔子以之九二不出門庭凶傳二雖剛中之質然處隂居說而承柔處隂不正也居說失剛也承柔近邪也節之道當以剛中正二失其剛中之德與九五剛中正異矣不出門庭不之於外也謂不從於五也二五非隂陽正應故不相從若以剛中之道相合則可以成節之功唯其失德失時是以凶也不合於五乃不正之節也以剛中正為節如懲忿窒欲損過抑有餘一作益不及是也不正之節如嗇節於用懦節於行是也本義門庭門內之庭也九二當可行之時而失剛不正上無應與知節而不知通故其象占如此朱子曰户庭是初爻之象門庭是第二爻之象户庭未出去在門庭則已稍出矣就爻位上推户庭主心門庭主事於問君子之道貴乎得中節之過雖非中道然亦愈不節者如何便㑹凶如九二不出門庭雖是失時亦未失為恬退守節者乃以為凶何也曰這處便局定不得若以占言之且只寫下少間自有應處眼下皆未見得若以道理言之則有可為之時乃不出而為之這便是凶之道不是别更有凶南軒張氏曰處節之道要知時識變故曰當位以節中正以通初九無位之人雖慎密不出户庭而亦無咎九二有位大臣則不出門庭為凶蓋處顔子之世不可為禹稷之事當禹稷之位不可守顔子之節反是失節矣建安丘氏曰通塞在時出處在已時之通則出為是其不出者非也時之塞則不出為是而出者非也若初之不出户庭則以其猶未得位前遇剛塞可以不出也故不出則無咎二之不出門庭則以其既得中位且無窒塞不可以不出也而亦不知出焉此其所以凶歟雲峯胡氏曰初九為兊始兊於時為酉闔户之象九二互體震震於時為卯闢户之象九二以剛居柔不正且上無應與然六三非蔽之者故猶為可行之時二可行而不行是知節而不知通也故凶或曰既無應與如之何可行曰初九於時當止位雖有應其止非失時九二於時當行位雖無應其行非干時是故節而止者易節而通者難象曰不出門庭凶失時極也傳不能上從九五剛中正之道成節之功乃係於私昵之隂柔是失時之至極所以凶也失時失其所宜也中溪張氏曰九二居大臣之位上逢九五剛中同德之君謂宜佐其制數度議德行出坎險之中以成節亨之功可也而乃不出門庭其所節者亦狹矣所以凶者蓋以其失時之極也臨川吳氏曰當其可之謂時中九二不出以合於九五不得時宜甚矣初之知通塞知節者也二之失時極不知節者也六三不節若則嗟若無咎傳六三不中正乘剛而臨險固宜有咎然柔順而和說若能自節而順於義則可以無過不然則凶咎必至可傷嗟也故不節若則嗟若已所自致無所歸咎也本義隂柔而不中正以當節時非能節者故其象占如此進齊徐氏曰三處說之極不知節者也說極則悲故曰不節若則嗟若不節之嗟已所自致無所歸咎故曰無咎雙湖胡氏曰以澤節水故名節其成卦正在六三一爻今自三爻觀之坎水自溢出於兑澤之上初非三之所能節者故有不節之象但徒見其兊口之開故又有嗟若之象雲峯胡氏曰以成卦言則六自五來居三本能節者也獨以此爻言則隂柔不中正不能節者兑說之極說極則悲故其象為嗟而其占為無所歸咎也象曰不節之嗟又誰咎也傳節則可以免一作無過而不能自節以致可嗟將誰咎乎本義此無咎與諸爻異言無所歸咎也建安丘氏曰六三居下體兑說之上過於奢而不知節者也不節之嗟咎將誰執雲峯胡氏曰又誰咎也凡三見而其義有二同人初九又誰咎誰得而咎之也解與節六三又誰咎也咎自己致無所歸咎於人也但解三爻辭未嘗有無咎字故本義曰此無咎與諸爻異蓋因爻辭言之諸卦爻辭言無咎者九十有九多補過之辭此非可以例論也六四安節亨傳四順承九五剛中正之道是以中正為節也以隂居隂安於正也當位為有節之象下應於初四坎體水也水上溢為無節就下有節也如四之義非強節之安於節者也故能致亨節以安為善強守而不安則不能常豈能亨也本義柔順得正上承九五自然有節者也故其象占如此節齊蔡氏曰安者順而無所勉強之謂當位故安得五故亨縉雲馮氏曰節中其節之義在學為不陵節在禮為節文在財為撙節在物為符節在臣為名節在君師為節制唯其時物耳雙湖胡氏曰四最先受節者順正故安雲峯胡氏曰下兑澤上坎水六四水澤之交水於此自然受節又上卦本坤坤有安象節本人情所難此則安於節而自然無勉強者也故其象為安其占為亨象曰安節之亨承上道也傳四能安節之義非一象獨舉其重者上承九五剛中正之道以為節足以亨矣一作是以亨也餘善亦不出於中正也李氏光曰居近君之位能以卑遜承上安於臣節者也九五甘節吉往有尚傳九五剛中正居尊位為節之主所謂當位以節中正以通者也在己則安行天下則說從節之甘美者也其吉可知以此而行其功大矣故往則有可嘉尚也本義所謂當位以節中正以通者也故其象占如此朱子曰安節是安穩自在甘節是不辛苦喫力底意思甘便對那苦甘節與禮之用和為貴相似不成人臣得甘節吉時也要節天下大率人一身上各自有個當節底臨川吳氏曰甘者樂易而無艱苦之謂建安丘氏曰五得中故甘上過中故苦中溪張氏曰味之甘人所嗜也味之苦人所不嗜也今九五為節之主甘於節而不苦於節持此以往有可嘉尚故人皆說從如嗜甘味而無艱苦之態也雲峯胡氏曰他爻之節節其在我者九五當位以節節天下者也節天下而使天下甘之所謂中正以通者也五本伸體又居中故有甘之象甘在臨之三則我求說於人故無攸利在節之五則人自說於我故行有尚象曰甘節之吉居位中也傳既居尊位又得中道所以吉而有功節以中為貴得中則正矣正不能盡中也中溪張氏曰甘者味之中五者位之中所以吉者以其位之居中也臨川吳氏曰中則不過而至於苦上六苦節貞凶悔亡傳上六居節之極節之苦者也居險之極亦為苦義固守則凶悔則凶亡悔損過從中之謂也節之悔亡與他卦之悔亡辭同而義異也沙隨程氏曰苦節而貞固故凶悔則不為貞固之行而亡是凶矣趙氏曰三戒不節上戒苦節過猶不及失均也本義居節之極故為苦節既處過極故雖得正而不免於凶然禮奢寧儉故雖有悔而終得亡之也中溪張氏曰上六居節之終過於節則苦而難行雖貞亦凶也然用過乎儉悔猶可亡所謂伯夷之隘是也卦言苦節不可貞指此爻也雲峯胡氏曰五位中故為甘上位極故為苦彖曰節亨五以之曰苦節不可貞上以之悔亡諸家以為必悔之而後凶可亡悔其苦而之甘可也悔其節而不節弊將若何本義謂禮奢寧儉苦節雖有悔而終得亡之與賁束帛戔戔終吉意同蓋苦節之悔猶勝不節之嗟也象曰苦節貞凶其道窮也傳節既苦而貞固守之則凶蓋節之道至於窮極矣涑水司馬氏曰節之苦也故於貞為凶其道窮者謂其道不可通行於世也或問觀節六爻上三爻在險中是處節者也故四在險初而節則亨五在險中而節則甘上在險終雖苦而無悔蓋節之時當然也下三爻在險外是未至於節而預知所節之義初知通塞故無咎二可行而反節三見險在前當節而又以隂居剛不中正而不能節所以三爻凶而有咎不知是如此否朱子曰恁地說也說得然九三一爻看來甚好而反云凶終是解不穩建安丘氏曰節六爻大率以當位為善不當位為不善初九六四九五當位者也故五吉四亨初無咎九二六三不當位者也故二凶而三嗟上雖當位而亦凶者則以其當節之極居上之窮故其取義又不同也若以兩爻相比者觀之則爻各相比而相反初與二比初不出户庭則無咎二不出門庭則凶二反乎初者也三與四比四柔得正則為安節三柔不正則為不節三反乎四者也五與上比五得中則為節之甘上過中則為節之苦上反乎五者也聖人於爻義用意之精如此周易傳義大全卷二十
